<style>

const PAPERS = [{"id": "tridao-2312.00752", "pid": "tridao", "arxiv": "2312.00752", "date": "2023-12-01", "venue": "cs.LG", "fields": ["efficiency", "nlp"], "tEn": "Mamba: Linear-Time Sequence Modeling with Selective State Spaces", "tZh": "Mamba：具有选择性状态空间的线性时间序列建模", "sEn": "Mamba achieves linear-time sequence modeling with selective state spaces, outperforming Transformers in efficiency and matching larger models in performance.", "sZh": "Mamba通过选择性状态空间实现线性时间序列建模，在效率上超越Transformer，在性能上匹配更大规模的模型。", "absEn": "Foundation models, now powering most of the exciting applications in deep learning, are almost universally based on the Transformer architecture and its core attention module. Many subquadratic-time architectures such as linear attention, gated convolution and recurrent models, and structured state space models (SSMs) have been developed to address Transformers' computational inefficiency on long sequences, but they have not performed as well as attention on important modalities such as language. We identify that a key weakness of such models is their inability to perform content-based reasoning, and make several improvements. First, simply letting the SSM parameters be functions of the input addresses their weakness with discrete modalities, allowing the model to selectively propagate or forget information along the sequence length dimension depending on the current token. Second, even though this change prevents the use of efficient convolutions, we design a hardware-aware parallel algorithm in recurrent mode. We integrate these selective SSMs into a simplified end-to-end neural network architecture without attention or even MLP blocks (Mamba). Mamba enjoys fast inference (5$\\times$ higher throughput than Transformers) and linear scaling in sequence length, and its performance improves on real data up to million-length sequences. As a general sequence model backbone, Mamba achieves state-of-the-art performance across several modalities such as language, audio, and genomics. On language modeling, our Mamba-3B model outperforms Transformers of the same size and matches Transformers twice its size, both in pretraining and downstream evaluation.", "absZh": "基础模型如今驱动着深度学习中最激动人心的应用，几乎普遍基于Transformer架构及其核心注意力模块。为了解决Transformer在长序列上的计算低效问题，人们开发了许多次二次时间架构，如线性注意力、门控卷积和循环模型以及结构化状态空间模型（SSM），但这些模型在语言等重要模态上的表现不如注意力机制。我们发现这类模型的一个关键弱点在于无法进行基于内容的推理，并做出了若干改进。首先，让SSM参数成为输入的函数，解决了其在离散模态上的弱点，使得模型能够根据当前token沿序列长度维度选择性地传播或遗忘信息。其次，尽管这一改变阻止了高效卷积的使用，我们设计了一种硬件感知的并行算法，以循环模式运行。我们将这些选择性SSM集成到一个简化的端到端神经网络架构中，无需注意力甚至MLP块（Mamba）。Mamba具有快速推理（吞吐量比Transformer高5倍）和序列长度线性扩展的特点，在长达百万长度的真实数据上性能提升。作为通用序列模型骨干，Mamba在语言、音频和基因组学等多种模态上取得了最先进的性能。在语言建模方面，我们的Mamba-3B模型在预训练和下游评估中均优于相同大小的Transformer，并匹配两倍大小的Transformer。", "insights": {"contrib": [{"en": "Proposes Mamba, a selective state space model that outperforms Transformers on long sequences.", "zh": "提出Mamba，一种选择性状态空间模型，在长序列上优于Transformer。"}, {"en": "Identifies content-based reasoning as key weakness of prior SSMs and fixes it with input-dependent parameters.", "zh": "指出先前SSM无法进行基于内容的推理，并通过输入依赖参数解决。"}, {"en": "Designs a hardware-aware parallel algorithm for efficient recurrent mode inference.", "zh": "设计了一种硬件感知的并行算法，实现高效的循环模式推理。"}, {"en": "Achieves 5x higher throughput than Transformers and linear scaling in sequence length.", "zh": "实现比Transformer高5倍的吞吐量，序列长度线性缩放。"}, {"en": "Mamba-3B matches Transformers twice its size in pretraining and downstream tasks.", "zh": "Mamba-3B在预训练和下游任务中匹配两倍大小的Transformer。"}, {"en": "State-of-the-art across language, audio, and genomics modalities.", "zh": "在语言、音频和基因组学等多种模态上达到最先进水平。"}], "limits": [{"en": "Selective SSMs lose convolution efficiency, requiring custom hardware-aware implementation.", "zh": "选择性SSM失去卷积效率，需要定制硬件感知实现。"}, {"en": "Performance on very short sequences may not surpass Transformers due to overhead.", "zh": "由于开销，在极短序列上性能可能不如Transformer。"}, {"en": "Theoretical understanding of why selectivity improves performance is limited.", "zh": "对选择性为何提升性能的理论理解有限。"}, {"en": "Scaling to extremely large models (e.g., 100B+) is not demonstrated.", "zh": "未展示扩展到极大模型（如100B+）的效果。"}, {"en": "Potential numerical stability issues with recurrent mode on long sequences.", "zh": "长序列循环模式可能存在数值稳定性问题。"}]}, "cites": 7660}, {"id": "jimfan-2305.16291", "pid": "jimfan", "arxiv": "2305.16291", "date": "2023-05-25", "venue": "cs.AI", "fields": ["rl"], "tEn": "Voyager: An Open-Ended Embodied Agent with Large Language Models", "tZh": "Voyager：基于大型语言模型的开放式具身智能体", "sEn": "Voyager is the first LLM-powered embodied lifelong learning agent in Minecraft that continuously explores, acquires skills, and makes discoveries without human intervention.", "sZh": "Voyager是首个由大型语言模型驱动的Minecraft具身终身学习智能体，无需人工干预即可持续探索、获取技能并做出新发现。", "absEn": "We introduce Voyager, the first LLM-powered embodied lifelong learning agent in Minecraft that continuously explores the world, acquires diverse skills, and makes novel discoveries without human intervention. Voyager consists of three key components: 1) an automatic curriculum that maximizes exploration, 2) an ever-growing skill library of executable code for storing and retrieving complex behaviors, and 3) a new iterative prompting mechanism that incorporates environment feedback, execution errors, and self-verification for program improvement. Voyager interacts with GPT-4 via blackbox queries, which bypasses the need for model parameter fine-tuning. The skills developed by Voyager are temporally extended, interpretable, and compositional, which compounds the agent's abilities rapidly and alleviates catastrophic forgetting. Empirically, Voyager shows strong in-context lifelong learning capability and exhibits exceptional proficiency in playing Minecraft. It obtains 3.3x more unique items, travels 2.3x longer distances, and unlocks key tech tree milestones up to 15.3x faster than prior SOTA. Voyager is able to utilize the learned skill library in a new Minecraft world to solve novel tasks from scratch, while other techniques struggle to generalize. We open-source our full codebase and prompts at https://voyager.minedojo.org/.", "absZh": "我们介绍了Voyager，这是首个在Minecraft中由大型语言模型驱动的具身终身学习智能体，它能够持续探索世界、获取多样技能，并在无需人工干预的情况下做出新颖发现。Voyager由三个关键组件构成：1）最大化探索的自动课程；2）不断增长的技能库，用于存储和检索可执行代码的复杂行为；3）一种新的迭代提示机制，结合环境反馈、执行错误和自验证来改进程序。Voyager通过黑盒查询与GPT-4交互，无需微调模型参数。Voyager开发的技能具有时间延展性、可解释性和组合性，这迅速增强了智能体的能力并减轻了灾难性遗忘。实验表明，Voyager展现出强大的上下文终身学习能力，并在玩Minecraft方面表现出色。它获得的独特物品数量是先前最先进方法的3.3倍，旅行距离是其2.3倍，解锁关键技术树里程碑的速度快达15.3倍。Voyager能够利用学到的技能库在新的Minecraft世界中从头解决新任务，而其他技术难以泛化。我们在https://voyager.minedojo.org/开源了完整的代码库和提示。", "insights": {"contrib": [{"en": "First LLM-powered embodied lifelong learning agent in Minecraft, exploring and acquiring skills without human intervention.", "zh": "首个由大语言模型驱动的具身终身学习智能体，在Minecraft中无需人工干预即可探索世界并获取技能。"}, {"en": "Automatic curriculum that maximizes exploration by proposing tasks based on agent state and progress.", "zh": "自动课程最大化探索，根据智能体状态和进展提出任务。"}, {"en": "Growing skill library of executable code for storing and retrieving complex, compositional behaviors.", "zh": "不断增长的技能库，存储和检索可执行代码的复杂组合行为。"}, {"en": "Iterative prompting mechanism using environment feedback, execution errors, and self-verification for code improvement.", "zh": "迭代提示机制，利用环境反馈、执行错误和自我验证改进代码。"}, {"en": "Outperforms prior SOTA: 3.3x more unique items, 2.3x longer distances, 15.3x faster tech tree milestones.", "zh": "超越先前最优：3.3倍独特物品、2.3倍移动距离、15.3倍更快解锁科技树里程碑。"}, {"en": "Zero-shot generalization to novel tasks in new worlds using learned skill library.", "zh": "零样本泛化到新世界中的新任务，利用已学技能库。"}], "limits": [{"en": "No visual perception; relies on text-only GPT-4 API, limiting spatial tasks.", "zh": "缺乏视觉感知，依赖纯文本GPT-4 API，限制空间任务。"}, {"en": "High cost of GPT-4 API; 15x more expensive than GPT-3.5.", "zh": "GPT-4 API成本高，比GPT-3.5贵15倍。"}, {"en": "Occasional failures in code generation and self-verification, e.g., hallucinating non-existent items.", "zh": "代码生成和自我验证偶尔失败，例如幻觉出不存在的物品。"}, {"en": "Automatic curriculum may propose unachievable tasks due to hallucinations.", "zh": "自动课程可能因幻觉提出无法完成的任务。"}, {"en": "Requires high-level Mineflayer API; not directly comparable to low-level pixel-based methods.", "zh": "需要高级Mineflayer API，无法直接与基于像素的低级方法比较。"}]}, "cites": 1836}, {"id": "tridao-2205.14135", "pid": "tridao", "arxiv": "2205.14135", "date": "2022-05-27", "venue": "cs.LG", "fields": ["efficiency", "nlp"], "tEn": "FlashAttention: Fast and Memory-Efficient Exact Attention with IO-Awareness", "tZh": "FlashAttention：快速且内存高效的精确注意力机制，具有IO感知能力", "sEn": "FlashAttention reduces GPU memory reads/writes via tiling, achieving faster training and longer context for Transformers.", "sZh": "FlashAttention通过分块减少GPU内存读写，实现更快的训练速度和更长的上下文支持。", "absEn": "Transformers are slow and memory-hungry on long sequences, since the time and memory complexity of self-attention are quadratic in sequence length. Approximate attention methods have attempted to address this problem by trading off model quality to reduce the compute complexity, but often do not achieve wall-clock speedup. We argue that a missing principle is making attention algorithms IO-aware -- accounting for reads and writes between levels of GPU memory. We propose FlashAttention, an IO-aware exact attention algorithm that uses tiling to reduce the number of memory reads/writes between GPU high bandwidth memory (HBM) and GPU on-chip SRAM. We analyze the IO complexity of FlashAttention, showing that it requires fewer HBM accesses than standard attention, and is optimal for a range of SRAM sizes. We also extend FlashAttention to block-sparse attention, yielding an approximate attention algorithm that is faster than any existing approximate attention method. FlashAttention trains Transformers faster than existing baselines: 15% end-to-end wall-clock speedup on BERT-large (seq. length 512) compared to the MLPerf 1.1 training speed record, 3$\\times$ speedup on GPT-2 (seq. length 1K), and 2.4$\\times$ speedup on long-range arena (seq. length 1K-4K). FlashAttention and block-sparse FlashAttention enable longer context in Transformers, yielding higher quality models (0.7 better perplexity on GPT-2 and 6.4 points of lift on long-document classification) and entirely new capabilities: the first Transformers to achieve better-than-chance performance on the Path-X challenge (seq. length 16K, 61.4% accuracy) and Path-256 (seq. length 64K, 63.1% accuracy).", "absZh": "Transformer在处理长序列时速度慢且内存消耗大，因为自注意力的时间和内存复杂度与序列长度呈二次方关系。近似注意力方法试图通过牺牲模型质量来降低计算复杂度，但通常无法实现实际加速。我们认为缺失的原则是使注意力算法具有IO感知能力——即考虑GPU内存层级之间的读写操作。我们提出了FlashAttention，一种具有IO感知能力的精确注意力算法，它使用分块技术来减少GPU高带宽内存（HBM）和片上SRAM之间的内存读写次数。我们分析了FlashAttention的IO复杂度，表明它比标准注意力需要更少的HBM访问，并且在多种SRAM大小下都是最优的。我们还将FlashAttention扩展到块稀疏注意力，产生了一种比任何现有近似注意力方法更快的近似注意力算法。FlashAttention训练Transformer的速度比现有基线更快：在BERT-large（序列长度512）上，相比MLPerf 1.1训练速度记录，端到端加速15%；在GPT-2（序列长度1K）上加速3倍；在长距离竞技场（序列长度1K-4K）上加速2.4倍。FlashAttention和块稀疏FlashAttention使Transformer能够处理更长的上下文，从而获得更高质量的模型（GPT-2上困惑度降低0.7，长文档分类提升6.4个百分点），并实现了全新的能力：首个在Path-X挑战（序列长度16K，准确率61.4%）和Path-256（序列长度64K，准确率63.1%）上取得优于随机水平性能的Transformer。", "insights": {"contrib": [{"en": "Proposes FlashAttention, an IO-aware exact attention algorithm using tiling to reduce GPU HBM accesses.", "zh": "提出FlashAttention，一种IO感知的精确注意力算法，通过分块减少GPU高带宽内存访问。"}, {"en": "Achieves significant wall-clock speedups: 15% on BERT-large, 3x on GPT-2, 2.4x on long-range arena.", "zh": "实现显著的端到端加速：BERT-large提升15%，GPT-2提升3倍，长距离竞技场提升2.4倍。"}, {"en": "Enables longer context in Transformers, improving perplexity by 0.7 on GPT-2 and 6.4 points on long-document classification.", "zh": "支持Transformer更长上下文，GPT-2困惑度降低0.7，长文档分类提升6.4个百分点。"}, {"en": "First Transformer to achieve better-than-chance on Path-X (61.4%) and Path-256 (63.1%) via longer sequences.", "zh": "首个在Path-X（61.4%）和Path-256（63.1%）上超越随机水平的Transformer。"}, {"en": "Extends to block-sparse FlashAttention, faster than all existing approximate attention methods.", "zh": "扩展至块稀疏FlashAttention，比所有现有近似注意力方法更快。"}, {"en": "Provides IO complexity analysis and proves optimality for exact attention over a range of SRAM sizes.", "zh": "提供IO复杂度分析，并证明在多种SRAM大小下精确注意力的最优性。"}], "limits": [{"en": "Requires custom CUDA kernel, limiting portability and ease of use across GPU architectures.", "zh": "需要自定义CUDA内核，限制了跨GPU架构的可移植性和易用性。"}, {"en": "Optimal only for single GPU; multi-GPU IO analysis and parallelization remain unexplored.", "zh": "仅对单GPU最优；多GPU的IO分析和并行化尚未探索。"}, {"en": "Block-sparse attention relies on predefined sparsity patterns, which may not suit all tasks.", "zh": "块稀疏注意力依赖预定义稀疏模式，可能不适用于所有任务。"}, {"en": "Recomputation in backward pass increases FLOPs, though offset by reduced HBM accesses.", "zh": "反向传播中的重计算增加FLOPs，尽管被减少的HBM访问所抵消。"}, {"en": "Performance gains diminish for very short sequences where memory access is less dominant.", "zh": "对于极短序列，性能提升减弱，因为内存访问不再是主要瓶颈。"}]}, "cites": 4545}, {"id": "leike-2203.02155", "pid": "leike", "arxiv": "2203.02155", "date": "2022-03-04", "venue": "cs.CL", "fields": ["safety", "nlp"], "tEn": "Training language models to follow instructions with human feedback", "tZh": "使用人类反馈训练语言模型遵循指令", "sEn": "Fine-tuning with human feedback aligns language models with user intent, enabling a 1.3B parameter model to outperform a 175B model.", "sZh": "通过人类反馈微调，语言模型能够更好地遵循用户意图，使得1.3B参数的模型在性能上优于175B参数的模型。", "absEn": "Making language models bigger does not inherently make them better at following a user's intent. For example, large language models can generate outputs that are untruthful, toxic, or simply not helpful to the user. In other words, these models are not aligned with their users. In this paper, we show an avenue for aligning language models with user intent on a wide range of tasks by fine-tuning with human feedback. Starting with a set of labeler-written prompts and prompts submitted through the OpenAI API, we collect a dataset of labeler demonstrations of the desired model behavior, which we use to fine-tune GPT-3 using supervised learning. We then collect a dataset of rankings of model outputs, which we use to further fine-tune this supervised model using reinforcement learning from human feedback. We call the resulting models InstructGPT. In human evaluations on our prompt distribution, outputs from the 1.3B parameter InstructGPT model are preferred to outputs from the 175B GPT-3, despite having 100x fewer parameters. Moreover, InstructGPT models show improvements in truthfulness and reductions in toxic output generation while having minimal performance regressions on public NLP datasets. Even though InstructGPT still makes simple mistakes, our results show that fine-tuning with human feedback is a promising direction for aligning language models with human intent.", "absZh": "增大语言模型的规模并不天然使其更擅长遵循用户意图。例如，大型语言模型可能生成不真实、有害或对用户无帮助的输出。换句话说，这些模型与用户不一致。在本文中，我们展示了一种通过人类反馈微调来使语言模型在广泛任务上与用户意图对齐的途径。从一组标注者编写的提示和通过OpenAI API提交的提示开始，我们收集了标注者展示期望模型行为的数据集，用于通过监督学习微调GPT-3。然后，我们收集了模型输出排名的数据集，用于通过来自人类反馈的强化学习进一步微调这个监督模型。我们将得到的模型称为InstructGPT。在我们的提示分布上进行的人类评估中，1.3B参数的InstructGPT模型的输出优于175B参数的GPT-3，尽管参数数量少100倍。此外，InstructGPT模型在真实性和减少有毒输出生成方面表现出改进，同时在公共NLP数据集上性能退化最小。尽管InstructGPT仍然会犯简单错误，但我们的结果表明，使用人类反馈进行微调是使语言模型与人类意图对齐的一个有前景的方向。", "insights": {"contrib": [{"en": "Shows fine-tuning with human feedback (RLHF) aligns language models to user intent, with 1.3B InstructGPT preferred over 175B GPT-3.", "zh": "展示了通过人类反馈微调（RLHF）使语言模型与用户意图对齐，1.3B 参数的 InstructGPT 优于 175B 的 GPT-3。"}, {"en": "InstructGPT improves truthfulness on TruthfulQA and reduces toxic outputs by 25% when prompted respectfully.", "zh": "InstructGPT 在 TruthfulQA 上提升了真实性，并在被要求尊重时减少了 25% 的有毒输出。"}, {"en": "RLHF alignment cost is modest relative to pretraining; 1.3B InstructGPT outperforms 175B GPT-3 with 100x fewer parameters.", "zh": "RLHF 对齐成本相对于预训练较低；1.3B InstructGPT 以 100 倍少的参数优于 175B GPT-3。"}, {"en": "Mixing pretraining gradients (PPO-ptx) mitigates alignment tax on NLP benchmarks like SQuAD and HellaSwag.", "zh": "混合预训练梯度（PPO-ptx）减轻了在 SQuAD 和 HellaSwag 等 NLP 基准上的对齐代价。"}, {"en": "InstructGPT generalizes instruction-following to non-English and code tasks despite limited supervision.", "zh": "InstructGPT 将指令遵循泛化到非英语和代码任务，尽管监督有限。"}, {"en": "Held-out labelers prefer InstructGPT over GPT-3 at similar rates, showing generalization beyond training labelers.", "zh": "保留的标注者以相似比率偏好 InstructGPT 而非 GPT-3，表明泛化到训练标注者之外。"}], "limits": [{"en": "InstructGPT still generates toxic, biased, or false outputs, especially when prompted for harmful content.", "zh": "InstructGPT 仍会产生有毒、有偏见或虚假的输出，尤其在要求有害内容时。"}, {"en": "Alignment is to specific labeler preferences, not universal human values; labeler demographics are limited.", "zh": "对齐针对特定标注者偏好，而非普世人类价值观；标注者人口统计有限。"}, {"en": "Performance regressions on some NLP datasets (e.g., SQuAD, DROP) persist even with PPO-ptx mitigation.", "zh": "即使采用 PPO-ptx 缓解，某些 NLP 数据集（如 SQuAD、DROP）上的性能下降仍然存在。"}, {"en": "Model fails on false premise instructions, over-hedges simple questions, and struggles with multiple constraints.", "zh": "模型在错误前提指令上失败，对简单问题过度含糊，且难以处理多重约束。"}, {"en": "RLHF may not scale to superhuman systems; method relies on human evaluation which becomes difficult for complex tasks.", "zh": "RLHF 可能无法扩展到超级智能系统；该方法依赖人类评估，对复杂任务变得困难。"}]}, "cites": 21784}, {"id": "lecun-2103.03230", "pid": "lecun", "arxiv": "2103.03230", "date": "2021-03-04", "venue": "cs.CV", "fields": ["vision", "deep-learning"], "tEn": "Barlow Twins: Self-Supervised Learning via Redundancy Reduction", "tZh": "Barlow Twins: 通过冗余减少实现自监督学习", "sEn": "Barlow Twins avoids collapse by making the cross-correlation matrix close to identity, reducing redundancy between embedding components.", "sZh": "Barlow Twins通过使互相关矩阵接近单位矩阵来避免坍塌，减少嵌入向量分量间的冗余。", "absEn": "Self-supervised learning (SSL) is rapidly closing the gap with supervised methods on large computer vision benchmarks. A successful approach to SSL is to learn embeddings which are invariant to distortions of the input sample. However, a recurring issue with this approach is the existence of trivial constant solutions. Most current methods avoid such solutions by careful implementation details. We propose an objective function that naturally avoids collapse by measuring the cross-correlation matrix between the outputs of two identical networks fed with distorted versions of a sample, and making it as close to the identity matrix as possible. This causes the embedding vectors of distorted versions of a sample to be similar, while minimizing the redundancy between the components of these vectors. The method is called Barlow Twins, owing to neuroscientist H. Barlow's redundancy-reduction principle applied to a pair of identical networks. Barlow Twins does not require large batches nor asymmetry between the network twins such as a predictor network, gradient stopping, or a moving average on the weight updates. Intriguingly it benefits from very high-dimensional output vectors. Barlow Twins outperforms previous methods on ImageNet for semi-supervised classification in the low-data regime, and is on par with current state of the art for ImageNet classification with a linear classifier head, and for transfer tasks of classification and object detection.", "absZh": "自监督学习（SSL）正在迅速缩小与大型计算机视觉基准测试中监督方法的差距。一种成功的SSL方法是学习对输入样本的扭曲具有不变性的嵌入。然而，这种方法的一个反复出现的问题是存在平凡的常数解。大多数当前方法通过仔细的实现细节来避免此类解。我们提出了一种目标函数，通过测量两个相同网络（输入样本的扭曲版本）输出的互相关矩阵，并使其尽可能接近单位矩阵，从而自然地避免坍塌。这使得样本扭曲版本的嵌入向量相似，同时最小化这些向量分量之间的冗余。该方法被称为Barlow Twins，源于神经科学家H. Barlow的冗余减少原理应用于一对相同的网络。Barlow Twins不需要大批量或网络孪生之间的不对称性，如预测网络、梯度停止或权重更新的移动平均。有趣的是，它受益于非常高维的输出向量。Barlow Twins在低数据场景下的半监督分类中优于ImageNet上的先前方法，并且在具有线性分类头的ImageNet分类以及分类和对象检测的迁移任务中与当前最先进水平相当。", "insights": {"contrib": [{"en": "Proposes Barlow Twins, a self-supervised learning method using redundancy reduction to avoid trivial constant solutions.", "zh": "提出Barlow Twins，一种通过冗余减少避免平凡常数解的自监督学习方法。"}, {"en": "Objective function measures cross-correlation matrix between twin network outputs and makes it close to identity matrix.", "zh": "目标函数测量孪生网络输出之间的互相关矩阵，并使其接近单位矩阵。"}, {"en": "Does not require large batches, predictor networks, stop-gradients, or momentum encoders, simplifying implementation.", "zh": "不需要大批量、预测网络、梯度停止或动量编码器，简化了实现。"}, {"en": "Benefits from very high-dimensional output vectors, unlike contrastive methods that saturate.", "zh": "受益于非常高维的输出向量，与饱和的对比方法不同。"}, {"en": "Outperforms prior methods on ImageNet semi-supervised classification with 1% labels (55% top-1 accuracy).", "zh": "在ImageNet半监督分类（1%标签）上优于先前方法（55% top-1准确率）。"}, {"en": "Matches state-of-the-art on ImageNet linear classification and transfer tasks for classification and object detection.", "zh": "在ImageNet线性分类以及分类和物体检测的迁移任务上达到最先进水平。"}], "limits": [{"en": "Performance degrades when certain data augmentations are removed, unlike BYOL which is more robust.", "zh": "移除某些数据增强时性能下降，不像BYOL那样鲁棒。"}, {"en": "Requires careful tuning of the trade-off parameter λ for optimal performance.", "zh": "需要仔细调整权衡参数λ以获得最佳性能。"}, {"en": "High-dimensional embeddings increase memory requirements, limiting scalability beyond 16,000 dimensions.", "zh": "高维嵌入增加内存需求，限制了超过16,000维的可扩展性。"}, {"en": "Method is evaluated only on computer vision tasks; applicability to other domains like NLP is unexplored.", "zh": "该方法仅在计算机视觉任务上评估；在其他领域如NLP的适用性尚未探索。"}, {"en": "Theoretical connection to Information Bottleneck is heuristic; alternative implementations may yield different results.", "zh": "与信息瓶颈的理论联系是启发式的；替代实现可能产生不同结果。"}]}, "cites": 3039}, {"id": "fedus-2101.03961", "pid": "fedus", "arxiv": "2101.03961", "date": "2021-01-11", "venue": "cs.LG", "fields": ["nlp", "efficiency"], "tEn": "Switch Transformers: Scaling to Trillion Parameter Models with Simple and Efficient Sparsity", "tZh": "Switch Transformers：通过简单高效的稀疏性扩展到万亿参数模型", "sEn": "Switch Transformers simplify MoE routing, reduce communication and training instability, enabling trillion-parameter models with up to 7x speedup.", "sZh": "Switch Transformers简化了混合专家路由，降低了通信成本和训练不稳定性，实现了万亿参数模型，速度提升高达7倍。", "absEn": "In deep learning, models typically reuse the same parameters for all inputs. Mixture of Experts (MoE) defies this and instead selects different parameters for each incoming example. The result is a sparsely-activated model -- with outrageous numbers of parameters -- but a constant computational cost. However, despite several notable successes of MoE, widespread adoption has been hindered by complexity, communication costs and training instability -- we address these with the Switch Transformer. We simplify the MoE routing algorithm and design intuitive improved models with reduced communication and computational costs. Our proposed training techniques help wrangle the instabilities and we show large sparse models may be trained, for the first time, with lower precision (bfloat16) formats. We design models based off T5-Base and T5-Large to obtain up to 7x increases in pre-training speed with the same computational resources. These improvements extend into multilingual settings where we measure gains over the mT5-Base version across all 101 languages. Finally, we advance the current scale of language models by pre-training up to trillion parameter models on the \"Colossal Clean Crawled Corpus\" and achieve a 4x speedup over the T5-XXL model.", "absZh": "在深度学习中，模型通常对所有输入重用相同的参数。混合专家（MoE）打破了这一惯例，为每个输入示例选择不同的参数。结果是一个稀疏激活的模型——参数数量惊人——但计算成本恒定。然而，尽管MoE取得了一些显著的成功，但其复杂性、通信成本和训练不稳定性阻碍了广泛采用——我们通过Switch Transformer解决了这些问题。我们简化了MoE路由算法，并设计了直观的改进模型，减少了通信和计算成本。我们提出的训练技术有助于控制不稳定性，并首次展示了可以使用较低精度（bfloat16）格式训练大型稀疏模型。我们基于T5-Base和T5-Large设计的模型在相同计算资源下实现了高达7倍的预训练速度提升。这些改进扩展到多语言设置，我们在所有101种语言上测量了相对于mT5-Base版本的增益。最后，我们通过在“Colossal Clean Crawled Corpus”上预训练高达万亿参数的模型，推进了当前语言模型的规模，并实现了比T5-XXL模型快4倍的速度。", "insights": {"contrib": [{"en": "Simplifies MoE routing to top-1 expert, reducing computation and communication costs.", "zh": "将 MoE 路由简化为 top-1 专家，降低计算和通信成本。"}, {"en": "Achieves up to 7x pre-training speedup over T5 with same FLOPs per token.", "zh": "在相同每 token FLOPs 下，预训练速度相比 T5 提升高达 7 倍。"}, {"en": "Introduces selective precision (bfloat16) training for large sparse models.", "zh": "引入选择性精度（bfloat16）训练大型稀疏模型。"}, {"en": "Demonstrates scaling to trillion parameters with 4x speedup over T5-XXL.", "zh": "展示扩展到万亿参数，相比 T5-XXL 实现 4 倍加速。"}, {"en": "Shows universal improvements across 101 languages in multilingual setting.", "zh": "在多语言设置中，所有 101 种语言均获得改进。"}, {"en": "Proposes expert dropout and distillation to preserve 30% quality gain with 99% compression.", "zh": "提出专家 dropout 和蒸馏，以 99% 压缩率保留 30% 的质量提升。"}], "limits": [{"en": "Training instability persists for largest models like Switch-XXL.", "zh": "最大模型（如 Switch-XXL）仍存在训练不稳定性。"}, {"en": "Downstream gains do not fully match upstream perplexity improvements.", "zh": "下游任务收益未能完全匹配上游困惑度改进。"}, {"en": "Fine-tuning quality depends on FLOPs per token and parameter count in unclear ways.", "zh": "微调质量与每 token FLOPs 和参数数量的关系尚不明确。"}, {"en": "Expert capacity factor introduces trade-off between token dropping and efficiency.", "zh": "专家容量因子在 token 丢弃和效率之间存在权衡。"}, {"en": "Distillation preserves only ~30% of sparse model quality gain.", "zh": "蒸馏仅保留约 30% 的稀疏模型质量提升。"}]}}, {"id": "kaplan-2001.08361", "pid": "kaplan", "arxiv": "2001.08361", "date": "2020-01-23", "venue": "cs.LG", "fields": ["nlp"], "tEn": "Scaling Laws for Neural Language Models", "tZh": "神经语言模型的缩放定律", "sEn": "Language model performance scales as a power-law with model size, dataset size, and compute, enabling optimal compute-efficient training with very large models on modest data.", "sZh": "语言模型性能随模型大小、数据集大小和计算量呈幂律缩放，从而可以在适度的数据上训练非常大的模型，实现计算效率最优的训练。", "absEn": "We study empirical scaling laws for language model performance on the cross-entropy loss. The loss scales as a power-law with model size, dataset size, and the amount of compute used for training, with some trends spanning more than seven orders of magnitude. Other architectural details such as network width or depth have minimal effects within a wide range. Simple equations govern the dependence of overfitting on model/dataset size and the dependence of training speed on model size. These relationships allow us to determine the optimal allocation of a fixed compute budget. Larger models are significantly more sample-efficient, such that optimally compute-efficient training involves training very large models on a relatively modest amount of data and stopping significantly before convergence.", "absZh": "我们研究了语言模型在交叉熵损失上的经验缩放定律。损失随模型大小、数据集大小以及用于训练的计算量呈幂律缩放，某些趋势跨越了七个数量级以上。其他架构细节，如网络宽度或深度，在广泛范围内影响甚微。简单的方程控制了过拟合对模型/数据集大小的依赖性以及训练速度对模型大小的依赖性。这些关系使我们能够确定固定计算预算的最优分配。更大的模型在样本效率上显著更高，因此计算效率最优的训练涉及在相对适中的数据量上训练非常大的模型，并在显著收敛之前停止。", "insights": {"contrib": [{"en": "Language model cross-entropy loss follows power-law scaling with model size, dataset size, and compute over seven orders of magnitude.", "zh": "语言模型交叉熵损失随模型规模、数据集大小和算力呈幂律缩放，跨越七个数量级。"}, {"en": "Optimal compute-efficient training uses very large models trained on modest data, stopping before convergence.", "zh": "最优算力高效训练使用非常大的模型在适度数据上训练，并在收敛前停止。"}, {"en": "Performance depends weakly on architectural details like depth or width compared to scale factors.", "zh": "与规模因素相比，性能对深度或宽度等架构细节的依赖很弱。"}, {"en": "Overfitting and training speed are governed by simple equations relating model size and dataset size.", "zh": "过拟合和训练速度由模型大小和数据集大小的简单方程控制。"}, {"en": "Larger models are more sample-efficient, requiring fewer data points to reach the same loss.", "zh": "更大的模型样本效率更高，达到相同损失所需的数据点更少。"}, {"en": "The critical batch size for training follows a power-law in the loss, independent of model size.", "zh": "训练的关键批次大小随损失呈幂律变化，与模型大小无关。"}], "limits": [{"en": "Scaling laws may break down at extreme scales due to non-zero entropy of natural language.", "zh": "由于自然语言的非零熵，缩放定律可能在极端规模下失效。"}, {"en": "Results are based on Transformer architecture; may not generalize to other architectures.", "zh": "结果基于Transformer架构，可能不适用于其他架构。"}, {"en": "The study uses a single dataset (WebText2); transfer to other distributions incurs a constant loss penalty.", "zh": "研究使用单一数据集（WebText2）；迁移到其他分布会带来恒定的损失惩罚。"}, {"en": "Optimal compute allocation assumes fixed batch size and may not hold for varying hardware constraints.", "zh": "最优算力分配假设固定批次大小，可能不适用于变化的硬件约束。"}, {"en": "The power-law fits are empirical and lack a theoretical derivation from first principles.", "zh": "幂律拟合是经验性的，缺乏第一性原理的理论推导。"}]}, "cites": 8267}, {"id": "abbeel-1801.01290", "pid": "abbeel", "arxiv": "1801.01290", "date": "2018-01-04", "venue": "cs.LG", "fields": ["rl"], "tEn": "Soft Actor-Critic: Off-Policy Maximum Entropy Deep Reinforcement Learning with a Stochastic Actor", "tZh": "软演员-评论家：基于随机演员的离策略最大熵深度强化学习", "sEn": "Soft Actor-Critic achieves state-of-the-art performance on continuous control tasks with high stability and sample efficiency.", "sZh": "软演员-评论家算法在连续控制任务上实现了最先进的性能，具有高稳定性和样本效率。", "absEn": "Model-free deep reinforcement learning (RL) algorithms have been demonstrated on a range of challenging decision making and control tasks. However, these methods typically suffer from two major challenges: very high sample complexity and brittle convergence properties, which necessitate meticulous hyperparameter tuning. Both of these challenges severely limit the applicability of such methods to complex, real-world domains. In this paper, we propose soft actor-critic, an off-policy actor-critic deep RL algorithm based on the maximum entropy reinforcement learning framework. In this framework, the actor aims to maximize expected reward while also maximizing entropy. That is, to succeed at the task while acting as randomly as possible. Prior deep RL methods based on this framework have been formulated as Q-learning methods. By combining off-policy updates with a stable stochastic actor-critic formulation, our method achieves state-of-the-art performance on a range of continuous control benchmark tasks, outperforming prior on-policy and off-policy methods. Furthermore, we demonstrate that, in contrast to other off-policy algorithms, our approach is very stable, achieving very similar performance across different random seeds.", "absZh": "无模型深度强化学习算法已在多种具有挑战性的决策和控制任务中得到验证。然而，这些方法通常面临两大挑战：极高的样本复杂度和脆弱的收敛性，这需要细致的超参数调整。这两个挑战严重限制了此类方法在复杂现实领域中的应用。在本文中，我们提出了软演员-评论家算法，一种基于最大熵强化学习框架的离策略演员-评论家深度强化学习算法。在该框架中，演员旨在最大化期望奖励的同时最大化熵，即在尽可能随机行动的同时成功完成任务。先前基于该框架的深度强化学习方法被表述为Q学习方法。通过将离策略更新与稳定的随机演员-评论家公式相结合，我们的方法在一系列连续控制基准任务上实现了最先进的性能，优于先前的在策略和离策略方法。此外，我们证明，与其他离策略算法相比，我们的方法非常稳定，在不同随机种子下实现了非常相似的性能。", "insights": {"contrib": [{"en": "Proposes soft actor-critic (SAC), an off-policy maximum entropy deep RL algorithm.", "zh": "提出软演员-评论家（SAC），一种基于最大熵的离策略深度强化学习算法。"}, {"en": "Combines off-policy updates with a stable stochastic actor-critic formulation.", "zh": "将离策略更新与稳定的随机演员-评论家公式相结合。"}, {"en": "Achieves state-of-the-art performance on continuous control benchmarks, outperforming prior on-policy and off-policy methods.", "zh": "在连续控制基准上取得最先进性能，优于先前的在策略和离策略方法。"}, {"en": "Demonstrates high stability across different random seeds, unlike other off-policy algorithms.", "zh": "与其他离策略算法不同，展示了跨不同随机种子的高度稳定性。"}, {"en": "Provides convergence proof for soft policy iteration in the maximum entropy framework.", "zh": "在最大熵框架下提供了软策略迭代的收敛性证明。"}, {"en": "Uses two Q-functions to mitigate positive bias and improve training speed.", "zh": "使用两个Q函数来减轻正向偏差并提高训练速度。"}], "limits": [{"en": "Sensitive to reward scaling, which controls the temperature and policy stochasticity.", "zh": "对奖励缩放敏感，该缩放控制温度和策略随机性。"}, {"en": "Requires tuning of reward scale as a key hyperparameter for optimal performance.", "zh": "需要调整奖励缩放作为关键超参数以获得最佳性能。"}, {"en": "Assumes continuous action spaces; applicability to discrete actions not directly addressed.", "zh": "假设连续动作空间；未直接解决离散动作的适用性。"}, {"en": "Performance may degrade with very small or very large reward magnitudes due to exploration-exploitation balance.", "zh": "由于探索-利用平衡，奖励幅度非常小或非常大时性能可能下降。"}, {"en": "Theoretical convergence proof assumes finite action space, limiting direct extension to continuous actions.", "zh": "理论收敛性证明假设有限动作空间，限制了直接扩展到连续动作。"}]}, "cites": 11501}, {"id": "demis-1712.01815", "pid": "demis", "arxiv": "1712.01815", "date": "2017-12-05", "venue": "cs.AI", "fields": ["rl"], "tEn": "Mastering Chess and Shogi by Self-Play with a General Reinforcement Learning Algorithm", "tZh": "通过通用强化学习算法的自我对弈掌握国际象棋和将棋", "sEn": "AlphaZero achieves superhuman performance in chess, shogi, and Go through self-play reinforcement learning with no domain knowledge beyond game rules.", "sZh": "AlphaZero通过自我对弈强化学习，在仅知游戏规则而无领域知识的情况下，在国际象棋、将棋和围棋中达到超人类水平。", "absEn": "The game of chess is the most widely-studied domain in the history of artificial intelligence. The strongest programs are based on a combination of sophisticated search techniques, domain-specific adaptations, and handcrafted evaluation functions that have been refined by human experts over several decades. In contrast, the AlphaGo Zero program recently achieved superhuman performance in the game of Go, by tabula rasa reinforcement learning from games of self-play. In this paper, we generalise this approach into a single AlphaZero algorithm that can achieve, tabula rasa, superhuman performance in many challenging domains. Starting from random play, and given no domain knowledge except the game rules, AlphaZero achieved within 24 hours a superhuman level of play in the games of chess and shogi (Japanese chess) as well as Go, and convincingly defeated a world-champion program in each case.", "absZh": "国际象棋是人工智能历史上研究最广泛的领域。最强的程序基于复杂搜索技术、领域特定调整和人类专家数十年来精心设计的评估函数的结合。相比之下，AlphaGo Zero程序最近通过从自我对弈游戏中进行的无先验知识强化学习，在围棋中实现了超人类表现。在本文中，我们将这种方法推广为一个单一的AlphaZero算法，该算法可以在许多具有挑战性的领域中通过无先验知识学习达到超人类表现。从随机对弈开始，除了游戏规则外没有任何领域知识，AlphaZero在24小时内就在国际象棋、将棋（日本象棋）以及围棋中达到了超人类水平，并在每种情况下令人信服地击败了世界冠军程序。", "insights": {"contrib": [{"en": "Proposes AlphaZero, a single algorithm achieving superhuman play in chess, shogi, and Go via tabula rasa reinforcement learning.", "zh": "提出AlphaZero，一个通过从零开始的强化学习在象棋、将棋和围棋中实现超人类水平的单一算法。"}, {"en": "Uses deep neural networks and Monte-Carlo tree search without domain-specific knowledge beyond game rules.", "zh": "使用深度神经网络和蒙特卡洛树搜索，除游戏规则外无需领域特定知识。"}, {"en": "Defeats world-champion programs Stockfish, Elmo, and AlphaGo Zero in 100-game matches with zero losses in chess.", "zh": "在100局比赛中击败世界冠军程序Stockfish、Elmo和AlphaGo Zero，象棋中零败。"}, {"en": "Demonstrates MCTS scales more effectively with thinking time than alpha-beta search in chess and shogi.", "zh": "证明MCTS在象棋和将棋中随思考时间的扩展效果优于alpha-beta搜索。"}, {"en": "Discovers and plays common human chess openings independently during self-play training.", "zh": "在自我对弈训练中独立发现并下出常见的人类象棋开局。"}, {"en": "Provides a general framework applicable to multiple games without hyper-parameter tuning.", "zh": "提供无需超参数调优即可适用于多种游戏的通用框架。"}], "limits": [{"en": "Requires perfect knowledge of game rules for MCTS simulations and input encoding.", "zh": "需要游戏规则的完美知识用于MCTS模拟和输入编码。"}, {"en": "Neural network architecture may not suit games with asymmetric rules or long-range interactions.", "zh": "神经网络架构可能不适合具有不对称规则或长程交互的游戏。"}, {"en": "Training requires massive computational resources (5000 TPUs for self-play, 64 for training).", "zh": "训练需要大量计算资源（5000个TPU用于自我对弈，64个用于训练）。"}, {"en": "Does not incorporate domain-specific enhancements like opening books or endgame tablebases.", "zh": "未整合领域特定增强，如开局库或残局数据库。"}, {"en": "Performance may degrade in games with draws or non-binary outcomes due to expected outcome optimization.", "zh": "在平局或非二元结果的游戏中，由于期望结果优化，性能可能下降。"}]}, "cites": 2088}, {"id": "hinton-1710.09829", "pid": "hinton", "arxiv": "1710.09829", "date": "2017-10-26", "venue": "cs.CV", "fields": ["deep-learning", "vision"], "tEn": "Dynamic Routing Between Capsules", "tZh": "动态路由在胶囊网络中的应用", "sEn": "A capsule network with dynamic routing achieves state-of-the-art on MNIST and excels at recognizing overlapping digits.", "sZh": "一种采用动态路由机制的胶囊网络在MNIST上达到最优性能，并在识别高度重叠数字方面显著优于卷积网络。", "absEn": "A capsule is a group of neurons whose activity vector represents the instantiation parameters of a specific type of entity such as an object or an object part. We use the length of the activity vector to represent the probability that the entity exists and its orientation to represent the instantiation parameters. Active capsules at one level make predictions, via transformation matrices, for the instantiation parameters of higher-level capsules. When multiple predictions agree, a higher level capsule becomes active. We show that a discrimininatively trained, multi-layer capsule system achieves state-of-the-art performance on MNIST and is considerably better than a convolutional net at recognizing highly overlapping digits. To achieve these results we use an iterative routing-by-agreement mechanism: A lower-level capsule prefers to send its output to higher level capsules whose activity vectors have a big scalar product with the prediction coming from the lower-level capsule.", "absZh": "胶囊是一组神经元，其活动向量表示特定类型实体（如物体或物体部分）的实例化参数。我们使用活动向量的长度表示实体存在的概率，其方向表示实例化参数。低层胶囊通过变换矩阵对高层胶囊的实例化参数进行预测。当多个预测一致时，高层胶囊被激活。我们证明，一个经过判别训练的多层胶囊系统在MNIST上达到了最先进的性能，并且在识别高度重叠的数字方面明显优于卷积网络。为了实现这些结果，我们使用了一种迭代的路由协议机制：低层胶囊倾向于将其输出发送给那些活动向量与低层胶囊预测的标量积较大的高层胶囊。", "insights": {"contrib": [{"en": "Introduces CapsNet with dynamic routing-by-agreement, achieving state-of-the-art 0.25% test error on MNIST.", "zh": "提出带有动态路由协议的 CapsNet，在 MNIST 上达到 0.25% 的测试错误率，为当时最优。"}, {"en": "Capsules use vector outputs to represent instantiation parameters, with vector length indicating entity existence.", "zh": "胶囊使用向量输出表示实例化参数，向量长度表示实体存在概率。"}, {"en": "Dynamic routing enables superior segmentation of highly overlapping digits, outperforming CNNs on MultiMNIST.", "zh": "动态路由实现了对高度重叠数字的优越分割，在 MultiMNIST 上优于 CNN。"}, {"en": "CapsNet generalizes better to affine transformations than CNNs, achieving 79% vs 66% on affNIST.", "zh": "CapsNet 对仿射变换的泛化能力优于 CNN，在 affNIST 上达到 79% 对比 66%。"}, {"en": "The model uses a reconstruction regularizer to enforce pose encoding, improving routing performance.", "zh": "模型使用重构正则化强制姿态编码，提升了路由性能。"}, {"en": "Capsules provide viewpoint-invariant knowledge via transformation matrices, avoiding exponential inefficiencies of CNNs.", "zh": "胶囊通过变换矩阵提供视角不变知识，避免了 CNN 的指数级低效问题。"}], "limits": [{"en": "Assumes at most one instance of a capsule's entity per location, limiting handling of multiple same-class objects.", "zh": "假设每个位置最多存在一个胶囊实体，限制了处理同类别多个对象的能力。"}, {"en": "Performance on CIFAR-10 (10.6% error) is modest, as capsules struggle with complex backgrounds.", "zh": "在 CIFAR-10 上性能一般（10.6% 错误率），因为胶囊难以处理复杂背景。"}, {"en": "Routing-by-agreement requires iterative computation, increasing inference cost compared to max-pooling.", "zh": "动态路由需要迭代计算，相比最大池化增加了推理成本。"}, {"en": "The model is shallow (3 layers) and may not scale well to deeper architectures or larger datasets.", "zh": "模型较浅（3 层），可能难以扩展到更深架构或更大数据集。"}, {"en": "Capsule networks are still in early research stage, requiring more insights to outperform mature technologies like CNNs.", "zh": "胶囊网络仍处于早期研究阶段，需要更多洞察才能超越 CNN 等成熟技术。"}]}, "cites": 5131}, {"id": "schulman-1707.06347", "pid": "schulman", "arxiv": "1707.06347", "date": "2017-07-20", "venue": "cs.LG", "fields": ["rl"], "tEn": "Proximal Policy Optimization Algorithms", "tZh": "近端策略优化算法", "sEn": "PPO is a family of policy gradient methods that use a novel surrogate objective to enable multiple minibatch updates per data sample, outperforming other online methods.", "sZh": "PPO是一类策略梯度方法，通过新颖的替代目标函数实现每个数据样本多次小批量更新，优于其他在线方法。", "absEn": "We propose a new family of policy gradient methods for reinforcement learning, which alternate between sampling data through interaction with the environment, and optimizing a \"surrogate\" objective function using stochastic gradient ascent. Whereas standard policy gradient methods perform one gradient update per data sample, we propose a novel objective function that enables multiple epochs of minibatch updates. The new methods, which we call proximal policy optimization (PPO), have some of the benefits of trust region policy optimization (TRPO), but they are much simpler to implement, more general, and have better sample complexity (empirically). Our experiments test PPO on a collection of benchmark tasks, including simulated robotic locomotion and Atari game playing, and we show that PPO outperforms other online policy gradient methods, and overall strikes a favorable balance between sample complexity, simplicity, and wall-time.", "absZh": "我们提出了一类新的用于强化学习的策略梯度方法，这些方法在与环境交互采样数据和利用随机梯度上升优化“替代”目标函数之间交替进行。标准策略梯度方法每个数据样本只进行一次梯度更新，而我们提出了一个新的目标函数，使得可以进行多个小批量更新周期。这种新方法被称为近端策略优化（PPO），它兼具信任区域策略优化（TRPO）的一些优点，但实现更简单、更通用，并且经验上样本复杂度更优。我们的实验在包括模拟机器人运动和Atari游戏在内的基准任务上测试了PPO，结果表明PPO优于其他在线策略梯度方法，并且在样本复杂度、简单性和实际运行时间之间取得了良好的平衡。", "insights": {"contrib": [{"en": "Proposes PPO, a family of policy gradient methods using a clipped surrogate objective for stable updates.", "zh": "提出PPO，一类使用裁剪替代目标进行稳定更新的策略梯度方法。"}, {"en": "Enables multiple epochs of minibatch updates per data sample, improving sample efficiency.", "zh": "每个数据样本支持多个小批量更新周期，提高样本效率。"}, {"en": "Simpler to implement than TRPO while retaining similar performance benefits.", "zh": "比TRPO更易实现，同时保留相似的性能优势。"}, {"en": "Empirically outperforms other online policy gradient methods on robotic locomotion and Atari games.", "zh": "在机器人运动和Atari游戏上经验性地优于其他在线策略梯度方法。"}, {"en": "Strikes a favorable balance between sample complexity, simplicity, and wall-time.", "zh": "在样本复杂度、简单性和运行时间之间取得良好平衡。"}], "limits": [{"en": "PPO's clipped objective may still allow large policy updates in some cases.", "zh": "PPO的裁剪目标在某些情况下仍可能允许较大的策略更新。"}, {"en": "Requires careful tuning of hyperparameters like clip epsilon and learning rate.", "zh": "需要仔细调整超参数，如裁剪阈值和学习率。"}, {"en": "Performance on tasks with sparse rewards or long horizons may degrade.", "zh": "在稀疏奖励或长视野任务上的性能可能下降。"}, {"en": "Theoretical convergence guarantees are not fully established.", "zh": "理论收敛保证尚未完全建立。"}, {"en": "May not scale well to very high-dimensional action spaces.", "zh": "可能无法很好地扩展到非常高维的动作空间。"}]}}, {"id": "shazeer-1706.03762", "pid": "shazeer", "arxiv": "1706.03762", "date": "2017-06-12", "venue": "cs.CL", "fields": ["nlp", "deep-learning"], "tEn": "Attention Is All You Need", "tZh": "注意力机制就是一切", "sEn": "The Transformer model, based solely on attention mechanisms, outperforms recurrent and convolutional models in machine translation while being more parallelizable and faster to train.", "sZh": "仅基于注意力机制的Transformer模型在机器翻译中优于循环和卷积模型，且更易并行化、训练更快。", "absEn": "The dominant sequence transduction models are based on complex recurrent or convolutional neural networks in an encoder-decoder configuration. The best performing models also connect the encoder and decoder through an attention mechanism. We propose a new simple network architecture, the Transformer, based solely on attention mechanisms, dispensing with recurrence and convolutions entirely. Experiments on two machine translation tasks show these models to be superior in quality while being more parallelizable and requiring significantly less time to train. Our model achieves 28.4 BLEU on the WMT 2014 English-to-German translation task, improving over the existing best results, including ensembles by over 2 BLEU. On the WMT 2014 English-to-French translation task, our model establishes a new single-model state-of-the-art BLEU score of 41.8 after training for 3.5 days on eight GPUs, a small fraction of the training costs of the best models from the literature. We show that the Transformer generalizes well to other tasks by applying it successfully to English constituency parsing both with large and limited training data.", "absZh": "主流的序列转换模型基于复杂的循环或卷积神经网络，采用编码器-解码器结构。性能最佳的模型还通过注意力机制连接编码器和解码器。我们提出了一种新的简单网络架构——Transformer，它完全基于注意力机制，完全摒弃了循环和卷积。在两个机器翻译任务上的实验表明，这些模型在质量上更优，同时更易于并行化，且训练时间显著减少。我们的模型在WMT 2014英德翻译任务上达到了28.4 BLEU，比现有最佳结果（包括集成模型）提高了超过2 BLEU。在WMT 2014英法翻译任务上，我们的模型在8个GPU上训练3.5天后，建立了新的单模型最优BLEU分数41.8，仅为文献中最佳模型训练成本的一小部分。我们通过将Transformer成功应用于英语成分句法分析（包括大规模和有限训练数据），证明了其良好的泛化能力。", "insights": {"contrib": [{"en": "Proposes Transformer, a novel architecture based solely on attention mechanisms, eliminating recurrence and convolutions.", "zh": "提出Transformer，一种完全基于注意力机制的新架构，消除了循环和卷积。"}, {"en": "Achieves state-of-the-art BLEU scores of 28.4 on WMT 2014 English-German and 41.8 on English-French translation.", "zh": "在WMT 2014英德和英法翻译任务上分别取得28.4和41.8 BLEU的最新结果。"}, {"en": "Demonstrates significantly faster training due to parallelization, reducing training time to 3.5 days on 8 GPUs.", "zh": "由于并行化，训练速度显著提升，在8个GPU上仅需3.5天。"}, {"en": "Introduces multi-head attention to jointly attend to information from different representation subspaces.", "zh": "引入多头注意力机制，从不同表示子空间联合关注信息。"}, {"en": "Shows strong generalization to other tasks like English constituency parsing with both large and limited data.", "zh": "在英语成分句法分析等任务上表现出强泛化能力，无论数据量大小。"}], "limits": [{"en": "Self-attention's quadratic complexity in sequence length limits scalability to very long sequences.", "zh": "自注意力在序列长度上的二次复杂度限制了其扩展到极长序列。"}, {"en": "The model lacks explicit positional encoding, relying on added sinusoidal signals which may not capture all positional nuances.", "zh": "模型缺乏显式位置编码，依赖附加的正弦信号，可能无法捕捉所有位置细节。"}, {"en": "Training requires careful hyperparameter tuning (e.g., learning rate schedule, dropout) to achieve optimal performance.", "zh": "训练需要仔细调整超参数（如学习率计划、dropout）才能达到最优性能。"}, {"en": "The architecture's interpretability is limited despite attention visualization; deeper understanding of learned patterns remains challenging.", "zh": "尽管有注意力可视化，架构的可解释性仍有限，深入理解学习模式仍有挑战。"}]}, "cites": 181598}, {"id": "christiano-1706.03741", "pid": "christiano", "arxiv": "1706.03741", "date": "2017-06-12", "venue": "stat.ML", "fields": ["safety", "rl"], "tEn": "Deep reinforcement learning from human preferences", "tZh": "基于人类偏好的深度强化学习", "sEn": "We can train complex RL behaviors using human preferences on trajectory segments, requiring feedback on less than 1% of agent interactions.", "sZh": "我们可以通过人类对轨迹片段的偏好来训练复杂的强化学习行为，仅需对不到1%的智能体交互提供反馈。", "absEn": "For sophisticated reinforcement learning (RL) systems to interact usefully with real-world environments, we need to communicate complex goals to these systems. In this work, we explore goals defined in terms of (non-expert) human preferences between pairs of trajectory segments. We show that this approach can effectively solve complex RL tasks without access to the reward function, including Atari games and simulated robot locomotion, while providing feedback on less than one percent of our agent's interactions with the environment. This reduces the cost of human oversight far enough that it can be practically applied to state-of-the-art RL systems. To demonstrate the flexibility of our approach, we show that we can successfully train complex novel behaviors with about an hour of human time. These behaviors and environments are considerably more complex than any that have been previously learned from human feedback.", "absZh": "为了让复杂的强化学习系统能够有效地与现实世界环境交互，我们需要向这些系统传达复杂的目标。在这项工作中，我们探索了基于（非专家）人类对轨迹片段对之间的偏好来定义目标。我们展示了这种方法可以在无需奖励函数的情况下有效解决复杂的强化学习任务，包括Atari游戏和模拟机器人运动，同时仅需对智能体与环境交互的不到1%提供反馈。这大大降低了人类监督的成本，使其能够实际应用于最先进的强化学习系统。为了展示我们方法的灵活性，我们证明可以用大约一小时的人类时间成功训练出复杂的新行为。这些行为和环境比以往任何通过人类反馈学习到的都要复杂得多。", "insights": {"contrib": [{"en": "Proposes a method to train deep RL agents from human preferences between trajectory segments, reducing human oversight cost.", "zh": "提出一种从人类对轨迹片段的偏好中训练深度强化学习智能体的方法，降低了人类监督成本。"}, {"en": "Demonstrates solving complex RL tasks (Atari games, robot locomotion) with less than 1% of agent-environment interactions labeled.", "zh": "展示了在不到1%的智能体-环境交互被标注的情况下，解决复杂强化学习任务（Atari游戏、机器人运动）。"}, {"en": "Shows novel behaviors (backflip, one-leg stand) can be learned from about an hour of human feedback.", "zh": "展示了从约一小时的人类反馈中学习新颖行为（后空翻、单腿站立）。"}, {"en": "Introduces an ensemble of reward predictors and online query selection to improve learning efficiency.", "zh": "引入奖励预测器集成和在线查询选择以提高学习效率。"}, {"en": "Provides evidence that human feedback can be economically scaled to state-of-the-art deep RL systems.", "zh": "提供了人类反馈可经济地扩展到最先进深度强化学习系统的证据。"}], "limits": [{"en": "Method may fail on tasks where short clips are confusing, e.g., Qbert with real human feedback.", "zh": "方法在短片段令人困惑的任务上可能失败，例如使用真实人类反馈的Qbert。"}, {"en": "Offline reward predictor training leads to poor performance due to nonstationary occupancy distribution.", "zh": "离线奖励预测器训练因占用分布的非平稳性导致性能不佳。"}, {"en": "Human feedback quality depends on rater consistency; errors or inconsistency can degrade performance.", "zh": "人类反馈质量取决于标注者一致性；错误或不一致会降低性能。"}, {"en": "Method assumes human preferences are generated by a reward function, which may not hold in all domains.", "zh": "方法假设人类偏好由奖励函数生成，这在所有领域可能不成立。"}, {"en": "Query selection based on ensemble variance is a crude approximation; better information-theoretic approaches remain future work.", "zh": "基于集成方差的查询选择是粗略近似；更好的信息论方法留待未来工作。"}]}, "cites": 5435}, {"id": "finn-1703.03400", "pid": "finn", "arxiv": "1703.03400", "date": "2017-03-09", "venue": "cs.LG", "fields": ["rl", "deep-learning"], "tEn": "Model-Agnostic Meta-Learning for Fast Adaptation of Deep Networks", "tZh": "模型无关的元学习：深度网络的快速适应", "sEn": "A model-agnostic meta-learning algorithm that enables fast adaptation of deep networks with few gradient steps.", "sZh": "一种模型无关的元学习算法，通过少量梯度步骤实现深度网络的快速适应。", "absEn": "We propose an algorithm for meta-learning that is model-agnostic, in the sense that it is compatible with any model trained with gradient descent and applicable to a variety of different learning problems, including classification, regression, and reinforcement learning. The goal of meta-learning is to train a model on a variety of learning tasks, such that it can solve new learning tasks using only a small number of training samples. In our approach, the parameters of the model are explicitly trained such that a small number of gradient steps with a small amount of training data from a new task will produce good generalization performance on that task. In effect, our method trains the model to be easy to fine-tune. We demonstrate that this approach leads to state-of-the-art performance on two few-shot image classification benchmarks, produces good results on few-shot regression, and accelerates fine-tuning for policy gradient reinforcement learning with neural network policies.", "absZh": "我们提出了一种元学习算法，该算法与模型无关，即它与任何通过梯度下降训练的模型兼容，并适用于各种不同的学习问题，包括分类、回归和强化学习。元学习的目标是在多种学习任务上训练模型，使其能够仅使用少量训练样本解决新的学习任务。在我们的方法中，模型的参数被明确训练，使得来自新任务的少量训练数据经过少量梯度步骤后，就能在该任务上产生良好的泛化性能。实际上，我们的方法训练模型使其易于微调。我们证明，这种方法在两个少样本图像分类基准上达到了最先进的性能，在少样本回归上取得了良好结果，并加速了使用神经网络策略的策略梯度强化学习的微调。", "insights": {"contrib": [{"en": "Proposes MAML, a model-agnostic meta-learning algorithm compatible with any gradient-descent-trained model.", "zh": "提出 MAML，一种与任何基于梯度下降训练的模型兼容的模型无关的元学习算法。"}, {"en": "Achieves state-of-the-art few-shot classification on Omniglot and MiniImagenet with fewer parameters.", "zh": "在 Omniglot 和 MiniImagenet 上以更少参数实现少样本分类的最先进性能。"}, {"en": "Demonstrates fast adaptation in few-shot regression and reinforcement learning with policy gradients.", "zh": "在少样本回归和基于策略梯度的强化学习中展示快速适应能力。"}, {"en": "Shows that first-order approximation performs nearly as well as full second-order meta-gradient.", "zh": "表明一阶近似与完整二阶元梯度性能几乎相同。"}, {"en": "Provides a simple weight initialization that enables rapid fine-tuning with few gradient steps.", "zh": "提供简单的权重初始化，使少量梯度步骤即可快速微调。"}], "limits": [{"en": "Requires a distribution over tasks for meta-training, which may not be available.", "zh": "需要任务分布进行元训练，可能无法获得。"}, {"en": "Computationally expensive due to second-order gradients, though first-order approximation helps.", "zh": "由于二阶梯度计算成本高，尽管一阶近似有所缓解。"}, {"en": "May struggle with tasks that are very different from the meta-training distribution.", "zh": "可能难以处理与元训练分布差异很大的任务。"}, {"en": "Performance depends on the choice of inner-loop step size and number of gradient steps.", "zh": "性能依赖于内循环步长和梯度步数的选择。"}, {"en": "Not evaluated on large-scale or real-world few-shot learning benchmarks beyond image classification.", "zh": "未在图像分类之外的大规模或真实少样本学习基准上评估。"}]}, "cites": 14619}, {"id": "shazeer-1701.06538", "pid": "shazeer", "arxiv": "1701.06538", "date": "2017-01-23", "venue": "cs.LG", "fields": ["nlp", "efficiency"], "tEn": "Outrageously Large Neural Networks: The Sparsely-Gated Mixture-of-Experts Layer", "tZh": "超大神经网络：稀疏门控专家混合层", "sEn": "Sparsely-Gated Mixture-of-Experts layer enables >1000x model capacity increase with minor computational efficiency loss on modern GPU clusters.", "sZh": "稀疏门控专家混合层能够在现代GPU集群上实现超过1000倍的模型容量提升，同时仅带来轻微的计算效率损失。", "absEn": "The capacity of a neural network to absorb information is limited by its number of parameters. Conditional computation, where parts of the network are active on a per-example basis, has been proposed in theory as a way of dramatically increasing model capacity without a proportional increase in computation. In practice, however, there are significant algorithmic and performance challenges. In this work, we address these challenges and finally realize the promise of conditional computation, achieving greater than 1000x improvements in model capacity with only minor losses in computational efficiency on modern GPU clusters. We introduce a Sparsely-Gated Mixture-of-Experts layer (MoE), consisting of up to thousands of feed-forward sub-networks. A trainable gating network determines a sparse combination of these experts to use for each example. We apply the MoE to the tasks of language modeling and machine translation, where model capacity is critical for absorbing the vast quantities of knowledge available in the training corpora. We present model architectures in which a MoE with up to 137 billion parameters is applied convolutionally between stacked LSTM layers. On large language modeling and machine translation benchmarks, these models achieve significantly better results than state-of-the-art at lower computational cost.", "absZh": "神经网络吸收信息的能力受限于其参数数量。理论上，条件计算（即网络部分按样本激活）可以大幅增加模型容量而不成比例地增加计算量。然而在实践中，存在显著的算法和性能挑战。在这项工作中，我们解决了这些挑战，最终实现了条件计算的承诺，在现代GPU集群上实现了超过1000倍的模型容量提升，同时仅带来轻微的计算效率损失。我们引入了稀疏门控专家混合层（MoE），由多达数千个前馈子网络组成。一个可训练的门控网络为每个样本确定这些专家的稀疏组合。我们将MoE应用于语言建模和机器翻译任务，在这些任务中，模型容量对于吸收训练语料库中的大量知识至关重要。我们提出了模型架构，其中包含高达1370亿参数的MoE以卷积方式堆叠在LSTM层之间。在大型语言建模和机器翻译基准测试中，这些模型以更低的计算成本取得了显著优于现有技术的结果。", "insights": {"contrib": [{"en": "Introduces Sparsely-Gated Mixture-of-Experts (MoE) layer achieving >1000x capacity increase with minor efficiency loss.", "zh": "提出稀疏门控混合专家（MoE）层，实现超过1000倍的模型容量提升，仅带来轻微计算效率损失。"}, {"en": "Applies MoE convolutionally between stacked LSTM layers for language modeling and translation.", "zh": "在堆叠LSTM层之间卷积式应用MoE，用于语言建模和机器翻译。"}, {"en": "Demonstrates up to 137 billion parameter MoE models with state-of-the-art results at lower computational cost.", "zh": "展示了高达1370亿参数的MoE模型，以更低计算成本取得最先进结果。"}, {"en": "Addresses key challenges: sparse gating, load balancing, and efficient distributed training with synchronous data/model parallelism.", "zh": "解决了关键挑战：稀疏门控、负载均衡以及同步数据/模型并行的高效分布式训练。"}, {"en": "Shows experts specialize in syntax and semantics, improving model interpretability.", "zh": "显示专家在语法和语义上专门化，提升了模型可解释性。"}, {"en": "Achieves 24% lower perplexity on 1B-word benchmark and 39% lower on 100B-word corpus compared to baselines.", "zh": "在10亿词基准上困惑度降低24%，在1000亿词语料上降低39%。"}], "limits": [{"en": "MoE requires large batch sizes and specialized distributed infrastructure to maintain efficiency.", "zh": "MoE需要大批量数据和专门的分布式基础设施以维持效率。"}, {"en": "Gating network may converge to imbalanced expert usage without careful regularization.", "zh": "门控网络若无仔细正则化，可能收敛到不平衡的专家使用。"}, {"en": "Method primarily validated on text tasks; applicability to other domains with smaller datasets is uncertain.", "zh": "方法主要在文本任务上验证，对较小数据集的其他领域适用性不确定。"}, {"en": "Hierarchical MoE adds complexity and may not scale as well as flat MoE for very large expert counts.", "zh": "层次化MoE增加复杂性，在极大专家数量下可能不如扁平MoE可扩展。"}, {"en": "Load balancing losses introduce additional hyperparameters that require tuning.", "zh": "负载均衡损失引入了需要调优的额外超参数。"}]}, "cites": 4850}, {"id": "dario-1606.06565", "pid": "dario", "arxiv": "1606.06565", "date": "2016-06-21", "venue": "cs.AI", "fields": ["safety"], "tEn": "Concrete Problems in AI Safety", "tZh": "人工智能安全中的具体问题", "sEn": "We identify five concrete research problems in AI safety: avoiding side effects, avoiding reward hacking, scalable supervision, safe exploration, and distributional shift.", "sZh": "我们识别出人工智能安全中的五个具体研究问题：避免副作用、避免奖励黑客、可扩展监督、安全探索和分布偏移。", "absEn": "Rapid progress in machine learning and artificial intelligence (AI) has brought increasing attention to the potential impacts of AI technologies on society. In this paper we discuss one such potential impact: the problem of accidents in machine learning systems, defined as unintended and harmful behavior that may emerge from poor design of real-world AI systems. We present a list of five practical research problems related to accident risk, categorized according to whether the problem originates from having the wrong objective function (\"avoiding side effects\" and \"avoiding reward hacking\"), an objective function that is too expensive to evaluate frequently (\"scalable supervision\"), or undesirable behavior during the learning process (\"safe exploration\" and \"distributional shift\"). We review previous work in these areas as well as suggesting research directions with a focus on relevance to cutting-edge AI systems. Finally, we consider the high-level question of how to think most productively about the safety of forward-looking applications of AI.", "absZh": "机器学习和人工智能的快速发展使人们越来越关注AI技术对社会的潜在影响。本文讨论了一种潜在影响：机器学习系统中的事故问题，即由于现实世界AI系统设计不当而可能出现的意外和有害行为。我们列出了与事故风险相关的五个实际研究问题，根据问题源于目标函数错误（“避免副作用”和“避免奖励黑客”）、目标函数评估过于昂贵（“可扩展监督”），还是学习过程中的不良行为（“安全探索”和“分布偏移”）进行分类。我们回顾了这些领域的先前工作，并提出了与前沿AI系统相关的研究方向。最后，我们考虑了如何最有效地思考前瞻性AI应用的安全性问题。", "insights": {"contrib": [{"en": "Defines five concrete AI accident problems: negative side effects, reward hacking, scalable oversight, safe exploration, and distributional shift.", "zh": "定义了五个具体的AI事故问题：负面副作用、奖励黑客、可扩展监督、安全探索和分布偏移。"}, {"en": "Categorizes accident sources: wrong objective function, expensive evaluation, and undesirable learning behavior.", "zh": "将事故来源分类：错误的目标函数、昂贵的评估和不理想的学习行为。"}, {"en": "Proposes practical research directions for each problem, including impact regularizers and adversarial reward functions.", "zh": "为每个问题提出了实用的研究方向，包括影响正则化和对抗性奖励函数。"}, {"en": "Highlights the increasing relevance of safety research due to trends in deep RL, complex agents, and autonomy.", "zh": "强调了由于深度强化学习、复杂智能体和自主性趋势，安全研究日益重要。"}, {"en": "Introduces semi-supervised RL as a scalable oversight method to reduce reliance on expensive reward evaluations.", "zh": "引入了半监督强化学习作为一种可扩展监督方法，以减少对昂贵奖励评估的依赖。"}, {"en": "Emphasizes the need for robust exploration strategies to avoid catastrophic failures in real-world RL systems.", "zh": "强调了需要稳健的探索策略，以避免现实世界强化学习系统中的灾难性失败。"}], "limits": [{"en": "Focuses on technical problems, omitting broader societal, ethical, and policy implications of AI safety.", "zh": "聚焦技术问题，忽略了AI安全更广泛的社会、伦理和政策影响。"}, {"en": "Proposed solutions like impact regularizers are preliminary and lack empirical validation on complex tasks.", "zh": "提出的解决方案如影响正则化是初步的，缺乏在复杂任务上的实证验证。"}, {"en": "Assumes RL and supervised learning paradigms, limiting applicability to other AI approaches like unsupervised learning.", "zh": "假设强化学习和监督学习范式，限制了在其他AI方法（如无监督学习）上的适用性。"}, {"en": "Does not address adversarial attacks or security vulnerabilities beyond reward hacking and side effects.", "zh": "未涉及对抗性攻击或超出奖励黑客和副作用的安全漏洞。"}, {"en": "Scalable oversight methods like semi-supervised RL may not scale to highly complex or long-horizon tasks.", "zh": "可扩展监督方法如半监督强化学习可能无法扩展到高度复杂或长期任务。"}]}, "cites": 3206}, {"id": "hinton-1503.02531", "pid": "hinton", "arxiv": "1503.02531", "date": "2015-03-09", "venue": "stat.ML", "fields": ["deep-learning"], "tEn": "Distilling the Knowledge in a Neural Network", "tZh": "神经网络中的知识蒸馏", "sEn": "Distilling knowledge from an ensemble into a single model improves performance and efficiency.", "sZh": "将集成模型的知识蒸馏到单个模型中，可提升性能并降低计算成本。", "absEn": "A very simple way to improve the performance of almost any machine learning algorithm is to train many different models on the same data and then to average their predictions. Unfortunately, making predictions using a whole ensemble of models is cumbersome and may be too computationally expensive to allow deployment to a large number of users, especially if the individual models are large neural nets. Caruana and his collaborators have shown that it is possible to compress the knowledge in an ensemble into a single model which is much easier to deploy and we develop this approach further using a different compression technique. We achieve some surprising results on MNIST and we show that we can significantly improve the acoustic model of a heavily used commercial system by distilling the knowledge in an ensemble of models into a single model. We also introduce a new type of ensemble composed of one or more full models and many specialist models which learn to distinguish fine-grained classes that the full models confuse. Unlike a mixture of experts, these specialist models can be trained rapidly and in parallel.", "absZh": "一种提升几乎所有机器学习算法性能的简单方法是，在相同数据上训练多个不同模型，然后对其预测取平均。然而，使用整个集成模型进行预测可能很繁琐，且计算成本过高，难以部署给大量用户，尤其是当单个模型是大型神经网络时。Caruana及其合作者已证明，可以将集成模型中的知识压缩到单个模型中，从而更易于部署。我们使用一种不同的压缩技术进一步改进了这一方法。我们在MNIST上取得了一些令人惊讶的结果，并展示了通过将集成模型的知识蒸馏到单个模型中，可以显著改进一个广泛使用的商业系统的声学模型。我们还引入了一种新型集成模型，由一个或多个完整模型和许多专家模型组成，这些专家模型学习区分完整模型容易混淆的细粒度类别。与混合专家模型不同，这些专家模型可以快速并行训练。", "insights": {"contrib": [{"en": "Introduces knowledge distillation, transferring ensemble knowledge into a single small model using soft targets with temperature scaling.", "zh": "提出知识蒸馏技术，通过带温度缩放的软目标将集成模型的知识迁移到单个小型模型中。"}, {"en": "Shows distilled model on MNIST achieves 74 errors vs 146 for a regularized small net, even without seeing digit 3 in transfer set.", "zh": "在MNIST上，蒸馏模型仅74个错误，而正则化小网络为146个错误，即使迁移集中没有数字3的样本。"}, {"en": "Demonstrates distillation improves commercial speech recognition: distilled single model matches ensemble performance with 10.9% WER.", "zh": "在商业语音识别中，蒸馏模型达到集成模型的性能，词错误率10.9%。"}, {"en": "Proposes specialist ensemble: one generalist plus many specialists for fine-grained classes, trained in parallel, improving JFT accuracy by 4.4%.", "zh": "提出专家集成：一个通用模型加多个细粒度类别专家模型，可并行训练，在JFT上准确率提升4.4%。"}, {"en": "Shows soft targets prevent overfitting with limited data: 3% of speech data yields 57% frame accuracy vs 44.5% with hard targets.", "zh": "软目标防止过拟合：仅3%语音数据时帧准确率57%，而硬目标仅44.5%。"}, {"en": "Provides theoretical analysis: high-temperature distillation approximates minimizing squared logit difference.", "zh": "理论分析：高温蒸馏近似最小化logit平方差。"}], "limits": [{"en": "Distillation requires a pre-trained cumbersome model, which may be computationally expensive to obtain.", "zh": "蒸馏需要预训练的笨重模型，获取该模型可能计算成本高昂。"}, {"en": "Optimal temperature is task-dependent and requires tuning; low temperatures may ignore useful negative logits.", "zh": "最优温度依赖任务并需调参；低温可能忽略有用的负logit信息。"}, {"en": "Specialist ensemble relies on clustering of confusable classes, which may not be optimal for all datasets.", "zh": "专家集成依赖易混淆类别的聚类，可能不适用于所有数据集。"}, {"en": "Distillation performance degrades when distilled model is too small to capture all knowledge from cumbersome model.", "zh": "当蒸馏模型过小无法捕捉笨重模型全部知识时，性能下降。"}, {"en": "Method assumes soft targets from cumbersome model are reliable; noisy or biased cumbersome models may transfer errors.", "zh": "方法假设笨重模型的软目标可靠；噪声或偏差模型可能传递错误。"}]}, "cites": 24680}, {"id": "schulman-1502.05477", "pid": "schulman", "arxiv": "1502.05477", "date": "2015-02-19", "venue": "cs.LG", "fields": ["rl"], "tEn": "Trust Region Policy Optimization", "tZh": "信任区域策略优化", "sEn": "TRPO is a practical algorithm for optimizing policies with guaranteed monotonic improvement, effective for large nonlinear policies like neural networks.", "sZh": "TRPO是一种实用的策略优化算法，能保证单调改进，适用于神经网络等大型非线性策略。", "absEn": "We describe an iterative procedure for optimizing policies, with guaranteed monotonic improvement. By making several approximations to the theoretically-justified procedure, we develop a practical algorithm, called Trust Region Policy Optimization (TRPO). This algorithm is similar to natural policy gradient methods and is effective for optimizing large nonlinear policies such as neural networks. Our experiments demonstrate its robust performance on a wide variety of tasks: learning simulated robotic swimming, hopping, and walking gaits; and playing Atari games using images of the screen as input. Despite its approximations that deviate from the theory, TRPO tends to give monotonic improvement, with little tuning of hyperparameters.", "absZh": "我们描述了一种迭代策略优化过程，具有保证的单调改进。通过对理论证明的过程进行若干近似，我们开发了一种实用的算法，称为信任区域策略优化（TRPO）。该算法类似于自然策略梯度方法，对于优化大型非线性策略（如神经网络）非常有效。我们的实验证明了它在各种任务上的稳健性能：学习模拟机器人游泳、跳跃和行走步态；以及使用屏幕图像作为输入玩Atari游戏。尽管其近似偏离了理论，TRPO往往在超参数调整很少的情况下实现单调改进。", "insights": {"contrib": [{"en": "Proves a monotonic improvement guarantee for policy optimization with KL divergence penalty.", "zh": "证明了使用KL散度惩罚的策略优化具有单调改进保证。"}, {"en": "Develops TRPO, a practical algorithm using a KL divergence constraint for robust updates.", "zh": "开发了TRPO，一种使用KL散度约束进行稳健更新的实用算法。"}, {"en": "Demonstrates TRPO's effectiveness on simulated robotic locomotion and Atari games.", "zh": "展示了TRPO在模拟机器人运动和Atari游戏上的有效性。"}, {"en": "Unifies policy gradient and policy iteration methods under a trust region framework.", "zh": "在信任区域框架下统一了策略梯度和策略迭代方法。"}, {"en": "Achieves state-of-the-art performance on high-dimensional control tasks with neural network policies.", "zh": "在具有神经网络策略的高维控制任务上实现了最先进的性能。"}], "limits": [{"en": "Assumes exact advantage evaluation, which is unrealistic in practice.", "zh": "假设优势函数精确评估，这在实践中不现实。"}, {"en": "Vine method requires state resets, limiting applicability to simulation.", "zh": "Vine方法需要状态重置，限制了其在模拟环境中的应用。"}, {"en": "Theoretical bound uses maximum KL divergence, but practical algorithm uses average KL.", "zh": "理论界限使用最大KL散度，但实际算法使用平均KL散度。"}, {"en": "Sample complexity may be high for real-world robotic tasks due to on-policy sampling.", "zh": "由于在策略采样，样本复杂度可能对真实机器人任务较高。"}, {"en": "Performance on Atari games is not consistently superior to specialized methods like DQN.", "zh": "在Atari游戏上的性能并不始终优于DQN等专门方法。"}]}, "cites": 8048}, {"id": "ilya-1409.3215", "pid": "ilya", "arxiv": "1409.3215", "date": "2014-09-10", "venue": "cs.CL", "fields": ["nlp", "deep-learning"], "tEn": "Sequence to Sequence Learning with Neural Networks", "tZh": "基于神经网络的序列到序列学习", "sEn": "A deep LSTM-based end-to-end approach achieves BLEU 34.8 on WMT'14 English-French translation, outperforming a phrase-based SMT system (33.3) and reaching 36.5 when reranking SMT hypotheses.", "sZh": "基于深度LSTM的端到端方法在WMT'14英法翻译任务上取得BLEU 34.8，优于基于短语的统计机器翻译系统（33.3），并在重排序其假设后达到36.5。", "absEn": "Deep Neural Networks (DNNs) are powerful models that have achieved excellent performance on difficult learning tasks. Although DNNs work well whenever large labeled training sets are available, they cannot be used to map sequences to sequences. In this paper, we present a general end-to-end approach to sequence learning that makes minimal assumptions on the sequence structure. Our method uses a multilayered Long Short-Term Memory (LSTM) to map the input sequence to a vector of a fixed dimensionality, and then another deep LSTM to decode the target sequence from the vector. Our main result is that on an English to French translation task from the WMT'14 dataset, the translations produced by the LSTM achieve a BLEU score of 34.8 on the entire test set, where the LSTM's BLEU score was penalized on out-of-vocabulary words. Additionally, the LSTM did not have difficulty on long sentences. For comparison, a phrase-based SMT system achieves a BLEU score of 33.3 on the same dataset. When we used the LSTM to rerank the 1000 hypotheses produced by the aforementioned SMT system, its BLEU score increases to 36.5, which is close to the previous best result on this task. The LSTM also learned sensible phrase and sentence representations that are sensitive to word order and are relatively invariant to the active and the passive voice. Finally, we found that reversing the order of the words in all source sentences (but not target sentences) improved the LSTM's performance markedly, because doing so introduced many short term dependencies between the source and the target sentence which made the optimization problem easier.", "absZh": "深度神经网络（DNN）是强大的模型，在困难的学习任务上取得了优异的性能。尽管DNN在拥有大量标注训练集时表现良好，但它们不能用于序列到序列的映射。在本文中，我们提出了一种通用的端到端序列学习方法，该方法对序列结构做了最少的假设。我们的方法使用多层长短期记忆（LSTM）将输入序列映射到一个固定维度的向量，然后使用另一个深度LSTM从该向量解码目标序列。我们的主要结果是，在WMT'14数据集的英法翻译任务上，LSTM生成的翻译在整个测试集上达到了34.8的BLEU分数，其中LSTM的BLEU分数因词汇外单词而受到惩罚。此外，LSTM在长句子上没有困难。相比之下，基于短语的SMT系统在同一数据集上达到了33.3的BLEU分数。当我们使用LSTM对上述SMT系统产生的1000个假设进行重排序时，其BLEU分数增加到36.5，接近该任务之前的最佳结果。LSTM还学习了合理的短语和句子表示，这些表示对词序敏感，并且对主动语态和被动语态相对不变。最后，我们发现反转所有源句子（但不是目标句子）中的单词顺序显著提高了LSTM的性能，因为这样做引入了源句子和目标句子之间的许多短期依赖关系，使得优化问题更容易。", "insights": {"contrib": [{"en": "Proposes an end-to-end LSTM-based sequence-to-sequence model for general sequence learning.", "zh": "提出了一种基于LSTM的端到端序列到序列模型，用于通用序列学习。"}, {"en": "Achieves BLEU score of 34.8 on WMT'14 English-French translation, outperforming phrase-based SMT baseline.", "zh": "在WMT'14英法翻译任务上取得34.8的BLEU分数，优于基于短语的SMT基线。"}, {"en": "Reversing source sentences introduces short-term dependencies, improving LSTM performance on long sentences.", "zh": "反转源句子引入短期依赖，提升了LSTM在长句上的性能。"}, {"en": "LSTM learns sentence representations sensitive to word order and invariant to active/passive voice.", "zh": "LSTM学习到的句子表示对词序敏感，对主动/被动语态不变。"}, {"en": "Deep LSTMs with 4 layers significantly outperform shallow LSTMs.", "zh": "4层深度LSTM显著优于浅层LSTM。"}, {"en": "LSTM rescoring of SMT n-best lists achieves BLEU 36.5, close to previous best result.", "zh": "LSTM对SMT的n-best列表重新评分达到36.5的BLEU，接近此前最佳结果。"}], "limits": [{"en": "Limited vocabulary (80k target words) penalizes BLEU for out-of-vocabulary words.", "zh": "有限词汇表（8万目标词）对未登录词惩罚BLEU分数。"}, {"en": "Requires large computational resources (8 GPUs, 10 days training).", "zh": "需要大量计算资源（8个GPU，训练10天）。"}, {"en": "Beam search decoder is approximate and may not find optimal translation.", "zh": "束搜索解码器是近似的，可能找不到最优翻译。"}, {"en": "Method assumes monotonic alignment between input and output sequences.", "zh": "方法假设输入和输出序列之间存在单调对齐。"}, {"en": "Performance on tasks with very limited training data is not evaluated.", "zh": "未评估在训练数据非常有限的任务上的性能。"}]}, "cites": 22119}, {"id": "bengio-1409.0473", "pid": "bengio", "arxiv": "1409.0473", "date": "2014-09-01", "venue": "cs.CL", "fields": ["nlp", "deep-learning"], "tEn": "Neural Machine Translation by Jointly Learning to Align and Translate", "tZh": "通过联合学习对齐和翻译的神经机器翻译", "sEn": "Neural machine translation can be improved by allowing the model to automatically search for relevant parts of the source sentence without encoding it into a fixed-length vector.", "sZh": "神经机器翻译可以通过让模型自动搜索源句子的相关部分而不将其编码为固定长度向量来改进。", "absEn": "Neural machine translation is a recently proposed approach to machine translation. Unlike the traditional statistical machine translation, the neural machine translation aims at building a single neural network that can be jointly tuned to maximize the translation performance. The models proposed recently for neural machine translation often belong to a family of encoder-decoders and consists of an encoder that encodes a source sentence into a fixed-length vector from which a decoder generates a translation. In this paper, we conjecture that the use of a fixed-length vector is a bottleneck in improving the performance of this basic encoder-decoder architecture, and propose to extend this by allowing a model to automatically (soft-)search for parts of a source sentence that are relevant to predicting a target word, without having to form these parts as a hard segment explicitly. With this new approach, we achieve a translation performance comparable to the existing state-of-the-art phrase-based system on the task of English-to-French translation. Furthermore, qualitative analysis reveals that the (soft-)alignments found by the model agree well with our intuition.", "absZh": "神经机器翻译是最近提出的一种机器翻译方法。与传统的统计机器翻译不同，神经机器翻译旨在构建一个单一的神经网络，该网络可以联合调整以最大化翻译性能。最近提出的神经机器翻译模型通常属于编码器-解码器家族，包括一个将源句子编码为固定长度向量的编码器，解码器则从该向量生成翻译。在本文中，我们推测使用固定长度向量是改进这种基本编码器-解码器架构性能的瓶颈，并提出通过允许模型自动（软）搜索源句子中与预测目标词相关的部分来扩展该架构，而无需将这些部分明确地形成硬分段。通过这种新方法，我们在英法翻译任务上实现了与现有最先进的基于短语的系统相当的翻译性能。此外，定性分析表明，模型找到的（软）对齐与我们的直觉非常吻合。", "insights": {"contrib": [{"en": "Proposes an attention mechanism that allows soft-search over source sentence parts for each target word.", "zh": "提出注意力机制，允许对每个目标词在源句中进行软搜索。"}, {"en": "Eliminates the fixed-length vector bottleneck in encoder-decoder models, improving long sentence translation.", "zh": "消除了编码器-解码器模型中的固定长度向量瓶颈，改善了长句翻译。"}, {"en": "Achieves translation performance comparable to phrase-based SMT on English-to-French WMT'14.", "zh": "在英法WMT'14任务上达到与基于短语的统计机器翻译相当的性能。"}, {"en": "Uses bidirectional RNN encoder to capture both preceding and following context for each word.", "zh": "使用双向RNN编码器捕捉每个词的前后文信息。"}, {"en": "Jointly trains alignment and translation in a single neural network via backpropagation.", "zh": "通过反向传播在单个神经网络中联合训练对齐和翻译。"}, {"en": "Visualizes soft-alignments that align with linguistic intuition, handling non-monotonic reordering.", "zh": "可视化软对齐符合语言直觉，处理非单调重排。"}], "limits": [{"en": "Computes annotation weights for every source word per target word, limiting scalability to very long sequences.", "zh": "为每个目标词计算所有源词的权重，限制了在超长序列上的可扩展性。"}, {"en": "Requires fixed vocabulary with unknown word token, failing to handle rare or out-of-vocabulary words.", "zh": "需要固定词表并处理未知词，无法处理罕见或词表外词汇。"}, {"en": "Tested only on English-to-French; effectiveness on other language pairs with different reordering patterns is unverified.", "zh": "仅在英法上测试，对其他语言对（如英德）的有效性未验证。"}, {"en": "Soft alignment is computationally expensive compared to hard alignment used in traditional SMT.", "zh": "软对齐相比传统统计机器翻译的硬对齐计算开销更大。"}, {"en": "Performance relies on large parallel corpora; may degrade with limited data.", "zh": "性能依赖大规模平行语料，数据有限时可能下降。"}]}, "cites": 29573}, {"id": "feifei-1409.0575", "pid": "feifei", "arxiv": "1409.0575", "date": "2014-09-01", "venue": "cs.CV", "fields": ["vision"], "tEn": "ImageNet Large Scale Visual Recognition Challenge", "tZh": "ImageNet大规模视觉识别挑战赛", "sEn": "The ImageNet Large Scale Visual Recognition Challenge is a benchmark for object category classification and detection, driving advances in computer vision.", "sZh": "ImageNet大规模视觉识别挑战赛是物体分类与检测的基准，推动了计算机视觉的进步。", "absEn": "The ImageNet Large Scale Visual Recognition Challenge is a benchmark in object category classification and detection on hundreds of object categories and millions of images. The challenge has been run annually from 2010 to present, attracting participation from more than fifty institutions. This paper describes the creation of this benchmark dataset and the advances in object recognition that have been possible as a result. We discuss the challenges of collecting large-scale ground truth annotation, highlight key breakthroughs in categorical object recognition, provide a detailed analysis of the current state of the field of large-scale image classification and object detection, and compare the state-of-the-art computer vision accuracy with human accuracy. We conclude with lessons learned in the five years of the challenge, and propose future directions and improvements.", "absZh": "ImageNet大规模视觉识别挑战赛是一个针对数百个物体类别和数百万张图像的物体分类与检测基准。该挑战赛自2010年起每年举办，吸引了超过五十家机构参与。本文描述了该基准数据集的创建过程以及由此带来的物体识别进展。我们讨论了收集大规模真实标注的挑战，强调了分类物体识别的关键突破，详细分析了大规模图像分类和物体检测领域的现状，并将最先进的计算机视觉精度与人类精度进行了比较。最后，我们总结了挑战赛五年来的经验教训，并提出了未来的方向和改进措施。", "insights": {"contrib": [{"en": "Introduced the ImageNet Large Scale Visual Recognition Challenge (ILSVRC), a benchmark for object classification and detection with 1000 categories and millions of images.", "zh": "提出了ImageNet大规模视觉识别挑战赛（ILSVRC），这是一个包含1000个类别和数百万张图像的物体分类与检测基准。"}, {"en": "Developed scalable crowdsourcing methods for large-scale
