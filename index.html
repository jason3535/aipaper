3B 到 33B，从头开始在 2 万亿个 token 上训练。这些模型在高质量的项目级代码语料库上进行预训练，并采用具有 16K 窗口的填空任务来增强代码生成和填充。我们的广泛评估表明，DeepSeek-Coder 不仅在多个基准测试中在开源代码模型中取得了最先进的性能，而且还超越了现有的闭源模型，如 Codex 和 GPT-3.5。此外，DeepSeek-Coder 模型采用宽松许可证，允许研究和无限制的商业使用。", "insights": {"contrib": [{"en": "Introduces DeepSeek-Coder series, open-source code models from 1.3B to 33B parameters.", "zh": "提出DeepSeek-Coder系列，开源代码模型，参数规模从1.3B到33B。"}, {"en": "First to incorporate repository-level data construction during pre-training, boosting cross-file code generation.", "zh": "首次在预训练中引入仓库级数据构建，提升跨文件代码生成能力。"}, {"en": "Rigorously examines FIM training strategies, revealing trade-offs and optimal configurations.", "zh": "严格分析FIM训练策略，揭示权衡关系与最优配置。"}, {"en": "Achieves state-of-the-art performance among open-source code models across multiple benchmarks.", "zh": "在多个基准测试中达到开源代码模型的最优性能。"}, {"en": "DeepSeek-Coder-Instruct 33B surpasses GPT-3.5 Turbo in code-related tasks after fine-tuning.", "zh": "微调后的DeepSeek-Coder-Instruct 33B在代码任务上超越GPT-3.5 Turbo。"}, {"en": "Releases models under permissive license for research and commercial use.", "zh": "以宽松许可证发布模型，支持研究和商业用途。"}], "limits": [{"en": "Evaluation limited to 87 programming languages; performance on other languages untested.", "zh": "评估限于87种编程语言，其他语言性能未经测试。"}, {"en": "Long-context adaptation only tested up to 16K tokens; reliability beyond that unverified.", "zh": "长上下文适配仅测试至16K token，超出范围的可靠性未验证。"}, {"en": "Potential data contamination from GitHub test sets cannot be fully ruled out.", "zh": "无法完全排除GitHub测试集的数据污染风险。"}, {"en": "FIM training trades off code completion ability for infilling performance.", "zh": "FIM训练在代码补全能力与填充性能之间存在权衡。"}, {"en": "DeepSeek-Coder-v1.5 shows slight coding performance drop despite improved NLP.", "zh": "DeepSeek-Coder-v1.5在NLP提升的同时编码性能略有下降。"}]}, "cites": 1699}, {"id": "damaidai-2401.06066", "pid": "damaidai", "arxiv": "2401.06066", "date": "2024-01-11", "venue": "cs.CL", "org": "DeepSeek-AI", "fields": ["nlp", "efficiency"], "tEn": "DeepSeekMoE: Towards Ultimate Expert Specialization in Mixture-of-Experts Language Models", "tZh": "DeepSeekMoE：迈向混合专家语言模型中专家专业化的极致", "sEn": "DeepSeekMoE achieves comparable performance to larger models with significantly less computation by introducing fine-grained expert segmentation and shared experts.", "sZh": "DeepSeekMoE通过细粒度专家分割和共享专家机制，以更少的计算量达到与更大模型相当的性能。", "absEn": "In the era of large language models, Mixture-of-Experts (MoE) is a promising architecture for managing computational costs when scaling up model parameters. However, conventional MoE architectures like GShard, which activate the top-$K$ out of $N$ experts, face challenges in ensuring expert specialization, i.e. each expert acquires non-overlapping and focused knowledge. In response, we propose the DeepSeekMoE architecture towards ultimate expert specialization. It involves two principal strategies: (1) finely segmenting the experts into $mN$ ones and activating $mK$ from them, allowing for a more flexible combination of activated experts; (2) isolating $K_s$ experts as shared ones, aiming at capturing common knowledge and mitigating redundancy in routed experts. Starting from a modest scale with 2B parameters, we demonstrate that DeepSeekMoE 2B achieves comparable performance with GShard 2.9B, which has 1.5 times the expert parameters and computation. In addition, DeepSeekMoE 2B nearly approaches the performance of its dense counterpart with the same number of total parameters, which set the upper bound of MoE models. Subsequently, we scale up DeepSeekMoE to 16B parameters and show that it achieves comparable performance with LLaMA2 7B, with only about 40% of computations. Further, our preliminary efforts to scale up DeepSeekMoE to 145B parameters consistently validate its substantial advantages over the GShard architecture, and show its performance comparable with DeepSeek 67B, using only 28.5% (maybe even 18.2%) of computations.", "absZh": "在大语言模型时代，混合专家（MoE）是一种有前景的架构，用于在扩大模型参数时管理计算成本。然而，传统的MoE架构（如GShard）激活N个专家中的前K个，难以确保专家专业化，即每个专家获取不重叠且集中的知识。为此，我们提出了DeepSeekMoE架构，旨在实现极致的专家专业化。它包含两个主要策略：（1）将专家细分为mN个，并激活其中的mK个，从而允许更灵活地组合激活的专家；（2）隔离K_s个专家作为共享专家，旨在捕获通用知识并减少路由专家中的冗余。从2B参数的适度规模开始，我们证明DeepSeekMoE 2B达到了与GShard 2.9B相当的性能，而后者拥有1.5倍的专家参数和计算量。此外，DeepSeekMoE 2B几乎接近其具有相同总参数数量的密集对应模型的性能，这设定了MoE模型的上限。随后，我们将DeepSeekMoE扩展到16B参数，并表明它仅需约40%的计算量即可达到与LLaMA2 7B相当的性能。进一步地，我们初步尝试将DeepSeekMoE扩展到145B参数，一致验证了其相对于GShard架构的显著优势，并显示其性能与DeepSeek 67B相当，而仅使用28.5%（甚至可能18.2%）的计算量。", "insights": {"contrib": [{"en": "Proposes DeepSeekMoE architecture with fine-grained expert segmentation and shared expert isolation for ultimate expert specialization.", "zh": "提出DeepSeekMoE架构，通过细粒度专家分割和共享专家隔离实现极致专家专业化。"}, {"en": "Empirically validates that DeepSeekMoE 2B nearly approaches the upper bound performance of MoE models.", "zh": "实验验证DeepSeekMoE 2B几乎达到MoE模型的上限性能。"}, {"en": "Scales DeepSeekMoE to 16B, achieving comparable performance with LLaMA2 7B using only about 40% computations.", "zh": "将DeepSeekMoE扩展到16B，仅用约40%算力达到与LLaMA2 7B相当的性能。"}, {"en": "Demonstrates successful alignment via supervised fine-tuning on DeepSeekMoE 16B, creating an effective chat model.", "zh": "通过对DeepSeekMoE 16B进行监督微调成功实现对齐，创建了有效的聊天模型。"}, {"en": "Preliminary scaling to 145B shows consistent advantages over GShard and comparable performance with DeepSeek 67B using 28.5% computations.", "zh": "初步扩展到145B显示了对GShard的持续优势，并使用28.5%算力达到与DeepSeek 67B相当的性能。"}, {"en": "Releases DeepSeekMoE 16B checkpoint publicly, deployable on a single 40GB GPU without quantization.", "zh": "公开发布DeepSeekMoE 16B检查点，可在单个40GB GPU上无需量化部署。"}], "limits": [{"en": "Validation experiments limited to 2B parameters and 100B tokens, may not generalize to larger scales.", "zh": "验证实验限于2B参数和100B token，可能无法推广到更大规模。"}, {"en": "DeepSeekMoE 16B shows limitations in multiple-choice tasks due to fewer attention parameters.", "zh": "DeepSeekMoE 16B由于注意力参数较少，在多项选择任务中表现有限。"}, {"en": "Preliminary 145B study trained only on 245B tokens, not fully optimized.", "zh": "初步145B研究仅在245B token上训练，未完全优化。"}, {"en": "Shared expert isolation may not be optimal for all tasks; ratio of shared to routed experts requires tuning.", "zh": "共享专家隔离可能并非对所有任务最优；共享与路由专家比例需要调整。"}, {"en": "Evaluation primarily on English and Chinese benchmarks; performance on other languages not assessed.", "zh": "评估主要在英文和中文基准上；未评估其他语言性能。"}]}, "cites": 913}, {"id": "aqjiang-2401.04088", "pid": "aqjiang", "arxiv": "2401.04088", "date": "2024-01-08", "venue": "cs.LG", "org": "Mistral AI", "fields": ["nlp", "efficiency"], "tEn": "Mixtral of Experts", "tZh": "Mixtral of Experts", "sEn": "Mixtral 8x7B, a Sparse Mixture of Experts model, outperforms Llama 2 70B and GPT-3.5 across benchmarks with only 13B active parameters.", "sZh": "Mixtral 8x7B，一种稀疏混合专家模型，仅使用13B活跃参数就在各项基准测试中超越Llama 2 70B和GPT-3.5。", "absEn": "We introduce Mixtral 8x7B, a Sparse Mixture of Experts (SMoE) language model. Mixtral has the same architecture as Mistral 7B, with the difference that each layer is composed of 8 feedforward blocks (i.e. experts). For every token, at each layer, a router network selects two experts to process the current state and combine their outputs. Even though each token only sees two experts, the selected experts can be different at each timestep. As a result, each token has access to 47B parameters, but only uses 13B active parameters during inference. Mixtral was trained with a context size of 32k tokens and it outperforms or matches Llama 2 70B and GPT-3.5 across all evaluated benchmarks. In particular, Mixtral vastly outperforms Llama 2 70B on mathematics, code generation, and multilingual benchmarks. We also provide a model fine-tuned to follow instructions, Mixtral 8x7B - Instruct, that surpasses GPT-3.5 Turbo, Claude-2.1, Gemini Pro, and Llama 2 70B - chat model on human benchmarks. Both the base and instruct models are released under the Apache 2.0 license.", "absZh": "我们介绍了Mixtral 8x7B，一种稀疏混合专家（SMoE）语言模型。Mixtral与Mistral 7B具有相同的架构，不同之处在于每一层由8个前馈块（即专家）组成。对于每个token，在每一层，一个路由网络选择两个专家来处理当前状态并组合它们的输出。尽管每个token只看到两个专家，但所选专家在每个时间步可以不同。因此，每个token可以访问47B参数，但在推理过程中仅使用13B活跃参数。Mixtral使用32k token的上下文大小进行训练，在所有评估的基准测试中均优于或匹配Llama 2 70B和GPT-3.5。特别是，Mixtral在数学、代码生成和多语言基准测试上大幅超越Llama 2 70B。我们还提供了一个经过微调以遵循指令的模型Mixtral 8x7B-Instruct，它在人类基准测试上超越了GPT-3.5 Turbo、Claude-2.1、Gemini Pro和Llama 2 70B聊天模型。基础模型和指令模型均在Apache 2.0许可下发布。", "insights": {"contrib": [{"en": "Introduces Mixtral 8x7B, a Sparse Mixture of Experts (SMoE) language model with 47B total parameters but only 13B active per token.", "zh": "提出Mixtral 8x7B，一种稀疏专家混合（SMoE）语言模型，总参数47B但每token仅13B活跃参数。"}, {"en": "Outperforms or matches Llama 2 70B and GPT-3.5 across all benchmarks, especially in math, code, and multilingual tasks.", "zh": "在所有基准测试中超越或持平Llama 2 70B和GPT-3.5，尤其在数学、代码和多语言任务上。"}, {"en": "Provides Mixtral 8x7B-Instruct, fine-tuned with SFT and DPO, surpassing GPT-3.5 Turbo, Claude-2.1, Gemini Pro, and Llama 2 70B chat on human evaluations.", "zh": "提供经SFT和DPO微调的Mixtral 8x7B-Instruct，在人类评估中超越GPT-3.5 Turbo、Claude-2.1、Gemini Pro和Llama 2 70B聊天模型。"}, {"en": "Achieves 100% passkey retrieval accuracy across context lengths up to 32k tokens, demonstrating effective long-context handling.", "zh": "在32k token上下文长度内实现100%的密钥检索准确率，展示了有效的长上下文处理能力。"}, {"en": "Releases both base and instruct models under Apache 2.0 license, with open-source inference stack via vLLM and Megablocks.", "zh": "在Apache 2.0许可下发布基础和指令模型，通过vLLM和Megablocks提供开源推理栈。"}, {"en": "Shows reduced biases on BBQ and BOLD benchmarks compared to Llama 2, with more positive sentiment profiles.", "zh": "与Llama 2相比，在BBQ和BOLD基准上偏见减少，情感分布更积极。"}], "limits": [{"en": "Memory costs are proportional to 47B sparse parameters, requiring significant GPU memory for serving.", "zh": "内存成本与47B稀疏参数成正比，服务时需要大量GPU内存。"}, {"en": "SMoE layers introduce routing overhead and increased memory loads, reducing efficiency for small batch sizes.", "zh": "SMoE层引入路由开销和内存负载增加，小批量时效率降低。"}, {"en": "Expert assignment shows no clear domain specialization, limiting potential for targeted expert optimization.", "zh": "专家分配未显示明确的领域专业化，限制了针对性专家优化的潜力。"}, {"en": "High locality in expert selection may cause load imbalance in Expert Parallelism, requiring careful scheduling.", "zh": "专家选择的高局部性可能导致专家并行中的负载不均，需要仔细调度。"}, {"en": "Evaluation differences from Llama 2 paper (e.g., MBPP subset, TriviaQA without context) may affect direct comparisons.", "zh": "与Llama 2论文的评估差异（如MBPP子集、无上下文的TriviaQA）可能影响直接比较。"}]}, "cites": 1967}, {"id": "zfu-2401.02117", "pid": "zfu", "arxiv": "2401.02117", "date": "2024-01-04", "venue": "cs.RO", "org": "Stanford", "fields": ["rl", "vision"], "tEn": "Mobile ALOHA: Learning Bimanual Mobile Manipulation with Low-Cost Whole-Body Teleoperation", "tZh": "Mobile ALOHA：通过低成本全身遥操作学习双臂移动操作", "sEn": "Mobile ALOHA enables bimanual mobile manipulation via low-cost whole-body teleoperation and imitation learning, achieving high success rates on complex tasks.", "sZh": "Mobile ALOHA通过低成本全身遥操作和模仿学习实现双臂移动操作，在复杂任务上取得高成功率。", "absEn": "Imitation learning from human demonstrations has shown impressive performance in robotics. However, most results focus on table-top manipulation, lacking the mobility and dexterity necessary for generally useful tasks. In this work, we develop a system for imitating mobile manipulation tasks that are bimanual and require whole-body control. We first present Mobile ALOHA, a low-cost and whole-body teleoperation system for data collection. It augments the ALOHA system with a mobile base, and a whole-body teleoperation interface. Using data collected with Mobile ALOHA, we then perform supervised behavior cloning and find that co-training with existing static ALOHA datasets boosts performance on mobile manipulation tasks. With 50 demonstrations for each task, co-training can increase success rates by up to 90%, allowing Mobile ALOHA to autonomously complete complex mobile manipulation tasks such as sauteing and serving a piece of shrimp, opening a two-door wall cabinet to store heavy cooking pots, calling and entering an elevator, and lightly rinsing a used pan using a kitchen faucet. Project website: https://mobile-aloha.github.io", "absZh": "从人类演示中进行的模仿学习在机器人领域展现了令人印象深刻的表现。然而，大多数结果集中在桌面操作上，缺乏完成一般有用任务所需的移动性和灵巧性。在这项工作中，我们开发了一个系统，用于模仿需要全身控制的双臂移动操作任务。我们首先提出了Mobile ALOHA，一个用于数据收集的低成本全身遥操作系统。它在ALOHA系统的基础上增加了移动基座和全身遥操作界面。利用Mobile ALOHA收集的数据，我们随后进行监督行为克隆，并发现与现有的静态ALOHA数据集共同训练可以提升移动操作任务的性能。对于每个任务，使用50个演示，共同训练可以将成功率提高高达90%，使Mobile ALOHA能够自主完成复杂的移动操作任务，例如翻炒和盛出一只虾、打开双门壁柜存放沉重的烹饪锅、呼叫并进入电梯，以及使用厨房水龙头轻轻冲洗用过的平底锅。项目网站：https://mobile-aloha.github.io", "insights": {"contrib": [{"en": "Presents Mobile ALOHA, a low-cost whole-body teleoperation system for bimanual mobile manipulation data collection.", "zh": "提出了Mobile ALOHA，一种低成本全身遥操作系统，用于双臂移动操作数据收集。"}, {"en": "Shows that co-training with static ALOHA datasets boosts mobile manipulation success rates by up to 90% with 50 demonstrations.", "zh": "展示了与静态ALOHA数据集联合训练，在50次示范下可将移动操作成功率提升高达90%。"}, {"en": "Achieves over 80% success on complex tasks like opening cabinets, calling elevators, and rinsing pans with only 20-50 demonstrations.", "zh": "在打开柜子、呼叫电梯和冲洗锅等复杂任务上，仅用20-50次示范即实现超过80%的成功率。"}, {"en": "Demonstrates that co-training improves data efficiency and generalization across tasks and imitation learning methods.", "zh": "证明了联合训练提高了数据效率和跨任务及模仿学习方法的泛化能力。"}, {"en": "Provides an open-source, low-cost hardware platform ($32k) for whole-body teleoperation and autonomous operation.", "zh": "提供了一个开源、低成本的硬件平台（3.2万美元），用于全身遥操作和自主操作。"}, {"en": "Validates the system through extensive real-world experiments on 7 diverse mobile manipulation tasks.", "zh": "通过在7个多样化的移动操作任务上进行大量真实世界实验，验证了该系统。"}], "limits": [{"en": "Limited to single-task imitation learning; robot cannot improve autonomously or explore new knowledge.", "zh": "仅限于单任务模仿学习；机器人无法自主改进或探索新知识。"}, {"en": "Demonstrations collected by expert operators; not tested on highly suboptimal or heterogeneous datasets.", "zh": "示范由专家操作员收集；未在高度次优或异构数据集上测试。"}, {"en": "Hardware footprint (90cm x 135cm) may be too large for narrow paths; fixed arm height limits access to low cabinets.", "zh": "硬件占地面积（90厘米×135厘米）可能对狭窄路径过大；固定臂高限制了进入低柜的能力。"}, {"en": "Cook Shrimp task success rate only 40% due to limited demonstrations and visual challenges.", "zh": "炒虾任务成功率仅40%，由于示范有限和视觉挑战。"}, {"en": "Co-training with static data may not benefit retrieval-based methods like VINN due to action prediction mismatch.", "zh": "与静态数据联合训练可能对基于检索的方法（如VINN）无益，由于动作预测不匹配。"}]}, "cites": 690}, {"id": "wenhaiwang-2312.14238", "pid": "wenhaiwang", "arxiv": "2312.14238", "date": "2023-12-21", "venue": "cs.CV", "org": "Shanghai AI Lab / Nanjing University / CUHK", "fields": ["vision", "nlp"], "tEn": "InternVL: Scaling up Vision Foundation Models and Aligning for Generic Visual-Linguistic Tasks", "tZh": "InternVL：扩展视觉基础模型并针对通用视觉语言任务进行对齐", "sEn": "InternVL scales vision foundation models to 6B parameters and aligns with LLMs, achieving SOTA on 32 benchmarks.", "sZh": "InternVL将视觉基础模型扩展到60亿参数，并与大语言模型对齐，在32个基准测试中达到最优性能。", "absEn": "The exponential growth of large language models (LLMs) has opened up numerous possibilities for multimodal AGI systems. However, the progress in vision and vision-language foundation models, which are also critical elements of multi-modal AGI, has not kept pace with LLMs. In this work, we design a large-scale vision-language foundation model (InternVL), which scales up the vision foundation model to 6 billion parameters and progressively aligns it with the LLM, using web-scale image-text data from various sources. This model can be broadly applied to and achieve state-of-the-art performance on 32 generic visual-linguistic benchmarks including visual perception tasks such as image-level or pixel-level recognition, vision-language tasks such as zero-shot image/video classification, zero-shot image/video-text retrieval, and link with LLMs to create multi-modal dialogue systems. It has powerful visual capabilities and can be a good alternative to the ViT-22B. We hope that our research could contribute to the development of multi-modal large models. Code and models are available at https://github.com/OpenGVLab/InternVL.", "absZh": "大语言模型（LLM）的指数级增长为多模态AGI系统带来了众多可能性。然而，作为多模态AGI关键组成部分的视觉和视觉语言基础模型的进展却落后于LLM。在这项工作中，我们设计了一个大规模视觉语言基础模型（InternVL），它将视觉基础模型扩展到60亿参数，并使用来自各种来源的网络规模图像文本数据逐步与LLM对齐。该模型可广泛应用于32个通用视觉语言基准测试，包括视觉感知任务（如图像级或像素级识别）、视觉语言任务（如零样本图像/视频分类、零样本图像/视频文本检索），并与LLM连接以创建多模态对话系统，取得了最先进的性能。它具有强大的视觉能力，可以很好地替代ViT-22B。我们希望我们的研究能够为多模态大模型的发展做出贡献。代码和模型可在https://github.com/OpenGVLab/InternVL获取。", "insights": {"contrib": [{"en": "Proposes InternVL, a large-scale vision-language foundation model scaling vision encoder to 6B parameters and aligning with LLM.", "zh": "提出InternVL，一种大规模视觉语言基础模型，将视觉编码器扩展到60亿参数并与大语言模型对齐。"}, {"en": "Introduces a progressive image-text alignment strategy for efficient training using web-scale noisy data for contrastive learning and fine-grained data for generative learning.", "zh": "引入渐进式图像文本对齐策略，利用网络规模噪声数据进行对比学习，细粒度数据进行生成学习，实现高效训练。"}, {"en": "Achieves state-of-the-art performance on 32 generic visual-linguistic benchmarks including image classification, semantic segmentation, video classification, retrieval, and captioning.", "zh": "在32个通用视觉语言基准上取得最先进性能，包括图像分类、语义分割、视频分类、检索和字幕生成。"}, {"en": "Demonstrates strong visual perception capabilities, serving as a good alternative to ViT-22B for visual tasks.", "zh": "展示强大的视觉感知能力，可作为ViT-22B在视觉任务中的优秀替代方案。"}, {"en": "Enables flexible model composition for contrastive and generative tasks via vision encoder and language middleware QLLaMA.", "zh": "通过视觉编码器和语言中间件QLLaMA实现灵活模型组合，支持对比和生成任务。"}, {"en": "Shows promising compatibility with various LLMs like LLaMA, Vicuna, and InternLM for multi-modal dialogue.", "zh": "与多种大语言模型（如LLaMA、Vicuna和InternLM）展现出良好的兼容性，适用于多模态对话。"}], "limits": [{"en": "Training requires massive computational resources (640 A100 GPUs for stage 1), limiting accessibility.", "zh": "训练需要大量计算资源（第一阶段640块A100 GPU），限制了可访问性。"}, {"en": "Performance heavily depends on web-scale noisy data quality; data filtering is crucial but may discard useful samples.", "zh": "性能严重依赖网络规模噪声数据质量；数据过滤至关重要但可能丢弃有用样本。"}, {"en": "The model's large size (6B vision encoder + 8B middleware) leads to high inference latency, especially with larger images.", "zh": "模型规模大（60亿视觉编码器+80亿中间件）导致推理延迟高，尤其在大图像上。"}, {"en": "Alignment strategy is progressive but still may not fully bridge the modality gap between vision and language.", "zh": "对齐策略是渐进式的，但仍可能无法完全弥合视觉和语言之间的模态差距。"}, {"en": "Evaluation focuses on English and Chinese; multilingual capabilities on other languages are less explored.", "zh": "评估主要集中在英语和中文；对其他语言的多语言能力探索较少。"}]}, "cites": 3001}, {"id": "tridao-2312.00752", "pid": "tridao", "arxiv": "2312.00752", "date": "2023-12-01", "venue": "cs.LG", "fields": ["efficiency", "nlp"], "tEn": "Mamba: Linear-Time Sequence Modeling with Selective State Spaces", "tZh": "Mamba：具有选择性状态空间的线性时间序列建模", "sEn": "Mamba achieves linear-time sequence modeling with selective state spaces, outperforming Transformers in efficiency and matching larger models in performance.", "sZh": "Mamba通过选择性状态空间实现线性时间序列建模，在效率上超越Transformer，在性能上匹配更大规模的模型。", "absEn": "Foundation models, now powering most of the exciting applications in deep learning, are almost universally based on the Transformer architecture and its core attention module. Many subquadratic-time architectures such as linear attention, gated convolution and recurrent models, and structured state space models (SSMs) have been developed to address Transformers' computational inefficiency on long sequences, but they have not performed as well as attention on important modalities such as language. We identify that a key weakness of such models is their inability to perform content-based reasoning, and make several improvements. First, simply letting the SSM parameters be functions of the input addresses their weakness with discrete modalities, allowing the model to selectively propagate or forget information along the sequence length dimension depending on the current token. Second, even though this change prevents the use of efficient convolutions, we design a hardware-aware parallel algorithm in recurrent mode. We integrate these selective SSMs into a simplified end-to-end neural network architecture without attention or even MLP blocks (Mamba). Mamba enjoys fast inference (5$\\times$ higher throughput than Transformers) and linear scaling in sequence length, and its performance improves on real data up to million-length sequences. As a general sequence model backbone, Mamba achieves state-of-the-art performance across several modalities such as language, audio, and genomics. On language modeling, our Mamba-3B model outperforms Transformers of the same size and matches Transformers twice its size, both in pretraining and downstream evaluation.", "absZh": "基础模型如今驱动着深度学习中最激动人心的应用，几乎普遍基于Transformer架构及其核心注意力模块。为了解决Transformer在长序列上的计算低效问题，人们开发了许多次二次时间架构，如线性注意力、门控卷积和循环模型以及结构化状态空间模型（SSM），但这些模型在语言等重要模态上的表现不如注意力机制。我们发现这类模型的一个关键弱点在于无法进行基于内容的推理，并做出了若干改进。首先，让SSM参数成为输入的函数，解决了其在离散模态上的弱点，使得模型能够根据当前token沿序列长度维度选择性地传播或遗忘信息。其次，尽管这一改变阻止了高效卷积的使用，我们设计了一种硬件感知的并行算法，以循环模式运行。我们将这些选择性SSM集成到一个简化的端到端神经网络架构中，无需注意力甚至MLP块（Mamba）。Mamba具有快速推理（吞吐量比Transformer高5倍）和序列长度线性扩展的特点，在长达百万长度的真实数据上性能提升。作为通用序列模型骨干，Mamba在语言、音频和基因组学等多种模态上取得了最先进的性能。在语言建模方面，我们的Mamba-3B模型在预训练和下游评估中均优于相同大小的Transformer，并匹配两倍大小的Transformer。", "insights": {"contrib": [{"en": "Proposes Mamba, a selective state space model that outperforms Transformers on long sequences.", "zh": "提出Mamba，一种选择性状态空间模型，在长序列上优于Transformer。"}, {"en": "Identifies content-based reasoning as key weakness of prior SSMs and fixes it with input-dependent parameters.", "zh": "指出先前SSM无法进行基于内容的推理，并通过输入依赖参数解决。"}, {"en": "Designs a hardware-aware parallel algorithm for efficient recurrent mode inference.", "zh": "设计了一种硬件感知的并行算法，实现高效的循环模式推理。"}, {"en": "Achieves 5x higher throughput than Transformers and linear scaling in sequence length.", "zh": "实现比Transformer高5倍的吞吐量，序列长度线性缩放。"}, {"en": "Mamba-3B matches Transformers twice its size in pretraining and downstream tasks.", "zh": "Mamba-3B在预训练和下游任务中匹配两倍大小的Transformer。"}, {"en": "State-of-the-art across language, audio, and genomics modalities.", "zh": "在语言、音频和基因组学等多种模态上达到最先进水平。"}], "limits": [{"en": "Selective SSMs lose convolution efficiency, requiring custom hardware-aware implementation.", "zh": "选择性SSM失去卷积效率，需要定制硬件感知实现。"}, {"en": "Performance on very short sequences may not surpass Transformers due to overhead.", "zh": "由于开销，在极短序列上性能可能不如Transformer。"}, {"en": "Theoretical understanding of why selectivity improves performance is limited.", "zh": "对选择性为何提升性能的理论理解有限。"}, {"en": "Scaling to extremely large models (e.g., 100B+) is not demonstrated.", "zh": "未展示扩展到极大模型（如100B+）的效果。"}, {"en": "Potential numerical stability issues with recurrent mode on long sequences.", "zh": "长序列循环模式可能存在数值稳定性问题。"}]}, "cites": 7660, "org": "CMU"}, {"id": "xinghangli-2311.01378", "pid": "xinghangli", "arxiv": "2311.01378", "date": "2023-11-02", "venue": "cs.RO", "org": "ByteDance Research / Tsinghua", "fields": ["deep-learning", "vision"], "tEn": "Vision-Language Foundation Models as Effective Robot Imitators", "tZh": "视觉语言基础模型作为有效的机器人模仿者", "sEn": "RoboFlamingo, built on OpenFlamingo, achieves state-of-the-art robot manipulation by fine-tuning vision-language models with imitation learning.", "sZh": "基于OpenFlamingo的RoboFlamingo通过模仿学习微调视觉语言模型，在机器人操作任务上取得了领先性能。", "absEn": "Recent progress in vision language foundation models has shown their ability to understand multimodal data and resolve complicated vision language tasks, including robotics manipulation. We seek a straightforward way of making use of existing vision-language models (VLMs) with simple fine-tuning on robotics data. To this end, we derive a simple and novel vision-language manipulation framework, dubbed RoboFlamingo, built upon the open-source VLMs, OpenFlamingo. Unlike prior works, RoboFlamingo utilizes pre-trained VLMs for single-step vision-language comprehension, models sequential history information with an explicit policy head, and is slightly fine-tuned by imitation learning only on language-conditioned manipulation datasets. Such a decomposition provides RoboFlamingo the flexibility for open-loop control and deployment on low-performance platforms. By exceeding the state-of-the-art performance with a large margin on the tested benchmark, we show RoboFlamingo can be an effective and competitive alternative to adapt VLMs to robot control. Our extensive experimental results also reveal several interesting conclusions regarding the behavior of different pre-trained VLMs on manipulation tasks. We believe RoboFlamingo has the potential to be a cost-effective and easy-to-use solution for robotics manipulation, empowering everyone with the ability to fine-tune their own robotics policy.", "absZh": "近期视觉语言基础模型的进展表明，它们能够理解多模态数据并解决复杂的视觉语言任务，包括机器人操作。我们寻求一种直接的方式，通过对机器人数据进行简单微调来利用现有的视觉语言模型（VLM）。为此，我们基于开源VLM OpenFlamingo，提出了一个简单而新颖的视觉语言操作框架RoboFlamingo。与先前工作不同，RoboFlamingo利用预训练的VLM进行单步视觉语言理解，通过显式策略头建模序列历史信息，并仅通过模仿学习在语言条件操作数据集上进行轻微微调。这种分解使得RoboFlamingo在开环控制和低性能平台部署上具有灵活性。通过在测试基准上以较大优势超越现有最佳性能，我们展示了RoboFlamingo作为将VLM适应机器人控制的有效且具有竞争力的替代方案。我们广泛的实验结果还揭示了不同预训练VLM在操作任务上的行为的一些有趣结论。我们相信RoboFlamingo有潜力成为机器人操作中成本效益高且易于使用的解决方案，使每个人都能微调自己的机器人策略。", "insights": {"contrib": [{"en": "Proposes RoboFlamingo, a simple framework adapting OpenFlamingo VLM to robot manipulation via imitation learning.", "zh": "提出RoboFlamingo，一个通过模仿学习将OpenFlamingo视觉语言模型适配到机器人操作的简单框架。"}, {"en": "Decouples vision-language understanding and decision-making with a separate policy head for history modeling.", "zh": "通过独立的策略头解耦视觉语言理解与决策，用于历史信息建模。"}, {"en": "Achieves state-of-the-art performance on CALVIN benchmark, with 2x improvement over prior methods.", "zh": "在CALVIN基准上取得最优性能，比先前方法提升2倍。"}, {"en": "Demonstrates zero-shot generalization to unseen visual contexts and language instructions.", "zh": "展示了对未见视觉场景和语言指令的零样本泛化能力。"}, {"en": "Shows data efficiency: larger VLMs perform better with limited robot demonstration data.", "zh": "展示了数据效率：更大的视觉语言模型在有限机器人演示数据下表现更好。"}, {"en": "Enables open-loop control and deployment on single GPU, reducing computational cost.", "zh": "支持开环控制和单GPU部署，降低计算成本。"}], "limits": [{"en": "Evaluated only in simulation (CALVIN), not on real-world robots.", "zh": "仅在仿真环境（CALVIN）中评估，未在真实机器人上部署。"}, {"en": "Requires language-annotated demonstration data, which is scarce (only 1% of total data).", "zh": "需要语言标注的演示数据，此类数据稀缺（仅占总数据的1%）。"}, {"en": "Open-loop control performance degrades without retraining with jump step demonstrations.", "zh": "开环控制性能下降，除非使用跳步演示重新训练。"}, {"en": "Generalization to synonymous instructions drops for later tasks in sequence.", "zh": "对同义指令的泛化能力在序列后续任务中下降。"}, {"en": "Relies on OpenFlamingo backbone; performance may vary with other VLMs.", "zh": "依赖OpenFlamingo骨干网络，性能可能因其他视觉语言模型而异。"}]}}, {"id": "mahn-2310.08864", "pid": "mahn", "arxiv": "2310.08864", "date": "2023-10-13", "venue": "cs.RO", "org": "Google DeepMind / Open X-Embodiment Collaboration", "fields": ["deep-learning", "vision"], "tEn": "Open X-Embodiment: Robotic Learning Datasets and RT-X Models", "tZh": "开放X-具身：机器人学习数据集与RT-X模型", "sEn": "A large-scale robotic dataset from 22 robots enables a generalist X-robot policy with positive transfer across platforms.", "sZh": "来自22个机器人的大规模数据集使得通用型跨机器人策略成为可能，并在不同平台间展现出正向迁移能力。", "absEn": "Large, high-capacity models trained on diverse datasets have shown remarkable successes on efficiently tackling downstream applications. In domains from NLP to Computer Vision, this has led to a consolidation of pretrained models, with general pretrained backbones serving as a starting point for many applications. Can such a consolidation happen in robotics? Conventionally, robotic learning methods train a separate model for every application, every robot, and even every environment. Can we instead train generalist X-robot policy that can be adapted efficiently to new robots, tasks, and environments? In this paper, we provide datasets in standardized data formats and models to make it possible to explore this possibility in the context of robotic manipulation, alongside experimental results that provide an example of effective X-robot policies. We assemble a dataset from 22 different robots collected through a collaboration between 21 institutions, demonstrating 527 skills (160266 tasks). We show that a high-capacity model trained on this data, which we call RT-X, exhibits positive transfer and improves the capabilities of multiple robots by leveraging experience from other platforms. More details can be found on the project website https://robotics-transformer-x.github.io.", "absZh": "大规模、高容量模型在多样化数据集上训练后，在高效处理下游应用方面取得了显著成功。从自然语言处理到计算机视觉，这导致了预训练模型的整合，通用预训练骨干网络成为许多应用的起点。这种整合能否在机器人领域发生？传统上，机器人学习方法为每个应用、每个机器人甚至每个环境训练单独的模型。我们能否训练通用的跨机器人策略，使其能够高效适应新的机器人、任务和环境？在本文中，我们提供了标准化数据格式的数据集和模型，以探索在机器人操作领域实现这一可能性的途径，并附有实验结果为有效的跨机器人策略提供示例。我们通过21个机构的合作，从22个不同的机器人收集了数据集，展示了527种技能（160266个任务）。我们表明，在此数据上训练的高容量模型（称为RT-X）展现出正向迁移，并通过利用其他平台的经验提升了多个机器人的能力。更多详情请见项目网站https://robotics-transformer-x.github.io。", "insights": {"contrib": [{"en": "Assembled a large-scale multi-embodiment dataset from 22 robots across 21 institutions, covering 527 skills and 160,266 tasks.", "zh": "汇集了来自21个机构、22种机器人的大规模多形态数据集，涵盖527种技能和160,266个任务。"}, {"en": "Demonstrated positive transfer across robots using Transformer-based policies (RT-1-X and RT-2-X) trained on X-embodiment data.", "zh": "展示了基于Transformer的策略（RT-1-X和RT-2-X）在跨机器人训练中的正向迁移效果。"}, {"en": "Showed that RT-1-X outperforms original methods by 50% on small-scale datasets, and RT-2-X achieves 3x improvement in emergent skills.", "zh": "RT-1-X在小规模数据集上比原始方法提升50%，RT-2-X在新兴技能上实现3倍改进。"}, {"en": "Provided open-source resources: unified dataset, code, and pre-trained RT-1-X model for X-embodiment research.", "zh": "提供了开源资源：统一数据集、代码和预训练的RT-1-X模型，以支持跨形态研究。"}, {"en": "Identified that model capacity and web-scale pretraining are critical for effective X-embodiment transfer.", "zh": "发现模型容量和网络规模预训练对有效的跨形态迁移至关重要。"}, {"en": "Established a community-driven effort involving 21 institutions to grow the dataset over time.", "zh": "建立了由21个机构参与的社区驱动项目，以持续扩展数据集。"}], "limits": [{"en": "Does not consider robots with very different sensing and actuation modalities.", "zh": "未考虑具有完全不同感知和执行模态的机器人。"}, {"en": "Does not study generalization to new robots not seen during training.", "zh": "未研究对训练中未见的新机器人的泛化能力。"}, {"en": "Does not provide a decision criterion for when positive transfer occurs.", "zh": "未提供正向迁移是否发生的判定标准。"}, {"en": "Action and observation spaces are only coarsely aligned across embodiments.", "zh": "不同形态间的动作和观测空间仅粗略对齐。"}, {"en": "Experiments limited to 9 manipulators out of 22 total embodiments in the dataset.", "zh": "实验仅使用了数据集中22种形态中的9种机械臂。"}]}, "cites": 1055}, {"id": "haotianliu-2310.03744", "pid": "haotianliu", "arxiv": "2310.03744", "date": "2023-10-05", "venue": "cs.CV", "org": "Microsoft", "fields": ["vision", "nlp"], "tEn": "Improved Baselines with Visual Instruction Tuning", "tZh": "通过视觉指令调优改进基线模型", "sEn": "Simple modifications to LLaVA, including using CLIP-ViT-L-336px with MLP projection and adding academic VQA data, achieve state-of-the-art across 11 benchmarks with only 1.2M public data and ~1 day training on 8 A100s.", "sZh": "对LLaVA进行简单修改，包括使用带MLP投影的CLIP-ViT-L-336px并添加学术VQA数据，仅用120万公开数据和8块A100训练约1天，就在11个基准上达到最先进水平。", "absEn": "Large multimodal models (LMM) have recently shown encouraging progress with visual instruction tuning. In this note, we show that the fully-connected vision-language cross-modal connector in LLaVA is surprisingly powerful and data-efficient. With simple modifications to LLaVA, namely, using CLIP-ViT-L-336px with an MLP projection and adding academic-task-oriented VQA data with simple response formatting prompts, we establish stronger baselines that achieve state-of-the-art across 11 benchmarks. Our final 13B checkpoint uses merely 1.2M publicly available data, and finishes full training in ~1 day on a single 8-A100 node. We hope this can make state-of-the-art LMM research more accessible. Code and model will be publicly available.", "absZh": "大型多模态模型（LMM）近期通过视觉指令调优取得了令人鼓舞的进展。本文表明，LLaVA中的全连接视觉-语言跨模态连接器出人意料地强大且数据高效。通过对LLaVA进行简单修改，即使用带MLP投影的CLIP-ViT-L-336px，并添加带有简单响应格式提示的学术任务导向VQA数据，我们建立了更强的基线，在11个基准上达到了最先进水平。我们最终的13B检查点仅使用了120万公开数据，并在单个8-A100节点上约1天内完成全部训练。我们希望这能使最先进的LMM研究更加普及。代码和模型将公开提供。", "insights": {"contrib": [{"en": "Shows that LLaVA's fully-connected vision-language connector is powerful and data-efficient.", "zh": "展示了LLaVA的全连接视觉-语言连接器强大且数据高效。"}, {"en": "Introduces simple modifications: MLP projection and academic VQA data with response formatting prompts.", "zh": "引入简单改进：MLP投影和带响应格式提示的学术VQA数据。"}, {"en": "Achieves state-of-the-art across 11 benchmarks with only 1.2M public data and ~1 day training on 8 A100s.", "zh": "仅用120万公开数据和8块A100约1天训练，在11个基准上达到最先进水平。"}, {"en": "Demonstrates that visual instruction tuning is more important than large-scale pre-training for LMMs.", "zh": "证明视觉指令微调比大规模预训练对LMM更重要。"}, {"en": "Proposes a single response formatting prompt to balance short and long-form answers without extra data processing.", "zh": "提出单一响应格式提示，平衡短和长形式答案，无需额外数据处理。"}, {"en": "Provides fully reproducible and affordable baselines for future LMM research.", "zh": "为未来LMM研究提供完全可复现且负担得起的基线。"}], "limits": [{"en": "Uses full image patches, prolonging training iterations compared to visual resamplers.", "zh": "使用完整图像块，相比视觉重采样器延长训练迭代。"}, {"en": "Cannot process multiple images due to lack of data and context length limits.", "zh": "由于缺乏数据和上下文长度限制，无法处理多张图像。"}, {"en": "Problem-solving capabilities limited in certain domains despite complex instruction following.", "zh": "尽管能遵循复杂指令，但在某些领域问题解决能力有限。"}, {"en": "Not exempt from hallucinations and misinformation, requiring caution in critical applications.", "zh": "无法避免幻觉和错误信息，在关键应用中需谨慎使用。"}]}, "cites": 5307}, {"id": "anyang-2309.16609", "pid": "anyang", "arxiv": "2309.16609", "date": "2023-09-28", "venue": "cs.CL", "org": "Alibaba", "fields": ["nlp", "deep-learning"], "tEn": "Qwen Technical Report", "tZh": "Qwen技术报告", "sEn": "Qwen is a comprehensive LLM series with base and chat models, showing superior performance and advanced tool-use capabilities.", "sZh": "Qwen是一个包含基础模型和聊天模型的大语言模型系列，展现出卓越的性能和先进的工具使用能力。", "absEn": "Large language models (LLMs) have revolutionized the field of artificial intelligence, enabling natural language processing tasks that were previously thought to be exclusive to humans. In this work, we introduce Qwen, the first installment of our large language model series. Qwen is a comprehensive language model series that encompasses distinct models with varying parameter counts. It includes Qwen, the base pretrained language models, and Qwen-Chat, the chat models finetuned with human alignment techniques. The base language models consistently demonstrate superior performance across a multitude of downstream tasks, and the chat models, particularly those trained using Reinforcement Learning from Human Feedback (RLHF), are highly competitive. The chat models possess advanced tool-use and planning capabilities for creating agent applications, showcasing impressive performance even when compared to bigger models on complex tasks like utilizing a code interpreter. Furthermore, we have developed coding-specialized models, Code-Qwen and Code-Qwen-Chat, as well as mathematics-focused models, Math-Qwen-Chat, which are built upon base language models. These models demonstrate significantly improved performance in comparison with open-source models, and slightly fall behind the proprietary models.", "absZh": "大型语言模型（LLM）彻底改变了人工智能领域，使得以前被认为只有人类才能完成的自然语言处理任务成为可能。在这项工作中，我们介绍了Qwen，这是我们大型语言模型系列的第一部分。Qwen是一个全面的语言模型系列，包含不同参数量的不同模型。它包括Qwen（基础预训练语言模型）和Qwen-Chat（使用人类对齐技术微调的聊天模型）。基础语言模型在众多下游任务中持续展现出优越的性能，而聊天模型，特别是那些使用基于人类反馈的强化学习（RLHF）训练的模型，具有很强的竞争力。聊天模型具备先进的工具使用和规划能力，可用于创建智能体应用，即使在复杂任务（如使用代码解释器）上与更大的模型相比也表现出色。此外，我们还开发了专门用于编码的模型Code-Qwen和Code-Qwen-Chat，以及专注于数学的模型Math-Qwen-Chat，它们都基于基础语言模型构建。这些模型与开源模型相比表现出显著改进的性能，略逊于专有模型。", "insights": {"contrib": [{"en": "Introduces Qwen, a comprehensive LLM series with varying parameter counts.", "zh": "提出Qwen，一个包含不同参数规模的全面大语言模型系列。"}, {"en": "Base pretrained models show superior performance across multiple downstream tasks.", "zh": "基础预训练模型在多个下游任务中表现优异。"}, {"en": "Chat models trained with RLHF achieve highly competitive performance.", "zh": "使用RLHF训练的聊天模型达到高度竞争性表现。"}, {"en": "Chat models possess advanced tool-use and planning for agent applications.", "zh": "聊天模型具备高级工具使用和规划能力，适用于智能体应用。"}, {"en": "Develops Code-Qwen and Math-Qwen-Chat specialized models.", "zh": "开发了Code-Qwen和Math-Qwen-Chat等专用模型。"}, {"en": "Specialized models significantly outperform open-source models and approach proprietary ones.", "zh": "专用模型显著优于开源模型，接近专有模型性能。"}], "limits": [{"en": "Performance on complex tasks slightly falls behind proprietary models.", "zh": "在复杂任务上性能略逊于专有模型。"}, {"en": "Limited evaluation on extremely large-scale or real-world deployment scenarios.", "zh": "在超大规模或实际部署场景下的评估有限。"}, {"en": "Potential biases and safety issues not fully addressed.", "zh": "潜在的偏见和安全问题未完全解决。"}, {"en": "Generalization to non-English languages may be limited.", "zh": "对非英语语言的泛化能力可能有限。"}]}, "cites": 3951}, {"id": "jinzebai-2308.12966", "pid": "jinzebai", "arxiv": "2308.12966", "date": "2023-08-24", "venue": "cs.CV", "org": "Alibaba Group", "fields": ["vision", "nlp"], "tEn": "Qwen-VL: A Versatile Vision-Language Model for Understanding, Localization, Text Reading, and Beyond", "tZh": "Qwen-VL：一个多功能的视觉语言模型，用于理解、定位、文本阅读等", "sEn": "Qwen-VL series achieves new records on visual-centric benchmarks and real-world dialog.", "sZh": "Qwen-VL系列在视觉中心基准测试和真实世界对话中创下新纪录。", "absEn": "In this work, we introduce the Qwen-VL series, a set of large-scale vision-language models (LVLMs) designed to perceive and understand both texts and images. Starting from the Qwen-LM as a foundation, we endow it with visual capacity by the meticulously designed (i) visual receptor, (ii) input-output interface, (iii) 3-stage training pipeline, and (iv) multilingual multimodal cleaned corpus. Beyond the conventional image description and question-answering, we implement the grounding and text-reading ability of Qwen-VLs by aligning image-caption-box tuples. The resulting models, including Qwen-VL and Qwen-VL-Chat, set new records for generalist models under similar model scales on a broad range of visual-centric benchmarks (e.g., image captioning, question answering, visual grounding) and different settings (e.g., zero-shot, few-shot). Moreover, on real-world dialog benchmarks, our instruction-tuned Qwen-VL-Chat also demonstrates superiority compared to existing vision-language chatbots. Code, demo and models are available at https://github.com/QwenLM/Qwen-VL.", "absZh": "本文介绍了Qwen-VL系列，这是一组大规模视觉语言模型，旨在感知和理解文本与图像。以Qwen-LM为基础，我们通过精心设计的（i）视觉接收器、（ii）输入输出接口、（iii）三阶段训练流程和（iv）多语言多模态清洗语料库，赋予其视觉能力。除了传统的图像描述和问答，我们通过对齐图像-标题-框元组，实现了Qwen-VL的定位和文本阅读能力。最终模型，包括Qwen-VL和Qwen-VL-Chat，在多种视觉中心基准测试（如图像描述、问答、视觉定位）和不同设置（如零样本、少样本）下，在相似模型规模中创下了通用模型的新纪录。此外，在真实世界对话基准测试中，我们经过指令微调的Qwen-VL-Chat也展现出优于现有视觉语言聊天机器人的性能。代码、演示和模型可在https://github.com/QwenLM/Qwen-VL获取。", "insights": {"contrib": [{"en": "Introduced Qwen-VL series, large-scale vision-language models with fine-grained understanding, grounding, and text-reading.", "zh": "提出Qwen-VL系列，大规模视觉语言模型，具备细粒度理解、定位和文本读取能力。"}, {"en": "Designed a 3-stage training pipeline with a visual receptor, input-output interface, and multilingual cleaned corpus.", "zh": "设计了包含视觉受体、输入输出接口和多语言清洗语料的三阶段训练流程。"}, {"en": "Achieved state-of-the-art results on image captioning, VQA, visual grounding, and text-oriented benchmarks.", "zh": "在图像描述、视觉问答、视觉定位和文本导向基准上取得最先进结果。"}, {"en": "Demonstrated strong few-shot and zero-shot performance, comparable to larger models like Flamingo-80B.", "zh": "展示了强大的少样本和零样本性能，与Flamingo-80B等更大模型相当。"}, {"en": "Qwen-VL-Chat outperformed existing chatbots on real-world dialog benchmarks like TouchStone and MME.", "zh": "Qwen-VL-Chat在TouchStone和MME等真实对话基准上优于现有聊天机器人。"}, {"en": "Released open-source models supporting multilingual, multi-image, and fine-grained visual understanding.", "zh": "发布开源模型，支持多语言、多图像和细粒度视觉理解。"}], "limits": [{"en": "Limited to 7B parameter scale; larger models may yield better performance.", "zh": "限于7B参数规模；更大模型可能获得更好性能。"}, {"en": "Visual encoder resolution capped at 448x448; higher resolutions could improve fine-grained tasks.", "zh": "视觉编码器分辨率上限为448x448；更高分辨率可提升细粒度任务。"}, {"en": "Training data primarily English and Chinese; performance on other languages may be limited.", "zh": "训练数据主要为英文和中文；其他语言性能可能受限。"}, {"en": "No integration with other modalities like speech or video; future work needed.", "zh": "未集成语音或视频等其他模态；需要未来工作。"}, {"en": "Instruction tuning data size (350k) relatively small; larger datasets could enhance dialogue ability.", "zh": "指令微调数据量（35万）相对较小；更大数据集可增强对话能力。"}]}, "cites": 2139}, {"id": "abrohan-2307.15818", "pid": "abrohan", "arxiv": "2307.15818", "date": "2023-07-28", "venue": "cs.RO", "org": "Google DeepMind", "fields": ["deep-learning", "vision"], "tEn": "RT-2: Vision-Language-Action Models Transfer Web Knowledge to Robotic Control", "tZh": "RT-2：视觉-语言-动作模型将网络知识迁移至机器人控制", "sEn": "RT-2 integrates web-scale vision-language models into robotic control, enabling emergent semantic reasoning and generalization.", "sZh": "RT-2将网络规模的视觉-语言模型融入机器人控制，实现了涌现的语义推理和泛化能力。", "absEn": "We study how vision-language models trained on Internet-scale data can be incorporated directly into end-to-end robotic control to boost generalization and enable emergent semantic reasoning. Our goal is to enable a single end-to-end trained model to both learn to map robot observations to actions and enjoy the benefits of large-scale pretraining on language and vision-language data from the web. To this end, we propose to co-fine-tune state-of-the-art vision-language models on both robotic trajectory data and Internet-scale vision-language tasks, such as visual question answering. In contrast to other approaches, we propose a simple, general recipe to achieve this goal: in order to fit both natural language responses and robotic actions into the same format, we express the actions as text tokens and incorporate them directly into the training set of the model in the same way as natural language tokens. We refer to such category of models as vision-language-action models (VLA) and instantiate an example of such a model, which we call RT-2. Our extensive evaluation (6k evaluation trials) shows that our approach leads to performant robotic policies and enables RT-2 to obtain a range of emergent capabilities from Internet-scale training. This includes significantly improved generalization to novel objects, the ability to interpret commands not present in the robot training data (such as placing an object onto a particular number or icon), and the ability to perform rudimentary reasoning in response to user commands (such as picking up the smallest or largest object, or the one closest to another object). We further show that incorporating chain of thought reasoning allows RT-2 to perform multi-stage semantic reasoning, for example figuring out which object to pick up for use as an improvised hammer (a rock), or which type of drink is best suited for someone who is tired (an energy drink).", "absZh": "我们研究了如何将基于互联网规模数据训练的视觉-语言模型直接融入端到端机器人控制，以提升泛化能力并实现涌现的语义推理。我们的目标是让单个端到端训练的模型既能学习将机器人观测映射到动作，又能受益于来自网络的语音和视觉-语言数据的大规模预训练。为此，我们提出在机器人轨迹数据和互联网规模的视觉-语言任务（如视觉问答）上共同微调最先进的视觉-语言模型。与其他方法不同，我们提出了一个简单通用的方案：为了将自然语言响应和机器人动作适配到同一格式，我们将动作表示为文本标记，并像自然语言标记一样直接将其纳入模型的训练集。我们将这类模型称为视觉-语言-动作模型（VLA），并实例化了一个名为RT-2的模型。我们的广泛评估（6000次评估试验）表明，我们的方法产生了高性能的机器人策略，并使RT-2从互联网规模训练中获得了一系列涌现能力。这包括对新颖物体的显著改进的泛化能力，解释机器人训练数据中未出现的命令的能力（例如将物体放置在特定数字或图标上），以及根据用户命令执行基本推理的能力（例如拿起最小或最大的物体，或最接近另一个物体的物体）。我们进一步表明，结合思维链推理使RT-2能够执行多阶段语义推理，例如找出哪个物体适合用作临时锤子（岩石），或者哪种饮料最适合疲倦的人（能量饮料）。", "insights": {"contrib": [{"en": "Proposes vision-language-action (VLA) models that co-fine-tune VLMs on robotic trajectory data and web-scale vision-language tasks.", "zh": "提出视觉-语言-动作（VLA）模型，在机器人轨迹数据和网络规模的视觉-语言任务上共同微调视觉-语言模型。"}, {"en": "Introduces RT-2, a family of VLA models derived from PaLI-X and PaLM-E, with up to 55B parameters.", "zh": "引入RT-2，一个源自PaLI-X和PaLM-E的VLA模型系列，参数高达550亿。"}, {"en": "Demonstrates that representing robot actions as text tokens enables direct fine-tuning of VLMs for robotic control.", "zh": "证明将机器人动作表示为文本标记可直接微调视觉-语言模型用于机器人控制。"}, {"en": "Shows significant improvements in generalization to novel objects, scenes, and instructions via web-scale pretraining transfer.", "zh": "通过网络规模预训练迁移，展示了对新物体、场景和指令的显著泛化改进。"}, {"en": "Reveals emergent capabilities including symbol understanding, reasoning, and human recognition from vision-language pretraining.", "zh": "揭示了从视觉-语言预训练中涌现的能力，包括符号理解、推理和人类识别。"}, {"en": "Demonstrates chain-of-thought reasoning in VLA models for multi-stage semantic reasoning tasks.", "zh": "展示了VLA模型中的思维链推理，用于多阶段语义推理任务。"}], "limits": [{"en": "Physical skills are limited to the distribution of skills seen in robot data; no new motions from web data.", "zh": "物理技能局限于机器人数据中见过的技能分布；网络数据不带来新动作。"}, {"en": "High computational cost of large VLA models may hinder real-time control at high frequencies.", "zh": "大型VLA模型的高计算成本可能阻碍高频实时控制。"}, {"en": "Limited availability of open-source VLM models suitable for building VLA models.", "zh": "适合构建VLA模型的开源视觉-语言模型数量有限。"}, {"en": "Evaluation is confined to a specific robot platform and kitchen environment, limiting generality.", "zh": "评估局限于特定机器人平台和厨房环境，限制了通用性。"}, {"en": "Co-fine-tuning requires balancing robot and web data, which may be dataset-dependent.", "zh": "共同微调需要平衡机器人和网络数据，这可能依赖于数据集。"}]}, "cites": 3336}, {"id": "furuwei-2307.08621", "pid": "furuwei", "arxiv": "2307.08621", "date": "2023-07-17", "venue": "cs.CL", "org": "Microsoft Research Asia", "fields": ["deep-learning", "efficiency"], "tEn": "Retentive Network: A Successor to Transformer for Large Language Models", "tZh": "Retentive Network：大型语言模型中Transformer的继任者", "sEn": "RetNet achieves training parallelism, low-cost O(1) inference, and good performance, making it a strong successor to Transformer for large language models.", "sZh": "RetNet实现了训练并行性、低成本O(1)推理和良好性能，成为大型语言模型中Transformer的有力继任者。", "absEn": "In this work, we propose Retentive Network (RetNet) as a foundation architecture for large language models, simultaneously achieving training parallelism, low-cost inference, and good performance. We theoretically derive the connection between recurrence and attention. Then we propose the retention mechanism for sequence modeling, which supports three computation paradigms, i.e., parallel, recurrent, and chunkwise recurrent. Specifically, the parallel representation allows for training parallelism. The recurrent representation enables low-cost $O(1)$ inference, which improves decoding throughput, latency, and GPU memory without sacrificing performance. The chunkwise recurrent representation facilitates efficient long-sequence modeling with linear complexity, where each chunk is encoded parallelly while recurrently summarizing the chunks. Experimental results on language modeling show that RetNet achieves favorable scaling results, parallel training, low-cost deployment, and efficient inference. The intriguing properties make RetNet a strong successor to Transformer for large language models. Code will be available at https://aka.ms/retnet.", "absZh": "在这项工作中，我们提出Retentive Network（RetNet）作为大型语言模型的基础架构，同时实现了训练并行性、低成本推理和良好性能。我们从理论上推导了循环和注意力之间的联系。然后，我们提出了用于序列建模的保留机制，该机制支持三种计算范式，即并行、循环和分块循环。具体来说，并行表示允许训练并行性。循环表示实现了低成本的O(1)推理，在不牺牲性能的情况下提高了解码吞吐量、延迟和GPU内存。分块循环表示以线性复杂度实现高效的长序列建模，其中每个块并行编码，同时循环汇总块。语言建模的实验结果表明，RetNet实现了良好的扩展结果、并行训练、低成本部署和高效推理。这些有趣的特性使RetNet成为大型语言模型中Transformer的有力继任者。代码将在https://aka.ms/retnet提供。", "insights": {"contrib": [{"en": "Proposes Retentive Network (RetNet) as a foundation architecture for large language models, achieving training parallelism, low-cost inference, and good performance.", "zh": "提出Retentive Network（RetNet）作为大型语言模型的基础架构，同时实现训练并行性、低成本推理和良好性能。"}, {"en": "Introduces a multi-scale retention mechanism with three computation paradigms: parallel, recurrent, and chunkwise recurrent.", "zh": "引入多尺度保留机制，支持并行、循环和分块循环三种计算范式。"}, {"en": "Theoretically derives the connection between recurrence and attention, enabling dual-form sequence modeling.", "zh": "从理论上推导了循环与注意力机制之间的联系，实现了双形式序列建模。"}, {"en": "Demonstrates O(1) inference complexity, significantly reducing memory and latency compared to Transformers.", "zh": "展示了O(1)推理复杂度，与Transformer相比显著降低内存和延迟。"}, {"en": "Achieves competitive language modeling performance and favorable scaling results across model sizes.", "zh": "在语言建模中取得有竞争力的性能，并在不同模型规模下呈现良好的缩放结果。"}, {"en": "Provides efficient long-sequence modeling via chunkwise recurrent representation with linear complexity.", "zh": "通过线性复杂度的分块循环表示实现高效的长序列建模。"}], "limits": [{"en": "RetNet's training efficiency relies on chunkwise recurrent representation, which may require careful tuning of chunk size.", "zh": "RetNet的训练效率依赖于分块循环表示，可能需要仔细调整块大小。"}, {"en": "The retention mechanism uses complex-valued operations, potentially increasing implementation complexity.", "zh": "保留机制使用复数运算，可能增加实现复杂度。"}, {"en": "Performance gains over Transformers are more pronounced at larger model sizes; smaller models may not benefit as much.", "zh": "与Transformer相比，性能提升在较大模型规模时更显著；较小模型可能获益较少。"}, {"en": "The study does not explore scaling beyond 6.7B parameters or training beyond 100B tokens.", "zh": "研究未探索超过6.7B参数或100B token的训练规模。"}, {"en": "RetNet's inference speed advantage is demonstrated on specific hardware; generalization to other platforms may vary.", "zh": "RetNet的推理速度优势在特定硬件上展示；推广到其他平台可能有所不同。"}]}, "cites": 696}, {"id": "dieterfox-2306.14896", "pid": "dieterfox", "arxiv": "2306.14896", "date": "2023-06-26", "venue": "cs.RO", "org": "NVIDIA", "fields": ["vision", "deep-learning"], "tEn": "RVT: Robotic View Transformer for 3D Object Manipulation", "tZh": "RVT：用于3D物体操作的机器人视角变换器", "sEn": "RVT achieves 26% higher success than state-of-the-art, trains 36x faster, and works across 18 tasks with few real-world demos.", "sZh": "RVT比现有最优方法成功率提高26%，训练速度快36倍，仅需少量真实演示即可完成18种任务。", "absEn": "For 3D object manipulation, methods that build an explicit 3D representation perform better than those relying only on camera images. But using explicit 3D representations like voxels comes at large computing cost, adversely affecting scalability. In this work, we propose RVT, a multi-view transformer for 3D manipulation that is both scalable and accurate. Some key features of RVT are an attention mechanism to aggregate information across views and re-rendering of the camera input from virtual views around the robot workspace. In simulations, we find that a single RVT model works well across 18 RLBench tasks with 249 task variations, achieving 26% higher relative success than the existing state-of-the-art method (PerAct). It also trains 36X faster than PerAct for achieving the same performance and achieves 2.3X the inference speed of PerAct. Further, RVT can perform a variety of manipulation tasks in the real world with just a few ($\\sim$10) demonstrations per task. Visual results, code, and trained model are provided at https://robotic-view-transformer.github.io/.", "absZh": "对于3D物体操作，构建显式3D表示的方法比仅依赖相机图像的方法表现更好。但使用体素等显式3D表示会带来巨大的计算成本，影响可扩展性。在这项工作中，我们提出了RVT，一种用于3D操作的多视角变换器，兼具可扩展性和准确性。RVT的关键特性包括一种跨视角聚合信息的注意力机制，以及从机器人工作空间周围的虚拟视角重新渲染相机输入。在仿真中，我们发现单个RVT模型在18个RLBench任务（含249个任务变体）上表现良好，相对成功率比现有最先进方法（PerAct）高出26%。在达到相同性能的情况下，其训练速度比PerAct快36倍，推理速度是PerAct的2.3倍。此外，RVT在现实世界中仅需每个任务少量（约10个）演示即可执行多种操作任务。视觉结果、代码和训练模型可在https://robotic-view-transformer.github.io/获取。", "insights": {"contrib": [{"en": "Proposes RVT, a multi-view transformer for 3D object manipulation that is both scalable and accurate.", "zh": "提出RVT，一种用于3D物体操作的多视角Transformer，兼具可扩展性和准确性。"}, {"en": "Achieves 26% higher relative success than PerAct on 18 RLBench tasks with 249 variations.", "zh": "在18个RLBench任务（249种变体）上，相对成功率比PerAct高26%。"}, {"en": "Trains 36X faster and achieves 2.3X inference speed compared to PerAct.", "zh": "训练速度比PerAct快36倍，推理速度快2.3倍。"}, {"en": "Demonstrates real-world manipulation with only ~10 demonstrations per task.", "zh": "在真实世界中，每个任务仅需约10次演示即可完成操作。"}, {"en": "Introduces re-rendering from virtual views to decouple sensor images from transformer input.", "zh": "引入从虚拟视角重新渲染，将传感器图像与Transformer输入解耦。"}, {"en": "Investigates design choices like separate processing of image tokens before joint attention.", "zh": "研究了设计选择，例如在联合注意力之前单独处理图像令牌。"}], "limits": [{"en": "Requires calibration of camera-to-robot extrinsics, limiting portability.", "zh": "需要标定相机到机器人的外参，限制了可移植性。"}, {"en": "Struggles with sparse or noisy point clouds, e.g., marker tasks.", "zh": "在稀疏或噪声点云（如标记任务）上表现不佳。"}, {"en": "View specification is manually chosen and not optimized or learned from data.", "zh": "视角规格是手动选择的，未从数据中优化或学习。"}, {"en": "Evaluated only on a limited set of 5 real-world tasks with 51 demonstrations.", "zh": "仅在5个真实世界任务（51次演示）的有限集合上评估。"}, {"en": "Assumes a low-level motion planner and controller for action execution.", "zh": "假设存在低级运动规划器和控制器来执行动作。"}]}, "cites": 279}, {"id": "adefossez-2306.05284", "pid": "adefossez", "arxiv": "2306.05284", "date": "2023-06-08", "venue": "cs.SD", "org": "Meta AI (FAIR)", "fields": ["deep-learning", "generative"], "tEn": "Simple and Controllable Music Generation", "tZh": "简单可控的音乐生成", "sEn": "MusicGen is a single-stage language model that generates high-quality music from text or melody, outperforming baselines.", "sZh": "MusicGen 是一个单阶段语言模型，能从文本或旋律生成高质量音乐，性能优于基线模型。", "absEn": "We tackle the task of conditional music generation. We introduce MusicGen, a single Language Model (LM) that operates over several streams of compressed discrete music representation, i.e., tokens. Unlike prior work, MusicGen is comprised of a single-stage transformer LM together with efficient token interleaving patterns, which eliminates the need for cascading several models, e.g., hierarchically or upsampling. Following this approach, we demonstrate how MusicGen can generate high-quality samples, both mono and stereo, while being conditioned on textual description or melodic features, allowing better controls over the generated output. We conduct extensive empirical evaluation, considering both automatic and human studies, showing the proposed approach is superior to the evaluated baselines on a standard text-to-music benchmark. Through ablation studies, we shed light over the importance of each of the components comprising MusicGen. Music samples, code, and models are available at https://github.com/facebookresearch/audiocraft", "absZh": "我们解决了条件音乐生成的任务。我们引入了 MusicGen，这是一个单一的语言模型（LM），它处理多个压缩离散音乐表示流，即 token。与先前的工作不同，MusicGen 由一个单阶段 transformer LM 和高效的 token 交错模式组成，从而消除了级联多个模型（例如分层或上采样）的需要。通过这种方法，我们展示了 MusicGen 如何生成高质量的样本，包括单声道和立体声，同时以文本描述或旋律特征为条件，从而更好地控制生成的输出。我们进行了广泛的实证评估，包括自动和人工研究，表明所提出的方法在标准文本到音乐基准测试中优于评估的基线。通过消融研究，我们揭示了 MusicGen 每个组成部分的重要性。音乐样本、代码和模型可在 https://github.com/facebookresearch/audiocraft 获取。", "insights": {"contrib": [{"en": "Introduces MusicGen, a single-stage transformer LM with efficient token interleaving patterns for high-quality music generation.", "zh": "提出MusicGen，一种单阶段Transformer语言模型，结合高效词元交错模式，用于高质量音乐生成。"}, {"en": "Demonstrates text and melody conditioning in a single model, enabling better control over generated music.", "zh": "在单一模型中实现文本与旋律条件控制，增强对生成音乐的控制能力。"}, {"en": "Proposes a general framework for modeling multiple parallel streams of acoustic tokens via codebook interleaving patterns.", "zh": "提出通过码本交错模式建模多并行声学词元流的通用框架。"}, {"en": "Extends generation to stereo audio without extra computational cost using codebook patterns.", "zh": "利用码本模式将生成扩展到立体声音频，且不增加额外计算成本。"}, {"en": "Achieves superior performance over baselines on MusicCaps benchmark in human evaluation.", "zh": "在MusicCaps基准上的人类评估中，性能优于基线方法。"}, {"en": "Provides extensive ablation studies on codebook patterns, model sizes, and conditioning methods.", "zh": "对码本模式、模型规模和条件方法进行了广泛的消融研究。"}], "limits": [{"en": "Lacks fine-grained control over generation adherence to conditioning, relying mostly on classifier-free guidance.", "zh": "缺乏对生成结果与条件一致性的精细控制，主要依赖无分类器引导。"}, {"en": "Melody conditioning uses unsupervised chromagram, which may not capture complex harmonic structures.", "zh": "旋律条件使用无监督色度图，可能无法捕捉复杂的和声结构。"}, {"en": "Training data is limited to licensed music with potential lack of diversity, e.g., overrepresentation of Western music.", "zh": "训练数据仅限于授权音乐，可能存在多样性不足，例如西方音乐占比过高。"}, {"en": "Model may memorize training examples, raising concerns about originality and copyright.", "zh": "模型可能记忆训练样本，引发原创性和版权方面的担忧。"}, {"en": "Evaluation on MusicCaps may be biased due to noisy samples in the dataset.", "zh": "在MusicCaps上的评估可能因数据集中的噪声样本而产生偏差。"}]}, "cites": 714}, {"id": "hlightman-2305.20050", "pid": "hlightman", "arxiv": "2305.20050", "date": "2023-05-31", "venue": "cs.LG", "org": "OpenAI", "fields": ["nlp", "rl"], "tEn": "Let's Verify Step by Step", "tZh": "让我们逐步验证", "sEn": "Process supervision significantly outperforms outcome supervision for training reliable large language models on complex math problems.", "sZh": "过程监督在训练可靠的大型语言模型解决复杂数学问题方面显著优于结果监督。", "absEn": "In recent years, large language models have greatly improved in their ability to perform complex multi-step reasoning. However, even state-of-the-art models still regularly produce logical mistakes. To train more reliable models, we can turn either to outcome supervision, which provides feedback for a final result, or process supervision, which provides feedback for each intermediate reasoning step. Given the importance of training reliable models, and given the high cost of human feedback, it is important to carefully compare the both methods. Recent work has already begun this comparison, but many questions still remain. We conduct our own investigation, finding that process supervision significantly outperforms outcome supervision for training models to solve problems from the challenging MATH dataset. Our process-supervised model solves 78% of problems from a representative subset of the MATH test set. Additionally, we show that active learning significantly improves the efficacy of process supervision. To support related research, we also release PRM800K, the complete dataset of 800,000 step-level human feedback labels used to train our best reward model.", "absZh": "近年来，大型语言模型在执行复杂多步推理方面的能力有了很大提升。然而，即使是最先进的模型仍然经常产生逻辑错误。为了训练更可靠的模型，我们可以采用结果监督（对最终结果提供反馈）或过程监督（对每个中间推理步骤提供反馈）。考虑到训练可靠模型的重要性以及人工反馈的高昂成本，仔细比较这两种方法至关重要。近期已有研究开始进行这种比较，但仍有许多问题有待解答。我们进行了自己的调查，发现过程监督在训练模型解决具有挑战性的MATH数据集问题时显著优于结果监督。我们的过程监督模型在MATH测试集的一个代表性子集上解决了78%的问题。此外，我们还表明主动学习显著提高了过程监督的效果。为了支持相关研究，我们还发布了PRM800K，这是用于训练我们最佳奖励模型的完整数据集，包含80万个步骤级人工反馈标签。", "insights": {"contrib": [{"en": "Process supervision significantly outperforms outcome supervision for training reward models on the MATH dataset.", "zh": "过程监督在MATH数据集上训练奖励模型时显著优于结果监督。"}, {"en": "The process-supervised model achieves 78.2% accuracy on a representative subset of the MATH test set.", "zh": "过程监督模型在MATH测试集的代表性子集上达到78.2%的准确率。"}, {"en": "Active learning improves data efficiency of process supervision by 2.6 times.", "zh": "主动学习将过程监督的数据效率提高了2.6倍。"}, {"en": "Release of PRM800K, a dataset of 800,000 step-level human feedback labels.", "zh": "发布了PRM800K数据集，包含80万个步骤级人类反馈标签。"}, {"en": "Large-scale PRM can supervise smaller models, enabling efficient ablations.", "zh": "大规模PRM可监督较小模型，实现高效消融实验。"}, {"en": "Process supervision incurs a negative alignment tax, improving both performance and alignment.", "zh": "过程监督产生负对齐税，同时提升性能和对齐。"}], "limits": [{"en": "Results are limited to mathematical reasoning; generalization to other domains is unknown.", "zh": "结果仅限于数学推理；对其他领域的泛化性未知。"}, {"en": "Potential test set contamination from MATH problems in pretraining data.", "zh": "预训练数据中可能存在MATH问题的测试集污染。"}, {"en": "Active learning with iterative retraining showed instability and no improvement.", "zh": "迭代重训练的主动学习出现不稳定性且无改进。"}, {"en": "Comparison at large scale is confounded by different training set sizes and selection biases.", "zh": "大规模比较受训练集大小和选择偏差的混淆。"}, {"en": "Process supervision relies on expensive human feedback for data collection.", "zh": "过程监督依赖昂贵的人类反馈进行数据收集。"}]}, "cites": 3656}, {"id": "rrafailov-2305.18290", "pid": "rrafailov", "arxiv": "2305.18290", "date": "2023-05-29", "venue": "cs.LG", "org": "Stanford", "fields": ["rl", "nlp"], "tEn": "Direct Preference Optimization: Your Language Model is Secretly a Reward Model", "tZh": "直接偏好优化：你的语言模型其实是一个奖励模型", "sEn": "DPO simplifies RLHF by directly optimizing the policy using a classification loss, eliminating the need for a separate reward model and reinforcement learning.", "sZh": "DPO通过分类损失直接优化策略，简化了RLHF，无需单独训练奖励模型和使用强化学习。", "absEn": "While large-scale unsupervised language models (LMs) learn broad world knowledge and some reasoning skills, achieving precise control of their behavior is difficult due to the completely unsupervised nature of their training. Existing methods for gaining such steerability collect human labels of the relative quality of model generations and fine-tune the unsupervised LM to align with these preferences, often with reinforcement learning from human feedback (RLHF). However, RLHF is a complex and often unstable procedure, first fitting a reward model that reflects the human preferences, and then fine-tuning the large unsupervised LM using reinforcement learning to maximize this estimated reward without drifting too far from the original model. In this paper we introduce a new parameterization of the reward model in RLHF that enables extraction of the corresponding optimal policy in closed form, allowing us to solve the standard RLHF problem with only a simple classification loss. The resulting algorithm, which we call Direct Preference Optimization (DPO), is stable, performant, and computationally lightweight, eliminating the need for sampling from the LM during fine-tuning or performing significant hyperparameter tuning. Our experiments show that DPO can fine-tune LMs to align with human preferences as well as or better than existing methods. Notably, fine-tuning with DPO exceeds PPO-based RLHF in ability to control sentiment of generations, and matches or improves response quality in summarization and single-turn dialogue while being substantially simpler to implement and train.", "absZh": "尽管大规模无监督语言模型（LM）学习了广泛的世界知识和一些推理技能，但由于其训练完全无监督，难以精确控制其行为。现有方法通过收集人类对模型生成质量的相对偏好标签，并微调无监督LM以符合这些偏好，通常使用基于人类反馈的强化学习（RLHF）。然而，RLHF是一个复杂且往往不稳定的过程，首先拟合一个反映人类偏好的奖励模型，然后使用强化学习微调大型无监督LM，以最大化这个估计的奖励，同时避免偏离原始模型太远。在本文中，我们引入了RLHF中奖励模型的一种新参数化方法，使得能够以封闭形式提取相应的最优策略，从而仅通过一个简单的分类损失就能解决标准的RLHF问题。由此产生的算法称为直接偏好优化（DPO），它稳定、高效且计算量轻，消除了在微调期间从LM采样或进行大量超参数调整的需要。我们的实验表明，DPO可以微调LM以符合人类偏好，其效果与现有方法相当或更好。值得注意的是，使用DPO进行微调在控制生成情感方面超过了基于PPO的RLHF，在摘要和单轮对话中匹配或提高了响应质量，同时实现和训练起来要简单得多。", "insights": {"contrib": [{"en": "Introduces Direct Preference Optimization (DPO), a simple RL-free algorithm for training language models from preferences.", "zh": "提出直接偏好优化（DPO），一种无需强化学习的简单算法，用于从偏好中训练语言模型。"}, {"en": "Derives a closed-form mapping between reward functions and optimal policies, enabling direct policy optimization.", "zh": "推导出奖励函数与最优策略之间的闭式映射，实现直接策略优化。"}, {"en": "Shows DPO optimizes the same objective as RLHF but with a simple binary cross-entropy loss, eliminating RL complexity.", "zh": "证明DPO优化与RLHF相同的目标，但使用简单的二元交叉熵损失，消除了强化学习的复杂性。"}, {"en": "Demonstrates DPO achieves better reward-KL tradeoff than PPO in controlled sentiment generation.", "zh": "在受控情感生成中，DPO实现了比PPO更好的奖励-KL权衡。"}, {"en": "Shows DPO matches or exceeds PPO-based RLHF in summarization and dialogue tasks with up to 6B parameter models.", "zh": "在摘要和对话任务中，DPO匹配或超越基于PPO的RLHF，模型参数高达6B。"}, {"en": "Provides theoretical justification that DPO's reward parameterization does not constrain the class of representable reward models.", "zh": "提供理论证明，DPO的奖励参数化不限制可表示奖励模型的类别。"}], "limits": [{"en": "DPO's out-of-distribution generalization compared to explicit reward learning requires further study.", "zh": "与显式奖励学习相比，DPO的分布外泛化需要进一步研究。"}, {"en": "Reward over-optimization in direct preference optimization setting is not fully understood.", "zh": "直接偏好优化中的奖励过度优化现象尚未完全理解。"}, {"en": "Evaluation of DPO is limited to models up to 6B parameters; scaling to larger models is future work.", "zh": "DPO的评估仅限于6B参数模型；扩展到更大模型是未来工作。"}, {"en": "GPT-4 win rates are sensitive to prompt design, affecting evaluation reliability.", "zh": "GPT-4的胜率对提示设计敏感，影响评估可靠性。"}, {"en": "DPO requires a reference policy and offline preference dataset, limiting online adaptation.", "zh": "DPO需要参考策略和离线偏好数据集，限制了在线适应能力。"}]}, "cites": 9323}, {"id": "jimfan-2305.16291", "pid": "jimfan", "arxiv": "2305.16291", "date": "2023-05-25", "venue": "cs.AI", "fields": ["rl"], "tEn": "Voyager: An Open-Ended Embodied Agent with Large Language Models", "tZh": "Voyager：基于大型语言模型的开放式具身智能体", "sEn": "Voyager is the first LLM-powered embodied lifelong learning agent in Minecraft that continuously explores, acquires skills, and makes discoveries without human intervention.", "sZh": "Voyager是首个由大型语言模型驱动的Minecraft具身终身学习智能体，无需人工干预即可持续探索、获取技能并做出新发现。", "absEn": "We introduce Voyager, the first LLM-powered embodied lifelong learning agent in Minecraft that continuously explores the world, acquires diverse skills, and makes novel discoveries without human intervention. Voyager consists of three key components: 1) an automatic curriculum that maximizes exploration, 2) an ever-growing skill library of executable code for storing and retrieving complex behaviors, and 3) a new iterative prompting mechanism that incorporates environment feedback, execution errors, and self-verification for program improvement. Voyager interacts with GPT-4 via blackbox queries, which bypasses the need for model parameter fine-tuning. The skills developed by Voyager are temporally extended, interpretable, and compositional, which compounds the agent's abilities rapidly and alleviates catastrophic forgetting. Empirically, Voyager shows strong in-context lifelong learning capability and exhibits exceptional proficiency in playing Minecraft. It obtains 3.3x more unique items, travels 2.3x longer distances, and unlocks key tech tree milestones up to 15.3x faster than prior SOTA. Voyager is able to utilize the learned skill library in a new Minecraft world to solve novel tasks from scratch, while other techniques struggle to generalize. We open-source our full codebase and prompts at https://voyager.minedojo.org/.", "absZh": "我们介绍了Voyager，这是首个在Minecraft中由大型语言模型驱动的具身终身学习智能体，它能够持续探索世界、获取多样技能，并在无需人工干预的情况下做出新颖发现。Voyager由三个关键组件构成：1）最大化探索的自动课程；2）不断增长的技能库，用于存储和检索可执行代码的复杂行为；3）一种新的迭代提示机制，结合环境反馈、执行错误和自验证来改进程序。Voyager通过黑盒查询与GPT-4交互，无需微调模型参数。Voyager开发的技能具有时间延展性、可解释性和组合性，这迅速增强了智能体的能力并减轻了灾难性遗忘。实验表明，Voyager展现出强大的上下文终身学习能力，并在玩Minecraft方面表现出色。它获得的独特物品数量是先前最先进方法的3.3倍，旅行距离是其2.3倍，解锁关键技术树里程碑的速度快达15.3倍。Voyager能够利用学到的技能库在新的Minecraft世界中从头解决新任务，而其他技术难以泛化。我们在https://voyager.minedojo.org/开源了完整的代码库和提示。", "insights": {"contrib": [{"en": "First LLM-powered embodied lifelong learning agent in Minecraft, exploring and acquiring skills without human intervention.", "zh": "首个由大语言模型驱动的具身终身学习智能体，在Minecraft中无需人工干预即可探索世界并获取技能。"}, {"en": "Automatic curriculum that maximizes exploration by proposing tasks based on agent state and progress.", "zh": "自动课程最大化探索，根据智能体状态和进展提出任务。"}, {"en": "Growing skill library of executable code for storing and retrieving complex, compositional behaviors.", "zh": "不断增长的技能库，存储和检索可执行代码的复杂组合行为。"}, {"en": "Iterative prompting mechanism using environment feedback, execution errors, and self-verification for code improvement.", "zh": "迭代提示机制，利用环境反馈、执行错误和自我验证改进代码。"}, {"en": "Outperforms prior SOTA: 3.3x more unique items, 2.3x longer distances, 15.3x faster tech tree milestones.", "zh": "超越先前最优：3.3倍独特物品、2.3倍移动距离、15.3倍更快解锁科技树里程碑。"}, {"en": "Zero-shot generalization to novel tasks in new worlds using learned skill library.", "zh": "零样本泛化到新世界中的新任务，利用已学技能库。"}], "limits": [{"en": "No visual perception; relies on text-only GPT-4 API, limiting spatial tasks.", "zh": "缺乏视觉感知，依赖纯文本GPT-4 API，限制空间任务。"}, {"en": "High cost of GPT-4 API; 15x more expensive than GPT-3.5.", "zh": "GPT-4 API成本高，比GPT-3.5贵15倍。"}, {"en": "Occasional failures in code generation and self-verification, e.g., hallucinating non-existent items.", "zh": "代码生成和自我验证偶尔失败，例如幻觉出不存在的物品。"}, {"en": "Automatic curriculum may propose unachievable tasks due to hallucinations.", "zh": "自动课程可能因幻觉提出无法完成的任务。"}, {"en": "Requires high-level Mineflayer API; not directly comparable to low-level pixel-based methods.", "zh": "需要高级Mineflayer API，无法直接与基于像素的低级方法比较。"}]}, "cites": 1836, "org": "NVIDIA"}, {"id": "jainslie-2305.13245", "pid": "jainslie", "arxiv": "2305.13245", "date": "2023-05-22", "venue": "cs.CL", "org": "Google", "fields": ["efficiency", "nlp"], "tEn": "GQA: Training Generalized Multi-Query Transformer Models from Multi-Head Checkpoints", "tZh": "GQA：从多头检查点训练通用多查询Transformer模型", "sEn": "Uptraining multi-head checkpoints to grouped-query attention achieves near multi-head quality with MQA-like speed.", "sZh": "通过微调将多头检查点转换为分组查询注意力，可在接近多头质量的同时获得类似多查询注意力的速度。", "absEn": "Multi-query attention (MQA), which only uses a single key-value head, drastically speeds up decoder inference. However, MQA can lead to quality degradation, and moreover it may not be desirable to train a separate model just for faster inference. We (1) propose a recipe for uptraining existing multi-head language model checkpoints into models with MQA using 5% of original pre-training compute, and (2) introduce grouped-query attention (GQA), a generalization of multi-query attention which uses an intermediate (more than one, less than number of query heads) number of key-value heads. We show that uptrained GQA achieves quality close to multi-head attention with comparable speed to MQA.", "absZh": "多查询注意力（MQA）仅使用单个键值头，大幅加速了解码器推理。然而，MQA可能导致质量下降，而且仅为加速推理而单独训练模型可能并不理想。我们（1）提出了一种方法，利用原始预训练计算的5%将现有的多头语言模型检查点微调为具有MQA的模型；（2）引入了分组查询注意力（GQA），这是多查询注意力的一种泛化，使用中间数量（多于一个，少于查询头数）的键值头。我们表明，微调后的GQA在质量上接近多头注意力，同时速度与MQA相当。", "insights": {"contrib": [{"en": "Proposes a recipe to uptrain multi-head language model checkpoints into multi-query attention models using only 5% of original pre-training compute.", "zh": "提出一种方法，仅用原始预训练算力的5%将多头语言模型检查点升级为多查询注意力模型。"}, {"en": "Introduces grouped-query attention (GQA), a generalization of multi-query attention with an intermediate number of key-value heads.", "zh": "引入分组查询注意力（GQA），这是多查询注意力的一种泛化，使用中间数量的键值头。"}, {"en": "Shows that uptrained GQA achieves quality close to multi-head attention while being almost as fast as multi-query attention.", "zh": "表明升级后的GQA在质量上接近多头注意力，同时速度几乎与多查询注意力相当。"}, {"en": "Demonstrates that mean-pooling key and value heads works better than other conversion methods for uptraining.", "zh": "证明在升级训练中，对键头和值头进行均值池化比其他转换方法效果更好。"}, {"en": "Provides empirical evaluation on summarization, translation, and question answering tasks.", "zh": "在摘要、翻译和问答任务上提供实证评估。"}, {"en": "Discusses the trade-off between quality and inference speed for large language models.", "zh": "讨论大型语言模型在质量和推理速度之间的权衡。"}], "limits": [{"en": "Evaluation relies on Rouge score for summarization, which is a flawed metric.", "zh": "摘要评估依赖Rouge分数，该指标存在缺陷。"}, {"en": "Does not compare XXL GQA model to a model trained from scratch due to limited computation.", "zh": "由于算力限制，未将XXL GQA模型与从头训练的模型进行比较。"}, {"en": "Only evaluates on encoder-decoder models, not decoder-only models.", "zh": "仅在编码器-解码器模型上评估，未涉及仅解码器模型。"}, {"en": "The quality trade-off may not generalize to longer sequences or other tasks.", "zh": "质量权衡可能无法推广到更长序列或其他任务。"}, {"en": "Uptraining recipe may not be optimal for all model architectures or sizes.", "zh": "升级训练方法可能并非对所有模型架构或规模最优。"}]}, "cites": 1533}, {"id": "czhou-2305.11206", "pid": "czhou", "arxiv": "2305.11206", "date": "2023-05-18", "venue": "cs.CL", "org": "Meta AI", "fields": ["nlp", "deep-learning"], "tEn": "LIMA: Less Is More for Alignment", "tZh": "LIMA：少即是多——对齐的简约之道", "sEn": "Almost all knowledge in large language models is learned during pretraining, and only limited instruction tuning data is necessary to teach models to produce high quality output.", "sZh": "大型语言模型中的几乎所有知识都是在预训练阶段学到的，只需有限的指令微调数据即可教会模型生成高质量输出。", "absEn": "Large language models are trained in two stages: (1) unsupervised pretraining from raw text, to learn general-purpose representations, and (2) large scale instruction tuning and reinforcement learning, to better align to end tasks and user preferences. We measure the relative importance of these two stages by training LIMA, a 65B parameter LLaMa language model fine-tuned with the standard supervised loss on only 1,000 carefully curated prompts and responses, without any reinforcement learning or human preference modeling. LIMA demonstrates remarkably strong performance, learning to follow specific response formats from only a handful of examples in the training data, including complex queries that range from planning trip itineraries to speculating about alternate history. Moreover, the model tends to generalize well to unseen tasks that did not appear in the training data. In a controlled human study, responses from LIMA are either equivalent or strictly preferred to GPT-4 in 43% of cases; this statistic is as high as 58% when compared to Bard and 65% versus DaVinci003, which was trained with human feedback. Taken together, these results strongly suggest that almost all knowledge in large language models is learned during pretraining, and only limited instruction tuning data is necessary to teach models to produce high quality output.", "absZh": "大型语言模型的训练分为两个阶段：（1）从原始文本进行无监督预训练，学习通用表示；（2）大规模指令微调和强化学习，以更好地对齐最终任务和用户偏好。我们通过训练LIMA来衡量这两个阶段的相对重要性。LIMA是一个65B参数的LLaMa语言模型，仅使用1000个精心挑选的提示和响应进行标准监督损失微调，未使用任何强化学习或人类偏好建模。LIMA表现出色，仅从训练数据中的少量示例就学会了遵循特定的响应格式，包括从规划旅行行程到推测替代历史等复杂查询。此外，该模型对训练数据中未出现的未见任务也具有良好的泛化能力。在受控人类研究中，LIMA的响应在43%的情况下与GPT-4相当或更受青睐；与Bard相比这一比例为58%，与经过人类反馈训练的DaVinci003相比则为65%。这些结果强烈表明，大型语言模型中的几乎所有知识都是在预训练阶段学到的，只需有限的指令微调数据即可教会模型生成高质量输出。", "insights": {"contrib": [{"en": "Shows that fine-tuning a 65B LLaMa on only 1,000 curated examples achieves strong alignment.", "zh": "表明仅用 1000 个精选示例微调 65B LLaMa 即可实现强对齐。"}, {"en": "Proposes the Superficial Alignment Hypothesis: knowledge is from pretraining, alignment learns style.", "zh": "提出浅层对齐假说：知识来自预训练，对齐学习风格。"}, {"en": "LIMA matches or beats GPT-4 in 43% of cases, and outperforms RLHF-trained DaVinci003.", "zh": "LIMA 在 43% 的案例中匹配或优于 GPT-4，并超越经 RLHF 训练的 DaVinci003。"}, {"en": "Demonstrates that scaling data quantity without diversity yields diminishing returns.", "zh": "表明不增加多样性的数据规模扩张收益递减。"}, {"en": "Shows multi-turn dialogue ability with only 30 additional dialogue chains.", "zh": "表明仅添加 30 条对话链即可具备多轮对话能力。"}, {"en": "Provides absolute evaluation: 88% of LIMA responses meet prompt requirements, 50% are excellent.", "zh": "提供绝对评估：LIMA 88% 的响应满足提示要求，50% 为优秀。"}], "limits": [{"en": "Manual curation of 1,000 examples is labor-intensive and hard to scale.", "zh": "手动策划 1000 个示例劳动密集且难以规模化。"}, {"en": "LIMA is less robust than production models; adversarial prompts can cause weak responses.", "zh": "LIMA 不如生产级模型鲁棒；对抗性提示可能导致弱响应。"}, {"en": "Limited to single-turn fine-tuning; multi-turn dialogue requires additional data.", "zh": "限于单轮微调；多轮对话需要额外数据。"}, {"en": "Safety performance is limited; implicit malicious intents may bypass safeguards.", "zh": "安全性能有限；隐含恶意意图可能绕过防护。"}, {"en": "Results may not generalize to other model sizes or architectures without further study.", "zh": "结果可能无法泛化到其他模型规模或架构，需进一步研究。"}]}, "cites": 1329}, {"id": "finn-2304.13705", "pid": "finn", "arxiv": "2304.13705", "date": "2023-04-23", "venue": "cs.RO", "org": "Stanford", "fields": ["rl", "vision"], "tEn": "Learning Fine-Grained Bimanual Manipulation with Low-Cost Hardware", "tZh": "利用低成本硬件学习精细双手操作", "sEn": "A low-cost system with imitation learning enables fine bimanual manipulation tasks with high success rates.", "sZh": "一种低成本系统通过模仿学习实现精细双手操作任务，成功率高达80-90%。", "absEn": "Fine manipulation tasks, such as threading cable ties or slotting a battery, are notoriously difficult for robots because they require precision, careful coordination of contact forces, and closed-loop visual feedback. Performing these tasks typically requires high-end robots, accurate sensors, or careful calibration, which can be expensive and difficult to set up. Can learning enable low-cost and imprecise hardware to perform these fine manipulation tasks? We present a low-cost system that performs end-to-end imitation learning directly from real demonstrations, collected with a custom teleoperation interface. Imitation learning, however, presents its own challenges, particularly in high-precision domains: errors in the policy can compound over time, and human demonstrations can be non-stationary. To address these challenges, we develop a simple yet novel algorithm, Action Chunking with Transformers (ACT), which learns a generative model over action sequences. ACT allows the robot to learn 6 difficult tasks in the real world, such as opening a translucent condiment cup and slotting a battery with 80-90% success, with only 10 minutes worth of demonstrations. Project website: https://tonyzhaozh.github.io/aloha/", "absZh": "精细操作任务，如穿扎带或插入电池，对机器人来说非常困难，因为它们需要精度、接触力的仔细协调以及闭环视觉反馈。执行这些任务通常需要高端机器人、精确传感器或仔细校准，这些可能昂贵且难以设置。学习能否使低成本且不精确的硬件执行这些精细操作任务？我们提出了一个低成本系统，该系统直接从真实演示中进行端到端模仿学习，这些演示是通过自定义遥操作界面收集的。然而，模仿学习本身也带来了挑战，特别是在高精度领域：策略中的误差会随时间累积，并且人类演示可能是不稳定的。为了解决这些挑战，我们开发了一种简单而新颖的算法——动作分块变换器（ACT），该算法学习动作序列上的生成模型。ACT使机器人能够在现实世界中学习6个困难任务，例如打开半透明调味杯和插入电池，成功率高达80-90%，仅需10分钟的演示。项目网站：https://tonyzhaozh.github.io/aloha/", "insights": {"contrib": [{"en": "A low-cost bimanual teleoperation system (ALOHA) for fine manipulation, built with off-the-shelf arms and 3D-printed parts.", "zh": "一个低成本的双臂遥操作系统（ALOHA），使用现成机械臂和3D打印部件构建，用于精细操作。"}, {"en": "Action Chunking with Transformers (ACT), a novel imitation learning algorithm that predicts action sequences to reduce compounding errors.", "zh": "基于Transformer的动作分块（ACT），一种新颖的模仿学习算法，通过预测动作序列减少复合误差。"}, {"en": "Temporal ensembling to smooth overlapping action chunks, improving motion smoothness without additional training.", "zh": "时间集成以平滑重叠的动作块，在不增加训练的情况下改善运动平滑性。"}, {"en": "Conditional VAE training to handle multi-modal human demonstrations, crucial for learning from noisy data.", "zh": "条件变分自编码器训练以处理多模态人类演示，对于从噪声数据中学习至关重要。"}, {"en": "Demonstrated 80-90% success on 6 real-world fine manipulation tasks with only 10 minutes of demonstrations.", "zh": "在6个真实世界精细操作任务上实现80-90%的成功率，仅需10分钟演示。"}, {"en": "Open-source hardware and software design for reproducibility and accessibility.", "zh": "开源硬件和软件设计，确保可复现性和可访问性。"}], "limits": [{"en": "Limited to tasks within the robot's payload (750g) and workspace (1.5m span).", "zh": "限于机器人有效载荷（750克）和工作空间（跨度1.5米）内的任务。"}, {"en": "Requires task-specific training from scratch; no generalization across tasks.", "zh": "需要针对每个任务从头训练；无法跨任务泛化。"}, {"en": "Performance degrades on low-contrast objects (e.g., black cable tie on black table).", "zh": "在低对比度物体（如黑色桌面上的黑色扎带）上性能下降。"}, {"en": "Action chunking with large chunk sizes reduces reactivity to sudden changes.", "zh": "大块大小的动作分块降低了对突发变化的反应能力。"}, {"en": "Teleoperation requires user skill; high-frequency control (50Hz) is necessary for precision.", "zh": "遥操作需要用户技能；高频控制（50Hz）对精度至关重要。"}]}, "cites": 1848}, {"id": "deyaopeng-2304.10592", "pid": "deyaopeng", "arxiv": "2304.10592", "date": "2023-04-20", "venue": "cs.CV", "org": "KAUST", "fields": ["vision", "nlp"], "tEn": "MiniGPT-4: Enhancing Vision-Language Understanding with Advanced Large Language Models", "tZh": "MiniGPT-4：利用先进大语言模型增强视觉语言理解", "sEn": "MiniGPT-4 aligns a frozen visual encoder with a frozen advanced LLM using one projection layer, achieving GPT-4-like multi-modal abilities.", "sZh": "MiniGPT-4通过一个投影层将冻结的视觉编码器与冻结的先进大语言模型对齐，实现了类似GPT-4的多模态能力。", "absEn": "The recent GPT-4 has demonstrated extraordinary multi-modal abilities, such as directly generating websites from handwritten text and identifying humorous elements within images. These features are rarely observed in previous vision-language models. However, the technical
