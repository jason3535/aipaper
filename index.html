iciency: 10M model achieves competitive 2.7%/6.3% WER.", "zh": "展示参数效率：10M参数模型达到2.7%/6.3%的竞争性词错误率。"}, {"en": "Studies effects of attention heads, kernel size, activation, and module placement.", "zh": "研究注意力头数、卷积核大小、激活函数和模块放置的影响。"}], "limits": [{"en": "Evaluation only on LibriSpeech; generalizability to other datasets unverified.", "zh": "仅在LibriSpeech上评估，未验证在其他数据集上的泛化性。"}, {"en": "Requires careful tuning of hyperparameters like kernel size and attention heads.", "zh": "需要仔细调整超参数，如卷积核大小和注意力头数。"}, {"en": "Performance with external language model may vary with LM quality.", "zh": "使用外部语言模型时的性能可能因语言模型质量而异。"}, {"en": "Computational cost of depthwise convolution may limit deployment on resource-constrained devices.", "zh": "深度可分离卷积的计算成本可能限制在资源受限设备上的部署。"}, {"en": "Study limited to speech recognition; applicability to other domains not explored.", "zh": "研究仅限于语音识别，未探索在其他领域的适用性。"}]}}, {"id": "izbeltagy-2004.05150", "pid": "izbeltagy", "arxiv": "2004.05150", "date": "2020-04-10", "venue": "cs.CL", "org": "Allen Institute for AI", "fields": ["nlp", "efficiency"], "tEn": "Longformer: The Long-Document Transformer", "tZh": "Longformer: 长文档Transformer", "sEn": "Longformer introduces a linear-scaling attention mechanism for processing long documents, achieving state-of-the-art results on multiple tasks.", "sZh": "Longformer提出了一种线性扩展的注意力机制，用于处理长文档，在多项任务上取得了最先进的结果。", "absEn": "Transformer-based models are unable to process long sequences due to their self-attention operation, which scales quadratically with the sequence length. To address this limitation, we introduce the Longformer with an attention mechanism that scales linearly with sequence length, making it easy to process documents of thousands of tokens or longer. Longformer's attention mechanism is a drop-in replacement for the standard self-attention and combines a local windowed attention with a task motivated global attention. Following prior work on long-sequence transformers, we evaluate Longformer on character-level language modeling and achieve state-of-the-art results on text8 and enwik8. In contrast to most prior work, we also pretrain Longformer and finetune it on a variety of downstream tasks. Our pretrained Longformer consistently outperforms RoBERTa on long document tasks and sets new state-of-the-art results on WikiHop and TriviaQA. We finally introduce the Longformer-Encoder-Decoder (LED), a Longformer variant for supporting long document generative sequence-to-sequence tasks, and demonstrate its effectiveness on the arXiv summarization dataset.", "absZh": "基于Transformer的模型由于自注意力操作的计算量随序列长度呈二次方增长，因此无法处理长序列。为了解决这一限制，我们提出了Longformer，其注意力机制的计算量随序列长度线性增长，使得处理数千个或更长令牌的文档变得容易。Longformer的注意力机制是标准自注意力的直接替代品，它结合了局部窗口注意力和任务驱动的全局注意力。遵循先前关于长序列Transformer的工作，我们在字符级语言建模上评估了Longformer，并在text8和enwik8上取得了最先进的结果。与大多数先前工作不同，我们还对Longformer进行了预训练，并在各种下游任务上进行了微调。我们的预训练Longformer在长文档任务上始终优于RoBERTa，并在WikiHop和TriviaQA上创造了新的最先进结果。最后，我们介绍了Longformer-Encoder-Decoder（LED），这是Longformer的一个变体，用于支持长文档生成式序列到序列任务，并在arXiv摘要数据集上证明了其有效性。", "insights": {"contrib": [{"en": "Introduces Longformer with linear-scaling attention for long documents.", "zh": "提出Longformer，其注意力机制线性缩放，适用于长文档处理。"}, {"en": "Combines local windowed attention with task-specific global attention.", "zh": "结合局部窗口注意力和任务驱动的全局注意力。"}, {"en": "Achieves state-of-the-art on text8 and enwik8 character-level language modeling.", "zh": "在text8和enwik8字符级语言建模上达到最优结果。"}, {"en": "Pretrains Longformer and fine-tunes on downstream tasks, outperforming RoBERTa on long documents.", "zh": "预训练Longformer并在下游任务微调，长文档任务上超越RoBERTa。"}, {"en": "Sets new state-of-the-art on WikiHop and TriviaQA.", "zh": "在WikiHop和TriviaQA上取得新最优结果。"}, {"en": "Introduces Longformer-Encoder-Decoder (LED) for long-document seq2seq tasks.", "zh": "提出Longformer编码器-解码器（LED），用于长文档序列到序列任务。"}], "limits": [{"en": "Attention pattern requires task-specific global attention configuration.", "zh": "注意力模式需要针对任务配置全局注意力。"}, {"en": "Pretraining from RoBERTa checkpoint may limit adaptation to new patterns.", "zh": "从RoBERTa检查点预训练可能限制对新模式的适应。"}, {"en": "Dilated attention not compatible with pretrained RoBERTa weights.", "zh": "膨胀注意力与预训练RoBERTa权重不兼容。"}, {"en": "Performance on short documents similar to baselines, limited gain.", "zh": "短文档上性能与基线相似，提升有限。"}, {"en": "Custom CUDA kernel implementation complexity for dilated attention.", "zh": "膨胀注意力的自定义CUDA内核实现复杂。"}]}, "cites": 5593}, {"id": "kevinclarknlp-2003.10555", "pid": "kevinclarknlp", "arxiv": "2003.10555", "date": "2020-03-23", "venue": "cs.CL", "org": "Stanford University / Google Brain", "fields": ["nlp", "efficiency"], "tEn": "ELECTRA: Pre-training Text Encoders as Discriminators Rather Than Generators", "tZh": "ELECTRA：将文本编码器预训练为判别器而非生成器", "sEn": "ELECTRA proposes a more sample-efficient pre-training task called replaced token detection, outperforming BERT and matching RoBERTa/XLNet with less compute.", "sZh": "ELECTRA提出了一种更高效的预训练任务——替换令牌检测，在相同计算量下优于BERT，并以少于1/4的计算量达到RoBERTa和XLNet的性能。", "absEn": "Masked language modeling (MLM) pre-training methods such as BERT corrupt the input by replacing some tokens with [MASK] and then train a model to reconstruct the original tokens. While they produce good results when transferred to downstream NLP tasks, they generally require large amounts of compute to be effective. As an alternative, we propose a more sample-efficient pre-training task called replaced token detection. Instead of masking the input, our approach corrupts it by replacing some tokens with plausible alternatives sampled from a small generator network. Then, instead of training a model that predicts the original identities of the corrupted tokens, we train a discriminative model that predicts whether each token in the corrupted input was replaced by a generator sample or not. Thorough experiments demonstrate this new pre-training task is more efficient than MLM because the task is defined over all input tokens rather than just the small subset that was masked out. As a result, the contextual representations learned by our approach substantially outperform the ones learned by BERT given the same model size, data, and compute. The gains are particularly strong for small models; for example, we train a model on one GPU for 4 days that outperforms GPT (trained using 30x more compute) on the GLUE natural language understanding benchmark. Our approach also works well at scale, where it performs comparably to RoBERTa and XLNet while using less than 1/4 of their compute and outperforms them when using the same amount of compute.", "absZh": "掩码语言建模（MLM）预训练方法（如BERT）通过用[MASK]替换部分令牌来破坏输入，然后训练模型重建原始令牌。虽然这些方法在迁移到下游NLP任务时表现良好，但通常需要大量计算才能有效。作为替代，我们提出了一种更高效的预训练任务，称为替换令牌检测。我们的方法不是掩码输入，而是通过从小型生成器网络中采样合理的替代令牌来替换部分令牌，从而破坏输入。然后，我们不训练模型预测被破坏令牌的原始身份，而是训练一个判别模型，预测被破坏输入中的每个令牌是否被生成器样本替换。大量实验表明，这种新的预训练任务比MLM更高效，因为该任务定义在所有输入令牌上，而不仅仅是掩码掉的一小部分。因此，在相同模型大小、数据和计算量下，我们的方法学习到的上下文表示显著优于BERT。对于小模型，增益尤为显著；例如，我们在一个GPU上训练4天的模型，在GLUE自然语言理解基准测试中超越了使用30倍计算量训练的GPT。我们的方法在大规模下也表现良好，使用不到1/4的计算量即可与RoBERTa和XLNet相媲美，并在相同计算量下超越它们。", "insights": {"contrib": [{"en": "Proposes replaced token detection, a more sample-efficient pre-training task than masked language modeling.", "zh": "提出替换词检测，一种比掩码语言建模更高效的预训练任务。"}, {"en": "Trains a discriminative model on all input tokens, not just a masked subset, improving compute efficiency.", "zh": "对所有输入词元训练判别模型，而非仅掩码子集，提升计算效率。"}, {"en": "Demonstrates ELECTRA outperforms BERT, GPT, RoBERTa, and XLNet under same compute or model size.", "zh": "证明ELECTRA在相同算力或模型规模下优于BERT、GPT、RoBERTa和XLNet。"}, {"en": "Shows strong gains for small models, e.g., ELECTRA-Small beats GPT on GLUE with 30x less compute.", "zh": "小模型表现突出，如ELECTRA-Small在GLUE上以30倍更少算力超越GPT。"}, {"en": "Achieves state-of-the-art on SQuAD 2.0 with ELECTRA-Large while using less compute than prior methods.", "zh": "ELECTRA-Large在SQuAD 2.0上达到最优，且算力少于先前方法。"}, {"en": "Introduces weight sharing and smaller generators to further improve efficiency and performance.", "zh": "引入权重共享和更小生成器以进一步提升效率和性能。"}], "limits": [{"en": "Evaluation limited to English text; multilingual applicability not explored.", "zh": "评估仅限于英文文本，未探索多语言适用性。"}, {"en": "Generator trained with maximum likelihood, not adversarially, limiting potential gains.", "zh": "生成器使用最大似然训练而非对抗训练，限制了潜在收益。"}, {"en": "Two-stage training and adversarial training underperform joint training, showing limited improvement.", "zh": "两阶段训练和对抗训练不如联合训练，改进有限。"}, {"en": "Large-scale comparisons not fully apples-to-apples due to different training data and hyperparameters.", "zh": "大规模对比因训练数据和超参数不同而不完全公平。"}, {"en": "Parameter efficiency not fully explained; more analysis needed for complete understanding.", "zh": "参数效率未完全解释，需更多分析以全面理解。"}]}}, {"id": "xbresson-2003.00982", "pid": "xbresson", "arxiv": "2003.00982", "date": "2020-03-02", "venue": "cs.LG", "org": "NTU Singapore", "fields": ["deep-learning"], "tEn": "Benchmarking Graph Neural Networks", "tZh": "图神经网络基准测试", "sEn": "We present an updated benchmark for graph neural networks with a new molecular dataset and demonstrate its utility in exploring positional encoding.", "sZh": "我们提出了一个更新的图神经网络基准测试，包含一个新的分子数据集，并展示了其在探索位置编码方面的实用性。", "absEn": "In the last few years, graph neural networks (GNNs) have become the standard toolkit for analyzing and learning from data on graphs. This emerging field has witnessed an extensive growth of promising techniques that have been applied with success to computer science, mathematics, biology, physics and chemistry. But for any successful field to become mainstream and reliable, benchmarks must be developed to quantify progress. This led us in March 2020 to release a benchmark framework that i) comprises of a diverse collection of mathematical and real-world graphs, ii) enables fair model comparison with the same parameter budget to identify key architectures, iii) has an open-source, easy-to-use and reproducible code infrastructure, and iv) is flexible for researchers to experiment with new theoretical ideas. As of December 2022, the GitHub repository has reached 2,000 stars and 380 forks, which demonstrates the utility of the proposed open-source framework through the wide usage by the GNN community. In this paper, we present an updated version of our benchmark with a concise presentation of the aforementioned framework characteristics, an additional medium-sized molecular dataset AQSOL, similar to the popular ZINC, but with a real-world measured chemical target, and discuss how this framework can be leveraged to explore new GNN designs and insights. As a proof of value of our benchmark, we study the case of graph positional encoding (PE) in GNNs, which was introduced with this benchmark and has since spurred interest of exploring more powerful PE for Transformers and GNNs in a robust experimental setting.", "absZh": "在过去几年中，图神经网络（GNN）已成为分析和学习图数据的标准工具。这一新兴领域见证了大量有前景技术的广泛增长，这些技术已成功应用于计算机科学、数学、生物学、物理学和化学。但要使任何成功的领域成为主流并可靠，必须开发基准测试来量化进展。这促使我们在2020年3月发布了一个基准框架，该框架：i）包含多样化的数学和真实世界图集合，ii）在相同参数预算下实现公平模型比较以识别关键架构，iii）具有开源、易用且可复现的代码基础设施，iv）灵活支持研究人员实验新的理论想法。截至2022年12月，GitHub仓库已获得2000颗星和380个分支，这证明了所提出的开源框架通过GNN社区的广泛使用而具有实用性。在本文中，我们介绍了基准测试的更新版本，简洁地展示了上述框架特征，添加了一个类似于流行ZINC的中等规模分子数据集AQSOL，但具有真实世界测量的化学目标，并讨论了如何利用该框架探索新的GNN设计和见解。作为基准测试价值的证明，我们研究了GNN中的图位置编码（PE）案例，该案例随此基准测试引入，并已激发在稳健实验环境中探索更强大PE用于Transformer和GNN的兴趣。", "insights": {"contrib": [{"en": "Released an open-source GNN benchmarking framework with diverse datasets, fair comparison protocols, and modular code.", "zh": "发布了一个开源GNN基准测试框架，包含多样化数据集、公平比较协议和模块化代码。"}, {"en": "Added AQSOL, a medium-sized molecular dataset with real-world experimental solubility targets.", "zh": "新增AQSOL，一个具有真实实验溶解度目标的中等规模分子数据集。"}, {"en": "Demonstrated the framework's utility by studying graph positional encoding, spurring further research.", "zh": "通过研究图位置编码展示了框架的实用性，推动了进一步研究。"}, {"en": "Enabled fair model comparison with fixed parameter budgets of 100k and 500k.", "zh": "通过固定参数预算（10万和50万）实现了公平的模型比较。"}, {"en": "Provided 12 datasets covering graph, node, and edge-level tasks from diverse domains.", "zh": "提供了12个数据集，涵盖来自不同领域的图级、节点级和边级任务。"}, {"en": "Facilitated reproducible research with standardized training and evaluation pipelines.", "zh": "通过标准化的训练和评估流程促进了可重复研究。"}], "limits": [{"en": "Medium-scale datasets may not capture challenges of very large graphs.", "zh": "中等规模数据集可能无法捕捉超大图的挑战。"}, {"en": "Fixed parameter budgets limit exploration of optimal hyperparameters for each model.", "zh": "固定参数预算限制了对每个模型最优超参数的探索。"}, {"en": "WL-GNNs face scalability issues due to O(n^2)/O(n^3) complexity.", "zh": "WL-GNN因O(n²)/O(n³)复杂度面临可扩展性问题。"}, {"en": "Benchmark does not cover dynamic or temporal graph tasks.", "zh": "基准测试未涵盖动态或时序图任务。"}, {"en": "Results may not generalize to domains outside those represented in datasets.", "zh": "结果可能无法泛化到数据集所代表领域之外。"}]}, "cites": 1212}, {"id": "kaplan-2001.08361", "pid": "kaplan", "arxiv": "2001.08361", "date": "2020-01-23", "venue": "cs.LG", "fields": ["nlp"], "tEn": "Scaling Laws for Neural Language Models", "tZh": "神经语言模型的缩放定律", "sEn": "Language model performance scales as a power-law with model size, dataset size, and compute, enabling optimal compute-efficient training with very large models on modest data.", "sZh": "语言模型性能随模型大小、数据集大小和计算量呈幂律缩放，从而可以在适度的数据上训练非常大的模型，实现计算效率最优的训练。", "absEn": "We study empirical scaling laws for language model performance on the cross-entropy loss. The loss scales as a power-law with model size, dataset size, and the amount of compute used for training, with some trends spanning more than seven orders of magnitude. Other architectural details such as network width or depth have minimal effects within a wide range. Simple equations govern the dependence of overfitting on model/dataset size and the dependence of training speed on model size. These relationships allow us to determine the optimal allocation of a fixed compute budget. Larger models are significantly more sample-efficient, such that optimally compute-efficient training involves training very large models on a relatively modest amount of data and stopping significantly before convergence.", "absZh": "我们研究了语言模型在交叉熵损失上的经验缩放定律。损失随模型大小、数据集大小以及用于训练的计算量呈幂律缩放，某些趋势跨越了七个数量级以上。其他架构细节，如网络宽度或深度，在广泛范围内影响甚微。简单的方程控制了过拟合对模型/数据集大小的依赖性以及训练速度对模型大小的依赖性。这些关系使我们能够确定固定计算预算的最优分配。更大的模型在样本效率上显著更高，因此计算效率最优的训练涉及在相对适中的数据量上训练非常大的模型，并在显著收敛之前停止。", "insights": {"contrib": [{"en": "Language model cross-entropy loss follows power-law scaling with model size, dataset size, and compute over seven orders of magnitude.", "zh": "语言模型交叉熵损失随模型规模、数据集大小和算力呈幂律缩放，跨越七个数量级。"}, {"en": "Optimal compute-efficient training uses very large models trained on modest data, stopping before convergence.", "zh": "最优算力高效训练使用非常大的模型在适度数据上训练，并在收敛前停止。"}, {"en": "Performance depends weakly on architectural details like depth or width compared to scale factors.", "zh": "与规模因素相比，性能对深度或宽度等架构细节的依赖很弱。"}, {"en": "Overfitting and training speed are governed by simple equations relating model size and dataset size.", "zh": "过拟合和训练速度由模型大小和数据集大小的简单方程控制。"}, {"en": "Larger models are more sample-efficient, requiring fewer data points to reach the same loss.", "zh": "更大的模型样本效率更高，达到相同损失所需的数据点更少。"}, {"en": "The critical batch size for training follows a power-law in the loss, independent of model size.", "zh": "训练的关键批次大小随损失呈幂律变化，与模型大小无关。"}], "limits": [{"en": "Scaling laws may break down at extreme scales due to non-zero entropy of natural language.", "zh": "由于自然语言的非零熵，缩放定律可能在极端规模下失效。"}, {"en": "Results are based on Transformer architecture; may not generalize to other architectures.", "zh": "结果基于Transformer架构，可能不适用于其他架构。"}, {"en": "The study uses a single dataset (WebText2); transfer to other distributions incurs a constant loss penalty.", "zh": "研究使用单一数据集（WebText2）；迁移到其他分布会带来恒定的损失惩罚。"}, {"en": "Optimal compute allocation assumes fixed batch size and may not hold for varying hardware constraints.", "zh": "最优算力分配假设固定批次大小，可能不适用于变化的硬件约束。"}, {"en": "The power-law fits are empirical and lack a theoretical derivation from first principles.", "zh": "幂律拟合是经验性的，缺乏第一性原理的理论推导。"}]}, "cites": 8267, "org": "OpenAI"}, {"id": "tkarras-1912.04958", "pid": "tkarras", "arxiv": "1912.04958", "date": "2019-12-03", "venue": "cs.CV", "org": "NVIDIA", "fields": ["generative", "vision"], "tEn": "Analyzing and Improving the Image Quality of StyleGAN", "tZh": "分析并提升StyleGAN的图像质量", "sEn": "We analyze artifacts in StyleGAN and propose improvements to generator normalization, progressive growing, and regularization, achieving state-of-the-art unconditional image quality.", "sZh": "我们分析了StyleGAN中的特征伪影，并提出了生成器归一化、渐进式增长和正则化方面的改进，实现了无条件图像生成的最先进质量。", "absEn": "The style-based GAN architecture (StyleGAN) yields state-of-the-art results in data-driven unconditional generative image modeling. We expose and analyze several of its characteristic artifacts, and propose changes in both model architecture and training methods to address them. In particular, we redesign the generator normalization, revisit progressive growing, and regularize the generator to encourage good conditioning in the mapping from latent codes to images. In addition to improving image quality, this path length regularizer yields the additional benefit that the generator becomes significantly easier to invert. This makes it possible to reliably attribute a generated image to a particular network. We furthermore visualize how well the generator utilizes its output resolution, and identify a capacity problem, motivating us to train larger models for additional quality improvements. Overall, our improved model redefines the state of the art in unconditional image modeling, both in terms of existing distribution quality metrics as well as perceived image quality.", "absZh": "基于风格的生成对抗网络架构（StyleGAN）在数据驱动的无条件生成图像建模中取得了最先进的结果。我们揭示并分析了其若干特征伪影，并提出了模型架构和训练方法上的改进来解决这些问题。具体来说，我们重新设计了生成器归一化，重新审视了渐进式增长，并对生成器进行正则化以鼓励潜在代码到图像映射的良好条件。除了提高图像质量外，这种路径长度正则化还带来了额外的好处，即生成器变得更容易求逆。这使得能够可靠地将生成的图像归因于特定的网络。此外，我们可视化了生成器如何利用其输出分辨率，并识别出一个容量问题，促使我们训练更大的模型以进一步提高质量。总体而言，我们改进的模型在现有分布质量指标和感知图像质量方面重新定义了无条件图像建模的最先进水平。", "insights": {"contrib": [{"en": "Redesigns generator normalization to remove droplet artifacts via weight demodulation.", "zh": "重新设计生成器归一化，通过权重解调去除水滴伪影。"}, {"en": "Introduces path length regularizer to encourage smooth latent-to-image mapping, improving quality and invertibility.", "zh": "引入路径长度正则化器，促进潜在空间到图像的平滑映射，提升质量和可逆性。"}, {"en": "Replaces progressive growing with skip generator and residual discriminator, eliminating related artifacts.", "zh": "用跳跃生成器和残差判别器替代渐进式增长，消除相关伪影。"}, {"en": "Identifies capacity issue in high-resolution layers and increases feature maps to improve detail.", "zh": "识别高分辨率层的容量问题，增加特征图以改善细节。"}, {"en": "Proposes lazy regularization to reduce computational cost of regularizers without harming effectiveness.", "zh": "提出惰性正则化，在不影响效果的前提下降低正则化器的计算成本。"}, {"en": "Demonstrates improved source attribution via latent space projection with StyleGAN2.", "zh": "通过StyleGAN2的潜在空间投影，展示改进的源归属能力。"}], "limits": [{"en": "Path length regularizer introduces tradeoff between FID and PPL on less structured datasets.", "zh": "路径长度正则化器在结构较少的数据集上引入FID和PPL之间的权衡。"}, {"en": "Demodulation relies on statistical assumptions about signal, not actual feature map contents.", "zh": "解调依赖于信号的统计假设，而非实际特征图内容。"}, {"en": "FID and P&R metrics are biased towards texture over shape, potentially missing quality aspects.", "zh": "FID和P&R指标偏向纹理而非形状，可能遗漏质量方面。"}, {"en": "Increased capacity leads to higher computational cost and training time.", "zh": "增加容量导致更高的计算成本和训练时间。"}, {"en": "Method still requires large datasets for training, limiting applicability in data-scarce scenarios.", "zh": "方法仍需大数据集训练，限制了在数据稀缺场景下的适用性。"}]}, "cites": 7044}, {"id": "dhafner-1912.01603", "pid": "dhafner", "arxiv": "1912.01603", "date": "2019-12-03", "venue": "cs.LG", "org": "Google DeepMind", "fields": ["rl", "generative"], "tEn": "Dream to Control: Learning Behaviors by Latent Imagination", "tZh": "梦想控制：通过潜在想象学习行为", "sEn": "Dreamer learns behaviors by imagining future trajectories in a learned world model, achieving state-of-the-art performance on visual control tasks.", "sZh": "Dreamer通过在学到的世界模型中想象未来轨迹来学习行为，在视觉控制任务上达到了最先进的性能。", "absEn": "Learned world models summarize an agent's experience to facilitate learning complex behaviors. While learning world models from high-dimensional sensory inputs is becoming feasible through deep learning, there are many potential ways for deriving behaviors from them. We present Dreamer, a reinforcement learning agent that solves long-horizon tasks from images purely by latent imagination. We efficiently learn behaviors by propagating analytic gradients of learned state values back through trajectories imagined in the compact state space of a learned world model. On 20 challenging visual control tasks, Dreamer exceeds existing approaches in data-efficiency, computation time, and final performance.", "absZh": "学到的世界模型总结了智能体的经验，以促进复杂行为的学习。虽然通过深度学习从高维感官输入中学习世界模型正变得可行，但从中推导行为有许多潜在方法。我们提出了Dreamer，一个仅通过潜在想象从图像中解决长时域任务的强化学习智能体。我们通过将学到的状态值的解析梯度反向传播通过在一个学到的世界模型的紧凑状态空间中想象的轨迹，来高效地学习行为。在20个具有挑战性的视觉控制任务上，Dreamer在数据效率、计算时间和最终性能方面超越了现有方法。", "insights": {"contrib": [{"en": "Proposes Dreamer, a model-based RL agent that learns long-horizon behaviors purely by latent imagination in a compact latent space.", "zh": "提出Dreamer，一种基于模型的强化学习智能体，完全通过在紧凑潜在空间中的潜在想象学习长时域行为。"}, {"en": "Introduces an actor-critic algorithm that propagates analytic gradients of multi-step value estimates through learned latent dynamics.", "zh": "引入一种演员-评论家算法，通过学习的潜在动力学传播多步价值估计的解析梯度。"}, {"en": "Demonstrates state-of-the-art performance on 20 visual control tasks, exceeding prior methods in data efficiency, computation time, and final score.", "zh": "在20个视觉控制任务上展示最先进性能，在数据效率、计算时间和最终得分上超越先前方法。"}, {"en": "Shows that learning a value model in imagination makes the agent robust to the imagination horizon, enabling long-horizon tasks.", "zh": "表明在想象中学习价值模型使智能体对想象时域具有鲁棒性，从而能够处理长时域任务。"}, {"en": "Compares representation learning objectives (pixel reconstruction, contrastive estimation, reward prediction) and finds pixel reconstruction most effective.", "zh": "比较表示学习目标（像素重建、对比估计、奖励预测），发现像素重建最有效。"}, {"en": "Validates Dreamer on discrete action tasks and early termination scenarios, showing broad applicability.", "zh": "在离散动作任务和提前终止场景上验证Dreamer，展示广泛适用性。"}], "limits": [{"en": "Relies on a learned world model that may not generalize to unseen environments or high visual complexity.", "zh": "依赖学习的世界模型，可能无法泛化到未见环境或高视觉复杂度。"}, {"en": "Requires differentiable dynamics and reparameterized sampling, limiting applicability to discrete actions without straight-through gradients.", "zh": "需要可微动力学和重参数化采样，限制了在离散动作上的应用（需直通梯度）。"}, {"en": "Performance depends on the quality of representation learning; pure reward prediction alone was insufficient.", "zh": "性能依赖于表示学习质量；仅靠奖励预测是不够的。"}, {"en": "Imagination horizon and value model hyperparameters may need tuning for different tasks.", "zh": "想象时域和价值模型超参数可能需要针对不同任务调整。"}, {"en": "Evaluation limited to simulated environments; real-world deployment may face additional challenges.", "zh": "评估限于模拟环境；实际部署可能面临额外挑战。"}]}, "cites": 2025}, {"id": "jschritt-1911.08265", "pid": "jschritt", "arxiv": "1911.08265", "date": "2019-11-19", "venue": "cs.LG", "org": "Google DeepMind", "fields": ["rl", "deep-learning"], "tEn": "Mastering Atari, Go, Chess and Shogi by Planning with a Learned Model", "tZh": "通过规划掌握雅达利、围棋、国际象棋和将棋：基于学习模型的方法", "sEn": "MuZero achieves superhuman performance in Atari, Go, chess, and shogi by combining tree-based search with a learned model, without knowing the environment dynamics.", "sZh": "MuZero算法通过将基于树的搜索与学习模型相结合，在不了解环境动态的情况下，在雅达利、围棋、国际象棋和将棋中实现了超人类表现。", "absEn": "Constructing agents with planning capabilities has long been one of the main challenges in the pursuit of artificial intelligence. Tree-based planning methods have enjoyed huge success in challenging domains, such as chess and Go, where a perfect simulator is available. However, in real-world problems the dynamics governing the environment are often complex and unknown. In this work we present the MuZero algorithm which, by combining a tree-based search with a learned model, achieves superhuman performance in a range of challenging and visually complex domains, without any knowledge of their underlying dynamics. MuZero learns a model that, when applied iteratively, predicts the quantities most directly relevant to planning: the reward, the action-selection policy, and the value function. When evaluated on 57 different Atari games - the canonical video game environment for testing AI techniques, in which model-based planning approaches have historically struggled - our new algorithm achieved a new state of the art. When evaluated on Go, chess and shogi, without any knowledge of the game rules, MuZero matched the superhuman performance of the AlphaZero algorithm that was supplied with the game rules.", "absZh": "构建具有规划能力的智能体一直是人工智能追求的主要挑战之一。基于树的规划方法在象棋和围棋等拥有完美模拟器的挑战性领域取得了巨大成功。然而，在现实问题中，环境动态往往复杂且未知。本文提出了MuZero算法，它通过将基于树的搜索与学习模型相结合，在一系列具有挑战性和视觉复杂性的领域中实现了超人类表现，而无需了解其底层动态。MuZero学习一个模型，该模型在迭代应用时预测与规划最直接相关的量：奖励、动作选择策略和值函数。在57个不同的雅达利游戏（测试AI技术的经典视频游戏环境，历史上基于模型的规划方法在此处表现不佳）上评估时，我们的新算法达到了新的最优水平。在围棋、国际象棋和将棋上评估时，无需任何游戏规则知识，MuZero就达到了与提供游戏规则的AlphaZero算法相同的超人类表现。", "insights": {"contrib": [{"en": "Proposes MuZero, combining tree-based search with a learned model for planning without environment dynamics.", "zh": "提出MuZero算法，将基于树的搜索与学习模型结合，无需环境动态知识即可规划。"}, {"en": "Achieves superhuman performance in Go, chess, shogi, and state-of-the-art on 57 Atari games.", "zh": "在围棋、国际象棋、将棋中达到超人类水平，并在57款Atari游戏中取得最优结果。"}, {"en": "Learns a model predicting reward, policy, and value function directly relevant to planning.", "zh": "学习直接预测与规划相关的奖励、策略和价值函数的模型。"}, {"en": "Introduces value-equivalent model learning without reconstructing observations or true state.", "zh": "引入价值等价模型学习，无需重建观测或真实状态。"}, {"en": "Demonstrates scalability of planning with learned model matching perfect model in Go.", "zh": "证明学习模型在围棋中规划的可扩展性，与完美模型性能匹配。"}, {"en": "Shows search-based policy improvement provides stronger learning signal than model-free Q-learning.", "zh": "表明基于搜索的策略改进比无模型Q-learning提供更强的学习信号。"}], "limits": [{"en": "Model is deterministic; extension to stochastic transitions left for future work.", "zh": "模型为确定性，随机转换扩展留待未来工作。"}, {"en": "Performance in Atari plateaus with search simulations, suggesting model inaccuracy.", "zh": "Atari中性能随搜索模拟趋于平稳，表明模型不准确性。"}, {"en": "Requires significant compute for training (1 million mini-batches, 800 simulations in board games).", "zh": "训练需要大量算力（100万小批量，棋盘游戏800次模拟）。"}, {"en": "Not directly applicable to imperfect information games like Poker.", "zh": "不直接适用于不完全信息游戏如扑克。"}, {"en": "Limited to environments with discrete actions and rewards; continuous domains not addressed.", "zh": "限于离散动作和奖励环境，未涉及连续域。"}]}, "cites": 2555}, {"id": "craffel-1910.10683", "pid": "craffel", "arxiv": "1910.10683", "date": "2019-10-23", "venue": "cs.LG", "org": "Google", "fields": ["nlp", "deep-learning"], "tEn": "Exploring the Limits of Transfer Learning with a Unified Text-to-Text Transformer", "tZh": "探索迁移学习的极限：基于统一的文本到文本转换器", "sEn": "A unified text-to-text framework enables systematic study of transfer learning techniques, achieving state-of-the-art results on multiple NLP benchmarks.", "sZh": "统一的文本到文本框架系统研究了迁移学习技术，在多个NLP基准上取得了最先进的结果。", "absEn": "Transfer learning, where a model is first pre-trained on a data-rich task before being fine-tuned on a downstream task, has emerged as a powerful technique in natural language processing (NLP). The effectiveness of transfer learning has given rise to a diversity of approaches, methodology, and practice. In this paper, we explore the landscape of transfer learning techniques for NLP by introducing a unified framework that converts all text-based language problems into a text-to-text format. Our systematic study compares pre-training objectives, architectures, unlabeled data sets, transfer approaches, and other factors on dozens of language understanding tasks. By combining the insights from our exploration with scale and our new ``Colossal Clean Crawled Corpus'', we achieve state-of-the-art results on many benchmarks covering summarization, question answering, text classification, and more. To facilitate future work on transfer learning for NLP, we release our data set, pre-trained models, and code.", "absZh": "迁移学习，即模型先在数据丰富的任务上进行预训练，然后在下游任务上进行微调，已成为自然语言处理（NLP）中的一项强大技术。迁移学习的有效性催生了多种方法、方法论和实践。在本文中，我们通过引入一个统一的框架，将所有基于文本的语言问题转换为文本到文本格式，探索了NLP迁移学习技术的全貌。我们的系统研究比较了预训练目标、架构、无标签数据集、迁移方法以及其他因素在数十个语言理解任务上的表现。通过将我们的探索见解与规模以及我们新的“巨型清洁爬取语料库”相结合，我们在涵盖摘要、问答、文本分类等多个基准上取得了最先进的结果。为了促进未来NLP迁移学习的研究，我们发布了我们的数据集、预训练模型和代码。", "insights": {"contrib": [{"en": "Proposes a unified text-to-text framework for NLP transfer learning.", "zh": "提出了一个统一的文本到文本框架，用于自然语言处理的迁移学习。"}, {"en": "Systematically compares pre-training objectives, architectures, and data sets.", "zh": "系统比较了预训练目标、架构和数据集。"}, {"en": "Introduces the Colossal Clean Crawled Corpus (C4) for pre-training.", "zh": "引入了用于预训练的巨型干净爬取语料库（C4）。"}, {"en": "Achieves state-of-the-art results on multiple NLP benchmarks via scaling.", "zh": "通过规模扩张在多个自然语言处理基准上取得了最先进的结果。"}, {"en": "Releases pre-trained models, code, and data to facilitate future research.", "zh": "发布预训练模型、代码和数据以促进未来研究。"}, {"en": "Explores architectural variants including encoder-decoder and prefix LM.", "zh": "探索了包括编码器-解码器和前缀语言模型在内的架构变体。"}], "limits": [{"en": "Study limited to English-language tasks and benchmarks.", "zh": "研究仅限于英语任务和基准。"}, {"en": "Pre-training only on English data; multilingual tasks require additional data.", "zh": "预训练仅使用英语数据；多语言任务需要额外数据。"}, {"en": "Computational cost of large-scale experiments is high.", "zh": "大规模实验的计算成本很高。"}, {"en": "No combinatorial exploration of all factors due to cost.", "zh": "由于成本原因，未对所有因素进行组合探索。"}, {"en": "Results may not generalize to non-text modalities or low-resource languages.", "zh": "结果可能无法推广到非文本模态或低资源语言。"}]}, "cites": 26197}, {"id": "zhenzhonglan-1909.11942", "pid": "zhenzhonglan", "arxiv": "1909.11942", "date": "2019-09-26", "venue": "cs.CL", "org": "Google Research / Toyota Technological Institute at Chicago", "fields": ["nlp", "efficiency"], "tEn": "ALBERT: A Lite BERT for Self-supervised Learning of Language Representations", "tZh": "ALBERT：一种用于语言表示自监督学习的轻量级BERT", "sEn": "ALBERT introduces parameter-reduction techniques to lower memory consumption and increase training speed, achieving state-of-the-art results with fewer parameters than BERT-large.", "sZh": "ALBERT通过参数缩减技术降低内存消耗并提升训练速度，以更少的参数在多个基准上超越BERT-large，达到最优性能。", "absEn": "Increasing model size when pretraining natural language representations often results in improved performance on downstream tasks. However, at some point further model increases become harder due to GPU/TPU memory limitations and longer training times. To address these problems, we present two parameter-reduction techniques to lower memory consumption and increase the training speed of BERT. Comprehensive empirical evidence shows that our proposed methods lead to models that scale much better compared to the original BERT. We also use a self-supervised loss that focuses on modeling inter-sentence coherence, and show it consistently helps downstream tasks with multi-sentence inputs. As a result, our best model establishes new state-of-the-art results on the GLUE, RACE, and \\squad benchmarks while having fewer parameters compared to BERT-large. The code and the pretrained models are available at https://github.com/google-research/ALBERT.", "absZh": "在预训练自然语言表示时，增加模型大小通常会提高下游任务的性能。然而，在某个点上，由于GPU/TPU内存限制和更长的训练时间，进一步增加模型变得更加困难。为了解决这些问题，我们提出了两种参数缩减技术，以降低内存消耗并提高BERT的训练速度。全面的实证证据表明，我们提出的方法使得模型相比原始BERT具有更好的扩展性。我们还使用了一种自监督损失，专注于建模句子间的连贯性，并证明它始终有助于处理多句子输入的下游任务。因此，我们的最佳模型在GLUE、RACE和SQuAD基准上建立了新的最先进结果，同时参数比BERT-large更少。代码和预训练模型可在https://github.com/google-research/ALBERT获取。", "insights": {"contrib": [{"en": "Proposes two parameter-reduction techniques: factorized embedding parameterization and cross-layer parameter sharing.", "zh": "提出两种参数缩减技术：分解式嵌入参数化和跨层参数共享。"}, {"en": "Introduces a self-supervised loss for sentence-order prediction (SOP) to model inter-sentence coherence.", "zh": "引入用于句子顺序预测（SOP）的自监督损失，以建模句子间连贯性。"}, {"en": "Achieves state-of-the-art results on GLUE, SQuAD, and RACE benchmarks with fewer parameters than BERT-large.", "zh": "在GLUE、SQuAD和RACE基准上取得最先进结果，且参数少于BERT-large。"}, {"en": "Demonstrates that parameter sharing acts as regularization, stabilizing training and improving generalization.", "zh": "证明参数共享起到正则化作用，稳定训练并提升泛化能力。"}, {"en": "Shows that dropout can hurt performance in large Transformer-based models, leading to its removal for better results.", "zh": "表明dropout可能损害大型Transformer模型的性能，因此移除它以获得更好结果。"}], "limits": [{"en": "ALBERT-xxlarge is computationally more expensive than BERT-large due to larger structure.", "zh": "ALBERT-xxlarge由于结构更大，计算成本高于BERT-large。"}, {"en": "The study is limited to English language and specific benchmarks (GLUE, SQuAD, RACE).", "zh": "研究仅限于英语和特定基准（GLUE、SQuAD、RACE）。"}, {"en": "The proposed SOP loss may not capture all dimensions of discourse coherence.", "zh": "提出的SOP损失可能无法捕捉语篇连贯性的所有维度。"}, {"en": "The effect of removing dropout may not generalize to other Transformer architectures.", "zh": "移除dropout的效果可能不适用于其他Transformer架构。"}]}, "cites": 7538}, {"id": "jwang-1908.07919", "pid": "jwang", "arxiv": "1908.07919", "date": "2019-08-20", "venue": "cs.CV", "org": "Microsoft Research Asia", "fields": ["vision", "deep-learning"], "tEn": "Deep High-Resolution Representation Learning for Visual Recognition", "tZh": "用于视觉识别的深度高分辨率表示学习", "sEn": "HRNet maintains high-resolution representations throughout the process, achieving richer semantics and higher spatial precision.", "sZh": "HRNet在整个过程中保持高分辨率表示，实现了更丰富的语义和更高的空间精度。", "absEn": "High-resolution representations are essential for position-sensitive vision problems, such as human pose estimation, semantic segmentation, and object detection. Existing state-of-the-art frameworks first encode the input image as a low-resolution representation through a subnetwork that is formed by connecting high-to-low resolution convolutions \\emph{in series} (e.g., ResNet, VGGNet), and then recover the high-resolution representation from the encoded low-resolution representation. Instead, our proposed network, named as High-Resolution Network (HRNet), maintains high-resolution representations through the whole process. There are two key characteristics: (i) Connect the high-to-low resolution convolution streams \\emph{in parallel}; (ii) Repeatedly exchange the information across resolutions. The benefit is that the resulting representation is semantically richer and spatially more precise. We show the superiority of the proposed HRNet in a wide range of applications, including human pose estimation, semantic segmentation, and object detection, suggesting that the HRNet is a stronger backbone for computer vision problems. All the codes are available at~{\\url{https://github.com/HRNet}}.", "absZh": "高分辨率表示对于位置敏感的视觉问题（如人体姿态估计、语义分割和物体检测）至关重要。现有的最先进框架首先通过一个由高到低分辨率卷积串联（如ResNet、VGGNet）组成的子网络将输入图像编码为低分辨率表示，然后从编码的低分辨率表示中恢复高分辨率表示。相反，我们提出的网络，称为高分辨率网络（HRNet），在整个过程中保持高分辨率表示。有两个关键特征：（i）将高到低分辨率卷积流并行连接；（ii）跨分辨率反复交换信息。其好处是得到的表示在语义上更丰富，空间上更精确。我们在广泛的应用中展示了所提出的HRNet的优越性，包括人体姿态估计、语义分割和物体检测，表明HRNet是计算机视觉问题的一个更强的骨干网络。所有代码可在https://github.com/HRNet获取。", "insights": {"contrib": [{"en": "Proposes HRNet that maintains high-resolution representations throughout the entire process via parallel multi-resolution convolutions.", "zh": "提出HRNet，通过并行多分辨率卷积在整个过程中保持高分辨率表示。"}, {"en": "Introduces repeated multi-resolution fusion to exchange information across parallel streams, enhancing semantic richness and spatial precision.", "zh": "引入重复多分辨率融合，在并行流之间交换信息，增强语义丰富性和空间精度。"}, {"en": "Demonstrates superior performance on human pose estimation, semantic segmentation, and object detection compared to state-of-the-art methods.", "zh": "在人体姿态估计、语义分割和目标检测上，相比现有最优方法展现了优越性能。"}, {"en": "Provides two versions: HRNetV1 for pose estimation and HRNetV2 for segmentation, with HRNetV2p for detection, showing versatility.", "zh": "提供两个版本：HRNetV1用于姿态估计，HRNetV2用于分割，HRNetV2p用于检测，展示了多功能性。"}, {"en": "Establishes connection between multi-resolution fusion and regular convolution, justifying exploration of all resolutions.", "zh": "建立了多分辨率融合与常规卷积之间的联系，为探索所有分辨率提供了依据。"}, {"en": "Achieves state-of-the-art results with comparable model size and lower computation complexity on multiple benchmarks.", "zh": "在多个基准上以相当的模型大小和更低的计算复杂度取得了最优结果。"}], "limits": [{"en": "Memory cost during training for object detection is slightly larger than state-of-the-art methods.", "zh": "目标检测训练时的内存成本略高于现有最优方法。"}, {"en": "Training time for pose estimation is a little larger on PyTorch, though comparable on MXNet with static graph.", "zh": "在PyTorch上姿态估计的训练时间稍长，但在支持静态图的MXNet上相当。"}, {"en": "Performance gain from HRNetV2 over HRNetV1 is minor for large models in Cityscapes segmentation.", "zh": "在Cityscapes分割中，HRNetV2相比HRNetV1对大模型的性能提升较小。"}, {"en": "The study does not explore resolutions higher than 1/4 of input, leaving potential for further improvement.", "zh": "研究未探索高于输入1/4的分辨率，留下了进一步改进的潜力。"}, {"en": "Combination with ASPP or PPM did not improve Cityscapes segmentation, limiting certain fusion strategies.", "zh": "与ASPP或PPM结合未改善Cityscapes分割，限制了某些融合策略。"}]}, "cites": 4781}, {"id": "liyuanliu-1908.03265", "pid": "liyuanliu", "arxiv": "1908.03265", "date": "2019-08-08", "venue": "cs.LG", "org": "UIUC / Microsoft", "fields": ["deep-learning", "efficiency"], "tEn": "On the Variance of the Adaptive Learning Rate and Beyond", "tZh": "自适应学习率的方差及其改进", "sEn": "Warmup reduces early-stage variance of adaptive learning rates; RAdam rectifies this variance for better performance.", "sZh": "预热机制通过降低自适应学习率早期阶段的方差来稳定训练，而RAdam通过修正方差进一步提升了性能。", "absEn": "The learning rate warmup heuristic achieves remarkable success in stabilizing training, accelerating convergence and improving generalization for adaptive stochastic optimization algorithms like RMSprop and Adam. Here, we study its mechanism in details. Pursuing the theory behind warmup, we identify a problem of the adaptive learning rate (i.e., it has problematically large variance in the early stage), suggest warmup works as a variance reduction technique, and provide both empirical and theoretical evidence to verify our hypothesis. We further propose RAdam, a new variant of Adam, by introducing a term to rectify the variance of the adaptive learning rate. Extensive experimental results on image classification, language modeling, and neural machine translation verify our intuition and demonstrate the effectiveness and robustness of our proposed method. All implementations are available at: https://github.com/LiyuanLucasLiu/RAdam.", "absZh": "学习率预热启发式方法在稳定训练、加速收敛以及提升RMSprop和Adam等自适应随机优化算法的泛化能力方面取得了显著成功。本文详细研究了其机制。在探索预热背后的理论时，我们发现了自适应学习率的一个问题（即在早期阶段其方差过大），提出预热作为一种方差缩减技术，并通过实验和理论证据验证了我们的假设。我们进一步提出了RAdam，这是Adam的一个新变体，通过引入一项来修正自适应学习率的方差。在图像分类、语言建模和神经机器翻译上的大量实验结果验证了我们的直觉，并展示了所提方法的有效性和鲁棒性。所有实现均可从https://github.com/LiyuanLucasLiu/RAdam获取。", "insights": {"contrib": [{"en": "Identifies large variance of adaptive learning rate in early training as root cause of convergence issues.", "zh": "发现自适应学习率在训练早期方差过大是收敛问题的根本原因。"}, {"en": "Provides theoretical justification for warmup heuristic as variance reduction technique.", "zh": "为预热启发式方法作为方差缩减技术提供了理论依据。"}, {"en": "Proposes RAdam, a new Adam variant that rectifies adaptive learning rate variance.", "zh": "提出RAdam，一种通过修正自适应学习率方差的新Adam变体。"}, {"en": "Demonstrates RAdam's effectiveness and robustness across image classification, language modeling, and NMT.", "zh": "在图像分类、语言建模和神经机器翻译上验证了RAdam的有效性和鲁棒性。"}, {"en": "Shows RAdam reduces sensitivity to learning rate and warmup length hyperparameters.", "zh": "表明RAdam降低了对学习率和预热步长超参数的敏感性。"}], "limits": [{"en": "Analysis assumes gradients are i.i.d. Gaussian with zero mean, which may not hold in practice.", "zh": "分析假设梯度为独立同分布零均值高斯，实际中可能不成立。"}, {"en": "Approximation of exponential moving average by simple moving average may introduce error.", "zh": "用简单移动平均近似指数移动平均可能引入误差。"}, {"en": "First-order approximation of variance may be inaccurate for very small sample sizes.", "zh": "方差的一阶近似在样本量极小时可能不准确。"}, {"en": "RAdam's rectification term relies on hyperparameter β2, requiring tuning for optimal performance.", "zh": "RAdam的修正项依赖超参数β2，需调参以获得最佳性能。"}]}, "cites": 2255}, {"id": "yinhanliu-1907.11692", "pid": "yinhanliu", "arxiv": "1907.11692", "date": "2019-07-26", "venue": "cs.CL", "org": "Facebook AI Research / University of Washington", "fields": ["nlp"], "tEn": "RoBERTa: A Robustly Optimized BERT Pretraining Approach", "tZh": "RoBERTa：一种稳健优化的BERT预训练方法", "sEn": "RoBERTa shows that BERT was significantly undertrained and achieves state-of-the-art results by carefully optimizing hyperparameters and training data size.", "sZh": "RoBERTa发现BERT严重训练不足，通过精心优化超参数和训练数据规模，达到了最先进的结果。", "absEn": "Language model pretraining has led to significant performance gains but careful comparison between different approaches is challenging. Training is computationally expensive, often done on private datasets of different sizes, and, as we will show, hyperparameter choices have significant impact on the final results. We present a replication study of BERT pretraining (Devlin et al., 2019) that carefully measures the impact of many key hyperparameters and training data size. We find that BERT was significantly undertrained, and can match or exceed the performance of every model published after it. Our best model achieves state-of-the-art results on GLUE, RACE and SQuAD. These results highlight the importance of previously overlooked design choices, and raise questions about the source of recently reported improvements. We release our models and code.", "absZh": "语言模型预训练带来了显著的性能提升，但不同方法之间的仔细比较具有挑战性。训练计算成本高昂，通常在不同规模的私有数据集上进行，而且，正如我们将要展示的，超参数选择对最终结果有显著影响。我们对BERT预训练（Devlin等人，2019）进行了复制研究，仔细测量了许多关键超参数和训练数据规模的影响。我们发现BERT明显训练不足，并且可以匹配或超越其后发布的每个模型的性能。我们的最佳模型在GLUE、RACE和SQuAD上取得了最先进的结果。这些结果凸显了先前被忽视的设计选择的重要性，并对近期报告改进的来源提出了疑问。我们发布了我们的模型和代码。", "insights": {"contrib": [{"en": "Shows BERT was significantly undertrained and proposes RoBERTa with improved training recipe.", "zh": "证明BERT训练不足，提出RoBERTa改进训练方案。"}, {"en": "Demonstrates that removing the next sentence prediction objective matches or improves performance.", "zh": "证明去除下一句预测目标可匹配或提升性能。"}, {"en": "Introduces dynamic masking, large mini-batches, and byte-level BPE for better pretraining.", "zh": "引入动态掩码、大批量和字节级BPE以改进预训练。"}, {"en": "Collects CC-News dataset and shows more data improves downstream task performance.", "zh": "收集CC-News数据集，表明更多数据提升下游任务性能。"}, {"en": "Achieves state-of-the-art results on GLUE, RACE, and SQuAD without multi-task finetuning.", "zh": "在GLUE、RACE和SQuAD上取得最优结果，无需多任务微调。"}, {"en": "Releases models and code for pretraining and finetuning.", "zh": "发布预训练和微调的模型与代码。"}], "limits": [{"en": "Study focuses on BERT architecture; architectural changes not explored.", "zh": "研究聚焦BERT架构，未探索架构变化。"}, {"en": "Results may not generalize to other pretraining objectives or model sizes.", "zh": "结果可能不泛化到其他预训练目标或模型规模。"}, {"en": "Data size and diversity effects are conflated; not disentangled.", "zh": "数据规模与多样性效应混淆，未分离分析。"}, {"en": "Large batch training limits not fully explored; further scaling possible.", "zh": "大批量训练极限未充分探索，进一步扩展可能。"}, {"en": "Comparison with other methods may be affected by hyperparameter tuning differences.", "zh": "与其他方法的比较可能受超参数调优差异影响。"}]}, "cites": 30131}, {"id": "yangsong-1907.05600", "pid": "yangsong", "arxiv": "1907.05600", "date": "2019-07-12", "venue": "cs.LG", "org": "Stanford", "fields": ["generative", "deep-learning"], "tEn": "Generative Modeling by Estimating Gradients of the Data Distribution", "tZh": "通过估计数据分布的梯度进行生成建模", "sEn": "We propose a generative model using Langevin dynamics with score matching, achieving state-of-the-art results on CIFAR-10.", "sZh": "我们提出了一种基于分数匹配和朗之万动力学的生成模型，在CIFAR-10上取得了最优结果。", "absEn": "We introduce a new generative model where samples are produced via Langevin dynamics using gradients of the data distribution estimated with score matching. Because gradients can be ill-defined and hard to estimate when the data resides on low-dimensional manifolds, we perturb the data with different levels of Gaussian noise, and jointly estimate the corresponding scores, i.e., the vector fields of gradients of the perturbed data distribution for all noise levels. For sampling, we propose an annealed Langevin dynamics where we use gradients corresponding to gradually decreasing noise levels as the sampling process gets closer to the data manifold. Our framework allows flexible model architectures, requires no sampling during training or the use of adversarial methods, and provides a learning objective that can be used for principled model comparisons. Our models produce samples comparable to GANs on MNIST, CelebA and CIFAR-10 datasets, achieving a new state-of-the-art inception score of 8.87 on CIFAR-10. Additionally, we demonstrate that our models learn effective representations via image inpainting experiments.", "absZh": "我们引入了一种新的生成模型，其中样本通过朗之万动力学生成，利用分数匹配估计的数据分布梯度。由于当数据位于低维流形上时，梯度可能定义不良且难以估计，我们使用不同级别的高斯噪声扰动数据，并联合估计相应的分数，即所有噪声级别下扰动数据分布的梯度向量场。对于采样，我们提出了一种退火朗之万动力学，其中随着采样过程接近数据流形，我们使用对应逐渐减小噪声级别的梯度。我们的框架允许灵活的模型架构，训练期间无需采样或使用对抗方法，并提供了一个可用于原则性模型比较的学习目标。我们的模型在MNIST、CelebA和CIFAR-10数据集上生成的样本可与GAN相媲美，在CIFAR-10上实现了8.87的新最优初始分数。此外，我们通过图像修复实验证明了我们的模型学习了有效的表示。", "insights": {"contrib": [{"en": "Proposes score-based generative modeling using Langevin dynamics with score matching.", "zh": "提出基于分数的生成建模，利用分数匹配和朗之万动力学生成样本。"}, {"en": "Introduces Noise Conditional Score Networks (NCSN) to estimate scores at multiple noise levels.", "zh": "引入噪声条件分数网络（NCSN），联合估计多个噪声水平下的分数。"}, {"en": "Develops annealed Langevin dynamics for sampling, gradually reducing noise levels.", "zh": "开发退火朗之万动力学采样方法，逐步降低噪声水平。"}, {"en": "Achieves state-of-the-art inception score of 8.87 on CIFAR-10 for unconditional generation.", "zh": "在CIFAR-10上实现无条件生成的最新最佳起始分数8.87。"}, {"en": "Demonstrates effective image inpainting without specialized architectures.", "zh": "展示无需特殊架构即可有效进行图像修复。"}, {"en": "Provides a tractable objective for principled model comparisons.", "zh": "提供可处理的训练目标，用于原则性模型比较。"}], "limits": [{"en": "Requires multiple noise levels and annealed sampling, increasing computational cost.", "zh": "需要多个噪声水平和退火采样，增加计算成本。"}, {"en": "Score estimation may be inaccurate in low-density regions despite noise perturbation.", "zh": "尽管有噪声扰动，低密度区域的分数估计仍可能不准确。"}, {"en": "Langevin dynamics mixing can be slow for highly multimodal distributions.", "zh": "对于高度多模态分布，朗之万动力学混合可能较慢。"}, {"en": "Model performance depends on careful tuning of noise levels and step sizes.", "zh": "模型性能依赖于噪声水平和步长的仔细调整。"}, {"en": "Primarily evaluated on image data; generalization to other domains is not explored.", "zh": "主要在图像数据上评估，未探索对其他领域的泛化。"}]}, "cites": 5634}, {"id": "zhilinyang-1906.08237", "pid": "zhilinyang", "arxiv": "1906.08237", "date": "2019-06-19", "venue": "cs.CL", "org": "CMU", "fields": ["nlp", "deep-learning"], "tEn": "XLNet: Generalized Autoregressive Pretraining for Language Understanding", "tZh": "XLNet：面向语言理解的广义自回归预训练", "sEn": "XLNet outperforms BERT on 20 tasks by learning bidirectional contexts via permutation language modeling and integrating Transformer-XL.", "sZh": "XLNet通过排列语言建模学习双向上下文并集成Transformer-XL，在20个任务上超越BERT。", "absEn": "With the capability of modeling bidirectional contexts, denoising autoencoding based pretraining like BERT achieves better performance than pretraining approaches based on autoregressive language modeling. However, relying on corrupting the input with masks, BERT neglects dependency between the masked positions and suffers from a pretrain-finetune discrepancy. In light of these pros and cons, we propose XLNet, a generalized autoregressive pretraining method that (1) enables learning bidirectional contexts by maximizing the expected likelihood over all permutations of the factorization order and (2) overcomes the limitations of BERT thanks to its autoregressive formulation. Furthermore, XLNet integrates ideas from Transformer-XL, the state-of-the-art autoregressive model, into pretraining. Empirically, under comparable experiment settings, XLNet outperforms BERT on 20 tasks, often by a large margin, including question answering, natural language inference, sentiment analysis, and document ranking.", "absZh": "尽管基于去噪自编码的预训练方法（如BERT）通过建模双向上下文取得了比自回归语言模型更好的性能，但BERT依赖于对输入进行掩码破坏，忽略了掩码位置之间的依赖关系，并存在预训练与微调之间的差异。针对这些优缺点，我们提出了XLNet，一种广义自回归预训练方法，它通过最大化所有分解顺序排列的期望似然来学习双向上下文，并凭借其自回归公式克服了BERT的局限性。此外，XLNet将最先进的自回归模型Transformer-XL的思想整合到预训练中。实验表明，在可比较的实验设置下，XLNet在20个任务上（包括问答、自然语言推理、情感分析和文档排序）显著优于BERT，通常优势明显。", "insights": {"contrib": [{"en": "Proposes XLNet, a generalized autoregressive pretraining method that learns bidirectional contexts via permutation language modeling.", "zh": "提出XLNet，一种通过排列语言建模学习双向上下文的广义自回归预训练方法。"}, {"en": "Overcomes BERT's pretrain-finetune discrepancy by avoiding input corruption with masks.", "zh": "通过避免使用掩码破坏输入，克服了BERT的预训练-微调差异。"}, {"en": "Integrates Transformer-XL's segment recurrence and relative encoding for improved long-text handling.", "zh": "集成Transformer-XL的段循环和相对编码，改进长文本处理。"}, {"en": "Introduces two-stream self-attention to resolve target prediction ambiguity in permutation modeling.", "zh": "引入双流自注意力机制，解决排列建模中的目标预测歧义。"}, {"en": "Achieves state-of-the-art results on 20 NLP tasks, including QA, NLI, sentiment analysis, and document ranking.", "zh": "在20个NLP任务上取得最先进结果，包括问答、自然语言推理、情感分析和文档排序。"}, {"en": "Demonstrates that permutation LM and Transformer-XL both contribute to XLNet's superiority over BERT.", "zh": "证明排列语言模型和Transformer-XL共同促成XLNet优于BERT。"}], "limits": [{"en": "Permutation language modeling increases optimization difficulty, requiring partial prediction for convergence.", "zh": "排列语言建模增加优化难度，需要部分预测才能收敛。"}, {"en": "XLNet's performance gain is partly due to more training data and compute, not solely the objective.", "zh": "XLNet的性能提升部分归因于更多训练数据和算力，而非仅目标函数。"}, {"en": "The two-stream attention mechanism adds architectural complexity and memory overhead.", "zh": "双流注意力机制增加了架构复杂性和内存开销。"}, {"en": "Ablation shows next-sentence prediction does not consistently improve XLNet, unlike BERT.", "zh": "消融实验表明，与BERT不同，下一句预测并未持续改进XLNet。"}, {"en": "XLNet's reliance on Transformer-XL may limit applicability to tasks with very short sequences.", "zh": "XLNet对Transformer-XL的依赖可能限制其在极短序列任务上的适用性。"}]}, "cites": 9410}, {"id": "yiren-1905.09263", "pid": "yiren", "arxiv": "1905.09263", "date": "2019-05-22", "venue": "cs.CL", "org": "Microsoft Research / Zhejiang University", "fields": ["deep-learning", "generative"], "tEn": "FastSpeech: Fast, Robust and Controllable Text to Speech", "tZh": "FastSpeech: 快速、鲁棒且可控的文本到语音合成", "sEn": "FastSpeech achieves 270x speedup in mel-spectrogram generation and 38x in end-to-end speech synthesis while maintaining quality and robustness.", "sZh": "FastSpeech在保持语音质量的同时，将梅尔频谱生成速度提升270倍，端到端语音合成速度提升38倍，并几乎消除了跳词和重复问题。", "absEn": "Neural network based end-to-end text to speech (TTS) has significantly improved the quality of synthesized speech. Prominent methods (e.g., Tacotron 2) usually first generate mel-spectrogram from text, and then synthesize speech from the mel-spectrogram using vocoder such as WaveNet. Compared with traditional concatenative and statistical parametric approaches, neural network based end-to-end models suffer from slow inference speed, and the synthesized speech is usually not robust (i.e., some words are skipped or repeated) and lack of controllability (voice speed or prosody control). In this work, we propose a novel feed-forward network based on Transformer to generate mel-spectrogram in parallel for TTS. Specifically, we extract attention alignments from an encoder-decoder based teacher model for phoneme duration prediction, which is used by a length regulator to expand the source phoneme sequence to match the length of the target mel-spectrogram sequence for parallel mel-spectrogram generation. Experiments on the LJSpeech dataset show that our parallel model matches autoregressive models in terms of speech quality, nearly eliminates the problem of word skipping and repeating in particularly hard cases, and can adjust voice speed smoothly. Most importantly, compared with autoregressive Transformer TTS, our model speeds up mel-spectrogram generation by 270x and the end-to-end speech synthesis by 38x. Therefore, we call our model FastSpeech.", "absZh": "基于神经网络的端到端文本到语音合成（TTS）显著提高了合成语音的质量。主流方法（如Tacotron 2）通常先由文本生成梅尔频谱，再通过声码器（如WaveNet）合成语音。与传统拼接和统计参数方法相比，基于神经网络的端到端模型存在推理速度慢、合成语音鲁棒性差（如跳词或重复）以及缺乏可控性（如语速或韵律控制）等问题。本文提出一种基于Transformer的新型前馈网络，用于并行生成梅尔频谱。具体地，我们从基于编码器-解码器的教师模型中提取注意力对齐，用于音素时长预测，并通过长度调节器扩展源音素序列以匹配目标梅尔频谱序列的长度，从而实现并行梅尔频谱生成。在LJSpeech数据集上的实验表明，我们的并行模型在语音质量上与自回归模型相当，几乎消除了困难情况下的跳词和重复问题，并能平滑调整语速。最重要的是，与自回归Transformer TTS相比，我们的模型将梅尔频谱生成速度提升了270倍，端到端语音合成速度提升了38倍。因此，我们将该模型命名为FastSpeech。", "insights": {"contrib": [{"en": "Proposes FastSpeech, a feed-forward Transformer for parallel mel-spectrogram generation in TTS.", "zh": "提出FastSpeech，一种用于TTS中并行生成梅尔频谱的前馈Transformer。"}, {"en": "Introduces a length regulator with phoneme duration prediction for robust alignment.", "zh": "引入带有音素时长预测的长度调节器，实现鲁棒对齐。"}, {"en": "Achieves 270x speedup in mel-spectrogram generation and 38x in end-to-end synthesis.", "zh": "在梅尔频谱生成上实现270倍加速，端到端合成加速38倍。"}, {"en": "Nearly eliminates word skipping and repeating issues in hard cases.", "zh": "在困难情况下几乎消除了跳词和重复词问题。"}, {"en": "Enables smooth voice speed control from 0.5x to 1.5x.", "zh": "支持从0.5倍到1.5倍的平滑语速控制。"}, {"en": "Uses sequence-level knowledge distillation to improve speech quality.", "zh": "使用序列级知识蒸馏提升语音质量。"}], "limits": [{"en": "Speech quality only matches, not surpasses, autoregressive models.", "zh": "语音质量仅匹配自回归模型，未超越。"}, {"en": "Requires a pre-trained autoregressive teacher model for duration extraction.", "zh": "需要预训练的自回归教师模型来提取时长。"}, {"en": "Limited to single-speaker LJSpeech dataset; multi-speaker not tested.", "zh": "仅在单说话人LJSpeech数据集上测试，未验证多说话人场景。"}, {"en": "Prosody control is limited to adjusting breaks between words.", "zh": "韵律控制仅限于调整词间停顿。"}, {"en": "Dependence on external vocoder (WaveGlow) for final audio synthesis.", "zh": "依赖外部声码器（WaveGlow）进行最终音频合成。"}]}}, {"id": "skale-1904.09237", "pid": "skale", "arxiv": "1904.09237", "date": "2019-04-19", "venue": "cs.LG", "org": "Google", "fields": ["deep-learning", "efficiency"], "tEn": "On the Convergence of Adam and Beyond", "tZh": "论Adam及其变体的收敛性", "sEn": "Adam and related algorithms may fail to converge due to exponential moving averages; adding long-term memory of past gradients fixes the issue.", "sZh": "Adam等算法因指数移动平均可能导致不收敛，引入过去梯度的长期记忆可解决此问题。", "absEn": "Several recently proposed stochastic optimization methods that have been successfully used in training deep networks such as RMSProp, Adam, Adadelta, Nadam are based on using gradient updates scaled by square roots of exponential moving averages of squared past gradients. In many applications, e.g. learning with large output spaces, it has been empirically observed that these algorithms fail to converge to an optimal solution (or a critical point in nonconvex settings). We show that one cause for such failures is the exponential moving average used in the algorithms. We provide an explicit example of a simple convex optimization setting where Adam does not converge to the optimal solution, and describe the precise problems with the previous analysis of Adam algorithm. Our analysis suggests that the convergence issues can be fixed by endowing such algorithms with `long-term memory' of past gradients, and propose new variants of the Adam algorithm which not only fix the convergence issues but often also lead to improved empirical performance.", "absZh": "最近提出的几种随机优化方法，如RMSProp、Adam、Adadelta、Nadam，在训练深度网络时取得了成功，它们都基于使用过去梯度平方的指数移动平均的平方根来缩放梯度更新。在许多应用中，例如具有大输出空间的学习，经验观察发现这些算法无法收敛到最优解（或在非凸设置中无法收敛到临界点）。我们表明，这种失败的一个原因在于算法中使用的指数移动平均。我们提供了一个简单的凸优化设置中的显式例子，其中Adam不收敛到最优解，并描述了先前Adam算法分析中的确切问题。我们的分析表明，通过赋予这些算法过去梯度的“长期记忆”可以解决收敛问题，并提出了Adam算法的新变体，这些变体不仅解决了收敛问题，而且通常还能提高经验性能。", "insights": {"contrib": [{"en": "Identifies that exponential moving average in Adam and RMSprop causes non-convergence in convex optimization.", "zh": "指出Adam和RMSprop中的指数移动平均导致凸优化中不收敛。"}, {"en": "Provides explicit convex example where Adam fails to converge to optimal solution.", "zh": "提供显式凸示例，Adam无法收敛到最优解。"}, {"en": "Proposes AMSGrad algorithm with long-term memory of past gradients to fix convergence issues.", "zh": "提出AMSGrad算法，具有过去梯度的长期记忆，修复收敛问题。"}, {"en": "Proves regret bound for AMSGrad in convex setting, similar to Adagrad.", "zh": "证明AMSGrad在凸设置中的遗憾界，类似于Adagrad。"}, {"en": "Shows that any constant β1, β2 with β1 < √β2 leads to non-convergence for Adam.", "zh": "表明任何常数β1、β2满足β1 < √β2时Adam不收敛。"}, {"en": "Empirically demonstrates AMSGrad outperforms Adam on logistic regression and neural networks.", "zh": "实验证明AMSGrad在逻辑回归和神经网络上优于Adam。"}], "limits": [{"en": "Non-convergence examples are carefully constructed and may not reflect typical practical scenarios.", "zh": "不收敛示例是精心构造的，可能不反映典型实际场景。"}, {"en": "Theoretical analysis focuses on convex settings; non-convex convergence is not guaranteed.", "zh": "理论分析聚焦凸设置；非凸收敛未保证。"}, {"en": "AMSGrad requires tuning of hyperparameters like β1 and β2, similar to Adam.", "zh": "AMSGrad需要调整超参数如β1和β2，与Adam类似。"}, {"en": "Empirical evaluation is limited to MNIST and CIFAR-10; broader benchmarks are needed.", "zh": "实验评估限于MNIST和CIFAR-10；需要更广泛的基准。"}, {"en": "Proposed fixes increase memory slightly due to storing maximum of past squared gradients.", "zh": "提出的修复因存储过去平方梯度的最大值而略微增加内存。"}]}, "cites": 2965}, {"id": "yangyou-1904.00962", "pid": "yangyou", "arxiv": "1904.00962", "date": "2019-04-01", "venue": "cs.LG", "org": "Google / UC Berkeley", "fields": ["deep-learning", "efficiency"], "tEn": "Large Batch Optimization for Deep Learning: Training BERT in 76 minutes", "tZh": "大规模批量优化用于深度学习：76分钟训练BERT", "sEn": "LAMB optimizer enables BERT training in 76 minutes with large batch sizes up to 32868.", "sZh": "LAMB优化器支持高达32868的大批量大小，将BERT训练时间从3天缩短至76分钟。", "absEn": "Training large deep neural networks on massive datasets is computationally very challenging. There has been recent surge in interest in using large batch stochastic optimization methods to tackle this issue. The most prominent algorithm in this line of research is LARS, which by employing layerwise adaptive learning rates trains ResNet on ImageNet in a few minutes. However, LARS performs poorly for attention models like BERT, indicating that its performance gains are not consistent across tasks. In this paper, we first study a principled layerwise adaptation strategy to accelerate training of deep neural networks using large mini-batches. Using this strategy, we develop a new layerwise adaptive large batch optimization technique called LAMB; we then provide convergence analysis of LAMB as well as LARS, showing convergence to a stationary point in general nonconvex settings. Our empirical results demonstrate the superior performance of LAMB across various tasks such as BERT and ResNet-50 training with very little hyperparameter tuning. In particular, for BERT training, our optimizer enables use of very large batch sizes of 32868 without any degradation of performance. By increasing the batch size to the memory limit of a TPUv3 Pod, BERT training time can be reduced from 3 days to just 76 minutes (Table 1). The LAMB implementation is available at https://github.com/tensorflow/addons/blob/master/tensorflow_addons/optimizers/lamb.py", "absZh": "在庞大数据集上训练大型深度神经网络在计算上极具挑战性。最近，使用大批量随机优化方法来解决这一问题引起了广泛关注。该研究领域最著名的算法是LARS，它通过逐层自适应学习率在几分钟内训练了ImageNet上的ResNet。然而，LARS在像BERT这样的注意力模型上表现不佳，表明其性能提升在不同任务上并不一致。在本文中，我们首先研究了一种原则性的逐层自适应策略，以加速使用大批量训练深度神经网络。利用这一策略，我们开发了一种新的逐层自适应大批量优化技术，称为LAMB；然后我们提供了LAMB以及LARS的收敛性分析，证明了在一般非凸设置下收敛到稳定点。我们的实证结果表明，LAMB在各种任务（如BERT和ResNet-50训练）中表现出优越的性能，且几乎不需要超参数调整。特别是，在BERT训练中，我们的优化器能够使用高达32868的极大批量大小而不会降低性能。通过将批量大小增加到TPUv3 Pod的内存限制，BERT训练时间可以从3天减少到仅76分钟（表1）。LAMB实现可在https://github.com/tensorflow/addons/blob/master/tensorflow_addons/optimizers/lamb.py获取。", "insights": {"contrib": [{"en": "Proposes LAMB optimizer with layerwise adaptive learning rates for large-batch training.", "zh": "提出LAMB优化器，采用逐层自适应学习率进行大批量训练。"}, {"en": "Provides convergence analysis for LAMB and LARS in nonconvex settings.", "zh": "在非凸设置下为LAMB和LARS提供收敛性分析。"}, {"en": "Reduces BERT training time from 3 days to 76 minutes using batch size up to 64K.", "zh": "使用高达64K的批量大小，将BERT训练时间从3天减少到76分钟。"}, {"en": "Demonstrates LAMB achieves state-of-the-art accuracy on ResNet-50 with large batches.", "zh": "证明LAMB在大批量下对ResNet-50达到最先进精度。"}, {"en": "Shows LAMB outperforms LARS and AdamW on BERT and ResNet-50 tasks.", "zh": "显示LAMB在BERT和ResNet-50任务上优于LARS和AdamW。"}, {"en": "Introduces mixed-batch training with re-warm-up for stable large-batch optimization.", "zh": "引入混合批量训练与重新预热，实现稳定的大批量优化。"}], "limits": [{"en": "Convergence analysis assumes bounded gradients and smoothness per layer.", "zh": "收敛性分析假设每层梯度有界且光滑。"}, {"en": "Empirical results limited to BERT and ResNet-50; generalizability to other models unverified.", "zh": "实证结果仅限于BERT和ResNet-50，对其他模型的泛化性未验证。"}, {"en": "LAMB requires minimal tuning but optimal hyperparameters may vary across tasks.", "zh": "LAMB需要极少调参，但最优超参数可能因任务而异。"}, {"en": "Large batch training requires significant hardware resources like TPUv3 Pod.", "zh": "大批量训练需要大量硬件资源，如TPUv3 Pod。"}, {"en": "Theoretical analysis simplified with β1=0 and λ=0; general case not fully covered.", "zh": "理论分析简化了β1=0和λ=0的情况，未完全覆盖一般情况。"}]}, "cites": 1211}, {"id": "tpark-1903.07291", "pid": "tpark", "arxiv": "1903.07291", "date": "2019-03-18", "venue": "cs.CV", "org": "UC Berkeley / NVIDIA", "fields": ["generative", "vision"], "tEn": "Semantic Image Synthesis with Spatially-Adaptive Normalization", "tZh": "语义图像合成与空间自适应归一化", "sEn": "We propose spatially-adaptive normalization for photorealistic image synthesis from semantic layouts, outperforming previous methods in visual fidelity and layout alignment.", "sZh": "我们提出空间自适应归一化，用于从语义布局合成逼真图像，在视觉保真度和布局对齐方面优于现有方法。", "absEn": "We propose spatially-adaptive normalization, a simple but effective layer for synthesizing photorealistic images given an input semantic layout. Previous methods directly feed the semantic layout as input to the deep network, which is then processed through stacks of convolution, normalization, and nonlinearity layers. We show that this is suboptimal as the normalization layers tend to ``wash away'' semantic information. To address the issue, we propose using the input layout for modulating the activations in normalization layers through a spatially-adaptive, learned transformation. Experiments on several challenging datasets demonstrate the advantage of the proposed method over existing approaches, regarding both visual fidelity and alignment with input layouts. Finally, our model allows user control over both semantic and style. Code is available at https://github.com/NVlabs/SPADE .", "absZh": "我们提出了空间自适应归一化，这是一种简单但有效的层，用于根据输入的语义布局合成逼真的图像。先前的方法直接将语义布局作为深度网络的输入，然后通过卷积、归一化和非线性层的堆叠进行处理。我们证明这是次优的，因为归一化层往往会“冲走”语义信息。为了解决这个问题，我们提出使用输入布局通过空间自适应的学习变换来调制归一化层中的激活。在几个具有挑战性的数据集上的实验表明，所提出的方法在视觉保真度和与输入布局的对齐方面均优于现有方法。最后，我们的模型允许用户控制语义和风格。代码可在 https://github.com/NVlabs/SPADE 获取。", "insights": {"contrib": [{"en": "Proposes spatially-adaptive normalization (SPADE) to preserve semantic information in normalization layers.", "zh": "提出空间自适应归一化（SPADE），在归一化层中保留语义信息。"}, {"en": "Achieves state-of-the-art results on COCO-Stuff, ADE20K, and Cityscapes datasets.", "zh": "在COCO-Stuff、ADE20K和Cityscapes数据集上取得最优结果。"}, {"en": "Enables multi-modal synthesis by using random noise as generator input.", "zh": "通过使用随机噪声作为生成器输入，实现多模态合成。"}, {"en": "Supports style-guided image synthesis via an image encoder.", "zh": "通过图像编码器支持风格引导的图像合成。"}, {"en": "Simplifies generator architecture by removing encoder, reducing parameters.", "zh": "简化生成器架构，移除编码器，减少参数量。"}, {"en": "Demonstrates that SPADE outperforms feature concatenation for semantic conditioning.", "zh": "证明SPADE在语义条件化上优于特征拼接。"}], "limits": [{"en": "Requires paired segmentation masks and images for training.", "zh": "需要配对的语义分割掩码和图像进行训练。"}, {"en": "Performance depends on quality of input segmentation masks.", "zh": "性能依赖于输入分割掩码的质量。"}, {"en": "Multi-modal synthesis limited by diversity of training data.", "zh": "多模态合成受限于训练数据的多样性。"}, {"en": "Computationally expensive due to multi-scale discriminators and spectral normalization.", "zh": "由于多尺度判别器和谱归一化，计算成本高。"}, {"en": "Style transfer may not generalize to unseen styles outside training distribution.", "zh": "风格迁移可能无法泛化到训练分布之外的未见风格。"}]}, "cites": 3147}, {"id": "zihangdai-1901.02860", "pid": "zihangdai", "arxiv": "1901.02860", "date": "2019-01-09", "venue": "cs.LG", "org": "Carnegie Mellon University / Google", "fields": ["nlp", "deep-learning"], "tEn": "Transformer-XL: Attentive Language Models Beyond a Fixed-Length Context", "tZh": "Transformer-XL：超越固定长度上下文的注意力语言模型", "sEn": "Transformer-XL enables learning longer-term dependency beyond fixed-length context with segment-level recurrence and novel positional encoding.", "sZh": "Transformer-XL通过片段级循环机制和新型位置编码，实现了超越固定长度上下文的长期依赖学习。", "absEn": "Transformers have a potential of learning longer-term dependency, but are limited by a fixed-length context in the setting of language modeling. We propose a novel neural architecture Transformer-XL that enables learning dependency beyond a fixed length without disrupting temporal coherence. It consists of a segment-level recurrence mechanism and a novel positional encoding scheme. Our method not only enables capturing longer-term dependency, but also resolves the context fragmentation problem. As a result, Transformer-XL learns dependency that is 80% longer than RNNs and 450% longer than vanilla Transformers, achieves better performance on both short and long sequences, and is up to 1,800+ times faster than vanilla Transformers during evaluation. Notably, we improve the state-of-the-art results of bpc/perplexity to 0.99 on enwiki8, 1.08 on text8, 18.3 on WikiText-103, 21.8 on One Billion Word, and 54.5 on Penn Treebank (without finetuning). When trained only on WikiText-103, Transformer-XL manages to generate reasonably coherent, novel text articles with thousands of tokens. Our code, pretrained models, and hyperparameters are available in both Tensorflow and PyTorch.", "absZh": "Transformer有学习长期依赖的潜力，但在语言建模中受限于固定长度的上下文。我们提出了一种新颖的神经网络架构Transformer-XL，它能够在不破坏时间连贯性的情况下学习超越固定长度的依赖关系。该架构包含一个片段级循环机制和一种新颖的位置编码方案。我们的方法不仅能够捕捉更长期的依赖关系，还能解决上下文碎片化问题。因此，Transformer-XL学习的依赖关系比RNN长80%，比原始Transformer长450%，在短序列和长序列上均取得了更好的性能，并且在评估时比原始Transformer快1800倍以上。值得注意的是，我们在enwiki8上实现了0.99 bpc/困惑度，在text8上为1.08，在WikiText-103上为18.3，在One Billion Word上为21.8，在Penn Treebank上为54.5（无需微调），均改进了当前最优结果。当仅在WikiText-103上训练时，Transformer-XL能够生成包含数千个标记的合理连贯、新颖的文本文章。我们的代码、预训练模型和超参数可在TensorFlow和PyTorch中获取。", "insights": {"contrib": [{"en": "Proposes Transformer-XL with segment-level recurrence for long-term dependency learning.", "zh": "提出带有段级循环机制的Transformer-XL，用于学习长期依赖。"}, {"en": "Introduces a novel relative positional encoding scheme enabling state reuse.", "zh": "引入新型相对位置编码方案，支持状态复用。"}, {"en": "Achieves state-of-the-art results on five language modeling benchmarks.", "zh": "在五个语言建模基准上取得最优结果。"}, {"en": "Resolves context fragmentation problem, improving performance on short sequences.", "zh": "解决上下文碎片问题，提升短序列性能。"}, {"en": "Demonstrates up to 1,800+ times faster evaluation than vanilla Transformers.", "zh": "推理速度比原始Transformer快1800倍以上。"}, {"en": "Generates coherent long text articles with thousands of tokens.", "zh": "生成数千词元的连贯长文本文章。"}], "limits": [{"en": "Recurrence mechanism requires additional memory for caching hidden states.", "zh": "循环机制需要额外内存来缓存隐藏状态。"}, {"en": "Training still uses fixed-length segments, limiting theoretical context length.", "zh": "训练仍使用固定长度段，限制理论上下文长度。"}, {"en": "Relative positional encoding may not generalize to extremely long sequences.", "zh": "相对位置编码可能无法泛化到极长序列。"}, {"en": "Performance on small datasets relies on regularization techniques.", "zh": "在小数据集上的性能依赖正则化技术。"}, {"en": "Evaluation speed advantage diminishes with very large memory sizes.", "zh": "当记忆规模极大时，推理速度优势减弱。"}]}, "cites": 4380}, {"id": "tkarras-1812.04948", "pid": "tkarras", "arxiv": "1812.04948", "date": "2018-12-12", "venue": "cs.NE", "org": "NVIDIA", "fields": ["generative", "vision"], "tEn": "A Style-Based Generator Architecture for Generative Adversarial Networks", "tZh": "一种基于风格的生成对抗网络生成器架构", "sEn": "A style-based generator architecture for GANs enables unsupervised separation of high-level attributes and stochastic variation, improving quality and disentanglement.", "sZh": "一种基于风格的生成器架构实现了高层属性与随机变化的无监督分离，提升了生成质量和解耦能力。", "absEn": "We propose an alternative generator architecture for generative adversarial networks, borrowing from style transfer literature. The new architecture leads to an automatically learned, unsupervised separation of high-level attributes (e.g., pose and identity when trained on human faces) and stochastic variation in the generated images (e.g., freckles, hair), and it enables intuitive, scale-specific control of the synthesis. The new generator improves the state-of-the-art in terms of traditional distribution quality metrics, leads to demonstrably better interpolation properties, and also better disentangles the latent factors of variation. To quantify interpolation quality and disentanglement, we propose two new, automated methods that are applicable to any generator architecture. Finally, we introduce a new, highly varied and high-quality dataset of human faces.", "absZh": "我们提出了一种替代的生成对抗网络生成器架构，借鉴了风格迁移文献。新架构自动学习并实现了生成图像中高层属性（例如，在人类面部训练时的姿态和身份）与随机变化（例如，雀斑、头发）的无监督分离，并实现了直观的、尺度特定的合成控制。新生成器在传统分布质量指标上提升了最先进水平，展示了更好的插值特性，并更好地解耦了潜在因素的变化。为了量化插值质量和解耦程度，我们提出了两种新的自动化方法，适用于任何生成器架构。最后，我们引入了一个新的、高度多样化和高质量的人脸数据集。", "insights": {"contrib": [{"en": "Proposes a style-based generator architecture for GANs, enabling unsupervised separation of high-level attributes and stochastic variation.", "zh": "提出一种基于风格的生成器架构，实现高层属性与随机变化的无监督分离。"}, {"en": "Introduces an intermediate latent space that improves disentanglement and linearity of factors of variation.", "zh": "引入中间潜在空间，提升变化因素的解耦性和线性度。"}, {"en": "Achieves state-of-the-art FID scores on CelebA-HQ and FFHQ datasets, improving by nearly 20%.", "zh": "在CelebA-HQ和FFHQ数据集上达到最优FID分数，提升近20%。"}, {"en": "Develops two new automated metrics—perceptual path length and linear separability—for quantifying interpolation quality and disentanglement.", "zh": "开发两种新自动指标——感知路径长度和线性可分性——量化插值质量和解耦性。"}, {"en": "Introduces the FFHQ dataset, a high-quality human face dataset with 70,000 images at 1024x1024 resolution.", "zh": "引入FFHQ数据集，包含70,000张1024x1024分辨率的高质量人脸图像。"}, {"en": "Demonstrates scale-specific control of image synthesis through style mixing and noise injection.", "zh": "通过风格混合和噪声注入展示图像合成的尺度特定控制。"}], "limits": [{"en": "The method does not modify the discriminator or loss function, limiting potential improvements from those components.", "zh": "该方法未修改判别器或损失函数，限制了这些组件的潜在改进。"}, {"en": "The proposed metrics rely on pre-trained classifiers and perceptual distances, which may introduce bias.", "zh": "所提指标依赖预训练分类器和感知距离，可能引入偏差。"}, {"en": "The truncation trick reduces variation in generated images, limiting diversity.", "zh": "截断技巧减少生成图像的多样性，限制了变化范围。"}, {"en": "The approach is evaluated only on face and scene datasets; generalization to other domains is not verified.", "zh": "该方法仅在人脸和场景数据集上评估，未验证对其他领域的泛化性。"}, {"en": "The mapping network requires careful tuning of learning rates to avoid training instability.", "zh": "映射网络需要仔细调整学习率以避免训练不稳定。"}]}, "cites": 13116}, {"id": "kxu-1810.00826", "pid": "kxu", "arxiv": "1810.00826", "date": "2018-10-01", "venue": "cs.LG", "org": "MIT", "fields": ["deep-learning"], "tEn": "How Powerful are Graph Neural Networks?", "tZh": "图神经网络有多强大？", "sEn": "GNNs are as powerful as the Weisfeiler-Lehman test but limited in distinguishing certain graph structures.", "sZh": "图神经网络与Weisfeiler-Lehman测试能力相当，但在区分某些图结构上存在局限。", "absEn": "Graph Neural Networks (GNNs) are an effective framework for representation learning of graphs. GNNs follow a neighborhood aggregation scheme, where the representation vector of a node is computed by recursively aggregating and transforming representation vectors of its neighboring nodes. Many GNN variants have been proposed and have achieved state-of-the-art results on both node and graph classification tasks. However, despite GNNs revolutionizing graph representation learning, there is limited understanding of their representational properties and limitations. Here, we present a theoretical framework for analyzing the expressive power of GNNs to capture different graph structures. Our results characterize the discriminative power of popular GNN variants, such as Graph Convolutional Networks and GraphSAGE, and show that they cannot learn to distinguish certain simple graph structures. We then develop a simple architecture that is provably the most expressive among the class of GNNs and is as powerful as the Weisfeiler-Lehman graph isomorphism test. We empirically validate our theoretical findings on a number of graph classification benchmarks, and demonstrate that our model achieves state-of-the-art performance.", "absZh": "图神经网络（GNN）是图表示学习的有效框架，通过邻域聚合方案递归计算节点表示。尽管许多GNN变体在节点和图分类任务上取得了最先进的结果，但其表示能力和局限性尚不明确。本文提出了一个理论框架来分析GNN捕获不同图结构的表达能力，揭示了流行变体（如图卷积网络和GraphSAGE）的判别能力有限，无法区分某些简单图结构。我们进一步开发了一种简单架构，它在GNN类中表达能力最强，且与Weisfeiler-Lehman图同构测试能力相当。实验验证了理论发现，并在多个图分类基准上取得了最先进性能。", "insights": {"contrib": [{"en": "Established theoretical framework analyzing GNN expressive power via WL test.", "zh": "建立了通过WL测试分析GNN表达能力的理论框架。"}, {"en": "Proved GNNs are at most as powerful as WL test in distinguishing graph structures.", "zh": "证明了GNN在区分图结构方面最多与WL测试能力相当。"}, {"en": "Characterized discriminative power of GCN and GraphSAGE, showing they fail on simple structures.", "zh": "刻画了GCN和GraphSAGE的区分能力，表明它们在简单结构上失效。"}, {"en": "Developed Graph Isomorphism Network (GIN) with provably maximal expressive power among GNNs.", "zh": "开发了图同构网络（GIN），在GNN中具有可证明的最大表达能力。"}, {"en": "Identified conditions for injective aggregation and readout to match WL test power.", "zh": "识别了匹配WL测试能力的单射聚合和读出条件。"}, {"en": "Empirically validated theory, showing GIN achieves state-of-the-art on graph classification benchmarks.", "zh": "通过实验验证理论，表明GIN在图分类基准上达到最先进性能。"}], "limits": [{"en": "Analysis assumes countable node features; continuous features require further study.", "zh": "分析假设节点特征可数；连续特征需进一步研究。"}, {"en": "Focuses on neighborhood aggregation GNNs; other architectures like attention not covered.", "zh": "聚焦于邻域聚合GNN；未涵盖注意力等其他架构。"}, {"en": "Theoretical bounds based on WL test; some graphs (e.g., regular) remain indistinguishable.", "zh": "理论界限基于WL测试；某些图（如正则图）仍无法区分。"}, {"en": "Generalization properties and optimization landscape not theoretically addressed.", "zh": "未从理论上解决泛化性质和优化景观问题。"}]}, "cites": 9985}, {"id": "abrock-1809.11096", "pid": "abrock", "arxiv": "1809.11096", "date": "2018-09-28", "venue": "cs.LG", "org": "DeepMind / Heriot-Watt University", "fields": ["generative", "vision"], "tEn": "Large Scale GAN Training for High Fidelity Natural Image Synthesis", "tZh": "大规模GAN训练实现高保真自然图像合成", "sEn": "BigGANs achieve state-of-the-art class-conditional image synthesis on ImageNet at 128x128 resolution with IS 166.5 and FID 7.4.", "sZh": "BigGAN在128x128分辨率的ImageNet上实现了类别条件图像合成的最新成果，IS达到166.5，FID为7.4。", "absEn": "Despite recent progress in generative image modeling, successfully generating high-resolution, diverse samples from complex datasets such as ImageNet remains an elusive goal. To this end, we train Generative Adversarial Networks at the largest scale yet attempted, and study the instabilities specific to such scale. We find that applying orthogonal regularization to the generator renders it amenable to a simple \"truncation trick,\" allowing fine control over the trade-off between sample fidelity and variety by reducing the variance of the Generator's input. Our modifications lead to models which set the new state of the art in class-conditional image synthesis. When trained on ImageNet at 128x128 resolution, our models (BigGANs) achieve an Inception Score (IS) of 166.5 and Frechet Inception Distance (FID) of 7.4, improving over the previous best IS of 52.52 and FID of 18.6.", "absZh": "尽管生成图像建模近期取得了进展，但从ImageNet等复杂数据集中成功生成高分辨率、多样化的样本仍然是一个难以实现的目标。为此，我们以前所未有的规模训练生成对抗网络，并研究了这种规模特有的不稳定性。我们发现，对生成器应用正交正则化使其适用于一种简单的“截断技巧”，通过降低生成器输入的方差，可以精细控制样本保真度和多样性之间的权衡。我们的改进使得模型在类别条件图像合成中达到了新的最优水平。在128x128分辨率的ImageNet上训练时，我们的模型（BigGANs）实现了166.5的初始分数（IS）和7.4的弗雷歇初始距离（FID），相比之前最优的IS 52.52和FID 18.6有了显著提升。", "insights": {"contrib": [{"en": "Demonstrated that GANs benefit dramatically from scaling, training models with 2-4x parameters and 8x batch size.", "zh": "证明GAN从规模扩张中显著受益，训练了参数2-4倍、批量大小8倍的模型。"}, {"en": "Introduced two simple architectural changes (shared embedding, skip-z) that improve scalability and performance.", "zh": "引入两种简单架构变化（共享嵌入、跳跃连接z），提升可扩展性和性能。"}, {"en": "Applied orthogonal regularization to the generator, enabling the truncation trick for fine control over fidelity-variety trade-off.", "zh": "对生成器应用正交正则化，实现截断技巧以精细控制保真度与多样性权衡。"}, {"en": "Discovered and characterized instabilities specific to large-scale GANs, linking them to spectral explosion in generator layers.", "zh": "发现并刻画了大规模GAN特有的不稳定性，将其与生成器层的谱爆炸关联。"}, {"en": "Achieved state-of-the-art Inception Score of 166.5 and FID of 7.4 on ImageNet 128x128, improving over previous best by large margins.", "zh": "在ImageNet 128x128上实现166.5的Inception Score和7.4的FID，大幅超越此前最优。"}, {"en": "Extended findings to JFT-300M dataset, showing design choices transfer and larger datasets may alleviate stability issues.", "zh": "将发现扩展到JFT-300M数据集，表明设计选择可迁移，更大数据集可能缓解稳定性问题。"}], "limits": [{"en": "Training collapse still occurs at large scale, requiring early stopping despite regularization.", "zh": "大规模训练仍会出现崩溃，尽管有正则化仍需早停。"}, {"en": "Stability can be enforced by strong constraints on discriminator, but at a dramatic cost to performance (e.g., 45% IS reduction).", "zh": "通过对判别器施加强约束可确保稳定，但性能代价巨大（如IS降低45%）。"}, {"en": "Truncation trick reduces sample variety; optimal threshold varies across datasets (e.g., JFT-300M vs ImageNet).", "zh": "截断技巧降低样本多样性；最优阈值因数据集而异（如JFT-300M vs ImageNet）。"}, {"en": "Discriminator memorizes training set (98% training accuracy vs 50-55% validation), limiting generalization.", "zh": "判别器记忆训练集（训练准确率98% vs 验证集50-55%），限制泛化。"}, {"en": "Model struggles with classes having less data or more structure (e.g., crowds vs dogs on ImageNet).", "zh": "模型在数据少或结构复杂的类别上表现不佳（如ImageNet上人群 vs 狗）。"}]}, "cites": 6165}, {"id": "jleskovec-1806.08804", "pid": "jleskovec", "arxiv": "1806.08804", "date": "2018-06-22", "venue": "cs.LG", "org": "Stanford", "fields": ["deep-learning"], "tEn": "Hierarchical Graph Representation Learning with Differentiable Pooling", "tZh": "基于可微分池化的层次化图表示学习", "sEn": "DiffPool learns hierarchical graph representations via differentiable soft clustering, boosting GNN accuracy by 5-10%.", "sZh": "DiffPool通过可微分软聚类学习层次化图表示，将GNN准确率提升5-10%。", "absEn": "Recently, graph neural networks (GNNs) have revolutionized the field of graph representation learning through effectively learned node embeddings, and achieved state-of-the-art results in tasks such as node classification and link prediction. However, current GNN methods are inherently flat and do not learn hierarchical representations of graphs---a limitation that is especially problematic for the task of graph classification, where the goal is to predict the label associated with an entire graph. Here we propose DiffPool, a differentiable graph pooling module that can generate hierarchical representations of graphs and can be combined with various graph neural network architectures in an end-to-end fashion. DiffPool learns a differentiable soft cluster assignment for nodes at each layer of a deep GNN, mapping nodes to a set of clusters, which then form the coarsened input for the next GNN layer. Our exp
