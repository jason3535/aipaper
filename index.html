<head>

<title>AI Paper · 双语论文阅读站</title>
<meta name="description" content="著名 AI 学者与他们的代表论文，逐段中英对照全文 + 核心贡献，还能针对论文内容直接问 AI。">
<style>
:root{--ink:#1d1d1f;--sub:#6e6e73;--line:#e6e6ea;--bg:#fff;--surface:#f5f5f7;--surface2:#fafafa;--acc:#0a76e9;
--f-dl:#5b8def;--f-nlp:#7c5cf0;--f-vision:#e0699f;--f-rl:#f0913a;--f-eff:#22a565;--f-gen:#e0566f;}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,system-ui,"PingFang SC","Hiragino Sans GB",sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;line-height:1.6}
a{color:inherit;text-decoration:none}
.wrap{max-width:920px;margin:0 auto;padding:0 22px}
header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(18px);border-bottom:1px solid var(--line)}
.nav{max-width:1100px;margin:0 auto;padding:13px 22px;display:flex;align-items:center;gap:26px}
.brand{font-weight:700;letter-spacing:.3px;display:flex;align-items:center;gap:8px}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--acc)}
.nav .links{margin-left:auto;display:flex;gap:24px;font-size:15px;color:var(--sub)}
.nav .links a:hover{color:var(--ink)}
h1,h2,h3{letter-spacing:-.01em}
.eyebrow{font-size:13px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--acc)}
.title{font-size:30px;font-weight:700;margin:8px 0 0}
section{padding:46px 0}
.sub{color:var(--sub);font-size:16px;margin-top:8px}
.hero{padding:64px 0 30px}
.hero h1{font-size:46px;line-height:1.12;margin:14px 0 0;font-weight:700}
.hero .lead{color:var(--sub);font-size:19px;margin-top:18px;max-width:680px}
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
.chip{font-size:14px;color:var(--sub);background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:7px 14px;cursor:pointer}
.chip.on,.chip:hover{color:#fff;background:var(--ink);border-color:var(--ink)}
.fdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:1px}
.grid{display:grid;gap:16px}
.ppl-grid{grid-template-columns:repeat(auto-fill,minmax(190px,1fr))}
.ppl-card{background:var(--surface2);border:1px solid var(--line);border-radius:18px;padding:22px 18px;text-align:center;cursor:pointer;transition:.15s}
.ppl-card:hover{transform:translateY(-3px);box-shadow:0 14px 34px rgba(20,22,30,.08)}
.av{width:84px;height:84px;border-radius:50%;margin:0 auto 12px;display:grid;place-items:center;font-weight:700;color:#fff;font-size:26px;overflow:hidden;background:linear-gradient(135deg,#9aa4b2,#6b7280)}
.av img{width:100%;height:100%;object-fit:cover}
.ppl-card .n{font-weight:650}.ppl-card .nz{color:var(--sub);font-size:14px}
.ppl-card .ti{color:var(--sub);font-size:12.5px;margin-top:6px;min-height:32px}
.ppl-card .cnt{margin-top:10px;font-size:12px;color:var(--acc);font-weight:600}
.paper-card{display:block;background:var(--surface2);border:1px solid var(--line);border-radius:16px;padding:20px 22px;cursor:pointer;transition:.15s}
.paper-card:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(20,22,30,.07)}
.paper-card .pt{font-weight:650;font-size:18px}
.paper-card .ptz{color:var(--sub);font-size:15px;margin-top:3px}
.paper-card .meta{margin-top:10px;font-size:13px;color:var(--sub);display:flex;gap:12px;flex-wrap:wrap}
.tag{font-size:12px;border-radius:7px;padding:3px 9px;color:#fff}
.row{display:flex;gap:18px;align-items:center}
.bigav{width:108px;height:108px;border-radius:50%;overflow:hidden;display:grid;place-items:center;color:#fff;font-weight:700;font-size:34px;background:linear-gradient(135deg,#9aa4b2,#6b7280);flex:none}
.bigav img{width:100%;height:100%;object-fit:cover}
.bio{color:#333;font-size:16px;margin-top:16px;max-width:720px}
.bioz{color:var(--sub);font-size:15px;margin-top:6px;max-width:720px}
.cards2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}
.icard{background:var(--surface2);border:1px solid var(--line);border-radius:16px;padding:18px 20px}
.icard h4{margin:0 0 10px;font-size:14px;letter-spacing:.06em}
.icard li{margin:9px 0;font-size:15px}.icard li .z{color:var(--sub);font-size:13.5px;display:block}
.reader{margin-top:22px}
.sec-h{font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--acc);margin:30px 0 4px}
.sec-hz{font-size:18px;font-weight:650;margin:0 0 14px}
.para{padding:12px 0;border-bottom:1px solid var(--line)}
.para .en{font-size:16px}
.para .zh{font-size:16px;color:#3a3a3e;margin-top:7px}
.skeleton{height:14px;background:linear-gradient(90deg,#eee,#f6f6f6,#eee);border-radius:6px;margin:10px 0;animation:sk 1.3s infinite}
@keyframes sk{0%{opacity:.6}50%{opacity:1}100%{opacity:.6}}
.askbox{margin-top:22px;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:18px}
.askbox input{width:100%;border:1px solid var(--line);border-radius:12px;padding:13px 15px;font-size:15px;font-family:inherit}
.askbtn{margin-top:10px;background:var(--acc);color:#fff;border:none;border-radius:11px;padding:11px 20px;font-size:15px;font-weight:600;cursor:pointer}
.ans{margin-top:14px;font-size:15px;white-space:pre-wrap;color:#222}
.qsugg{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.qsugg span{font-size:13px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 13px;cursor:pointer;color:var(--sub)}
.back{color:var(--sub);font-size:14px;cursor:pointer;display:inline-block;margin-bottom:6px}
.alink{color:var(--acc);font-weight:600}
.citebar{margin-top:16px;background:linear-gradient(100deg,#eef5ff,#f6f0ff);border:1px solid #dfe7f5;border-radius:14px;padding:14px 18px;font-size:15px;color:#333}

.citeico{display:inline-flex;align-items:center;gap:4px}
.citeico svg{width:13px;height:13px;opacity:.65}
.citebar .num{font-size:26px;font-weight:750;color:var(--acc);margin-right:6px;letter-spacing:-.01em}
footer{border-top:1px solid var(--line);margin-top:40px;padding:30px 0;color:var(--sub);font-size:13px}
.legal{background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-top:16px;line-height:1.7}
/* dark mode */
[data-theme="dark"]{--ink:#f5f5f7;--sub:#a1a1a6;--line:#2a2a2c;--bg:#000;--surface:#1c1c1e;--surface2:#161618;--acc:#2997ff}
[data-theme="dark"] header{background:rgba(20,20,22,.72)}
[data-theme="dark"] .paper-card,[data-theme="dark"] .ppl-card,[data-theme="dark"] .icard,[data-theme="dark"] .askbox{background:#1c1c1e}
[data-theme="dark"] .citebar{background:linear-gradient(100deg,#152034,#1d1830);border-color:#2a3550;color:#dfe4ee}
[data-theme="dark"] .askbox input{background:#0e0e10;color:var(--ink);border-color:#2a2a30}
[data-theme="dark"] .para .zh{color:#c9c9d0}
[data-theme="dark"] .qsugg span{background:#1c1c1e}
[data-theme="dark"] .seg button.on{background:#3a3a3c}
[data-theme="dark"] .sel-btn{box-shadow:0 8px 30px rgba(0,0,0,.5)}
.pfig img{background:#fff}
body[data-lang="zh"] .para .en{display:none}
body[data-lang="en"] .para .zh{display:none}
.pfig{margin:20px 0;text-align:center}
.pfig img{max-width:100%;border:1px solid var(--line);border-radius:10px;background:#fff}
.pfig figcaption{font-size:13px;color:var(--sub);margin-top:8px;text-align:left;line-height:1.6}
.pfig figcaption .lang-zh{display:block;margin-top:2px}
.peq{overflow-x:auto;padding:6px 0;margin:6px 0}
body[data-lang="zh"] .lang-en{display:none}body[data-lang="en"] .lang-zh{display:none}
.navspace{margin-left:auto}.navtools{display:flex;gap:10px;align-items:center}
.seg{display:inline-flex;background:var(--surface2);border-radius:9px;padding:2px}
.seg button{border:none;background:transparent;font-family:inherit;font-size:12.5px;color:var(--sub);padding:5px 11px;border-radius:7px;cursor:pointer;font-weight:600;transition:.15s}
.seg button.on{background:var(--bg);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.12)}
.icon{width:38px;height:38px;border:none;background:transparent;border-radius:9px;display:grid;place-items:center;cursor:pointer;color:var(--sub);transition:.15s}
.icon:hover{background:var(--surface2);color:var(--ink)}.icon svg{width:18px;height:18px}
.sel-bar{position:absolute;display:none;align-items:center;gap:7px;z-index:130;transform:translateX(-50%)}
.sel-btn{display:inline-flex;align-items:center;gap:6px;background:var(--surface);color:var(--ink);border:1px solid var(--line);border-radius:980px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 8px 30px rgba(0,0,0,.18);font-family:inherit;white-space:nowrap}
.hl-locate{background:rgba(41,151,255,.22);border-radius:4px;box-shadow:0 0 0 3px rgba(41,151,255,.22);transition:background .4s}
.orgchip{display:inline-flex;align-items:center;font-size:12px;font-weight:600;color:#fff;border-radius:7px;padding:3px 9px}
.sharebtn{font-size:14px;border:1px solid var(--line);background:var(--surface);border-radius:10px;padding:7px 14px;cursor:pointer;color:var(--ink);font-weight:600}
@media(max-width:680px){.cards2{grid-template-columns:1fr}.nav .links{gap:16px}.hero h1{font-size:34px}}
</style>

const PAPERS = [{"id": "deepseek-2606.19348", "pid": "deepseek", "arxiv": "2606.19348", "date": "2026-04-26", "venue": "cs.CL", "fields": ["nlp", "efficiency"], "tEn": "DeepSeek-V4: Towards Highly Efficient Million-Token Context Intelligence", "tZh": "DeepSeek-V4：迈向高效百万Token上下文智能", "sEn": "DeepSeek-V4 series achieves state-of-the-art efficiency in million-token contexts with hybrid attention and novel optimizers.", "sZh": "DeepSeek-V4系列通过混合注意力机制和新优化器，在百万Token上下文中实现了最先进的效率。", "absEn": "We present a preview version of DeepSeek-V4 series, including two strong Mixture-of-Experts (MoE) language models -- DeepSeek-V4-Pro with 1.6T parameters (49B activated) and DeepSeek-V4-Flash with 284B parameters (13B activated) -- both supporting a context length of one million tokens. DeepSeek-V4 series incorporate several key upgrades in architecture and optimization: (1) a hybrid attention architecture that combines Compressed Sparse Attention (CSA) and Heavily Compressed Attention (HCA) to improve long-context efficiency; (2) Manifold-Constrained Hyper-Connections (mHC) that enhance conventional residual connections; (3) and the Muon optimizer for faster convergence and greater training stability. We pre-train both models on more than 32T diverse and high-quality tokens, followed by a comprehensive post-training pipeline that unlocks and further enhances their capabilities. DeepSeek-V4-Pro-Max, the maximum reasoning effort mode of DeepSeek-V4-Pro, redefines the state-of-the-art for open models, outperforming its predecessors in core tasks. Meanwhile, DeepSeek-V4 series are highly efficient in long-context scenarios. In the one-million-token context setting, DeepSeek-V4-Pro requires only 27% of single-token inference FLOPs and 10% of KV cache compared with DeepSeek-V3.2. This enables us to routinely support one-million-token contexts, thereby making long-horizon tasks and further test-time scaling more feasible. The model checkpoints are available at https://huggingface.co/collections/deepseek-ai/deepseek-v4.", "absZh": "我们发布了DeepSeek-V4系列的预览版，包括两个强大的混合专家（MoE）语言模型——DeepSeek-V4-Pro（1.6T参数，49B激活）和DeepSeek-V4-Flash（284B参数，13B激活），两者均支持百万Token的上下文长度。DeepSeek-V4系列在架构和优化方面引入了多项关键升级：（1）混合注意力架构，结合了压缩稀疏注意力（CSA）和重度压缩注意力（HCA），以提高长上下文效率；（2）流形约束超连接（mHC），增强了传统的残差连接；（3）Muon优化器，实现更快的收敛和更高的训练稳定性。我们在超过32T多样且高质量的Token上预训练了这两个模型，随后通过全面的后训练流程解锁并进一步增强其能力。DeepSeek-V4-Pro-Max是DeepSeek-V4-Pro的最大推理努力模式，重新定义了开放模型的最先进水平，在核心任务上超越了其前代。同时，DeepSeek-V4系列在长上下文场景中效率极高。在百万Token上下文设置下，与DeepSeek-V3.2相比，DeepSeek-V4-Pro仅需27%的单Token推理FLOPs和10%的KV缓存。这使得我们能够常规支持百万Token上下文，从而使长周期任务和进一步的测试时扩展更加可行。模型检查点可在https://huggingface.co/collections/deepseek-ai/deepseek-v4获取。", "insights": {"contrib": [{"en": "Proposes hybrid attention (CSA+HCA) for million-token context with 73% FLOPs reduction.", "zh": "提出混合注意力机制（CSA+HCA），实现百万词元上下文，FLOPs降低73%。"}, {"en": "Introduces Manifold-Constrained Hyper-Connections (mHC) to improve residual connections.", "zh": "引入流形约束超连接（mHC）改进残差连接。"}, {"en": "Adopts Muon optimizer for faster convergence and greater training stability.", "zh": "采用Muon优化器实现更快收敛和更高训练稳定性。"}, {"en": "DeepSeek-V4-Pro-Max sets new SOTA for open models on core tasks.", "zh": "DeepSeek-V4-Pro-Max在核心任务上为开放模型树立新标杆。"}, {"en": "Achieves 10% KV cache and 27% FLOPs vs DeepSeek-V3.2 at 1M context.", "zh": "在百万词元上下文中，KV缓存和FLOPs分别仅为DeepSeek-V3.2的10%和27%。"}, {"en": "Pre-trained on 32T tokens with comprehensive post-training pipeline.", "zh": "在32T词元上预训练，并配有全面的后训练流程。"}], "limits": [{"en": "Only preview version; full evaluation and reproducibility details pending.", "zh": "仅为预览版本，完整评估和可复现细节待公布。"}, {"en": "Extreme scale (1.6T parameters) limits deployment to resource-rich settings.", "zh": "极端规模（1.6T参数）限制部署于资源丰富环境。"}, {"en": "Long-context efficiency gains may not generalize to all downstream tasks.", "zh": "长上下文效率提升可能无法泛化到所有下游任务。"}, {"en": "Hybrid attention design adds architectural complexity and tuning overhead.", "zh": "混合注意力设计增加架构复杂度和调优开销。"}, {"en": "Performance on specialized domains (e.g., code, math) not extensively reported.", "zh": "在专业领域（如代码、数学）的性能未广泛报告。"}]}, "org": "DeepSeek"}, {"id": "dayaguo-2501.12948", "pid": "dayaguo", "arxiv": "2501.12948", "date": "2025-01-22", "venue": "cs.CL", "org": "DeepSeek-AI", "fields": ["nlp", "rl"], "tEn": "DeepSeek-R1: Incentivizing Reasoning Capability in LLMs via Reinforcement Learning", "tZh": "DeepSeek-R1：通过强化学习激励大语言模型的推理能力", "sEn": "Pure reinforcement learning can incentivize reasoning abilities in LLMs without human demonstrations.", "sZh": "纯强化学习无需人类示范即可激励大语言模型的推理能力。", "absEn": "General reasoning represents a long-standing and formidable challenge in artificial intelligence. Recent breakthroughs, exemplified by large language models (LLMs) and chain-of-thought prompting, have achieved considerable success on foundational reasoning tasks. However, this success is heavily contingent upon extensive human-annotated demonstrations, and models' capabilities are still insufficient for more complex problems. Here we show that the reasoning abilities of LLMs can be incentivized through pure reinforcement learning (RL), obviating the need for human-labeled reasoning trajectories. The proposed RL framework facilitates the emergent development of advanced reasoning patterns, such as self-reflection, verification, and dynamic strategy adaptation. Consequently, the trained model achieves superior performance on verifiable tasks such as mathematics, coding competitions, and STEM fields, surpassing its counterparts trained via conventional supervised learning on human demonstrations. Moreover, the emergent reasoning patterns exhibited by these large-scale models can be systematically harnessed to guide and enhance the reasoning capabilities of smaller models.", "absZh": "通用推理是人工智能中一个长期且艰巨的挑战。最近的突破，例如大型语言模型（LLM）和思维链提示，在基础推理任务上取得了显著成功。然而，这种成功严重依赖于大量人工标注的示范，且模型的能力对于更复杂的问题仍显不足。本文表明，通过纯强化学习（RL）可以激励LLM的推理能力，从而无需人工标注的推理轨迹。所提出的RL框架促进了高级推理模式（如自我反思、验证和动态策略调整）的涌现发展。因此，训练后的模型在数学、编程竞赛和STEM领域等可验证任务上表现出色，超越了通过传统监督学习在人类示范上训练的同类模型。此外，这些大规模模型涌现出的推理模式可以被系统地利用，以指导和增强较小模型的推理能力。", "insights": {"contrib": [{"en": "Shows LLM reasoning can be incentivized via pure RL without human-annotated demonstrations.", "zh": "展示了无需人工标注示范，仅通过强化学习即可激发大语言模型的推理能力。"}, {"en": "Introduces DeepSeek-R1-Zero, a model trained via large-scale RL without supervised fine-tuning, achieving strong reasoning performance.", "zh": "提出了 DeepSeek-R1-Zero，该模型通过大规模强化学习训练，无需监督微调即实现了强大的推理性能。"}, {"en": "Develops DeepSeek-R1 with multi-stage training and cold-start data, achieving performance comparable to OpenAI-o1-1217 on reasoning tasks.", "zh": "开发了 DeepSeek-R1，采用多阶段训练和冷启动数据，在推理任务上达到与 OpenAI-o1-1217 相当的性能。"}, {"en": "Demonstrates emergent reasoning behaviors like self-reflection, verification, and dynamic strategy adaptation through RL.", "zh": "展示了通过强化学习涌现的自我反思、验证和动态策略调整等推理行为。"}, {"en": "Shows that reasoning patterns from larger models can be distilled into smaller models, outperforming RL-trained small models.", "zh": "表明大模型的推理模式可蒸馏到小模型，且性能优于小模型自身强化学习训练的结果。"}, {"en": "Open-sources DeepSeek-R1-Zero, DeepSeek-R1, and six distilled dense models to support the research community.", "zh": "开源了 DeepSeek-R1-Zero、DeepSeek-R1 以及六个蒸馏稠密模型，以支持研究社区。"}], "limits": [{"en": "DeepSeek-R1-Zero suffers from poor readability and language mixing issues.", "zh": "DeepSeek-R1-Zero 存在可读性差和语言混杂的问题。"}, {"en": "DeepSeek-R1's general capabilities in function calling, multi-turn, and complex role-playing are inferior to DeepSeek-V3.", "zh": "DeepSeek-R1 在函数调用、多轮对话和复杂角色扮演等通用能力上不如 DeepSeek-V3。"}, {"en": "Language mixing occurs for queries in languages other than Chinese and English.", "zh": "对于中英文以外的查询，存在语言混杂问题。"}, {"en": "DeepSeek-R1 is sensitive to prompts; few-shot prompting degrades its performance.", "zh": "DeepSeek-R1 对提示敏感，少样本提示会降低其性能。"}, {"en": "Large-scale RL has not been extensively applied to software engineering tasks due to long evaluation times.", "zh": "由于评估时间长，大规模强化学习尚未广泛应用于软件工程任务。"}]}}, {"id": "kimiteam-2501.12599", "pid": "kimiteam", "arxiv": "2501.12599", "date": "2025-01-22", "venue": "cs.AI", "org": "Moonshot AI", "fields": ["nlp", "rl"], "tEn": "Kimi k1.5: Scaling Reinforcement Learning with LLMs", "tZh": "Kimi k1.5：通过强化学习扩展大语言模型", "sEn": "Kimi k1.5 achieves state-of-the-art reasoning performance by scaling reinforcement learning with long context and improved policy optimization, matching OpenAI's o1.", "sZh": "Kimi k1.5通过长上下文和优化的策略方法扩展强化学习，在多项基准上达到与OpenAI o1相当的最优推理性能。", "absEn": "Language model pretraining with next token prediction has proved effective for scaling compute but is limited to the amount of available training data. Scaling reinforcement learning (RL) unlocks a new axis for the continued improvement of artificial intelligence, with the promise that large language models (LLMs) can scale their training data by learning to explore with rewards. However, prior published work has not produced competitive results. In light of this, we report on the training practice of Kimi k1.5, our latest multi-modal LLM trained with RL, including its RL training techniques, multi-modal data recipes, and infrastructure optimization. Long context scaling and improved policy optimization methods are key ingredients of our approach, which establishes a simplistic, effective RL framework without relying on more complex techniques such as Monte Carlo tree search, value functions, and process reward models. Notably, our system achieves state-of-the-art reasoning performance across multiple benchmarks and modalities -- e.g., 77.5 on AIME, 96.2 on MATH 500, 94-th percentile on Codeforces, 74.9 on MathVista -- matching OpenAI's o1. Moreover, we present effective long2short methods that use long-CoT techniques to improve short-CoT models, yielding state-of-the-art short-CoT reasoning results -- e.g., 60.8 on AIME, 94.6 on MATH500, 47.3 on LiveCodeBench -- outperforming existing short-CoT models such as GPT-4o and Claude Sonnet 3.5 by a large margin (up to +550%).", "absZh": "基于下一个词预测的语言模型预训练在扩展计算方面已被证明有效，但受限于可用训练数据量。扩展强化学习为人工智能的持续改进开辟了新维度，其前景在于大语言模型可以通过学习基于奖励进行探索来扩展训练数据。然而，先前已发表的工作并未产生有竞争力的结果。鉴于此，我们报告了Kimi k1.5（我们最新的多模态大语言模型，通过强化学习训练）的训练实践，包括其强化学习训练技术、多模态数据方案和基础设施优化。长上下文扩展和改进的策略优化方法是我们方法的关键要素，它建立了一个简单有效的强化学习框架，无需依赖更复杂的技术，如蒙特卡洛树搜索、价值函数和过程奖励模型。值得注意的是，我们的系统在多个基准和模态上实现了最先进的推理性能——例如，AIME 77.5，MATH 500 96.2，Codeforces 94百分位，MathVista 74.9——与OpenAI的o1相当。此外，我们提出了有效的长转短方法，利用长思维链技术改进短思维链模型，产生了最先进的短思维链推理结果——例如，AIME 60.8，MATH500 94.6，LiveCodeBench 47.3——大幅超越现有的短思维链模型，如GPT-4o和Claude Sonnet 3.5（提升高达+550%）。", "insights": {"contrib": [{"en": "Proposes a simplistic RL framework for LLMs using long context scaling and improved policy optimization, achieving state-of-the-art reasoning without complex techniques like Monte Carlo tree search.", "zh": "提出一种基于长上下文缩放和改进策略优化的简化RL框架，无需蒙特卡洛树搜索等复杂技术，实现最先进的推理性能。"}, {"en": "Introduces partial rollouts to efficiently scale RL training to 128k context windows, enabling continued performance improvement with longer contexts.", "zh": "引入部分回滚技术，将RL训练高效扩展到128k上下文窗口，实现随上下文长度增加的性能持续提升。"}, {"en": "Develops effective long2short methods (e.g., length penalty, model merging) to transfer long-CoT reasoning to short-CoT models, achieving state-of-the-art short-CoT results.", "zh": "开发有效的长到短方法（如长度惩罚、模型合并），将长思维链推理迁移到短思维链模型，取得最先进的短思维链结果。"}, {"en": "Demonstrates that scaling context length is a key dimension for continued RL scaling with LLMs, with smaller models matching larger ones via longer CoT.", "zh": "证明上下文长度缩放是LLM中RL持续缩放的关键维度，小模型通过更长的思维链可媲美大模型。"}, {"en": "Achieves multi-modal state-of-the-art reasoning on AIME, MATH 500, Codeforces, and MathVista, matching OpenAI's o1.", "zh": "在AIME、MATH 500、Codeforces和MathVista上实现多模态最先进推理，媲美OpenAI的o1。"}, {"en": "Presents a hybrid deployment framework for efficient on-policy RL training, reducing training-to-inference transition time to under one minute.", "zh": "提出混合部署框架实现高效在线策略RL训练，将训练到推理的转换时间缩短至一分钟以内。"}], "limits": [{"en": "The simplistic RL framework may not generalize to tasks requiring explicit search or value functions beyond long CoT.", "zh": "简化RL框架可能无法泛化到需要显式搜索或价值函数的任务，超出长思维链范围。"}, {"en": "Long2short methods rely on the availability of a high-quality long-CoT teacher model, which may not be available for all domains.", "zh": "长到短方法依赖高质量长思维链教师模型的可用性，并非所有领域都具备。"}, {"en": "The study focuses on verifiable problems with clear rewards; applicability to open-ended tasks with subjective evaluation is limited.", "zh": "研究聚焦于具有明确奖励的可验证问题，对主观评估的开放式任务适用性有限。"}, {"en": "Scaling context length to 128k increases computational cost and may not be feasible for resource-constrained settings.", "zh": "将上下文长度扩展到128k会增加计算成本，在资源受限场景下可能不可行。"}, {"en": "The long2short RL method may still produce overthinking in short models, as length penalty warm-up does not fully eliminate it.", "zh": "长到短RL方法仍可能在短模型中产生过度思考，因为长度惩罚预热未能完全消除。"}]}}, {"id": "wenfengliang-2412.19437", "pid": "wenfengliang", "arxiv": "2412.19437", "date": "2024-12-27", "venue": "cs.CL", "org": "DeepSeek-AI", "fields": ["nlp", "efficiency"], "tEn": "DeepSeek-V3 Technical Report", "tZh": "DeepSeek-V3 技术报告", "sEn": "DeepSeek-V3, a 671B MoE model with 37B activated parameters, achieves top-tier performance with only 2.788M H800 GPU hours training, featuring novel auxiliary-loss-free load balancing and multi-token prediction.", "sZh": "DeepSeek-V3 是一款 671B 总参数、37B 激活参数的 MoE 语言模型，仅用 2.788M H800 GPU 小时训练即可达到顶尖性能，创新性地采用了无辅助损失负载均衡和多 token 预测训练目标。", "absEn": "We present DeepSeek-V3, a strong Mixture-of-Experts (MoE) language model with 671B total parameters with 37B activated for each token. To achieve efficient inference and cost-effective training, DeepSeek-V3 adopts Multi-head Latent Attention (MLA) and DeepSeekMoE architectures, which were thoroughly validated in DeepSeek-V2. Furthermore, DeepSeek-V3 pioneers an auxiliary-loss-free strategy for load balancing and sets a multi-token prediction training objective for stronger performance. We pre-train DeepSeek-V3 on 14.8 trillion diverse and high-quality tokens, followed by Supervised Fine-Tuning and Reinforcement Learning stages to fully harness its capabilities. Comprehensive evaluations reveal that DeepSeek-V3 outperforms other open-source models and achieves performance comparable to leading closed-source models. Despite its excellent performance, DeepSeek-V3 requires only 2.788M H800 GPU hours for its full training. In addition, its training process is remarkably stable. Throughout the entire training process, we did not experience any irrecoverable loss spikes or perform any rollbacks. The model checkpoints are available at https://github.com/deepseek-ai/DeepSeek-V3.", "absZh": "我们提出了 DeepSeek-V3，一个强大的混合专家（MoE）语言模型，总参数量为 671B，每个 token 激活 37B 参数。为了实现高效推理和成本效益训练，DeepSeek-V3 采用了多头潜在注意力（MLA）和 DeepSeekMoE 架构，这些架构在 DeepSeek-V2 中得到了充分验证。此外，DeepSeek-V3 首创了无辅助损失的负载均衡策略，并设置了多 token 预测训练目标以提升性能。我们在 14.8 万亿多样化且高质量的 token 上预训练了 DeepSeek-V3，随后进行了监督微调和强化学习阶段以充分发挥其能力。全面评估显示，DeepSeek-V3 优于其他开源模型，并达到了与领先闭源模型相当的性能。尽管性能卓越，DeepSeek-V3 的完整训练仅需 2.788M H800 GPU 小时。此外，其训练过程非常稳定。在整个训练过程中，我们没有遇到任何不可恢复的损失尖峰或进行任何回滚。模型检查点可在 https://github.com/deepseek-ai/DeepSeek-V3 获取。", "insights": {"contrib": [{"en": "Pioneers an auxiliary-loss-free load balancing strategy for MoE, minimizing performance degradation.", "zh": "首创无辅助损失的MoE负载均衡策略，最小化性能下降。"}, {"en": "Introduces multi-token prediction (MTP) training objective, enhancing overall benchmark performance.", "zh": "引入多词预测训练目标，提升整体基准性能。"}, {"en": "Validates FP8 mixed precision training on an extremely large-scale model for the first time.", "zh": "首次在超大规模模型上验证FP8混合精度训练的有效性。"}, {"en": "Designs DualPipe algorithm for efficient pipeline parallelism with near-zero communication overhead.", "zh": "设计DualPipe算法实现高效流水线并行，通信开销近乎为零。"}, {"en": "Achieves state-of-the-art performance among open-source models, comparable to leading closed-source models.", "zh": "在开源模型中达到最先进性能，与领先闭源模型相当。"}, {"en": "Requires only 2.788M H800 GPU hours for full training, demonstrating exceptional cost efficiency.", "zh": "全训练仅需278.8万H800 GPU小时，成本效益卓越。"}], "limits": [{"en": "Training costs exclude prior research and ablation experiments on architectures, algorithms, or data.", "zh": "训练成本不包括架构、算法或数据的先前研究和消融实验。"}, {"en": "Performance on English factual knowledge (SimpleQA) trails behind GPT-4o and Claude-Sonnet-3.5.", "zh": "英语事实知识（SimpleQA）性能落后于GPT-4o和Claude-Sonnet-3.5。"}, {"en": "Engineering-related tasks slightly below Claude-Sonnet-3.5, though still outperforming other models.", "zh": "工程相关任务略低于Claude-Sonnet-3.5，但仍优于其他模型。"}, {"en": "MTP modules are discarded during inference; only used for training improvement.", "zh": "推理时丢弃MTP模块，仅用于训练改进。"}, {"en": "Token boundary bias may occur for multi-line prompts without terminal line breaks.", "zh": "多行提示无终止换行时可能出现词边界偏差。"}]}}, {"id": "anyang-2412.15115", "pid": "anyang", "arxiv": "2412.15115", "date": "2024-12-19", "venue": "cs.CL", "org": "Alibaba", "fields": ["nlp", "deep-learning"], "tEn": "Qwen2.5 Technical Report", "tZh": "Qwen2.5技术报告", "sEn": "Qwen2.5 achieves top-tier performance across diverse benchmarks, with the 72B model outperforming Llama-3-405B and cost-effective MoE variants competing with GPT-4o.", "sZh": "Qwen2.5在多项基准测试中达到顶尖水平，72B模型超越Llama-3-405B，经济高效的MoE变体与GPT-4o竞争。", "absEn": "In this report, we introduce Qwen2.5, a comprehensive series of large language models (LLMs) designed to meet diverse needs. Compared to previous iterations, Qwen 2.5 has been significantly improved during both the pre-training and post-training stages. In terms of pre-training, we have scaled the high-quality pre-training datasets from the previous 7 trillion tokens to 18 trillion tokens. This provides a strong foundation for common sense, expert knowledge, and reasoning capabilities. In terms of post-training, we implement intricate supervised finetuning with over 1 million samples, as well as multistage reinforcement learning. Post-training techniques enhance human preference, and notably improve long text generation, structural data analysis, and instruction following. To handle diverse and varied use cases effectively, we present Qwen2.5 LLM series in rich sizes. Open-weight offerings include base and instruction-tuned models, with quantized versions available. In addition, for hosted solutions, the proprietary models currently include two mixture-of-experts (MoE) variants: Qwen2.5-Turbo and Qwen2.5-Plus, both available from Alibaba Cloud Model Studio. Qwen2.5 has demonstrated top-tier performance on a wide range of benchmarks evaluating language understanding, reasoning, mathematics, coding, human preference alignment, etc. Specifically, the open-weight flagship Qwen2.5-72B-Instruct outperforms a number of open and proprietary models and demonstrates competitive performance to the state-of-the-art open-weight model, Llama-3-405B-Instruct, which is around 5 times larger. Qwen2.5-Turbo and Qwen2.5-Plus offer superior cost-effectiveness while performing competitively against GPT-4o-mini and GPT-4o respectively. Additionally, as the foundation, Qwen2.5 models have been instrumental in training specialized models such as Qwen2.5-Math, Qwen2.5-Coder, QwQ, and multimodal models.", "absZh": "本报告介绍了Qwen2.5，这是一个旨在满足多样化需求的大型语言模型系列。与之前的版本相比，Qwen2.5在预训练和后训练阶段都得到了显著改进。在预训练方面，我们将高质量预训练数据集从之前的7万亿个token扩展到18万亿个token，为常识、专业知识和推理能力提供了坚实基础。在后训练方面，我们实施了超过100万个样本的复杂监督微调以及多阶段强化学习。后训练技术增强了对人类偏好的对齐，并显著改进了长文本生成、结构化数据分析和指令遵循能力。为了有效处理各种不同的用例，我们提供了多种尺寸的Qwen2.5 LLM系列。开放权重版本包括基础模型和指令微调模型，并提供量化版本。此外，对于托管解决方案，专有模型目前包括两个混合专家（MoE）变体：Qwen2.5-Turbo和Qwen2.5-Plus，均可从阿里云模型工作室获取。Qwen2.5在评估语言理解、推理、数学、编码、人类偏好对齐等广泛基准测试中展示了顶级性能。具体来说，开放权重旗舰模型Qwen2.5-72B-Instruct超越了多个开放和专有模型，并与大约大5倍的最先进开放权重模型Llama-3-405B-Instruct表现相当。Qwen2.5-Turbo和Qwen2.5-Plus在分别与GPT-4o-mini和GPT-4o竞争时提供了卓越的成本效益。此外，作为基础，Qwen2.5模型在训练Qwen2.5-Math、Qwen2.5-Coder、QwQ和多模态模型等专业模型中发挥了重要作用。", "insights": {"contrib": [{"en": "Scaled pre-training data from 7 trillion to 18 trillion tokens, enhancing common sense, expert knowledge, and reasoning.", "zh": "将预训练数据从7万亿词元扩展到18万亿词元，增强了常识、专家知识和推理能力。"}, {"en": "Implemented intricate supervised fine-tuning with over 1 million samples and multistage reinforcement learning.", "zh": "实施了超过100万样本的复杂监督微调以及多阶段强化学习。"}, {"en": "Improved long text generation, structural data analysis, and instruction following via post-training.", "zh": "通过后训练改进了长文本生成、结构化数据分析和指令遵循。"}, {"en": "Offered rich model sizes including open-weight base and instruction-tuned models with quantized versions.", "zh": "提供丰富的模型尺寸，包括开放权重的基座和指令微调模型及其量化版本。"}, {"en": "Proprietary MoE variants Qwen2.5-Turbo and Qwen2.5-Plus achieve competitive performance against GPT-4o-mini and GPT-4o.", "zh": "专有MoE变体Qwen2.5-Turbo和Qwen2.5-Plus在与GPT-4o-mini和GPT-4o的竞争中表现出色。"}, {"en": "Qwen2.5-72B-Instruct outperforms many open and proprietary models, competitive with Llama-3-405B-Instruct.", "zh": "Qwen2.5-72B-Instruct超越了许多开源和专有模型，与Llama-3-405B-Instruct竞争。"}], "limits": [{"en": "Performance evaluated on benchmarks may not fully reflect real-world deployment scenarios.", "zh": "在基准测试上的表现可能无法完全反映实际部署场景。"}, {"en": "Open-weight models are limited to 72B parameters; larger models are proprietary.", "zh": "开放权重模型限于72B参数；更大模型为专有。"}, {"en": "Quantized versions may have slight degradation in accuracy compared to full-precision models.", "zh": "量化版本相比全精度模型可能在精度上略有下降。"}, {"en": "The report does not discuss potential biases or safety issues in detail.", "zh": "报告未详细讨论潜在的偏见或安全问题。"}, {"en": "Specialized models like Qwen2.5-Math and Qwen2.5-Coder are not covered in this report.", "zh": "本报告未涵盖Qwen2.5-Math和Qwen2.5-Coder等专用模型。"}]}}, {"id": "anyang-2409.12191", "pid": "anyang", "arxiv": "2409.12191", "date": "2024-09-18", "venue": "cs.CV", "org": "Alibaba", "fields": ["vision", "nlp"], "tEn": "Qwen2-VL: Enhancing Vision-Language Model's Perception of the World at Any Resolution", "tZh": "Qwen2-VL：增强视觉语言模型在任何分辨率下对世界的感知", "sEn": "Qwen2-VL introduces Naive Dynamic Resolution and M-RoPE, achieving competitive performance comparable to GPT-4o and Claude3.5-Sonnet.", "sZh": "Qwen2-VL 引入朴素动态分辨率机制和多模态旋转位置嵌入，性能媲美 GPT-4o 和 Claude3.5-Sonnet。", "absEn": "We present the Qwen2-VL Series, an advanced upgrade of the previous Qwen-VL models that redefines the conventional predetermined-resolution approach in visual processing. Qwen2-VL introduces the Naive Dynamic Resolution mechanism, which enables the model to dynamically process images of varying resolutions into different numbers of visual tokens. This approach allows the model to generate more efficient and accurate visual representations, closely aligning with human perceptual processes. The model also integrates Multimodal Rotary Position Embedding (M-RoPE), facilitating the effective fusion of positional information across text, images, and videos. We employ a unified paradigm for processing both images and videos, enhancing the model's visual perception capabilities. To explore the potential of large multimodal models, Qwen2-VL investigates the scaling laws for large vision-language models (LVLMs). By scaling both the model size-with versions at 2B, 8B, and 72B parameters-and the amount of training data, the Qwen2-VL Series achieves highly competitive performance. Notably, the Qwen2-VL-72B model achieves results comparable to leading models such as GPT-4o and Claude3.5-Sonnet across various multimodal benchmarks, outperforming other generalist models. Code is available at https://github.com/QwenLM/Qwen2-VL .", "absZh": "我们提出了 Qwen2-VL 系列，这是对之前 Qwen-VL 模型的高级升级，重新定义了视觉处理中传统的预定分辨率方法。Qwen2-VL 引入了朴素动态分辨率机制，使模型能够动态地将不同分辨率的图像处理成不同数量的视觉标记。这种方法使模型能够生成更高效、更准确的视觉表示，紧密贴合人类的感知过程。该模型还集成了多模态旋转位置嵌入（M-RoPE），促进了文本、图像和视频中位置信息的有效融合。我们采用统一的范式处理图像和视频，增强了模型的视觉感知能力。为了探索大型多模态模型的潜力，Qwen2-VL 研究了大型视觉语言模型（LVLMs）的缩放定律。通过缩放模型大小（提供 2B、8B 和 72B 参数版本）和训练数据量，Qwen2-VL 系列实现了极具竞争力的性能。值得注意的是，Qwen2-VL-72B 模型在各种多模态基准测试中取得了与 GPT-4o 和 Claude3.5-Sonnet 等领先模型相当的结果，优于其他通用模型。代码可在 https://github.com/QwenLM/Qwen2-VL 获取。", "insights": {"contrib": [{"en": "Introduces Naive Dynamic Resolution mechanism for processing images at any resolution into variable visual tokens.", "zh": "提出朴素动态分辨率机制，可将任意分辨率图像处理为可变数量的视觉标记。"}, {"en": "Proposes Multimodal Rotary Position Embedding (M-RoPE) to fuse positional info across text, images, and videos.", "zh": "提出多模态旋转位置嵌入（M-RoPE），融合文本、图像和视频的位置信息。"}, {"en": "Unifies image and video processing paradigm, enhancing visual perception with 3D convolutions and frame sampling.", "zh": "统一图像和视频处理范式，通过3D卷积和帧采样增强视觉感知。"}, {"en": "Explores scaling laws for large vision-language models, achieving competitive performance at 2B, 8B, and 72B scales.", "zh": "探索大型视觉语言模型的缩放定律，在2B、8B和72B规模上取得有竞争力的性能。"}, {"en": "Achieves state-of-the-art results on multiple benchmarks, comparable to GPT-4o and Claude3.5-Sonnet.", "zh": "在多个基准上取得最先进结果，与GPT-4o和Claude3.5-Sonnet相当。"}, {"en": "Supports multilingual text understanding in images and robust agent capabilities for device operation.", "zh": "支持图像中多语言文本理解，并具备设备操作的强大智能体能力。"}], "limits": [{"en": "Performance on MMMU benchmark still lags behind GPT-4o, indicating room for improvement in complex reasoning.", "zh": "在MMMU基准上仍落后于GPT-4o，表明复杂推理能力有待提升。"}, {"en": "Video understanding limited to 768 frames per video during evaluation, affecting long video performance.", "zh": "评估时每视频最多提取768帧，影响长视频性能。"}, {"en": "Vision-language navigation performance significantly behind specialized models due to incomplete 3D map modeling.", "zh": "视觉语言导航性能远落后于专用模型，因3D地图建模不完整。"}, {"en": "Excessive upscaling of small images can lead to out-of-distribution samples and performance decline.", "zh": "过度放大微小图像可能导致分布外样本和性能下降。"}, {"en": "Training data cutoff date is June 2023, limiting knowledge of recent events.", "zh": "训练数据截止于2023年6月，限制了对近期事件的了解。"}]}}, {"id": "jietang-2406.12793", "pid": "jietang", "arxiv": "2406.12793", "date": "2024-06-18", "venue": "cs.CL", "org": "Zhipu AI / Tsinghua University", "fields": ["nlp", "generative"], "tEn": "ChatGLM: A Family of Large Language Models from GLM-130B to GLM-4 All Tools", "tZh": "ChatGLM：从GLM-130B到GLM-4 All Tools的大型语言模型家族", "sEn": "ChatGLM family evolves from GLM-130B to GLM-4, with GLM-4 models rivaling GPT-4 in general metrics, long context, and Chinese alignment, and GLM-4 All Tools matching GPT-4 All Tools in tool use.", "sZh": "ChatGLM家族从GLM-130B演进到GLM-4，GLM-4模型在通用指标、长上下文和中文对齐上媲美GPT-4，GLM-4 All Tools在工具使用上匹配GPT-4 All Tools。", "absEn": "We introduce ChatGLM, an evolving family of large language models that we have been developing over time. This report primarily focuses on the GLM-4 language series, which includes GLM-4, GLM-4-Air, and GLM-4-9B. They represent our most capable models that are trained with all the insights and lessons gained from the preceding three generations of ChatGLM. To date, the GLM-4 models are pre-trained on ten trillions of tokens mostly in Chinese and English, along with a small set of corpus from 24 languages, and aligned primarily for Chinese and English usage. The high-quality alignment is achieved via a multi-stage post-training process, which involves supervised fine-tuning and learning from human feedback. Evaluations show that GLM-4 1) closely rivals or outperforms GPT-4 in terms of general metrics such as MMLU, GSM8K, MATH, BBH, GPQA, and HumanEval, 2) gets close to GPT-4-Turbo in instruction following as measured by IFEval, 3) matches GPT-4 Turbo (128K) and Claude 3 for long context tasks, and 4) outperforms GPT-4 in Chinese alignments as measured by AlignBench. The GLM-4 All Tools model is further aligned to understand user intent and autonomously decide when and which tool(s) touse -- including web browser, Python interpreter, text-to-image model, and user-defined functions -- to effectively complete complex tasks. In practical applications, it matches and even surpasses GPT-4 All Tools in tasks like accessing online information via web browsing and solving math problems using Python interpreter. Over the course, we have open-sourced a series of models, including ChatGLM-6B (three generations), GLM-4-9B (128K, 1M), GLM-4V-9B, WebGLM, and CodeGeeX, attracting over 10 million downloads on Hugging face in the year 2023 alone. The open models can be accessed through https://github.com/THUDM and https://huggingface.co/THUDM.", "absZh": "我们介绍了ChatGLM，这是一个不断演进的大型语言模型家族，我们一直在持续开发。本报告主要关注GLM-4语言系列，包括GLM-4、GLM-4-Air和GLM-4-9B。它们代表了我们在前三代ChatGLM中积累的所有见解和经验基础上训练出的最强模型。迄今为止，GLM-4模型在数万亿个token上进行了预训练，这些token主要来自中文和英文，以及来自24种语言的小规模语料库，并主要针对中文和英文使用进行了对齐。高质量的对齐通过多阶段后训练过程实现，包括监督微调和从人类反馈中学习。评估表明，GLM-4 1) 在MMLU、GSM8K、MATH、BBH、GPQA和HumanEval等通用指标上接近或超越GPT-4，2) 在IFEval衡量的指令跟随方面接近GPT-4-Turbo，3) 在长上下文任务上与GPT-4 Turbo（128K）和Claude 3相当，4) 在AlignBench衡量的中文对齐上超越GPT-4。GLM-4 All Tools模型进一步对齐以理解用户意图，并自主决定何时以及使用哪种工具——包括网络浏览器、Python解释器、文本到图像模型和用户自定义函数——以有效完成复杂任务。在实际应用中，它在通过网页浏览获取在线信息和利用Python解释器解决数学问题等任务上匹配甚至超越GPT-4 All Tools。在此过程中，我们开源了一系列模型，包括ChatGLM-6B（三代）、GLM-4-9B（128K、1M）、GLM-4V-9B、WebGLM和CodeGeeX，仅2023年一年就在Hugging Face上吸引了超过1000万次下载。开源模型可通过https://github.com/THUDM和https://huggingface.co/THUDM访问。", "insights": {"contrib": [{"en": "Introduced the GLM-4 model series, achieving performance comparable to GPT-4 on multiple benchmarks.", "zh": "提出了GLM-4模型系列，在多个基准测试中达到与GPT-4相当的性能。"}, {"en": "Developed GLM-4 All Tools, enabling autonomous tool use for complex tasks.", "zh": "开发了GLM-4 All Tools，支持自主调用工具完成复杂任务。"}, {"en": "Established scaling laws through models of various sizes from 1.5B to 130B parameters.", "zh": "通过从1.5B到130B参数的不同规模模型建立了缩放定律。"}, {"en": "Proposed LongAlign for extending context window to 128K and 1M tokens.", "zh": "提出了LongAlign方法，将上下文窗口扩展到128K和1M tokens。"}, {"en": "Open-sourced multiple models including ChatGLM-6B and GLM-4-9B, with over 10 million downloads.", "zh": "开源了包括ChatGLM-6B和GLM-4-9B在内的多个模型，下载量超过1000万。"}, {"en": "Achieved state-of-the-art Chinese alignment performance on AlignBench.", "zh": "在AlignBench上实现了中文对齐的最优性能。"}], "limits": [{"en": "Pre-training data limited to 10 trillion tokens, mostly Chinese and English.", "zh": "预训练数据限于10万亿tokens，主要为中文和英文。"}, {"en": "GLM-4 lags behind GPT-4 Turbo in Chinese math reasoning on AlignBench.", "zh": "GLM-4在AlignBench的中文数学推理上落后于GPT-4 Turbo。"}, {"en": "No fundamental principle identified for data collection and selection.", "zh": "未发现数据收集和选择的基本原则。"}, {"en": "GLM-4 shows gaps to GPT-4 on code-related agentic tasks in AgentBench.", "zh": "GLM-4在AgentBench的代码相关智能体任务上与GPT-4存在差距。"}, {"en": "Safety evaluation limited to Chinese subset of SafetyBench.", "zh": "安全评估仅限于SafetyBench的中文子集。"}]}}, {"id": "svlevine-2406.09246", "pid": "svlevine", "arxiv": "2406.09246", "date": "2024-06-13", "venue": "cs.RO", "org": "Stanford / UC Berkeley", "fields": ["deep-learning", "vision"], "tEn": "OpenVLA: An Open-Source Vision-Language-Action Model", "tZh": "OpenVLA：一个开源的视觉-语言-动作模型", "sEn": "OpenVLA is an open-source 7B-parameter vision-language-action model that outperforms larger closed models and enables efficient fine-tuning on consumer GPUs.", "sZh": "OpenVLA是一个开源的70亿参数视觉-语言-动作模型，性能超越更大的闭源模型，并支持在消费级GPU上高效微调。", "absEn": "Large policies pretrained on a combination of Internet-scale vision-language data and diverse robot demonstrations have the potential to change how we teach robots new skills: rather than training new behaviors from scratch, we can fine-tune such vision-language-action (VLA) models to obtain robust, generalizable policies for visuomotor control. Yet, widespread adoption of VLAs for robotics has been challenging as 1) existing VLAs are largely closed and inaccessible to the public, and 2) prior work fails to explore methods for efficiently fine-tuning VLAs for new tasks, a key component for adoption. Addressing these challenges, we introduce OpenVLA, a 7B-parameter open-source VLA trained on a diverse collection of 970k real-world robot demonstrations. OpenVLA builds on a Llama 2 language model combined with a visual encoder that fuses pretrained features from DINOv2 and SigLIP. As a product of the added data diversity and new model components, OpenVLA demonstrates strong results for generalist manipulation, outperforming closed models such as RT-2-X (55B) by 16.5% in absolute task success rate across 29 tasks and multiple robot embodiments, with 7x fewer parameters. We further show that we can effectively fine-tune OpenVLA for new settings, with especially strong generalization results in multi-task environments involving multiple objects and strong language grounding abilities, and outperform expressive from-scratch imitation learning methods such as Diffusion Policy by 20.4%. We also explore compute efficiency; as a separate contribution, we show that OpenVLA can be fine-tuned on consumer GPUs via modern low-rank adaptation methods and served efficiently via quantization without a hit to downstream success rate. Finally, we release model checkpoints, fine-tuning notebooks, and our PyTorch codebase with built-in support for training VLAs at scale on Open X-Embodiment datasets.", "absZh": "在互联网规模的视觉-语言数据和多样化机器人演示上预训练的大型策略，有潜力改变我们教授机器人新技能的方式：无需从头训练新行为，而是微调此类视觉-语言-动作（VLA）模型，以获得稳健、可泛化的视觉运动控制策略。然而，VLA在机器人领域的广泛采用面临挑战：1）现有VLA大多封闭且不公开；2）先前工作未能探索高效微调VLA以适应新任务的方法，这是采用的关键。针对这些挑战，我们提出了OpenVLA，一个70亿参数的开源VLA，在包含97万条真实世界机器人演示的多样化数据集上训练。OpenVLA基于Llama 2语言模型，结合了融合DINOv2和SigLIP预训练特征的视觉编码器。由于数据多样性和新模型组件的加入，OpenVLA在通用操作上表现出色，在29个任务和多种机器人形态上，绝对任务成功率比RT-2-X（550亿参数）等闭源模型高出16.5%，而参数量仅为后者的1/7。我们进一步展示了可以有效地微调OpenVLA以适应新场景，在多物体多任务环境中具有特别强的泛化能力和语言接地能力，比从头开始的模仿学习方法（如Diffusion Policy）高出20.4%。我们还探索了计算效率；作为另一贡献，我们展示了OpenVLA可以通过现代低秩适应方法在消费级GPU上微调，并通过高效量化提供服务，而不影响下游成功率。最后，我们发布了模型检查点、微调笔记本和PyTorch代码库，内置支持在Open X-Embodiment数据集上大规模训练VLA。", "insights": {"contrib": [{"en": "Introduces OpenVLA, a 7B-parameter open-source vision-language-action model trained on 970k robot demonstrations.", "zh": "提出OpenVLA，一个70亿参数的开源视觉-语言-动作模型，在97万次机器人演示上训练。"}, {"en": "Outperforms closed-source RT-2-X (55B) by 16.5% absolute success rate across 29 tasks with 7x fewer parameters.", "zh": "在29个任务上以7倍更少的参数，绝对成功率比闭源RT-2-X（550亿）高出16.5%。"}, {"en": "Demonstrates effective fine-tuning for new tasks, outperforming Diffusion Policy by 20.4% in multi-task environments.", "zh": "展示了在新任务上的有效微调，在多任务环境中比扩散策略高出20.4%。"}, {"en": "Shows compute-efficient fine-tuning via LoRA and quantization on consumer GPUs without performance loss.", "zh": "展示了通过LoRA和量化在消费级GPU上进行计算高效的微调，且无性能损失。"}, {"en": "Releases model checkpoints, fine-tuning notebooks, and PyTorch codebase for scalable VLA training.", "zh": "发布模型检查点、微调笔记本和用于可扩展VLA训练的PyTorch代码库。"}, {"en": "Explores key design decisions like vision encoder fine-tuning and multiple training epochs for VLA performance.", "zh": "探索了关键设计决策，如视觉编码器微调和多轮训练对VLA性能的影响。"}], "limits": [{"en": "Only supports single-image observations, not multi-image or proprioceptive inputs.", "zh": "仅支持单图像观测，不支持多图像或本体感受输入。"}, {"en": "Inference throughput is limited, unsuitable for high-frequency control setups like ALOHA at 50Hz.", "zh": "推理吞吐量有限，不适用于如ALOHA（50Hz）的高频控制设置。"}, {"en": "Does not achieve very high reliability, typically below 90% success rate on tested tasks.", "zh": "未达到非常高的可靠性，测试任务成功率通常低于90%。"}, {"en": "Many VLA design questions remain unexplored due to compute limitations.", "zh": "由于计算限制，许多VLA设计问题仍未探索。"}, {"en": "Performance on DROID dataset was low, suggesting need for larger mixture weight or model.", "zh": "在DROID数据集上性能较低，表明需要更大的混合权重或模型。"}]}}, {"id": "wenfengliang-2405.04434", "pid": "wenfengliang", "arxiv": "2405.04434", "date": "2024-05-07", "venue": "cs.CL", "org": "DeepSeek-AI", "fields": ["nlp", "efficiency"], "tEn": "DeepSeek-V2: A Strong, Economical, and Efficient Mixture-of-Experts Language Model", "tZh": "DeepSeek-V2：一个强大、经济且高效的混合专家语言模型", "sEn": "DeepSeek-V2 achieves top-tier performance with only 21B activated parameters, saving 42.5% training cost and 93.3% KV cache.", "sZh": "DeepSeek-V2仅用21B激活参数即达到顶尖性能，节省42.5%训练成本和93.3% KV缓存。", "absEn": "We present DeepSeek-V2, a strong Mixture-of-Experts (MoE) language model characterized by economical training and efficient inference. It comprises 236B total parameters, of which 21B are activated for each token, and supports a context length of 128K tokens. DeepSeek-V2 adopts innovative architectures including Multi-head Latent Attention (MLA) and DeepSeekMoE. MLA guarantees efficient inference through significantly compressing the Key-Value (KV) cache into a latent vector, while DeepSeekMoE enables training strong models at an economical cost through sparse computation. Compared with DeepSeek 67B, DeepSeek-V2 achieves significantly stronger performance, and meanwhile saves 42.5% of training costs, reduces the KV cache by 93.3%, and boosts the maximum generation throughput to 5.76 times. We pretrain DeepSeek-V2 on a high-quality and multi-source corpus consisting of 8.1T tokens, and further perform Supervised Fine-Tuning (SFT) and Reinforcement Learning (RL) to fully unlock its potential. Evaluation results show that, even with only 21B activated parameters, DeepSeek-V2 and its chat versions still achieve top-tier performance among open-source models.", "absZh": "我们提出了DeepSeek-V2，一个以经济训练和高效推理为特点的强大混合专家（MoE）语言模型。它总共有236B参数，每个token激活21B，支持128K token的上下文长度。DeepSeek-V2采用了创新架构，包括多头潜在注意力（MLA）和DeepSeekMoE。MLA通过将键值（KV）缓存显著压缩为潜在向量来保证高效推理，而DeepSeekMoE通过稀疏计算以经济成本训练强大模型。与DeepSeek 67B相比，DeepSeek-V2性能显著更强，同时节省了42.5%的训练成本，减少了93.3%的KV缓存，并将最大生成吞吐量提升至5.76倍。我们在一个由8.1T token组成的高质量多源语料库上预训练了DeepSeek-V2，并进一步进行监督微调（SFT）和强化学习（RL）以充分释放其潜力。评估结果显示，即使只有21B激活参数，DeepSeek-V2及其聊天版本在开源模型中仍达到顶尖性能。", "insights": {"contrib": [{"en": "Proposes Multi-head Latent Attention (MLA) with low-rank KV joint compression for efficient inference.", "zh": "提出多头潜在注意力（MLA），通过低秩键值联合压缩实现高效推理。"}, {"en": "Adopts DeepSeekMoE with fine-grained expert segmentation and shared expert isolation for economical training.", "zh": "采用DeepSeekMoE，通过细粒度专家分割和共享专家隔离实现经济训练。"}, {"en": "Achieves top-tier performance among open-source models with only 21B activated parameters.", "zh": "仅用210亿激活参数即在开源模型中达到顶级性能。"}, {"en": "Saves 42.5% training costs, reduces KV cache by 93.3%, and boosts generation throughput by 5.76x vs DeepSeek 67B.", "zh": "相比DeepSeek 67B节省42.5%训练成本，减少93.3%键值缓存，提升生成吞吐量5.76倍。"}, {"en": "Supports 128K context length via YaRN extension and demonstrates robust long-context performance.", "zh": "通过YaRN扩展支持128K上下文长度，并展示稳健的长上下文性能。"}, {"en": "Employs two-stage RL (reasoning then human preference) to enhance alignment without sacrificing standard benchmarks.", "zh": "采用两阶段强化学习（推理对齐后人类偏好对齐），在不牺牲标准基准下增强对齐。"}], "limits": [{"en": "Lacks ongoing knowledge updates after pre-training, limiting adaptability to new information.", "zh": "预训练后缺乏持续知识更新，限制了对新信息的适应能力。"}, {"en": "May generate non-factual information or hallucinations, especially in unverified advice scenarios.", "zh": "可能生成非事实信息或幻觉，尤其在未经验证的建议场景中。"}, {"en": "Proficiency in languages other than Chinese and English is limited due to data composition.", "zh": "由于数据构成，中英文以外的语言能力有限。"}, {"en": "Alignment tax observed: RL training slightly degrades performance on some standard benchmarks like BBH.", "zh": "观察到对齐税：强化学习训练略微降低了BBH等标准基准的性能。"}, {"en": "Currently supports text modality only; multi-modal capabilities are not yet available.", "zh": "目前仅支持文本模态，多模态能力尚未实现。"}]}}, {"id": "kaifulee-2403.04652", "pid": "kaifulee", "arxiv": "2403.04652", "date": "2024-03-07", "venue": "cs.CL", "org": "01.AI", "fields": ["nlp", "deep-learning"], "tEn": "Yi: Open Foundation Models by 01.AI", "tZh": "Yi: 01.AI 的开源基础模型", "sEn": "Yi models achieve strong performance through data quality and engineering efforts.", "sZh": "Yi 模型通过数据质量和工程努力实现强劲性能。", "absEn": "We introduce the Yi model family, a series of language and multimodal models that demonstrate strong multi-dimensional capabilities. The Yi model family is based on 6B and 34B pretrained language models, then we extend them to chat models, 200K long context models, depth-upscaled models, and vision-language models. Our base models achieve strong performance on a wide range of benchmarks like MMLU, and our finetuned chat models deliver strong human preference rate on major evaluation platforms like AlpacaEval and Chatbot Arena. Building upon our scalable super-computing infrastructure and the classical transformer architecture, we attribute the performance of Yi models primarily to its data quality resulting from our data-engineering efforts. For pretraining, we construct 3.1 trillion tokens of English and Chinese corpora using a cascaded data deduplication and quality filtering pipeline. For finetuning, we polish a small scale (less than 10K) instruction dataset over multiple iterations such that every single instance has been verified directly by our machine learning engineers. For vision-language, we combine the chat language model with a vision transformer encoder and train the model to align visual representations to the semantic space of the language model. We further extend the context length to 200K through lightweight continual pretraining and demonstrate strong needle-in-a-haystack retrieval performance. We show that extending the depth of the pretrained checkpoint through continual pretraining further improves performance. We believe that given our current results, continuing to scale up model parameters using thoroughly optimized data will lead to even stronger frontier models.", "absZh": "我们介绍了 Yi 模型系列，这是一系列语言和多模态模型，展现出强大的多维能力。Yi 模型系列基于 6B 和 34B 的预训练语言模型，然后我们将其扩展为聊天模型、200K 长上下文模型、深度上采样模型和视觉语言模型。我们的基础模型在 MMLU 等广泛基准测试中取得了强劲性能，而微调后的聊天模型在 AlpacaEval 和 Chatbot Arena 等主要评估平台上获得了较高的人类偏好率。基于我们可扩展的超级计算基础设施和经典的 Transformer 架构，我们将 Yi 模型的性能主要归因于数据工程努力所带来的数据质量。在预训练方面，我们使用级联数据去重和质量过滤管道构建了 3.1 万亿个 token 的英文和中文语料库。在微调方面，我们通过多次迭代优化了一个小规模（少于 10K）的指令数据集，确保每个实例都经过机器学习工程师的直接验证。对于视觉语言，我们将聊天语言模型与视觉 Transformer 编码器结合，训练模型将视觉表示与语言模型的语义空间对齐。我们通过轻量级持续预训练将上下文长度进一步扩展到 200K，并展示了强大的大海捞针检索性能。我们表明，通过持续预训练增加预训练检查点的深度可以进一步提高性能。我们相信，基于当前的结果，使用经过充分优化的数据继续扩大模型参数将带来更强大的前沿模型。", "insights": {"contrib": [{"en": "Introduces Yi model family with 6B and 34B base models, achieving GPT-3.5-matching performance.", "zh": "提出Yi模型系列，包含6B和34B基础模型，性能媲美GPT-3.5。"}, {"en": "Emphasizes data quality over quantity with a cascaded deduplication and filtering pipeline for pretraining.", "zh": "强调数据质量优于数量，采用级联去重和过滤流水线进行预训练。"}, {"en": "Uses less than 10K handcrafted instruction data for finetuning, iteratively polished by engineers.", "zh": "使用少于1万条手工制作的指令数据进行微调，由工程师反复打磨。"}, {"en": "Extends context to 200K via lightweight continual pretraining with strong retrieval performance.", "zh": "通过轻量持续预训练将上下文扩展至200K，检索性能强劲。"}, {"en": "Develops vision-language models by combining chat language model with vision transformer encoder.", "zh": "通过将聊天语言模型与视觉Transformer编码器结合，开发视觉语言模型。"}, {"en": "Demonstrates depth-upscaling by duplicating layers and continual pretraining to improve performance.", "zh": "通过复制层和持续预训练展示深度扩展以提升性能。"}], "limits": [{"en": "Performance gap remains in math and coding tasks compared to GPT-4 and GPT-3.5.", "zh": "在数学和编程任务上仍与GPT-4和GPT-3.5存在差距。"}, {"en": "Data cleaning pipeline is complex and difficult to optimize via extensive grid search.", "zh": "数据清洗流水线复杂，难以通过广泛网格搜索优化。"}, {"en": "Smaller models like Yi-6B lack strong mathematical capabilities even after finetuning.", "zh": "较小模型如Yi-6B即使在微调后也缺乏强大的数学能力。"}, {"en": "Long-context retrieval performance may not generalize to all real-world tasks.", "zh": "长上下文检索性能可能无法泛化到所有实际任务。"}, {"en": "Model scaling may require even larger data and compute for further improvements.", "zh": "模型扩展可能需要更多数据和算力以进一步改进。"}]}}, {"id": "shuransong-2402.10329", "pid": "shuransong", "arxiv": "2402.10329", "date": "2024-02-15", "venue": "cs.RO", "org": "Stanford / Columbia", "fields": ["vision", "rl"], "tEn": "Universal Manipulation Interface: In-The-Wild Robot Teaching Without In-The-Wild Robots", "tZh": "通用操控接口：无需野外机器人的野外机器人教学", "sEn": "UMI enables zero-shot transfer of human manipulation skills to robots via a portable hand-held gripper and careful interface design.", "sZh": "UMI通过便携式手持夹持器和精心设计的接口，实现了从人类演示到机器人策略的零样本技能迁移。", "absEn": "We present Universal Manipulation Interface (UMI) -- a data collection and policy learning framework that allows direct skill transfer from in-the-wild human demonstrations to deployable robot policies. UMI employs hand-held grippers coupled with careful interface design to enable portable, low-cost, and information-rich data collection for challenging bimanual and dynamic manipulation demonstrations. To facilitate deployable policy learning, UMI incorporates a carefully designed policy interface with inference-time latency matching and a relative-trajectory action representation. The resulting learned policies are hardware-agnostic and deployable across multiple robot platforms. Equipped with these features, UMI framework unlocks new robot manipulation capabilities, allowing zero-shot generalizable dynamic, bimanual, precise, and long-horizon behaviors, by only changing the training data for each task. We demonstrate UMI's versatility and efficacy with comprehensive real-world experiments, where policies learned via UMI zero-shot generalize to novel environments and objects when trained on diverse human demonstrations. UMI's hardware and software system is open-sourced at https://umi-gripper.github.io.", "absZh": "我们提出了通用操控接口（UMI）——一个数据收集和策略学习框架，允许从野外人类演示直接迁移技能到可部署的机器人策略。UMI采用手持式夹持器，结合精心设计的接口，实现便携、低成本且信息丰富的数据收集，用于具有挑战性的双手和动态操控演示。为了促进可部署的策略学习，UMI包含一个精心设计的策略接口，具有推理时延迟匹配和相对轨迹动作表示。由此学习到的策略与硬件无关，可跨多个机器人平台部署。凭借这些特性，UMI框架解锁了新的机器人操控能力，允许零样本泛化的动态、双手、精确和长时域行为，只需为每个任务更改训练数据。我们通过全面的真实世界实验展示了UMI的多功能性和有效性，其中通过UMI学习的策略在多样化的人类演示上训练后，零样本泛化到新环境和物体。UMI的硬件和软件系统已在https://umi-gripper.github.io开源。", "insights": {"contrib": [{"en": "Proposes Universal Manipulation Interface (UMI), a framework enabling direct skill transfer from in-the-wild human demonstrations to deployable robot policies.", "zh": "提出通用操作接口（UMI），一种从野外人类演示直接迁移技能到可部署机器人策略的框架。"}, {"en": "Designs a hand-held gripper with fisheye lens, side mirrors, and IMU-aware tracking for portable, low-cost, and information-rich data collection.", "zh": "设计手持夹爪，配备鱼眼镜头、侧镜和IMU感知追踪，实现便携、低成本且信息丰富的数据采集。"}, {"en": "Introduces inference-time latency matching and relative-trajectory action representation for hardware-agnostic policy deployment.", "zh": "引入推理时延迟匹配和相对轨迹动作表示，实现硬件无关的策略部署。"}, {"en": "Demonstrates zero-shot generalization to novel environments and objects across dynamic, bimanual, precise, and long-horizon tasks.", "zh": "在动态、双手、精确和长时域任务中展示了对新环境和物体的零样本泛化能力。"}, {"en": "Achieves 71.7% success rate in out-of-distribution tests with diverse in-the-wild data, outperforming narrow-domain baselines.", "zh": "使用多样化野外数据在分布外测试中达到71.7%成功率，优于窄域基线。"}, {"en": "Open-sources hardware and software system, enabling reproducible and accessible robot learning.", "zh": "开源硬件和软件系统，实现可复现且易获取的机器人学习。"}], "limits": [{"en": "Relies on kinematic data filtering to ensure feasibility, limiting transfer from hardware-infeasible actions.", "zh": "依赖运动学数据过滤确保可行性，限制了从硬件不可行动作的迁移。"}, {"en": "SLAM-based action recovery requires sufficient texture in the environment, failing in texture-deficient scenes.", "zh": "基于SLAM的动作恢复需要环境中有足够纹理，在纹理缺失场景中失效。"}, {"en": "Data collection with UMI gripper is less efficient than human hand demonstration due to weight and reduced degrees of freedom.", "zh": "UMI夹爪的数据采集效率低于人手演示，因其重量和自由度减少。"}, {"en": "Policy performance depends on careful latency calibration, which varies across hardware platforms.", "zh": "策略性能依赖于仔细的延迟校准，该校准因硬件平台而异。"}, {"en": "Generalization to novel objects and environments requires diverse in-the-wild data, which may be costly to collect.", "zh": "泛化到新物体和环境需要多样化的野外数据，采集成本可能较高。"}]}}, {"id": "dayaguo-2401.14196", "pid": "dayaguo", "arxiv": "2401.14196", "date": "2024-01-25", "venue": "cs.SE", "org": "DeepSeek-AI", "fields": ["nlp", "deep-learning"], "tEn": "DeepSeek-Coder: When the Large Language Model Meets Programming -- The Rise of Code Intelligence", "tZh": "DeepSeek-Coder：当大型语言模型遇见编程——代码智能的崛起", "sEn": "DeepSeek-Coder, an open-source code model series from 1.3B to 33B parameters, achieves state-of-the-art performance, surpassing even closed-source models like Codex and GPT-3.5.", "sZh": "DeepSeek-Coder 系列开源代码模型（1.3B 至 33B 参数）在多项基准测试中达到最优性能，甚至超越了 Codex 和 GPT-3.5 等闭源模型。", "absEn": "The rapid development of large language models has revolutionized code intelligence in software development. However, the predominance of closed-source models has restricted extensive research and development. To address this, we introduce the DeepSeek-Coder series, a range of open-source code models with sizes from 1.3B to 33B, trained from scratch on 2 trillion tokens. These models are pre-trained on a high-quality project-level code corpus and employ a fill-in-the-blank task with a 16K window to enhance code generation and infilling. Our extensive evaluations demonstrate that DeepSeek-Coder not only achieves state-of-the-art performance among open-source code models across multiple benchmarks but also surpasses existing closed-source models like Codex and GPT-3.5. Furthermore, DeepSeek-Coder models are under a permissive license that allows for both research and unrestricted commercial use.", "absZh": "大型语言模型的快速发展彻底改变了软件开发中的代码智能。然而，闭源模型的主导地位限制了广泛的研究和开发。为了解决这一问题，我们推出了 DeepSeek-Coder 系列，这是一系列开源代码模型，参数规模从 1.3B 到 33B，从头开始在 2 万亿个 token 上训练。这些模型在高质量的项目级代码语料库上进行预训练，并采用具有 16K 窗口的填空任务来增强代码生成和填充。我们的广泛评估表明，DeepSeek-Coder 不仅在多个基准测试中在开源代码模型中取得了最先进的性能，而且还超越了现有的闭源模型，如 Codex 和 GPT-3.5。此外，DeepSeek-Coder 模型采用宽松许可证，允许研究和无限制的商业使用。", "insights": {"contrib": [{"en": "Introduces DeepSeek-Coder series, open-source code models from 1.3B to 33B parameters.", "zh": "提出DeepSeek-Coder系列，开源代码模型，参数规模从1.3B到33B。"}, {"en": "First to incorporate repository-level data construction during pre-training, boosting cross-file code generation.", "zh": "首次在预训练中引入仓库级数据构建，提升跨文件代码生成能力。"}, {"en": "Rigorously examines FIM training strategies, revealing trade-offs and optimal configurations.", "zh": "严格分析FIM训练策略，揭示权衡关系与最优配置。"}, {"en": "Achieves state-of-the-art performance among open-source code models across multiple benchmarks.", "zh": "在多个基准测试中达到开源代码模型的最优性能。"}, {"en": "DeepSeek-Coder-Instruct 33B surpasses GPT-3.5 Turbo in code-related tasks after fine-tuning.", "zh": "微调后的DeepSeek-Coder-Instruct 33B在代码任务上超越GPT-3.5 Turbo。"}, {"en": "Releases models under permissive license for research and commercial use.", "zh": "以宽松许可证发布模型，支持研究和商业用途。"}], "limits": [{"en": "Evaluation limited to 87 programming languages; performance on other languages untested.", "zh": "评估限于87种编程语言，其他语言性能未经测试。"}, {"en": "Long-context adaptation only tested up to 16K tokens; reliability beyond that unverified.", "zh": "长上下文适配仅测试至16K token，超出范围的可靠性未验证。"}, {"en": "Potential data contamination from GitHub test sets cannot be fully ruled out.", "zh": "无法完全排除GitHub测试集的数据污染风险。"}, {"en": "FIM training trades off code completion ability for infilling performance.", "zh": "FIM训练在代码补全能力与填充性能之间存在权衡。"}, {"en": "DeepSeek-Coder-v1.5 shows slight coding performance drop despite improved NLP.", "zh": "DeepSeek-Coder-v1.5在NLP提升的同时编码性能略有下降。"}]}}, {"id": "tridao-2312.00752", "pid": "tridao", "arxiv": "2312.00752", "date": "2023-12-01", "venue": "cs.LG", "fields": ["efficiency", "nlp"], "tEn": "Mamba: Linear-Time Sequence Modeling with Selective State Spaces", "tZh": "Mamba：具有选择性状态空间的线性时间序列建模", "sEn": "Mamba achieves linear-time sequence modeling with selective state spaces, outperforming Transformers in efficiency and matching larger models in performance.", "sZh": "Mamba通过选择性状态空间实现线性时间序列建模，在效率上超越Transformer，在性能上匹配更大规模的模型。", "absEn": "Foundation models, now powering most of the exciting applications in deep learning, are almost universally based on the Transformer architecture and its core attention module. Many subquadratic-time architectures such as linear attention, gated convolution and recurrent models, and structured state space models (SSMs) have been developed to address Transformers' computational inefficiency on long sequences, but they have not performed as well as attention on important modalities such as language. We identify that a key weakness of such models is their inability to perform content-based reasoning, and make several improvements. First, simply letting the SSM parameters be functions of the input addresses their weakness with discrete modalities, allowing the model to selectively propagate or forget information along the sequence length dimension depending on the current token. Second, even though this change prevents the use of efficient convolutions, we design a hardware-aware parallel algorithm in recurrent mode. We integrate these selective SSMs into a simplified end-to-end neural network architecture without attention or even MLP blocks (Mamba). Mamba enjoys fast inference (5$\\times$ higher throughput than Transformers) and linear scaling in sequence length, and its performance improves on real data up to million-length sequences. As a general sequence model backbone, Mamba achieves state-of-the-art performance across several modalities such as language, audio, and genomics. On language modeling, our Mamba-3B model outperforms Transformers of the same size and matches Transformers twice its size, both in pretraining and downstream evaluation.", "absZh": "基础模型如今驱动着深度学习中最激动人心的应用，几乎普遍基于Transformer架构及其核心注意力模块。为了解决Transformer在长序列上的计算低效问题，人们开发了许多次二次时间架构，如线性注意力、门控卷积和循环模型以及结构化状态空间模型（SSM），但这些模型在语言等重要模态上的表现不如注意力机制。我们发现这类模型的一个关键弱点在于无法进行基于内容的推理，并做出了若干改进。首先，让SSM参数成为输入的函数，解决了其在离散模态上的弱点，使得模型能够根据当前token沿序列长度维度选择性地传播或遗忘信息。其次，尽管这一改变阻止了高效卷积的使用，我们设计了一种硬件感知的并行算法，以循环模式运行。我们将这些选择性SSM集成到一个简化的端到端神经网络架构中，无需注意力甚至MLP块（Mamba）。Mamba具有快速推理（吞吐量比Transformer高5倍）和序列长度线性扩展的特点，在长达百万长度的真实数据上性能提升。作为通用序列模型骨干，Mamba在语言、音频和基因组学等多种模态上取得了最先进的性能。在语言建模方面，我们的Mamba-3B模型在预训练和下游评估中均优于相同大小的Transformer，并匹配两倍大小的Transformer。", "insights": {"contrib": [{"en": "Proposes Mamba, a selective state space model that outperforms Transformers on long sequences.", "zh": "提出Mamba，一种选择性状态空间模型，在长序列上优于Transformer。"}, {"en": "Identifies content-based reasoning as key weakness of prior SSMs and fixes it with input-dependent parameters.", "zh": "指出先前SSM无法进行基于内容的推理，并通过输入依赖参数解决。"}, {"en": "Designs a hardware-aware parallel algorithm for efficient recurrent mode inference.", "zh": "设计了一种硬件感知的并行算法，实现高效的循环模式推理。"}, {"en": "Achieves 5x higher throughput than Transformers and linear scaling in sequence length.", "zh": "实现比Transformer高5倍的吞吐量，序列长度线性缩放。"}, {"en": "Mamba-3B matches Transformers twice its size in pretraining and downstream tasks.", "zh": "Mamba-3B在预训练和下游任务中匹配两倍大小的Transformer。"}, {"en": "State-of-the-art across language, audio, and genomics modalities.", "zh": "在语言、音频和基因组学等多种模态上达到最先进水平。"}], "limits": [{"en": "Selective SSMs lose convolution efficiency, requiring custom hardware-aware implementation.", "zh": "选择性SSM失去卷积效率，需要定制硬件感知实现。"}, {"en": "Performance on very short sequences may not surpass Transformers due to overhead.", "zh": "由于开销，在极短序列上性能可能不如Transformer。"}, {"en": "Theoretical understanding of why selectivity improves performance is limited.", "zh": "对选择性为何提升性能的理论理解有限。"}, {"en": "Scaling to extremely large models (e.g., 100B+) is not demonstrated.", "zh": "未展示扩展到极大模型（如100B+）的效果。"}, {"en": "Potential numerical stability issues with recurrent mode on long sequences.", "zh": "长序列循环模式可能存在数值稳定性问题。"}]}, "cites": 7660, "org": "CMU"}, {"id": "haotianliu-2310.03744", "pid": "haotianliu", "arxiv": "2310.03744", "date": "2023-10-05", "venue": "cs.CV", "org": "University of Wisconsin-Madison / Microsoft Research", "fields": ["vision", "nlp"], "tEn": "Improved Baselines with Visual Instruction Tuning", "tZh": "通过视觉指令调优改进基线模型", "sEn": "Simple modifications to LLaVA, including using CLIP-ViT-L-336px with MLP projection and adding academic VQA data, achieve state-of-the-art across 11 benchmarks with only 1.2M public data and ~1 day training on 8 A100s.", "sZh": "对LLaVA进行简单修改，包括使用带MLP投影的CLIP-ViT-L-336px并添加学术VQA数据，仅用120万公开数据和8块A100训练约1天，就在11个基准上达到最先进水平。", "absEn": "Large multimodal models (LMM) have recently shown encouraging progress with visual instruction tuning. In this note, we show that the fully-connected vision-language cross-modal connector in LLaVA is surprisingly powerful and data-efficient. With simple modifications to LLaVA, namely, using CLIP-ViT-L-336px with an MLP projection and adding academic-task-oriented VQA data with simple response formatting prompts, we establish stronger baselines that achieve state-of-the-art across 11 benchmarks. Our final 13B checkpoint uses merely 1.2M publicly available data, and finishes full training in ~1 day on a single 8-A100 node. We hope this can make state-of-the-art LMM research more accessible. Code and model will be publicly available.", "absZh": "大型多模态模型（LMM）近期通过视觉指令调优取得了令人鼓舞的进展。本文表明，LLaVA中的全连接视觉-语言跨模态连接器出人意料地强大且数据高效。通过对LLaVA进行简单修改，即使用带MLP投影的CLIP-ViT-L-336px，并添加带有简单响应格式提示的学术任务导向VQA数据，我们建立了更强的基线，在11个基准上达到了最先进水平。我们最终的13B检查点仅使用了120万公开数据，并在单个8-A100节点上约1天内完成全部训练。我们希望这能使最先进的LMM研究更加普及。代码和模型将公开提供。", "insights": {"contrib": [{"en": "Shows that LLaVA's fully-connected vision-language connector is powerful and data-efficient.", "zh": "展示了LLaVA的全连接视觉-语言连接器强大且数据高效。"}, {"en": "Introduces simple modifications: MLP projection and academic VQA data with response formatting prompts.", "zh": "引入简单改进：MLP投影和带响应格式提示的学术VQA数据。"}, {"en": "Achieves state-of-the-art across 11 benchmarks with only 1.2M public data and ~1 day training on 8 A100s.", "zh": "仅用120万公开数据和8块A100约1天训练，在11个基准上达到最先进水平。"}, {"en": "Demonstrates that visual instruction tuning is more important than large-scale pre-training for LMMs.", "zh": "证明视觉指令微调比大规模预训练对LMM更重要。"}, {"en": "Proposes a single response formatting prompt to balance short and long-form answers without extra data processing.", "zh": "提出单一响应格式提示，平衡短和长形式答案，无需额外数据处理。"}, {"en": "Provides fully reproducible and affordable baselines for future LMM research.", "zh": "为未来LMM研究提供完全可复现且负担得起的基线。"}], "limits": [{"en": "Uses full image patches, prolonging training iterations compared to visual resamplers.", "zh": "使用完整图像块，相比视觉重采样器延长训练迭代。"}, {"en": "Cannot process multiple images due to lack of data and context length limits.", "zh": "由于缺乏数据和上下文长度限制，无法处理多张图像。"}, {"en": "Problem-solving capabilities limited in certain domains despite complex instruction following.", "zh": "尽管能遵循复杂指令，但在某些领域问题解决能力有限。"}, {"en": "Not exempt from hallucinations and misinformation, requiring caution in critical applications.", "zh": "无法避免幻觉和错误信息，在关键应用中需谨慎使用。"}]}}, {"id": "anyang-2309.16609", "pid": "anyang", "arxiv": "2309.16609", "date": "2023-09-28", "venue": "cs.CL", "org": "Alibaba", "fields": ["nlp", "deep-learning"], "tEn": "Qwen Technical Report", "tZh": "Qwen技术报告", "sEn": "Qwen is a comprehensive LLM series with base and chat models, showing superior performance and advanced tool-use capabilities.", "sZh": "Qwen是一个包含基础模型和聊天模型的大语言模型系列，展现出卓越的性能和先进的工具使用能力。", "absEn": "Large language models (LLMs) have revolutionized the field of artificial intelligence, enabling natural language processing tasks that were previously thought to be exclusive to humans. In this work, we introduce Qwen, the first installment of our large language model series. Qwen is a comprehensive language model series that encompasses distinct models with varying parameter counts. It includes Qwen, the base pretrained language models, and Qwen-Chat, the chat models finetuned with human alignment techniques. The base language models consistently demonstrate superior performance across a multitude of downstream tasks, and the chat models, particularly those trained using Reinforcement Learning from Human Feedback (RLHF), are highly competitive. The chat models possess advanced tool-use and planning capabilities for creating agent applications, showcasing impressive performance even when compared to bigger models on complex tasks like utilizing a code interpreter. Furthermore, we have developed coding-specialized models, Code-Qwen and Code-Qwen-Chat, as well as mathematics-focused models, Math-Qwen-Chat, which are built upon base language models. These models demonstrate significantly improved performance in comparison with open-source models, and slightly fall behind the proprietary models.", "absZh": "大型语言模型（LLM）彻底改变了人工智能领域，使得以前被认为只有人类才能完成的自然语言处理任务成为可能。在这项工作中，我们介绍了Qwen，这是我们大型语言模型系列的第一部分。Qwen是一个全面的语言模型系列，包含不同参数量的不同模型。它包括Qwen（基础预训练语言模型）和Qwen-Chat（使用人类对齐技术微调的聊天模型）。基础语言模型在众多下游任务中持续展现出优越的性能，而聊天模型，特别是那些使用基于人类反馈的强化学习（RLHF）训练的模型，具有很强的竞争力。聊天模型具备先进的工具使用和规划能力，可用于创建智能体应用，即使在复杂任务（如使用代码解释器）上与更大的模型相比也表现出色。此外，我们还开发了专门用于编码的模型Code-Qwen和Code-Qwen-Chat，以及专注于数学的模型Math-Qwen-Chat，它们都基于基础语言模型构建。这些模型与开源模型相比表现出显著改进的性能，略逊于专有模型。", "insights": {"contrib": [{"en": "Introduces Qwen, a comprehensive LLM series with varying parameter counts.", "zh": "提出Qwen，一个包含不同参数规模的全面大语言模型系列。"}, {"en": "Base pretrained models show superior performance across multiple downstream tasks.", "zh": "基础预训练模型在多个下游任务中表现优异。"}, {"en": "Chat models trained with RLHF achieve highly competitive performance.", "zh": "使用RLHF训练的聊天模型达到高度竞争性表现。"}, {"en": "Chat models possess advanced tool-use and planning for agent applications.", "zh": "聊天模型具备高级工具使用和规划能力，适用于智能体应用。"}, {"en": "Develops Code-Qwen and Math-Qwen-Chat specialized models.", "zh": "开发了Code-Qwen和Math-Qwen-Chat等专用模型。"}, {"en": "Specialized models significantly outperform open-source models and approach proprietary ones.", "zh": "专用模型显著优于开源模型，接近专有模型性能。"}], "limits": [{"en": "Performance on complex tasks slightly falls behind proprietary models.", "zh": "在复杂任务上性能略逊于专有模型。"}, {"en": "Limited evaluation on extremely large-scale or real-world deployment scenarios.", "zh": "在超大规模或实际部署场景下的评估有限。"}, {"en": "Potential biases and safety issues not fully addressed.", "zh": "潜在的偏见和安全问题未完全解决。"}, {"en": "Generalization to non-English languages may be limited.", "zh": "对非英语语言的泛化能力可能有限。"}]}}, {"id": "abrohan-2307.15818", "pid": "abrohan", "arxiv": "2307.15818", "date": "2023-07-28", "venue": "cs.RO", "org": "Google DeepMind", "fields": ["deep-learning", "vision"], "tEn": "RT-2: Vision-Language-Action Models Transfer Web Knowledge to Robotic Control", "tZh": "RT-2：视觉-语言-动作模型将网络知识迁移至机器人控制", "sEn": "RT-2 integrates web-scale vision-language models into robotic control, enabling emergent semantic reasoning and generalization.", "sZh": "RT-2将网络规模的视觉-语言模型融入机器人控制，实现了涌现的语义推理和泛化能力。", "absEn": "We study how vision-language models trained on Internet-scale data can be incorporated directly into end-to-end robotic control to boost generalization and enable emergent semantic reasoning. Our goal is to enable a single end-to-end trained model to both learn to map robot observations to actions and enjoy the benefits of large-scale pretraining on language and vision-language data from the web. To this end, we propose to co-fine-tune state-of-the-art vision-language models on both robotic trajectory data and Internet-scale vision-language tasks, such as visual question answering. In contrast to other approaches, we propose a simple, general recipe to achieve this goal: in order to fit both natural language responses and robotic actions into the same format, we express the actions as text tokens and incorporate them directly into the training set of the model in the same way as natural language tokens. We refer to such category of models as vision-language-action models (VLA) and instantiate an example of such a model, which we call RT-2. Our extensive evaluation (6k evaluation trials) shows that our approach leads to performant robotic policies and enables RT-2 to obtain a range of emergent capabilities from Internet-scale training. This includes significantly improved generalization to novel objects, the ability to interpret commands not present in the robot training data (such as placing an object onto a particular number or icon), and the ability to perform rudimentary reasoning in response to user commands (such as picking up the smallest or largest object, or the one closest to another object). We further show that incorporating chain of thought reasoning allows RT-2 to perform multi-stage semantic reasoning, for example figuring out which object to pick up for use as an improvised hammer (a rock), or which type of drink is best suited for someone who is tired (an energy drink).", "absZh": "我们研究了如何将基于互联网规模数据训练的视觉-语言模型直接融入端到端机器人控制，以提升泛化能力并实现涌现的语义推理。我们的目标是让单个端到端训练的模型既能学习将机器人观测映射到动作，又能受益于来自网络的语音和视觉-语言数据的大规模预训练。为此，我们提出在机器人轨迹数据和互联网规模的视觉-语言任务（如视觉问答）上共同微调最先进的视觉-语言模型。与其他方法不同，我们提出了一个简单通用的方案：为了将自然语言响应和机器人动作适配到同一格式，我们将动作表示为文本标记，并像自然语言标记一样直接将其纳入模型的训练集。我们将这类模型称为视觉-语言-动作模型（VLA），并实例化了一个名为RT-2的模型。我们的广泛评估（6000次评估试验）表明，我们的方法产生了高性能的机器人策略，并使RT-2从互联网规模训练中获得了一系列涌现能力。这包括对新颖物体的显著改进的泛化能力，解释机器人训练数据中未出现的命令的能力（例如将物体放置在特定数字或图标上），以及根据用户命令执行基本推理的能力（例如拿起最小或最大的物体，或最接近另一个物体的物体）。我们进一步表明，结合思维链推理使RT-2能够执行多阶段语义推理，例如找出哪个物体适合用作临时锤子（岩石），或者哪种饮料最适合疲倦的人（能量饮料）。", "insights": {"contrib": [{"en": "Proposes vision-language-action (VLA) models that co-fine-tune VLMs on robotic trajectory data and web-scale vision-language tasks.", "zh": "提出视觉-语言-动作（VLA）模型，在机器人轨迹数据和网络规模的视觉-语言任务上共同微调视觉-语言模型。"}, {"en": "Introduces RT-2, a family of VLA models derived from PaLI-X and PaLM-E, with up to 55B parameters.", "zh": "引入RT-2，一个源自PaLI-X和PaLM-E的VLA模型系列，参数高达550亿。"}, {"en": "Demonstrates that representing robot actions as text tokens enables direct fine-tuning of VLMs for robotic control.", "zh": "证明将机器人动作表示为文本标记可直接微调视觉-语言模型用于机器人控制。"}, {"en": "Shows significant improvements in generalization to novel objects, scenes, and instructions via web-scale pretraining transfer.", "zh": "通过网络规模预训练迁移，展示了对新物体、场景和指令的显著泛化改进。"}, {"en": "Reveals emergent capabilities including symbol understanding, reasoning, and human recognition from vision-language pretraining.", "zh": "揭示了从视觉-语言预训练中涌现的能力，包括符号理解、推理和人类识别。"}, {"en": "Demonstrates chain-of-thought reasoning in VLA models for multi-stage semantic reasoning tasks.", "zh": "展示了VLA模型中的思维链推理，用于多阶段语义推理任务。"}], "limits": [{"en": "Physical skills are limited to the distribution of skills seen in robot data; no new motions from web data.", "zh": "物理技能局限于机器人数据中见过的技能分布；网络数据不带来新动作。"}, {"en": "High computational cost of large VLA models may hinder real-time control at high frequencies.", "zh": "大型VLA模型的高计算成本可能阻碍高频实时控制。"}, {"en": "Limited availability of open-source VLM models suitable for building VLA models.", "zh": "适合构建VLA模型的开源视觉-语言模型数量有限。"}, {"en": "Evaluation is confined to a specific robot platform and kitchen environment, limiting generality.", "zh": "评估局限于特定机器人平台和厨房环境，限制了通用性。"}, {"en": "Co-fine-tuning requires balancing robot and web data, which may be dataset-dependent.", "zh": "共同微调需要平衡机器人和网络数据，这可能依赖于数据集。"}]}}, {"id": "dieterfox-2306.14896", "pid": "dieterfox", "arxiv": "2306.14896", "date": "2023-06-26", "venue": "cs.RO", "org": "NVIDIA", "fields": ["vision", "deep-learning"], "tEn": "RVT: Robotic View Transformer for 3D Object Manipulation", "tZh": "RVT：用于3D物体操作的机器人视角变换器", "sEn": "RVT achieves 26% higher success than state-of-the-art, trains 36x faster, and works across 18 tasks with few real-world demos.", "sZh": "RVT比现有最优方法成功率提高26%，训练速度快36倍，仅需少量真实演示即可完成18种任务。", "absEn": "For 3D object manipulation, methods that build an explicit 3D representation perform better than those relying only on camera images. But using explicit 3D representations like voxels comes at large computing cost, adversely affecting scalability. In this work, we propose RVT, a multi-view transformer for 3D manipulation that is both scalable and accurate. Some key features of RVT are an attention mechanism to aggregate information across views and re-rendering of the camera input from virtual views around the robot workspace. In simulations, we find that a single RVT model works well across 18 RLBench tasks with 249 task variations, achieving 26% higher relative success than the existing state-of-the-art method (PerAct). It also trains 36X faster than PerAct for achieving the same performance and achieves 2.3X the inference speed of PerAct. Further, RVT can perform a variety of manipulation tasks in the real world with just a few ($\\sim$10) demonstrations per task. Visual results, code, and trained model are provided at https://robotic-view-transformer.github.io/.", "absZh": "对于3D物体操作，构建显式3D表示的方法比仅依赖相机图像的方法表现更好。但使用体素等显式3D表示会带来巨大的计算成本，影响可扩展性。在这项工作中，我们提出了RVT，一种用于3D操作的多视角变换器，兼具可扩展性和准确性。RVT的关键特性包括一种跨视角聚合信息的注意力机制，以及从机器人工作空间周围的虚拟视角重新渲染相机输入。在仿真中，我们发现单个RVT模型在18个RLBench任务（含249个任务变体）上表现良好，相对成功率比现有最先进方法（PerAct）高出26%。在达到相同性能的情况下，其训练速度比PerAct快36倍，推理速度是PerAct的2.3倍。此外，RVT在现实世界中仅需每个任务少量（约10个）演示即可执行多种操作任务。视觉结果、代码和训练模型可在https://robotic-view-transformer.github.io/获取。", "insights": {"contrib": [{"en": "Proposes RVT, a multi-view transformer for 3D object manipulation that is both scalable and accurate.", "zh": "提出RVT，一种用于3D物体操作的多视角Transformer，兼具可扩展性和准确性。"}, {"en": "Achieves 26% higher relative success than PerAct on 18 RLBench tasks with 249 variations.", "zh": "在18个RLBench任务（249种变体）上，相对成功率比PerAct高26%。"}, {"en": "Trains 36X faster and achieves 2.3X inference speed compared to PerAct.", "zh": "训练速度比PerAct快36倍，推理速度快2.3倍。"}, {"en": "Demonstrates real-world manipulation with only ~10 demonstrations per task.", "zh": "在真实世界中，每个任务仅需约10次演示即可完成操作。"}, {"en": "Introduces re-rendering from virtual views to decouple sensor images from transformer input.", "zh": "引入从虚拟视角重新渲染，将传感器图像与Transformer输入解耦。"}, {"en": "Investigates design choices like separate processing of image tokens before joint attention.", "zh": "研究了设计选择，例如在联合注意力之前单独处理图像令牌。"}], "limits": [{"en": "Requires calibration of camera-to-robot extrinsics, limiting portability.", "zh": "需要标定相机到机器人的外参，限制了可移植性。"}, {"en": "Struggles with sparse or noisy point clouds, e.g., marker tasks.", "zh": "在稀疏或噪声点云（如标记任务）上表现不佳。"}, {"en": "View specification is manually chosen and not optimized or learned from data.", "zh": "视角规格是手动选择的，未从数据中优化或学习。"}, {"en": "Evaluated only on a limited set of 5 real-world tasks with 51 demonstrations.", "zh": "仅在5个真实世界任务（51次演示）的有限集合上评估。"}, {"en": "Assumes a low-level motion planner and controller for action execution.", "zh": "假设存在低级运动规划器和控制器来执行动作。"}]}}, {"id": "jimfan-2305.16291", "pid": "jimfan", "arxiv": "2305.16291", "date": "2023-05-25", "venue": "cs.AI", "fields": ["rl"], "tEn": "Voyager: An Open-Ended Embodied Agent with Large Language Models", "tZh": "Voyager：基于大型语言模型的开放式具身智能体", "sEn": "Voyager is the first LLM-powered embodied lifelong learning agent in Minecraft that continuously explores, acquires skills, and makes discoveries without human intervention.", "sZh": "
