and harmful behavior that may emerge from poor design of real-world AI systems. We present a list of five practical research problems related to accident risk, categorized according to whether the problem originates from having the wrong objective function (\"avoiding side effects\" and \"avoiding reward hacking\"), an objective function that is too expensive to evaluate frequently (\"scalable supervision\"), or undesirable behavior during the learning process (\"safe exploration\" and \"distributional shift\"). We review previous work in these areas as well as suggesting research directions with a focus on relevance to cutting-edge AI systems. Finally, we consider the high-level question of how to think most productively about the safety of forward-looking applications of AI.", "absZh": "机器学习和人工智能的快速发展使人们越来越关注AI技术对社会的潜在影响。本文讨论了一种潜在影响：机器学习系统中的事故问题，即由于现实世界AI系统设计不当而可能出现的意外和有害行为。我们列出了与事故风险相关的五个实际研究问题，根据问题源于目标函数错误（“避免副作用”和“避免奖励黑客”）、目标函数评估过于昂贵（“可扩展监督”），还是学习过程中的不良行为（“安全探索”和“分布偏移”）进行分类。我们回顾了这些领域的先前工作，并提出了与前沿AI系统相关的研究方向。最后，我们考虑了如何最有效地思考前瞻性AI应用的安全性问题。", "insights": {"contrib": [{"en": "Defines five concrete AI accident problems: negative side effects, reward hacking, scalable oversight, safe exploration, and distributional shift.", "zh": "定义了五个具体的AI事故问题：负面副作用、奖励黑客、可扩展监督、安全探索和分布偏移。"}, {"en": "Categorizes accident sources: wrong objective function, expensive evaluation, and undesirable learning behavior.", "zh": "将事故来源分类：错误的目标函数、昂贵的评估和不理想的学习行为。"}, {"en": "Proposes practical research directions for each problem, including impact regularizers and adversarial reward functions.", "zh": "为每个问题提出了实用的研究方向，包括影响正则化和对抗性奖励函数。"}, {"en": "Highlights the increasing relevance of safety research due to trends in deep RL, complex agents, and autonomy.", "zh": "强调了由于深度强化学习、复杂智能体和自主性趋势，安全研究日益重要。"}, {"en": "Introduces semi-supervised RL as a scalable oversight method to reduce reliance on expensive reward evaluations.", "zh": "引入了半监督强化学习作为一种可扩展监督方法，以减少对昂贵奖励评估的依赖。"}, {"en": "Emphasizes the need for robust exploration strategies to avoid catastrophic failures in real-world RL systems.", "zh": "强调了需要稳健的探索策略，以避免现实世界强化学习系统中的灾难性失败。"}], "limits": [{"en": "Focuses on technical problems, omitting broader societal, ethical, and policy implications of AI safety.", "zh": "聚焦技术问题，忽略了AI安全更广泛的社会、伦理和政策影响。"}, {"en": "Proposed solutions like impact regularizers are preliminary and lack empirical validation on complex tasks.", "zh": "提出的解决方案如影响正则化是初步的，缺乏在复杂任务上的实证验证。"}, {"en": "Assumes RL and supervised learning paradigms, limiting applicability to other AI approaches like unsupervised learning.", "zh": "假设强化学习和监督学习范式，限制了在其他AI方法（如无监督学习）上的适用性。"}, {"en": "Does not address adversarial attacks or security vulnerabilities beyond reward hacking and side effects.", "zh": "未涉及对抗性攻击或超出奖励黑客和副作用的安全漏洞。"}, {"en": "Scalable oversight methods like semi-supervised RL may not scale to highly complex or long-horizon tasks.", "zh": "可扩展监督方法如半监督强化学习可能无法扩展到高度复杂或长期任务。"}]}, "cites": 3206, "org": "Google"}, {"id": "lcchen-1606.00915", "pid": "lcchen", "arxiv": "1606.00915", "date": "2016-06-02", "venue": "cs.CV", "org": "Google", "fields": ["vision", "deep-learning"], "tEn": "DeepLab: Semantic Image Segmentation with Deep Convolutional Nets, Atrous Convolution, and Fully Connected CRFs", "tZh": "DeepLab：基于深度卷积网络、空洞卷积和全连接条件随机场的语义图像分割", "sEn": "DeepLab combines atrous convolution, ASPP, and fully connected CRFs to achieve state-of-the-art semantic segmentation.", "sZh": "DeepLab结合空洞卷积、ASPP和全连接CRF，实现了语义分割的最新成果。", "absEn": "In this work we address the task of semantic image segmentation with Deep Learning and make three main contributions that are experimentally shown to have substantial practical merit. First, we highlight convolution with upsampled filters, or 'atrous convolution', as a powerful tool in dense prediction tasks. Atrous convolution allows us to explicitly control the resolution at which feature responses are computed within Deep Convolutional Neural Networks. It also allows us to effectively enlarge the field of view of filters to incorporate larger context without increasing the number of parameters or the amount of computation. Second, we propose atrous spatial pyramid pooling (ASPP) to robustly segment objects at multiple scales. ASPP probes an incoming convolutional feature layer with filters at multiple sampling rates and effective fields-of-views, thus capturing objects as well as image context at multiple scales. Third, we improve the localization of object boundaries by combining methods from DCNNs and probabilistic graphical models. The commonly deployed combination of max-pooling and downsampling in DCNNs achieves invariance but has a toll on localization accuracy. We overcome this by combining the responses at the final DCNN layer with a fully connected Conditional Random Field (CRF), which is shown both qualitatively and quantitatively to improve localization performance. Our proposed \"DeepLab\" system sets the new state-of-art at the PASCAL VOC-2012 semantic image segmentation task, reaching 79.7% mIOU in the test set, and advances the results on three other datasets: PASCAL-Context, PASCAL-Person-Part, and Cityscapes. All of our code is made publicly available online.", "absZh": "本文利用深度学习解决语义图像分割任务，并做出三项具有实际价值的主要贡献。首先，我们强调使用上采样滤波器的卷积（即“空洞卷积”）作为密集预测任务中的强大工具。空洞卷积使我们能够显式控制深度卷积神经网络中特征响应的计算分辨率，同时有效扩大滤波器的视野以融入更大上下文，而不增加参数数量或计算量。其次，我们提出空洞空间金字塔池化（ASPP）以稳健地分割多尺度物体。ASPP使用多个采样率和有效视野的滤波器探测输入卷积特征层，从而捕获多尺度的物体及图像上下文。第三，我们通过结合深度卷积神经网络和概率图模型的方法，改进了物体边界的定位。深度卷积神经网络中常用的最大池化和下采样组合实现了不变性，但牺牲了定位精度。我们通过将最终深度卷积神经网络层的响应与全连接条件随机场（CRF）相结合来克服这一问题，定性和定量结果均表明定位性能得到提升。我们提出的“DeepLab”系统在PASCAL VOC-2012语义图像分割任务中达到了新的最优水平，测试集上mIOU为79.7%，并在其他三个数据集（PASCAL-Context、PASCAL-Person-Part和Cityscapes）上取得了更优结果。所有代码均已公开。", "insights": {"contrib": [{"en": "Proposed atrous convolution for dense feature extraction in DCNNs, controlling resolution without increasing parameters.", "zh": "提出空洞卷积用于DCNN密集特征提取，在不增加参数的情况下控制分辨率。"}, {"en": "Introduced Atrous Spatial Pyramid Pooling (ASPP) to robustly segment objects at multiple scales.", "zh": "引入空洞空间金字塔池化（ASPP），以鲁棒地分割多尺度物体。"}, {"en": "Combined DCNN with fully connected CRF to improve object boundary localization.", "zh": "将DCNN与全连接条件随机场结合，改善物体边界定位。"}, {"en": "Achieved state-of-the-art results on PASCAL VOC 2012, PASCAL-Context, PASCAL-Person-Part, and Cityscapes.", "zh": "在PASCAL VOC 2012、PASCAL-Context、PASCAL-Person-Part和Cityscapes上取得最先进结果。"}, {"en": "Demonstrated that atrous convolution enlarges filter field-of-view without extra computation.", "zh": "证明空洞卷积在不增加计算量的情况下扩大滤波器视野。"}, {"en": "Showed that CRF post-processing refines segmentation boundaries and removes false positives.", "zh": "表明CRF后处理细化分割边界并去除假阳性。"}], "limits": [{"en": "CRF used as post-processing, not jointly trained with DCNN, limiting end-to-end optimization.", "zh": "CRF作为后处理，未与DCNN联合训练，限制了端到端优化。"}, {"en": "Method fails on fine object boundaries like bicycles and chairs due to low unary confidence.", "zh": "方法在自行车和椅子等精细物体边界上失败，因一元置信度低。"}, {"en": "High-resolution images require splitting into overlapped regions due to GPU memory limits.", "zh": "高分辨率图像因GPU内存限制需分割为重叠区域。"}, {"en": "Multiscale processing increases computation cost by processing multiple image scales.", "zh": "多尺度处理通过处理多个图像尺度增加了计算成本。"}, {"en": "Model relies on pre-trained ImageNet classifiers, which may not generalize to all domains.", "zh": "模型依赖预训练的ImageNet分类器，可能无法泛化到所有领域。"}]}, "cites": 21123}, {"id": "tianqi-1603.02754", "pid": "tianqi", "arxiv": "1603.02754", "date": "2016-03-09", "venue": "cs.LG", "fields": ["efficiency", "deep-learning"], "tEn": "XGBoost: A Scalable Tree Boosting System", "tZh": "XGBoost：一种可扩展的树提升系统", "sEn": "XGBoost is a scalable tree boosting system that achieves state-of-the-art results on many machine learning challenges using novel sparsity-aware algorithms and efficient system optimizations.", "sZh": "XGBoost是一种可扩展的树提升系统，通过新颖的稀疏感知算法和高效的系统优化，在众多机器学习挑战中取得了最先进的结果。", "absEn": "Tree boosting is a highly effective and widely used machine learning method. In this paper, we describe a scalable end-to-end tree boosting system called XGBoost, which is used widely by data scientists to achieve state-of-the-art results on many machine learning challenges. We propose a novel sparsity-aware algorithm for sparse data and weighted quantile sketch for approximate tree learning. More importantly, we provide insights on cache access patterns, data compression and sharding to build a scalable tree boosting system. By combining these insights, XGBoost scales beyond billions of examples using far fewer resources than existing systems.", "absZh": "树提升是一种高效且广泛使用的机器学习方法。在本文中，我们描述了一个可扩展的端到端树提升系统，称为XGBoost，它被数据科学家广泛使用，在许多机器学习挑战中取得了最先进的结果。我们提出了一种新颖的稀疏感知算法用于稀疏数据，以及加权分位数草图用于近似树学习。更重要的是，我们提供了关于缓存访问模式、数据压缩和分片的见解，以构建一个可扩展的树提升系统。通过结合这些见解，XGBoost使用比现有系统少得多的资源，能够扩展到数十亿个示例。", "insights": {"contrib": [{"en": "Proposes XGBoost, a scalable end-to-end tree boosting system achieving state-of-the-art results on many ML challenges.", "zh": "提出 XGBoost，一个可扩展的端到端树提升系统，在众多机器学习挑战中取得最先进的结果。"}, {"en": "Introduces a novel sparsity-aware algorithm for handling sparse data efficiently.", "zh": "引入一种新颖的稀疏感知算法，高效处理稀疏数据。"}, {"en": "Develops a theoretically justified weighted quantile sketch for approximate tree learning.", "zh": "开发了一种理论上合理的加权分位数草图，用于近似树学习。"}, {"en": "Provides insights on cache access patterns, data compression, and sharding to build a scalable system.", "zh": "提供了关于缓存访问模式、数据压缩和分片的见解，以构建可扩展系统。"}, {"en": "XGBoost scales beyond billions of examples using far fewer resources than existing systems.", "zh": "XGBoost 使用比现有系统少得多的资源，可扩展到数十亿样本。"}, {"en": "Achieves over 10x speedup compared to popular solutions on a single machine.", "zh": "在单机上比流行解决方案快 10 倍以上。"}], "limits": [{"en": "The weighted quantile sketch assumes second-order gradient statistics as weights, which may not be optimal for all loss functions.", "zh": "加权分位数草图假设二阶梯度统计作为权重，可能并非对所有损失函数最优。"}, {"en": "Cache-aware prefetching is primarily beneficial for exact greedy algorithm on large datasets; approximate algorithms require careful block size tuning.", "zh": "缓存感知预取主要对大数据集上的精确贪心算法有益；近似算法需要仔细调整块大小。"}, {"en": "Out-of-core computation relies on disk I/O, which can become a bottleneck despite compression and sharding.", "zh": "核外计算依赖磁盘 I/O，尽管有压缩和分片，仍可能成为瓶颈。"}, {"en": "The system's performance may degrade on datasets with extremely high dimensionality due to column subsampling overhead.", "zh": "在极高维数据集上，由于列子采样开销，系统性能可能下降。"}, {"en": "The paper does not extensively compare with deep learning methods on non-tabular data like images or text.", "zh": "论文未在图像或文本等非表格数据上与深度学习方法进行广泛比较。"}]}, "org": "U. Washington", "cites": 56035}, {"id": "dkingma-1602.07868", "pid": "dkingma", "arxiv": "1602.07868", "date": "2016-02-25", "venue": "cs.LG", "org": "OpenAI", "fields": ["deep-learning", "efficiency"], "tEn": "Weight Normalization: A Simple Reparameterization to Accelerate Training of Deep Neural Networks", "tZh": "权重归一化：一种加速深度神经网络训练的简单重参数化方法", "sEn": "Weight normalization decouples weight vector length from direction, speeding up SGD convergence without batch dependencies.", "sZh": "权重归一化将权重向量的长度与方向解耦，在不引入批次依赖的情况下加速随机梯度下降收敛。", "absEn": "We present weight normalization: a reparameterization of the weight vectors in a neural network that decouples the length of those weight vectors from their direction. By reparameterizing the weights in this way we improve the conditioning of the optimization problem and we speed up convergence of stochastic gradient descent. Our reparameterization is inspired by batch normalization but does not introduce any dependencies between the examples in a minibatch. This means that our method can also be applied successfully to recurrent models such as LSTMs and to noise-sensitive applications such as deep reinforcement learning or generative models, for which batch normalization is less well suited. Although our method is much simpler, it still provides much of the speed-up of full batch normalization. In addition, the computational overhead of our method is lower, permitting more optimization steps to be taken in the same amount of time. We demonstrate the usefulness of our method on applications in supervised image recognition, generative modelling, and deep reinforcement learning.", "absZh": "我们提出权重归一化：一种对神经网络权重向量的重参数化方法，将权重向量的长度与其方向解耦。通过这种重参数化，我们改善了优化问题的条件，并加速了随机梯度下降的收敛。我们的重参数化受批归一化启发，但不会在迷你批次中的样本之间引入任何依赖关系。这意味着我们的方法也可以成功应用于循环模型（如LSTM）以及对噪声敏感的应用（如深度强化学习或生成模型），而批归一化在这些场景中不太适用。尽管我们的方法更简单，但它仍能提供接近完整批归一化的加速效果。此外，我们的方法计算开销更低，允许在相同时间内进行更多优化步骤。我们在监督图像识别、生成建模和深度强化学习等应用中展示了我们方法的实用性。", "insights": {"contrib": [{"en": "Proposes weight normalization, a reparameterization decoupling weight vector length from direction to improve optimization conditioning.", "zh": "提出权重归一化，一种将权重向量长度与方向解耦的重参数化方法，以改善优化问题的条件。"}, {"en": "Demonstrates faster convergence of stochastic gradient descent with weight normalization across supervised, generative, and reinforcement learning tasks.", "zh": "在监督学习、生成建模和强化学习任务中，展示了权重归一化加速随机梯度下降收敛的效果。"}, {"en": "Shows weight normalization works well with recurrent models like LSTMs and noise-sensitive applications where batch normalization fails.", "zh": "表明权重归一化在LSTM等循环模型及批归一化不适用的噪声敏感应用中表现良好。"}, {"en": "Introduces mean-only batch normalization combined with weight normalization, achieving state-of-the-art CIFAR-10 test error without data augmentation.", "zh": "引入仅均值批归一化与权重归一化的组合，在不使用数据增强的CIFAR-10上达到最优测试误差。"}, {"en": "Provides theoretical analysis showing weight normalization projects gradients away from current weight vector, reducing noise and stabilizing learning.", "zh": "提供理论分析，表明权重归一化将梯度投影到当前权重向量之外，降低噪声并稳定学习。"}, {"en": "Offers a computationally cheap and deterministic alternative to batch normalization with lower overhead and no minibatch dependencies.", "zh": "提供一种计算廉价且确定性的批归一化替代方案，开销更低且无小批量依赖。"}], "limits": [{"en": "Weight normalization does not fix feature scale across layers, requiring careful data-based initialization for optimal performance.", "zh": "权重归一化不固定跨层特征尺度，需要基于数据的初始化以获得最佳性能。"}, {"en": "The method may not be applicable to models where data-based initialization is infeasible, such as recurrent networks without clear minibatch structure.", "zh": "该方法可能不适用于无法进行基于数据初始化的模型，例如缺乏明确小批量结构的循环网络。"}, {"en": "Empirical results show batch normalization achieves slightly better per-epoch progress early on, though weight normalization compensates with lower computational cost.", "zh": "实验结果表明，批归一化在早期每轮进度略优，但权重归一化以更低计算成本弥补。"}, {"en": "The analysis of gradient projection assumes no momentum or adaptive learning rates, which may not hold for modern optimizers like Adam.", "zh": "梯度投影分析假设无动量或自适应学习率，可能不适用于Adam等现代优化器。"}, {"en": "Mean-only batch normalization combined with weight normalization introduces additional complexity and may not generalize to all architectures.", "zh": "仅均值批归一化与权重归一化组合引入额外复杂性，可能不适用于所有架构。"}]}, "cites": 2116}, {"id": "vmnih-1602.01783", "pid": "vmnih", "arxiv": "1602.01783", "date": "2016-02-04", "venue": "cs.LG", "org": "Google DeepMind", "fields": ["rl", "deep-learning"], "tEn": "Asynchronous Methods for Deep Reinforcement Learning", "tZh": "深度强化学习的异步方法", "sEn": "Asynchronous methods stabilize training and achieve state-of-the-art results on Atari using only CPU.", "sZh": "异步方法稳定了训练过程，并仅使用CPU就在Atari领域取得了最先进的结果。", "absEn": "We propose a conceptually simple and lightweight framework for deep reinforcement learning that uses asynchronous gradient descent for optimization of deep neural network controllers. We present asynchronous variants of four standard reinforcement learning algorithms and show that parallel actor-learners have a stabilizing effect on training allowing all four methods to successfully train neural network controllers. The best performing method, an asynchronous variant of actor-critic, surpasses the current state-of-the-art on the Atari domain while training for half the time on a single multi-core CPU instead of a GPU. Furthermore, we show that asynchronous actor-critic succeeds on a wide variety of continuous motor control problems as well as on a new task of navigating random 3D mazes using a visual input.", "absZh": "我们提出了一个概念上简单且轻量级的深度强化学习框架，该框架使用异步梯度下降来优化深度神经网络控制器。我们提出了四种标准强化学习算法的异步变体，并表明并行actor-learner对训练具有稳定作用，使得所有四种方法都能成功训练神经网络控制器。表现最好的方法，即actor-critic的异步变体，在Atari领域超越了当前最先进的技术，同时在单个多核CPU（而非GPU）上训练时间减半。此外，我们表明异步actor-critic在广泛的连续电机控制问题以及使用视觉输入导航随机3D迷宫的新任务上均取得了成功。", "insights": {"contrib": [{"en": "Proposes asynchronous gradient descent for deep RL, enabling stable training without experience replay.", "zh": "提出异步梯度下降用于深度强化学习，无需经验回放即可稳定训练。"}, {"en": "Introduces four asynchronous RL algorithms: one-step Q, Sarsa, n-step Q, and advantage actor-critic (A3C).", "zh": "引入四种异步强化学习算法：单步Q、Sarsa、n步Q和优势行动者-评论家（A3C）。"}, {"en": "A3C surpasses state-of-the-art on Atari with half training time on CPU vs GPU.", "zh": "A3C在Atari上超越现有最优，训练时间减半且使用CPU而非GPU。"}, {"en": "Demonstrates A3C's effectiveness on continuous control and 3D maze navigation from pixels.", "zh": "展示A3C在连续控制和基于像素的3D迷宫导航中的有效性。"}, {"en": "Shows parallel actor-learners stabilize training and enable linear speedup with multiple threads.", "zh": "表明并行行动者-学习器稳定训练并实现多线程线性加速。"}, {"en": "Provides robust and scalable framework for deep RL without specialized hardware.", "zh": "提供无需专用硬件的鲁棒且可扩展的深度强化学习框架。"}], "limits": [{"en": "Experiments limited to simulated environments; real-world applicability not tested.", "zh": "实验限于模拟环境；未测试现实世界适用性。"}, {"en": "A3C requires careful tuning of entropy regularization and learning rate for stability.", "zh": "A3C需要仔细调整熵正则化和学习率以保持稳定性。"}, {"en": "Asynchronous updates may cause gradient staleness, potentially slowing convergence.", "zh": "异步更新可能导致梯度陈旧，可能减慢收敛。"}, {"en": "Framework does not incorporate experience replay, which could improve data efficiency.", "zh": "框架未纳入经验回放，而后者可提升数据效率。"}, {"en": "Scalability to very large distributed systems not explored; only single-machine CPU tested.", "zh": "未探索扩展到超大规模分布式系统；仅测试单机CPU。"}]}, "cites": 10083}, {"id": "kaiming-1512.03385", "pid": "kaiming", "arxiv": "1512.03385", "date": "2015-12-10", "venue": "cs.CV", "fields": ["vision", "deep-learning"], "tEn": "Deep Residual Learning for Image Recognition", "tZh": "深度残差学习在图像识别中的应用", "sEn": "Residual networks enable training of substantially deeper networks with improved accuracy and efficiency.", "sZh": "残差网络使得训练更深的网络成为可能，并提高了准确性和效率。", "absEn": "Deeper neural networks are more difficult to train. We present a residual learning framework to ease the training of networks that are substantially deeper than those used previously. We explicitly reformulate the layers as learning residual functions with reference to the layer inputs, instead of learning unreferenced functions. We provide comprehensive empirical evidence showing that these residual networks are easier to optimize, and can gain accuracy from considerably increased depth. On the ImageNet dataset we evaluate residual nets with a depth of up to 152 layers---8x deeper than VGG nets but still having lower complexity. An ensemble of these residual nets achieves 3.57% error on the ImageNet test set. This result won the 1st place on the ILSVRC 2015 classification task. We also present analysis on CIFAR-10 with 100 and 1000 layers. The depth of representations is of central importance for many visual recognition tasks. Solely due to our extremely deep representations, we obtain a 28% relative improvement on the COCO object detection dataset. Deep residual nets are foundations of our submissions to ILSVRC &amp; COCO 2015 competitions, where we also won the 1st places on the tasks of ImageNet detection, ImageNet localization, COCO detection, and COCO segmentation.", "absZh": "更深的神经网络更难训练。我们提出了一种残差学习框架，以简化比以往使用的网络更深网络的训练。我们明确地将层重新表述为学习相对于层输入的残差函数，而不是学习无参考的函数。我们提供了全面的经验证据，表明这些残差网络更容易优化，并且可以从显著增加的深度中获得准确性。在ImageNet数据集上，我们评估了深度高达152层的残差网络——比VGG网络深8倍，但复杂度更低。这些残差网络的集成在ImageNet测试集上实现了3.57%的错误率。这一结果在ILSVRC 2015分类任务中获得了第一名。我们还对CIFAR-10进行了100层和1000层的分析。表示的深度对于许多视觉识别任务至关重要。仅由于我们极深的表示，我们在COCO目标检测数据集上获得了28%的相对改进。深度残差网络是我们提交给ILSVRC和COCO 2015竞赛的基础，我们在ImageNet检测、ImageNet定位、COCO检测和COCO分割任务中也获得了第一名。", "insights": {"contrib": [{"en": "Proposed residual learning framework to ease training of substantially deeper networks.", "zh": "提出残差学习框架，简化了极深网络的训练。"}, {"en": "Showed deep residual nets are easier to optimize and gain accuracy from increased depth.", "zh": "证明深度残差网络更易优化，且随深度增加精度提升。"}, {"en": "Achieved 3.57% top-5 error on ImageNet test set, winning ILSVRC 2015 classification.", "zh": "在ImageNet测试集上达到3.57% top-5错误率，赢得ILSVRC 2015分类任务。"}, {"en": "Demonstrated 28% relative improvement on COCO object detection due to deep representations.", "zh": "在COCO目标检测上因深度表示获得28%的相对提升。"}, {"en": "Introduced identity shortcut connections adding no extra parameters or computation.", "zh": "引入恒等快捷连接，不增加额外参数或计算量。"}, {"en": "Successfully trained networks with over 1000 layers on CIFAR-10.", "zh": "在CIFAR-10上成功训练了超过1000层的网络。"}], "limits": [{"en": "Residual learning may not generalize to non-vision tasks without further adaptation.", "zh": "残差学习可能无法直接泛化到非视觉任务。"}, {"en": "Very deep models (e.g., 1202 layers) can overfit on small datasets like CIFAR-10.", "zh": "极深模型（如1202层）在小数据集（如CIFAR-10）上可能过拟合。"}, {"en": "The degradation problem's root cause is not fully explained; only mitigated.", "zh": "退化问题的根本原因未完全解释，仅被缓解。"}, {"en": "Identity shortcuts assume input and output dimensions match, requiring projections otherwise.", "zh": "恒等快捷连接假设输入输出维度匹配，否则需投影。"}, {"en": "Training very deep ResNets may require careful learning rate warm-up.", "zh": "训练极深ResNet可能需要仔细的学习率预热。"}]}, "org": "Microsoft", "cites": 231533}, {"id": "cszegedy-1512.00567", "pid": "cszegedy", "arxiv": "1512.00567", "date": "2015-12-02", "venue": "cs.CV", "org": "Google", "fields": ["vision", "deep-learning"], "tEn": "Rethinking the Inception Architecture for Computer Vision", "tZh": "重新思考计算机视觉中的Inception架构", "sEn": "Factorized convolutions and aggressive regularization enable efficient scaling of deep networks, achieving 3.5% top-5 error on ILSVRC 2012.", "sZh": "通过分解卷积和激进的正则化，实现了深度网络的高效扩展，在ILSVRC 2012上达到3.5%的top-5错误率。", "absEn": "Convolutional networks are at the core of most state-of-the-art computer vision solutions for a wide variety of tasks. Since 2014 very deep convolutional networks started to become mainstream, yielding substantial gains in various benchmarks. Although increased model size and computational cost tend to translate to immediate quality gains for most tasks (as long as enough labeled data is provided for training), computational efficiency and low parameter count are still enabling factors for various use cases such as mobile vision and big-data scenarios. Here we explore ways to scale up networks in ways that aim at utilizing the added computation as efficiently as possible by suitably factorized convolutions and aggressive regularization. We benchmark our methods on the ILSVRC 2012 classification challenge validation set demonstrate substantial gains over the state of the art: 21.2% top-1 and 5.6% top-5 error for single frame evaluation using a network with a computational cost of 5 billion multiply-adds per inference and with using less than 25 million parameters. With an ensemble of 4 models and multi-crop evaluation, we report 3.5% top-5 error on the validation set (3.6% error on the test set) and 17.3% top-1 error on the validation set.", "absZh": "卷积网络是大多数最先进的计算机视觉解决方案的核心，广泛应用于各种任务。自2014年以来，非常深的卷积网络开始成为主流，在各种基准测试中取得了显著提升。尽管增加模型大小和计算成本通常能立即提升大多数任务的质量（只要有足够的标注数据进行训练），但计算效率和低参数数量仍然是移动视觉和大数据场景等用例的关键因素。本文探索了通过适当的分解卷积和激进的正则化来扩展网络的方法，旨在尽可能高效地利用增加的计算资源。我们在ILSVRC 2012分类挑战验证集上评估了方法，结果表明显著优于现有技术：单帧评估使用计算成本为50亿次乘加、参数少于2500万的网络，top-1错误率为21.2%，top-5错误率为5.6%。使用4个模型的集成和多裁剪评估，我们在验证集上报告了3.5%的top-5错误率（测试集上为3.6%）和17.3%的top-1错误率。", "insights": {"contrib": [{"en": "Proposes design principles for scaling CNNs efficiently, including avoiding representational bottlenecks and balancing width/depth.", "zh": "提出了高效扩展CNN的设计原则，包括避免表征瓶颈和平衡宽度与深度。"}, {"en": "Introduces factorization of large convolutions into smaller ones (e.g., 5x5 into two 3x3) to reduce computation without loss of expressiveness.", "zh": "引入将大卷积分解为小卷积（如5x5分解为两个3x3）的方法，在保持表达能力的同时降低计算量。"}, {"en": "Develops asymmetric convolution factorization (e.g., 1xn followed by nx1) for further computational savings on medium grid sizes.", "zh": "开发了非对称卷积分解（如1xn后接nx1），在中尺寸特征图上进一步节省计算。"}, {"en": "Demonstrates that auxiliary classifiers act as regularizers rather than improving gradient flow, especially with batch normalization.", "zh": "证明辅助分类器主要起正则化作用而非改善梯度流动，尤其在批归一化后。"}, {"en": "Proposes label-smoothing regularization to prevent overfitting and improve generalization by softening ground-truth labels.", "zh": "提出标签平滑正则化，通过软化真实标签防止过拟合并提升泛化能力。"}, {"en": "Achieves state-of-the-art results on ILSVRC 2012 with 21.2% top-1 and 5.6% top-5 error using Inception-v3, while being computationally efficient.", "zh": "在ILSVRC 2012上以Inception-v3达到21.2% top-1和5.6% top-5错误率，同时保持计算高效。"}], "limits": [{"en": "Design principles are speculative and require further experimental validation across diverse tasks.", "zh": "设计原则是推测性的，需要在不同任务上进一步实验验证。"}, {"en": "Factorization techniques may not work well on early layers; effectiveness is limited to medium grid sizes.", "zh": "分解技术在前几层效果不佳，仅在中尺寸特征图上有效。"}, {"en": "Label-smoothing introduces a hyperparameter epsilon that may need tuning for different datasets.", "zh": "标签平滑引入超参数epsilon，可能需要针对不同数据集调整。"}, {"en": "The study focuses on image classification; applicability to other vision tasks like detection or segmentation is not fully explored.", "zh": "研究聚焦于图像分类，对其他视觉任务（如检测或分割）的适用性未充分探索。"}, {"en": "Computational cost savings assume specific architectural choices; naive scaling may still lead to inefficiencies.", "zh": "计算成本节省依赖于特定架构选择；简单缩放仍可能导致效率低下。"}]}, "cites": 31202}, {"id": "aradford-1511.06434", "pid": "aradford", "arxiv": "1511.06434", "date": "2015-11-19", "venue": "cs.LG", "org": "Meta AI", "fields": ["generative", "deep-learning"], "tEn": "Unsupervised Representation Learning with Deep Convolutional Generative Adversarial Networks", "tZh": "使用深度卷积生成对抗网络的无监督表示学习", "sEn": "DCGANs learn hierarchical representations from object parts to scenes in an unsupervised manner.", "sZh": "DCGAN以无监督方式学习从物体部件到场景的层次化表示。", "absEn": "In recent years, supervised learning with convolutional networks (CNNs) has seen huge adoption in computer vision applications. Comparatively, unsupervised learning with CNNs has received less attention. In this work we hope to help bridge the gap between the success of CNNs for supervised learning and unsupervised learning. We introduce a class of CNNs called deep convolutional generative adversarial networks (DCGANs), that have certain architectural constraints, and demonstrate that they are a strong candidate for unsupervised learning. Training on various image datasets, we show convincing evidence that our deep convolutional adversarial pair learns a hierarchy of representations from object parts to scenes in both the generator and discriminator. Additionally, we use the learned features for novel tasks - demonstrating their applicability as general image representations.", "absZh": "近年来，卷积网络（CNN）在有监督学习的计算机视觉应用中得到了广泛采用。相比之下，CNN在无监督学习方面的关注较少。在这项工作中，我们希望帮助弥合CNN在有监督学习和无监督学习成功之间的差距。我们引入了一类称为深度卷积生成对抗网络（DCGAN）的CNN，它们具有特定的架构约束，并证明它们是无监督学习的强有力候选者。在各种图像数据集上进行训练，我们展示了令人信服的证据，表明我们的深度卷积对抗对在生成器和判别器中都学习了从物体部件到场景的层次化表示。此外，我们将学习到的特征用于新任务——展示了它们作为通用图像表示的适用性。", "insights": {"contrib": [{"en": "Proposes architectural constraints for stable training of deep convolutional GANs (DCGANs).", "zh": "提出用于深度卷积生成对抗网络（DCGAN）稳定训练的架构约束。"}, {"en": "Demonstrates that DCGANs learn hierarchical representations from object parts to scenes.", "zh": "证明DCGAN从物体部件到场景学习层次化表示。"}, {"en": "Shows learned features achieve 82.8% accuracy on CIFAR-10 via linear SVM, outperforming K-means baselines.", "zh": "展示学习特征在CIFAR-10上通过线性SVM达到82.8%准确率，优于K-means基线。"}, {"en": "Achieves state-of-the-art 22.48% test error on SVHN with only 1000 labeled examples.", "zh": "在仅1000个标注样本的SVHN上达到22.48%测试误差，为最优。"}, {"en": "Visualizes filters and demonstrates vector arithmetic in latent space for semantic manipulation.", "zh": "可视化滤波器并展示潜在空间中用于语义操作的向量算术。"}, {"en": "Shows unsupervised learning of object detectors (e.g., windows) in the generator.", "zh": "展示生成器中无监督学习物体检测器（如窗户）。"}], "limits": [{"en": "Model instability persists; filters may collapse to oscillating modes with longer training.", "zh": "模型不稳定性持续存在；长时间训练后滤波器可能坍缩为振荡模式。"}, {"en": "Performance on CIFAR-10 is lower than Exemplar CNNs, a supervised unsupervised method.", "zh": "CIFAR-10性能低于Exemplar CNN（一种监督无监督方法）。"}, {"en": "Evaluation limited to image datasets; generalization to video or audio not explored.", "zh": "评估限于图像数据集；未探索对视频或音频的泛化。"}, {"en": "Requires careful hyperparameter tuning (e.g., learning rate, momentum) for stability.", "zh": "需要仔细调整超参数（如学习率、动量）以保持稳定。"}, {"en": "No quantitative evaluation using log-likelihood; relies on visual and task-based metrics.", "zh": "未使用对数似然进行定量评估；依赖视觉和基于任务的指标。"}]}, "cites": 15124}, {"id": "tschaul-1511.05952", "pid": "tschaul", "arxiv": "1511.05952", "date": "2015-11-18", "venue": "cs.LG", "org": "Google DeepMind", "fields": ["rl", "deep-learning"], "tEn": "Prioritized Experience Replay", "tZh": "优先经验回放", "sEn": "Prioritizing important transitions in experience replay improves learning efficiency and achieves state-of-the-art performance in DQN.", "sZh": "优先回放重要经验能提高学习效率，并在DQN中达到最优性能。", "absEn": "Experience replay lets online reinforcement learning agents remember and reuse experiences from the past. In prior work, experience transitions were uniformly sampled from a replay memory. However, this approach simply replays transitions at the same frequency that they were originally experienced, regardless of their significance. In this paper we develop a framework for prioritizing experience, so as to replay important transitions more frequently, and therefore learn more efficiently. We use prioritized experience replay in Deep Q-Networks (DQN), a reinforcement learning algorithm that achieved human-level performance across many Atari games. DQN with prioritized experience replay achieves a new state-of-the-art, outperforming DQN with uniform replay on 41 out of 49 games.", "absZh": "经验回放让在线强化学习代理能够记住并重用过去的经验。在先前的工作中，经验转换被均匀地从回放记忆中采样。然而，这种方法只是以与最初经历相同的频率重放转换，而不考虑它们的重要性。在本文中，我们开发了一个优先考虑经验的框架，以便更频繁地重放重要的转换，从而更有效地学习。我们在深度Q网络（DQN）中使用了优先经验回放，这是一种在多个Atari游戏中达到人类水平表现的强化学习算法。采用优先经验回放的DQN实现了新的最优性能，在49个游戏中的41个上优于采用均匀回放的DQN。", "insights": {"contrib": [{"en": "Proposes prioritized experience replay to replay important transitions more frequently, improving learning efficiency.", "zh": "提出优先经验回放，更频繁地回放重要转换，提高学习效率。"}, {"en": "Introduces stochastic prioritization to balance greedy prioritization and uniform sampling, ensuring diversity.", "zh": "引入随机优先级，平衡贪婪优先和均匀采样，确保多样性。"}, {"en": "Uses importance sampling to correct bias introduced by non-uniform sampling, with annealing schedule.", "zh": "使用重要性采样纠正非均匀采样引入的偏差，并采用退火调度。"}, {"en": "Achieves state-of-the-art performance on Atari 2600 benchmark, outperforming DQN and Double DQN on 41 out of 49 games.", "zh": "在Atari 2600基准测试中达到最先进性能，在49个游戏中41个优于DQN和Double DQN。"}, {"en": "Demonstrates faster learning speed, with median normalized performance increasing from 48% to 106% for DQN.", "zh": "展示更快的学习速度，DQN的中位数归一化性能从48%提升到106%。"}, {"en": "Explores extensions to supervised learning and off-policy RL, showing broad applicability.", "zh": "探索扩展到监督学习和离策略强化学习，展示广泛适用性。"}], "limits": [{"en": "Prioritization based on TD error may be suboptimal when rewards are noisy or stochastic.", "zh": "基于TD误差的优先级在奖励有噪声或随机时可能次优。"}, {"en": "Greedy prioritization can lead to overfitting due to lack of diversity in sampled transitions.", "zh": "贪婪优先级因采样转换缺乏多样性可能导致过拟合。"}, {"en": "Importance sampling correction requires careful annealing; full correction may harm performance in non-stationary settings.", "zh": "重要性采样校正需要仔细退火；完全校正可能在非平稳设置中损害性能。"}, {"en": "Method assumes replay memory contents are fixed; does not address which experiences to store.", "zh": "方法假设回放内存内容固定，不解决存储哪些经验的问题。"}, {"en": "Hyperparameters (α, β) require tuning per domain; fixed settings may not generalize across all tasks.", "zh": "超参数（α, β）需要针对领域调整；固定设置可能无法泛化到所有任务。"}]}, "cites": 4449}, {"id": "songhan-1510.00149", "pid": "songhan", "arxiv": "1510.00149", "date": "2015-10-01", "venue": "cs.CV", "fields": ["efficiency", "deep-learning"], "tEn": "Deep Compression: Compressing Deep Neural Networks with Pruning, Trained Quantization and Huffman Coding", "tZh": "深度压缩：通过剪枝、训练量化和霍夫曼编码压缩深度神经网络", "sEn": "Deep compression reduces neural network storage by 35x-49x without accuracy loss via pruning, quantization, and Huffman coding.", "sZh": "深度压缩通过剪枝、量化和霍夫曼编码，在不损失精度的情况下将神经网络存储减少35倍至49倍。", "absEn": "Neural networks are both computationally intensive and memory intensive, making them difficult to deploy on embedded systems with limited hardware resources. To address this limitation, we introduce \"deep compression\", a three stage pipeline: pruning, trained quantization and Huffman coding, that work together to reduce the storage requirement of neural networks by 35x to 49x without affecting their accuracy. Our method first prunes the network by learning only the important connections. Next, we quantize the weights to enforce weight sharing, finally, we apply Huffman coding. After the first two steps we retrain the network to fine tune the remaining connections and the quantized centroids. Pruning, reduces the number of connections by 9x to 13x; Quantization then reduces the number of bits that represent each connection from 32 to 5. On the ImageNet dataset, our method reduced the storage required by AlexNet by 35x, from 240MB to 6.9MB, without loss of accuracy. Our method reduced the size of VGG-16 by 49x from 552MB to 11.3MB, again with no loss of accuracy. This allows fitting the model into on-chip SRAM cache rather than off-chip DRAM memory. Our compression method also facilitates the use of complex neural networks in mobile applications where application size and download bandwidth are constrained. Benchmarked on CPU, GPU and mobile GPU, compressed network has 3x to 4x layerwise speedup and 3x to 7x better energy efficiency.", "absZh": "神经网络既计算密集又内存密集，使其难以部署在硬件资源有限的嵌入式系统上。为了解决这一限制，我们引入了“深度压缩”，一个三阶段流程：剪枝、训练量化和霍夫曼编码，它们共同作用将神经网络的存储需求降低35倍至49倍，而不影响其准确性。我们的方法首先通过仅学习重要连接来剪枝网络。接下来，我们对权重进行量化以强制权重共享，最后应用霍夫曼编码。在前两个步骤之后，我们重新训练网络以微调剩余连接和量化中心。剪枝将连接数量减少9倍至13倍；量化则将表示每个连接的位数从32位减少到5位。在ImageNet数据集上，我们的方法将AlexNet所需的存储从240MB减少到6.9MB，减少了35倍，且没有精度损失。我们的方法将VGG-16的大小从552MB减少到11.3MB，减少了49倍，同样没有精度损失。这使得模型能够适配到片上SRAM缓存而非片外DRAM内存。我们的压缩方法还促进了在应用大小和下载带宽受限的移动应用中使用复杂神经网络。在CPU、GPU和移动GPU上进行的基准测试显示，压缩网络在层级别上实现了3倍至4倍的加速和3倍至7倍的能效提升。", "insights": {"contrib": [{"en": "Proposes a three-stage pipeline: pruning, trained quantization, and Huffman coding, achieving 35x to 49x compression without accuracy loss.", "zh": "提出三阶段流程：剪枝、训练量化和霍夫曼编码，实现 35 倍到 49 倍压缩且不损失精度。"}, {"en": "Reduces AlexNet from 240MB to 6.9MB and VGG-16 from 552MB to 11.3MB on ImageNet, enabling on-chip SRAM storage.", "zh": "在 ImageNet 上将 AlexNet 从 240MB 压缩至 6.9MB，VGG-16 从 552MB 压缩至 11.3MB，支持片上 SRAM 存储。"}, {"en": "Combines pruning and quantization synergistically, showing pruning reduces connections by 9x-13x and quantization reduces bits per weight to 5.", "zh": "协同结合剪枝与量化，剪枝减少连接 9-13 倍，量化将每个权重的比特数降至 5。"}, {"en": "Demonstrates linear initialization for k-means clustering preserves large weights, improving quantization accuracy.", "zh": "证明 k-means 聚类的线性初始化能保留大权重，提升量化精度。"}, {"en": "Achieves 3x-4x layerwise speedup and 3x-7x energy efficiency on CPU, GPU, and mobile GPU.", "zh": "在 CPU、GPU 和移动 GPU 上实现 3-4 倍逐层加速和 3-7 倍能效提升。"}], "limits": [{"en": "Quantized network with weight sharing not benchmarked due to lack of library support for indirect lookup.", "zh": "由于缺乏支持间接查找的库，未对带权值共享的量化网络进行基准测试。"}, {"en": "Pruning advantage diminishes in batched matrix-matrix multiplication due to improved memory locality.", "zh": "在批处理矩阵乘法中，由于内存局部性改善，剪枝优势减弱。"}, {"en": "Method focuses on storage compression; inference speedup limited without specialized hardware or custom kernels.", "zh": "方法聚焦存储压缩；若无专用硬件或定制内核，推理加速有限。"}, {"en": "Huffman coding provides marginal gain (e.g., 32x to 40x) compared to pruning and quantization.", "zh": "与剪枝和量化相比，霍夫曼编码增益有限（例如 32 倍到 40 倍）。"}, {"en": "Weight sharing across layers not explored; each layer quantized independently.", "zh": "未探索跨层权值共享；每层独立量化。"}]}, "org": "Stanford", "cites": 10115}, {"id": "hvanhasselt-1509.06461", "pid": "hvanhasselt", "arxiv": "1509.06461", "date": "2015-09-22", "venue": "cs.LG", "org": "Google DeepMind", "fields": ["rl", "deep-learning"], "tEn": "Deep Reinforcement Learning with Double Q-learning", "tZh": "深度强化学习中的双Q学习", "sEn": "Double Q-learning reduces overestimations in DQN, improving performance on Atari games.", "sZh": "双Q学习减少了DQN中的过高估计，从而在多个Atari游戏中提升了性能。", "absEn": "The popular Q-learning algorithm is known to overestimate action values under certain conditions. It was not previously known whether, in practice, such overestimations are common, whether they harm performance, and whether they can generally be prevented. In this paper, we answer all these questions affirmatively. In particular, we first show that the recent DQN algorithm, which combines Q-learning with a deep neural network, suffers from substantial overestimations in some games in the Atari 2600 domain. We then show that the idea behind the Double Q-learning algorithm, which was introduced in a tabular setting, can be generalized to work with large-scale function approximation. We propose a specific adaptation to the DQN algorithm and show that the resulting algorithm not only reduces the observed overestimations, as hypothesized, but that this also leads to much better performance on several games.", "absZh": "流行的Q学习算法在某些条件下会高估动作值。此前尚不清楚在实践中这种高估是否常见、是否损害性能，以及是否通常可以避免。在本文中，我们对所有这些问题给出了肯定答案。具体来说，我们首先展示了最近的DQN算法（将Q学习与深度神经网络相结合）在Atari 2600领域的某些游戏中存在严重的高估问题。然后，我们展示了在表格设置中引入的双Q学习算法的思想可以推广到大规模函数逼近。我们提出了对DQN算法的具体改编，并表明所得算法不仅如假设那样减少了观察到的高估，而且在多个游戏上带来了更好的性能。", "insights": {"contrib": [{"en": "Shows Q-learning overestimates action values in large-scale deterministic problems due to inherent estimation errors.", "zh": "证明Q-learning在大规模确定性问题中因固有估计误差而高估动作值。"}, {"en": "Demonstrates DQN suffers substantial overestimations in Atari 2600 games, harming performance.", "zh": "展示DQN在Atari 2600游戏中存在严重高估，损害性能。"}, {"en": "Generalizes Double Q-learning to large-scale function approximation with deep neural networks.", "zh": "将Double Q-learning推广到深度神经网络的大规模函数逼近。"}, {"en": "Proposes Double DQN algorithm, reducing overestimations and improving policy quality.", "zh": "提出Double DQN算法，减少高估并提升策略质量。"}, {"en": "Achieves state-of-the-art results on Atari 2600 domain with Double DQN.", "zh": "Double DQN在Atari 2600领域取得最先进结果。"}], "limits": [{"en": "Evaluation limited to deterministic Atari 2600 games; stochastic environments not tested.", "zh": "评估仅限于确定性Atari 2600游戏，未测试随机环境。"}, {"en": "Hyperparameters tuned for DQN, not optimized for Double DQN in main comparison.", "zh": "超参数为DQN调优，主要比较中未针对Double DQN优化。"}, {"en": "Double DQN may not eliminate overestimations entirely; residual bias possible.", "zh": "Double DQN可能无法完全消除高估，残留偏差仍可能存在。"}, {"en": "Theoretical analysis assumes unbiased estimates; practical violations may affect guarantees.", "zh": "理论分析假设无偏估计，实际偏差可能影响保证。"}, {"en": "Results may not generalize to other domains beyond Atari 2600.", "zh": "结果可能无法推广到Atari 2600以外的领域。"}]}, "cites": 9138}, {"id": "tlillicrap-1509.02971", "pid": "tlillicrap", "arxiv": "1509.02971", "date": "2015-09-09", "venue": "cs.LG", "org": "Google DeepMind", "fields": ["rl", "deep-learning"], "tEn": "Continuous control with deep reinforcement learning", "tZh": "连续控制与深度强化学习", "sEn": "We adapt Deep Q-Learning to continuous action domains using an actor-critic, model-free algorithm based on deterministic policy gradients, achieving competitive performance on over 20 simulated physics tasks.", "sZh": "我们将深度Q学习的思想扩展到连续动作领域，提出了一种基于确定性策略梯度的演员-评论家、无模型算法，在20多个模拟物理任务上取得了与规划算法相媲美的性能。", "absEn": "We adapt the ideas underlying the success of Deep Q-Learning to the continuous action domain. We present an actor-critic, model-free algorithm based on the deterministic policy gradient that can operate over continuous action spaces. Using the same learning algorithm, network architecture and hyper-parameters, our algorithm robustly solves more than 20 simulated physics tasks, including classic problems such as cartpole swing-up, dexterous manipulation, legged locomotion and car driving. Our algorithm is able to find policies whose performance is competitive with those found by a planning algorithm with full access to the dynamics of the domain and its derivatives. We further demonstrate that for many of the tasks the algorithm can learn policies end-to-end: directly from raw pixel inputs.", "absZh": "我们将深度Q学习成功背后的思想适应到连续动作领域。我们提出了一种基于确定性策略梯度的演员-评论家、无模型算法，该算法可以在连续动作空间上运行。使用相同的学习算法、网络架构和超参数，我们的算法稳健地解决了20多个模拟物理任务，包括经典问题如倒立摆摆动、灵巧操作、腿式运动和汽车驾驶。我们的算法能够找到策略，其性能与完全访问领域及其导数动态的规划算法所找到的策略相竞争。我们进一步证明，对于许多任务，该算法可以端到端地学习策略：直接从原始像素输入。", "insights": {"contrib": [{"en": "Adapts Deep Q-Learning to continuous action domains via deterministic policy gradient.", "zh": "将深度Q学习扩展到连续动作空间，基于确定性策略梯度。"}, {"en": "Proposes Deep DPG (DDPG) algorithm with actor-critic, replay buffer, and target networks.", "zh": "提出深度确定性策略梯度（DDPG）算法，结合演员-评论家、经验回放和目标网络。"}, {"en": "Solves over 20 simulated physics tasks with same hyper-parameters and network architecture.", "zh": "使用相同超参数和网络架构解决20多个模拟物理任务。"}, {"en": "Achieves competitive performance with planning algorithms that have full dynamics access.", "zh": "性能与完全访问动力学的规划算法相当。"}, {"en": "Demonstrates end-to-end learning from raw pixel inputs for many tasks.", "zh": "展示从原始像素输入进行端到端学习的能力。"}, {"en": "Combines batch normalization for stable learning across tasks with different units.", "zh": "结合批归一化，在不同单位任务间实现稳定学习。"}], "limits": [{"en": "Requires large number of training episodes, limiting sample efficiency.", "zh": "需要大量训练回合，样本效率受限。"}, {"en": "No convergence guarantees due to non-linear function approximators.", "zh": "非线性函数近似器无法保证收敛。"}, {"en": "Exploration noise must be tuned per environment for effective exploration.", "zh": "探索噪声需针对每个环境调整以实现有效探索。"}, {"en": "Performance degrades on harder tasks with inaccurate Q-value estimates.", "zh": "在困难任务中Q值估计不准确，性能下降。"}, {"en": "Limited to simulated environments; real-world applicability not tested.", "zh": "仅限于模拟环境，未测试真实世界适用性。"}]}, "cites": 15540}, {"id": "rsennrich-1508.07909", "pid": "rsennrich", "arxiv": "1508.07909", "date": "2015-08-31", "venue": "cs.CL", "org": "University of Edinburgh", "fields": ["nlp", "efficiency"], "tEn": "Neural Machine Translation of Rare Words with Subword Units", "tZh": "基于子词单元的罕见词神经机器翻译", "sEn": "Encoding rare words as subword units enables open-vocabulary NMT, improving BLEU by 1.1 (En-De) and 1.3 (En-Ru) over dictionary back-off.", "sZh": "将罕见词编码为子词单元使神经机器翻译能够处理开放词汇，相比回退词典方法，在英德和英俄翻译任务上分别提升1.1和1.3 BLEU。", "absEn": "Neural machine translation (NMT) models typically operate with a fixed vocabulary, but translation is an open-vocabulary problem. Previous work addresses the translation of out-of-vocabulary words by backing off to a dictionary. In this paper, we introduce a simpler and more effective approach, making the NMT model capable of open-vocabulary translation by encoding rare and unknown words as sequences of subword units. This is based on the intuition that various word classes are translatable via smaller units than words, for instance names (via character copying or transliteration), compounds (via compositional translation), and cognates and loanwords (via phonological and morphological transformations). We discuss the suitability of different word segmentation techniques, including simple character n-gram models and a segmentation based on the byte pair encoding compression algorithm, and empirically show that subword models improve over a back-off dictionary baseline for the WMT 15 translation tasks English-German and English-Russian by 1.1 and 1.3 BLEU, respectively.", "absZh": "神经机器翻译（NMT）模型通常使用固定词汇表进行操作，但翻译是一个开放词汇问题。先前的工作通过回退到词典来处理词汇表外单词的翻译。在本文中，我们介绍了一种更简单且更有效的方法，通过将罕见词和未知词编码为子词单元序列，使NMT模型能够进行开放词汇翻译。这基于以下直觉：各种词类可以通过比单词更小的单元进行翻译，例如名称（通过字符复制或音译）、复合词（通过组合翻译）以及同源词和借词（通过语音和形态变换）。我们讨论了不同分词技术的适用性，包括简单的字符n-gram模型和基于字节对编码压缩算法的分词，并通过实验证明，在WMT 15英德和英俄翻译任务中，子词模型相比回退词典基线分别提高了1.1和1.3 BLEU。", "insights": {"contrib": [{"en": "Introduces subword units for open-vocabulary NMT, enabling translation of rare and unknown words.", "zh": "引入子词单元实现开放词汇的神经机器翻译，能够翻译稀有和未知词。"}, {"en": "Proposes encoding rare words as sequences of subword units, leveraging character copying, transliteration, and compositional translation.", "zh": "提出将稀有词编码为子词单元序列，利用字符复制、音译和组合翻译。"}, {"en": "Discusses suitability of character n-gram models and byte pair encoding for subword segmentation.", "zh": "讨论了字符n-gram模型和字节对编码在子词切分中的适用性。"}, {"en": "Achieves +1.1 BLEU on English-German and +1.3 BLEU on English-Russian WMT 15 tasks over back-off dictionary baseline.", "zh": "在WMT 15英德和英俄任务上，相比回退词典基线分别提升1.1和1.3 BLEU。"}, {"en": "Demonstrates that subword models handle compounds, cognates, and loanwords via morphological transformations.", "zh": "证明子词模型通过形态变换处理复合词、同源词和借词。"}], "limits": [{"en": "Evaluation limited to WMT 15 English-German and English-Russian translation tasks.", "zh": "评估仅限于WMT 15英德和英俄翻译任务。"}, {"en": "Subword segmentation may introduce noise for languages with complex morphology.", "zh": "子词切分可能对形态复杂的语言引入噪声。"}, {"en": "Byte pair encoding segmentation is heuristic and may not be optimal for all language pairs.", "zh": "字节对编码切分是启发式的，可能并非所有语言对的最优选择。"}, {"en": "The approach does not address semantic ambiguity in rare word translation.", "zh": "该方法未解决稀有词翻译中的语义歧义问题。"}]}, "cites": 8776}, {"id": "jredmon-1506.02640", "pid": "jredmon", "arxiv": "1506.02640", "date": "2015-06-08", "venue": "cs.CV", "org": "U. Washington", "fields": ["vision", "efficiency"], "tEn": "You Only Look Once: Unified, Real-Time Object Detection", "tZh": "你只需看一眼：统一、实时的目标检测", "sEn": "YOLO frames object detection as a regression problem, enabling real-time processing with a single neural network.", "sZh": "YOLO将目标检测视为回归问题，通过单个神经网络实现实时处理。", "absEn": "We present YOLO, a new approach to object detection. Prior work on object detection repurposes classifiers to perform detection. Instead, we frame object detection as a regression problem to spatially separated bounding boxes and associated class probabilities. A single neural network predicts bounding boxes and class probabilities directly from full images in one evaluation. Since the whole detection pipeline is a single network, it can be optimized end-to-end directly on detection performance. Our unified architecture is extremely fast. Our base YOLO model processes images in real-time at 45 frames per second. A smaller version of the network, Fast YOLO, processes an astounding 155 frames per second while still achieving double the mAP of other real-time detectors. Compared to state-of-the-art detection systems, YOLO makes more localization errors but is far less likely to predict false detections where nothing exists. Finally, YOLO learns very general representations of objects. It outperforms all other detection methods, including DPM and R-CNN, by a wide margin when generalizing from natural images to artwork on both the Picasso Dataset and the People-Art Dataset.", "absZh": "我们提出了YOLO，一种新的目标检测方法。以往的目标检测工作将分类器重新用于检测。相反，我们将目标检测视为一个回归问题，预测空间分离的边界框和相关的类别概率。单个神经网络在一次评估中直接从完整图像中预测边界框和类别概率。由于整个检测管道是一个单一网络，它可以直接在检测性能上进行端到端优化。我们的统一架构非常快。我们的基础YOLO模型以每秒45帧的速度实时处理图像。一个更小版本的网络Fast YOLO，每秒处理惊人的155帧，同时仍然实现了其他实时检测器两倍的mAP。与最先进的检测系统相比，YOLO在定位错误上更多，但在预测不存在物体的误检方面可能性小得多。最后，YOLO学习了非常通用的物体表示。在从自然图像泛化到毕加索数据集和人物艺术数据集的艺术作品时，它大幅超越了所有其他检测方法，包括DPM和R-CNN。", "insights": {"contrib": [{"en": "Frames object detection as a single regression problem from image pixels to bounding boxes and class probabilities.", "zh": "将目标检测建模为从图像像素到边界框和类别概率的单一回归问题。"}, {"en": "Unified architecture enables end-to-end training and real-time speeds at 45 fps for YOLO and 155 fps for Fast YOLO.", "zh": "统一架构支持端到端训练，YOLO 实现 45 fps、Fast YOLO 实现 155 fps 的实时速度。"}, {"en": "YOLO reasons globally about the image, reducing background false positives by half compared to Fast R-CNN.", "zh": "YOLO 对图像进行全局推理，背景误检率比 Fast R-CNN 降低一半。"}, {"en": "Learns generalizable object representations, outperforming DPM and R-CNN when generalizing from natural images to artwork.", "zh": "学习可泛化的物体表征，从自然图像泛化到艺术作品时优于 DPM 和 R-CNN。"}, {"en": "Combining YOLO with Fast R-CNN boosts mAP by 3.2% on VOC 2007 by reducing background errors.", "zh": "将 YOLO 与 Fast R-CNN 结合，通过减少背景错误在 VOC 2007 上将 mAP 提升 3.2%。"}, {"en": "Open-source framework with pretrained models, enabling easy reproduction and deployment.", "zh": "开源框架并提供预训练模型，便于复现和部署。"}], "limits": [{"en": "YOLO makes more localization errors than state-of-the-art detectors, especially for small objects.", "zh": "YOLO 比最先进的检测器产生更多定位错误，尤其是小物体。"}, {"en": "Spatial constraints limit the number of nearby objects YOLO can predict, struggling with groups of small objects.", "zh": "空间约束限制了 YOLO 可预测的邻近物体数量，难以处理小物体群。"}, {"en": "Loss function treats errors equally for large and small boxes, not aligning perfectly with detection performance.", "zh": "损失函数对大框和小框的错误一视同仁，与检测性能不完全对齐。"}, {"en": "Coarse features from downsampling layers hinder precise bounding box prediction.", "zh": "下采样层的粗粒度特征阻碍了精确的边界框预测。"}, {"en": "YOLO lags behind state-of-the-art in accuracy on standard benchmarks like VOC 2012.", "zh": "YOLO 在 VOC 2012 等标准基准上的准确率落后于最先进方法。"}]}, "cites": 46132}, {"id": "rgirshick-1506.01497", "pid": "rgirshick", "arxiv": "1506.01497", "date": "2015-06-04", "venue": "cs.CV", "org": "Microsoft", "fields": ["vision", "deep-learning"], "tEn": "Faster R-CNN: Towards Real-Time Object Detection with Region Proposal Networks", "tZh": "Faster R-CNN: 基于区域提议网络的实时目标检测", "sEn": "Faster R-CNN introduces a Region Proposal Network that shares convolutional features with the detection network, enabling nearly cost-free region proposals and real-time object detection.", "sZh": "Faster R-CNN 通过引入与检测网络共享卷积特征的区域提议网络，实现了几乎无成本的区域提议和实时目标检测。", "absEn": "State-of-the-art object detection networks depend on region proposal algorithms to hypothesize object locations. Advances like SPPnet and Fast R-CNN have reduced the running time of these detection networks, exposing region proposal computation as a bottleneck. In this work, we introduce a Region Proposal Network (RPN) that shares full-image convolutional features with the detection network, thus enabling nearly cost-free region proposals. An RPN is a fully convolutional network that simultaneously predicts object bounds and objectness scores at each position. The RPN is trained end-to-end to generate high-quality region proposals, which are used by Fast R-CNN for detection. We further merge RPN and Fast R-CNN into a single network by sharing their convolutional features---using the recently popular terminology of neural networks with 'attention' mechanisms, the RPN component tells the unified network where to look. For the very deep VGG-16 model, our detection system has a frame rate of 5fps (including all steps) on a GPU, while achieving state-of-the-art object detection accuracy on PASCAL VOC 2007, 2012, and MS COCO datasets with only 300 proposals per image. In ILSVRC and COCO 2015 competitions, Faster R-CNN and RPN are the foundations of the 1st-place winning entries in several tracks. Code has been made publicly available.", "absZh": "最先进的目标检测网络依赖于区域提议算法来假设目标位置。SPPnet 和 Fast R-CNN 等进展减少了这些检测网络的运行时间，但区域提议计算成为瓶颈。在这项工作中，我们引入了一个区域提议网络（RPN），它与检测网络共享全图像卷积特征，从而实现了几乎无成本的区域提议。RPN 是一个全卷积网络，同时预测每个位置的目标边界和目标性得分。RPN 经过端到端训练以生成高质量的区域提议，供 Fast R-CNN 用于检测。我们进一步将 RPN 和 Fast R-CNN 合并为一个单一网络，通过共享它们的卷积特征——使用最近流行的神经网络“注意力”机制术语，RPN 组件告诉统一网络在哪里看。对于非常深的 VGG-16 模型，我们的检测系统在 GPU 上达到 5fps 的帧率（包括所有步骤），同时在 PASCAL VOC 2007、2012 和 MS COCO 数据集上仅使用每张图像 300 个提议就实现了最先进的目标检测精度。在 ILSVRC 和 COCO 2015 竞赛中，Faster R-CNN 和 RPN 是多个赛道第一名获奖作品的基础。代码已公开。", "insights": {"contrib": [{"en": "Introduces Region Proposal Network (RPN) sharing convolutional features with detection network, enabling nearly cost-free region proposals.", "zh": "提出区域提议网络（RPN），与检测网络共享卷积特征，实现近乎零成本的区域提议。"}, {"en": "Proposes anchor boxes as regression references for multi-scale and aspect ratio prediction without image or filter pyramids.", "zh": "提出锚点框作为回归参考，无需图像或滤波器金字塔即可实现多尺度和长宽比预测。"}, {"en": "Develops a 4-step alternating training algorithm to share convolutional layers between RPN and Fast R-CNN, forming a unified network.", "zh": "开发四步交替训练算法，使RPN和Fast R-CNN共享卷积层，形成统一网络。"}, {"en": "Achieves state-of-the-art detection accuracy on PASCAL VOC 2007, 2012, and MS COCO with only 300 proposals per image.", "zh": "在PASCAL VOC 2007、2012和MS COCO上，仅用每图300个提议即达到最先进检测精度。"}, {"en": "Demonstrates near real-time performance at 5fps on GPU with VGG-16, including all detection steps.", "zh": "在VGG-16上实现近实时性能，GPU上5fps，包含所有检测步骤。"}, {"en": "Serves as foundation for 1st-place entries in ILSVRC and COCO 2015 competitions across multiple tracks.", "zh": "作为ILSVRC和COCO 2015竞赛多个赛道第一名的基础。"}], "limits": [{"en": "RPN relies on pre-defined anchor scales and aspect ratios, which may not generalize to all object shapes.", "zh": "RPN依赖预定义的锚点尺度和长宽比，可能无法泛化到所有物体形状。"}, {"en": "Training requires careful handling of cross-boundary anchors to avoid convergence issues.", "zh": "训练需谨慎处理跨边界锚点以避免收敛问题。"}, {"en": "Non-maximum suppression is needed to reduce proposal redundancy, adding a post-processing step.", "zh": "需非极大值抑制减少提议冗余，增加后处理步骤。"}, {"en": "Performance depends on pre-trained ImageNet models, limiting applicability to domains with different data distributions.", "zh": "性能依赖ImageNet预训练模型，限制了在数据分布不同领域的适用性。"}, {"en": "Joint training of RPN and Fast R-CNN is approximate, ignoring gradients w.r.t. proposal box coordinates.", "zh": "RPN和Fast R-CNN的联合训练是近似的，忽略了关于提议框坐标的梯度。"}]}, "cites": 73463}, {"id": "oronneberger-1505.04597", "pid": "oronneberger", "arxiv": "1505.04597", "date": "2015-05-18", "venue": "cs.CV", "org": "University of Freiburg", "fields": ["vision", "deep-learning"], "tEn": "U-Net: Convolutional Networks for Biomedical Image Segmentation", "tZh": "U-Net：用于生物医学图像分割的卷积网络", "sEn": "U-Net achieves state-of-the-art segmentation with few images via strong data augmentation and a symmetric encoder-decoder architecture.", "sZh": "U-Net通过强大的数据增强和对称的编码器-解码器架构，仅用少量图像即可实现最先进的分割性能。", "absEn": "There is large consent that successful training of deep networks requires many thousand annotated training samples. In this paper, we present a network and training strategy that relies on the strong use of data augmentation to use the available annotated samples more efficiently. The architecture consists of a contracting path to capture context and a symmetric expanding path that enables precise localization. We show that such a network can be trained end-to-end from very few images and outperforms the prior best method (a sliding-window convolutional network) on the ISBI challenge for segmentation of neuronal structures in electron microscopic stacks. Using the same network trained on transmitted light microscopy images (phase contrast and DIC) we won the ISBI cell tracking challenge 2015 in these categories by a large margin. Moreover, the network is fast. Segmentation of a 512x512 image takes less than a second on a recent GPU. The full implementation (based on Caffe) and the trained networks are available at http://lmb.informatik.uni-freiburg.de/people/ronneber/u-net .", "absZh": "人们普遍认为，深度网络的成功训练需要数千个带注释的训练样本。在本文中，我们提出了一种网络和训练策略，该策略依赖于数据增强的强力使用，以更有效地利用可用的注释样本。该架构由一个用于捕获上下文的收缩路径和一个能够实现精确定位的对称扩展路径组成。我们表明，这样的网络可以从非常少的图像中进行端到端训练，并且在电子显微镜堆栈中神经元结构分割的ISBI挑战中优于先前的最佳方法（滑动窗口卷积网络）。使用在透射光显微镜图像（相差和DIC）上训练的相同网络，我们在2015年ISBI细胞追踪挑战赛中大幅领先。此外，该网络速度很快。在最新的GPU上，分割512x512图像只需不到一秒。完整实现（基于Caffe）和训练好的网络可在http://lmb.informatik.uni-freiburg.de/people/ronneber/u-net获取。", "insights": {"contrib": [{"en": "Proposed U-Net architecture with symmetric contracting and expansive paths for precise localization.", "zh": "提出具有对称收缩路径和扩展路径的U-Net架构，实现精确定位。"}, {"en": "Achieved state-of-the-art segmentation on ISBI EM challenge using only 30 annotated images via elastic deformation augmentation.", "zh": "仅用30张标注图像，通过弹性变形数据增强在ISBI EM挑战中达到最先进分割性能。"}, {"en": "Won ISBI cell tracking challenge 2015 with 92% IOU on PhC-U373 and 77.5% on DIC-HeLa, outperforming prior methods by large margins.", "zh": "在ISBI细胞追踪挑战2015中以92% IOU（PhC-U373）和77.5% IOU（DIC-HeLa）大幅领先先前方法。"}, {"en": "Introduced weighted loss to separate touching objects by emphasizing background borders between cells.", "zh": "引入加权损失，通过强调细胞间背景边界来分离接触物体。"}, {"en": "Enabled fast segmentation of 512x512 images in under a second on a GPU.", "zh": "实现512x512图像在GPU上不到一秒的快速分割。"}, {"en": "Provided full Caffe-based implementation and trained networks publicly.", "zh": "公开提供基于Caffe的完整实现和训练好的网络。"}], "limits": [{"en": "Requires careful selection of input tile size to ensure even dimensions for max-pooling layers.", "zh": "需要仔细选择输入图块大小，以确保最大池化层的尺寸为偶数。"}, {"en": "Unpadded convolutions reduce output size by a constant border width, limiting full-context prediction at edges.", "zh": "无填充卷积使输出尺寸缩小固定边界宽度，限制了边缘的全上下文预测。"}, {"en": "Performance depends on data augmentation with elastic deformations, which may not generalize to all biomedical tasks.", "zh": "性能依赖于弹性变形数据增强，可能无法泛化到所有生物医学任务。"}, {"en": "Training requires a GPU with sufficient memory (e.g., 6 GB) for large input tiles.", "zh": "训练需要足够内存的GPU（如6 GB）以处理大输入图块。"}, {"en": "Weight map computation for separation borders relies on morphological operations, adding preprocessing complexity.", "zh": "分离边界的权重图计算依赖形态学操作，增加了预处理复杂性。"}]}, "cites": 97279}, {"id": "rgirshick-1504.08083", "pid": "rgirshick", "arxiv": "1504.08083", "date": "2015-04-30", "venue": "cs.CV", "org": "Microsoft", "fields": ["vision", "deep-learning"], "tEn": "Fast R-CNN", "tZh": "Fast R-CNN", "sEn": "Fast R-CNN achieves faster training and testing speeds with higher accuracy for object detection.", "sZh": "Fast R-CNN在目标检测中实现了更快的训练和测试速度以及更高的准确率。", "absEn": "This paper proposes a Fast Region-based Convolutional Network method (Fast R-CNN) for object detection. Fast R-CNN builds on previous work to efficiently classify object proposals using deep convolutional networks. Compared to previous work, Fast R-CNN employs several innovations to improve training and testing speed while also increasing detection accuracy. Fast R-CNN trains the very deep VGG16 network 9x faster than R-CNN, is 213x faster at test-time, and achieves a higher mAP on PASCAL VOC 2012. Compared to SPPnet, Fast R-CNN trains VGG16 3x faster, tests 10x faster, and is more accurate. Fast R-CNN is implemented in Python and C++ (using Caffe) and is available under the open-source MIT License at https://github.com/rbgirshick/fast-rcnn.", "absZh": "本文提出了一种基于区域的快速卷积网络方法（Fast R-CNN）用于目标检测。Fast R-CNN在先前工作的基础上，利用深度卷积网络高效地对目标提议进行分类。与先前工作相比，Fast R-CNN采用多项创新，提高了训练和测试速度，同时提升了检测精度。Fast R-CNN训练非常深的VGG16网络比R-CNN快9倍，测试时快213倍，并在PASCAL VOC 2012上获得了更高的mAP。与SPPnet相比，Fast R-CNN训练VGG16快3倍，测试快10倍，且更准确。Fast R-CNN使用Python和C++（基于Caffe）实现，并在MIT开源许可下于https://github.com/rbgirshick/fast-rcnn提供。", "insights": {"contrib": [{"en": "Proposes Fast R-CNN, a single-stage training algorithm for object detection that jointly learns classification and bounding-box regression.", "zh": "提出Fast R-CNN，一种用于目标检测的单阶段训练算法，联合学习分类和边界框回归。"}, {"en": "Achieves 9x faster training and 213x faster testing than R-CNN with VGG16, while improving mAP on PASCAL VOC 2012.", "zh": "在VGG16上实现比R-CNN快9倍的训练速度和213倍的测试速度，同时在PASCAL VOC 2012上提高了mAP。"}, {"en": "Introduces RoI pooling layer for efficient feature sharing and back-propagation through region proposals.", "zh": "引入RoI池化层，通过区域提议实现高效的特征共享和反向传播。"}, {"en": "Uses multi-task loss combining softmax classification and robust L1 bounding-box regression.", "zh": "使用多任务损失，结合softmax分类和鲁棒的L1边界框回归。"}, {"en": "Demonstrates that fine-tuning convolutional layers is crucial for very deep networks like VGG16.", "zh": "证明微调卷积层对于VGG16等非常深的网络至关重要。"}, {"en": "Shows that sparse object proposals improve detector quality, enabling efficient evaluation.", "zh": "表明稀疏目标提议可提高检测器质量，实现高效评估。"}], "limits": [{"en": "Relies on pre-computed object proposals, which limits end-to-end training and may miss objects.", "zh": "依赖预计算的目标提议，限制了端到端训练，可能遗漏目标。"}, {"en": "Single-scale training and testing may not generalize well to extreme scale variations.", "zh": "单尺度训练和测试可能无法很好地泛化到极端尺度变化。"}, {"en": "GPU memory constraints limit the use of very deep networks with multi-scale training.", "zh": "GPU内存限制阻碍了多尺度训练中使用非常深的网络。"}, {"en": "Performance degrades when using dense object proposals instead of sparse ones.", "zh": "使用密集目标提议而非稀疏提议时性能下降。"}, {"en": "Method is evaluated only on PASCAL VOC and MS COCO datasets; generalization to other domains is not tested.", "zh": "方法仅在PASCAL VOC和MS COCO数据集上评估，未测试对其他领域的泛化性。"}]}, "cites": 28561}, {"id": "svlevine-1504.00702", "pid": "svlevine", "arxiv": "1504.00702", "date": "2015-04-02", "venue": "cs.LG", "org": "UC Berkeley", "fields": ["rl", "vision"], "tEn": "End-to-End Training of Deep Visuomotor Policies", "tZh": "深度视觉运动策略的端到端训练", "sEn": "Jointly training perception and control end-to-end yields better performance than separate training for visuomotor policies.", "sZh": "联合训练感知和控制系统端到端比单独训练每个组件能获得更好的性能。", "absEn": "Policy search methods can allow robots to learn control policies for a wide range of tasks, but practical applications of policy search often require hand-engineered components for perception, state estimation, and low-level control. In this paper, we aim to answer the following question: does training the perception and control systems jointly end-to-end provide better performance than training each component separately? To this end, we develop a method that can be used to learn policies that map raw image observations directly to torques at the robot's motors. The policies are represented by deep convolutional neural networks (CNNs) with 92,000 parameters, and are trained using a partially observed guided policy search method, which transforms policy search into supervised learning, with supervision provided by a simple trajectory-centric reinforcement learning method. We evaluate our method on a range of real-world manipulation tasks that require close coordination between vision and control, such as screwing a cap onto a bottle, and present simulated comparisons to a range of prior policy search methods.", "absZh": "策略搜索方法可以让机器人学习各种任务的操控策略，但实际应用中往往需要手工设计的感知、状态估计和底层控制组件。本文旨在回答以下问题：联合训练感知和控制系统端到端是否比单独训练每个组件能获得更好的性能？为此，我们开发了一种方法，可以学习将原始图像观测直接映射到机器人电机扭矩的策略。这些策略由具有92,000个参数的深度卷积神经网络表示，并使用部分观测的引导策略搜索方法进行训练，该方法将策略搜索转化为监督学习，监督信号由简单的以轨迹为中心的强化学习方法提供。我们在需要视觉和操控紧密协调的一系列真实世界操作任务（如将瓶盖拧到瓶子上）上评估了我们的方法，并与多种先前的策略搜索方法进行了模拟比较。", "insights": {"contrib": [{"en": "Develops a guided policy search method that transforms policy search into supervised learning using trajectory-centric RL.", "zh": "提出一种引导式策略搜索方法，将策略搜索转化为监督学习，利用轨迹中心强化学习提供监督信号。"}, {"en": "Introduces a novel CNN architecture with spatial soft-argmax for end-to-end visuomotor policy learning from raw images to torques.", "zh": "引入一种新颖的CNN架构，包含空间软argmax层，实现从原始图像到力矩的端到端视觉运动策略学习。"}, {"en": "Demonstrates end-to-end training of perception and control outperforms separate training on real-world manipulation tasks.", "zh": "在真实世界操作任务上证明，感知与控制联合端到端训练优于分别训练。"}, {"en": "Achieves sample-efficient learning with only tens of minutes of real-world interaction time for complex 7-DoF tasks.", "zh": "实现样本高效学习，仅需数十分钟真实交互即可完成复杂7自由度任务。"}, {"en": "Provides simulated comparisons showing guided policy search outperforms prior methods like REPS, RWR, and PILCO.", "zh": "通过仿真对比表明，引导式策略搜索优于REPS、RWR和PILCO等先前方法。"}, {"en": "Formalizes guided policy search as BADMM, ensuring convergence to a locally optimal solution.", "zh": "将引导式策略搜索形式化为BADMM算法，确保收敛到局部最优解。"}], "limits": [{"en": "Requires full state observability during training, limiting applicability to instrumented setups.", "zh": "训练时需要完全状态可观测，限制了在非仪器化场景中的应用。"}, {"en": "Assumes low-noise dynamics for linear-Gaussian trajectory optimization, which may not hold in highly stochastic environments.", "zh": "假设低噪声动力学以进行线性高斯轨迹优化，在高度随机环境中可能不成立。"}, {"en": "Uses first-moment constraints on actions, which may be insufficient for tasks requiring precise higher-order statistics.", "zh": "对动作采用一阶矩约束，可能不足以处理需要高阶统计量的任务。"}, {"en": "Pretraining requires ImageNet initialization and pose regression data, adding dependency on external datasets.", "zh": "预训练需要ImageNet初始化和位姿回归数据，增加了对外部数据集的依赖。"}, {"en": "Policy architecture with spatial soft-argmax is specialized for visuomotor tasks and may not generalize to other perception problems.", "zh": "带有空间软argmax的策略架构专用于视觉运动任务，可能无法泛化到其他感知问题。"}]}, "cites": 3816}, {"id": "jsohldick-1503.03585", "pid": "jsohldick", "arxiv": "1503.03585", "date": "2015-03-12", "venue": "cs.LG", "org": "Stanford", "fields": ["generative", "deep-learning"], "tEn": "Deep Unsupervised Learning using Nonequilibrium Thermodynamics", "tZh": "基于非平衡热力学的深度无监督学习", "sEn": "A novel generative model inspired by non-equilibrium statistical physics that learns to reverse a diffusion process to restore data structure.", "sZh": "受非平衡统计物理启发，通过逆向扩散过程恢复数据结构，实现灵活且可处理的深度生成模型。", "absEn": "A central problem in machine learning involves modeling complex data-sets using highly flexible families of probability distributions in which learning, sampling, inference, and evaluation are still analytically or computationally tractable. Here, we develop an approach that simultaneously achieves both flexibility and tractability. The essential idea, inspired by non-equilibrium statistical physics, is to systematically and slowly destroy structure in a data distribution through an iterative forward diffusion process. We then learn a reverse diffusion process that restores structure in data, yielding a highly flexible and tractable generative model of the data. This approach allows us to rapidly learn, sample from, and evaluate probabilities in deep generative models with thousands of layers or time steps, as well as to compute conditional and posterior probabilities under the learned model. We additionally release an open source reference implementation of the algorithm.", "absZh": "机器学习的一个核心问题是如何使用高度灵活的概率分布族对复杂数据集进行建模，同时保持学习、采样、推理和评估在分析或计算上的可处理性。本文提出了一种同时实现灵活性和可处理性的方法。其基本思想受非平衡统计物理启发，通过迭代前向扩散过程系统地、缓慢地破坏数据分布中的结构。然后，我们学习一个逆向扩散过程来恢复数据中的结构，从而得到一个高度灵活且可处理的生成模型。该方法使我们能够快速学习、采样和评估具有数千层或时间步的深度生成模型中的概率，还能计算学习模型下的条件概率和后验概率。此外，我们还发布了该算法的开源参考实现。", "insights": {"contrib": [{"en": "Introduces diffusion probabilistic models inspired by non-equilibrium statistical physics, achieving both flexibility and tractability.", "zh": "受非平衡统计物理启发，提出扩散概率模型，同时实现灵活性与可处理性。"}, {"en": "Defines a forward diffusion process that gradually destroys data structure and learns a reverse process to restore it.", "zh": "定义前向扩散过程逐步破坏数据结构，并学习反向过程恢复结构。"}, {"en": "Enables exact sampling, log-likelihood evaluation, and multiplication with other distributions for posterior computation.", "zh": "支持精确采样、对数似然评估，以及与其他分布相乘计算后验。"}, {"en": "Demonstrates high log-likelihood on diverse datasets including MNIST, CIFAR-10, and dead leaves images.", "zh": "在MNIST、CIFAR-10和枯叶图像等多个数据集上展示高对数似然。"}, {"en": "Provides entropy bounds for the reverse diffusion process and a lower bound on log-likelihood for training.", "zh": "为反向扩散过程提供熵界，并为训练提供对数似然下界。"}, {"en": "Releases open-source reference implementation for reproducibility.", "zh": "发布开源参考实现以促进可复现性。"}], "limits": [{"en": "Requires many diffusion steps (thousands) for high-quality samples, increasing computational cost.", "zh": "需要大量扩散步骤（数千步）以获得高质量样本，增加计算成本。"}, {"en": "Performance depends on the choice of diffusion schedule and noise type (Gaussian or binomial).", "zh": "性能依赖于扩散调度和噪声类型（高斯或二项式）的选择。"}, {"en": "The method assumes smooth target distributions; highly multimodal or discontinuous distributions may be challenging.", "zh": "该方法假设目标分布平滑；高度多峰或不连续分布可能具有挑战性。"}, {"en": "Training requires careful tuning of hyperparameters like step size and network architecture.", "zh": "训练需要仔细调整超参数，如步长和网络架构。"}, {"en": "The lower bound on log-likelihood may be loose for finite diffusion steps, affecting model evaluation.", "zh": "对于有限扩散步数，对数似然下界可能较松，影响模型评估。"}]}, "cites": 10166}, {"id": "hinton-1503.02531", "pid": "hinton", "arxiv": "1503.02531", "date": "2015-03-09", "venue": "stat.ML", "fields": ["deep-learning"], "tEn": "Distilling the Knowledge in a Neural Network", "tZh": "神经网络中的知识蒸馏", "sEn": "Distilling knowledge from an ensemble into a single model improves performance and efficiency.", "sZh": "将集成模型的知识蒸馏到单个模型中，可提升性能并降低计算成本。", "absEn": "A very simple way to improve the performance of almost any machine learning algorithm is to train many different models on the same data and then to average their predictions. Unfortunately, making predictions using a whole ensemble of models is cumbersome and may be too computationally expensive to allow deployment to a large number of users, especially if the individual models are large neural nets. Caruana and his collaborators have shown that it is possible to compress the knowledge in an ensemble into a single model which is much easier to deploy and we develop this approach further using a different compression technique. We achieve some surprising results on MNIST and we show that we can significantly improve the acoustic model of a heavily used commercial system by distilling the knowledge in an ensemble of models into a single model. We also introduce a new type of ensemble composed of one or more full models and many specialist models which learn to distinguish fine-grained classes that the full models confuse. Unlike a mixture of experts, these specialist models can be trained rapidly and in parallel.", "absZh": "一种提升几乎所有机器学习算法性能的简单方法是，在相同数据上训练多个不同模型，然后对其预测取平均。然而，使用整个集成模型进行预测可能很繁琐，且计算成本过高，难以部署给大量用户，尤其是当单个模型是大型神经网络时。Caruana及其合作者已证明，可以将集成模型中的知识压缩到单个模型中，从而更易于部署。我们使用一种不同的压缩技术进一步改进了这一方法。我们在MNIST上取得了一些令人惊讶的结果，并展示了通过将集成模型的知识蒸馏到单个模型中，可以显著改进一个广泛使用的商业系统的声学模型。我们还引入了一种新型集成模型，由一个或多个完整模型和许多专家模型组成，这些专家模型学习区分完整模型容易混淆的细粒度类别。与混合专家模型不同，这些专家模型可以快速并行训练。", "insights": {"contrib": [{"en": "Introduces knowledge distillation, transferring ensemble knowledge into a single small model using soft targets with temperature scaling.", "zh": "提出知识蒸馏技术，通过带温度缩放的软目标将集成模型的知识迁移到单个小型模型中。"}, {"en": "Shows distilled model on MNIST achieves 74 errors vs 146 for a regularized small net, even without seeing digit 3 in transfer set.", "zh": "在MNIST上，蒸馏模型仅74个错误，而正则化小网络为146个错误，即使迁移集中没有数字3的样本。"}, {"en": "Demonstrates distillation improves commercial speech recognition: distilled single model matches ensemble performance with 10.9% WER.", "zh": "在商业语音识别中，蒸馏模型达到集成模型的性能，词错误率10.9%。"}, {"en": "Proposes specialist ensemble: one generalist plus many specialists for fine-grained classes, trained in parallel, improving JFT accuracy by 4.4%.", "zh": "提出专家集成：一个通用模型加多个细粒度类别专家模型，可并行训练，在JFT上准确率提升4.4%。"}, {"en": "Shows soft targets prevent overfitting with limited data: 3% of speech data yields 57% frame accuracy vs 44.5% with hard targets.", "zh": "软目标防止过拟合：仅3%语音数据时帧准确率57%，而硬目标仅44.5%。"}, {"en": "Provides theoretical analysis: high-temperature distillation approximates minimizing squared logit difference.", "zh": "理论分析：高温蒸馏近似最小化logit平方差。"}], "limits": [{"en": "Distillation requires a pre-trained cumbersome model, which may be computationally expensive to obtain.", "zh": "蒸馏需要预训练的笨重模型，获取该模型可能计算成本高昂。"}, {"en": "Optimal temperature is task-dependent and requires tuning; low temperatures may ignore useful negative logits.", "zh": "最优温度依赖任务并需调参；低温可能忽略有用的负logit信息。"}, {"en": "Specialist ensemble relies on clustering of confusable classes, which may not be optimal for all datasets.", "zh": "专家集成依赖易混淆类别的聚类，可能不适用于所有数据集。"}, {"en": "Distillation performance degrades when distilled model is too small to capture all knowledge from cumbersome model.", "zh": "当蒸馏模型过小无法捕捉笨重模型全部知识时，性能下降。"}, {"en": "Method assumes soft targets from cumbersome model are reliable; noisy or biased cumbersome models may transfer errors.", "zh": "方法假设笨重模型的软目标可靠；噪声或偏差模型可能传递错误。"}]}, "cites": 24680, "org": "Google"}, {"id": "schulman-1502.05477", "pid": "schulman", "arxiv": "1502.05477", "date": "2015-02-19", "venue": "cs.LG", "fields": ["rl"], "tEn": "Trust Region Policy Optimization", "tZh": "信任区域策略优化", "sEn": "TRPO is a practical algorithm for optimizing policies with guaranteed monotonic improvement, effective for large nonlinear policies like neural networks.", "sZh": "TRPO是一种实用的策略优化算法，能保证单调改进，适用于神经网络等大型非线性策略。", "absEn": "We describe an iterative procedure for optimizing policies, with guaranteed monotonic improvement. By making several approximations to the theoretically-justified procedure, we develop a practical algorithm, called Trust Region Policy Optimization (TRPO). This algorithm is similar to natural policy gradient methods and is effective for optimizing large nonlinear policies such as neural networks. Our experiments demonstrate its robust performance on a wide variety of tasks: learning simulated robotic swimming, hopping, and walking gaits; and playing Atari games using images of the screen as input. Despite its approximations that deviate from the theory, TRPO tends to give monotonic improvement, with little tuning of hyperparameters.", "absZh": "我们描述了一种迭代策略优化过程，具有保证的单调改进。通过对理论证明的过程进行若干近似，我们开发了一种实用的算法，称为信任区域策略优化（TRPO）。该算法类似于自然策略梯度方法，对于优化大型非线性策略（如神经网络）非常有效。我们的实验证明了它在各种任务上的稳健性能：学习模拟机器人游泳、跳跃和行走步态；以及使用屏幕图像作为输入玩Atari游戏。尽管其近似偏离了理论，TRPO往往在超参数调整很少的情况下实现单调改进。", "insights": {"contrib": [{"en": "Proves a monotonic improvement guarantee for policy optimization with KL divergence penalty.", "zh": "证明了使用KL散度惩罚的策略优化具有单调改进保证。"}, {"en": "Develops TRPO, a practical algorithm using a KL divergence constraint for robust updates.", "zh": "开发了TRPO，一种使用KL散度约束进行稳健更新的实用算法。"}, {"en": "Demonstrates TRPO's effectiveness on simulated robotic locomotion and Atari games.", "zh": "展示了TRPO在模拟机器人运动和Atari游戏上的有效性。"}, {"en": "Unifies policy gradient and policy iteration methods under a trust region framework.", "zh": "在信任区域框架下统一了策略梯度和策略迭代方法。"}, {"en": "Achieves state-of-the-art performance on high-dimensional control tasks with neural network policies.", "zh": "在具有神经网络策略的高维控制任务上实现了最先进的性能。"}], "limits": [{"en": "Assumes exact advantage evaluation, which is unrealistic in practice.", "zh": "假设优势函数精确评估，这在实践中不现实。"}, {"en": "Vine method requires state resets, limiting applicability to simulation.", "zh": "Vine方法需要状态重置，限制了其在模拟环境中的应用。"}, {"en": "Theoretical bound uses maximum KL divergence, but practical algorithm uses average KL.", "zh": "理论界限使用最大KL散度，但实际算法使用平均KL散度。"}, {"en": "Sample complexity may be high for real-world robotic tasks due to on-policy sampling.", "zh": "由于在策略采样，样本复杂度可能对真实机器人任务较高。"}, {"en": "Performance on Atari games is not consistently superior to specialized methods like DQN.", "zh": "在Atari游戏上的性能并不始终优于DQN等专门方法。"}]}, "cites": 8048, "org": "UC Berkeley"}, {"id": "cszegedy-1502.03167", "pid": "cszegedy", "arxiv": "1502.03167", "date": "2015-02-11", "venue": "cs.LG", "org": "Google", "fields": ["deep-learning", "vision"], "tEn": "Batch Normalization: Accelerating Deep Network Training by Reducing Internal Covariate Shift", "tZh": "批量归一化：通过减少内部协变量偏移加速深度网络训练", "sEn": "Batch Normalization allows higher learning rates, reduces need for Dropout, and achieves state-of-the-art accuracy with fewer training steps.", "sZh": "批量归一化允许使用更高的学习率，减少对Dropout的需求，并以更少的训练步骤达到最先进的准确率。", "absEn": "Training Deep Neural Networks is complicated by the fact that the distribution of each layer's inputs changes during training, as the parameters of the previous layers change. This slows down the training by requiring lower learning rates and careful parameter initialization, and makes it notoriously hard to train models with saturating nonlinearities. We refer to this phenomenon as internal covariate shift, and address the problem by normalizing layer inputs. Our method draws its strength from making normalization a part of the model architecture and performing the normalization for each training mini-batch. Batch Normalization allows us to use much higher learning rates and be less careful about initialization. It also acts as a regularizer, in some cases eliminating the need for Dropout. Applied to a state-of-the-art image classification model, Batch Normalization achieves the same accuracy with 14 times fewer training steps, and beats the original model by a significant margin. Using an ensemble of batch-normalized networks, we improve upon the best published result on ImageNet classification: reaching 4.9% top-5 validation error (and 4.8% test error), exceeding the accuracy of human raters.", "absZh": "训练深度神经网络时，由于前一层参数的变化，每一层输入的分布在训练过程中会发生变化，这使训练变得复杂。这需要较低的学习率和仔细的参数初始化，从而减慢了训练速度，并使具有饱和非线性的模型难以训练。我们将这种现象称为内部协变量偏移，并通过归一化层输入来解决这个问题。我们的方法的力量在于将归一化作为模型架构的一部分，并对每个训练小批量执行归一化。批量归一化使我们能够使用更高的学习率，并且不必过于担心初始化。它还可以作为正则化器，在某些情况下消除了对Dropout的需求。应用于最先进的图像分类模型时，批量归一化以14倍的训练步骤实现了相同的准确率，并显著超过了原始模型。使用批量归一化网络的集成，我们改进了ImageNet分类上最佳公布结果：达到4.9%的top-5验证误差（以及4.8%的测试误差），超过了人类评分者的准确率。", "insights": {"contrib": [{"en": "Proposes Batch Normalization to reduce internal covariate shift, enabling higher learning rates and faster training.", "zh": "提出批归一化以减少内部协变量偏移，从而支持更高的学习率和更快的训练。"}, {"en": "Normalizes layer inputs using mini-batch statistics, making normalization part of the model architecture.", "zh": "利用小批量统计量归一化层输入，使归一化成为模型架构的一部分。"}, {"en": "Allows use of saturating nonlinearities by preventing saturation, and acts as a regularizer reducing need for Dropout.", "zh": "通过防止饱和允许使用饱和非线性，并作为正则化器减少对Dropout的需求。"}, {"en": "Achieves same accuracy with 14x fewer training steps on ImageNet, and sets new state-of-the-art with 4.9% top-5 error.", "zh": "在ImageNet上以14倍少的训练步骤达到相同精度，并以4.9%的top-5错误率创下新纪录。"}, {"en": "Introduces learned affine parameters to restore network representation capacity after normalization.", "zh": "引入可学习的仿射参数，在归一化后恢复网络的表示能力。"}, {"en": "Demonstrates that Batch Normalization improves gradient flow and stabilizes parameter growth.", "zh": "证明批归一化改善了梯度流动并稳定了参数增长。"}], "limits": [{"en": "Normalization depends on mini-batch size; very small batches may lead to inaccurate statistics.", "zh": "归一化依赖于小批量大小；过小的批量可能导致统计量不准确。"}, {"en": "The method assumes that layer inputs have Gaussian-like distribution; non-Gaussian inputs may reduce effectiveness.", "zh": "该方法假设层输入具有类高斯分布；非高斯输入可能降低效果。"}, {"en": "Batch Normalization adds computational overhead during training due to per-batch statistics computation.", "zh": "批归一化在训练期间因计算每批统计量而增加计算开销。"}, {"en": "The theoretical understanding of why Batch Normalization works remains incomplete, especially for gradient propagation.", "zh": "批归一化为何有效的理论理解仍不完整，尤其在梯度传播方面。"}, {"en": "The method may not generalize well to recurrent networks or tasks with very small batch sizes.", "zh": "该方法可能不适用于循环网络或批量极小的任务。"}]}, "cites": 47009}, {"id": "dkingma-1412.6980", "pid": "dkingma", "arxiv": "1412.6980", "date": "2014-12-22", "venue": "cs.LG", "org": "U. Amsterdam", "fields": ["deep-learning", "efficiency"], "tEn": "Adam: A Method for Stochastic Optimization", "tZh": "Adam: 一种随机优化方法", "sEn": "Adam is an efficient stochastic optimization method that uses adaptive moment estimates.", "sZh": "Adam 是一种基于自适应矩估计的高效随机优化方法。", "absEn": "We introduce Adam, an algorithm for first-order gradient-based optimization of stochastic objective functions, based on adaptive estimates of lower-order moments. The method is straightforward to implement, is computationally efficient, has little memory requirements, is invariant to diagonal rescaling of the gradients, and is well suited for problems that are large in terms of data and/or parameters. The method is also appropriate for non-stationary objectives and problems with very noisy and/or sparse gradients. The hyper-parameters have intuitive interpretations and typically require little tuning. Some connections to related algorithms, on which Adam was inspired, are discussed. We also analyze the theoretical convergence properties of the algorithm and provide a regret bound on the convergence rate that
