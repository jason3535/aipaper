enerative Adversarial Networks", "tZh": "生成对抗网络", "sEn": "We propose a new framework for estimating generative models via an adversarial process, where a generative model and a discriminative model are trained simultaneously, with the generator aiming to fool the discriminator.", "sZh": "我们提出了一种通过对抗过程估计生成模型的新框架，其中同时训练生成模型和判别模型，生成器的目标是欺骗判别器。", "absEn": "We propose a new framework for estimating generative models via an adversarial process, in which we simultaneously train two models: a generative model G that captures the data distribution, and a discriminative model D that estimates the probability that a sample came from the training data rather than G. The training procedure for G is to maximize the probability of D making a mistake. This framework corresponds to a minimax two-player game. In the space of arbitrary functions G and D, a unique solution exists, with G recovering the training data distribution and D equal to 1/2 everywhere. In the case where G and D are defined by multilayer perceptrons, the entire system can be trained with backpropagation. There is no need for any Markov chains or unrolled approximate inference networks during either training or generation of samples. Experiments demonstrate the potential of the framework through qualitative and quantitative evaluation of the generated samples.", "absZh": "我们提出了一种通过对抗过程估计生成模型的新框架。在该框架中，我们同时训练两个模型：一个生成模型G，用于捕获数据分布；一个判别模型D，用于估计样本来自训练数据而非G的概率。G的训练过程是最大化D犯错误的概率。该框架对应于一个极小极大两人博弈。在任意函数G和D的空间中，存在唯一解，其中G恢复训练数据分布，而D处处等于1/2。当G和D由多层感知机定义时，整个系统可以通过反向传播进行训练。在训练或生成样本期间，无需任何马尔可夫链或展开的近似推理网络。实验通过对生成样本的定性和定量评估，展示了该框架的潜力。", "insights": {"contrib": [{"en": "Proposes adversarial training framework with generator and discriminator networks.", "zh": "提出生成器与判别器网络的对抗训练框架。"}, {"en": "Shows global optimum when generator matches data distribution, discriminator outputs 1/2.", "zh": "证明生成器匹配数据分布、判别器输出1/2时达到全局最优。"}, {"en": "Eliminates need for Markov chains or approximate inference during training or sampling.", "zh": "训练和采样无需马尔可夫链或近似推断。"}, {"en": "Demonstrates competitive sample quality on MNIST, TFD, and CIFAR-10.", "zh": "在MNIST、TFD和CIFAR-10上展示有竞争力的样本质量。"}, {"en": "Introduces minimax game formulation for generative model estimation.", "zh": "引入极小极大博弈公式用于生成模型估计。"}], "limits": [{"en": "No explicit representation of probability density p_g(x).", "zh": "没有概率密度p_g(x)的显式表示。"}, {"en": "Training requires careful synchronization between G and D to avoid mode collapse.", "zh": "训练需要G和D仔细同步以避免模式崩溃。"}, {"en": "Theoretical guarantees assume infinite capacity; practical MLPs may have critical points.", "zh": "理论保证假设无限容量；实际MLP可能存在临界点。"}, {"en": "Likelihood estimation via Parzen window has high variance and poor high-dimensional performance.", "zh": "通过Parzen窗估计似然方差大，高维性能差。"}, {"en": "Framework limited to differentiable generator and discriminator functions.", "zh": "框架限于可微的生成器和判别器函数。"}]}, "cites": 4320}, {"id": "jeffdean-1301.3781", "pid": "jeffdean", "arxiv": "1301.3781", "date": "2013-01-16", "venue": "cs.CL", "fields": ["nlp"], "tEn": "Efficient Estimation of Word Representations in Vector Space", "tZh": "词向量空间中的高效估计方法", "sEn": "Proposed two novel model architectures for computing continuous word vectors from large datasets, achieving higher accuracy with lower computational cost.", "sZh": "提出了两种新的模型架构，用于从大规模数据集中计算连续词向量，在降低计算成本的同时提高了准确性。", "absEn": "We propose two novel model architectures for computing continuous vector representations of words from very large data sets. The quality of these representations is measured in a word similarity task, and the results are compared to the previously best performing techniques based on different types of neural networks. We observe large improvements in accuracy at much lower computational cost, i.e. it takes less than a day to learn high quality word vectors from a 1.6 billion words data set. Furthermore, we show that these vectors provide state-of-the-art performance on our test set for measuring syntactic and semantic word similarities.", "absZh": "我们提出了两种新颖的模型架构，用于从非常大的数据集中计算词的连续向量表示。这些表示的质量通过词相似性任务进行衡量，并将结果与之前基于不同类型神经网络的最佳技术进行比较。我们观察到在计算成本大大降低的情况下，准确性有了显著提高，即从16亿词的数据集中学习高质量词向量只需不到一天的时间。此外，我们表明这些向量在用于测量句法和语义词相似性的测试集上提供了最先进的性能。", "insights": {"contrib": [{"en": "Proposes CBOW and Skip-gram models for efficient learning of high-quality word vectors from large data.", "zh": "提出CBOW和Skip-gram模型，可从大规模数据高效学习高质量词向量。"}, {"en": "Achieves state-of-the-art accuracy on syntactic and semantic word similarity tasks with low computational cost.", "zh": "在句法和语义词相似性任务上以低计算成本达到最先进精度。"}, {"en": "Demonstrates that word vectors capture linear regularities, enabling algebraic operations like vector(\"King\") - vector(\"Man\") + vector(\"Woman\") ≈ vector(\"Queen\").", "zh": "证明词向量捕捉线性规律，支持代数运算如vector(\"King\") - vector(\"Man\") + vector(\"Woman\") ≈ vector(\"Queen\")。"}, {"en": "Introduces a comprehensive test set with 8869 semantic and 10675 syntactic questions for evaluating word vectors.", "zh": "引入包含8869个语义和10675个句法问题的综合测试集，用于评估词向量。"}, {"en": "Shows that increasing both vector dimensionality and training data size yields diminishing returns, requiring balanced scaling.", "zh": "表明同时增加向量维度和训练数据量会带来递减收益，需要平衡缩放。"}, {"en": "Achieves new state-of-the-art on Microsoft Sentence Completion Challenge (58.9% accuracy) by combining Skip-gram with RNNLM.", "zh": "通过结合Skip-gram与RNNLM，在微软句子补全挑战中达到新最先进水平（58.9%准确率）。"}], "limits": [{"en": "Models treat words as atomic units, ignoring morphology; synonyms are counted as mistakes in evaluation.", "zh": "模型将词视为原子单元，忽略形态学；同义词在评估中被计为错误。"}, {"en": "Performance saturates with increasing vector dimensions or data size, requiring joint scaling for improvement.", "zh": "性能随向量维度或数据量增加而饱和，需要联合缩放才能改进。"}, {"en": "Skip-gram model underperforms on syntactic tasks compared to CBOW, limiting its general applicability.", "zh": "Skip-gram在句法任务上表现不如CBOW，限制了其通用性。"}, {"en": "Training on limited in-domain data (e.g., speech recognition) may not benefit from simple scaling, requiring advanced techniques.", "zh": "在有限的领域数据（如语音识别）上训练可能无法从简单缩放中受益，需要更高级技术。"}, {"en": "Evaluation metric (cosine distance) may not capture all semantic nuances, and 100% accuracy is likely unattainable.", "zh": "评估指标（余弦距离）可能无法捕捉所有语义细微差别，100%准确率可能无法达到。"}]}, "cites": 34511}];

function vPaper(id){

 const pe=PEOPLE[p.pid]||{}; const ins=p.insights||{};
 const full=FULL_CACHE[id];
 const reader=full?full.full.map(s=>`<div class="sec-h">${esc(s.sec)}</div><div class="sec-hz">${esc(s.secZh||'')}</div>`+
    s.paras.map(pa=>`<div class="para"><div class="en">${esc(pa.en)}</div><div class="zh">${esc(pa.zh)}</div></div>`).join('')).join('')
   :`<div class="skeleton" style="width:90%"></div><div class="skeleton" style="width:80%"></div><div class="skeleton" style="width:86%"></div>`;
 if(!full) ensureFull(id);
 return `<div class="wrap"><section>
  <span class="back" onclick="go('#/person/${p.pid}')">← ${esc(pe.zh||'')}</span>
  <h1 style="font-size:30px;margin:6px 0 2px">${esc(p.tEn)}</h1>
  <div class="sub" style="font-size:19px;color:#333">${esc(p.tZh)}</div>
  <div class="meta" style="margin-top:12px;color:var(--sub);font-size:14px">
   ${av(p.pid,'av')&&''}<span>${esc(pe.en||'')} · ${esc(pe.zh||'')}</span> ·
   <a class="alink" href="https://arxiv.org/abs/${p.arxiv}" target="_blank">arXiv:${p.arxiv} ↗</a> · <span>${p.date}</span></div>
  <div style="margin-top:12px">${(p.fields||[]).map(ftag).join(' ')}</div>
  ${p.cites!=null?`<div class="citebar"><span class="num">${fmtCites(p.cites)}</span> 次被引用 · <span style="color:var(--sub)">学术影响力(Semantic Scholar)</span></div>`:''}
  <div class="cards2">${ilist(ins.contrib,'核心贡献 · Key Contributions')}${ilist(ins.limits,'局限与边界 · Limitations')}</div>
  <h3 style="margin-top:30px">摘要 · Abstract</h3>
  <div class="para"><div class="en">${esc(p.absEn)}</div><div class="zh">${esc(p.absZh)}</div></div>
  ${askBox(p)}
  <h3 style="margin-top:34px">全文 · 逐段中英对照</h3>
  <div class="reader">${reader}</div>
 </section></div>${footer()}`;
}
function askBox(p){
 const qs=(p.insights&&p.insights.contrib||[]).slice(0,2).map(x=>x.zh);
 return `<div class="askbox"><div style="font-weight:650;margin-bottom:6px">针对这篇论文问 AI</div>
  <input id=" q" placeholder="例如：FlashAttention 为什么更快？" onkeydown="if(event.key==='Enter')askPaper('${p.id}')">
  <div class="qsugg">${qs.map(q=>`<span onclick="document.getElementById('q').value='${esc(q)}';askPaper('${p.id}')">${esc(q)}</span>`).join('')}</div>
  <button class="askbtn" onclick="askPaper('${p.id}')">提问</button>
  <div class="ans" id="ans"></div></div>`;
}
function vAsk(){
 return `<div class="wrap"><section><div class="eyebrow">Ask · 问 AI</div><h2 class="title">问遍全站论文</h2>
  <p class="sub">基于站内 ${PAPERS.length} 篇论文的内容回答，并标注引用来源。进入任意论文页也可单篇提问。</p>
  <div class="askbox" style="margin-top:18px"><input id="q" placeholder="例如：注意力机制是怎么提出的？" onkeydown="if(event.key==='Enter')askAll()">
   <button class="askbtn" onclick="askAll()">提问</button><div class="ans" id="ans"></div></div>
 </section></div>${footer()}`;
}
function footer(){return `<footer><div class="wrap">
  <div>AI Paper · 双语论文阅读站 — 著名学者的代表论文，逐段中英对照 + 核心贡献 + 论文问答。</div>
  <div class="legal">本站论文正文/摘要版权归原作者与 arXiv，按其许可（多为 CC-BY/arXiv 非独占）展示译文，仅作学习与研究用途；如权利人要求即下架。译文由 AI 生成，仅供参考，以原文为准。</div>
 </div></footer>`;}

/* ===== ASK (需部署 chat-worker；未配置则提示) ===== */
async function ask(payload,box){
 if(!CHAT_PROXY){box.textContent="（问答未配置）";return;}
 box.textContent="思考中…";
 try{const r=await fetch(CHAT_PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  if(!r.ok){box.textContent="出错："+r.status+" "+(await r.text());return;}
  const reader=r.body.getReader(),dec=new TextDecoder();box.textContent="";
  for(;;){const{done,value}=await reader.read();if(done)break;box.textContent+=dec.decode(value,{stream:true});}
 }catch(e){box.textContent="出错了："+e;}
}
function askPaper(id){const q=document.getElementById('q').value.trim();if(!q)return;
 const p=FULL_CACHE[id]||PAPERS.find(x=>x.id===id);
 ask({mode:'paper',q,id,title:p.tEn},document.getElementById('ans'));}
function askAll(){const q=document.getElementById('q').value.trim();if(!q)return;
 ask({mode:'all',q},document.getElementById('ans'));}

/* ===== LAZY FULL TEXT ===== */
async function ensureFull(id){
 if(FULL_CACHE[id])return FULL_CACHE[id];
 try{const r=await fetch('data/'+id+'.json');FULL_CACHE[id]=await r.json();
  if(location.hash.includes('/paper/'+id))render();return FULL_CACHE[id];}catch(e){}
}

/* ===== ROUTER ===== */
function render(){
 const h=location.hash||'#/';const[path,query]=h.slice(2).split('?');
 const parts=path.split('/').filter(Boolean);const qp=query?new URLSearchParams(query):null;
 let html;
 if(!parts.length)html=vHome();
 else if(parts[0]==='person')html=vPerson(parts[1]);
 else if(parts[0]==='paper')html=vPaper(decodeURIComponent(parts[1]));
 else if(parts[0]==='people')html=vPeople(qp&&qp.get('field'));
 else if(parts[0]==='papers')html=vPapers();
 else if(parts[0]==='ask')html=vAsk();
 else html=vHome();
 document.getElementById('app').innerHTML=html;
 window.scrollTo(0,0);
}
addEventListener('hashchange',render);render();
</script>
</body>
</html>
