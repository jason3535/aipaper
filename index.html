Voyager是首个由大型语言模型驱动的Minecraft具身终身学习智能体，无需人工干预即可持续探索、获取技能并做出新发现。", "absEn": "We introduce Voyager, the first LLM-powered embodied lifelong learning agent in Minecraft that continuously explores the world, acquires diverse skills, and makes novel discoveries without human intervention. Voyager consists of three key components: 1) an automatic curriculum that maximizes exploration, 2) an ever-growing skill library of executable code for storing and retrieving complex behaviors, and 3) a new iterative prompting mechanism that incorporates environment feedback, execution errors, and self-verification for program improvement. Voyager interacts with GPT-4 via blackbox queries, which bypasses the need for model parameter fine-tuning. The skills developed by Voyager are temporally extended, interpretable, and compositional, which compounds the agent's abilities rapidly and alleviates catastrophic forgetting. Empirically, Voyager shows strong in-context lifelong learning capability and exhibits exceptional proficiency in playing Minecraft. It obtains 3.3x more unique items, travels 2.3x longer distances, and unlocks key tech tree milestones up to 15.3x faster than prior SOTA. Voyager is able to utilize the learned skill library in a new Minecraft world to solve novel tasks from scratch, while other techniques struggle to generalize. We open-source our full codebase and prompts at https://voyager.minedojo.org/.", "absZh": "我们介绍了Voyager，这是首个在Minecraft中由大型语言模型驱动的具身终身学习智能体，它能够持续探索世界、获取多样技能，并在无需人工干预的情况下做出新颖发现。Voyager由三个关键组件构成：1）最大化探索的自动课程；2）不断增长的技能库，用于存储和检索可执行代码的复杂行为；3）一种新的迭代提示机制，结合环境反馈、执行错误和自验证来改进程序。Voyager通过黑盒查询与GPT-4交互，无需微调模型参数。Voyager开发的技能具有时间延展性、可解释性和组合性，这迅速增强了智能体的能力并减轻了灾难性遗忘。实验表明，Voyager展现出强大的上下文终身学习能力，并在玩Minecraft方面表现出色。它获得的独特物品数量是先前最先进方法的3.3倍，旅行距离是其2.3倍，解锁关键技术树里程碑的速度快达15.3倍。Voyager能够利用学到的技能库在新的Minecraft世界中从头解决新任务，而其他技术难以泛化。我们在https://voyager.minedojo.org/开源了完整的代码库和提示。", "insights": {"contrib": [{"en": "First LLM-powered embodied lifelong learning agent in Minecraft, exploring and acquiring skills without human intervention.", "zh": "首个由大语言模型驱动的具身终身学习智能体，在Minecraft中无需人工干预即可探索世界并获取技能。"}, {"en": "Automatic curriculum that maximizes exploration by proposing tasks based on agent state and progress.", "zh": "自动课程最大化探索，根据智能体状态和进展提出任务。"}, {"en": "Growing skill library of executable code for storing and retrieving complex, compositional behaviors.", "zh": "不断增长的技能库，存储和检索可执行代码的复杂组合行为。"}, {"en": "Iterative prompting mechanism using environment feedback, execution errors, and self-verification for code improvement.", "zh": "迭代提示机制，利用环境反馈、执行错误和自我验证改进代码。"}, {"en": "Outperforms prior SOTA: 3.3x more unique items, 2.3x longer distances, 15.3x faster tech tree milestones.", "zh": "超越先前最优：3.3倍独特物品、2.3倍移动距离、15.3倍更快解锁科技树里程碑。"}, {"en": "Zero-shot generalization to novel tasks in new worlds using learned skill library.", "zh": "零样本泛化到新世界中的新任务，利用已学技能库。"}], "limits": [{"en": "No visual perception; relies on text-only GPT-4 API, limiting spatial tasks.", "zh": "缺乏视觉感知，依赖纯文本GPT-4 API，限制空间任务。"}, {"en": "High cost of GPT-4 API; 15x more expensive than GPT-3.5.", "zh": "GPT-4 API成本高，比GPT-3.5贵15倍。"}, {"en": "Occasional failures in code generation and self-verification, e.g., hallucinating non-existent items.", "zh": "代码生成和自我验证偶尔失败，例如幻觉出不存在的物品。"}, {"en": "Automatic curriculum may propose unachievable tasks due to hallucinations.", "zh": "自动课程可能因幻觉提出无法完成的任务。"}, {"en": "Requires high-level Mineflayer API; not directly comparable to low-level pixel-based methods.", "zh": "需要高级Mineflayer API，无法直接与基于像素的低级方法比较。"}]}, "cites": 1836, "org": "NVIDIA"}, {"id": "finn-2304.13705", "pid": "finn", "arxiv": "2304.13705", "date": "2023-04-23", "venue": "cs.RO", "org": "Stanford", "fields": ["rl", "vision"], "tEn": "Learning Fine-Grained Bimanual Manipulation with Low-Cost Hardware", "tZh": "利用低成本硬件学习精细双手操作", "sEn": "A low-cost system with imitation learning enables fine bimanual manipulation tasks with high success rates.", "sZh": "一种低成本系统通过模仿学习实现精细双手操作任务，成功率高达80-90%。", "absEn": "Fine manipulation tasks, such as threading cable ties or slotting a battery, are notoriously difficult for robots because they require precision, careful coordination of contact forces, and closed-loop visual feedback. Performing these tasks typically requires high-end robots, accurate sensors, or careful calibration, which can be expensive and difficult to set up. Can learning enable low-cost and imprecise hardware to perform these fine manipulation tasks? We present a low-cost system that performs end-to-end imitation learning directly from real demonstrations, collected with a custom teleoperation interface. Imitation learning, however, presents its own challenges, particularly in high-precision domains: errors in the policy can compound over time, and human demonstrations can be non-stationary. To address these challenges, we develop a simple yet novel algorithm, Action Chunking with Transformers (ACT), which learns a generative model over action sequences. ACT allows the robot to learn 6 difficult tasks in the real world, such as opening a translucent condiment cup and slotting a battery with 80-90% success, with only 10 minutes worth of demonstrations. Project website: https://tonyzhaozh.github.io/aloha/", "absZh": "精细操作任务，如穿扎带或插入电池，对机器人来说非常困难，因为它们需要精度、接触力的仔细协调以及闭环视觉反馈。执行这些任务通常需要高端机器人、精确传感器或仔细校准，这些可能昂贵且难以设置。学习能否使低成本且不精确的硬件执行这些精细操作任务？我们提出了一个低成本系统，该系统直接从真实演示中进行端到端模仿学习，这些演示是通过自定义遥操作界面收集的。然而，模仿学习本身也带来了挑战，特别是在高精度领域：策略中的误差会随时间累积，并且人类演示可能是不稳定的。为了解决这些挑战，我们开发了一种简单而新颖的算法——动作分块变换器（ACT），该算法学习动作序列上的生成模型。ACT使机器人能够在现实世界中学习6个困难任务，例如打开半透明调味杯和插入电池，成功率高达80-90%，仅需10分钟的演示。项目网站：https://tonyzhaozh.github.io/aloha/", "insights": {"contrib": [{"en": "A low-cost bimanual teleoperation system (ALOHA) for fine manipulation, built with off-the-shelf arms and 3D-printed parts.", "zh": "一个低成本的双臂遥操作系统（ALOHA），使用现成机械臂和3D打印部件构建，用于精细操作。"}, {"en": "Action Chunking with Transformers (ACT), a novel imitation learning algorithm that predicts action sequences to reduce compounding errors.", "zh": "基于Transformer的动作分块（ACT），一种新颖的模仿学习算法，通过预测动作序列减少复合误差。"}, {"en": "Temporal ensembling to smooth overlapping action chunks, improving motion smoothness without additional training.", "zh": "时间集成以平滑重叠的动作块，在不增加训练的情况下改善运动平滑性。"}, {"en": "Conditional VAE training to handle multi-modal human demonstrations, crucial for learning from noisy data.", "zh": "条件变分自编码器训练以处理多模态人类演示，对于从噪声数据中学习至关重要。"}, {"en": "Demonstrated 80-90% success on 6 real-world fine manipulation tasks with only 10 minutes of demonstrations.", "zh": "在6个真实世界精细操作任务上实现80-90%的成功率，仅需10分钟演示。"}, {"en": "Open-source hardware and software design for reproducibility and accessibility.", "zh": "开源硬件和软件设计，确保可复现性和可访问性。"}], "limits": [{"en": "Limited to tasks within the robot's payload (750g) and workspace (1.5m span).", "zh": "限于机器人有效载荷（750克）和工作空间（跨度1.5米）内的任务。"}, {"en": "Requires task-specific training from scratch; no generalization across tasks.", "zh": "需要针对每个任务从头训练；无法跨任务泛化。"}, {"en": "Performance degrades on low-contrast objects (e.g., black cable tie on black table).", "zh": "在低对比度物体（如黑色桌面上的黑色扎带）上性能下降。"}, {"en": "Action chunking with large chunk sizes reduces reactivity to sudden changes.", "zh": "大块大小的动作分块降低了对突发变化的反应能力。"}, {"en": "Teleoperation requires user skill; high-frequency control (50Hz) is necessary for precision.", "zh": "遥操作需要用户技能；高频控制（50Hz）对精度至关重要。"}]}}, {"id": "haotianliu-2304.08485", "pid": "haotianliu", "arxiv": "2304.08485", "date": "2023-04-17", "venue": "cs.CV", "org": "University of Wisconsin-Madison / Microsoft Research", "fields": ["vision", "nlp"], "tEn": "Visual Instruction Tuning", "tZh": "视觉指令微调", "sEn": "LLaVA: an end-to-end trained large multimodal model connecting a vision encoder and LLM for general-purpose visual and language understanding, achieving impressive multimodal chat abilities and state-of-the-art accuracy on Science QA.", "sZh": "LLaVA：一个端到端训练的大型多模态模型，连接视觉编码器和LLM，实现通用视觉与语言理解，展现出令人印象深刻的多模态对话能力，并在Science QA上达到最先进准确率。", "absEn": "Instruction tuning large language models (LLMs) using machine-generated instruction-following data has improved zero-shot capabilities on new tasks, but the idea is less explored in the multimodal field. In this paper, we present the first attempt to use language-only GPT-4 to generate multimodal language-image instruction-following data. By instruction tuning on such generated data, we introduce LLaVA: Large Language and Vision Assistant, an end-to-end trained large multimodal model that connects a vision encoder and LLM for general-purpose visual and language understanding.Our early experiments show that LLaVA demonstrates impressive multimodel chat abilities, sometimes exhibiting the behaviors of multimodal GPT-4 on unseen images/instructions, and yields a 85.1% relative score compared with GPT-4 on a synthetic multimodal instruction-following dataset. When fine-tuned on Science QA, the synergy of LLaVA and GPT-4 achieves a new state-of-the-art accuracy of 92.53%. We make GPT-4 generated visual instruction tuning data, our model and code base publicly available.", "absZh": "使用机器生成的指令遵循数据对大型语言模型（LLM）进行指令微调，提高了新任务上的零样本能力，但这一思路在多模态领域探索较少。本文首次尝试使用仅语言GPT-4生成多模态语言-图像指令遵循数据。通过对这些生成数据进行指令微调，我们提出了LLaVA：大型语言与视觉助手，这是一个端到端训练的大型多模态模型，连接视觉编码器和LLM，用于通用视觉与语言理解。我们的早期实验表明，LLaVA展现出令人印象深刻的多模态对话能力，有时在未见过的图像/指令上表现出多模态GPT-4的行为，并在合成多模态指令遵循数据集上达到GPT-4相对得分的85.1%。在Science QA上微调后，LLaVA与GPT-4的协同作用实现了92.53%的最新准确率。我们公开了GPT-4生成的视觉指令微调数据、模型和代码库。", "insights": {"contrib": [{"en": "First to use language-only GPT-4 to generate multimodal language-image instruction-following data.", "zh": "首次使用仅语言的GPT-4生成多模态语言-图像指令遵循数据。"}, {"en": "Introduces LLaVA, an end-to-end trained large multimodal model connecting a vision encoder and LLM.", "zh": "提出LLaVA，一种端到端训练的大型多模态模型，连接视觉编码器和LLM。"}, {"en": "Achieves 85.1% relative score vs. GPT-4 on synthetic multimodal instruction-following dataset.", "zh": "在合成多模态指令遵循数据集上达到GPT-4的85.1%相对分数。"}, {"en": "New state-of-the-art accuracy of 92.53% on Science QA when ensembled with GPT-4.", "zh": "与GPT-4集成后在Science QA上达到92.53%的最新准确率。"}, {"en": "Constructs two evaluation benchmarks for visual instruction following with diverse tasks.", "zh": "构建了两个用于视觉指令遵循的评估基准，包含多样化任务。"}, {"en": "Releases generated multimodal instruction data, model, and code publicly.", "zh": "公开了生成的多模态指令数据、模型和代码。"}], "limits": [{"en": "Data generation relies on GPT-4, which may introduce biases or inaccuracies.", "zh": "数据生成依赖GPT-4，可能引入偏差或不准确。"}, {"en": "LLaVA sometimes fails on complex semantics, e.g., misinterpreting image as bag of patches.", "zh": "LLaVA有时在复杂语义上失败，例如将图像误解为补丁包。"}, {"en": "Limited to 158K instruction samples; performance may improve with more data.", "zh": "仅使用158K指令样本；更多数据可能提升性能。"}, {"en": "Simple linear projection for vision-language connection may limit expressiveness.", "zh": "简单的线性投影用于视觉-语言连接可能限制表达能力。"}, {"en": "Evaluation benchmarks are synthetic or limited in scope; real-world generalization not fully tested.", "zh": "评估基准是合成的或范围有限；未充分测试真实世界泛化。"}]}}, {"id": "xiaohuazhai-2303.15343", "pid": "xiaohuazhai", "arxiv": "2303.15343", "date": "2023-03-27", "venue": "cs.CV", "org": "Google DeepMind", "fields": ["vision", "nlp"], "tEn": "Sigmoid Loss for Language Image Pre-Training", "tZh": "语言-图像预训练的Sigmoid损失", "sEn": "We propose a simple pairwise Sigmoid loss for Language-Image Pre-training (SigLIP) that outperforms softmax-based contrastive learning, especially at small batch sizes, and achieves 84.5% ImageNet zero-shot accuracy with only four TPUv4 chips in two days.", "sZh": "我们提出了一种用于语言-图像预训练的简单成对Sigmoid损失（SigLIP），它优于基于softmax的对比学习，尤其是在小批量大小下，并且仅用四个TPUv4芯片在两天内就达到了84.5%的ImageNet零样本准确率。", "absEn": "We propose a simple pairwise Sigmoid loss for Language-Image Pre-training (SigLIP). Unlike standard contrastive learning with softmax normalization, the sigmoid loss operates solely on image-text pairs and does not require a global view of the pairwise similarities for normalization. The sigmoid loss simultaneously allows further scaling up the batch size, while also performing better at smaller batch sizes. Combined with Locked-image Tuning, with only four TPUv4 chips, we train a SigLiT model that achieves 84.5% ImageNet zero-shot accuracy in two days. The disentanglement of the batch size from the loss further allows us to study the impact of examples vs pairs and negative to positive ratio. Finally, we push the batch size to the extreme, up to one million, and find that the benefits of growing batch size quickly diminish, with a more reasonable batch size of 32k being sufficient. We release our models at https://github.com/google-research/big_vision and hope our research motivates further explorations in improving the quality and efficiency of language-image pre-training.", "absZh": "我们提出了一种用于语言-图像预训练的简单成对Sigmoid损失（SigLIP）。与使用softmax归一化的标准对比学习不同，sigmoid损失仅对图像-文本对进行操作，不需要全局视角的成对相似度进行归一化。Sigmoid损失同时允许进一步扩大批量大小，同时在较小的批量大小下表现更好。结合锁定图像调整，仅用四个TPUv4芯片，我们在两天内训练了一个SigLiT模型，实现了84.5%的ImageNet零样本准确率。批量大小与损失的解耦进一步使我们能够研究样本与配对以及负正比例的影响。最后，我们将批量大小推到极限，达到一百万，发现增大批量大小的好处迅速减弱，更合理的批量大小32k就足够了。我们在https://github.com/google-research/big_vision上发布我们的模型，希望我们的研究能激励进一步探索提高语言-图像预训练质量和效率的方法。", "insights": {"contrib": [{"en": "Proposes a simple pairwise Sigmoid loss for Language-Image Pre-training (SigLIP).", "zh": "提出了一种用于语言-图像预训练的简单成对Sigmoid损失（SigLIP）。"}, {"en": "Sigmoid loss operates solely on image-text pairs without global normalization.", "zh": "Sigmoid损失仅对图像-文本对操作，无需全局归一化。"}, {"en": "Enables scaling up batch size while performing better at smaller batch sizes.", "zh": "支持扩大批量大小，同时在较小批量下表现更好。"}, {"en": "Combined with Locked-image Tuning, achieves 84.5% ImageNet zero-shot accuracy with only four TPUv4 chips in two days.", "zh": "结合锁定图像微调，仅用四个TPUv4芯片在两天内达到84.5%的ImageNet零样本准确率。"}, {"en": "Disentangles batch size from loss, enabling study of examples vs pairs and negative-to-positive ratio.", "zh": "将批量大小与损失解耦，便于研究样本与配对以及负正比的影响。"}, {"en": "Finds that benefits of growing batch size diminish quickly, with 32k being sufficient.", "zh": "发现增大批量大小的收益迅速递减，32k的批量大小已足够。"}], "limits": [{"en": "Only evaluated on ImageNet zero-shot accuracy, not on other benchmarks.", "zh": "仅在ImageNet零样本准确率上评估，未在其他基准上测试。"}, {"en": "Training limited to four TPUv4 chips; results may not generalize to larger setups.", "zh": "训练限于四个TPUv4芯片，结果可能不适用于更大规模配置。"}, {"en": "Sigmoid loss may not outperform softmax-based contrastive loss on all tasks.", "zh": "Sigmoid损失可能并非在所有任务上都优于基于softmax的对比损失。"}, {"en": "Study of batch size scaling limited to one million; larger batches not explored.", "zh": "批量大小缩放研究限于一百万，未探索更大批量。"}, {"en": "Models released but no analysis on downstream tasks like retrieval or captioning.", "zh": "模型已发布，但未分析检索或字幕生成等下游任务。"}]}}, {"id": "chengchi-2303.04137", "pid": "chengchi", "arxiv": "2303.04137", "date": "2023-03-07", "venue": "cs.RO", "org": "Columbia / Stanford / TRI", "fields": ["generative", "vision"], "tEn": "Diffusion Policy: Visuomotor Policy Learning via Action Diffusion", "tZh": "扩散策略：通过动作扩散进行视觉运动策略学习", "sEn": "Diffusion Policy outperforms existing methods by 46.9% on average across 12 robot tasks.", "sZh": "扩散策略在12个机器人任务上平均超越现有方法46.9%。", "absEn": "This paper introduces Diffusion Policy, a new way of generating robot behavior by representing a robot's visuomotor policy as a conditional denoising diffusion process. We benchmark Diffusion Policy across 12 different tasks from 4 different robot manipulation benchmarks and find that it consistently outperforms existing state-of-the-art robot learning methods with an average improvement of 46.9%. Diffusion Policy learns the gradient of the action-distribution score function and iteratively optimizes with respect to this gradient field during inference via a series of stochastic Langevin dynamics steps. We find that the diffusion formulation yields powerful advantages when used for robot policies, including gracefully handling multimodal action distributions, being suitable for high-dimensional action spaces, and exhibiting impressive training stability. To fully unlock the potential of diffusion models for visuomotor policy learning on physical robots, this paper presents a set of key technical contributions including the incorporation of receding horizon control, visual conditioning, and the time-series diffusion transformer. We hope this work will help motivate a new generation of policy learning techniques that are able to leverage the powerful generative modeling capabilities of diffusion models. Code, data, and training details is publicly available diffusion-policy.cs.columbia.edu", "absZh": "本文介绍了扩散策略，一种通过将机器人的视觉运动策略表示为条件去噪扩散过程来生成机器人行为的新方法。我们在来自4个不同机器人操作基准的12个不同任务上对扩散策略进行了基准测试，发现它始终优于现有的最先进机器人学习方法，平均改进幅度为46.9%。扩散策略学习动作分布得分函数的梯度，并在推理过程中通过一系列随机朗之万动力学步骤相对于该梯度场进行迭代优化。我们发现，扩散公式在用于机器人策略时产生了强大的优势，包括优雅地处理多模态动作分布、适用于高维动作空间以及表现出令人印象深刻的训练稳定性。为了在物理机器人上充分释放扩散模型在视觉运动策略学习中的潜力，本文提出了一系列关键技术贡献，包括引入滚动时域控制、视觉条件以及时间序列扩散变换器。我们希望这项工作将有助于激发新一代能够利用扩散模型强大生成建模能力的策略学习技术。代码、数据和训练细节可在 diffusion-policy.cs.columbia.edu 公开获取。", "insights": {"contrib": [{"en": "Proposes Diffusion Policy, representing visuomotor policy as a conditional denoising diffusion process.", "zh": "提出扩散策略，将视觉运动策略表示为条件去噪扩散过程。"}, {"en": "Achieves 46.9% average improvement over state-of-the-art methods across 12 tasks from 4 benchmarks.", "zh": "在4个基准的12个任务上，平均比现有最优方法提升46.9%。"}, {"en": "Introduces closed-loop action sequences via receding horizon control for robust execution.", "zh": "引入通过滚动时域控制的闭环动作序列，实现鲁棒执行。"}, {"en": "Presents time-series diffusion transformer to reduce over-smoothing and handle high-frequency actions.", "zh": "提出时间序列扩散Transformer，减少过度平滑并处理高频动作。"}, {"en": "Demonstrates stable training by modeling score function, avoiding intractable normalization constant.", "zh": "通过建模得分函数避免难处理的归一化常数，实现稳定训练。"}, {"en": "Validates on real-world tasks including non-rigid objects and periodic motions, achieving near-human performance.", "zh": "在真实世界任务中验证，包括非刚体物体和周期性运动，达到接近人类水平。"}], "limits": [{"en": "Inherits behavior cloning limitations, e.g., suboptimal performance with inadequate demonstration data.", "zh": "继承了行为克隆的局限性，例如演示数据不足时性能欠佳。"}, {"en": "Higher computational cost and inference latency compared to simpler methods like LSTM-GMM.", "zh": "与LSTM-GMM等简单方法相比，计算成本和推理延迟更高。"}, {"en": "Transformer backbone is sensitive to hyperparameters, requiring additional tuning.", "zh": "Transformer主干对超参数敏感，需要额外调参。"}, {"en": "May not suffice for tasks requiring very high-rate control despite action sequence prediction.", "zh": "尽管有动作序列预测，可能仍不足以应对需要极高频率控制的任务。"}, {"en": "Performance depends on quality and quantity of demonstrations, physical robot capabilities, and architecture.", "zh": "性能依赖于演示的质量和数量、机器人物理能力以及架构。"}]}}, {"id": "yangsong-2303.01469", "pid": "yangsong", "arxiv": "2303.01469", "date": "2023-03-02", "venue": "cs.LG", "org": "OpenAI", "fields": ["generative", "efficiency"], "tEn": "Consistency Models", "tZh": "一致性模型", "sEn": "Consistency models enable fast one-step generation by directly mapping noise to data, outperforming diffusion models in speed while maintaining high quality.", "sZh": "一致性模型通过直接将噪声映射到数据，实现快速单步生成，在保持高质量的同时速度优于扩散模型。", "absEn": "Diffusion models have significantly advanced the fields of image, audio, and video generation, but they depend on an iterative sampling process that causes slow generation. To overcome this limitation, we propose consistency models, a new family of models that generate high quality samples by directly mapping noise to data. They support fast one-step generation by design, while still allowing multistep sampling to trade compute for sample quality. They also support zero-shot data editing, such as image inpainting, colorization, and super-resolution, without requiring explicit training on these tasks. Consistency models can be trained either by distilling pre-trained diffusion models, or as standalone generative models altogether. Through extensive experiments, we demonstrate that they outperform existing distillation techniques for diffusion models in one- and few-step sampling, achieving the new state-of-the-art FID of 3.55 on CIFAR-10 and 6.20 on ImageNet 64x64 for one-step generation. When trained in isolation, consistency models become a new family of generative models that can outperform existing one-step, non-adversarial generative models on standard benchmarks such as CIFAR-10, ImageNet 64x64 and LSUN 256x256.", "absZh": "扩散模型在图像、音频和视频生成领域取得了显著进展，但它们依赖于迭代采样过程，导致生成速度缓慢。为了克服这一限制，我们提出了一致性模型，这是一种新的模型家族，通过直接将噪声映射到数据来生成高质量样本。它们设计上支持快速单步生成，同时仍允许多步采样以在计算量和样本质量之间进行权衡。此外，它们还支持零样本数据编辑，如图像修复、着色和超分辨率，无需针对这些任务进行显式训练。一致性模型可以通过蒸馏预训练的扩散模型来训练，也可以作为独立的生成模型进行训练。通过大量实验，我们证明它们在一步和少步采样中优于现有的扩散模型蒸馏技术，在CIFAR-10上实现了新的最先进FID为3.55，在ImageNet 64x64上为6.20。当单独训练时，一致性模型成为一种新的生成模型家族，在标准基准测试（如CIFAR-10、ImageNet 64x64和LSUN 256x256）上优于现有的单步非对抗生成模型。", "insights": {"contrib": [{"en": "Propose consistency models, a new family of generative models that directly map noise to data for fast one-step generation.", "zh": "提出一致性模型，一种直接映射噪声到数据以支持快速单步生成的新型生成模型家族。"}, {"en": "Introduce consistency distillation to distill pre-trained diffusion models into consistency models, achieving state-of-the-art FID on CIFAR-10 and ImageNet 64x64.", "zh": "引入一致性蒸馏，将预训练扩散模型蒸馏为一致性模型，在CIFAR-10和ImageNet 64x64上实现最先进FID。"}, {"en": "Develop consistency training to train consistency models from scratch without pre-trained diffusion models, establishing them as an independent generative model family.", "zh": "开发一致性训练，无需预训练扩散模型即可从头训练一致性模型，使其成为独立的生成模型家族。"}, {"en": "Demonstrate zero-shot data editing capabilities including inpainting, colorization, super-resolution, and stroke-guided editing without task-specific training.", "zh": "展示零样本数据编辑能力，包括图像修复、着色、超分辨率和笔触引导编辑，无需任务特定训练。"}, {"en": "Provide theoretical analysis showing consistency models can approximate the true consistency function arbitrarily well with small ODE solver step sizes.", "zh": "提供理论分析，表明一致性模型在ODE求解器步长足够小时可任意逼近真实一致性函数。"}, {"en": "Achieve superior performance over progressive distillation and other distillation methods in one- and few-step sampling across multiple datasets.", "zh": "在多个数据集的一步和少步采样中，性能优于渐进蒸馏和其他蒸馏方法。"}], "limits": [{"en": "Consistency models may require careful tuning of discretization steps and schedule functions for optimal performance.", "zh": "一致性模型可能需要仔细调整离散化步数和调度函数以获得最佳性能。"}, {"en": "The method relies on the assumption that the FID is unimodal with respect to time points in multistep sampling.", "zh": "该方法假设多步采样中FID关于时间点是单峰的。"}, {"en": "Consistency training loss has higher variance with larger N, potentially slowing convergence in later stages.", "zh": "一致性训练损失在N较大时方差更高，可能减慢后期收敛。"}, {"en": "The approach is evaluated only on image datasets; applicability to other domains like audio or video is not explored.", "zh": "该方法仅在图像数据集上评估，未探索在音频或视频等其他领域的适用性。"}, {"en": "Continuous-time consistency training requires forward-mode automatic differentiation, which may not be efficiently supported in all frameworks.", "zh": "连续时间一致性训练需要前向模式自动微分，可能并非所有框架都高效支持。"}]}}, {"id": "junnanli-2301.12597", "pid": "junnanli", "arxiv": "2301.12597", "date": "2023-01-30", "venue": "cs.CV", "org": "Salesforce Research", "fields": ["vision", "nlp"], "tEn": "BLIP-2: Bootstrapping Language-Image Pre-training with Frozen Image Encoders and Large Language Models", "tZh": "BLIP-2：利用冻结的图像编码器和大型语言模型引导语言-图像预训练", "sEn": "BLIP-2 bridges the modality gap with a lightweight Querying Transformer, achieving state-of-the-art performance with 54x fewer trainable parameters than Flamingo80B.", "sZh": "BLIP-2通过轻量级查询Transformer弥合模态差距，以比Flamingo80B少54倍的可训练参数实现了最先进的性能。", "absEn": "The cost of vision-and-language pre-training has become increasingly prohibitive due to end-to-end training of large-scale models. This paper proposes BLIP-2, a generic and efficient pre-training strategy that bootstraps vision-language pre-training from off-the-shelf frozen pre-trained image encoders and frozen large language models. BLIP-2 bridges the modality gap with a lightweight Querying Transformer, which is pre-trained in two stages. The first stage bootstraps vision-language representation learning from a frozen image encoder. The second stage bootstraps vision-to-language generative learning from a frozen language model. BLIP-2 achieves state-of-the-art performance on various vision-language tasks, despite having significantly fewer trainable parameters than existing methods. For example, our model outperforms Flamingo80B by 8.7% on zero-shot VQAv2 with 54x fewer trainable parameters. We also demonstrate the model's emerging capabilities of zero-shot image-to-text generation that can follow natural language instructions.", "absZh": "由于大规模模型的端到端训练，视觉与语言预训练的成本变得越来越高昂。本文提出BLIP-2，一种通用且高效的预训练策略，它从现成的冻结预训练图像编码器和冻结大型语言模型中引导视觉语言预训练。BLIP-2通过轻量级的查询Transformer弥合模态差距，该Transformer分两个阶段进行预训练。第一阶段从冻结的图像编码器引导视觉语言表示学习。第二阶段从冻结的语言模型引导视觉到语言的生成学习。尽管BLIP-2的可训练参数远少于现有方法，但在各种视觉语言任务上仍取得了最先进的性能。例如，我们的模型在零样本VQAv2上以比Flamingo80B少54倍的可训练参数，性能提升了8.7%。我们还展示了模型在零样本图像到文本生成方面的新兴能力，能够遵循自然语言指令。", "insights": {"contrib": [{"en": "Proposes BLIP-2, a generic and efficient vision-language pre-training strategy using frozen image encoders and LLMs.", "zh": "提出BLIP-2，一种通用且高效的视觉-语言预训练策略，利用冻结的图像编码器和LLM。"}, {"en": "Introduces a lightweight Querying Transformer (Q-Former) to bridge the modality gap with two-stage pre-training.", "zh": "引入轻量级Querying Transformer（Q-Former），通过两阶段预训练弥合模态差距。"}, {"en": "Achieves state-of-the-art performance on VQA, image captioning, and retrieval with significantly fewer trainable parameters.", "zh": "在VQA、图像描述和检索任务上达到最先进性能，且可训练参数显著减少。"}, {"en": "Demonstrates zero-shot image-to-text generation following natural language instructions, enabling visual reasoning and conversation.", "zh": "展示了遵循自然语言指令的零样本图像到文本生成，支持视觉推理和对话。"}, {"en": "Validates that stronger frozen unimodal models (image encoder or LLM) consistently improve VLP performance.", "zh": "验证了更强的冻结单模态模型（图像编码器或LLM）能持续提升VLP性能。"}, {"en": "Shows representation learning stage is crucial to prevent catastrophic forgetting in frozen LLMs during generative learning.", "zh": "表明表示学习阶段对于防止生成学习期间冻结LLM的灾难性遗忘至关重要。"}], "limits": [{"en": "BLIP-2 lacks in-context learning capability due to single image-text pair per sample in pre-training data.", "zh": "BLIP-2缺乏上下文学习能力，因为预训练数据中每个样本仅包含单个图像-文本对。"}, {"en": "Image-to-text generation may suffer from inaccurate knowledge, incorrect reasoning, or outdated information.", "zh": "图像到文本生成可能因知识不准确、推理错误或信息过时而效果不佳。"}, {"en": "Inherits risks from frozen LLMs, including offensive language, social bias, and private information leakage.", "zh": "继承了冻结LLM的风险，包括冒犯性语言、社会偏见和隐私信息泄露。"}, {"en": "Performance on open-world knowledge tasks like OK-VQA is limited compared to larger LLMs.", "zh": "在OK-VQA等开放世界知识任务上的性能相比更大LLM有限。"}, {"en": "Requires careful prompt engineering for zero-shot tasks; optimal prompts vary across LLM types.", "zh": "零样本任务需要精心设计提示；最佳提示因LLM类型而异。"}]}}, {"id": "abrohan-2212.06817", "pid": "abrohan", "arxiv": "2212.06817", "date": "2022-12-13", "venue": "cs.RO", "org": "Google", "fields": ["deep-learning", "vision"], "tEn": "RT-1: Robotics Transformer for Real-World Control at Scale", "tZh": "RT-1：面向大规模真实世界控制的机器人Transformer", "sEn": "RT-1 shows that large-scale, diverse robotic data combined with high-capacity Transformer models enables strong generalization in real-world robot control.", "sZh": "RT-1表明，大规模多样化机器人数据与高容量Transformer模型相结合，能够在真实世界机器人控制中实现强大的泛化能力。", "absEn": "By transferring knowledge from large, diverse, task-agnostic datasets, modern machine learning models can solve specific downstream tasks either zero-shot or with small task-specific datasets to a high level of performance. While this capability has been demonstrated in other fields such as computer vision, natural language processing or speech recognition, it remains to be shown in robotics, where the generalization capabilities of the models are particularly critical due to the difficulty of collecting real-world robotic data. We argue that one of the keys to the success of such general robotic models lies with open-ended task-agnostic training, combined with high-capacity architectures that can absorb all of the diverse, robotic data. In this paper, we present a model class, dubbed Robotics Transformer, that exhibits promising scalable model properties. We verify our conclusions in a study of different model classes and their ability to generalize as a function of the data size, model size, and data diversity based on a large-scale data collection on real robots performing real-world tasks. The project's website and videos can be found at robotics-transformer1.github.io", "absZh": "通过从大规模、多样化、任务无关的数据集中迁移知识，现代机器学习模型可以零样本或使用少量特定任务数据集解决下游任务，并达到高水平性能。虽然这种能力已在计算机视觉、自然语言处理或语音识别等其他领域得到验证，但在机器人领域尚未得到证实，而由于收集真实世界机器人数据的困难，模型的泛化能力在该领域尤为关键。我们认为，这种通用机器人模型成功的关键之一在于开放式的任务无关训练，结合能够吸收所有多样化机器人数据的高容量架构。在本文中，我们提出了一类名为Robotics Transformer的模型，它展现出有前景的可扩展模型特性。我们基于真实机器人执行真实世界任务的大规模数据收集，研究了不同模型类别及其随数据量、模型大小和数据多样性的泛化能力，从而验证了我们的结论。项目网站和视频可在robotics-transformer1.github.io找到。", "insights": {"contrib": [{"en": "Proposes RT-1, a Transformer-based model for real-world robotic control at scale.", "zh": "提出RT-1，一种基于Transformer的模型，用于大规模真实世界机器人控制。"}, {"en": "Demonstrates RT-1 achieves 97% success on over 700 training instructions.", "zh": "展示RT-1在超过700个训练指令上达到97%的成功率。"}, {"en": "Shows RT-1 generalizes to new tasks, distractors, and backgrounds significantly better than baselines.", "zh": "显示RT-1在新任务、干扰物和背景上的泛化能力显著优于基线。"}, {"en": "Integrates TokenLearner and FiLM conditioning for efficient real-time inference.", "zh": "集成TokenLearner和FiLM条件化以实现高效的实时推理。"}, {"en": "Demonstrates absorption of heterogeneous data from simulation and different robots without performance loss.", "zh": "展示RT-1吸收来自仿真和不同机器人的异构数据而不损失性能。"}, {"en": "Enables long-horizon tasks with up to 50 steps in the SayCan framework.", "zh": "在SayCan框架中实现多达50步的长时域任务。"}], "limits": [{"en": "RT-1 is an imitation learning method, limited by demonstrator performance.", "zh": "RT-1是一种模仿学习方法，受限于演示者的表现。"}, {"en": "Generalization to new instructions is limited to combinations of seen concepts.", "zh": "对新指令的泛化仅限于已见概念的组合。"}, {"en": "Method is evaluated on a large but not highly dexterous set of manipulation tasks.", "zh": "该方法在大量但非高度灵巧的操作任务上评估。"}, {"en": "Robustness to backgrounds and environments could be improved with more diverse data.", "zh": "对背景和环境的鲁棒性可通过更多样化的数据改进。"}, {"en": "Reaction speed and context retention could benefit from scalable attention and memory.", "zh": "反应速度和上下文保持可通过可扩展的注意力和记忆改进。"}]}}, {"id": "aradford-2212.04356", "pid": "aradford", "arxiv": "2212.04356", "date": "2022-12-06", "venue": "eess.AS", "org": "OpenAI", "fields": ["deep-learning", "nlp"], "tEn": "Robust Speech Recognition via Large-Scale Weak Supervision", "tZh": "通过大规模弱监督实现鲁棒语音识别", "sEn": "Scaling weakly supervised speech recognition to 680,000 hours yields models competitive with fully supervised ones in zero-shot settings.", "sZh": "将弱监督语音识别扩展到68万小时，得到的模型在零样本设置下与全监督模型竞争力相当。", "absEn": "We study the capabilities of speech processing systems trained simply to predict large amounts of transcripts of audio on the internet. When scaled to 680,000 hours of multilingual and multitask supervision, the resulting models generalize well to standard benchmarks and are often competitive with prior fully supervised results but in a zero-shot transfer setting without the need for any fine-tuning. When compared to humans, the models approach their accuracy and robustness. We are releasing models and inference code to serve as a foundation for further work on robust speech processing.", "absZh": "我们研究了仅通过预测互联网上大量音频转录本来训练的语音处理系统的能力。当扩展到68万小时的多语言和多任务监督时，得到的模型在标准基准测试中表现良好，通常与先前的全监督结果相当，但处于零样本迁移设置，无需任何微调。与人类相比，这些模型接近其准确性和鲁棒性。我们正在发布模型和推理代码，作为进一步研究鲁棒语音处理的基础。", "insights": {"contrib": [{"en": "Proposes Whisper, a speech processing system trained on 680,000 hours of weakly supervised multilingual audio.", "zh": "提出Whisper，一个在68万小时弱监督多语言音频上训练的语音处理系统。"}, {"en": "Achieves zero-shot transfer competitive with prior fully supervised results without fine-tuning.", "zh": "实现零样本迁移，无需微调即可与先前全监督结果竞争。"}, {"en": "Demonstrates that scaling weakly supervised pre-training improves robustness and generalization.", "zh": "证明扩展弱监督预训练可提升鲁棒性和泛化能力。"}, {"en": "Introduces a multitask and multilingual training format using decoder input tokens.", "zh": "引入使用解码器输入令牌的多任务和多语言训练格式。"}, {"en": "Shows that larger models benefit from joint training across tasks and languages.", "zh": "表明更大模型从跨任务和语言的联合训练中受益。"}, {"en": "Releases models and inference code to facilitate further research on robust speech processing.", "zh": "发布模型和推理代码以促进鲁棒语音处理的进一步研究。"}], "limits": [{"en": "Whisper is limited to 30-second audio segments and requires buffered transcription for longer audio.", "zh": "Whisper仅限于30秒音频片段，长音频需要缓冲转录。"}, {"en": "Performance on low-resource languages is poor due to English-heavy training data.", "zh": "由于训练数据以英语为主，低资源语言性能较差。"}, {"en": "Remaining errors include repetition loops, missing words, and hallucinations in long-form transcription.", "zh": "剩余错误包括长转录中的重复循环、漏词和幻觉。"}, {"en": "Zero-shot evaluation may not reflect optimal performance achievable with fine-tuning.", "zh": "零样本评估可能无法反映微调可达到的最佳性能。"}, {"en": "Text normalizer may overfit to Whisper's transcription style, affecting WER comparisons.", "zh": "文本标准化器可能过拟合Whisper的转录风格，影响WER比较。"}]}}, {"id": "jonathanho-2207.12598", "pid": "jonathanho", "arxiv": "2207.12598", "date": "2022-07-26", "venue": "cs.LG", "org": "Google Research", "fields": ["generative", "deep-learning"], "tEn": "Classifier-Free Diffusion Guidance", "tZh": "无分类器扩散引导", "sEn": "Classifier-free guidance combines conditional and unconditional diffusion models to trade off sample quality and diversity without a separate classifier.", "sZh": "无分类器引导通过联合训练条件和无条件扩散模型，结合两者的分数估计，在不依赖独立分类器的情况下实现样本质量与多样性的权衡。", "absEn": "Classifier guidance is a recently introduced method to trade off mode coverage and sample fidelity in conditional diffusion models post training, in the same spirit as low temperature sampling or truncation in other types of generative models. Classifier guidance combines the score estimate of a diffusion model with the gradient of an image classifier and thereby requires training an image classifier separate from the diffusion model. It also raises the question of whether guidance can be performed without a classifier. We show that guidance can be indeed performed by a pure generative model without such a classifier: in what we call classifier-free guidance, we jointly train a conditional and an unconditional diffusion model, and we combine the resulting conditional and unconditional score estimates to attain a trade-off between sample quality and diversity similar to that obtained using classifier guidance.", "absZh": "分类器引导是一种新引入的方法，用于在条件扩散模型训练后权衡模式覆盖率和样本保真度，其精神类似于其他生成模型中的低温采样或截断。分类器引导将扩散模型的分数估计与图像分类器的梯度相结合，因此需要训练一个独立于扩散模型的图像分类器。这也引发了一个问题：是否可以在没有分类器的情况下进行引导。我们证明，引导确实可以通过纯生成模型实现，而无需这样的分类器：在我们称之为无分类器引导的方法中，我们联合训练一个条件扩散模型和一个无条件扩散模型，并将得到的条件分数估计和无条件分数估计相结合，以达到与使用分类器引导类似的样本质量和多样性之间的权衡。", "insights": {"contrib": [{"en": "Proposes classifier-free guidance, a method to trade off sample quality and diversity in diffusion models without a classifier.", "zh": "提出无分类器引导，一种无需分类器即可在扩散模型中权衡样本质量和多样性的方法。"}, {"en": "Jointly trains conditional and unconditional diffusion models using a single neural network by randomly dropping conditioning.", "zh": "通过随机丢弃条件信息，使用单一神经网络联合训练条件和无条件扩散模型。"}, {"en": "Demonstrates that classifier-free guidance achieves FID/IS tradeoffs comparable to classifier guidance on ImageNet.", "zh": "证明无分类器引导在ImageNet上实现了与分类器引导相当的FID/IS权衡。"}, {"en": "Shows that pure generative models can boost classifier-based metrics without adversarial classifier gradients.", "zh": "表明纯生成模型可以在没有对抗性分类器梯度的情况下提升基于分类器的指标。"}, {"en": "Provides an intuitive explanation: guidance decreases unconditional likelihood while increasing conditional likelihood.", "zh": "提供直观解释：引导降低无条件似然同时增加条件似然。"}, {"en": "Achieves state-of-the-art FID on 128x128 ImageNet, outperforming classifier-guided ADM-G and BigGAN-deep.", "zh": "在128x128 ImageNet上取得最先进FID，优于分类器引导的ADM-G和BigGAN-deep。"}], "limits": [{"en": "Requires two forward passes per sampling step, reducing sampling speed compared to classifier guidance.", "zh": "每个采样步骤需要两次前向传播，与分类器引导相比降低了采样速度。"}, {"en": "Relies on training an unconditional model, which may be inefficient for high-dimensional conditioning.", "zh": "依赖于训练无条件模型，对于高维条件可能效率低下。"}, {"en": "Decreased sample diversity may have negative impacts in deployed models, especially for underrepresented data.", "zh": "样本多样性降低可能对部署模型产生负面影响，尤其是对代表性不足的数据。"}, {"en": "Hyperparameter puncond requires tuning; optimal value may vary across datasets.", "zh": "超参数puncond需要调优；最优值可能因数据集而异。"}, {"en": "Method is demonstrated only on ImageNet; generalizability to other modalities is not explored.", "zh": "该方法仅在ImageNet上验证；对其他模态的泛化性尚未探索。"}]}}, {"id": "jasonwei-2206.07682", "pid": "jasonwei", "arxiv": "2206.07682", "date": "2022-06-15", "venue": "cs.CL", "org": "Google", "fields": ["nlp", "deep-learning"], "tEn": "Emergent Abilities of Large Language Models", "tZh": "大型语言模型的涌现能力", "sEn": "Emergent abilities are unpredictable capabilities that appear only in large language models, not in smaller ones.", "sZh": "涌现能力是指仅在大型语言模型中出现、而在较小模型中不存在的不可预测的能力。", "absEn": "Scaling up language models has been shown to predictably improve performance and sample efficiency on a wide range of downstream tasks. This paper instead discusses an unpredictable phenomenon that we refer to as emergent abilities of large language models. We consider an ability to be emergent if it is not present in smaller models but is present in larger models. Thus, emergent abilities cannot be predicted simply by extrapolating the performance of smaller models. The existence of such emergence implies that additional scaling could further expand the range of capabilities of language models.", "absZh": "扩展语言模型已被证明可以可预测地提高在广泛下游任务上的性能和样本效率。然而，本文讨论了一种不可预测的现象，我们称之为大型语言模型的涌现能力。我们认为，如果一种能力在较小模型中不存在，但在较大模型中出现，那么它就是涌现的。因此，涌现能力不能简单地通过外推较小模型的性能来预测。这种涌现的存在意味着进一步扩展可能会扩大语言模型的能力范围。", "insights": {"contrib": [{"en": "Defines emergent abilities as abilities present in large models but absent in smaller ones, unpredictable via scaling laws.", "zh": "将涌现能力定义为大模型具备而小模型不具备的能力，无法通过缩放定律预测。"}, {"en": "Documents emergent abilities across few-shot prompting, chain-of-thought, instruction following, and program execution.", "zh": "记录了少样本提示、思维链、指令遵循和程序执行等场景中的涌现能力。"}, {"en": "Shows emergent abilities appear as phase transitions in scaling curves, with performance jumping from random to above-random at a threshold.", "zh": "展示涌现能力在缩放曲线中表现为相变，性能在阈值处从随机跃升至显著高于随机。"}, {"en": "Discusses that emergent abilities are not solely determined by scale; architecture, data quality, and training procedures also matter.", "zh": "讨论涌现能力并非仅由规模决定；架构、数据质量和训练过程同样重要。"}, {"en": "Highlights emergent risks such as bias, toxicity, and memorization that can increase with scale.", "zh": "强调随规模增加而涌现的风险，如偏见、毒性和记忆化。"}, {"en": "Proposes future directions including further scaling, improved architectures, data scaling, and understanding emergence.", "zh": "提出未来方向，包括进一步扩展、改进架构、数据扩展和理解涌现。"}], "limits": [{"en": "Emergent abilities are defined only for pre-trained Transformer language models, not other architectures.", "zh": "涌现能力仅针对预训练Transformer语言模型定义，不适用于其他架构。"}, {"en": "The paper does not propose new methods or models; it surveys existing results.", "zh": "本文未提出新方法或模型，仅综述现有结果。"}, {"en": "Emergence may be an artifact of evaluation metrics like exact match, which ignore partial progress.", "zh": "涌现可能是评估指标（如精确匹配）的假象，忽略了部分进展。"}, {"en": "The scale at which emergence occurs is not fixed; it depends on data quality, architecture, and training.", "zh": "涌现发生的规模并非固定，取决于数据质量、架构和训练。"}, {"en": "Some abilities may never emerge due to distributional mismatch or plateauing after emergence.", "zh": "某些能力可能因分布不匹配或涌现后停滞而永远不会出现。"}]}}, {"id": "tkarras-2206.00364", "pid": "tkarras", "arxiv": "2206.00364", "date": "2022-06-01", "venue": "cs.CV", "org": "NVIDIA", "fields": ["generative", "deep-learning"], "tEn": "Elucidating the Design Space of Diffusion-Based Generative Models", "tZh": "阐明扩散生成模型的设计空间", "sEn": "We present a clear design space for diffusion models, achieving state-of-the-art FID scores with faster sampling.", "sZh": "我们提出了一个清晰的扩散模型设计空间，实现了更快的采样速度和最先进的FID分数。", "absEn": "We argue that the theory and practice of diffusion-based generative models are currently unnecessarily convoluted and seek to remedy the situation by presenting a design space that clearly separates the concrete design choices. This lets us identify several changes to both the sampling and training processes, as well as preconditioning of the score networks. Together, our improvements yield new state-of-the-art FID of 1.79 for CIFAR-10 in a class-conditional setting and 1.97 in an unconditional setting, with much faster sampling (35 network evaluations per image) than prior designs. To further demonstrate their modular nature, we show that our design changes dramatically improve both the efficiency and quality obtainable with pre-trained score networks from previous work, including improving the FID of a previously trained ImageNet-64 model from 2.07 to near-SOTA 1.55, and after re-training with our proposed improvements to a new SOTA of 1.36.", "absZh": "我们认为，当前扩散生成模型的理论和实践不必要地复杂，并试图通过提出一个清晰分离具体设计选择的设计空间来改善这一状况。这使我们能够识别采样和训练过程中的若干变化，以及分数网络的预处理。综合这些改进，我们在CIFAR-10上实现了新的最先进FID：类条件设置为1.79，无条件设置为1.97，且采样速度更快（每张图像仅需35次网络评估）。为了进一步展示其模块化特性，我们证明我们的设计变更显著提高了先前工作中预训练分数网络的效率和质量，包括将先前训练的ImageNet-64模型的FID从2.07提升至接近最先进的1.55，并在使用我们提出的改进重新训练后达到新的最先进水平1.36。", "insights": {"contrib": [{"en": "Presents a disentangled design space for diffusion-based generative models, separating concrete design choices.", "zh": "提出了扩散生成模型的解耦设计空间，将具体设计选择分离。"}, {"en": "Identifies improvements to sampling, training, and score network preconditioning.", "zh": "识别出采样、训练和分数网络预处理的改进。"}, {"en": "Achieves new state-of-the-art FID of 1.79 on CIFAR-10 class-conditional and 1.97 unconditional.", "zh": "在CIFAR-10上实现了新的最优FID：有类别条件1.79，无类别条件1.97。"}, {"en": "Enables much faster sampling with 35 network evaluations per image.", "zh": "实现更快的采样，每张图像仅需35次网络评估。"}, {"en": "Improves pre-trained score networks, e.g., ImageNet-64 FID from 2.07 to 1.55.", "zh": "改进预训练分数网络，例如ImageNet-64的FID从2.07提升至1.55。"}, {"en": "After retraining, achieves new SOTA FID of 1.36 on ImageNet-64.", "zh": "重新训练后，在ImageNet-64上达到新的最优FID 1.36。"}], "limits": [{"en": "Evaluation limited to image generation tasks (CIFAR-10, ImageNet-64).", "zh": "评估仅限于图像生成任务（CIFAR-10、ImageNet-64）。"}, {"en": "Design space may not generalize to other data modalities like text or audio.", "zh": "设计空间可能无法泛化到文本或音频等其他数据模态。"}, {"en": "Improvements rely on specific network architectures and hyperparameters.", "zh": "改进依赖于特定的网络架构和超参数。"}, {"en": "Computational cost of retraining may be high for large-scale models.", "zh": "大规模模型的重新训练计算成本可能较高。"}, {"en": "Theoretical understanding of design choices remains incomplete.", "zh": "对设计选择的理论理解仍不完整。"}]}}, {"id": "tridao-2205.14135", "pid": "tridao", "arxiv": "2205.14135", "date": "2022-05-27", "venue": "cs.LG", "fields": ["efficiency", "nlp"], "tEn": "FlashAttention: Fast and Memory-Efficient Exact Attention with IO-Awareness", "tZh": "FlashAttention：快速且内存高效的精确注意力机制，具有IO感知能力", "sEn": "FlashAttention reduces GPU memory reads/writes via tiling, achieving faster training and longer context for Transformers.", "sZh": "FlashAttention通过分块减少GPU内存读写，实现更快的训练速度和更长的上下文支持。", "absEn": "Transformers are slow and memory-hungry on long sequences, since the time and memory complexity of self-attention are quadratic in sequence length. Approximate attention methods have attempted to address this problem by trading off model quality to reduce the compute complexity, but often do not achieve wall-clock speedup. We argue that a missing principle is making attention algorithms IO-aware -- accounting for reads and writes between levels of GPU memory. We propose FlashAttention, an IO-aware exact attention algorithm that uses tiling to reduce the number of memory reads/writes between GPU high bandwidth memory (HBM) and GPU on-chip SRAM. We analyze the IO complexity of FlashAttention, showing that it requires fewer HBM accesses than standard attention, and is optimal for a range of SRAM sizes. We also extend FlashAttention to block-sparse attention, yielding an approximate attention algorithm that is faster than any existing approximate attention method. FlashAttention trains Transformers faster than existing baselines: 15% end-to-end wall-clock speedup on BERT-large (seq. length 512) compared to the MLPerf 1.1 training speed record, 3$\\times$ speedup on GPT-2 (seq. length 1K), and 2.4$\\times$ speedup on long-range arena (seq. length 1K-4K). FlashAttention and block-sparse FlashAttention enable longer context in Transformers, yielding higher quality models (0.7 better perplexity on GPT-2 and 6.4 points of lift on long-document classification) and entirely new capabilities: the first Transformers to achieve better-than-chance performance on the Path-X challenge (seq. length 16K, 61.4% accuracy) and Path-256 (seq. length 64K, 63.1% accuracy).", "absZh": "Transformer在处理长序列时速度慢且内存消耗大，因为自注意力的时间和内存复杂度与序列长度呈二次方关系。近似注意力方法试图通过牺牲模型质量来降低计算复杂度，但通常无法实现实际加速。我们认为缺失的原则是使注意力算法具有IO感知能力——即考虑GPU内存层级之间的读写操作。我们提出了FlashAttention，一种具有IO感知能力的精确注意力算法，它使用分块技术来减少GPU高带宽内存（HBM）和片上SRAM之间的内存读写次数。我们分析了FlashAttention的IO复杂度，表明它比标准注意力需要更少的HBM访问，并且在多种SRAM大小下都是最优的。我们还将FlashAttention扩展到块稀疏注意力，产生了一种比任何现有近似注意力方法更快的近似注意力算法。FlashAttention训练Transformer的速度比现有基线更快：在BERT-large（序列长度512）上，相比MLPerf 1.1训练速度记录，端到端加速15%；在GPT-2（序列长度1K）上加速3倍；在长距离竞技场（序列长度1K-4K）上加速2.4倍。FlashAttention和块稀疏FlashAttention使Transformer能够处理更长的上下文，从而获得更高质量的模型（GPT-2上困惑度降低0.7，长文档分类提升6.4个百分点），并实现了全新的能力：首个在Path-X挑战（序列长度16K，准确率61.4%）和Path-256（序列长度64K，准确率63.1%）上取得优于随机水平性能的Transformer。", "insights": {"contrib": [{"en": "Proposes FlashAttention, an IO-aware exact attention algorithm using tiling to reduce GPU HBM accesses.", "zh": "提出FlashAttention，一种IO感知的精确注意力算法，通过分块减少GPU高带宽内存访问。"}, {"en": "Achieves significant wall-clock speedups: 15% on BERT-large, 3x on GPT-2, 2.4x on long-range arena.", "zh": "实现显著的端到端加速：BERT-large提升15%，GPT-2提升3倍，长距离竞技场提升2.4倍。"}, {"en": "Enables longer context in Transformers, improving perplexity by 0.7 on GPT-2 and 6.4 points on long-document classification.", "zh": "支持Transformer更长上下文，GPT-2困惑度降低0.7，长文档分类提升6.4个百分点。"}, {"en": "First Transformer to achieve better-than-chance on Path-X (61.4%) and Path-256 (63.1%) via longer sequences.", "zh": "首个在Path-X（61.4%）和Path-256（63.1%）上超越随机水平的Transformer。"}, {"en": "Extends to block-sparse FlashAttention, faster than all existing approximate attention methods.", "zh": "扩展至块稀疏FlashAttention，比所有现有近似注意力方法更快。"}, {"en": "Provides IO complexity analysis and proves optimality for exact attention over a range of SRAM sizes.", "zh": "提供IO复杂度分析，并证明在多种SRAM大小下精确注意力的最优性。"}], "limits": [{"en": "Requires custom CUDA kernel, limiting portability and ease of use across GPU architectures.", "zh": "需要自定义CUDA内核，限制了跨GPU架构的可移植性和易用性。"}, {"en": "Optimal only for single GPU; multi-GPU IO analysis and parallelization remain unexplored.", "zh": "仅对单GPU最优；多GPU的IO分析和并行化尚未探索。"}, {"en": "Block-sparse attention relies on predefined sparsity patterns, which may not suit all tasks.", "zh": "块稀疏注意力依赖预定义稀疏模式，可能不适用于所有任务。"}, {"en": "Recomputation in backward pass increases FLOPs, though offset by reduced HBM accesses.", "zh": "反向传播中的重计算增加FLOPs，尽管被减少的HBM访问所抵消。"}, {"en": "Performance gains diminish for very short sequences where memory access is less dominant.", "zh": "对于极短序列，性能提升减弱，因为内存访问不再是主要瓶颈。"}]}, "cites": 4545, "org": "Stanford"}, {"id": "xiaohuazhai-2205.01917", "pid": "xiaohuazhai", "arxiv": "2205.01917", "date": "2022-05-04", "venue": "cs.CV", "org": "Google", "fields": ["vision", "nlp"], "tEn": "CoCa: Contrastive Captioners are Image-Text Foundation Models", "tZh": "CoCa: 对比字幕器是图像-文本基础模型", "sEn": "CoCa jointly pretrains an image-text encoder-decoder with contrastive and captioning losses, achieving SOTA on diverse tasks.", "sZh": "CoCa通过对比损失和字幕损失联合预训练图像-文本编码器-解码器，在多种任务上达到最先进水平。", "absEn": "Exploring large-scale pretrained foundation models is of significant interest in computer vision because these models can be quickly transferred to many downstream tasks. This paper presents Contrastive Captioner (CoCa), a minimalist design to pretrain an image-text encoder-decoder foundation model jointly with contrastive loss and captioning loss, thereby subsuming model capabilities from contrastive approaches like CLIP and generative methods like SimVLM. In contrast to standard encoder-decoder transformers where all decoder layers attend to encoder outputs, CoCa omits cross-attention in the first half of decoder layers to encode unimodal text representations, and cascades the remaining decoder layers which cross-attend to the image encoder for multimodal image-text representations. We apply a contrastive loss between unimodal image and text embeddings, in addition to a captioning loss on the multimodal decoder outputs which predicts text tokens autoregressively. By sharing the same computational graph, the two training objectives are computed efficiently with minimal overhead. CoCa is pretrained end-to-end and from scratch on both web-scale alt-text data and annotated images by treating all labels simply as text, seamlessly unifying natural language supervision for representation learning. Empirically, CoCa achieves state-of-the-art performance with zero-shot transfer or minimal task-specific adaptation on a broad range of downstream tasks, spanning visual recognition (ImageNet, Kinetics-400/600/700, Moments-in-Time), crossmodal retrieval (MSCOCO, Flickr30K, MSR-VTT), multimodal understanding (VQA, SNLI-VE, NLVR2), and image captioning (MSCOCO, NoCaps). Notably on ImageNet classification, CoCa obtains 86.3% zero-shot top-1 accuracy, 90.6% with a frozen encoder and learned classification head, and new state-of-the-art 91.0% top-1 accuracy on ImageNet with a finetuned encoder.", "absZh": "探索大规模预训练基础模型在计算机视觉中具有重要意义，因为这些模型可以快速迁移到许多下游任务。本文提出了对比字幕器（CoCa），一种极简设计，通过对比损失和字幕损失联合预训练图像-文本编码器-解码器基础模型，从而融合了CLIP等对比方法和SimVLM等生成方法的模型能力。与标准编码器-解码器变换器（所有解码器层都关注编码器输出）不同，CoCa在前半部分解码器层中省略了交叉注意力以编码单模态文本表示，并级联剩余的解码器层，这些层交叉关注图像编码器以获取多模态图像-文本表示。我们在单模态图像和文本嵌入之间应用对比损失，此外在多模态解码器输出上应用字幕损失，以自回归方式预测文本标记。通过共享相同的计算图，两个训练目标以最小开销高效计算。CoCa在网页规模的替代文本数据和标注图像上从头到尾进行预训练，将所有标签简单地视为文本，无缝统一自然语言监督以进行表示学习。实验表明，CoCa在广泛的下游任务上通过零样本迁移或最小任务特定适应实现了最先进的性能，涵盖视觉识别（ImageNet、Kinetics-400/600/700、Moments-in-Time）、跨模态检索（MSCOCO、Flickr30K、MSR-VTT）、多模态理解（VQA、SNLI-VE、NLVR2）和图像字幕（MSCOCO、NoCaps）。值得注意的是，在ImageNet分类上，CoCa获得了86.3%的零样本top-1准确率，使用冻结编码器和学习分类头时达到90.6%，以及使用微调编码器时达到新的最先进91.0% top-1准确率。", "insights": {"contrib": [{"en": "Proposes Contrastive Captioner (CoCa), a minimalist encoder-decoder foundation model unifying contrastive and captioning losses.", "zh": "提出对比描述器（CoCa），一种极简的编码器-解码器基础模型，统一了对比损失和描述损失。"}, {"en": "Decouples decoder into unimodal and multimodal layers, enabling both aligned unimodal embeddings and fused multimodal representations.", "zh": "将解码器解耦为单模态和多模态层，同时支持对齐的单模态嵌入和融合的多模态表示。"}, {"en": "Achieves state-of-the-art zero-shot performance on ImageNet (86.3%), crossmodal retrieval, and multimodal understanding tasks.", "zh": "在ImageNet（86.3%）、跨模态检索和多模态理解任务上取得最先进的零样本性能。"}, {"en": "Pretrains end-to-end from scratch on web-scale alt-text and annotated images, treating all labels as text.", "zh": "从零开始在网络规模的替代文本和标注图像上进行端到端预训练，将所有标签视为文本。"}, {"en": "Introduces task-specific attentional poolers to customize visual representations for different objectives and downstream tasks.", "zh": "引入任务特定的注意力池化器，为不同目标和下游任务定制视觉表示。"}, {"en": "Sets new state-of-the-art on ImageNet finetuning (91.0%) and NoCaps captioning (120.6 CIDEr).", "zh": "在ImageNet微调（91.0%）和NoCaps描述（120.6 CIDEr）上取得新的最先进结果。"}], "limits": [{"en": "Model performance depends on large-scale pretraining data (JFT-3B, ALIGN), which may contain biases.", "zh": "模型性能依赖于大规模预训练数据（JFT-3B、ALIGN），这些数据可能包含偏见。"}, {"en": "Zero-shot evaluation may not reflect robustness to all real-world image corruptions beyond current benchmarks.", "zh": "零样本评估可能无法反映对当前基准之外的所有真实世界图像损坏的鲁棒性。"}, {"en": "Requires significant computational resources (2048 TPUv4 chips for 5 days) for pretraining.", "zh": "预训练需要大量计算资源（2048个TPUv4芯片运行5天）。"}, {"en": "Decoder design with causal masking limits parallelization for some tasks compared to bidirectional models.", "zh": "与双向模型相比，解码器的因果掩码设计限制了某些任务的并行化。"}, {"en": "Broader impacts such as fairness, social bias, and potential misuse require further community exploration.", "zh": "公平性、社会偏见和潜在滥用等更广泛的影响需要社区进一步探索。"}]}}, {"id": "jbalayrac-2204.14198", "pid": "jbalayrac", "arxiv": "2204.14198", "date": "2022-04-29", "venue": "cs.CV", "org": "DeepMind", "fields": ["vision", "nlp"], "tEn": "Flamingo: a Visual Language Model for Few-Shot Learning", "tZh": "Flamingo：一种用于少样本学习的视觉语言模型", "sEn": "Flamingo achieves state-of-the-art few-shot learning on diverse visual tasks by bridging pretrained vision and language models.", "sZh": "Flamingo通过桥接预训练的视觉和语言模型，在多种视觉任务上实现了少样本学习的最优性能。", "absEn": "Building models that can be rapidly adapted to novel tasks using only a handful of annotated examples is an open challenge for multimodal machine learning research. We introduce Flamingo, a family of Visual Language Models (VLM) with this ability. We propose key architectural innovations to: (i) bridge powerful pretrained vision-only and language-only models, (ii) handle sequences of arbitrarily interleaved visual and textual data, and (iii) seamlessly ingest images or videos as inputs. Thanks to their flexibility, Flamingo models can be trained on large-scale multimodal web corpora containing arbitrarily interleaved text and images, which is key to endow them with in-context few-shot learning capabilities. We perform a thorough evaluation of our models, exploring and measuring their ability to rapidly adapt to a variety of image and video tasks. These include open-ended tasks such as visual question-answering, where the model is prompted with a question which it has to answer; captioning tasks, which evaluate the ability to describe a scene or an event; and close-ended tasks such as multiple-choice visual question-answering. For tasks lying anywhere on this spectrum, a single Flamingo model can achieve a new state of the art with few-shot learning, simply by prompting the model with task-specific examples. On numerous benchmarks, Flamingo outperforms models fine-tuned on thousands of times more task-specific data.", "absZh": "构建能够仅使用少量标注示例快速适应新任务的模型是多模态机器学习研究的一个开放挑战。我们引入了Flamingo，一系列具有这种能力的视觉语言模型（VLM）。我们提出了关键架构创新，以：（i）桥接强大的预训练纯视觉和纯语言模型，（ii）处理任意交错视觉和文本数据的序列，以及（iii）无缝地将图像或视频作为输入。得益于其灵活性，Flamingo模型可以在包含任意交错文本和图像的大规模多模态网络语料库上进行训练，这是赋予它们上下文少样本学习能力的关键。我们对模型进行了全面评估，探索并衡量了它们快速适应各种图像和视频任务的能力。这些任务包括开放式任务，如视觉问答，其中模型被提示一个问题并需要回答；字幕任务，评估描述场景或事件的能力；以及封闭式任务，如多项选择视觉问答。对于这一范围内的任何任务，单个Flamingo模型可以通过简单地用任务特定示例提示模型，在少样本学习中达到新的最优水平。在众多基准测试中，Flamingo优于在数千倍更多任务特定数据上微调的模型。", "insights": {"contrib": [{"en": "Introduces Flamingo, a family of Visual Language Models for few-shot learning on multimodal tasks.", "zh": "提出Flamingo系列视觉语言模型，用于多模态任务的少样本学习。"}, {"en": "Proposes architectural innovations: bridging frozen vision and language models, handling interleaved data, and using a Perceiver Resampler.", "zh": "提出架构创新：桥接冻结的视觉和语言模型、处理交错数据、使用感知器重采样器。"}, {"en": "Achieves state-of-the-art few-shot performance on 16 multimodal benchmarks, often surpassing fine-tuned models.", "zh": "在16个多模态基准上取得少样本学习最优性能，常超越微调模型。"}, {"en": "Demonstrates effective in-context learning for open-ended tasks like captioning and visual question-answering.", "zh": "展示了在开放任务（如描述和视觉问答）上的有效上下文学习。"}, {"en": "Shows that training on interleaved web data is crucial for few-shot capabilities.", "zh": "表明在交错网络数据上训练对少样本能力至关重要。"}, {"en": "Scales model size and number of shots to improve performance, similar to GPT-3.", "zh": "扩展模型规模和样本数量以提升性能，类似GPT-3。"}], "limits": [{"en": "Inherits weaknesses from pretrained LMs, including hallucinations and poor generalization to long sequences.", "zh": "继承预训练语言模型的弱点，包括幻觉和对长序列泛化差。"}, {"en": "Classification performance lags behind contrastive models like CLIP.", "zh": "分类性能落后于对比模型（如CLIP）。"}, {"en": "In-context learning is sensitive to demonstration selection and scales poorly with many shots.", "zh": "上下文学习对示例选择敏感，且随样本数量增多扩展性差。"}, {"en": "Training requires large-scale web data, which may contain biases and toxic content.", "zh": "训练需要大规模网络数据，可能包含偏见和有害内容。"}, {"en": "Freezing the language model prevents catastrophic forgetting but limits adaptation.", "zh": "冻结语言模型可防止灾难性遗忘，但限制了适应性。"}]}}, {"id": "pdhariwal-2204.06125", "pid": "pdhariwal", "arxiv": "2204.06125", "date": "2022-04-13", "venue": "cs.CV", "org": "OpenAI", "fields": ["generative", "vision"], "tEn": "Hierarchical Text-Conditional Image Generation with CLIP Latents", "tZh": "基于CLIP潜在向量的层次化文本条件图像生成", "sEn": "Explicitly generating CLIP image embeddings improves image diversity with minimal loss in photorealism and caption similarity.", "sZh": "显式生成CLIP图像嵌入可在几乎不损失逼真度和标题相似性的情况下提高图像多样性。", "absEn": "Contrastive models like CLIP have been shown to learn robust representations of images that capture both semantics and style. To leverage these representations for image generation, we propose a two-stage model: a prior that generates a CLIP image embedding given a text caption, and a decoder that generates an image conditioned on the image embedding. We show that explicitly generating image representations improves image diversity with minimal loss in photorealism and caption similarity. Our decoders conditioned on image representations can also produce variations of an image that preserve both its semantics and style, while varying the non-essential details absent from the image representation. Moreover, the joint embedding space of CLIP enables language-guided image manipulations in a zero-shot fashion. We use diffusion models for the decoder and experiment with both autoregressive and diffusion models for the prior, finding that the latter are computationally more efficient and produce higher-quality samples.", "absZh": "对比模型如CLIP已被证明能够学习同时捕捉语义和风格的鲁棒图像表示。为了利用这些表示进行图像生成，我们提出了一个两阶段模型：一个先验模型，根据文本描述生成CLIP图像嵌入；以及一个解码器，根据图像嵌入生成图像。我们表明，显式生成图像表示可以在几乎不损失逼真度和标题相似性的情况下提高图像多样性。基于图像表示的解码器还可以生成保留图像语义和风格的变体，同时改变图像表示中缺失的非必要细节。此外，CLIP的联合嵌入空间支持零样本的语言引导图像操作。我们使用扩散模型作为解码器，并尝试了自回归和扩散模型作为先验，发现后者计算效率更高且能生成更高质量的样本。", "insights": {"contrib": [{"en": "Proposes a two-stage model with a prior generating CLIP image embeddings from text and a decoder generating images from embeddings.", "zh": "提出一个两阶段模型，包括从文本生成CLIP图像嵌入的先验模型和从嵌入生成图像的解码器。"}, {"en": "Shows that generating image representations explicitly improves diversity with minimal loss in photorealism and caption similarity.", "zh": "表明显式生成图像表示可在几乎不损失真实感和标题相似度的情况下提高多样性。"}, {"en": "Demonstrates language-guided image manipulations in a zero-shot manner using CLIP's joint embedding space.", "zh": "利用CLIP的联合嵌入空间，以零样本方式实现语言引导的图像操作。"}, {"en": "Compares autoregressive and diffusion priors, finding diffusion priors more compute-efficient and producing higher-quality samples.", "zh": "比较自回归先验和扩散先验，发现扩散先验计算效率更高且生成样本质量更高。"}, {"en": "Achieves state-of-the-art zero-shot FID of 10.39 on MS-COCO validation set.", "zh": "在MS-COCO验证集上实现了10.39的最先进零样本FID分数。"}, {"en": "Introduces a bipartite latent representation enabling image variations, interpolation, and text diffs.", "zh": "引入二分潜变量表示，支持图像变体、插值和文本差异操作。"}], "limits": [{"en": "unCLIP struggles with binding attributes to objects, e.g., assigning colors to specific cubes.", "zh": "unCLIP在将属性绑定到对象方面存在困难，例如将颜色分配给特定立方体。"}, {"en": "The model has difficulty generating coherent text within images.", "zh": "该模型在图像内生成连贯文本方面存在困难。"}, {"en": "Complex scenes lack fine details due to the 64x64 base resolution and upsampling.", "zh": "由于64x64基础分辨率和上采样，复杂场景缺乏精细细节。"}, {"en": "The CLIP embedding may not encode spelling information of rendered text precisely.", "zh": "CLIP嵌入可能无法精确编码渲染文本的拼写信息。"}, {"en": "The model inherits risks of deceptive and harmful content, with fewer traces of AI generation.", "zh": "该模型继承了欺骗性和有害内容的风险，且AI生成的痕迹更少。"}]}}, {"id": "jonathanho-2204.03458", "pid": "jonathanho", "arxiv": "2204.03458", "date": "2022-04-07", "venue": "cs.CV", "org": "Google Research", "fields": ["generative", "vision"], "tEn": "Video Diffusion Models", "tZh": "视频扩散模型", "sEn": "We propose a diffusion model for video generation that extends image diffusion, enabling joint training on images and videos, and introduces a conditional sampling technique for spatial-temporal extension.", "sZh": "我们提出了一种视频生成扩散模型，它扩展了图像扩散，支持图像和视频联合训练，并引入了一种用于时空扩展的条件采样技术。", "absEn": "Generating temporally coherent high fidelity video is an important milestone in generative modeling research. We make progress towards this milestone by proposing a diffusion model for video generation that shows very promising initial results. Our model is a natural extension of the standard image diffusion architecture, and it enables jointly training from image and video data, which we find to reduce the variance of minibatch gradients and speed up optimization. To generate long and higher resolution videos we introduce a new conditional sampling technique for spatial and temporal video extension that performs better than previously proposed methods. We present the first results on a large text-conditioned video generation task, as well as state-of-the-art results on established benchmarks for video prediction and unconditional video generation. Supplementary material is available at https://video-diffusion.github.io/", "absZh": "生成时间上连贯的高保真视频是生成建模研究中的一个重要里程碑。我们通过提出一种用于视频生成的扩散模型，朝着这一里程碑取得了进展，该模型展示了非常有前景的初步结果。我们的模型是标准图像扩散架构的自然扩展，它支持从图像和视频数据中联合训练，我们发现这可以减少小批量梯度的方差并加速优化。为了生成长时间且分辨率更高的视频，我们引入了一种新的条件采样技术，用于空间和时间视频扩展，其性能优于先前提出的方法。我们首次展示了在大规模文本条件视频生成任务上的结果，以及在视频预测和无条件视频生成的既定基准上达到的最先进结果。补充材料可在 https://video-diffusion.github.io/ 获取。", "insights": {"contrib": [{"en": "Proposes a diffusion model for video generation as a natural extension of image diffusion architectures.", "zh": "提出一种视频生成的扩散模型，作为图像扩散架构的自然扩展。"}, {"en": "Enables joint training on image and video data, reducing minibatch gradient variance and speeding optimization.", "zh": "支持图像和视频数据的联合训练，降低小批量梯度方差并加速优化。"}, {"en": "Introduces reconstruction-guided sampling for spatial and temporal video extension, outperforming prior methods.", "zh": "引入重建引导采样用于空间和时间视频扩展，优于先前方法。"}, {"en": "Achieves state-of-the-art results on video prediction and unconditional video generation benchmarks.", "zh": "在视频预测和无条件视频生成基准上取得最先进结果。"}, {"en": "Presents first results on large-scale text-conditioned video generation using diffusion models.", "zh": "首次展示使用扩散模型的大规模文本条件视频生成结果。"}, {"en": "Demonstrates benefits of classifier-free guidance and joint image-video training for video diffusion models.", "zh": "展示了无分类器引导和图像-视频联合训练对视频扩散模型的益处。"}], "limits": [{"en": "Model trained on fixed number of frames (e.g., 16) and limited spatial resolution.", "zh": "模型在固定帧数（如16帧）和有限空间分辨率上训练。"}, {"en": "Reconstruction guidance relies on Gaussian approximation of conditioning data, which may be inaccurate for large t.", "zh": "重建引导依赖于条件数据的高斯近似，在t较大时可能不准确。"}, {"en": "Evaluation metrics (FVD, FID, IS) may not fully capture temporal coherence or perceptual quality.", "zh": "评估指标（FVD、FID、IS）可能无法完全捕捉时间连贯性或感知质量。"}, {"en": "Text-to-video models inherit biases from training data and may require curation for fair results.", "zh": "文本到视频模型继承训练数据的偏差，可能需要筛选以确保公平结果。"}, {"en": "Models not released due to potential for harmful use, limiting reproducibility and further research.", "zh": "模型因潜在有害用途未发布，限制了可重复性和进一步研究。"}]}}, {"id": "leike-2203.02155", "pid": "leike", "arxiv": "2203.02155", "date": "2022-03-04", "venue": "cs.CL", "fields": ["safety", "nlp"], "tEn": "Training language models to follow instructions with human feedback", "tZh": "使用人类反馈训练语言模型遵循指令", "sEn": "Fine-tuning with human feedback aligns language models with user intent, enabling a 1.3B parameter model to outperform a 175B model.", "sZh": "通过人类反馈微调，语言模型能够更好地遵循用户意图，使得1.3B参数的模型在性能上优于175B参数的模型。", "absEn": "Making language models bigger does not inherently make them better at following a user's intent. For example, large language models can generate outputs that are untruthful, toxic, or simply not helpful to the user. In other words, these models are not aligned with their users. In this paper, we show an avenue for aligning language models with user intent on a wide range of tasks by fine-tuning with human feedback. Starting with a set of labeler-written prompts and prompts submitted through the OpenAI API, we collect a dataset of labeler demonstrations of the desired model behavior, which we use to fine-tune GPT-3 using supervised learning. We then collect a dataset of rankings of model outputs, which we use to further fine-tune this supervised model using reinforcement learning from human feedback. We call the resulting models InstructGPT. In human evaluations on our prompt distribution, outputs from the 1.3B parameter InstructGPT model are preferred to outputs from the 175B GPT-3, despite having 100x fewer parameters. Moreover, InstructGPT models show improvements in truthfulness and reductions in toxic output generation while having minimal performance regressions on public NLP datasets. Even though InstructGPT still makes simple mistakes, our results show that fine-tuning with human feedback is a promising direction for aligning language models with human intent.", "absZh": "增大语言模型的规模并不天然使其更擅长遵循用户意图。例如，大型语言模型可能生成不真实、有害或对用户无帮助的输出。换句话说，这些模型与用户不一致。在本文中，我们展示了一种通过人类反馈微调来使语言模型在广泛任务上与用户意图对齐的途径。从一组标注者编写的提示和通过OpenAI API提交的提示开始，我们收集了标注者展示期望模型行为的数据集，用于通过监督学习微调GPT-3。然后，我们收集了模型输出排名的数据集，用于通过来自人类反馈的强化学习进一步微调这个监督模型。我们将得到的模型称为InstructGPT。在我们的提示分布上进行的人类评估中，1.3B参数的InstructGPT模型的输出优于175B参数的GPT-3，尽管参数数量少100倍。此外，InstructGPT模型在真实性和减少有毒输出生成方面表现出改进，同时在公共NLP数据集上性能退化最小。尽管InstructGPT仍然会犯简单错误，但我们的结果表明，使用人类反馈进行微调是使语言模型与人类意图对齐的一个有前景的方向。", "insights": {"contrib": [{"en": "Shows fine-tuning with human feedback (RLHF) aligns language models to user intent, with 1.3B InstructGPT preferred over 175B GPT-3.", "zh": "展示了通过人类反馈微调（RLHF）使语言模型与用户意图对齐，1.3B 参数的 InstructGPT 优于 175B 的 GPT-3。"}, {"en": "InstructGPT improves truthfulness on TruthfulQA and reduces toxic outputs by 25% when prompted respectfully.", "zh": "InstructGPT 在 TruthfulQA 上提升了真实性，并在被要求尊重时减少了 25% 的有毒输出。"}, {"en": "RLHF alignment cost is modest relative to pretraining; 1.3B InstructGPT outperforms 175B GPT-3 with 100x fewer parameters.", "zh": "RLHF 对齐成本相对于预训练较低；1.3B InstructGPT 以 100 倍少的参数优于 175B GPT-3。"}, {"en": "Mixing pretraining gradients (PPO-ptx) mitigates alignment tax on NLP benchmarks like SQuAD and HellaSwag.", "zh": "混合预训练梯度（PPO-ptx）减轻了在 SQuAD 和 HellaSwag 等 NLP 基准上的对齐代价。"}, {"en": "InstructGPT generalizes instruction-following to non-English and code tasks despite limited supervision.", "zh": "InstructGPT 将指令遵循泛化到非英语和代码任务，尽管监督有限。"}, {"en": "Held-out labelers prefer InstructGPT over GPT-3 at similar rates, showing generalization beyond training labelers.", "zh": "保留的标注者以相似比率偏好 InstructGPT 而非 GPT-3，表明泛化到训练标注者之外。"}], "limits": [{"en": "InstructGPT still generates toxic, biased, or false outputs, especially when prompted for harmful content.", "zh": "InstructGPT 仍会产生有毒、有偏见或虚假的输出，尤其在要求有害内容时。"}, {"en": "Alignment is to specific labeler preferences, not universal human values; labeler demographics are limited.", "zh": "对齐针对特定标注者偏好，而非普世人类价值观；标注者人口统计有限。"}, {"en": "Performance regressions on some NLP datasets (e.g., SQuAD, DROP) persist even with PPO-ptx mitigation.", "zh": "即使采用 PPO-ptx 缓解，某些 NLP 数据集（如 SQuAD、DROP）上的性能下降仍然存在。"}, {"en": "Model fails on false premise instructions, over-hedges simple questions, and struggles with multiple constraints.", "zh": "模型在错误前提指令上失败，对简单问题过度含糊，且难以处理多重约束。"}, {"en": "RLHF may not scale to superhuman systems; method relies on human evaluation which becomes difficult for complex tasks.", "zh": "RLHF 可能无法扩展到超级智能系统；该方法依赖人类评估，对复杂任务变得困难。"}]}, "cites": 21784, "org": "OpenAI"}, {"id": "baevski-2202.03555", "pid": "baevski", "arxiv": "2202.03555", "date": "2022-02-07", "venue": "cs.LG", "org": "Meta AI (FAIR)", "fields": ["deep-learning", "vision"], "tEn": "data2vec: A General Framework for Self-supervised Learning in Speech, Vision and Language", "tZh": "data2vec：语音、视觉和语言自监督学习的通用框架", "sEn": "data2vec proposes a unified self-supervised learning framework across speech, NLP, and vision by predicting contextualized latent representations instead of modality-specific targets.", "sZh": "data2vec 提出了一种跨语音、自然语言处理和视觉的统一自监督学习框架，通过预测上下文相关的潜在表示而非模态特定的目标。", "absEn": "While the general idea of self-supervised learning is identical across modalities, the actual algorithms and objectives differ widely because they were developed with a single modality in mind. To get us closer to general self-supervised learning, we present data2vec, a framework that uses the same learning method for either speech, NLP or computer vision. The core idea is to predict latent representations of the full input data based on a masked view of the input in a self-distillation setup using a standard Transformer architecture. Instead of predicting modality-specific targets such as words, visual tokens or units of human speech which are local in nature, data2vec predicts contextualized latent representations that contain information from the entire input. Experiments on the major benchmarks of speech recognition, image classification, and natural language understanding demonstrate a new state of the art or competitive performance to predominant approaches.", "absZh": "虽然自监督学习的总体思路在不同模态间是相同的，但实际的算法和目标却因针对单一模态开发而差异很大。为了更接近通用的自监督学习，我们提出了 data2vec，这是一个在语音、自然语言处理或计算机视觉中使用相同学习方法的框架。其核心思想是在自蒸馏设置下，使用标准 Transformer 架构，基于输入的掩码视图来预测完整输入数据的潜在表示。与预测模态特定的目标（如单词、视觉标记或人类语音单元）不同，这些目标本质上是局部的，而 data2vec 预测的是包含整个输入信息的上下文相关潜在表示。在语音识别、图像分类和自然语言理解等主要基准上的实验表明，该方法达到了新的最优性能或与主流方法相当的表现。", "insights": {"contrib": [{"en": "Proposes data2vec, a unified self-supervised learning framework for speech, vision, and language using the same objective.", "zh": "提出 data2vec，一个统一的自我监督学习框架，适用于语音、视觉和语言，使用相同的学习目标。"}, {"en": "Predicts contextualized latent representations from masked input via self-distillation with a standard Transformer.", "zh": "通过标准 Transformer 的自蒸馏，从掩码输入预测上下文化的潜在表示。"}, {"en": "Achieves state-of-the-art or competitive results on ImageNet-1K, Librispeech, and GLUE benchmarks.", "zh": "在 ImageNet-1K、Librispeech 和 GLUE 基准上取得最先进或具有竞争力的结果。"}, {"en": "Uses multi-layer target averaging from teacher network, improving over single-layer targets like BYOL.", "zh": "使用教师网络的多层目标平均，优于 BYOL 等单层目标方法。"}, {"en": "First NLP model to predict continuous latent targets instead of discrete tokens, enabling open-vocabulary learning.", "zh": "首个预测连续潜在目标而非离散 token 的 NLP 模型，实现开放词汇学习。"}, {"en": "Demonstrates that contextualized targets from full input outperform local targets in self-supervised learning.", "zh": "证明来自完整输入的上下文化目标在自我监督学习中优于局部目标。"}], "limits": [{"en": "Still uses modality-specific feature encoders and masking strategies, not fully unified.", "zh": "仍使用模态特定的特征编码器和掩码策略，未完全统一。"}, {"en": "Requires careful tuning of hyperparameters like learning rate and momentum to avoid representation collapse.", "zh": "需要仔细调整学习率和动量等超参数以避免表示崩溃。"}, {"en": "Performance on speech recognition relies on large pre-training data (960 hours) and may not generalize to low-resource languages.", "zh": "语音识别性能依赖大量预训练数据（960 小时），可能无法泛化到低资源语言。"}, {"en": "Does not explore multi-modal joint training; only learns representations for each modality separately.", "zh": "未探索多模态联合训练；仅单独学习每种模态的表示。"}, {"en": "Contextualized targets require full teacher forward pass, increasing computational cost compared to local targets.", "zh": "上下文化目标需要完整的教师前向传播，相比局部目标增加了计算成本。"}]}}, {"id": "jasonwei-2201.11903", "pid": "jasonwei", "arxiv": "2201.11903", "date": "2022-01-28", "venue": "cs.CL", "org": "Google", "fields": ["nlp", "deep-learning"], "tEn": "Chain-of-Thought Prompting Elicits Reasoning in Large Language Models", "tZh": "思维链提示激发大型语言模型的推理能力", "sEn": "Chain-of-thought prompting significantly improves complex reasoning in large language models.", "sZh": "思维链提示显著提升大型语言模型的复杂推理能力。", "absEn": "We explore how generating a chain of thought -- a series of intermediate reasoning steps -- significantly improves the ability of large language models to perform complex reasoning. In particular, we show how such reasoning abilities emerge naturally in sufficiently large language models via a simple method called chain of thought prompting, where a few chain of thought demonstrations are provided as exemplars in prompting. Experiments on three large language models show that chain of thought prompting improves performance on a range of arithmetic, commonsense, and symbolic reasoning tasks. The empirical gains can be striking. For instance, prompting a 540B-parameter language model with just eight chain of thought exemplars achieves state of the art accuracy on the GSM8K benchmark of math word problems, surpassing even finetuned GPT-3 with a verifier.", "absZh": "我们探索了生成思维链——一系列中间推理步骤——如何显著提升大型语言模型执行复杂推理的能力。特别地，我们展示了这种推理能力如何通过一种简单的方法——思维链提示——在足够大的语言模型中自然涌现，该方法在提示中提供少量思维链示例作为范例。在三个大型语言模型上的实验表明，思维链提示在算术、常识和符号推理任务上均提升了性能。实证收益显著。例如，仅用八个思维链示例提示一个540B参数的语言模型，就在数学应用题GSM8K基准上达到了最先进的准确率，甚至超过了使用验证器的微调GPT-3。", "insights": {"contrib": [{"en": "Proposes chain-of-thought prompting, a simple method that elicits multi-step reasoning in large language models via few-shot exemplars with intermediate reasoning steps.", "zh": "提出思维链提示法，一种通过包含中间推理步骤的少样本示例激发大语言模型多步推理的简单方法。"}, {"en": "Demonstrates that chain-of-thought prompting significantly improves performance on arithmetic, commonsense, and symbolic reasoning tasks, achieving state-of-the-art on GSM8K.", "zh": "证明思维链提示法在算术、常识和符号推理任务上显著提升性能，在GSM8K上达到最先进水平。"}, {"en": "Shows that chain-of-thought reasoning is an emergent ability of model scale, only benefiting models with ~100B parameters or more.", "zh": "表明思维链推理是模型规模的涌现能力，仅对约1000亿参数及以上的模型有效。"}, {"en": "Provides ablation studies isolating the effects of equation-only, variable compute, and chain-of-thought after answer, confirming the importance of sequential natural language reasoning.", "zh": "通过消融实验分离了仅方程、可变算力和答案后思维链的效果，确认了顺序自然语言推理的重要性。"}, {"en": "Demonstrates robustness of chain-of-thought prompting to different annotators, exemplars, and language models.", "zh": "证明了思维链提示法对不同标注者、示例和语言模型的鲁棒性。"}, {"en": "Shows that chain-of-thought prompting facilitates length generalization to out-of-distribution inputs with more steps than seen in exemplars.", "zh": "表明思维链提示法促进了长度泛化，能处理比示例中步骤更多的分布外输入。"}], "limits": [{"en": "Does not address whether the neural network is actually reasoning; chain-of-thought emulates human thought processes but does not guarantee reasoning.", "zh": "未解决神经网络是否真正推理的问题；思维链模仿人类思维过程但不保证推理。"}, {"en": "Manual annotation of chain-of-thought exemplars is costly for few-shot prompting, and prohibitive for finetuning without synthetic data.", "zh": "手动标注思维链示例在少样本提示中成本高，在微调中若无合成数据则难以承受。"}, {"en": "No guarantee of correct reasoning paths; generated chains can lead to both correct and incorrect answers.", "zh": "不保证推理路径正确；生成的思维链可能导致正确或错误答案。"}, {"en": "Chain-of-thought reasoning only emerges at large model scales, making it costly to serve in real-world applications.", "zh": "思维链推理仅在大型模型规模下涌现，使得在实际应用中部署成本高昂。"}, {"en": "Limited evaluation to arithmetic, commonsense, and symbolic reasoning; applicability to other domains remains unexplored.", "zh": "评估仅限于算术、常识和符号推理；在其他领域的适用性尚未探索。"}]}}, {"id": "junnanli-2201.12086", "pid": "junnanli", "arxiv": "2201.12086", "date": "2022-01-28", "venue": "cs.CV", "org": "Salesforce Research", "fields": ["vision", "nlp"], "tEn": "BLIP: Bootstrapping Language-Image Pre-training for Unified Vision-Language Understanding and Generation", "tZh": "BLIP：引导语言-图像预训练实现统一视觉-语言理解与生成", "sEn": "BLIP achieves state-of-the-art on vision-language tasks by bootstrapping captions from noisy web data.", "sZh": "BLIP通过从嘈杂网络数据中引导生成字幕，在视觉-语言任务上达到最先进水平。", "absEn": "Vision-Language Pre-training (VLP) has advanced the performance for many vision-language tasks. However, most existing pre-trained models only excel in either understanding-based tasks or generation-based tasks. Furthermore, performance improvement has been largely achieved by scaling up the dataset with noisy image-text pairs collected from the web, which is a suboptimal source of supervision. In this paper, we propose BLIP, a new VLP framework which transfers flexibly to both vision-language understanding and generation tasks. BLIP effectively utilizes the noisy web data by bootstrapping the captions, where a captioner generates synthetic captions and a filter removes the noisy ones. We achieve state-of-the-art results on a wide range of vision-language tasks, such as image-text retrieval (+2.7% in average recall@1), image captioning (+2.8% in CIDEr), and VQA (+1.6% in VQA score). BLIP also demonstrates strong generalization ability when directly transferred to video-language tasks in a zero-shot manner. Code, models, and datasets are released at https://github.com/salesforce/BLIP.", "absZh": "视觉-语言预训练（VLP）提升了许多视觉-语言任务的性能。然而，大多数现有的预训练模型仅在基于理解的任务或基于生成的任务中表现出色。此外，性能提升主要通过从网络收集的带有噪声的图像-文本对来扩大数据集实现，这是一种次优的监督来源。在本文中，我们提出了BLIP，一种新的VLP框架，能够灵活地迁移到视觉-语言理解和生成任务。BLIP通过引导字幕有效利用嘈杂的网络数据，其中字幕生成器生成合成字幕，过滤器去除噪声字幕。我们在广泛的视觉-语言任务上取得了最先进的结果，例如图像-文本检索（平均召回率@1提升2.7%）、图像字幕（CIDEr提升2.8%）和VQA（VQA分数提升1.6%）。BLIP在零样本方式下直接迁移到视频-语言任务时也表现出强大的泛化能力。代码、模型和数据集已在https://github.com/salesforce/BLIP发布。", "insights": {"contrib": [{"en": "Proposes BLIP, a unified VLP framework for both understanding and generation tasks.", "zh": "提出BLIP，一个统一的视觉语言预训练框架，同时适用于理解和生成任务。"}, {"en": "Introduces multimodal mixture of encoder-decoder (MED) for flexible multi-task pre-training.", "zh": "引入多模态混合编码器-解码器（MED），实现灵活的多任务预训练。"}, {"en": "Develops CapFilt to bootstrap noisy web data by generating synthetic captions and filtering noise.", "zh": "开发CapFilt方法，通过生成合成描述和过滤噪声来引导网络数据。"}, {"en": "Achieves state-of-the-art results on image-text retrieval, captioning, VQA, and zero-shot video tasks.", "zh": "在图像-文本检索、图像描述、视觉问答和零样本视频任务上取得最先进结果。"}, {"en": "Demonstrates strong generalization to video-language tasks via zero-shot transfer.", "zh": "通过零样本迁移展示了在视频-语言任务上的强泛化能力。"}, {"en": "Releases code, models, and bootstrapped datasets to facilitate future research.", "zh": "发布代码、模型和引导数据集以促进未来研究。"}], "limits": [{"en": "CapFilt requires finetuning captioner and filter on human-annotated data like COCO.", "zh": "CapFilt需要在人工标注数据（如COCO）上微调描述生成器和过滤器。"}, {"en": "Performance gains from CapFilt diminish when using deterministic decoding like beam search.", "zh": "使用确定性解码（如束搜索）时，CapFilt的性能提升会减弱。"}, {"en": "Zero-shot video transfer ignores temporal information, limiting performance on temporal tasks.", "zh": "零样本视频迁移忽略时间信息，限制了在时间任务上的性能。"}, {"en": "Bootstrapped dataset requires training a new model from scratch; continued training from teacher is ineffective.", "zh": "引导数据集需要从头训练新模型；从教师模型继续训练无效。"}, {"en": "Method relies on large-scale web data and computational resources for pre-training.", "zh": "方法依赖大规模网络数据和计算资源进行预训练。"}]}}, {"id": "rrombach-2112.10752", "pid": "rrombach", "arxiv": "2112.10752", "date": "2021-12-20", "venue": "cs.CV", "org": "LMU Munich (CompVis)", "fields": ["generative", "vision"], "tEn": "High-Resolution Image Synthesis with Latent Diffusion Models", "tZh": "基于潜在扩散模型的高分辨率图像合成", "sEn": "Latent diffusion models achieve high-quality image synthesis with reduced computational cost by operating in the latent space of pretrained autoencoders.", "sZh": "潜在扩散模型通过在预训练自编码器的潜在空间中操作，以降低计算成本实现高质量图像合成。", "absEn": "By decomposing the image formation process into a sequential application of denoising autoencoders, diffusion models (DMs) achieve state-of-the-art synthesis results on image data and beyond. Additionally, their formulation allows for a guiding mechanism to control the image generation process without retraining. However, since these models typically operate directly in pixel space, optimization of powerful DMs often consumes hundreds of GPU days and inference is expensive due to sequential evaluations. To enable DM training on limited computational resources while retaining t
