ity / Shanghai AI Lab","fields":["vision","deep-learning","efficiency"],"tEn":"PVT v2: Improved Baselines with Pyramid Vision Transformer","tZh":"PVT v2：改进的金字塔视觉Transformer基线","sEn":"PVT v2 improves PVT v1 with linear attention, overlapping patch embedding, and convolutional FFN, achieving SOTA on vision tasks.","sZh":"PVT v2通过线性注意力、重叠块嵌入和卷积前馈网络改进PVT v1，在视觉任务上达到SOTA。","cites":2465},{"id":"tkarras-2106.12423","pid":"tkarras","arxiv":"2106.12423","date":"2021-06-23","venue":"cs.CV","org":"NVIDIA","fields":["generative","deep-learning","vision"],"tEn":"Alias-Free Generative Adversarial Networks","tZh":"无别名生成对抗网络","sEn":"We identify that aliasing in GAN generators causes unhealthy dependence on absolute pixel coordinates, and propose small architectural changes to achieve translation and rotation equivariance.","sZh":"我们发现生成对抗网络中的混叠现象导致了对绝对像素坐标的不健康依赖，并提出了小的架构变化以实现平移和旋转等变性。","cites":2053},{"id":"furuwei-2106.08254","pid":"furuwei","arxiv":"2106.08254","date":"2021-06-15","venue":"cs.CV","org":"Microsoft","fields":["vision","deep-learning"],"tEn":"BEiT: BERT Pre-Training of Image Transformers","tZh":"BEiT：图像Transformer的BERT预训练","sEn":"BEiT introduces masked image modeling for self-supervised vision Transformer pre-training, achieving competitive results on image classification and segmentation.","sZh":"BEiT提出掩码图像建模用于视觉Transformer自监督预训练，在图像分类和分割上取得有竞争力的结果。","cites":3728},{"id":"abdelmohamed-2106.07447","pid":"abdelmohamed","arxiv":"2106.07447","date":"2021-06-14","venue":"cs.CL","org":"Meta AI","fields":["deep-learning","nlp"],"tEn":"HuBERT: Self-Supervised Speech Representation Learning by Masked Prediction of Hidden Units","tZh":"HuBERT：通过隐藏单元的掩码预测进行自监督语音表示学习","sEn":"HuBERT uses offline clustering to provide target labels for masked prediction, achieving state-of-the-art performance on speech benchmarks.","sZh":"HuBERT利用离线聚类为掩码预测提供目标标签，在语音基准测试中达到最先进性能。","cites":4704},{"id":"pdhariwal-2105.05233","pid":"pdhariwal","arxiv":"2105.05233","date":"2021-05-11","venue":"cs.LG","org":"OpenAI","fields":["generative","vision"],"tEn":"Diffusion Models Beat GANs on Image Synthesis","tZh":"扩散模型在图像合成上击败GAN","sEn":"Diffusion models achieve superior image quality to GANs with classifier guidance.","sZh":"扩散模型通过分类器引导，在图像质量上超越GAN。","cites":12220},{"id":"abardes-2105.04906","pid":"abardes","arxiv":"2105.04906","date":"2021-05-11","venue":"cs.CV","org":"Meta AI","fields":["vision","deep-learning"],"tEn":"VICReg: Variance-Invariance-Covariance Regularization for Self-Supervised Learning","tZh":"VICReg：用于自监督学习的方差-不变性-协方差正则化","sEn":"VICReg explicitly avoids collapse in self-supervised learning by regularizing embedding variance and covariance.","sZh":"VICReg通过正则化嵌入的方差和协方差，明确避免了自监督学习中的崩溃问题。"},{"id":"mcaron-2104.14294","pid":"mcaron","arxiv":"2104.14294","date":"2021-04-29","venue":"cs.CV","org":"Meta AI","fields":["vision","deep-learning"],"tEn":"Emerging Properties in Self-Supervised Vision Transformers","tZh":"自监督视觉Transformer中的涌现特性","sEn":"Self-supervised ViTs reveal explicit semantic segmentation and strong k-NN performance, leading to DINO method achieving 80.1% top-1 on ImageNet.","sZh":"自监督ViT显式揭示语义分割信息，且k-NN分类性能优异，由此提出的DINO方法在ImageNet线性评估中达到80.1% top-1准确率。","cites":9383},{"id":"pvelickovic-2104.13478","pid":"pvelickovic","arxiv":"2104.13478","date":"2021-04-27","venue":"cs.LG","org":"Google DeepMind","fields":["deep-learning","vision"],"tEn":"Geometric Deep Learning: Grids, Groups, Graphs, Geodesics, and Gauges","tZh":"几何深度学习：网格、群、图、测地线和规范","sEn":"Geometric deep learning unifies neural network architectures through geometric principles, enabling incorporation of physical knowledge and construction of future models.","sZh":"几何深度学习通过几何原理统一神经网络架构，能够融入物理知识并构建未来模型。","cites":1615},{"id":"jianlinsu-2104.09864","pid":"jianlinsu","arxiv":"2104.09864","date":"2021-04-20","venue":"cs.CL","org":"Zhuiyi Technology","fields":["nlp","deep-learning"],"tEn":"RoFormer: Enhanced Transformer with Rotary Position Embedding","tZh":"RoFormer: 增强型Transformer与旋转位置嵌入","sEn":"Rotary Position Embedding (RoPE) encodes absolute positions with rotation matrices and captures relative position dependencies, improving Transformer performance on long texts.","sZh":"旋转位置嵌入（RoPE）通过旋转矩阵编码绝对位置并捕捉相对位置依赖，提升了Transformer在长文本上的性能。","cites":5641},{"id":"zeliu-2103.14030","pid":"zeliu","arxiv":"2103.14030","date":"2021-03-25","venue":"cs.CV","org":"Microsoft Research Asia","fields":["vision","deep-learning"],"tEn":"Swin Transformer: Hierarchical Vision Transformer using Shifted Windows","tZh":"Swin Transformer：使用移位窗口的分层视觉Transformer","sEn":"Swin Transformer achieves state-of-the-art performance on multiple vision tasks with a hierarchical architecture and shifted windows.","sZh":"Swin Transformer通过分层架构和移位窗口机制，在多个视觉任务上达到最优性能。","cites":33180},{"id":"jietang-2103.10360","pid":"jietang","arxiv":"2103.10360","date":"2021-03-18","venue":"cs.CL","org":"Tsinghua University","fields":["nlp","deep-learning","generative"],"tEn":"GLM: General Language Model Pretraining with Autoregressive Blank Infilling","tZh":"GLM：基于自回归空白填充的通用语言模型预训练","sEn":"GLM outperforms BERT, T5, and GPT across NLU, conditional and unconditional generation tasks with a single pretrained model.","sZh":"GLM 在自然语言理解、条件生成和无条件生成任务上，使用单一预训练模型超越了 BERT、T5 和 GPT。","cites":1941},{"id":"jietang-2103.10385","pid":"jietang","arxiv":"2103.10385","date":"2021-03-18","venue":"cs.CL","org":"Tsinghua University","fields":["nlp","deep-learning","efficiency"],"tEn":"GPT Understands, Too","tZh":"GPT也能理解：P-Tuning——用可训练的连续提示嵌入提升自然语言理解性能","sEn":"P-Tuning uses trainable continuous prompt embeddings to stabilize and improve NLU performance across various tasks and settings.","sZh":"P-Tuning通过可训练的连续提示嵌入，稳定并提升了多种自然语言理解任务的性能。","cites":1447},{"id":"lecun-2103.03230","pid":"lecun","arxiv":"2103.03230","date":"2021-03-04","venue":"cs.CV","fields":["vision","deep-learning"],"tEn":"Barlow Twins: Self-Supervised Learning via Redundancy Reduction","tZh":"Barlow Twins: 通过冗余减少实现自监督学习","sEn":"Barlow Twins avoids collapse by making the cross-correlation matrix close to identity, reducing redundancy between embedding components.","sZh":"Barlow Twins通过使互相关矩阵接近单位矩阵来避免坍塌，减少嵌入向量分量间的冗余。","cites":3039,"org":"Meta AI"},{"id":"aradford-2103.00020","pid":"aradford","arxiv":"2103.00020","date":"2021-02-26","venue":"cs.CV","org":"OpenAI","fields":["vision","nlp"],"tEn":"Learning Transferable Visual Models From Natural Language Supervision","tZh":"从自然语言监督中学习可迁移的视觉模型","sEn":"Predicting which caption goes with which image is an efficient and scalable way to learn SOTA image representations from scratch.","sZh":"预测哪段文字描述对应哪张图像是一种高效且可扩展的方法，可以从零开始学习最先进的图像表示。","cites":50732},{"id":"pingluo-2102.12122","pid":"pingluo","arxiv":"2102.12122","date":"2021-02-24","venue":"cs.CV","org":"The University of Hong Kong / Nanjing University","fields":["vision","deep-learning"],"tEn":"Pyramid Vision Transformer: A Versatile Backbone for Dense Prediction without Convolutions","tZh":"金字塔视觉Transformer：无需卷积的密集预测通用骨干网络","sEn":"PVT is a pyramid vision transformer backbone for dense prediction tasks, outperforming CNNs without convolutions.","sZh":"PVT是一种用于密集预测任务的金字塔视觉Transformer骨干网络，无需卷积即可超越CNN。","cites":5069},{"id":"aradford-2102.12092","pid":"aradford","arxiv":"2102.12092","date":"2021-02-24","venue":"cs.CV","org":"OpenAI","fields":["generative","vision"],"tEn":"Zero-Shot Text-to-Image Generation","tZh":"零样本文本到图像生成","sEn":"A simple transformer-based approach for zero-shot text-to-image generation achieves competitive results with domain-specific models when scaled with sufficient data.","sZh":"一种基于transformer的简单方法，通过将文本和图像令牌作为单一数据流进行自回归建模，在零样本评估中与领域特定模型竞争，且仅需足够的数据和规模。","cites":6528},{"id":"chaojia-2102.05918","pid":"chaojia","arxiv":"2102.05918","date":"2021-02-11","venue":"cs.CV","org":"Google","fields":["vision","nlp"],"tEn":"Scaling Up Visual and Vision-Language Representation Learning With Noisy Text Supervision","tZh":"利用噪声文本监督扩展视觉和视觉-语言表示学习","sEn":"Scaling up visual and vision-language representation learning with noisy text supervision achieves state-of-the-art results.","sZh":"利用噪声文本监督扩展视觉和视觉-语言表示学习，即使使用简单架构也能达到最先进水平。","cites":5646},{"id":"fedus-2101.03961","pid":"fedus","arxiv":"2101.03961","date":"2021-01-11","venue":"cs.LG","fields":["nlp","efficiency"],"tEn":"Switch Transformers: Scaling to Trillion Parameter Models with Simple and Efficient Sparsity","tZh":"Switch Transformers：通过简单高效的稀疏性扩展到万亿参数模型","sEn":"Switch Transformers simplify MoE routing, reduce communication and training instability, enabling trillion-parameter models with up to 7x speedup.","sZh":"Switch Transformers简化了混合专家路由，降低了通信成本和训练不稳定性，实现了万亿参数模型，速度提升高达7倍。","org":"Google","cites":4159},{"id":"xiangyuzhang-2101.03697","pid":"xiangyuzhang","arxiv":"2101.03697","date":"2021-01-11","venue":"cs.CV","org":"MEGVII (Face++) / Tsinghua University","fields":["vision","efficiency"],"tEn":"RepVGG: Making VGG-style ConvNets Great Again","tZh":"RepVGG：让VGG风格的卷积网络再次伟大","sEn":"RepVGG achieves over 80% top-1 accuracy on ImageNet with a simple VGG-like architecture, running 83% faster than ResNet-50.","sZh":"RepVGG通过结构重参数化技术，在推理时采用纯VGG风格网络，训练时使用多分支结构，在ImageNet上首次使普通模型达到80%以上top-1准确率，且比ResNet-50快83%。","cites":2366},{"id":"yangsong-2011.13456","pid":"yangsong","arxiv":"2011.13456","date":"2020-11-26","venue":"cs.LG","org":"Stanford","fields":["generative","deep-learning"],"tEn":"Score-Based Generative Modeling through Stochastic Differential Equations","tZh":"基于随机微分方程的分数生成建模","sEn":"We present a unified SDE framework for score-based generative modeling, enabling new sampling procedures, exact likelihood computation, and record-breaking image generation.","sZh":"我们提出了一个统一的随机微分方程框架，用于分数生成建模，实现了新的采样程序、精确似然计算和创纪录的图像生成性能。","cites":11064},{"id":"kaplan-2010.14701","pid":"kaplan","arxiv":"2010.14701","date":"2020-10-28","venue":"cs.LG","org":"OpenAI","fields":["deep-learning","generative"],"tEn":"Scaling Laws for Autoregressive Generative Modeling","tZh":"自回归生成建模的缩放定律","sEn":"Scaling laws for autoregressive transformers show power-law improvements in cross-entropy loss across diverse domains, enabling predictions of optimal model size and performance.","sZh":"自回归Transformer在多个领域中的交叉熵损失遵循幂律加常数的缩放定律，可预测最优模型大小和性能。","cites":632},{"id":"adosovitskiy-2010.11929","pid":"adosovitskiy","arxiv":"2010.11929","date":"2020-10-22","venue":"cs.CV","org":"Google","fields":["vision","deep-learning"],"tEn":"An Image is Worth 16x16 Words: Transformers for Image Recognition at Scale","tZh":"一张图片等价于16x16个词：用于大规模图像识别的Transformer","sEn":"A pure transformer applied directly to image patches can match or exceed state-of-the-art CNNs on image classification, with less training compute.","sZh":"直接将纯Transformer应用于图像块，可以在图像分类上达到或超越最先进的CNN，且训练计算量更少。","cites":64684},{"id":"jifengdai-2010.04159","pid":"jifengdai","arxiv":"2010.04159","date":"2020-10-08","venue":"cs.CV","org":"SenseTime Research / USTC","fields":["vision","deep-learning"],"tEn":"Deformable DETR: Deformable Transformers for End-to-End Object Detection","tZh":"可变形DETR：用于端到端目标检测的可变形Transformer","sEn":"Deformable DETR achieves better performance than DETR with 10x fewer training epochs by using attention modules that only attend to a small set of key sampling points.","sZh":"可变形DETR通过仅关注参考点周围少量关键采样点的注意力模块，以十分之一的训练周期实现了优于DETR的性能。","cites":7707},{"id":"sermon-2010.02502","pid":"sermon","arxiv":"2010.02502","date":"2020-10-06","venue":"cs.LG","org":"Stanford","fields":["generative","efficiency"],"tEn":"Denoising Diffusion Implicit Models","tZh":"去噪扩散隐式模型","sEn":"DDIMs accelerate sampling from diffusion models by 10-50x while maintaining high image quality.","sZh":"DDIMs 将扩散模型的采样速度提升了 10 到 50 倍，同时保持了高质量的图像生成。","cites":12416},{"id":"kchoroman-2009.14794","pid":"kchoroman","arxiv":"2009.14794","date":"2020-09-30","venue":"cs.LG","org":"Google","fields":["efficiency","deep-learning"],"tEn":"Rethinking Attention with Performers","tZh":"重新思考注意力机制：Performer","sEn":"Performers achieve linear complexity for full-rank attention with provable accuracy.","sZh":"Performer以可证明的精度实现全秩注意力的线性复杂度。","cites":2317},{"id":"louyang-2009.01325","pid":"louyang","arxiv":"2009.01325","date":"2020-09-02","venue":"cs.CL","org":"OpenAI","fields":["nlp","rl"],"tEn":"Learning to summarize from human feedback","tZh":"从人类反馈中学习摘要生成","sEn":"Training summarization models with human feedback significantly improves summary quality over traditional methods.","sZh":"利用人类反馈训练摘要模型，能显著提升摘要质量，超越传统方法。","cites":3254},{"id":"akatharo-2006.16236","pid":"akatharo","arxiv":"2006.16236","date":"2020-06-29","venue":"cs.LG","org":"Idiap Research Institute / EPFL","fields":["efficiency","deep-learning"],"tEn":"Transformers are RNNs: Fast Autoregressive Transformers with Linear Attention","tZh":"Transformer是RNN：具有线性注意力的快速自回归Transformer","sEn":"Transformers can be reformulated as linear dot-products of kernel feature maps, reducing complexity from O(N^2) to O(N) and enabling iterative computation akin to RNNs.","sZh":"Transformer可通过核特征映射的线性点积重新表述，将复杂度从O(N²)降至O(N)，并实现类似RNN的迭代计算。","cites":2873},{"id":"baevski-2006.11477","pid":"baevski","arxiv":"2006.11477","date":"2020-06-20","venue":"cs.CL","org":"Meta AI","fields":["deep-learning","nlp"],"tEn":"wav2vec 2.0: A Framework for Self-Supervised Learning of Speech Representations","tZh":"wav2vec 2.0：一种自监督学习语音表示的框架","sEn":"wav2vec 2.0 outperforms semi-supervised methods by learning from raw audio alone, achieving state-of-the-art results with minimal labeled data.","sZh":"wav2vec 2.0 仅通过原始音频学习，在少量标注数据上超越半监督方法，实现最先进结果。","cites":8544},{"id":"jonathanho-2006.11239","pid":"jonathanho","arxiv":"2006.11239","date":"2020-06-19","venue":"cs.LG","org":"UC Berkeley","fields":["generative","deep-learning"],"tEn":"Denoising Diffusion Probabilistic Models","tZh":"去噪扩散概率模型","sEn":"We present high quality image synthesis using diffusion probabilistic models, achieving state-of-the-art FID scores on CIFAR10 and LSUN datasets.","sZh":"我们利用扩散概率模型实现了高质量的图像合成，在CIFAR10和LSUN数据集上取得了最先进的FID分数。","cites":32022},{"id":"mcaron-2006.09882","pid":"mcaron","arxiv":"2006.09882","date":"2020-06-17","venue":"cs.CV","org":"Meta AI","fields":["vision","deep-learning"],"tEn":"Unsupervised Learning of Visual Features by Contrasting Cluster Assignments","tZh":"通过对比聚类分配进行视觉特征的无监督学习","sEn":"SwAV achieves unsupervised learning by contrasting cluster assignments instead of pairwise features, enabling efficient scaling and strong performance.","sZh":"SwAV通过对比聚类分配而非成对特征实现无监督学习，高效可扩展且性能强劲。","cites":5033},{"id":"jbgrill-2006.07733","pid":"jbgrill","arxiv":"2006.07733","date":"2020-06-13","venue":"cs.LG","org":"Google DeepMind","fields":["vision","deep-learning"],"tEn":"Bootstrap your own latent: A new approach to self-supervised Learning","tZh":"自举你的潜在表示：一种新的自监督学习方法","sEn":"BYOL achieves state-of-the-art self-supervised learning without negative pairs.","sZh":"BYOL 无需负样本对，实现了自监督学习的新高度。","cites":8693},{"id":"aradford-2005.14165","pid":"aradford","arxiv":"2005.14165","date":"2020-05-28","venue":"cs.CL","org":"OpenAI","fields":["nlp","deep-learning"],"tEn":"Language Models are Few-Shot Learners","tZh":"语言模型是少样本学习者","sEn":"Scaling up language models greatly improves task-agnostic few-shot performance, sometimes reaching competitiveness with prior fine-tuning approaches.","sZh":"扩大语言模型规模显著提升了任务无关的少样本性能，有时甚至能与先前的微调方法相媲美。"},{"id":"ncarion-2005.12872","pid":"ncarion","arxiv":"2005.12872","date":"2020-05-26","venue":"cs.CV","org":"Meta AI","fields":["vision","deep-learning"],"tEn":"End-to-End Object Detection with Transformers","tZh":"端到端目标检测与Transformer","sEn":"DETR simplifies object detection by treating it as a direct set prediction problem, eliminating hand-designed components like NMS and anchor generation.","sZh":"DETR将目标检测视为直接集合预测问题，简化了检测流程，去除了非极大值抑制和锚点生成等手工设计组件。","cites":18704},{"id":"gulati-2005.08100","pid":"gulati","arxiv":"2005.08100","date":"2020-05-16","venue":"eess.AS","org":"Google","fields":["deep-learning","nlp"],"tEn":"Conformer: Convolution-augmented Transformer for Speech Recognition","tZh":"Conformer: 用于语音识别的卷积增强Transformer","sEn":"Conformer combines CNNs and Transformers to capture both local and global dependencies, achieving state-of-the-art speech recognition results.","sZh":"Conformer结合CNN和Transformer，有效捕捉局部和全局依赖，在语音识别中达到最优性能。"},{"id":"pdhariwal-2005.00341","pid":"pdhariwal","arxiv":"2005.00341","date":"2020-04-30","venue":"eess.AS","org":"OpenAI","fields":["generative"],"tEn":"Jukebox: A Generative Model for Music","tZh":"Jukebox：一种生成音乐的生成模型","sEn":"Jukebox generates music with singing in raw audio using multi-scale VQ-VAE and autoregressive Transformers.","sZh":"Jukebox 使用多尺度 VQ-VAE 和自回归 Transformer 在原始音频域中生成带歌声的音乐。"},{"id":"izbeltagy-2004.05150","pid":"izbeltagy","arxiv":"2004.05150","date":"2020-04-10","venue":"cs.CL","org":"Allen Institute for AI","fields":["nlp","efficiency"],"tEn":"Longformer: The Long-Document Transformer","tZh":"Longformer: 长文档Transformer","sEn":"Longformer introduces a linear-scaling attention mechanism for processing long documents, achieving state-of-the-art results on multiple tasks.","sZh":"Longformer提出了一种线性扩展的注意力机制，用于处理长文档，在多项任务上取得了最先进的结果。","cites":5593},{"id":"kevinclarknlp-2003.10555","pid":"kevinclarknlp","arxiv":"2003.10555","date":"2020-03-23","venue":"cs.CL","org":"Stanford","fields":["nlp","efficiency"],"tEn":"ELECTRA: Pre-training Text Encoders as Discriminators Rather Than Generators","tZh":"ELECTRA：将文本编码器预训练为判别器而非生成器","sEn":"ELECTRA proposes a more sample-efficient pre-training task called replaced token detection, outperforming BERT and matching RoBERTa/XLNet with less compute.","sZh":"ELECTRA提出了一种更高效的预训练任务——替换令牌检测，在相同计算量下优于BERT，并以少于1/4的计算量达到RoBERTa和XLNet的性能。"},{"id":"xbresson-2003.00982","pid":"xbresson","arxiv":"2003.00982","date":"2020-03-02","venue":"cs.LG","org":"NTU Singapore","fields":["deep-learning"],"tEn":"Benchmarking Graph Neural Networks","tZh":"图神经网络基准测试","sEn":"We present an updated benchmark for graph neural networks with a new molecular dataset and demonstrate its utility in exploring positional encoding.","sZh":"我们提出了一个更新的图神经网络基准测试，包含一个新的分子数据集，并展示了其在探索位置编码方面的实用性。","cites":1212},{"id":"shazeer-2002.05202","pid":"shazeer","arxiv":"2002.05202","date":"2020-02-12","venue":"cs.LG","org":"Google","fields":["deep-learning","nlp","efficiency"],"tEn":"GLU Variants Improve Transformer","tZh":"GLU变体改进Transformer","sEn":"Variants of Gated Linear Units improve Transformer quality over ReLU or GELU.","sZh":"门控线性单元（GLU）的变体在Transformer中优于常用的ReLU或GELU激活函数。"},{"id":"kaplan-2001.08361","pid":"kaplan","arxiv":"2001.08361","date":"2020-01-23","venue":"cs.LG","fields":["nlp"],"tEn":"Scaling Laws for Neural Language Models","tZh":"神经语言模型的缩放定律","sEn":"Language model performance scales as a power-law with model size, dataset size, and compute, enabling optimal compute-efficient training with very large models on modest data.","sZh":"语言模型性能随模型大小、数据集大小和计算量呈幂律缩放，从而可以在适度的数据上训练非常大的模型，实现计算效率最优的训练。","cites":8267,"org":"OpenAI"},{"id":"tkarras-1912.04958","pid":"tkarras","arxiv":"1912.04958","date":"2019-12-03","venue":"cs.CV","org":"NVIDIA","fields":["generative","vision"],"tEn":"Analyzing and Improving the Image Quality of StyleGAN","tZh":"分析并提升StyleGAN的图像质量","sEn":"We analyze artifacts in StyleGAN and propose improvements to generator normalization, progressive growing, and regularization, achieving state-of-the-art unconditional image quality.","sZh":"我们分析了StyleGAN中的特征伪影，并提出了生成器归一化、渐进式增长和正则化方面的改进，实现了无条件图像生成的最先进质量。","cites":7044},{"id":"dhafner-1912.01603","pid":"dhafner","arxiv":"1912.01603","date":"2019-12-03","venue":"cs.LG","org":"Google DeepMind","fields":["rl","generative"],"tEn":"Dream to Control: Learning Behaviors by Latent Imagination","tZh":"梦想控制：通过潜在想象学习行为","sEn":"Dreamer learns behaviors by imagining future trajectories in a learned world model, achieving state-of-the-art performance on visual control tasks.","sZh":"Dreamer通过在学到的世界模型中想象未来轨迹来学习行为，在视觉控制任务上达到了最先进的性能。","cites":2025},{"id":"jschritt-1911.08265","pid":"jschritt","arxiv":"1911.08265","date":"2019-11-19","venue":"cs.LG","org":"Google DeepMind","fields":["rl","deep-learning"],"tEn":"Mastering Atari, Go, Chess and Shogi by Planning with a Learned Model","tZh":"通过规划掌握雅达利、围棋、国际象棋和将棋：基于学习模型的方法","sEn":"MuZero achieves superhuman performance in Atari, Go, chess, and shogi by combining tree-based search with a learned model, without knowing the environment dynamics.","sZh":"MuZero算法通过将基于树的搜索与学习模型相结合，在不了解环境动态的情况下，在雅达利、围棋、国际象棋和将棋中实现了超人类表现。","cites":2555},{"id":"rgirshick-1911.05722","pid":"rgirshick","arxiv":"1911.05722","date":"2019-11-13","venue":"cs.CV","org":"Facebook AI Research (FAIR)","fields":["vision","deep-learning"],"tEn":"Momentum Contrast for Unsupervised Visual Representation Learning","tZh":"动量对比：用于无监督视觉表示学习","sEn":"MoCo enables building a large and consistent dynamic dictionary for contrastive learning, achieving competitive results and even surpassing supervised pre-training in downstream tasks.","sZh":"MoCo通过队列和移动平均编码器构建大型一致的动态字典，在对比学习中取得竞争性结果，甚至在下游任务中超越监督预训练。","cites":15197},{"id":"craffel-1910.10683","pid":"craffel","arxiv":"1910.10683","date":"2019-10-23","venue":"cs.LG","org":"Google","fields":["nlp","deep-learning"],"tEn":"Exploring the Limits of Transfer Learning with a Unified Text-to-Text Transformer","tZh":"探索迁移学习的极限：基于统一的文本到文本转换器","sEn":"A unified text-to-text framework enables systematic study of transfer learning techniques, achieving state-of-the-art results on multiple NLP benchmarks.","sZh":"统一的文本到文本框架系统研究了迁移学习技术，在多个NLP基准上取得了最先进的结果。","cites":26197},{"id":"zhenzhonglan-1909.11942","pid":"zhenzhonglan","arxiv":"1909.11942","date":"2019-09-26","venue":"cs.CL","org":"Google Research / Toyota Technological Institute at Chicago","fields":["nlp","efficiency"],"tEn":"ALBERT: A Lite BERT for Self-supervised Learning of Language Representations","tZh":"ALBERT：一种用于语言表示自监督学习的轻量级BERT","sEn":"ALBERT introduces parameter-reduction techniques to lower memory consumption and increase training speed, achieving state-of-the-art results with fewer parameters than BERT-large.","sZh":"ALBERT通过参数缩减技术降低内存消耗并提升训练速度，以更少的参数在多个基准上超越BERT-large，达到最优性能。","cites":7538},{"id":"openai-1909.07528","pid":"openai","arxiv":"1909.07528","date":"2019-09-17","venue":"cs.LG","org":"OpenAI","fields":["rl"],"tEn":"Emergent Tool Use From Multi-Agent Autocurricula","tZh":"多智能体自动课程中的涌现工具使用","sEn":"Multi-agent competition in hide-and-seek leads to emergent tool use and coordination through self-supervised autocurricula.","sZh":"通过多智能体竞争和简单的捉迷藏目标，智能体在自监督自动课程中涌现出复杂的工具使用和协作策略。","cites":764},{"id":"songhan-1908.09791","pid":"songhan","arxiv":"1908.09791","date":"2019-08-26","venue":"cs.LG","org":"MIT","fields":["efficiency","deep-learning"],"tEn":"Once-for-All: Train One Network and Specialize it for Efficient Deployment","tZh":"一次训练，处处可用：训练一个网络，专用于高效部署","sEn":"Train one network that supports diverse architectural settings and quickly specialize sub-networks for different devices without retraining.","sZh":"训练一个支持多种架构设置的网络，无需重新训练即可快速为不同设备定制子网络。"},{"id":"jwang-1908.07919","pid":"jwang","arxiv":"1908.07919","date":"2019-08-20","venue":"cs.CV","org":"Microsoft Research Asia","fields":["vision","deep-learning"],"tEn":"Deep High-Resolution Representation Learning for Visual Recognition","tZh":"用于视觉识别的深度高分辨率表示学习","sEn":"HRNet maintains high-resolution representations throughout the process, achieving richer semantics and higher spatial precision.","sZh":"HRNet在整个过程中保持高分辨率表示，实现了更丰富的语义和更高的空间精度。","cites":4781},{"id":"liyuanliu-1908.03265","pid":"liyuanliu","arxiv":"1908.03265","date":"2019-08-08","venue":"cs.LG","org":"UIUC / Microsoft","fields":["deep-learning","efficiency"],"tEn":"On the Variance of the Adaptive Learning Rate and Beyond","tZh":"自适应学习率的方差及其改进","sEn":"Warmup reduces early-stage variance of adaptive learning rates; RAdam rectifies this variance for better performance.","sZh":"预热机制通过降低自适应学习率早期阶段的方差来稳定训练，而RAdam通过修正方差进一步提升了性能。","cites":2255},{"id":"yinhanliu-1907.11692","pid":"yinhanliu","arxiv":"1907.11692","date":"2019-07-26","venue":"cs.CL","org":"Meta AI","fields":["nlp"],"tEn":"RoBERTa: A Robustly Optimized BERT Pretraining Approach","tZh":"RoBERTa：一种稳健优化的BERT预训练方法","sEn":"RoBERTa shows that BERT was significantly undertrained and achieves state-of-the-art results by carefully optimizing hyperparameters and training data size.","sZh":"RoBERTa发现BERT严重训练不足，通过精心优化超参数和训练数据规模，达到了最先进的结果。","cites":30131},{"id":"yangsong-1907.05600","pid":"yangsong","arxiv":"1907.05600","date":"2019-07-12","venue":"cs.LG","org":"Stanford","fields":["generative","deep-learning"],"tEn":"Generative Modeling by Estimating Gradients of the Data Distribution","tZh":"通过估计数据分布的梯度进行生成建模","sEn":"We propose a generative model using Langevin dynamics with score matching, achieving state-of-the-art results on CIFAR-10.","sZh":"我们提出了一种基于分数匹配和朗之万动力学的生成模型，在CIFAR-10上取得了最优结果。","cites":5634},{"id":"zhilinyang-1906.08237","pid":"zhilinyang","arxiv":"1906.08237","date":"2019-06-19","venue":"cs.CL","org":"CMU","fields":["nlp","deep-learning"],"tEn":"XLNet: Generalized Autoregressive Pretraining for Language Understanding","tZh":"XLNet：面向语言理解的广义自回归预训练","sEn":"XLNet outperforms BERT on 20 tasks by learning bidirectional contexts via permutation language modeling and integrating Transformer-XL.","sZh":"XLNet通过排列语言建模学习双向上下文并集成Transformer-XL，在20个任务上超越BERT。","cites":9410},{"id":"yiren-1905.09263","pid":"yiren","arxiv":"1905.09263","date":"2019-05-22","venue":"cs.CL","org":"Microsoft Research / Zhejiang University","fields":["deep-learning","generative"],"tEn":"FastSpeech: Fast, Robust and Controllable Text to Speech","tZh":"FastSpeech: 快速、鲁棒且可控的文本到语音合成","sEn":"FastSpeech achieves 270x speedup in mel-spectrogram generation and 38x in end-to-end speech synthesis while maintaining quality and robustness.","sZh":"FastSpeech在保持语音质量的同时，将梅尔频谱生成速度提升270倍，端到端语音合成速度提升38倍，并几乎消除了跳词和重复问题。"},{"id":"aradford-1904.10509","pid":"aradford","arxiv":"1904.10509","date":"2019-04-23","venue":"cs.LG","org":"OpenAI","fields":["efficiency","generative"],"tEn":"Generating Long Sequences with Sparse Transformers","tZh":"利用稀疏Transformer生成长序列","sEn":"Sparse Transformers reduce attention complexity to O(n√n), enabling modeling of sequences up to tens of thousands of timesteps with hundreds of layers.","sZh":"稀疏Transformer将注意力复杂度降至O(n√n)，能够用数百层网络建模长达数万时间步的序列。","cites":2546},{"id":"skale-1904.09237","pid":"skale","arxiv":"1904.09237","date":"2019-04-19","venue":"cs.LG","org":"Google","fields":["deep-learning","efficiency"],"tEn":"On the Convergence of Adam and Beyond","tZh":"论Adam及其变体的收敛性","sEn":"Adam and related algorithms may fail to converge due to exponential moving averages; adding long-term memory of past gradients fixes the issue.","sZh":"Adam等算法因指数移动平均可能导致不收敛，引入过去梯度的长期记忆可解决此问题。","cites":2965},{"id":"yangyou-1904.00962","pid":"yangyou","arxiv":"1904.00962","date":"2019-04-01","venue":"cs.LG","org":"Google / UC Berkeley","fields":["deep-learning","efficiency"],"tEn":"Large Batch Optimization for Deep Learning: Training BERT in 76 minutes","tZh":"大规模批量优化用于深度学习：76分钟训练BERT","sEn":"LAMB optimizer enables BERT training in 76 minutes with large batch sizes up to 32868.","sZh":"LAMB优化器支持高达32868的大批量大小，将BERT训练时间从3天缩短至76分钟。","cites":1211},{"id":"tpark-1903.07291","pid":"tpark","arxiv":"1903.07291","date":"2019-03-18","venue":"cs.CV","org":"UC Berkeley / NVIDIA","fields":["generative","vision"],"tEn":"Semantic Image Synthesis with Spatially-Adaptive Normalization","tZh":"语义图像合成与空间自适应归一化","sEn":"We propose spatially-adaptive normalization for photorealistic image synthesis from semantic layouts, outperforming previous methods in visual fidelity and layout alignment.","sZh":"我们提出空间自适应归一化，用于从语义布局合成逼真图像，在视觉保真度和布局对齐方面优于现有方法。","cites":3147},{"id":"jwang-1902.09212","pid":"jwang","arxiv":"1902.09212","date":"2019-02-25","venue":"cs.CV","org":"Microsoft Research Asia / USTC","fields":["vision","deep-learning"],"tEn":"Deep High-Resolution Representation Learning for Human Pose Estimation","tZh":"深度高分辨率表示学习用于人体姿态估计","sEn":"Our network maintains high-resolution representations throughout the whole process, leading to more accurate keypoint heatmaps.","sZh":"我们的网络在整个过程中保持高分辨率表示，从而得到更准确的关键点热图。"},{"id":"zihangdai-1901.02860","pid":"zihangdai","arxiv":"1901.02860","date":"2019-01-09","venue":"cs.LG","org":"Carnegie Mellon University / Google","fields":["nlp","deep-learning"],"tEn":"Transformer-XL: Attentive Language Models Beyond a Fixed-Length Context","tZh":"Transformer-XL：超越固定长度上下文的注意力语言模型","sEn":"Transformer-XL enables learning longer-term dependency beyond fixed-length context with segment-level recurrence and novel positional encoding.","sZh":"Transformer-XL通过片段级循环机制和新型位置编码，实现了超越固定长度上下文的长期依赖学习。","cites":4380},{"id":"dario-1812.06162","pid":"dario","arxiv":"1812.06162","date":"2018-12-14","venue":"cs.LG","org":"OpenAI","fields":["deep-learning","efficiency"],"tEn":"An Empirical Model of Large-Batch Training","tZh":"大规模批量训练的实证模型","sEn":"A simple statistic called the gradient noise scale predicts the largest useful batch size across many domains.","sZh":"一个称为梯度噪声尺度的简单统计量可以预测多个领域中最大有用的批量大小。"},{"id":"tkarras-1812.04948","pid":"tkarras","arxiv":"1812.04948","date":"2018-12-12","venue":"cs.NE","org":"NVIDIA","fields":["generative","vision"],"tEn":"A Style-Based Generator Architecture for Generative Adversarial Networks","tZh":"一种基于风格的生成对抗网络生成器架构","sEn":"A style-based generator architecture for GANs enables unsupervised separation of high-level attributes and stochastic variation, improving quality and disentanglement.","sZh":"一种基于风格的生成器架构实现了高层属性与随机变化的无监督分离，提升了生成质量和解耦能力。","cites":13116},{"id":"dario-1810.08575","pid":"dario","arxiv":"1810.08575","date":"2018-10-19","venue":"cs.LG","org":"OpenAI","fields":["safety"],"tEn":"Supervising strong learners by amplifying weak experts","tZh":"通过增强弱专家来监督强学习者","sEn":"Iterated Amplification trains complex behaviors by combining solutions to easier subproblems without an external reward function.","sZh":"迭代放大通过组合较易子问题的解决方案来训练复杂行为，无需外部奖励函数。","cites":172},{"id":"jdevlin-1810.04805","pid":"jdevlin","arxiv":"1810.04805","date":"2018-10-11","venue":"cs.CL","org":"Google","fields":["nlp","deep-learning"],"tEn":"BERT: Pre-training of Deep Bidirectional Transformers for Language Understanding","tZh":"BERT: 深度双向Transformer预训练语言理解模型","sEn":"BERT pre-trains deep bidirectional representations from unlabeled text, achieving state-of-the-art results on 11 NLP tasks.","sZh":"BERT通过从无标注文本中预训练深度双向表示，在11项自然语言处理任务上取得了最先进的结果。"},{"id":"kxu-1810.00826","pid":"kxu","arxiv":"1810.00826","date":"2018-10-01","venue":"cs.LG","org":"MIT","fields":["deep-learning"],"tEn":"How Powerful are Graph Neural Networks?","tZh":"图神经网络有多强大？","sEn":"GNNs are as powerful as the Weisfeiler-Lehman test but limited in distinguishing certain graph structures.","sZh":"图神经网络与Weisfeiler-Lehman测试能力相当，但在区分某些图结构上存在局限。","cites":9985},{"id":"abrock-1809.11096","pid":"abrock","arxiv":"1809.11096","date":"2018-09-28","venue":"cs.LG","org":"DeepMind / Heriot-Watt University","fields":["generative","vision"],"tEn":"Large Scale GAN Training for High Fidelity Natural Image Synthesis","tZh":"大规模GAN训练实现高保真自然图像合成","sEn":"BigGANs achieve state-of-the-art class-conditional image synthesis on ImageNet at 128x128 resolution with IS 166.5 and FID 7.4.","sZh":"BigGAN在128x128分辨率的ImageNet上实现了类别条件图像合成的最新成果，IS达到166.5，FID为7.4。","cites":6165},{"id":"zhilinyang-1809.09600","pid":"zhilinyang","arxiv":"1809.09600","date":"2018-09-25","venue":"cs.CL","org":"Carnegie Mellon University / Stanford / MILA","fields":["nlp","deep-learning"],"tEn":"HotpotQA: A Dataset for Diverse, Explainable Multi-hop Question Answering","tZh":"HotpotQA：一个多样化、可解释的多跳问答数据集","sEn":"HotpotQA is a new dataset with 113k Wikipedia-based QA pairs requiring multi-document reasoning and providing sentence-level supporting facts for explainable predictions.","sZh":"HotpotQA是一个包含11.3万个基于维基百科的问答对的新数据集，要求进行多文档推理，并提供句子级别的支持事实以实现可解释的预测。","cites":4783},{"id":"jleskovec-1806.08804","pid":"jleskovec","arxiv":"1806.08804","date":"2018-06-22","venue":"cs.LG","org":"Stanford","fields":["deep-learning"],"tEn":"Hierarchical Graph Representation Learning with Differentiable Pooling","tZh":"基于可微分池化的层次化图表示学习","sEn":"DiffPool learns hierarchical graph representations via differentiable soft clustering, boosting GNN accuracy by 5-10%.","sZh":"DiffPool通过可微分软聚类学习层次化图表示，将GNN准确率提升5-10%。","cites":2514},{"id":"pbattaglia-1806.01261","pid":"pbattaglia","arxiv":"1806.01261","date":"2018-06-04","venue":"cs.LG","org":"Google DeepMind","fields":["deep-learning","rl"],"tEn":"Relational inductive biases, deep learning, and graph networks","tZh":"关系归纳偏置、深度学习与图网络","sEn":"Combinatorial generalization is key to human-like AI, and graph networks with relational inductive biases offer a promising path.","sZh":"组合泛化是实现类人人工智能的关键，而具有关系归纳偏置的图网络提供了一条有前景的路径。","cites":3614},{"id":"amadry-1805.11604","pid":"amadry","arxiv":"1805.11604","date":"2018-05-29","venue":"stat.ML","org":"MIT","fields":["deep-learning"],"tEn":"How Does Batch Normalization Help Optimization?","tZh":"批归一化如何帮助优化？","sEn":"Batch Normalization makes the optimization landscape smoother, enabling faster and more stable training.","sZh":"批归一化使优化景观更平滑，从而实现更快、更稳定的训练。","cites":1733},{"id":"goodfellow-1805.08318","pid":"goodfellow","arxiv":"1805.08318","date":"2018-05-21","venue":"stat.ML","org":"Google","fields":["generative","vision"],"tEn":"Self-Attention Generative Adversarial Networks","tZh":"自注意力生成对抗网络","sEn":"SAGAN introduces self-attention to GANs for long-range dependency modeling, achieving state-of-the-art results on ImageNet.","sZh":"SAGAN将自注意力机制引入生成对抗网络，实现长距离依赖建模，在ImageNet上取得了最优结果。","cites":4133},{"id":"dario-1805.00899","pid":"dario","arxiv":"1805.00899","date":"2018-05-02","venue":"stat.ML","org":"OpenAI","fields":["safety"],"tEn":"AI safety via debate","tZh":"通过辩论实现AI安全","sEn":"Debate with optimal play can answer any question in PSPACE given polynomial time judges, while direct judging answers only NP questions.","sZh":"在最优辩论下，给定多项式时间的裁判，可以回答PSPACE中的任何问题，而直接评判只能回答NP问题。","cites":409},{"id":"shazeer-1804.04235","pid":"shazeer","arxiv":"1804.04235","date":"2018-04-11","venue":"cs.LG","org":"Google","fields":["efficiency","deep-learning"],"tEn":"Adafactor: Adaptive Learning Rates with Sublinear Memory Cost","tZh":"Adafactor: 具有次线性内存成本的自适应学习率","sEn":"Adafactor reduces memory usage in adaptive optimizers by factorizing second-moment estimates, achieving comparable results to Adam with minimal storage.","sZh":"Adafactor通过分解二阶矩估计来减少自适应优化器的内存使用，在极小存储下达到与Adam相当的效果。"},{"id":"jredmon-1804.02767","pid":"jredmon","arxiv":"1804.02767","date":"2018-04-08","venue":"cs.CV","org":"U. Washington","fields":["vision","efficiency"],"tEn":"YOLOv3: An Incremental Improvement","tZh":"YOLOv3：一项渐进式改进","sEn":"YOLOv3 is a fast and accurate object detector, achieving 57.9 mAP@50 in 51 ms on a Titan X, 3.8x faster than RetinaNet with similar performance.","sZh":"YOLOv3 是一个快速且准确的目标检测器，在 Titan X 上以 51 毫秒达到 57.9 mAP@50，性能与 RetinaNet 相当但速度快 3.8 倍。","cites":25423},{"id":"dha-1803.10122","pid":"dha","arxiv":"1803.10122","date":"2018-03-27","venue":"cs.LG","org":"Google","fields":["rl","generative"],"tEn":"World Models","tZh":"世界模型","sEn":"We can train an agent entirely inside its own hallucinated dream generated by its world model and transfer the policy back to the actual environment.","sZh":"我们可以在世界模型生成的幻觉梦境中完全训练智能体，并将策略迁移回真实环境。","cites":1821},{"id":"tmiyato-1802.05957","pid":"tmiyato","arxiv":"1802.05957","date":"2018-02-16","venue":"cs.LG","org":"Preferred Networks","fields":["generative","deep-learning"],"tEn":"Spectral Normalization for Generative Adversarial Networks","tZh":"生成对抗网络的谱归一化","sEn":"Spectral normalization stabilizes GAN training by normalizing the weight matrix's spectral norm, improving image generation quality.","sZh":"谱归一化通过归一化权重矩阵的谱范数来稳定GAN训练，提升图像生成质量。","cites":5038},{"id":"mpeters-1802.05365","pid":"mpeters","arxiv":"1802.05365","date":"2018-02-15","venue":"cs.CL","org":"Allen Institute for AI","fields":["nlp","deep-learning"],"tEn":"Deep contextualized word representations","tZh":"深度上下文词表示","sEn":"Deep contextualized word ,"tEn":"Breaking the Softmax Bottleneck: A High-Rank RNN Language Model","tZh":"打破Softmax瓶颈：一种高秩RNN语言模型","sEn":"We propose a high-rank RNN language model that overcomes the Softmax bottleneck, achieving state-of-the-art perplexities on multiple benchmarks.","sZh":"我们提出了一种高秩RNN语言模型，克服了Softmax瓶颈，在多个基准上取得了最先进的困惑度。","cites":425},{"id":"pvelickovic-1710.10903","pid":"pvelickovic","arxiv":"1710.10903","date":"2017-10-30","venue":"stat.ML","org":"U. Cambridge","fields":["deep-learning"],"tEn":"Graph Attention Networks","tZh":"图注意力网络","sEn":"Graph Attention Networks (GATs) use masked self-attention to assign different weights to different nodes in a neighborhood, improving upon graph convolution methods.","sZh":"图注意力网络（GATs）利用掩蔽自注意力机制为邻域中的不同节点分配不同权重，改进了图卷积方法。","cites":26769},{"id":"tkarras-1710.10196","pid":"tkarras","arxiv":"1710.10196","date":"2017-10-27","venue":"cs.NE","org":"NVIDIA","fields":["generative","vision"],"tEn":"Progressive Growing of GANs for Improved Quality, Stability, and Variation","tZh":"渐进式增长生成对抗网络：提升质量、稳定性和多样性","sEn":"Progressive growing of GANs enables high-resolution image synthesis with improved quality, stability, and variation.","sZh":"渐进式增长生成对抗网络能够生成高质量、高分辨率图像，同时提升训练稳定性和图像多样性。","cites":8591},{"id":"hinton-1710.09829","pid":"hinton","arxiv":"1710.09829","date":"2017-10-26","venue":"cs.CV","fields":["deep-learning","vision"],"tEn":"Dynamic Routing Between Capsules","tZh":"动态路由在胶囊网络中的应用","sEn":"A capsule network with dynamic routing achieves state-of-the-art on MNIST and excels at recognizing overlapping digits.","sZh":"一种采用动态路由机制的胶囊网络在MNIST上达到最优性能，并在识别高度重叠数字方面显著优于卷积网络。","cites":5131,"org":"Google"},{"id":"hvanhasselt-1710.02298","pid":"hvanhasselt","arxiv":"1710.02298","date":"2017-10-06","venue":"cs.AI","org":"Google DeepMind","fields":["rl","deep-learning"],"tEn":"Rainbow: Combining Improvements in Deep Reinforcement Learning","tZh":"彩虹：融合深度强化学习的多项改进","sEn":"Combining six DQN extensions yields state-of-the-art Atari performance.","sZh":"将六种DQN扩展相结合，在Atari基准上实现了最先进的性能。","cites":2642},{"id":"yangyou-1708.03888","pid":"yangyou","arxiv":"1708.03888","date":"2017-08-13","venue":"cs.CV","org":"UC Berkeley / NVIDIA","fields":["deep-learning","efficiency"],"tEn":"Large Batch Training of Convolutional Networks","tZh":"卷积网络的大批量训练","sEn":"Layer-wise Adaptive Rate Scaling (LARS) enables large batch training of convolutional networks without accuracy loss.","sZh":"逐层自适应学习率缩放（LARS）使得卷积网络的大批量训练在不损失精度的情况下成为可能。","cites":957},{"id":"tsungyilin-1708.02002","pid":"tsungyilin","arxiv":"1708.02002","date":"2017-08-07","venue":"cs.CV","org":"Meta AI","fields":["vision","deep-learning"],"tEn":"Focal Loss for Dense Object Detection","tZh":"用于密集目标检测的焦点损失","sEn":"Focal Loss addresses extreme class imbalance in dense object detectors, enabling RetinaNet to surpass two-stage detectors in accuracy while maintaining one-stage speed.","sZh":"焦点损失解决了密集目标检测中的极端类别不平衡问题，使RetinaNet在保持单阶段速度的同时，超越了所有现有两阶段检测器的精度。","cites":3288},{"id":"mbellemare-1707.06887","pid":"mbellemare","arxiv":"1707.06887","date":"2017-07-21","venue":"cs.LG","org":"Google DeepMind","fields":["rl","deep-learning"],"tEn":"A Distributional Perspective on Reinforcement Learning","tZh":"强化学习的分布视角","sEn":"Modeling the full distribution of returns, not just the expected value, improves reinforcement learning performance.","sZh":"建模回报的完整分布而非仅期望值，能提升强化学习性能。","cites":1871},{"id":"schulman-1707.06347","pid":"schulman","arxiv":"1707.06347","date":"2017-07-20","venue":"cs.LG","fields":["rl"],"tEn":"Proximal Policy Optimization Algorithms","tZh":"近端策略优化算法","sEn":"PPO is a family of policy gradient methods that use a novel surrogate objective to enable multiple minibatch updates per data sample, outperforming other online methods.","sZh":"PPO是一类策略梯度方法，通过新颖的替代目标函数实现每个数据样本多次小批量更新，优于其他在线方法。","org":"OpenAI","cites":28722},{"id":"mandrychow-1707.01495","pid":"mandrychow","arxiv":"1707.01495","date":"2017-07-05","venue":"cs.LG","org":"OpenAI","fields":["rl","deep-learning"],"tEn":"Hindsight Experience Replay","tZh":"事后经验回放","sEn":"Hindsight Experience Replay enables sample-efficient learning from sparse binary rewards, avoiding complex reward engineering.","sZh":"事后经验回放能够从稀疏的二元奖励中进行样本高效的学习，避免了复杂的奖励工程设计。","cites":2767},{"id":"xiangyuzhang-1707.01083","pid":"xiangyuzhang","arxiv":"1707.01083","date":"2017-07-04","venue":"cs.CV","org":"MEGVII (Face++)","fields":["vision","efficiency"],"tEn":"ShuffleNet: An Extremely Efficient Convolutional Neural Network for Mobile Devices","tZh":"ShuffleNet：一种面向移动设备的极高效率卷积神经网络","sEn":"ShuffleNet introduces pointwise group convolution and channel shuffle to achieve high efficiency on mobile devices.","sZh":"ShuffleNet通过逐点分组卷积和通道混洗操作，在移动设备上实现了极高的计算效率。","cites":8438},{"id":"shazeer-1706.03762","pid":"shazeer","arxiv":"1706.03762","date":"2017-06-12","venue":"cs.CL","fields":["nlp","deep-learning"],"tEn":"Attention Is All You Need","tZh":"注意力机制就是一切","sEn":"The Transformer model, based solely on attention mechanisms, outperforms recurrent and convolutional models in machine translation while being more parallelizable and faster to train.","sZh":"仅基于注意力机制的Transformer模型在机器翻译中优于循环和卷积模型，且更易并行化、训练更快。","cites":181598,"org":"Google"},{"id":"christiano-1706.03741","pid":"christiano","arxiv":"1706.03741","date":"2017-06-12","venue":"stat.ML","fields":["safety","rl"],"tEn":"Deep reinforcement learning from human preferences","tZh":"基于人类偏好的深度强化学习","sEn":"We can train complex RL behaviors using human preferences on trajectory segments, requiring feedback on less than 1% of agent interactions.","sZh":"我们可以通过人类对轨迹片段的偏好来训练复杂的强化学习行为，仅需对不到1%的智能体交互提供反馈。","cites":5435,"org":"OpenAI"},{"id":"shochreiter-1706.02515","pid":"shochreiter","arxiv":"1706.02515","date":"2017-06-08","venue":"cs.LG","org":"JKU Linz","fields":["deep-learning"],"tEn":"Self-Normalizing Neural Networks","tZh":"自归一化神经网络","sEn":"Self-normalizing neural networks (SNNs) with SELU activations automatically converge to zero mean and unit variance, enabling deep architectures and robust learning.","sZh":"自归一化神经网络（SNN）使用SELU激活函数，自动收敛到零均值和单位方差，从而支持深层架构和鲁棒学习。","cites":2865},{"id":"wlhamilton-1706.02216","pid":"wlhamilton","arxiv":"1706.02216","date":"2017-06-07","venue":"cs.SI","org":"Stanford","fields":["deep-learning"],"tEn":"Inductive Representation Learning on Large Graphs","tZh":"大规模图上的归纳式表示学习","sEn":"GraphSAGE learns a function to generate node embeddings by sampling and aggregating features from local neighborhoods, enabling generalization to unseen nodes.","sZh":"GraphSAGE通过学习一个从节点局部邻域采样并聚合特征来生成嵌入的函数，从而能够泛化到未见节点。","cites":20038},{"id":"jgilmer-1704.01212","pid":"jgilmer","arxiv":"1704.01212","date":"2017-04-04","venue":"cs.LG","org":"Google","fields":["deep-learning","generative"],"tEn":"Neural Message Passing for Quantum Chemistry","tZh":"神经消息传递用于量子化学","sEn":"We reformulate existing models into a common framework called Message Passing Neural Networks (MPNNs) and achieve state-of-the-art results on molecular property prediction.","sZh":"我们将现有模型重新表述为一个称为消息传递神经网络（MPNNs）的通用框架，并在分子性质预测上取得了最先进的结果。","cites":9129},{"id":"arjovsky-1704.00028","pid":"arjovsky","arxiv":"1704.00028","date":"2017-03-31","venue":"cs.LG","org":"MILA / Université de Montréal","fields":["generative","deep-learning"],"tEn":"Improved Training of Wasserstein GANs","tZh":"改进Wasserstein GAN的训练方法","sEn":"Gradient penalty stabilizes WGAN training, enabling high-quality generation without hyperparameter tuning.","sZh":"梯度惩罚稳定了WGAN训练，无需超参数调优即可生成高质量样本。","cites":10956},{"id":"junyanzhu-1703.10593","pid":"junyanzhu","arxiv":"1703.10593","date":"2017-03-30","venue":"cs.CV","org":"UC Berkeley","fields":["generative","vision"],"tEn":"Unpaired Image-to-Image Translation using Cycle-Consistent Adversarial Networks","tZh":"使用循环一致性对抗网络进行非配对图像到图像的翻译","sEn":"We propose CycleGAN, a method for unpaired image-to-image translation using cycle-consistent adversarial networks.","sZh":"我们提出了CycleGAN，一种使用循环一致性对抗网络进行非配对图像到图像翻译的方法。"},{"id":"abbeel-1703.06907","pid":"abbeel","arxiv":"1703.06907","date":"2017-03-20","venue":"cs.RO","org":"OpenAI","fields":["rl","vision"],"tEn":"Domain Randomization for Transferring Deep Neural Networks from Simulation to the Real World","tZh":"域随机化：将深度神经网络从模拟迁移到现实世界","sEn":"Domain randomization enables training deep neural networks on simulated images that transfer to real-world object localization and grasping without any real data.","sZh":"域随机化技术使得仅使用模拟图像训练的深度神经网络能够成功迁移到现实世界，实现物体定位和抓取，无需任何真实数据。","cites":3769},{"id":"rgirshick-1703.06870","pid":"rgirshick","arxiv":"1703.06870","date":"2017-03-20","venue":"cs.CV","org":"Facebook AI Research (FAIR)","fields":["vision","deep-learning"],"tEn":"Mask R-CNN","tZh":"Mask R-CNN","sEn":"Mask R-CNN is a simple, flexible, and general framework for object instance segmentation that extends Faster R-CNN by adding a branch for predicting segmentation masks.","sZh":"Mask R-CNN 是一个简单、灵活且通用的物体实例分割框架，它通过添加一个用于预测分割掩码的分支来扩展 Faster R-CNN。","cites":32252},{"id":"jifengdai-1703.06211","pid":"jifengdai","arxiv":"1703.06211","date":"2017-03-17","venue":"cs.CV","org":"Microsoft Research Asia","fields":["vision","deep-learning"],"tEn":"Deformable Convolutional Networks","tZh":"可变形卷积网络","sEn":"Deformable Convolution and Deformable RoI Pooling enhance CNNs' ability to model geometric transformations by learning spatial offsets without extra supervision.","sZh":"可变形卷积和可变形RoI池化通过学习空间偏移，无需额外监督，增强了CNN对几何变换的建模能力。"},{"id":"finn-1703.03400","pid":"finn","arxiv":"1703.03400","date":"2017-03-09","venue":"cs.LG","fields":["rl","deep-learning"],"tEn":"Model-Agnostic Meta-Learning for Fast Adaptation of Deep Networks","tZh":"模型无关的元学习：深度网络的快速适应","sEn":"A model-agnostic meta-learning algorithm that enables fast adaptation of deep networks with few gradient steps.","sZh":"一种模型无关的元学习算法，通过少量梯度步骤实现深度网络的快速适应。","cites":14619,"org":"UC Berkeley"},{"id":"arjovsky-1701.07875","pid":"arjovsky","arxiv":"1701.07875","date":"2017-01-26","venue":"stat.ML","org":"Courant Institute, NYU","fields":["generative","deep-learning"],"tEn":"Was eep-learning","efficiency"],"tEn":"SGDR: Stochastic Gradient Descent with Warm Restarts","tZh":"SGDR：带热重启的随机梯度下降","sEn":"A simple warm restart technique for SGD improves anytime performance and achieves state-of-the-art results on CIFAR-10 and CIFAR-100.","sZh":"一种简单的SGD热重启技术提升了任意时刻的性能，并在CIFAR-10和CIFAR-100上取得了最先进的结果。","cites":10679},{"id":"jimmyba-1607.06450","pid":"jimmyba","arxiv":"1607.06450","date":"2016-07-21","venue":"stat.ML","org":"U. Toronto","fields":["deep-learning","nlp"],"tEn":"Layer Normalization","tZh":"层归一化","sEn":"Layer normalization normalizes neuron inputs across features within a single training case, stabilizing recurrent network training.","sZh":"层归一化对单个训练样本中同一层的所有神经元输入进行归一化，有效稳定循环网络的训练过程。","cites":12705},{"id":"tmikolov-1607.04606","pid":"tmikolov","arxiv":"1607.04606","date":"2016-07-15","venue":"cs.CL","org":"Meta AI","fields":["nlp","efficiency"],"tEn":"Enriching Word Vectors with Subword Information","tZh":"利用子词信息丰富词向量","sEn":"We propose a fast skipgram-based method that represents words as bags of character n-grams, achieving state-of-the-art performance on word similarity and analogy tasks across nine languages.","sZh":"我们提出一种基于skipgram的快速方法，将单词表示为字符n-gram的集合，在九种语言的词相似性和类比任务上达到了最先进水平。","cites":10794},{"id":"mdefferrard-1606.09375","pid":"mdefferrard","arxiv":"1606.09375","date":"2016-06-30","venue":"cs.LG","org":"EPFL","fields":["deep-learning","efficiency"],"tEn":"Convolutional Neural Networks on Graphs with Fast Localized Spectral Filtering","tZh":"基于快速局部谱滤波的图卷积神经网络","sEn":"We generalize CNNs to graphs using spectral graph theory, achieving linear complexity and universal applicability.","sZh":"我们将卷积神经网络从规则网格推广到图结构，利用谱图理论设计快速局部滤波器，保持线性复杂度并适用于任意图。","cites":8633},{"id":"dario-1606.06565","pid":"dario","arxiv":"1606.06565","date":"2016-06-21","venue":"cs.AI","fields":["safety"],"tEn":"Concrete Problems in AI Safety","tZh":"人工智能安全中的具体问题","sEn":"We identify five concrete research problems in AI safety: avoiding side effects, avoiding reward s on Atari using only CPU.","sZh":"异步方法稳定了训练过程，并仅使用CPU就在Atari领域取得了最先进的结果。","cites":10083},{"id":"kaiming-1512.03385","pid":"kaiming","arxiv":"1512.03385","date":"2015-12-10","venue":"cs.CV","fields":["vision","deep-learning"],"tEn":"Deep Residual Learning for Image Recognition","tZh":"深度残差学习在图像识别中的应用","sEn":"Residual networks enable training of substantially deeper networks with improved accuracy and efficiency.","sZh":"残差网络使得训练更深的网络成为可能，并提高了准确性和效率。","org":"Microsoft","cites":231533},{"id":"dario-1512.02595","pid":"dario","arxiv":"1512.02595","date":"2015-12-08","venue":"cs.CL","org":"Baidu","fields":["nlp","deep-learning"],"tEn":"Deep Speech 2: End-to-End Speech Recognition in English and Mandarin","tZh":"Deep Speech 2：英语和普通话的端到端语音识别","sEn":"End-to-end deep learning achieves competitive speech recognition in English and Mandarin, accelerated by HPC techniques.","sZh":"端到端深度学习在英语和普通话语音识别上达到竞争性水平，并通过高性能计算技术实现加速。","cites":3164},{"id":"cszegedy-1512.00567","pid":"cszegedy","arxiv":"1512.00567","date":"2015-12-02","venue":"cs.CV","org":"Google","fields":["vision","deep-learning"],"tEn":"Rethinking the Inception Architecture for Computer Vision","tZh":"重新思考计算机视觉中的Inception架构","sEn":"Factorized convolutions and aggressive regularization enable efficient scaling of deep networks, achieving 3.5% top-5 error on ILSVRC 2012.","sZh":"通过分解卷积和激进的正则化，实现了深度网络的高效扩展，在ILSVRC 2012上达到3.5%的top-5错误率。","cites":31202},{"id":"aradford-1511.06434","pid":"aradford","arxiv":"1511.06434","date":"2015-11-19","venue":"cs.LG","org":"Meta AI","fields":["generative","deep-learning"],"tEn":"Unsupervised Representation Learning with Deep Convolutional Generative Adversarial Networks","tZh":"使用深度卷积生成对抗网络的无监督表示学习","sEn":"DCGANs learn hierarchical representations from object parts to scenes in an unsupervised manner.","sZh":"DCGAN以无监督方式学习从物体部件到场景的层次化表示。","cites":15124},{"id":"tschaul-1511.05952","pid":"tschaul","arxiv":"1511.05952","date":"2015-11-18","venue":"cs.LG","org":"Google DeepMind","fields":["rl    <div class="grid" style="margin-top:20px">${latest.map(paperCard).join('')}</div></section>`:''}
  <section><div class="eyebrow">Scholars · 学者</div><h2 class="title">${pplOrder().length} 位学者</h2>
   <div class="chips" style="margin:14px 0 2px">${Object.keys(FIELDS).map(f=>`<span class="chip" onclick="go('#/people?field=${f}')">${fdot(f)}${FIELDS[f].zh}</span>`).join('')}</div>
   <div class="grid ppl-grid" style="margin-top:20px">${pplOrder().map(pplCard).join('')}</div></section>
 </div>${footer()}`;
}
function vPeople(field){
 const ids=pplOrder().filter(id=>!field||PEOPLE[id].fields.includes(field));
 return `<div class="wrap"><section>
  <div class="eyebrow">Scholars · 学者</div><h2 class="title">AI 学者</h2>
  <div class="chips" style="margin-top:18px"><span class="chip ${!field?'on':''}" onclick="go('#/people')">全部</span>
   ${Object.keys(FIELDS).map(f=>`<span class="chip ${field===f?'on':''}" onclick="go('#/people?field=${f}')">${fdot(f)}${FIELDS[f].zh}</span>`).join('')}</div>
  <div class="grid ppl-grid" style="margin-top:22px">${ids.map(pplCard).join('')||'<p class="sub">该领域暂无学者</p>'}</div>
 </section></div>${footer()}`;
}
function vPapers(){
 return `<div class="wrap"><section><div class="eyebrow">Papers · 论文</div><h2 class="title">全部论文 · ${PAPERS.length}</h2>
  <div class="grid" style="margin-top:20px">${PAPERS.map(paperCard).join('')||'<p class="sub">暂无论文</p>'}</div></section></div>${footer()}`;
}
function vPerson(pid){
 const p=PEOPLE[pid]; if(!p) return vHome();
 const ps=papersOf(pid);
 return `<div class="wrap"><section>
  <span class="back" onclick="go('#/people')">← 学者</span>
  <div class="row">${av(pid,'bigav')}<div><h1 style="margin:0;font-size:34px">${esc(p.en)}</h1>
   <div class="sub" style="margin:2px 0">${esc(p.zh)}</div>
   <div class="sub">${esc(p.tiEn)} · ${esc(p.tiZh)}</div>
   <div style="margin-top:8px">${p.fields.map(ftag).join(' ')}</div></div></div>
  <p class="bio">${esc(p.bioEn)}</p><p class="bioz">${esc(p.bioZh)}</p>
  ${PAPER2POD[pid]?`<a class="xlink" href="https://aipodcast.jasonlin.tech/#/person/${PAPER2POD[pid]}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 14v-1a9 9 0 0 1 18 0v1"/><rect x="3" y="13.5" width="4" height="6.5" rx="1.6"/><rect x="17" y="13.5" width="4" height="6.5" rx="1.6"/></svg>在 AI 播客中收听访谈</a>`:''}
  <h3 style="margin-top:30px">代表论文 · ${ps.length}</h3>
  <div class="grid" style="margin-top:14px">${ps.map(paperCard).join('')||'<p class="sub">暂无</p>'}</div>
 </section></div>${footer()}`;
}
function renderItem(it){
 if(it.t==='fig')return `<figure class="pfig"><img loading="lazy" src="${it.src}" alt="figure"><figcaption><span class="lang-en">${esc(it.capEn||'')}</span><span class="lang-zh">${esc(it.capZh||'')}</span></figcaption></figure>`;
 if(it.t==='eq')return `<div class="peq">\\[${it.tex}\\]</div>`;
 return `<div class="para"><div class="en">${esc(it.en)}</div><div class="zh">${esc(it.zh)}</div></div>`;}
function ilist(arr,head){return `<div class="icard"><h4 style="color:var(--acc)">${head}</h4><ul style="margin:0;padding-left:18px">${(arr||[]).map(x=>`<li><span class="lang-en">${esc(x.en)}</span><span class="z lang-zh">${esc(x.zh)}</span></li>`).join('')}</ul></div>`;}
function vPaper(id){
 const p=PAPERS.find(x=>x.id===id); if(!p) return vHome();
 const pe=PEOPLE[p.pid]||{};
 const full=FULL_CACHE[id];
 const ins=(full&&full.insights)||p.insights||{};
 const absEn=(full&&full.absEn)||p.absEn||'',absZh=(full&&full.absZh)||p.absZh||'';
 const secs=full?full.full.filter(s=>!/^abstract$/i.test(s.sec)):[];
 const reader=full?secs.map((s,i)=>`<div class="sec-h" id="sec-${i}"><span class="se">${esc(s.sec)}</span><span class="sz">${esc(s.secZh||s.sec)}</span></div>`+
    (s.items?s.items.map(renderItem).join(''):(s.paras||[]).map(pa=>renderItem({t:'para',en:pa.en,zh:pa.zh})).join('')) ).join('')
   :`<div class="skeleton" style="width:90%"></div><div class="skeleton" style="width:80%"></div><div class="skeleton" style="width:86%"></div>`;
 const tocItems=secs.map((s,i)=>`<a class="toc-i" onclick="jumpSec(${i})"><span class="se">${esc(s.sec)}</span><span class="sz">${esc(s.secZh||s.sec)}</span></a>`).join('');
 const hasToc=secs.length>=3;
 if(!full) ensureFull(id);
 const ord=document.body.dataset.order==='zh'?'译文在前':'原文在前';
 const rcol=`
  <div class="meta" style="color:var(--sub);font-size:14px;display:flex;align-items:center;gap:9px;flex-wrap:wrap">
   ${orgChip(p.org)}<span onclick="go('#/person/${p.pid}')" style="cursor:pointer;color:var(--ink);font-weight:500">${esc(pe.en||'')} · ${esc(pe.zh||'')}</span><span>·</span>
   ${p.arxiv?`<a class="alink" href="https://arxiv.org/abs/${p.arxiv}" target="_blank">arXiv:${p.arxiv} ↗</a>`:`<a class="alink" href="${p.srcUrl||'#'}" target="_blank">${esc(p.srcLabel||'PDF')} ↗</a>`}<span>·</span><span>${p.date}</span>${hasToc?`<span>·</span><span>${secs.length} 章</span>`:''}</div>
  <h1 style="font-size:33px;margin:12px 0 2px;letter-spacing:-.02em;line-height:1.12">${esc(p.tEn)}</h1>
  <div class="sub" style="font-size:19px;color:var(--ink)">${esc(p.tZh)}</div>
  <div style="margin-top:12px">${(p.fields||[]).map(ftag).join(' ')}</div>
  ${p.cites!=null?`<div class="citebar"><span class="num">${fmtCites(p.cites)}</span> 次被引用 · <span style="color:var(--sub)">学术影响力(Semantic Scholar)</span></div>`:''}
  <div class="cards2">${full||p.insights?ilist(ins.contrib,'核心贡献 · Key Contributions')+ilist(ins.limits,'局限与边界 · Limitations'):`<div class="icard"><div class="skeleton" style="width:88%"></div><div class="skeleton" style="width:72%"></div></div><div class="icard"><div class="skeleton" style="width:84%"></div><div class="skeleton" style="width:66%"></div></div>`}</div>
  <h3 style="margin-top:30px">摘要 · Abstract</h3>
  ${absEn?`<div class="para"><div class="en">${esc(absEn)}</div><div class="zh">${esc(absZh)}</div></div>`:`<div class="skeleton" style="width:92%"></div><div class="skeleton" style="width:85%"></div>`}
  ${askBox(p,ins)}
  <h3 style="margin-top:34px">全文 · 逐段中英对照</h3>
  <div class="reader">${reader}</div>`;
 return `
 <div class="read-bar">
   <div class="back" onclick="history.back()">‹ <b>${esc(pe.zh||'')}${p.org?' · '+esc(p.org):''}</b></div>
   <div class="tools">
     <div class="seg" id="sizeSeg"><button onclick="setSize('s')">小</button><button onclick="setSize('m')">中</button><button onclick="setSize('l')">大</button></div>
     <div class="seg" id="langSeg"><button onclick="setLang('en')">EN</button><button onclick="setLang('zh')">中</button><button onclick="setLang('both')">双语</button></div>
     <button id="orderBtn" class="ordbtn" onclick="toggleOrder()"><span class="ol">${ord}</span></button>
     <button class="ordbtn" onclick="copyShare('${p.id}')">分享</button>
   </div>
 </div>
 ${hasToc?`<div class="read-wrap"><nav class="toc"><div class="toc-h">目录 · Contents</div>${tocItems}</nav><div class="rcol">${rcol}</div></div>
 <button class="toc-fab" onclick="toggleTocSheet()">目录</button>
 <div class="toc-sheet" id="tocSheet" onclick="if(event.target===this)toggleTocSheet()"><div class="panel"><div class="sh-h">目录 · Contents</div>${tocItems}</div></div>`
 :`<div class="wrap"><div class="rcol" style="padding-top:24px">${rcol}</div></div>`}
 ${footer()}`;
}
function askBox(p,ins){
 const qs=((ins||p.insights||{}).contrib||[]).slice(0,2).map(x=>x.zh);
 return `<div class="askbox"><div style="font-weight:650;margin-bottom:6px">针对这篇论文问 AI</div>
  <input id="q" placeholder="例如：FlashAttention 为什么更快？" onkeydown="if(event.key==='Enter')askPaper('${p.id}')">
  <div class="qsugg">${qs.map(q=>`<span onclick="document.getElementById('q').value='${esc(q)}';askPaper('${p.id}')">${esc(q)}</span>`).join('')}</div>
  <button class="askbtn" onclick="askPaper('${p.id}')">提问</button>
  <div class="ans" id="ans"></div></div>`;
}
function vAsk(){
 return `<div class="wrap"><section><div class="eyebrow">Ask · 问 AI</div><h2 class="title">问遍全站论文</h2>
  <p class="sub">基于站内 ${PAPERS.length} 篇论文的内容回答，并标注引用来源。进入任意论文页也可单篇提问。</p>
  <div class="askbox" style="margin-top:18px"><input id="q" placeholder="例如：注意力机制是怎么提出的？" onkeydown="if(event.key==='Enter')askAll()">
   <button class="askbtn" onclick="askAll()">提问</button><div class="ans" id="ans"></div></div>
 </section></div>${footer()}`;
}
function footer(){return `<footer><div class="wrap">
  <div>AI Paper · 双语论文阅读站 — 著名学者的代表论文，逐段中英对照 + 核心贡献 + 论文问答。</div>
  <div class="legal">本站论文正文/摘要版权归原作者与 arXiv，按其许可（多为 CC-BY/arXiv 非独占）展示译文，仅作学习与研究用途；如权利人要求即下架。译文由 AI 生成，仅供参考，以原文为准。</div>
 </div></footer>`;}

/* ===== ASK (需部署 chat-worker；未配置则提示) ===== */
async function ask(payload,box){
 if(!CHAT_PROXY){box.textContent="（问答未配置）";return;}
 box.textContent="思考中…";
 try{const r=await fetch(CHAT_PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  if(!r.ok){box.textContent="出错："+r.status+" "+(await r.text());return;}
  const reader=r.body.getReader(),dec=new TextDecoder();box.textContent="";
  for(;;){const{done,value}=await reader.read();if(done)break;box.textContent+=dec.decode(value,{stream:true});}
 }catch(e){box.textContent="出错了："+e;}
}
function askPaper(id){const q=document.getElementById('q').value.trim();if(!q)return;
 const p=FULL_CACHE[id]||PAPERS.find(x=>x.id===id);
 ask({mode:'paper',q,id,title:p.tEn},document.getElementById('ans'));}
function askAll(){const q=document.getElementById('q').value.trim();if(!q)return;
 ask({mode:'all',q},document.getElementById('ans'));}

/* ===== LAZY FULL TEXT ===== */
async function ensureFull(id){
 if(FULL_CACHE[id])return FULL_CACHE[id];
 try{const r=await fetch('data/'+id+'.json');FULL_CACHE[id]=await r.json();
  if(location.hash.includes('/paper/'+id))render();return FULL_CACHE[id];}catch(e){}
}

function vOrgs(){const list=orgList();
 return `<div class="wrap"><section><div class="eyebrow">Organizations · 机构</div><h2 class="title">按机构看论文</h2>
  <p class="sub">${list.length} 家机构 · ${PAPERS.length} 篇论文，看每家产出的代表作。</p>
  <div class="grid ppl-grid" style="margin-top:22px">${list.map(([o,n])=>`<div class="ppl-card" onclick="go('#/org/'+encodeURIComponent('${o.replace(/'/g,"")}'))"><div class="av orgav" style="${ORG_LOGO[o]?'':'background:'+orgColor(o)+';font-size:18px'}">${ORG_LOGO[o]?orgLogo(o,'orgavimg'):esc(o.split(' ').map(w=>w[0]).join('').slice(0,3))}</div><div class="n">${esc(o)}</div><div class="cnt">${n} 篇论文</div></div>`).join('')}</div>
 </section></div>${footer()}`;}
function vOrg(o){o=decodeURIComponent(o);const ps=papersByOrg(o).sort((a,b)=>(b.cites||0)-(a.cites||0));
 return `<div class="wrap"><section><span class="back" onclick="go('#/orgs')">← 机构</span>
  <div class="orghead"><div class="orgbadge" style="background:${ORG_LOGO[o]?'#fff':orgColor(o)}">${ORG_LOGO[o]?`<img src="assets/orgs/${ORG_LOGO[o]}.png" alt="">`:`<span>${esc(o.split(' ').map(w=>w[0]).join('').slice(0,3))}</span>`}</div><div style="min-width:0"><h1>${esc(o)}</h1><p class="sub">${ps.length} 篇论文 · 按被引排序</p></div></div>
  <div class="grid" style="margin-top:18px">${ps.map(paperCard).join('')||'<p class="sub">暂无</p>'}</div>
 </section></div>${footer()}`;}
function toggleTheme(){const t=document.documentElement.dataset.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=t;localStorage.theme=t;}
function setLang(l){document.body.dataset.lang=l;localStorage.lang=l;syncSeg();}
function setSize(s){document.body.dataset.size=s;localStorage.size=s;syncSeg();}
function toggleOrder(){const o=document.body.dataset.order==='zh'?'en':'zh';document.body.dataset.order=o;localStorage.order=o;const b=document.querySelector('#orderBtn .ol');if(b)b.textContent=o==='zh'?'译文在前':'原文在前';}
function syncSeg(){const lg=document.body.dataset.lang||'both',sz=document.body.dataset.size||'m';
 const ls=document.getElementById('langSeg');if(ls){const m={en:0,zh:1,both:2};[...ls.children].forEach((b,i)=>b.classList.toggle('on',i===m[lg]));}
 const ss=document.getElementById('sizeSeg');if(ss){const m={s:0,m:1,l:2};[...ss.children].forEach((b,i)=>b.classList.toggle('on',i===m[sz]));}}
function jumpSec(i){const el=document.getElementById('sec-'+i);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});const sh=document.getElementById('tocSheet');if(sh)sh.classList.remove('on');}
function toggleTocSheet(){const s=document.getElementById('tocSheet');if(s)s.classList.toggle('on');}
async function copyShare(id){const url=location.origin+'/p/'+id+'/';const b=event&&event.currentTarget;try{await navigator.clipboard.writeText(url);if(b){const t=b.textContent;b.textContent='已复制';setTimeout(()=>b.textContent=t,1500);}}catch(e){if(b)b.textContent='复制失败';}}
function inReader(node){let el=node&&(node.nodeType===3?node.parentElement:node);return !!(el&&el.closest&&el.closest('.reader'));}
function selSecIndex(){const node=window.getSelection().anchorNode;if(!node)return -1;
 let el=node.nodeType===3?node.parentElement:node;const unit=el&&el.closest?el.closest('.para,.pfig,.peq'):null;let p=unit||el;
 while(p){if(p.classList&&p.classList.contains('sec-h')){const mm=(p.id||'').match(/sec-(\d+)/);return mm?+mm[1]:-1;}p=p.previousElementSibling;}return -1;}
function selCheck(){const bar=document.getElementById('selBar');if(!bar)return;
 const sel=window.getSelection();const text=(sel?sel.toString():'').trim();
 if(text.length<3||!sel.anchorNode||!inReader(sel.anchorNode)){bar.style.display='none';return;}
 const r=sel.getRangeAt(0).getBoundingClientRect();bar.style.display='flex';
 bar.style.left=(window.scrollX+r.left+r.width/2)+'px';bar.style.top=(window.scrollY+r.top-44)+'px';
 const b=document.getElementById('shareSelBtn');b.textContent='分享所选';b.dataset.text=text;b.dataset.sec=selSecIndex();}
async function shareSel(){const b=document.getElementById('shareSelBtn');const text=((b&&b.dataset.text)||'').trim();if(!text)return;
 const m=(location.hash||'').match(/#\/paper\/([^?]+)/);const id=m?decodeURIComponent(m[1]):'';const p=id&&PAPERS.find(x=>x.id===id);
 const quote=text.length>80?text.slice(0,80)+'…':text;const who=p?`—— ${(PEOPLE[p.pid]||{}).zh||''}《${p.tZh||p.tEn}》`:'—— AI Paper';
 let url=location.origin+location.pathname+'#/paper/'+id;const si=parseInt(b.dataset.sec,10);
 if(id&&si>=0)url+='?at='+si+'&hl='+encodeURIComponent(text.slice(0,40));
 const body=`「${quote}」\n${who}\n${url}`;
 if(navigator.share){try{await navigator.share({title:'AI Paper',text:body});return;}catch(e){if(e&&e.name==='AbortError')return;}}
 try{await navigator.clipboard.writeText(body);b.textContent='已复制';setTimeout(()=>b.textContent='分享所选',1500);}catch(e){b.textContent='复制失败';setTimeout(()=>b.textContent='分享所选',1500);}}
let pendingLocate=null;
function applyLocate(){if(!pendingLocate)return;const {id,at,hl}=pendingLocate;
 if((location.hash||'').indexOf('/paper/'+id)<0){pendingLocate=null;return;}
 if(!document.querySelector('.reader .para'))return;  // 逐字稿还没加载,等下次 render
 pendingLocate=null;let target=at!=null?document.getElementById('sec-'+at):null;
 if(hl){const base=decodeURIComponent(hl).replace(/\s/g,'');const els=[...document.querySelectorAll('.reader .para .en,.reader .para .zh')];
  for(const L of [40,30,22,16,10]){const snip=base.slice(0,Math.min(L,base.length));if(snip.length<6)continue;
   const hit=els.find(el=>el.textContent.replace(/\s/g,'').includes(snip));
   if(hit){hit.classList.add('hl-locate');setTimeout(()=>hit.classList.remove('hl-locate'),4000);target=hit.closest('.para')||hit;break;}}}
 if(target)setTimeout(()=>target.scrollIntoView({behavior:'smooth',block:'center'}),60);}
async function sharePaper(id){const p=PAPERS.find(x=>x.id===id);if(!p)return;
 const url=location.origin+location.pathname+'#/paper/'+id;const text=`${p.tZh}｜${p.tEn}（arXiv:${p.arxiv}）`;
 try{if(navigator.share){await navigator.share({title:p.tZh,text,url});return;}}catch(e){if(e&&e.name==='AbortError')return;}
 try{await navigator.clipboard.writeText(text+' '+url);alert('已复制分享内容与链接');}catch(e){prompt('复制链接',url);}}
/* ===== ROUTER ===== */
function render(){
 const h=location.hash||'#/';const[path,query]=h.slice(2).split('?');
 const parts=path.split('/').filter(Boolean);const qp=query?new URLSearchParams(query):null;
 if(parts[0]==='paper'&&qp&&(qp.get('at')!=null||qp.get('hl')))pendingLocate={id:decodeURIComponent(parts[1]),at:qp.get('at'),hl:qp.get('hl')};
 let html;
 if(!parts.length)html=vHome();
 else if(parts[0]==='person')html=vPerson(parts[1]);
 else if(parts[0]==='paper')html=vPaper(decodeURIComponent(parts[1]));
 else if(parts[0]==='people')html=vPeople(qp&&qp.get('field'));
 else if(parts[0]==='papers')html=vPapers();
 else if(parts[0]==='orgs')html=vOrgs();
 else if(parts[0]==='org')html=vOrg(parts[1]);
 else if(parts[0]==='ask')html=vAsk();
 else html=vHome();
 document.getElementById('app').innerHTML=html;
 if(!pendingLocate)window.scrollTo(0,0);
 if(window.MathJax&&MathJax.typesetPromise)MathJax.typesetPromise([document.getElementById('app')]).catch(()=>{});
 applyLocate(); syncSeg();
}
if(localStorage.theme)document.documentElement.dataset.theme=localStorage.theme;
if(localStorage.lang)document.body.dataset.lang=localStorage.lang;
if(localStorage.size)document.body.dataset.size=localStorage.size;
if(localStorage.order)document.body.dataset.order=localStorage.order;
syncSeg();
const selH=()=>setTimeout(selCheck,10);
document.addEventListener('mouseup',selH);document.addEventListener('touchend',selH);
addEventListener('hashchange',render);render();
</script>
