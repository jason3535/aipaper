M-4.5V 和 GLM-4.1V-Thinking：迈向具有可扩展强化学习的通用多模态推理","sEn":"We present GLM-4.1V-Thinking, GLM-4.5V, and GLM-4.6V, a family of vision-language models advancing general-purpose multimodal understanding and reasoning.","sZh":"我们提出了 GLM-4.1V-Thinking、GLM-4.5V 和 GLM-4.6V 系列视觉语言模型，旨在推进通用多模态理解与推理。","cites":282},{"id":"xingwusun-2506.16504","pid":"xingwusun","arxiv":"2506.16504","date":"2025-06-19","venue":"cs.CV","org":"Tencent Hunyuan","fields":["generative","vision"],"tEn":"Hunyuan3D 2.5: Towards High-Fidelity 3D Assets Generation with Ultimate Details","tZh":"Hunyuan3D 2.5：迈向具有极致细节的高保真3D资产生成","sEn":"Hunyuan3D 2.5 significantly advances 3D asset generation with a 10B-parameter shape model and PBR texture generation.","sZh":"Hunyuan3D 2.5 通过10B参数形状模型和PBR纹理生成，显著推进了3D资产生成技术。","cites":95},{"id":"rrombach-2506.15742","pid":"rrombach","arxiv":"2506.15742","date":"2025-06-17","venue":"cs.GR","org":"Black Forest Labs","fields":["generative","vision"],"tEn":"FLUX.1 Kontext: Flow Matching for In-Context Image Generation and Editing in Latent Space","tZh":"FLUX.1 Kontext：潜空间上下文图像生成与编辑的流匹配方法","sEn":"FLUX.1 Kontext unifies image generation and editing via flow matching, achieving faster generation and better multi-turn consistency.","sZh":"FLUX.1 Kontext 通过流匹配统一图像生成与编辑，实现更快的生成速度和更好的多轮一致性。","cites":842},{"id":"yanjunjie-2506.13585","pid":"yanjunjie","arxiv":"2506.13585","date":"2025-06-16","venue":"cs.CL","org":"MiniMax","fields":["efficiency","rl"],"tEn":"MiniMax-M1: Scaling Test-Time Compute Efficiently with Lightning Attention","tZh":"MiniMax-M1：利用闪电注意力高效扩展测试时计算","sEn":"MiniMax-M1 is the first open-weight hybrid-attention reasoning model with 456B parameters, supporting 1M context and efficient test-time compute scaling via lightning attention.","sZh":"MiniMax-M1是首个开源混合注意力推理模型，拥有4560亿参数，支持百万级上下文，并通过闪电注意力机制高效扩展测试时计算。","cites":180},{"id":"aqjiang-2506.10910","pid":"aqjiang","arxiv":"2506.10910","date":"2025-06-12","venue":"cs.CL","org":"Mistral AI","fields":["rl","nlp"],"tEn":"Magistral", o-VL-7B-RL 在 40 项任务中的 35 项上超越 Qwen2.5-VL-7B，并在 OlympiadBench 上获得 59.4 分，超越 78B 参数模型。"},{"id":"mingjieliu-2505.24864","pid":"mingjieliu","arxiv":"2505.24864","date":"2025-05-30","venue":"cs.CL","org":"NVIDIA","fields":["rl","nlp"],"tEn":"ProRL: Prolonged Reinforcement Learning Expands Reasoning Boundaries in Large Language Models","tZh":"ProRL：延长强化学习扩展大语言模型的推理边界","sEn":"Prolonged RL training can uncover novel reasoning strategies inaccessible to base models, expanding reasoning boundaries beyond mere amplification of existing outputs.","sZh":"延长强化学习训练能够发现基础模型无法触及的新推理策略，从而扩展推理边界，而不仅仅是放大已有输出。"},{"id":"jujiehe-2505.22312","pid":"jujiehe","arxiv":"2505.22312","date":"2025-05-28","venue":"cs.LG","org":"Skywork AI","fields":["rl","nlp"],"tEn":"Skywork Open Reasoner 1 Technical Report","tZh":"Skywork Open Reasoner 1 技术报告","sEn":"Skywork-OR1 achieves significant reasoning gains via RL, with 32B model improving from 57.8% to 72.8% on AIME24, AIME25, and LiveCodeBench.","sZh":"Skywork-OR1 通过强化学习显著提升推理能力，32B 模型在 AIME24、AIME25 和 LiveCodeBench 上平均准确率从 57.8% 提升至 72.8%。","cites":112},{"id":"zhihaodu-2505.17589","pid":"zhihaodu","arxiv":"2505.17589","date":"2025-05-23","venue":"cs.SD","org":"Alibaba","fields":["generative","nlp"],"tEn":"CosyVoice 3: Towards In-the-wild Speech Generation via Scaling-up and Post-training","tZh":"CosyVoice 3：通过规模扩展和后训练实现野外语音生成","sEn":"CosyVoice 3 achieves zero-shot multilingual speech synthesis in the wild via scaling up data and model size, and a novel post-training method.","sZh":"CosyVoice 3通过扩展数据与模型规模以及新颖的后训练方法，实现了野外零样本多语言语音合成。","cites":161},{"id":"xingwusun-2505.15431","pid":"xingwusun","arxiv":"2505.15431","date":"2025-05-21","venue":"cs.CL","org":"Tencent Hunyuan","fields":["nlp","deep-learning","efficiency"],"tEn":"Hunyuan-TurboS: Advancing Large Language Models through Mamba-Transformer Synergy and Adaptive Chain-of-Thought","tZh":"Hunyuan-TurboS：通过Mamba-Transformer协同与自适应思维链推进大语言模型","sEn":"Hunyuan-TurboS is a novel hybrid Transformer-Mamba MoE model with adaptive long-short chain-of-thought, achieving top-7 on LMSYS Chatbot Arena with 1356 points.","sZh":"Hunyuan-TurboS是一种新型混合Transformer-Mamba MoE模型，具备自适应长-短思维链机制，在LMSYS Chatbot Arena上以1356分排名前七。","cites":23},{"id":"chaoruideng-2505.14683","pid":"chaoruideng","arxiv":"2505.14683","date":"2025-05-20","venue":"cs.CV","org":"ByteDance Seed","fields":["vision","generative"],"tEn":"Emerging Properties in Unified Multimodal Pretraining","tZh":"统一多模态预训练中的涌现特性","sEn":"BAGEL, a unified decoder-only model pretrained on trillions of tokens from interleaved multimodal data, exhibits emerging capabilities in complex multimodal reasoning, significantly outperforming open-source unified models.","sZh":"BAGEL是一个统一的仅解码器模型，在来自交错多模态数据的数万亿token上预训练，展现出复杂多模态推理的涌现能力，显著优于开源统一模型。","cites":710},{"id":"anyang-2505.09388","pid":"anyang","arxiv":"2505.09388","date":"2025-05-14","venue":"cs.CL","org":"Alibaba Qwen","fields":["nlp","deep-learning"],"tEn":"Qwen3 Technical Report","tZh":"Qwen3技术报告","sEn":"Qwen3 integrates thinking and non-thinking modes into a unified framework, supports 119 languages, and achieves state-of-the-art results across diverse benchmarks.","sZh":"Qwen3将思考模式与非思考模式整合到统一框架中，支持119种语言，并在多种基准测试中取得领先结果。","cites":6153},{"id":"junnanli-2505.09568","pid":"junnanli","arxiv":"2505.09568","date":"2025-05-14","venue":"cs.CV","org":"Salesforce","fields":["vision","generative"],"tEn":"BLIP3-o: A Family of Fully Open Unified Multimodal Models-Architecture, Training and Dataset","tZh":"BLIP3-o：全开放统一多模态模型家族——架构、训练与数据集","sEn":"BLIP3-o achieves state-of-the-art performance in both image understanding and generation by using a diffusion transformer to generate CLIP features and a sequential pretraining strategy.","sZh":"BLIP3-o通过使用扩散Transformer生成CLIP特征和顺序预训练策略，在图像理解与生成任务上均达到最优性能。","cites":318},{"id":"yugao-2505.07818","pid":"yugao","arxiv":"2505.07818","date":"2025-05-12","venue":"cs.CV","org":"ByteDance Seed","fields":["generative","rl","vision"],"tEn":"DanceGRPO: Unleashing GRPO on Visual Generation","tZh":"DanceGRPO：在视觉生成中释放GRPO的潜力","sEn":"DanceGRPO stably optimizes visual generation models across diverse tasks and reward models, outperforming baselines by up to 181%.","sZh":"DanceGRPO稳定优化多种视觉生成模型，在多样化任务和奖励模型上超越基线方法高达181%。"},{"id":"junyanglin-2505.06708","pid":"junyanglin","arxiv":"2505.06708","date":"2025-05-10","venue":"cs.CL","org":"Qwen Team, Alibaba","fields":["deep-learning","efficiency","nlp"],"tEn":"Gated Attention for Large Language Models: Non-linearity, Sparsity, and Attention-Sink-Free","tZh":"大型语言模型的门控注意力：非线性、稀疏性与无注意力汇聚","sEn":"A simple head-specific sigmoid gate after scaled dot-product attention improves LLM performance, stability, and long-context extrapolation by introducing non-linearity and sparse gating that mitigates attention sink.","sZh":"在缩放点积注意力后添加一个头部特定的sigmoid门控，通过引入非线性和稀疏门控来缓解注意力汇聚问题，从而提升大型语言模型的性能、稳定性和长上下文外推能力。","cites":223},{"id":"ybai-2505.05410","pid":"ybai","arxiv":"2505.05410","date":"2025-05-08","venue":"cs.CL","org":"Anthropic","fields":["safety","nlp"],"tEn":"Reasoning Models Don't Always Say What They Think","tZh":"推理模型并不总是说出它们的想法","sEn":"Chain-of-thought monitoring is promising but insufficient for catching undesired behaviors in reasoning models.","sZh":"思维链监控有前景，但不足以捕捉推理模型中的不良行为。","cites":338},{"id":"andrewzhao-2505.03335","pid":"andrewzhao","arxiv":"2505.03335","date":"2025-05-06","venue":"cs.LG","org":"Tsinghua University","fields":["rl","nlp"],"tEn":"Absolute Zero: Reinforced Self-play Reasoning with Zero Data","tZh":"绝对零度：零数据下的自我对弈推理","sEn":"Absolute Zero proposes a new RLVR paradigm where a model self-generates tasks and learns without any external data, achieving SOTA in coding and math reasoning.","sZh":"绝对零度提出了一种新的RLVR范式，模型无需任何外部数据，通过自我生成任务并学习，在编码和数学推理上达到SOTA。","cites":265},{"id":"akhiadbercovich-2505.00949","pid":"akhiadbercovich","arxiv":"2505.00949","date":"2025-05-02","venue":"cs.CL","org":"NVIDIA","fields":["nlp","efficiency"],"tEn":"Llama-Nemotron: Efficient Reasoning Models","tZh":"Llama-Nemotron：高效推理模型","sEn":"Llama-Nemotron models achieve competitive reasoning with superior efficiency and open-source resources.","sZh":"Llama-Nemotron 模型在推理能力上媲美顶尖模型，同时提供更优的推理效率和开源资源。","cites":85},{"id":"sebastienbubeck-2504.21318","pid":"sebastienbubeck","arxiv":"2504.21318","date":"2025-04-30","venue":"cs.AI","org":"Microsoft","fields":["nlp","rl"],"tEn":"Phi-4-reasoning Technical Report","tZh":"Phi-4-reasoning 技术报告","sEn":"Phi-4-reasoning, a 14B parameter model, achieves strong reasoning performance via SFT on curated data and RL, outperforming larger open models.","sZh":"Phi-4-reasoning 是一个 140 亿参数的推理模型，通过精心策划的数据进行监督微调，并辅以强化学习，在复杂推理任务上表现优异，超越了更大的开源模型。","cites":108},{"id":"deepseek-2504.21801","pid":"deepseek","arxiv":"2504.21801","date":"2025-04-30","venue":"cs.CL","org":"DeepSeek","fields":["nlp","rl"],"tEn":"DeepSeek-Prover-V2: Advancing Formal Mathematical Reasoning via Reinforcement Learning for Subgoal Decomposition","tZh":"DeepSeek-Prover-V2：通过强化学习进行子目标分解推进形式化数学推理","sEn":"DeepSeek-Prover-V2 achieves state-of-the-art 88.9% pass ratio on MiniF2F-test and solves 49 PutnamBench problems, narrowing the gap between formal and informal math reasoning.","sZh":"DeepSeek-Prover-V2在MiniF2F测试中达到88.9%的通过率，解决了49个PutnamBench问题，缩小了形式化与非形式化数学推理之间的差距。","cites":235},{"id":"zhilinyang-2504.18425","pid":"zhilinyang","arxiv":"2504.18425","date":"2025-04-25","venue":"eess.AS","org":"Moonshot AI","fields":["nlp","generative"],"tEn":"Kimi-Audio Technical Report","tZh":"Kimi-Audio 技术报告","sEn":"Kimi-Audio is an open-source audio foundation model achieving state-of-the-art performance in understanding, generation, and conversation.","sZh":"Kimi-Audio 是一个开源音频基础模型，在理解、生成和对话方面达到最先进水平。","cites":210},{"id":"kblack-2504.16054","pid":"kblack","arxiv":"2504.16054","date":"2025-04-22","venue":"cs.LG","org":"Physical Intelligence","fields":["rl","vision"],"tEn":"$π_{0.5}$: a Vision-Language-Action Model with Open-World Generalization","tZh":"$π_{0.5}$：一个具有开放世界泛化能力的视觉-语言-动作模型","sEn":"A new VLA model, π0.5, achieves broad real-world generalization by co-training on heterogeneous tasks and data sources, enabling long-horizon dexterous manipulation in unseen homes.","sZh":"新VLA模型π0.5通过异构任务和数据源的协同训练，实现了广泛的现实世界泛化，能在未见过的家庭环境中执行长时程灵巧操作。","cites":1228},{"id":"aarongrattafiori-2504.18575","pid":"aarongrattafiori","arxiv":"2504.18575","date":"2025-04-22","venue":"cs.CR","org":"Meta AI","fields":["safety","nlp"],"tEn":"WASP: Benchmarking Web Agent Security Against Prompt Injection Attacks","tZh":"WASP：针对提示注入攻击的Web智能体安全基准测试","sEn":"WASP benchmark reveals that even top AI models can be deceived by simple prompt injections in realistic scenarios, with attacks partially succeeding in up to 86% of cases.","sZh":"WASP基准测试揭示，即使是最先进的AI模型在真实场景中也难以抵御简单的提示注入攻击，攻击在高达86%的案例中部分成功。","cites":107},{"id":"gaohuang-2504.13837","pid":"gaohuang","arxiv":"2504.13837","date":"2025-04-18","venue":"cs.AI","org":"Tsinghua University","fields":["rl","nlp"],"tEn":"Does Reinforcement Learning Really Incentivize Reasoning Capacity in LLMs Beyond the Base Model?","tZh":"强化学习真的能激发大模型超越基座的推理能力吗？","sEn":"Current RLVR training does not elicit fundamentally new reasoning patterns beyond the base model.","sZh":"当前基于可验证奖励的强化学习训练并未激发大模型超越基座模型的根本性新推理模式。","cites":870},{"id":"yugao-2504.11346","pid":"yugao","arxiv":"2504.11346","date":"2025-04-15","venue":"cs.CV","org":"ByteDance Seed","fields":["generative","vision"],"tEn":"Seedream 3.0 Technical Report","tZh":"Seedream 3.0 技术报告","sEn":"Seedream 3.0 achieves 4-8x speedup with consistent noise expectation and importance-aware timestep sampling, while improving text rendering and supporting up to 2K resolution.","sZh":"Seedream 3.0 通过一致噪声期望和重要性感知时间步采样实现4-8倍加速，同时提升文本渲染能力并支持高达2K分辨率。","cites":134},{"id":"wenhaiwang-2504.10479","pid":"wenhaiwang","arxiv":"2504.10479","date":"2025-04-14","venue":"cs.CV","org":"Shanghai AI Lab","fields":["vision","nlp"],"tEn":"InternVL3: Exploring Advanced Training and Test-Time Recipes for Open-Source Multimodal Models","tZh":"InternVL3：探索开源多模态模型的高级训练与测试时策略","sEn":"InternVL3 introduces a native multimodal pre-training paradigm, achieving state-of-the-art performance among open-source MLLMs with 72.2 on MMMU.","sZh":"InternVL3 采用原生多模态预训练范式，在 MMMU 上取得 72.2 分，创下开源多模态大模型新纪录。","cites":1486},{"id":"qiyingyu-2504.13914","pid":"qiyingyu","arxiv":"2504.13914","date":"2025-04-10","venue":"cs.CL","org":"ByteDance Seed","fields":["rl","nlp"],"tEn":"Seed1.5-Thinking: Advancing Superb Reasoning Models with Reinforcement Learning","tZh":"Seed1.5-Thinking：通过强化学习推进卓越推理模型","sEn":"Seed1.5-Thinking achieves 86.7 on AIME 2024, 55.0 on Codeforces, and 77.3 on GPQA, surpassing DeepSeek R1 by 8% in win rate on non-reasoning tasks.","sZh":"Seed1.5-Thinking在AIME 2024上达到86.7，Codeforces上55.0，GPQA上77.3，在非推理任务上胜率超过DeepSeek R1 8%。"},{"id":"zhilinyang-2504.07491","pid":"zhilinyang","arxiv":"2504.07491","date":"2025-04-10","venue":"cs.CV","org":"Moonshot AI","fields":["vision","nlp"],"tEn":"Kimi-VL Technical Report","tZh":"Kimi-VL 技术报告","sEn":"Kimi-VL is an efficient open-source MoE vision-language model with only 2.8B activated parameters, achieving strong multimodal reasoning, long-context understanding, and agent capabilities, competing with GPT-4o-mini and surpassing GPT-4o in several domains.","sZh":"Kimi-VL 是一款高效开源 MoE 视觉语言模型，仅激活 2.8B 参数，具备强大的多模态推理、长上下文理解和智能体能力，可与 GPT-4o-mini 竞争，并在多个领域超越 GPT-4o。","cites":292},{"id":"sarahooker-2504.00698","pid":"sarahooker","arxiv":"2504.00698","date":"2025-04-01","venue":"cs.CL","org":"Cohere","fields":["nlp","efficiency"],"tEn":"Command A: An Enterprise-Ready Large Language Model","tZh":"Command A：一款面向企业的强大语言模型","sEn":"Command A is an enterprise-ready LLM with agent optimization, multilingual support, and hybrid architecture for efficient RAG and tool use.","sZh":"Command A 是一款面向企业的大型语言模型，具备智能体优化、多语言支持和混合架构，在检索增强生成和工具使用方面表现出色。","cites":56},{"id":"xingwusun-2503.24067","pid":"xingwusun","arxiv":"2503.24067","date":"2025-03-31","venue":"cs.LG","org":"Tencent Hunyuan","fields":["nlp","deep-learning","efficiency"],"tEn":"TransMamba: A Sequence-Level Hybrid Transformer-Mamba Language Model","tZh":"TransMamba：一种序列级混合Transformer-Mamba语言模型","sEn":"TransMamba dynamically switches between attention and SSM mechanisms at different token lengths and layers via shared parameter matrices, achieving superior efficiency and performance.","sZh":"TransMamba通过共享参数矩阵在不同token长度和层上动态切换注意力与SSM机制，实现了更优的效率与性能。","cites":3},{"id":"junyanglin-2503.20215","pid":"junyanglin","arxiv":"2503.20215","date":"2025-03-26","venue":"cs.CL","org":"Alibaba Qwen","fields":["vision","nlp"],"tEn":"Qwen2.5-Omni Technical Report","tZh":"Qwen2.5-Omni 技术报告","sEn":"Qwen2.5-Omni is an end-to-end multimodal model that processes text, images, audio, and video, generating text and speech in a streaming manner with state-of-the-art performance.","sZh":"Qwen2.5-Omni 是一个端到端多模态模型，能够处理文本、图像、音频和视频，并以流式方式生成文本和语音，性能达到业界领先水平。","cites":657},{"id":"wanteam-2503.20314","pid":"wanteam","arxiv":"2503.20314","date":"2025-03-26","venue":"cs.CV","org":"Alibaba","fields":["generative","vision"],"tEn":"Wan: Open and Advanced Large-Scale Video Generative Models","tZh":"Wan：开放且先进的大规模视频生成模型","sEn":"Wan is an open suite of video foundation models achieving leading performance, comprehensiveness, consumer-grade efficiency, and full openness.","sZh":"Wan是一套开放的视频基础模型，在性能、全面性、消费级效率和完全开源方面均达到领先水平。","cites":1975},{"id":"thomasmesnard-2503.19786","pid":"thomasmesnard","arxiv":"2503.19786","date":"2025-03-25","venue":"cs.CL","org":"Google DeepMind","fields":["nlp","vision"],"tEn":"Gemma 3 Technical Report","tZh":"Gemma 3 技术报告","sEn":"Gemma 3 introduces vision understanding, longer context (128K tokens), and improved architecture to reduce KV-cache memory, achieving superior performance over Gemma 2.","sZh":"Gemma 3 引入了视觉理解能力、更长的上下文（128K tokens）以及改进的架构以减少 KV 缓存内存，在预训练和指令微调版本上均优于 Gemma 2。","cites":1522},{"id":"qiyingyu-2503.14476","pid":"qiyingyu","arxiv":"2503.14476","date":"2025-03-18","venue":"cs.LG","org":"ByteDance Seed","fields":["rl","nlp"],"tEn":"DAPO: An Open-Source LLM Reinforcement Learning System at Scale","tZh":"DAPO：一个开源的大规模LLM强化学习系统","sEn":"DAPO is an open-source large-scale RL system achieving 50 points on AIME 2024 with Qwen2.5-32B, featuring decoupled clip and dynamic sampling.","sZh":"DAPO是一个开源的大规模强化学习系统，使用Qwen2.5-32B基座模型在AIME 2024上达到50分，其核心是解耦裁剪和动态采样策略。","cites":2093},{"id":"jimfan-2503.14734","pid":"jimfan","arxiv":"2503.14734","date":"2025-03-18","venue":"cs.RO","org":"NVIDIA","fields":["rl","vision"],"tEn":"GR00T N1: An Open Foundation Model for Generalist Humanoid Robots","tZh":"GR00T N1：面向通用人形机器人的开放基础模型","sEn":"GR00T N1 is an open foundation model for humanoid robots, combining vision-language understanding with real-time motor control.","sZh":"GR00T N1是一个开放的人形机器人基础模型，结合了视觉语言理解与实时运动控制。","cites":973},{"id":"bowenjin-2503.09516","pid":"bowenjin","arxiv":"2503.09516","date":"2025-03-12","venue":"cs.CL","org":"UIUC","fields":["rl","nlp"],"tEn":"Search-R1: Training LLMs to Reason and Leverage Search Engines with Reinforcement Learning","tZh":"Search-R1：通过强化学习训练大语言模型进行推理并利用搜索引擎","sEn":"Search-R1 trains LLMs to autonomously generate search queries during reasoning, improving performance by 41% on 7B models.","sZh":"Search-R1 通过强化学习让大语言模型在推理过程中自主生成搜索查询，在7B模型上性能提升41%。","cites":1149},{"id":"antling-2503.05139","pid":"antling","arxiv":"2503.05139","date":"2025-03-07","venue":"cs.LG","org":"Ant Group","fields":["efficiency","nlp"],"tEn":"Every FLOP Counts: Scaling a 300B Mixture-of-Experts LING LLM without Premium GPUs","tZh":"每一份算力都至关重要：在没有高端GPU的情况下扩展一个300B参数的混合专家LING大语言模型","sEn":"We demonstrate that a 300B MoE LLM can be effectively trained on lower-performance devices with comparable performance and 20% cost savings.","sZh":"我们证明了一个300B参数的混合专家大语言模型可以在低性能设备上有效训练，性能与同类模型相当，且计算成本降低约20%。","cites":20},{"id":"sebastienbubeck-2503.01743","pid":"sebastienbubeck","arxiv":"2503.01743","date":"2025-03-03","venue":"cs.CL","org":"Microsoft","fields":["nlp","efficiency"],"tEn":"Phi duction-ready open-source solution for real-time speech interaction, achieving unified understanding and generation with a 130B-parameter model.","sZh":"Step-Audio 是首个面向生产的开源实时语音交互解决方案，通过130B参数模型实现统一理解与生成。"},{"id":"deepseek-2502.11089","pid":"deepseek","arxiv":"2502.11089","date":"2025-02-16","venue":"cs.CL","org":"DeepSeek","fields":["efficiency","nlp"],"tEn":"Native Sparse Attention: Hardware-Aligned and Natively Trainable Sparse Attention","tZh":"原生稀疏注意力：硬件对齐且可原生训练的稀疏注意力机制","sEn":"NSA achieves efficient long-context modeling with hardware-aligned sparse attention, matching full attention performance while significantly accelerating training and inference.","sZh":"NSA通过硬件对齐的稀疏注意力实现高效长上下文建模，在匹配全注意力性能的同时显著加速训练和推理。","cites":397},{"id":"loubna-2502.02737","pid":"loubna","arxiv":"2502.02737","date":"2025-02-04","venue":"cs.CL","org":"Hugging Face","fields":["nlp","efficiency"],"tEn":"SmolLM2: When Smol Goes Big -- Data-Centric Training of a Small Language Model","tZh":"SmolLM2：小模型大作为——以数据为中心的小型语言模型训练","sEn":"SmolLM2, a 1.7B parameter model trained on 11 trillion tokens with multi-stage data mixing, outperforms Qwen2.5-1.5B and Llama3.2-1B.","sZh":"SmolLM2是一个1.7B参数的小型语言模型，通过多阶段数据混合在11万亿tokens上训练，性能超越Qwen2.5-1.5B和Llama3.2-1B。","cites":275},{"id":"deepseek-2501.17811","pid":"deepseek","arxiv":"2501.17811","date":"2025-01-29","venue":"cs.AI","org":"DeepSeek","fields":["vision","generative"],"tEn":"Janus-Pro: Unified Multimodal Understanding and Generation with Data and Model Scaling","tZh":"Janus-Pro：通过数据和模型扩展实现统一的多模态理解与生成","sEn":"Janus-Pro advances multimodal AI by scaling data and model size, achieving superior understanding and text-to-image generation.","sZh":"Janus-Pro通过优化训练策略、扩展训练数据和扩大模型规模，在多模态理解和文本到图像生成方面取得了显著进步。","cites":775},{"id":"anyang-2501.15383","pid":"anyang","arxiv":"2501.15383","date":"2025-01-26","venue":"cs.CL","org":"Qwen Team, Alibaba","fields":["nlp","efficiency","deep-learning"],"tEn":"Qwen2.5-1M Technical Report","tZh":"Qwen2.5-1M 技术报告","sEn":"Qwen2 tissa ratios, critical data size, and cost-performance precision between 4-8 bits.","sZh":"我们提出了浮点量化训练的统一缩放定律，揭示了最优指数-尾数比、临界数据量以及4-8位之间的最佳性价比精度。","cites":7},{"id":"wenfengliang-2412.19437","pid":"wenfengliang","arxiv":"2412.19437","date":"2024-12-27","venue":"cs.CL","org":"DeepSeek","fields":["nlp","efficiency"],"tEn":"DeepSeek-V3 Technical Report","tZh":"DeepSeek-V3 技术报告","sEn":"DeepSeek-V3, a 671B MoE model with 37B activated parameters, achieves top-tier performance with only 2.788M H800 GPU hours training, featuring novel auxiliary-loss-free load balancing and multi-token prediction.","sZh":"DeepSeek-V3 是一款 671B 总参数、37B 激活参数的 MoE 语言模型，仅用 2.788M H800 GPU 小时训练即可达到顶尖性能，创新性地采用了无辅助损失负载均衡和多 token 预测训练目标。","cites":0},{"id":"junnanli-2412.16256","pid":"junnanli","arxiv":"2412.16256","date":"2024-12-20","venue":"cs.HC","org":"Rhymes AI / University of Hong Kong","fields":["vision","deep-learning"],"tEn":"Aria-UI: Visual Grounding for GUI Instructions","tZh":"Aria-UI：面向GUI指令的视觉定位","sEn":"Aria-UI achieves state-of-the-art GUI grounding via pure vision, scalable data synthesis, and context-aware reasoning.","sZh":"Aria-UI通过纯视觉方法、可扩展数据合成和上下文感知推理，在GUI定位任务上达到最先进水平。","cites":132},{"id":"anyang-2412.15115","pid":"anyang","arxiv":"2412.15115","date":"2024-12-19","venue":"cs.CL","org":"Alibaba","fields":["nlp","deep-learning"],"tEn":"Qwen2.5 Technical Report","tZh":"Qwen2.5技术报告","sEn":"Qwen2.5 achieves top-tier performance across diverse benchmarks, with the 72B model outperforming Llama-3-405B and cost-effective MoE variants competing with GPT-4o.","sZh":"Qwen2.5在多项基准测试中达到顶尖水平，72B模型超越Llama-3-405B，经济高效的MoE变体与GPT-4o竞争。","cites":4244},{"id":"deepseek-2412.10302","pid":"deepseek","arxiv":"2412.10302","date":"2024-12-13","venue":"cs.CV","org":"DeepSeek","fields":["vision","nlp"],"tEn":"DeepSeek-VL2: Mixture-of-Experts Vision-Language Models for Advanced Multimodal Understanding","tZh":"DeepSeek-VL2：用于高级多模态理解的混合专家视觉语言模型","sEn":"DeepSeek-VL2, a series of MoE vision-language models, achi al manipulation that achieves zero-shot generalization and few-shot learning.","sZh":"RDT-1B是一个面向双臂操作任务的扩散基础模型，实现了零样本泛化和少样本学习。","cites":700},{"id":"aqjiang-2410.07073","pid":"aqjiang","arxiv":"2410.07073","date":"2024-10-09","venue":"cs.CV","org":"Mistral AI","fields":["vision","nlp","generative","deep-learning"],"tEn":"Pixtral 12B","tZh":"Pixtral 12B：120亿参数多模态语言模型","sEn":"Pixtral-12B is a 12B multimodal model that excels in both vision and text tasks, outperforming larger models.","sZh":"Pixtral-12B是一款120亿参数的多模态语言模型，在视觉和文本任务上均表现出色，超越了更大的模型。","cites":155},{"id":"junnanli-2410.05993","pid":"junnanli","arxiv":"2410.05993","date":"2024-10-08","venue":"cs.CV","org":"Rhymes AI","fields":["vision","generative","efficiency","deep-learning"],"tEn":"Aria: An Open Multimodal Native Mixture-of-Experts Model","tZh":"Aria：一个开放的多模态原生混合专家模型","sEn":"Aria is an open multimodal native Mixture-of-Experts model that outperforms many existing models across multimodal, language, and coding tasks.","sZh":"Aria是一个开放的多模态原生混合专家模型，在多模态、语言和编码任务上优于许多现有模型。","cites":139},{"id":"aarongrattafiori-2410.01606","pid":"aarongrattafiori","arxiv":"2410.01606","date":"2024-10-02","venue":"cs.LG","org":"Meta AI","fields":["safety","nlp"],"tEn":"Automated Red Teaming with GOAT: the Generative Offensive Agent Tester","tZh":"自动化红队测试：生成式对抗代理测试器（GOAT）","sEn":"GOAT is an automated red teaming system that simulates plain language adversarial conversations to identify LLM vulnerabilities.","sZh":"GOAT是一个自动化红队测试系统，通过模拟自然语言对抗对话来识别大语言模型的漏洞。","cites":43},{"id":"xinlongwang-2409.18869","pid":"xinlongwang","arxiv":"2409.18869","date":"2024-09-27","venue":"cs.CV","org":"BAAI","fields":["vision","generative"],"tEn":"Emu3: Next-Token Prediction is All You Need","tZh":"Emu3：只需预测下一个Token","sEn":"Next-token prediction alone can achieve state-of-the-art multimodal performance, surpassing diffusion models and compositional approaches.","sZh":"仅通过预测下一个Token，就能在多模态任务上达到最先进水平，超越扩散模型和组合方法。","cites":716},{"id":"anyang-2409.12191","p ":"Yi 模型通过数据质量和工程努力实现强劲性能。","cites":850},{"id":"rrombach-2403.03206","pid":"rrombach","arxiv":"2403.03206","date":"2024-03-05","venue":"cs.CV","org":"Stability AI","fields":["generative","vision"],"tEn":"Scaling Rectified Flow Transformers for High-Resolution Image Synthesis","tZh":"缩放整流流变换器以实现高分辨率图像合成","sEn":"Rectified flow models with improved noise sampling and a novel transformer architecture achieve state-of-the-art text-to-image synthesis.","sZh":"通过改进噪声采样和新型变换器架构，整流流模型在文本到图像合成中达到了最先进水平。"},{"id":"jakebruce-2402.15391","pid":"jakebruce","arxiv":"2402.15391","date":"2024-02-23","venue":"cs.LG","org":"Google DeepMind","fields":["generative","rl"],"tEn":"Genie: Generative Interactive Environments","tZh":"Genie: 生成式交互环境","sEn":"Genie is the first generative interactive environment trained unsupervised from Internet videos, enabling action-controllable virtual worlds from text, images, and sketches.","sZh":"Genie是首个从互联网视频中无监督训练的生成式交互环境，能通过文本、图像和草图生成可控动作的虚拟世界。","cites":658},{"id":"shuransong-2402.10329","pid":"shuransong","arxiv":"2402.10329","date":"2024-02-15","venue":"cs.RO","org":"Stanford","fields":["vision","rl"],"tEn":"Universal Manipulation Interface: In-The-Wild Robot Teaching Without In-The-Wild Robots","tZh":"通用操控接口：无需野外机器人的野外机器人教学","sEn":"UMI enables zero-shot transfer of human manipulation skills to robots via a portable hand-held gripper and careful interface design.","sZh":"UMI通过便携式手持夹持器和精心设计的接口，实现了从人类演示到机器人策略的零样本技能迁移。","cites":565},{"id":"sarahooker-2402.07827","pid":"sarahooker","arxiv":"2402.07827","date":"2024-02-12","venue":"cs.CL","org":"Cohere","fields":["nlp","deep-learning"],"tEn":"Aya Model: An Instruction Finetuned Open-Access Multilingual Language Model","tZh":"Aya模型：一种指令微调的开源多语言语言模型","sEn":"Aya is a massively multilingual model that follows instructions in 101 languages, outperforming mT0 and BLOOMZ on most tasks.","sZh":"Aya是一个覆盖101种语言的大规模多语言模型，在大多数任务上优于mT0和BLOOMZ。","cites":377},{"id":"zshao-2402.03300","pid":"zshao","arxiv":"2402.03300", aling up Vision Foundation Models and Aligning for Generic Visual-Linguistic Tasks","tZh":"InternVL：扩展视觉基础模型并针对通用视觉语言任务进行对齐","sEn":"InternVL scales vision foundation models to 6B parameters and aligns with LLMs, achieving SOTA on 32 benchmarks.","sZh":"InternVL将视觉基础模型扩展到60亿参数，并与大语言模型对齐，在32个基准测试中达到最优性能。","cites":3001},{"id":"xinlongwang-2312.13286","pid":"xinlongwang","arxiv":"2312.13286","date":"2023-12-20","venue":"cs.CV","org":"BAAI","fields":["generative","vision","nlp","deep-learning"],"tEn":"Generative Multimodal Models are In-Context Learners","tZh":"生成式多模态模型是上下文学习者","sEn":"Scaling up generative multimodal models significantly enhances their task-agnostic in-context learning abilities.","sZh":"扩大生成式多模态模型的规模能显著提升其任务无关的上下文学习能力。","cites":510},{"id":"shazeer-2312.11805","pid":"shazeer","arxiv":"2312.11805","date":"2023-12-19","venue":"cs.CL","org":"Google DeepMind","fields":["nlp","deep-learning"],"tEn":"Gemini: A Family of Highly Capable Multimodal Models","tZh":"Gemini：一个高度能力多模态模型家族","sEn":"Gemini is a family of highly capable multimodal models that achieves state-of-the-art performance across 30 of 32 benchmarks, including human-expert level on MMLU.","sZh":"Gemini 是一个高度能力多模态模型家族，在32个基准测试中的30个上达到最先进水平，包括在MMLU上达到人类专家水平。"},{"id":"lianminzheng-2312.07104","pid":"lianminzheng","arxiv":"2312.07104","date":"2023-12-12","venue":"cs.AI","org":"UC Berkeley","fields":["efficiency","nlp"],"tEn":"SGLang: Efficient Execution of Structured Language Model Programs","tZh":"SGLang：结构化语言模型程序的高效执行","sEn":"SGLang achieves up to 6.4x higher throughput than state-of-the-art systems for complex LLM programs.","sZh":"SGLang 在复杂语言模型程序上实现了高达 6.4 倍的吞吐量提升。","cites":989},{"id":"tkarras-2312.02696","pid":"tkarras","arxiv":"2312.02696","date":"2023-12-05","venue":"cs.CV","org":"NVIDIA","fields":["generative","deep-learning","vision"],"tEn":"Analyzing and Improving the Training Dynamics of Diffusion Models","tZh":"分析与改进扩散模型的训练动态","sEn":"We identify and fix training instabilities in ADM diffusion models, achieving a new record FID of 1.81 on ImageNet-512.","sZh":"我们识别并修复了ADM扩散模型中的训练不稳定性，在ImageNet-512上实现了1.81的新纪录FID。","cites":431},{"id":"tridao-2312.00752","pid":"tridao","arxiv":"2312.00752","date":"2023-12-01","venue":"cs.LG","fields":["efficiency","nlp"],"tEn":"Mamba: Linear-Time Sequence Modeling with Selective State Spaces","tZh":"Mamba：具有选择性状态空间的线性时间序列建模","sEn":"Mamba achieves linear-time sequence modeling with selective state spaces, outperforming Transformers in efficiency and matching larger models in performance.","sZh":"Mamba通过选择性状态空间实现线性时间序列建模，在效率上超越Transformer，在性能上匹配更大规模的模型。","cites":7660,"org":"CMU"},{"id":"rrombach-2311.17042","pid":"rrombach","arxiv":"2311.17042","date":"2023-11-28","venue":"cs.CV","org":"Stability AI","fields":["generative","vision","efficiency"],"tEn":"Adversarial Diffusion Distillation","tZh":"对抗性扩散蒸馏","sEn":"ADD enables single-step real-time image synthesis with foundation models, outperforming GANs and LCMs in one step and matching SDXL in four steps.","sZh":"ADD 实现了基于基础模型的单步实时图像合成，一步超越 GAN 和 LCM，四步达到 SDXL 水平。","cites":803},{"id":"rrombach-2311.15127","pid":"rrombach","arxiv":"2311.15127","date":"2023-11-25","venue":"cs.CV","org":"Stability AI","fields":["generative","vision"],"tEn":"Stable Video Diffusion: Scaling Latent Video Diffusion Models to Large Datasets","tZh":"稳定视频扩散：将潜在视频扩散模型扩展到大型数据集","sEn":"Stable Video Diffusion achieves state-of-the-art text-to-video and image-to-video generation by scaling latent video diffusion models with a systematic curation process and three-stage training.","sZh":"稳定视频扩散通过系统化的数据筛选流程和三阶段训练，实现了潜在视频扩散模型的规模化，在文本到视频和图像到视频生成中达到最先进水平。","cites":2649},{"id":"jietang-2311.03079","pid":"jietang","arxiv":"2311.03079","date":"2023-11-06","venue":"cs.CV","org":"Zhipu AI","fields":["vision","nlp"],"tEn":"CogVLM: Visual Expert for Pretrained Language Models","tZh":"CogVLM：预训练语言模型的视觉专家","sEn":"CogVLM bridges the gap between frozen language models and image encoders via a trainable visual expert module, achieving state-of-the-art on 10 cross-modal benchmarks.","sZh":"CogVLM通过可训练的视觉专家模块弥合了冻结语言模型与图像编码器之间的差距，在10个跨模态基准上达到最先进水平。","cites":814},{"id":"xinghangli-2311.01378","pid":"xinghangli","arxiv":"2311.01378","date":"2023-11-02","venue":"cs.RO","org":"ByteDance Seed","fields":["deep-learning","vision"],"tEn":"Vision-Language Foundation Models as Effective Robot Imitators","tZh":"视觉语言基础模型作为有效的机器人模仿者","sEn":"RoboFlamingo, built on OpenFlamingo, achieves state-of-the-art robot manipulation by fine-tuning vision-language models with imitation learning.","sZh":"基于OpenFlamingo的RoboFlamingo通过模仿学习微调视觉语言模型，在机器人操作任务上取得了领先性能。"},{"id":"jimfan-2310.12931","pid":"jimfan","arxiv":"2310.12931","date":"2023-10-19","venue":"cs.RO","org":"NVIDIA","fields":["rl","nlp","deep-learning"],"tEn":"Eureka: Human-Level Reward Design via Coding Large Language Models","tZh":"Eureka：通过编码大型语言模型实现人类级别的奖励设计","sEn":"Eureka uses LLMs to automatically generate reward functions that outperform human-designed ones, enabling complex manipulation skills like pen spinning.","sZh":"Eureka利用大型语言模型自动生成奖励函数，其性能超越人类专家设计的奖励，并首次实现模拟Shadow Hand进行快速笔旋转技巧。","cites":648},{"id":"aqjiang-2310.10631","pid":"aqjiang","arxiv":"2310.10631","date":"2023-10-16","venue":"cs.CL","org":"EleutherAI / Princeton","fields":["nlp","deep-learning","generative"],"tEn":"Llemma: An Open Language Model For Mathematics","tZh":"Llemma：一个开放的数学语言模型","sEn":"Llemma, an open language model for mathematics, outperforms all known open base models on MATH and supports tool use and theorem proving without finetuning.","sZh":"Llemma是一个开放的数学语言模型，在MATH基准测试中优于所有已知的开放基础模型，并且无需微调即可支持工具使用和定理证明。","cites":467},{"id":"mahn-2310.08864","pid":"mahn","arxiv":"2310.08864","date":"2023-10-13","venue":"cs.RO","org":"Google DeepMind","fields":["deep-learning","vision"],"tEn":"Open X-Embodiment: Robotic Learning Datasets and RT-X Models","tZh":"开放X-具身：机器人学习数据集与RT-X模型","sEn":"A large-scale robotic dataset from 22 robots enables a generalist X-robot policy with positive transfer across platforms.","sZh":"来自22个机器人的大规模数据集使得通用型跨机器人策略成为可能，并在不同平台间展现出正向迁移能力。","cites":1055},{"id":"aqjiang-2310.06825","pid":"aqjiang","arxiv":"2310.06825","date":"2023-10-10","venue":"cs.CL","org":"Mistral AI","fields":["nlp","efficiency"],"tEn":"Mistral 7B","tZh":"Mistral 7B：高性能高效语言模型","sEn":"Mistral 7B outperforms larger models like Llama 2 13B and Llama 1 34B in reasoning, math, and code, using efficient attention mechanisms.","sZh":"Mistral 7B 在推理、数学和代码生成上超越 Llama 2 13B 和 Llama 1 34B，采用分组查询注意力和滑动窗口注意力实现高效推理。"},{"id":"haotianliu-2310.03744","pid":"haotianliu","arxiv":"2310.03744","date":"2023-10-05","venue":"cs.CV","org":"Microsoft","fields":["vision","nlp"],"tEn":"Improved Baselines with Visual Instruction Tuning","tZh":"通过视觉指令调优改进基线模型","sEn":"Simple modifications to LLaVA, including using CLIP-ViT-L-336px with MLP projection and adding academic VQA data, achieve state-of-the-art across 11 benchmarks with only 1.2M public data and ~1 day training on 8 A100s.","sZh":"对LLaVA进行简单修改，包括使用带MLP投影的CLIP-ViT-L-336px并添加学术VQA数据，仅用120万公开数据和8块A100训练约1天，就在11个基准上达到最先进水平。","cites":5307},{"id":"songhan-2309.17453","pid":"songhan","arxiv":"2309.17453","date":"2023-09-29","venue":"cs.CL","org":"MIT","fields":["efficiency","nlp"],"tEn":"Efficient Streaming Language Models with Attention Sinks","tZh":"高效流式语言模型：注意力汇聚机制","sEn":"StreamingLLM enables LLMs to handle infinite-length sequences by leveraging attention sinks from initial tokens.","sZh":"StreamingLLM通过利用初始令牌的注意力汇聚机制，使大语言模型能够处理无限长度的序列。"},{"id":"anyang-2309.16609","pid":"anyang","arxiv":"2309.16609","date":"2023-09-28","venue":"cs.CL","org":"Alibaba","fields":["nlp","deep-learning"],"tEn":"Qwen Technical Report","tZh":"Qwen技术报告","sEn":"Qwen is a comprehensive LLM series with base and chat models, showing superior performance and advanced tool-use capabilities.","sZh":"Qwen是一个包含基础模型和聊天模型的大语言模型系列，展现出卓越的性能和先进的工具使用能力。","cites":3951},{"id":"lianminzheng-2309.06180","pid":"lianminzheng","arxiv":"2309.06180","date":"2023-09-12","venue":"cs.LG","org":"UC Berkeley","fields":["efficiency","nlp"],"tEn":"Efficient Memory Management for Large Language Model Serving with PagedAttention","tZh":"面向大语言模型服务的高效内存管理：PagedAttention","sEn":"PagedAttention reduces KV cache waste by 2-4x throughput improvement for LLM serving.","sZh":"PagedAttention通过类虚拟内存技术减少KV缓存浪费，使大语言模型服务吞吐量提升2-4倍。","cites":6698},{"id":"jinzebai-2308.12966","pid":"jinzebai","arxiv":"2308.12966","date":"2023-08-24","venue":"cs.CV","org":"Alibaba","fields":["vision","nlp"],"tEn":"Qwen-VL: A Versatile Vision-Language Model for Understanding, Localization, Text Reading, and Beyond","tZh":"Qwen-VL：一个多功能的视觉语言模型，用于理解、定位、文本阅读等","sEn":"Qwen-VL series achieves new records on visual-centric benchmarks and real-world dialog.","sZh":"Qwen-VL系列在视觉中心基准测试和真实世界对话中创下新纪录。","cites":2139},{"id":"aarongrattafiori-2308.12950","pid":"aarongrattafiori","arxiv":"2308.12950","date":"2023-08-24","venue":"cs.CL","org":"Meta AI","fields":["nlp"],"tEn":"Code Llama: Open Foundation Models for Code","tZh":"Code Llama：用于代码的开放基础模型","sEn":"Code Llama is a family of state-of-the-art open large language models for code, with specialized versions for Python and instruction following, supporting up to 100k tokens and infilling.","sZh":"Code Llama 是一系列用于代码的先进开放大语言模型，包含 Python 专用版和指令跟随版，支持高达 10 万 token 的输入和填充功能。","cites":3278},{"id":"jietang-2308.03688","pid":"jietang","arxiv":"2308.03688","date":"2023-08-07","venue":"cs.AI","org":"Tsinghua University / Zhipu AI","fields":["nlp","deep-learning"],"tEn":"AgentBench: Evaluating LLMs as Agents","tZh":"AgentBench：评估作为智能体的大语言模型","sEn":"AgentBench is a multi-dimensional benchmark with 8 environments to evaluate LLMs as agents, revealing significant performance gaps between top commercial and open-source models.","sZh":"AgentBench是一个包含8个不同环境的多维基准，用于评估作为智能体的大语言模型，揭示了顶级商业模型与开源模型之间的显著性能差距。","cites":1006},{"id":"abrohan-2307.15818","pid":"abrohan","arxiv":"2307.15818","date":"2023-07-28","venue":"cs.RO","org":"Google DeepMind","fields":["deep-learning","vision"],"tEn":"RT-2: Vision-Language-Action Models Transfer Web Knowledge to Robotic Control","tZh":"RT-2：视觉-语言-动作模型将网络知识迁移至机器人控制","sEn":"RT-2 integrates web-scale vision-language models into robotic control, enabling emergent semantic reasoning and generalization.","sZh":"RT-2将网络规模的视觉-语言模型融入机器人控制，实现了涌现的语义推理和泛化能力。","cites":3336},{"id":"aarongrattafiori-2307.09288","pid":"aarongrattafiori","arxiv":"2307.09288","date":"2023-07-18","venue":"cs.CL","org":"Meta AI","fields":["nlp","deep-learning"],"tEn":"Llama 2: Open Foundation and Fine-Tuned Chat Models","tZh":"Llama 2：开放的基础模型与微调聊天模型","sEn":"Llama 2 is a collection of pretrained and fine-tuned LLMs from 7B to 70B parameters, with Llama 2-Chat optimized for dialogue, outperforming open-source models and potentially substituting closed-source ones.","sZh":"Llama 2 是一系列从70亿到700亿参数的预训练和微调大语言模型，其中 Llama 2-Chat 针对对话场景优化，性能超越开源模型，有望替代闭源模型。","cites":17393},{"id":"furuwei-2307.08621","pid":"furuwei","arxiv":"2307.08621","date":"2023-07-17","venue":"cs.CL","org":"Microsoft Research Asia","fields":["deep-learning","efficiency"],"tEn":"Retentive Network: A Successor to Transformer for Large Language Models","tZh":"Retentive Network：大型语言模型中Transformer的继任者","sEn":"RetNet achieves training parallelism, low-cost O(1) inference, and good performance, making it a strong successor to Transformer for large language models.","sZh":"RetNet实现了训练并行性、低成本O(1)推理和良好性能，成为大型语言模型中Transformer的有力继任者。","cites":696},{"id":"tridao-2307.08691","pid":"tridao","arxiv":"2307.08691","date":"2023-07-17","venue":"cs.LG","org":"Princeton University / Stanford University","fields":["efficiency","deep-learning"],"tEn":"FlashAttention-2: Faster Attention with Better Parallelism and Work Partitioning","tZh":"FlashAttention-2：通过更好的并行性和工作分区实现更快的注意力机制","sEn":"FlashAttention-2 achieves up to 2x speedup over FlashAttention by improving work partitioning and parallelism, reaching 50-73% of theoretical max FLOPs/s on A100.","sZh":"FlashAttention-2通过改进工作分区和并行性，相比FlashAttention实现了高达2倍的加速，在A100上达到理论最大FLOPs/s的50-73%。","cites":2881},{"id":"rrombach-2307.01952","pid":"rrombach","arxiv":"2307.01952","date":"2023-07-04","venue":"cs.CV","org":"Stability AI","fields":["generative","vision"],"tEn":"SDXL: Improving Latent Diffusion Models for High-Resolution Image Synthesis","tZh":"SDXL：改进潜在扩散模型以实现高分辨率图像合成","sEn":"SDXL improves latent diffusion models for high-resolution text-to-image synthesis with a larger UNet, dual text encoders, and a refinement model.","sZh":"SDXL通过更大的UNet、双文本编码器和精炼模型，改进了潜在扩散模型，实现了高分辨率文本到图像合成。","cites":4946},{"id":"dieterfox-2306.14896","pid":"dieterfox","arxiv":"2306.14896","date":"2023-06-26","venue":"cs.RO","org":"NVIDIA","fields":["vision","deep-learning"],"tEn":"RVT: Robotic View Transformer for 3D Object Manipulation","tZh":"RVT：用于3D物体操作的机器人视角变换器","sEn":"RVT achieves 26% higher success than state-of-the-art, trains 36x faster, and works across 18 tasks with few real-world demos.","sZh":"RVT比现有最优方法成功率提高26%，训练速度快36倍，仅需少量真实演示即可完成18种任务。","cites":279},{"id":"adefossez-2306.05284","pid":"adefossez","arxiv":"2306.05284","date":"2023-06-08","venue":"cs.SD","org":"Meta AI","fields":["deep-learning","generative"],"tEn":"Simple and Controllable Music Generation","tZh":"简单可控的音乐生成","sEn":"MusicGen is a single-stage language model that generates high-quality music from text or melody, outperforming baselines.","sZh":"MusicGen 是一个单阶段语言模型，能从文本或旋律生成高质量音乐，性能优于基线模型。","cites":714},{"id":"songhan-2306.00978","pid":"songhan","arxiv":"2306.00978","date":"2023-06-01","venue":"cs.CL","org":"MIT","fields":["efficiency","nlp"],"tEn":"AWQ: Activation-aware Weight Quantization for LLM Compression and Acceleration","tZh":"AWQ：面向大语言模型压缩与加速的激活感知权重量化","sEn":"AWQ protects only 1% salient weights by scaling up their channels based on activation distribution, achieving hardware-friendly low-bit quantization without backpropagation.","sZh":"AWQ通过基于激活分布缩放显著权重通道，仅保护1%的权重即可大幅降低量化误差，实现无需反向传播的硬件友好型低位量化。","cites":1478},{"id":"hlightman-2305.20050","pid":"hlightman","arxiv":"2305.20050","date":"2023-05-31","venue":"cs.LG","org":"OpenAI","fields":["nlp","rl"],"tEn":"Let's Verify Step by Step","tZh":"让我们逐步验证","sEn":"Process supervision significantly outperforms outcome supervision for training reliable large language models on complex math problems.","sZh":"过程监督在训练可靠的大型语言模型解决复杂数学问题方面显著优于结果监督。","cites":3656},{"id":"rrafailov-2305.18290","pid":"rrafailov","arxiv":"2305.18290","date":"2023-05-29","venue":"cs.LG","org":"Stanford","fields":["rl","nlp"],"tEn":"Direct Preference Optimization: Your Language Model is Secretly a Reward Model","tZh":"直接偏好优化：你的语言模型其实是一个奖励模型","sEn":"DPO simplifies RLHF by directly optimizing the policy using a classification loss, eliminating the need for a separate reward model and reinforcement learning.","sZh":"DPO通过分类损失直接优化策略，简化了RLHF，无需单独训练奖励模型和使用强化学习。","cites":9323},{"id":"jimfan-2305.16291","pid":"jimfan","arxiv":"2305.16291","date":"2023-05-25","venue":"cs.AI","fields":["rl"],"tEn":"Voyager: An Open-Ended Embodied Agent with Large Language Models","tZh":"Voyager：基于大型语言模型的开放式具身智能体","sEn":"Voyager is the first LLM-powered embodied lifelong learning agent in Minecraft that continuously explores, acquires skills, and makes discoveries without human intervention.","sZh":"Voyager是首个由大型语言模型驱动的Minecraft具身终身学习智能体，无需人工干预即可持续探索、获取技能并做出新发现。","cites":1836,"org":"NVIDIA"},{"id":"junzhu-2305.16213","pid":"junzhu","arxiv":"2305.16213","date":"2023-05-25","venue":"cs.LG","org":"Tsinghua University","fields":["generative","vision"],"tEn":"ProlificDreamer: High-Fidelity and Diverse Text-to-3D Generation with Variational Score Distillation","tZh":"ProlificDreamer：基于变分分数蒸馏的高保真、多样化文本到3D生成","sEn":"ProlificDreamer introduces variational score distillation (VSD) to address over-saturation, over-smoothing, and low-diversity in text-to-3D generation, achieving high-fidelity and diverse results.","sZh":"ProlificDreamer提出变分分数蒸馏（VSD），解决了文本到3D生成中的过饱和、过平滑和低多样性问题，实现了高保真和多样化的结果。","cites":1387},{"id":"jainslie-2305.13245","pid":"jainslie","arxiv":"2305.13245","date":"2023-05-22","venue":"cs.CL","org":"Google","fields":["efficiency","nlp"],"tEn":"GQA: Training Generalized Multi-Query Transformer Models from Multi-Head Checkpoints","tZh":"GQA：从多头检查点训练通用多查询Transformer模型","sEn":"Uptraining multi-head checkpoints to grouped-query attention achieves near multi-head quality with MQA-like speed.","sZh":"通过微调将多头检查点转换为分组查询注意力，可在接近多头质量的同时获得类似多查询注意力的速度。","cites":1533},{"id":"czhou-2305.11206","pid":"czhou","arxiv":"2305.11206","date":"2023-05-18","venue":"cs.CL","org":"Meta AI","fields":["nlp","deep-learning"],"tEn":"LIMA: Less Is More for Alignment","tZh":"LIMA：少即是多——对齐的简约之道","sEn":"Almost all knowledge in large language models is learned during pretraining, and only limited instruction tuning data is necessary to teach models to produce high quality output.","sZh":"大型语言模型中的几乎所有知识都是在预训练阶段学到的，只需有限的指令微调数据即可教会模型生成高质量输出。","cites":1329},{"id":"shunyuyao-2305.10601","pid":"shunyuyao","arxiv":"2305.10601","date":"2023-05-17","venue":"cs.CL","org":"Princeton University / Google DeepMind","fields":["nlp","deep-learning"],"tEn":"Tree of Thoughts: Deliberate Problem Solving with Large Language Models","tZh":"思维树：利用大型语言模型进行深思熟虑的问题解决","sEn":"Tree of Thoughts (ToT) enables language models to explore multiple reasoning paths and make deliberate decisions, significantly improving problem-solving on tasks requiring planning or search.","sZh":"思维树（ToT）使语言模型能够探索多条推理路径并做出深思熟虑的决策，在需要规划或搜索的任务上显著提升问题解决能力。"},{"id":"junnanli-2305.06500","pid":"junnanli","arxiv":"2305.06500","date":"2023-05-11","venue":"cs.CV","org":"Salesforce","fields":["vision","nlp"],"tEn":"InstructBLIP: Towards General-purpose Vision-Language Models with Instruction Tuning","tZh":"InstructBLIP：面向通用视觉-语言模型的指令微调","sEn":"InstructBLIP achieves state-of-the-art zero-shot performance on 13 held-out datasets by instruction tuning on 26 datasets with an instruction-aware Query Transformer.","sZh":"InstructBLIP通过指令感知的查询变换器在26个数据集上进行指令微调，在13个保留数据集上取得了最先进的零样本性能。","cites":3589},{"id":"rgirshick-2305.05665","pid":"rgirshick","arxiv":"2305.05665","date":"2023-05-09","venue":"cs.CV","org":"Meta AI","fields":["vision","generative"],"tEn":"ImageBind: One Embedding Space To Bind Them All","tZh":"ImageBind: 一个嵌入空间绑定所有模态","sEn":"ImageBind learns a joint embedding across six modalities using only image-paired data, enabling zero-shot cross-modal retrieval and generation.","sZh":"ImageBind仅利用图像配对数据学习六种模态的联合嵌入，实现了零样本跨模态检索和生成。"},{"id":"finn-2304.13705","pid":"finn","arxiv":"2304.13705","date":"2023-04-23","venue":"cs.RO","org":"Stanford","fields":["rl","vision"],"tEn":"Learning Fine-Grained Bimanual Manipulation with Low-Cost Hardware","tZh":"利用低成本硬件学习精细双手操作","sEn":"A low-cost system with imitation learning enables fine bimanual manipulation tasks with high success rates.","sZh":"一种低成本系统通过模仿学习实现精细双手操作任务，成功率高达80-90%。","cites":1848},{"id":"deyaopeng-2304.10592","pid":"deyaopeng","arxiv":"2304.10592","date":"2023-04-20","venue":"cs.CV","org":"KAUST","fields":["vision","nlp"],"tEn":"MiniGPT-4: Enhancing Vision-Language Understanding with Advanced Large Language Models","tZh":"MiniGPT-4：利用先进大语言模型增强视觉语言理解","sEn":"MiniGPT-4 aligns a frozen visual encoder with a frozen advanced LLM using one projection layer, achieving GPT-4-like multi-modal abilities.","sZh":"MiniGPT-4通过一个投影层将冻结的视觉编码器与冻结的先进大语言模型对齐，实现了类似GPT-4的多模态能力。"},{"id":"haotianliu-2304.08485","pid":"haotianliu","arxiv":"2304.08485","date":"2023-04-17","venue":"cs.CV","org":"Microsoft","fields":["vision","nlp"],"tEn":"Visual Instruction Tuning","tZh":"视觉指令微调","sEn":"LLaVA: an end-to-end trained large multimodal model connecting a vision encoder and LLM for general-purpose visual and language understanding, achieving impressive multimodal chat abilities and state-of-the-art accuracy on Science QA.","sZh":"LLaVA：一个端到端训练的大型多模态模型，连接视觉编码器和LLM，实现通用视觉与语言理解，展现出令人印象深刻的多模态对话能力，并在Science QA上达到最先进准确率。","cites":9951},{"id":"moquab-2304.07193","pid":"moquab","arxiv":"2304.07193","date":"2023-04-14","venue":"cs.CV","org":"Meta AI","fields":["vision","deep-learning"],"tEn":"DINOv2: Learning Robust Visual Features without Supervision","tZh":"DINOv2：无需监督学习鲁棒视觉特征","sEn":"Self-supervised pretraining on diverse curated data yields universal visual features that outperform prior methods.","sZh":"在多样化精选数据上进行自监督预训练，可产生超越先前方法的通用视觉特征。","cites":8853},{"id":"xinlongwang-2304.03284","pid":"xinlongwang","arxiv":"2304.03284","date":"2023-04-06","venue":"cs.CV","org":"BAAI","fields":["vision","deep-learning"],"tEn":"SegGPT: Segmenting Everything In Context","tZh":"SegGPT: 在上下文中分割一切","sEn":"SegGPT unifies diverse segmentation tasks into a generalist in-context learning framework, enabling arbitrary segmentation via in-context inference.","sZh":"SegGPT 将多种分割任务统一到一个通用的上下文学习框架中，通过上下文推理实现任意分割。","cites":274},{"id":"rgirshick-2304.02643","pid":"rgirshick","arxiv":"2304.02643","date":"2023-04-05","venue":"cs.CV","org":"Meta AI","fields":["vision"],"tEn":"Segment Anything","tZh":"分割一切","sEn":"We introduce Segment Anything, a promptable segmentation model and the largest dataset (SA-1B) with 1B masks on 11M images, achieving impressive zero-shot performance.","sZh":"我们提出了分割一切项目，包括一个可提示的分割模型和迄今为止最大的分割数据集（SA-1B），包含11M张图像上的10亿个掩码，其零样本性能令人印象深刻。","cites":14170},{"id":"xiaohuazhai-2303.15343","pid":"xiaohuazhai","arxiv":"2303.15343","date":"2023-03-27","venue":"cs.CV","org":"Google DeepMind","fields":["vision","nlp"],"tEn":"Sigmoid Loss for Language Image Pre-Training","tZh":"语言-图像预训练的Sigmoid损失","sEn":"We propose a simple pairwise Sigmoid loss for Language-Image Pre-training (SigLIP) that outperforms softmax-based contrastive learning, especially at small batch sizes, and achieves 84.5% ImageNet zero-shot accuracy with only four TPUv4 chips in two days.","sZh":"我们提出了一种用于语言-图像预训练的简单成对Sigmoid损失（SigLIP），它优于基于softmax的对比学习，尤其是在小批量大小下，并且仅用四个TPUv4芯片在两天内就达到了84.5%的ImageNet零样本准确率。","cites":3226},{"id":"openai-2303.08774","pid":"openai","arxiv":"2303.08774","date":"2023-03-15","venue":"cs.CL","org":"OpenAI","fields":["nlp","deep-learning"],"tEn":"GPT-4 Technical Report","tZh":"GPT-4技术报告","sEn":"GPT-4 achieves human-level performance on professional and academic benchmarks, including passing a simulated bar exam in the top 10%.","sZh":"GPT-4在专业和学术基准测试中达到人类水平，包括在模拟律师资格考试中进入前10%。","cites":25516},{"id":"leizhangidea-2303.05499","pid":"leizhangidea","arxiv":"2303.05499","date":"2023-03-09","venue":"cs.CV","org":"IDEA Research","fields":["vision","nlp"],"tEn":"Grounding DINO: Marrying DINO with Grounded Pre-Training for Open-Set Object Detection","tZh":"Grounding DINO：将DINO与接地预训练相结合，实现开放集目标检测","sEn":"Grounding DINO marries DINO with grounded pre-training for open-set object detection, achieving 52.5 AP on COCO zero-shot and 26.1 mAP on ODinW.","sZh":"Grounding DINO 将 DINO 与接地预训练相结合，实现开放集目标检测，在 COCO 零样本上达到 52.5 AP，在 ODinW 上达到 26.1 mAP。","cites":4338},{"id":"chengchi-2303.04137","pid":"chengchi","arxiv":"2303.04137","date":"2023-03-07","venue":"cs.RO","org":"Stanford","fields":["generative","vision"],"tEn":"Diffusion Policy: Visuomotor Policy Learning via Action Diffusion","tZh":"扩散策略：通过动作扩散进行视觉运动策略学习","sEn":"Diffusion Policy outperforms existing methods by 46.9% on average across 12 robot tasks.","sZh":"扩散策略在12个机器人任务上平均超越现有方法46.9%。","cites":3400},{"id":"yangsong-2303.01469","pid":"yangsong","arxiv":"2303.01469","date":"2023-03-02","venue":"cs.LG","org":"OpenAI","fields":["generative","efficiency"],"tEn":"Consistency Models","tZh":"一致性模型","sEn":"Consistency models enable fast one-step generation by directly mapping noise to data, outperforming diffusion models in speed while maintaining high quality.","sZh":"一致性模型通过直接将噪声映射到数据，实现快速单步生成，在保持高质量的同时速度优于扩散模型。","cites":1939},{"id":"aarongrattafiori-2302.13971","pid":"aarongrattafiori","arxiv":"2302.13971","date":"2023-02-27","venue":"cs.CL","org":"Meta AI","fields":["nlp","deep-learning"],"tEn":"LLaMA: Open and Efficient Foundation Language Models","tZh":"LLaMA：开放且高效的基础语言模型","sEn":"LLaMA-13B outperforms GPT-3 on most benchmarks, and LLaMA-65B is competitive with Chinchilla-70B and PaLM-540B.","sZh":"LLaMA-13B在大多数基准测试上优于GPT-3，LLaMA-65B与Chinchilla-70B和PaLM-540B等最佳模型不相上下。","cites":20534},{"id":"lvminzhang-2302.05543","pid":"lvminzhang","arxiv":"2302.05543","date":"2023-02-10","venue":"cs.CV","org":"Stanford","fields":["generative","vision"],"tEn":"Adding Conditional Control to Text-to-Image Diffusion Models","tZh":"向文本到图像扩散模型添加条件控制","sEn":"ControlNet adds spatial conditioning controls to pretrained text-to-image diffusion models via zero convolutions.","sZh":"ControlNet通过零卷积为预训练的文本到图像扩散模型添加空间条件控制。","cites":7164},{"id":"timoschick-2302.04761","pid":"timoschick","arxiv":"2302.04761","date":"2023-02-09","venue":"cs.CL","org":"Meta AI","fields":["nlp"],"tEn":"Toolformer: Language Models Can Teach Themselves to Use Tools","tZh":"Toolformer：语言模型可以自学使用工具","sEn":"Language models can teach themselves to use external tools via simple APIs, achieving better performance without sacrificing core language modeling abilities.","sZh":"语言模型可以通过简单的API自学使用外部工具，在提升性能的同时不牺牲核心语言建模能力。"},{"id":"junnanli-2301.12597","pid":"junnanli","arxiv":"2301.12597","date":"2023-01-30","venue":"cs.CV","org":"Salesforce","fields":["vision","nlp"],"tEn":"BLIP-2: Bootstrapping Language-Image Pre-training with Frozen Image Encoders and Large Language Models","tZh":"BLIP-2：利用冻结的图像编码器和大型语言模型引导语言-图像预训练","sEn":"BLIP-2 bridges the modality gap with a lightweight Querying Transformer, achieving state-of-the-art performance with 54x fewer trainable parameters than Flamingo80B.","sZh":"BLIP-2通过轻量级查询Transformer弥合模态差距，以比Flamingo80B少54倍的可训练参数实现了最先进的性能。","cites":8340},{"id":"massran-2301.08243","pid":"massran","arxiv":"2301.08243","date":"2023-01-19","venue":"cs.CV","org":"Meta AI","fields":["vision","deep-learning"],"tEn":"Self-Supervised Learning from Images with a Joint-Embedding Predictive Architecture","tZh":"基于联合嵌入预测架构的图像自监督学习","sEn":"I-JEPA learns semantic image representations by predicting target block representations from a single context block without hand-crafted augmentations.","sZh":"I-JEPA通过从单个上下文块预测目标块表示来学习语义图像表示，无需手工数据增强。"},{"id":"dhafner-2301.04104","pid":"dhafner","arxiv":"2301.04104","date":"2023-01-10","venue":"cs.AI","org":"Google DeepMind / University of Toronto","fields":["rl","generative"],"tEn":"Mastering Diverse Domains through World Models","tZh":"通过世界模型掌握多样领域","sEn":"DreamerV3 is a general algorithm that outperforms specialized methods across over 150 diverse tasks with a single configuration, learning a world model to imagine future scenarios.","sZh":"DreamerV3是一种通用算法，通过单一配置在超过150个不同任务上超越专门方法，它学习环境模型并想象未来场景来改进行为。","cites":1201},{"id":"remilam-2212.12794","pid":"remilam","arxiv":"2212.12794","date":"2022-12-24","venue":"cs.LG","org":"Google DeepMind","fields":["deep-learning"],"tEn":"GraphCast: Learning skillful medium-range global weather forecasting","tZh":"GraphCast：学习进行熟练的中期全球天气预报","sEn":"GraphCast, a machine learning model, outperforms traditional numerical weather prediction on 90% of verification targets and forecasts severe events better.","sZh":"GraphCast是一种机器学习模型，在90%的验证目标上优于传统数值天气预报，并能更好地预测极端事件。","cites":411},{"id":"wpeebles-2212.09748","pid":"wpeebles","arxiv":"2212.09748","date":"2022-12-19","venue":"cs.CV","org":"UC Berkeley / Meta AI","fields":["generative","vision"],"tEn":"Scalable Diffusion Models with Transformers","tZh":"基于Transformer的可扩展扩散模型","sEn":"Diffusion Transformers (DiTs) scale with Gflops and achieve state-of-the-art FID on ImageNet.","sZh":"扩散Transformer（DiT）随Gflops扩展，在ImageNet上达到最先进FID。","cites":6355},{"id":"anthropic-2212.09251","pid":"anthropic","arxiv":"2212.09251","date":"2022-12-19","venue":"cs.CL","org":"Anthropic","fields":["safety","nlp"],"tEn":"Discovering Language Model Behaviors with Model-Written Evaluations","tZh":"通过模型编写的评估发现语言模型行为","sEn":"LM-written evaluations are high-quality and enable rapid discovery of novel LM behaviors.","sZh":"语言模型编写的评估质量高，能快速发现新的语言模型行为。","cites":874},{"id":"openai-2212.08751","pid":"openai","arxiv":"2212.08751","date":"2022-12-16","venue":"cs.CV","org":"OpenAI","fields":["generative","vision"],"tEn":"Point-E: A System for Generating 3D Point Clouds from Complex Prompts","tZh":"Point-E: 一种从复杂提示生成3D点云的系统","sEn":"Point-E generates 3D point clouds from text prompts in 1-2 minutes on a single GPU, offering a practical speed-quality trade-off.","sZh":"Point-E 能在单个GPU上1-2分钟内从文本提示生成3D点云，提供了速度与质量之间的实用权衡。","cites":858},{"id":"ybai-2212.08073","pid":"ybai","arxiv":"2212.08073","date":"2022-12-15","venue":"cs.CL","org":"Anthropic","fields":["safety","nlp"],"tEn":"Constitutional AI: Harmlessness from AI Feedback","tZh":"宪法式AI：来自AI反馈的无害性","sEn":"Constitutional AI trains harmless AI assistants via self-improvement using only a list of principles, without human labels for harmful outputs.","sZh":"宪法式AI通过自我改进训练无害的AI助手，仅使用原则列表，无需人类标记有害输出。","cites":3216},{"id":"abrohan-2212.06817","pid":"abrohan","arxiv":"2212.06817","date":"2022-12-13","venue":"cs.RO","org":"Google","fields":["deep-learning","vision"],"tEn":"RT-1: Robotics Transformer for Real-World Control at Scale","tZh":"RT-1：面向大规模真实世界控制的机器人Transformer","sEn":"RT-1 shows that large-scale, diverse robotic data combined with high-capacity Transformer models enables strong generalization in real-world robot control.","sZh":"RT-1表明，大规模多样化机器人数据与高容量Transformer模型相结合，能够在真实世界机器人控制中实现强大的泛化能力。","cites":2357},{"id":"aradford-2212.04356","pid":"aradford","arxiv":"2212.04356","date":"2022-12-06","venue":"eess.AS","org":"OpenAI","fields":["deep-learning","nlp"],"tEn":"Robust Speech Recognition via Large-Scale Weak Supervision","tZh":"通过大规模弱监督实现鲁棒语音识别","sEn":"Scaling weakly supervised speech recognition to 680,000 hours yields models competitive with fully supervised ones in zero-shot settings.","sZh":"将弱监督语音识别扩展到68万小时，得到的模型在零样本设置下与全监督模型竞争力相当。","cites":7426},{"id":"xinlongwang-2212.02499","pid":"xinlongwang","arxiv":"2212.02499","date":"2022-12-05","venue":"cs.CV","org":"BAAI","fields":["vision","deep-learning","generative"],"tEn":"Images Speak in Images: A Generalist Painter for In-Context Visual Learning","tZh":"图像以图像言说：面向上下文视觉学习的通才画家","sEn":"Painter redefines vision tasks as image-to-image problems, enabling in-context learning with image prompts.","sZh":"Painter将视觉任务重新定义为图像到图像的问题，通过图像提示实现上下文学习。"},{"id":"songhan-2211.10438","pid":"songhan","arxiv":"2211.10438","date":"2022-11-18","venue":"cs.CL","org":"MIT","fields":["efficiency","nlp"],"tEn":"SmoothQuant: Accurate and Efficient Post-Training Quantization for Large Language Models","tZh":"SmoothQuant：大型语言模型的准确高效训练后量化","sEn":"SmoothQuant enables accurate and efficient 8-bit weight and activation quantization for LLMs without training.","sZh":"SmoothQuant 实现了大型语言模型无需训练的8位权重和激活量化，准确且高效。","cites":1687},{"id":"aarongrattafiori-2211.09085","pid":"aarongrattafiori","arxiv":"2211.09085","date":"2022-11-16","venue":"cs.CL","org":"Meta AI","fields":["nlp"],"tEn":"Galactica: A Large Language Model for Science","tZh":"Galactica：面向科学的大型语言模型","sEn":"Galactica, a large language model for science, outperforms existing models on scientific tasks and sets new state-of-the-art on benchmarks like PubMedQA and MedMCQA.","sZh":"Galactica 是一款面向科学的大型语言模型，在科学任务上超越现有模型，并在 PubMedQA 和 MedMCQA 等基准测试中创下新纪录。","cites":1042},{"id":"wenhaiwang-2211.05778","pid":"wenhaiwang","arxiv":"2211.05778","date":"2022-11-10","venue":"cs.CV","org":"Shanghai AI Lab","fields":["vision","deep-learning"],"tEn":"InternImage: Exploring Large-Scale Vision Foundation Models with Deformable Convolutions","tZh":"InternImage：利用可变形卷积探索大规模视觉基础模型","sEn":"InternImage uses deformable convolution to achieve ViT-like scaling in CNNs, setting new records on COCO and ADE20K.","sZh":"InternImage采用可变形卷积作为核心算子，使CNN模型像ViT一样从参数和数据增长中获益，在COCO和ADE20K上创下新纪录。","cites":1124},{"id":"ybai-2211.03540","pid":"ybai","arxiv":"2211.03540","date":"2022-11-04","venue":"cs.HC","org":"Anthropic","fields":["safety","nlp"],"tEn":"Measuring Progress on Scalable Oversight for Large Language Models","tZh":"衡量大型语言模型可扩展监督的进展","sEn":"Scalable oversight for LLMs can be studied empirically using tasks where humans with model assistance outperform both alone.","sZh":"可扩展监督问题可通过人类与模型协作在困难任务上超越单独表现来实证研究。","cites":215},{"id":"lingxixie-2211.02556","pid":"lingxixie","arxiv":"2211.02556","date":"2022-11-03","venue":"physics.ao-ph","org":"Huawei","fields":["deep-learning","vision"],"tEn":"Pangu-Weather: A 3D High-Resolution Model for Fast and Accurate Global Weather Forecast","tZh":"盘古天气：一种用于快速准确全球天气预报的3D高分辨率模型","sEn":"Pangu-Weather is the first AI-based method to outperform traditional numerical weather prediction in accuracy across all factors and time ranges.","sZh":"盘古天气是首个在准确度上超越传统数值天气预报的AI方法，覆盖所有气象要素和时间范围。","cites":273},{"id":"adefossez-2210.13438","pid":"adefossez","arxiv":"2210.13438","date":"2022-10-24","venue":"eess.AS","org":"Meta AI","fields":["deep-learning","efficiency"],"tEn":"High Fidelity Neural Audio Compression","tZh":"高保真神经音频压缩","sEn":"We introduce a real-time, high-fidelity neural audio codec with a novel loss balancer and lightweight Transformer for further compression.","sZh":"我们提出了一种实时高保真神经音频编解码器，采用新颖的损失平衡器和轻量级Transformer进一步压缩。","cites":1223},{"id":"aqjiang-2210.12283","pid":"aqjiang","arxiv":"2210.12283","date":"2022-10-21","venue":"cs.AI","org":"University of Cambridge / Meta AI","fields":["nlp","deep-learning","generative"],"tEn":"Draft, Sketch, and Prove: Guiding Formal Theorem Provers with Informal Proofs","tZh":"草稿、草图与证明：用非形式化证明指导形式化定理证明器","sEn":"Draft, Sketch, and Prove (DSP) uses informal proofs to guide formal theorem provers, improving success rate from 20.9% to 39.3% on math competition problems.","sZh":"DSP方法利用非形式化证明指导形式化定理证明器，在数学竞赛问题集上将成功率从20.9%提升至39.3%。"},{"id":"hwchung-2210.11416","pid":"hwchung","arxiv":"2210.11416","date":"2022-10-20","venue":"cs.LG","org":"Google","fields":["nlp","deep-learning"],"tEn":"Scaling Instruction-Finetuned Language Models","tZh":"扩展指令微调语言模型","sEn":"Instruction finetuning with more tasks, larger models, and chain-of-thought data significantly boosts performance across diverse models and benchmarks.","sZh":"通过增加任务数量、扩大模型规模以及使用思维链数据进行指令微调，能显著提升各类模型在多种基准测试上的性能。","cites":4230},{"id":"shunyuyao-2210.03629","pid":"shunyuyao","arxiv":"2210.03629","date":"2022-10-06","venue":"cs.CL","org":"Princeton University / Google","fields":["nlp","rl"],"tEn":"ReAct: Synergizing Reasoning and Acting in Language Models","tZh":"ReAct：在语言模型中协同推理与行动","sEn":"ReAct synergizes reasoning and acting in LLMs, outperforming baselines on QA, fact verification, and interactive tasks.","sZh":"ReAct协同语言模型中的推理与行动，在问答、事实验证和交互任务上超越基线。"},{"id":"jimfan-2210.03094","pid":"jimfan","arxiv":"2210.03094","date":"2022-10-06","venue":"cs.RO","org":"NVIDIA","fields":["rl","vision","deep-learning"],"tEn":"VIMA: General Robot Manipulation with Multimodal Prompts","tZh":"VIMA：基于多模态提示的通用机器人操作","sEn":"VIMA uses multimodal prompts to unify diverse robot manipulation tasks, achieving strong generalization and data efficiency.","sZh":"VIMA通过多模态提示统一多种机器人操作任务，在零样本泛化中成功率提升2.9倍，数据效率提升2.7倍。"},{"id":"jietang-2210.02414","pid":"jietang","arxiv":"2210.02414","date":"2022-10-05","venue":"cs.CL","org":"Zhipu AI","fields":["nlp","deep-learning"],"tEn":"GLM-130B: An Open Bilingual Pre-trained Model","tZh":"GLM-130B：一个开放的双语预训练模型","sEn":"GLM-130B is a 130B bilingual model that outperforms GPT-3 on many benchmarks and achieves INT4 quantization without performance loss.","sZh":"GLM-130B是一个1300亿参数的双语预训练模型，在多个英文基准上超越GPT-3，并首次实现百亿级模型的INT4量化，性能几乎无损。"},{"id":"anthropic-2209.10652","pid":"anthropic","arxiv":"2209.10652","date":"2022-09-21","venue":"cs.LG","org":"Anthropic","fields":["safety"],"tEn":"Toy Models of Superposition","tZh":"叠加的玩具模型","sEn":"Polysemanticity arises from models storing sparse features in superposition, with a phase change and geometric connections to uniform polytopes.","sZh":"多义性源于模型以叠加方式存储稀疏特征，存在相变现象，并与均匀多面体几何相关。","cites":902},{"id":"nzeghidour-2209.03143","pid":"nzeghidour","arxiv":"2209.03143","date":"2022-09-07","venue":"cs.SD","org":"Google","fields":["deep-learning","generative"],"tEn":"AudioLM: a Language Modeling Approach to Audio Generation","tZh":"AudioLM：一种基于语言建模的音频生成方法","sEn":"AudioLM generates high-quality audio with long-term consistency by treating audio generation as a language modeling task.","sZh":"AudioLM 通过将音频生成视为语言建模任务，实现了高质量且具有长期一致性的音频生成。","cites":966},{"id":"anthropic-2209.07858","pid":"anthropic","arxiv":"2209.07858","date":"2022-08-23","venue":"cs.CL","org":"Anthropic","fields":["safety"],"tEn":"Red Teaming Language Models to Reduce Harms: Methods, Scaling Behaviors, and Lessons Learned","tZh":"红队测试语言模型以减少危害：方法、扩展行为与经验教训","sEn":"Red teaming language models reveals scaling challenges for RLHF models and provides a dataset of 38,961 attacks.","sZh":"红队测试语言模型揭示了RLHF模型在扩展时的挑战，并提供了38,961次攻击的数据集。"},{"id":"jonathanho-2207.12598","pid":"jonathanho","arxiv":"2207.12598","date":"2022-07-26","venue":"cs.LG","org":"Google","fields":["generative","deep-learning"],"tEn":"Classifier-Free Diffusion Guidance","tZh":"无分类器扩散引导","sEn":"Classifier-free guidance combines conditional and unconditional diffusion models to trade off sample quality and diversity without a separate classifier.","sZh":"无分类器引导通过联合训练条件和无条件扩散模型，结合两者的分数估计，在不依赖独立分类器的情况下实现样本质量与多样性的权衡。","cites":6509},{"id":"anthropic-2207.05221","pid":"anthropic","arxiv":"2207.05221","date":"2022-07-11","venue":"cs.CL","org":"Anthropic","fields":["safety","nlp"],"tEn":"Language Models (Mostly) Know What They Know","tZh":"语言模型（大多）知道它们知道什么","sEn":"Language models can self-evaluate the validity of their own claims and predict answerability, with performance improving through self-consistency and context.","sZh":"语言模型能够自我评估自身主张的有效性并预测可回答性，通过自洽性和上下文信息可提升表现。","cites":1713},{"id":"jimfan-2206.08853","pid":"jimfan","arxiv":"2206.08853","date":"2022-06-17","venue":"cs.LG","org":"NVIDIA","fields":["rl","deep-learning","generative"],"tEn":"MineDojo: Building Open-Ended Embodied Agents with Internet-Scale Knowledge","tZh":"MineDojo：利用互联网规模知识构建开放式具身智能体","sEn":"MineDojo integrates internet-scale knowledge with Minecraft to train generalist embodied agents on thousands of open-ended tasks.","sZh":"MineDojo将互联网规模的知识与Minecraft游戏相结合，训练通用具身智能体完成数千种开放式任务。","cites":584},{"id":"jasonwei-2206.07682","pid":"jasonwei","arxiv":"2206.07682","date":"2022-06-15","venue":"cs.CL","org":"Google","fields":["nlp","deep-learning"],"tEn":"Emergent Abilities of Large Language Models","tZh":"大型语言模型的涌现能力","sEn":"Emergent abilities are unpredictable capabilities that appear only in large language models, not in smaller ones.","sZh":"涌现能力是指仅在大型语言模型中出现、而在较小模型中不存在的不可预测的能力。","cites":3617},{"id":"junzhu-2206.00927","pid":"junzhu","arxiv":"2206.00927","date":"2022-06-02","venue":"cs.LG","org":"Tsinghua University","fields":["generative","efficiency"],"tEn":"DPM-Solver: A Fast ODE Solver for Diffusion Probabilistic Model Sampling in Around 10 Steps","tZh":"DPM-Solver：一种用于扩散概率模型快速采样的常微分方程求解器","sEn":"DPM-Solver generates high-quality samples in 10-20 steps by analytically solving the linear part of diffusion ODEs.","sZh":"DPM-Solver通过解析求解扩散常微分方程的线性部分，仅需10-20步即可生成高质量样本。"},{"id":"tkarras-2206.00364","pid":"tkarras","arxiv":"2206.00364","date":"2022-06-01","venue":"cs.CV","org":"NVIDIA","fields":["generative","deep-learning"],"tEn":"Elucidating the Design Space of Diffusion-Based Generative Models","tZh":"阐明扩散生成模型的设计空间","sEn":"We present a clear design space for diffusion models, achieving state-of-the-art FID scores with faster sampling.","sZh":"我们提出了一个清晰的扩散模型设计空间，实现了更快的采样速度和最先进的FID分数。","cites":3521},{"id":"songhan-2205.14756","pid":"songhan","arxiv":"2205.14756","date":"2022-05-29","venue":"cs.CV","org":"MIT","fields":["efficiency","vision"],"tEn":"EfficientViT: Multi-Scale Linear Attention for High-Resolution Dense Prediction","tZh":"EfficientViT：用于高分辨率密集预测的多尺度线性注意力","sEn":"EfficientViT achieves global receptive field and multi-scale learning with lightweight, hardware-efficient operations, outperforming prior models in speed and accuracy on high-resolution dense prediction tasks.","sZh":"EfficientViT通过轻量且硬件高效的操作实现全局感受野和多尺度学习，在高分辨率密集预测任务中，其速度和精度均超越先前模型。","cites":106},{"id":"tridao-2205.14135","pid":"tridao","arxiv":"2205.14135","date":"2022-05-27","venue":"cs.LG","fields":["efficiency","nlp"],"tEn":"FlashAttention: Fast and Memory-Efficient Exact Attention with IO-Awareness","tZh":"FlashAttention：快速且内存高效的精确注意力机制，具有IO感知能力","sEn":"FlashAttention reduces GPU memory reads/writes via tiling, achieving faster training and longer context for Transformers.","sZh":"FlashAttention通过分块减少GPU内存读写，实现更快的训练速度和更长的上下文支持。","cites":4545,"org":"Stanford"},{"id":"csaharia-2205.11487","pid":"csaharia","arxiv":"2205.11487","date":"2022-05-23","venue":"cs.CV","org":"Google","fields":["generative","vision"],"tEn":"Photorealistic Text-to-Image Diffusion Models with Deep Language Understanding","tZh":"具有深度语言理解能力的逼真文本到图像扩散模型","sEn":"Imagen achieves photorealistic text-to-image generation with deep language understanding by leveraging large language models.","sZh":"Imagen通过利用大型语言模型，实现了具有深度语言理解能力的逼真文本到图像生成。","cites":8497},{"id":"xiaohuazhai-2205.01917","pid":"xiaohuazhai","arxiv":"2205.01917","date":"2022-05-04","venue":"cs.CV","org":"Google","fields":["vision","nlp"],"tEn":"CoCa: Contrastive Captioners are Image-Text Foundation Models","tZh":"CoCa: 对比字幕器是图像-文本基础模型","sEn":"CoCa jointly pretrains an image-text encoder-decoder with contrastive and captioning losses, achieving SOTA on diverse tasks.","sZh":"CoCa通过对比损失和字幕损失联合预训练图像-文本编码器-解码器，在多种任务上达到最先进水平。","cites":1757},{"id":"aarongrattafiori-2205.01068","pid":"aarongrattafiori","arxiv":"2205.01068","date":"2022-05-02","venue":"cs.CL","org":"Meta AI","fields":["nlp","efficiency"],"tEn":"OPT: Open Pre-trained Transformer Language Models","tZh":"OPT：开放预训练Transformer语言模型","sEn":"We release OPT, a suite of decoder-only pre-trained transformers from 125M to 175B parameters, comparable to GPT-3 but with 1/7th the carbon footprint.","sZh":"我们发布了OPT，一系列从125M到175B参数的仅解码器预训练Transformer，性能与GPT-3相当，但碳足迹仅为后者的七分之一。","cites":4795},{"id":"jbalayrac-2204.14198","pid":"jbalayrac","arxiv":"2204.14198","date":"2022-04-29","venue":"cs.CV","org":"Google DeepMind","fields":["vision","nlp"],"tEn":"Flamingo: a Visual Language Model for Few-Shot Learning","tZh":"Flamingo：一种用于少样本学习的视觉语言模型","sEn":"Flamingo achieves state-of-the-art few-shot learning on diverse visual tasks by bridging pretrained vision and language models.","sZh":"Flamingo通过桥接预训练的视觉和语言模型，在多种视觉任务上实现了少样本学习的最优性能。","cites":6057},{"id":"pdhariwal-2204.06125","pid":"pdhariwal","arxiv":"2204.06125","date":"2022-04-13","venue":"cs.CV","org":"OpenAI","fields":["generative","vision"],"tEn":"Hierarchical Text-Conditional Image Generation with CLIP Latents","tZh":"基于CLIP潜在向量的层次化文本条件图像生成","sEn":"Explicitly generating CLIP image embeddings improves image diversity with minimal loss in photorealism and caption similarity.","sZh":"显式生成CLIP图像嵌入可在几乎不损失逼真度和标题相似性的情况下提高图像多样性。","cites":9084},{"id":"ybai-2204.05862","pid":"ybai","arxiv":"2204.05862","date":"2022-04-12","venue":"cs.CL","org":"Anthropic","fields":["safety","nlp"],"tEn":"Training a Helpful and Harmless Assistant with Reinforcement Learning from Human Feedback","tZh":"通过人类反馈的强化学习训练有益且无害的助手","sEn":"RLHF alignment improves NLP performance and is compatible with specialized skills training.","sZh":"RLHF对齐训练提升了几乎所有NLP评估的性能，并且与专业技能训练完全兼容。","cites":4175},{"id":"jonathanho-2204.03458","pid":"jonathanho","arxiv":"2204.03458","date":"2022-04-07","venue":"cs.CV","org":"Google","fields":["generative","vision"],"tEn":"Video Diffusion Models","tZh":"视频扩散模型","sEn":"We propose a diffusion model for video generation that extends image diffusion, enabling joint training on images and videos, and introduces a conditional sampling technique for spatial-temporal extension.","sZh":"我们提出了一种视频生成扩散模型，它扩展了图像扩散，支持图像和视频联合训练，并引入了一种用于时空扩展的条件采样技术。","cites":2666},{"id":"achowdhery-2204.02311","pid":"achowdhery","arxiv":"2204.02311","date":"2022-04-05","venue":"cs.CL","org":"Google","fields":["nlp","deep-learning"],"tEn":"PaLM: Scaling Language Modeling with Pathways","tZh":"PaLM：通过Pathways扩展语言建模","sEn":"PaLM 540B achieves state-of-the-art few-shot learning on hundreds of tasks, outperforming finetuned models on multi-step reasoning and average human performance on BIG-bench.","sZh":"PaLM 540B在数百个任务上实现了最先进的少样本学习，在多步推理上超越微调模型，在BIG-bench上超越人类平均水平。","cites":8125},{"id":"mahn-2204.01691","pid":"mahn","arxiv":"2204.01691","date":"2022-04-04","venue":"cs.RO","org":"Google","fields":["nlp","rl"],"tEn":"Do As I Can, Not As I Say: Grounding Language in Robotic Affordances","tZh":"做我能做的，而非说我所想的：将语言扎根于机器人能力","sEn":"Grounding language models in robotic affordances enables robots to follow high-level instructions by combining semantic knowledge with feasible low-level skills.","sZh":"将语言模型扎根于机器人能力，通过结合语义知识与可行的底层技能，使机器人能够遵循高层指令。","cites":3262},{"id":"jhoffmann-2203.15556","pid":"jhoffmann","arxiv":"2203.15556","date":"2022-03-29","venue":"cs.CL","org":"Google DeepMind","fields":["deep-learning","nlp"],"tEn":"Training Compute-Optimal Large Language Models","tZh":"训练计算最优的大型语言模型","sEn":"Model size and training tokens should be scaled equally for compute-optimal training.","sZh":"在计算最优训练中，模型大小和训练令牌数应等比例缩放。","cites":3434},{"id":"leizhangidea-2203.03605","pid":"leizhangidea","arxiv":"2203.03605","date":"2022-03-07","venue":"cs.CV","org":"IDEA Research / HKUST","fields":["vision","deep-learning"],"tEn":"DINO: DETR with Improved DeNoising Anchor Boxes for End-to-End Object Detection","tZh":"DINO：通过改进的去噪锚框实现端到端目标检测的DETR","sEn":"DINO achieves state-of-the-art end-to-end object detection with improved denoising training, mixed query selection, and look forward twice scheme.","sZh":"DINO通过对比去噪训练、混合查询选择和两次前向预测方案，在端到端目标检测中达到最优性能。","cites":2819},{"id":"leike-2203.02155","pid":"leike","arxiv":"2203.02155","date":"2022-03-04","venue":"cs.CL","fields":["safety","nlp"],"tEn":"Training language models to follow instructions with human feedback","tZh":"使用人类反馈训练语言模型遵循指令","sEn":"Fine-tuning with human feedback aligns language models with user intent, enabling a 1.3B parameter model to outperform a 175B model.","sZh":"通过人类反馈微调，语言模型能够更好地遵循用户意图，使得1.3B参数的模型在性能上优于175B参数的模型。","cites":21784,"org":"OpenAI"},{"id":"dario-2202.07785","pid":"dario","arxiv":"2202.07785","date":"2022-02-15","venue":"cs.CY","org":"Anthropic","fields":["safety","nlp"],"tEn":"Predictability and Surprise in Large Generative Models","tZh":"大型生成模型中的可预测性与意外性","sEn":"Large generative models exhibit predictable loss scaling but unpredictable specific behaviors, creating policy challenges.","sZh":"大型生成模型在整体损失上可预测，但具体能力、输入和输出却难以预料，这种矛盾给政策制定带来挑战。"},{"id":"baevski-2202.03555","pid":"baevski","arxiv":"2202.03555","date":"2022-02-07","venue":"cs.LG","org":"Meta AI","fields":["deep-learning","vision"],"tEn":"data2vec: A General Framework for Self-supervised Learning in Speech, Vision and Language","tZh":"data2vec：语音、视觉和语言自监督学习的通用框架","sEn":"data2vec proposes a unified self-supervised learning framework across speech, NLP, and vision by predicting contextualized latent representations instead of modality-specific targets.","sZh":"data2vec 提出了一种跨语音、自然语言处理和视觉的统一自监督学习框架，通过预测上下文相关的潜在表示而非模态特定的目标。","cites":1159},{"id":"jasonwei-2201.11903","pid":"jasonwei","arxiv":"2201.11903","date":"2022-01-28","venue":"cs.CL","org":"Google","fields":["nlp","deep-learning"],"tEn":"Chain-of-Thought Prompting Elicits Reasoning in Large Language Models","tZh":"思维链提示激发大型语言模型的推理能力","sEn":"Chain-of-thought prompting significantly improves complex reasoning in large language models.","sZh":"思维链提示显著提升大型语言模型的复杂推理能力。","cites":19372},{"id":"junnanli-2201.12086","pid":"junnanli","arxiv":"2201.12086","date":"2022-01-28","venue":"cs.CV","org":"Salesforce","fields":["vision","nlp"],"tEn":"BLIP: Bootstrapping Language-Image Pre-training for Unified Vision-Language Understanding and Generation","tZh":"BLIP：引导语言-图像预训练实现统一视觉-语言理解与生成","sEn":"BLIP achieves state-of-the-art on vision-language tasks by bootstrapping captions from noisy web data.","sZh":"BLIP通过从嘈杂网络数据中引导生成字幕，在视觉-语言任务上达到最先进水平。","cites":6856},{"id":"aradford-2201.10005","pid":"aradford","arxiv":"2201.10005","date":"2022-01-24","venue":"cs.CL","org":"OpenAI","fields":["nlp","deep-learning"],"tEn":"Text and Code Embeddings by Contrastive Pre-Training","tZh":"通过对比预训练学习文本和代码嵌入","sEn":"Contrastive pre-training on unsupervised data at scale produces high-quality vector representations for text and code, achieving state-of-the-art results in classification and search tasks.","sZh":"大规模无监督数据上的对比预训练能够生成高质量的文本和代码向量表示，在分类和搜索任务中达到最优结果。","cites":601},{"id":"zhuangliu-2201.03545","pid":"zhuangliu","arxiv":"2201.03545","date":"2022-01-10","venue":"cs.CV","org":"Meta AI","fields":["vision","deep-learning"],"tEn":"A ConvNet for the 2020s","tZh":"面向2020年代的卷积神经网络","sEn":"Modernizing standard ResNet with Vision Transformer design principles yields ConvNeXt, a pure ConvNet family that matches or outperforms Transformers on ImageNet, COCO, and ADE20K.","sZh":"通过借鉴Vision Transformer的设计理念对标准ResNet进行现代化改造，我们得到了纯卷积网络家族ConvNeXt，其在ImageNet、COCO和ADE20K上性能媲美甚至超越Transformer。","cites":8512},{"id":"rrombach-2112.10752","pid":"rrombach","arxiv":"2112.10752","date":"2021-12-20","venue":"cs.CV","org":"LMU Munich","fields":["generative","vision"],"tEn":"High-Resolution Image Synthesis with Latent Diffusion Models","tZh":"基于潜在扩散模型的高分辨率图像合成","sEn":"Latent diffusion models achieve high-quality image synthesis with reduced computational cost by operating in the latent space of pretrained autoencoders.","sZh":"潜在扩散模型通过在预训练自编码器的潜在空间中操作，以降低计算成本实现高质量图像合成。","cites":25459},{"id":"openai-2112.09332","pid":"openai","arxiv":"2112.09332","date":"2021-12-17","venue":"cs.CL","org":"OpenAI","fields":["nlp"],"tEn":"WebGPT: Browser-assisted question-answering with human feedback","tZh":"WebGPT：基于浏览器辅助的问答系统与人类反馈优化","sEn":"WebGPT fine-tunes GPT-3 to answer questions by browsing the web, achieving human-preferred answers 56% of the time over human demonstrators.","sZh":"WebGPT通过微调GPT-3使其能在文本浏览器中搜索和导航网页来回答长问题，结合模仿学习和人类反馈优化答案质量，其答案在56%的情况下比人类演示者更受青睐。","cites":1907},{"id":"ybai-2112.00861","pid":"ybai","arxiv":"2112.00861","date":"2021-12-01","venue":"cs.CL","org":"Anthropic","fields":["safety","nlp"],"tEn":"A General Language Assistant as a Laboratory for Alignment","tZh":"通用语言助手作为对齐研究的实验室","sEn":"Simple alignment techniques like prompting improve with model scale and generalize across evaluations without harming performance.","sZh":"简单的对齐技术（如提示）随模型规模扩大而效果提升，且能泛化到多种对齐评估中，同时不损害性能。","cites":1147},{"id":"zhendaxie-2111.09886","pid":"zhendaxie","arxiv":"2111.09886","date":"2021-11-18","venue":"cs.CV","org":"Microsoft Research Asia","fields":["vision","deep-learning"],"tEn":"SimMIM: A Simple Framework for Masked Image Modeling","tZh":"SimMIM：一种简单的掩码图像建模框架","sEn":"SimMIM simplifies masked image modeling with random masking, raw pixel regression, and a linear prediction head, achieving strong results.","sZh":"SimMIM通过随机掩码、原始像素回归和线性预测头简化了掩码图像建模，取得了优异的结果。","cites":1833},{"id":"jinghaozhou-2111.07832","pid":"jinghaozhou","arxiv":"2111.07832","date":"2021-11-15","venue":"cs.CV","org":"ByteDance Seed","fields":["vision","deep-learning"],"tEn":"iBOT: Image BERT Pre-Training with Online Tokenizer","tZh":"iBOT：基于在线分词器的图像BERT预训练","sEn":"iBOT achieves masked image modeling with an online tokenizer via self-distillation, eliminating the need for pre-trained tokenizers and achieving state-of-the-art results on ImageNet-1K.","sZh":"iBOT通过自蒸馏实现带在线分词器的掩码图像建模，无需预训练分词器，在ImageNet-1K上达到最优结果。","cites":1110},{"id":"kaiming-2111.06377","pid":"kaiming","arxiv":"2111.06377","date":"2021-11-11","venue":"cs.CV","fields":["vision","deep-learning"],"tEn":"Masked Autoencoders Are Scalable Vision Learners","tZh":"掩码自编码器是可扩展的视觉学习器","sEn":"Masked autoencoders (MAE) are scalable self-supervised learners for computer vision, achieving high accuracy and efficient training.","sZh":"掩码自编码器（MAE）是可扩展的计算机视觉自监督学习方法，实现了高精度和高效训练。","org":"Meta AI","cites":11828},{"id":"openai-2110.14168","pid":"openai","arxiv":"2110.14168","date":"2021-10-27","venue":"cs.LG","org":"OpenAI","fields":["nlp","rl"],"tEn":"Training Verifiers to Solve Math Word Problems","tZh":"训练验证器解决数学应用题","sEn":"Training verifiers to judge model outputs significantly improves multi-step math reasoning performance.","sZh":"训练验证器来判断模型输出的正确性，显著提升了多步数学推理的性能。","cites":9447},{"id":"ofirpress-2108.12409","pid":"ofirpress","arxiv":"2108.12409","date":"2021-08-27","venue":"cs.CL","org":"Allen Institute for AI","fields":["nlp","efficiency"],"tEn":"Train Short, Test Long: Attention with Linear Biases Enables Input Length Extrapolation","tZh":"短训练，长测试：线性偏置注意力实现输入长度外推","sEn":"ALiBi enables efficient extrapolation to longer sequences by biasing attention scores with distance-based penalties, outperforming sinusoidal embeddings with 11% faster training and less memory.","sZh":"ALiBi通过基于距离的惩罚偏置注意力分数，实现了对更长序列的高效外推，相比正弦位置嵌入，训练速度提升11%，内存占用更少。","cites":1268},{"id":"nzeghidour-2107.03312","pid":"nzeghidour","arxiv":"2107.03312","date":"2021-07-07","venue":"cs.SD","org":"Google","fields":["deep-learning","efficiency"],"tEn":"SoundStream: An End-to-End Neural Audio Codec","tZh":"SoundStream: 一种端到端神经音频编解码器","sEn":"SoundStream is a neural audio codec that efficiently compresses speech, music, and general audio at low bitrates, outperforming traditional codecs like Opus and approaching EVS quality.","sZh":"SoundStream是一种神经音频编解码器，能以低比特率高效压缩语音、音乐和通用音频，性能优于Opus等传统编解码器，接近EVS质量。","cites":1371},{"id":"openai-2107.03374","pid":"openai","arxiv":"2107.03374","date":"2021-07-07","venue":"cs.LG","org":"OpenAI","fields":["nlp","deep-learning"],"tEn":"Evaluating Large Language Models Trained on Code","tZh":"评估基于代码训练的大型语言模型","sEn":"Codex, a GPT model fine-tuned on GitHub code, achieves 28.8% on HumanEval, with repeated sampling boosting performance to 70.2%.","sZh":"Codex，一个在GitHub代码上微调的GPT模型，在HumanEval上达到28.8%的准确率，通过重复采样可提升至70.2%。","cites":10250},{"id":"wenhaiwang-2106.13797","pid":"wenhaiwang","arxiv":"2106.13797","date":"2021-06-25","venue":"cs.CV","org":"Nanjing Univers
