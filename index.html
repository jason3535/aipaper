ges in Reinforcement Learning (RL). We present a novel technique called Hindsight Experience Replay which allows sample-efficient learning from rewards which are sparse and binary and therefore avoid the need for complicated reward engineering. It can be combined with an arbitrary off-policy RL algorithm and may be seen as a form of implicit curriculum. We demonstrate our approach on the task of manipulating objects with a robotic arm. In particular, we run experiments on three different tasks: pushing, sliding, and pick-and-place, in each case using only binary rewards indicating whether or not the task is completed. Our ablation studies show that Hindsight Experience Replay is a crucial ingredient which makes training possible in these challenging environments. We show that our policies trained on a physics simulation can be deployed on a physical robot and successfully complete the task.", "absZh": "处理稀疏奖励是强化学习中最具挑战性的问题之一。我们提出了一种名为“事后经验回放”的新技术，该技术能够从稀疏且二元的奖励中进行样本高效的学习，从而避免了对复杂奖励工程的需求。它可以与任意离策略强化学习算法结合使用，并可视为一种隐式课程学习。我们在机械臂操作物体的任务上展示了该方法的效果。具体来说，我们在三个不同的任务上进行了实验：推、滑动和抓取放置，每个任务仅使用指示任务是否完成的二元奖励。我们的消融研究表明，事后经验回放是在这些具有挑战性的环境中实现训练的关键因素。我们展示了在物理仿真中训练的策略可以部署到实体机器人上并成功完成任务。", "insights": {"contrib": [{"en": "Proposes Hindsight Experience Replay (HER) for sample-efficient learning from sparse binary rewards.", "zh": "提出后见经验回放（HER），实现从稀疏二元奖励中进行样本高效学习。"}, {"en": "Eliminates the need for complex reward engineering by using binary task-completion signals.", "zh": "通过使用二元任务完成信号，消除了复杂奖励工程的需求。"}, {"en": "Can be combined with any off-policy RL algorithm, acting as an implicit curriculum.", "zh": "可与任意离策略强化学习算法结合，充当隐式课程。"}, {"en": "Demonstrates success on three robotic manipulation tasks: pushing, sliding, and pick-and-place.", "zh": "在推动、滑动和抓取放置三个机器人操作任务上展示了成功。"}, {"en": "Ablation studies confirm HER is crucial for training in challenging sparse-reward environments.", "zh": "消融研究证实HER在挑战性稀疏奖励环境中对训练至关重要。"}, {"en": "Policies trained in simulation transfer to a physical robot for task completion.", "zh": "在仿真中训练的策略可迁移到物理机器人上完成任务。"}], "limits": [{"en": "HER assumes that goal states are reachable within the episode, limiting applicability.", "zh": "HER假设目标状态在回合内可达，限制了适用性。"}, {"en": "Requires a goal-conditioned value function or policy, adding architectural constraints.", "zh": "需要目标条件化的值函数或策略，增加了架构约束。"}, {"en": "Performance may degrade when goals are far from initial states due to exploration difficulty.", "zh": "当目标远离初始状态时，由于探索困难，性能可能下降。"}, {"en": "Evaluated only on robotic manipulation tasks; generalization to other domains is untested.", "zh": "仅在机器人操作任务上评估，未测试对其他领域的泛化性。"}, {"en": "Relies on binary rewards, which may not capture nuanced task requirements.", "zh": "依赖二元奖励，可能无法捕捉细微的任务需求。"}]}, "cites": 2767}, {"id": "shazeer-1706.03762", "pid": "shazeer", "arxiv": "1706.03762", "date": "2017-06-12", "venue": "cs.CL", "fields": ["nlp", "deep-learning"], "tEn": "Attention Is All You Need", "tZh": "注意力机制就是一切", "sEn": "The Transformer model, based solely on attention mechanisms, outperforms recurrent and convolutional models in machine translation while being more parallelizable and faster to train.", "sZh": "仅基于注意力机制的Transformer模型在机器翻译中优于循环和卷积模型，且更易并行化、训练更快。", "absEn": "The dominant sequence transduction models are based on complex recurrent or convolutional neural networks in an encoder-decoder configuration. The best performing models also connect the encoder and decoder through an attention mechanism. We propose a new simple network architecture, the Transformer, based solely on attention mechanisms, dispensing with recurrence and convolutions entirely. Experiments on two machine translation tasks show these models to be superior in quality while being more parallelizable and requiring significantly less time to train. Our model achieves 28.4 BLEU on the WMT 2014 English-to-German translation task, improving over the existing best results, including ensembles by over 2 BLEU. On the WMT 2014 English-to-French translation task, our model establishes a new single-model state-of-the-art BLEU score of 41.8 after training for 3.5 days on eight GPUs, a small fraction of the training costs of the best models from the literature. We show that the Transformer generalizes well to other tasks by applying it successfully to English constituency parsing both with large and limited training data.", "absZh": "主流的序列转换模型基于复杂的循环或卷积神经网络，采用编码器-解码器结构。性能最佳的模型还通过注意力机制连接编码器和解码器。我们提出了一种新的简单网络架构——Transformer，它完全基于注意力机制，完全摒弃了循环和卷积。在两个机器翻译任务上的实验表明，这些模型在质量上更优，同时更易于并行化，且训练时间显著减少。我们的模型在WMT 2014英德翻译任务上达到了28.4 BLEU，比现有最佳结果（包括集成模型）提高了超过2 BLEU。在WMT 2014英法翻译任务上，我们的模型在8个GPU上训练3.5天后，建立了新的单模型最优BLEU分数41.8，仅为文献中最佳模型训练成本的一小部分。我们通过将Transformer成功应用于英语成分句法分析（包括大规模和有限训练数据），证明了其良好的泛化能力。", "insights": {"contrib": [{"en": "Proposes Transformer, a novel architecture based solely on attention mechanisms, eliminating recurrence and convolutions.", "zh": "提出Transformer，一种完全基于注意力机制的新架构，消除了循环和卷积。"}, {"en": "Achieves state-of-the-art BLEU scores of 28.4 on WMT 2014 English-German and 41.8 on English-French translation.", "zh": "在WMT 2014英德和英法翻译任务上分别取得28.4和41.8 BLEU的最新结果。"}, {"en": "Demonstrates significantly faster training due to parallelization, reducing training time to 3.5 days on 8 GPUs.", "zh": "由于并行化，训练速度显著提升，在8个GPU上仅需3.5天。"}, {"en": "Introduces multi-head attention to jointly attend to information from different representation subspaces.", "zh": "引入多头注意力机制，从不同表示子空间联合关注信息。"}, {"en": "Shows strong generalization to other tasks like English constituency parsing with both large and limited data.", "zh": "在英语成分句法分析等任务上表现出强泛化能力，无论数据量大小。"}], "limits": [{"en": "Self-attention's quadratic complexity in sequence length limits scalability to very long sequences.", "zh": "自注意力在序列长度上的二次复杂度限制了其扩展到极长序列。"}, {"en": "The model lacks explicit positional encoding, relying on added sinusoidal signals which may not capture all positional nuances.", "zh": "模型缺乏显式位置编码，依赖附加的正弦信号，可能无法捕捉所有位置细节。"}, {"en": "Training requires careful hyperparameter tuning (e.g., learning rate schedule, dropout) to achieve optimal performance.", "zh": "训练需要仔细调整超参数（如学习率计划、dropout）才能达到最优性能。"}, {"en": "The architecture's interpretability is limited despite attention visualization; deeper understanding of learned patterns remains challenging.", "zh": "尽管有注意力可视化，架构的可解释性仍有限，深入理解学习模式仍有挑战。"}]}, "cites": 181598, "org": "Google"}, {"id": "christiano-1706.03741", "pid": "christiano", "arxiv": "1706.03741", "date": "2017-06-12", "venue": "stat.ML", "fields": ["safety", "rl"], "tEn": "Deep reinforcement learning from human preferences", "tZh": "基于人类偏好的深度强化学习", "sEn": "We can train complex RL behaviors using human preferences on trajectory segments, requiring feedback on less than 1% of agent interactions.", "sZh": "我们可以通过人类对轨迹片段的偏好来训练复杂的强化学习行为，仅需对不到1%的智能体交互提供反馈。", "absEn": "For sophisticated reinforcement learning (RL) systems to interact usefully with real-world environments, we need to communicate complex goals to these systems. In this work, we explore goals defined in terms of (non-expert) human preferences between pairs of trajectory segments. We show that this approach can effectively solve complex RL tasks without access to the reward function, including Atari games and simulated robot locomotion, while providing feedback on less than one percent of our agent's interactions with the environment. This reduces the cost of human oversight far enough that it can be practically applied to state-of-the-art RL systems. To demonstrate the flexibility of our approach, we show that we can successfully train complex novel behaviors with about an hour of human time. These behaviors and environments are considerably more complex than any that have been previously learned from human feedback.", "absZh": "为了让复杂的强化学习系统能够有效地与现实世界环境交互，我们需要向这些系统传达复杂的目标。在这项工作中，我们探索了基于（非专家）人类对轨迹片段对之间的偏好来定义目标。我们展示了这种方法可以在无需奖励函数的情况下有效解决复杂的强化学习任务，包括Atari游戏和模拟机器人运动，同时仅需对智能体与环境交互的不到1%提供反馈。这大大降低了人类监督的成本，使其能够实际应用于最先进的强化学习系统。为了展示我们方法的灵活性，我们证明可以用大约一小时的人类时间成功训练出复杂的新行为。这些行为和环境比以往任何通过人类反馈学习到的都要复杂得多。", "insights": {"contrib": [{"en": "Proposes a method to train deep RL agents from human preferences between trajectory segments, reducing human oversight cost.", "zh": "提出一种从人类对轨迹片段的偏好中训练深度强化学习智能体的方法，降低了人类监督成本。"}, {"en": "Demonstrates solving complex RL tasks (Atari games, robot locomotion) with less than 1% of agent-environment interactions labeled.", "zh": "展示了在不到1%的智能体-环境交互被标注的情况下，解决复杂强化学习任务（Atari游戏、机器人运动）。"}, {"en": "Shows novel behaviors (backflip, one-leg stand) can be learned from about an hour of human feedback.", "zh": "展示了从约一小时的人类反馈中学习新颖行为（后空翻、单腿站立）。"}, {"en": "Introduces an ensemble of reward predictors and online query selection to improve learning efficiency.", "zh": "引入奖励预测器集成和在线查询选择以提高学习效率。"}, {"en": "Provides evidence that human feedback can be economically scaled to state-of-the-art deep RL systems.", "zh": "提供了人类反馈可经济地扩展到最先进深度强化学习系统的证据。"}], "limits": [{"en": "Method may fail on tasks where short clips are confusing, e.g., Qbert with real human feedback.", "zh": "方法在短片段令人困惑的任务上可能失败，例如使用真实人类反馈的Qbert。"}, {"en": "Offline reward predictor training leads to poor performance due to nonstationary occupancy distribution.", "zh": "离线奖励预测器训练因占用分布的非平稳性导致性能不佳。"}, {"en": "Human feedback quality depends on rater consistency; errors or inconsistency can degrade performance.", "zh": "人类反馈质量取决于标注者一致性；错误或不一致会降低性能。"}, {"en": "Method assumes human preferences are generated by a reward function, which may not hold in all domains.", "zh": "方法假设人类偏好由奖励函数生成，这在所有领域可能不成立。"}, {"en": "Query selection based on ensemble variance is a crude approximation; better information-theoretic approaches remain future work.", "zh": "基于集成方差的查询选择是粗略近似；更好的信息论方法留待未来工作。"}]}, "cites": 5435, "org": "OpenAI"}, {"id": "shochreiter-1706.02515", "pid": "shochreiter", "arxiv": "1706.02515", "date": "2017-06-08", "venue": "cs.LG", "org": "JKU Linz", "fields": ["deep-learning"], "tEn": "Self-Normalizing Neural Networks", "tZh": "自归一化神经网络", "sEn": "Self-normalizing neural networks (SNNs) with SELU activations automatically converge to zero mean and unit variance, enabling deep architectures and robust learning.", "sZh": "自归一化神经网络（SNN）使用SELU激活函数，自动收敛到零均值和单位方差，从而支持深层架构和鲁棒学习。", "absEn": "Deep Learning has revolutionized vision via convolutional neural networks (CNNs) and natural language processing via recurrent neural networks (RNNs). However, success stories of Deep Learning with standard feed-forward neural networks (FNNs) are rare. FNNs that perform well are typically shallow and, therefore cannot exploit many levels of abstract representations. We introduce self-normalizing neural networks (SNNs) to enable high-level abstract representations. While batch normalization requires explicit normalization, neuron activations of SNNs automatically converge towards zero mean and unit variance. The activation function of SNNs are \"scaled exponential linear units\" (SELUs), which induce self-normalizing properties. Using the Banach fixed-point theorem, we prove that activations close to zero mean and unit variance that are propagated through many network layers will converge towards zero mean and unit variance -- even under the presence of noise and perturbations. This convergence property of SNNs allows to (1) train deep networks with many layers, (2) employ strong regularization, and (3) to make learning highly robust. Furthermore, for activations not close to unit variance, we prove an upper and lower bound on the variance, thus, vanishing and exploding gradients are impossible. We compared SNNs on (a) 121 tasks from the UCI machine learning repository, on (b) drug discovery benchmarks, and on (c) astronomy tasks with standard FNNs and other machine learning methods such as random forests and support vector machines. SNNs significantly outperformed all competing FNN methods at 121 UCI tasks, outperformed all competing methods at the Tox21 dataset, and set a new record at an astronomy data set. The winning SNN architectures are often very deep. Implementations are available at: github.com/bioinf-jku/SNNs.", "absZh": "深度学习通过卷积神经网络（CNN）和循环神经网络（RNN）在视觉和自然语言处理领域引发了革命。然而，标准前馈神经网络（FNN）在深度学习中的成功案例却很少。表现良好的FNN通常较浅，因此无法利用多层次的抽象表示。我们引入了自归一化神经网络（SNN）以实现高级抽象表示。批归一化需要显式归一化，而SNN的神经元激活会自动收敛到零均值和单位方差。SNN的激活函数是“缩放指数线性单元”（SELU），它具有自归一化特性。利用巴拿赫不动点定理，我们证明了接近零均值和单位方差的激活值在通过多个网络层传播时，即使在噪声和扰动存在的情况下，也会收敛到零均值和单位方差。SNN的这种收敛特性允许（1）训练深层网络，（2）使用强正则化，（3）使学习高度鲁棒。此外，对于不接近单位方差的激活值，我们证明了方差的上界和下界，因此梯度消失和爆炸是不可能的。我们在（a）UCI机器学习库的121个任务、（b）药物发现基准测试和（c）天文学任务上，将SNN与标准FNN以及其他机器学习方法（如随机森林和支持向量机）进行了比较。SNN在121个UCI任务上显著优于所有竞争的FNN方法，在Tox21数据集上优于所有竞争方法，并在一个天文学数据集上创造了新纪录。获胜的SNN架构通常非常深。实现代码可在github.com/bioinf-jku/SNNs获取。", "insights": {"contrib": [{"en": "Introduced self-normalizing neural networks (SNNs) with SELU activation that automatically normalize activations to zero mean and unit variance.", "zh": "提出了自归一化神经网络（SNN），使用SELU激活函数自动将激活值归一化为零均值和单位方差。"}, {"en": "Proved via Banach fixed-point theorem that activations converge to zero mean and unit variance across layers under noise and perturbations.", "zh": "通过巴拿赫不动点定理证明，在噪声和扰动下，激活值跨层收敛到零均值和单位方差。"}, {"en": "Proved upper and lower bounds on variance mapping, preventing vanishing and exploding gradients.", "zh": "证明了方差映射的上下界，防止梯度消失和梯度爆炸。"}, {"en": "Proposed alpha dropout, a regularization method tailored for SELU networks to maintain self-normalizing property.", "zh": "提出了alpha dropout，一种专为SELU网络设计的正则化方法，以保持自归一化特性。"}, {"en": "Achieved state-of-the-art results on 121 UCI tasks, Tox21 dataset, and an astronomy dataset, often with very deep architectures.", "zh": "在121个UCI任务、Tox21数据集和天文学数据集上取得了最先进的结果，通常使用非常深的架构。"}, {"en": "Demonstrated that SNNs significantly outperform other FNNs with batch, layer, weight normalization, and residual networks.", "zh": "证明SNN显著优于使用批归一化、层归一化、权重归一化和残差网络的其他前馈神经网络。"}], "limits": [{"en": "Self-normalizing property relies on the central limit theorem assumption, which may not hold for very narrow layers.", "zh": "自归一化性质依赖于中心极限定理假设，对于非常窄的层可能不成立。"}, {"en": "Theoretical guarantees require weight initialization with zero mean and variance 1/n, which may be violated during training.", "zh": "理论保证要求权重初始化为零均值和1/n方差，训练中可能被违反。"}, {"en": "Performance on small datasets (less than 1000 samples) is inferior to random forests and SVMs.", "zh": "在小数据集（少于1000个样本）上性能不如随机森林和支持向量机。"}, {"en": "The proof of contraction mapping uses computer-assisted verification on a grid, which may not cover all possible parameter ranges.", "zh": "压缩映射的证明使用了网格上的计算机辅助验证，可能未覆盖所有可能的参数范围。"}, {"en": "Alpha dropout requires tuning of dropout rate, and optimal rates may vary across tasks.", "zh": "Alpha dropout需要调整丢弃率，最优率可能因任务而异。"}]}, "cites": 2865}, {"id": "wlhamilton-1706.02216", "pid": "wlhamilton", "arxiv": "1706.02216", "date": "2017-06-07", "venue": "cs.SI", "org": "Stanford", "fields": ["deep-learning"], "tEn": "Inductive Representation Learning on Large Graphs", "tZh": "大规模图上的归纳式表示学习", "sEn": "GraphSAGE learns a function to generate node embeddings by sampling and aggregating features from local neighborhoods, enabling generalization to unseen nodes.", "sZh": "GraphSAGE通过学习一个从节点局部邻域采样并聚合特征来生成嵌入的函数，从而能够泛化到未见节点。", "absEn": "Low-dimensional embeddings of nodes in large graphs have proved extremely useful in a variety of prediction tasks, from content recommendation to identifying protein functions. However, most existing approaches require that all nodes in the graph are present during training of the embeddings; these previous approaches are inherently transductive and do not naturally generalize to unseen nodes. Here we present GraphSAGE, a general, inductive framework that leverages node feature information (e.g., text attributes) to efficiently generate node embeddings for previously unseen data. Instead of training individual embeddings for each node, we learn a function that generates embeddings by sampling and aggregating features from a node's local neighborhood. Our algorithm outperforms strong baselines on three inductive node-classification benchmarks: we classify the category of unseen nodes in evolving information graphs based on citation and Reddit post data, and we show that our algorithm generalizes to completely unseen graphs using a multi-graph dataset of protein-protein interactions.", "absZh": "在大规模图中，节点的低维嵌入在从内容推荐到蛋白质功能识别等多种预测任务中已被证明极为有用。然而，大多数现有方法要求图中的所有节点在嵌入训练期间都存在；这些先前的方法本质上是直推式的，不能自然地泛化到未见节点。本文提出了GraphSAGE，一个通用的归纳式框架，它利用节点特征信息（如文本属性）来高效地为未见数据生成节点嵌入。我们不是为每个节点训练单独的嵌入，而是学习一个函数，通过从节点的局部邻域采样并聚合特征来生成嵌入。我们的算法在三个归纳式节点分类基准上优于强基线：我们基于引文和Reddit帖子数据对演化信息图中的未见节点类别进行分类，并且我们使用一个蛋白质-蛋白质相互作用的多图数据集展示了我们的算法能够泛化到完全未见过的图。", "insights": {"contrib": [{"en": "Proposes GraphSAGE, an inductive framework for generating node embeddings on unseen data using node features.", "zh": "提出GraphSAGE，一种利用节点特征对未见数据生成节点嵌入的归纳框架。"}, {"en": "Introduces trainable aggregator functions (mean, LSTM, pooling) that operate on unordered neighbor sets.", "zh": "引入可训练的聚合函数（均值、LSTM、池化），作用于无序邻居集合。"}, {"en": "Demonstrates strong performance on three inductive node-classification benchmarks, outperforming baselines by up to 51%.", "zh": "在三个归纳节点分类基准上表现优异，比基线提升高达51%。"}, {"en": "Shows GraphSAGE generalizes to completely unseen graphs in a multi-graph protein-protein interaction dataset.", "zh": "展示GraphSAGE在多图蛋白质相互作用数据集上泛化到完全未见图。"}, {"en": "Provides theoretical analysis linking GraphSAGE to the Weisfeiler-Lehman isomorphism test and its ability to learn local graph structure.", "zh": "提供理论分析，将GraphSAGE与Weisfeiler-Lehman同构测试联系起来，并证明其学习局部图结构的能力。"}, {"en": "Achieves efficient runtime by sampling fixed-size neighbor sets, maintaining performance with K=2 and S1*S2≤500.", "zh": "通过采样固定大小的邻居集实现高效运行，在K=2且S1*S2≤500时保持性能。"}], "limits": [{"en": "Focuses on feature-rich graphs; performance may degrade on graphs without node features.", "zh": "侧重于特征丰富的图；在无节点特征的图上性能可能下降。"}, {"en": "Neighborhood sampling introduces variance; non-uniform sampling strategies are not explored.", "zh": "邻居采样引入方差；未探索非均匀采样策略。"}, {"en": "LSTM aggregator is not permutation invariant and requires random ordering of neighbors.", "zh": "LSTM聚合器不具备置换不变性，需要随机排序邻居。"}, {"en": "Theoretical analysis of clustering coefficient approximation assumes distinct node features and high-dimensional model.", "zh": "聚类系数逼近的理论分析假设节点特征互异且模型高维。"}, {"en": "Evaluation limited to node classification; link prediction and other tasks are not tested.", "zh": "评估仅限于节点分类；未测试链接预测等其他任务。"}]}, "cites": 20038}, {"id": "jgilmer-1704.01212", "pid": "jgilmer", "arxiv": "1704.01212", "date": "2017-04-04", "venue": "cs.LG", "org": "Google Brain", "fields": ["deep-learning", "generative"], "tEn": "Neural Message Passing for Quantum Chemistry", "tZh": "神经消息传递用于量子化学", "sEn": "We reformulate existing models into a common framework called Message Passing Neural Networks (MPNNs) and achieve state-of-the-art results on molecular property prediction.", "sZh": "我们将现有模型重新表述为一个称为消息传递神经网络（MPNNs）的通用框架，并在分子性质预测上取得了最先进的结果。", "absEn": "Supervised learning on molecules has incredible potential to be useful in chemistry, drug discovery, and materials science. Luckily, several promising and closely related neural network models invariant to molecular symmetries have already been described in the literature. These models learn a message passing algorithm and aggregation procedure to compute a function of their entire input graph. At this point, the next step is to find a particularly effective variant of this general approach and apply it to chemical prediction benchmarks until we either solve them or reach the limits of the approach. In this paper, we reformulate existing models into a single common framework we call Message Passing Neural Networks (MPNNs) and explore additional novel variations within this framework. Using MPNNs we demonstrate state of the art results on an important molecular property prediction benchmark; these results are strong enough that we believe future work should focus on datasets with larger molecules or more accurate ground truth labels.", "absZh": "监督学习在分子上具有巨大的潜力，可用于化学、药物发现和材料科学。幸运的是，文献中已经描述了几种有前景且密切相关的神经网络模型，这些模型对分子对称性具有不变性。这些模型学习一种消息传递算法和聚合过程，以计算其整个输入图的函数。此时，下一步是找到这种通用方法的一个特别有效的变体，并将其应用于化学预测基准，直到我们解决它们或达到该方法的极限。在本文中，我们将现有模型重新表述为一个称为消息传递神经网络（MPNNs）的单一通用框架，并探索该框架内的其他新颖变体。使用MPNNs，我们在一个重要的分子性质预测基准上展示了最先进的结果；这些结果足够强大，以至于我们认为未来的工作应侧重于具有更大分子或更准确真实标签的数据集。", "insights": {"contrib": [{"en": "Developed an MPNN achieving state-of-the-art on all 13 QM9 targets and chemical accuracy on 11.", "zh": "开发了一种MPNN，在全部13个QM9目标上达到最先进水平，并在11个目标上达到化学精度。"}, {"en": "Introduced multiple MPNNs predicting DFT to chemical accuracy on 5 targets using only molecular topology.", "zh": "引入多种MPNN，仅使用分子拓扑就在5个目标上以化学精度预测DFT。"}, {"en": "Proposed a general method to train MPNNs with larger node representations without increasing computation or memory.", "zh": "提出一种通用方法，在不增加计算或内存的情况下训练具有更大节点表示的MPNN。"}, {"en": "Unified existing graph neural network models into a common Message Passing Neural Network (MPNN) framework.", "zh": "将现有图神经网络模型统一为通用的消息传递神经网络（MPNN）框架。"}, {"en": "Demonstrated the importance of long-range interactions via master node and set2set output for molecular property prediction.", "zh": "通过主节点和set2set输出证明了长程相互作用对分子性质预测的重要性。"}, {"en": "Introduced a multi-tower architecture that improves scalability and generalization performance.", "zh": "引入多塔架构，提高了可扩展性和泛化性能。"}], "limits": [{"en": "Models were evaluated only on small organic molecules (up to 9 heavy atoms) from QM9 dataset.", "zh": "模型仅在QM9数据集中的小有机分子（最多9个重原子）上评估。"}, {"en": "Generalization to larger molecules or different chemical spaces remains unverified.", "zh": "对更大分子或不同化学空间的泛化能力尚未验证。"}, {"en": "Spatial information reliance may limit applicability when 3D conformations are unavailable.", "zh": "对空间信息的依赖可能限制其在缺乏3D构象时的适用性。"}, {"en": "Training one model per target outperforms joint training, limiting multi-task efficiency.", "zh": "每个目标单独训练优于联合训练，限制了多任务效率。"}, {"en": "The towers variant could not be effectively combined with the edge network message function.", "zh": "多塔变体无法与边缘网络消息函数有效结合。"}]}, "cites": 9129}, {"id": "arjovsky-1704.00028", "pid": "arjovsky", "arxiv": "1704.00028", "date": "2017-03-31", "venue": "cs.LG", "org": "MILA / Université de Montréal", "fields": ["generative", "deep-learning"], "tEn": "Improved Training of Wasserstein GANs", "tZh": "改进Wasserstein GAN的训练方法", "sEn": "Gradient penalty stabilizes WGAN training, enabling high-quality generation without hyperparameter tuning.", "sZh": "梯度惩罚稳定了WGAN训练，无需超参数调优即可生成高质量样本。", "absEn": "Generative Adversarial Networks (GANs) are powerful generative models, but suffer from training instability. The recently proposed Wasserstein GAN (WGAN) makes progress toward stable training of GANs, but sometimes can still generate only low-quality samples or fail to converge. We find that these problems are often due to the use of weight clipping in WGAN to enforce a Lipschitz constraint on the critic, which can lead to undesired behavior. We propose an alternative to clipping weights: penalize the norm of gradient of the critic with respect to its input. Our proposed method performs better than standard WGAN and enables stable training of a wide variety of GAN architectures with almost no hyperparameter tuning, including 101-layer ResNets and language models over discrete data. We also achieve high quality generations on CIFAR-10 and LSUN bedrooms.", "absZh": "生成对抗网络（GAN）是强大的生成模型，但存在训练不稳定的问题。最近提出的Wasserstein GAN（WGAN）在稳定GAN训练方面取得了进展，但有时仍只能生成低质量样本或无法收敛。我们发现这些问题通常是由于WGAN中使用权重裁剪来对判别器施加Lipschitz约束，这可能导致不良行为。我们提出了一种替代裁剪权重的方法：惩罚判别器相对于其输入的梯度范数。我们提出的方法优于标准WGAN，并且能够在几乎不需要超参数调优的情况下稳定训练各种GAN架构，包括101层残差网络和离散数据的语言模型。我们还在CIFAR-10和LSUN卧室数据集上实现了高质量生成。", "insights": {"contrib": [{"en": "Identifies that weight clipping in WGAN causes undesired behavior and training instability.", "zh": "指出WGAN中的权重裁剪会导致不良行为和训练不稳定。"}, {"en": "Proposes gradient penalty as an alternative to weight clipping for enforcing Lipschitz constraint.", "zh": "提出梯度惩罚作为权重裁剪的替代方案，以强制执行Lipschitz约束。"}, {"en": "Enables stable training of diverse GAN architectures with minimal hyperparameter tuning.", "zh": "实现了多种GAN架构的稳定训练，几乎无需超参数调整。"}, {"en": "Demonstrates effectiveness on 101-layer ResNets and language models over discrete data.", "zh": "在101层ResNet和离散数据语言模型上展示了有效性。"}, {"en": "Achieves high-quality generations on CIFAR-10 and LSUN bedrooms.", "zh": "在CIFAR-10和LSUN卧室数据集上生成了高质量样本。"}], "limits": [{"en": "Gradient penalty adds computational overhead compared to weight clipping.", "zh": "与权重裁剪相比，梯度惩罚增加了计算开销。"}, {"en": "Method may not generalize to all GAN variants or training settings.", "zh": "该方法可能无法推广到所有GAN变体或训练设置。"}, {"en": "Evaluation limited to image and discrete data domains.", "zh": "评估仅限于图像和离散数据领域。"}, {"en": "Requires careful tuning of penalty coefficient λ.", "zh": "需要仔细调整惩罚系数λ。"}]}, "cites": 10956}, {"id": "junyanzhu-1703.10593", "pid": "junyanzhu", "arxiv": "1703.10593", "date": "2017-03-30", "venue": "cs.CV", "org": "UC Berkeley", "fields": ["generative", "vision"], "tEn": "Unpaired Image-to-Image Translation using Cycle-Consistent Adversarial Networks", "tZh": "使用循环一致性对抗网络进行非配对图像到图像的翻译", "sEn": "We propose CycleGAN, a method for unpaired image-to-image translation using cycle-consistent adversarial networks.", "sZh": "我们提出了CycleGAN，一种使用循环一致性对抗网络进行非配对图像到图像翻译的方法。", "absEn": "Image-to-image translation is a class of vision and graphics problems where the goal is to learn the mapping between an input image and an output image using a training set of aligned image pairs. However, for many tasks, paired training data will not be available. We present an approach for learning to translate an image from a source domain $X$ to a target domain $Y$ in the absence of paired examples. Our goal is to learn a mapping $G: X \\rightarrow Y$ such that the distribution of images from $G(X)$ is indistinguishable from the distribution $Y$ using an adversarial loss. Because this mapping is highly under-constrained, we couple it with an inverse mapping $F: Y \\rightarrow X$ and introduce a cycle consistency loss to push $F(G(X)) \\approx X$ (and vice versa). Qualitative results are presented on several tasks where paired training data does not exist, including collection style transfer, object transfiguration, season transfer, photo enhancement, etc. Quantitative comparisons against several prior methods demonstrate the superiority of our approach.", "absZh": "图像到图像翻译是一类视觉和图形学问题，其目标是通过使用配对的图像对训练集来学习输入图像和输出图像之间的映射。然而，对于许多任务，配对训练数据并不可用。我们提出了一种在缺乏配对示例的情况下学习将图像从源域X转换到目标域Y的方法。我们的目标是学习一个映射G: X → Y，使得来自G(X)的图像分布与Y的分布无法区分，这通过对抗损失实现。由于这个映射高度欠约束，我们将其与逆映射F: Y → X耦合，并引入循环一致性损失来推动F(G(X)) ≈ X（反之亦然）。我们在多个不存在配对训练数据的任务上展示了定性结果，包括集合风格迁移、物体变形、季节转换、照片增强等。与几种先前方法的定量比较证明了我们方法的优越性。", "insights": {"contrib": [{"en": "Proposes CycleGAN for unpaired image-to-image translation using cycle-consistent adversarial networks.", "zh": "提出CycleGAN，利用循环一致性对抗网络实现无配对图像到图像翻译。"}, {"en": "Introduces cycle consistency loss to enforce forward and backward translation consistency.", "zh": "引入循环一致性损失，强制前向和后向翻译的一致性。"}, {"en": "Demonstrates effectiveness on tasks like style transfer, object transfiguration, season transfer, and photo enhancement.", "zh": "在风格迁移、物体变形、季节转换和照片增强等任务上展示有效性。"}, {"en": "Outperforms prior unpaired methods in qualitative and quantitative comparisons.", "zh": "在定性和定量比较中优于先前的无配对方法。"}, {"en": "Provides open-source PyTorch and Torch implementations.", "zh": "提供开源的PyTorch和Torch实现。"}], "limits": [{"en": "Fails on tasks requiring geometric changes, e.g., dog-to-cat transfiguration.", "zh": "在需要几何变化的任务上失败，例如狗到猫的变形。"}, {"en": "Performance depends on dataset distribution; may produce artifacts from training set biases.", "zh": "性能依赖于数据集分布；可能因训练集偏差产生伪影。"}, {"en": "Gap remains compared to supervised methods, especially for tasks needing semantic understanding.", "zh": "与监督方法相比仍有差距，尤其在需要语义理解的任务上。"}, {"en": "Cycle consistency loss may not prevent all mode collapse or unstable training.", "zh": "循环一致性损失可能无法完全防止模式崩溃或训练不稳定。"}]}}, {"id": "abbeel-1703.06907", "pid": "abbeel", "arxiv": "1703.06907", "date": "2017-03-20", "venue": "cs.RO", "org": "OpenAI", "fields": ["rl", "vision"], "tEn": "Domain Randomization for Transferring Deep Neural Networks from Simulation to the Real World", "tZh": "域随机化：将深度神经网络从模拟迁移到现实世界", "sEn": "Domain randomization enables training deep neural networks on simulated images that transfer to real-world object localization and grasping without any real data.", "sZh": "域随机化技术使得仅使用模拟图像训练的深度神经网络能够成功迁移到现实世界，实现物体定位和抓取，无需任何真实数据。", "absEn": "Bridging the 'reality gap' that separates simulated robotics from experiments on hardware could accelerate robotic research through improved data availability. This paper explores domain randomization, a simple technique for training models on simulated images that transfer to real images by randomizing rendering in the simulator. With enough variability in the simulator, the real world may appear to the model as just another variation. We focus on the task of object localization, which is a stepping stone to general robotic manipulation skills. We find that it is possible to train a real-world object detector that is accurate to $1.5$cm and robust to distractors and partial occlusions using only data from a simulator with non-realistic random textures. To demonstrate the capabilities of our detectors, we show they can be used to perform grasping in a cluttered environment. To our knowledge, this is the first successful transfer of a deep neural network trained only on simulated RGB images (without pre-training on real images) to the real world for the purpose of robotic control.", "absZh": "弥合模拟机器人与硬件实验之间的“现实差距”可以通过改善数据可用性来加速机器人研究。本文探讨了域随机化，这是一种简单的技术，通过在模拟器中随机化渲染来训练模型，使其能够迁移到真实图像。当模拟器中的变化足够多时，现实世界可能只是模型眼中的另一种变化。我们专注于物体定位任务，这是通用机器人操作技能的基石。我们发现，仅使用来自具有非真实随机纹理的模拟器的数据，就可以训练出一个精度达到1.5厘米、对干扰物和部分遮挡具有鲁棒性的现实世界物体检测器。为了展示我们检测器的能力，我们展示了它们可以用于在杂乱环境中进行抓取。据我们所知，这是首次成功将仅使用模拟RGB图像训练的深度神经网络（无需在真实图像上预训练）迁移到现实世界用于机器人控制。", "insights": {"contrib": [{"en": "First successful transfer of deep neural network trained only on simulated RGB images to real-world robotic control.", "zh": "首次成功将仅使用模拟RGB图像训练的深度神经网络迁移到真实机器人控制。"}, {"en": "Domain randomization enables object localization accurate to 1.5 cm in the real world.", "zh": "域随机化使真实世界物体定位精度达到1.5厘米。"}, {"en": "Non-realistic random textures suffice for sim-to-real transfer without pre-training on real images.", "zh": "非真实随机纹理足以实现模拟到真实的迁移，无需在真实图像上预训练。"}, {"en": "Detectors robust to distractors and partial occlusions, enabling grasping in cluttered environments.", "zh": "检测器对干扰物和部分遮挡具有鲁棒性，可在杂乱环境中执行抓取。"}, {"en": "Ablation study shows randomization of textures and camera pose critical for transfer success.", "zh": "消融研究表明纹理和相机位姿的随机化对迁移成功至关重要。"}, {"en": "Method generalizes to real-world objects with non-uniform textures (e.g., YCB objects).", "zh": "方法泛化到具有非均匀纹理的真实物体（如YCB物体）。"}], "limits": [{"en": "Method assumes fixed table height, limiting to 2D pose estimation.", "zh": "方法假设固定桌面高度，仅限于2D姿态估计。"}, {"en": "Requires manual placement of simulated camera to roughly match real viewpoint.", "zh": "需要手动放置模拟相机以大致匹配真实视角。"}, {"en": "Accuracy limited to ~1.5 cm; insufficient for high-precision or contact-rich manipulation.", "zh": "精度限制在约1.5厘米；不足以用于高精度或接触丰富的操作。"}, {"en": "Evaluation only on geometric objects and one YCB object; generalizability to diverse objects unverified.", "zh": "评估仅限于几何物体和一个YCB物体；对多样化物体的泛化性未验证。"}, {"en": "No comparison with domain adaptation methods; combination may improve performance.", "zh": "未与域适应方法比较；结合可能提升性能。"}]}, "cites": 3769}, {"id": "finn-1703.03400", "pid": "finn", "arxiv": "1703.03400", "date": "2017-03-09", "venue": "cs.LG", "fields": ["rl", "deep-learning"], "tEn": "Model-Agnostic Meta-Learning for Fast Adaptation of Deep Networks", "tZh": "模型无关的元学习：深度网络的快速适应", "sEn": "A model-agnostic meta-learning algorithm that enables fast adaptation of deep networks with few gradient steps.", "sZh": "一种模型无关的元学习算法，通过少量梯度步骤实现深度网络的快速适应。", "absEn": "We propose an algorithm for meta-learning that is model-agnostic, in the sense that it is compatible with any model trained with gradient descent and applicable to a variety of different learning problems, including classification, regression, and reinforcement learning. The goal of meta-learning is to train a model on a variety of learning tasks, such that it can solve new learning tasks using only a small number of training samples. In our approach, the parameters of the model are explicitly trained such that a small number of gradient steps with a small amount of training data from a new task will produce good generalization performance on that task. In effect, our method trains the model to be easy to fine-tune. We demonstrate that this approach leads to state-of-the-art performance on two few-shot image classification benchmarks, produces good results on few-shot regression, and accelerates fine-tuning for policy gradient reinforcement learning with neural network policies.", "absZh": "我们提出了一种元学习算法，该算法与模型无关，即它与任何通过梯度下降训练的模型兼容，并适用于各种不同的学习问题，包括分类、回归和强化学习。元学习的目标是在多种学习任务上训练模型，使其能够仅使用少量训练样本解决新的学习任务。在我们的方法中，模型的参数被明确训练，使得来自新任务的少量训练数据经过少量梯度步骤后，就能在该任务上产生良好的泛化性能。实际上，我们的方法训练模型使其易于微调。我们证明，这种方法在两个少样本图像分类基准上达到了最先进的性能，在少样本回归上取得了良好结果，并加速了使用神经网络策略的策略梯度强化学习的微调。", "insights": {"contrib": [{"en": "Proposes MAML, a model-agnostic meta-learning algorithm compatible with any gradient-descent-trained model.", "zh": "提出 MAML，一种与任何基于梯度下降训练的模型兼容的模型无关的元学习算法。"}, {"en": "Achieves state-of-the-art few-shot classification on Omniglot and MiniImagenet with fewer parameters.", "zh": "在 Omniglot 和 MiniImagenet 上以更少参数实现少样本分类的最先进性能。"}, {"en": "Demonstrates fast adaptation in few-shot regression and reinforcement learning with policy gradients.", "zh": "在少样本回归和基于策略梯度的强化学习中展示快速适应能力。"}, {"en": "Shows that first-order approximation performs nearly as well as full second-order meta-gradient.", "zh": "表明一阶近似与完整二阶元梯度性能几乎相同。"}, {"en": "Provides a simple weight initialization that enables rapid fine-tuning with few gradient steps.", "zh": "提供简单的权重初始化，使少量梯度步骤即可快速微调。"}], "limits": [{"en": "Requires a distribution over tasks for meta-training, which may not be available.", "zh": "需要任务分布进行元训练，可能无法获得。"}, {"en": "Computationally expensive due to second-order gradients, though first-order approximation helps.", "zh": "由于二阶梯度计算成本高，尽管一阶近似有所缓解。"}, {"en": "May struggle with tasks that are very different from the meta-training distribution.", "zh": "可能难以处理与元训练分布差异很大的任务。"}, {"en": "Performance depends on the choice of inner-loop step size and number of gradient steps.", "zh": "性能依赖于内循环步长和梯度步数的选择。"}, {"en": "Not evaluated on large-scale or real-world few-shot learning benchmarks beyond image classification.", "zh": "未在图像分类之外的大规模或真实少样本学习基准上评估。"}]}, "cites": 14619, "org": "UC Berkeley"}, {"id": "arjovsky-1701.07875", "pid": "arjovsky", "arxiv": "1701.07875", "date": "2017-01-26", "venue": "stat.ML", "org": "Courant Institute, NYU", "fields": ["generative", "deep-learning"], "tEn": "Wasserstein GAN", "tZh": "Wasserstein GAN", "sEn": "WGAN improves GAN training stability, eliminates mode collapse, and provides meaningful loss curves.", "sZh": "WGAN 改进了 GAN 训练的稳定性，消除了模式崩溃，并提供了有意义的损失曲线。", "absEn": "We introduce a new algorithm named WGAN, an alternative to traditional GAN training. In this new model, we show that we can improve the stability of learning, get rid of problems like mode collapse, and provide meaningful learning curves useful for debugging and hyperparameter searches. Furthermore, we show that the corresponding optimization problem is sound, and provide extensive theoretical work highlighting the deep connections to other distances between distributions.", "absZh": "我们提出了一种名为 WGAN 的新算法，作为传统 GAN 训练的替代方案。在这个新模型中，我们展示了可以改善学习的稳定性，消除模式崩溃等问题，并提供有意义的用于调试和超参数搜索的学习曲线。此外，我们证明了相应的优化问题是合理的，并提供了广泛的理论工作，突出了与其他分布距离的深层联系。", "insights": {"contrib": [{"en": "Proposes WGAN using Earth Mover distance to improve training stability.", "zh": "提出使用推土机距离的WGAN，提升训练稳定性。"}, {"en": "Shows WGAN eliminates mode collapse and provides meaningful loss curves.", "zh": "展示WGAN消除模式崩溃并提供有意义的损失曲线。"}, {"en": "Proves continuity and differentiability of Wasserstein loss under mild assumptions.", "zh": "证明在温和假设下Wasserstein损失的连续性和可微性。"}, {"en": "Demonstrates training critic to optimality yields reliable gradients.", "zh": "展示将判别器训练至最优可产生可靠梯度。"}, {"en": "Provides theoretical analysis linking EM distance to other probability metrics.", "zh": "提供理论分析，连接EM距离与其他概率度量。"}, {"en": "Empirically validates WGAN on image generation with improved robustness.", "zh": "在图像生成上实证验证WGAN，鲁棒性提升。"}], "limits": [{"en": "Weight clipping for Lipschitz constraint is crude and may cause issues.", "zh": "权重裁剪实现Lipschitz约束粗糙，可能引发问题。"}, {"en": "WGAN unstable with momentum optimizers like Adam; requires RMSProp.", "zh": "WGAN对动量优化器（如Adam）不稳定，需用RMSProp。"}, {"en": "Loss estimate scaling depends on critic architecture, limiting cross-model comparison.", "zh": "损失估计缩放依赖判别器架构，限制跨模型比较。"}, {"en": "Theoretical optimality assumes infinite critic capacity, not practical.", "zh": "理论最优性假设判别器无限容量，不切实际。"}, {"en": "Experiments limited to LSUN-Bedrooms dataset; generalizability not fully tested.", "zh": "实验限于LSUN-Bedrooms数据集，泛化性未充分测试。"}]}}, {"id": "shazeer-1701.06538", "pid": "shazeer", "arxiv": "1701.06538", "date": "2017-01-23", "venue": "cs.LG", "fields": ["nlp", "efficiency"], "tEn": "Outrageously Large Neural Networks: The Sparsely-Gated Mixture-of-Experts Layer", "tZh": "超大神经网络：稀疏门控专家混合层", "sEn": "Sparsely-Gated Mixture-of-Experts layer enables >1000x model capacity increase with minor computational efficiency loss on modern GPU clusters.", "sZh": "稀疏门控专家混合层能够在现代GPU集群上实现超过1000倍的模型容量提升，同时仅带来轻微的计算效率损失。", "absEn": "The capacity of a neural network to absorb information is limited by its number of parameters. Conditional computation, where parts of the network are active on a per-example basis, has been proposed in theory as a way of dramatically increasing model capacity without a proportional increase in computation. In practice, however, there are significant algorithmic and performance challenges. In this work, we address these challenges and finally realize the promise of conditional computation, achieving greater than 1000x improvements in model capacity with only minor losses in computational efficiency on modern GPU clusters. We introduce a Sparsely-Gated Mixture-of-Experts layer (MoE), consisting of up to thousands of feed-forward sub-networks. A trainable gating network determines a sparse combination of these experts to use for each example. We apply the MoE to the tasks of language modeling and machine translation, where model capacity is critical for absorbing the vast quantities of knowledge available in the training corpora. We present model architectures in which a MoE with up to 137 billion parameters is applied convolutionally between stacked LSTM layers. On large language modeling and machine translation benchmarks, these models achieve significantly better results than state-of-the-art at lower computational cost.", "absZh": "神经网络吸收信息的能力受限于其参数数量。理论上，条件计算（即网络部分按样本激活）可以大幅增加模型容量而不成比例地增加计算量。然而在实践中，存在显著的算法和性能挑战。在这项工作中，我们解决了这些挑战，最终实现了条件计算的承诺，在现代GPU集群上实现了超过1000倍的模型容量提升，同时仅带来轻微的计算效率损失。我们引入了稀疏门控专家混合层（MoE），由多达数千个前馈子网络组成。一个可训练的门控网络为每个样本确定这些专家的稀疏组合。我们将MoE应用于语言建模和机器翻译任务，在这些任务中，模型容量对于吸收训练语料库中的大量知识至关重要。我们提出了模型架构，其中包含高达1370亿参数的MoE以卷积方式堆叠在LSTM层之间。在大型语言建模和机器翻译基准测试中，这些模型以更低的计算成本取得了显著优于现有技术的结果。", "insights": {"contrib": [{"en": "Introduces Sparsely-Gated Mixture-of-Experts (MoE) layer achieving >1000x capacity increase with minor efficiency loss.", "zh": "提出稀疏门控混合专家（MoE）层，实现超过1000倍的模型容量提升，仅带来轻微计算效率损失。"}, {"en": "Applies MoE convolutionally between stacked LSTM layers for language modeling and translation.", "zh": "在堆叠LSTM层之间卷积式应用MoE，用于语言建模和机器翻译。"}, {"en": "Demonstrates up to 137 billion parameter MoE models with state-of-the-art results at lower computational cost.", "zh": "展示了高达1370亿参数的MoE模型，以更低计算成本取得最先进结果。"}, {"en": "Addresses key challenges: sparse gating, load balancing, and efficient distributed training with synchronous data/model parallelism.", "zh": "解决了关键挑战：稀疏门控、负载均衡以及同步数据/模型并行的高效分布式训练。"}, {"en": "Shows experts specialize in syntax and semantics, improving model interpretability.", "zh": "显示专家在语法和语义上专门化，提升了模型可解释性。"}, {"en": "Achieves 24% lower perplexity on 1B-word benchmark and 39% lower on 100B-word corpus compared to baselines.", "zh": "在10亿词基准上困惑度降低24%，在1000亿词语料上降低39%。"}], "limits": [{"en": "MoE requires large batch sizes and specialized distributed infrastructure to maintain efficiency.", "zh": "MoE需要大批量数据和专门的分布式基础设施以维持效率。"}, {"en": "Gating network may converge to imbalanced expert usage without careful regularization.", "zh": "门控网络若无仔细正则化，可能收敛到不平衡的专家使用。"}, {"en": "Method primarily validated on text tasks; applicability to other domains with smaller datasets is uncertain.", "zh": "方法主要在文本任务上验证，对较小数据集的其他领域适用性不确定。"}, {"en": "Hierarchical MoE adds complexity and may not scale as well as flat MoE for very large expert counts.", "zh": "层次化MoE增加复杂性，在极大专家数量下可能不如扁平MoE可扩展。"}, {"en": "Load balancing losses introduce additional hyperparameters that require tuning.", "zh": "负载均衡损失引入了需要调优的额外超参数。"}]}, "cites": 4850, "org": "Google"}, {"id": "jredmon-1612.08242", "pid": "jredmon", "arxiv": "1612.08242", "date": "2016-12-25", "venue": "cs.CV", "org": "U. Washington", "fields": ["vision", "efficiency"], "tEn": "YOLO9000: Better, Faster, Stronger", "tZh": "YOLO9000：更好、更快、更强", "sEn": "YOLO9000 is a real-time object detection system that detects over 9000 categories, achieving state-of-the-art results on standard benchmarks while running significantly faster.", "sZh": "YOLO9000是一个实时目标检测系统，可检测超过9000个类别，在标准基准上达到最先进水平，同时运行速度显著更快。", "absEn": "We introduce YOLO9000, a state-of-the-art, real-time object detection system that can detect over 9000 object categories. First we propose various improvements to the YOLO detection method, both novel and drawn from prior work. The improved model, YOLOv2, is state-of-the-art on standard detection tasks like PASCAL VOC and COCO. At 67 FPS, YOLOv2 gets 76.8 mAP on VOC 2007. At 40 FPS, YOLOv2 gets 78.6 mAP, outperforming state-of-the-art methods like Faster RCNN with ResNet and SSD while still running significantly faster. Finally we propose a method to jointly train on object detection and classification. Using this method we train YOLO9000 simultaneously on the COCO detection dataset and the ImageNet classification dataset. Our joint training allows YOLO9000 to predict detections for object classes that don't have labelled detection data. We validate our approach on the ImageNet detection task. YOLO9000 gets 19.7 mAP on the ImageNet detection validation set despite only having detection data for 44 of the 200 classes. On the 156 classes not in COCO, YOLO9000 gets 16.0 mAP. But YOLO can detect more than just 200 classes; it predicts detections for more than 9000 different object categories. And it still runs in real-time.", "absZh": "我们介绍了YOLO9000，一个最先进的实时目标检测系统，能够检测超过9000个目标类别。首先，我们对YOLO检测方法提出了各种改进，既有新颖的也有借鉴前人工作的。改进后的模型YOLOv2在PASCAL VOC和COCO等标准检测任务上达到了最先进水平。在67 FPS下，YOLOv2在VOC 2007上获得76.8 mAP；在40 FPS下，YOLOv2获得78.6 mAP，超越了使用ResNet的Faster RCNN和SSD等最先进方法，同时运行速度仍然快得多。最后，我们提出了一种联合训练目标检测和分类的方法。使用这种方法，我们在COCO检测数据集和ImageNet分类数据集上同时训练YOLO9000。我们的联合训练使YOLO9000能够预测没有标记检测数据的目标类别的检测结果。我们在ImageNet检测任务上验证了我们的方法。尽管只有44个类别有检测数据，YOLO9000在ImageNet检测验证集上获得了19.7 mAP。对于不在COCO中的156个类别，YOLO9000获得了16.0 mAP。但YOLO可以检测的不仅仅是200个类别；它预测超过9000个不同目标类别的检测结果，并且仍然实时运行。", "insights": {"contrib": [{"en": "Proposes YOLOv2 with batch normalization, high-resolution classifier, anchor boxes, dimension clusters, direct location prediction, fine-grained features, and multi-scale training.", "zh": "提出YOLOv2，融合批归一化、高分辨率分类器、锚框、维度聚类、直接位置预测、细粒度特征和多尺度训练。"}, {"en": "Introduces WordTree, a hierarchical label structure combining ImageNet and COCO for joint classification and detection training.", "zh": "引入WordTree层次化标签结构，联合ImageNet和COCO进行分类与检测训练。"}, {"en": "Develops YOLO9000, a real-time detector recognizing over 9000 categories via joint training on detection and classification data.", "zh": "开发YOLO9000，通过检测与分类数据联合训练，实时识别超过9000个类别。"}, {"en": "Achieves state-of-the-art results on PASCAL VOC and COCO with YOLOv2, outperforming Faster R-CNN and SSD in speed and accuracy.", "zh": "YOLOv2在PASCAL VOC和COCO上达到最优，速度和精度均超越Faster R-CNN和SSD。"}, {"en": "Demonstrates 19.7 mAP on ImageNet detection with only 44 of 200 classes having detection labels, proving generalization to unseen classes.", "zh": "在ImageNet检测任务上仅用44/200类检测标签即达19.7 mAP，证明对未见类的泛化能力。"}, {"en": "Provides multi-scale training enabling a single YOLOv2 model to trade off speed and accuracy across resolutions from 288x288 to 608x608.", "zh": "多尺度训练使单个YOLOv2模型可在288x288至608x608分辨率间权衡速度与精度。"}], "limits": [{"en": "YOLOv2's performance on small objects is limited due to coarse 13x13 feature map despite fine-grained features.", "zh": "YOLOv2对小物体性能有限，尽管有细粒度特征，但特征图仍较粗（13x13）。"}, {"en": "YOLO9000 struggles with categories like clothing and equipment due to lack of detection data for those classes in COCO.", "zh": "YOLO9000对服装和设备等类别表现不佳，因COCO中缺乏这些类的检测数据。"}, {"en": "Joint training assumes weak labels for classification images, which may introduce noise and limit detection accuracy.", "zh": "联合训练对分类图像使用弱标签，可能引入噪声并限制检测精度。"}, {"en": "WordTree hierarchy is built from ImageNet and may not generalize to other datasets with different label structures.", "zh": "WordTree层次结构基于ImageNet构建，可能无法泛化到其他标签结构不同的数据集。"}, {"en": "The method relies on oversampling COCO to balance dataset sizes, which may not scale to even larger classification datasets.", "zh": "该方法依赖过采样COCO平衡数据集大小，可能无法扩展到更大的分类数据集。"}]}, "cites": 17668}, {"id": "tsungyilin-1612.03144", "pid": "tsungyilin", "arxiv": "1612.03144", "date": "2016-12-09", "venue": "cs.CV", "org": "Facebook AI Research", "fields": ["vision", "deep-learning"], "tEn": "Feature Pyramid Networks for Object Detection", "tZh": "特征金字塔网络用于目标检测", "sEn": "Feature Pyramid Networks (FPN) improve multi-scale object detection by leveraging deep convolutional networks' inherent pyramid hierarchy with minimal extra cost.", "sZh": "特征金字塔网络（FPN）利用深度卷积网络固有的金字塔层次结构，以极小的额外成本提升多尺度目标检测性能。", "absEn": "Feature pyramids are a basic component in recognition systems for detecting objects at different scales. But recent deep learning object detectors have avoided pyramid representations, in part because they are compute and memory intensive. In this paper, we exploit the inherent multi-scale, pyramidal hierarchy of deep convolutional networks to construct feature pyramids with marginal extra cost. A top-down architecture with lateral connections is developed for building high-level semantic feature maps at all scales. This architecture, called a Feature Pyramid Network (FPN), shows significant improvement as a generic feature extractor in several applications. Using FPN in a basic Faster R-CNN system, our method achieves state-of-the-art single-model results on the COCO detection benchmark without bells and whistles, surpassing all existing single-model entries including those from the COCO 2016 challenge winners. In addition, our method can run at 5 FPS on a GPU and thus is a practical and accurate solution to multi-scale object detection. Code will be made publicly available.", "absZh": "特征金字塔是识别系统中用于检测不同尺度目标的基本组件。但最近的深度学习目标检测器避免了金字塔表示，部分原因是其计算和内存密集。本文利用深度卷积网络固有的多尺度金字塔层次结构，以极小的额外成本构建特征金字塔。我们开发了一种带有侧向连接的top-down架构，用于构建所有尺度的高层语义特征图。这种架构称为特征金字塔网络（FPN），在多个应用中作为通用特征提取器显示出显著改进。在基本的Faster R-CNN系统中使用FPN，我们的方法在COCO检测基准上实现了最先进的单模型结果，无需任何技巧，超越了所有现有的单模型参赛者，包括COCO 2016挑战赛的获胜者。此外，我们的方法可以在GPU上以5 FPS运行，因此是一种实用且准确的多尺度目标检测解决方案。代码将公开。", "insights": {"contrib": [{"en": "Proposes Feature Pyramid Network (FPN) combining low-resolution strong semantics with high-resolution weak features via top-down pathway and lateral connections.", "zh": "提出特征金字塔网络（FPN），通过自上而下路径和横向连接，将低分辨率强语义特征与高分辨率弱语义特征结合。"}, {"en": "Achieves state-of-the-art single-model results on COCO detection benchmark using FPN with basic Faster R-CNN.", "zh": "使用FPN与基础Faster R-CNN，在COCO检测基准上取得单模型最优结果。"}, {"en": "Improves Average Recall (AR) by 8.0 points for bounding box proposals and boosts small object detection AR by 12.9 points.", "zh": "边界框提议的平均召回率（AR）提升8.0点，小物体检测AR提升12.9点。"}, {"en": "Enables end-to-end training with all scales and consistent train/test time usage, avoiding memory issues of image pyramids.", "zh": "支持所有尺度的端到端训练，训练/测试一致使用，避免图像金字塔的内存问题。"}, {"en": "Extends FPN to mask proposal generation, achieving 48.1 AR and 6-7 FPS, outperforming prior methods by over 8.3 AR.", "zh": "将FPN扩展到掩码提议生成，达到48.1 AR和6-7 FPS，比先前方法AR提升超过8.3点。"}, {"en": "Demonstrates that explicit multi-scale pyramid representations remain critical despite deep ConvNets' scale robustness.", "zh": "证明尽管深度卷积网络具有尺度鲁棒性，显式多尺度金字塔表示仍然至关重要。"}], "limits": [{"en": "Evaluation limited to ResNet backbones; performance on other architectures like Transformer not explored.", "zh": "评估仅限于ResNet骨干网络，未探索Transformer等其他架构的性能。"}, {"en": "Method relies on predefined anchor scales and aspect ratios; may not generalize to arbitrary object shapes.", "zh": "方法依赖预定义的锚点尺度和长宽比，可能无法泛化到任意物体形状。"}, {"en": "FPN adds extra layers and computations, though marginal; may not be optimal for extremely resource-constrained settings.", "zh": "FPN增加了额外层和计算量（虽小），在极端资源受限场景下可能非最优。"}, {"en": "Experiments conducted on COCO dataset; generalization to other domains (e.g., medical imaging) not validated.", "zh": "实验在COCO数据集上进行，未验证在其他领域（如医学影像）的泛化性。"}, {"en": "Shared classifier/regressor heads assume uniform semantics across pyramid levels; may fail if semantic gaps are large.", "zh": "共享分类器/回归器头假设金字塔各层语义一致，语义差距大时可能失效。"}]}, "cites": 27152}, {"id": "mbronstein-1611.08097", "pid": "mbronstein", "arxiv": "1611.08097", "date": "2016-11-24", "venue": "cs.CV", "org": "USI Lugano", "fields": ["deep-learning", "vision"], "tEn": "Geometric deep learning: going beyond Euclidean data", "tZh": "几何深度学习：超越欧几里得数据", "sEn": "Geometric deep learning extends deep neural networks to non-Euclidean domains like graphs and manifolds.", "sZh": "几何深度学习将深度神经网络扩展到图与流形等非欧几里得领域。", "absEn": "Many scientific fields study data with an underlying structure that is a non-Euclidean space. Some examples include social networks in computational social sciences, sensor networks in communications, functional networks in brain imaging, regulatory networks in genetics, and meshed surfaces in computer graphics. In many applications, such geometric data are large and complex (in the case of social networks, on the scale of billions), and are natural targets for machine learning techniques. In particular, we would like to use deep neural networks, which have recently proven to be powerful tools for a broad range of problems from computer vision, natural language processing, and audio analysis. However, these tools have been most successful on data with an underlying Euclidean or grid-like structure, and in cases where the invariances of these structures are built into networks used to model them. Geometric deep learning is an umbrella term for emerging techniques attempting to generalize (structured) deep neural models to non-Euclidean domains such as graphs and manifolds. The purpose of this paper is to overview different examples of geometric deep learning problems and present available solutions, key difficulties, applications, and future research directions in this nascent field.", "absZh": "许多科学领域研究的数据具有非欧几里得空间的底层结构，例如计算社会科学中的社交网络、通信中的传感器网络、脑成像中的功能网络、遗传学中的调控网络以及计算机图形学中的网格曲面。这些几何数据通常规模庞大且复杂（如社交网络可达数十亿规模），自然成为机器学习技术的目标。特别是，我们希望能使用深度神经网络，这些网络已在计算机视觉、自然语言处理和音频分析等广泛问题上展现出强大能力。然而，这些工具在具有欧几里得或网格状结构的数据上最为成功，且其不变性被内置于用于建模的网络中。几何深度学习是一个总称，涵盖试图将（结构化的）深度神经网络模型推广到非欧几里得领域（如图和流形）的新兴技术。本文旨在概述几何深度学习问题的不同示例，并介绍现有解决方案、关键难点、应用以及这一新兴领域的未来研究方向。", "insights": {"contrib": [{"en": "Introduces geometric deep learning as a framework for non-Euclidean data like graphs and manifolds.", "zh": "将几何深度学习作为处理非欧几里得数据（如图和流形）的框架引入。"}, {"en": "Reviews key applications in social networks, sensor networks, brain imaging, genetics, and graphics.", "zh": "综述了社交网络、传感器网络、脑成像、遗传学和图形学中的关键应用。"}, {"en": "Identifies difficulties in generalizing deep neural networks to non-Euclidean domains.", "zh": "指出了将深度神经网络推广到非欧几里得领域的困难。"}, {"en": "Summarizes available solutions for geometric deep learning problems.", "zh": "总结了几何深度学习问题的现有解决方案。"}, {"en": "Outlines future research directions in this nascent field.", "zh": "勾勒了这一新兴领域的未来研究方向。"}], "limits": [{"en": "Focuses on non-Euclidean data, excluding Euclidean-structured data like images and text.", "zh": "专注于非欧几里得数据，排除了图像和文本等欧几里得结构数据。"}, {"en": "Provides a high-level overview without in-depth technical details.", "zh": "提供高层次概述，缺乏深入的技术细节。"}, {"en": "Does not cover specific algorithms or empirical comparisons.", "zh": "未涵盖具体算法或实证比较。"}, {"en": "Limited to early-stage research; many challenges remain unsolved.", "zh": "仅限于早期研究，许多挑战仍未解决。"}]}, "cites": 3852}, {"id": "pisola-1611.07004", "pid": "pisola", "arxiv": "1611.07004", "date": "2016-11-21", "venue": "cs.CV", "org": "UC Berkeley", "fields": ["generative", "vision"], "tEn": "Image-to-Image Translation with Conditional Adversarial Networks", "tZh": "基于条件对抗网络的图像到图像翻译", "sEn": "Conditional adversarial networks serve as a general-purpose solution for image-to-image translation, learning both the mapping and the loss function.", "sZh": "条件对抗网络作为图像到图像翻译的通用解决方案，同时学习映射和损失函数。", "absEn": "We investigate conditional adversarial networks as a general-purpose solution to image-to-image translation problems. These networks not only learn the mapping from input image to output image, but also learn a loss function to train this mapping. This makes it possible to apply the same generic approach to problems that traditionally would require very different loss formulations. We demonstrate that this approach is effective at synthesizing photos from label maps, reconstructing objects from edge maps, and colorizing images, among other tasks. Indeed, since the release of the pix2pix software associated with this paper, a large number of internet users (many of them artists) have posted their own experiments with our system, further demonstrating its wide applicability and ease of adoption without the need for parameter tweaking. As a community, we no longer hand-engineer our mapping functions, and this work suggests we can achieve reasonable results without hand-engineering our loss functions either.", "absZh": "我们研究了条件对抗网络作为图像到图像翻译问题的通用解决方案。这些网络不仅学习从输入图像到输出图像的映射，还学习训练该映射的损失函数。这使得可以将相同的通用方法应用于传统上需要非常不同损失公式的问题。我们证明了该方法在从标签图合成照片、从边缘图重建物体以及图像着色等任务中是有效的。事实上，自与本文相关的pix2pix软件发布以来，大量互联网用户（其中许多是艺术家）发布了他们使用我们系统的实验，进一步证明了其广泛的适用性和无需参数调整的易用性。作为一个社区，我们不再手工设计映射函数，而这项工作表明，我们也可以在不手工设计损失函数的情况下获得合理的结果。", "insights": {"contrib": [{"en": "Proposes conditional GANs as a general-purpose framework for image-to-image translation, learning both mapping and loss function.", "zh": "提出条件生成对抗网络作为图像到图像翻译的通用框架，同时学习映射和损失函数。"}, {"en": "Demonstrates effectiveness across diverse tasks: label-to-photo, edge-to-photo, colorization, etc., without task-specific engineering.", "zh": "在标签到照片、边缘到照片、着色等多种任务上展示有效性，无需任务特定工程。"}, {"en": "Introduces U-Net generator with skip connections to shuttle low-level information, improving output quality.", "zh": "引入带跳跃连接的U-Net生成器以传递低级信息，提升输出质量。"}, {"en": "Designs PatchGAN discriminator that penalizes structure at patch scale, enabling high-frequency detail modeling.", "zh": "设计PatchGAN判别器在图像块尺度惩罚结构，实现高频细节建模。"}, {"en": "Shows that L1 loss combined with adversarial loss reduces blurring and improves colorfulness.", "zh": "展示L1损失与对抗损失结合可减少模糊并提升色彩丰富度。"}, {"en": "Releases pix2pix software, enabling wide community adoption and creative applications.", "zh": "发布pix2pix软件，促进社区广泛采用和创意应用。"}], "limits": [{"en": "Conditional GANs produce limited stochasticity; dropout noise yields only minor output variation.", "zh": "条件GAN产生的随机性有限；dropout噪声仅带来微小输出变化。"}, {"en": "Method requires paired training data; not applicable to unpaired image translation tasks.", "zh": "方法需要成对训练数据；不适用于未配对的图像翻译任务。"}, {"en": "PatchGAN assumes local pixel independence, which may not hold for global structure tasks.", "zh": "PatchGAN假设局部像素独立，可能不适用于全局结构任务。"}, {"en": "Performance on vision tasks like semantic segmentation is inferior to simple L1 regression.", "zh": "在语义分割等视觉任务上的表现不如简单的L1回归。"}, {"en": "Full-image GAN (ImageGAN) underperforms due to increased parameters and training difficulty.", "zh": "全图GAN（ImageGAN）因参数增多和训练困难而表现不佳。"}]}, "cites": 22526}, {"id": "avdoord-1609.03499", "pid": "avdoord", "arxiv": "1609.03499", "date": "2016-09-12", "venue": "cs.SD", "org": "Google DeepMind", "fields": ["deep-learning", "generative"], "tEn": "WaveNet: A Generative Model for Raw Audio", "tZh": "WaveNet：原始音频的生成模型", "sEn": "WaveNet is a deep neural network for generating raw audio waveforms, achieving state-of-the-art text-to-speech performance and realistic music generation.", "sZh": "WaveNet是一种用于生成原始音频波形的深度神经网络，在文本转语音任务中达到最先进水平，并能生成逼真的音乐片段。", "absEn": "This paper introduces WaveNet, a deep neural network for generating raw audio waveforms. The model is fully probabilistic and autoregressive, with the predictive distribution for each audio sample conditioned on all previous ones; nonetheless we show that it can be efficiently trained on data with tens of thousands of samples per second of audio. When applied to text-to-speech, it yields state-of-the-art performance, with human listeners rating it as significantly more natural sounding than the best parametric and concatenative systems for both English and Mandarin. A single WaveNet can capture the characteristics of many different speakers with equal fidelity, and can switch between them by conditioning on the speaker identity. When trained to model music, we find that it generates novel and often highly realistic musical fragments. We also show that it can be employed as a discriminative model, returning promising results for phoneme recognition.", "absZh": "本文介绍了WaveNet，一种用于生成原始音频波形的深度神经网络。该模型是完全概率性和自回归的，每个音频样本的预测分布都基于所有之前的样本；尽管如此，我们表明它可以高效地训练每秒包含数万个样本的音频数据。当应用于文本转语音时，它实现了最先进的性能，人类听众评价其自然度显著优于英语和普通话的最佳参数化和拼接系统。单个WaveNet可以以相同的保真度捕捉许多不同说话者的特征，并通过条件化说话者身份在它们之间切换。当训练用于建模音乐时，我们发现它生成了新颖且通常高度逼真的音乐片段。我们还展示了它可以作为判别模型使用，在音素识别方面取得了有希望的结果。", "insights": {"contrib": [{"en": "Introduces WaveNet, a deep autoregressive model for raw audio waveforms.", "zh": "提出WaveNet，一种用于原始音频波形的深度自回归模型。"}, {"en": "Uses dilated causal convolutions to achieve large receptive fields efficiently.", "zh": "使用扩张因果卷积高效实现大感受野。"}, {"en": "Achieves state-of-the-art text-to-speech naturalness for English and Mandarin.", "zh": "在英语和中文文本转语音中达到最先进的自然度。"}, {"en": "Single model can generate multiple voices by conditioning on speaker identity.", "zh": "单个模型可通过条件化说话人身份生成多种声音。"}, {"en": "Generates novel and realistic music fragments when trained on music data.", "zh": "在音乐数据上训练时生成新颖且逼真的音乐片段。"}, {"en": "Adapts to discriminative tasks like phoneme recognition with strong results.", "zh": "适应音素识别等判别任务并取得强结果。"}], "limits": [{"en": "Limited receptive field (e.g., 300 ms) causes lack of long-range coherence in free-form speech.", "zh": "有限感受野（如300毫秒）导致自由形式语音缺乏长程连贯性。"}, {"en": "Text-to-speech prosody can be unnatural without explicit F0 conditioning.", "zh": "文本转语音的韵律在没有显式F0条件化时可能不自然。"}, {"en": "Music generation lacks long-range consistency across seconds.", "zh": "音乐生成在数秒内缺乏长程一致性。"}, {"en": "Softmax over 256 quantized values limits audio fidelity compared to 16-bit.", "zh": "256量化值的Softmax相比16位限制了音频保真度。"}, {"en": "Training and inference are computationally expensive for very long sequences.", "zh": "对于极长序列，训练和推理计算成本高。"}]}, "cites": 8261}, {"id": "tkipf-1609.02907", "pid": "tkipf", "arxiv": "1609.02907", "date": "2016-09-09", "venue": "cs.LG", "org": "U. Amsterdam", "fields": ["deep-learning"], "tEn": "Semi-Supervised Classification with Graph Convolutional Networks", "tZh": "基于图卷积网络的半监督分类", "sEn": "A scalable semi-supervised learning approach using graph convolutional networks outperforms related methods on citation networks and knowledge graphs.", "sZh": "一种基于图卷积网络的可扩展半监督学习方法，在引文网络和知识图谱上显著优于相关方法。", "absEn": "We present a scalable approach for semi-supervised learning on graph-structured data that is based on an efficient variant of convolutional neural networks which operate directly on graphs. We motivate the choice of our convolutional architecture via a localized first-order approximation of spectral graph convolutions. Our model scales linearly in the number of graph edges and learns hidden layer representations that encode both local graph structure and features of nodes. In a number of experiments on citation networks and on a knowledge graph dataset we demonstrate that our approach outperforms related methods by a significant margin.", "absZh": "我们提出了一种可扩展的半监督学习方法，用于处理图结构数据，该方法基于一种直接在图上操作的高效卷积神经网络变体。我们通过谱图卷积的局部一阶近似来论证卷积架构的选择。我们的模型在图边数上呈线性扩展，并学习编码局部图结构和节点特征的隐藏层表示。在引文网络和知识图谱数据集上的多项实验表明，我们的方法显著优于相关方法。", "insights": {"contrib": [{"en": "Introduces a scalable Graph Convolutional Network (GCN) for semi-supervised learning on graphs.", "zh": "提出一种可扩展的图卷积网络（GCN），用于图上的半监督学习。"}, {"en": "Motivates the GCN architecture via a localized first-order approximation of spectral graph convolutions.", "zh": "通过谱图卷积的局部一阶近似来论证GCN架构的合理性。"}, {"en": "Achieves linear scaling in the number of graph edges and encodes both local structure and node features.", "zh": "实现与图边数成线性缩放，并编码局部结构和节点特征。"}, {"en": "Outperforms related methods on citation networks and knowledge graph datasets.", "zh": "在引文网络和知识图谱数据集上优于相关方法。"}, {"en": "Proposes a renormalization trick to improve numerical stability and performance.", "zh": "提出重归一化技巧以提高数值稳定性和性能。"}, {"en": "Demonstrates efficiency in wall-clock time compared to state-of-the-art methods.", "zh": "在运行时间上比现有最优方法更高效。"}], "limits": [{"en": "Full-batch gradient descent leads to memory requirements linear in dataset size.", "zh": "全批量梯度下降导致内存需求与数据集大小成线性关系。"}, {"en": "Does not naturally support edge features or directed graphs.", "zh": "不天然支持边特征或有向图。"}, {"en": "Assumes locality and equal importance of self-connections vs. neighbor edges.", "zh": "假设局部性和自连接与邻居边的重要性相等。"}, {"en": "Mini-batch SGD requires careful handling of K-order neighborhoods for exact inference.", "zh": "小批量SGD需要谨慎处理K阶邻域以实现精确推理。"}, {"en": "Limited to undirected graphs; directed edges require bipartite graph transformation.", "zh": "仅限于无向图；有向边需要二部图转换。"}]}, "cites": 35617}, {"id": "gaohuang-1608.06993", "pid": "gaohuang", "arxiv": "1608.06993", "date": "2016-08-25", "venue": "cs.CV", "org": "Cornell University", "fields": ["vision", "deep-learning"], "tEn": "Densely Connected Convolutional Networks", "tZh": "密集连接卷积网络", "sEn": "DenseNet connects each layer to every other layer, improving accuracy and efficiency.", "sZh": "DenseNet将每一层与所有其他层连接，提升了准确性和效率。", "absEn": "Recent work has shown that convolutional networks can be substantially deeper, more accurate, and efficient to train if they contain shorter connections between layers close to the input and those close to the output. In this paper, we embrace this observation and introduce the Dense Convolutional Network (DenseNet), which connects each layer to every other layer in a feed-forward fashion. Whereas traditional convolutional networks with L layers have L connections - one between each layer and its subsequent layer - our network has L(L+1)/2 direct connections. For each layer, the feature-maps of all preceding layers are used as inputs, and its own feature-maps are used as inputs into all subsequent layers. DenseNets have several compelling advantages: they alleviate the vanishing-gradient problem, strengthen feature propagation, encourage feature reuse, and substantially reduce the number of parameters. We evaluate our proposed architecture on four highly competitive object recognition benchmark tasks (CIFAR-10, CIFAR-100, SVHN, and ImageNet). DenseNets obtain significant improvements over the state-of-the-art on most of them, whilst requiring less computation to achieve high performance. Code and pre-trained models are available at https://github.com/liuzhuang13/DenseNet .", "absZh": "近期研究表明，如果卷积网络在靠近输入和输出的层之间包含更短的连接，网络可以变得更深、更准确且更易于训练。本文基于这一观察，提出了密集卷积网络（DenseNet），它以馈送方式将每一层与所有其他层连接。传统的L层卷积网络有L个连接——每层与其后续层之间一个连接——而我们的网络有L(L+1)/2个直接连接。对于每一层，所有前层的特征图被用作输入，其自身的特征图被用作所有后续层的输入。DenseNet具有几个引人注目的优势：它缓解了梯度消失问题，增强了特征传播，鼓励特征重用，并大幅减少了参数数量。我们在四个极具竞争力的目标识别基准任务（CIFAR-10、CIFAR-100、SVHN和ImageNet）上评估了我们提出的架构。DenseNet在大多数任务上取得了比现有技术显著的改进，同时需要更少的计算量来实现高性能。代码和预训练模型可在https://github.com/liuzhuang13/DenseNet获取。", "insights": {"contrib": [{"en": "Proposes DenseNet with dense connectivity connecting each layer to all subsequent layers.", "zh": "提出DenseNet，通过密集连接将每一层与所有后续层相连。"}, {"en": "Alleviates vanishing-gradient problem and strengthens feature propagation.", "zh": "缓解梯度消失问题并增强特征传播。"}, {"en": "Encourages feature reuse and substantially reduces number of parameters.", "zh": "鼓励特征重用并大幅减少参数数量。"}, {"en": "Achieves state-of-the-art results on CIFAR, SVHN, and ImageNet with less computation.", "zh": "在CIFAR、SVHN和ImageNet上以更少计算量取得最先进结果。"}, {"en": "Introduces bottleneck and compression layers for parameter efficiency.", "zh": "引入瓶颈层和压缩层以提高参数效率。"}, {"en": "Demonstrates implicit deep supervision through dense connections.", "zh": "通过密集连接展示隐式深度监督。"}], "limits": [{"en": "Evaluation limited to image classification tasks; not tested on other domains.", "zh": "评估仅限于图像分类任务，未在其他领域测试。"}, {"en": "Memory inefficiency in naive implementation requires optimized version.", "zh": "朴素实现存在内存效率问题，需要优化版本。"}, {"en": "Hyperparameters optimized for ResNets may not be optimal for DenseNets.", "zh": "为ResNet优化的超参数可能不适用于DenseNet。"}, {"en": "Performance on SVHN does not improve beyond 250 layers due to overfitting.", "zh": "在SVHN上超过250层时性能不再提升，因过拟合。"}, {"en": "Theoretical analysis of feature reuse is limited to empirical observations.", "zh": "特征重用的理论分析仅限于经验观察。"}]}, "cites": 43625}, {"id": "fhutter-1608.03983", "pid": "fhutter", "arxiv": "1608.03983", "date": "2016-08-13", "venue": "cs.LG", "org": "University of Freiburg", "fields": ["deep-learning", "efficiency"], "tEn": "SGDR: Stochastic Gradient Descent with Warm Restarts", "tZh": "SGDR：带热重启的随机梯度下降", "sEn": "A simple warm restart technique for SGD improves anytime performance and achieves state-of-the-art results on CIFAR-10 and CIFAR-100.", "sZh": "一种简单的SGD热重启技术提升了任意时刻的性能，并在CIFAR-10和CIFAR-100上取得了最先进的结果。", "absEn": "Restart techniques are common in gradient-free optimization to deal with multimodal functions. Partial warm restarts are also gaining popularity in gradient-based optimization to improve the rate of convergence in accelerated gradient schemes to deal with ill-conditioned functions. In this paper, we propose a simple warm restart technique for stochastic gradient descent to improve its anytime performance when training deep neural networks. We empirically study its performance on the CIFAR-10 and CIFAR-100 datasets, where we demonstrate new state-of-the-art results at 3.14% and 16.21%, respectively. We also demonstrate its advantages on a dataset of EEG recordings and on a downsampled version of the ImageNet dataset. Our source code is available at https://github.com/loshchil/SGDR", "absZh": "重启技术在无梯度优化中常用于处理多模态函数。部分热重启在基于梯度的优化中也越来越受欢迎，以加速梯度方案中的收敛速度，处理病态函数。在本文中，我们提出了一种简单的随机梯度下降热重启技术，以提高训练深度神经网络时的任意时刻性能。我们在CIFAR-10和CIFAR-100数据集上进行了实证研究，分别取得了3.14%和16.21%的最新最优结果。我们还在EEG记录数据集和ImageNet数据集的下采样版本上展示了其优势。我们的源代码可在https://github.com/loshchil/SGDR获取。", "insights": {"contrib": [{"en": "Proposes SGDR, a warm restart technique for SGD to improve anytime performance in training deep neural networks.", "zh": "提出SGDR，一种用于SGD的热重启技术，以提升深度神经网络训练中的实时性能。"}, {"en": "Achieves new state-of-the-art results on CIFAR-10 (3.14%) and CIFAR-100 (16.21%) using ensembles of snapshots.", "zh": "在CIFAR-10（3.14%）和CIFAR-100（16.21%）上使用快照集成取得了新的最优结果。"}, {"en": "Demonstrates 2x to 4x faster convergence compared to standard learning rate schedules on CIFAR datasets.", "zh": "在CIFAR数据集上，相比标准学习率调度，收敛速度提升2到4倍。"}, {"en": "Validates SGDR on EEG recordings and downsampled ImageNet, showing better anytime performance.", "zh": "在脑电图记录和下采样ImageNet上验证SGDR，展示了更好的实时性能。"}, {"en": "Shows that SGDR enables efficient ensemble building from intermediate model snapshots at no extra cost.", "zh": "表明SGDR能够从中间模型快照中高效构建集成，无需额外成本。"}, {"en": "Provides open-source code for reproducibility.", "zh": "提供开源代码以确保可复现性。"}], "limits": [{"en": "Empirical study limited to CIFAR-10, CIFAR-100, EEG, and downsampled ImageNet datasets.", "zh": "实证研究仅限于CIFAR-10、CIFAR-100、脑电图和下采样ImageNet数据集。"}, {"en": "No theoretical analysis of convergence or generalization guarantees for SGDR.", "zh": "缺乏对SGDR收敛性或泛化保证的理论分析。"}, {"en": "Hyperparameter sensitivity of initial learning rate and restart period not fully explored.", "zh": "初始学习率和重启周期的超参数敏感性未充分探索。"}, {"en": "Results may not generalize to other architectures or optimization methods beyond SGD with momentum.", "zh": "结果可能无法推广到其他架构或除带动量SGD之外的优化方法。"}, {"en": "Ensemble performance relies on multiple runs and snapshot selection, increasing computational cost.", "zh": "集成性能依赖于多次运行和快照选择，增加了计算成本。"}]}, "cites": 10679}, {"id": "jimmyba-1607.06450", "pid": "jimmyba", "arxiv": "1607.06450", "date": "2016-07-21", "venue": "stat.ML", "org": "U. Toronto", "fields": ["deep-learning", "nlp"], "tEn": "Layer Normalization", "tZh": "层归一化", "sEn": "Layer normalization normalizes neuron inputs across features within a single training case, stabilizing recurrent network training.", "sZh": "层归一化对单个训练样本中同一层的所有神经元输入进行归一化，有效稳定循环网络的训练过程。", "absEn": "Training state-of-the-art, deep neural networks is computationally expensive. One way to reduce the training time is to normalize the activities of the neurons. A recently introduced technique called batch normalization uses the distribution of the summed input to a neuron over a mini-batch of training cases to compute a mean and variance which are then used to normalize the summed input to that neuron on each training case. This significantly reduces the training time in feed-forward neural networks. However, the effect of batch normalization is dependent on the mini-batch size and it is not obvious how to apply it to recurrent neural networks. In this paper, we transpose batch normalization into layer normalization by computing the mean and variance used for normalization from all of the summed inputs to the neurons in a layer on a single training case. Like batch normalization, we also give each neuron its own adaptive bias and gain which are applied after the normalization but before the non-linearity. Unlike batch normalization, layer normalization performs exactly the same computation at training and test times. It is also straightforward to apply to recurrent neural networks by computing the normalization statistics separately at each time step. Layer normalization is very effective at stabilizing the hidden state dynamics in recurrent networks. Empirically, we show that layer normalization can substantially reduce the training time compared with previously published techniques.", "absZh": "训练最先进的深度神经网络计算成本高昂。减少训练时间的一种方法是归一化神经元的活动。最近引入的批归一化技术利用小批量训练样本中神经元求和输入的分布来计算均值和方差，进而对每个训练样本的求和输入进行归一化，这显著减少了前馈神经网络的训练时间。然而，批归一化的效果依赖于小批量大小，并且如何将其应用于循环神经网络尚不明确。本文通过从单个训练样本中一层所有神经元的求和输入计算用于归一化的均值和方差，将批归一化转化为层归一化。与批归一化类似，我们为每个神经元赋予自适应的偏置和增益，在归一化之后、非线性激活之前应用。与批归一化不同，层归一化在训练和测试时执行完全相同的计算。通过在每个时间步分别计算归一化统计量，层归一化也易于应用于循环神经网络。层归一化在稳定循环网络的隐藏状态动态方面非常有效。实验表明，与先前发表的技术相比，层归一化可以显著减少训练时间。", "insights": {"contrib": [{"en": "Proposes layer normalization, computing mean and variance from all summed inputs in a layer per training case.", "zh": "提出层归一化，对单个训练样本的层内所有求和输入计算均值和方差。"}, {"en": "Layer normalization works for RNNs by computing normalization statistics separately at each time step.", "zh": "层归一化通过在每个时间步分别计算归一化统计量，适用于循环神经网络。"}, {"en": "Layer normalization stabilizes hidden state dynamics in recurrent networks, reducing training time.", "zh": "层归一化稳定循环网络中的隐藏状态动态，减少训练时间。"}, {"en": "Empirically shows faster convergence and better generalization on multiple tasks including QA and language modeling.", "zh": "实验表明在问答和语言建模等多个任务上收敛更快且泛化更好。"}, {"en": "Layer normalization is invariant to re-scaling of entire weight matrix and per-case feature shifting.", "zh": "层归一化对整体权重矩阵的缩放和每个样本的特征平移具有不变性。"}, {"en": "Layer normalization is robust to small mini-batch sizes and online learning settings.", "zh": "层归一化对小批量大小和在线学习设置具有鲁棒性。"}], "limits": [{"en": "Layer normalization underperforms batch normalization in convolutional neural networks.", "zh": "层归一化在卷积神经网络中表现不如批归一化。"}, {"en": "The method assumes hidden units in a layer contribute similarly, which may not hold for CNNs.", "zh": "该方法假设层内隐藏单元贡献相似，这在CNN中可能不成立。"}, {"en": "Layer normalization is not invariant to individual weight vector scaling, unlike batch normalization.", "zh": "与批归一化不同，层归一化对单个权重向量的缩放不具有不变性。"}, {"en": "Theoretical analysis is limited to generalized linear models and may not fully capture deep network behavior.", "zh": "理论分析局限于广义线性模型，可能无法完全捕捉深度网络行为。"}, {"en": "Empirical evaluation focuses on RNNs; feed-forward and CNN results are less comprehensive.", "zh": "实验评估主要针对RNN，前馈和CNN的结果不够全面。"}]}, "cites": 12705}, {"id": "tmikolov-1607.04606", "pid": "tmikolov", "arxiv": "1607.04606", "date": "2016-07-15", "venue": "cs.CL", "org": "Meta AI", "fields": ["nlp", "efficiency"], "tEn": "Enriching Word Vectors with Subword Information", "tZh": "利用子词信息丰富词向量", "sEn": "We propose a fast skipgram-based method that represents words as bags of character n-grams, achieving state-of-the-art performance on word similarity and analogy tasks across nine languages.", "sZh": "我们提出一种基于skipgram的快速方法，将单词表示为字符n-gram的集合，在九种语言的词相似性和类比任务上达到了最先进水平。", "absEn": "Continuous word representations, trained on large unlabeled corpora are useful for many natural language processing tasks. Popular models that learn such representations ignore the morphology of words, by assigning a distinct vector to each word. This is a limitation, especially for languages with large vocabularies and many rare words. In this paper, we propose a new approach based on the skipgram model, where each word is represented as a bag of character $n$-grams. A vector representation is associated to each character $n$-gram; words being represented as the sum of these representations. Our method is fast, allowing to train models on large corpora quickly and allows us to compute word representations for words that did not appear in the training data. We evaluate our word representations on nine different languages, both on word similarity and analogy tasks. By comparing to recently proposed morphological word representations, we show that our vectors achieve state-of-the-art performance on these tasks.", "absZh": "在大规模无标签语料上训练的连续词表示对许多自然语言处理任务非常有用。学习这种表示的流行模型忽略了单词的形态，为每个单词分配一个不同的向量。这是一个局限，尤其对于词汇量大且罕见词多的语言。本文提出了一种基于skipgram模型的新方法，其中每个单词被表示为字符n-gram的集合。每个字符n-gram关联一个向量表示；单词表示为这些表示的总和。我们的方法速度快，允许快速在大语料上训练模型，并允许我们计算未出现在训练数据中的单词的词表示。我们在九种不同语言上评估了我们的词表示，包括词相似性和类比任务。通过与最近提出的形态词表示进行比较，我们展示了我们的向量在这些任务上达到了最先进的性能。", "insights": {"contrib": [{"en": "Proposes a skipgram extension using character n-grams to capture subword information.", "zh": "提出一种基于字符n-gram的skipgram扩展，以捕捉子词信息。"}, {"en": "Represents each word as a sum of its character n-gram vectors, enabling parameter sharing.", "zh": "将每个词表示为其字符n-gram向量的和，实现参数共享。"}, {"en": "Achieves state-of-the-art performance on word similarity and analogy tasks across nine languages.", "zh": "在九种语言的词相似性和类比任务上达到最先进性能。"}, {"en": "Handles out-of-vocabulary words by composing vectors from their character n-grams.", "zh": "通过组合字符n-gram向量处理词汇表外单词。"}, {"en": "Demonstrates robustness to small training data, outperforming baselines with limited corpora.", "zh": "对小训练数据具有鲁棒性，在有限语料上优于基线模型。"}, {"en": "Improves language modeling perplexity, especially for morphologically rich languages.", "zh": "改善语言建模困惑度，尤其对形态丰富的语言效果显著。"}], "limits": [{"en": "Performance on semantic analogy tasks may degrade for some languages with suboptimal n-gram lengths.", "zh": "在语义类比任务上，若n-gram长度选择不当，某些语言性能可能下降。"}, {"en": "Model relies on a fixed range of n-gram lengths (3-6), which may not be optimal for all languages.", "zh": "模型依赖固定的n-gram长度范围（3-6），可能并非所有语言的最优选择。"}, {"en": "Training is approximately 1.5x slower than the skipgram baseline due to n-gram processing.", "zh": "由于n-gram处理，训练速度比skipgram基线慢约1.5倍。"}, {"en": "Evaluation on word similarity datasets may include out-of-vocabulary words, requiring null vectors for baselines.", "zh": "词相似性数据集可能包含词汇表外单词，基线模型需使用零向量。"}, {"en": "Method does not use morphological segmentation, potentially missing some linguistic structures.", "zh": "方法未使用形态分割，可能遗漏某些语言结构。"}]}, "cites": 10794}, {"id": "mdefferrard-1606.09375", "pid": "mdefferrard", "arxiv": "1606.09375", "date": "2016-06-30", "venue": "cs.LG", "org": "EPFL", "fields": ["deep-learning", "efficiency"], "tEn": "Convolutional Neural Networks on Graphs with Fast Localized Spectral Filtering", "tZh": "基于快速局部谱滤波的图卷积神经网络", "sEn": "We generalize CNNs to graphs using spectral graph theory, achieving linear complexity and universal applicability.", "sZh": "我们将卷积神经网络从规则网格推广到图结构，利用谱图理论设计快速局部滤波器，保持线性复杂度并适用于任意图。", "absEn": "In this work, we are interested in generalizing convolutional neural networks (CNNs) from low-dimensional regular grids, where image, video and speech are represented, to high-dimensional irregular domains, such as social networks, brain connectomes or words' embedding, represented by graphs. We present a formulation of CNNs in the context of spectral graph theory, which provides the necessary mathematical background and efficient numerical schemes to design fast localized convolutional filters on graphs. Importantly, the proposed technique offers the same linear computational complexity and constant learning complexity as classical CNNs, while being universal to any graph structure. Experiments on MNIST and 20NEWS demonstrate the ability of this novel deep learning system to learn local, stationary, and compositional features on graphs.", "absZh": "本文旨在将卷积神经网络从低维规则网格（如图像、视频和语音）推广到高维不规则域（如社交网络、脑连接组或词嵌入），这些域由图表示。我们基于谱图理论提出了CNN的一种形式化方法，提供了必要的数学背景和高效的数值方案，以在图上的设计快速局部卷积滤波器。重要的是，所提出的技术具有与经典CNN相同的线性计算复杂度和恒定的学习复杂度，同时适用于任何图结构。在MNIST和20NEWS上的实验表明，这种新型深度学习系统能够学习图上的局部、平稳和组合特征。", "insights": {"contrib": [{"en": "Proposes a spectral graph CNN formulation using Chebyshev polynomials for fast localized filtering.", "zh": "提出使用切比雪夫多项式的谱图CNN公式，实现快速局部滤波。"}, {"en": "Achieves linear computational complexity O(K|E|) and constant learning complexity O(K) like classical CNNs.", "zh": "实现线性计算复杂度O(K|E|)和恒定学习复杂度O(K)，与经典CNN相同。"}, {"en": "Introduces an efficient graph pooling strategy via balanced binary tree rearrangement.", "zh": "通过平衡二叉树重排引入高效的图池化策略。"}, {"en": "Demonstrates strict localization of spectral filters with K-hop support.", "zh": "证明谱滤波器具有K跳支撑的严格局部性。"}, {"en": "Shows competitive performance on MNIST and 20NEWS datasets.", "zh": "在MNIST和20NEWS数据集上展示出有竞争力的性能。"}, {"en": "Provides open-source TensorFlow code for reproducibility.", "zh": "提供开源TensorFlow代码以确保可复现性。"}], "limits": [{"en": "Spectral filters are isotropic, lacking orientation sensitivity on grids.", "zh": "谱滤波器是各向同性的，在网格上缺乏方向敏感性。"}, {"en": "Performance heavily depends on the quality of the input graph construction.", "zh": "性能严重依赖于输入图构建的质量。"}, {"en": "Fake nodes from coarsening increase dimensionality and computational cost.", "zh": "粗化产生的虚拟节点增加了维度和计算成本。"}, {"en": "Model not tested on large-scale graphs with millions of nodes.", "zh": "模型未在百万节点的大规模图上测试。"}, {"en": "Graph construction for text uses word2vec embeddings which may not be optimal.", "zh": "文本的图构建使用word2vec嵌入，可能并非最优。"}]}, "cites": 8633}, {"id": "dario-1606.06565", "pid": "dario", "arxiv": "1606.06565", "date": "2016-06-21", "venue": "cs.AI", "fields": ["safety"], "tEn": "Concrete Problems in AI Safety", "tZh": "人工智能安全中的具体问题", "sEn": "We identify five concrete research problems in AI safety: avoiding side effects, avoiding reward hacking, scalable supervision, safe exploration, and distributional shift.", "sZh": "我们识别出人工智能安全中的五个具体研究问题：避免副作用、避免奖励黑客、可扩展监督、安全探索和分布偏移。", "absEn": "Rapid progress in machine learning and artificial intelligence (AI) has brought increasing attention to the potential impacts of AI technologies on society. In this paper we discuss one such potential impact: the problem of accidents in machine learning systems, defined as unintended
