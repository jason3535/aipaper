mer的速度比现有基线更快：在BERT-large（序列长度512）上，相比MLPerf 1.1训练速度记录，端到端加速15%；在GPT-2（序列长度1K）上加速3倍；在长距离竞技场（序列长度1K-4K）上加速2.4倍。FlashAttention和块稀疏FlashAttention使Transformer能够处理更长的上下文，从而获得更高质量的模型（GPT-2上困惑度降低0.7，长文档分类提升6.4个百分点），并实现了全新的能力：首个在Path-X挑战（序列长度16K，准确率61.4%）和Path-256（序列长度64K，准确率63.1%）上取得优于随机水平性能的Transformer。", "insights": {"contrib": [{"en": "Proposes FlashAttention, an IO-aware exact attention algorithm using tiling to reduce GPU HBM accesses.", "zh": "提出FlashAttention，一种IO感知的精确注意力算法，通过分块减少GPU高带宽内存访问。"}, {"en": "Achieves significant wall-clock speedups: 15% on BERT-large, 3x on GPT-2, 2.4x on long-range arena.", "zh": "实现显著的端到端加速：BERT-large提升15%，GPT-2提升3倍，长距离竞技场提升2.4倍。"}, {"en": "Enables longer context in Transformers, improving perplexity by 0.7 on GPT-2 and 6.4 points on long-document classification.", "zh": "支持Transformer更长上下文，GPT-2困惑度降低0.7，长文档分类提升6.4个百分点。"}, {"en": "First Transformer to achieve better-than-chance on Path-X (61.4%) and Path-256 (63.1%) via longer sequences.", "zh": "首个在Path-X（61.4%）和Path-256（63.1%）上超越随机水平的Transformer。"}, {"en": "Extends to block-sparse FlashAttention, faster than all existing approximate attention methods.", "zh": "扩展至块稀疏FlashAttention，比所有现有近似注意力方法更快。"}, {"en": "Provides IO complexity analysis and proves optimality for exact attention over a range of SRAM sizes.", "zh": "提供IO复杂度分析，并证明在多种SRAM大小下精确注意力的最优性。"}], "limits": [{"en": "Requires custom CUDA kernel, limiting portability and ease of use across GPU architectures.", "zh": "需要自定义CUDA内核，限制了跨GPU架构的可移植性和易用性。"}, {"en": "Optimal only for single GPU; multi-GPU IO analysis and parallelization remain unexplored.", "zh": "仅对单GPU最优；多GPU的IO分析和并行化尚未探索。"}, {"en": "Block-sparse attention relies on predefined sparsity patterns, which may not suit all tasks.", "zh": "块稀疏注意力依赖预定义稀疏模式，可能不适用于所有任务。"}, {"en": "Recomputation in backward pass increases FLOPs, though offset by reduced HBM accesses.", "zh": "反向传播中的重计算增加FLOPs，尽管被减少的HBM访问所抵消。"}, {"en": "Performance gains diminish for very short sequences where memory access is less dominant.", "zh": "对于极短序列，性能提升减弱，因为内存访问不再是主要瓶颈。"}]}, "cites": 4545, "org": "Stanford"}, {"id": "csaharia-2205.11487", "pid": "csaharia", "arxiv": "2205.11487", "date": "2022-05-23", "venue": "cs.CV", "org": "Google Research", "fields": ["generative", "vision"], "tEn": "Photorealistic Text-to-Image Diffusion Models with Deep Language Understanding", "tZh": "具有深度语言理解能力的逼真文本到图像扩散模型", "sEn": "Imagen achieves photorealistic text-to-image generation with deep language understanding by leveraging large language models.", "sZh": "Imagen通过利用大型语言模型，实现了具有深度语言理解能力的逼真文本到图像生成。", "absEn": "We present Imagen, a text-to-image diffusion model with an unprecedented degree of photorealism and a deep level of language understanding. Imagen builds on the power of large transformer language models in understanding text and hinges on the strength of diffusion models in high-fidelity image generation. Our key discovery is that generic large language models (e.g. T5), pretrained on text-only corpora, are surprisingly effective at encoding text for image synthesis: increasing the size of the language model in Imagen boosts both sample fidelity and image-text alignment much more than increasing the size of the image diffusion model. Imagen achieves a new state-of-the-art FID score of 7.27 on the COCO dataset, without ever training on COCO, and human raters find Imagen samples to be on par with the COCO data itself in image-text alignment. To assess text-to-image models in greater depth, we introduce DrawBench, a comprehensive and challenging benchmark for text-to-image models. With DrawBench, we compare Imagen with recent methods including VQ-GAN+CLIP, Latent Diffusion Models, and DALL-E 2, and find that human raters prefer Imagen over other models in side-by-side comparisons, both in terms of sample quality and image-text alignment. See https://imagen.research.google/ for an overview of the results.", "absZh": "我们提出了Imagen，一种具有前所未有的逼真度和深度语言理解能力的文本到图像扩散模型。Imagen建立在大型Transformer语言模型理解文本的能力以及扩散模型高保真图像生成的优势之上。我们的关键发现是，仅在文本语料上预训练的通用大型语言模型（如T5）在编码文本用于图像合成方面出奇地有效：增加Imagen中语言模型的规模比增加图像扩散模型的规模更能提升样本保真度和图像-文本对齐。Imagen在COCO数据集上取得了7.27的FID分数，达到了新的最先进水平，且从未在COCO上训练过；人类评估者认为Imagen样本在图像-文本对齐方面与COCO数据本身相当。为了更深入地评估文本到图像模型，我们引入了DrawBench，一个全面且具有挑战性的基准。通过DrawBench，我们将Imagen与近期方法（包括VQ-GAN+CLIP、潜在扩散模型和DALL-E 2）进行比较，发现人类评估者在样本质量和图像-文本对齐方面都更偏好Imagen。", "insights": {"contrib": [{"en": "Imagen achieves state-of-the-art zero-shot FID of 7.27 on COCO, outperforming prior methods.", "zh": "Imagen在COCO上实现了7.27的零样本FID，优于先前方法。"}, {"en": "Introduces DrawBench, a comprehensive benchmark for evaluating text-to-image models.", "zh": "引入DrawBench，一个用于评估文本到图像模型的综合基准。"}, {"en": "Shows that scaling large language models improves image quality more than scaling diffusion models.", "zh": "表明扩大语言模型比扩大扩散模型更能提升图像质量。"}, {"en": "Proposes dynamic thresholding for high guidance weights, improving photorealism and alignment.", "zh": "提出动态阈值处理以支持高引导权重，提升逼真度和对齐性。"}, {"en": "Demonstrates that frozen T5-XXL text encoder outperforms CLIP in human evaluation.", "zh": "证明冻结的T5-XXL文本编码器在人类评估中优于CLIP。"}, {"en": "Achieves human-level image-text alignment on COCO, with samples rated on par with reference images.", "zh": "在COCO上达到人类水平的图像-文本对齐，样本与参考图像评分相当。"}], "limits": [{"en": "Imagen struggles to generate photorealistic people, as shown by lower preference rates.", "zh": "Imagen在生成逼真人物方面存在困难，偏好率较低。"}, {"en": "Training data contains biases and harmful content, limiting safe public deployment.", "zh": "训练数据包含偏见和有害内容，限制了安全公开部署。"}, {"en": "Model inherits social biases from language models, e.g., skin tone and gender stereotypes.", "zh": "模型继承了语言模型的社会偏见，如肤色和性别刻板印象。"}, {"en": "Evaluation focuses on English prompts; performance on other languages is unknown.", "zh": "评估集中于英文提示；其他语言的表现未知。"}, {"en": "High computational cost due to large model sizes and cascaded architecture.", "zh": "由于大模型规模和级联架构，计算成本高。"}]}, "cites": 8497}, {"id": "xiaohuazhai-2205.01917", "pid": "xiaohuazhai", "arxiv": "2205.01917", "date": "2022-05-04", "venue": "cs.CV", "org": "Google", "fields": ["vision", "nlp"], "tEn": "CoCa: Contrastive Captioners are Image-Text Foundation Models", "tZh": "CoCa: 对比字幕器是图像-文本基础模型", "sEn": "CoCa jointly pretrains an image-text encoder-decoder with contrastive and captioning losses, achieving SOTA on diverse tasks.", "sZh": "CoCa通过对比损失和字幕损失联合预训练图像-文本编码器-解码器，在多种任务上达到最先进水平。", "absEn": "Exploring large-scale pretrained foundation models is of significant interest in computer vision because these models can be quickly transferred to many downstream tasks. This paper presents Contrastive Captioner (CoCa), a minimalist design to pretrain an image-text encoder-decoder foundation model jointly with contrastive loss and captioning loss, thereby subsuming model capabilities from contrastive approaches like CLIP and generative methods like SimVLM. In contrast to standard encoder-decoder transformers where all decoder layers attend to encoder outputs, CoCa omits cross-attention in the first half of decoder layers to encode unimodal text representations, and cascades the remaining decoder layers which cross-attend to the image encoder for multimodal image-text representations. We apply a contrastive loss between unimodal image and text embeddings, in addition to a captioning loss on the multimodal decoder outputs which predicts text tokens autoregressively. By sharing the same computational graph, the two training objectives are computed efficiently with minimal overhead. CoCa is pretrained end-to-end and from scratch on both web-scale alt-text data and annotated images by treating all labels simply as text, seamlessly unifying natural language supervision for representation learning. Empirically, CoCa achieves state-of-the-art performance with zero-shot transfer or minimal task-specific adaptation on a broad range of downstream tasks, spanning visual recognition (ImageNet, Kinetics-400/600/700, Moments-in-Time), crossmodal retrieval (MSCOCO, Flickr30K, MSR-VTT), multimodal understanding (VQA, SNLI-VE, NLVR2), and image captioning (MSCOCO, NoCaps). Notably on ImageNet classification, CoCa obtains 86.3% zero-shot top-1 accuracy, 90.6% with a frozen encoder and learned classification head, and new state-of-the-art 91.0% top-1 accuracy on ImageNet with a finetuned encoder.", "absZh": "探索大规模预训练基础模型在计算机视觉中具有重要意义，因为这些模型可以快速迁移到许多下游任务。本文提出了对比字幕器（CoCa），一种极简设计，通过对比损失和字幕损失联合预训练图像-文本编码器-解码器基础模型，从而融合了CLIP等对比方法和SimVLM等生成方法的模型能力。与标准编码器-解码器变换器（所有解码器层都关注编码器输出）不同，CoCa在前半部分解码器层中省略了交叉注意力以编码单模态文本表示，并级联剩余的解码器层，这些层交叉关注图像编码器以获取多模态图像-文本表示。我们在单模态图像和文本嵌入之间应用对比损失，此外在多模态解码器输出上应用字幕损失，以自回归方式预测文本标记。通过共享相同的计算图，两个训练目标以最小开销高效计算。CoCa在网页规模的替代文本数据和标注图像上从头到尾进行预训练，将所有标签简单地视为文本，无缝统一自然语言监督以进行表示学习。实验表明，CoCa在广泛的下游任务上通过零样本迁移或最小任务特定适应实现了最先进的性能，涵盖视觉识别（ImageNet、Kinetics-400/600/700、Moments-in-Time）、跨模态检索（MSCOCO、Flickr30K、MSR-VTT）、多模态理解（VQA、SNLI-VE、NLVR2）和图像字幕（MSCOCO、NoCaps）。值得注意的是，在ImageNet分类上，CoCa获得了86.3%的零样本top-1准确率，使用冻结编码器和学习分类头时达到90.6%，以及使用微调编码器时达到新的最先进91.0% top-1准确率。", "insights": {"contrib": [{"en": "Proposes Contrastive Captioner (CoCa), a minimalist encoder-decoder foundation model unifying contrastive and captioning losses.", "zh": "提出对比描述器（CoCa），一种极简的编码器-解码器基础模型，统一了对比损失和描述损失。"}, {"en": "Decouples decoder into unimodal and multimodal layers, enabling both aligned unimodal embeddings and fused multimodal representations.", "zh": "将解码器解耦为单模态和多模态层，同时支持对齐的单模态嵌入和融合的多模态表示。"}, {"en": "Achieves state-of-the-art zero-shot performance on ImageNet (86.3%), crossmodal retrieval, and multimodal understanding tasks.", "zh": "在ImageNet（86.3%）、跨模态检索和多模态理解任务上取得最先进的零样本性能。"}, {"en": "Pretrains end-to-end from scratch on web-scale alt-text and annotated images, treating all labels as text.", "zh": "从零开始在网络规模的替代文本和标注图像上进行端到端预训练，将所有标签视为文本。"}, {"en": "Introduces task-specific attentional poolers to customize visual representations for different objectives and downstream tasks.", "zh": "引入任务特定的注意力池化器，为不同目标和下游任务定制视觉表示。"}, {"en": "Sets new state-of-the-art on ImageNet finetuning (91.0%) and NoCaps captioning (120.6 CIDEr).", "zh": "在ImageNet微调（91.0%）和NoCaps描述（120.6 CIDEr）上取得新的最先进结果。"}], "limits": [{"en": "Model performance depends on large-scale pretraining data (JFT-3B, ALIGN), which may contain biases.", "zh": "模型性能依赖于大规模预训练数据（JFT-3B、ALIGN），这些数据可能包含偏见。"}, {"en": "Zero-shot evaluation may not reflect robustness to all real-world image corruptions beyond current benchmarks.", "zh": "零样本评估可能无法反映对当前基准之外的所有真实世界图像损坏的鲁棒性。"}, {"en": "Requires significant computational resources (2048 TPUv4 chips for 5 days) for pretraining.", "zh": "预训练需要大量计算资源（2048个TPUv4芯片运行5天）。"}, {"en": "Decoder design with causal masking limits parallelization for some tasks compared to bidirectional models.", "zh": "与双向模型相比，解码器的因果掩码设计限制了某些任务的并行化。"}, {"en": "Broader impacts such as fairness, social bias, and potential misuse require further community exploration.", "zh": "公平性、社会偏见和潜在滥用等更广泛的影响需要社区进一步探索。"}]}, "cites": 1757}, {"id": "jbalayrac-2204.14198", "pid": "jbalayrac", "arxiv": "2204.14198", "date": "2022-04-29", "venue": "cs.CV", "org": "Google DeepMind", "fields": ["vision", "nlp"], "tEn": "Flamingo: a Visual Language Model for Few-Shot Learning", "tZh": "Flamingo：一种用于少样本学习的视觉语言模型", "sEn": "Flamingo achieves state-of-the-art few-shot learning on diverse visual tasks by bridging pretrained vision and language models.", "sZh": "Flamingo通过桥接预训练的视觉和语言模型，在多种视觉任务上实现了少样本学习的最优性能。", "absEn": "Building models that can be rapidly adapted to novel tasks using only a handful of annotated examples is an open challenge for multimodal machine learning research. We introduce Flamingo, a family of Visual Language Models (VLM) with this ability. We propose key architectural innovations to: (i) bridge powerful pretrained vision-only and language-only models, (ii) handle sequences of arbitrarily interleaved visual and textual data, and (iii) seamlessly ingest images or videos as inputs. Thanks to their flexibility, Flamingo models can be trained on large-scale multimodal web corpora containing arbitrarily interleaved text and images, which is key to endow them with in-context few-shot learning capabilities. We perform a thorough evaluation of our models, exploring and measuring their ability to rapidly adapt to a variety of image and video tasks. These include open-ended tasks such as visual question-answering, where the model is prompted with a question which it has to answer; captioning tasks, which evaluate the ability to describe a scene or an event; and close-ended tasks such as multiple-choice visual question-answering. For tasks lying anywhere on this spectrum, a single Flamingo model can achieve a new state of the art with few-shot learning, simply by prompting the model with task-specific examples. On numerous benchmarks, Flamingo outperforms models fine-tuned on thousands of times more task-specific data.", "absZh": "构建能够仅使用少量标注示例快速适应新任务的模型是多模态机器学习研究的一个开放挑战。我们引入了Flamingo，一系列具有这种能力的视觉语言模型（VLM）。我们提出了关键架构创新，以：（i）桥接强大的预训练纯视觉和纯语言模型，（ii）处理任意交错视觉和文本数据的序列，以及（iii）无缝地将图像或视频作为输入。得益于其灵活性，Flamingo模型可以在包含任意交错文本和图像的大规模多模态网络语料库上进行训练，这是赋予它们上下文少样本学习能力的关键。我们对模型进行了全面评估，探索并衡量了它们快速适应各种图像和视频任务的能力。这些任务包括开放式任务，如视觉问答，其中模型被提示一个问题并需要回答；字幕任务，评估描述场景或事件的能力；以及封闭式任务，如多项选择视觉问答。对于这一范围内的任何任务，单个Flamingo模型可以通过简单地用任务特定示例提示模型，在少样本学习中达到新的最优水平。在众多基准测试中，Flamingo优于在数千倍更多任务特定数据上微调的模型。", "insights": {"contrib": [{"en": "Introduces Flamingo, a family of Visual Language Models for few-shot learning on multimodal tasks.", "zh": "提出Flamingo系列视觉语言模型，用于多模态任务的少样本学习。"}, {"en": "Proposes architectural innovations: bridging frozen vision and language models, handling interleaved data, and using a Perceiver Resampler.", "zh": "提出架构创新：桥接冻结的视觉和语言模型、处理交错数据、使用感知器重采样器。"}, {"en": "Achieves state-of-the-art few-shot performance on 16 multimodal benchmarks, often surpassing fine-tuned models.", "zh": "在16个多模态基准上取得少样本学习最优性能，常超越微调模型。"}, {"en": "Demonstrates effective in-context learning for open-ended tasks like captioning and visual question-answering.", "zh": "展示了在开放任务（如描述和视觉问答）上的有效上下文学习。"}, {"en": "Shows that training on interleaved web data is crucial for few-shot capabilities.", "zh": "表明在交错网络数据上训练对少样本能力至关重要。"}, {"en": "Scales model size and number of shots to improve performance, similar to GPT-3.", "zh": "扩展模型规模和样本数量以提升性能，类似GPT-3。"}], "limits": [{"en": "Inherits weaknesses from pretrained LMs, including hallucinations and poor generalization to long sequences.", "zh": "继承预训练语言模型的弱点，包括幻觉和对长序列泛化差。"}, {"en": "Classification performance lags behind contrastive models like CLIP.", "zh": "分类性能落后于对比模型（如CLIP）。"}, {"en": "In-context learning is sensitive to demonstration selection and scales poorly with many shots.", "zh": "上下文学习对示例选择敏感，且随样本数量增多扩展性差。"}, {"en": "Training requires large-scale web data, which may contain biases and toxic content.", "zh": "训练需要大规模网络数据，可能包含偏见和有害内容。"}, {"en": "Freezing the language model prevents catastrophic forgetting but limits adaptation.", "zh": "冻结语言模型可防止灾难性遗忘，但限制了适应性。"}]}, "cites": 6057}, {"id": "pdhariwal-2204.06125", "pid": "pdhariwal", "arxiv": "2204.06125", "date": "2022-04-13", "venue": "cs.CV", "org": "OpenAI", "fields": ["generative", "vision"], "tEn": "Hierarchical Text-Conditional Image Generation with CLIP Latents", "tZh": "基于CLIP潜在向量的层次化文本条件图像生成", "sEn": "Explicitly generating CLIP image embeddings improves image diversity with minimal loss in photorealism and caption similarity.", "sZh": "显式生成CLIP图像嵌入可在几乎不损失逼真度和标题相似性的情况下提高图像多样性。", "absEn": "Contrastive models like CLIP have been shown to learn robust representations of images that capture both semantics and style. To leverage these representations for image generation, we propose a two-stage model: a prior that generates a CLIP image embedding given a text caption, and a decoder that generates an image conditioned on the image embedding. We show that explicitly generating image representations improves image diversity with minimal loss in photorealism and caption similarity. Our decoders conditioned on image representations can also produce variations of an image that preserve both its semantics and style, while varying the non-essential details absent from the image representation. Moreover, the joint embedding space of CLIP enables language-guided image manipulations in a zero-shot fashion. We use diffusion models for the decoder and experiment with both autoregressive and diffusion models for the prior, finding that the latter are computationally more efficient and produce higher-quality samples.", "absZh": "对比模型如CLIP已被证明能够学习同时捕捉语义和风格的鲁棒图像表示。为了利用这些表示进行图像生成，我们提出了一个两阶段模型：一个先验模型，根据文本描述生成CLIP图像嵌入；以及一个解码器，根据图像嵌入生成图像。我们表明，显式生成图像表示可以在几乎不损失逼真度和标题相似性的情况下提高图像多样性。基于图像表示的解码器还可以生成保留图像语义和风格的变体，同时改变图像表示中缺失的非必要细节。此外，CLIP的联合嵌入空间支持零样本的语言引导图像操作。我们使用扩散模型作为解码器，并尝试了自回归和扩散模型作为先验，发现后者计算效率更高且能生成更高质量的样本。", "insights": {"contrib": [{"en": "Proposes a two-stage model with a prior generating CLIP image embeddings from text and a decoder generating images from embeddings.", "zh": "提出一个两阶段模型，包括从文本生成CLIP图像嵌入的先验模型和从嵌入生成图像的解码器。"}, {"en": "Shows that generating image representations explicitly improves diversity with minimal loss in photorealism and caption similarity.", "zh": "表明显式生成图像表示可在几乎不损失真实感和标题相似度的情况下提高多样性。"}, {"en": "Demonstrates language-guided image manipulations in a zero-shot manner using CLIP's joint embedding space.", "zh": "利用CLIP的联合嵌入空间，以零样本方式实现语言引导的图像操作。"}, {"en": "Compares autoregressive and diffusion priors, finding diffusion priors more compute-efficient and producing higher-quality samples.", "zh": "比较自回归先验和扩散先验，发现扩散先验计算效率更高且生成样本质量更高。"}, {"en": "Achieves state-of-the-art zero-shot FID of 10.39 on MS-COCO validation set.", "zh": "在MS-COCO验证集上实现了10.39的最先进零样本FID分数。"}, {"en": "Introduces a bipartite latent representation enabling image variations, interpolation, and text diffs.", "zh": "引入二分潜变量表示，支持图像变体、插值和文本差异操作。"}], "limits": [{"en": "unCLIP struggles with binding attributes to objects, e.g., assigning colors to specific cubes.", "zh": "unCLIP在将属性绑定到对象方面存在困难，例如将颜色分配给特定立方体。"}, {"en": "The model has difficulty generating coherent text within images.", "zh": "该模型在图像内生成连贯文本方面存在困难。"}, {"en": "Complex scenes lack fine details due to the 64x64 base resolution and upsampling.", "zh": "由于64x64基础分辨率和上采样，复杂场景缺乏精细细节。"}, {"en": "The CLIP embedding may not encode spelling information of rendered text precisely.", "zh": "CLIP嵌入可能无法精确编码渲染文本的拼写信息。"}, {"en": "The model inherits risks of deceptive and harmful content, with fewer traces of AI generation.", "zh": "该模型继承了欺骗性和有害内容的风险，且AI生成的痕迹更少。"}]}, "cites": 9084}, {"id": "jonathanho-2204.03458", "pid": "jonathanho", "arxiv": "2204.03458", "date": "2022-04-07", "venue": "cs.CV", "org": "Google", "fields": ["generative", "vision"], "tEn": "Video Diffusion Models", "tZh": "视频扩散模型", "sEn": "We propose a diffusion model for video generation that extends image diffusion, enabling joint training on images and videos, and introduces a conditional sampling technique for spatial-temporal extension.", "sZh": "我们提出了一种视频生成扩散模型，它扩展了图像扩散，支持图像和视频联合训练，并引入了一种用于时空扩展的条件采样技术。", "absEn": "Generating temporally coherent high fidelity video is an important milestone in generative modeling research. We make progress towards this milestone by proposing a diffusion model for video generation that shows very promising initial results. Our model is a natural extension of the standard image diffusion architecture, and it enables jointly training from image and video data, which we find to reduce the variance of minibatch gradients and speed up optimization. To generate long and higher resolution videos we introduce a new conditional sampling technique for spatial and temporal video extension that performs better than previously proposed methods. We present the first results on a large text-conditioned video generation task, as well as state-of-the-art results on established benchmarks for video prediction and unconditional video generation. Supplementary material is available at https://video-diffusion.github.io/", "absZh": "生成时间上连贯的高保真视频是生成建模研究中的一个重要里程碑。我们通过提出一种用于视频生成的扩散模型，朝着这一里程碑取得了进展，该模型展示了非常有前景的初步结果。我们的模型是标准图像扩散架构的自然扩展，它支持从图像和视频数据中联合训练，我们发现这可以减少小批量梯度的方差并加速优化。为了生成长时间且分辨率更高的视频，我们引入了一种新的条件采样技术，用于空间和时间视频扩展，其性能优于先前提出的方法。我们首次展示了在大规模文本条件视频生成任务上的结果，以及在视频预测和无条件视频生成的既定基准上达到的最先进结果。补充材料可在 https://video-diffusion.github.io/ 获取。", "insights": {"contrib": [{"en": "Proposes a diffusion model for video generation as a natural extension of image diffusion architectures.", "zh": "提出一种视频生成的扩散模型，作为图像扩散架构的自然扩展。"}, {"en": "Enables joint training on image and video data, reducing minibatch gradient variance and speeding optimization.", "zh": "支持图像和视频数据的联合训练，降低小批量梯度方差并加速优化。"}, {"en": "Introduces reconstruction-guided sampling for spatial and temporal video extension, outperforming prior methods.", "zh": "引入重建引导采样用于空间和时间视频扩展，优于先前方法。"}, {"en": "Achieves state-of-the-art results on video prediction and unconditional video generation benchmarks.", "zh": "在视频预测和无条件视频生成基准上取得最先进结果。"}, {"en": "Presents first results on large-scale text-conditioned video generation using diffusion models.", "zh": "首次展示使用扩散模型的大规模文本条件视频生成结果。"}, {"en": "Demonstrates benefits of classifier-free guidance and joint image-video training for video diffusion models.", "zh": "展示了无分类器引导和图像-视频联合训练对视频扩散模型的益处。"}], "limits": [{"en": "Model trained on fixed number of frames (e.g., 16) and limited spatial resolution.", "zh": "模型在固定帧数（如16帧）和有限空间分辨率上训练。"}, {"en": "Reconstruction guidance relies on Gaussian approximation of conditioning data, which may be inaccurate for large t.", "zh": "重建引导依赖于条件数据的高斯近似，在t较大时可能不准确。"}, {"en": "Evaluation metrics (FVD, FID, IS) may not fully capture temporal coherence or perceptual quality.", "zh": "评估指标（FVD、FID、IS）可能无法完全捕捉时间连贯性或感知质量。"}, {"en": "Text-to-video models inherit biases from training data and may require curation for fair results.", "zh": "文本到视频模型继承训练数据的偏差，可能需要筛选以确保公平结果。"}, {"en": "Models not released due to potential for harmful use, limiting reproducibility and further research.", "zh": "模型因潜在有害用途未发布，限制了可重复性和进一步研究。"}]}, "cites": 2666}, {"id": "achowdhery-2204.02311", "pid": "achowdhery", "arxiv": "2204.02311", "date": "2022-04-05", "venue": "cs.CL", "org": "Google", "fields": ["nlp", "deep-learning"], "tEn": "PaLM: Scaling Language Modeling with Pathways", "tZh": "PaLM：通过Pathways扩展语言建模", "sEn": "PaLM 540B achieves state-of-the-art few-shot learning on hundreds of tasks, outperforming finetuned models on multi-step reasoning and average human performance on BIG-bench.", "sZh": "PaLM 540B在数百个任务上实现了最先进的少样本学习，在多步推理上超越微调模型，在BIG-bench上超越人类平均水平。", "absEn": "Large language models have been shown to achieve remarkable performance across a variety of natural language tasks using few-shot learning, which drastically reduces the number of task-specific training examples needed to adapt the model to a particular application. To further our understanding of the impact of scale on few-shot learning, we trained a 540-billion parameter, densely activated, Transformer language model, which we call Pathways Language Model PaLM. We trained PaLM on 6144 TPU v4 chips using Pathways, a new ML system which enables highly efficient training across multiple TPU Pods. We demonstrate continued benefits of scaling by achieving state-of-the-art few-shot learning results on hundreds of language understanding and generation benchmarks. On a number of these tasks, PaLM 540B achieves breakthrough performance, outperforming the finetuned state-of-the-art on a suite of multi-step reasoning tasks, and outperforming average human performance on the recently released BIG-bench benchmark. A significant number of BIG-bench tasks showed discontinuous improvements from model scale, meaning that performance steeply increased as we scaled to our largest model. PaLM also has strong capabilities in multilingual tasks and source code generation, which we demonstrate on a wide array of benchmarks. We additionally provide a comprehensive analysis on bias and toxicity, and study the extent of training data memorization with respect to model scale. Finally, we discuss the ethical considerations related to large language models and discuss potential mitigation strategies.", "absZh": "大型语言模型通过少样本学习在多种自然语言任务上表现出色，大幅减少了适应特定应用所需的训练样本。为了进一步理解规模对少样本学习的影响，我们训练了一个5400亿参数、密集激活的Transformer语言模型，称为Pathways语言模型（PaLM）。我们使用Pathways（一种新的ML系统，能够在多个TPU Pod间实现高效训练）在6144个TPU v4芯片上训练了PaLM。我们通过在上百个语言理解和生成基准测试中取得最先进的少样本学习结果，展示了持续扩展的好处。在许多任务中，PaLM 540B取得了突破性表现，在一系列多步推理任务上超越了微调的最先进模型，并在最近发布的BIG-bench基准测试中超越了人类平均水平。大量BIG-bench任务显示出模型规模带来的不连续改进，即随着我们扩展到最大模型，性能急剧提升。PaLM在多语言任务和源代码生成方面也具有强大能力，我们在广泛的基准测试中展示了这一点。此外，我们提供了关于偏见和毒性的全面分析，并研究了训练数据记忆与模型规模的关系。最后，我们讨论了与大型语言模型相关的伦理考量，并探讨了潜在的缓解策略。", "insights": {"contrib": [{"en": "Trained PaLM 540B, a densely activated Transformer, using Pathways across 6144 TPU v4 chips, achieving high efficiency.", "zh": "使用 Pathways 在 6144 个 TPU v4 芯片上训练了密集激活的 Transformer 模型 PaLM 540B，实现了高效率。"}, {"en": "Achieved state-of-the-art few-shot results on hundreds of language understanding and generation benchmarks.", "zh": "在数百个语言理解和生成基准上取得了最先进的少样本学习结果。"}, {"en": "Demonstrated breakthrough performance on multi-step reasoning tasks using chain-of-thought prompting, outperforming finetuned models.", "zh": "使用思维链提示在多步推理任务上展示了突破性性能，超越了微调模型。"}, {"en": "Observed discontinuous improvements from model scale on many BIG-bench tasks, indicating emergent capabilities.", "zh": "在许多 BIG-bench 任务上观察到模型规模带来的不连续改进，表明出现了新能力。"}, {"en": "Showed strong multilingual and code generation capabilities, with PaLM 540B bridging the gap to finetuned models.", "zh": "展示了强大的多语言和代码生成能力，PaLM 540B 缩小了与微调模型的差距。"}, {"en": "Provided comprehensive analysis of bias, toxicity, and memorization, and discussed ethical considerations.", "zh": "提供了对偏见、毒性和记忆化的全面分析，并讨论了伦理考量。"}], "limits": [{"en": "Training loss spikes occurred for the largest model, mitigated by restarting from earlier checkpoints.", "zh": "最大模型在训练中出现损失尖峰，通过从较早检查点重启来缓解。"}, {"en": "Evaluation limited to English and a few multilingual tasks; non-English data proportion was only 22%.", "zh": "评估仅限于英语和少数多语言任务；非英语数据比例仅为 22%。"}, {"en": "Bias and toxicity analysis showed stereotypes and higher toxicity for larger models, correlating with prompt style.", "zh": "偏见和毒性分析显示较大模型存在刻板印象和更高毒性，与提示风格相关。"}, {"en": "Chain-of-thought prompting required manual exemplars; performance on some BIG-bench tasks still far from human.", "zh": "思维链提示需要手动示例；在某些 BIG-bench 任务上性能仍远低于人类。"}, {"en": "Code generation performance relied on additional finetuning; model size alone did not saturate improvements.", "zh": "代码生成性能依赖于额外微调；仅模型规模并未使改进饱和。"}]}, "cites": 8125}, {"id": "mahn-2204.01691", "pid": "mahn", "arxiv": "2204.01691", "date": "2022-04-04", "venue": "cs.RO", "org": "Google", "fields": ["nlp", "rl"], "tEn": "Do As I Can, Not As I Say: Grounding Language in Robotic Affordances", "tZh": "做我能做的，而非说我所想的：将语言扎根于机器人能力", "sEn": "Grounding language models in robotic affordances enables robots to follow high-level instructions by combining semantic knowledge with feasible low-level skills.", "sZh": "将语言模型扎根于机器人能力，通过结合语义知识与可行的底层技能，使机器人能够遵循高层指令。", "absEn": "Large language models can encode a wealth of semantic knowledge about the world. Such knowledge could be extremely useful to robots aiming to act upon high-level, temporally extended instructions expressed in natural language. However, a significant weakness of language models is that they lack real-world experience, which makes it difficult to leverage them for decision making within a given embodiment. For example, asking a language model to describe how to clean a spill might result in a reasonable narrative, but it may not be applicable to a particular agent, such as a robot, that needs to perform this task in a particular environment. We propose to provide real-world grounding by means of pretrained skills, which are used to constrain the model to propose natural language actions that are both feasible and contextually appropriate. The robot can act as the language model's \"hands and eyes,\" while the language model supplies high-level semantic knowledge about the task. We show how low-level skills can be combined with large language models so that the language model provides high-level knowledge about the procedures for performing complex and temporally-extended instructions, while value functions associated with these skills provide the grounding necessary to connect this knowledge to a particular physical environment. We evaluate our method on a number of real-world robotic tasks, where we show the need for real-world grounding and that this approach is capable of completing long-horizon, abstract, natural language instructions on a mobile manipulator. The project's website and the video can be found at https://say-can.github.io/.", "absZh": "大型语言模型能够编码关于世界的丰富语义知识，这对于旨在根据自然语言表达的高层、时间延展指令行动的机器人来说极为有用。然而，语言模型的一个显著弱点是缺乏真实世界经验，这使得在特定具身形态下利用它们进行决策变得困难。例如，要求语言模型描述如何清理溢出物可能会产生合理的叙述，但对于需要在特定环境中执行此任务的特定代理（如机器人）来说，可能并不适用。我们提出通过预训练技能来提供真实世界的基础，这些技能用于约束模型，使其提出既可行又上下文适当的自然语言动作。机器人可以作为语言模型的“手和眼”，而语言模型则提供关于任务的高层语义知识。我们展示了如何将低层技能与大型语言模型相结合，使得语言模型提供关于执行复杂和时间延展指令的程序的高层知识，而与这些技能相关的价值函数则提供了必要的根基，将这些知识与特定的物理环境联系起来。我们在多个真实世界机器人任务上评估了我们的方法，展示了真实世界根基的必要性，并且该方法能够在移动操作器上完成长时域、抽象的自然语言指令。项目和视频可在 https://say-can.github.io/ 找到。", "insights": {"contrib": [{"en": "Proposes SayCan, grounding LLMs via pretrained skill value functions for feasible robot actions.", "zh": "提出 SayCan，通过预训练技能的价值函数将大语言模型锚定到机器人可行动作上。"}, {"en": "Combines LLM task-grounding with affordance world-grounding to select contextually appropriate skills.", "zh": "结合大语言模型的任务锚定与可供性的世界锚定，选择上下文合适的技能。"}, {"en": "Demonstrates zero-shot long-horizon task execution on a mobile manipulator in real kitchens.", "zh": "在真实厨房中演示移动机械臂的零样本长时域任务执行。"}, {"en": "Shows robot performance improves with better LLMs, linking NLP progress to robotics.", "zh": "展示机器人性能随大语言模型提升而改善，连接自然语言处理进步与机器人学。"}, {"en": "Enables easy integration of new skills and handles multilingual queries without retraining.", "zh": "支持轻松集成新技能，无需重新训练即可处理多语言查询。"}, {"en": "Integrates chain-of-thought reasoning to handle negation and complex reasoning tasks.", "zh": "集成思维链推理以处理否定和复杂推理任务。"}], "limits": [{"en": "Inherits LLM biases and limitations from training data.", "zh": "继承了大语言模型来自训练数据的偏见和局限。"}, {"en": "System bottleneck is the range and robustness of underlying low-level skills.", "zh": "系统瓶颈在于底层技能的范围和鲁棒性。"}, {"en": "Cannot react to skill failures despite high value function scores; lacks closed-loop feedback.", "zh": "无法对价值函数高分但执行失败的技能做出反应；缺乏闭环反馈。"}, {"en": "Struggles with negation and ambiguous references, inherited from underlying LLMs.", "zh": "难以处理否定和模糊指代，继承自底层大语言模型。"}, {"en": "Requires manual prompt engineering and predefined skill set; not fully autonomous.", "zh": "需要手动提示工程和预定义技能集；并非完全自主。"}]}, "cites": 3262}, {"id": "jhoffmann-2203.15556", "pid": "jhoffmann", "arxiv": "2203.15556", "date": "2022-03-29", "venue": "cs.CL", "org": "DeepMind", "fields": ["deep-learning", "nlp"], "tEn": "Training Compute-Optimal Large Language Models", "tZh": "训练计算最优的大型语言模型", "sEn": "Model size and training tokens should be scaled equally for compute-optimal training.", "sZh": "在计算最优训练中，模型大小和训练令牌数应等比例缩放。", "absEn": "We investigate the optimal model size and number of tokens for training a transformer language model under a given compute budget. We find that current large language models are significantly undertrained, a consequence of the recent focus on scaling language models whilst keeping the amount of training data constant. By training over 400 language models ranging from 70 million to over 16 billion parameters on 5 to 500 billion tokens, we find that for compute-optimal training, the model size and the number of training tokens should be scaled equally: for every doubling of model size the number of training tokens should also be doubled. We test this hypothesis by training a predicted compute-optimal model, Chinchilla, that uses the same compute budget as Gopher but with 70B parameters and 4$\\times$ more more data. Chinchilla uniformly and significantly outperforms Gopher (280B), GPT-3 (175B), Jurassic-1 (178B), and Megatron-Turing NLG (530B) on a large range of downstream evaluation tasks. This also means that Chinchilla uses substantially less compute for fine-tuning and inference, greatly facilitating downstream usage. As a highlight, Chinchilla reaches a state-of-the-art average accuracy of 67.5% on the MMLU benchmark, greater than a 7% improvement over Gopher.", "absZh": "我们研究了在给定计算预算下训练Transformer语言模型的最佳模型大小和令牌数量。我们发现当前的大型语言模型明显训练不足，这是由于近期专注于扩大语言模型规模而保持训练数据量不变的结果。通过训练超过400个语言模型，参数范围从7000万到超过160亿，令牌数从50亿到5000亿，我们发现对于计算最优训练，模型大小和训练令牌数应等比例缩放：模型大小每翻倍，训练令牌数也应翻倍。我们通过训练一个预测的计算最优模型Chinchilla来验证这一假设，该模型使用与Gopher相同的计算预算，但拥有700亿参数和4倍多的数据。Chinchilla在大量下游评估任务上一致且显著地优于Gopher（2800亿）、GPT-3（1750亿）、Jurassic-1（1780亿）和Megatron-Turing NLG（5300亿）。这也意味着Chinchilla在微调和推理时使用的计算量大大减少，极大地方便了下游使用。值得一提的是，Chinchilla在MMLU基准测试上达到了67.5%的平均准确率，比Gopher提高了7%以上。", "insights": {"contrib": [{"en": "Proposes three methods to determine compute-optimal model size and training tokens, showing they should scale equally.", "zh": "提出三种方法确定算力最优的模型规模与训练词元数，发现二者应等比例缩放。"}, {"en": "Trains over 400 models from 70M to 16B parameters to empirically derive scaling laws.", "zh": "训练超过400个模型（参数从7000万到160亿），经验性地推导缩放定律。"}, {"en": "Demonstrates that current large language models are significantly undertrained due to overemphasis on model size.", "zh": "证明当前大语言模型因过度关注模型规模而严重训练不足。"}, {"en": "Introduces Chinchilla, a 70B parameter model trained on 1.4T tokens, outperforming larger models like Gopher and GPT-3.", "zh": "引入Chinchilla（70B参数，1.4万亿词元训练），在多数任务上超越Gopher、GPT-3等更大模型。"}, {"en": "Achieves state-of-the-art 67.5% accuracy on MMLU, a 7% improvement over Gopher.", "zh": "在MMLU上达到67.5%准确率，比Gopher提升7%。"}, {"en": "Shows compute-optimal training reduces inference and fine-tuning costs, facilitating downstream usage.", "zh": "算力最优训练降低推理和微调成本，便于下游应用。"}], "limits": [{"en": "Only two large-scale training runs (Chinchilla and Gopher) are compared, limiting validation at intermediate scales.", "zh": "仅比较了两次大规模训练（Chinchilla和Gopher），中间规模验证不足。"}, {"en": "Assumes a power-law relationship between compute, model size, and tokens, but observes concavity at high compute budgets.", "zh": "假设算力、模型规模和词元数呈幂律关系，但在高算力预算下观察到凹性。"}, {"en": "All training runs use less than one epoch of data; multiple-epoch regime is not explored.", "zh": "所有训练均使用不到一个epoch的数据，未探索多epoch场景。"}, {"en": "Analysis relies on smoothed training loss as a proxy for test loss, which may not fully capture generalization.", "zh": "分析依赖平滑训练损失作为测试损失的代理，可能未完全反映泛化能力。"}, {"en": "Ethical and privacy concerns from larger datasets are acknowledged but not fully addressed.", "zh": "承认更大数据集带来的伦理和隐私问题，但未充分解决。"}]}, "cites": 3434}, {"id": "leike-2203.02155", "pid": "leike", "arxiv": "2203.02155", "date": "2022-03-04", "venue": "cs.CL", "fields": ["safety", "nlp"], "tEn": "Training language models to follow instructions with human feedback", "tZh": "使用人类反馈训练语言模型遵循指令", "sEn": "Fine-tuning with human feedback aligns language models with user intent, enabling a 1.3B parameter model to outperform a 175B model.", "sZh": "通过人类反馈微调，语言模型能够更好地遵循用户意图，使得1.3B参数的模型在性能上优于175B参数的模型。", "absEn": "Making language models bigger does not inherently make them better at following a user's intent. For example, large language models can generate outputs that are untruthful, toxic, or simply not helpful to the user. In other words, these models are not aligned with their users. In this paper, we show an avenue for aligning language models with user intent on a wide range of tasks by fine-tuning with human feedback. Starting with a set of labeler-written prompts and prompts submitted through the OpenAI API, we collect a dataset of labeler demonstrations of the desired model behavior, which we use to fine-tune GPT-3 using supervised learning. We then collect a dataset of rankings of model outputs, which we use to further fine-tune this supervised model using reinforcement learning from human feedback. We call the resulting models InstructGPT. In human evaluations on our prompt distribution, outputs from the 1.3B parameter InstructGPT model are preferred to outputs from the 175B GPT-3, despite having 100x fewer parameters. Moreover, InstructGPT models show improvements in truthfulness and reductions in toxic output generation while having minimal performance regressions on public NLP datasets. Even though InstructGPT still makes simple mistakes, our results show that fine-tuning with human feedback is a promising direction for aligning language models with human intent.", "absZh": "增大语言模型的规模并不天然使其更擅长遵循用户意图。例如，大型语言模型可能生成不真实、有害或对用户无帮助的输出。换句话说，这些模型与用户不一致。在本文中，我们展示了一种通过人类反馈微调来使语言模型在广泛任务上与用户意图对齐的途径。从一组标注者编写的提示和通过OpenAI API提交的提示开始，我们收集了标注者展示期望模型行为的数据集，用于通过监督学习微调GPT-3。然后，我们收集了模型输出排名的数据集，用于通过来自人类反馈的强化学习进一步微调这个监督模型。我们将得到的模型称为InstructGPT。在我们的提示分布上进行的人类评估中，1.3B参数的InstructGPT模型的输出优于175B参数的GPT-3，尽管参数数量少100倍。此外，InstructGPT模型在真实性和减少有毒输出生成方面表现出改进，同时在公共NLP数据集上性能退化最小。尽管InstructGPT仍然会犯简单错误，但我们的结果表明，使用人类反馈进行微调是使语言模型与人类意图对齐的一个有前景的方向。", "insights": {"contrib": [{"en": "Shows fine-tuning with human feedback (RLHF) aligns language models to user intent, with 1.3B InstructGPT preferred over 175B GPT-3.", "zh": "展示了通过人类反馈微调（RLHF）使语言模型与用户意图对齐，1.3B 参数的 InstructGPT 优于 175B 的 GPT-3。"}, {"en": "InstructGPT improves truthfulness on TruthfulQA and reduces toxic outputs by 25% when prompted respectfully.", "zh": "InstructGPT 在 TruthfulQA 上提升了真实性，并在被要求尊重时减少了 25% 的有毒输出。"}, {"en": "RLHF alignment cost is modest relative to pretraining; 1.3B InstructGPT outperforms 175B GPT-3 with 100x fewer parameters.", "zh": "RLHF 对齐成本相对于预训练较低；1.3B InstructGPT 以 100 倍少的参数优于 175B GPT-3。"}, {"en": "Mixing pretraining gradients (PPO-ptx) mitigates alignment tax on NLP benchmarks like SQuAD and HellaSwag.", "zh": "混合预训练梯度（PPO-ptx）减轻了在 SQuAD 和 HellaSwag 等 NLP 基准上的对齐代价。"}, {"en": "InstructGPT generalizes instruction-following to non-English and code tasks despite limited supervision.", "zh": "InstructGPT 将指令遵循泛化到非英语和代码任务，尽管监督有限。"}, {"en": "Held-out labelers prefer InstructGPT over GPT-3 at similar rates, showing generalization beyond training labelers.", "zh": "保留的标注者以相似比率偏好 InstructGPT 而非 GPT-3，表明泛化到训练标注者之外。"}], "limits": [{"en": "InstructGPT still generates toxic, biased, or false outputs, especially when prompted for harmful content.", "zh": "InstructGPT 仍会产生有毒、有偏见或虚假的输出，尤其在要求有害内容时。"}, {"en": "Alignment is to specific labeler preferences, not universal human values; labeler demographics are limited.", "zh": "对齐针对特定标注者偏好，而非普世人类价值观；标注者人口统计有限。"}, {"en": "Performance regressions on some NLP datasets (e.g., SQuAD, DROP) persist even with PPO-ptx mitigation.", "zh": "即使采用 PPO-ptx 缓解，某些 NLP 数据集（如 SQuAD、DROP）上的性能下降仍然存在。"}, {"en": "Model fails on false premise instructions, over-hedges simple questions, and struggles with multiple constraints.", "zh": "模型在错误前提指令上失败，对简单问题过度含糊，且难以处理多重约束。"}, {"en": "RLHF may not scale to superhuman systems; method relies on human evaluation which becomes difficult for complex tasks.", "zh": "RLHF 可能无法扩展到超级智能系统；该方法依赖人类评估，对复杂任务变得困难。"}]}, "cites": 21784, "org": "OpenAI"}, {"id": "baevski-2202.03555", "pid": "baevski", "arxiv": "2202.03555", "date": "2022-02-07", "venue": "cs.LG", "org": "Meta AI", "fields": ["deep-learning", "vision"], "tEn": "data2vec: A General Framework for Self-supervised Learning in Speech, Vision and Language", "tZh": "data2vec：语音、视觉和语言自监督学习的通用框架", "sEn": "data2vec proposes a unified self-supervised learning framework across speech, NLP, and vision by predicting contextualized latent representations instead of modality-specific targets.", "sZh": "data2vec 提出了一种跨语音、自然语言处理和视觉的统一自监督学习框架，通过预测上下文相关的潜在表示而非模态特定的目标。", "absEn": "While the general idea of self-supervised learning is identical across modalities, the actual algorithms and objectives differ widely because they were developed with a single modality in mind. To get us closer to general self-supervised learning, we present data2vec, a framework that uses the same learning method for either speech, NLP or computer vision. The core idea is to predict latent representations of the full input data based on a masked view of the input in a self-distillation setup using a standard Transformer architecture. Instead of predicting modality-specific targets such as words, visual tokens or units of human speech which are local in nature, data2vec predicts contextualized latent representations that contain information from the entire input. Experiments on the major benchmarks of speech recognition, image classification, and natural language understanding demonstrate a new state of the art or competitive performance to predominant approaches.", "absZh": "虽然自监督学习的总体思路在不同模态间是相同的，但实际的算法和目标却因针对单一模态开发而差异很大。为了更接近通用的自监督学习，我们提出了 data2vec，这是一个在语音、自然语言处理或计算机视觉中使用相同学习方法的框架。其核心思想是在自蒸馏设置下，使用标准 Transformer 架构，基于输入的掩码视图来预测完整输入数据的潜在表示。与预测模态特定的目标（如单词、视觉标记或人类语音单元）不同，这些目标本质上是局部的，而 data2vec 预测的是包含整个输入信息的上下文相关潜在表示。在语音识别、图像分类和自然语言理解等主要基准上的实验表明，该方法达到了新的最优性能或与主流方法相当的表现。", "insights": {"contrib": [{"en": "Proposes data2vec, a unified self-supervised learning framework for speech, vision, and language using the same objective.", "zh": "提出 data2vec，一个统一的自我监督学习框架，适用于语音、视觉和语言，使用相同的学习目标。"}, {"en": "Predicts contextualized latent representations from masked input via self-distillation with a standard Transformer.", "zh": "通过标准 Transformer 的自蒸馏，从掩码输入预测上下文化的潜在表示。"}, {"en": "Achieves state-of-the-art or competitive results on ImageNet-1K, Librispeech, and GLUE benchmarks.", "zh": "在 ImageNet-1K、Librispeech 和 GLUE 基准上取得最先进或具有竞争力的结果。"}, {"en": "Uses multi-layer target averaging from teacher network, improving over single-layer targets like BYOL.", "zh": "使用教师网络的多层目标平均，优于 BYOL 等单层目标方法。"}, {"en": "First NLP model to predict continuous latent targets instead of discrete tokens, enabling open-vocabulary learning.", "zh": "首个预测连续潜在目标而非离散 token 的 NLP 模型，实现开放词汇学习。"}, {"en": "Demonstrates that contextualized targets from full input outperform local targets in self-supervised learning.", "zh": "证明来自完整输入的上下文化目标在自我监督学习中优于局部目标。"}], "limits": [{"en": "Still uses modality-specific feature encoders and masking strategies, not fully unified.", "zh": "仍使用模态特定的特征编码器和掩码策略，未完全统一。"}, {"en": "Requires careful tuning of hyperparameters like learning rate and momentum to avoid representation collapse.", "zh": "需要仔细调整学习率和动量等超参数以避免表示崩溃。"}, {"en": "Performance on speech recognition relies on large pre-training data (960 hours) and may not generalize to low-resource languages.", "zh": "语音识别性能依赖大量预训练数据（960 小时），可能无法泛化到低资源语言。"}, {"en": "Does not explore multi-modal joint training; only learns representations for each modality separately.", "zh": "未探索多模态联合训练；仅单独学习每种模态的表示。"}, {"en": "Contextualized targets require full teacher forward pass, increasing computational cost compared to local targets.", "zh": "上下文化目标需要完整的教师前向传播，相比局部目标增加了计算成本。"}]}, "cites": 1159}, {"id": "jasonwei-2201.11903", "pid": "jasonwei", "arxiv": "2201.11903", "date": "2022-01-28", "venue": "cs.CL", "org": "Google", "fields": ["nlp", "deep-learning"], "tEn": "Chain-of-Thought Prompting Elicits Reasoning in Large Language Models", "tZh": "思维链提示激发大型语言模型的推理能力", "sEn": "Chain-of-thought prompting significantly improves complex reasoning in large language models.", "sZh": "思维链提示显著提升大型语言模型的复杂推理能力。", "absEn": "We explore how generating a chain of thought -- a series of intermediate reasoning steps -- significantly improves the ability of large language models to perform complex reasoning. In particular, we show how such reasoning abilities emerge naturally in sufficiently large language models via a simple method called chain of thought prompting, where a few chain of thought demonstrations are provided as exemplars in prompting. Experiments on three large language models show that chain of thought prompting improves performance on a range of arithmetic, commonsense, and symbolic reasoning tasks. The empirical gains can be striking. For instance, prompting a 540B-parameter language model with just eight chain of thought exemplars achieves state of the art accuracy on the GSM8K benchmark of math word problems, surpassing even finetuned GPT-3 with a verifier.", "absZh": "我们探索了生成思维链——一系列中间推理步骤——如何显著提升大型语言模型执行复杂推理的能力。特别地，我们展示了这种推理能力如何通过一种简单的方法——思维链提示——在足够大的语言模型中自然涌现，该方法在提示中提供少量思维链示例作为范例。在三个大型语言模型上的实验表明，思维链提示在算术、常识和符号推理任务上均提升了性能。实证收益显著。例如，仅用八个思维链示例提示一个540B参数的语言模型，就在数学应用题GSM8K基准上达到了最先进的准确率，甚至超过了使用验证器的微调GPT-3。", "insights": {"contrib": [{"en": "Proposes chain-of-thought prompting, a simple method that elicits multi-step reasoning in large language models via few-shot exemplars with intermediate reasoning steps.", "zh": "提出思维链提示法，一种通过包含中间推理步骤的少样本示例激发大语言模型多步推理的简单方法。"}, {"en": "Demonstrates that chain-of-thought prompting significantly improves performance on arithmetic, commonsense, and symbolic reasoning tasks, achieving state-of-the-art on GSM8K.", "zh": "证明思维链提示法在算术、常识和符号推理任务上显著提升性能，在GSM8K上达到最先进水平。"}, {"en": "Shows that chain-of-thought reasoning is an emergent ability of model scale, only benefiting models with ~100B parameters or more.", "zh": "表明思维链推理是模型规模的涌现能力，仅对约1000亿参数及以上的模型有效。"}, {"en": "Provides ablation studies isolating the effects of equation-only, variable compute, and chain-of-thought after answer, confirming the importance of sequential natural language reasoning.", "zh": "通过消融实验分离了仅方程、可变算力和答案后思维链的效果，确认了顺序自然语言推理的重要性。"}, {"en": "Demonstrates robustness of chain-of-thought prompting to different annotators, exemplars, and language models.", "zh": "证明了思维链提示法对不同标注者、示例和语言模型的鲁棒性。"}, {"en": "Shows that chain-of-thought prompting facilitates length generalization to out-of-distribution inputs with more steps than seen in exemplars.", "zh": "表明思维链提示法促进了长度泛化，能处理比示例中步骤更多的分布外输入。"}], "limits": [{"en": "Does not address whether the neural network is actually reasoning; chain-of-thought emulates human thought processes but does not guarantee reasoning.", "zh": "未解决神经网络是否真正推理的问题；思维链模仿人类思维过程但不保证推理。"}, {"en": "Manual annotation of chain-of-thought exemplars is costly for few-shot prompting, and prohibitive for finetuning without synthetic data.", "zh": "手动标注思维链示例在少样本提示中成本高，在微调中若无合成数据则难以承受。"}, {"en": "No guarantee of correct reasoning paths; generated chains can lead to both correct and incorrect answers.", "zh": "不保证推理路径正确；生成的思维链可能导致正确或错误答案。"}, {"en": "Chain-of-thought reasoning only emerges at large model scales, making it costly to serve in real-world applications.", "zh": "思维链推理仅在大型模型规模下涌现，使得在实际应用中部署成本高昂。"}, {"en": "Limited evaluation to arithmetic, commonsense, and symbolic reasoning; applicability to other domains remains unexplored.", "zh": "评估仅限于算术、常识和符号推理；在其他领域的适用性尚未探索。"}]}, "cites": 19372}, {"id": "junnanli-2201.12086", "pid": "junnanli", "arxiv": "2201.12086", "date": "2022-01-28", "venue": "cs.CV", "org": "Salesforce", "fields": ["vision", "nlp"], "tEn": "BLIP: Bootstrapping Language-Image Pre-training for Unified Vision-Language Understanding and Generation", "tZh": "BLIP：引导语言-图像预训练实现统一视觉-语言理解与生成", "sEn": "BLIP achieves state-of-the-art on vision-language tasks by bootstrapping captions from noisy web data.", "sZh": "BLIP通过从嘈杂网络数据中引导生成字幕，在视觉-语言任务上达到最先进水平。", "absEn": "Vision-Language Pre-training (VLP) has advanced the performance for many vision-language tasks. However, most existing pre-trained models only excel in either understanding-based tasks or generation-based tasks. Furthermore, performance improvement has been largely achieved by scaling up the dataset with noisy image-text pairs collected from the web, which is a suboptimal source of supervision. In this paper, we propose BLIP, a new VLP framework which transfers flexibly to both vision-language understanding and generation tasks. BLIP effectively utilizes the noisy web data by bootstrapping the captions, where a captioner generates synthetic captions and a filter removes the noisy ones. We achieve state-of-the-art results on a wide range of vision-language tasks, such as image-text retrieval (+2.7% in average recall@1), image captioning (+2.8% in CIDEr), and VQA (+1.6% in VQA score). BLIP also demonstrates strong generalization ability when directly transferred to video-language tasks in a zero-shot manner. Code, models, and datasets are released at https://github.com/salesforce/BLIP.", "absZh": "视觉-语言预训练（VLP）提升了许多视觉-语言任务的性能。然而，大多数现有的预训练模型仅在基于理解的任务或基于生成的任务中表现出色。此外，性能提升主要通过从网络收集的带有噪声的图像-文本对来扩大数据集实现，这是一种次优的监督来源。在本文中，我们提出了BLIP，一种新的VLP框架，能够灵活地迁移到视觉-语言理解和生成任务。BLIP通过引导字幕有效利用嘈杂的网络数据，其中字幕生成器生成合成字幕，过滤器去除噪声字幕。我们在广泛的视觉-语言任务上取得了最先进的结果，例如图像-文本检索（平均召回率@1提升2.7%）、图像字幕（CIDEr提升2.8%）和VQA（VQA分数提升1.6%）。BLIP在零样本方式下直接迁移到视频-语言任务时也表现出强大的泛化能力。代码、模型和数据集已在https://github.com/salesforce/BLIP发布。", "insights": {"contrib": [{"en": "Proposes BLIP, a unified VLP framework for both understanding and generation tasks.", "zh": "提出BLIP，一个统一的视觉语言预训练框架，同时适用于理解和生成任务。"}, {"en": "Introduces multimodal mixture of encoder-decoder (MED) for flexible multi-task pre-training.", "zh": "引入多模态混合编码器-解码器（MED），实现灵活的多任务预训练。"}, {"en": "Develops CapFilt to bootstrap noisy web data by generating synthetic captions and filtering noise.", "zh": "开发CapFilt方法，通过生成合成描述和过滤噪声来引导网络数据。"}, {"en": "Achieves state-of-the-art results on image-text retrieval, captioning, VQA, and zero-shot video tasks.", "zh": "在图像-文本检索、图像描述、视觉问答和零样本视频任务上取得最先进结果。"}, {"en": "Demonstrates strong generalization to video-language tasks via zero-shot transfer.", "zh": "通过零样本迁移展示了在视频-语言任务上的强泛化能力。"}, {"en": "Releases code, models, and bootstrapped datasets to facilitate future research.", "zh": "发布代码、模型和引导数据集以促进未来研究。"}], "limits": [{"en": "CapFilt requires finetuning captioner and filter on human-annotated data like COCO.", "zh": "CapFilt需要在人工标注数据（如COCO）上微调描述生成器和过滤器。"}, {"en": "Performance gains from CapFilt diminish when using deterministic decoding like beam search.", "zh": "使用确定性解码（如束搜索）时，CapFilt的性能提升会减弱。"}, {"en": "Zero-shot video transfer ignores temporal information, limiting performance on temporal tasks.", "zh": "零样本视频迁移忽略时间信息，限制了在时间任务上的性能。"}, {"en": "Bootstrapped dataset requires training a new model from scratch; continued training from teacher is ineffective.", "zh": "引导数据集需要从头训练新模型；从教师模型继续训练无效。"}, {"en": "Method relies on large-scale web data and computational resources for pre-training.", "zh": "方法依赖大规模网络数据和计算资源进行预训练。"}]}, "cites": 6856}, {"id": "rrombach-2112.10752", "pid": "rrombach", "arxiv": "2112.10752", "date": "2021-12-20", "venue": "cs.CV", "org": "LMU Munich", "fields": ["generative", "vision"], "tEn": "High-Resolution Image Synthesis with Latent Diffusion Models", "tZh": "基于潜在扩散模型的高分辨率图像合成", "sEn": "Latent diffusion models achieve high-quality image synthesis with reduced computational cost by operating in the latent space of pretrained autoencoders.", "sZh": "潜在扩散模型通过在预训练自编码器的潜在空间中操作，以降低计算成本实现高质量图像合成。", "absEn": "By decomposing the image formation process into a sequential application of denoising autoencoders, diffusion models (DMs) achieve state-of-the-art synthesis results on image data and beyond. Additionally, their formulation allows for a guiding mechanism to control the image generation process without retraining. However, since these models typically operate directly in pixel space, optimization of powerful DMs often consumes hundreds of GPU days and inference is expensive due to sequential evaluations. To enable DM training on limited computational resources while retaining their quality and flexibility, we apply them in the latent space of powerful pretrained autoencoders. In contrast to previous work, training diffusion models on such a representation allows for the first time to reach a near-optimal point between complexity reduction and detail preservation, greatly boosting visual fidelity. By introducing cross-attention layers into the model architecture, we turn diffusion models into powerful and flexible generators for general conditioning inputs such as text or bounding boxes and high-resolution synthesis becomes possible in a convolutional manner. Our latent diffusion models (LDMs) achieve a new state of the art for image inpainting and highly competitive performance on various tasks, including unconditional image generation, semantic scene synthesis, and super-resolution, while significantly reducing computational requirements compared to pixel-based DMs. Code is available at https://github.com/CompVis/latent-diffusion .", "absZh": "通过将图像形成过程分解为去噪自编码器的顺序应用，扩散模型在图像数据及其他领域取得了最先进的合成结果。此外，其公式允许一种引导机制来控制图像生成过程而无需重新训练。然而，由于这些模型通常直接在像素空间操作，强大扩散模型的优化往往消耗数百个GPU天，且由于顺序评估导致推理成本高昂。为了在有限计算资源下训练扩散模型，同时保持其质量和灵活性，我们将其应用于强大预训练自编码器的潜在空间。与以往工作相比，在这种表示上训练扩散模型首次能够在复杂度降低和细节保留之间达到接近最优的点，极大地提升了视觉保真度。通过将交叉注意力层引入模型架构，我们将扩散模型转变为强大且灵活的生成器，适用于文本或边界框等通用条件输入，并以卷积方式实现高分辨率合成。我们的潜在扩散模型在图像修复任务上达到了新的最先进水平，并在包括无条件图像生成、语义场景合成和超分辨率在内的各种任务上表现出极具竞争力的性能，同时相比基于像素的扩散模型显著降低了计算需求。代码可在 https://github.com/CompVis/latent-diffusion 获取。", "insights": {"contrib": [{"en": "Propose Latent Diffusion Models (LDMs) that apply diffusion in latent space of pretrained autoencoders, reducing computational cost while maintaining quality.", "zh": "提出潜在扩散模型（LDM），在预训练自编码器的潜在空间中应用扩散，降低计算成本同时保持质量。"}, {"en": "Achieve near-optimal balance between complexity reduction and detail preservation via latent space training, boosting visual fidelity.", "zh": "通过潜在空间训练实现复杂度降低与细节保留之间的近最优平衡，提升视觉保真度。"}, {"en": "Introduce cross-attention layers into UNet backbone for flexible conditioning on text, bounding boxes, etc., enabling high-resolution synthesis.", "zh": "在UNet骨干中引入交叉注意力层，实现对文本、边界框等的灵活条件控制，支持高分辨率合成。"}, {"en": "Set new state-of-the-art on image inpainting and competitive performance on unconditional generation, semantic synthesis, and super-resolution.", "zh": "在图像修复上达到新最优，在无条件生成、语义合成和超分辨率上表现竞争力。"}, {"en": "Significantly reduce training and inference costs compared to pixel-based diffusion models, e.g., 2.7x speedup in inpainting.", "zh": "相比基于像素的扩散模型显著降低训练和推理成本，例如在修复中加速2.7倍。"}, {"en": "Release pretrained models for reuse across multiple tasks, democratizing access to powerful diffusion models.", "zh": "发布预训练模型供多任务复用，使强大扩散模型更易获取。"}], "limits": [{"en": "Sequential sampling process is still slower than GANs, limiting real-time applications.", "zh": "顺序采样过程仍慢于GAN，限制实时应用。"}, {"en": "Reconstruction capability of autoencoder can bottleneck tasks requiring fine-grained pixel accuracy, e.g., super-resolution.", "zh": "自编码器的重建能力可能成为需要细粒度像素精度任务（如超分辨率）的瓶颈。"}, {"en": "Potential for misuse in creating deepfakes, spreading misinformation, and revealing sensitive training data.", "zh": "可能被滥用于制造深度伪造、传播虚假信息及泄露敏感训练数据。"}, {"en": "Two-stage training may exacerbate biases present in data, though mode coverage is better than GANs.", "zh": "两阶段训练可能加剧数据中的偏差，尽管模式覆盖优于GAN。"}, {"en": "Performance on some tasks (e.g., LSUN-Bedrooms) slightly below specialized models like ADM despite lower resource use.", "zh": "在某些任务（如LSUN-Bedrooms）上性能略低于ADM等专用模型，尽管资源消耗更低。"}]}, "cites": 25459}, {"id": "zhendaxie-2111.09886", "pid": "zhendaxie", "arxiv": "2111.09886", "date": "2021-11-18", "venue": "cs.CV", "org": "Microsoft Research Asia", "fields": ["vision", "deep-learning"], "tEn": "SimMIM: A Simple Framework for Masked Image Modeling", "tZh": "SimMIM：一种简单的掩码图像建模框架", "sEn": "SimMIM simplifies masked image modeling with random masking, raw pixel regression, and a linear prediction head, achieving strong results.", "sZh": "SimMIM通过随机掩码、原始像素回归和线性预测头简化了掩码图像建模，取得了优异的结果。", "absEn": "This paper presents SimMIM, a simple framework for masked image modeling. We simplify recently proposed related approaches without special designs such as block-wise masking and tokenization via discrete VAE or clustering. To study what let the masked image modeling task learn good representations, we systematically study the major components in our framework, and find that simple designs of each component have revealed very strong representation learning performance: 1) random masking of the input image with a moderately large masked patch size (e.g., 32) makes a strong pre-text task; 2) predicting raw pixels of RGB values by direct regression performs no worse than the patch classification approaches with complex designs; 3) the prediction head can be as light as a linear layer, with no worse performance than heavier ones. Using ViT-B, our approach achieves 83.8% top-1 fine-tuning accuracy on ImageNet-1K by pre-training also on this dataset, surpassing previous best approach by +0.6%. When applied on a larger model of about 650 million parameters, SwinV2-H, it achieves 87.1% top-1 accuracy on ImageNet-1K using only ImageNet-1K data. We also leverage this approach to facilitate the training of a 3B model (SwinV2-G), that by $40\\times$ less data than that in previous practice, we achieve the state-of-the-art on four representative vision benchmarks. The code and models will be publicly available at https://github.com/microsoft/SimMIM.", "absZh": "本文提出了SimMIM，一个简单的掩码图像建模框架。我们简化了最近提出的相关方法，无需特殊设计如块状掩码或通过离散VAE或聚类的标记化。为了研究掩码图像建模任务如何学习好的表示，我们系统地研究了框架中的主要组成部分，发现每个组件的简单设计已经展现出非常强的表示学习性能：1）对输入图像进行随机掩码，使用中等大小的掩码块（例如32）构成了一个强大的预文本任务；2）通过直接回归预测RGB值的原始像素，其性能不亚于具有复杂设计的块分类方法；3）预测头可以轻量到仅为一个线性层，性能不亚于更重的预测头。使用ViT-B，我们的方法在ImageNet-1K上预训练后，微调top-1准确率达到83.8%，比之前的最佳方法高出0.6%。当应用于约6.5亿参数的更大模型SwinV2-H时，仅使用ImageNet-1K数据就达到了87.1%的top-1准确率。我们还利用该方法促进了30亿参数模型（SwinV2-G）的训练，与以往实践相比，数据量减少了40倍，在四个代表性视觉基准上达到了最先进水平。代码和模型将在https://github.com/microsoft/SimMIM公开。", "insights": {"contrib": [{"en": "Proposes SimMIM, a simple framework for masked image modeling without special designs like block-wise masking or discrete VAE tokenization.", "zh": "提出SimMIM，一个简单的掩码图像建模框架，无需块状掩码或离散VAE分词等特殊设计。"}, {"en": "Shows random masking with large patch size (e.g., 32) and raw pixel regression via ℓ1 loss yields strong representations.", "zh": "表明使用大块尺寸（如32）的随机掩码和通过ℓ1损失的原始像素回归可产生强表征。"}, {"en": "Demonstrates a linear prediction head suffices, achieving 83.8% top-1 accuracy on ImageNet-1K with ViT-B.", "zh": "证明线性预测头足够，在ImageNet-1K上使用ViT-B达到83.8% top-1准确率。"}, {"en": "Scales to 3B-parameter SwinV2-G, achieving state-of-the-art on four vision benchmarks with 40× less data.", "zh": "扩展到3B参数的SwinV2-G，在四个视觉基准上以40倍更少数据达到最先进水平。"}, {"en": "Systematically studies masking strategy, prediction target, and head design, revealing simple designs are optimal.", "zh": "系统研究掩码策略、预测目标和头部设计，揭示简单设计最优。"}, {"en": "Provides code and models publicly at https://github.com/microsoft/SimMIM.", "zh": "在https://github.com/microsoft/SimMIM公开提供代码和模型。"}], "limits": [{"en": "Evaluation primarily on ImageNet-1K; generalization to other domains not extensively validated.", "zh": "主要评估在ImageNet-1K上；未广泛验证对其他领域的泛化性。"}, {"en": "Requires large masked patch size (e.g., 32) and high masking ratio (e.g., 60%) for best performance.", "zh": "需要大掩码块尺寸（如32）和高掩码率（如60%）以获得最佳性能。"}, {"en": "Pre-training on ImageNet-1K only; performance on other datasets may vary.", "zh": "仅在ImageNet-1K上预训练；在其他数据集上的性能可能不同。"}, {"en": "Heavier prediction heads or higher target resolutions do not improve fine-tuning performance.", "zh": "更重的预测头或更高目标分辨率不会提升微调性能。"}, {"en": "Limited analysis on why simple designs outperform complex ones; relies on empirical observations.", "zh": "对简单设计为何优于复杂设计的分析有限；依赖经验观察。"}]}, "cites": 1833}, {"id": "jinghaozhou-2111.07832", "pid": "jinghaozhou", "arxiv": "2111.07832", "date": "2021-11-15", "venue": "cs.CV", "org": "ByteDance", "fields": ["vision", "deep-learning"], "tEn": "iBOT: Image BERT Pre-Training with Online Tokenizer", "tZh": "iBOT：基于在线分词器的图像BERT预训练", "sEn": "iBOT achieves masked image modeling with an online tokenizer via self-distillation, eliminating the need for pre-trained tokenizers and achieving state-of-the-art results on ImageNet-1K.", "sZh": "iBOT通过自蒸馏实现带在线分词器的掩码图像建模，无需预训练分词器，在ImageNet-1K上达到最优结果。", "absEn": "The success of language Transformers is primarily attributed to the pretext task of masked language modeling (MLM), where texts are first tokenized into semantically meaningful pieces. In this work, we study masked image modeling (MIM) and indicate the advantages and challenges of using a semantically meaningful visual tokenizer. We present a self-supervised framework iBOT that can perform masked prediction with an online tokenizer. Specifically, we perform self-distillation on masked patch tokens and take the teacher network as the online tokenizer, along with self-distillation on the class token to acquire visual semantics. The online tokenizer is jointly learnable with the MIM objective and dispenses with a multi-stage training pipeline where the tokenizer needs to be pre-trained beforehand. We show the prominence of iBOT by achieving an 82.3% linear probing accuracy and an 87.8% fine-tuning accuracy evaluated on ImageNet-1K. Beyond the state-of-the-art image classification results, we underline emerging local semantic patterns, which helps the models to obtain strong robustness against common corruptions and achieve leading results on dense downstream tasks, eg., object detection, instance segmentation, and semantic segmentation.", "absZh": "语言Transformer的成功主要归功于掩码语言建模（MLM）这一预文本任务，其中文本首先被分词为语义上有意义的片段。在这项工作中，我们研究了掩码图像建模（MIM），并指出了使用语义上有意义的视觉分词器的优势和挑战。我们提出了一个自监督框架iBOT，它可以通过在线分词器执行掩码预测。具体来说，我们在掩码补丁令牌上执行自蒸馏，并将教师网络作为在线分词器，同时在类别令牌上进行自蒸馏以获取视觉语义。在线分词器与MIM目标联合学习，无需多阶段训练流程（即分词器需要预先训练）。我们通过在线性探测中达到82.3%的准确率，在ImageNet-1K微调中达到87.8%的准确率，展示了iBOT的优越性。除了最先进的图像分类结果外，我们强调了新兴的局部语义模式，这有助于模型获得对常见损坏的强鲁棒性，并在密集下游任务（如目标检测、实例分割和语义分割）上取得领先结果。", "insights": {"contrib": [{"en": "Proposes iBOT, a self-supervised framework for masked image modeling with an online tokenizer.", "zh": "提出iBOT，一种使用在线分词器的自监督掩码图像建模框架。"}, {"en": "Achieves state-of-the-art linear probing (82.3%) and fine-tuning (87.8%) accuracy on ImageNet-1K.", "zh": "在ImageNet-1K上达到82.3%线性探测和87.8%微调准确率，均为最优。"}, {"en": "Eliminates multi-stage training by jointly learning the tokenizer and target model via self-distillation.", "zh": "通过自蒸馏联合学习分词器和目标模型，消除了多阶段训练。"}, {"en": "Discovers emerging part-level semantics in patch tokens, enhancing robustness and dense task performance.", "zh": "发现补丁令牌中涌现的局部语义，增强了鲁棒性和密集任务性能。"}, {"en": "Outperforms prior methods on object detection, instance segmentation, and semantic segmentation.", "zh": "在目标检测、实例分割和语义分割上超越先前方法。"}, {"en": "Demonstrates scalability to larger models and datasets, with consistent gains over DINO.", "zh": "展示了向更大模型和数据集的扩展性，持续优于DINO。"}], "limits": [{"en": "Requires more data to train larger models, as ViT-L/16 underperforms BEiT on 1K data.", "zh": "训练更大模型需要更多数据，ViT-L/16在1K数据上不如BEiT。"}, {"en": "Performance depends on the shared projection head design; separate heads yield worse results.", "zh": "性能依赖于共享投影头设计；分离头导致结果较差。"}, {"en": "Limited evaluation on datasets beyond ImageNet; transfer learning results may vary.", "zh": "对ImageNet以外数据集的评估有限；迁移学习结果可能不同。"}, {"en": "Online tokenizer may not capture semantics as effectively as offline tokenizers in some domains.", "zh": "在线分词器在某些领域可能不如离线分词器有效捕捉语义。"}, {"en": "Computational cost of self-distillation with momentum update may be high for very large models.", "zh": "动量更新的自蒸馏计算成本对超大模型可能较高。"}]}, "cites": 1110}, {"id": "kaiming-2111.06377", "pid": "kaiming", "arxiv": "2111.06377", "date": "2021-11-11", "venue": "cs.CV", "fields": ["vision", "deep-learning"], "tEn": "Masked Autoencoders Are Scalable Vision Learners", "tZh": "掩码自编码器是可扩展的视觉学习器", "sEn": "Masked autoencoders (MAE) are scalable self-supervised learners for computer vision, achieving high accuracy and efficient training.", "sZh": "掩码自编码器（MAE）是可扩展的计算机视觉自监督学习方法，实现了高精度和高效训练。", "absEn": "This paper shows that masked autoencoders (MAE) are scalable self-supervised learners for computer vision. Our MAE approach is simple: we mask random patches of the input image and reconstruct the missing pixels. It is based on two core designs. First, we develop an asymmetric encoder-decoder architecture, with an encoder that operates only on the visible subset of patches (without mask tokens), along with a lightweight decoder that reconstructs the original image from the latent representation and mask tokens. Second, we find that masking a high proportion of the input image, e.g., 75%, yields a nontrivial and meaningful self-supervisory task. Coupling these two designs enables us to train large models efficiently and effectively: we accelerate training (by 3x or more) and improve accuracy. Our scalable approach allows for learning high-capacity models that generalize well: e.g., a vanilla ViT-Huge model achieves the best accuracy (87.8%) among methods that use only ImageNet-1K data. Transfer performance in downstream tasks outperforms supervised pre-training and shows promising scaling behavior.", "absZh": "本文表明，掩码自编码器（MAE）是可扩展的计算机视觉自监督学习器。我们的MAE方法很简单：随机遮蔽输入图像的部分块，并重建缺失的像素。它基于两个核心设计。首先，我们开发了一种非对称的编码器-解码器架构，编码器仅对可见的块子集（无掩码标记）进行操作，而轻量级解码器则从潜在表示和掩码标记重建原始图像。其次，我们发现遮蔽输入图像的高比例（例如75%）会产生一个非平凡且有意义的自监督任务。结合这两种设计，我们能够高效且有效地训练大型模型：我们加速了训练（3倍或更多）并提高了准确性。我们的可扩展方法允许学习泛化良好的高容量模型：例如，一个普通的ViT-Huge模型在使用仅ImageNet-1K数据的方法中达到了最佳准确率（87.8%）。在下游任务中的迁移性能优于监督预训练，并显示出有希望的扩展行为。", "insights": {"contrib": [{"en": "Proposes masked autoencoders (MAE) as scalable self-supervised learners for vision.", "zh": "提出掩码自编码器（MAE）作为视觉中可扩展的自监督学习方法。"}, {"en": "Introduces asymmetric encoder-decoder design: encoder only on visible patches, lightweight decoder reconstructs pixels.", "zh": "引入非对称编码器-解码器设计：编码器仅处理可见块，轻量解码器重建像素。"}, {"en": "Shows high masking ratio (75%) creates a challenging self-supervisory task that reduces redundancy.", "zh": "表明高掩码比例（75%）创建了具有挑战性的自监督任务，减少了冗余。"}, {"en": "Achieves 87.8% top-1 accuracy on ImageNet-1K with vanilla ViT-Huge, outperforming prior methods.", "zh": "在ImageNet-1K上使用原始ViT-Huge达到87.8% top-1准确率，优于先前方法。"}, {"en": "Demonstrates transfer learning gains over supervised pre-training on detection and segmentation.", "zh": "在检测和分割任务上展示了优于监督预训练的迁移学习增益。"}, {"en": "Observes promising scaling behavior: larger models yield better performance with MAE pre-training.", "zh": "观察到有前景的缩放行为：更大的模型通过MAE预训练获得更好的性能。"}], "limits": [{"en": "Method relies on random patch masking, which may not capture semantic structure like object boundaries.", "zh": "方法依赖随机块掩码，可能无法捕捉语义结构如物体边界。"}, {"en": "Reconstruction target is pixels, which are low-level and may limit high-level semantic learning.", "zh": "重建目标是像素，属于低级特征，可能限制高级语义学习。"}, {"en": "Linear probing accuracy is lower than contrastive methods, indicating less linearly separable features.", "zh": "线性探测准确率低于对比方法，表明特征线性可分性较差。"}, {"en": "Requires long pre-training schedules (e.g., 1600 epochs) for optimal performance.", "zh": "需要较长的预训练周期（如1600轮）才能达到最佳性能。"}, {"en": "Model may reflect dataset biases and generate inexistent content, raising societal concerns.", "zh": "模型可能反映数据集偏差并生成不存在的内容，引发社会担忧。"}]}, "org": "Meta AI", "cites": 11828}, {"id": "ofirpress-2108.12409", "pid": "ofirpress", "arxiv": "2108.12409", "date": "2021-08-27", "venue": "cs.CL", "org": "University of Washington / Allen Institute for AI", "fields": ["nlp", "efficiency"], "tEn": "Train Short, Test Long: Attention with Linear Biases Enables Input Length Extrapolation", "tZh": "短训练，长测试：线性偏置注意力实现输入长度外推", "sEn": "ALiBi enables efficient extrapolation to longer sequences by biasing attention scores with distance-based penalties, outperforming sinusoidal embeddings with 11% faster training and less memory.", "sZh": "ALiBi通过基于距离的惩罚偏置注意力分数，实现了对更长序列的高效外推，相比正弦位置嵌入，训练速度提升11%，内存占用更少。", "absEn": "Since the introduction of the transformer model by Vaswani et al. (2017), a fundamental question has yet to be answered: how does a model achieve extrapolation at inference time for sequences that are longer than it saw during training? We first show that extrapolation can be enabled by simply changing the position representation method, though we find that current methods do not allow for efficient extrapolation. We therefore introduce a simpler and more efficient position method, Attention with Linear Biases (ALiBi). ALiBi does not add positional embeddings to word embeddings; instead, it biases query-key attention scores with a penalty that is proportional to their distance. We show that this method trains a 1.3 billion parameter model on input sequences of length 1024 that extrapolates to input sequences of length 2048, achieving the same perplexity as a sinusoidal position embedding model trained on inputs of length 2048 but training 11% faster and using 11% less memory. ALiBi's inductive bias towards recency also leads it to outperform multiple strong position methods on the WikiText-103 benchmark.", "absZh": "自Vaswani等人（2017）引入Transformer模型以来，一个基本问题尚未得到解答：模型如何在推理时对训练期间未见过的更长序列实现外推？我们首先表明，只需改变位置表示方法即可实现外推，但我们发现当前方法无法实现高效外推。因此，我们引入了一种更简单、更高效的位置方法——线性偏置注意力（ALiBi）。ALiBi不向词嵌入添加位置嵌入；相反，它通过一个与距离成比例的惩罚来偏置查询-键注意力分数。我们表明，该方法在长度为1024的输入序列上训练了一个13亿参数的模型，该模型可外推到长度为2048的输入序列，实现了与在长度为2048的输入上训练的正弦位置嵌入模型相同的困惑度，但训练速度提高了11%，内存使用减少了11%。ALiBi对近因的归纳偏置也使其在WikiText-103基准测试中优于多种强位置方法。", "insights": {"contrib": [{"en": "Introduces ALiBi, a simple position method that biases attention scores with linear penalties proportional to distance.", "zh": "提出ALiBi，一种简单的注意力位置方法，通过线性惩罚偏置注意力分数，惩罚与距离成正比。"}, {"en": "Shows ALiBi enables transformer LMs to extrapolate to sequences longer than training length, e.g., 1.3B model trained on 1024 tokens extrapolates to 2048.", "zh": "展示ALiBi使Transformer语言模型能外推到比训练长度更长的序列，例如1.3B参数模型在1024词元上训练可外推到2048词元。"}, {"en": "Demonstrates ALiBi trains 11% faster and uses 11% less memory than sinusoidal embeddings for equivalent perplexity on long sequences.", "zh": "证明ALiBi在长序列上达到与正弦位置嵌入相同的困惑度时，训练速度快11%，内存少11%。"}, {"en": "Finds that extrapolation ability depends heavily on position method; sinusoidal and rotary methods have limited extrapolation, while T5 bias is computationally costly.", "zh": "发现外推能力高度依赖位置方法；正弦和旋转方法外推有限，而T5偏置计算成本高。"}, {"en": "Shows ALiBi outperforms multiple strong position methods on WikiText-103, improving perplexity up to 3x training length.", "zh": "展示ALiBi在WikiText-103上优于多种强位置方法，困惑度在训练长度3倍内持续改善。"}, {"en": "Validates ALiBi on large-scale 1.3B parameter model with 461GB dataset, achieving similar perplexity to sinusoidal baseline with less memory.", "zh": "在461GB数据集上验证1.3B参数模型的ALiBi，以更少内存达到与正弦基线相似的困惑度。"}], "limits": [{"en": "ALiBi's extrapolation performance peaks at around 2x training length; beyond that, gains diminish.", "zh": "ALiBi的外推性能在训练长度约2倍时达到峰值，之后增益递减。"}, {"en": "Method tested primarily on language modeling; applicability to other tasks like translation or classification not explored.", "zh": "方法主要在语言建模上测试；未探索在翻译或分类等其他任务上的适用性。"}, {"en": "ALiBi requires a small memory increase (up to 100MB) due to per-head bias masks, though offset by shorter training sequences.", "zh": "ALiBi因每头偏置掩码需要少量内存增加（最多100MB），但被更短的训练序列抵消。"}, {"en": "The fixed slope hyperparameter set may not be optimal for all model sizes or domains, though robust across tested settings.", "zh": "固定斜率超参数集可能并非对所有模型规模或领域最优，但在测试设置中表现稳健。"}, {"en": "Extrapolation beyond 10,000 tokens shows strong but not perfect performance; further improvements may require additional techniques.", "zh": "外推到超过10,000词元时性能强但不完美；进一步改进可能需要额外技术。"}]}, "cites": 1268}, {"id": "nzeghidour-2107.03312", "pid": "nzeghidour", "arxiv": "2107.03312", "date": "2021-07-07", "venue": "cs.SD", "org": "Google", "fields": ["deep-learning", "efficiency"], "tEn": "SoundStream: An End-to-End Neural Audio Codec", "tZh": "SoundStream: 一种端到端神经音频编解码器", "sEn": "SoundStream is a neural audio codec that efficiently compresses speech, music, and general audio at low bitrates, outperforming traditional codecs like Opus and approaching EVS quality.", "sZh": "SoundStream是一种神经音频编解码器，能以低比特率高效压缩语音、音乐和通用音频，性能优于Opus等传统编解码器，接近EVS质量。", "absEn": "We present SoundStream, a novel neural audio codec that can efficiently compress speech, music and general audio at bitrates normally targeted by speech-tailored codecs. SoundStream relies on a model architecture composed by a fully convolutional encoder/decoder network and a residual vector quantizer, which are trained jointly end-to-end. Training leverages recent advances in text-to-speech and speech enhancement, which combine adversarial and reconstruction losses to allow the generation of high-quality audio content from quantized embeddings. By training with structured dropout applied to quantizer layers, a single model can operate across variable bitrates from 3kbps to 18kbps, with a negligible quality loss when compared with models trained at fixed bitrates. In addition, the model is amenable to a low latency implementation, which supports streamable inference and runs in real time on a smartphone CPU. In subjective evaluations using audio at 24kHz sampling rate, SoundStream at 3kbps outperforms Opus at 12kbps and approaches EVS at 9.6kbps. Moreover, we are able to perform joint compression and enhancement either at the encoder or at the decoder side with no additional latency, which we demonstrate through background noise suppression for speech.", "absZh": "我们提出了SoundStream，一种新颖的神经音频编解码器，能够以通常针对语音的比特率高效压缩语音、音乐和通用音频。SoundStream依赖于由全卷积编码器/解码器网络和残差向量量化器组成的模型架构，两者通过端到端联合训练。训练利用了文本到语音和语音增强领域的最新进展，结合对抗损失和重建损失，从量化嵌入生成高质量音频内容。通过对量化器层应用结构化丢弃训练，单个模型可以在3kbps到18kbps的可变比特率下运行，与固定比特率训练的模型相比质量损失可忽略不计。此外，该模型支持低延迟实现，支持流式推理，并在智能手机CPU上实时运行。在24kHz采样率的音频主观评估中，3kbps的SoundStream优于12kbps的Opus，接近9.6kbps的EVS。此外，我们能够在编码器或解码器端进行联合压缩和增强，而无需额外延迟，通过语音背景噪声抑制进行了演示。", "insights": {"contrib": [{"en": "Proposes SoundStream, a neural audio codec trained end-to-end with adversarial and reconstruction losses for superior audio quality.", "zh": "提出SoundStream，一种端到端训练的神经音频编解码器，结合对抗损失和重建损失以实现卓越音频质量。"}, {"en": "Introduces a residual vector quantizer with quantizer dropout for bitrate scalability from 3 to 18 kbps.", "zh": "引入带量化器dropout的残差向量量化器，实现3至18 kbps的比特率可扩展性。"}, {"en": "Demonstrates that learning the encoder significantly improves coding efficiency over fixed mel-spectrogram features.", "zh": "证明学习编码器相比固定梅尔频谱特征显著提升编码效率。"}, {"en": "Shows SoundStream outperforms Opus and EVS across a wide range of bitrates in subjective evaluations.", "zh": "在主观评估中，SoundStream在广泛比特率范围内优于Opus和EVS。"}, {"en": "Supports streamable inference with low latency, running in real-time on a smartphone CPU.", "zh": "支持低延迟流式推理，在智能手机CPU上实时运行。"}, {"en": "Enables joint compression and enhancement without additional latency, demonstrated via background noise suppression.", "zh": "实现无额外延迟的联合压缩与增强，通过背景噪声抑制演示。"}], "limits": [{"en": "Evaluation limited to 24 kHz sampling rate; performance at higher rates not explored.", "zh": "评估限于24 kHz采样率，未探索更高采样率下的性能。"}, {"en": "Subjective tests use crowd-sourced MUSHRA methodology, which may introduce variability.", "zh": "主观测试采用众包MUSHRA方法，可能引入变异性。"}, {"en": "Joint compression and enhancement only demonstrated for background noise suppression; other enhancements not tested.", "zh": "联合压缩与增强仅针对背景噪声抑制演示，未测试其他增强类型。"}, {"en": "Model complexity and memory requirements may limit deployment on very low-resource devices.", "zh": "模型复杂度和内存需求可能限制在极低资源设备上的部署。"}, {"en": "Bitrate scalability relies on quantizer dropout; performance at extreme bitrates (e.g., below 3 kbps) not evaluated.", "zh": "比特率可扩展性依赖量化器dropout，未评估极端比特率（如低于3 kbps）下的性能。"}]}, "cites": 1371}, {"id": "furuwei-2106.08254", "pid": "furuwei", "arxiv": "2106.08254", "date": "2021-06-15", "venue": "cs.CV", "org": "Microsoft Research", "fields": ["vision", "deep-learning"], "tEn": "BEiT: BERT Pre-Training of Image Transformers", "tZh": "BEiT：图像Transformer的BERT预训练", "sEn": "BEiT introduces masked image modeling for self-supervised vision Transformer pre-training, achieving competitive results on image classification and segmentation.", "sZh": "BEiT提出掩码图像建模用于视觉Transformer自监督预训练，在图像分类和分割上取得有竞争力的结果。", "absEn": "We introduce a self-supervised vision representation model BEiT, which stands for Bidirectional Encoder representation from Image Transformers. Following BERT developed in the natural language processing area, we propose a masked image modeling task to pretrain vision Transformers. Specifically, each image has two views in our pre-training, i.e, image patches (such as 16x16 pixels), and visual tokens (i.e., discrete tokens). We first \"tokenize\" the original image into visual tokens. Then we randomly mask some image patches and fed them into the backbone Transformer. The pre-training objective is to recover the original visual tokens based on the corrupted image patches. After pre-training BEiT, we directly fine-tune the model parameters on downstream tasks by appending task layers upon the pretrained encoder. Experimental results on image classification and semantic segmentation show that our model achieves competitive results with previous pre-training methods. For example, base-size BEiT achieves 83.2% top-1 accuracy on ImageNet-1K, significantly outperforming from-scratch DeiT training (81.8%) with the same setup. Moreover, large-size BEiT obtains 86.3% only using ImageNet-1K, even outperforming ViT-L with supervised pre-training on ImageNet-22K (85.2%). The code and pretrained models are available at https://aka.ms/beit.", "absZh": "我们提出了一种自监督视觉表示模型BEiT，即来自图像Transformer的双向编码器表示。借鉴自然语言处理领域的BERT，我们提出了一种掩码图像建模任务来预训练视觉Transformer。具体来说，每张图像在预训练中有两种视图：图像块（如16x16像素）和视觉标记（即离散标记）。我们首先将原始图像“标记化”为视觉标记，然后随机掩码一些图像块并将其输入骨干Transformer。预训练目标是根据被破坏的图像块恢复原始视觉标记。预训练BEiT后，我们通过在预训练编码器上附加任务层直接在下游任务上微调模型参数。在图像分类和语义分割上的实验结果表明，我们的模型取得了与先前预训练方法相竞争的结果。例如，基础大小的BEiT在ImageNet-1K上达到83.2%的top-1准确率，显著优于相同设置下从头训练的DeiT（81.8%）。此外，大型BEiT仅使用ImageNet-1K就达到86.3%，甚至超过了在ImageNet-22K上进行监督预训练的ViT-L（85.2%）。代码和预训练模型可在https://aka.ms/beit获取。", "insights": {"contrib": [{"en": "Proposes masked image modeling (MIM) to pretrain vision Transformers in a self-supervised manner.", "zh": "提出掩码图像建模（MIM）以自监督方式预训练视觉Transformer。"}, {"en": "Provides a theoretical explanation of MIM from the perspective of variational autoencoder.", "zh": "从变分自编码器角度为MIM提供理论解释。"}, {"en": "Pretrains BEiT and conducts extensive fine-tuning on image classification and semantic segmentation.", "zh": "预训练BEiT并在图像分类和语义分割上开展广泛微调实验。"}, {"en": "Shows self-attention in BEiT learns to distinguish semantic regions and object boundaries without human annotation.", "zh": "展示BEiT的自注意力机制无需人工标注即可区分语义区域和物体边界。"}, {"en": "Achieves competitive results: BEiT-Base 83.2% top-1 on ImageNet-1K, outperforming DeiT (81.8%).", "zh": "取得有竞争力的结果：BEiT-Base在ImageNet-1K上达到83.2% top-1准确率，优于DeiT（81.8%）。"}, {"en": "Large-size BEiT achieves 86.3% on ImageNet-1K, surpassing ViT-L with supervised pre-training on ImageNet-22K (85.2%).", "zh": "大型BEiT在ImageNet-1K上达到86.3%，超越在ImageNet-22K上监督预训练的ViT-L（85.2%）。"}], "limits": [{"en": "Pre-training requires a separate image tokenizer (dVAE) trained on additional data.", "zh": "预训练需要额外的图像分词器（dVAE）在额外数据上训练。"}, {"en": "Masked image modeling may still focus on low-level details despite using discrete tokens.", "zh": "尽管使用离散词符，掩码图像建模仍可能关注低级细节。"}, {"en": "Performance gains are demonstrated mainly on ImageNet and ADE20K; generalizability to other tasks is not fully explored.", "zh": "性能提升主要在ImageNet和ADE20K上展示；对其他任务的泛化性未充分探索。"}, {"en": "The method relies on blockwise masking strategy; other masking strategies may yield different results.", "zh": "该方法依赖块状掩码策略；其他掩码策略可能产生不同结果。"}, {"en": "Pre-training is computationally expensive (500k steps on 16 GPUs for 5 days).", "zh": "预训练计算成本高（16块GPU上500k步需5天）。"}]}, "cites": 3728}, {"id": "abdelmohamed-2106.07447", "pid": "abdelmohamed", "arxiv": "2106.07447", "date": "2021-06-14", "venue": "cs.CL", "org": "Meta AI (FAIR)", "fields": ["deep-learning", "nlp"], "tEn": "HuBERT: Self-Supervised Speech Representation Learning by Masked Prediction of Hidden Units", "tZh": "HuBERT：通过隐藏单元的掩码预测进行自监督语音表示学习", "sEn": "HuBERT uses offline clustering to provide target labels for masked prediction, achieving state-of-the-art performance on speech benchmarks.", "sZh": "HuBERT利用离线聚类为掩码预测提供目标标签，在语音基准测试中达到最先进性能。", "absEn": "Self-supervised approaches for speech representation learning are challenged by three unique problems: (1) there are multiple sound units in each input utterance, (2) there is no lexicon of input sound units during the pre-training phase, and (3) sound units have variable lengths with no explicit segmentation. To deal with these three problems, we propose the Hidden-Unit BERT (HuBERT) approach for self-supervised speech representation learning, which utilizes an offline clustering step to provide aligned target labels for a BERT-like prediction loss. A key ingredient of our approach is applyin
