heir quality and flexibility, we apply them in the latent space of powerful pretrained autoencoders. In contrast to previous work, training diffusion models on such a representation allows for the first time to reach a near-optimal point between complexity reduction and detail preservation, greatly boosting visual fidelity. By introducing cross-attention layers into the model architecture, we turn diffusion models into powerful and flexible generators for general conditioning inputs such as text or bounding boxes and high-resolution synthesis becomes possible in a convolutional manner. Our latent diffusion models (LDMs) achieve a new state of the art for image inpainting and highly competitive performance on various tasks, including unconditional image generation, semantic scene synthesis, and super-resolution, while significantly reducing computational requirements compared to pixel-based DMs. Code is available at https://github.com/CompVis/latent-diffusion .", "absZh": "通过将图像形成过程分解为去噪自编码器的顺序应用，扩散模型在图像数据及其他领域取得了最先进的合成结果。此外，其公式允许一种引导机制来控制图像生成过程而无需重新训练。然而，由于这些模型通常直接在像素空间操作，强大扩散模型的优化往往消耗数百个GPU天，且由于顺序评估导致推理成本高昂。为了在有限计算资源下训练扩散模型，同时保持其质量和灵活性，我们将其应用于强大预训练自编码器的潜在空间。与以往工作相比，在这种表示上训练扩散模型首次能够在复杂度降低和细节保留之间达到接近最优的点，极大地提升了视觉保真度。通过将交叉注意力层引入模型架构，我们将扩散模型转变为强大且灵活的生成器，适用于文本或边界框等通用条件输入，并以卷积方式实现高分辨率合成。我们的潜在扩散模型在图像修复任务上达到了新的最先进水平，并在包括无条件图像生成、语义场景合成和超分辨率在内的各种任务上表现出极具竞争力的性能，同时相比基于像素的扩散模型显著降低了计算需求。代码可在 https://github.com/CompVis/latent-diffusion 获取。", "insights": {"contrib": [{"en": "Propose Latent Diffusion Models (LDMs) that apply diffusion in latent space of pretrained autoencoders, reducing computational cost while maintaining quality.", "zh": "提出潜在扩散模型（LDM），在预训练自编码器的潜在空间中应用扩散，降低计算成本同时保持质量。"}, {"en": "Achieve near-optimal balance between complexity reduction and detail preservation via latent space training, boosting visual fidelity.", "zh": "通过潜在空间训练实现复杂度降低与细节保留之间的近最优平衡，提升视觉保真度。"}, {"en": "Introduce cross-attention layers into UNet backbone for flexible conditioning on text, bounding boxes, etc., enabling high-resolution synthesis.", "zh": "在UNet骨干中引入交叉注意力层，实现对文本、边界框等的灵活条件控制，支持高分辨率合成。"}, {"en": "Set new state-of-the-art on image inpainting and competitive performance on unconditional generation, semantic synthesis, and super-resolution.", "zh": "在图像修复上达到新最优，在无条件生成、语义合成和超分辨率上表现竞争力。"}, {"en": "Significantly reduce training and inference costs compared to pixel-based diffusion models, e.g., 2.7x speedup in inpainting.", "zh": "相比基于像素的扩散模型显著降低训练和推理成本，例如在修复中加速2.7倍。"}, {"en": "Release pretrained models for reuse across multiple tasks, democratizing access to powerful diffusion models.", "zh": "发布预训练模型供多任务复用，使强大扩散模型更易获取。"}], "limits": [{"en": "Sequential sampling process is still slower than GANs, limiting real-time applications.", "zh": "顺序采样过程仍慢于GAN，限制实时应用。"}, {"en": "Reconstruction capability of autoencoder can bottleneck tasks requiring fine-grained pixel accuracy, e.g., super-resolution.", "zh": "自编码器的重建能力可能成为需要细粒度像素精度任务（如超分辨率）的瓶颈。"}, {"en": "Potential for misuse in creating deepfakes, spreading misinformation, and revealing sensitive training data.", "zh": "可能被滥用于制造深度伪造、传播虚假信息及泄露敏感训练数据。"}, {"en": "Two-stage training may exacerbate biases present in data, though mode coverage is better than GANs.", "zh": "两阶段训练可能加剧数据中的偏差，尽管模式覆盖优于GAN。"}, {"en": "Performance on some tasks (e.g., LSUN-Bedrooms) slightly below specialized models like ADM despite lower resource use.", "zh": "在某些任务（如LSUN-Bedrooms）上性能略低于ADM等专用模型，尽管资源消耗更低。"}]}}, {"id": "kaiming-2111.06377", "pid": "kaiming", "arxiv": "2111.06377", "date": "2021-11-11", "venue": "cs.CV", "fields": ["vision", "deep-learning"], "tEn": "Masked Autoencoders Are Scalable Vision Learners", "tZh": "掩码自编码器是可扩展的视觉学习器", "sEn": "Masked autoencoders (MAE) are scalable self-supervised learners for computer vision, achieving high accuracy and efficient training.", "sZh": "掩码自编码器（MAE）是可扩展的计算机视觉自监督学习方法，实现了高精度和高效训练。", "absEn": "This paper shows that masked autoencoders (MAE) are scalable self-supervised learners for computer vision. Our MAE approach is simple: we mask random patches of the input image and reconstruct the missing pixels. It is based on two core designs. First, we develop an asymmetric encoder-decoder architecture, with an encoder that operates only on the visible subset of patches (without mask tokens), along with a lightweight decoder that reconstructs the original image from the latent representation and mask tokens. Second, we find that masking a high proportion of the input image, e.g., 75%, yields a nontrivial and meaningful self-supervisory task. Coupling these two designs enables us to train large models efficiently and effectively: we accelerate training (by 3x or more) and improve accuracy. Our scalable approach allows for learning high-capacity models that generalize well: e.g., a vanilla ViT-Huge model achieves the best accuracy (87.8%) among methods that use only ImageNet-1K data. Transfer performance in downstream tasks outperforms supervised pre-training and shows promising scaling behavior.", "absZh": "本文表明，掩码自编码器（MAE）是可扩展的计算机视觉自监督学习器。我们的MAE方法很简单：随机遮蔽输入图像的部分块，并重建缺失的像素。它基于两个核心设计。首先，我们开发了一种非对称的编码器-解码器架构，编码器仅对可见的块子集（无掩码标记）进行操作，而轻量级解码器则从潜在表示和掩码标记重建原始图像。其次，我们发现遮蔽输入图像的高比例（例如75%）会产生一个非平凡且有意义的自监督任务。结合这两种设计，我们能够高效且有效地训练大型模型：我们加速了训练（3倍或更多）并提高了准确性。我们的可扩展方法允许学习泛化良好的高容量模型：例如，一个普通的ViT-Huge模型在使用仅ImageNet-1K数据的方法中达到了最佳准确率（87.8%）。在下游任务中的迁移性能优于监督预训练，并显示出有希望的扩展行为。", "insights": {"contrib": [{"en": "Proposes masked autoencoders (MAE) as scalable self-supervised learners for vision.", "zh": "提出掩码自编码器（MAE）作为视觉中可扩展的自监督学习方法。"}, {"en": "Introduces asymmetric encoder-decoder design: encoder only on visible patches, lightweight decoder reconstructs pixels.", "zh": "引入非对称编码器-解码器设计：编码器仅处理可见块，轻量解码器重建像素。"}, {"en": "Shows high masking ratio (75%) creates a challenging self-supervisory task that reduces redundancy.", "zh": "表明高掩码比例（75%）创建了具有挑战性的自监督任务，减少了冗余。"}, {"en": "Achieves 87.8% top-1 accuracy on ImageNet-1K with vanilla ViT-Huge, outperforming prior methods.", "zh": "在ImageNet-1K上使用原始ViT-Huge达到87.8% top-1准确率，优于先前方法。"}, {"en": "Demonstrates transfer learning gains over supervised pre-training on detection and segmentation.", "zh": "在检测和分割任务上展示了优于监督预训练的迁移学习增益。"}, {"en": "Observes promising scaling behavior: larger models yield better performance with MAE pre-training.", "zh": "观察到有前景的缩放行为：更大的模型通过MAE预训练获得更好的性能。"}], "limits": [{"en": "Method relies on random patch masking, which may not capture semantic structure like object boundaries.", "zh": "方法依赖随机块掩码，可能无法捕捉语义结构如物体边界。"}, {"en": "Reconstruction target is pixels, which are low-level and may limit high-level semantic learning.", "zh": "重建目标是像素，属于低级特征，可能限制高级语义学习。"}, {"en": "Linear probing accuracy is lower than contrastive methods, indicating less linearly separable features.", "zh": "线性探测准确率低于对比方法，表明特征线性可分性较差。"}, {"en": "Requires long pre-training schedules (e.g., 1600 epochs) for optimal performance.", "zh": "需要较长的预训练周期（如1600轮）才能达到最佳性能。"}, {"en": "Model may reflect dataset biases and generate inexistent content, raising societal concerns.", "zh": "模型可能反映数据集偏差并生成不存在的内容，引发社会担忧。"}]}, "org": "Meta AI", "cites": 11828}, {"id": "mcaron-2104.14294", "pid": "mcaron", "arxiv": "2104.14294", "date": "2021-04-29", "venue": "cs.CV", "org": "Meta AI", "fields": ["vision", "deep-learning"], "tEn": "Emerging Properties in Self-Supervised Vision Transformers", "tZh": "自监督视觉Transformer中的涌现特性", "sEn": "Self-supervised ViTs reveal explicit semantic segmentation and strong k-NN performance, leading to DINO method achieving 80.1% top-1 on ImageNet.", "sZh": "自监督ViT显式揭示语义分割信息，且k-NN分类性能优异，由此提出的DINO方法在ImageNet线性评估中达到80.1% top-1准确率。", "absEn": "In this paper, we question if self-supervised learning provides new properties to Vision Transformer (ViT) that stand out compared to convolutional networks (convnets). Beyond the fact that adapting self-supervised methods to this architecture works particularly well, we make the following observations: first, self-supervised ViT features contain explicit information about the semantic segmentation of an image, which does not emerge as clearly with supervised ViTs, nor with convnets. Second, these features are also excellent k-NN classifiers, reaching 78.3% top-1 on ImageNet with a small ViT. Our study also underlines the importance of momentum encoder, multi-crop training, and the use of small patches with ViTs. We implement our findings into a simple self-supervised method, called DINO, which we interpret as a form of self-distillation with no labels. We show the synergy between DINO and ViTs by achieving 80.1% top-1 on ImageNet in linear evaluation with ViT-Base.", "absZh": "本文探讨自监督学习是否为视觉Transformer（ViT）带来区别于卷积网络（convnet）的新特性。除了自监督方法在此架构上表现尤佳外，我们观察到：首先，自监督ViT特征包含图像的显式语义分割信息，这在监督ViT或convnet中并不明显；其次，这些特征也是优秀的k-NN分类器，在小型ViT上ImageNet top-1准确率达78.3%。研究还强调了动量编码器、多裁剪训练以及ViT中小patch的使用。我们将发现整合为简单自监督方法DINO，可视为无标签的自蒸馏。通过ViT-Base，DINO在ImageNet线性评估中达到80.1% top-1准确率，展现了DINO与ViT的协同效应。", "insights": {"contrib": [{"en": "Self-supervised ViT features explicitly encode semantic segmentation information, unlike supervised ViTs or convnets.", "zh": "自监督ViT特征显式编码语义分割信息，这与有监督ViT或卷积网络不同。"}, {"en": "Self-supervised ViT features achieve 78.3% top-1 accuracy on ImageNet with a simple k-NN classifier.", "zh": "自监督ViT特征在ImageNet上使用简单的k-NN分类器达到78.3%的top-1准确率。"}, {"en": "The DINO method, a form of self-distillation with no labels, achieves 80.1% top-1 on ImageNet linear evaluation with ViT-Base.", "zh": "DINO方法（一种无标签的自蒸馏形式）在ViT-Base的ImageNet线性评估中达到80.1%的top-1准确率。"}, {"en": "Momentum encoder, multi-crop training, and small patches are crucial for high-quality self-supervised ViT features.", "zh": "动量编码器、多裁剪训练和小patch对于高质量自监督ViT特征至关重要。"}, {"en": "Self-supervised ViT features outperform supervised ones in nearest neighbor retrieval and copy detection tasks.", "zh": "自监督ViT特征在最近邻检索和复制检测任务中优于有监督特征。"}, {"en": "DINO with ViT achieves competitive performance on dense tasks like video instance segmentation without fine-tuning.", "zh": "DINO与ViT结合在视频实例分割等密集任务上无需微调即达到竞争性能。"}], "limits": [{"en": "The study focuses on ImageNet; generalization to other datasets is not fully explored.", "zh": "研究聚焦于ImageNet，未充分探索对其他数据集的泛化。"}, {"en": "Small patches improve performance but significantly reduce throughput and increase memory usage.", "zh": "小patch提升性能但显著降低吞吐量并增加内存使用。"}, {"en": "DINO requires careful tuning of centering and sharpening to avoid collapse, which may be sensitive to hyperparameters.", "zh": "DINO需要仔细调整中心化和锐化以避免崩溃，这可能对超参数敏感。"}, {"en": "The method is evaluated on ViT and ResNet; applicability to other architectures is not verified.", "zh": "该方法在ViT和ResNet上评估，未验证对其他架构的适用性。"}, {"en": "Performance gains from multi-crop diminish with more views, suggesting diminishing returns.", "zh": "多裁剪带来的性能提升随视图数量增加而递减，表明收益递减。"}]}}, {"id": "pvelickovic-2104.13478", "pid": "pvelickovic", "arxiv": "2104.13478", "date": "2021-04-27", "venue": "cs.LG", "org": "DeepMind", "fields": ["deep-learning", "vision"], "tEn": "Geometric Deep Learning: Grids, Groups, Graphs, Geodesics, and Gauges", "tZh": "几何深度学习：网格、群、图、测地线和规范", "sEn": "Geometric deep learning unifies neural network architectures through geometric principles, enabling incorporation of physical knowledge and construction of future models.", "sZh": "几何深度学习通过几何原理统一神经网络架构，能够融入物理知识并构建未来模型。", "absEn": "The last decade has witnessed an experimental revolution in data science and machine learning, epitomised by deep learning methods. Indeed, many high-dimensional learning tasks previously thought to be beyond reach -- such as computer vision, playing Go, or protein folding -- are in fact feasible with appropriate computational scale. Remarkably, the essence of deep learning is built from two simple algorithmic principles: first, the notion of representation or feature learning, whereby adapted, often hierarchical, features capture the appropriate notion of regularity for each task, and second, learning by local gradient-descent type methods, typically implemented as backpropagation. While learning generic functions in high dimensions is a cursed estimation problem, most tasks of interest are not generic, and come with essential pre-defined regularities arising from the underlying low-dimensionality and structure of the physical world. This text is concerned with exposing these regularities through unified geometric principles that can be applied throughout a wide spectrum of applications. Such a 'geometric unification' endeavour, in the spirit of Felix Klein's Erlangen Program, serves a dual purpose: on one hand, it provides a common mathematical framework to study the most successful neural network architectures, such as CNNs, RNNs, GNNs, and Transformers. On the other hand, it gives a constructive procedure to incorporate prior physical knowledge into neural architectures and provide principled way to build future architectures yet to be invented.", "absZh": "过去十年见证了数据科学和机器学习的实验革命，以深度学习方法为代表。事实上，许多以前被认为遥不可及的高维学习任务——例如计算机视觉、围棋或蛋白质折叠——在适当的计算规模下是可行的。值得注意的是，深度学习的本质建立在两个简单的算法原理之上：第一，表示或特征学习的概念，通过适应性的、通常是层次化的特征来捕捉每个任务的适当规律；第二，通过局部梯度下降类型的方法进行学习，通常以反向传播实现。虽然在高维中学习通用函数是一个诅咒性的估计问题，但大多数感兴趣的任务并非通用，而是带有来自物理世界底层低维性和结构的基本预定义规律。本文旨在通过统一的几何原理揭示这些规律，这些原理可广泛应用于各种领域。这种“几何统一”的努力，秉承菲利克斯·克莱因的埃尔朗根纲领精神，具有双重目的：一方面，它提供了一个共同的数学框架来研究最成功的神经网络架构，如CNN、RNN、GNN和Transformer；另一方面，它提供了一种建设性的程序，将先验物理知识融入神经架构，并为构建尚未发明的未来架构提供原则性方法。", "insights": {"contrib": [{"en": "Unifies deep learning architectures (CNNs, RNNs, GNNs, Transformers) under geometric principles.", "zh": "将深度学习架构（CNN、RNN、GNN、Transformer）统一在几何原理之下。"}, {"en": "Reveals that high-dimensional learning tasks leverage low-dimensional structure and physical regularities.", "zh": "揭示高维学习任务利用低维结构和物理规律。"}, {"en": "Provides a constructive procedure to incorporate prior physical knowledge into neural architectures.", "zh": "提供将先验物理知识融入神经架构的构造性方法。"}, {"en": "Extends Felix Klein's Erlangen Program to modern machine learning for principled architecture design.", "zh": "将Felix Klein的Erlangen纲领扩展到现代机器学习，实现有原则的架构设计。"}, {"en": "Demonstrates that deep learning's success stems from representation learning and local gradient descent.", "zh": "证明深度学习的成功源于表示学习和局部梯度下降。"}, {"en": "Offers a common mathematical framework for studying and inventing neural network architectures.", "zh": "为研究和发明神经网络架构提供统一的数学框架。"}], "limits": [{"en": "Focuses on geometric principles, may not cover all deep learning aspects like optimization or generalization.", "zh": "聚焦几何原理，可能未涵盖优化或泛化等所有深度学习方面。"}, {"en": "Assumes underlying low-dimensional structure, which may not hold for all real-world tasks.", "zh": "假设存在底层低维结构，但并非所有实际任务都满足。"}, {"en": "Primarily theoretical; practical implementation details and computational costs are not addressed.", "zh": "主要为理论性，未涉及实际实现细节和计算成本。"}, {"en": "The unification may oversimplify differences between architectures like CNNs and Transformers.", "zh": "统一可能过度简化CNN与Transformer等架构间的差异。"}, {"en": "Does not provide empirical validation or benchmarks for the proposed geometric framework.", "zh": "未对所提几何框架提供实证验证或基准测试。"}]}}, {"id": "lecun-2103.03230", "pid": "lecun", "arxiv": "2103.03230", "date": "2021-03-04", "venue": "cs.CV", "fields": ["vision", "deep-learning"], "tEn": "Barlow Twins: Self-Supervised Learning via Redundancy Reduction", "tZh": "Barlow Twins: 通过冗余减少实现自监督学习", "sEn": "Barlow Twins avoids collapse by making the cross-correlation matrix close to identity, reducing redundancy between embedding components.", "sZh": "Barlow Twins通过使互相关矩阵接近单位矩阵来避免坍塌，减少嵌入向量分量间的冗余。", "absEn": "Self-supervised learning (SSL) is rapidly closing the gap with supervised methods on large computer vision benchmarks. A successful approach to SSL is to learn embeddings which are invariant to distortions of the input sample. However, a recurring issue with this approach is the existence of trivial constant solutions. Most current methods avoid such solutions by careful implementation details. We propose an objective function that naturally avoids collapse by measuring the cross-correlation matrix between the outputs of two identical networks fed with distorted versions of a sample, and making it as close to the identity matrix as possible. This causes the embedding vectors of distorted versions of a sample to be similar, while minimizing the redundancy between the components of these vectors. The method is called Barlow Twins, owing to neuroscientist H. Barlow's redundancy-reduction principle applied to a pair of identical networks. Barlow Twins does not require large batches nor asymmetry between the network twins such as a predictor network, gradient stopping, or a moving average on the weight updates. Intriguingly it benefits from very high-dimensional output vectors. Barlow Twins outperforms previous methods on ImageNet for semi-supervised classification in the low-data regime, and is on par with current state of the art for ImageNet classification with a linear classifier head, and for transfer tasks of classification and object detection.", "absZh": "自监督学习（SSL）正在迅速缩小与大型计算机视觉基准测试中监督方法的差距。一种成功的SSL方法是学习对输入样本的扭曲具有不变性的嵌入。然而，这种方法的一个反复出现的问题是存在平凡的常数解。大多数当前方法通过仔细的实现细节来避免此类解。我们提出了一种目标函数，通过测量两个相同网络（输入样本的扭曲版本）输出的互相关矩阵，并使其尽可能接近单位矩阵，从而自然地避免坍塌。这使得样本扭曲版本的嵌入向量相似，同时最小化这些向量分量之间的冗余。该方法被称为Barlow Twins，源于神经科学家H. Barlow的冗余减少原理应用于一对相同的网络。Barlow Twins不需要大批量或网络孪生之间的不对称性，如预测网络、梯度停止或权重更新的移动平均。有趣的是，它受益于非常高维的输出向量。Barlow Twins在低数据场景下的半监督分类中优于ImageNet上的先前方法，并且在具有线性分类头的ImageNet分类以及分类和对象检测的迁移任务中与当前最先进水平相当。", "insights": {"contrib": [{"en": "Proposes Barlow Twins, a self-supervised learning method using redundancy reduction to avoid trivial constant solutions.", "zh": "提出Barlow Twins，一种通过冗余减少避免平凡常数解的自监督学习方法。"}, {"en": "Objective function measures cross-correlation matrix between twin network outputs and makes it close to identity matrix.", "zh": "目标函数测量孪生网络输出之间的互相关矩阵，并使其接近单位矩阵。"}, {"en": "Does not require large batches, predictor networks, stop-gradients, or momentum encoders, simplifying implementation.", "zh": "不需要大批量、预测网络、梯度停止或动量编码器，简化了实现。"}, {"en": "Benefits from very high-dimensional output vectors, unlike contrastive methods that saturate.", "zh": "受益于非常高维的输出向量，与饱和的对比方法不同。"}, {"en": "Outperforms prior methods on ImageNet semi-supervised classification with 1% labels (55% top-1 accuracy).", "zh": "在ImageNet半监督分类（1%标签）上优于先前方法（55% top-1准确率）。"}, {"en": "Matches state-of-the-art on ImageNet linear classification and transfer tasks for classification and object detection.", "zh": "在ImageNet线性分类以及分类和物体检测的迁移任务上达到最先进水平。"}], "limits": [{"en": "Performance degrades when certain data augmentations are removed, unlike BYOL which is more robust.", "zh": "移除某些数据增强时性能下降，不像BYOL那样鲁棒。"}, {"en": "Requires careful tuning of the trade-off parameter λ for optimal performance.", "zh": "需要仔细调整权衡参数λ以获得最佳性能。"}, {"en": "High-dimensional embeddings increase memory requirements, limiting scalability beyond 16,000 dimensions.", "zh": "高维嵌入增加内存需求，限制了超过16,000维的可扩展性。"}, {"en": "Method is evaluated only on computer vision tasks; applicability to other domains like NLP is unexplored.", "zh": "该方法仅在计算机视觉任务上评估；在其他领域如NLP的适用性尚未探索。"}, {"en": "Theoretical connection to Information Bottleneck is heuristic; alternative implementations may yield different results.", "zh": "与信息瓶颈的理论联系是启发式的；替代实现可能产生不同结果。"}]}, "cites": 3039, "org": "Meta AI"}, {"id": "aradford-2103.00020", "pid": "aradford", "arxiv": "2103.00020", "date": "2021-02-26", "venue": "cs.CV", "org": "OpenAI", "fields": ["vision", "nlp"], "tEn": "Learning Transferable Visual Models From Natural Language Supervision", "tZh": "从自然语言监督中学习可迁移的视觉模型", "sEn": "Predicting which caption goes with which image is an efficient and scalable way to learn SOTA image representations from scratch.", "sZh": "预测哪段文字描述对应哪张图像是一种高效且可扩展的方法，可以从零开始学习最先进的图像表示。", "absEn": "State-of-the-art computer vision systems are trained to predict a fixed set of predetermined object categories. This restricted form of supervision limits their generality and usability since additional labeled data is needed to specify any other visual concept. Learning directly from raw text about images is a promising alternative which leverages a much broader source of supervision. We demonstrate that the simple pre-training task of predicting which caption goes with which image is an efficient and scalable way to learn SOTA image representations from scratch on a dataset of 400 million (image, text) pairs collected from the internet. After pre-training, natural language is used to reference learned visual concepts (or describe new ones) enabling zero-shot transfer of the model to downstream tasks. We study the performance of this approach by benchmarking on over 30 different existing computer vision datasets, spanning tasks such as OCR, action recognition in videos, geo-localization, and many types of fine-grained object classification. The model transfers non-trivially to most tasks and is often competitive with a fully supervised baseline without the need for any dataset specific training. For instance, we match the accuracy of the original ResNet-50 on ImageNet zero-shot without needing to use any of the 1.28 million training examples it was trained on. We release our code and pre-trained model weights at https://github.com/OpenAI/CLIP.", "absZh": "最先进的计算机视觉系统通常被训练来预测一组固定的预定对象类别。这种受限的监督形式限制了它们的通用性和可用性，因为需要额外的标注数据来指定任何其他视觉概念。直接从关于图像的原始文本中学习是一种有前景的替代方案，它利用了更广泛的监督来源。我们证明，简单的预训练任务——预测哪段文字描述对应哪张图像——是一种高效且可扩展的方法，可以在从互联网收集的4亿（图像，文本）对数据集上从零开始学习最先进的图像表示。预训练后，使用自然语言来引用学到的视觉概念（或描述新的概念），使得模型能够零样本迁移到下游任务。我们通过在30多个不同的现有计算机视觉数据集上进行基准测试来研究这种方法的性能，这些数据集涵盖OCR、视频中的动作识别、地理定位以及多种细粒度对象分类等任务。该模型在大多数任务上都能非平凡地迁移，并且通常与完全监督的基线模型竞争，而无需任何特定数据集的训练。例如，我们在ImageNet上零样本匹配了原始ResNet-50的准确率，而无需使用其训练所用的128万张训练样本。我们在https://github.com/OpenAI/CLIP上发布了我们的代码和预训练模型权重。", "insights": {"contrib": [{"en": "Proposes CLIP, a contrastive language-image pre-training method that learns visual representations from natural language supervision at scale.", "zh": "提出CLIP，一种对比式语言-图像预训练方法，从自然语言监督中大规模学习视觉表征。"}, {"en": "Demonstrates zero-shot transfer to over 30 datasets, matching ResNet-50 on ImageNet without any training examples.", "zh": "展示了对30多个数据集的零样本迁移能力，在ImageNet上无需任何训练样本即匹配ResNet-50。"}, {"en": "Shows that zero-shot CLIP models exhibit significantly higher effective robustness to natural distribution shifts than supervised ImageNet models.", "zh": "表明零样本CLIP模型对自然分布偏移的有效鲁棒性显著高于有监督的ImageNet模型。"}, {"en": "Introduces a new dataset of 400 million (image, text) pairs collected from the internet for pre-training.", "zh": "引入了一个从互联网收集的4亿（图像，文本）对的新数据集用于预训练。"}, {"en": "Finds that zero-shot CLIP matches the performance of 4-shot logistic regression on the same feature space, highlighting the efficiency of natural language supervision.", "zh": "发现零样本CLIP在相同特征空间上匹配4样本逻辑回归的性能，凸显自然语言监督的效率。"}, {"en": "Demonstrates that CLIP learns a wide range of tasks during pre-training, including OCR, geo-localization, and action recognition.", "zh": "展示CLIP在预训练期间学习了广泛的任务，包括OCR、地理定位和动作识别。"}], "limits": [{"en": "Zero-shot CLIP underperforms on specialized tasks like satellite image classification and lymph node tumor detection.", "zh": "零样本CLIP在卫星图像分类和淋巴结肿瘤检测等专业任务上表现不佳。"}, {"en": "The study focuses on zero-shot and linear probe evaluation, not end-to-end fine-tuning.", "zh": "研究聚焦于零样本和线性探测评估，而非端到端微调。"}, {"en": "The pre-training dataset may contain biases from internet sources, affecting model fairness.", "zh": "预训练数据集可能包含来自互联网来源的偏见，影响模型公平性。"}, {"en": "CLIP's zero-shot performance is limited by polysemy and lack of context in class names.", "zh": "CLIP的零样本性能受限于类别名称的多义性和缺乏上下文。"}, {"en": "The study does not explore the combination of zero-shot and few-shot learning methods.", "zh": "研究未探索零样本和少样本学习方法的结合。"}]}}, {"id": "fedus-2101.03961", "pid": "fedus", "arxiv": "2101.03961", "date": "2021-01-11", "venue": "cs.LG", "fields": ["nlp", "efficiency"], "tEn": "Switch Transformers: Scaling to Trillion Parameter Models with Simple and Efficient Sparsity", "tZh": "Switch Transformers：通过简单高效的稀疏性扩展到万亿参数模型", "sEn": "Switch Transformers simplify MoE routing, reduce communication and training instability, enabling trillion-parameter models with up to 7x speedup.", "sZh": "Switch Transformers简化了混合专家路由，降低了通信成本和训练不稳定性，实现了万亿参数模型，速度提升高达7倍。", "absEn": "In deep learning, models typically reuse the same parameters for all inputs. Mixture of Experts (MoE) defies this and instead selects different parameters for each incoming example. The result is a sparsely-activated model -- with outrageous numbers of parameters -- but a constant computational cost. However, despite several notable successes of MoE, widespread adoption has been hindered by complexity, communication costs and training instability -- we address these with the Switch Transformer. We simplify the MoE routing algorithm and design intuitive improved models with reduced communication and computational costs. Our proposed training techniques help wrangle the instabilities and we show large sparse models may be trained, for the first time, with lower precision (bfloat16) formats. We design models based off T5-Base and T5-Large to obtain up to 7x increases in pre-training speed with the same computational resources. These improvements extend into multilingual settings where we measure gains over the mT5-Base version across all 101 languages. Finally, we advance the current scale of language models by pre-training up to trillion parameter models on the \"Colossal Clean Crawled Corpus\" and achieve a 4x speedup over the T5-XXL model.", "absZh": "在深度学习中，模型通常对所有输入重用相同的参数。混合专家（MoE）打破了这一惯例，为每个输入示例选择不同的参数。结果是一个稀疏激活的模型——参数数量惊人——但计算成本恒定。然而，尽管MoE取得了一些显著的成功，但其复杂性、通信成本和训练不稳定性阻碍了广泛采用——我们通过Switch Transformer解决了这些问题。我们简化了MoE路由算法，并设计了直观的改进模型，减少了通信和计算成本。我们提出的训练技术有助于控制不稳定性，并首次展示了可以使用较低精度（bfloat16）格式训练大型稀疏模型。我们基于T5-Base和T5-Large设计的模型在相同计算资源下实现了高达7倍的预训练速度提升。这些改进扩展到多语言设置，我们在所有101种语言上测量了相对于mT5-Base版本的增益。最后，我们通过在“Colossal Clean Crawled Corpus”上预训练高达万亿参数的模型，推进了当前语言模型的规模，并实现了比T5-XXL模型快4倍的速度。", "insights": {"contrib": [{"en": "Simplifies MoE routing to top-1 expert, reducing computation and communication costs.", "zh": "将 MoE 路由简化为 top-1 专家，降低计算和通信成本。"}, {"en": "Achieves up to 7x pre-training speedup over T5 with same FLOPs per token.", "zh": "在相同每 token FLOPs 下，预训练速度相比 T5 提升高达 7 倍。"}, {"en": "Introduces selective precision (bfloat16) training for large sparse models.", "zh": "引入选择性精度（bfloat16）训练大型稀疏模型。"}, {"en": "Demonstrates scaling to trillion parameters with 4x speedup over T5-XXL.", "zh": "展示扩展到万亿参数，相比 T5-XXL 实现 4 倍加速。"}, {"en": "Shows universal improvements across 101 languages in multilingual setting.", "zh": "在多语言设置中，所有 101 种语言均获得改进。"}, {"en": "Proposes expert dropout and distillation to preserve 30% quality gain with 99% compression.", "zh": "提出专家 dropout 和蒸馏，以 99% 压缩率保留 30% 的质量提升。"}], "limits": [{"en": "Training instability persists for largest models like Switch-XXL.", "zh": "最大模型（如 Switch-XXL）仍存在训练不稳定性。"}, {"en": "Downstream gains do not fully match upstream perplexity improvements.", "zh": "下游任务收益未能完全匹配上游困惑度改进。"}, {"en": "Fine-tuning quality depends on FLOPs per token and parameter count in unclear ways.", "zh": "微调质量与每 token FLOPs 和参数数量的关系尚不明确。"}, {"en": "Expert capacity factor introduces trade-off between token dropping and efficiency.", "zh": "专家容量因子在 token 丢弃和效率之间存在权衡。"}, {"en": "Distillation preserves only ~30% of sparse model quality gain.", "zh": "蒸馏仅保留约 30% 的稀疏模型质量提升。"}]}, "org": "Google"}, {"id": "yangsong-2011.13456", "pid": "yangsong", "arxiv": "2011.13456", "date": "2020-11-26", "venue": "cs.LG", "org": "Stanford", "fields": ["generative", "deep-learning"], "tEn": "Score-Based Generative Modeling through Stochastic Differential Equations", "tZh": "基于随机微分方程的分数生成建模", "sEn": "We present a unified SDE framework for score-based generative modeling, enabling new sampling procedures, exact likelihood computation, and record-breaking image generation.", "sZh": "我们提出了一个统一的随机微分方程框架，用于分数生成建模，实现了新的采样程序、精确似然计算和创纪录的图像生成性能。", "absEn": "Creating noise from data is easy; creating data from noise is generative modeling. We present a stochastic differential equation (SDE) that smoothly transforms a complex data distribution to a known prior distribution by slowly injecting noise, and a corresponding reverse-time SDE that transforms the prior distribution back into the data distribution by slowly removing the noise. Crucially, the reverse-time SDE depends only on the time-dependent gradient field (\\aka, score) of the perturbed data distribution. By leveraging advances in score-based generative modeling, we can accurately estimate these scores with neural networks, and use numerical SDE solvers to generate samples. We show that this framework encapsulates previous approaches in score-based generative modeling and diffusion probabilistic modeling, allowing for new sampling procedures and new modeling capabilities. In particular, we introduce a predictor-corrector framework to correct errors in the evolution of the discretized reverse-time SDE. We also derive an equivalent neural ODE that samples from the same distribution as the SDE, but additionally enables exact likelihood computation, and improved sampling efficiency. In addition, we provide a new way to solve inverse problems with score-based models, as demonstrated with experiments on class-conditional generation, image inpainting, and colorization. Combined with multiple architectural improvements, we achieve record-breaking performance for unconditional image generation on CIFAR-10 with an Inception score of 9.89 and FID of 2.20, a competitive likelihood of 2.99 bits/dim, and demonstrate high fidelity generation of 1024 x 1024 images for the first time from a score-based generative model.", "absZh": "从数据中创建噪声很容易，但从噪声中创建数据则是生成建模。我们提出了一种随机微分方程，通过缓慢注入噪声，将复杂的数据分布平滑地转换为已知的先验分布，并提出了相应的反向时间随机微分方程，通过缓慢去除噪声，将先验分布转换回数据分布。关键在于，反向时间随机微分方程仅依赖于扰动数据分布的时间相关梯度场（即分数）。通过利用分数生成建模的进展，我们可以用神经网络准确估计这些分数，并使用数值随机微分方程求解器生成样本。我们表明，该框架涵盖了分数生成建模和扩散概率建模中的先前方法，从而实现了新的采样程序和新的建模能力。特别是，我们引入了一个预测-校正框架来纠正离散化反向时间随机微分方程演化中的误差。我们还推导了一个等效的神经常微分方程，它从与随机微分方程相同的分布中采样，但此外还能实现精确的似然计算和更高的采样效率。此外，我们提供了一种用分数模型解决逆问题的新方法，并通过类条件生成、图像修复和着色实验进行了演示。结合多项架构改进，我们在CIFAR-10上实现了无条件图像生成的创纪录性能，Inception得分为9.89，FID为2.20，竞争性似然为2.99 bits/dim，并首次从基于分数的生成模型展示了1024×1024图像的高保真生成。", "insights": {"contrib": [{"en": "Unified score-based generative modeling framework via stochastic differential equations (SDEs).", "zh": "通过随机微分方程（SDE）统一了基于分数的生成建模框架。"}, {"en": "Predictor-corrector (PC) samplers combining numerical SDE solvers with score-based MCMC.", "zh": "预测-校正（PC）采样器，结合数值SDE求解器与基于分数的MCMC。"}, {"en": "Probability flow ODE enabling exact likelihood computation and efficient sampling.", "zh": "概率流ODE实现精确似然计算和高效采样。"}, {"en": "Controllable generation for inverse problems using unconditional score models.", "zh": "使用无条件分数模型实现逆问题的可控生成。"}, {"en": "Record-breaking unconditional image generation on CIFAR-10 (Inception 9.89, FID 2.20).", "zh": "在CIFAR-10上创下无条件图像生成记录（Inception 9.89，FID 2.20）。"}, {"en": "First high-fidelity 1024x1024 image generation from a score-based model.", "zh": "首次从基于分数的模型生成高保真1024x1024图像。"}], "limits": [{"en": "Sampling slower than GANs on same datasets.", "zh": "在相同数据集上采样速度慢于GAN。"}, {"en": "Many hyper-parameters for different samplers require tuning.", "zh": "不同采样器的大量超参数需要调优。"}, {"en": "Likelihood computation limited to affine drift SDEs.", "zh": "似然计算限于仿射漂移SDE。"}, {"en": "Conditional generation requires known forward process gradient.", "zh": "条件生成需要已知的前向过程梯度。"}, {"en": "Framework assumes continuous state spaces and Gaussian perturbations.", "zh": "框架假设连续状态空间和高斯扰动。"}]}}, {"id": "adosovitskiy-2010.11929", "pid": "adosovitskiy", "arxiv": "2010.11929", "date": "2020-10-22", "venue": "cs.CV", "org": "Google", "fields": ["vision", "deep-learning"], "tEn": "An Image is Worth 16x16 Words: Transformers for Image Recognition at Scale", "tZh": "一张图片等价于16x16个词：用于大规模图像识别的Transformer", "sEn": "A pure transformer applied directly to image patches can match or exceed state-of-the-art CNNs on image classification, with less training compute.", "sZh": "直接将纯Transformer应用于图像块，可以在图像分类上达到或超越最先进的CNN，且训练计算量更少。", "absEn": "While the Transformer architecture has become the de-facto standard for natural language processing tasks, its applications to computer vision remain limited. In vision, attention is either applied in conjunction with convolutional networks, or used to replace certain components of convolutional networks while keeping their overall structure in place. We show that this reliance on CNNs is not necessary and a pure transformer applied directly to sequences of image patches can perform very well on image classification tasks. When pre-trained on large amounts of data and transferred to multiple mid-sized or small image recognition benchmarks (ImageNet, CIFAR-100, VTAB, etc.), Vision Transformer (ViT) attains excellent results compared to state-of-the-art convolutional networks while requiring substantially fewer computational resources to train.", "absZh": "虽然Transformer架构已成为自然语言处理任务的事实标准，但其在计算机视觉中的应用仍然有限。在视觉领域，注意力机制要么与卷积网络结合使用，要么用于替换卷积网络的某些组件，同时保留其整体结构。我们表明，这种对CNN的依赖并非必要，直接将纯Transformer应用于图像块序列可以在图像分类任务上表现非常出色。当在大量数据上预训练并迁移到多个中、小规模图像识别基准（ImageNet、CIFAR-100、VTAB等）时，Vision Transformer（ViT）相比最先进的卷积网络取得了优异的结果，同时训练所需计算资源大幅减少。", "insights": {"contrib": [{"en": "Shows pure Transformer applied to image patches achieves strong image classification performance.", "zh": "展示了将纯Transformer直接应用于图像块可实现强大的图像分类性能。"}, {"en": "Demonstrates Vision Transformer (ViT) matches or exceeds state-of-the-art CNNs on large-scale pre-training.", "zh": "证明了Vision Transformer（ViT）在大规模预训练上匹配或超越最先进的CNN。"}, {"en": "Reveals large-scale training overcomes lack of inductive biases in ViT.", "zh": "揭示了大规模训练克服了ViT中归纳偏置的缺乏。"}, {"en": "Provides controlled scaling study showing ViT's favorable performance-to-cost ratio.", "zh": "提供了受控的规模扩张研究，显示ViT有利的性能成本比。"}, {"en": "Analyzes ViT internal representations, showing global attention and learned position embeddings.", "zh": "分析了ViT内部表示，展示了全局注意力和学习到的位置嵌入。"}, {"en": "Explores self-supervised pre-training for ViT, showing potential for future improvement.", "zh": "探索了ViT的自监督预训练，展示了未来改进的潜力。"}], "limits": [{"en": "ViT underperforms CNNs on small datasets due to lack of inductive biases.", "zh": "由于缺乏归纳偏置，ViT在小型数据集上表现不如CNN。"}, {"en": "Requires large-scale pre-training (e.g., JFT-300M) to achieve state-of-the-art results.", "zh": "需要大规模预训练（如JFT-300M）才能达到最先进结果。"}, {"en": "Self-supervised pre-training still lags behind supervised pre-training by 4% on ImageNet.", "zh": "自监督预训练在ImageNet上仍落后监督预训练4%。"}, {"en": "ViT has not been applied to other vision tasks like detection and segmentation.", "zh": "ViT尚未应用于检测和分割等其他视觉任务。"}, {"en": "Position embeddings require interpolation for higher resolution fine-tuning.", "zh": "位置嵌入需要插值以进行更高分辨率的微调。"}]}}, {"id": "sermon-2010.02502", "pid": "sermon", "arxiv": "2010.02502", "date": "2020-10-06", "venue": "cs.LG", "org": "Stanford", "fields": ["generative", "efficiency"], "tEn": "Denoising Diffusion Implicit Models", "tZh": "去噪扩散隐式模型", "sEn": "DDIMs accelerate sampling from diffusion models by 10-50x while maintaining high image quality.", "sZh": "DDIMs 将扩散模型的采样速度提升了 10 到 50 倍，同时保持了高质量的图像生成。", "absEn": "Denoising diffusion probabilistic models (DDPMs) have achieved high quality image generation without adversarial training, yet they require simulating a Markov chain for many steps to produce a sample. To accelerate sampling, we present denoising diffusion implicit models (DDIMs), a more efficient class of iterative implicit probabilistic models with the same training procedure as DDPMs. In DDPMs, the generative process is defined as the reverse of a Markovian diffusion process. We construct a class of non-Markovian diffusion processes that lead to the same training objective, but whose reverse process can be much faster to sample from. We empirically demonstrate that DDIMs can produce high quality samples $10 \\times$ to $50 \\times$ faster in terms of wall-clock time compared to DDPMs, allow us to trade off computation for sample quality, and can perform semantically meaningful image interpolation directly in the latent space.", "absZh": "去噪扩散概率模型（DDPMs）无需对抗训练即可生成高质量图像，但需要模拟许多步的马尔可夫链才能产生样本。为了加速采样，我们提出了去噪扩散隐式模型（DDIMs），这是一类更高效的迭代隐式概率模型，其训练过程与 DDPMs 相同。在 DDPMs 中，生成过程被定义为马尔可夫扩散过程的逆过程。我们构建了一类非马尔可夫扩散过程，它们具有相同的训练目标，但其逆过程的采样速度可以快得多。实验表明，DDIMs 在生成高质量样本方面，相比 DDPMs 在墙钟时间上可以快 10 到 50 倍，允许我们在计算和样本质量之间进行权衡，并且可以直接在潜在空间中进行有语义意义的图像插值。", "insights": {"contrib": [{"en": "Proposes denoising diffusion implicit models (DDIMs) for faster sampling.", "zh": "提出去噪扩散隐式模型（DDIM）以实现更快的采样。"}, {"en": "Constructs non-Markovian diffusion processes with same training objective as DDPMs.", "zh": "构建了与DDPM具有相同训练目标的非马尔可夫扩散过程。"}, {"en": "Achieves 10× to 50× speedup in wall-clock time for high-quality image generation.", "zh": "在高质量图像生成上实现10倍到50倍的加速。"}, {"en": "Enables trade-off between computation and sample quality via step count adjustment.", "zh": "通过调整步数实现计算与样本质量之间的权衡。"}, {"en": "Demonstrates semantically meaningful image interpolation directly in latent space.", "zh": "展示了直接在潜在空间中进行语义有意义的图像插值。"}, {"en": "Shows deterministic generation process allows encoding and reconstruction of observations.", "zh": "展示了确定性生成过程允许对观测进行编码和重建。"}], "limits": [{"en": "Sample quality may degrade with very few steps compared to full-step DDPM.", "zh": "与全步数DDPM相比，极少步数下样本质量可能下降。"}, {"en": "Deterministic process may reduce diversity compared to stochastic DDPM.", "zh": "确定性过程可能比随机DDPM降低多样性。"}, {"en": "Reconstruction error increases with fewer steps in encoding-decoding.", "zh": "编码-解码中步数越少重建误差越大。"}, {"en": "Method assumes same training objective as DDPM, limiting architectural changes.", "zh": "方法假设与DDPM相同的训练目标，限制了架构变化。"}, {"en": "Empirical validation limited to image generation tasks.", "zh": "实证验证仅限于图像生成任务。"}]}}, {"id": "louyang-2009.01325", "pid": "louyang", "arxiv": "2009.01325", "date": "2020-09-02", "venue": "cs.CL", "org": "OpenAI", "fields": ["nlp", "rl"], "tEn": "Learning to summarize from human feedback", "tZh": "从人类反馈中学习摘要生成", "sEn": "Training summarization models with human feedback significantly improves summary quality over traditional methods.", "sZh": "利用人类反馈训练摘要模型，能显著提升摘要质量，超越传统方法。", "absEn": "As language models become more powerful, training and evaluation are increasingly bottlenecked by the data and metrics used for a particular task. For example, summarization models are often trained to predict human reference summaries and evaluated using ROUGE, but both of these metrics are rough proxies for what we really care about -- summary quality. In this work, we show that it is possible to significantly improve summary quality by training a model to optimize for human preferences. We collect a large, high-quality dataset of human comparisons between summaries, train a model to predict the human-preferred summary, and use that model as a reward function to fine-tune a summarization policy using reinforcement learning. We apply our method to a version of the TL;DR dataset of Reddit posts and find that our models significantly outperform both human reference summaries and much larger models fine-tuned with supervised learning alone. Our models also transfer to CNN/DM news articles, producing summaries nearly as good as the human reference without any news-specific fine-tuning. We conduct extensive analyses to understand our human feedback dataset and fine-tuned models We establish that our reward model generalizes to new datasets, and that optimizing our reward model results in better summaries than optimizing ROUGE according to humans. We hope the evidence from our paper motivates machine learning researchers to pay closer attention to how their training loss affects the model behavior they actually want.", "absZh": "随着语言模型变得更加强大，训练和评估越来越受到特定任务数据和指标的瓶颈限制。例如，摘要模型通常被训练来预测人类参考摘要，并使用ROUGE进行评估，但这两个指标都是我们真正关心的摘要质量的粗略代理。在这项工作中，我们展示了通过训练模型优化人类偏好，可以显著提高摘要质量。我们收集了一个大规模、高质量的人类摘要比较数据集，训练了一个模型来预测人类偏好的摘要，并使用该模型作为奖励函数，通过强化学习微调摘要策略。我们将方法应用于Reddit帖子的TL;DR数据集版本，发现我们的模型显著优于人类参考摘要和仅通过监督学习微调的更大模型。我们的模型还迁移到CNN/DM新闻文章，无需任何新闻特定微调就能生成几乎与人类参考一样好的摘要。我们进行了广泛的分析以理解我们的人类反馈数据集和微调模型。我们确定奖励模型能泛化到新数据集，并且根据人类判断，优化奖励模型比优化ROUGE能产生更好的摘要。我们希望论文中的证据能激励机器学习研究者更关注他们的训练损失如何影响他们真正想要的模型行为。", "insights": {"contrib": [{"en": "Shows training with human feedback significantly improves summary quality over supervised learning.", "zh": "表明使用人类反馈训练显著优于监督学习的摘要质量。"}, {"en": "Demonstrates human feedback models generalize to new domains without task-specific fine-tuning.", "zh": "证明人类反馈模型无需特定任务微调即可泛化到新领域。"}, {"en": "Collects and releases a large dataset of 64,832 human summary comparisons.", "zh": "收集并发布包含64,832个人类摘要比较的大型数据集。"}, {"en": "Conducts extensive analysis of reward model performance and over-optimization.", "zh": "对奖励模型性能和过度优化进行广泛分析。"}, {"en": "Finds reward models outperform automatic metrics like ROUGE in predicting human preferences.", "zh": "发现奖励模型在预测人类偏好方面优于ROUGE等自动指标。"}, {"en": "Highlights the importance of aligning training objectives with desired model behavior.", "zh": "强调将训练目标与期望模型行为对齐的重要性。"}], "limits": [{"en": "High time and cost for training and data collection, e.g., 320 GPU-days for 6.7B model.", "zh": "训练和数据收集的时间和成本高，例如6.7B模型需320 GPU天。"}, {"en": "Reward model over-optimization can lead to anti-correlation with human preferences.", "zh": "奖励模型过度优化可能导致与人类偏好负相关。"}, {"en": "Models trained on Reddit TL;DR may generate biased or offensive content.", "zh": "在Reddit TL;DR上训练的模型可能生成有偏见或冒犯性内容。"}, {"en": "Summary length bias in reward models affects preference judgments.", "zh": "奖励模型对摘要长度的偏见影响偏好判断。"}, {"en": "Method requires human evaluators, limiting scalability for tasks where evaluation is difficult.", "zh": "方法需要人类评估者，限制了在评估困难任务上的可扩展性。"}]}}, {"id": "baevski-2006.11477", "pid": "baevski", "arxiv": "2006.11477", "date": "2020-06-20", "venue": "cs.CL", "org": "Meta AI (FAIR)", "fields": ["deep-learning", "nlp"], "tEn": "wav2vec 2.0: A Framework for Self-Supervised Learning of Speech Representations", "tZh": "wav2vec 2.0：一种自监督学习语音表示的框架", "sEn": "wav2vec 2.0 outperforms semi-supervised methods by learning from raw audio alone, achieving state-of-the-art results with minimal labeled data.", "sZh": "wav2vec 2.0 仅通过原始音频学习，在少量标注数据上超越半监督方法，实现最先进结果。", "absEn": "We show for the first time that learning powerful representations from speech audio alone followed by fine-tuning on transcribed speech can outperform the best semi-supervised methods while being conceptually simpler. wav2vec 2.0 masks the speech input in the latent space and solves a contrastive task defined over a quantization of the latent representations which are jointly learned. Experiments using all labeled data of Librispeech achieve 1.8/3.3 WER on the clean/other test sets. When lowering the amount of labeled data to one hour, wav2vec 2.0 outperforms the previous state of the art on the 100 hour subset while using 100 times less labeled data. Using just ten minutes of labeled data and pre-training on 53k hours of unlabeled data still achieves 4.8/8.2 WER. This demonstrates the feasibility of speech recognition with limited amounts of labeled data.", "absZh": "我们首次证明，仅从语音音频中学习强大的表示，然后对转录语音进行微调，可以在概念上更简单的同时，超越最佳半监督方法。wav2vec 2.0 在潜在空间中屏蔽语音输入，并解决一个基于联合学习的潜在表示量化的对比任务。使用 Librispeech 的所有标注数据进行实验，在干净/其他测试集上分别实现了 1.8/3.3 的词错误率（WER）。当将标注数据量减少到一小时时，wav2vec 2.0 在 100 小时子集上超越了先前的最优结果，同时使用的标注数据量减少了 100 倍。仅使用十分钟的标注数据和 53k 小时的无标注数据进行预训练，仍然实现了 4.8/8.2 的 WER。这证明了在有限标注数据下进行语音识别的可行性。", "insights": {"contrib": [{"en": "Proposes wav2vec 2.0, a self-supervised framework for learning speech representations from raw audio.", "zh": "提出 wav2vec 2.0，一种从原始音频中学习语音表示的自监督框架。"}, {"en": "Jointly learns discrete speech units and contextualized representations via a contrastive task.", "zh": "通过对比任务联合学习离散语音单元和上下文表示。"}, {"en": "Achieves state-of-the-art results on Librispeech with only 10 minutes of labeled data.", "zh": "仅用10分钟标注数据即在Librispeech上达到最优结果。"}, {"en": "Outperforms previous semi-supervised methods while being conceptually simpler.", "zh": "在概念上更简单的同时优于之前的半监督方法。"}, {"en": "Demonstrates feasibility of ultra-low resource speech recognition with 53k hours of unlabeled pre-training.", "zh": "展示了使用53k小时无标注预训练实现超低资源语音识别的可行性。"}, {"en": "Sets new state of the art on TIMIT phoneme recognition and full Librispeech benchmark.", "zh": "在TIMIT音素识别和完整Librispeech基准上创下新纪录。"}], "limits": [{"en": "Evaluation limited to English speech datasets (Librispeech, TIMIT, LibriVox).", "zh": "评估仅限于英语语音数据集（Librispeech、TIMIT、LibriVox）。"}, {"en": "Requires large amounts of unlabeled data (53k hours) for best performance.", "zh": "需要大量无标注数据（53k小时）才能达到最佳性能。"}, {"en": "Fine-tuning still needs transcribed speech; zero-shot recognition not explored.", "zh": "微调仍需转录语音；未探索零样本识别。"}, {"en": "Model size and compute requirements are high (Large model uses 128 GPUs).", "zh": "模型规模和算力需求高（Large模型使用128个GPU）。"}, {"en": "Character-based vocabulary may limit performance compared to word pieces.", "zh": "基于字符的词汇表可能限制性能，相比词片方法。"}]}}, {"id": "jonathanho-2006.11239", "pid": "jonathanho", "arxiv": "2006.11239", "date": "2020-06-19", "venue": "cs.LG", "org": "UC Berkeley", "fields": ["generative", "deep-learning"], "tEn": "Denoising Diffusion Probabilistic Models", "tZh": "去噪扩散概率模型", "sEn": "We present high quality image synthesis using diffusion probabilistic models, achieving state-of-the-art FID scores on CIFAR10 and LSUN datasets.", "sZh": "我们利用扩散概率模型实现了高质量的图像合成，在CIFAR10和LSUN数据集上取得了最先进的FID分数。", "absEn": "We present high quality image synthesis results using diffusion probabilistic models, a class of latent variable models inspired by considerations from nonequilibrium thermodynamics. Our best results are obtained by training on a weighted variational bound designed according to a novel connection between diffusion probabilistic models and denoising score matching with Langevin dynamics, and our models naturally admit a progressive lossy decompression scheme that can be interpreted as a generalization of autoregressive decoding. On the unconditional CIFAR10 dataset, we obtain an Inception score of 9.46 and a state-of-the-art FID score of 3.17. On 256x256 LSUN, we obtain sample quality similar to ProgressiveGAN. Our implementation is available at https://github.com/hojonathanho/diffusion", "absZh": "我们利用扩散概率模型（一类受非平衡热力学启发的潜变量模型）展示了高质量的图像合成结果。我们的最佳结果是通过在加权变分界上训练获得的，该变分界是根据扩散概率模型与使用朗之万动力学的去噪分数匹配之间的新联系设计的。我们的模型自然地允许一种渐进式有损解压方案，可解释为自回归解码的推广。在无条件CIFAR10数据集上，我们获得了9.46的Inception分数和3.17的最先进FID分数。在256x256 LSUN上，我们获得了与ProgressiveGAN相当的样本质量。我们的实现可在https://github.com/hojonathanho/diffusion获取。", "insights": {"contrib": [{"en": "Established connection between diffusion models and denoising score matching with Langevin dynamics.", "zh": "建立了扩散模型与基于朗之万动力学的去噪分数匹配之间的联系。"}, {"en": "Proposed epsilon-prediction parameterization for reverse process, improving sample quality.", "zh": "提出了反向过程的epsilon预测参数化，提升了样本质量。"}, {"en": "Achieved state-of-the-art FID score of 3.17 on unconditional CIFAR10.", "zh": "在无条件CIFAR10上实现了3.17的FID分数，达到最先进水平。"}, {"en": "Demonstrated progressive lossy decompression scheme generalizing autoregressive decoding.", "zh": "展示了渐进式有损解压缩方案，推广了自回归解码。"}, {"en": "Showed diffusion models as lossy compressors with inductive bias for imperceptible details.", "zh": "表明扩散模型作为有损压缩器，对不可察觉细节具有归纳偏置。"}, {"en": "Provided open-source implementation for reproducibility.", "zh": "提供了开源实现以促进可重复性。"}], "limits": [{"en": "Log-likelihoods not competitive with other likelihood-based models.", "zh": "对数似然与其他基于似然的模型相比不具备竞争力。"}, {"en": "Sample quality limited to image data; other modalities not explored.", "zh": "样本质量仅限于图像数据；未探索其他模态。"}, {"en": "Training on simplified objective yields better samples but worse codelengths.", "zh": "在简化目标上训练产生更好的样本但码长更差。"}, {"en": "Reverse process variances fixed as constants, limiting expressiveness.", "zh": "反向过程方差固定为常数，限制了表达能力。"}, {"en": "Potential for malicious use in generating fake images or reinforcing biases.", "zh": "可能被恶意用于生成虚假图像或强化偏见。"}]}}, {"id": "mcaron-2006.09882", "pid": "mcaron", "arxiv": "2006.09882", "date": "2020-06-17", "venue": "cs.CV", "org": "Meta AI", "fields": ["vision", "deep-learning"], "tEn": "Unsupervised Learning of Visual Features by Contrasting Cluster Assignments", "tZh": "通过对比聚类分配进行视觉特征的无监督学习", "sEn": "SwAV achieves unsupervised learning by contrasting cluster assignments instead of pairwise features, enabling efficient scaling and strong performance.", "sZh": "SwAV通过对比聚类分配而非成对特征实现无监督学习，高效可扩展且性能强劲。", "absEn": "Unsupervised image representations have significantly reduced the gap with supervised pretraining, notably with the recent achievements of contrastive learning methods. These contrastive methods typically work online and rely on a large number of explicit pairwise feature comparisons, which is computationally challenging. In this paper, we propose an online algorithm, SwAV, that takes advantage of contrastive methods without requiring to compute pairwise comparisons. Specifically, our method simultaneously clusters the data while enforcing consistency between cluster assignments produced for different augmentations (or views) of the same image, instead of comparing features directly as in contrastive learning. Simply put, we use a swapped prediction mechanism where we predict the cluster assignment of a view from the representation of another view. Our method can be trained with large and small batches and can scale to unlimited amounts of data. Compared to previous contrastive methods, our method is more memory efficient since it does not require a large memory bank or a special momentum network. In addition, we also propose a new data augmentation strategy, multi-crop, that uses a mix of views with different resolutions in place of two full-resolution views, without increasing the memory or compute requirements much. We validate our findings by achieving 75.3% top-1 accuracy on ImageNet with ResNet-50, as well as surpassing supervised pretraining on all the considered transfer tasks.", "absZh": "无监督图像表示已显著缩小了与有监督预训练的差距，尤其是近期对比学习方法的成就。这些对比方法通常在线工作，依赖大量显式的成对特征比较，计算上具有挑战性。本文提出在线算法SwAV，利用对比方法的优势而无需计算成对比较。具体而言，我们的方法在聚类数据的同时，强制同一图像不同增强（或视图）产生的聚类分配之间的一致性，而非像对比学习那样直接比较特征。简单来说，我们使用交换预测机制，从一个视图的表示预测另一个视图的聚类分配。我们的方法可在大批量和小批量下训练，并能扩展到无限数据。与之前的对比方法相比，我们的方法更节省内存，因为它不需要大型内存库或特殊动量网络。此外，我们还提出新的数据增强策略multi-crop，使用不同分辨率的视图混合替代两个全分辨率视图，而不显著增加内存或计算需求。我们通过ResNet-50在ImageNet上达到75.3%的top-1准确率，并在所有考虑的迁移任务上超越有监督预训练，验证了我们的发现。", "insights": {"contrib": [{"en": "Proposes SwAV, an online clustering algorithm that avoids explicit pairwise feature comparisons.", "zh": "提出SwAV，一种在线聚类算法，避免显式的成对特征比较。"}, {"en": "Introduces a swapped prediction mechanism that predicts cluster assignments across different views.", "zh": "引入交换预测机制，在不同视图间预测聚类分配。"}, {"en": "Develops multi-crop augmentation strategy using mixed-resolution views without extra memory or compute.", "zh": "开发多裁剪增强策略，使用混合分辨率视图而不增加内存或算力。"}, {"en": "Achieves 75.3% top-1 accuracy on ImageNet with ResNet-50, surpassing supervised pretraining on transfer tasks.", "zh": "在ImageNet上用ResNet-50达到75.3% top-1准确率，在迁移任务上超越监督预训练。"}, {"en": "Demonstrates online clustering scales to large datasets and works with small batches.", "zh": "证明在线聚类可扩展到大数据集并适用于小批量。"}, {"en": "Shows multi-crop consistently improves multiple self-supervised methods by 2-4% top-1 accuracy.", "zh": "显示多裁剪持续提升多种自监督方法2-4% top-1准确率。"}], "limits": [{"en": "SwAV requires additional Sinkhorn-Knopp iterations for code computation, adding overhead.", "zh": "SwAV需要额外的Sinkhorn-Knopp迭代计算编码，增加开销。"}, {"en": "Multi-crop may not benefit supervised models and requires careful tuning of crop sizes.", "zh": "多裁剪可能不适用于监督模型，且需仔细调整裁剪尺寸。"}, {"en": "Method assumes equipartition of prototypes in each batch, which may fail for very small batches.", "zh": "方法假设每批原型均匀分配，对极小批量可能失效。"}, {"en": "Performance depends on number of prototypes and temperature parameter, requiring tuning.", "zh": "性能依赖于原型数量和温度参数，需要调优。"}, {"en": "Online clustering may not converge as stably as offline methods on extremely noisy data.", "zh": "在线聚类在极端噪声数据上可能不如离线方法稳定。"}]}}, {"id": "kaplan-2001.08361", "pid": "kaplan", "arxiv": "2001.08361", "date": "2020-01-23", "venue": "cs.LG", "fields": ["nlp"], "tEn": "Scaling Laws for Neural Language Models", "tZh": "神经语言模型的缩放定律", "sEn": "Language model performance scales as a power-law with model size, dataset size, and compute, enabling optimal compute-efficient training with very large models on modest data.", "sZh": "语言模型性能随模型大小、数据集大小和计算量呈幂律缩放，从而可以在适度的数据上训练非常大的模型，实现计算效率最优的训练。", "absEn": "We study empirical scaling laws for language model performance on the cross-entropy loss. The loss scales as a power-law with model size, dataset size, and the amount of compute used for training, with some trends spanning more than seven orders of magnitude. Other architectural details such as network width or depth have minimal effects within a wide range. Simple equations govern the dependence of overfitting on model/dataset size and the dependence of training speed on model size. These relationships allow us to determine the optimal allocation of a fixed compute budget. Larger models are significantly more sample-efficient, such that optimally compute-efficient training involves training very large models on a relatively modest amount of data and stopping significantly before convergence.", "absZh": "我们研究了语言模型在交叉熵损失上的经验缩放定律。损失随模型大小、数据集大小以及用于训练的计算量呈幂律缩放，某些趋势跨越了七个数量级以上。其他架构细节，如网络宽度或深度，在广泛范围内影响甚微。简单的方程控制了过拟合对模型/数据集大小的依赖性以及训练速度对模型大小的依赖性。这些关系使我们能够确定固定计算预算的最优分配。更大的模型在样本效率上显著更高，因此计算效率最优的训练涉及在相对适中的数据量上训练非常大的模型，并在显著收敛之前停止。", "insights": {"contrib": [{"en": "Language model cross-entropy loss follows power-law scaling with model size, dataset size, and compute over seven orders of magnitude.", "zh": "语言模型交叉熵损失随模型规模、数据集大小和算力呈幂律缩放，跨越七个数量级。"}, {"en": "Optimal compute-efficient training uses very large models trained on modest data, stopping before convergence.", "zh": "最优算力高效训练使用非常大的模型在适度数据上训练，并在收敛前停止。"}, {"en": "Performance depends weakly on architectural details like depth or width compared to scale factors.", "zh": "与规模因素相比，性能对深度或宽度等架构细节的依赖很弱。"}, {"en": "Overfitting and training speed are governed by simple equations relating model size and dataset size.", "zh": "过拟合和训练速度由模型大小和数据集大小的简单方程控制。"}, {"en": "Larger models are more sample-efficient, requiring fewer data points to reach the same loss.", "zh": "更大的模型样本效率更高，达到相同损失所需的数据点更少。"}, {"en": "The critical batch size for training follows a power-law in the loss, independent of model size.", "zh": "训练的关键批次大小随损失呈幂律变化，与模型大小无关。"}], "limits": [{"en": "Scaling laws may break down at extreme scales due to non-zero entropy of natural language.", "zh": "由于自然语言的非零熵，缩放定律可能在极端规模下失效。"}, {"en": "Results are based on Transformer architecture; may not generalize to other architectures.", "zh": "结果基于Transformer架构，可能不适用于其他架构。"}, {"en": "The study uses a single dataset (WebText2); transfer to other distributions incurs a constant loss penalty.", "zh": "研究使用单一数据集（WebText2）；迁移到其他分布会带来恒定的损失惩罚。"}, {"en": "Optimal compute allocation assumes fixed batch size and may not hold for varying hardware constraints.", "zh": "最优算力分配假设固定批次大小，可能不适用于变化的硬件约束。"}, {"en": "The power-law fits are empirical and lack a theoretical derivation from first principles.", "zh": "幂律拟合是经验性的，缺乏第一性原理的理论推导。"}]}, "cites": 8267, "org": "OpenAI"}, {"id": "tkarras-1912.04958", "pid": "tkarras", "arxiv": "1912.04958", "date": "2019-12-03", "venue": "cs.CV", "org": "NVIDIA", "fields": ["generative", "vision"], "tEn": "Analyzing and Improving the Image Quality of StyleGAN", "tZh": "分析并提升StyleGAN的图像质量", "sEn": "We analyze artifacts in StyleGAN and propose improvements to generator normalization, progressive growing, and regularization, achieving state-of-the-art unconditional image quality.", "sZh": "我们分析了StyleGAN中的特征伪影，并提出了生成器归一化、渐进式增长和正则化方面的改进，实现了无条件图像生成的最先进质量。", "absEn": "The style-based GAN architecture (StyleGAN) yields state-of-the-art results in data-driven unconditional generative image modeling. We expose and analyze several of its characteristic artifacts, and propose changes in both model architecture and training methods to address them. In particular, we redesign the generator normalization, revisit progressive growing, and regularize the generator to encourage good conditioning in the mapping from latent codes to images. In addition to improving image quality, this path length regularizer yields the additional benefit that the generator becomes significantly easier to invert. This makes it possible to reliably attribute a generated image to a particular network. We furthermore visualize how well the generator utilizes its output resolution, and identify a capacity problem, motivating us to train larger models for additional quality improvements. Overall, our improved model redefines the state of the art in unconditional image modeling, both in terms of existing distribution quality metrics as well as perceived image quality.", "absZh": "基于风格的生成对抗网络架构（StyleGAN）在数据驱动的无条件生成图像建模中取得了最先进的结果。我们揭示并分析了其若干特征伪影，并提出了模型架构和训练方法上的改进来解决这些问题。具体来说，我们重新设计了生成器归一化，重新审视了渐进式增长，并对生成器进行正则化以鼓励潜在代码到图像映射的良好条件。除了提高图像质量外，这种路径长度正则化还带来了额外的好处，即生成器变得更容易求逆。这使得能够可靠地将生成的图像归因于特定的网络。此外，我们可视化了生成器如何利用其输出分辨率，并识别出一个容量问题，促使我们训练更大的模型以进一步提高质量。总体而言，我们改进的模型在现有分布质量指标和感知图像质量方面重新定义了无条件图像建模的最先进水平。", "insights": {"contrib": [{"en": "Redesigns generator normalization to remove droplet artifacts via weight demodulation.", "zh": "重新设计生成器归一化，通过权重解调去除水滴伪影。"}, {"en": "Introduces path length regularizer to encourage smooth latent-to-image mapping, improving quality and invertibility.", "zh": "引入路径长度正则化器，促进潜在空间到图像的平滑映射，提升质量和可逆性。"}, {"en": "Replaces progressive growing with skip generator and residual discriminator, eliminating related artifacts.", "zh": "用跳跃生成器和残差判别器替代渐进式增长，消除相关伪影。"}, {"en": "Identifies capacity issue in high-resolution layers and increases feature maps to improve detail.", "zh": "识别高分辨率层的容量问题，增加特征图以改善细节。"}, {"en": "Proposes lazy regularization to reduce computational cost of regularizers without harming effectiveness.", "zh": "提出惰性正则化，在不影响效果的前提下降低正则化器的计算成本。"}, {"en": "Demonstrates improved source attribution via latent space projection with StyleGAN2.", "zh": "通过StyleGAN2的潜在空间投影，展示改进的源归属能力。"}], "limits": [{"en": "Path length regularizer introduces tradeoff between FID and PPL on less structured datasets.", "zh": "路径长度正则化器在结构较少的数据集上引入FID和PPL之间的权衡。"}, {"en": "Demodulation relies on statistical assumptions about signal, not actual feature map contents.", "zh": "解调依赖于信号的统计假设，而非实际特征图内容。"}, {"en": "FID and P&R metrics are biased towards texture over shape, potentially missing quality aspects.", "zh": "FID和P&R指标偏向纹理而非形状，可能遗漏质量方面。"}, {"en": "Increased capacity leads to higher computational cost and training time.", "zh": "增加容量导致更高的计算成本和训练时间。"}, {"en": "Method still requires large datasets for training, limiting applicability in data-scarce scenarios.", "zh": "方法仍需大数据集训练，限制了在数据稀缺场景下的适用性。"}]}}, {"id": "jschritt-1911.08265", "pid": "jschritt", "arxiv": "1911.08265", "date": "2019-11-19", "venue": "cs.LG", "org": "Google DeepMind", "fields": ["rl", "deep-learning"], "tEn": "Mastering Atari, Go, Chess and Shogi by Planning with a Learned Model", "tZh": "通过规划掌握雅达利、围棋、国际象棋和将棋：基于学习模型的方法", "sEn": "MuZero achieves superhuman performance in Atari, Go, chess, and shogi by combining tree-based search with a learned model, without knowing the environment dynamics.", "sZh": "MuZero算法通过将基于树的搜索与学习模型相结合，在不了解环境动态的情况下，在雅达利、围棋、国际象棋和将棋中实现了超人类表现。", "absEn": "Constructing agents with planning capabilities has long been one of the main challenges in the pursuit of artificial intelligence. Tree-based planning methods have enjoyed huge success in challenging domains, such as chess and Go, where a perfect simulator is available. However, in real-world problems the dynamics governing the environment are often complex and unknown. In this work we present the MuZero algorithm which, by combining a tree-based search with a learned model, achieves superhuman performance in a range of challenging and visually complex domains, without any knowledge of their underlying dynamics. MuZero learns a model that, when applied iteratively, predicts the quantities most directly relevant to planning: the reward, the action-selection policy, and the value function. When evaluated on 57 different Atari games - the canonical video game environment for testing AI techniques, in which model-based planning approaches have historically struggled - our new algorithm achieved a new state of the art. When evaluated on Go, chess and shogi, without any knowledge of the game rules, MuZero matched the superhuman performance of the AlphaZero algorithm that was supplied with the game rules.", "absZh": "构建具有规划能力的智能体一直是人工智能追求的主要挑战之一。基于树的规划方法在象棋和围棋等拥有完美模拟器的挑战性领域取得了巨大成功。然而，在现实问题中，环境动态往往复杂且未知。本文提出了MuZero算法，它通过将基于树的搜索与学习模型相结合，在一系列具有挑战性和视觉复杂性的领域中实现了超人类表现，而无需了解其底层动态。MuZero学习一个模型，该模型在迭代应用时预测与规划最直接相关的量：奖励、动作选择策略和值函数。在57个不同的雅达利游戏（测试AI技术的经典视频游戏环境，历史上基于模型的规划方法在此处表现不佳）上评估时，我们的新算法达到了新的最优水平。在围棋、国际象棋和将棋上评估时，无需任何游戏规则知识，MuZero就达到了与提供游戏规则的AlphaZero算法相同的超人类表现。", "insights": {"contrib": [{"en": "Proposes MuZero, combining tree-based search with a learned model for planning without environment dynamics.", "zh": "提出MuZero算法，将基于树的搜索与学习模型结合，无需环境动态知识即可规划。"}, {"en": "Achieves superhuman performance in Go, chess, shogi, and state-of-the-art on 57 Atari games.", "zh": "在围棋、国际象棋、将棋中达到超人类水平，并在57款Atari游戏中取得最优结果。"}, {"en": "Learns a model predicting reward, policy, and value function directly relevant to planning.", "zh": "学习直接预测与规划相关的奖励、策略和价值函数的模型。"}, {"en": "Introduces value-equivalent model learning without reconstructing observations or true state.", "zh": "引入价值等价模型学习，无需重建观测或真实状态。"}, {"en": "Demonstrates scalability of planning with learned model matching perfect model in Go.", "zh": "证明学习模型在围棋中规划的可扩展性，与完美模型性能匹配。"}, {"en": "Shows search-based policy improvement provides stronger learning signal than model-free Q-learning.", "zh": "表明基于搜索的策略改进比无模型Q-learning提供更强的学习信号。"}], "limits": [{"en": "Model is deterministic; extension to stochastic transitions left for future work.", "zh": "模型为确定性，随机转换扩展留待未来工作。"}, {"en": "Performance in Atari plateaus with search simulations, suggesting model inaccuracy.", "zh": "Atari中性能随搜索模拟趋于平稳，表明模型不准确性。"}, {"en": "Requires significant compute for training (1 million mini-batches, 800 simulations in board games).", "zh": "训练需要大量算力（100万小批量，棋盘游戏800次模拟）。"}, {"en": "Not directly applicable to imperfect information games like Poker.", "zh": "不直接适用于不完全信息游戏如扑克。"}, {"en": "Limited to environments with discrete actions and rewards; continuous domains not addressed.", "zh": "限于离散动作和奖励环境，未涉及连续域。"}]}}, {"id": "craffel-1910.10683", "pid": "craffel", "arxiv": "1910.10683", "date": "2019-10-23", "venue": "cs.LG", "org": "Google", "fields": ["nlp", "deep-learning"], "tEn": "Exploring the Limits of Transfer Learning with a Unified Text-to-Text Transformer", "tZh": "探索迁移学习的极限：基于统一的文本到文本转换器", "sEn": "A unified text-to-text framework enables systematic study of transfer learning techniques, achieving state-of-the-art results on multiple NLP benchmarks.", "sZh": "统一的文本到文本框架系统研究了迁移学习技术，在多个NLP基准上取得了最先进的结果。", "absEn": "Transfer learning, where a model is first pre-trained on a data-rich task before being fine-tuned on a downstream task, has emerged as a powerful technique in natural language processing (NLP). The effectiveness of transfer learning has given rise to a diversity of approaches, methodology, and practice. In this paper, we explore the landscape of transfer learning techniques for NLP by introducing a unified framework that converts all text-based language problems into a text-to-text format. Our systematic study compares pre-training objectives, architectures, unlabeled data sets, transfer approaches, and other factors on dozens of language understanding tasks. By combining the insights from our exploration with scale and our new ``Colossal Clean Crawled Corpus'', we achieve state-of-the-art results on many benchmarks covering summarization, question answering, text classification, and more. To facilitate future work on transfer learning for NLP, we release our data set, pre-trained models, and code.", "absZh": "迁移学习，即模型先在数据丰富的任务上进行预训练，然后在下游任务上进行微调，已成为自然语言处理（NLP）中的一项强大技术。迁移学习的有效性催生了多种方法、方法论和实践。在本文中，我们通过引入一个统一的框架，将所有基于文本的语言问题转换为文本到文本格式，探索了NLP迁移学习技术的全貌。我们的系统研究比较了预训练目标、架构、无标签数据集、迁移方法以及其他因素在数十个语言理解任务上的表现。通过将我们的探索见解与规模以及我们新的“巨型清洁爬取语料库”相结合，我们在涵盖摘要、问答、文本分类等多个基准上取得了最先进的结果。为了促进未来NLP迁移学习的研究，我们发布了我们的数据集、预训练模型和代码。", "insights": {"contrib": [{"en": "Proposes a unified text-to-text framework for NLP transfer learning.", "zh": "提出了一个统一的文本到文本框架，用于自然语言处理的迁移学习。"}, {"en": "Systematically compares pre-training objectives, architectures, and data sets.", "zh": "系统比较了预训练目标、架构和数据集。"}, {"en": "Introduces the Colossal Clean Crawled Corpus (C4) for pre-training.", "zh": "引入了用于预训练的巨型干净爬取语料库（C4）。"}, {"en": "Achieves state-of-the-art results on multiple NLP benchmarks via scaling.", "zh": "通过规模扩张在多个自然语言处理基准上取得了最先进的结果。"}, {"en": "Releases pre-trained models, code, and data to facilitate future research.", "zh": "发布预训练模型、代码和数据以促进未来研究。"}, {"en": "Explores architectural variants including encoder-decoder and prefix LM.", "zh": "探索了包括编码器-解码器和前缀语言模型在内的架构变体。"}], "limits": [{"en": "Study limited to English-language tasks and benchmarks.", "zh": "研究仅限于英语任务和基准。"}, {"en": "Pre-training only on English data; multilingual tasks require additional data.", "zh": "预训练仅使用英语数据；多语言任务需要额外数据。"}, {"en": "Computational cost of large-scale experiments is high.", "zh": "大规模实验的计算成本很高。"}, {"en": "No combinatorial exploration of all factors due to cost.", "zh": "由于成本原因，未对所有因素进行组合探索。"}, {"en": "Results may not generalize to non-text modalities or low-resource languages.", "zh": "结果可能无法推广到非文本模态或低资源语言。"}]}}, {"id": "yangsong-1907.05600", "pid": "yangsong", "arxiv": "1907.05600", "date": "2019-07-12", "venue": "cs.LG", "org": "Stanford", "fields": ["generative", "deep-learning"], "tEn": "Generative Modeling by Estimating Gradients of the Data Distribution", "tZh": "通过估计数据分布的梯度进行生成建模", "sEn": "We propose a generative model using Langevin dynamics with score matching, achieving state-of-the-art results on CIFAR-10.", "sZh": "我们提出了一种基于分数匹配和朗之万动力学的生成模型，在CIFAR-10上取得了最优结果。", "absEn": "We introduce a new generative model where samples are produced via Langevin dynamics using gradients of the data distribution estimated with score matching. Because gradients can be ill-defined and hard to estimate when the data resides on low-dimensional manifolds, we perturb the data with different levels of Gaussian noise, and jointly estimate the corresponding scores, i.e., the vector fields of gradients of the perturbed data distribution for all noise levels. For sampling, we propose an annealed Langevin dynamics where we use gradients corresponding to gradually decreasing noise levels as the sampling process gets closer to the data manifold. Our framework allows flexible model architectures, requires no sampling during training or the use of adversarial methods, and provides a learning objective that can be used for principled model comparisons. Our models produce samples comparable to GANs on MNIST, CelebA and CIFAR-10 datasets, achieving a new state-of-the-art inception score of 8.87 on CIFAR-10. Additionally, we demonstrate that our models learn effective representations via image inpainting experiments.", "absZh": "我们引入了一种新的生成模型，其中样本通过朗之万动力学生成，利用分数匹配估计的数据分布梯度。由于当数据位于低维流形上时，梯度可能定义不良且难以估计，我们使用不同级别的高斯噪声扰动数据，并联合估计相应的分数，即所有噪声级别下扰动数据分布的梯度向量场。对于采样，我们提出了一种退火朗之万动力学，其中随着采样过程接近数据流形，我们使用对应逐渐减小噪声级别的梯度。我们的框架允许灵活的模型架构，训练期间无需采样或使用对抗方法，并提供了一个可用于原则性模型比较的学习目标。我们的模型在MNIST、CelebA和CIFAR-10数据集上生成的样本可与GAN相媲美，在CIFAR-10上实现了8.87的新最优初始分数。此外，我们通过图像修复实验证明了我们的模型学习了有效的表示。", "insights": {"contrib": [{"en": "Proposes score-based generative modeling using Langevin dynamics with score matching.", "zh": "提出基于分数的生成建模，利用分数匹配和朗之万动力学生成样本。"}, {"en": "Introduces Noise Conditional Score Networks (NCSN) to estimate scores at multiple noise levels.", "zh": "引入噪声条件分数网络（NCSN），联合估计多个噪声水平下的分数。"}, {"en": "Develops annealed Langevin dynamics for sampling, gradually reducing noise levels.", "zh": "开发退火朗之万动力学采样方法，逐步降低噪声水平。"}, {"en": "Achieves state-of-the-art inception score of 8.87 on CIFAR-10 for unconditional generation.", "zh": "在CIFAR-10上实现无条件生成的最新最佳起始分数8.87。"}, {"en": "Demonstrates effective image inpainting without specialized architectures.", "zh": "展示无需特殊架构即可有效进行图像修复。"}, {"en": "Provides a tractable objective for principled model comparisons.", "zh": "提供可处理的训练目标，用于原则性模型比较。"}], "limits": [{"en": "Requires multiple noise levels and annealed sampling, increasing computational cost.", "zh": "需要多个噪声水平和退火采样，增加计算成本。"}, {"en": "Score estimation may be inaccurate in low-density regions despite noise perturbation.", "zh": "尽管有噪声扰动，低密度区域的分数估计仍可能不准确。"}, {"en": "Langevin dynamics mixing can be slow for highly multimodal distributions.", "zh": "对于高度多模态分布，朗之万动力学混合可能较慢。"}, {"en": "Model performance depends on careful tuning of noise levels and step sizes.", "zh": "模型性能依赖于噪声水平和步长的仔细调整。"}, {"en": "Primarily evaluated on image data; generalization to other domains is not explored.", "zh": "主要在图像数据上评估，未探索对其他领域的泛化。"}]}}, {"id": "zhilinyang-1906.08237", "pid": "zhilinyang", "arxiv": "1906.08237", "date": "2019-06-19", "venue": "cs.CL", "org": "Carnegie Mellon University / Google Brain", "fields": ["nlp", "deep-learning"], "tEn": "XLNet: Generalized Autoregressive Pretraining for Language Understanding", "tZh": "XLNet：面向语言理解的广义自回归预训练", "sEn": "XLNet outperforms BERT on 20 tasks by learning bidirectional contexts via permutation language modeling and integrating Transformer-XL.", "sZh": "XLNet通过排列语言建模学习双向上下文并集成Transformer-XL，在20个任务上超越BERT。", "absEn": "With the capability of modeling bidirectional contexts, denoising autoencoding based pretraining like BERT achieves better performance than pretraining approaches based on autoregressive language modeling. However, relying on corrupting the input with masks, BERT neglects dependency between the masked positions and suffers from a pretrain-finetune discrepancy. In light of these pros and cons, we propose XLNet, a generalized autoregressive pretraining method that (1) enables learning bidirectional contexts by maximizing the expected likelihood over all permutations of the factorization order and (2) overcomes the limitations of BERT thanks to its autoregressive formulation. Furthermore, XLNet integrates ideas from Transformer-XL, the state-of-the-art autoregressive model, into pretraining. Empirically, under comparable experiment settings, XLNet outperforms BERT on 20 tasks, often by a large margin, including question answering, natural language inference, sentiment analysis, and document ranking.", "absZh": "尽管基于去噪自编码的预训练方法（如BERT）通过建模双向上下文取得了比自回归语言模型更好的性能，但BERT依赖于对输入进行掩码破坏，忽略了掩码位置之间的依赖关系，并存在预训练与微调之间的差异。针对这些优缺点，我们提出了XLNet，一种广义自回归预训练方法，它通过最大化所有分解顺序排列的期望似然来学习双向上下文，并凭借其自回归公式克服了BERT的局限性。此外，XLNet将最先进的自回归模型Transformer-XL的思想整合到预训练中。实验表明，在可比较的实验设置下，XLNet在20个任务上（包括问答、自然语言推理、情感分析和文档排序）显著优于BERT，通常优势明显。", "insights": {"contrib": [{"en": "Proposes XLNet, a generalized autoregressive pretraining method that learns bidirectional contexts via permutation language modeling.", "zh": "提出XLNet，一种通过排列语言建模学习双向上下文的广义自回归预训练方法。"}, {"en": "Overcomes BERT's pretrain-finetune discrepancy by avoiding input corruption with masks.", "zh": "通过避免使用掩码破坏输入，克服了BERT的预训练-微调差异。"}, {"en": "Integrates Transformer-XL's segment recurrence and relative encoding for improved long-text handling.", "zh": "集成Transformer-XL的段循环和相对编码，改进长文本处理。"}, {"en": "Introduces two-stream self-attention to resolve target prediction ambiguity in permutation modeling.", "zh": "引入双流自注意力机制，解决排列建模中的目标预测歧义。"}, {"en": "Achieves state-of-the-art results on 20 NLP tasks, including QA, NLI, sentiment analysis, and document ranking.", "zh": "在20个NLP任务上取得最先进结果，包括问答、自然语言推理、情感分析和文档排序。"}, {"en": "Demonstrates that permutation LM and Transformer-XL both contribute to XLNet's superiority over BERT.", "zh": "证明排列语言模型和Transformer-XL共同促成XLNet优于BERT。"}], "limits": [{"en": "Permutation language modeling increases optimization difficulty, requiring partial prediction for convergence.", "zh": "排列语言建模增加优化难度，需要部分预测才能收敛。"}, {"en": "XLNet's performance gain is partly due to more training data and compute, not solely the objective.", "zh": "XLNet的性能提升部分归因于更多训练数据和算力，而非仅目标函数。"}, {"en": "The two-stream attention mechanism adds architectural complexity and memory overhead.", "zh": "双流注意力机制增加了架构复杂性和内存开销。"}, {"en": "Ablation shows next-sentence prediction does not consistently improve XLNet, unlike BERT.", "zh": "消融实验表明，与BERT不同，下一句预测并未持续改进XLNet。"}, {"en": "XLNet's reliance on Transformer-XL may limit applicability to tasks with very short sequences.", "zh": "XLNet对Transformer-XL的依赖可能限制其在极短序列任务上的适用性。"}]}}, {"id": "tkarras-1812.04948", "pid": "tkarras", "arxiv": "1812.04948", "date": "2018-12-12", "venue": "cs.NE", "org": "NVIDIA", "fields": ["generative", "vision"], "tEn": "A Style-Based Generator Architecture for Generative Adversarial Networks", "tZh": "一种基于风格的生成对抗网络生成器架构", "sEn": "A style-based generator architecture for GANs enables unsupervised separation of high-level attributes and stochastic variation, improving quality and disentanglement.", "sZh": "一种基于风格的生成器架构实现了高层属性与随机变化的无监督分离，提升了生成质量和解耦能力。", "absEn": "We propose an alternative generator architecture for generative adversarial networks, borrowing from style transfer literature. The new architecture leads to an automatically learned, unsupervised separation of high-level attributes (e.g., pose and identity when trained on human faces) and stochastic variation in the generated images (e.g., freckles, hair), and it enables intuitive, scale-specific control of the synthesis. The new generator improves the state-of-the-art in terms of traditional distribution quality metrics, leads to demonstrably better interpolation properties, and also better disentangles the latent factors of variation. To quantify interpolation quality and disentanglement, we propose two new, automated methods that are applicable to any generator architecture. Finally, we introduce a new, highly varied and high-quality dataset of human faces.", "absZh": "我们提出了一种替代的生成对抗网络生成器架构，借鉴了风格迁移文献。新架构自动学习并实现了生成图像中高层属性（例如，在人类面部训练时的姿态和身份）与随机变化（例如，雀斑、头发）的无监督分离，并实现了直观的、尺度特定的合成控制。新生成器在传统分布质量指标上提升了最先进水平，展示了更好的插值特性，并更好地解耦了潜在因素的变化。为了量化插值质量和解耦程度，我们提出了两种新的自动化方法，适用于任何生成器架构。最后，我们引入了一个新的、高度多样化和高质量的人脸数据集。", "insights": {"contrib": [{"en": "Proposes a style-based generator architecture for GANs, enabling unsupervised separation of high-level attributes and stochastic variation.", "zh": "提出一种基于风格的生成器架构，实现高层属性与随机变化的无监督分离。"}, {"en": "Introduces an intermediate latent space that improves disentanglement and linearity of factors of variation.", "zh": "引入中间潜在空间，提升变化因素的解耦性和线性度。"}, {"en": "Achieves state-of-the-art FID scores on CelebA-HQ and FFHQ datasets, improving by nearly 20%.", "zh": "在CelebA-HQ和FFHQ数据集上达到最优FID分数，提升近20%。"}, {"en": "Develops two new automated metrics—perceptual path length and linear separability—for quantifying interpolation quality and disentanglement.", "zh": "开发两种新自动指标——感知路径长度和线性可分性——量化插值质量和解耦性。"}, {"en": "Introduces the FFHQ dataset, a high-quality human face dataset with 70,000 images at 1024x1024 resolution.", "zh": "引入FFHQ数据集，包含70,000张1024x1024分辨率的高质量人脸图像。"}, {"en": "Demonstrates scale-specific control of image synthesis through style mixing and noise injection.", "zh": "通过风格混合和噪声注入展示图像合成的尺度特定控制。"}], "limits": [{"en": "The method does not modify the discriminator or loss function, limiting potential improvements from those components.", "zh": "该方法未修改判别器或损失函数，限制了这些组件的潜在改进。"}, {"en": "The proposed metrics rely on pre-trained classifiers and perceptual distances, which may introduce bias.", "zh": "所提指标依赖预训练分类器和感知距离，可能引入偏差。"}, {"en": "The truncation trick reduces variation in generated images, limiting diversity.", "zh": "截断技巧减少生成图像的多样性，限制了变化范围。"}, {"en": "The approach is evaluated only on face and scene datasets; generalization to other domains is not verified.", "zh": "该方法仅在人脸和场景数据集上评估，未验证对其他领域的泛化性。"}, {"en": "The mapping network requires careful tuning of learning rates to avoid training instability.", "zh": "映射网络需要仔细调整学习率以避免训练不稳定。"}]}}, {"id": "jleskovec-1806.08804", "pid": "jleskovec", "arxiv": "1806.08804", "date": "2018-06-22", "venue": "cs.LG", "org": "Stanford", "fields": ["deep-learning"], "tEn": "Hierarchical Graph Representation Learning with Differentiable Pooling", "tZh": "基于可微分池化的层次化图表示学习", "sEn": "DiffPool learns hierarchical graph representations via differentiable soft clustering, boosting GNN accuracy by 5-10%.", "sZh": "DiffPool通过可微分软聚类学习层次化图表示，将GNN准确率提升5-10%。", "absEn": "Recently, graph neural networks (GNNs) have revolutionized the field of graph representation learning through effectively learned node embeddings, and achieved state-of-the-art results in tasks such as node classification and link prediction. However, current GNN methods are inherently flat and do not learn hierarchical representations of graphs---a limitation that is especially problematic for the task of graph classification, where the goal is to predict the label associated with an entire graph. Here we propose DiffPool, a differentiable graph pooling module that can generate hierarchical representations of graphs and can be combined with various graph neural network architectures in an end-to-end fashion. DiffPool learns a differentiable soft cluster assignment for nodes at each layer of a deep GNN, mapping nodes to a set of clusters, which then form the coarsened input for the next GNN layer. Our experimental results show that combining existing GNN methods with DiffPool yields an average improvement of 5-10% accuracy on graph classification benchmarks, compared to all existing pooling approaches, achieving a new state-of-the-art on four out of five benchmark data sets.", "absZh": "最近，图神经网络（GNN）通过有效学习节点嵌入，彻底改变了图表示学习领域，并在节点分类和链接预测等任务中取得了最先进的成果。然而，当前的GNN方法本质上是平坦的，无法学习图的层次化表示——这一局限性对于图分类任务（即预测整个图的标签）尤其成问题。本文提出了DiffPool，一种可微分的图池化模块，能够生成图的层次化表示，并以端到端的方式与各种图神经网络架构结合。DiffPool在深度GNN的每一层学习一个可微分的软聚类分配，将节点映射到一组聚类中，这些聚类随后形成下一GNN层的粗化输入。我们的实验结果表明，与所有现有的池化方法相比，将现有GNN方法与DiffPool结合，在图分类基准测试上平均提高了5-10%的准确率，在五个基准数据集中有四个达到了新的最先进水平。", "insights": {"contrib": [{"en": "Proposes DiffPool, a differentiable graph pooling module for hierarchical graph representation learning.", "zh": "提出DiffPool，一种用于层次化图表示学习的可微图池化模块。"}, {"en": "Enables end-to-end training of deep GNNs with hierarchical pooling, improving graph classification accuracy by 5-10%.", "zh": "实现带层次池化的深度GNN端到端训练，将图分类准确率提升5-10%。"}, {"en": "Achieves state-of-the-art results on four out of five benchmark graph classification datasets.", "zh": "在五个基准图分类数据集中的四个上达到最先进结果。"}, {"en": "Learns interpretable hierarchical clusters corresponding to community structures in graphs.", "zh": "学习与图中社区结构对应的可解释层次化聚类。"}, {"en": "Demonstrates permutation invariance of the pooling operation, ensuring robustness to node ordering.", "zh": "证明池化操作的置换不变性，确保对节点排序的鲁棒性。"}, {"en": "Introduces auxiliary link prediction and entropy regularization to improve training stability and cluster quality.", "zh": "引入辅助链接预测和熵正则化以提高训练稳定性和聚类质量。"}], "limits": [{"en": "Requires predefining the maximum number of clusters per layer, which may not be optimal for all graphs.", "zh": "需要预定义每层的最大聚类数，可能并非对所有图最优。"}, {"en": "Soft cluster assignments may lead to noisy coarsened graphs and increased computational cost.", "zh": "软聚类分配可能导致粗化图噪声增加和计算成本上升。"}, {"en": "Performance depends on the base GNN architecture; not all GNNs benefit equally from DiffPool.", "zh": "性能依赖于基础GNN架构；并非所有GNN都能从DiffPool中同等受益。"}, {"en": "Auxiliary objectives (link prediction, entropy) add training complexity and may require careful tuning.", "zh": "辅助目标（链接预测、熵）增加训练复杂度，可能需要仔细调参。"}, {"en": "Struggles with graphs containing many structurally similar nodes, potentially pooling distant nodes together.", "zh": "在包含许多结构相似节点的图上表现不佳，可能将远距离节点池化在一起。"}]}}, {"id": "pbattaglia-1806.01261", "pid": "pbattaglia", "arxiv": "1806.01261", "date": "2018-06-04", "venue": "cs.LG", "org": "DeepMind", "fields": ["deep-learning", "rl"], "tEn": "Relational inductive biases, deep learning, and graph networks", "tZh": "关系归纳偏置、深度学习与图网络", "sEn": "Combinatorial generalization is key to human-like AI, and graph networks with relational inductive biases offer a promising path.", "sZh": "组合泛化是实现类人人工智能的关键，而具有关系归纳偏置的图网络提供了一
