is comparable to the best known results under the online convex optimization framework. Empirical results demonstrate that Adam works well in practice and compares favorably to other stochastic optimization methods. Finally, we discuss AdaMax, a variant of Adam based on the infinity norm.", "absZh": "我们介绍了 Adam，一种基于低阶矩自适应估计的随机目标函数一阶梯度优化算法。该方法易于实现，计算效率高，内存需求小，对梯度的对角缩放具有不变性，非常适合数据和/或参数规模较大的问题。该方法也适用于非平稳目标以及噪声和/或梯度非常稀疏的问题。超参数具有直观的解释，通常只需很少的调整。讨论了与启发 Adam 的相关算法的一些联系。我们还分析了该算法的理论收敛性质，并提供了与在线凸优化框架下已知最佳结果相当的收敛速度遗憾界。实证结果表明，Adam 在实践中表现良好，并优于其他随机优化方法。最后，我们讨论了 AdaMax，一种基于无穷范数的 Adam 变体。", "insights": {"contrib": [{"en": "Introduces Adam, an efficient first-order gradient-based optimization algorithm.", "zh": "提出了Adam，一种高效的一阶梯度优化算法。"}, {"en": "Uses adaptive estimates of lower-order moments for parameter updates.", "zh": "使用低阶矩的自适应估计进行参数更新。"}, {"en": "Invariant to diagonal rescaling of gradients, suitable for large-scale problems.", "zh": "对梯度的对角缩放具有不变性，适用于大规模问题。"}, {"en": "Handles non-stationary objectives and noisy/sparse gradients effectively.", "zh": "有效处理非平稳目标和噪声/稀疏梯度。"}, {"en": "Provides theoretical convergence analysis with a regret bound comparable to best known results.", "zh": "提供了理论收敛性分析，遗憾界与已知最佳结果相当。"}, {"en": "Empirically outperforms other stochastic optimization methods on various tasks.", "zh": "在多种任务上实证优于其他随机优化方法。"}], "limits": [{"en": "Convergence analysis assumes convex objectives, not guaranteed for non-convex problems.", "zh": "收敛性分析假设凸目标，非凸问题不保证。"}, {"en": "Hyper-parameters may require tuning for specific applications despite intuitive interpretation.", "zh": "超参数虽直观，但特定应用仍需调参。"}, {"en": "Memory requirements scale with number of parameters due to moment storage.", "zh": "由于存储矩，内存需求随参数数量线性增长。"}, {"en": "Performance may degrade on very high-dimensional or ill-conditioned problems.", "zh": "在极高维或病态问题上性能可能下降。"}]}, "cites": 167520}, {"id": "mmirza-1411.1784", "pid": "mmirza", "arxiv": "1411.1784", "date": "2014-11-06", "venue": "cs.LG", "org": "Université de Montréal", "fields": ["generative", "deep-learning"], "tEn": "Conditional Generative Adversarial Nets", "tZh": "条件生成对抗网络", "sEn": "Conditional GANs enable controlled data generation by conditioning on additional information like class labels.", "sZh": "条件GAN通过附加信息（如类别标签）实现可控数据生成。", "absEn": "Generative Adversarial Nets [8] were recently introduced as a novel way to train generative models. In this work we introduce the conditional version of generative adversarial nets, which can be constructed by simply feeding the data, y, we wish to condition on to both the generator and discriminator. We show that this model can generate MNIST digits conditioned on class labels. We also illustrate how this model could be used to learn a multi-modal model, and provide preliminary examples of an application to image tagging in which we demonstrate how this approach can generate descriptive tags which are not part of training labels.", "absZh": "生成对抗网络[8]最近被引入作为一种训练生成模型的新方法。在这项工作中，我们引入了条件版本的生成对抗网络，它可以通过简单地将我们希望条件化的数据y输入到生成器和判别器中来构建。我们展示了该模型可以生成以类别标签为条件的MNIST数字。我们还说明了该模型如何用于学习多模态模型，并提供了图像标注应用的初步示例，其中我们展示了该方法如何生成不属于训练标签的描述性标签。", "insights": {"contrib": [{"en": "Introduces conditional generative adversarial nets (cGANs) by feeding conditioning data to both generator and discriminator.", "zh": "提出条件生成对抗网络（cGAN），将条件数据同时输入生成器和判别器。"}, {"en": "Demonstrates MNIST digit generation conditioned on class labels.", "zh": "展示基于类别标签的MNIST数字生成。"}, {"en": "Shows multi-modal learning capability via image tagging on MIR Flickr dataset.", "zh": "在MIR Flickr数据集上展示图像标注的多模态学习能力。"}, {"en": "Generates descriptive tags not present in training labels using word embeddings.", "zh": "利用词嵌入生成训练标签中未出现的描述性标签。"}, {"en": "Provides a framework for one-to-many mapping in probabilistic generative models.", "zh": "为概率生成模型中的一对多映射提供框架。"}], "limits": [{"en": "Preliminary results; conditional model underperforms non-conditional adversarial nets on MNIST.", "zh": "初步结果：条件模型在MNIST上表现不如非条件对抗网络。"}, {"en": "Image tagging experiments use fixed convolutional and language models without joint training.", "zh": "图像标注实验使用固定的卷积和语言模型，未进行联合训练。"}, {"en": "Only single tags used per image; multi-tag set generation left for future work.", "zh": "每张图像仅使用单个标签，多标签集合生成留待未来工作。"}, {"en": "Hyper-parameter search limited; architecture not fully optimized.", "zh": "超参数搜索有限，架构未完全优化。"}]}}, {"id": "cszegedy-1409.4842", "pid": "cszegedy", "arxiv": "1409.4842", "date": "2014-09-17", "venue": "cs.CV", "org": "Google", "fields": ["vision", "deep-learning"], "tEn": "Going Deeper with Convolutions", "tZh": "深入卷积网络", "sEn": "We propose Inception, a deep CNN architecture that achieves state-of-the-art results in ILSVRC 2014 by efficiently using computing resources to increase depth and width.", "sZh": "我们提出了名为“Inception”的深度卷积神经网络架构，该架构通过高效利用计算资源增加网络深度和宽度，在ILSVRC 2014分类与检测任务中达到了最优水平。", "absEn": "We propose a deep convolutional neural network architecture codenamed \"Inception\", which was responsible for setting the new state of the art for classification and detection in the ImageNet Large-Scale Visual Recognition Challenge 2014 (ILSVRC 2014). The main hallmark of this architecture is the improved utilization of the computing resources inside the network. This was achieved by a carefully crafted design that allows for increasing the depth and width of the network while keeping the computational budget constant. To optimize quality, the architectural decisions were based on the Hebbian principle and the intuition of multi-scale processing. One particular incarnation used in our submission for ILSVRC 2014 is called GoogLeNet, a 22 layers deep network, the quality of which is assessed in the context of classification and detection.", "absZh": "我们提出了一种名为“Inception”的深度卷积神经网络架构，该架构在2014年ImageNet大规模视觉识别挑战赛（ILSVRC 2014）的分类和检测任务中取得了新的最佳成绩。该架构的主要特点是改进了网络内部计算资源的利用。通过精心设计，在保持计算预算不变的情况下，增加了网络的深度和宽度。为了优化质量，架构决策基于赫布原则和多尺度处理的直觉。我们在ILSVRC 2014提交中使用的具体实例称为GoogLeNet，这是一个22层深的网络，其质量在分类和检测的背景下进行了评估。", "insights": {"contrib": [{"en": "Proposed the Inception architecture that improves computing resource utilization by increasing depth and width while keeping computational budget constant.", "zh": "提出Inception架构，通过增加深度和宽度同时保持计算预算不变，提高了计算资源利用率。"}, {"en": "Introduced dimension reduction using 1x1 convolutions to remove computational bottlenecks.", "zh": "引入使用1x1卷积进行降维，消除计算瓶颈。"}, {"en": "Achieved state-of-the-art results on ILSVRC 2014 classification and detection with GoogLeNet.", "zh": "使用GoogLeNet在ILSVRC 2014分类和检测任务上取得最先进结果。"}, {"en": "Demonstrated that approximating optimal sparse structure with dense components is viable for improving neural networks.", "zh": "证明用密集组件近似最优稀疏结构是改进神经网络的有效方法。"}, {"en": "Showed that increasing network depth and width with efficient design can improve accuracy without proportional computational cost.", "zh": "展示了通过高效设计增加网络深度和宽度可以在不按比例增加计算成本的情况下提高准确率。"}, {"en": "Used auxiliary classifiers to encourage discrimination in lower stages and provide regularization.", "zh": "使用辅助分类器促进较低阶段的判别性并提供正则化。"}], "limits": [{"en": "The Inception architecture was designed specifically for computer vision tasks and may not generalize to other domains.", "zh": "Inception架构专为计算机视觉任务设计，可能无法泛化到其他领域。"}, {"en": "The architecture relies on manual design and tuning; automated construction of similar topologies remains future work.", "zh": "该架构依赖手动设计和调优；自动构建类似拓扑仍是未来工作。"}, {"en": "The computational efficiency gains are achieved at the cost of increased architectural complexity.", "zh": "计算效率的提升是以增加架构复杂性为代价的。"}, {"en": "The results are based on a specific competition dataset (ILSVRC 2014) and may not fully represent real-world performance.", "zh": "结果基于特定竞赛数据集（ILSVRC 2014），可能不完全代表真实世界性能。"}, {"en": "The detection pipeline did not use bounding box regression or context, which could further improve accuracy.", "zh": "检测流程未使用边界框回归或上下文，这些可能进一步提高准确率。"}]}, "cites": 47489}, {"id": "ilya-1409.3215", "pid": "ilya", "arxiv": "1409.3215", "date": "2014-09-10", "venue": "cs.CL", "fields": ["nlp", "deep-learning"], "tEn": "Sequence to Sequence Learning with Neural Networks", "tZh": "基于神经网络的序列到序列学习", "sEn": "A deep LSTM-based end-to-end approach achieves BLEU 34.8 on WMT'14 English-French translation, outperforming a phrase-based SMT system (33.3) and reaching 36.5 when reranking SMT hypotheses.", "sZh": "基于深度LSTM的端到端方法在WMT'14英法翻译任务上取得BLEU 34.8，优于基于短语的统计机器翻译系统（33.3），并在重排序其假设后达到36.5。", "absEn": "Deep Neural Networks (DNNs) are powerful models that have achieved excellent performance on difficult learning tasks. Although DNNs work well whenever large labeled training sets are available, they cannot be used to map sequences to sequences. In this paper, we present a general end-to-end approach to sequence learning that makes minimal assumptions on the sequence structure. Our method uses a multilayered Long Short-Term Memory (LSTM) to map the input sequence to a vector of a fixed dimensionality, and then another deep LSTM to decode the target sequence from the vector. Our main result is that on an English to French translation task from the WMT'14 dataset, the translations produced by the LSTM achieve a BLEU score of 34.8 on the entire test set, where the LSTM's BLEU score was penalized on out-of-vocabulary words. Additionally, the LSTM did not have difficulty on long sentences. For comparison, a phrase-based SMT system achieves a BLEU score of 33.3 on the same dataset. When we used the LSTM to rerank the 1000 hypotheses produced by the aforementioned SMT system, its BLEU score increases to 36.5, which is close to the previous best result on this task. The LSTM also learned sensible phrase and sentence representations that are sensitive to word order and are relatively invariant to the active and the passive voice. Finally, we found that reversing the order of the words in all source sentences (but not target sentences) improved the LSTM's performance markedly, because doing so introduced many short term dependencies between the source and the target sentence which made the optimization problem easier.", "absZh": "深度神经网络（DNN）是强大的模型，在困难的学习任务上取得了优异的性能。尽管DNN在拥有大量标注训练集时表现良好，但它们不能用于序列到序列的映射。在本文中，我们提出了一种通用的端到端序列学习方法，该方法对序列结构做了最少的假设。我们的方法使用多层长短期记忆（LSTM）将输入序列映射到一个固定维度的向量，然后使用另一个深度LSTM从该向量解码目标序列。我们的主要结果是，在WMT'14数据集的英法翻译任务上，LSTM生成的翻译在整个测试集上达到了34.8的BLEU分数，其中LSTM的BLEU分数因词汇外单词而受到惩罚。此外，LSTM在长句子上没有困难。相比之下，基于短语的SMT系统在同一数据集上达到了33.3的BLEU分数。当我们使用LSTM对上述SMT系统产生的1000个假设进行重排序时，其BLEU分数增加到36.5，接近该任务之前的最佳结果。LSTM还学习了合理的短语和句子表示，这些表示对词序敏感，并且对主动语态和被动语态相对不变。最后，我们发现反转所有源句子（但不是目标句子）中的单词顺序显著提高了LSTM的性能，因为这样做引入了源句子和目标句子之间的许多短期依赖关系，使得优化问题更容易。", "insights": {"contrib": [{"en": "Proposes an end-to-end LSTM-based sequence-to-sequence model for general sequence learning.", "zh": "提出了一种基于LSTM的端到端序列到序列模型，用于通用序列学习。"}, {"en": "Achieves BLEU score of 34.8 on WMT'14 English-French translation, outperforming phrase-based SMT baseline.", "zh": "在WMT'14英法翻译任务上取得34.8的BLEU分数，优于基于短语的SMT基线。"}, {"en": "Reversing source sentences introduces short-term dependencies, improving LSTM performance on long sentences.", "zh": "反转源句子引入短期依赖，提升了LSTM在长句上的性能。"}, {"en": "LSTM learns sentence representations sensitive to word order and invariant to active/passive voice.", "zh": "LSTM学习到的句子表示对词序敏感，对主动/被动语态不变。"}, {"en": "Deep LSTMs with 4 layers significantly outperform shallow LSTMs.", "zh": "4层深度LSTM显著优于浅层LSTM。"}, {"en": "LSTM rescoring of SMT n-best lists achieves BLEU 36.5, close to previous best result.", "zh": "LSTM对SMT的n-best列表重新评分达到36.5的BLEU，接近此前最佳结果。"}], "limits": [{"en": "Limited vocabulary (80k target words) penalizes BLEU for out-of-vocabulary words.", "zh": "有限词汇表（8万目标词）对未登录词惩罚BLEU分数。"}, {"en": "Requires large computational resources (8 GPUs, 10 days training).", "zh": "需要大量计算资源（8个GPU，训练10天）。"}, {"en": "Beam search decoder is approximate and may not find optimal translation.", "zh": "束搜索解码器是近似的，可能找不到最优翻译。"}, {"en": "Method assumes monotonic alignment between input and output sequences.", "zh": "方法假设输入和输出序列之间存在单调对齐。"}, {"en": "Performance on tasks with very limited training data is not evaluated.", "zh": "未评估在训练数据非常有限的任务上的性能。"}]}, "cites": 22119, "org": "Google"}, {"id": "ksimonyan-1409.1556", "pid": "ksimonyan", "arxiv": "1409.1556", "date": "2014-09-04", "venue": "cs.CV", "org": "Oxford", "fields": ["vision", "deep-learning"], "tEn": "Very Deep Convolutional Networks for Large-Scale Image Recognition", "tZh": "用于大规模图像识别的极深卷积网络", "sEn": "Increasing depth with small 3x3 filters significantly improves accuracy, achieving 16-19 weight layers.", "sZh": "使用小尺寸3x3卷积滤波器增加网络深度可显著提升准确率，最佳深度为16-19个权重层。", "absEn": "In this work we investigate the effect of the convolutional network depth on its accuracy in the large-scale image recognition setting. Our main contribution is a thorough evaluation of networks of increasing depth using an architecture with very small (3x3) convolution filters, which shows that a significant improvement on the prior-art configurations can be achieved by pushing the depth to 16-19 weight layers. These findings were the basis of our ImageNet Challenge 2014 submission, where our team secured the first and the second places in the localisation and classification tracks respectively. We also show that our representations generalise well to other datasets, where they achieve state-of-the-art results. We have made our two best-performing ConvNet models publicly available to facilitate further research on the use of deep visual representations in computer vision.", "absZh": "本文研究了卷积网络深度在大规模图像识别任务中对准确率的影响。主要贡献是使用极小（3x3）卷积滤波器的架构，对不断加深的网络进行了全面评估，结果表明将深度推至16-19个权重层可显著优于先前技术。这些发现是我们参加2014年ImageNet挑战赛的基础，团队在定位和分类任务中分别获得第一名和第二名。我们还展示了这些表示能很好地泛化到其他数据集，并取得最先进的结果。我们公开了两个性能最佳的ConvNet模型，以促进计算机视觉中深度视觉表示的进一步研究。", "insights": {"contrib": [{"en": "Systematic evaluation of increasing depth in ConvNets using very small 3x3 filters.", "zh": "系统评估了使用极小3x3滤波器的卷积网络深度增加的效果。"}, {"en": "Demonstrated that pushing depth to 16-19 weight layers significantly improves accuracy.", "zh": "证明将深度推至16-19个权重层可显著提升准确率。"}, {"en": "Achieved first and second places in ILSVRC 2014 localization and classification tracks.", "zh": "在ILSVRC 2014定位和分类赛道分别获得第一和第二名。"}, {"en": "Showed that learned representations generalize well to other datasets, achieving state-of-the-art results.", "zh": "表明学到的表示能很好地泛化到其他数据集，取得最优结果。"}, {"en": "Publicly released two best-performing ConvNet models to facilitate further research.", "zh": "公开了两个性能最佳的卷积网络模型以促进进一步研究。"}, {"en": "Confirmed that depth is crucial for visual representation quality.", "zh": "确认了深度对视觉表示质量的关键作用。"}], "limits": [{"en": "Evaluation limited to ImageNet dataset; generalization to other domains not fully explored.", "zh": "评估仅限于ImageNet数据集，未充分探索对其他领域的泛化。"}, {"en": "Depth beyond 19 layers did not improve performance; saturation observed.", "zh": "超过19层的深度未提升性能，观察到饱和现象。"}, {"en": "Training required significant computational resources (2-3 weeks on 4 GPUs).", "zh": "训练需要大量算力（4块GPU上2-3周）。"}, {"en": "Architecture uses only 3x3 filters; other filter sizes not systematically compared.", "zh": "架构仅使用3x3滤波器，未系统比较其他滤波器尺寸。"}, {"en": "Multi-crop evaluation increases computation time without proportional accuracy gain.", "zh": "多裁剪评估增加计算时间，但准确率提升不成比例。"}]}, "cites": 112230}, {"id": "bengio-1409.0473", "pid": "bengio", "arxiv": "1409.0473", "date": "2014-09-01", "venue": "cs.CL", "fields": ["nlp", "deep-learning"], "tEn": "Neural Machine Translation by Jointly Learning to Align and Translate", "tZh": "通过联合学习对齐和翻译的神经机器翻译", "sEn": "Neural machine translation can be improved by allowing the model to automatically search for relevant parts of the source sentence without encoding it into a fixed-length vector.", "sZh": "神经机器翻译可以通过让模型自动搜索源句子的相关部分而不将其编码为固定长度向量来改进。", "absEn": "Neural machine translation is a recently proposed approach to machine translation. Unlike the traditional statistical machine translation, the neural machine translation aims at building a single neural network that can be jointly tuned to maximize the translation performance. The models proposed recently for neural machine translation often belong to a family of encoder-decoders and consists of an encoder that encodes a source sentence into a fixed-length vector from which a decoder generates a translation. In this paper, we conjecture that the use of a fixed-length vector is a bottleneck in improving the performance of this basic encoder-decoder architecture, and propose to extend this by allowing a model to automatically (soft-)search for parts of a source sentence that are relevant to predicting a target word, without having to form these parts as a hard segment explicitly. With this new approach, we achieve a translation performance comparable to the existing state-of-the-art phrase-based system on the task of English-to-French translation. Furthermore, qualitative analysis reveals that the (soft-)alignments found by the model agree well with our intuition.", "absZh": "神经机器翻译是最近提出的一种机器翻译方法。与传统的统计机器翻译不同，神经机器翻译旨在构建一个单一的神经网络，该网络可以联合调整以最大化翻译性能。最近提出的神经机器翻译模型通常属于编码器-解码器家族，包括一个将源句子编码为固定长度向量的编码器，解码器则从该向量生成翻译。在本文中，我们推测使用固定长度向量是改进这种基本编码器-解码器架构性能的瓶颈，并提出通过允许模型自动（软）搜索源句子中与预测目标词相关的部分来扩展该架构，而无需将这些部分明确地形成硬分段。通过这种新方法，我们在英法翻译任务上实现了与现有最先进的基于短语的系统相当的翻译性能。此外，定性分析表明，模型找到的（软）对齐与我们的直觉非常吻合。", "insights": {"contrib": [{"en": "Proposes an attention mechanism that allows soft-search over source sentence parts for each target word.", "zh": "提出注意力机制，允许对每个目标词在源句中进行软搜索。"}, {"en": "Eliminates the fixed-length vector bottleneck in encoder-decoder models, improving long sentence translation.", "zh": "消除了编码器-解码器模型中的固定长度向量瓶颈，改善了长句翻译。"}, {"en": "Achieves translation performance comparable to phrase-based SMT on English-to-French WMT'14.", "zh": "在英法WMT'14任务上达到与基于短语的统计机器翻译相当的性能。"}, {"en": "Uses bidirectional RNN encoder to capture both preceding and following context for each word.", "zh": "使用双向RNN编码器捕捉每个词的前后文信息。"}, {"en": "Jointly trains alignment and translation in a single neural network via backpropagation.", "zh": "通过反向传播在单个神经网络中联合训练对齐和翻译。"}, {"en": "Visualizes soft-alignments that align with linguistic intuition, handling non-monotonic reordering.", "zh": "可视化软对齐符合语言直觉，处理非单调重排。"}], "limits": [{"en": "Computes annotation weights for every source word per target word, limiting scalability to very long sequences.", "zh": "为每个目标词计算所有源词的权重，限制了在超长序列上的可扩展性。"}, {"en": "Requires fixed vocabulary with unknown word token, failing to handle rare or out-of-vocabulary words.", "zh": "需要固定词表并处理未知词，无法处理罕见或词表外词汇。"}, {"en": "Tested only on English-to-French; effectiveness on other language pairs with different reordering patterns is unverified.", "zh": "仅在英法上测试，对其他语言对（如英德）的有效性未验证。"}, {"en": "Soft alignment is computationally expensive compared to hard alignment used in traditional SMT.", "zh": "软对齐相比传统统计机器翻译的硬对齐计算开销更大。"}, {"en": "Performance relies on large parallel corpora; may degrade with limited data.", "zh": "性能依赖大规模平行语料，数据有限时可能下降。"}]}, "cites": 29573, "org": "U. Montréal"}, {"id": "feifei-1409.0575", "pid": "feifei", "arxiv": "1409.0575", "date": "2014-09-01", "venue": "cs.CV", "fields": ["vision"], "tEn": "ImageNet Large Scale Visual Recognition Challenge", "tZh": "ImageNet大规模视觉识别挑战赛", "sEn": "The ImageNet Large Scale Visual Recognition Challenge is a benchmark for object category classification and detection, driving advances in computer vision.", "sZh": "ImageNet大规模视觉识别挑战赛是物体分类与检测的基准，推动了计算机视觉的进步。", "absEn": "The ImageNet Large Scale Visual Recognition Challenge is a benchmark in object category classification and detection on hundreds of object categories and millions of images. The challenge has been run annually from 2010 to present, attracting participation from more than fifty institutions. This paper describes the creation of this benchmark dataset and the advances in object recognition that have been possible as a result. We discuss the challenges of collecting large-scale ground truth annotation, highlight key breakthroughs in categorical object recognition, provide a detailed analysis of the current state of the field of large-scale image classification and object detection, and compare the state-of-the-art computer vision accuracy with human accuracy. We conclude with lessons learned in the five years of the challenge, and propose future directions and improvements.", "absZh": "ImageNet大规模视觉识别挑战赛是一个针对数百个物体类别和数百万张图像的物体分类与检测基准。该挑战赛自2010年起每年举办，吸引了超过五十家机构参与。本文描述了该基准数据集的创建过程以及由此带来的物体识别进展。我们讨论了收集大规模真实标注的挑战，强调了分类物体识别的关键突破，详细分析了大规模图像分类和物体检测领域的现状，并将最先进的计算机视觉精度与人类精度进行了比较。最后，我们总结了挑战赛五年来的经验教训，并提出了未来的方向和改进措施。", "insights": {"contrib": [{"en": "Introduced the ImageNet Large Scale Visual Recognition Challenge (ILSVRC), a benchmark for object classification and detection with 1000 categories and millions of images.", "zh": "提出了ImageNet大规模视觉识别挑战赛（ILSVRC），这是一个包含1000个类别和数百万张图像的物体分类与检测基准。"}, {"en": "Developed scalable crowdsourcing methods for large-scale image annotation, achieving 99.7% precision.", "zh": "开发了可扩展的众包方法用于大规模图像标注，达到了99.7%的精确率。"}, {"en": "Demonstrated that deep convolutional neural networks (e.g., AlexNet) significantly outperform traditional methods, marking a turning point in object recognition.", "zh": "证明了深度卷积神经网络（如AlexNet）显著优于传统方法，标志着物体识别的转折点。"}, {"en": "Provided a detailed analysis of algorithmic progress over five years, comparing state-of-the-art computer vision accuracy with human accuracy.", "zh": "提供了五年间算法进展的详细分析，将最先进的计算机视觉准确率与人类准确率进行了比较。"}, {"en": "Established evaluation metrics for large-scale classification, localization, and detection, including top-5 error and average precision.", "zh": "建立了大规模分类、定位和检测的评估指标，包括top-5错误率和平均精确率。"}, {"en": "Released a publicly available dataset and competition framework that became the standard benchmark for object recognition research.", "zh": "发布了公开可用的数据集和竞赛框架，成为物体识别研究的标准基准。"}], "limits": [{"en": "Dataset annotation only labels one object category per image for classification, causing ambiguity when multiple objects are present.", "zh": "数据集标注仅对每张图像标记一个物体类别用于分类，当存在多个物体时会产生歧义。"}, {"en": "Evaluation metrics for localization may be inaccurate for images with clustered objects, requiring manual removal of 3.5% of images.", "zh": "定位评估指标对于包含聚集物体的图像可能不准确，需要手动移除3.5%的图像。"}, {"en": "Small object instances pose challenges for localization evaluation; threshold adjustment is needed for objects under 25x25 pixels.", "zh": "小物体实例对定位评估构成挑战；需要对小于25x25像素的物体调整阈值。"}, {"en": "The dataset's 1000 categories are limited to ImageNet synsets and may not cover all real-world object types.", "zh": "数据集的1000个类别仅限于ImageNet同义词集，可能无法覆盖所有真实世界的物体类型。"}, {"en": "Crowdsourcing annotation quality relies on worker consensus, which may vary across different object categories.", "zh": "众包标注质量依赖于工人共识，不同物体类别之间可能存在差异。"}]}, "cites": 42902, "org": "Stanford"}, {"id": "bengio-1406.2661", "pid": "bengio", "arxiv": "1406.2661", "date": "2014-06-10", "venue": "stat.ML", "fields": ["generative", "deep-learning"], "tEn": "Generative Adversarial Networks", "tZh": "生成对抗网络", "sEn": "We propose a new framework for estimating generative models via an adversarial process, where a generative model and a discriminative model are trained simultaneously, with the generator aiming to fool the discriminator.", "sZh": "我们提出了一种通过对抗过程估计生成模型的新框架，其中同时训练生成模型和判别模型，生成器的目标是欺骗判别器。", "absEn": "We propose a new framework for estimating generative models via an adversarial process, in which we simultaneously train two models: a generative model G that captures the data distribution, and a discriminative model D that estimates the probability that a sample came from the training data rather than G. The training procedure for G is to maximize the probability of D making a mistake. This framework corresponds to a minimax two-player game. In the space of arbitrary functions G and D, a unique solution exists, with G recovering the training data distribution and D equal to 1/2 everywhere. In the case where G and D are defined by multilayer perceptrons, the entire system can be trained with backpropagation. There is no need for any Markov chains or unrolled approximate inference networks during either training or generation of samples. Experiments demonstrate the potential of the framework through qualitative and quantitative evaluation of the generated samples.", "absZh": "我们提出了一种通过对抗过程估计生成模型的新框架。在该框架中，我们同时训练两个模型：一个生成模型G，用于捕获数据分布；一个判别模型D，用于估计样本来自训练数据而非G的概率。G的训练过程是最大化D犯错误的概率。该框架对应于一个极小极大两人博弈。在任意函数G和D的空间中，存在唯一解，其中G恢复训练数据分布，而D处处等于1/2。当G和D由多层感知机定义时，整个系统可以通过反向传播进行训练。在训练或生成样本期间，无需任何马尔可夫链或展开的近似推理网络。实验通过对生成样本的定性和定量评估，展示了该框架的潜力。", "insights": {"contrib": [{"en": "Proposes adversarial training framework with generator and discriminator networks.", "zh": "提出生成器与判别器网络的对抗训练框架。"}, {"en": "Shows global optimum when generator matches data distribution, discriminator outputs 1/2.", "zh": "证明生成器匹配数据分布、判别器输出1/2时达到全局最优。"}, {"en": "Eliminates need for Markov chains or approximate inference during training or sampling.", "zh": "训练和采样无需马尔可夫链或近似推断。"}, {"en": "Demonstrates competitive sample quality on MNIST, TFD, and CIFAR-10.", "zh": "在MNIST、TFD和CIFAR-10上展示有竞争力的样本质量。"}, {"en": "Introduces minimax game formulation for generative model estimation.", "zh": "引入极小极大博弈公式用于生成模型估计。"}], "limits": [{"en": "No explicit representation of probability density p_g(x).", "zh": "没有概率密度p_g(x)的显式表示。"}, {"en": "Training requires careful synchronization between G and D to avoid mode collapse.", "zh": "训练需要G和D仔细同步以避免模式崩溃。"}, {"en": "Theoretical guarantees assume infinite capacity; practical MLPs may have critical points.", "zh": "理论保证假设无限容量；实际MLP可能存在临界点。"}, {"en": "Likelihood estimation via Parzen window has high variance and poor high-dimensional performance.", "zh": "通过Parzen窗估计似然方差大，高维性能差。"}, {"en": "Framework limited to differentiable generator and discriminator functions.", "zh": "框架限于可微的生成器和判别器函数。"}]}, "cites": 4320, "org": "U. Montréal"}, {"id": "tsungyilin-1405.0312", "pid": "tsungyilin", "arxiv": "1405.0312", "date": "2014-05-01", "venue": "cs.CV", "org": "Microsoft", "fields": ["vision"], "tEn": "Microsoft COCO: Common Objects in Context", "tZh": "Microsoft COCO：上下文中的常见物体", "sEn": "A new dataset for object recognition in context, with 2.5M labeled instances across 91 object types.", "sZh": "一个用于上下文物体识别的新数据集，包含91种物体类型的250万个标注实例。", "absEn": "We present a new dataset with the goal of advancing the state-of-the-art in object recognition by placing the question of object recognition in the context of the broader question of scene understanding. This is achieved by gathering images of complex everyday scenes containing common objects in their natural context. Objects are labeled using per-instance segmentations to aid in precise object localization. Our dataset contains photos of 91 objects types that would be easily recognizable by a 4 year old. With a total of 2.5 million labeled instances in 328k images, the creation of our dataset drew upon extensive crowd worker involvement via novel user interfaces for category detection, instance spotting and instance segmentation. We present a detailed statistical analysis of the dataset in comparison to PASCAL, ImageNet, and SUN. Finally, we provide baseline performance analysis for bounding box and segmentation detection results using a Deformable Parts Model.", "absZh": "我们提出了一个新数据集，旨在通过将物体识别问题置于场景理解这一更广泛问题的背景下，推动物体识别技术的发展。为此，我们收集了包含常见物体在其自然环境中出现的复杂日常场景图像。物体使用逐实例分割进行标注，以帮助精确定位物体。我们的数据集包含91种物体类型的照片，这些类型对于4岁儿童来说易于识别。数据集共有328k张图像中的250万个标注实例，其创建过程通过新颖的用户界面（用于类别检测、实例定位和实例分割）吸引了大量众包工人的参与。我们提供了与PASCAL、ImageNet和SUN数据集的详细统计分析比较。最后，我们使用可变形部件模型提供了边界框和分割检测结果的基线性能分析。", "insights": {"contrib": [{"en": "Introduces MS COCO dataset with 91 object categories, 2.5M instances in 328k images.", "zh": "提出MS COCO数据集，包含91个物体类别、328k张图像中的250万个标注实例。"}, {"en": "Focuses on non-iconic images with contextual relationships and precise instance segmentation.", "zh": "聚焦非典型视角图像，强调上下文关系与精确的实例分割。"}, {"en": "Novel annotation pipeline using hierarchical labeling and crowdsourcing for efficiency.", "zh": "创新标注流程，采用分层标注与众包提高效率。"}, {"en": "Provides detailed statistical comparison with PASCAL, ImageNet, and SUN datasets.", "zh": "与PASCAL、ImageNet和SUN数据集进行详细统计对比。"}, {"en": "Baseline detection and segmentation results using Deformable Parts Model.", "zh": "使用可变形部件模型提供检测与分割的基线结果。"}, {"en": "Demonstrates dataset difficulty and cross-dataset generalization benefits.", "zh": "展示数据集难度及跨数据集泛化的优势。"}], "limits": [{"en": "Only includes 'thing' categories, not 'stuff' like sky or grass.", "zh": "仅包含“物体”类别，不包括“材质”如天空或草地。"}, {"en": "Limited to 91 entry-level categories; fine-grained categories excluded.", "zh": "限于91个基础类别，不包括细粒度类别。"}, {"en": "Crowd-sourced annotations may have quality variance despite verification.", "zh": "尽管有验证，众包标注仍可能存在质量差异。"}, {"en": "Baseline models (DPM) may not capture full complexity of dataset.", "zh": "基线模型（DPM）可能无法完全捕捉数据集的复杂性。"}, {"en": "Dataset split into 2014 and 2015 releases; some categories not segmented.", "zh": "数据集分为2014和2015版本，部分类别未分割。"}]}, "cites": 53480}, {"id": "jbruna-1312.6203", "pid": "jbruna", "arxiv": "1312.6203", "date": "2013-12-21", "venue": "cs.LG", "org": "NYU", "fields": ["deep-learning"], "tEn": "Spectral Networks and Locally Connected Networks on Graphs", "tZh": "谱网络与图上的局部连接网络", "sEn": "We propose two generalizations of CNNs to signals on general domains: one via hierarchical clustering and another via graph Laplacian spectrum, enabling efficient deep architectures with input-size-independent parameters for low-dimensional graphs.", "sZh": "我们提出了两种将CNN推广到一般域上信号的方法：一种基于层次聚类，另一种基于图拉普拉斯谱，使得在低维图上能够学习到参数数量与输入大小无关的卷积层，从而实现高效的深度架构。", "absEn": "Convolutional Neural Networks are extremely efficient architectures in image and audio recognition tasks, thanks to their ability to exploit the local translational invariance of signal classes over their domain. In this paper we consider possible generalizations of CNNs to signals defined on more general domains without the action of a translation group. In particular, we propose two constructions, one based upon a hierarchical clustering of the domain, and another based on the spectrum of the graph Laplacian. We show through experiments that for low-dimensional graphs it is possible to learn convolutional layers with a number of parameters independent of the input size, resulting in efficient deep architectures.", "absZh": "卷积神经网络在图像和音频识别任务中非常高效，这得益于它们能够利用信号类别在其域上的局部平移不变性。在本文中，我们考虑将CNN推广到定义在更一般域上的信号，这些域没有平移群的作用。特别地，我们提出了两种构造，一种基于域的层次聚类，另一种基于图拉普拉斯谱。我们通过实验表明，对于低维图，可以学习到参数数量与输入大小无关的卷积层，从而实现高效的深度架构。", "insights": {"contrib": [{"en": "Proposes two generalizations of CNNs to graph-structured data: spatial and spectral constructions.", "zh": "提出两种将CNN推广到图结构数据的方法：空间构建和谱构建。"}, {"en": "Shows that spatial construction achieves O(n) parameters using hierarchical clustering and local receptive fields.", "zh": "表明空间构建通过层次聚类和局部感受野实现O(n)参数。"}, {"en": "Introduces spectral construction using graph Laplacian eigenvectors, achieving O(n) parameters per feature map.", "zh": "引入基于图拉普拉斯特征向量的谱构建，每个特征图实现O(n)参数。"}, {"en": "Demonstrates O(1) parameter construction via smooth spectral multipliers, enabling parameter count independent of input size.", "zh": "通过平滑谱乘子展示O(1)参数构建，使参数数量与输入规模无关。"}, {"en": "Validates both constructions on low-dimensional graph datasets, showing improved efficiency over fully connected networks.", "zh": "在低维图数据集上验证两种构建，显示相比全连接网络效率提升。"}, {"en": "Shows that smooth spectral constraints yield spatially localized filters that generalize across graph locations.", "zh": "表明平滑谱约束产生空间局部化滤波器，可跨图位置泛化。"}], "limits": [{"en": "Spatial construction lacks weight sharing across different graph locations.", "zh": "空间构建缺乏跨不同图位置的权重共享。"}, {"en": "Spectral construction requires expensive multiplication by eigenvectors and their transpose.", "zh": "谱构建需要昂贵的特征向量及其转置乘法。"}, {"en": "High-frequency eigenvectors may be noisy; spectral construction may not capture meaningful information from them.", "zh": "高频特征向量可能含噪声；谱构建可能无法从中捕获有意义信息。"}, {"en": "Naive multiscale clustering used in spatial construction does not guarantee compatibility with graph Laplacian.", "zh": "空间构建中使用的朴素多尺度聚类不保证与图拉普拉斯的兼容性。"}, {"en": "Experiments limited to low-dimensional graphs; scalability to high-dimensional or large-scale graphs not fully explored.", "zh": "实验限于低维图；未充分探索高维或大规模图的可扩展性。"}]}, "cites": 5384}, {"id": "rgirshick-1311.2524", "pid": "rgirshick", "arxiv": "1311.2524", "date": "2013-11-11", "venue": "cs.CV", "org": "UC Berkeley", "fields": ["vision", "deep-learning"], "tEn": "Rich feature hierarchies for accurate object detection and semantic segmentation", "tZh": "用于精确目标检测和语义分割的丰富特征层次结构", "sEn": "R-CNN combines region proposals with CNNs to achieve a 30% relative improvement in mAP on PASCAL VOC 2012.", "sZh": "R-CNN将区域提议与CNN结合，在PASCAL VOC 2012上实现了mAP相对提升30%。", "absEn": "Object detection performance, as measured on the canonical PASCAL VOC dataset, has plateaued in the last few years. The best-performing methods are complex ensemble systems that typically combine multiple low-level image features with high-level context. In this paper, we propose a simple and scalable detection algorithm that improves mean average precision (mAP) by more than 30% relative to the previous best result on VOC 2012---achieving a mAP of 53.3%. Our approach combines two key insights: (1) one can apply high-capacity convolutional neural networks (CNNs) to bottom-up region proposals in order to localize and segment objects and (2) when labeled training data is scarce, supervised pre-training for an auxiliary task, followed by domain-specific fine-tuning, yields a significant performance boost. Since we combine region proposals with CNNs, we call our method R-CNN: Regions with CNN features. We also compare R-CNN to OverFeat, a recently proposed sliding-window detector based on a similar CNN architecture. We find that R-CNN outperforms OverFeat by a large margin on the 200-class ILSVRC2013 detection dataset. Source code for the complete system is available at http://www.cs.berkeley.edu/~rbg/rcnn.", "absZh": "在标准PASCAL VOC数据集上，目标检测性能在过去几年中停滞不前。表现最好的方法是复杂的集成系统，通常将多个低级图像特征与高级上下文相结合。在本文中，我们提出了一种简单且可扩展的检测算法，相比VOC 2012上之前的最佳结果，平均精度均值（mAP）相对提高了30%以上，达到了53.3%的mAP。我们的方法结合了两个关键见解：（1）可以将高容量卷积神经网络（CNN）应用于自底向上的区域提议，以定位和分割目标；（2）当标记训练数据稀缺时，对辅助任务进行监督预训练，然后进行领域特定的微调，可以显著提升性能。由于我们将区域提议与CNN结合，我们将我们的方法称为R-CNN：具有CNN特征的区域。我们还将R-CNN与OverFeat（一种基于类似CNN架构的最近提出的滑动窗口检测器）进行了比较。我们发现，在200类的ILSVRC2013检测数据集上，R-CNN大幅优于OverFeat。完整系统的源代码可在http://www.cs.berkeley.edu/~rbg/rcnn获取。", "insights": {"contrib": [{"en": "Proposes R-CNN, combining region proposals with CNNs for object detection.", "zh": "提出R-CNN，将区域提议与CNN结合用于目标检测。"}, {"en": "Achieves 30% relative mAP improvement on PASCAL VOC 2012 over prior best.", "zh": "在PASCAL VOC 2012上相比先前最佳结果实现30%的相对mAP提升。"}, {"en": "Shows supervised pre-training on auxiliary task plus domain-specific fine-tuning boosts performance.", "zh": "展示在辅助任务上有监督预训练加领域特定微调可提升性能。"}, {"en": "Demonstrates R-CNN outperforms OverFeat on ILSVRC2013 detection by large margin.", "zh": "证明R-CNN在ILSVRC2013检测上大幅优于OverFeat。"}, {"en": "Extends R-CNN to semantic segmentation with competitive results on PASCAL VOC.", "zh": "将R-CNN扩展到语义分割，在PASCAL VOC上取得有竞争力的结果。"}, {"en": "Provides analysis of error modes and bounding-box regression to reduce mislocalizations.", "zh": "提供错误模式分析和边界框回归以减少定位错误。"}], "limits": [{"en": "Requires fixed-size CNN input via warping, which may distort aspect ratios.", "zh": "需要通过扭曲获得固定大小的CNN输入，可能扭曲宽高比。"}, {"en": "Region proposal stage (selective search) is a bottleneck for speed and recall.", "zh": "区域提议阶段（选择性搜索）是速度和召回率的瓶颈。"}, {"en": "Fine-tuning and SVM training use different positive/negative definitions, causing inconsistency.", "zh": "微调和SVM训练使用不同的正负样本定义，导致不一致。"}, {"en": "Bounding-box regression only effective for proposals near ground truth, limiting scope.", "zh": "边界框回归仅对接近真实值的提议有效，限制了适用范围。"}, {"en": "Performance depends heavily on pre-training dataset (ImageNet) and architecture choice.", "zh": "性能严重依赖预训练数据集（ImageNet）和架构选择。"}]}, "cites": 29100}, {"id": "tmikolov-1310.4546", "pid": "tmikolov", "arxiv": "1310.4546", "date": "2013-10-16", "venue": "cs.CL", "org": "Google", "fields": ["nlp", "deep-learning"], "tEn": "Distributed Representations of Words and Phrases and their Compositionality", "tZh": "词汇与短语的分布式表示及其组合性", "sEn": "We extend the Skip-gram model with subsampling and negative sampling to learn high-quality word and phrase vectors efficiently.", "sZh": "我们通过子采样和负采样扩展了Skip-gram模型，高效地学习高质量的词和短语向量。", "absEn": "The recently introduced continuous Skip-gram model is an efficient method for learning high-quality distributed vector representations that capture a large number of precise syntactic and semantic word relationships. In this paper we present several extensions that improve both the quality of the vectors and the training speed. By subsampling of the frequent words we obtain significant speedup and also learn more regular word representations. We also describe a simple alternative to the hierarchical softmax called negative sampling. An inherent limitation of word representations is their indifference to word order and their inability to represent idiomatic phrases. For example, the meanings of \"Canada\" and \"Air\" cannot be easily combined to obtain \"Air Canada\". Motivated by this example, we present a simple method for finding phrases in text, and show that learning good vector representations for millions of phrases is possible.", "absZh": "最近引入的连续Skip-gram模型是一种高效的学习高质量分布式向量表示的方法，这些向量能够捕捉大量精确的句法和语义词汇关系。在本文中，我们提出了几种改进，既提高了向量的质量，也加快了训练速度。通过对高频词进行子采样，我们获得了显著的加速，并学习了更规则的词表示。我们还描述了一种简单的替代层次softmax的方法，称为负采样。词表示的一个固有局限是它们对词序不敏感，并且无法表示习语短语。例如，“Canada”和“Air”的含义不能轻易组合得到“Air Canada”。受此例启发，我们提出了一种在文本中查找短语的简单方法，并表明学习数百万短语的良好向量表示是可行的。", "insights": {"contrib": [{"en": "Introduced negative sampling as a simple alternative to hierarchical softmax for efficient training.", "zh": "提出负采样作为层级Softmax的简单替代方案，实现高效训练。"}, {"en": "Demonstrated that subsampling frequent words speeds up training and improves vector quality for rare words.", "zh": "证明对高频词进行下采样可加速训练并提升罕见词的向量质量。"}, {"en": "Extended Skip-gram to learn phrase vectors by treating phrases as single tokens via data-driven phrase detection.", "zh": "通过数据驱动的短语检测将短语视为单个词元，扩展Skip-gram以学习短语向量。"}, {"en": "Showed that word vectors exhibit linear structure enabling analogical reasoning via vector arithmetic.", "zh": "展示词向量具有线性结构，可通过向量算术进行类比推理。"}, {"en": "Demonstrated additive compositionality of word vectors, e.g., vec('Russia') + vec('river') ≈ vec('Volga River').", "zh": "证明词向量的加法组合性，例如vec('Russia') + vec('river') ≈ vec('Volga River')。"}, {"en": "Trained high-quality vectors on billions of words, significantly outperforming prior models on analogy tasks.", "zh": "在数十亿词上训练高质量向量，在类比任务上显著优于先前模型。"}], "limits": [{"en": "Word representations are indifferent to word order, limiting capture of syntactic structure.", "zh": "词表示忽略词序，限制了对句法结构的捕捉。"}, {"en": "Inability to represent idiomatic phrases as compositions of individual word meanings.", "zh": "无法将习语短语表示为单个词义的组合。"}, {"en": "Negative sampling does not maximize log probability of softmax, only approximates it.", "zh": "负采样不最大化Softmax的对数概率，仅近似之。"}, {"en": "Phrase detection threshold and subsampling rate are heuristic and task-dependent.", "zh": "短语检测阈值和下采样率是启发式的且依赖任务。"}, {"en": "Model performance heavily depends on large training data and careful hyperparameter tuning.", "zh": "模型性能严重依赖大规模训练数据和细致的超参数调优。"}]}, "cites": 35325}, {"id": "jeffdean-1301.3781", "pid": "jeffdean", "arxiv": "1301.3781", "date": "2013-01-16", "venue": "cs.CL", "fields": ["nlp"], "tEn": "Efficient Estimation of Word Representations in Vector Space", "tZh": "词向量空间中的高效估计方法", "sEn": "Proposed two novel model architectures for computing continuous word vectors from large datasets, achieving higher accuracy with lower computational cost.", "sZh": "提出了两种新的模型架构，用于从大规模数据集中计算连续词向量，在降低计算成本的同时提高了准确性。", "absEn": "We propose two novel model architectures for computing continuous vector representations of words from very large data sets. The quality of these representations is measured in a word similarity task, and the results are compared to the previously best performing techniques based on different types of neural networks. We observe large improvements in accuracy at much lower computational cost, i.e. it takes less than a day to learn high quality word vectors from a 1.6 billion words data set. Furthermore, we show that these vectors provide state-of-the-art performance on our test set for measuring syntactic and semantic word similarities.", "absZh": "我们提出了两种新颖的模型架构，用于从非常大的数据集中计算词的连续向量表示。这些表示的质量通过词相似性任务进行衡量，并将结果与之前基于不同类型神经网络的最佳技术进行比较。我们观察到在计算成本大大降低的情况下，准确性有了显著提高，即从16亿词的数据集中学习高质量词向量只需不到一天的时间。此外，我们表明这些向量在用于测量句法和语义词相似性的测试集上提供了最先进的性能。", "insights": {"contrib": [{"en": "Proposes CBOW and Skip-gram models for efficient learning of high-quality word vectors from large data.", "zh": "提出CBOW和Skip-gram模型，可从大规模数据高效学习高质量词向量。"}, {"en": "Achieves state-of-the-art accuracy on syntactic and semantic word similarity tasks with low computational cost.", "zh": "在句法和语义词相似性任务上以低计算成本达到最先进精度。"}, {"en": "Demonstrates that word vectors capture linear regularities, enabling algebraic operations like vector(\"King\") - vector(\"Man\") + vector(\"Woman\") ≈ vector(\"Queen\").", "zh": "证明词向量捕捉线性规律，支持代数运算如vector(\"King\") - vector(\"Man\") + vector(\"Woman\") ≈ vector(\"Queen\")。"}, {"en": "Introduces a comprehensive test set with 8869 semantic and 10675 syntactic questions for evaluating word vectors.", "zh": "引入包含8869个语义和10675个句法问题的综合测试集，用于评估词向量。"}, {"en": "Shows that increasing both vector dimensionality and training data size yields diminishing returns, requiring balanced scaling.", "zh": "表明同时增加向量维度和训练数据量会带来递减收益，需要平衡缩放。"}, {"en": "Achieves new state-of-the-art on Microsoft Sentence Completion Challenge (58.9% accuracy) by combining Skip-gram with RNNLM.", "zh": "通过结合Skip-gram与RNNLM，在微软句子补全挑战中达到新最先进水平（58.9%准确率）。"}], "limits": [{"en": "Models treat words as atomic units, ignoring morphology; synonyms are counted as mistakes in evaluation.", "zh": "模型将词视为原子单元，忽略形态学；同义词在评估中被计为错误。"}, {"en": "Performance saturates with increasing vector dimensions or data size, requiring joint scaling for improvement.", "zh": "性能随向量维度或数据量增加而饱和，需要联合缩放才能改进。"}, {"en": "Skip-gram model underperforms on syntactic tasks compared to CBOW, limiting its general applicability.", "zh": "Skip-gram在句法任务上表现不如CBOW，限制了其通用性。"}, {"en": "Training on limited in-domain data (e.g., speech recognition) may not benefit from simple scaling, requiring advanced techniques.", "zh": "在有限的领域数据（如语音识别）上训练可能无法从简单缩放中受益，需要更高级技术。"}, {"en": "Evaluation metric (cosine distance) may not capture all semantic nuances, and 100% accuracy is likely unattainable.", "zh": "评估指标（余弦距离）可能无法捕捉所有语义细微差别，100%准确率可能无法达到。"}]}, "cites": 34511, "org": "Google"}, {"id": "hinton-1207.0580", "pid": "hinton", "arxiv": "1207.0580", "date": "2012-07-03", "venue": "cs.NE", "org": "U. Toronto", "fields": ["deep-learning"], "tEn": "Improving neural networks by preventing co-adaptation of feature detectors", "tZh": "通过防止特征检测器的共适应来改进神经网络", "sEn": "Randomly omitting half of the feature detectors during training prevents co-adaptation and reduces overfitting, leading to significant improvements in neural network performance.", "sZh": "在训练过程中随机丢弃一半的特征检测器可以防止共适应并减少过拟合，从而显著提升神经网络性能。", "absEn": "When a large feedforward neural network is trained on a small training set, it typically performs poorly on held-out test data. This \"overfitting\" is greatly reduced by randomly omitting half of the feature detectors on each training case. This prevents complex co-adaptations in which a feature detector is only helpful in the context of several other specific feature detectors. Instead, each neuron learns to detect a feature that is generally helpful for producing the correct answer given the combinatorially large variety of internal contexts in which it must operate. Random \"dropout\" gives big improvements on many benchmark tasks and sets new records for speech and object recognition.", "absZh": "当大型前馈神经网络在小训练集上训练时，通常在保留的测试数据上表现不佳。通过在每个训练案例中随机丢弃一半的特征检测器，这种“过拟合”大大减少。这防止了复杂的共适应，即一个特征检测器仅在几个其他特定特征检测器的上下文中才有帮助。相反，每个神经元学会检测一个特征，该特征在它必须操作的组合多样的内部上下文中通常有助于产生正确答案。随机“丢弃”在许多基准任务上带来了巨大改进，并在语音和物体识别方面创下了新纪录。", "insights": {"contrib": [{"en": "Proposes dropout, a technique that randomly omits half of feature detectors during training to prevent co-adaptation.", "zh": "提出 dropout 技术，在训练时随机丢弃一半特征检测器以防止协同适应。"}, {"en": "Shows dropout reduces overfitting significantly on small training sets.", "zh": "表明 dropout 在小训练集上显著减少过拟合。"}, {"en": "Demonstrates dropout as efficient model averaging, approximating exponentially many networks.", "zh": "展示 dropout 作为高效模型平均，近似指数级数量的网络。"}, {"en": "Achieves state-of-the-art results on speech (TIMIT) and object recognition (CIFAR-10, ImageNet) benchmarks.", "zh": "在语音（TIMIT）和物体识别（CIFAR-10、ImageNet）基准上取得最优结果。"}, {"en": "Introduces L2 weight constraints per hidden unit to allow large learning rates and thorough weight-space search.", "zh": "引入每个隐藏单元的 L2 权重约束，允许大学习率和彻底的权重空间搜索。"}, {"en": "Connects dropout to evolutionary theory, suggesting robustness through multiple alternative feature sets.", "zh": "将 dropout 与进化理论联系，提出通过多种替代特征集实现鲁棒性。"}], "limits": [{"en": "Dropout probability of 0.5 is used throughout; optimal probability may vary per layer or dataset.", "zh": "全文使用 dropout 概率 0.5；最优概率可能因层或数据集而异。"}, {"en": "Method primarily tested on feedforward neural networks; applicability to recurrent or other architectures not explored.", "zh": "方法主要在前馈神经网络上测试；未探索对循环或其他架构的适用性。"}, {"en": "Performance gains depend on network size and training data amount; may diminish with very large datasets.", "zh": "性能提升依赖于网络大小和训练数据量；在极大数据集上可能减弱。"}, {"en": "Test-time mean network approximation assumes equal importance of all dropout networks; may not hold in all cases.", "zh": "测试时平均网络近似假设所有 dropout 网络重要性相等；可能不适用于所有情况。"}, {"en": "Dropout increases training time due to stochastic updates and requires careful tuning of learning rate and constraints.", "zh": "Dropout 因随机更新增加训练时间，且需仔细调整学习率和约束。"}]}, "cites": 8014}];

function renderItem(it){

 if(it.t==='eq')return `<div class="peq">\\[${it.tex}\\]</div>`;
 return `<div class="para"><div class="en">${esc(it.en)}</div><div class="zh">${esc(it.zh)}</div></div>`;}
function ilist(arr,head){return `<div class="icard"><h4 style="color:var(--acc)">${head}</h4><ul style="margin:0;padding-left:18px">${(arr||[]).map(x=>`<li><span class="lang-en">${esc(x.en)}</span><span class="z lang-zh">${esc(x.zh)}</span></li>`).join('')}</ul></div>`;}

 const full=FULL_CACHE[id];

 if(!full) ensureFull(id);
 return `<div class="wrap"><section>

 </section></div>${footer()}`;

function askBox(p){
 const qs=(p.insights&&p.insights.contrib||[]).slice(0,2).map(x=>x.zh);
 return `<div class="askbox"><div style="font-weight:650;margin-bottom:6px">针对这篇论文问 AI</div>
  <input id=" q" placeholder="例如：FlashAttention 为什么更快？" onkeydown="if(event.key==='Enter')askPaper('${p.id}')">
  <div class="qsugg">${qs.map(q=>`<span onclick="document.getElementById('q').value='${esc(q)}';askPaper('${p.id}')">${esc(q)}</span>`).join('')}</div>
  <button class="askbtn" onclick="askPaper('${p.id}')">提问</button>
  <div class="ans" id="ans"></div></div>`;
}
function vAsk(){
 return `<div class="wrap"><section><div class="eyebrow">Ask · 问 AI</div><h2 class="title">问遍全站论文</h2>
  <p class="sub">基于站内 ${PAPERS.length} 篇论文的内容回答，并标注引用来源。进入任意论文页也可单篇提问。</p>
  <div class="askbox" style="margin-top:18px"><input id="q" placeholder="例如：注意力机制是怎么提出的？" onkeydown="if(event.key==='Enter')askAll()">
   <button class="askbtn" onclick="askAll()">提问</button><div class="ans" id="ans"></div></div>
 </section></div>${footer()}`;
}
function footer(){return `<footer><div class="wrap">
  <div>AI Paper · 双语论文阅读站 — 著名学者的代表论文，逐段中英对照 + 核心贡献 + 论文问答。</div>
  <div class="legal">本站论文正文/摘要版权归原作者与 arXiv，按其许可（多为 CC-BY/arXiv 非独占）展示译文，仅作学习与研究用途；如权利人要求即下架。译文由 AI 生成，仅供参考，以原文为准。</div>
 </div></footer>`;}

/* ===== ASK (需部署 chat-worker；未配置则提示) ===== */
async function ask(payload,box){
 if(!CHAT_PROXY){box.textContent="（问答未配置）";return;}
 box.textContent="思考中…";
 try{const r=await fetch(CHAT_PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  if(!r.ok){box.textContent="出错："+r.status+" "+(await r.text());return;}
  const reader=r.body.getReader(),dec=new TextDecoder();box.textContent="";
  for(;;){const{done,value}=await reader.read();if(done)break;box.textContent+=dec.decode(value,{stream:true});}
 }catch(e){box.textContent="出错了："+e;}
}
function askPaper(id){const q=document.getElementById('q').value.trim();if(!q)return;
 const p=FULL_CACHE[id]||PAPERS.find(x=>x.id===id);
 ask({mode:'paper',q,id,title:p.tEn},document.getElementById('ans'));}
function askAll(){const q=document.getElementById('q').value.trim();if(!q)return;
 ask({mode:'all',q},document.getElementById('ans'));}

/* ===== LAZY FULL TEXT ===== */
async function ensureFull(id){
 if(FULL_CACHE[id])return FULL_CACHE[id];
 try{const r=await fetch('data/'+id+'.json');FULL_CACHE[id]=await r.json();
  if(location.hash.includes('/paper/'+id))render();return FULL_CACHE[id];}catch(e){}
}

function vOrgs(){const list=orgList();
 return `<div class="wrap"><section><div class="eyebrow">Organizations · 机构</div><h2 class="title">按机构看论文</h2>
  <p class="sub">${list.length} 家机构 · ${PAPERS.length} 篇论文，看每家产出的代表作。</p>
  <div class="grid ppl-grid" style="margin-top:22px">${list.map(([o,n])=>`<div class="ppl-card" onclick="go('#/org/'+encodeURIComponent(${JSON.stringify(o)}))"><div class="av orgav" style="${ORG_LOGO[o]?'':'background:'+orgColor(o)+';font-size:18px'}">${ORG_LOGO[o]?orgLogo(o,'orgavimg'):esc(o.split(' ').map(w=>w[0]).join('').slice(0,3))}</div><div class="n">${esc(o)}</div><div class="cnt">${n} 篇论文</div></div>`).join('')}</div>
 </section></div>${footer()}`;}
function vOrg(o){o=decodeURIComponent(o);const ps=papersByOrg(o).sort((a,b)=>(b.cites||0)-(a.cites||0));
 return `<div class="wrap"><section><span class="back" onclick="go('#/orgs')">← 机构</span>
  <h1 style="font-size:30px;margin:8px 0 2px">${esc(o)}</h1><p class="sub">${ps.length} 篇论文 · 按被引排序</p>
  <div class="grid" style="margin-top:18px">${ps.map(paperCard).join('')||'<p class="sub">暂无</p>'}</div>
 </section></div>${footer()}`;}
function toggleTheme(){const t=document.documentElement.dataset.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=t;localStorage.theme=t;}
function setLang(l){document.body.dataset.lang=l;localStorage.lang=l;syncSeg();}
function syncSeg(){const lg=document.body.dataset.lang||'both';const seg=document.getElementById('langSeg');
 if(seg){const m={both:0,zh:1,en:2};[...seg.children].forEach((b,i)=>b.classList.toggle('on',i===m[lg]));}}
function inReader(node){let el=node&&(node.nodeType===3?node.parentElement:node);return !!(el&&el.closest&&el.closest('.reader'));}
function selSecIndex(){const node=window.getSelection().anchorNode;if(!node)return -1;
 let el=node.nodeType===3?node.parentElement:node;const unit=el&&el.closest?el.closest('.para,.pfig,.peq'):null;let p=unit||el;
 while(p){if(p.classList&&p.classList.contains('sec-h')){const mm=(p.id||'').match(/sec-(\d+)/);return mm?+mm[1]:-1;}p=p.previousElementSibling;}return -1;}
function selCheck(){const bar=document.getElementById('selBar');if(!bar)return;
 const sel=window.getSelection();const text=(sel?sel.toString():'').trim();
 if(text.length<3||!sel.anchorNode||!inReader(sel.anchorNode)){bar.style.display='none';return;}
 const r=sel.getRangeAt(0).getBoundingClientRect();bar.style.display='flex';
 bar.style.left=(window.scrollX+r.left+r.width/2)+'px';bar.style.top=(window.scrollY+r.top-44)+'px';
 const b=document.getElementById('shareSelBtn');b.textContent='分享所选';b.dataset.text=text;b.dataset.sec=selSecIndex();}
async function shareSel(){const b=document.getElementById('shareSelBtn');const text=((b&&b.dataset.text)||'').trim();if(!text)return;
 const m=(location.hash||'').match(/#\/paper\/([^?]+)/);const id=m?decodeURIComponent(m[1]):'';const p=id&&PAPERS.find(x=>x.id===id);
 const quote=text.length>80?text.slice(0,80)+'…':text;const who=p?`—— ${(PEOPLE[p.pid]||{}).zh||''}《${p.tZh||p.tEn}》`:'—— AI Paper';
 let url=location.origin+location.pathname+'#/paper/'+id;const si=parseInt(b.dataset.sec,10);
 if(id&&si>=0)url+='?at='+si+'&hl='+encodeURIComponent(text.slice(0,40));
 const body=`「${quote}」\n${who}\n${url}`;
 if(navigator.share){try{await navigator.share({title:'AI Paper',text:body});return;}catch(e){if(e&&e.name==='AbortError')return;}}
 try{await navigator.clipboard.writeText(body);b.textContent='已复制';setTimeout(()=>b.textContent='分享所选',1500);}catch(e){b.textContent='复制失败';setTimeout(()=>b.textContent='分享所选',1500);}}
let pendingLocate=null;
function applyLocate(){if(!pendingLocate)return;const {id,at,hl}=pendingLocate;
 if((location.hash||'').indexOf('/paper/'+id)<0){pendingLocate=null;return;}
 if(!document.querySelector('.reader .para'))return;  // 逐字稿还没加载,等下次 render
 pendingLocate=null;let target=at!=null?document.getElementById('sec-'+at):null;
 if(hl){const base=decodeURIComponent(hl).replace(/\s/g,'');const els=[...document.querySelectorAll('.reader .para .en,.reader .para .zh')];
  for(const L of [40,30,22,16,10]){const snip=base.slice(0,Math.min(L,base.length));if(snip.length<6)continue;
   const hit=els.find(el=>el.textContent.replace(/\s/g,'').includes(snip));
   if(hit){hit.classList.add('hl-locate');setTimeout(()=>hit.classList.remove('hl-locate'),4000);target=hit.closest('.para')||hit;break;}}}
 if(target)setTimeout(()=>target.scrollIntoView({behavior:'smooth',block:'center'}),60);}
async function sharePaper(id){const p=PAPERS.find(x=>x.id===id);if(!p)return;
 const url=location.origin+location.pathname+'#/paper/'+id;const text=`${p.tZh}｜${p.tEn}（arXiv:${p.arxiv}）`;
 try{if(navigator.share){await navigator.share({title:p.tZh,text,url});return;}}catch(e){if(e&&e.name==='AbortError')return;}
 try{await navigator.clipboard.writeText(text+' '+url);alert('已复制分享内容与链接');}catch(e){prompt('复制链接',url);}}
/* ===== ROUTER ===== */
function render(){
 const h=location.hash||'#/';const[path,query]=h.slice(2).split('?');
 const parts=path.split('/').filter(Boolean);const qp=query?new URLSearchParams(query):null;
 if(parts[0]==='paper'&&qp&&(qp.get('at')!=null||qp.get('hl')))pendingLocate={id:decodeURIComponent(parts[1]),at:qp.get('at'),hl:qp.get('hl')};
 let html;
 if(!parts.length)html=vHome();
 else if(parts[0]==='person')html=vPerson(parts[1]);
 else if(parts[0]==='paper')html=vPaper(decodeURIComponent(parts[1]));
 else if(parts[0]==='people')html=vPeople(qp&&qp.get('field'));
 else if(parts[0]==='papers')html=vPapers();
 else if(parts[0]==='orgs')html=vOrgs();
 else if(parts[0]==='org')html=vOrg(parts[1]);
 else if(parts[0]==='ask')html=vAsk();
 else html=vHome();
 document.getElementById('app').innerHTML=html;
 if(!pendingLocate)window.scrollTo(0,0);
 if(window.MathJax&&MathJax.typesetPromise)MathJax.typesetPromise([document.getElementById('app')]).catch(()=>{});
 applyLocate();
}
if(localStorage.theme)document.documentElement.dataset.theme=localStorage.theme;
if(localStorage.lang)document.body.dataset.lang=localStorage.lang;
syncSeg();
const selH=()=>setTimeout(selCheck,10);
document.addEventListener('mouseup',selH);document.addEventListener('touchend',selH);
addEventListener('hashchange',render);render();
</script>
</body>
