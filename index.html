g the prediction loss over the masked regions only, which forces the model to learn a combined acoustic and language model over the continuous inputs. HuBERT relies primarily on the consistency of the unsupervised clustering step rather than the intrinsic quality of the assigned cluster labels. Starting with a simple k-means teacher of 100 clusters, and using two iterations of clustering, the HuBERT model either matches or improves upon the state-of-the-art wav2vec 2.0 performance on the Librispeech (960h) and Libri-light (60,000h) benchmarks with 10min, 1h, 10h, 100h, and 960h fine-tuning subsets. Using a 1B parameter model, HuBERT shows up to 19% and 13% relative WER reduction on the more challenging dev-other and test-other evaluation subsets.", "absZh": "自监督语音表示学习方法面临三个独特挑战：(1) 每个输入话语包含多个声音单元，(2) 预训练阶段没有输入声音单元的词典，(3) 声音单元长度可变且没有明确分割。为了解决这些问题，我们提出了隐藏单元BERT（HuBERT）方法，该方法利用离线聚类步骤为类似BERT的预测损失提供对齐的目标标签。我们方法的一个关键要素是仅在掩码区域应用预测损失，这迫使模型在连续输入上学习联合声学和语言模型。HuBERT主要依赖于无监督聚类步骤的一致性，而不是分配聚类标签的内在质量。从简单的100个聚类的k-means教师模型开始，经过两次聚类迭代，HuBERT模型在Librispeech（960小时）和Libri-light（60,000小时）基准测试中，在10分钟、1小时、10小时、100小时和960小时微调子集上，匹配或改进了最先进的wav2vec 2.0性能。使用1B参数模型，HuBERT在更具挑战性的dev-other和test-other评估子集上，相对词错误率分别降低了高达19%和13%。", "insights": {"contrib": [{"en": "Proposes HuBERT, a self-supervised speech representation learning method using masked prediction of hidden units from offline clustering.", "zh": "提出HuBERT，一种通过离线聚类隐藏单元的掩码预测进行自监督语音表示学习的方法。"}, {"en": "Applies prediction loss only on masked regions, forcing the model to learn combined acoustic and language models.", "zh": "仅在掩码区域应用预测损失，迫使模型学习联合声学与语言模型。"}, {"en": "Shows that target consistency matters more than correctness, enabling robust learning from simple k-means clusters.", "zh": "表明目标一致性比正确性更重要，从而能够从简单的k-means聚类中稳健学习。"}, {"en": "Achieves state-of-the-art results on Librispeech and Libri-light benchmarks, matching or outperforming wav2vec 2.0.", "zh": "在Librispeech和Libri-light基准上取得最先进结果，匹配或超越wav2vec 2.0。"}, {"en": "Demonstrates iterative refinement of cluster assignments using learned representations improves representation quality.", "zh": "证明使用学习到的表示迭代优化聚类分配可提升表示质量。"}, {"en": "Scales to a 1B parameter model, achieving up to 19% relative WER reduction on challenging subsets.", "zh": "扩展到1B参数模型，在挑战性子集上实现高达19%的相对词错误率降低。"}], "limits": [{"en": "Requires offline clustering step, adding computational overhead and dependency on clustering quality.", "zh": "需要离线聚类步骤，增加计算开销并依赖聚类质量。"}, {"en": "Performance relies on iterative refinement of targets, which may not converge optimally in all settings.", "zh": "性能依赖于目标的迭代优化，可能并非在所有设置下都能最优收敛。"}, {"en": "Evaluated only on English audiobook data; generalization to other languages or noisy conditions is not verified.", "zh": "仅在英语有声书数据上评估；未验证对其他语言或噪声条件的泛化能力。"}, {"en": "Fine-tuning requires careful hyperparameter tuning for each subset, limiting practical deployment.", "zh": "微调需要为每个子集仔细调整超参数，限制了实际部署。"}, {"en": "Model size up to 1B parameters demands significant computational resources for pre-training and fine-tuning.", "zh": "高达1B参数的模型需要大量计算资源进行预训练和微调。"}]}, "cites": 4704}, {"id": "pdhariwal-2105.05233", "pid": "pdhariwal", "arxiv": "2105.05233", "date": "2021-05-11", "venue": "cs.LG", "org": "OpenAI", "fields": ["generative", "vision"], "tEn": "Diffusion Models Beat GANs on Image Synthesis", "tZh": "扩散模型在图像合成上击败GAN", "sEn": "Diffusion models achieve superior image quality to GANs with classifier guidance.", "sZh": "扩散模型通过分类器引导，在图像质量上超越GAN。", "absEn": "We show that diffusion models can achieve image sample quality superior to the current state-of-the-art generative models. We achieve this on unconditional image synthesis by finding a better architecture through a series of ablations. For conditional image synthesis, we further improve sample quality with classifier guidance: a simple, compute-efficient method for trading off diversity for fidelity using gradients from a classifier. We achieve an FID of 2.97 on ImageNet 128$\\times$128, 4.59 on ImageNet 256$\\times$256, and 7.72 on ImageNet 512$\\times$512, and we match BigGAN-deep even with as few as 25 forward passes per sample, all while maintaining better coverage of the distribution. Finally, we find that classifier guidance combines well with upsampling diffusion models, further improving FID to 3.94 on ImageNet 256$\\times$256 and 3.85 on ImageNet 512$\\times$512. We release our code at https://github.com/openai/guided-diffusion", "absZh": "我们证明扩散模型在图像样本质量上可以超越当前最先进的生成模型。在无条件图像合成中，我们通过一系列消融实验找到了更好的架构。对于条件图像合成，我们通过分类器引导进一步提高了样本质量：这是一种简单、计算高效的方法，利用分类器的梯度在多样性和保真度之间进行权衡。我们在ImageNet 128×128上实现了2.97的FID，在ImageNet 256×256上实现了4.59，在ImageNet 512×512上实现了7.72，并且即使每个样本仅使用25次前向传播，也能与BigGAN-deep相媲美，同时保持更好的分布覆盖。最后，我们发现分类器引导与上采样扩散模型结合良好，进一步将ImageNet 256×256上的FID提升至3.94，ImageNet 512×512上的FID提升至3.85。我们在https://github.com/openai/guided-diffusion 上发布了代码。", "insights": {"contrib": [{"en": "Demonstrates diffusion models surpass GANs in image sample quality on unconditional and conditional synthesis.", "zh": "证明扩散模型在无条件与条件图像合成中样本质量超越GANs。"}, {"en": "Proposes improved UNet architecture with multi-resolution attention, BigGAN blocks, and adaptive group normalization.", "zh": "提出改进的UNet架构，包含多分辨率注意力、BigGAN模块和自适应组归一化。"}, {"en": "Introduces classifier guidance for trading off diversity for fidelity using classifier gradients.", "zh": "引入分类器引导，通过分类器梯度在多样性与保真度间权衡。"}, {"en": "Achieves state-of-the-art FID scores on ImageNet at multiple resolutions with few sampling steps.", "zh": "在ImageNet多个分辨率上以少量采样步骤取得最优FID分数。"}, {"en": "Shows classifier guidance combines with upsampling diffusion models for further FID improvements.", "zh": "展示分类器引导与上采样扩散模型结合可进一步改善FID。"}, {"en": "Provides open-source code for guided diffusion models.", "zh": "提供引导扩散模型的开源代码。"}], "limits": [{"en": "Sampling is slower than GANs due to multiple forward passes.", "zh": "因多次前向传播，采样速度慢于GANs。"}, {"en": "Classifier guidance requires labeled datasets; no effective strategy for unlabeled data.", "zh": "分类器引导需要标注数据集，缺乏针对无标注数据的有效策略。"}, {"en": "Metrics like FID are imperfect proxies for human judgment.", "zh": "FID等指标并非人类判断的完美代理。"}, {"en": "Guidance scale tuning is needed for optimal trade-off between diversity and fidelity.", "zh": "需要调整引导尺度以优化多样性与保真度的权衡。"}, {"en": "Architecture improvements may not transfer to other domains without tuning.", "zh": "架构改进可能无法不经调优直接迁移至其他领域。"}]}, "cites": 12220}, {"id": "abardes-2105.04906", "pid": "abardes", "arxiv": "2105.04906", "date": "2021-05-11", "venue": "cs.CV", "org": "Meta AI", "fields": ["vision", "deep-learning"], "tEn": "VICReg: Variance-Invariance-Covariance Regularization for Self-Supervised Learning", "tZh": "VICReg：用于自监督学习的方差-不变性-协方差正则化", "sEn": "VICReg explicitly avoids collapse in self-supervised learning by regularizing embedding variance and covariance.", "sZh": "VICReg通过正则化嵌入的方差和协方差，明确避免了自监督学习中的崩溃问题。", "absEn": "Recent self-supervised methods for image representation learning are based on maximizing the agreement between embedding vectors from different views of the same image. A trivial solution is obtained when the encoder outputs constant vectors. This collapse problem is often avoided through implicit biases in the learning architecture, that often lack a clear justification or interpretation. In this paper, we introduce VICReg (Variance-Invariance-Covariance Regularization), a method that explicitly avoids the collapse problem with a simple regularization term on the variance of the embeddings along each dimension individually. VICReg combines the variance term with a decorrelation mechanism based on redundancy reduction and covariance regularization, and achieves results on par with the state of the art on several downstream tasks. In addition, we show that incorporating our new variance term into other methods helps stabilize the training and leads to performance improvements.", "absZh": "最近的自监督图像表示学习方法基于最大化同一图像不同视角的嵌入向量之间的一致性。当编码器输出恒定向量时，会出现平凡解。这种崩溃问题通常通过学习架构中的隐式偏差来避免，但这些偏差往往缺乏明确的理由或解释。在本文中，我们引入了VICReg（方差-不变性-协方差正则化），该方法通过在每个维度上对嵌入的方差进行简单的正则化，明确避免了崩溃问题。VICReg将方差项与基于冗余减少和协方差正则化的去相关机制相结合，在多个下游任务上取得了与最先进方法相当的结果。此外，我们表明将新的方差项纳入其他方法有助于稳定训练并带来性能提升。", "insights": {"contrib": [{"en": "Introduces VICReg, a self-supervised method with variance, invariance, and covariance regularization to explicitly prevent collapse.", "zh": "提出VICReg，一种通过方差、不变性和协方差正则化显式防止坍塌的自监督方法。"}, {"en": "Variance term maintains embedding variance above a threshold, preventing norm collapse.", "zh": "方差项将嵌入方差维持在阈值以上，防止范数坍塌。"}, {"en": "Covariance term decorrelates embedding dimensions, maximizing information content.", "zh": "协方差项去相关嵌入维度，最大化信息含量。"}, {"en": "VICReg does not require weight sharing, batch normalization, or memory banks, enabling multi-modal applications.", "zh": "VICReg无需权重共享、批归一化或记忆库，支持多模态应用。"}, {"en": "Achieves state-of-the-art results on ImageNet linear evaluation and transfer tasks.", "zh": "在ImageNet线性评估和迁移任务上达到最先进水平。"}, {"en": "Variance regularization stabilizes training and improves performance when added to other methods.", "zh": "方差正则化加入其他方法时可稳定训练并提升性能。"}], "limits": [{"en": "Performance on detection tasks slightly behind top methods like SwAV and BYOL.", "zh": "在检测任务上略逊于SwAV和BYOL等顶尖方法。"}, {"en": "Requires careful tuning of hyperparameters λ and μ for optimal performance.", "zh": "需要仔细调优超参数λ和μ以获得最佳性能。"}, {"en": "Covariance regularization may hinder optimization when combined with stop-gradient.", "zh": "协方差正则化与停止梯度结合时可能阻碍优化。"}, {"en": "VICReg's expander architecture adds computational overhead during pretraining.", "zh": "VICReg的扩展器架构在预训练期间增加了计算开销。"}, {"en": "Limited evaluation on multi-modal tasks beyond image-text retrieval.", "zh": "除图像-文本检索外，多模态任务评估有限。"}]}}, {"id": "mcaron-2104.14294", "pid": "mcaron", "arxiv": "2104.14294", "date": "2021-04-29", "venue": "cs.CV", "org": "Meta AI", "fields": ["vision", "deep-learning"], "tEn": "Emerging Properties in Self-Supervised Vision Transformers", "tZh": "自监督视觉Transformer中的涌现特性", "sEn": "Self-supervised ViTs reveal explicit semantic segmentation and strong k-NN performance, leading to DINO method achieving 80.1% top-1 on ImageNet.", "sZh": "自监督ViT显式揭示语义分割信息，且k-NN分类性能优异，由此提出的DINO方法在ImageNet线性评估中达到80.1% top-1准确率。", "absEn": "In this paper, we question if self-supervised learning provides new properties to Vision Transformer (ViT) that stand out compared to convolutional networks (convnets). Beyond the fact that adapting self-supervised methods to this architecture works particularly well, we make the following observations: first, self-supervised ViT features contain explicit information about the semantic segmentation of an image, which does not emerge as clearly with supervised ViTs, nor with convnets. Second, these features are also excellent k-NN classifiers, reaching 78.3% top-1 on ImageNet with a small ViT. Our study also underlines the importance of momentum encoder, multi-crop training, and the use of small patches with ViTs. We implement our findings into a simple self-supervised method, called DINO, which we interpret as a form of self-distillation with no labels. We show the synergy between DINO and ViTs by achieving 80.1% top-1 on ImageNet in linear evaluation with ViT-Base.", "absZh": "本文探讨自监督学习是否为视觉Transformer（ViT）带来区别于卷积网络（convnet）的新特性。除了自监督方法在此架构上表现尤佳外，我们观察到：首先，自监督ViT特征包含图像的显式语义分割信息，这在监督ViT或convnet中并不明显；其次，这些特征也是优秀的k-NN分类器，在小型ViT上ImageNet top-1准确率达78.3%。研究还强调了动量编码器、多裁剪训练以及ViT中小patch的使用。我们将发现整合为简单自监督方法DINO，可视为无标签的自蒸馏。通过ViT-Base，DINO在ImageNet线性评估中达到80.1% top-1准确率，展现了DINO与ViT的协同效应。", "insights": {"contrib": [{"en": "Self-supervised ViT features explicitly encode semantic segmentation information, unlike supervised ViTs or convnets.", "zh": "自监督ViT特征显式编码语义分割信息，这与有监督ViT或卷积网络不同。"}, {"en": "Self-supervised ViT features achieve 78.3% top-1 accuracy on ImageNet with a simple k-NN classifier.", "zh": "自监督ViT特征在ImageNet上使用简单的k-NN分类器达到78.3%的top-1准确率。"}, {"en": "The DINO method, a form of self-distillation with no labels, achieves 80.1% top-1 on ImageNet linear evaluation with ViT-Base.", "zh": "DINO方法（一种无标签的自蒸馏形式）在ViT-Base的ImageNet线性评估中达到80.1%的top-1准确率。"}, {"en": "Momentum encoder, multi-crop training, and small patches are crucial for high-quality self-supervised ViT features.", "zh": "动量编码器、多裁剪训练和小patch对于高质量自监督ViT特征至关重要。"}, {"en": "Self-supervised ViT features outperform supervised ones in nearest neighbor retrieval and copy detection tasks.", "zh": "自监督ViT特征在最近邻检索和复制检测任务中优于有监督特征。"}, {"en": "DINO with ViT achieves competitive performance on dense tasks like video instance segmentation without fine-tuning.", "zh": "DINO与ViT结合在视频实例分割等密集任务上无需微调即达到竞争性能。"}], "limits": [{"en": "The study focuses on ImageNet; generalization to other datasets is not fully explored.", "zh": "研究聚焦于ImageNet，未充分探索对其他数据集的泛化。"}, {"en": "Small patches improve performance but significantly reduce throughput and increase memory usage.", "zh": "小patch提升性能但显著降低吞吐量并增加内存使用。"}, {"en": "DINO requires careful tuning of centering and sharpening to avoid collapse, which may be sensitive to hyperparameters.", "zh": "DINO需要仔细调整中心化和锐化以避免崩溃，这可能对超参数敏感。"}, {"en": "The method is evaluated on ViT and ResNet; applicability to other architectures is not verified.", "zh": "该方法在ViT和ResNet上评估，未验证对其他架构的适用性。"}, {"en": "Performance gains from multi-crop diminish with more views, suggesting diminishing returns.", "zh": "多裁剪带来的性能提升随视图数量增加而递减，表明收益递减。"}]}, "cites": 9383}, {"id": "pvelickovic-2104.13478", "pid": "pvelickovic", "arxiv": "2104.13478", "date": "2021-04-27", "venue": "cs.LG", "org": "Google DeepMind", "fields": ["deep-learning", "vision"], "tEn": "Geometric Deep Learning: Grids, Groups, Graphs, Geodesics, and Gauges", "tZh": "几何深度学习：网格、群、图、测地线和规范", "sEn": "Geometric deep learning unifies neural network architectures through geometric principles, enabling incorporation of physical knowledge and construction of future models.", "sZh": "几何深度学习通过几何原理统一神经网络架构，能够融入物理知识并构建未来模型。", "absEn": "The last decade has witnessed an experimental revolution in data science and machine learning, epitomised by deep learning methods. Indeed, many high-dimensional learning tasks previously thought to be beyond reach -- such as computer vision, playing Go, or protein folding -- are in fact feasible with appropriate computational scale. Remarkably, the essence of deep learning is built from two simple algorithmic principles: first, the notion of representation or feature learning, whereby adapted, often hierarchical, features capture the appropriate notion of regularity for each task, and second, learning by local gradient-descent type methods, typically implemented as backpropagation. While learning generic functions in high dimensions is a cursed estimation problem, most tasks of interest are not generic, and come with essential pre-defined regularities arising from the underlying low-dimensionality and structure of the physical world. This text is concerned with exposing these regularities through unified geometric principles that can be applied throughout a wide spectrum of applications. Such a 'geometric unification' endeavour, in the spirit of Felix Klein's Erlangen Program, serves a dual purpose: on one hand, it provides a common mathematical framework to study the most successful neural network architectures, such as CNNs, RNNs, GNNs, and Transformers. On the other hand, it gives a constructive procedure to incorporate prior physical knowledge into neural architectures and provide principled way to build future architectures yet to be invented.", "absZh": "过去十年见证了数据科学和机器学习的实验革命，以深度学习方法为代表。事实上，许多以前被认为遥不可及的高维学习任务——例如计算机视觉、围棋或蛋白质折叠——在适当的计算规模下是可行的。值得注意的是，深度学习的本质建立在两个简单的算法原理之上：第一，表示或特征学习的概念，通过适应性的、通常是层次化的特征来捕捉每个任务的适当规律；第二，通过局部梯度下降类型的方法进行学习，通常以反向传播实现。虽然在高维中学习通用函数是一个诅咒性的估计问题，但大多数感兴趣的任务并非通用，而是带有来自物理世界底层低维性和结构的基本预定义规律。本文旨在通过统一的几何原理揭示这些规律，这些原理可广泛应用于各种领域。这种“几何统一”的努力，秉承菲利克斯·克莱因的埃尔朗根纲领精神，具有双重目的：一方面，它提供了一个共同的数学框架来研究最成功的神经网络架构，如CNN、RNN、GNN和Transformer；另一方面，它提供了一种建设性的程序，将先验物理知识融入神经架构，并为构建尚未发明的未来架构提供原则性方法。", "insights": {"contrib": [{"en": "Unifies deep learning architectures (CNNs, RNNs, GNNs, Transformers) under geometric principles.", "zh": "将深度学习架构（CNN、RNN、GNN、Transformer）统一在几何原理之下。"}, {"en": "Reveals that high-dimensional learning tasks leverage low-dimensional structure and physical regularities.", "zh": "揭示高维学习任务利用低维结构和物理规律。"}, {"en": "Provides a constructive procedure to incorporate prior physical knowledge into neural architectures.", "zh": "提供将先验物理知识融入神经架构的构造性方法。"}, {"en": "Extends Felix Klein's Erlangen Program to modern machine learning for principled architecture design.", "zh": "将Felix Klein的Erlangen纲领扩展到现代机器学习，实现有原则的架构设计。"}, {"en": "Demonstrates that deep learning's success stems from representation learning and local gradient descent.", "zh": "证明深度学习的成功源于表示学习和局部梯度下降。"}, {"en": "Offers a common mathematical framework for studying and inventing neural network architectures.", "zh": "为研究和发明神经网络架构提供统一的数学框架。"}], "limits": [{"en": "Focuses on geometric principles, may not cover all deep learning aspects like optimization or generalization.", "zh": "聚焦几何原理，可能未涵盖优化或泛化等所有深度学习方面。"}, {"en": "Assumes underlying low-dimensional structure, which may not hold for all real-world tasks.", "zh": "假设存在底层低维结构，但并非所有实际任务都满足。"}, {"en": "Primarily theoretical; practical implementation details and computational costs are not addressed.", "zh": "主要为理论性，未涉及实际实现细节和计算成本。"}, {"en": "The unification may oversimplify differences between architectures like CNNs and Transformers.", "zh": "统一可能过度简化CNN与Transformer等架构间的差异。"}, {"en": "Does not provide empirical validation or benchmarks for the proposed geometric framework.", "zh": "未对所提几何框架提供实证验证或基准测试。"}]}, "cites": 1615}, {"id": "jianlinsu-2104.09864", "pid": "jianlinsu", "arxiv": "2104.09864", "date": "2021-04-20", "venue": "cs.CL", "org": "Zhuiyi Technology", "fields": ["nlp", "deep-learning"], "tEn": "RoFormer: Enhanced Transformer with Rotary Position Embedding", "tZh": "RoFormer: 增强型Transformer与旋转位置嵌入", "sEn": "Rotary Position Embedding (RoPE) encodes absolute positions with rotation matrices and captures relative position dependencies, improving Transformer performance on long texts.", "sZh": "旋转位置嵌入（RoPE）通过旋转矩阵编码绝对位置并捕捉相对位置依赖，提升了Transformer在长文本上的性能。", "absEn": "Position encoding recently has shown effective in the transformer architecture. It enables valuable supervision for dependency modeling between elements at different positions of the sequence. In this paper, we first investigate various methods to integrate positional information into the learning process of transformer-based language models. Then, we propose a novel method named Rotary Position Embedding(RoPE) to effectively leverage the positional information. Specifically, the proposed RoPE encodes the absolute position with a rotation matrix and meanwhile incorporates the explicit relative position dependency in self-attention formulation. Notably, RoPE enables valuable properties, including the flexibility of sequence length, decaying inter-token dependency with increasing relative distances, and the capability of equipping the linear self-attention with relative position encoding. Finally, we evaluate the enhanced transformer with rotary position embedding, also called RoFormer, on various long text classification benchmark datasets. Our experiments show that it consistently overcomes its alternatives. Furthermore, we provide a theoretical analysis to explain some experimental results. RoFormer is already integrated into Huggingface: \\url{https://huggingface.co/docs/transformers/model_doc/roformer}.", "absZh": "位置编码在Transformer架构中已被证明有效，它能为序列中不同位置的元素之间的依赖建模提供有价值的监督。本文首先研究了将位置信息整合到基于Transformer的语言模型学习过程中的各种方法。然后，我们提出了一种名为旋转位置嵌入（RoPE）的新方法，以有效利用位置信息。具体来说，所提出的RoPE通过旋转矩阵编码绝对位置，同时在自注意力公式中融入显式的相对位置依赖。值得注意的是，RoPE具有有价值的特性，包括序列长度的灵活性、随着相对距离增加而衰减的令牌间依赖，以及为线性自注意力配备相对位置编码的能力。最后，我们在各种长文本分类基准数据集上评估了带有旋转位置嵌入的增强型Transformer，也称为RoFormer。我们的实验表明，它始终优于其他替代方案。此外，我们提供了理论分析来解释一些实验结果。RoFormer已集成到Huggingface中：\\url{https://huggingface.co/docs/transformers/model_doc/roformer}。", "insights": {"contrib": [{"en": "Proposes Rotary Position Embedding (RoPE) that encodes absolute position via rotation matrix and relative position via inner product.", "zh": "提出旋转位置编码（RoPE），通过旋转矩阵编码绝对位置，并通过内积编码相对位置。"}, {"en": "Achieves long-term decay property where inter-token dependency decreases with increasing relative distance.", "zh": "实现长期衰减特性，即词元间依赖随相对距离增加而衰减。"}, {"en": "Enables compatibility with linear self-attention, allowing relative position encoding without quadratic complexity.", "zh": "兼容线性自注意力，无需二次复杂度即可实现相对位置编码。"}, {"en": "Demonstrates faster convergence in pre-training compared to baseline models with other position encoding methods.", "zh": "在预训练中相比其他位置编码方法的基线模型收敛更快。"}, {"en": "Outperforms alternatives on long text classification benchmarks, including English and Chinese datasets.", "zh": "在英文和中文长文本分类基准上优于替代方法。"}, {"en": "Provides theoretical analysis explaining the properties and effectiveness of RoPE.", "zh": "提供理论分析解释RoPE的性质和有效性。"}], "limits": [{"en": "Lacks thorough explanation for faster convergence compared to other position encoding strategies.", "zh": "缺乏对相比其他位置编码策略更快收敛的透彻解释。"}, {"en": "No faithful explanation for superior long-text performance despite long-term decay property.", "zh": "尽管有长期衰减特性，但未对长文本优越性能给出可靠解释。"}, {"en": "Requires significant hardware resources for pre-training due to Transformer-based infrastructure.", "zh": "基于Transformer架构，预训练需要大量硬件资源。"}, {"en": "Theoretical analysis limited to 2D subspaces, generalization to higher dimensions relies on linearity assumption.", "zh": "理论分析限于2D子空间，推广到更高维度依赖线性假设。"}, {"en": "Experimental validation primarily on classification tasks; other NLP tasks not extensively evaluated.", "zh": "实验验证主要针对分类任务，其他NLP任务未广泛评估。"}]}, "cites": 5641}, {"id": "lecun-2103.03230", "pid": "lecun", "arxiv": "2103.03230", "date": "2021-03-04", "venue": "cs.CV", "fields": ["vision", "deep-learning"], "tEn": "Barlow Twins: Self-Supervised Learning via Redundancy Reduction", "tZh": "Barlow Twins: 通过冗余减少实现自监督学习", "sEn": "Barlow Twins avoids collapse by making the cross-correlation matrix close to identity, reducing redundancy between embedding components.", "sZh": "Barlow Twins通过使互相关矩阵接近单位矩阵来避免坍塌，减少嵌入向量分量间的冗余。", "absEn": "Self-supervised learning (SSL) is rapidly closing the gap with supervised methods on large computer vision benchmarks. A successful approach to SSL is to learn embeddings which are invariant to distortions of the input sample. However, a recurring issue with this approach is the existence of trivial constant solutions. Most current methods avoid such solutions by careful implementation details. We propose an objective function that naturally avoids collapse by measuring the cross-correlation matrix between the outputs of two identical networks fed with distorted versions of a sample, and making it as close to the identity matrix as possible. This causes the embedding vectors of distorted versions of a sample to be similar, while minimizing the redundancy between the components of these vectors. The method is called Barlow Twins, owing to neuroscientist H. Barlow's redundancy-reduction principle applied to a pair of identical networks. Barlow Twins does not require large batches nor asymmetry between the network twins such as a predictor network, gradient stopping, or a moving average on the weight updates. Intriguingly it benefits from very high-dimensional output vectors. Barlow Twins outperforms previous methods on ImageNet for semi-supervised classification in the low-data regime, and is on par with current state of the art for ImageNet classification with a linear classifier head, and for transfer tasks of classification and object detection.", "absZh": "自监督学习（SSL）正在迅速缩小与大型计算机视觉基准测试中监督方法的差距。一种成功的SSL方法是学习对输入样本的扭曲具有不变性的嵌入。然而，这种方法的一个反复出现的问题是存在平凡的常数解。大多数当前方法通过仔细的实现细节来避免此类解。我们提出了一种目标函数，通过测量两个相同网络（输入样本的扭曲版本）输出的互相关矩阵，并使其尽可能接近单位矩阵，从而自然地避免坍塌。这使得样本扭曲版本的嵌入向量相似，同时最小化这些向量分量之间的冗余。该方法被称为Barlow Twins，源于神经科学家H. Barlow的冗余减少原理应用于一对相同的网络。Barlow Twins不需要大批量或网络孪生之间的不对称性，如预测网络、梯度停止或权重更新的移动平均。有趣的是，它受益于非常高维的输出向量。Barlow Twins在低数据场景下的半监督分类中优于ImageNet上的先前方法，并且在具有线性分类头的ImageNet分类以及分类和对象检测的迁移任务中与当前最先进水平相当。", "insights": {"contrib": [{"en": "Proposes Barlow Twins, a self-supervised learning method using redundancy reduction to avoid trivial constant solutions.", "zh": "提出Barlow Twins，一种通过冗余减少避免平凡常数解的自监督学习方法。"}, {"en": "Objective function measures cross-correlation matrix between twin network outputs and makes it close to identity matrix.", "zh": "目标函数测量孪生网络输出之间的互相关矩阵，并使其接近单位矩阵。"}, {"en": "Does not require large batches, predictor networks, stop-gradients, or momentum encoders, simplifying implementation.", "zh": "不需要大批量、预测网络、梯度停止或动量编码器，简化了实现。"}, {"en": "Benefits from very high-dimensional output vectors, unlike contrastive methods that saturate.", "zh": "受益于非常高维的输出向量，与饱和的对比方法不同。"}, {"en": "Outperforms prior methods on ImageNet semi-supervised classification with 1% labels (55% top-1 accuracy).", "zh": "在ImageNet半监督分类（1%标签）上优于先前方法（55% top-1准确率）。"}, {"en": "Matches state-of-the-art on ImageNet linear classification and transfer tasks for classification and object detection.", "zh": "在ImageNet线性分类以及分类和物体检测的迁移任务上达到最先进水平。"}], "limits": [{"en": "Performance degrades when certain data augmentations are removed, unlike BYOL which is more robust.", "zh": "移除某些数据增强时性能下降，不像BYOL那样鲁棒。"}, {"en": "Requires careful tuning of the trade-off parameter λ for optimal performance.", "zh": "需要仔细调整权衡参数λ以获得最佳性能。"}, {"en": "High-dimensional embeddings increase memory requirements, limiting scalability beyond 16,000 dimensions.", "zh": "高维嵌入增加内存需求，限制了超过16,000维的可扩展性。"}, {"en": "Method is evaluated only on computer vision tasks; applicability to other domains like NLP is unexplored.", "zh": "该方法仅在计算机视觉任务上评估；在其他领域如NLP的适用性尚未探索。"}, {"en": "Theoretical connection to Information Bottleneck is heuristic; alternative implementations may yield different results.", "zh": "与信息瓶颈的理论联系是启发式的；替代实现可能产生不同结果。"}]}, "cites": 3039, "org": "Meta AI"}, {"id": "aradford-2103.00020", "pid": "aradford", "arxiv": "2103.00020", "date": "2021-02-26", "venue": "cs.CV", "org": "OpenAI", "fields": ["vision", "nlp"], "tEn": "Learning Transferable Visual Models From Natural Language Supervision", "tZh": "从自然语言监督中学习可迁移的视觉模型", "sEn": "Predicting which caption goes with which image is an efficient and scalable way to learn SOTA image representations from scratch.", "sZh": "预测哪段文字描述对应哪张图像是一种高效且可扩展的方法，可以从零开始学习最先进的图像表示。", "absEn": "State-of-the-art computer vision systems are trained to predict a fixed set of predetermined object categories. This restricted form of supervision limits their generality and usability since additional labeled data is needed to specify any other visual concept. Learning directly from raw text about images is a promising alternative which leverages a much broader source of supervision. We demonstrate that the simple pre-training task of predicting which caption goes with which image is an efficient and scalable way to learn SOTA image representations from scratch on a dataset of 400 million (image, text) pairs collected from the internet. After pre-training, natural language is used to reference learned visual concepts (or describe new ones) enabling zero-shot transfer of the model to downstream tasks. We study the performance of this approach by benchmarking on over 30 different existing computer vision datasets, spanning tasks such as OCR, action recognition in videos, geo-localization, and many types of fine-grained object classification. The model transfers non-trivially to most tasks and is often competitive with a fully supervised baseline without the need for any dataset specific training. For instance, we match the accuracy of the original ResNet-50 on ImageNet zero-shot without needing to use any of the 1.28 million training examples it was trained on. We release our code and pre-trained model weights at https://github.com/OpenAI/CLIP.", "absZh": "最先进的计算机视觉系统通常被训练来预测一组固定的预定对象类别。这种受限的监督形式限制了它们的通用性和可用性，因为需要额外的标注数据来指定任何其他视觉概念。直接从关于图像的原始文本中学习是一种有前景的替代方案，它利用了更广泛的监督来源。我们证明，简单的预训练任务——预测哪段文字描述对应哪张图像——是一种高效且可扩展的方法，可以在从互联网收集的4亿（图像，文本）对数据集上从零开始学习最先进的图像表示。预训练后，使用自然语言来引用学到的视觉概念（或描述新的概念），使得模型能够零样本迁移到下游任务。我们通过在30多个不同的现有计算机视觉数据集上进行基准测试来研究这种方法的性能，这些数据集涵盖OCR、视频中的动作识别、地理定位以及多种细粒度对象分类等任务。该模型在大多数任务上都能非平凡地迁移，并且通常与完全监督的基线模型竞争，而无需任何特定数据集的训练。例如，我们在ImageNet上零样本匹配了原始ResNet-50的准确率，而无需使用其训练所用的128万张训练样本。我们在https://github.com/OpenAI/CLIP上发布了我们的代码和预训练模型权重。", "insights": {"contrib": [{"en": "Proposes CLIP, a contrastive language-image pre-training method that learns visual representations from natural language supervision at scale.", "zh": "提出CLIP，一种对比式语言-图像预训练方法，从自然语言监督中大规模学习视觉表征。"}, {"en": "Demonstrates zero-shot transfer to over 30 datasets, matching ResNet-50 on ImageNet without any training examples.", "zh": "展示了对30多个数据集的零样本迁移能力，在ImageNet上无需任何训练样本即匹配ResNet-50。"}, {"en": "Shows that zero-shot CLIP models exhibit significantly higher effective robustness to natural distribution shifts than supervised ImageNet models.", "zh": "表明零样本CLIP模型对自然分布偏移的有效鲁棒性显著高于有监督的ImageNet模型。"}, {"en": "Introduces a new dataset of 400 million (image, text) pairs collected from the internet for pre-training.", "zh": "引入了一个从互联网收集的4亿（图像，文本）对的新数据集用于预训练。"}, {"en": "Finds that zero-shot CLIP matches the performance of 4-shot logistic regression on the same feature space, highlighting the efficiency of natural language supervision.", "zh": "发现零样本CLIP在相同特征空间上匹配4样本逻辑回归的性能，凸显自然语言监督的效率。"}, {"en": "Demonstrates that CLIP learns a wide range of tasks during pre-training, including OCR, geo-localization, and action recognition.", "zh": "展示CLIP在预训练期间学习了广泛的任务，包括OCR、地理定位和动作识别。"}], "limits": [{"en": "Zero-shot CLIP underperforms on specialized tasks like satellite image classification and lymph node tumor detection.", "zh": "零样本CLIP在卫星图像分类和淋巴结肿瘤检测等专业任务上表现不佳。"}, {"en": "The study focuses on zero-shot and linear probe evaluation, not end-to-end fine-tuning.", "zh": "研究聚焦于零样本和线性探测评估，而非端到端微调。"}, {"en": "The pre-training dataset may contain biases from internet sources, affecting model fairness.", "zh": "预训练数据集可能包含来自互联网来源的偏见，影响模型公平性。"}, {"en": "CLIP's zero-shot performance is limited by polysemy and lack of context in class names.", "zh": "CLIP的零样本性能受限于类别名称的多义性和缺乏上下文。"}, {"en": "The study does not explore the combination of zero-shot and few-shot learning methods.", "zh": "研究未探索零样本和少样本学习方法的结合。"}]}, "cites": 50732}, {"id": "chaojia-2102.05918", "pid": "chaojia", "arxiv": "2102.05918", "date": "2021-02-11", "venue": "cs.CV", "org": "Google", "fields": ["vision", "nlp"], "tEn": "Scaling Up Visual and Vision-Language Representation Learning With Noisy Text Supervision", "tZh": "利用噪声文本监督扩展视觉和视觉-语言表示学习", "sEn": "Scaling up visual and vision-language representation learning with noisy text supervision achieves state-of-the-art results.", "sZh": "利用噪声文本监督扩展视觉和视觉-语言表示学习，即使使用简单架构也能达到最先进水平。", "absEn": "Pre-trained representations are becoming crucial for many NLP and perception tasks. While representation learning in NLP has transitioned to training on raw text without human annotations, visual and vision-language representations still rely heavily on curated training datasets that are expensive or require expert knowledge. For vision applications, representations are mostly learned using datasets with explicit class labels such as ImageNet or OpenImages. For vision-language, popular datasets like Conceptual Captions, MSCOCO, or CLIP all involve a non-trivial data collection (and cleaning) process. This costly curation process limits the size of datasets and hence hinders the scaling of trained models. In this paper, we leverage a noisy dataset of over one billion image alt-text pairs, obtained without expensive filtering or post-processing steps in the Conceptual Captions dataset. A simple dual-encoder architecture learns to align visual and language representations of the image and text pairs using a contrastive loss. We show that the scale of our corpus can make up for its noise and leads to state-of-the-art representations even with such a simple learning scheme. Our visual representation achieves strong performance when transferred to classification tasks such as ImageNet and VTAB. The aligned visual and language representations enables zero-shot image classification and also set new state-of-the-art results on Flickr30K and MSCOCO image-text retrieval benchmarks, even when compared with more sophisticated cross-attention models. The representations also enable cross-modality search with complex text and text + image queries.", "absZh": "预训练表示对许多自然语言处理和感知任务至关重要。虽然自然语言处理中的表示学习已转向无需人工标注的原始文本训练，但视觉和视觉-语言表示仍严重依赖昂贵或需要专业知识的精心策划数据集。对于视觉应用，表示主要使用带有显式类别标签的数据集（如ImageNet或OpenImages）学习。对于视觉-语言，流行的数据集如Conceptual Captions、MSCOCO或CLIP都涉及非平凡的数据收集（和清理）过程。这种昂贵的策划过程限制了数据集的大小，从而阻碍了训练模型的扩展。在本文中，我们利用了一个超过十亿图像替代文本对的噪声数据集，该数据集无需Conceptual Captions数据集中昂贵的过滤或后处理步骤。一个简单的双编码器架构使用对比损失学习对齐图像和文本对的视觉与语言表示。我们表明，语料库的规模可以弥补其噪声，即使使用如此简单的学习方案也能产生最先进的表示。我们的视觉表示在转移到ImageNet和VTAB等分类任务时表现出色。对齐的视觉和语言表示实现了零样本图像分类，并在Flickr30K和MSCOCO图像-文本检索基准上创造了新的最先进结果，即使与更复杂的交叉注意力模型相比也是如此。这些表示还支持复杂文本和文本+图像查询的跨模态搜索。", "insights": {"contrib": [{"en": "Leverages a noisy dataset of over one billion image alt-text pairs without expensive filtering.", "zh": "利用超过十亿图像alt-text对的噪声数据集，无需昂贵过滤。"}, {"en": "Simple dual-encoder architecture with contrastive loss aligns visual and language representations.", "zh": "采用简单双编码器架构和对比损失对齐视觉与语言表示。"}, {"en": "Achieves state-of-the-art zero-shot image classification on ImageNet with 76.4% top-1 accuracy.", "zh": "在ImageNet上实现76.4% top-1准确率的零样本图像分类。"}, {"en": "Sets new state-of-the-art results on Flickr30K and MSCOCO image-text retrieval benchmarks.", "zh": "在Flickr30K和MSCOCO图像-文本检索基准上创下新纪录。"}, {"en": "Enables cross-modality search with complex text and text + image queries.", "zh": "支持复杂文本和文本+图像查询的跨模态搜索。"}, {"en": "Shows that data scale can compensate for noise, outperforming curated datasets with 4x size.", "zh": "表明数据规模可弥补噪声，以4倍大小超越精心策划的数据集。"}], "limits": [{"en": "Model may reinforce harmful stereotypes from noisy web alt-text data.", "zh": "模型可能强化来自噪声网络alt-text数据的有害刻板印象。"}, {"en": "Data balancing needed to prevent skewed performance across demographic groups.", "zh": "需要数据平衡以防止跨人口群体的性能偏差。"}, {"en": "Potential misuse for surveillance or nefarious purposes should be prohibited.", "zh": "应禁止用于监控或恶意目的的潜在滥用。"}, {"en": "Additional testing required for sensitive religious or cultural items to mitigate mislabeling.", "zh": "需要对敏感宗教或文化物品进行额外测试以减轻错误标签影响。"}, {"en": "Model performance may degrade on tasks requiring fine-grained visual reasoning beyond retrieval.", "zh": "在需要超越检索的细粒度视觉推理任务上，模型性能可能下降。"}]}, "cites": 5646}, {"id": "fedus-2101.03961", "pid": "fedus", "arxiv": "2101.03961", "date": "2021-01-11", "venue": "cs.LG", "fields": ["nlp", "efficiency"], "tEn": "Switch Transformers: Scaling to Trillion Parameter Models with Simple and Efficient Sparsity", "tZh": "Switch Transformers：通过简单高效的稀疏性扩展到万亿参数模型", "sEn": "Switch Transformers simplify MoE routing, reduce communication and training instability, enabling trillion-parameter models with up to 7x speedup.", "sZh": "Switch Transformers简化了混合专家路由，降低了通信成本和训练不稳定性，实现了万亿参数模型，速度提升高达7倍。", "absEn": "In deep learning, models typically reuse the same parameters for all inputs. Mixture of Experts (MoE) defies this and instead selects different parameters for each incoming example. The result is a sparsely-activated model -- with outrageous numbers of parameters -- but a constant computational cost. However, despite several notable successes of MoE, widespread adoption has been hindered by complexity, communication costs and training instability -- we address these with the Switch Transformer. We simplify the MoE routing algorithm and design intuitive improved models with reduced communication and computational costs. Our proposed training techniques help wrangle the instabilities and we show large sparse models may be trained, for the first time, with lower precision (bfloat16) formats. We design models based off T5-Base and T5-Large to obtain up to 7x increases in pre-training speed with the same computational resources. These improvements extend into multilingual settings where we measure gains over the mT5-Base version across all 101 languages. Finally, we advance the current scale of language models by pre-training up to trillion parameter models on the \"Colossal Clean Crawled Corpus\" and achieve a 4x speedup over the T5-XXL model.", "absZh": "在深度学习中，模型通常对所有输入重用相同的参数。混合专家（MoE）打破了这一惯例，为每个输入示例选择不同的参数。结果是一个稀疏激活的模型——参数数量惊人——但计算成本恒定。然而，尽管MoE取得了一些显著的成功，但其复杂性、通信成本和训练不稳定性阻碍了广泛采用——我们通过Switch Transformer解决了这些问题。我们简化了MoE路由算法，并设计了直观的改进模型，减少了通信和计算成本。我们提出的训练技术有助于控制不稳定性，并首次展示了可以使用较低精度（bfloat16）格式训练大型稀疏模型。我们基于T5-Base和T5-Large设计的模型在相同计算资源下实现了高达7倍的预训练速度提升。这些改进扩展到多语言设置，我们在所有101种语言上测量了相对于mT5-Base版本的增益。最后，我们通过在“Colossal Clean Crawled Corpus”上预训练高达万亿参数的模型，推进了当前语言模型的规模，并实现了比T5-XXL模型快4倍的速度。", "insights": {"contrib": [{"en": "Simplifies MoE routing to top-1 expert, reducing computation and communication costs.", "zh": "将 MoE 路由简化为 top-1 专家，降低计算和通信成本。"}, {"en": "Achieves up to 7x pre-training speedup over T5 with same FLOPs per token.", "zh": "在相同每 token FLOPs 下，预训练速度相比 T5 提升高达 7 倍。"}, {"en": "Introduces selective precision (bfloat16) training for large sparse models.", "zh": "引入选择性精度（bfloat16）训练大型稀疏模型。"}, {"en": "Demonstrates scaling to trillion parameters with 4x speedup over T5-XXL.", "zh": "展示扩展到万亿参数，相比 T5-XXL 实现 4 倍加速。"}, {"en": "Shows universal improvements across 101 languages in multilingual setting.", "zh": "在多语言设置中，所有 101 种语言均获得改进。"}, {"en": "Proposes expert dropout and distillation to preserve 30% quality gain with 99% compression.", "zh": "提出专家 dropout 和蒸馏，以 99% 压缩率保留 30% 的质量提升。"}], "limits": [{"en": "Training instability persists for largest models like Switch-XXL.", "zh": "最大模型（如 Switch-XXL）仍存在训练不稳定性。"}, {"en": "Downstream gains do not fully match upstream perplexity improvements.", "zh": "下游任务收益未能完全匹配上游困惑度改进。"}, {"en": "Fine-tuning quality depends on FLOPs per token and parameter count in unclear ways.", "zh": "微调质量与每 token FLOPs 和参数数量的关系尚不明确。"}, {"en": "Expert capacity factor introduces trade-off between token dropping and efficiency.", "zh": "专家容量因子在 token 丢弃和效率之间存在权衡。"}, {"en": "Distillation preserves only ~30% of sparse model quality gain.", "zh": "蒸馏仅保留约 30% 的稀疏模型质量提升。"}]}, "org": "Google", "cites": 4159}, {"id": "yangsong-2011.13456", "pid": "yangsong", "arxiv": "2011.13456", "date": "2020-11-26", "venue": "cs.LG", "org": "Stanford", "fields": ["generative", "deep-learning"], "tEn": "Score-Based Generative Modeling through Stochastic Differential Equations", "tZh": "基于随机微分方程的分数生成建模", "sEn": "We present a unified SDE framework for score-based generative modeling, enabling new sampling procedures, exact likelihood computation, and record-breaking image generation.", "sZh": "我们提出了一个统一的随机微分方程框架，用于分数生成建模，实现了新的采样程序、精确似然计算和创纪录的图像生成性能。", "absEn": "Creating noise from data is easy; creating data from noise is generative modeling. We present a stochastic differential equation (SDE) that smoothly transforms a complex data distribution to a known prior distribution by slowly injecting noise, and a corresponding reverse-time SDE that transforms the prior distribution back into the data distribution by slowly removing the noise. Crucially, the reverse-time SDE depends only on the time-dependent gradient field (\\aka, score) of the perturbed data distribution. By leveraging advances in score-based generative modeling, we can accurately estimate these scores with neural networks, and use numerical SDE solvers to generate samples. We show that this framework encapsulates previous approaches in score-based generative modeling and diffusion probabilistic modeling, allowing for new sampling procedures and new modeling capabilities. In particular, we introduce a predictor-corrector framework to correct errors in the evolution of the discretized reverse-time SDE. We also derive an equivalent neural ODE that samples from the same distribution as the SDE, but additionally enables exact likelihood computation, and improved sampling efficiency. In addition, we provide a new way to solve inverse problems with score-based models, as demonstrated with experiments on class-conditional generation, image inpainting, and colorization. Combined with multiple architectural improvements, we achieve record-breaking performance for unconditional image generation on CIFAR-10 with an Inception score of 9.89 and FID of 2.20, a competitive likelihood of 2.99 bits/dim, and demonstrate high fidelity generation of 1024 x 1024 images for the first time from a score-based generative model.", "absZh": "从数据中创建噪声很容易，但从噪声中创建数据则是生成建模。我们提出了一种随机微分方程，通过缓慢注入噪声，将复杂的数据分布平滑地转换为已知的先验分布，并提出了相应的反向时间随机微分方程，通过缓慢去除噪声，将先验分布转换回数据分布。关键在于，反向时间随机微分方程仅依赖于扰动数据分布的时间相关梯度场（即分数）。通过利用分数生成建模的进展，我们可以用神经网络准确估计这些分数，并使用数值随机微分方程求解器生成样本。我们表明，该框架涵盖了分数生成建模和扩散概率建模中的先前方法，从而实现了新的采样程序和新的建模能力。特别是，我们引入了一个预测-校正框架来纠正离散化反向时间随机微分方程演化中的误差。我们还推导了一个等效的神经常微分方程，它从与随机微分方程相同的分布中采样，但此外还能实现精确的似然计算和更高的采样效率。此外，我们提供了一种用分数模型解决逆问题的新方法，并通过类条件生成、图像修复和着色实验进行了演示。结合多项架构改进，我们在CIFAR-10上实现了无条件图像生成的创纪录性能，Inception得分为9.89，FID为2.20，竞争性似然为2.99 bits/dim，并首次从基于分数的生成模型展示了1024×1024图像的高保真生成。", "insights": {"contrib": [{"en": "Unified score-based generative modeling framework via stochastic differential equations (SDEs).", "zh": "通过随机微分方程（SDE）统一了基于分数的生成建模框架。"}, {"en": "Predictor-corrector (PC) samplers combining numerical SDE solvers with score-based MCMC.", "zh": "预测-校正（PC）采样器，结合数值SDE求解器与基于分数的MCMC。"}, {"en": "Probability flow ODE enabling exact likelihood computation and efficient sampling.", "zh": "概率流ODE实现精确似然计算和高效采样。"}, {"en": "Controllable generation for inverse problems using unconditional score models.", "zh": "使用无条件分数模型实现逆问题的可控生成。"}, {"en": "Record-breaking unconditional image generation on CIFAR-10 (Inception 9.89, FID 2.20).", "zh": "在CIFAR-10上创下无条件图像生成记录（Inception 9.89，FID 2.20）。"}, {"en": "First high-fidelity 1024x1024 image generation from a score-based model.", "zh": "首次从基于分数的模型生成高保真1024x1024图像。"}], "limits": [{"en": "Sampling slower than GANs on same datasets.", "zh": "在相同数据集上采样速度慢于GAN。"}, {"en": "Many hyper-parameters for different samplers require tuning.", "zh": "不同采样器的大量超参数需要调优。"}, {"en": "Likelihood computation limited to affine drift SDEs.", "zh": "似然计算限于仿射漂移SDE。"}, {"en": "Conditional generation requires known forward process gradient.", "zh": "条件生成需要已知的前向过程梯度。"}, {"en": "Framework assumes continuous state spaces and Gaussian perturbations.", "zh": "框架假设连续状态空间和高斯扰动。"}]}, "cites": 11064}, {"id": "adosovitskiy-2010.11929", "pid": "adosovitskiy", "arxiv": "2010.11929", "date": "2020-10-22", "venue": "cs.CV", "org": "Google", "fields": ["vision", "deep-learning"], "tEn": "An Image is Worth 16x16 Words: Transformers for Image Recognition at Scale", "tZh": "一张图片等价于16x16个词：用于大规模图像识别的Transformer", "sEn": "A pure transformer applied directly to image patches can match or exceed state-of-the-art CNNs on image classification, with less training compute.", "sZh": "直接将纯Transformer应用于图像块，可以在图像分类上达到或超越最先进的CNN，且训练计算量更少。", "absEn": "While the Transformer architecture has become the de-facto standard for natural language processing tasks, its applications to computer vision remain limited. In vision, attention is either applied in conjunction with convolutional networks, or used to replace certain components of convolutional networks while keeping their overall structure in place. We show that this reliance on CNNs is not necessary and a pure transformer applied directly to sequences of image patches can perform very well on image classification tasks. When pre-trained on large amounts of data and transferred to multiple mid-sized or small image recognition benchmarks (ImageNet, CIFAR-100, VTAB, etc.), Vision Transformer (ViT) attains excellent results compared to state-of-the-art convolutional networks while requiring substantially fewer computational resources to train.", "absZh": "虽然Transformer架构已成为自然语言处理任务的事实标准，但其在计算机视觉中的应用仍然有限。在视觉领域，注意力机制要么与卷积网络结合使用，要么用于替换卷积网络的某些组件，同时保留其整体结构。我们表明，这种对CNN的依赖并非必要，直接将纯Transformer应用于图像块序列可以在图像分类任务上表现非常出色。当在大量数据上预训练并迁移到多个中、小规模图像识别基准（ImageNet、CIFAR-100、VTAB等）时，Vision Transformer（ViT）相比最先进的卷积网络取得了优异的结果，同时训练所需计算资源大幅减少。", "insights": {"contrib": [{"en": "Shows pure Transformer applied to image patches achieves strong image classification performance.", "zh": "展示了将纯Transformer直接应用于图像块可实现强大的图像分类性能。"}, {"en": "Demonstrates Vision Transformer (ViT) matches or exceeds state-of-the-art CNNs on large-scale pre-training.", "zh": "证明了Vision Transformer（ViT）在大规模预训练上匹配或超越最先进的CNN。"}, {"en": "Reveals large-scale training overcomes lack of inductive biases in ViT.", "zh": "揭示了大规模训练克服了ViT中归纳偏置的缺乏。"}, {"en": "Provides controlled scaling study showing ViT's favorable performance-to-cost ratio.", "zh": "提供了受控的规模扩张研究，显示ViT有利的性能成本比。"}, {"en": "Analyzes ViT internal representations, showing global attention and learned position embeddings.", "zh": "分析了ViT内部表示，展示了全局注意力和学习到的位置嵌入。"}, {"en": "Explores self-supervised pre-training for ViT, showing potential for future improvement.", "zh": "探索了ViT的自监督预训练，展示了未来改进的潜力。"}], "limits": [{"en": "ViT underperforms CNNs on small datasets due to lack of inductive biases.", "zh": "由于缺乏归纳偏置，ViT在小型数据集上表现不如CNN。"}, {"en": "Requires large-scale pre-training (e.g., JFT-300M) to achieve state-of-the-art results.", "zh": "需要大规模预训练（如JFT-300M）才能达到最先进结果。"}, {"en": "Self-supervised pre-training still lags behind supervised pre-training by 4% on ImageNet.", "zh": "自监督预训练在ImageNet上仍落后监督预训练4%。"}, {"en": "ViT has not been applied to other vision tasks like detection and segmentation.", "zh": "ViT尚未应用于检测和分割等其他视觉任务。"}, {"en": "Position embeddings require interpolation for higher resolution fine-tuning.", "zh": "位置嵌入需要插值以进行更高分辨率的微调。"}]}, "cites": 64684}, {"id": "sermon-2010.02502", "pid": "sermon", "arxiv": "2010.02502", "date": "2020-10-06", "venue": "cs.LG", "org": "Stanford", "fields": ["generative", "efficiency"], "tEn": "Denoising Diffusion Implicit Models", "tZh": "去噪扩散隐式模型", "sEn": "DDIMs accelerate sampling from diffusion models by 10-50x while maintaining high image quality.", "sZh": "DDIMs 将扩散模型的采样速度提升了 10 到 50 倍，同时保持了高质量的图像生成。", "absEn": "Denoising diffusion probabilistic models (DDPMs) have achieved high quality image generation without adversarial training, yet they require simulating a Markov chain for many steps to produce a sample. To accelerate sampling, we present denoising diffusion implicit models (DDIMs), a more efficient class of iterative implicit probabilistic models with the same training procedure as DDPMs. In DDPMs, the generative process is defined as the reverse of a Markovian diffusion process. We construct a class of non-Markovian diffusion processes that lead to the same training objective, but whose reverse process can be much faster to sample from. We empirically demonstrate that DDIMs can produce high quality samples $10 \\times$ to $50 \\times$ faster in terms of wall-clock time compared to DDPMs, allow us to trade off computation for sample quality, and can perform semantically meaningful image interpolation directly in the latent space.", "absZh": "去噪扩散概率模型（DDPMs）无需对抗训练即可生成高质量图像，但需要模拟许多步的马尔可夫链才能产生样本。为了加速采样，我们提出了去噪扩散隐式模型（DDIMs），这是一类更高效的迭代隐式概率模型，其训练过程与 DDPMs 相同。在 DDPMs 中，生成过程被定义为马尔可夫扩散过程的逆过程。我们构建了一类非马尔可夫扩散过程，它们具有相同的训练目标，但其逆过程的采样速度可以快得多。实验表明，DDIMs 在生成高质量样本方面，相比 DDPMs 在墙钟时间上可以快 10 到 50 倍，允许我们在计算和样本质量之间进行权衡，并且可以直接在潜在空间中进行有语义意义的图像插值。", "insights": {"contrib": [{"en": "Proposes denoising diffusion implicit models (DDIMs) for faster sampling.", "zh": "提出去噪扩散隐式模型（DDIM）以实现更快的采样。"}, {"en": "Constructs non-Markovian diffusion processes with same training objective as DDPMs.", "zh": "构建了与DDPM具有相同训练目标的非马尔可夫扩散过程。"}, {"en": "Achieves 10× to 50× speedup in wall-clock time for high-quality image generation.", "zh": "在高质量图像生成上实现10倍到50倍的加速。"}, {"en": "Enables trade-off between computation and sample quality via step count adjustment.", "zh": "通过调整步数实现计算与样本质量之间的权衡。"}, {"en": "Demonstrates semantically meaningful image interpolation directly in latent space.", "zh": "展示了直接在潜在空间中进行语义有意义的图像插值。"}, {"en": "Shows deterministic generation process allows encoding and reconstruction of observations.", "zh": "展示了确定性生成过程允许对观测进行编码和重建。"}], "limits": [{"en": "Sample quality may degrade with very few steps compared to full-step DDPM.", "zh": "与全步数DDPM相比，极少步数下样本质量可能下降。"}, {"en": "Deterministic process may reduce diversity compared to stochastic DDPM.", "zh": "确定性过程可能比随机DDPM降低多样性。"}, {"en": "Reconstruction error increases with fewer steps in encoding-decoding.", "zh": "编码-解码中步数越少重建误差越大。"}, {"en": "Method assumes same training objective as DDPM, limiting architectural changes.", "zh": "方法假设与DDPM相同的训练目标，限制了架构变化。"}, {"en": "Empirical validation limited to image generation tasks.", "zh": "实证验证仅限于图像生成任务。"}]}, "cites": 12416}, {"id": "kchoroman-2009.14794", "pid": "kchoroman", "arxiv": "2009.14794", "date": "2020-09-30", "venue": "cs.LG", "org": "Google", "fields": ["efficiency", "deep-learning"], "tEn": "Rethinking Attention with Performers", "tZh": "重新思考注意力机制：Performer", "sEn": "Performers achieve linear complexity for full-rank attention with provable accuracy.", "sZh": "Performer以可证明的精度实现全秩注意力的线性复杂度。", "absEn": "We introduce Performers, Transformer architectures which can estimate regular (softmax) full-rank-attention Transformers with provable accuracy, but using only linear (as opposed to quadratic) space and time complexity, without relying on any priors such as sparsity or low-rankness. To approximate softmax attention-kernels, Performers use a novel Fast Attention Via positive Orthogonal Random features approach (FAVOR+), which may be of independent interest for scalable kernel methods. FAVOR+ can be also used to efficiently model kernelizable attention mechanisms beyond softmax. This representational power is crucial to accurately compare softmax with other kernels for the first time on large-scale tasks, beyond the reach of regular Transformers, and investigate optimal attention-kernels. Performers are linear architectures fully compatible with regular Transformers and with strong theoretical guarantees: unbiased or nearly-unbiased estimation of the attention matrix, uniform convergence and low estimation variance. We tested Performers on a rich set of tasks stretching from pixel-prediction through text models to protein sequence modeling. We demonstrate competitive results with other examined efficient sparse and dense attention methods, showcasing effectiveness of the novel attention-learning paradigm leveraged by Performers.", "absZh": "我们引入了Performer，这是一种Transformer架构，能够以可证明的精度估计常规（softmax）全秩注意力Transformer，但仅使用线性（而非二次）空间和时间复杂度，且不依赖于任何先验假设（如稀疏性或低秩性）。为了近似softmax注意力核，Performer采用了一种新颖的基于正正交随机特征的快速注意力方法（FAVOR+），该方法对于可扩展的核方法可能具有独立的意义。FAVOR+还可用于高效建模除softmax之外的其他可核化注意力机制。这种表示能力对于首次在超出常规Transformer能力范围的大规模任务上精确比较softmax与其他核，并研究最优注意力核至关重要。Performer是线性架构，与常规Transformer完全兼容，并具有强大的理论保证：注意力矩阵的无偏或近似无偏估计、一致收敛性和低估计方差。我们在从像素预测到文本模型再到蛋白质序列建模的丰富任务集上测试了Performer。我们展示了与其他经过检验的高效稀疏和密集注意力方法相比具有竞争力的结果，突显了Performer所利用的新型注意力学习范式的有效性。", "insights": {"contrib": [{"en": "Introduces Performers, linear Transformer architectures that estimate softmax full-rank attention with provable accuracy using linear space and time complexity.", "zh": "提出Performer，一种线性Transformer架构，能以可证明的精度估计softmax满秩注意力，且空间和时间复杂度为线性。"}, {"en": "Proposes FAVOR+ mechanism using positive orthogonal random features for unbiased, low-variance softmax kernel approximation.", "zh": "提出FAVOR+机制，利用正正交随机特征实现softmax核的无偏、低方差近似。"}, {"en": "Provides theoretical guarantees: unbiased estimation, uniform convergence, and lower variance for attention matrix approximation.", "zh": "提供理论保证：注意力矩阵估计的无偏性、一致收敛性和更低方差。"}, {"en": "Demonstrates competitive performance on diverse tasks including pixel prediction, text modeling, and protein sequence modeling.", "zh": "在像素预测、文本建模和蛋白质序列建模等多样化任务上展示了竞争性能。"}, {"en": "Enables backward compatibility with pre-trained Transformers via fine-tuning.", "zh": "通过微调实现与预训练Transformer的向后兼容。"}, {"en": "Extends attention beyond softmax to other kernelizable mechanisms, enabling large-scale kernel comparison.", "zh": "将注意力扩展到softmax之外的其他可核化机制，支持大规模核比较。"}], "limits": [{"en": "Requires periodic redrawing of random features for optimal training, adding minor overhead.", "zh": "需要定期重绘随机特征以达到最佳训练效果，增加少量开销。"}, {"en": "Approximation errors may propagate through multiple layers, requiring tight approximation for deep models.", "zh": "近似误差可能通过多层传播，深度模型需要更精确的近似。"}, {"en": "Orthogonal random features require m ≤ d, limiting the number of features to the embedding dimension.", "zh": "正交随机特征要求m ≤ d，限制了特征数量不超过嵌入维度。"}, {"en": "Performance on very long sequences beyond tested lengths (e.g., >12k tokens) is not fully validated.", "zh": "在测试长度（如>12k词元）之外的极长序列上的性能尚未充分验证。"}, {"en": "The method assumes isotropic distributions for orthogonalization, which may not hold for all kernels.", "zh": "该方法假设各向同性分布用于正交化，可能不适用于所有核。"}]}, "cites": 2317}, {"id": "louyang-2009.01325", "pid": "louyang", "arxiv": "2009.01325", "date": "2020-09-02", "venue": "cs.CL", "org": "OpenAI", "fields": ["nlp", "rl"], "tEn": "Learning to summarize from human feedback", "tZh": "从人类反馈中学习摘要生成", "sEn": "Training summarization models with human feedback significantly improves summary quality over traditional methods.", "sZh": "利用人类反馈训练摘要模型，能显著提升摘要质量，超越传统方法。", "absEn": "As language models become more powerful, training and evaluation are increasingly bottlenecked by the data and metrics used for a particular task. For example, summarization models are often trained to predict human reference summaries and evaluated using ROUGE, but both of these metrics are rough proxies for what we really care about -- summary quality. In this work, we show that it is possible to significantly improve summary quality by training a model to optimize for human preferences. We collect a large, high-quality dataset of human comparisons between summaries, train a model to predict the human-preferred summary, and use that model as a reward function to fine-tune a summarization policy using reinforcement learning. We apply our method to a version of the TL;DR dataset of Reddit posts and find that our models significantly outperform both human reference summaries and much larger models fine-tuned with supervised learning alone. Our models also transfer to CNN/DM news articles, producing summaries nearly as good as the human reference without any news-specific fine-tuning. We conduct extensive analyses to understand our human feedback dataset and fine-tuned models We establish that our reward model generalizes to new datasets, and that optimizing our reward model results in better summaries than optimizing ROUGE according to humans. We hope the evidence from our paper motivates machine learning researchers to pay closer attention to how their training loss affects the model behavior they actually want.", "absZh": "随着语言模型变得更加强大，训练和评估越来越受到特定任务数据和指标的瓶颈限制。例如，摘要模型通常被训练来预测人类参考摘要，并使用ROUGE进行评估，但这两个指标都是我们真正关心的摘要质量的粗略代理。在这项工作中，我们展示了通过训练模型优化人类偏好，可以显著提高摘要质量。我们收集了一个大规模、高质量的人类摘要比较数据集，训练了一个模型来预测人类偏好的摘要，并使用该模型作为奖励函数，通过强化学习微调摘要策略。我们将方法应用于Reddit帖子的TL;DR数据集版本，发现我们的模型显著优于人类参考摘要和仅通过监督学习微调的更大模型。我们的模型还迁移到CNN/DM新闻文章，无需任何新闻特定微调就能生成几乎与人类参考一样好的摘要。我们进行了广泛的分析以理解我们的人类反馈数据集和微调模型。我们确定奖励模型能泛化到新数据集，并且根据人类判断，优化奖励模型比优化ROUGE能产生更好的摘要。我们希望论文中的证据能激励机器学习研究者更关注他们的训练损失如何影响他们真正想要的模型行为。", "insights": {"contrib": [{"en": "Shows training with human feedback significantly improves summary quality over supervised learning.", "zh": "表明使用人类反馈训练显著优于监督学习的摘要质量。"}, {"en": "Demonstrates human feedback models generalize to new domains without task-specific fine-tuning.", "zh": "证明人类反馈模型无需特定任务微调即可泛化到新领域。"}, {"en": "Collects and releases a large dataset of 64,832 human summary comparisons.", "zh": "收集并发布包含64,832个人类摘要比较的大型数据集。"}, {"en": "Conducts extensive analysis of reward model performance and over-optimization.", "zh": "对奖励模型性能和过度优化进行广泛分析。"}, {"en": "Finds reward models outperform automatic metrics like ROUGE in predicting human preferences.", "zh": "发现奖励模型在预测人类偏好方面优于ROUGE等自动指标。"}, {"en": "Highlights the importance of aligning training objectives with desired model behavior.", "zh": "强调将训练目标与期望模型行为对齐的重要性。"}], "limits": [{"en": "High time and cost for training and data collection, e.g., 320 GPU-days for 6.7B model.", "zh": "训练和数据收集的时间和成本高，例如6.7B模型需320 GPU天。"}, {"en": "Reward model over-optimization can lead to anti-correlation with human preferences.", "zh": "奖励模型过度优化可能导致与人类偏好负相关。"}, {"en": "Models trained on Reddit TL;DR may generate biased or offensive content.", "zh": "在Reddit TL;DR上训练的模型可能生成有偏见或冒犯性内容。"}, {"en": "Summary length bias in reward models affects preference judgments.", "zh": "奖励模型对摘要长度的偏见影响偏好判断。"}, {"en": "Method requires human evaluators, limiting scalability for tasks where evaluation is difficult.", "zh": "方法需要人类评估者，限制了在评估困难任务上的可扩展性。"}]}, "cites": 3254}, {"id": "akatharo-2006.16236", "pid": "akatharo", "arxiv": "2006.16236", "date": "2020-06-29", "venue": "cs.LG", "org": "Idiap Research Institute / EPFL", "fields": ["efficiency", "deep-learning"], "tEn": "Transformers are RNNs: Fast Autoregressive Transformers with Linear Attention", "tZh": "Transformer是RNN：具有线性注意力的快速自回归Transformer", "sEn": "Transformers can be reformulated as linear dot-products of kernel feature maps, reducing complexity from O(N^2) to O(N) and enabling iterative computation akin to RNNs.", "sZh": "Transformer可通过核特征映射的线性点积重新表述，将复杂度从O(N²)降至O(N)，并实现类似RNN的迭代计算。", "absEn": "Transformers achieve remarkable performance in several tasks but due to their quadratic complexity, with respect to the input's length, they are prohibitively slow for very long sequences. To address this limitation, we express the self-attention as a linear dot-product of kernel feature maps and make use of the associativity property of matrix products to reduce the complexity from $\\mathcal{O}\\left(N^2\\right)$ to $\\mathcal{O}\\left(N\\right)$, where $N$ is the sequence length. We show that this formulation permits an iterative implementation that dramatically accelerates autoregressive transformers and reveals their relationship to recurrent neural networks. Our linear transformers achieve similar performance to vanilla transformers and they are up to 4000x faster on autoregressive prediction of very long sequences.", "absZh": "Transformer在多项任务中表现出色，但由于其相对于输入长度的二次复杂度，处理极长序列时速度极慢。为解决这一局限，我们将自注意力表示为核特征映射的线性点积，并利用矩阵乘积的结合性，将复杂度从O(N²)降至O(N)，其中N为序列长度。我们证明，这种公式允许迭代实现，从而大幅加速自回归Transformer，并揭示其与递归神经网络的联系。我们的线性Transformer性能与原始Transformer相当，且在极长序列的自回归预测中速度提升高达4000倍。", "insights": {"contrib": [{"en": "Proposes linear attention via kernel feature maps, reducing complexity from O(N^2) to O(N).", "zh": "提出通过核特征图实现线性注意力，将复杂度从 O(N^2) 降至 O(N)。"}, {"en": "Derives causal masking with linear time and constant memory for autoregressive transformers.", "zh": "推导出自回归 Transformer 的因果掩码，实现线性时间和恒定内存。"}, {"en": "Reveals transformers as recurrent neural networks, enabling constant-time inference per step.", "zh": "揭示 Transformer 可视为循环神经网络，实现每步恒定时间推理。"}, {"en": "Achieves up to 4000x faster autoregressive inference on long sequences with comparable performance.", "zh": "在长序列自回归推理上实现高达 4000 倍加速，性能与原始 Transformer 相当。"}, {"en": "Provides constant-memory gradient computation for causal linear attention via cumulative sums.", "zh": "通过累积和提供因果线性注意力的恒定内存梯度计算。"}, {"en": "Validates on image generation and speech recognition, showing linear scaling and competitive accuracy.", "zh": "在图像生成和语音识别上验证，展示线性缩放和竞争性精度。"}], "limits": [{"en": "Feature map choice (e.g., elu) may not match softmax attention in all tasks.", "zh": "特征图选择（如 elu）可能在某些任务中不如 softmax 注意力。"}, {"en": "Linear attention requires finite-dimensional feature maps, limiting exact softmax approximation.", "zh": "线性注意力需要有限维特征图，限制了精确 softmax 近似。"}, {"en": "Performance on very short sequences may not benefit from linear complexity due to overhead.", "zh": "在极短序列上，线性复杂度的优势可能因开销而不明显。"}, {"en": "The method assumes non-negative similarity functions, which may restrict attention expressiveness.", "zh": "该方法假设非负相似性函数，可能限制注意力的表达能力。"}, {"en": "Empirical evaluation is limited to image and speech domains; generalizability to other tasks is unverified.", "zh": "实证评估仅限于图像和语音领域，对其他任务的泛化性未验证。"}]}, "cites": 2873}, {"id": "baevski-2006.11477", "pid": "baevski", "arxiv": "2006.11477", "date": "2020-06-20", "venue": "cs.CL", "org": "Meta AI", "fields": ["deep-learning", "nlp"], "tEn": "wav2vec 2.0: A Framework for Self-Supervised Learning of Speech Representations", "tZh": "wav2vec 2.0：一种自监督学习语音表示的框架", "sEn": "wav2vec 2.0 outperforms semi-supervised methods by learning from raw audio alone, achieving state-of-the-art results with minimal labeled data.", "sZh": "wav2vec 2.0 仅通过原始音频学习，在少量标注数据上超越半监督方法，实现最先进结果。", "absEn": "We show for the first time that learning powerful representations from speech audio alone followed by fine-tuning on transcribed speech can outperform the best semi-supervised methods while being conceptually simpler. wav2vec 2.0 masks the speech input in the latent space and solves a contrastive task defined over a quantization of the latent representations which are jointly learned. Experiments using all labeled data of Librispeech achieve 1.8/3.3 WER on the clean/other test sets. When lowering the amount of labeled data to one hour, wav2vec 2.0 outperforms the previous state of the art on the 100 hour subset while using 100 times less labeled data. Using just ten minutes of labeled data and pre-training on 53k hours of unlabeled data still achieves 4.8/8.2 WER. This demonstrates the feasibility of speech recognition with limited amounts of labeled data.", "absZh": "我们首次证明，仅从语音音频中学习强大的表示，然后对转录语音进行微调，可以在概念上更简单的同时，超越最佳半监督方法。wav2vec 2.0 在潜在空间中屏蔽语音输入，并解决一个基于联合学习的潜在表示量化的对比任务。使用 Librispeech 的所有标注数据进行实验，在干净/其他测试集上分别实现了 1.8/3.3 的词错误率（WER）。当将标注数据量减少到一小时时，wav2vec 2.0 在 100 小时子集上超越了先前的最优结果，同时使用的标注数据量减少了 100 倍。仅使用十分钟的标注数据和 53k 小时的无标注数据进行预训练，仍然实现了 4.8/8.2 的 WER。这证明了在有限标注数据下进行语音识别的可行性。", "insights": {"contrib": [{"en": "Proposes wav2vec 2.0, a self-supervised framework for learning speech representations from raw audio.", "zh": "提出 wav2vec 2.0，一种从原始音频中学习语音表示的自监督框架。"}, {"en": "Jointly learns discrete speech units and contextualized representations via a contrastive task.", "zh": "通过对比任务联合学习离散语音单元和上下文表示。"}, {"en": "Achieves state-of-the-art results on Librispeech with only 10 minutes of labeled data.", "zh": "仅用10分钟标注数据即在Librispeech上达到最优结果。"}, {"en": "Outperforms previous semi-supervised methods while being conceptually simpler.", "zh": "在概念上更简单的同时优于之前的半监督方法。"}, {"en": "Demonstrates feasibility of ultra-low resource speech recognition with 53k hours of unlabeled pre-training.", "zh": "展示了使用53k小时无标注预训练实现超低资源语音识别的可行性。"}, {"en": "Sets new state of the art on TIMIT phoneme recognition and full Librispeech benchmark.", "zh": "在TIMIT音素识别和完整Librispeech基准上创下新纪录。"}], "limits": [{"en": "Evaluation limited to English speech datasets (Librispeech, TIMIT, LibriVox).", "zh": "评估仅限于英语语音数据集（Librispeech、TIMIT、LibriVox）。"}, {"en": "Requires large amounts of unlabeled data (53k hours) for best performance.", "zh": "需要大量无标注数据（53k小时）才能达到最佳性能。"}, {"en": "Fine-tuning still needs transcribed speech; zero-shot recognition not explored.", "zh": "微调仍需转录语音；未探索零样本识别。"}, {"en": "Model size and compute requirements are high (Large model uses 128 GPUs).", "zh": "模型规模和算力需求高（Large模型使用128个GPU）。"}, {"en": "Character-based vocabulary may limit performance compared to word pieces.", "zh": "基于字符的词汇表可能限制性能，相比词片方法。"}]}, "cites": 8544}, {"id": "jonathanho-2006.11239", "pid": "jonathanho", "arxiv": "2006.11239", "date": "2020-06-19", "venue": "cs.LG", "org": "UC Berkeley", "fields": ["generative", "deep-learning"], "tEn": "Denoising Diffusion Probabilistic Models", "tZh": "去噪扩散概率模型", "sEn": "We present high quality image synthesis using diffusion probabilistic models, achieving state-of-the-art FID scores on CIFAR10 and LSUN datasets.", "sZh": "我们利用扩散概率模型实现了高质量的图像合成，在CIFAR10和LSUN数据集上取得了最先进的FID分数。", "absEn": "We present high quality image synthesis results using diffusion probabilistic models, a class of latent variable models inspired by considerations from nonequilibrium thermodynamics. Our best results are obtained by training on a weighted variational bound designed according to a novel connection between diffusion probabilistic models and denoising score matching with Langevin dynamics, and our models naturally admit a progressive lossy decompression scheme that can be interpreted as a generalization of autoregressive decoding. On the unconditional CIFAR10 dataset, we obtain an Inception score of 9.46 and a state-of-the-art FID score of 3.17. On 256x256 LSUN, we obtain sample quality similar to ProgressiveGAN. Our implementation is available at https://github.com/hojonathanho/diffusion", "absZh": "我们利用扩散概率模型（一类受非平衡热力学启发的潜变量模型）展示了高质量的图像合成结果。我们的最佳结果是通过在加权变分界上训练获得的，该变分界是根据扩散概率模型与使用朗之万动力学的去噪分数匹配之间的新联系设计的。我们的模型自然地允许一种渐进式有损解压方案，可解释为自回归解码的推广。在无条件CIFAR10数据集上，我们获得了9.46的Inception分数和3.17的最先进FID分数。在256x256 LSUN上，我们获得了与ProgressiveGAN相当的样本质量。我们的实现可在https://github.com/hojonathanho/diffusion获取。", "insights": {"contrib": [{"en": "Established connection between diffusion models and denoising score matching with Langevin dynamics.", "zh": "建立了扩散模型与基于朗之万动力学的去噪分数匹配之间的联系。"}, {"en": "Proposed epsilon-prediction parameterization for reverse process, improving sample quality.", "zh": "提出了反向过程的epsilon预测参数化，提升了样本质量。"}, {"en": "Achieved state-of-the-art FID score of 3.17 on unconditional CIFAR10.", "zh": "在无条件CIFAR10上实现了3.17的FID分数，达到最先进水平。"}, {"en": "Demonstrated progressive lossy decompression scheme generalizing autoregressive decoding.", "zh": "展示了渐进式有损解压缩方案，推广了自回归解码。"}, {"en": "Showed diffusion models as lossy compressors with inductive bias for imperceptible details.", "zh": "表明扩散模型作为有损压缩器，对不可察觉细节具有归纳偏置。"}, {"en": "Provided open-source implementation for reproducibility.", "zh": "提供了开源实现以促进可重复性。"}], "limits": [{"en": "Log-likelihoods not competitive with other likelihood-based models.", "zh": "对数似然与其他基于似然的模型相比不具备竞争力。"}, {"en": "Sample quality limited to image data; other modalities not explored.", "zh": "样本质量仅限于图像数据；未探索其他模态。"}, {"en": "Training on simplified objective yields better samples but worse codelengths.", "zh": "在简化目标上训练产生更好的样本但码长更差。"}, {"en": "Reverse process variances fixed as constants, limiting expressiveness.", "zh": "反向过程方差固定为常数，限制了表达能力。"}, {"en": "Potential for malicious use in generating fake images or reinforcing biases.", "zh": "可能被恶意用于生成虚假图像或强化偏见。"}]}, "cites": 32022}, {"id": "mcaron-2006.09882", "pid": "mcaron", "arxiv": "2006.09882", "date": "2020-06-17", "venue": "cs.CV", "org": "Meta AI", "fields": ["vision", "deep-learning"], "tEn": "Unsupervised Learning of Visual Features by Contrasting Cluster Assignments", "tZh": "通过对比聚类分配进行视觉特征的无监督学习", "sEn": "SwAV achieves unsupervised learning by contrasting cluster assignments instead of pairwise features, enabling efficient scaling and strong performance.", "sZh": "SwAV通过对比聚类分配而非成对特征实现无监督学习，高效可扩展且性能强劲。", "absEn": "Unsupervised image representations have significantly reduced the gap with supervised pretraining, notably with the recent achievements of contrastive learning methods. These contrastive methods typically work online and rely on a large number of explicit pairwise feature comparisons, which is computationally challenging. In this paper, we propose an online algorithm, SwAV, that takes advantage of contrastive methods without requiring to compute pairwise comparisons. Specifically, our method simultaneously clusters the data while enforcing consistency between cluster assignments produced for different augmentations (or views) of the same image, instead of comparing features directly as in contrastive learning. Simply put, we use a swapped prediction mechanism where we predict the cluster assignment of a view from the representation of another view. Our method can be trained with large and small batches and can scale to unlimited amounts of data. Compared to previous contrastive methods, our method is more memory efficient since it does not require a large memory bank or a special momentum network. In addition, we also propose a new data augmentation strategy, multi-crop, that uses a mix of views with different resolutions in place of two full-resolution views, without increasing the memory or compute requirements much. We validate our findings by achieving 75.3% top-1 accuracy on ImageNet with ResNet-50, as well as surpassing supervised pretraining on all the considered transfer tasks.", "absZh": "无监督图像表示已显著缩小了与有监督预训练的差距，尤其是近期对比学习方法的成就。这些对比方法通常在线工作，依赖大量显式的成对特征比较，计算上具有挑战性。本文提出在线算法SwAV，利用对比方法的优势而无需计算成对比较。具体而言，我们的方法在聚类数据的同时，强制同一图像不同增强（或视图）产生的聚类分配之间的一致性，而非像对比学习那样直接比较特征。简单来说，我们使用交换预测机制，从一个视图的表示预测另一个视图的聚类分配。我们的方法可在大批量和小批量下训练，并能扩展到无限数据。与之前的对比方法相比，我们的方法更节省内存，因为它不需要大型内存库或特殊动量网络。此外，我们还提出新的数据增强策略multi-crop，使用不同分辨率的视图混合替代两个全分辨率视图，而不显著增加内存或计算需求。我们通过ResNet-50在ImageNet上达到75.3%的top-1准确率，并在所有考虑的迁移任务上超越有监督预训练，验证了我们的发现。", "insights": {"contrib": [{"en": "Proposes SwAV, an online clustering algorithm that avoids explicit pairwise feature comparisons.", "zh": "提出SwAV，一种在线聚类算法，避免显式的成对特征比较。"}, {"en": "Introduces a swapped prediction mechanism that predicts cluster assignments across different views.", "zh": "引入交换预测机制，在不同视图间预测聚类分配。"}, {"en": "Develops multi-crop augmentation strategy using mixed-resolution views without extra memory or compute.", "zh": "开发多裁剪增强策略，使用混合分辨率视图而不增加内存或算力。"}, {"en": "Achieves 75.3% top-1 accuracy on ImageNet with ResNet-50, surpassing supervised pretraining on transfer tasks.", "zh": "在ImageNet上用ResNet-50达到75.3% top-1准确率，在迁移任务上超越监督预训练。"}, {"en": "Demonstrates online clustering scales to large datasets and works with small batches.", "zh": "证明在线聚类可扩展到大数据集并适用于小批量。"}, {"en": "Shows multi-crop consistently improves multiple self-supervised methods by 2-4% top-1 accuracy.", "zh": "显示多裁剪持续提升多种自监督方法2-4% top-1准确率。"}], "limits": [{"en": "SwAV requires additional Sinkhorn-Knopp iterations for code computation, adding overhead.", "zh": "SwAV需要额外的Sinkhorn-Knopp迭代计算编码，增加开销。"}, {"en": "Multi-crop may not benefit supervised models and requires careful tuning of crop sizes.", "zh": "多裁剪可能不适用于监督模型，且需仔细调整裁剪尺寸。"}, {"en": "Method assumes equipartition of prototypes in each batch, which may fail for very small batches.", "zh": "方法假设每批原型均匀分配，对极小批量可能失效。"}, {"en": "Performance depends on number of prototypes and temperature parameter, requiring tuning.", "zh": "性能依赖于原型数量和温度参数，需要调优。"}, {"en": "Online clustering may not converge as stably as offline methods on extremely noisy data.", "zh": "在线聚类在极端噪声数据上可能不如离线方法稳定。"}]}, "cites": 5033}, {"id": "jbgrill-2006.07733", "pid": "jbgrill", "arxiv": "2006.07733", "date": "2020-06-13", "venue": "cs.LG", "org": "Google DeepMind", "fields": ["vision", "deep-learning"], "tEn": "Bootstrap your own latent: A new approach to self-supervised Learning", "tZh": "自举你的潜在表示：一种新的自监督学习方法", "sEn": "BYOL achieves state-of-the-art self-supervised learning without negative pairs.", "sZh": "BYOL 无需负样本对，实现了自监督学习的新高度。", "absEn": "We introduce Bootstrap Your Own Latent (BYOL), a new approach to self-supervised image representation learning. BYOL relies on two neural networks, referred to as online and target networks, that interact and learn from each other. From an augmented view of an image, we train the online network to predict the target network representation of the same image under a different augmented view. At the same time, we update the target network with a slow-moving average of the online network. While state-of-the art methods rely on negative pairs, BYOL achieves a new state of the art without them. BYOL reaches $74.3\\%$ top-1 classification accuracy on ImageNet using a linear evaluation with a ResNet-50 architecture and $79.6\\%$ with a larger ResNet. We show that BYOL performs on par or better than the current state of the art on both transfer and semi-supervised benchmarks. Our implementation and pretrained models are given on GitHub.", "absZh": "我们提出了自举你的潜在表示（BYOL），一种新的自监督图像表示学习方法。BYOL 依赖于两个神经网络，分别称为在线网络和目标网络，它们相互交互和学习。从一张图像的一个增强视图出发，我们训练在线网络预测同一图像在另一个不同增强视图下的目标网络表示。同时，我们使用在线网络的慢速移动平均来更新目标网络。虽然最先进的方法依赖于负样本对，但 BYOL 在没有它们的情况下达到了新的最先进水平。BYOL 在使用 ResNet-50 架构进行线性评估时，在 ImageNet 上达到了 74.3% 的 top-1 分类准确率，使用更大的 ResNet 时达到 79.6%。我们展示了 BYOL 在迁移学习和半监督基准测试上表现与当前最先进水平相当或更好。我们的实现和预训练模型已在 GitHub 上提供。", "insights": {"contrib": [{"en": "Introduces BYOL, a self-supervised learning method achieving state-of-the-art ImageNet linear evaluation without negative pairs.", "zh": "提出BYOL，一种无需负样本对即可在ImageNet线性评估中达到最先进水平的自监督学习方法。"}, {"en": "Demonstrates BYOL outperforms prior art on semi-supervised and transfer benchmarks.", "zh": "证明BYOL在半监督和迁移基准上优于先前方法。"}, {"en": "Shows BYOL is more robust to batch size and augmentation changes than contrastive methods.", "zh": "展示BYOL对批次大小和数据增强变化的鲁棒性优于对比方法。"}, {"en": "Provides theoretical hypothesis on why BYOL avoids collapse via predictor and slow-moving target network.", "zh": "提供理论假设，解释BYOL如何通过预测器和慢速移动目标网络避免坍塌。"}, {"en": "Achieves 79.6% top-1 accuracy on ImageNet with a larger ResNet, narrowing gap to supervised learning.", "zh": "使用更大ResNet在ImageNet上达到79.6% top-1准确率，缩小与监督学习的差距。"}, {"en": "Releases implementation and pretrained models on GitHub for reproducibility.", "zh": "在GitHub上发布实现和预训练模型以促进可重复性。"}], "limits": [{"en": "BYOL still relies on handcrafted image augmentations specific to vision, limiting generalization to other modalities.", "zh": "BYOL仍依赖针对视觉的手工数据增强，限制了向其他模态的泛化。"}, {"en": "The method requires careful tuning of target decay rate and predictor architecture to avoid collapse.", "zh": "该方法需要仔细调整目标衰减率和预测器架构以避免坍塌。"}, {"en": "Performance depends on large batch sizes and compute resources (e.g., 512 TPU v3 cores).", "zh": "性能依赖于大批次和计算资源（如512个TPU v3核心）。"}, {"en": "Theoretical understanding of collapse avoidance is incomplete; only empirical evidence is provided.", "zh": "对避免坍塌的理论理解尚不完整，仅提供经验证据。"}, {"en": "BYOL may replicate biases present in training datasets, raising dual-use concerns.", "zh": "BYOL可能复制训练数据中的偏见，引发双重用途问题。"}]}, "cites": 8693}, {"id": "ncarion-2005.12872", "pid": "ncarion", "arxiv": "2005.12872", "date": "2020-05-26", "venue": "cs.CV", "org": "Facebook AI Research", "fields": ["vision", "deep-learning"], "tEn": "End-to-End Object Detection with Transformers", "tZh": "端到端目标检测与Transformer", "sEn": "DETR simplifies object detection by treating it as a direct set prediction problem, eliminating hand-designed components like NMS and anchor generation.", "sZh": "DETR将目标检测视为直接集合预测问题，简化了检测流程，去除了非极大值抑制和锚点生成等手工设计组件。", "absEn": "We present a new method that views object detection as a direct set prediction problem. Our approach streamlines the detection pipeline, effectively removing the need for many hand-designed components like a non-maximum suppression procedure or anchor generation that explicitly encode our prior knowledge about the task. The main ingredients of the new framework, called DEtection TRansformer or DETR, are a set-based global loss that forces unique predictions via bipartite matching, and a transformer encoder-decoder architecture. Given a fixed small set of learned object queries, DETR reasons about the relations of the objects and the global image context to directly output the final set of predictions in parallel. The new model is conceptually simple and does not require a specialized library, unlike many other modern detectors. DETR demonstrates accuracy and run-time performance on par with the well-established and highly-optimized Faster RCNN baseline on the challenging COCO object detection dataset. Moreover, DETR can be easily generalized to produce panoptic segmentation in a unified manner. We show that it significantly outperforms competitive baselines. Training code and pretrained models are available at https://github.com/facebookresearch/detr.", "absZh": "我们提出了一种新方法，将目标检测视为直接的集合预测问题。该方法简化了检测流程，有效去除了许多手工设计的组件，如非极大值抑制过程或锚点生成，这些组件显式编码了我们对任务的先验知识。新框架称为DEtection TRansformer（DETR），其主要组成部分是一个基于集合的全局损失，通过二分匹配强制唯一预测，以及一个Transformer编码器-解码器架构。给定一组固定的小型学习对象查询，DETR推理对象之间的关系和全局图像上下文，直接并行输出最终的预测集合。与许多其他现代检测器不同，新模型概念简单，不需要专门的库。DETR在具有挑战性的COCO目标检测数据集上，其准确性和运行时间性能与成熟且高度优化的Faster RCNN基线相当。此外，DETR可以轻松泛化以统一方式生成全景分割。我们展示了它显著优于竞争基线。训练代码和预训练模型可在https://github.com/facebookresearch/detr获取。", "insights": {"contrib": [{"en": "Proposes DETR, a transformer-based end-to-end object detector that treats detection as a direct set prediction problem.", "zh": "提出DETR，一种基于Transformer的端到端目标检测器，将检测视为直接集合预测问题。"}, {"en": "Eliminates hand-designed components like non-maximum suppression and anchor generation via bipartite matching loss.", "zh": "通过二分匹配损失消除了非极大值抑制和锚点生成等手工设计组件。"}, {"en": "Achieves competitive accuracy and runtime on COCO compared to Faster R-CNN, with superior performance on large objects.", "zh": "在COCO上实现了与Faster R-CNN相当的精度和运行时间，在大目标上表现更优。"}, {"en": "Extends naturally to panoptic segmentation with a unified mask head, outperforming strong baselines.", "zh": "通过统一掩码头自然扩展到全景分割，优于强基线。"}, {"en": "Provides a simple and flexible architecture that can be implemented with standard CNN and transformer libraries.", "zh": "提供简单灵活的架构，可使用标准CNN和Transformer库实现。"}], "limits": [{"en": "Requires extra-long training schedule (300-500 epochs) and auxiliary losses for convergence.", "zh": "需要超长训练周期（300-500轮）和辅助损失才能收敛。"}, {"en": "Performs worse on small objects compared to Faster R-CNN, especially without dilated backbone.", "zh": "在小目标上性能不如Faster R-CNN，尤其在没有空洞骨干时。"}, {"en": "Inference speed is slower than some optimized detectors due to transformer self-attention cost.", "zh": "由于Transformer自注意力计算成本，推理速度慢于某些优化检测器。"}, {"en": "Fixed number of object queries limits maximum detections per image, potentially missing many objects.", "zh": "固定数量的目标查询限制了每张图像的最大检测数，可能遗漏大量目标。"}]}, "cites": 18704}, {"id": "gulati-2005.08100", "pid": "gulati", "arxiv": "2005.08100", "date": "2020-05-16", "venue": "eess.AS", "org": "Google", "fields": ["deep-learning", "nlp"], "tEn": "Conformer: Convolution-augmented Transformer for Speech Recognition", "tZh": "Conformer: 用于语音识别的卷积增强Transformer", "sEn": "Conformer combines CNNs and Transformers to capture both local and global dependencies, achieving state-of-the-art speech recognition results.", "sZh": "Conformer结合CNN和Transformer，有效捕捉局部和全局依赖，在语音识别中达到最优性能。", "absEn": "Recently Transformer and Convolution neural network (CNN) based models have shown promising results in Automatic Speech Recognition (ASR), outperforming Recurrent neural networks (RNNs). Transformer models are good at capturing content-based global interactions, while CNNs exploit local features effectively. In this work, we achieve the best of both worlds by studying how to combine convolution neural networks and transformers to model both local and global dependencies of an audio sequence in a parameter-efficient way. To this regard, we propose the convolution-augmented transformer for speech recognition, named Conformer. Conformer significantly outperforms the previous Transformer and CNN based models achieving state-of-the-art accuracies. On the widely used LibriSpeech benchmark, our model achieves WER of 2.1%/4.3% without using a language model and 1.9%/3.9% with an external language model on test/testother. We also observe competitive performance of 2.7%/6.3% with a small model of only 10M parameters.", "absZh": "最近，基于Transformer和卷积神经网络（CNN）的模型在自动语音识别（ASR）中展现出优于循环神经网络（RNN）的结果。Transformer模型擅长捕捉基于内容的全局交互，而CNN则能有效利用局部特征。在这项工作中，我们通过研究如何以参数高效的方式结合卷积神经网络和Transformer来同时建模音频序列的局部和全局依赖，实现了两全其美。为此，我们提出了用于语音识别的卷积增强Transformer，命名为Conformer。Conformer显著优于之前的Transformer和CNN模型，达到了最先进的准确率。在广泛使用的LibriSpeech基准测试中，我们的模型在未使用语言模型的情况下，在test/testother上实现了2.1%/4.3%的词错误率（WER），使用外部语言模型时达到1.9%/3.9%。我们还观察到，仅使用10M参数的小模型也取得了2.7%/6.3%的竞争性性能。", "insights": {"contrib": [{"en": "Proposes Conformer, combining convolution and Transformer for speech recognition.", "zh": "提出Conformer，结合卷积和Transformer用于语音识别。"}, {"en": "Achieves state-of-the-art WER of 1.9%/3.9% on LibriSpeech test/testother.", "zh": "在LibriSpeech test/testother上达到1.9%/3.9%的词错误率，为当前最优。"}, {"en": "Introduces a sandwich structure with two feed-forward modules around attention and convolution.", "zh": "引入三明治结构，在注意力与卷积模块两侧放置两个前馈模块。"}, {"en": "Demonstrates convolution module is critical for performance via ablation studies.", "zh": "通过消融实验证明卷积模块对性能至关重要。"}, {"en": "Shows parameter eff
