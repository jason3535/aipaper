条有前景的路径。", "absEn": "Artificial intelligence (AI) has undergone a renaissance recently, making major progress in key domains such as vision, language, control, and decision-making. This has been due, in part, to cheap data and cheap compute resources, which have fit the natural strengths of deep learning. However, many defining characteristics of human intelligence, which developed under much different pressures, remain out of reach for current approaches. In particular, generalizing beyond one's experiences--a hallmark of human intelligence from infancy--remains a formidable challenge for modern AI. The following is part position paper, part review, and part unification. We argue that combinatorial generalization must be a top priority for AI to achieve human-like abilities, and that structured representations and computations are key to realizing this objective. Just as biology uses nature and nurture cooperatively, we reject the false choice between \"hand-engineering\" and \"end-to-end\" learning, and instead advocate for an approach which benefits from their complementary strengths. We explore how using relational inductive biases within deep learning architectures can facilitate learning about entities, relations, and rules for composing them. We present a new building block for the AI toolkit with a strong relational inductive bias--the graph network--which generalizes and extends various approaches for neural networks that operate on graphs, and provides a straightforward interface for manipulating structured knowledge and producing structured behaviors. We discuss how graph networks can support relational reasoning and combinatorial generalization, laying the foundation for more sophisticated, interpretable, and flexible patterns of reasoning. As a companion to this paper, we have released an open-source software library for building graph networks, with demonstrations of how to use them in practice.", "absZh": "人工智能最近经历了一次复兴，在视觉、语言、控制和决策等关键领域取得了重大进展。这在一定程度上得益于廉价的数据和计算资源，这些资源契合了深度学习的天然优势。然而，人类智能的许多决定性特征——这些特征是在截然不同的压力下发展起来的——对于当前的方法来说仍然遥不可及。特别是，超越自身经验进行泛化——这是从婴儿期起人类智能的标志——对现代人工智能来说仍然是一个艰巨的挑战。本文兼具立场论文、综述和统一框架的性质。我们认为，组合泛化必须是人工智能实现类人能力的首要任务，而结构化表示和计算是实现这一目标的关键。正如生物学合作利用先天和后天一样，我们拒绝在“手工工程”和“端到端”学习之间做出错误选择，而是倡导一种受益于它们互补优势的方法。我们探讨了如何在深度学习架构中使用关系归纳偏置来促进对实体、关系及其组合规则的学习。我们为人工智能工具箱提出了一种具有强关系归纳偏置的新构建块——图网络——它概括并扩展了多种在图上操作的神经网络方法，并提供了一个直观的接口来操作结构化知识和产生结构化行为。我们讨论了图网络如何支持关系推理和组合泛化，为更复杂、可解释和灵活的推理模式奠定基础。作为本文的配套，我们发布了一个用于构建图网络的开源软件库，并演示了如何在实践中使用它们。", "insights": {"contrib": [{"en": "Argues combinatorial generalization is key for human-like AI and structured representations are essential.", "zh": "论证组合泛化是实现类人AI的关键，结构化表示至关重要。"}, {"en": "Rejects false choice between hand-engineering and end-to-end learning, advocating complementary strengths.", "zh": "拒绝手工设计与端到端学习的错误二分，主张发挥互补优势。"}, {"en": "Introduces graph networks as a new building block with strong relational inductive bias.", "zh": "引入图网络作为具有强关系归纳偏置的新构建模块。"}, {"en": "Unifies and extends various graph neural network approaches within a single framework.", "zh": "在统一框架内整合并扩展了多种图神经网络方法。"}, {"en": "Demonstrates graph networks support relational reasoning and combinatorial generalization.", "zh": "展示图网络支持关系推理和组合泛化。"}, {"en": "Releases open-source library for building graph networks with practical demonstrations.", "zh": "发布用于构建图网络的开源库并提供实践演示。"}], "limits": [{"en": "Graph networks assume pairwise relations; higher-order interactions require extensions.", "zh": "图网络假设成对关系，高阶交互需要扩展。"}, {"en": "Inferring graph structure from unstructured data remains an open challenge.", "zh": "从非结构化数据推断图结构仍是一个开放挑战。"}, {"en": "Scalability to very large graphs may be limited due to quadratic edge growth.", "zh": "由于边的二次增长，扩展到极大图可能受限。"}, {"en": "Framework focuses on relational inductive biases; other biases (e.g., non-linearities) are not covered.", "zh": "框架聚焦关系归纳偏置，未涵盖其他偏置（如非线性）。"}, {"en": "Empirical validation of combinatorial generalization is limited to specific domains.", "zh": "组合泛化的实证验证仅限于特定领域。"}]}}, {"id": "goodfellow-1805.08318", "pid": "goodfellow", "arxiv": "1805.08318", "date": "2018-05-21", "venue": "stat.ML", "org": "Google Brain", "fields": ["generative", "vision"], "tEn": "Self-Attention Generative Adversarial Networks", "tZh": "自注意力生成对抗网络", "sEn": "SAGAN introduces self-attention to GANs for long-range dependency modeling, achieving state-of-the-art results on ImageNet.", "sZh": "SAGAN将自注意力机制引入生成对抗网络，实现长距离依赖建模，在ImageNet上取得了最优结果。", "absEn": "In this paper, we propose the Self-Attention Generative Adversarial Network (SAGAN) which allows attention-driven, long-range dependency modeling for image generation tasks. Traditional convolutional GANs generate high-resolution details as a function of only spatially local points in lower-resolution feature maps. In SAGAN, details can be generated using cues from all feature locations. Moreover, the discriminator can check that highly detailed features in distant portions of the image are consistent with each other. Furthermore, recent work has shown that generator conditioning affects GAN performance. Leveraging this insight, we apply spectral normalization to the GAN generator and find that this improves training dynamics. The proposed SAGAN achieves the state-of-the-art results, boosting the best published Inception score from 36.8 to 52.52 and reducing Frechet Inception distance from 27.62 to 18.65 on the challenging ImageNet dataset. Visualization of the attention layers shows that the generator leverages neighborhoods that correspond to object shapes rather than local regions of fixed shape.", "absZh": "本文提出了自注意力生成对抗网络（SAGAN），它允许在图像生成任务中进行注意力驱动的长距离依赖建模。传统的卷积GAN仅根据低分辨率特征图中的空间局部点生成高分辨率细节。在SAGAN中，可以利用所有特征位置的线索生成细节。此外，判别器可以检查图像中远距离部分的高度详细特征是否相互一致。进一步地，最近的研究表明生成器条件化影响GAN性能。利用这一见解，我们对GAN生成器应用谱归一化，发现这改善了训练动态。所提出的SAGAN取得了最先进的结果，在具有挑战性的ImageNet数据集上，将最佳公布的Inception分数从36.8提高到52.52，并将Frechet Inception距离从27.62降低到18.65。注意力层的可视化显示，生成器利用对应于物体形状的邻域，而不是固定形状的局部区域。", "insights": {"contrib": [{"en": "Proposes Self-Attention Generative Adversarial Network (SAGAN) for attention-driven long-range dependency modeling in image generation.", "zh": "提出自注意力生成对抗网络（SAGAN），在图像生成中实现注意力驱动的长程依赖建模。"}, {"en": "Applies spectral normalization to the GAN generator, improving training dynamics and stability.", "zh": "将谱归一化应用于GAN生成器，改善训练动态和稳定性。"}, {"en": "Achieves state-of-the-art results on ImageNet: Inception score 52.52 and FID 18.65.", "zh": "在ImageNet上取得最优结果：Inception分数52.52，FID 18.65。"}, {"en": "Visualizes attention layers showing generator leverages object-shaped neighborhoods rather than fixed local regions.", "zh": "可视化注意力层，显示生成器利用物体形状邻域而非固定局部区域。"}, {"en": "Demonstrates that self-attention is complementary to convolution for modeling long-range dependencies in feature maps.", "zh": "证明自注意力与卷积互补，用于特征图中的长程依赖建模。"}], "limits": [{"en": "Experiments limited to 128x128 image generation on ImageNet; scalability to higher resolutions not tested.", "zh": "实验仅限于ImageNet上128x128图像生成，未测试更高分辨率下的可扩展性。"}, {"en": "Self-attention module increases computational cost compared to pure convolutional GANs.", "zh": "与纯卷积GAN相比，自注意力模块增加了计算成本。"}, {"en": "Training requires two weeks on 4 GPUs; resource-intensive for broader adoption.", "zh": "训练需在4个GPU上进行两周，资源密集，不利于广泛采用。"}, {"en": "Evaluation metrics (IS, FID) have known limitations; not fully aligned with human perception.", "zh": "评估指标（IS、FID）存在已知局限，未完全与人类感知对齐。"}]}}, {"id": "jredmon-1804.02767", "pid": "jredmon", "arxiv": "1804.02767", "date": "2018-04-08", "venue": "cs.CV", "org": "University of Washington", "fields": ["vision", "efficiency"], "tEn": "YOLOv3: An Incremental Improvement", "tZh": "YOLOv3：一项渐进式改进", "sEn": "YOLOv3 is a fast and accurate object detector, achieving 57.9 mAP@50 in 51 ms on a Titan X, 3.8x faster than RetinaNet with similar performance.", "sZh": "YOLOv3 是一个快速且准确的目标检测器，在 Titan X 上以 51 毫秒达到 57.9 mAP@50，性能与 RetinaNet 相当但速度快 3.8 倍。", "absEn": "We present some updates to YOLO! We made a bunch of little design changes to make it better. We also trained this new network that's pretty swell. It's a little bigger than last time but more accurate. It's still fast though, don't worry. At 320x320 YOLOv3 runs in 22 ms at 28.2 mAP, as accurate as SSD but three times faster. When we look at the old .5 IOU mAP detection metric YOLOv3 is quite good. It achieves 57.9 mAP@50 in 51 ms on a Titan X, compared to 57.5 mAP@50 in 198 ms by RetinaNet, similar performance but 3.8x faster. As always, all the code is online at https://pjreddie.com/yolo/", "absZh": "我们介绍了 YOLO 的一些更新！我们进行了一系列小的设计改进以提升性能。我们还训练了一个新的网络，效果相当不错。它比之前的版本稍大，但更准确。不过它仍然很快，别担心。在 320x320 分辨率下，YOLOv3 运行时间为 22 毫秒，mAP 为 28.2，与 SSD 精度相当但速度快三倍。当使用旧的 .5 IOU mAP 检测指标时，YOLOv3 表现相当出色。它在 Titan X 上以 51 毫秒达到 57.9 mAP@50，而 RetinaNet 需要 198 毫秒才能达到 57.5 mAP@50，性能相似但速度快 3.8 倍。一如既往，所有代码均可在 https://pjreddie.com/yolo/ 获取。", "insights": {"contrib": [{"en": "Proposes YOLOv3, an incremental improvement to YOLO with better accuracy and speed.", "zh": "提出YOLOv3，对YOLO进行增量改进，提升精度和速度。"}, {"en": "Introduces Darknet-53, a new feature extractor balancing efficiency and performance.", "zh": "引入Darknet-53，一种平衡效率与性能的新特征提取器。"}, {"en": "Adopts multi-scale predictions using feature pyramid networks for improved small object detection.", "zh": "采用特征金字塔网络的多尺度预测，改进小目标检测。"}, {"en": "Uses independent logistic classifiers for multilabel classification, avoiding softmax limitations.", "zh": "使用独立逻辑分类器进行多标签分类，避免softmax限制。"}, {"en": "Achieves state-of-the-art speed-accuracy trade-off on COCO, e.g., 57.9 mAP@50 in 51 ms.", "zh": "在COCO上实现速度与精度的最优权衡，例如51毫秒内达到57.9 mAP@50。"}, {"en": "Open-sources code and model for reproducibility.", "zh": "开源代码和模型以促进可复现性。"}], "limits": [{"en": "Performance drops significantly at higher IOU thresholds (e.g., 0.75), indicating poor box alignment.", "zh": "在高IOU阈值（如0.75）下性能显著下降，表明边界框对齐不佳。"}, {"en": "Underperforms on medium and large objects compared to small objects in COCO.", "zh": "在COCO中，中大型目标的性能不如小型目标。"}, {"en": "Does not achieve top results on COCO average AP (0.5:0.95), lagging behind RetinaNet.", "zh": "在COCO平均AP（0.5:0.95）上未达到最佳结果，落后于RetinaNet。"}, {"en": "Some attempted improvements (e.g., focal loss, dual IOU thresholds) did not yield gains.", "zh": "部分尝试的改进（如焦点损失、双IOU阈值）未带来收益。"}]}}, {"id": "mpeters-1802.05365", "pid": "mpeters", "arxiv": "1802.05365", "date": "2018-02-15", "venue": "cs.CL", "org": "Allen Institute for AI", "fields": ["nlp", "deep-learning"], "tEn": "Deep contextualized word representations", "tZh": "深度上下文词表示", "sEn": "Deep contextualized word representations significantly improve NLP tasks by modeling complex word characteristics and polysemy.", "sZh": "深度上下文词表示通过建模单词的复杂特征和多义性，显著提升了自然语言处理任务的表现。", "absEn": "We introduce a new type of deep contextualized word representation that models both (1) complex characteristics of word use (e.g., syntax and semantics), and (2) how these uses vary across linguistic contexts (i.e., to model polysemy). Our word vectors are learned functions of the internal states of a deep bidirectional language model (biLM), which is pre-trained on a large text corpus. We show that these representations can be easily added to existing models and significantly improve the state of the art across six challenging NLP problems, including question answering, textual entailment and sentiment analysis. We also present an analysis showing that exposing the deep internals of the pre-trained network is crucial, allowing downstream models to mix different types of semi-supervision signals.", "absZh": "我们引入了一种新型的深度上下文词表示，它同时建模了（1）单词使用的复杂特征（如句法和语义），以及（2）这些用法在不同语言上下文中的变化（即建模多义性）。我们的词向量是从一个在大规模文本语料上预训练的深度双向语言模型（biLM）的内部状态学习得到的函数。我们展示了这些表示可以轻松添加到现有模型中，并在六个具有挑战性的自然语言处理问题（包括问答、文本蕴含和情感分析）上显著提升了当前最优结果。我们还进行了分析，表明暴露预训练网络的深层内部结构至关重要，这使得下游模型能够混合不同类型的半监督信号。", "insights": {"contrib": [{"en": "Introduces ELMo, deep contextualized word representations from a bidirectional language model.", "zh": "提出ELMo，一种基于双向语言模型的深度上下文词表示。"}, {"en": "Shows ELMo improves state-of-the-art on six NLP tasks: QA, textual entailment, SRL, coreference, NER, sentiment.", "zh": "展示ELMo在六个NLP任务（问答、文本蕴含、语义角色标注、共指消解、命名实体识别、情感分析）上提升最先进水平。"}, {"en": "Demonstrates that using all biLM layers outperforms using only the top layer.", "zh": "证明使用所有biLM层优于仅使用顶层。"}, {"en": "Reveals lower biLM layers encode syntax, higher layers encode semantics.", "zh": "揭示biLM低层编码句法，高层编码语义。"}, {"en": "Shows ELMo increases sample efficiency, requiring less data and fewer updates.", "zh": "展示ELMo提高样本效率，需要更少数据和更少更新。"}], "limits": [{"en": "ELMo requires a pre-trained biLM, which is computationally expensive to train.", "zh": "ELMo需要预训练的biLM，训练计算成本高。"}, {"en": "ELMo representations are fixed after pre-training; no fine-tuning of biLM for downstream tasks.", "zh": "ELMo表示在预训练后固定，不对下游任务微调biLM。"}, {"en": "ELMo only tested on English; performance on other languages is unknown.", "zh": "ELMo仅在英语上测试，其他语言性能未知。"}, {"en": "ELMo adds computational overhead at inference time due to biLM forward pass.", "zh": "ELMo在推理时因biLM前向传播增加计算开销。"}]}}, {"id": "mbronstein-1801.07829", "pid": "mbronstein", "arxiv": "1801.07829", "date": "2018-01-24", "venue": "cs.CV", "org": "Imperial College / MIT", "fields": ["vision", "deep-learning"], "tEn": "Dynamic Graph CNN for Learning on Point Clouds", "tZh": "动态图卷积网络用于点云学习", "sEn": "EdgeConv captures local neighborhood information and semantic characteristics over long distances in point clouds.", "sZh": "EdgeConv能够捕捉点云中的局部邻域信息以及长距离语义特征。", "absEn": "Point clouds provide a flexible geometric representation suitable for countless applications in computer graphics; they also comprise the raw output of most 3D data acquisition devices. While hand-designed features on point clouds have long been proposed in graphics and vision, however, the recent overwhelming success of convolutional neural networks (CNNs) for image analysis suggests the value of adapting insight from CNN to the point cloud world. Point clouds inherently lack topological information so designing a model to recover topology can enrich the representation power of point clouds. To this end, we propose a new neural network module dubbed EdgeConv suitable for CNN-based high-level tasks on point clouds including classification and segmentation. EdgeConv acts on graphs dynamically computed in each layer of the network. It is differentiable and can be plugged into existing architectures. Compared to existing modules operating in extrinsic space or treating each point independently, EdgeConv has several appealing properties: It incorporates local neighborhood information; it can be stacked applied to learn global shape properties; and in multi-layer systems affinity in feature space captures semantic characteristics over potentially long distances in the original embedding. We show the performance of our model on standard benchmarks including ModelNet40, ShapeNetPart, and S3DIS.", "absZh": "点云提供了一种灵活的几何表示，适用于计算机图形学中的无数应用；它们也是大多数3D数据采集设备的原始输出。尽管在图形学和视觉中早已提出了点云上的手工设计特征，但最近卷积神经网络在图像分析中的巨大成功表明，将CNN的见解适应到点云世界是有价值的。点云本质上缺乏拓扑信息，因此设计一个模型来恢复拓扑可以丰富点云的表示能力。为此，我们提出了一个新的神经网络模块，称为EdgeConv，适用于基于CNN的点云高级任务，包括分类和分割。EdgeConv作用于网络中每层动态计算的图上。它是可微的，可以插入到现有架构中。与在外部空间中操作或独立处理每个点的现有模块相比，EdgeConv具有几个吸引人的特性：它结合了局部邻域信息；它可以堆叠应用以学习全局形状属性；在多层级系统中，特征空间中的亲和性捕获了原始嵌入中可能长距离的语义特征。我们在标准基准测试（包括ModelNet40、ShapeNetPart和S3DIS）上展示了我们模型的性能。", "insights": {"contrib": [{"en": "Proposes EdgeConv, a novel neural network module for point clouds that captures local geometric structure while maintaining permutation invariance.", "zh": "提出EdgeConv，一种新颖的点云神经网络模块，在保持置换不变性的同时捕获局部几何结构。"}, {"en": "Introduces dynamic graph updates, where the k-NN graph is recomputed in each layer based on feature space, enabling non-local semantic grouping.", "zh": "引入动态图更新，每层基于特征空间重新计算k近邻图，实现非局部语义分组。"}, {"en": "Demonstrates that EdgeConv can be integrated into existing architectures like PointNet to improve performance on classification and segmentation.", "zh": "证明EdgeConv可集成到PointNet等现有架构中，提升分类和分割性能。"}, {"en": "Achieves state-of-the-art results on ModelNet40, ShapeNetPart, and S3DIS benchmarks with efficient computation.", "zh": "在ModelNet40、ShapeNetPart和S3DIS基准上取得最先进结果，且计算高效。"}, {"en": "Provides theoretical analysis showing EdgeConv subsumes PointNet and graph CNNs as special cases.", "zh": "提供理论分析，表明EdgeConv将PointNet和图CNN作为特例包含在内。"}, {"en": "Releases code to facilitate reproducibility and future research.", "zh": "发布代码以促进可重复性和未来研究。"}], "limits": [{"en": "Performance degrades with large k in k-NN due to Euclidean distance failing to approximate geodesic distance.", "zh": "k近邻中k值过大时性能下降，因欧氏距离无法近似测地距离。"}, {"en": "Model robustness drops significantly when fewer than 512 points are used.", "zh": "当点数少于512时，模型鲁棒性显著下降。"}, {"en": "Dynamic graph computation adds computational overhead compared to fixed-graph methods.", "zh": "与固定图方法相比，动态图计算增加了计算开销。"}, {"en": "EdgeConv only considers pairwise relationships, not higher-order point tuples.", "zh": "EdgeConv仅考虑成对关系，未涉及高阶点元组。"}, {"en": "The method is evaluated only on 3D point clouds; applicability to abstract point clouds is not explored.", "zh": "该方法仅在3D点云上评估，未探索对抽象点云的适用性。"}]}}, {"id": "abbeel-1801.01290", "pid": "abbeel", "arxiv": "1801.01290", "date": "2018-01-04", "venue": "cs.LG", "fields": ["rl"], "tEn": "Soft Actor-Critic: Off-Policy Maximum Entropy Deep Reinforcement Learning with a Stochastic Actor", "tZh": "软演员-评论家：基于随机演员的离策略最大熵深度强化学习", "sEn": "Soft Actor-Critic achieves state-of-the-art performance on continuous control tasks with high stability and sample efficiency.", "sZh": "软演员-评论家算法在连续控制任务上实现了最先进的性能，具有高稳定性和样本效率。", "absEn": "Model-free deep reinforcement learning (RL) algorithms have been demonstrated on a range of challenging decision making and control tasks. However, these methods typically suffer from two major challenges: very high sample complexity and brittle convergence properties, which necessitate meticulous hyperparameter tuning. Both of these challenges severely limit the applicability of such methods to complex, real-world domains. In this paper, we propose soft actor-critic, an off-policy actor-critic deep RL algorithm based on the maximum entropy reinforcement learning framework. In this framework, the actor aims to maximize expected reward while also maximizing entropy. That is, to succeed at the task while acting as randomly as possible. Prior deep RL methods based on this framework have been formulated as Q-learning methods. By combining off-policy updates with a stable stochastic actor-critic formulation, our method achieves state-of-the-art performance on a range of continuous control benchmark tasks, outperforming prior on-policy and off-policy methods. Furthermore, we demonstrate that, in contrast to other off-policy algorithms, our approach is very stable, achieving very similar performance across different random seeds.", "absZh": "无模型深度强化学习算法已在多种具有挑战性的决策和控制任务中得到验证。然而，这些方法通常面临两大挑战：极高的样本复杂度和脆弱的收敛性，这需要细致的超参数调整。这两个挑战严重限制了此类方法在复杂现实领域中的应用。在本文中，我们提出了软演员-评论家算法，一种基于最大熵强化学习框架的离策略演员-评论家深度强化学习算法。在该框架中，演员旨在最大化期望奖励的同时最大化熵，即在尽可能随机行动的同时成功完成任务。先前基于该框架的深度强化学习方法被表述为Q学习方法。通过将离策略更新与稳定的随机演员-评论家公式相结合，我们的方法在一系列连续控制基准任务上实现了最先进的性能，优于先前的在策略和离策略方法。此外，我们证明，与其他离策略算法相比，我们的方法非常稳定，在不同随机种子下实现了非常相似的性能。", "insights": {"contrib": [{"en": "Proposes soft actor-critic (SAC), an off-policy maximum entropy deep RL algorithm.", "zh": "提出软演员-评论家（SAC），一种基于最大熵的离策略深度强化学习算法。"}, {"en": "Combines off-policy updates with a stable stochastic actor-critic formulation.", "zh": "将离策略更新与稳定的随机演员-评论家公式相结合。"}, {"en": "Achieves state-of-the-art performance on continuous control benchmarks, outperforming prior on-policy and off-policy methods.", "zh": "在连续控制基准上取得最先进性能，优于先前的在策略和离策略方法。"}, {"en": "Demonstrates high stability across different random seeds, unlike other off-policy algorithms.", "zh": "与其他离策略算法不同，展示了跨不同随机种子的高度稳定性。"}, {"en": "Provides convergence proof for soft policy iteration in the maximum entropy framework.", "zh": "在最大熵框架下提供了软策略迭代的收敛性证明。"}, {"en": "Uses two Q-functions to mitigate positive bias and improve training speed.", "zh": "使用两个Q函数来减轻正向偏差并提高训练速度。"}], "limits": [{"en": "Sensitive to reward scaling, which controls the temperature and policy stochasticity.", "zh": "对奖励缩放敏感，该缩放控制温度和策略随机性。"}, {"en": "Requires tuning of reward scale as a key hyperparameter for optimal performance.", "zh": "需要调整奖励缩放作为关键超参数以获得最佳性能。"}, {"en": "Assumes continuous action spaces; applicability to discrete actions not directly addressed.", "zh": "假设连续动作空间；未直接解决离散动作的适用性。"}, {"en": "Performance may degrade with very small or very large reward magnitudes due to exploration-exploitation balance.", "zh": "由于探索-利用平衡，奖励幅度非常小或非常大时性能可能下降。"}, {"en": "Theoretical convergence proof assumes finite action space, limiting direct extension to continuous actions.", "zh": "理论收敛性证明假设有限动作空间，限制了直接扩展到连续动作。"}]}, "cites": 11501, "org": "UC Berkeley"}, {"id": "demis-1712.01815", "pid": "demis", "arxiv": "1712.01815", "date": "2017-12-05", "venue": "cs.AI", "fields": ["rl"], "tEn": "Mastering Chess and Shogi by Self-Play with a General Reinforcement Learning Algorithm", "tZh": "通过通用强化学习算法的自我对弈掌握国际象棋和将棋", "sEn": "AlphaZero achieves superhuman performance in chess, shogi, and Go through self-play reinforcement learning with no domain knowledge beyond game rules.", "sZh": "AlphaZero通过自我对弈强化学习，在仅知游戏规则而无领域知识的情况下，在国际象棋、将棋和围棋中达到超人类水平。", "absEn": "The game of chess is the most widely-studied domain in the history of artificial intelligence. The strongest programs are based on a combination of sophisticated search techniques, domain-specific adaptations, and handcrafted evaluation functions that have been refined by human experts over several decades. In contrast, the AlphaGo Zero program recently achieved superhuman performance in the game of Go, by tabula rasa reinforcement learning from games of self-play. In this paper, we generalise this approach into a single AlphaZero algorithm that can achieve, tabula rasa, superhuman performance in many challenging domains. Starting from random play, and given no domain knowledge except the game rules, AlphaZero achieved within 24 hours a superhuman level of play in the games of chess and shogi (Japanese chess) as well as Go, and convincingly defeated a world-champion program in each case.", "absZh": "国际象棋是人工智能历史上研究最广泛的领域。最强的程序基于复杂搜索技术、领域特定调整和人类专家数十年来精心设计的评估函数的结合。相比之下，AlphaGo Zero程序最近通过从自我对弈游戏中进行的无先验知识强化学习，在围棋中实现了超人类表现。在本文中，我们将这种方法推广为一个单一的AlphaZero算法，该算法可以在许多具有挑战性的领域中通过无先验知识学习达到超人类表现。从随机对弈开始，除了游戏规则外没有任何领域知识，AlphaZero在24小时内就在国际象棋、将棋（日本象棋）以及围棋中达到了超人类水平，并在每种情况下令人信服地击败了世界冠军程序。", "insights": {"contrib": [{"en": "Proposes AlphaZero, a single algorithm achieving superhuman play in chess, shogi, and Go via tabula rasa reinforcement learning.", "zh": "提出AlphaZero，一个通过从零开始的强化学习在象棋、将棋和围棋中实现超人类水平的单一算法。"}, {"en": "Uses deep neural networks and Monte-Carlo tree search without domain-specific knowledge beyond game rules.", "zh": "使用深度神经网络和蒙特卡洛树搜索，除游戏规则外无需领域特定知识。"}, {"en": "Defeats world-champion programs Stockfish, Elmo, and AlphaGo Zero in 100-game matches with zero losses in chess.", "zh": "在100局比赛中击败世界冠军程序Stockfish、Elmo和AlphaGo Zero，象棋中零败。"}, {"en": "Demonstrates MCTS scales more effectively with thinking time than alpha-beta search in chess and shogi.", "zh": "证明MCTS在象棋和将棋中随思考时间的扩展效果优于alpha-beta搜索。"}, {"en": "Discovers and plays common human chess openings independently during self-play training.", "zh": "在自我对弈训练中独立发现并下出常见的人类象棋开局。"}, {"en": "Provides a general framework applicable to multiple games without hyper-parameter tuning.", "zh": "提供无需超参数调优即可适用于多种游戏的通用框架。"}], "limits": [{"en": "Requires perfect knowledge of game rules for MCTS simulations and input encoding.", "zh": "需要游戏规则的完美知识用于MCTS模拟和输入编码。"}, {"en": "Neural network architecture may not suit games with asymmetric rules or long-range interactions.", "zh": "神经网络架构可能不适合具有不对称规则或长程交互的游戏。"}, {"en": "Training requires massive computational resources (5000 TPUs for self-play, 64 for training).", "zh": "训练需要大量计算资源（5000个TPU用于自我对弈，64个用于训练）。"}, {"en": "Does not incorporate domain-specific enhancements like opening books or endgame tablebases.", "zh": "未整合领域特定增强，如开局库或残局数据库。"}, {"en": "Performance may degrade in games with draws or non-binary outcomes due to expected outcome optimization.", "zh": "在平局或非二元结果的游戏中，由于期望结果优化，性能可能下降。"}]}, "cites": 2088, "org": "DeepMind"}, {"id": "pvelickovic-1710.10903", "pid": "pvelickovic", "arxiv": "1710.10903", "date": "2017-10-30", "venue": "stat.ML", "org": "University of Cambridge / Montreal", "fields": ["deep-learning"], "tEn": "Graph Attention Networks", "tZh": "图注意力网络", "sEn": "Graph Attention Networks (GATs) use masked self-attention to assign different weights to different nodes in a neighborhood, improving upon graph convolution methods.", "sZh": "图注意力网络（GATs）利用掩蔽自注意力机制为邻域中的不同节点分配不同权重，改进了图卷积方法。", "absEn": "We present graph attention networks (GATs), novel neural network architectures that operate on graph-structured data, leveraging masked self-attentional layers to address the shortcomings of prior methods based on graph convolutions or their approximations. By stacking layers in which nodes are able to attend over their neighborhoods' features, we enable (implicitly) specifying different weights to different nodes in a neighborhood, without requiring any kind of costly matrix operation (such as inversion) or depending on knowing the graph structure upfront. In this way, we address several key challenges of spectral-based graph neural networks simultaneously, and make our model readily applicable to inductive as well as transductive problems. Our GAT models have achieved or matched state-of-the-art results across four established transductive and inductive graph benchmarks: the Cora, Citeseer and Pubmed citation network datasets, as well as a protein-protein interaction dataset (wherein test graphs remain unseen during training).", "absZh": "我们提出了图注意力网络（GATs），这是一种新颖的神经网络架构，用于处理图结构数据。它利用掩蔽自注意力层来克服基于图卷积或其近似方法的先前方法的缺点。通过堆叠节点能够关注其邻域特征的层，我们能够（隐式地）为邻域中的不同节点指定不同的权重，而无需任何昂贵的矩阵运算（如求逆）或预先知道图结构。这样，我们同时解决了基于谱的图神经网络的几个关键挑战，并使我们的模型易于应用于归纳式以及直推式问题。我们的GAT模型在四个公认的直推式和归纳式图基准测试中取得了或匹配了最先进的结果：Cora、Citeseer和Pubmed引文网络数据集，以及一个蛋白质-蛋白质相互作用数据集（其中测试图在训练期间未见）。", "insights": {"contrib": [{"en": "Proposes graph attention networks (GATs) using masked self-attentional layers for graph-structured data.", "zh": "提出使用掩码自注意力层的图注意力网络（GAT）处理图结构数据。"}, {"en": "Enables implicit assignment of different weights to nodes in a neighborhood without costly matrix operations.", "zh": "无需昂贵矩阵运算即可隐式地为邻域内节点分配不同权重。"}, {"en": "Achieves state-of-the-art results on four transductive and inductive graph benchmarks.", "zh": "在四个直推式和归纳式图基准上取得最先进结果。"}, {"en": "Introduces multi-head attention to stabilize learning and improve model capacity.", "zh": "引入多头注意力以稳定学习并提升模型容量。"}, {"en": "Demonstrates applicability to inductive learning with completely unseen test graphs.", "zh": "展示了对完全未见测试图的归纳学习的适用性。"}, {"en": "Provides interpretability through learned attention weights.", "zh": "通过学习到的注意力权重提供可解释性。"}], "limits": [{"en": "Sparse matrix operations limit batching capabilities for multi-graph datasets.", "zh": "稀疏矩阵操作限制了多图数据集的批处理能力。"}, {"en": "GPU performance may not surpass CPU for sparse graph structures.", "zh": "对于稀疏图结构，GPU性能可能不优于CPU。"}, {"en": "Receptive field size is bounded by network depth, requiring skip connections for deeper models.", "zh": "感受野大小受网络深度限制，深层模型需跳跃连接。"}, {"en": "Parallelization across edges may cause redundant computation due to overlapping neighborhoods.", "zh": "跨边并行化可能因邻域重叠导致冗余计算。"}, {"en": "Attention mechanism analysis for interpretability requires domain knowledge and is left for future work.", "zh": "注意力机制的可解释性分析需领域知识，留待未来工作。"}]}}, {"id": "tkarras-1710.10196", "pid": "tkarras", "arxiv": "1710.10196", "date": "2017-10-27", "venue": "cs.NE", "org": "NVIDIA", "fields": ["generative", "vision"], "tEn": "Progressive Growing of GANs for Improved Quality, Stability, and Variation", "tZh": "渐进式增长生成对抗网络：提升质量、稳定性和多样性", "sEn": "Progressive growing of GANs enables high-resolution image synthesis with improved quality, stability, and variation.", "sZh": "渐进式增长生成对抗网络能够生成高质量、高分辨率图像，同时提升训练稳定性和图像多样性。", "absEn": "We describe a new training methodology for generative adversarial networks. The key idea is to grow both the generator and discriminator progressively: starting from a low resolution, we add new layers that model increasingly fine details as training progresses. This both speeds the training up and greatly stabilizes it, allowing us to produce images of unprecedented quality, e.g., CelebA images at 1024^2. We also propose a simple way to increase the variation in generated images, and achieve a record inception score of 8.80 in unsupervised CIFAR10. Additionally, we describe several implementation details that are important for discouraging unhealthy competition between the generator and discriminator. Finally, we suggest a new metric for evaluating GAN results, both in terms of image quality and variation. As an additional contribution, we construct a higher-quality version of the CelebA dataset.", "absZh": "我们提出了一种新的生成对抗网络训练方法。核心思想是逐步增长生成器和判别器：从低分辨率开始，随着训练进程逐步添加建模更精细细节的新层。这既加快了训练速度，又极大地稳定了训练过程，使我们能够生成前所未有的高质量图像，例如1024×1024分辨率的CelebA图像。我们还提出了一种简单的方法来增加生成图像的多样性，并在无监督CIFAR10上取得了8.80的创纪录初始分数。此外，我们描述了若干重要的实现细节，用于抑制生成器和判别器之间的不良竞争。最后，我们提出了一种新的评估GAN结果的指标，同时考虑图像质量和多样性。作为额外贡献，我们构建了更高质量的CelebA数据集版本。", "insights": {"contrib": [{"en": "Progressive growing of GANs from low to high resolution, adding layers for fine details.", "zh": "渐进式增长GAN，从低分辨率到高分辨率逐步添加层以建模细节。"}, {"en": "Minibatch standard deviation layer to increase variation without learnable parameters.", "zh": "小批量标准差层，无需可学习参数即可增加生成图像的多样性。"}, {"en": "Equalized learning rate via runtime weight scaling for balanced training.", "zh": "通过运行时权重缩放实现均衡学习率，平衡各层训练速度。"}, {"en": "Pixelwise feature vector normalization in generator to prevent signal escalation.", "zh": "生成器中逐像素特征向量归一化，防止信号幅度失控。"}, {"en": "Sliced Wasserstein distance (SWD) metric for evaluating GAN quality and variation.", "zh": "切片Wasserstein距离（SWD）指标，用于评估GAN的图像质量和多样性。"}, {"en": "High-quality CelebA-HQ dataset at 1024x1024 resolution for benchmarking.", "zh": "高质量CelebA-HQ数据集，分辨率为1024x1024，用于基准测试。"}], "limits": [{"en": "Progressive growing may not generalize to non-image domains or structured outputs.", "zh": "渐进式增长可能无法泛化到非图像领域或结构化输出。"}, {"en": "Pixelwise normalization can overly constrain generator, limiting expressiveness.", "zh": "逐像素归一化可能过度约束生成器，限制其表达能力。"}, {"en": "SWD metric relies on random projections and may miss subtle mode collapses.", "zh": "SWD指标依赖随机投影，可能遗漏细微的模式坍塌。"}, {"en": "Method requires careful tuning of fading schedules and layer addition timing.", "zh": "该方法需要仔细调整淡入调度和层添加时机。"}, {"en": "High-resolution training still demands significant computational resources.", "zh": "高分辨率训练仍需要大量计算资源。"}]}}, {"id": "hinton-1710.09829", "pid": "hinton", "arxiv": "1710.09829", "date": "2017-10-26", "venue": "cs.CV", "fields": ["deep-learning", "vision"], "tEn": "Dynamic Routing Between Capsules", "tZh": "动态路由在胶囊网络中的应用", "sEn": "A capsule network with dynamic routing achieves state-of-the-art on MNIST and excels at recognizing overlapping digits.", "sZh": "一种采用动态路由机制的胶囊网络在MNIST上达到最优性能，并在识别高度重叠数字方面显著优于卷积网络。", "absEn": "A capsule is a group of neurons whose activity vector represents the instantiation parameters of a specific type of entity such as an object or an object part. We use the length of the activity vector to represent the probability that the entity exists and its orientation to represent the instantiation parameters. Active capsules at one level make predictions, via transformation matrices, for the instantiation parameters of higher-level capsules. When multiple predictions agree, a higher level capsule becomes active. We show that a discrimininatively trained, multi-layer capsule system achieves state-of-the-art performance on MNIST and is considerably better than a convolutional net at recognizing highly overlapping digits. To achieve these results we use an iterative routing-by-agreement mechanism: A lower-level capsule prefers to send its output to higher level capsules whose activity vectors have a big scalar product with the prediction coming from the lower-level capsule.", "absZh": "胶囊是一组神经元，其活动向量表示特定类型实体（如物体或物体部分）的实例化参数。我们使用活动向量的长度表示实体存在的概率，其方向表示实例化参数。低层胶囊通过变换矩阵对高层胶囊的实例化参数进行预测。当多个预测一致时，高层胶囊被激活。我们证明，一个经过判别训练的多层胶囊系统在MNIST上达到了最先进的性能，并且在识别高度重叠的数字方面明显优于卷积网络。为了实现这些结果，我们使用了一种迭代的路由协议机制：低层胶囊倾向于将其输出发送给那些活动向量与低层胶囊预测的标量积较大的高层胶囊。", "insights": {"contrib": [{"en": "Introduces CapsNet with dynamic routing-by-agreement, achieving state-of-the-art 0.25% test error on MNIST.", "zh": "提出带有动态路由协议的 CapsNet，在 MNIST 上达到 0.25% 的测试错误率，为当时最优。"}, {"en": "Capsules use vector outputs to represent instantiation parameters, with vector length indicating entity existence.", "zh": "胶囊使用向量输出表示实例化参数，向量长度表示实体存在概率。"}, {"en": "Dynamic routing enables superior segmentation of highly overlapping digits, outperforming CNNs on MultiMNIST.", "zh": "动态路由实现了对高度重叠数字的优越分割，在 MultiMNIST 上优于 CNN。"}, {"en": "CapsNet generalizes better to affine transformations than CNNs, achieving 79% vs 66% on affNIST.", "zh": "CapsNet 对仿射变换的泛化能力优于 CNN，在 affNIST 上达到 79% 对比 66%。"}, {"en": "The model uses a reconstruction regularizer to enforce pose encoding, improving routing performance.", "zh": "模型使用重构正则化强制姿态编码，提升了路由性能。"}, {"en": "Capsules provide viewpoint-invariant knowledge via transformation matrices, avoiding exponential inefficiencies of CNNs.", "zh": "胶囊通过变换矩阵提供视角不变知识，避免了 CNN 的指数级低效问题。"}], "limits": [{"en": "Assumes at most one instance of a capsule's entity per location, limiting handling of multiple same-class objects.", "zh": "假设每个位置最多存在一个胶囊实体，限制了处理同类别多个对象的能力。"}, {"en": "Performance on CIFAR-10 (10.6% error) is modest, as capsules struggle with complex backgrounds.", "zh": "在 CIFAR-10 上性能一般（10.6% 错误率），因为胶囊难以处理复杂背景。"}, {"en": "Routing-by-agreement requires iterative computation, increasing inference cost compared to max-pooling.", "zh": "动态路由需要迭代计算，相比最大池化增加了推理成本。"}, {"en": "The model is shallow (3 layers) and may not scale well to deeper architectures or larger datasets.", "zh": "模型较浅（3 层），可能难以扩展到更深架构或更大数据集。"}, {"en": "Capsule networks are still in early research stage, requiring more insights to outperform mature technologies like CNNs.", "zh": "胶囊网络仍处于早期研究阶段，需要更多洞察才能超越 CNN 等成熟技术。"}]}, "cites": 5131, "org": "Google"}, {"id": "hvanhasselt-1710.02298", "pid": "hvanhasselt", "arxiv": "1710.02298", "date": "2017-10-06", "venue": "cs.AI", "org": "Google DeepMind", "fields": ["rl", "deep-learning"], "tEn": "Rainbow: Combining Improvements in Deep Reinforcement Learning", "tZh": "彩虹：融合深度强化学习的多项改进", "sEn": "Combining six DQN extensions yields state-of-the-art Atari performance.", "sZh": "将六种DQN扩展相结合，在Atari基准上实现了最先进的性能。", "absEn": "The deep reinforcement learning community has made several independent improvements to the DQN algorithm. However, it is unclear which of these extensions are complementary and can be fruitfully combined. This paper examines six extensions to the DQN algorithm and empirically studies their combination. Our experiments show that the combination provides state-of-the-art performance on the Atari 2600 benchmark, both in terms of data efficiency and final performance. We also provide results from a detailed ablation study that shows the contribution of each component to overall performance.", "absZh": "深度强化学习社区对DQN算法进行了多项独立的改进。然而，目前尚不清楚这些扩展中哪些是互补的，可以有效地结合起来。本文研究了DQN算法的六种扩展，并实证研究了它们的组合效果。我们的实验表明，这种组合在Atari 2600基准测试中，无论是在数据效率还是最终性能方面，都达到了最先进的水平。我们还提供了详细的消融研究结果，展示了每个组成部分对整体性能的贡献。", "insights": {"contrib": [{"en": "Integrates six DQN extensions into a single agent, Rainbow, achieving state-of-the-art performance on Atari 2600.", "zh": "将六种DQN扩展整合为单一智能体Rainbow，在Atari 2600上达到最先进性能。"}, {"en": "Demonstrates that prioritized replay and multi-step learning are the most crucial components for performance.", "zh": "证明优先回放和多步学习是对性能最关键的两个组件。"}, {"en": "Shows that distributional Q-learning improves final performance, especially on games near or above human level.", "zh": "展示分布式Q学习提升最终性能，尤其在接近或超越人类水平的游戏上。"}, {"en": "Provides a detailed ablation study quantifying each component's contribution to overall performance.", "zh": "提供详细消融研究，量化每个组件对整体性能的贡献。"}, {"en": "Achieves data efficiency by matching DQN's final performance after only 7 million frames.", "zh": "仅用700万帧即达到DQN最终性能，实现数据效率提升。"}, {"en": "Uses a dueling network architecture adapted for return distributions and noisy layers for exploration.", "zh": "采用适用于回报分布的对偶网络架构和用于探索的噪声层。"}], "limits": [{"en": "Evaluation limited to Atari 2600 games; generalization to other domains not tested.", "zh": "评估仅限于Atari 2600游戏，未测试对其他领域的泛化性。"}, {"en": "Hyper-parameters tuned manually via coordinate descent; no exhaustive search performed.", "zh": "超参数通过手动坐标下降调整，未进行穷举搜索。"}, {"en": "Does not explore parallelism or scalability; wall-clock time comparisons not provided.", "zh": "未探索并行性或可扩展性，未提供实际时间比较。"}, {"en": "Reward clipping may limit the effectiveness of double Q-learning in the distributional setting.", "zh": "奖励裁剪可能限制双重Q学习在分布式设置中的有效性。"}, {"en": "Only value-based methods considered; policy-based and actor-critic methods excluded.", "zh": "仅考虑基于价值的方法，排除了基于策略和演员-评论家方法。"}]}}, {"id": "mbellemare-1707.06887", "pid": "mbellemare", "arxiv": "1707.06887", "date": "2017-07-21", "venue": "cs.LG", "org": "Google DeepMind", "fields": ["rl", "deep-learning"], "tEn": "A Distributional Perspective on Reinforcement Learning", "tZh": "强化学习的分布视角", "sEn": "Modeling the full distribution of returns, not just the expected value, improves reinforcement learning performance.", "sZh": "建模回报的完整分布而非仅期望值，能提升强化学习性能。", "absEn": "In this paper we argue for the fundamental importance of the value distribution: the distribution of the random return received by a reinforcement learning agent. This is in contrast to the common approach to reinforcement learning which models the expectation of this return, or value. Although there is an established body of literature studying the value distribution, thus far it has always been used for a specific purpose such as implementing risk-aware behaviour. We begin with theoretical results in both the policy evaluation and control settings, exposing a significant distributional instability in the latter. We then use the distributional perspective to design a new algorithm which applies Bellman's equation to the learning of approximate value distributions. We evaluate our algorithm using the suite of games from the Arcade Learning Environment. We obtain both state-of-the-art results and anecdotal evidence demonstrating the importance of the value distribution in approximate reinforcement learning. Finally, we combine theoretical and empirical evidence to highlight the ways in which the value distribution impacts learning in the approximate setting.", "absZh": "本文论证了价值分布（强化学习智能体获得的随机回报的分布）的根本重要性，这与通常只建模回报期望（即价值）的强化学习方法形成对比。尽管已有文献研究价值分布，但此前它总是用于特定目的，如实现风险感知行为。我们从策略评估和控制设置的理论结果开始，揭示了后者中显著的分布不稳定性。然后利用分布视角设计了一种新算法，将贝尔曼方程应用于近似价值分布的学习。我们使用街机学习环境中的游戏套件评估了该算法，获得了最先进的结果和轶事证据，证明了价值分布在近似强化学习中的重要性。最后，我们结合理论和实证证据，强调了价值分布在近似设置中影响学习的方式。", "insights": {"contrib": [{"en": "Argues for the fundamental importance of the value distribution in reinforcement learning.", "zh": "论证了价值分布在强化学习中的根本重要性。"}, {"en": "Proves the distributional Bellman operator is a contraction in the Wasserstein metric for policy evaluation.", "zh": "证明了分布贝尔曼算子在策略评估的Wasserstein度量下是压缩映射。"}, {"en": "Identifies instability in the distributional Bellman optimality operator for control.", "zh": "识别了控制设置中分布贝尔曼最优算子的不稳定性。"}, {"en": "Introduces Categorical DQN, a new algorithm learning approximate value distributions.", "zh": "提出了Categorical DQN，一种学习近似价值分布的新算法。"}, {"en": "Achieves state-of-the-art results on Atari 2600 games, outperforming DQN and other baselines.", "zh": "在Atari 2600游戏上取得了最先进的结果，优于DQN和其他基线。"}, {"en": "Provides theoretical and empirical evidence that value distributions improve approximate reinforcement learning.", "zh": "提供了理论和经验证据，表明价值分布改进了近似强化学习。"}], "limits": [{"en": "Theoretical results assume bounded moments and finite action spaces.", "zh": "理论结果假设有界矩和有限动作空间。"}, {"en": "Empirical evaluation limited to Atari 2600 games; generalizability to other domains is unverified.", "zh": "经验评估仅限于Atari 2600游戏；对其他领域的泛化性未验证。"}, {"en": "Categorical DQN requires careful tuning of support bounds and number of atoms.", "zh": "Categorical DQN需要仔细调整支持范围和原子数量。"}, {"en": "The distributional optimality operator may not converge to a fixed point in control settings.", "zh": "分布最优算子在控制设置中可能不收敛到不动点。"}, {"en": "Algorithm performance depends on the choice of projection and loss function.", "zh": "算法性能依赖于投影和损失函数的选择。"}]}}, {"id": "schulman-1707.06347", "pid": "schulman", "arxiv": "1707.06347", "date": "2017-07-20", "venue": "cs.LG", "fields": ["rl"], "tEn": "Proximal Policy Optimization Algorithms", "tZh": "近端策略优化算法", "sEn": "PPO is a family of policy gradient methods that use a novel surrogate objective to enable multiple minibatch updates per data sample, outperforming other online methods.", "sZh": "PPO是一类策略梯度方法，通过新颖的替代目标函数实现每个数据样本多次小批量更新，优于其他在线方法。", "absEn": "We propose a new family of policy gradient methods for reinforcement learning, which alternate between sampling data through interaction with the environment, and optimizing a \"surrogate\" objective function using stochastic gradient ascent. Whereas standard policy gradient methods perform one gradient update per data sample, we propose a novel objective function that enables multiple epochs of minibatch updates. The new methods, which we call proximal policy optimization (PPO), have some of the benefits of trust region policy optimization (TRPO), but they are much simpler to implement, more general, and have better sample complexity (empirically). Our experiments test PPO on a collection of benchmark tasks, including simulated robotic locomotion and Atari game playing, and we show that PPO outperforms other online policy gradient methods, and overall strikes a favorable balance between sample complexity, simplicity, and wall-time.", "absZh": "我们提出了一类新的用于强化学习的策略梯度方法，这些方法在与环境交互采样数据和利用随机梯度上升优化“替代”目标函数之间交替进行。标准策略梯度方法每个数据样本只进行一次梯度更新，而我们提出了一个新的目标函数，使得可以进行多个小批量更新周期。这种新方法被称为近端策略优化（PPO），它兼具信任区域策略优化（TRPO）的一些优点，但实现更简单、更通用，并且经验上样本复杂度更优。我们的实验在包括模拟机器人运动和Atari游戏在内的基准任务上测试了PPO，结果表明PPO优于其他在线策略梯度方法，并且在样本复杂度、简单性和实际运行时间之间取得了良好的平衡。", "insights": {"contrib": [{"en": "Proposes PPO, a family of policy gradient methods using a clipped surrogate objective for stable updates.", "zh": "提出PPO，一类使用裁剪替代目标进行稳定更新的策略梯度方法。"}, {"en": "Enables multiple epochs of minibatch updates per data sample, improving sample efficiency.", "zh": "每个数据样本支持多个小批量更新周期，提高样本效率。"}, {"en": "Simpler to implement than TRPO while retaining similar performance benefits.", "zh": "比TRPO更易实现，同时保留相似的性能优势。"}, {"en": "Empirically outperforms other online policy gradient methods on robotic locomotion and Atari games.", "zh": "在机器人运动和Atari游戏上经验性地优于其他在线策略梯度方法。"}, {"en": "Strikes a favorable balance between sample complexity, simplicity, and wall-time.", "zh": "在样本复杂度、简单性和运行时间之间取得良好平衡。"}], "limits": [{"en": "PPO's clipped objective may still allow large policy updates in some cases.", "zh": "PPO的裁剪目标在某些情况下仍可能允许较大的策略更新。"}, {"en": "Requires careful tuning of hyperparameters like clip epsilon and learning rate.", "zh": "需要仔细调整超参数，如裁剪阈值和学习率。"}, {"en": "Performance on tasks with sparse rewards or long horizons may degrade.", "zh": "在稀疏奖励或长视野任务上的性能可能下降。"}, {"en": "Theoretical convergence guarantees are not fully established.", "zh": "理论收敛保证尚未完全建立。"}, {"en": "May not scale well to very high-dimensional action spaces.", "zh": "可能无法很好地扩展到非常高维的动作空间。"}]}, "org": "OpenAI"}, {"id": "shazeer-1706.03762", "pid": "shazeer", "arxiv": "1706.03762", "date": "2017-06-12", "venue": "cs.CL", "fields": ["nlp", "deep-learning"], "tEn": "Attention Is All You Need", "tZh": "注意力机制就是一切", "sEn": "The Transformer model, based solely on attention mechanisms, outperforms recurrent and convolutional models in machine translation while being more parallelizable and faster to train.", "sZh": "仅基于注意力机制的Transformer模型在机器翻译中优于循环和卷积模型，且更易并行化、训练更快。", "absEn": "The dominant sequence transduction models are based on complex recurrent or convolutional neural networks in an encoder-decoder configuration. The best performing models also connect the encoder and decoder through an attention mechanism. We propose a new simple network architecture, the Transformer, based solely on attention mechanisms, dispensing with recurrence and convolutions entirely. Experiments on two machine translation tasks show these models to be superior in quality while being more parallelizable and requiring significantly less time to train. Our model achieves 28.4 BLEU on the WMT 2014 English-to-German translation task, improving over the existing best results, including ensembles by over 2 BLEU. On the WMT 2014 English-to-French translation task, our model establishes a new single-model state-of-the-art BLEU score of 41.8 after training for 3.5 days on eight GPUs, a small fraction of the training costs of the best models from the literature. We show that the Transformer generalizes well to other tasks by applying it successfully to English constituency parsing both with large and limited training data.", "absZh": "主流的序列转换模型基于复杂的循环或卷积神经网络，采用编码器-解码器结构。性能最佳的模型还通过注意力机制连接编码器和解码器。我们提出了一种新的简单网络架构——Transformer，它完全基于注意力机制，完全摒弃了循环和卷积。在两个机器翻译任务上的实验表明，这些模型在质量上更优，同时更易于并行化，且训练时间显著减少。我们的模型在WMT 2014英德翻译任务上达到了28.4 BLEU，比现有最佳结果（包括集成模型）提高了超过2 BLEU。在WMT 2014英法翻译任务上，我们的模型在8个GPU上训练3.5天后，建立了新的单模型最优BLEU分数41.8，仅为文献中最佳模型训练成本的一小部分。我们通过将Transformer成功应用于英语成分句法分析（包括大规模和有限训练数据），证明了其良好的泛化能力。", "insights": {"contrib": [{"en": "Proposes Transformer, a novel architecture based solely on attention mechanisms, eliminating recurrence and convolutions.", "zh": "提出Transformer，一种完全基于注意力机制的新架构，消除了循环和卷积。"}, {"en": "Achieves state-of-the-art BLEU scores of 28.4 on WMT 2014 English-German and 41.8 on English-French translation.", "zh": "在WMT 2014英德和英法翻译任务上分别取得28.4和41.8 BLEU的最新结果。"}, {"en": "Demonstrates significantly faster training due to parallelization, reducing training time to 3.5 days on 8 GPUs.", "zh": "由于并行化，训练速度显著提升，在8个GPU上仅需3.5天。"}, {"en": "Introduces multi-head attention to jointly attend to information from different representation subspaces.", "zh": "引入多头注意力机制，从不同表示子空间联合关注信息。"}, {"en": "Shows strong generalization to other tasks like English constituency parsing with both large and limited data.", "zh": "在英语成分句法分析等任务上表现出强泛化能力，无论数据量大小。"}], "limits": [{"en": "Self-attention's quadratic complexity in sequence length limits scalability to very long sequences.", "zh": "自注意力在序列长度上的二次复杂度限制了其扩展到极长序列。"}, {"en": "The model lacks explicit positional encoding, relying on added sinusoidal signals which may not capture all positional nuances.", "zh": "模型缺乏显式位置编码，依赖附加的正弦信号，可能无法捕捉所有位置细节。"}, {"en": "Training requires careful hyperparameter tuning (e.g., learning rate schedule, dropout) to achieve optimal performance.", "zh": "训练需要仔细调整超参数（如学习率计划、dropout）才能达到最优性能。"}, {"en": "The architecture's interpretability is limited despite attention visualization; deeper understanding of learned patterns remains challenging.", "zh": "尽管有注意力可视化，架构的可解释性仍有限，深入理解学习模式仍有挑战。"}]}, "cites": 181598, "org": "Google"}, {"id": "christiano-1706.03741", "pid": "christiano", "arxiv": "1706.03741", "date": "2017-06-12", "venue": "stat.ML", "fields": ["safety", "rl"], "tEn": "Deep reinforcement learning from human preferences", "tZh": "基于人类偏好的深度强化学习", "sEn": "We can train complex RL behaviors using human preferences on trajectory segments, requiring feedback on less than 1% of agent interactions.", "sZh": "我们可以通过人类对轨迹片段的偏好来训练复杂的强化学习行为，仅需对不到1%的智能体交互提供反馈。", "absEn": "For sophisticated reinforcement learning (RL) systems to interact usefully with real-world environments, we need to communicate complex goals to these systems. In this work, we explore goals defined in terms of (non-expert) human preferences between pairs of trajectory segments. We show that this approach can effectively solve complex RL tasks without access to the reward function, including Atari games and simulated robot locomotion, while providing feedback on less than one percent of our agent's interactions with the environment. This reduces the cost of human oversight far enough that it can be practically applied to state-of-the-art RL systems. To demonstrate the flexibility of our approach, we show that we can successfully train complex novel behaviors with about an hour of human time. These behaviors and environments are considerably more complex than any that have been previously learned from human feedback.", "absZh": "为了让复杂的强化学习系统能够有效地与现实世界环境交互，我们需要向这些系统传达复杂的目标。在这项工作中，我们探索了基于（非专家）人类对轨迹片段对之间的偏好来定义目标。我们展示了这种方法可以在无需奖励函数的情况下有效解决复杂的强化学习任务，包括Atari游戏和模拟机器人运动，同时仅需对智能体与环境交互的不到1%提供反馈。这大大降低了人类监督的成本，使其能够实际应用于最先进的强化学习系统。为了展示我们方法的灵活性，我们证明可以用大约一小时的人类时间成功训练出复杂的新行为。这些行为和环境比以往任何通过人类反馈学习到的都要复杂得多。", "insights": {"contrib": [{"en": "Proposes a method to train deep RL agents from human preferences between trajectory segments, reducing human oversight cost.", "zh": "提出一种从人类对轨迹片段的偏好中训练深度强化学习智能体的方法，降低了人类监督成本。"}, {"en": "Demonstrates solving complex RL tasks (Atari games, robot locomotion) with less than 1% of agent-environment interactions labeled.", "zh": "展示了在不到1%的智能体-环境交互被标注的情况下，解决复杂强化学习任务（Atari游戏、机器人运动）。"}, {"en": "Shows novel behaviors (backflip, one-leg stand) can be learned from about an hour of human feedback.", "zh": "展示了从约一小时的人类反馈中学习新颖行为（后空翻、单腿站立）。"}, {"en": "Introduces an ensemble of reward predictors and online query selection to improve learning efficiency.", "zh": "引入奖励预测器集成和在线查询选择以提高学习效率。"}, {"en": "Provides evidence that human feedback can be economically scaled to state-of-the-art deep RL systems.", "zh": "提供了人类反馈可经济地扩展到最先进深度强化学习系统的证据。"}], "limits": [{"en": "Method may fail on tasks where short clips are confusing, e.g., Qbert with real human feedback.", "zh": "方法在短片段令人困惑的任务上可能失败，例如使用真实人类反馈的Qbert。"}, {"en": "Offline reward predictor training leads to poor performance due to nonstationary occupancy distribution.", "zh": "离线奖励预测器训练因占用分布的非平稳性导致性能不佳。"}, {"en": "Human feedback quality depends on rater consistency; errors or inconsistency can degrade performance.", "zh": "人类反馈质量取决于标注者一致性；错误或不一致会降低性能。"}, {"en": "Method assumes human preferences are generated by a reward function, which may not hold in all domains.", "zh": "方法假设人类偏好由奖励函数生成，这在所有领域可能不成立。"}, {"en": "Query selection based on ensemble variance is a crude approximation; better information-theoretic approaches remain future work.", "zh": "基于集成方差的查询选择是粗略近似；更好的信息论方法留待未来工作。"}]}, "cites": 5435, "org": "OpenAI"}, {"id": "shochreiter-1706.02515", "pid": "shochreiter", "arxiv": "1706.02515", "date": "2017-06-08", "venue": "cs.LG", "org": "Johannes Kepler University Linz", "fields": ["deep-learning"], "tEn": "Self-Normalizing Neural Networks", "tZh": "自归一化神经网络", "sEn": "Self-normalizing neural networks (SNNs) with SELU activations automatically converge to zero mean and unit variance, enabling deep architectures and robust learning.", "sZh": "自归一化神经网络（SNN）使用SELU激活函数，自动收敛到零均值和单位方差，从而支持深层架构和鲁棒学习。", "absEn": "Deep Learning has revolutionized vision via convolutional neural networks (CNNs) and natural language processing via recurrent neural networks (RNNs). However, success stories of Deep Learning with standard feed-forward neural networks (FNNs) are rare. FNNs that perform well are typically shallow and, therefore cannot exploit many levels of abstract representations. We introduce self-normalizing neural networks (SNNs) to enable high-level abstract representations. While batch normalization requires explicit normalization, neuron activations of SNNs automatically converge towards zero mean and unit variance. The activation function of SNNs are \"scaled exponential linear units\" (SELUs), which induce self-normalizing properties. Using the Banach fixed-point theorem, we prove that activations close to zero mean and unit variance that are propagated through many network layers will converge towards zero mean and unit variance -- even under the presence of noise and perturbations. This convergence property of SNNs allows to (1) train deep networks with many layers, (2) employ strong regularization, and (3) to make learning highly robust. Furthermore, for activations not close to unit variance, we prove an upper and lower bound on the variance, thus, vanishing and exploding gradients are impossible. We compared SNNs on (a) 121 tasks from the UCI machine learning repository, on (b) drug discovery benchmarks, and on (c) astronomy tasks with standard FNNs and other machine learning methods such as random forests and support vector machines. SNNs significantly outperformed all competing FNN methods at 121 UCI tasks, outperformed all competing methods at the Tox21 dataset, and set a new record at an astronomy data set. The winning SNN architectures are often very deep. Implementations are available at: github.com/bioinf-jku/SNNs.", "absZh": "深度学习通过卷积神经网络（CNN）和循环神经网络（RNN）在视觉和自然语言处理领域引发了革命。然而，标准前馈神经网络（FNN）在深度学习中的成功案例却很少。表现良好的FNN通常较浅，因此无法利用多层次的抽象表示。我们引入了自归一化神经网络（SNN）以实现高级抽象表示。批归一化需要显式归一化，而SNN的神经元激活会自动收敛到零均值和单位方差。SNN的激活函数是“缩放指数线性单元”（SELU），它具有自归一化特性。利用巴拿赫不动点定理，我们证明了接近零均值和单位方差的激活值在通过多个网络层传播时，即使在噪声和扰动存在的情况下，也会收敛到零均值和单位方差。SNN的这种收敛特性允许（1）训练深层网络，（2）使用强正则化，（3）使学习高度鲁棒。此外，对于不接近单位方差的激活值，我们证明了方差的上界和下界，因此梯度消失和爆炸是不可能的。我们在（a）UCI机器学习库的121个任务、（b）药物发现基准测试和（c）天文学任务上，将SNN与标准FNN以及其他机器学习方法（如随机森林和支持向量机）进行了比较。SNN在121个UCI任务上显著优于所有竞争的FNN方法，在Tox21数据集上优于所有竞争方法，并在一个天文学数据集上创造了新纪录。获胜的SNN架构通常非常深。实现代码可在github.com/bioinf-jku/SNNs获取。", "insights": {"contrib": [{"en": "Introduced self-normalizing neural networks (SNNs) with SELU activation that automatically normalize activations to zero mean and unit variance.", "zh": "提出了自归一化神经网络（SNN），使用SELU激活函数自动将激活值归一化为零均值和单位方差。"}, {"en": "Proved via Banach fixed-point theorem that activations converge to zero mean and unit variance across layers under noise and perturbations.", "zh": "通过巴拿赫不动点定理证明，在噪声和扰动下，激活值跨层收敛到零均值和单位方差。"}, {"en": "Proved upper and lower bounds on variance mapping, preventing vanishing and exploding gradients.", "zh": "证明了方差映射的上下界，防止梯度消失和梯度爆炸。"}, {"en": "Proposed alpha dropout, a regularization method tailored for SELU networks to maintain self-normalizing property.", "zh": "提出了alpha dropout，一种专为SELU网络设计的正则化方法，以保持自归一化特性。"}, {"en": "Achieved state-of-the-art results on 121 UCI tasks, Tox21 dataset, and an astronomy dataset, often with very deep architectures.", "zh": "在121个UCI任务、Tox21数据集和天文学数据集上取得了最先进的结果，通常使用非常深的架构。"}, {"en": "Demonstrated that SNNs significantly outperform other FNNs with batch, layer, weight normalization, and residual networks.", "zh": "证明SNN显著优于使用批归一化、层归一化、权重归一化和残差网络的其他前馈神经网络。"}], "limits": [{"en": "Self-normalizing property relies on the central limit theorem assumption, which may not hold for very narrow layers.", "zh": "自归一化性质依赖于中心极限定理假设，对于非常窄的层可能不成立。"}, {"en": "Theoretical guarantees require weight initialization with zero mean and variance 1/n, which may be violated during training.", "zh": "理论保证要求权重初始化为零均值和1/n方差，训练中可能被违反。"}, {"en": "Performance on small datasets (less than 1000 samples) is inferior to random forests and SVMs.", "zh": "在小数据集（少于1000个样本）上性能不如随机森林和支持向量机。"}, {"en": "The proof of contraction mapping uses computer-assisted verification on a grid, which may not cover all possible parameter ranges.", "zh": "压缩映射的证明使用了网格上的计算机辅助验证，可能未覆盖所有可能的参数范围。"}, {"en": "Alpha dropout requires tuning of dropout rate, and optimal rates may vary across tasks.", "zh": "Alpha dropout需要调整丢弃率，最优率可能因任务而异。"}]}}, {"id": "wlhamilton-1706.02216", "pid": "wlhamilton", "arxiv": "1706.02216", "date": "2017-06-07", "venue": "cs.SI", "org": "Stanford", "fields": ["deep-learning"], "tEn": "Inductive Representation Learning on Large Graphs", "tZh": "大规模图上的归纳式表示学习", "sEn": "GraphSAGE learns a function to generate node embeddings by sampling and aggregating features from local neighborhoods, enabling generalization to unseen nodes.", "sZh": "GraphSAGE通过学习一个从节点局部邻域采样并聚合特征来生成嵌入的函数，从而能够泛化到未见节点。", "absEn": "Low-dimensional embeddings of nodes in large graphs have proved extremely useful in a variety of prediction tasks, from content recommendation to identifying protein functions. However, most existing approaches require that all nodes in the graph are present during training of the embeddings; these previous approaches are inherently transductive and do not naturally generalize to unseen nodes. Here we present GraphSAGE, a general, inductive framework that leverages node feature information (e.g., text attributes) to efficiently generate node embeddings for previously unseen data. Instead of training individual embeddings for each node, we learn a function that generates embeddings by sampling and aggregating features from a node's local neighborhood. Our algorithm outperforms strong baselines on three inductive node-classification benchmarks: we classify the category of unseen nodes in evolving information graphs based on citation and Reddit post data, and we show that our algorithm generalizes to completely unseen graphs using a multi-graph dataset of protein-protein interactions.", "absZh": "在大规模图中，节点的低维嵌入在从内容推荐到蛋白质功能识别等多种预测任务中已被证明极为有用。然而，大多数现有方法要求图中的所有节点在嵌入训练期间都存在；这些先前的方法本质上是直推式的，不能自然地泛化到未见节点。本文提出了GraphSAGE，一个通用的归纳式框架，它利用节点特征信息（如文本属性）来高效地为未见数据生成节点嵌入。我们不是为每个节点训练单独的嵌入，而是学习一个函数，通过从节点的局部邻域采样并聚合特征来生成嵌入。我们的算法在三个归纳式节点分类基准上优于强基线：我们基于引文和Reddit帖子数据对演化信息图中的未见节点类别进行分类，并且我们使用一个蛋白质-蛋白质相互作用的多图数据集展示了我们的算法能够泛化到完全未见过的图。", "insights": {"contrib": [{"en": "Proposes GraphSAGE, an inductive framework for generating node embeddings on unseen data using node features.", "zh": "提出GraphSAGE，一种利用节点特征对未见数据生成节点嵌入的归纳框架。"}, {"en": "Introduces trainable aggregator functions (mean, LSTM, pooling) that operate on unordered neighbor sets.", "zh": "引入可训练的聚合函数（均值、LSTM、池化），作用于无序邻居集合。"}, {"en": "Demonstrates strong performance on three inductive node-classification benchmarks, outperforming baselines by up to 51%.", "zh": "在三个归纳节点分类基准上表现优异，比基线提升高达51%。"}, {"en": "Shows GraphSAGE generalizes to completely unseen graphs in a multi-graph protein-protein interaction dataset.", "zh": "展示GraphSAGE在多图蛋白质相互作用数据集上泛化到完全未见图。"}, {"en": "Provides theoretical analysis linking GraphSAGE to the Weisfeiler-Lehman isomorphism test and its ability to learn local graph structure.", "zh": "提供理论分析，将GraphSAGE与Weisfeiler-Lehman同构测试联系起来，并证明其学习局部图结构的能力。"}, {"en": "Achieves efficient runtime by sampling fixed-size neighbor sets, maintaining performance with K=2 and S1*S2≤500.", "zh": "通过采样固定大小的邻居集实现高效运行，在K=2且S1*S2≤500时保持性能。"}], "limits": [{"en": "Focuses on feature-rich graphs; performance may degrade on graphs without node features.", "zh": "侧重于特征丰富的图；在无节点特征的图上性能可能下降。"}, {"en": "Neighborhood sampling introduces variance; non-uniform sampling strategies are not explored.", "zh": "邻居采样引入方差；未探索非均匀采样策略。"}, {"en": "LSTM aggregator is not permutation invariant and requires random ordering of neighbors.", "zh": "LSTM聚合器不具备置换不变性，需要随机排序邻居。"}, {"en": "Theoretical analysis of clustering coefficient approximation assumes distinct node features and high-dimensional model.", "zh": "聚类系数逼近的理论分析假设节点特征互异且模型高维。"}, {"en": "Evaluation limited to node classification; link prediction and other tasks are not tested.", "zh": "评估仅限于节点分类；未测试链接预测等其他任务。"}]}}, {"id": "junyanzhu-1703.10593", "pid": "junyanzhu", "arxiv": "1703.10593", "date": "2017-03-30", "venue": "cs.CV", "org": "UC Berkeley", "fields": ["generative", "vision"], "tEn": "Unpaired Image-to-Image Translation using Cycle-Consistent Adversarial Networks", "tZh": "使用循环一致性对抗网络进行非配对图像到图像的翻译", "sEn": "We propose CycleGAN, a method for unpaired image-to-image translation using cycle-consistent adversarial networks.", "sZh": "我们提出了CycleGAN，一种使用循环一致性对抗网络进行非配对图像到图像翻译的方法。", "absEn": "Image-to-image translation is a class of vision and graphics problems where the goal is to learn the mapping between an input image and an output image using a training set of aligned image pairs. However, for many tasks, paired training data will not be available. We present an approach for learning to translate an image from a source domain $X$ to a target domain $Y$ in the absence of paired examples. Our goal is to learn a mapping $G: X \\rightarrow Y$ such that the distribution of images from $G(X)$ is indistinguishable from the distribution $Y$ using an adversarial loss. Because this mapping is highly under-constrained, we couple it with an inverse mapping $F: Y \\rightarrow X$ and introduce a cycle consistency loss to push $F(G(X)) \\approx X$ (and vice versa). Qualitative results are presented on several tasks where paired training data does not exist, including collection style transfer, object transfiguration, season transfer, photo enhancement, etc. Quantitative comparisons against several prior methods demonstrate the superiority of our approach.", "absZh": "图像到图像翻译是一类视觉和图形学问题，其目标是通过使用配对的图像对训练集来学习输入图像和输出图像之间的映射。然而，对于许多任务，配对训练数据并不可用。我们提出了一种在缺乏配对示例的情况下学习将图像从源域X转换到目标域Y的方法。我们的目标是学习一个映射G: X → Y，使得来自G(X)的图像分布与Y的分布无法区分，这通过对抗损失实现。由于这个映射高度欠约束，我们将其与逆映射F: Y → X耦合，并引入循环一致性损失来推动F(G(X)) ≈ X（反之亦然）。我们在多个不存在配对训练数据的任务上展示了定性结果，包括集合风格迁移、物体变形、季节转换、照片增强等。与几种先前方法的定量比较证明了我们方法的优越性。", "insights": {"contrib": [{"en": "Proposes CycleGAN for unpaired image-to-image translation using cycle-consistent adversarial networks.", "zh": "提出CycleGAN，利用循环一致性对抗网络实现无配对图像到图像翻译。"}, {"en": "Introduces cycle consistency loss to enforce forward and backward translation consistency.", "zh": "引入循环一致性损失，强制前向和后向翻译的一致性。"}, {"en": "Demonstrates effectiveness on tasks like style transfer, object transfiguration, season transfer, and photo enhancement.", "zh": "在风格迁移、物体变形、季节转换和照片增强等任务上展示有效性。"}, {"en": "Outperforms prior unpaired methods in qualitative and quantitative comparisons.", "zh": "在定性和定量比较中优于先前的无配对方法。"}, {"en": "Provides open-source PyTorch and Torch implementations.", "zh": "提供开源的PyTorch和Torch实现。"}], "limits": [{"en": "Fails on tasks requiring geometric changes, e.g., dog-to-cat transfiguration.", "zh": "在需要几何变化的任务上失败，例如狗到猫的变形。"}, {"en": "Performance depends on dataset distribution; may produce artifacts from training set biases.", "zh": "性能依赖于数据集分布；可能因训练集偏差产生伪影。"}, {"en": "Gap remains compared to supervised methods, especially for tasks needing semantic understanding.", "zh": "与监督方法相比仍有差距，尤其在需要语义理解的任务上。"}, {"en": "Cycle consistency loss may not prevent all mode collapse or unstable training.", "zh": "循环一致性损失可能无法完全防止模式崩溃或训练不稳定。"}]}}, {"id": "abbeel-1703.06907", "pid": "abbeel", "arxiv": "1703.06907", "date": "2017-03-20", "venue": "cs.RO", "org": "OpenAI / UC Berkeley", "fields": ["rl", "vision"], "tEn": "Domain Randomization for Transferring Deep Neural Networks from Simulation to the Real World", "tZh": "域随机化：将深度神经网络从模拟迁移到现实世界", "sEn": "Domain randomization enables training deep neural networks on simulated images that transfer to real-world object localization and grasping without any real data.", "sZh": "域随机化技术使得仅使用模拟图像训练的深度神经网络能够成功迁移到现实世界，实现物体定位和抓取，无需任何真实数据。", "absEn": "Bridging the 'reality gap' that separates simulated robotics from experiments on hardware could accelerate robotic research through improved data availability. This paper explores domain randomization, a simple technique for training models on simulated images that transfer to real images by randomizing rendering in the simulator. With enough variability in the simulator, the real world may appear to the model as just another variation. We focus on the task of object localization, which is a stepping stone to general robotic manipulation skills. We find that it is possible to train a real-world object detector that is accurate to $1.5$cm and robust to distractors and partial occlusions using only data from a simulator with non-realistic random textures. To demonstrate the capabilities of our detectors, we show they can be used to perform grasping in a cluttered environment. To our knowledge, this is the first successful transfer of a deep neural network trained only on simulated RGB images (without pre-training on real images) to the real world for the purpose of robotic control.", "absZh": "弥合模拟机器人与硬件实验之间的“现实差距”可以通过改善数据可用性来加速机器人研究。本文探讨了域随机化，这是一种简单的技术，通过在模拟器中随机化渲染来训练模型，使其能够迁移到真实图像。当模拟器中的变化足够多时，现实世界可能只是模型眼中的另一种变化。我们专注于物体定位任务，这是通用机器人操作技能的基石。我们发现，仅使用来自具有非真实随机纹理的模拟器的数据，就可以训练出一个精度达到1.5厘米、对干扰物和部分遮挡具有鲁棒性的现实世界物体检测器。为了展示我们检测器的能力，我们展示了它们可以用于在杂乱环境中进行抓取。据我们所知，这是首次成功将仅使用模拟RGB图像训练的深度神经网络（无需在真实图像上预训练）迁移到现实世界用于机器人控制。", "insights": {"contrib": [{"en": "First successful transfer of deep neural network trained only on simulated RGB images to real-world robotic control.", "zh": "首次成功将仅使用模拟RGB图像训练的深度神经网络迁移到真实机器人控制。"}, {"en": "Domain randomization enables object localization accurate to 1.5 cm in the real world.", "zh": "域随机化使真实世界物体定位精度达到1.5厘米。"}, {"en": "Non-realistic random textures suffice for sim-to-real transfer without pre-training on real images.", "zh": "非真实随机纹理足以实现模拟到真实的迁移，无需在真实图像上预训练。"}, {"en": "Detectors robust to distractors and partial occlusions, enabling grasping in cluttered environments.", "zh": "检测器对干扰物和部分遮挡具有鲁棒性，可在杂乱环境中执行抓取。"}, {"en": "Ablation study shows randomization of textures and camera pose critical for transfer success.", "zh": "消融研究表明纹理和相机位姿的随机化对迁移成功至关重要。"}, {"en": "Method generalizes to real-world objects with non-uniform textures (e.g., YCB objects).", "zh": "方法泛化到具有非均匀纹理的真实物体（如YCB物体）。"}], "limits": [{"en": "Method assumes fixed table height, limiting to 2D pose estimation.", "zh": "方法假设固定桌面高度，仅限于2D姿态估计。"}, {"en": "Requires manual placement of simulated camera to roughly match real viewpoint.", "zh": "需要手动放置模拟相机以大致匹配真实视角。"}, {"en": "Accuracy limited to ~1.5 cm; insufficient for high-precision or contact-rich manipulation.", "zh": "精度限制在约1.5厘米；不足以用于高精度或接触丰富的操作。"}, {"en": "Evaluation only on geometric objects and one YCB object; generalizability to diverse objects unverified.", "zh": "评估仅限于几何物体和一个YCB物体；对多样化物体的泛化性未验证。"}, {"en": "No comparison with domain adaptation methods; combination may improve performance.", "zh": "未与域适应方法比较；结合可能提升性能。"}]}}, {"id": "finn-1703.03400", "pid": "finn", "arxiv": "1703.03400", "date": "2017-03-09", "venue": "cs.LG", "fields": ["rl", "deep-learning"], "tEn": "Model-Agnostic Meta-Learning for Fast Adaptation of Deep Networks", "tZh": "模型无关的元学习：深度网络的快速适应", "sEn": "A model-agnostic meta-learning algorithm that enables fast adaptation of deep networks with few gradient steps.", "sZh": "一种模型无关的元学习算法，通过少量梯度步骤实现深度网络的快速适应。", "absEn": "We propose an algorithm for meta-learning that is model-agnostic, in the sense that it is compatible with any model trained with gradient descent and applicable to a variety of different learning problems, including classification, regression, and reinforcement learning. The goal of meta-learning is to train a model on a variety of learning tasks, such that it can solve new learning tasks using only a small number of training samples. In our approach, the parameters of the model are explicitly trained such that a small number of gradient steps with a small amount of training data from a new task will produce good generalization performance on that task. In effect, our method trains the model to be easy to fine-tune. We demonstrate that this approach leads to state-of-the-art performance on two few-shot image classification benchmarks, produces good results on few-shot regression, and accelerates fine-tuning for policy gradient reinforcement learning with neural network policies.", "absZh": "我们提出了一种元学习算法，该算法与模型无关，即它与任何通过梯度下降训练的模型兼容，并适用于各种不同的学习问题，包括分类、回归和强化学习。元学习的目标是在多种学习任务上训练模型，使其能够仅使用少量训练样本解决新的学习任务。在我们的方法中，模型的参数被明确训练，使得来自新任务的少量训练数据经过少量梯度步骤后，就能在该任务上产生良好的泛化性能。实际上，我们的方法训练模型使其易于微调。我们证明，这种方法在两个少样本图像分类基准上达到了最先进的性能，在少样本回归上取得了良好结果，并加速了使用神经网络策略的策略梯度强化学习的微调。", "insights": {"contrib": [{"en": "Proposes MAML, a model-agnostic meta-learning algorithm compatible with any gradient-descent-trained model.", "zh": "提出 MAML，一种与任何基于梯度下降训练的模型兼容的模型无关的元学习算法。"}, {"en": "Achieves state-of-the-art few-shot classification on Omniglot and MiniImagenet with fewer parameters.", "zh": "在 Omniglot 和 MiniImagenet 上以更少参数实现少样本分类的最先进性能。"}, {"en": "Demonstrates fast adaptation in few-shot regression and reinforcement learning with policy gradients.", "zh": "在少样本回归和基于策略梯度的强化学习中展示快速适应能力。"}, {"en": "Shows that first-order approximation performs nearly as well as full second-order meta-gradient.", "zh": "表明一阶近似与完整二阶元梯度性能几乎相同。"}, {"en": "Provides a simple weight initialization that enables rapid fine-tuning with few gradient steps.", "zh": "提供简单的权重初始化，使少量梯度步骤即可快速微调。"}], "limits": [{"en": "Requires a distribution over tasks for meta-training, which may not be available.", "zh": "需要任务分布进行元训练，可能无法获得。"}, {"en": "Computationally expensive due to second-order gradients, though first-order approximation helps.", "zh": "由于二阶梯度计算成本高，尽管一阶近似有所缓解。"}, {"en": "May struggle with tasks that are very different from the meta-training distribution.", "zh": "可能难以处理与元训练分布差异很大的任务。"}, {"en": "Performance depends on the choice of inner-loop step size and number of gradient steps.", "zh": "性能依赖于内循环步长和梯度步数的选择。"}, {"en": "Not evaluated on large-scale or real-world few-shot learning benchmarks beyond image classification.", "zh": "未在图像分类之外的大规模或真实少样本学习基准上评估。"}]}, "cites": 14619, "org": "UC Berkeley"}, {"id": "shazeer-1701.06538", "pid": "shazeer", "arxiv": "1701.06538", "date": "2017-01-23", "venue": "cs.LG", "fields": ["nlp", "efficiency"], "tEn": "Outrageously Large Neural Networks: The Sparsely-Gated Mixture-of-Experts Layer", "tZh": "超大神经网络：稀疏门控专家混合层", "sEn": "Sparsely-Gated Mixture-of-Experts layer enables >1000x model capacity increase with minor computational efficiency loss on modern GPU clusters.", "sZh": "稀疏门控专家混合层能够在现代GPU集群上实现超过1000倍的模型容量提升，同时仅带来轻微的计算效率损失。", "absEn": "The capacity of a neural network to absorb information is limited by its number of parameters. Conditional computation, where parts of the network are active on a per-example basis, has been proposed in theory as a way of dramatically increasing model capacity without a proportional increase in computation. In practice, however, there are significant algorithmic and performance challenges. In this work, we address these challenges and finally realize the promise of conditional computation, achieving greater than 1000x improvements in model capacity with only minor losses in computational efficiency on modern GPU clusters. We introduce a Sparsely-Gated Mixture-of-Experts layer (MoE), consisting of up to thousands of feed-forward sub-networks. A trainable gating network determines a sparse combination of these experts to use for each example. We apply the MoE to the tasks of language modeling and machine translation, where model capacity is critical for absorbing the vast quantities of knowledge available in the training corpora. We present model architectures in which a MoE with up to 137 billion parameters is applied convolutionally between stacked LSTM layers. On large language modeling and machine translation benchmarks, these models achieve significantly better results than state-of-the-art at lower computational cost.", "absZh": "神经网络吸收信息的能力受限于其参数数量。理论上，条件计算（即网络部分按样本激活）可以大幅增加模型容量而不成比例地增加计算量。然而在实践中，存在显著的算法和性能挑战。在这项工作中，我们解决了这些挑战，最终实现了条件计算的承诺，在现代GPU集群上实现了超过1000倍的模型容量提升，同时仅带来轻微的计算效率损失。我们引入了稀疏门控专家混合层（MoE），由多达数千个前馈子网络组成。一个可训练的门控网络为每个样本确定这些专家的稀疏组合。我们将MoE应用于语言建模和机器翻译任务，在这些任务中，模型容量对于吸收训练语料库中的大量知识至关重要。我们提出了模型架构，其中包含高达1370亿参数的MoE以卷积方式堆叠在LSTM层之间。在大型语言建模和机器翻译基准测试中，这些模型以更低的计算成本取得了显著优于现有技术的结果。", "insights": {"contrib": [{"en": "Introduces Sparsely-Gated Mixture-of-Experts (MoE) layer achieving >1000x capacity increase with minor efficiency loss.", "zh": "提出稀疏门控混合专家（MoE）层，实现超过1000倍的模型容量提升，仅带来轻微计算效率损失。"}, {"en": "Applies MoE convolutionally between stacked LSTM layers for language modeling and translation.", "zh": "在堆叠LSTM层之间卷积式应用MoE，用于语言建模和机器翻译。"}, {"en": "Demonstrates up to 137 billion parameter MoE models with state-of-the-art results at lower computational cost.", "zh": "展示了高达1370亿参数的MoE模型，以更低计算成本取得最先进结果。"}, {"en": "Addresses key challenges: sparse gating, load balancing, and efficient distributed training with synchronous data/model parallelism.", "zh": "解决了关键挑战：稀疏门控、负载均衡以及同步数据/模型并行的高效分布式训练。"}, {"en": "Shows experts specialize in syntax and semantics, improving model interpretability.", "zh": "显示专家在语法和语义上专门化，提升了模型可解释性。"}, {"en": "Achieves 24% lower perplexity on 1B-word benchmark and 39% lower on 100B-word corpus compared to baselines.", "zh": "在10亿词基准上困惑度降低24%，在1000亿词语料上降低39%。"}], "limits": [{"en": "MoE requires large batch sizes and specialized distributed infrastructure to maintain efficiency.", "zh": "MoE需要大批量数据和专门的分布式基础设施以维持效率。"}, {"en": "Gating network may converge to imbalanced expert usage without careful regularization.", "zh": "门控网络若无仔细正则化，可能收敛到不平衡的专家使用。"}, {"en": "Method primarily validated on text tasks; applicability to other domains with smaller datasets is uncertain.", "zh": "方法主要在文本任务上验证，对较小数据集的其他领域适用性不确定。"}, {"en": "Hierarchical MoE adds complexity and may not scale as well as flat MoE for very large expert counts.", "zh": "层次化MoE增加复杂性，在极大专家数量下可能不如扁平MoE可扩展。"}, {"en": "Load balancing losses introduce additional hyperparameters that require tuning.", "zh": "负载均衡损失引入了需要调优的额外超参数。"}]}, "cites": 4850, "org": "Google"}, {"id": "jredmon-1612.08242", "pid": "jredmon", "arxiv": "1612.08242", "date": "2016-12-25", "venue": "cs.CV", "org": "University of Washington", "fields": ["vision", "efficiency"], "tEn": "YOLO9000: Better, Faster, Stronger", "tZh": "YOLO9000：更好、更快、更强", "sEn": "YOLO9000 is a real-time object detection system that detects over 9000 categories, achieving state-of-the-art results on standard benchmarks while running significantly faster.", "sZh": "YOLO9000是一个实时目标检测系统，可检测超过9000个类别，在标准基准上达到最先进水平，同时运行速度显著更快。", "absEn": "We introduce YOLO9000, a state-of-the-art, real-time object detection system that can detect over 9000 object categories. First we propose various improvements to the YOLO detection method, both novel and drawn from prior work. The improved model, YOLOv2, is state-of-the-art on standard detection tasks like PASCAL VOC and COCO. At 67 FPS, YOLOv2 gets 76.8 mAP on VOC 2007. At 40 FPS, YOLOv2 gets 78.6 mAP, outperforming state-of-the-art methods like Faster RCNN with ResNet and SSD while still running significantly faster. Finally we propose a method to jointly train on object detection and classification. Using this method we train YOLO9000 simultaneously on the COCO detection dataset and the ImageNet classification dataset. Our joint training allows YOLO9000 to predict detections for object classes that don't have labelled detection data. We validate our approach on the ImageNet detection task. YOLO9000 gets 19.7 mAP on the ImageNet detection validation set despite only having detection data for 44 of the 200 classes. On the 156 classes not in COCO, YOLO9000 gets 16.0 mAP. But YOLO can detect more than just 200 classes; it predicts detections for more than 9000 different object categories. And it still runs in real-time.", "absZh": "我们介绍了YOLO9000，一个最先进的实时目标检测系统，能够检测超过9000个目标类别。首先，我们对YOLO检测方法提出了各种改进，既有新颖的也有借鉴前人工作的。改进后的模型YOLOv2在PASCAL VOC和COCO等标准检测任务上达到了最先进水平。在67 FPS下，YOLOv2在VOC 2007上获得76.8 mAP；在40 FPS下，YOLOv2获得78.6 mAP，超越了使用ResNet的Faster RCNN和SSD等最先进方法，同时运行速度仍然快得多。最后，我们提出了一种联合训练目标检测和分类的方法。使用这种方法，我们在COCO检测数据集和ImageNet分类数据集上同时训练YOLO9000。我们的联合训练使YOLO9000能够预测没有标记检测数据的目标类别的检测结果。我们在ImageNet检测任务上验证了我们的方法。尽管只有44个类别有检测数据，YOLO9000在ImageNet检测验证集上获得了19.7 mAP。对于不在COCO中的156个类别，YOLO9000获得了16.0 mAP。但YOLO可以检测的不仅仅是200个类别；它预测超过9000个不同目标类别的检测结果，并且仍然实时运行。", "insights": {"contrib": [{"en": "Proposes YOLOv2 with batch normalization, high-resolution classifier, anchor boxes, dimension clusters, direct location prediction, fine-grained features, and multi-scale training.", "zh": "提出YOLOv2，融合批归一化、高分辨率分类器、锚框、维度聚类、直接位置预测、细粒度特征和多尺度训练。"}, {"en": "Introduces WordTree, a hierarchical label structure combining ImageNet and COCO for joint classification and detection training.", "zh": "引入WordTree层次化标签结构，联合ImageNet和COCO进行分类与检测训练。"}, {"en": "Develops YOLO9000, a real-time detector recognizing over 9000 categories via joint training on detection and classification data.", "zh": "开发YOLO9000，通过检测与分类数据联合训练，实时识别超过9000个类别。"}, {"en": "Achieves state-of-the-art results on PASCAL VOC and COCO with YOLOv2, outperforming Faster R-CNN and SSD in speed and accuracy.", "zh": "YOLOv2在PASCAL VOC和COCO上达到最优，速度和精度均超越Faster R-CNN和SSD。"}, {"en": "Demonstrates 19.7 mAP on ImageNet detection with only 44 of 200 classes having detection labels, proving generalization to unseen classes.", "zh": "在ImageNet检测任务上仅用44/200类检测标签即达19.7 mAP，证明对未见类的泛化能力。"}, {"en": "Provides multi-scale training enabling a single YOLOv2 model to trade off speed and accuracy across resolutions from 288x288 to 608x608.", "zh": "多尺度训练使单个YOLOv2模型可在288x288至608x608分辨率间权衡速度与精度。"}], "limits": [{"en": "YOLOv2's performance on small objects is limited due to coarse 13x13 feature map despite fine-grained features.", "zh": "YOLOv2对小物体性能有限，尽管有细粒度特征，但特征图仍较粗（13x13）。"}, {"en": "YOLO9000 struggles with categories like clothing and equipment due to lack of detection data for those classes in COCO.", "zh": "YOLO9000对服装和设备等类别表现不佳，因COCO中缺乏这些类的检测数据。"}, {"en": "Joint training assumes weak labels for classification images, which may introduce noise and limit detection accuracy.", "zh": "联合训练对分类图像使用弱标签，可能引入噪声并限制检测精度。"}, {"en": "WordTree hierarchy is built from ImageNet and may not generalize to other datasets with different label structures.", "zh": "WordTree层次结构基于ImageNet构建，可能无法泛化到其他标签结构不同的数据集。"}, {"en": "The method relies on oversampling COCO to balance dataset sizes, which may not scale to even larger classification datasets.", "zh": "该方法依赖过采样COCO平衡数据集大小，可能无法扩展到更大的分类数据集。"}]}}, {"id": "mbronstein-1611.08097", "pid": "mbronstein", "arxiv": "1611.08097", "date": "2016-11-24", "venue": "cs.CV", "org": "USI Lugano", "fields": ["deep-learning", "vision"], "tEn": "Geometric deep learning: going beyond Euclidean data", "tZh": "几何深度学习：超越欧几里得数据", "sEn": "Geometric deep learning extends deep neural networks to non-Euclidean domains like graphs and manifolds.", "sZh": "几何深度学习将深度神经网络扩展到图与流形等非欧几里得领域。", "absEn": "Many scientific fields study data with an underlying structure that is a non-Euclidean space. Some examples include social networks in computational social sciences, sensor networks in communications, functional networks in brain imaging, regulatory networks in genetics, and meshed surfaces in computer graphics. In many applications, such geometric data are large and complex (in the case of social networks, on the scale of billions), and are natural targets for machine learning techniques. In particular, we would like to use deep neural networks, which have recently proven to be powerful tools for a broad range of problems from computer vision, natural language processing, and audio analysis. However, these tools have been most successful on data with an underlying Euclidean or grid-like structure, and in cases where the invariances of these structures are built into networks used to model them. Geometric deep learning is an umbrella term for emerging techniques attempting to generalize (structured) deep neural models to non-Euclidean domains such as graphs and manifolds. The purpose of this paper is to overview different examples of geometric deep learning problems and present available solutions, key difficulties, applications, and future research directions in this nascent field.", "absZh": "许多科学领域研究的数据具有非欧几里得空间的底层结构，例如计算社会科学中的社交网络、通信中的传感器网络、脑成像中的功能网络、遗传学中的调控网络以及计算机图形学中的网格曲面。这些几何数据通常规模庞大且复杂（如社交网络可达数十亿规模），自然成为机器学习技术的目标。特别是，我们希望能使用深度神经网络，这些网络已在计算机视觉、自然语言处理和音频分析等广泛问题上展现出强大能力。然而，这些工具在具有欧几里得或网格状结构的数据上最为成功，且其不变性被内置于用于建模的网络中。几何深度学习是一个总称，涵盖试图将（结构化的）深度神经网络模型推广到非欧几里得领域（如图和流形）的新兴技术。本文旨在概述几何深度学习问题的不同示例，并介绍现有解决方案、关键难点、应用以及这一新兴领域的未来研究方向。", "insights": {"contrib": [{"en": "Introduces geometric deep learning as a framework for non-Euclidean data like graphs and manifolds.", "zh": "将几何深度学习作为处理非欧几里得数据（如图和流形）的框架引入。"}, {"en": "Reviews key applications in social networks, sensor networks, brain imaging, genetics, and graphics.", "zh": "综述了社交网络、传感器网络、脑成像、遗传学和图形学中的关键应用。"}, {"en": "Identifies difficulties in generalizing deep neural networks to non-Euclidean domains.", "zh": "指出了将深度神经网络推广到非欧几里得领域的困难。"}, {"en": "Summarizes available solutions for geometric deep learning prob
