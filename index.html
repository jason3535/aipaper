const PAPERS = [{"id": "tridao-2205.14135", "pid": "tridao", "arxiv": "2205.14135", "date": "2022-05-27", "venue": "cs.LG", "fields": ["efficiency", "nlp"], "tEn": "FlashAttention: Fast and Memory-Efficient Exact Attention with IO-Awareness", "tZh": "FlashAttention：快速且内存高效的精确注意力机制，具有IO感知能力", "sEn": "FlashAttention reduces GPU memory reads/writes via tiling, achieving faster training and longer context for Transformers.", "sZh": "FlashAttention通过分块减少GPU内存读写，实现更快的训练速度和更长的上下文支持。", "absEn": "Transformers are slow and memory-hungry on long sequences, since the time and memory complexity of self-attention are quadratic in sequence length. Approximate attention methods have attempted to address this problem by trading off model quality to reduce the compute complexity, but often do not achieve wall-clock speedup. We argue that a missing principle is making attention algorithms IO-aware -- accounting for reads and writes between levels of GPU memory. We propose FlashAttention, an IO-aware exact attention algorithm that uses tiling to reduce the number of memory reads/writes between GPU high bandwidth memory (HBM) and GPU on-chip SRAM. We analyze the IO complexity of FlashAttention, showing that it requires fewer HBM accesses than standard attention, and is optimal for a range of SRAM sizes. We also extend FlashAttention to block-sparse attention, yielding an approximate attention algorithm that is faster than any existing approximate attention method. FlashAttention trains Transformers faster than existing baselines: 15% end-to-end wall-clock speedup on BERT-large (seq. length 512) compared to the MLPerf 1.1 training speed record, 3$\\times$ speedup on GPT-2 (seq. length 1K), and 2.4$\\times$ speedup on long-range arena (seq. length 1K-4K). FlashAttention and block-sparse FlashAttention enable longer context in Transformers, yielding higher quality models (0.7 better perplexity on GPT-2 and 6.4 points of lift on long-document classification) and entirely new capabilities: the first Transformers to achieve better-than-chance performance on the Path-X challenge (seq. length 16K, 61.4% accuracy) and Path-256 (seq. length 64K, 63.1% accuracy).", "absZh": "Transformer在处理长序列时速度慢且内存消耗大，因为自注意力的时间和内存复杂度与序列长度呈二次方关系。近似注意力方法试图通过牺牲模型质量来降低计算复杂度，但通常无法实现实际加速。我们认为缺失的原则是使注意力算法具有IO感知能力——即考虑GPU内存层级之间的读写操作。我们提出了FlashAttention，一种具有IO感知能力的精确注意力算法，它使用分块技术来减少GPU高带宽内存（HBM）和片上SRAM之间的内存读写次数。我们分析了FlashAttention的IO复杂度，表明它比标准注意力需要更少的HBM访问，并且在多种SRAM大小下都是最优的。我们还将FlashAttention扩展到块稀疏注意力，产生了一种比任何现有近似注意力方法更快的近似注意力算法。FlashAttention训练Transformer的速度比现有基线更快：在BERT-large（序列长度512）上，相比MLPerf 1.1训练速度记录，端到端加速15%；在GPT-2（序列长度1K）上加速3倍；在长距离竞技场（序列长度1K-4K）上加速2.4倍。FlashAttention和块稀疏FlashAttention使Transformer能够处理更长的上下文，从而获得更高质量的模型（GPT-2上困惑度降低0.7，长文档分类提升6.4个百分点），并实现了全新的能力：首个在Path-X挑战（序列长度16K，准确率61.4%）和Path-256（序列长度64K，准确率63.1%）上取得优于随机水平性能的Transformer。", "insights": {"contrib": [{"en": "Proposes FlashAttention, an IO-aware exact attention algorithm using tiling to reduce GPU HBM accesses.", "zh": "提出FlashAttention，一种IO感知的精确注意力算法，通过分块减少GPU高带宽内存访问。"}, {"en": "Achieves significant wall-clock speedups: 15% on BERT-large, 3x on GPT-2, 2.4x on long-range arena.", "zh": "实现显著的端到端加速：BERT-large提升15%，GPT-2提升3倍，长距离竞技场提升2.4倍。"}, {"en": "Enables longer context in Transformers, improving perplexity by 0.7 on GPT-2 and 6.4 points on long-document classification.", "zh": "支持Transformer更长上下文，GPT-2困惑度降低0.7，长文档分类提升6.4个百分点。"}, {"en": "First Transformer to achieve better-than-chance on Path-X (61.4%) and Path-256 (63.1%) via longer sequences.", "zh": "首个在Path-X（61.4%）和Path-256（63.1%）上超越随机水平的Transformer。"}, {"en": "Extends to block-sparse FlashAttention, faster than all existing approximate attention methods.", "zh": "扩展至块稀疏FlashAttention，比所有现有近似注意力方法更快。"}, {"en": "Provides IO complexity analysis and proves optimality for exact attention over a range of SRAM sizes.", "zh": "提供IO复杂度分析，并证明在多种SRAM大小下精确注意力的最优性。"}], "limits": [{"en": "Requires custom CUDA kernel, limiting portability and ease of use across GPU architectures.", "zh": "需要自定义CUDA内核，限制了跨GPU架构的可移植性和易用性。"}, {"en": "Optimal only for single GPU; multi-GPU IO analysis and parallelization remain unexplored.", "zh": "仅对单GPU最优；多GPU的IO分析和并行化尚未探索。"}, {"en": "Block-sparse attention relies on predefined sparsity patterns, which may not suit all tasks.", "zh": "块稀疏注意力依赖预定义稀疏模式，可能不适用于所有任务。"}, {"en": "Recomputation in backward pass increases FLOPs, though offset by reduced HBM accesses.", "zh": "反向传播中的重计算增加FLOPs，尽管被减少的HBM访问所抵消。"}, {"en": "Performance gains diminish for very short sequences where memory access is less dominant.", "zh": "对于极短序列，性能提升减弱，因为内存访问不再是主要瓶颈。"}]}}, {"id": "fedus-2101.03961", "pid": "fedus", "arxiv": "2101.03961", "date": "2021-01-11", "venue": "cs.LG", "fields": ["nlp", "efficiency"], "tEn": "Switch Transformers: Scaling to Trillion Parameter Models with Simple and Efficient Sparsity", "tZh": "Switch Transformers：通过简单高效的稀疏性扩展到万亿参数模型", "sEn": "Switch Transformers simplify MoE routing, reduce communication and training instability, enabling trillion-parameter models with up to 7x speedup.", "sZh": "Switch Transformers简化了混合专家路由，降低了通信成本和训练不稳定性，实现了万亿参数模型，速度提升高达7倍。", "absEn": "In deep learning, models typically reuse the same parameters for all inputs. Mixture of Experts (MoE) defies this and instead selects different parameters for each incoming example. The result is a sparsely-activated model -- with outrageous numbers of parameters -- but a constant computational cost. However, despite several notable successes of MoE, widespread adoption has been hindered by complexity, communication costs and training instability -- we address these with the Switch Transformer. We simplify the MoE routing algorithm and design intuitive improved models with reduced communication and computational costs. Our proposed training techniques help wrangle the instabilities and we show large sparse models may be trained, for the first time, with lower precision (bfloat16) formats. We design models based off T5-Base and T5-Large to obtain up to 7x increases in pre-training speed with the same computational resources. These improvements extend into multilingual settings where we measure gains over the mT5-Base version across all 101 languages. Finally, we advance the current scale of language models by pre-training up to trillion parameter models on the \"Colossal Clean Crawled Corpus\" and achieve a 4x speedup over the T5-XXL model.", "absZh": "在深度学习中，模型通常对所有输入重用相同的参数。混合专家（MoE）打破了这一惯例，为每个输入示例选择不同的参数。结果是一个稀疏激活的模型——参数数量惊人——但计算成本恒定。然而，尽管MoE取得了一些显著的成功，但其复杂性、通信成本和训练不稳定性阻碍了广泛采用——我们通过Switch Transformer解决了这些问题。我们简化了MoE路由算法，并设计了直观的改进模型，减少了通信和计算成本。我们提出的训练技术有助于控制不稳定性，并首次展示了可以使用较低精度（bfloat16）格式训练大型稀疏模型。我们基于T5-Base和T5-Large设计的模型在相同计算资源下实现了高达7倍的预训练速度提升。这些改进扩展到多语言设置，我们在所有101种语言上测量了相对于mT5-Base版本的增益。最后，我们通过在“Colossal Clean Crawled Corpus”上预训练高达万亿参数的模型，推进了当前语言模型的规模，并实现了比T5-XXL模型快4倍的速度。", "insights": {"contrib": [{"en": "Simplifies MoE routing to top-1 expert, reducing computation and communication costs.", "zh": "将 MoE 路由简化为 top-1 专家，降低计算和通信成本。"}, {"en": "Achieves up to 7x pre-training speedup over T5 with same FLOPs per token.", "zh": "在相同每 token FLOPs 下，预训练速度相比 T5 提升高达 7 倍。"}, {"en": "Introduces selective precision (bfloat16) training for large sparse models.", "zh": "引入选择性精度（bfloat16）训练大型稀疏模型。"}, {"en": "Demonstrates scaling to trillion parameters with 4x speedup over T5-XXL.", "zh": "展示扩展到万亿参数，相比 T5-XXL 实现 4 倍加速。"}, {"en": "Shows universal improvements across 101 languages in multilingual setting.", "zh": "在多语言设置中，所有 101 种语言均获得改进。"}, {"en": "Proposes expert dropout and distillation to preserve 30% quality gain with 99% compression.", "zh": "提出专家 dropout 和蒸馏，以 99% 压缩率保留 30% 的质量提升。"}], "limits": [{"en": "Training instability persists for largest models like Switch-XXL.", "zh": "最大模型（如 Switch-XXL）仍存在训练不稳定性。"}, {"en": "Downstream gains do not fully match upstream perplexity improvements.", "zh": "下游任务收益未能完全匹配上游困惑度改进。"}, {"en": "Fine-tuning quality depends on FLOPs per token and parameter count in unclear ways.", "zh": "微调质量与每 token FLOPs 和参数数量的关系尚不明确。"}, {"en": "Expert capacity factor introduces trade-off between token dropping and efficiency.", "zh": "专家容量因子在 token 丢弃和效率之间存在权衡。"}, {"en": "Distillation preserves only ~30% of sparse model quality gain.", "zh": "蒸馏仅保留约 30% 的稀疏模型质量提升。"}]}}, {"id": "kaplan-2001.08361", "pid": "kaplan", "arxiv": "2001.08361", "date": "2020-01-23", "venue": "cs.LG", "fields": ["nlp"], "tEn": "Scaling Laws for Neural Language Models", "tZh": "神经语言模型的缩放定律", "sEn": "Language model performance scales as a power-law with model size, dataset size, and compute, enabling optimal compute-efficient training with very large models on modest data.", "sZh": "语言模型性能随模型大小、数据集大小和计算量呈幂律缩放，从而可以在适度的数据上训练非常大的模型，实现计算效率最优的训练。", "absEn": "We study empirical scaling laws for language model performance on the cross-entropy loss. The loss scales as a power-law with model size, dataset size, and the amount of compute used for training, with some trends spanning more than seven orders of magnitude. Other architectural details such as network width or depth have minimal effects within a wide range. Simple equations govern the dependence of overfitting on model/dataset size and the dependence of training speed on model size. These relationships allow us to determine the optimal allocation of a fixed compute budget. Larger models are significantly more sample-efficient, such that optimally compute-efficient training involves training very large models on a relatively modest amount of data and stopping significantly before convergence.", "absZh": "我们研究了语言模型在交叉熵损失上的经验缩放定律。损失随模型大小、数据集大小以及用于训练的计算量呈幂律缩放，某些趋势跨越了七个数量级以上。其他架构细节，如网络宽度或深度，在广泛范围内影响甚微。简单的方程控制了过拟合对模型/数据集大小的依赖性以及训练速度对模型大小的依赖性。这些关系使我们能够确定固定计算预算的最优分配。更大的模型在样本效率上显著更高，因此计算效率最优的训练涉及在相对适中的数据量上训练非常大的模型，并在显著收敛之前停止。", "insights": {"contrib": [{"en": "Language model cross-entropy loss follows power-law scaling with model size, dataset size, and compute over seven orders of magnitude.", "zh": "语言模型交叉熵损失随模型规模、数据集大小和算力呈幂律缩放，跨越七个数量级。"}, {"en": "Optimal compute-efficient training uses very large models trained on modest data, stopping before convergence.", "zh": "最优算力高效训练使用非常大的模型在适度数据上训练，并在收敛前停止。"}, {"en": "Performance depends weakly on architectural details like depth or width compared to scale factors.", "zh": "与规模因素相比，性能对深度或宽度等架构细节的依赖很弱。"}, {"en": "Overfitting and training speed are governed by simple equations relating model size and dataset size.", "zh": "过拟合和训练速度由模型大小和数据集大小的简单方程控制。"}, {"en": "Larger models are more sample-efficient, requiring fewer data points to reach the same loss.", "zh": "更大的模型样本效率更高，达到相同损失所需的数据点更少。"}, {"en": "The critical batch size for training follows a power-law in the loss, independent of model size.", "zh": "训练的关键批次大小随损失呈幂律变化，与模型大小无关。"}], "limits": [{"en": "Scaling laws may break down at extreme scales due to non-zero entropy of natural language.", "zh": "由于自然语言的非零熵，缩放定律可能在极端规模下失效。"}, {"en": "Results are based on Transformer architecture; may not generalize to other architectures.", "zh": "结果基于Transformer架构，可能不适用于其他架构。"}, {"en": "The study uses a single dataset (WebText2); transfer to other distributions incurs a constant loss penalty.", "zh": "研究使用单一数据集（WebText2）；迁移到其他分布会带来恒定的损失惩罚。"}, {"en": "Optimal compute allocation assumes fixed batch size and may not hold for varying hardware constraints.", "zh": "最优算力分配假设固定批次大小，可能不适用于变化的硬件约束。"}, {"en": "The power-law fits are empirical and lack a theoretical derivation from first principles.", "zh": "幂律拟合是经验性的，缺乏第一性原理的理论推导。"}]}}, {"id": "schulman-1707.06347", "pid": "schulman", "arxiv": "1707.06347", "date": "2017-07-20", "venue": "cs.LG", "fields": ["rl"], "tEn": "Proximal Policy Optimization Algorithms", "tZh": "近端策略优化算法", "sEn": "PPO is a family of policy gradient methods that use a novel surrogate objective to enable multiple minibatch updates per data sample, outperforming other online methods.", "sZh": "PPO是一类策略梯度方法，通过新颖的替代目标函数实现每个数据样本多次小批量更新，优于其他在线方法。", "absEn": "We propose a new family of policy gradient methods for reinforcement learning, which alternate between sampling data through interaction with the environment, and optimizing a \"surrogate\" objective function using stochastic gradient ascent. Whereas standard policy gradient methods perform one gradient update per data sample, we propose a novel objective function that enables multiple epochs of minibatch updates. The new methods, which we call proximal policy optimization (PPO), have some of the benefits of trust region policy optimization (TRPO), but they are much simpler to implement, more general, and have better sample complexity (empirically). Our experiments test PPO on a collection of benchmark tasks, including simulated robotic locomotion and Atari game playing, and we show that PPO outperforms other online policy gradient methods, and overall strikes a favorable balance between sample complexity, simplicity, and wall-time.", "absZh": "我们提出了一类新的用于强化学习的策略梯度方法，这些方法在与环境交互采样数据和利用随机梯度上升优化“替代”目标函数之间交替进行。标准策略梯度方法每个数据样本只进行一次梯度更新，而我们提出了一个新的目标函数，使得可以进行多个小批量更新周期。这种新方法被称为近端策略优化（PPO），它兼具信任区域策略优化（TRPO）的一些优点，但实现更简单、更通用，并且经验上样本复杂度更优。我们的实验在包括模拟机器人运动和Atari游戏在内的基准任务上测试了PPO，结果表明PPO优于其他在线策略梯度方法，并且在样本复杂度、简单性和实际运行时间之间取得了良好的平衡。", "insights": {"contrib": [{"en": "Proposes PPO, a family of policy gradient methods using a clipped surrogate objective for stable updates.", "zh": "提出PPO，一类使用裁剪替代目标进行稳定更新的策略梯度方法。"}, {"en": "Enables multiple epochs of minibatch updates per data sample, improving sample efficiency.", "zh": "每个数据样本支持多个小批量更新周期，提高样本效率。"}, {"en": "Simpler to implement than TRPO while retaining similar performance benefits.", "zh": "比TRPO更易实现，同时保留相似的性能优势。"}, {"en": "Empirically outperforms other online policy gradient methods on robotic locomotion and Atari games.", "zh": "在机器人运动和Atari游戏上经验性地优于其他在线策略梯度方法。"}, {"en": "Strikes a favorable balance between sample complexity, simplicity, and wall-time.", "zh": "在样本复杂度、简单性和运行时间之间取得良好平衡。"}], "limits": [{"en": "PPO's clipped objective may still allow large policy updates in some cases.", "zh": "PPO的裁剪目标在某些情况下仍可能允许较大的策略更新。"}, {"en": "Requires careful tuning of hyperparameters like clip epsilon and learning rate.", "zh": "需要仔细调整超参数，如裁剪阈值和学习率。"}, {"en": "Performance on tasks with sparse rewards or long horizons may degrade.", "zh": "在稀疏奖励或长视野任务上的性能可能下降。"}, {"en": "Theoretical convergence guarantees are not fully established.", "zh": "理论收敛保证尚未完全建立。"}, {"en": "May not scale well to very high-dimensional action spaces.", "zh": "可能无法很好地扩展到非常高维的动作空间。"}]}}, {"id": "shazeer-1706.03762", "pid": "shazeer", "arxiv": "1706.03762", "date": "2017-06-12", "venue": "cs.CL", "fields": ["nlp", "deep-learning"], "tEn": "Attention Is All You Need", "tZh": "注意力机制就是一切", "sEn": "The Transformer model, based solely on attention mechanisms, outperforms recurrent and convolutional models in machine translation while being more parallelizable and faster to train.", "sZh": "仅基于注意力机制的Transformer模型在机器翻译中优于循环和卷积模型，且更易并行化、训练更快。", "absEn": "The dominant sequence transduction models are based on complex recurrent or convolutional neural networks in an encoder-decoder configuration. The best performing models also connect the encoder and decoder through an attention mechanism. We propose a new simple network architecture, the Transformer, based solely on attention mechanisms, dispensing with recurrence and convolutions entirely. Experiments on two machine translation tasks show these models to be superior in quality while being more parallelizable and requiring significantly less time to train. Our model achieves 28.4 BLEU on the WMT 2014 English-to-German translation task, improving over the existing best results, including ensembles by over 2 BLEU. On the WMT 2014 English-to-French translation task, our model establishes a new single-model state-of-the-art BLEU score of 41.8 after training for 3.5 days on eight GPUs, a small fraction of the training costs of the best models from the literature. We show that the Transformer generalizes well to other tasks by applying it successfully to English constituency parsing both with large and limited training data.", "absZh": "主流的序列转换模型基于复杂的循环或卷积神经网络，采用编码器-解码器结构。性能最佳的模型还通过注意力机制连接编码器和解码器。我们提出了一种新的简单网络架构——Transformer，它完全基于注意力机制，完全摒弃了循环和卷积。在两个机器翻译任务上的实验表明，这些模型在质量上更优，同时更易于并行化，且训练时间显著减少。我们的模型在WMT 2014英德翻译任务上达到了28.4 BLEU，比现有最佳结果（包括集成模型）提高了超过2 BLEU。在WMT 2014英法翻译任务上，我们的模型在8个GPU上训练3.5天后，建立了新的单模型最优BLEU分数41.8，仅为文献中最佳模型训练成本的一小部分。我们通过将Transformer成功应用于英语成分句法分析（包括大规模和有限训练数据），证明了其良好的泛化能力。", "insights": {"contrib": [{"en": "Proposes Transformer, a novel architecture based solely on attention mechanisms, eliminating recurrence and convolutions.", "zh": "提出Transformer，一种完全基于注意力机制的新架构，消除了循环和卷积。"}, {"en": "Achieves state-of-the-art BLEU scores of 28.4 on WMT 2014 English-German and 41.8 on English-French translation.", "zh": "在WMT 2014英德和英法翻译任务上分别取得28.4和41.8 BLEU的最新结果。"}, {"en": "Demonstrates significantly faster training due to parallelization, reducing training time to 3.5 days on 8 GPUs.", "zh": "由于并行化，训练速度显著提升，在8个GPU上仅需3.5天。"}, {"en": "Introduces multi-head attention to jointly attend to information from different representation subspaces.", "zh": "引入多头注意力机制，从不同表示子空间联合关注信息。"}, {"en": "Shows strong generalization to other tasks like English constituency parsing with both large and limited data.", "zh": "在英语成分句法分析等任务上表现出强泛化能力，无论数据量大小。"}], "limits": [{"en": "Self-attention's quadratic complexity in sequence length limits scalability to very long sequences.", "zh": "自注意力在序列长度上的二次复杂度限制了其扩展到极长序列。"}, {"en": "The model lacks explicit positional encoding, relying on added sinusoidal signals which may not capture all positional nuances.", "zh": "模型缺乏显式位置编码，依赖附加的正弦信号，可能无法捕捉所有位置细节。"}, {"en": "Training requires careful hyperparameter tuning (e.g., learning rate schedule, dropout) to achieve optimal performance.", "zh": "训练需要仔细调整超参数（如学习率计划、dropout）才能达到最优性能。"}, {"en": "The architecture's interpretability is limited despite attention visualization; deeper understanding of learned patterns remains challenging.", "zh": "尽管有注意力可视化，架构的可解释性仍有限，深入理解学习模式仍有挑战。"}]}}, {"id": "christiano-1706.03741", "pid": "christiano", "arxiv": "1706.03741", "date": "2017-06-12", "venue": "stat.ML", "fields": ["safety", "rl"], "tEn": "Deep reinforcement learning from human preferences", "tZh": "基于人类偏好的深度强化学习", "sEn": "We can train complex RL behaviors using human preferences on trajectory segments, requiring feedback on less than 1% of agent interactions.", "sZh": "我们可以通过人类对轨迹片段的偏好来训练复杂的强化学习行为，仅需对不到1%的智能体交互提供反馈。", "absEn": "For sophisticated reinforcement learning (RL) systems to interact usefully with real-world environments, we need to communicate complex goals to these systems. In this work, we explore goals defined in terms of (non-expert) human preferences between pairs of trajectory segments. We show that this approach can effectively solve complex RL tasks without access to the reward function, including Atari games and simulated robot locomotion, while providing feedback on less than one percent of our agent's interactions with the environment. This reduces the cost of human oversight far enough that it can be practically applied to state-of-the-art RL systems. To demonstrate the flexibility of our approach, we show that we can successfully train complex novel behaviors with about an hour of human time. These behaviors and environments are considerably more complex than any that have been previously learned from human feedback.", "absZh": "为了让复杂的强化学习系统能够有效地与现实世界环境交互，我们需要向这些系统传达复杂的目标。在这项工作中，我们探索了基于（非专家）人类对轨迹片段对之间的偏好来定义目标。我们展示了这种方法可以在无需奖励函数的情况下有效解决复杂的强化学习任务，包括Atari游戏和模拟机器人运动，同时仅需对智能体与环境交互的不到1%提供反馈。这大大降低了人类监督的成本，使其能够实际应用于最先进的强化学习系统。为了展示我们方法的灵活性，我们证明可以用大约一小时的人类时间成功训练出复杂的新行为。这些行为和环境比以往任何通过人类反馈学习到的都要复杂得多。", "insights": {"contrib": [{"en": "Proposes a method to train deep RL agents from human preferences between trajectory segments, reducing human oversight cost.", "zh": "提出一种从人类对轨迹片段的偏好中训练深度强化学习智能体的方法，降低了人类监督成本。"}, {"en": "Demonstrates solving complex RL tasks (Atari games, robot locomotion) with less than 1% of agent-environment interactions labeled.", "zh": "展示了在不到1%的智能体-环境交互被标注的情况下，解决复杂强化学习任务（Atari游戏、机器人运动）。"}, {"en": "Shows novel behaviors (backflip, one-leg stand) can be learned from about an hour of human feedback.", "zh": "展示了从约一小时的人类反馈中学习新颖行为（后空翻、单腿站立）。"}, {"en": "Introduces an ensemble of reward predictors and online query selection to improve learning efficiency.", "zh": "引入奖励预测器集成和在线查询选择以提高学习效率。"}, {"en": "Provides evidence that human feedback can be economically scaled to state-of-the-art deep RL systems.", "zh": "提供了人类反馈可经济地扩展到最先进深度强化学习系统的证据。"}], "limits": [{"en": "Method may fail on tasks where short clips are confusing, e.g., Qbert with real human feedback.", "zh": "方法在短片段令人困惑的任务上可能失败，例如使用真实人类反馈的Qbert。"}, {"en": "Offline reward predictor training leads to poor performance due to nonstationary occupancy distribution.", "zh": "离线奖励预测器训练因占用分布的非平稳性导致性能不佳。"}, {"en": "Human feedback quality depends on rater consistency; errors or inconsistency can degrade performance.", "zh": "人类反馈质量取决于标注者一致性；错误或不一致会降低性能。"}, {"en": "Method assumes human preferences are generated by a reward function, which may not hold in all domains.", "zh": "方法假设人类偏好由奖励函数生成，这在所有领域可能不成立。"}, {"en": "Query selection based on ensemble variance is a crude approximation; better information-theoretic approaches remain future work.", "zh": "基于集成方差的查询选择是粗略近似；更好的信息论方法留待未来工作。"}]}}, {"id": "finn-1703.03400", "pid": "finn", "arxiv": "1703.03400", "date": "2017-03-09", "venue": "cs.LG", "fields": ["rl", "deep-learning"], "tEn": "Model-Agnostic Meta-Learning for Fast Adaptation of Deep Networks", "tZh": "模型无关的元学习：深度网络的快速适应", "sEn": "A model-agnostic meta-learning algorithm that enables fast adaptation of deep networks with few gradient steps.", "sZh": "一种模型无关的元学习算法，通过少量梯度步骤实现深度网络的快速适应。", "absEn": "We propose an algorithm for meta-learning that is model-agnostic, in the sense that it is compatible with any model trained with gradient descent and applicable to a variety of different learning problems, including classification, regression, and reinforcement learning. The goal of meta-learning is to train a model on a variety of learning tasks, such that it can solve new learning tasks using only a small number of training samples. In our approach, the parameters of the model are explicitly trained such that a small number of gradient steps with a small amount of training data from a new task will produce good generalization performance on that task. In effect, our method trains the model to be easy to fine-tune. We demonstrate that this approach leads to state-of-the-art performance on two few-shot image classification benchmarks, produces good results on few-shot regression, and accelerates fine-tuning for policy gradient reinforcement learning with neural network policies.", "absZh": "我们提出了一种元学习算法，该算法与模型无关，即它与任何通过梯度下降训练的模型兼容，并适用于各种不同的学习问题，包括分类、回归和强化学习。元学习的目标是在多种学习任务上训练模型，使其能够仅使用少量训练样本解决新的学习任务。在我们的方法中，模型的参数被明确训练，使得来自新任务的少量训练数据经过少量梯度步骤后，就能在该任务上产生良好的泛化性能。实际上，我们的方法训练模型使其易于微调。我们证明，这种方法在两个少样本图像分类基准上达到了最先进的性能，在少样本回归上取得了良好结果，并加速了使用神经网络策略的策略梯度强化学习的微调。", "insights": {"contrib": [{"en": "Proposes MAML, a model-agnostic meta-learning algorithm compatible with any gradient-descent-trained model.", "zh": "提出 MAML，一种与任何基于梯度下降训练的模型兼容的模型无关的元学习算法。"}, {"en": "Achieves state-of-the-art few-shot classification on Omniglot and MiniImagenet with fewer parameters.", "zh": "在 Omniglot 和 MiniImagenet 上以更少参数实现少样本分类的最先进性能。"}, {"en": "Demonstrates fast adaptation in few-shot regression and reinforcement learning with policy gradients.", "zh": "在少样本回归和基于策略梯度的强化学习中展示快速适应能力。"}, {"en": "Shows that first-order approximation performs nearly as well as full second-order meta-gradient.", "zh": "表明一阶近似与完整二阶元梯度性能几乎相同。"}, {"en": "Provides a simple weight initialization that enables rapid fine-tuning with few gradient steps.", "zh": "提供简单的权重初始化，使少量梯度步骤即可快速微调。"}], "limits": [{"en": "Requires a distribution over tasks for meta-training, which may not be available.", "zh": "需要任务分布进行元训练，可能无法获得。"}, {"en": "Computationally expensive due to second-order gradients, though first-order approximation helps.", "zh": "由于二阶梯度计算成本高，尽管一阶近似有所缓解。"}, {"en": "May struggle with tasks that are very different from the meta-training distribution.", "zh": "可能难以处理与元训练分布差异很大的任务。"}, {"en": "Performance depends on the choice of inner-loop step size and number of gradient steps.", "zh": "性能依赖于内循环步长和梯度步数的选择。"}, {"en": "Not evaluated on large-scale or real-world few-shot learning benchmarks beyond image classification.", "zh": "未在图像分类之外的大规模或真实少样本学习基准上评估。"}]}}, {"id": "dario-1606.06565", "pid": "dario", "arxiv": "1606.06565", "date": "2016-06-21", "venue": "cs.AI", "fields": ["safety"], "tEn": "Concrete Problems in AI Safety", "tZh": "人工智能安全中的具体问题", "sEn": "We identify five concrete research problems in AI safety: avoiding side effects, avoiding reward hacking, scalable supervision, safe exploration, and distributional shift.", "sZh": "我们识别出人工智能安全中的五个具体研究问题：避免副作用、避免奖励黑客、可扩展监督、安全探索和分布偏移。", "absEn": "Rapid progress in machine learning and artificial intelligence (AI) has brought increasing attention to the potential impacts of AI technologies on society. In this paper we discuss one such potential impact: the problem of accidents in machine learning systems, defined as unintended and harmful behavior that may emerge from poor design of real-world AI systems. We present a list of five practical research problems related to accident risk, categorized according to whether the problem originates from having the wrong objective function (\"avoiding side effects\" and \"avoiding reward hacking\"), an objective function that is too expensive to evaluate frequently (\"scalable supervision\"), or undesirable behavior during the learning process (\"safe exploration\" and \"distributional shift\"). We review previous work in these areas as well as suggesting research directions with a focus on relevance to cutting-edge AI systems. Finally, we consider the high-level question of how to think most productively about the safety of forward-looking applications of AI.", "absZh": "机器学习和人工智能的快速发展使人们越来越关注AI技术对社会的潜在影响。本文讨论了一种潜在影响：机器学习系统中的事故问题，即由于现实世界AI系统设计不当而可能出现的意外和有害行为。我们列出了与事故风险相关的五个实际研究问题，根据问题源于目标函数错误（“避免副作用”和“避免奖励黑客”）、目标函数评估过于昂贵（“可扩展监督”），还是学习过程中的不良行为（“安全探索”和“分布偏移”）进行分类。我们回顾了这些领域的先前工作，并提出了与前沿AI系统相关的研究方向。最后，我们考虑了如何最有效地思考前瞻性AI应用的安全性问题。", "insights": {"contrib": [{"en": "Defines five concrete AI accident problems: negative side effects, reward hacking, scalable oversight, safe exploration, and distributional shift.", "zh": "定义了五个具体的AI事故问题：负面副作用、奖励黑客、可扩展监督、安全探索和分布偏移。"}, {"en": "Categorizes accident sources: wrong objective function, expensive evaluation, and undesirable learning behavior.", "zh": "将事故来源分类：错误的目标函数、昂贵的评估和不理想的学习行为。"}, {"en": "Proposes practical research directions for each problem, including impact regularizers and adversarial reward functions.", "zh": "为每个问题提出了实用的研究方向，包括影响正则化和对抗性奖励函数。"}, {"en": "Highlights the increasing relevance of safety research due to trends in deep RL, complex agents, and autonomy.", "zh": "强调了由于深度强化学习、复杂智能体和自主性趋势，安全研究日益重要。"}, {"en": "Introduces semi-supervised RL as a scalable oversight method to reduce reliance on expensive reward evaluations.", "zh": "引入了半监督强化学习作为一种可扩展监督方法，以减少对昂贵奖励评估的依赖。"}, {"en": "Emphasizes the need for robust exploration strategies to avoid catastrophic failures in real-world RL systems.", "zh": "强调了需要稳健的探索策略，以避免现实世界强化学习系统中的灾难性失败。"}], "limits": [{"en": "Focuses on technical problems, omitting broader societal, ethical, and policy implications of AI safety.", "zh": "聚焦技术问题，忽略了AI安全更广泛的社会、伦理和政策影响。"}, {"en": "Proposed solutions like impact regularizers are preliminary and lack empirical validation on complex tasks.", "zh": "提出的解决方案如影响正则化是初步的，缺乏在复杂任务上的实证验证。"}, {"en": "Assumes RL and supervised learning paradigms, limiting applicability to other AI approaches like unsupervised learning.", "zh": "假设强化学习和监督学习范式，限制了在其他AI方法（如无监督学习）上的适用性。"}, {"en": "Does not address adversarial attacks or security vulnerabilities beyond reward hacking and side effects.", "zh": "未涉及对抗性攻击或超出奖励黑客和副作用的安全漏洞。"}, {"en": "Scalable oversight methods like semi-supervised RL may not scale to highly complex or long-horizon tasks.", "zh": "可扩展监督方法如半监督强化学习可能无法扩展到高度复杂或长期任务。"}]}}, {"id": "hinton-1503.02531", "pid": "hinton", "arxiv": "1503.02531", "date": "2015-03-09", "venue": "stat.ML", "fields": ["deep-learning"], "tEn": "Distilling the Knowledge in a Neural Network", "tZh": "神经网络中的知识蒸馏", "sEn": "Distilling knowledge from an ensemble into a single model improves performance and efficiency.", "sZh": "将集成模型的知识蒸馏到单个模型中，可提升性能并降低计算成本。", "absEn": "A very simple way to improve the performance of almost any machine learning algorithm is to train many different models on the same data and then to average their predictions. Unfortunately, making predictions using a whole ensemble of models is cumbersome and may be too computationally expensive to allow deployment to a large number of users, especially if the individual models are large neural nets. Caruana and his collaborators have shown that it is possible to compress the knowledge in an ensemble into a single model which is much easier to deploy and we develop this approach further using a different compression technique. We achieve some surprising results on MNIST and we show that we can significantly improve the acoustic model of a heavily used commercial system by distilling the knowledge in an ensemble of models into a single model. We also introduce a new type of ensemble composed of one or more full models and many specialist models which learn to distinguish fine-grained classes that the full models confuse. Unlike a mixture of experts, these specialist models can be trained rapidly and in parallel.", "absZh": "一种提升几乎所有机器学习算法性能的简单方法是，在相同数据上训练多个不同模型，然后对其预测取平均。然而，使用整个集成模型进行预测可能很繁琐，且计算成本过高，难以部署给大量用户，尤其是当单个模型是大型神经网络时。Caruana及其合作者已证明，可以将集成模型中的知识压缩到单个模型中，从而更易于部署。我们使用一种不同的压缩技术进一步改进了这一方法。我们在MNIST上取得了一些令人惊讶的结果，并展示了通过将集成模型的知识蒸馏到单个模型中，可以显著改进一个广泛使用的商业系统的声学模型。我们还引入了一种新型集成模型，由一个或多个完整模型和许多专家模型组成，这些专家模型学习区分完整模型容易混淆的细粒度类别。与混合专家模型不同，这些专家模型可以快速并行训练。", "insights": {"contrib": [{"en": "Introduces knowledge distillation, transferring ensemble knowledge into a single small model using soft targets with temperature scaling.", "zh": "提出知识蒸馏技术，通过带温度缩放的软目标将集成模型的知识迁移到单个小型模型中。"}, {"en": "Shows distilled model on MNIST achieves 74 errors vs 146 for a regularized small net, even without seeing digit 3 in transfer set.", "zh": "在MNIST上，蒸馏模型仅74个错误，而正则化小网络为146个错误，即使迁移集中没有数字3的样本。"}, {"en": "Demonstrates distillation improves commercial speech recognition: distilled single model matches ensemble performance with 10.9% WER.", "zh": "在商业语音识别中，蒸馏模型达到集成模型的性能，词错误率10.9%。"}, {"en": "Proposes specialist ensemble: one generalist plus many specialists for fine-grained classes, trained in parallel, improving JFT accuracy by 4.4%.", "zh": "提出专家集成：一个通用模型加多个细粒度类别专家模型，可并行训练，在JFT上准确率提升4.4%。"}, {"en": "Shows soft targets prevent overfitting with limited data: 3% of speech data yields 57% frame accuracy vs 44.5% with hard targets.", "zh": "软目标防止过拟合：仅3%语音数据时帧准确率57%，而硬目标仅44.5%。"}, {"en": "Provides theoretical analysis: high-temperature distillation approximates minimizing squared logit difference.", "zh": "理论分析：高温蒸馏近似最小化logit平方差。"}], "limits": [{"en": "Distillation requires a pre-trained cumbersome model, which may be computationally expensive to obtain.", "zh": "蒸馏需要预训练的笨重模型，获取该模型可能计算成本高昂。"}, {"en": "Optimal temperature is task-dependent and requires tuning; low temperatures may ignore useful negative logits.", "zh": "最优温度依赖任务并需调参；低温可能忽略有用的负logit信息。"}, {"en": "Specialist ensemble relies on clustering of confusable classes, which may not be optimal for all datasets.", "zh": "专家集成依赖易混淆类别的聚类，可能不适用于所有数据集。"}, {"en": "Distillation performance degrades when distilled model is too small to capture all knowledge from cumbersome model.", "zh": "当蒸馏模型过小无法捕捉笨重模型全部知识时，性能下降。"}, {"en": "Method assumes soft targets from cumbersome model are reliable; noisy or biased cumbersome models may transfer errors.", "zh": "方法假设笨重模型的软目标可靠；噪声或偏差模型可能传递错误。"}]}}, {"id": "ilya-1409.3215", "pid": "ilya", "arxiv": "1409.3215", "date": "2014-09-10", "venue": "cs.CL", "fields": ["nlp", "deep-learning"], "tEn": "Sequence to Sequence Learning with Neural Networks", "tZh": "基于神经网络的序列到序列学习", "sEn": "A deep LSTM-based end-to-end approach achieves BLEU 34.8 on WMT'14 English-French translation, outperforming a phrase-based SMT system (33.3) and reaching 36.5 when reranking SMT hypotheses.", "sZh": "基于深度LSTM的端到端方法在WMT'14英法翻译任务上取得BLEU 34.8，优于基于短语的统计机器翻译系统（33.3），并在重排序其假设后达到36.5。", "absEn": "Deep Neural Networks (DNNs) are powerful models that have achieved excellent performance on difficult learning tasks. Although DNNs work well whenever large labeled training sets are available, they cannot be used to map sequences to sequences. In this paper, we present a general end-to-end approach to sequence learning that makes minimal assumptions on the sequence structure. Our method uses a multilayered Long Short-Term Memory (LSTM) to map the input sequence to a vector of a fixed dimensionality, and then another deep LSTM to decode the target sequence from the vector. Our main result is that on an English to French translation task from the WMT'14 dataset, the translations produced by the LSTM achieve a BLEU score of 34.8 on the entire test set, where the LSTM's BLEU score was penalized on out-of-vocabulary words. Additionally, the LSTM did not have difficulty on long sentences. For comparison, a phrase-based SMT system achieves a BLEU score of 33.3 on the same dataset. When we used the LSTM to rerank the 1000 hypotheses produced by the aforementioned SMT system, its BLEU score increases to 36.5, which is close to the previous best result on this task. The LSTM also learned sensible phrase and sentence representations that are sensitive to word order and are relatively invariant to the active and the passive voice. Finally, we found that reversing the order of the words in all source sentences (but not target sentences) improved the LSTM's performance markedly, because doing so introduced many short term dependencies between the source and the target sentence which made the optimization problem easier.", "absZh": "深度神经网络（DNN）是强大的模型，在困难的学习任务上取得了优异的性能。尽管DNN在拥有大量标注训练集时表现良好，但它们不能用于序列到序列的映射。在本文中，我们提出了一种通用的端到端序列学习方法，该方法对序列结构做了最少的假设。我们的方法使用多层长短期记忆（LSTM）将输入序列映射到一个固定维度的向量，然后使用另一个深度LSTM从该向量解码目标序列。我们的主要结果是，在WMT'14数据集的英法翻译任务上，LSTM生成的翻译在整个测试集上达到了34.8的BLEU分数，其中LSTM的BLEU分数因词汇外单词而受到惩罚。此外，LSTM在长句子上没有困难。相比之下，基于短语的SMT系统在同一数据集上达到了33.3的BLEU分数。当我们使用LSTM对上述SMT系统产生的1000个假设进行重排序时，其BLEU分数增加到36.5，接近该任务之前的最佳结果。LSTM还学习了合理的短语和句子表示，这些表示对词序敏感，并且对主动语态和被动语态相对不变。最后，我们发现反转所有源句子（但不是目标句子）中的单词顺序显著提高了LSTM的性能，因为这样做引入了源句子和目标句子之间的许多短期依赖关系，使得优化问题更容易。", "insights": {"contrib": [{"en": "Proposes an end-to-end LSTM-based sequence-to-sequence model for general sequence learning.", "zh": "提出了一种基于LSTM的端到端序列到序列模型，用于通用序列学习。"}, {"en": "Achieves BLEU score of 34.8 on WMT'14 English-French translation, outperforming phrase-based SMT baseline.", "zh": "在WMT'14英法翻译任务上取得34.8的BLEU分数，优于基于短语的SMT基线。"}, {"en": "Reversing source sentences introduces short-term dependencies, improving LSTM performance on long sentences.", "zh": "反转源句子引入短期依赖，提升了LSTM在长句上的性能。"}, {"en": "LSTM learns sentence representations sensitive to word order and invariant to active/passive voice.", "zh": "LSTM学习到的句子表示对词序敏感，对主动/被动语态不变。"}, {"en": "Deep LSTMs with 4 layers significantly outperform shallow LSTMs.", "zh": "4层深度LSTM显著优于浅层LSTM。"}, {"en": "LSTM rescoring of SMT n-best lists achieves BLEU 36.5, close to previous best result.", "zh": "LSTM对SMT的n-best列表重新评分达到36.5的BLEU，接近此前最佳结果。"}], "limits": [{"en": "Limited vocabulary (80k target words) penalizes BLEU for out-of-vocabulary words.", "zh": "有限词汇表（8万目标词）对未登录词惩罚BLEU分数。"}, {"en": "Requires large computational resources (8 GPUs, 10 days training).", "zh": "需要大量计算资源（8个GPU，训练10天）。"}, {"en": "Beam search decoder is approximate and may not find optimal translation.", "zh": "束搜索解码器是近似的，可能找不到最优翻译。"}, {"en": "Method assumes monotonic alignment between input and output sequences.", "zh": "方法假设输入和输出序列之间存在单调对齐。"}, {"en": "Performance on tasks with very limited training data is not evaluated.", "zh": "未评估在训练数据非常有限的任务上的性能。"}]}}, {"id": "bengio-1409.0473", "pid": "bengio", "arxiv": "1409.0473", "date": "2014-09-01", "venue": "cs.CL", "fields": ["nlp", "deep-learning"], "tEn": "Neural Machine Translation by Jointly Learning to Align and Translate", "tZh": "通过联合学习对齐和翻译的神经机器翻译", "sEn": "Neural machine translation can be improved by allowing the model to automatically search for relevant parts of the source sentence without encoding it into a fixed-length vector.", "sZh": "神经机器翻译可以通过让模型自动搜索源句子的相关部分而不将其编码为固定长度向量来改进。", "absEn": "Neural machine translation is a recently proposed approach to machine translation. Unlike the traditional statistical machine translation, the neural machine translation aims at building a single neural network that can be jointly tuned to maximize the translation performance. The models proposed recently for neural machine translation often belong to a family of encoder-decoders and consists of an encoder that encodes a source sentence into a fixed-length vector from which a decoder generates a translation. In this paper, we conjecture that the use of a fixed-length vector is a bottleneck in improving the performance of this basic encoder-decoder architecture, and propose to extend this by allowing a model to automatically (soft-)search for parts of a source sentence that are relevant to predicting a target word, without having to form these parts as a hard segment explicitly. With this new approach, we achieve a translation performance comparable to the existing state-of-the-art phrase-based system on the task of English-to-French translation. Furthermore, qualitative analysis reveals that the (soft-)alignments found by the model agree well with our intuition.", "absZh": "神经机器翻译是最近提出的一种机器翻译方法。与传统的统计机器翻译不同，神经机器翻译旨在构建一个单一的神经网络，该网络可以联合调整以最大化翻译性能。最近提出的神经机器翻译模型通常属于编码器-解码器家族，包括一个将源句子编码为固定长度向量的编码器，解码器则从该向量生成翻译。在本文中，我们推测使用固定长度向量是改进这种基本编码器-解码器架构性能的瓶颈，并提出通过允许模型自动（软）搜索源句子中与预测目标词相关的部分来扩展该架构，而无需将这些部分明确地形成硬分段。通过这种新方法，我们在英法翻译任务上实现了与现有最先进的基于短语的系统相当的翻译性能。此外，定性分析表明，模型找到的（软）对齐与我们的直觉非常吻合。", "insights": {"contrib": [{"en": "Proposes an attention mechanism that allows soft-search over source sentence parts for each target word.", "zh": "提出注意力机制，允许对每个目标词在源句中进行软搜索。"}, {"en": "Eliminates the fixed-length vector bottleneck in encoder-decoder models, improving long sentence translation.", "zh": "消除了编码器-解码器模型中的固定长度向量瓶颈，改善了长句翻译。"}, {"en": "Achieves translation performance comparable to phrase-based SMT on English-to-French WMT'14.", "zh": "在英法WMT'14任务上达到与基于短语的统计机器翻译相当的性能。"}, {"en": "Uses bidirectional RNN encoder to capture both preceding and following context for each word.", "zh": "使用双向RNN编码器捕捉每个词的前后文信息。"}, {"en": "Jointly trains alignment and translation in a single neural network via backpropagation.", "zh": "通过反向传播在单个神经网络中联合训练对齐和翻译。"}, {"en": "Visualizes soft-alignments that align with linguistic intuition, handling non-monotonic reordering.", "zh": "可视化软对齐符合语言直觉，处理非单调重排。"}], "limits": [{"en": "Computes annotation weights for every source word per target word, limiting scalability to very long sequences.", "zh": "为每个目标词计算所有源词的权重，限制了在超长序列上的可扩展性。"}, {"en": "Requires fixed vocabulary with unknown word token, failing to handle rare or out-of-vocabulary words.", "zh": "需要固定词表并处理未知词，无法处理罕见或词表外词汇。"}, {"en": "Tested only on English-to-French; effectiveness on other language pairs with different reordering patterns is unverified.", "zh": "仅在英法上测试，对其他语言对（如英德）的有效性未验证。"}, {"en": "Soft alignment is computationally expensive compared to hard alignment used in traditional SMT.", "zh": "软对齐相比传统统计机器翻译的硬对齐计算开销更大。"}, {"en": "Performance relies on large parallel corpora; may degrade with limited data.", "zh": "性能依赖大规模平行语料，数据有限时可能下降。"}]}}, {"id": "feifei-1409.0575", "pid": "feifei", "arxiv": "1409.0575", "date": "2014-09-01", "venue": "cs.CV", "fields": ["vision"], "tEn": "ImageNet Large Scale Visual Recognition Challenge", "tZh": "ImageNet大规模视觉识别挑战赛", "sEn": "The ImageNet Large Scale Visual Recognition Challenge is a benchmark for object category classification and detection, driving advances in computer vision.", "sZh": "ImageNet大规模视觉识别挑战赛是物体分类与检测的基准，推动了计算机视觉的进步。", "absEn": "The ImageNet Large Scale Visual Recognition Challenge is a benchmark in object category classification and detection on hundreds of object categories and millions of images. The challenge has been run annually from 2010 to present, attracting participation from more than fifty institutions. This paper describes the creation of this benchmark dataset and the advances in object recognition that have been possible as a result. We discuss the challenges of collecting large-scale ground truth annotation, highlight key breakthroughs in categorical object recognition, provide a detailed analysis of the current state of the field of large-scale image classification and object detection, and compare the state-of-the-art computer vision accuracy with human accuracy. We conclude with lessons learned in the five years of the challenge, and propose future directions and improvements.", "absZh": "ImageNet大规模视觉识别挑战赛是一个针对数百个物体类别和数百万张图像的物体分类与检测基准。该挑战赛自2010年起每年举办，吸引了超过五十家机构参与。本文描述了该基准数据集的创建过程以及由此带来的物体识别进展。我们讨论了收集大规模真实标注的挑战，强调了分类物体识别的关键突破，详细分析了大规模图像分类和物体检测领域的现状，并将最先进的计算机视觉精度与人类精度进行了比较。最后，我们总结了挑战赛五年来的经验教训，并提出了未来的方向和改进措施。", "insights": {"contrib": [{"en": "Introduced the ImageNet Large Scale Visual Recognition Challenge (ILSVRC), a benchmark for object classification and detection with 1000 categories and millions of images.", "zh": "提出了ImageNet大规模视觉识别挑战赛（ILSVRC），这是一个包含1000个类别和数百万张图像的物体分类与检测基准。"}, {"en": "Developed scalable crowdsourcing methods for large-scale image annotation, achieving 99.7% precision.", "zh": "开发了可扩展的众包方法用于大规模图像标注，达到了99.7%的精确率。"}, {"en": "Demonstrated that deep convolutional neural networks (e.g., AlexNet) significantly outperform traditional methods, marking a turning point in object recognition.", "zh": "证明了深度卷积神经网络（如AlexNet）显著优于传统方法，标志着物体识别的转折点。"}, {"en": "Provided a detailed analysis of algorithmic progress over five years, comparing state-of-the-art computer vision accuracy with human accuracy.", "zh": "提供了五年间算法进展的详细分析，将最先进的计算机视觉准确率与人类准确率进行了比较。"}, {"en": "Established evaluation metrics for large-scale classification, localization, and detection, including top-5 error and average precision.", "zh": "建立了大规模分类、定位和检测的评估指标，包括top-5错误率和平均精确率。"}, {"en": "Released a publicly available dataset and competition framework that became the standard benchmark for object recognition research.", "zh": "发布了公开可用的数据集和竞赛框架，成为物体识别研究的标准基准。"}], "limits": [{"en": "Dataset annotation only labels one object category per image for classification, causing ambiguity when multiple objects are present.", "zh": "数据集标注仅对每张图像标记一个物体类别用于分类，当存在多个物体时会产生歧义。"}, {"en": "Evaluation metrics for localization may be inaccurate for images with clustered objects, requiring manual removal of 3.5% of images.", "zh": "定位评估指标对于包含聚集物体的图像可能不准确，需要手动移除3.5%的图像。"}, {"en": "Small object instances pose challenges for localization evaluation; threshold adjustment is needed for objects under 25x25 pixels.", "zh": "小物体实例对定位评估构成挑战；需要对小于25x25像素的物体调整阈值。"}, {"en": "The dataset's 1000 categories are limited to ImageNet synsets and may not cover all real-world object types.", "zh": "数据集的1000个类别仅限于ImageNet同义词集，可能无法覆盖所有真实世界的物体类型。"}, {"en": "Crowdsourcing annotation quality relies on worker consensus, which may vary across different object categories.", "zh": "众包标注质量依赖于工人共识，不同物体类别之间可能存在差异。"}]}}, {"id": "jeffdean-1301.3781", "pid": "jeffdean", "arxiv": "1301.3781", "date": "2013-01-16", "venue": "cs.CL", "fields": ["nlp"], "tEn": "Efficient Estimation of Word Representations in Vector Space", "tZh": "词向量空间中的高效估计方法", "sEn": "Proposed two novel model architectures for computing continuous word vectors from large datasets, achieving higher accuracy with lower computational cost.", "sZh": "提出了两种新的模型架构，用于从大规模数据集中计算连续词向量，在降低计算成本的同时提高了准确性。", "absEn": "We propose two novel model architectures for computing continuous vector representations of words from very large data sets. The quality of these representations is measured in a word similarity task, and the results are compared to the previously best performing techniques based on different types of neural networks. We observe large improvements in accuracy at much lower computational cost, i.e. it takes less than a day to learn high quality word vectors from a 1.6 billion words data set. Furthermore, we show that these vectors provide state-of-the-art performance on our test set for measuring syntactic and semantic word similarities.", "absZh": "我们提出了两种新颖的模型架构，用于从非常大的数据集中计算词的连续向量表示。这些表示的质量通过词相似性任务进行衡量，并将结果与之前基于不同类型神经网络的最佳技术进行比较。我们观察到在计算成本大大降低的情况下，准确性有了显著提高，即从16亿词的数据集中学习高质量词向量只需不到一天的时间。此外，我们表明这些向量在用于测量句法和语义词相似性的测试集上提供了最先进的性能。", "insights": {"contrib": [{"en": "Proposes CBOW and Skip-gram models for efficient learning of high-quality word vectors from large data.", "zh": "提出CBOW和Skip-gram模型，可从大规模数据高效学习高质量词向量。"}, {"en": "Achieves state-of-the-art accuracy on syntactic and semantic word similarity tasks with low computational cost.", "zh": "在句法和语义词相似性任务上以低计算成本达到最先进精度。"}, {"en": "Demonstrates that word vectors capture linear regularities, enabling algebraic operations like vector(\"King\") - vector(\"Man\") + vector(\"Woman\") ≈ vector(\"Queen\").", "zh": "证明词向量捕捉线性规律，支持代数运算如vector(\"King\") - vector(\"Man\") + vector(\"Woman\") ≈ vector(\"Queen\")。"}, {"en": "Introduces a comprehensive test set with 8869 semantic and 10675 syntactic questions for evaluating word vectors.", "zh": "引入包含8869个语义和10675个句法问题的综合测试集，用于评估词向量。"}, {"en": "Shows that increasing both vector dimensionality and training data size yields diminishing returns, requiring balanced scaling.", "zh": "表明同时增加向量维度和训练数据量会带来递减收益，需要平衡缩放。"}, {"en": "Achieves new state-of-the-art on Microsoft Sentence Completion Challenge (58.9% accuracy) by combining Skip-gram with RNNLM.", "zh": "通过结合Skip-gram与RNNLM，在微软句子补全挑战中达到新最先进水平（58.9%准确率）。"}], "limits": [{"en": "Models treat words as atomic units, ignoring morphology; synonyms are counted as mistakes in evaluation.", "zh": "模型将词视为原子单元，忽略形态学；同义词在评估中被计为错误。"}, {"en": "Performance saturates with increasing vector dimensions or data size, requiring joint scaling for improvement.", "zh": "性能随向量维度或数据量增加而饱和，需要联合缩放才能改进。"}, {"en": "Skip-gram model underperforms on syntactic tasks compared to CBOW, limiting its general applicability.", "zh": "Skip-gram在句法任务上表现不如CBOW，限制了其通用性。"}, {"en": "Training on limited in-domain data (e.g., speech recognition) may not benefit from simple scaling, requiring advanced techniques.", "zh": "在有限的领域数据（如语音识别）上训练可能无法从简单缩放中受益，需要更高级技术。"}, {"en": "Evaluation metric (cosine distance) may not capture all semantic nuances, and 100% accuracy is likely unattainable.", "zh": "评估指标（余弦距离）可能无法捕捉所有语义细微差别，100%准确率可能无法达到。"}]}}];
/* PAPERS_END */
const FULL_CACHE={};
const CHAT_PROXY="https://aipaper-chat.992978142.workers.dev";  // 部署 chat-worker 后填入 https://...workers.dev

/* ===== HELPERS ===== */
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const papersOf=pid=>PAPERS.filter(p=>p.pid===pid);
function pplOrder(){const k=Object.keys(PEOPLE);return k.slice().sort((a,b)=>papersOf(b).length-papersOf(a).length||k.indexOf(a)-k.indexOf(b));}
function av(pid,cls){const p=PEOPLE[pid];return `<div class="${cls||'av'}">`+(PHOTOS.has(pid)?`<img src="assets/people/${pid}.jpg" alt="${esc(p.en)}">`:esc(p.init))+`</div>`;}
const fdot=f=>`<span class="fdot" style="background:${FIELDS[f].c}"></span>`;
const ftag=f=>`<span class="tag" style="background:${FIELDS[f].c}">${FIELDS[f].zh}</span>`;
function go(h){location.hash=h;}

/* ===== VIEWS ===== */
function pplCard(pid){const p=PEOPLE[pid];const n=papersOf(pid).length;
 return `<div class="ppl-card" onclick="go('#/person/${pid}')">${av(pid)}<div class="n">${esc(p.en)}</div><div class="nz">${esc(p.zh)}</div><div class="ti">${esc(p.tiZh)}</div><div class="cnt">${n} 篇论文</div></div>`;}
function paperCard(p){const pe=PEOPLE[p.pid]||{};
 return `<a class="paper-card" onclick="go('#/paper/${p.id}')"><div class="pt">${esc(p.tEn)}</div><div class="ptz">${esc(p.tZh)}</div>
   <div class="meta"><span>${esc(pe.zh||'')}</span><span>arXiv:${p.arxiv}</span><span>${p.date}</span>${(p.fields||[]).map(ftag).join('')}</div></a>`;}

function vHome(){
 const latest=PAPERS.slice(0,5);
 return `<div class="wrap">
  <section class="hero">
   <div class="eyebrow">Papers · 双语论文</div>
   <h1>读懂 AI 大佬的<br>代表论文</h1>
   <p class="lead">著名学者 × 里程碑论文，逐段中英对照全文，提炼核心贡献，还能针对论文内容直接问 AI。</p>
   <div class="chips">${Object.keys(FIELDS).map(f=>`<span class="chip" onclick="go('#/people?field=${f}')">${fdot(f)}${FIELDS[f].zh}</span>`).join('')}</div>
  </section>
  ${latest.length?`<section><div class="eyebrow">Latest · 最新收录</div><h2 class="title">最新论文</h2>
   <div class="grid" style="margin-top:20px">${latest.map(paperCard).join('')}</div></section>`:
   `<section><p class="sub">还没有论文，跑 <code>pipeline/add_paper.py</code> 收录第一篇。</p></section>`}
  <section><div class="eyebrow">Scholars · 学者</div><h2 class="title">${Object.keys(PEOPLE).length} 位学者</h2>
   <div class="grid ppl-grid" style="margin-top:20px">${pplOrder().map(pplCard).join('')}</div></section>
 </div>${footer()}`;
}
function vPeople(field){
 const ids=pplOrder().filter(id=>!field||PEOPLE[id].fields.includes(field));
 return `<div class="wrap"><section>
  <div class="eyebrow">Scholars · 学者</div><h2 class="title">AI 学者</h2>
  <div class="chips" style="margin-top:18px"><span class="chip ${!field?'on':''}" onclick="go('#/people')">全部</span>
   ${Object.keys(FIELDS).map(f=>`<span class="chip ${field===f?'on':''}" onclick="go('#/people?field=${f}')">${fdot(f)}${FIELDS[f].zh}</span>`).join('')}</div>
  <div class="grid ppl-grid" style="margin-top:22px">${ids.map(pplCard).join('')||'<p class="sub">该领域暂无学者</p>'}</div>
 </section></div>${footer()}`;
}
function vPapers(){
 return `<div class="wrap"><section><div class="eyebrow">Papers · 论文</div><h2 class="title">全部论文 · ${PAPERS.length}</h2>
  <div class="grid" style="margin-top:20px">${PAPERS.map(paperCard).join('')||'<p class="sub">暂无论文</p>'}</div></section></div>${footer()}`;
}
function vPerson(pid){
 const p=PEOPLE[pid]; if(!p) return vHome();
 const ps=papersOf(pid);
 return `<div class="wrap"><section>
  <span class="back" onclick="go('#/people')">← 学者</span>
  <div class="row">${av(pid,'bigav')}<div><h1 style="margin:0;font-size:34px">${esc(p.en)}</h1>
   <div class="sub" style="margin:2px 0">${esc(p.zh)}</div>
   <div class="sub">${esc(p.tiEn)} · ${esc(p.tiZh)}</div>
   <div style="margin-top:8px">${p.fields.map(ftag).join(' ')}</div></div></div>
  <p class="bio">${esc(p.bioEn)}</p><p class="bioz">${esc(p.bioZh)}</p>
  <h3 style="margin-top:30px">代表论文 · ${ps.length}</h3>
  <div class="grid" style="margin-top:14px">${ps.map(paperCard).join('')||'<p class="sub">暂无</p>'}</div>
 </section></div>${footer()}`;
}
function ilist(arr,head){return `<div class="icard"><h4 style="color:var(--acc)">${head}</h4><ul style="margin:0;padding-left:18px">${(arr||[]).map(x=>`<li>${esc(x.en)}<span class="z">${esc(x.zh)}</span></li>`).join('')}</ul></div>`;}
function vPaper(id){
 const p=PAPERS.find(x=>x.id===id); if(!p) return vHome();
 const pe=PEOPLE[p.pid]||{}; const ins=p.insights||{};
 const full=FULL_CACHE[id];
 const reader=full?full.full.map(s=>`<div class="sec-h">${esc(s.sec)}</div><div class="sec-hz">${esc(s.secZh||'')}</div>`+
    s.paras.map(pa=>`<div class="para"><div class="en">${esc(pa.en)}</div><div class="zh">${esc(pa.zh)}</div></div>`).join('')).join('')
   :`<div class="skeleton" style="width:90%"></div><div class="skeleton" style="width:80%"></div><div class="skeleton" style="width:86%"></div>`;
 if(!full) ensureFull(id);
 return `<div class="wrap"><section>
  <span class="back" onclick="go('#/person/${p.pid}')">← ${esc(pe.zh||'')}</span>
  <h1 style="font-size:30px;margin:6px 0 2px">${esc(p.tEn)}</h1>
  <div class="sub" style="font-size:19px;color:#333">${esc(p.tZh)}</div>
  <div class="meta" style="margin-top:12px;color:var(--sub);font-size:14px">
   ${av(p.pid,'av')&&''}<span>${esc(pe.en||'')} · ${esc(pe.zh||'')}</span> ·
   <a class="alink" href="https://arxiv.org/abs/${p.arxiv}" target="_blank">arXiv:${p.arxiv} ↗</a> · <span>${p.date}</span></div>
  <div style="margin-top:12px">${(p.fields||[]).map(ftag).join(' ')}</div>
  <div class="cards2">${ilist(ins.contrib,'核心贡献 · Key Contributions')}${ilist(ins.limits,'局限与边界 · Limitations')}</div>
  <h3 style="margin-top:30px">摘要 · Abstract</h3>
  <div class="para"><div class="en">${esc(p.absEn)}</div><div class="zh">${esc(p.absZh)}</div></div>
  ${askBox(p)}
  <h3 style="margin-top:34px">全文 · 逐段中英对照</h3>
  <div class="reader">${reader}</div>
 </section></div>${footer()}`;
}
function askBox(p){
 const qs=(p.insights&&p.insights.contrib||[]).slice(0,2).map(x=>x.zh);
 return `<div class="askbox"><div style="font-weight:650;margin-bottom:6px">针对这篇论文问 AI</div>
  <input id=" q" placeholder="例如：FlashAttention 为什么更快？" onkeydown="if(event.key==='Enter')askPaper('${p.id}')">
  <div class="qsugg">${qs.map(q=>`<span onclick="document.getElementById('q').value='${esc(q)}';askPaper('${p.id}')">${esc(q)}</span>`).join('')}</div>
  <button class="askbtn" onclick="askPaper('${p.id}')">提问</button>
  <div class="ans" id="ans"></div></div>`;
}
function vAsk(){
 return `<div class="wrap"><section><div class="eyebrow">Ask · 问 AI</div><h2 class="title">问遍全站论文</h2>
  <p class="sub">基于站内 ${PAPERS.length} 篇论文的内容回答，并标注引用来源。进入任意论文页也可单篇提问。</p>
  <div class="askbox" style="margin-top:18px"><input id="q" placeholder="例如：注意力机制是怎么提出的？" onkeydown="if(event.key==='Enter')askAll()">
   <button class="askbtn" onclick="askAll()">提问</button><div class="ans" id="ans"></div></div>
 </section></div>${footer()}`;
}
function footer(){return `<footer><div class="wrap">
  <div>AI Paper · 双语论文阅读站 — 著名学者的代表论文，逐段中英对照 + 核心贡献 + 论文问答。</div>
  <div class="legal">本站论文正文/摘要版权归原作者与 arXiv，按其许可（多为 CC-BY/arXiv 非独占）展示译文，仅作学习与研究用途；如权利人要求即下架。译文由 AI 生成，仅供参考，以原文为准。</div>
 </div></footer>`;}

/* ===== ASK (需部署 chat-worker；未配置则提示) ===== */
async function ask(payload,box){
 if(!CHAT_PROXY){box.textContent="（问答未配置）";return;}
 box.textContent="思考中…";
 try{const r=await fetch(CHAT_PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  if(!r.ok){box.textContent="出错："+r.status+" "+(await r.text());return;}
  const reader=r.body.getReader(),dec=new TextDecoder();box.textContent="";
  for(;;){const{done,value}=await reader.read();if(done)break;box.textContent+=dec.decode(value,{stream:true});}
 }catch(e){box.textContent="出错了："+e;}
}
function askPaper(id){const q=document.getElementById('q').value.trim();if(!q)return;
 const p=FULL_CACHE[id]||PAPERS.find(x=>x.id===id);
 ask({mode:'paper',q,id,title:p.tEn},document.getElementById('ans'));}
function askAll(){const q=document.getElementById('q').value.trim();if(!q)return;
 ask({mode:'all',q},document.getElementById('ans'));}

/* ===== LAZY FULL TEXT ===== */
async function ensureFull(id){
 if(FULL_CACHE[id])return FULL_CACHE[id];
 try{const r=await fetch('data/'+id+'.json');FULL_CACHE[id]=await r.json();
  if(location.hash.includes('/paper/'+id))render();return FULL_CACHE[id];}catch(e){}
}

/* ===== ROUTER ===== */
function render(){
 const h=location.hash||'#/';const[path,query]=h.slice(2).split('?');
 const parts=path.split('/').filter(Boolean);const qp=query?new URLSearchParams(query):null;
 let html;
 if(!parts.length)html=vHome();
 else if(parts[0]==='person')html=vPerson(parts[1]);
 else if(parts[0]==='paper')html=vPaper(decodeURIComponent(parts[1]));
 else if(parts[0]==='people')html=vPeople(qp&&qp.get('field'));
 else if(parts[0]==='papers')html=vPapers();
 else if(parts[0]==='ask')html=vAsk();
 else html=vHome();
 document.getElementById('app').innerHTML=html;
 window.scrollTo(0,0);
}
addEventListener('hashchange',render);render();
</script>
</body>
</html>
