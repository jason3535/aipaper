erimental results show that combining existing GNN methods with DiffPool yields an average improvement of 5-10% accuracy on graph classification benchmarks, compared to all existing pooling approaches, achieving a new state-of-the-art on four out of five benchmark data sets.", "absZh": "最近，图神经网络（GNN）通过有效学习节点嵌入，彻底改变了图表示学习领域，并在节点分类和链接预测等任务中取得了最先进的成果。然而，当前的GNN方法本质上是平坦的，无法学习图的层次化表示——这一局限性对于图分类任务（即预测整个图的标签）尤其成问题。本文提出了DiffPool，一种可微分的图池化模块，能够生成图的层次化表示，并以端到端的方式与各种图神经网络架构结合。DiffPool在深度GNN的每一层学习一个可微分的软聚类分配，将节点映射到一组聚类中，这些聚类随后形成下一GNN层的粗化输入。我们的实验结果表明，与所有现有的池化方法相比，将现有GNN方法与DiffPool结合，在图分类基准测试上平均提高了5-10%的准确率，在五个基准数据集中有四个达到了新的最先进水平。", "insights": {"contrib": [{"en": "Proposes DiffPool, a differentiable graph pooling module for hierarchical graph representation learning.", "zh": "提出DiffPool，一种用于层次化图表示学习的可微图池化模块。"}, {"en": "Enables end-to-end training of deep GNNs with hierarchical pooling, improving graph classification accuracy by 5-10%.", "zh": "实现带层次池化的深度GNN端到端训练，将图分类准确率提升5-10%。"}, {"en": "Achieves state-of-the-art results on four out of five benchmark graph classification datasets.", "zh": "在五个基准图分类数据集中的四个上达到最先进结果。"}, {"en": "Learns interpretable hierarchical clusters corresponding to community structures in graphs.", "zh": "学习与图中社区结构对应的可解释层次化聚类。"}, {"en": "Demonstrates permutation invariance of the pooling operation, ensuring robustness to node ordering.", "zh": "证明池化操作的置换不变性，确保对节点排序的鲁棒性。"}, {"en": "Introduces auxiliary link prediction and entropy regularization to improve training stability and cluster quality.", "zh": "引入辅助链接预测和熵正则化以提高训练稳定性和聚类质量。"}], "limits": [{"en": "Requires predefining the maximum number of clusters per layer, which may not be optimal for all graphs.", "zh": "需要预定义每层的最大聚类数，可能并非对所有图最优。"}, {"en": "Soft cluster assignments may lead to noisy coarsened graphs and increased computational cost.", "zh": "软聚类分配可能导致粗化图噪声增加和计算成本上升。"}, {"en": "Performance depends on the base GNN architecture; not all GNNs benefit equally from DiffPool.", "zh": "性能依赖于基础GNN架构；并非所有GNN都能从DiffPool中同等受益。"}, {"en": "Auxiliary objectives (link prediction, entropy) add training complexity and may require careful tuning.", "zh": "辅助目标（链接预测、熵）增加训练复杂度，可能需要仔细调参。"}, {"en": "Struggles with graphs containing many structurally similar nodes, potentially pooling distant nodes together.", "zh": "在包含许多结构相似节点的图上表现不佳，可能将远距离节点池化在一起。"}]}, "cites": 2514}, {"id": "pbattaglia-1806.01261", "pid": "pbattaglia", "arxiv": "1806.01261", "date": "2018-06-04", "venue": "cs.LG", "org": "Google DeepMind", "fields": ["deep-learning", "rl"], "tEn": "Relational inductive biases, deep learning, and graph networks", "tZh": "关系归纳偏置、深度学习与图网络", "sEn": "Combinatorial generalization is key to human-like AI, and graph networks with relational inductive biases offer a promising path.", "sZh": "组合泛化是实现类人人工智能的关键，而具有关系归纳偏置的图网络提供了一条有前景的路径。", "absEn": "Artificial intelligence (AI) has undergone a renaissance recently, making major progress in key domains such as vision, language, control, and decision-making. This has been due, in part, to cheap data and cheap compute resources, which have fit the natural strengths of deep learning. However, many defining characteristics of human intelligence, which developed under much different pressures, remain out of reach for current approaches. In particular, generalizing beyond one's experiences--a hallmark of human intelligence from infancy--remains a formidable challenge for modern AI. The following is part position paper, part review, and part unification. We argue that combinatorial generalization must be a top priority for AI to achieve human-like abilities, and that structured representations and computations are key to realizing this objective. Just as biology uses nature and nurture cooperatively, we reject the false choice between \"hand-engineering\" and \"end-to-end\" learning, and instead advocate for an approach which benefits from their complementary strengths. We explore how using relational inductive biases within deep learning architectures can facilitate learning about entities, relations, and rules for composing them. We present a new building block for the AI toolkit with a strong relational inductive bias--the graph network--which generalizes and extends various approaches for neural networks that operate on graphs, and provides a straightforward interface for manipulating structured knowledge and producing structured behaviors. We discuss how graph networks can support relational reasoning and combinatorial generalization, laying the foundation for more sophisticated, interpretable, and flexible patterns of reasoning. As a companion to this paper, we have released an open-source software library for building graph networks, with demonstrations of how to use them in practice.", "absZh": "人工智能最近经历了一次复兴，在视觉、语言、控制和决策等关键领域取得了重大进展。这在一定程度上得益于廉价的数据和计算资源，这些资源契合了深度学习的天然优势。然而，人类智能的许多决定性特征——这些特征是在截然不同的压力下发展起来的——对于当前的方法来说仍然遥不可及。特别是，超越自身经验进行泛化——这是从婴儿期起人类智能的标志——对现代人工智能来说仍然是一个艰巨的挑战。本文兼具立场论文、综述和统一框架的性质。我们认为，组合泛化必须是人工智能实现类人能力的首要任务，而结构化表示和计算是实现这一目标的关键。正如生物学合作利用先天和后天一样，我们拒绝在“手工工程”和“端到端”学习之间做出错误选择，而是倡导一种受益于它们互补优势的方法。我们探讨了如何在深度学习架构中使用关系归纳偏置来促进对实体、关系及其组合规则的学习。我们为人工智能工具箱提出了一种具有强关系归纳偏置的新构建块——图网络——它概括并扩展了多种在图上操作的神经网络方法，并提供了一个直观的接口来操作结构化知识和产生结构化行为。我们讨论了图网络如何支持关系推理和组合泛化，为更复杂、可解释和灵活的推理模式奠定基础。作为本文的配套，我们发布了一个用于构建图网络的开源软件库，并演示了如何在实践中使用它们。", "insights": {"contrib": [{"en": "Argues combinatorial generalization is key for human-like AI and structured representations are essential.", "zh": "论证组合泛化是实现类人AI的关键，结构化表示至关重要。"}, {"en": "Rejects false choice between hand-engineering and end-to-end learning, advocating complementary strengths.", "zh": "拒绝手工设计与端到端学习的错误二分，主张发挥互补优势。"}, {"en": "Introduces graph networks as a new building block with strong relational inductive bias.", "zh": "引入图网络作为具有强关系归纳偏置的新构建模块。"}, {"en": "Unifies and extends various graph neural network approaches within a single framework.", "zh": "在统一框架内整合并扩展了多种图神经网络方法。"}, {"en": "Demonstrates graph networks support relational reasoning and combinatorial generalization.", "zh": "展示图网络支持关系推理和组合泛化。"}, {"en": "Releases open-source library for building graph networks with practical demonstrations.", "zh": "发布用于构建图网络的开源库并提供实践演示。"}], "limits": [{"en": "Graph networks assume pairwise relations; higher-order interactions require extensions.", "zh": "图网络假设成对关系，高阶交互需要扩展。"}, {"en": "Inferring graph structure from unstructured data remains an open challenge.", "zh": "从非结构化数据推断图结构仍是一个开放挑战。"}, {"en": "Scalability to very large graphs may be limited due to quadratic edge growth.", "zh": "由于边的二次增长，扩展到极大图可能受限。"}, {"en": "Framework focuses on relational inductive biases; other biases (e.g., non-linearities) are not covered.", "zh": "框架聚焦关系归纳偏置，未涵盖其他偏置（如非线性）。"}, {"en": "Empirical validation of combinatorial generalization is limited to specific domains.", "zh": "组合泛化的实证验证仅限于特定领域。"}]}, "cites": 3614}, {"id": "amadry-1805.11604", "pid": "amadry", "arxiv": "1805.11604", "date": "2018-05-29", "venue": "stat.ML", "org": "MIT", "fields": ["deep-learning"], "tEn": "How Does Batch Normalization Help Optimization?", "tZh": "批归一化如何帮助优化？", "sEn": "Batch Normalization makes the optimization landscape smoother, enabling faster and more stable training.", "sZh": "批归一化使优化景观更平滑，从而实现更快、更稳定的训练。", "absEn": "Batch Normalization (BatchNorm) is a widely adopted technique that enables faster and more stable training of deep neural networks (DNNs). Despite its pervasiveness, the exact reasons for BatchNorm's effectiveness are still poorly understood. The popular belief is that this effectiveness stems from controlling the change of the layers' input distributions during training to reduce the so-called \"internal covariate shift\". In this work, we demonstrate that such distributional stability of layer inputs has little to do with the success of BatchNorm. Instead, we uncover a more fundamental impact of BatchNorm on the training process: it makes the optimization landscape significantly smoother. This smoothness induces a more predictive and stable behavior of the gradients, allowing for faster training.", "absZh": "批归一化（BatchNorm）是一种广泛采用的技术，能够加速深度神经网络的训练并使其更稳定。尽管其普遍应用，但BatchNorm有效性的确切原因仍不清楚。普遍认为其有效性源于控制训练过程中层输入分布的变化，以减少所谓的“内部协变量偏移”。在本工作中，我们证明这种层输入的分布稳定性与BatchNorm的成功关系不大。相反，我们揭示了BatchNorm对训练过程更根本的影响：它使优化景观显著更平滑。这种平滑性导致梯度更具可预测性和稳定性，从而允许更快的训练。", "insights": {"contrib": [{"en": "Demonstrates that BatchNorm's success is not due to reducing internal covariate shift.", "zh": "证明BatchNorm的成功并非源于减少内部协变量偏移。"}, {"en": "Identifies that BatchNorm smooths the optimization landscape, improving gradient predictiveness.", "zh": "发现BatchNorm平滑优化曲面，提升梯度的可预测性。"}, {"en": "Shows that BatchNorm improves Lipschitzness of loss and gradients, enabling larger learning rates.", "zh": "表明BatchNorm改善损失和梯度的Lipschitz连续性，允许更大学习率。"}, {"en": "Provides theoretical analysis proving BatchNorm reduces gradient magnitude and Hessian quadratic form.", "zh": "提供理论分析证明BatchNorm降低梯度幅值和Hessian二次型。"}, {"en": "Demonstrates that other normalization techniques (e.g., Lp-norm) also smooth the landscape.", "zh": "证明其他归一化技术（如Lp范数）同样平滑优化曲面。"}], "limits": [{"en": "Analysis focuses on fully-connected layers; effects on convolutional layers may differ.", "zh": "分析聚焦全连接层；对卷积层的影响可能不同。"}, {"en": "Theoretical results assume mild conditions like convex loss and positive gradient-variable correlation.", "zh": "理论结果假设温和条件，如凸损失和梯度-变量正相关。"}, {"en": "Empirical validation limited to VGG on CIFAR-10 and deep linear networks.", "zh": "实证验证限于CIFAR-10上的VGG和深度线性网络。"}, {"en": "Does not fully explain BatchNorm's generalization benefits.", "zh": "未完全解释BatchNorm的泛化优势。"}]}, "cites": 1733}, {"id": "goodfellow-1805.08318", "pid": "goodfellow", "arxiv": "1805.08318", "date": "2018-05-21", "venue": "stat.ML", "org": "Google", "fields": ["generative", "vision"], "tEn": "Self-Attention Generative Adversarial Networks", "tZh": "自注意力生成对抗网络", "sEn": "SAGAN introduces self-attention to GANs for long-range dependency modeling, achieving state-of-the-art results on ImageNet.", "sZh": "SAGAN将自注意力机制引入生成对抗网络，实现长距离依赖建模，在ImageNet上取得了最优结果。", "absEn": "In this paper, we propose the Self-Attention Generative Adversarial Network (SAGAN) which allows attention-driven, long-range dependency modeling for image generation tasks. Traditional convolutional GANs generate high-resolution details as a function of only spatially local points in lower-resolution feature maps. In SAGAN, details can be generated using cues from all feature locations. Moreover, the discriminator can check that highly detailed features in distant portions of the image are consistent with each other. Furthermore, recent work has shown that generator conditioning affects GAN performance. Leveraging this insight, we apply spectral normalization to the GAN generator and find that this improves training dynamics. The proposed SAGAN achieves the state-of-the-art results, boosting the best published Inception score from 36.8 to 52.52 and reducing Frechet Inception distance from 27.62 to 18.65 on the challenging ImageNet dataset. Visualization of the attention layers shows that the generator leverages neighborhoods that correspond to object shapes rather than local regions of fixed shape.", "absZh": "本文提出了自注意力生成对抗网络（SAGAN），它允许在图像生成任务中进行注意力驱动的长距离依赖建模。传统的卷积GAN仅根据低分辨率特征图中的空间局部点生成高分辨率细节。在SAGAN中，可以利用所有特征位置的线索生成细节。此外，判别器可以检查图像中远距离部分的高度详细特征是否相互一致。进一步地，最近的研究表明生成器条件化影响GAN性能。利用这一见解，我们对GAN生成器应用谱归一化，发现这改善了训练动态。所提出的SAGAN取得了最先进的结果，在具有挑战性的ImageNet数据集上，将最佳公布的Inception分数从36.8提高到52.52，并将Frechet Inception距离从27.62降低到18.65。注意力层的可视化显示，生成器利用对应于物体形状的邻域，而不是固定形状的局部区域。", "insights": {"contrib": [{"en": "Proposes Self-Attention Generative Adversarial Network (SAGAN) for attention-driven long-range dependency modeling in image generation.", "zh": "提出自注意力生成对抗网络（SAGAN），在图像生成中实现注意力驱动的长程依赖建模。"}, {"en": "Applies spectral normalization to the GAN generator, improving training dynamics and stability.", "zh": "将谱归一化应用于GAN生成器，改善训练动态和稳定性。"}, {"en": "Achieves state-of-the-art results on ImageNet: Inception score 52.52 and FID 18.65.", "zh": "在ImageNet上取得最优结果：Inception分数52.52，FID 18.65。"}, {"en": "Visualizes attention layers showing generator leverages object-shaped neighborhoods rather than fixed local regions.", "zh": "可视化注意力层，显示生成器利用物体形状邻域而非固定局部区域。"}, {"en": "Demonstrates that self-attention is complementary to convolution for modeling long-range dependencies in feature maps.", "zh": "证明自注意力与卷积互补，用于特征图中的长程依赖建模。"}], "limits": [{"en": "Experiments limited to 128x128 image generation on ImageNet; scalability to higher resolutions not tested.", "zh": "实验仅限于ImageNet上128x128图像生成，未测试更高分辨率下的可扩展性。"}, {"en": "Self-attention module increases computational cost compared to pure convolutional GANs.", "zh": "与纯卷积GAN相比，自注意力模块增加了计算成本。"}, {"en": "Training requires two weeks on 4 GPUs; resource-intensive for broader adoption.", "zh": "训练需在4个GPU上进行两周，资源密集，不利于广泛采用。"}, {"en": "Evaluation metrics (IS, FID) have known limitations; not fully aligned with human perception.", "zh": "评估指标（IS、FID）存在已知局限，未完全与人类感知对齐。"}]}, "cites": 4133}, {"id": "jredmon-1804.02767", "pid": "jredmon", "arxiv": "1804.02767", "date": "2018-04-08", "venue": "cs.CV", "org": "U. Washington", "fields": ["vision", "efficiency"], "tEn": "YOLOv3: An Incremental Improvement", "tZh": "YOLOv3：一项渐进式改进", "sEn": "YOLOv3 is a fast and accurate object detector, achieving 57.9 mAP@50 in 51 ms on a Titan X, 3.8x faster than RetinaNet with similar performance.", "sZh": "YOLOv3 是一个快速且准确的目标检测器，在 Titan X 上以 51 毫秒达到 57.9 mAP@50，性能与 RetinaNet 相当但速度快 3.8 倍。", "absEn": "We present some updates to YOLO! We made a bunch of little design changes to make it better. We also trained this new network that's pretty swell. It's a little bigger than last time but more accurate. It's still fast though, don't worry. At 320x320 YOLOv3 runs in 22 ms at 28.2 mAP, as accurate as SSD but three times faster. When we look at the old .5 IOU mAP detection metric YOLOv3 is quite good. It achieves 57.9 mAP@50 in 51 ms on a Titan X, compared to 57.5 mAP@50 in 198 ms by RetinaNet, similar performance but 3.8x faster. As always, all the code is online at https://pjreddie.com/yolo/", "absZh": "我们介绍了 YOLO 的一些更新！我们进行了一系列小的设计改进以提升性能。我们还训练了一个新的网络，效果相当不错。它比之前的版本稍大，但更准确。不过它仍然很快，别担心。在 320x320 分辨率下，YOLOv3 运行时间为 22 毫秒，mAP 为 28.2，与 SSD 精度相当但速度快三倍。当使用旧的 .5 IOU mAP 检测指标时，YOLOv3 表现相当出色。它在 Titan X 上以 51 毫秒达到 57.9 mAP@50，而 RetinaNet 需要 198 毫秒才能达到 57.5 mAP@50，性能相似但速度快 3.8 倍。一如既往，所有代码均可在 https://pjreddie.com/yolo/ 获取。", "insights": {"contrib": [{"en": "Proposes YOLOv3, an incremental improvement to YOLO with better accuracy and speed.", "zh": "提出YOLOv3，对YOLO进行增量改进，提升精度和速度。"}, {"en": "Introduces Darknet-53, a new feature extractor balancing efficiency and performance.", "zh": "引入Darknet-53，一种平衡效率与性能的新特征提取器。"}, {"en": "Adopts multi-scale predictions using feature pyramid networks for improved small object detection.", "zh": "采用特征金字塔网络的多尺度预测，改进小目标检测。"}, {"en": "Uses independent logistic classifiers for multilabel classification, avoiding softmax limitations.", "zh": "使用独立逻辑分类器进行多标签分类，避免softmax限制。"}, {"en": "Achieves state-of-the-art speed-accuracy trade-off on COCO, e.g., 57.9 mAP@50 in 51 ms.", "zh": "在COCO上实现速度与精度的最优权衡，例如51毫秒内达到57.9 mAP@50。"}, {"en": "Open-sources code and model for reproducibility.", "zh": "开源代码和模型以促进可复现性。"}], "limits": [{"en": "Performance drops significantly at higher IOU thresholds (e.g., 0.75), indicating poor box alignment.", "zh": "在高IOU阈值（如0.75）下性能显著下降，表明边界框对齐不佳。"}, {"en": "Underperforms on medium and large objects compared to small objects in COCO.", "zh": "在COCO中，中大型目标的性能不如小型目标。"}, {"en": "Does not achieve top results on COCO average AP (0.5:0.95), lagging behind RetinaNet.", "zh": "在COCO平均AP（0.5:0.95）上未达到最佳结果，落后于RetinaNet。"}, {"en": "Some attempted improvements (e.g., focal loss, dual IOU thresholds) did not yield gains.", "zh": "部分尝试的改进（如焦点损失、双IOU阈值）未带来收益。"}]}, "cites": 25423}, {"id": "dha-1803.10122", "pid": "dha", "arxiv": "1803.10122", "date": "2018-03-27", "venue": "cs.LG", "org": "Google Brain", "fields": ["rl", "generative"], "tEn": "World Models", "tZh": "世界模型", "sEn": "We can train an agent entirely inside its own hallucinated dream generated by its world model and transfer the policy back to the actual environment.", "sZh": "我们可以在世界模型生成的幻觉梦境中完全训练智能体，并将策略迁移回真实环境。", "absEn": "We explore building generative neural network models of popular reinforcement learning environments. Our world model can be trained quickly in an unsupervised manner to learn a compressed spatial and temporal representation of the environment. By using features extracted from the world model as inputs to an agent, we can train a very compact and simple policy that can solve the required task. We can even train our agent entirely inside of its own hallucinated dream generated by its world model, and transfer this policy back into the actual environment. An interactive version of this paper is available at https://worldmodels.github.io/", "absZh": "我们探索构建流行强化学习环境的生成式神经网络模型。我们的世界模型可以通过无监督方式快速训练，学习环境的压缩时空表征。通过将世界模型提取的特征作为智能体的输入，我们可以训练一个非常紧凑且简单的策略来解决所需任务。我们甚至可以在世界模型生成的幻觉梦境中完全训练智能体，并将该策略迁移回实际环境。本文的交互式版本可在 https://worldmodels.github.io/ 获取。", "insights": {"contrib": [{"en": "Proposes a world model framework with VAE and MDN-RNN for unsupervised learning of compressed spatial-temporal representations.", "zh": "提出一个由VAE和MDN-RNN组成的世界模型框架，用于无监督学习压缩的时空表征。"}, {"en": "Demonstrates training a compact linear controller using features from the world model to solve continuous control tasks.", "zh": "展示利用世界模型特征训练紧凑线性控制器以解决连续控制任务。"}, {"en": "Shows agent can be trained entirely inside a hallucinated dream environment and transfer policy to the real environment.", "zh": "展示智能体可在完全由世界模型生成的梦境环境中训练，并将策略迁移到真实环境。"}, {"en": "Uses temperature parameter in MDN-RNN to control uncertainty and prevent adversarial policy exploitation.", "zh": "利用MDN-RNN的温度参数控制不确定性，防止对抗性策略的利用。"}, {"en": "Achieves state-of-the-art results on CarRacing-v0 and VizDoom tasks with simple evolutionary optimization.", "zh": "在CarRacing-v0和VizDoom任务上通过简单进化优化取得最先进结果。"}, {"en": "Provides an interactive online version of the paper for hands-on exploration.", "zh": "提供论文的交互式在线版本，便于动手探索。"}], "limits": [{"en": "World model may encode task-irrelevant details due to unsupervised training.", "zh": "由于无监督训练，世界模型可能编码与任务无关的细节。"}, {"en": "Limited capacity of LSTM-based world model may cause catastrophic forgetting.", "zh": "基于LSTM的世界模型容量有限，可能导致灾难性遗忘。"}, {"en": "Controller can exploit imperfections in the world model, leading to policies that fail in the real environment.", "zh": "控制器可能利用世界模型的不完美，导致策略在真实环境中失败。"}, {"en": "Method relies on random policy data collection, which may be insufficient for complex environments.", "zh": "方法依赖随机策略数据收集，对于复杂环境可能不足。"}, {"en": "No hierarchical planning or abstract reasoning; simulates futures step by step.", "zh": "缺乏分层规划或抽象推理，仅逐步模拟未来。"}]}, "cites": 1821}, {"id": "tmiyato-1802.05957", "pid": "tmiyato", "arxiv": "1802.05957", "date": "2018-02-16", "venue": "cs.LG", "org": "Preferred Networks", "fields": ["generative", "deep-learning"], "tEn": "Spectral Normalization for Generative Adversarial Networks", "tZh": "生成对抗网络的谱归一化", "sEn": "Spectral normalization stabilizes GAN training by normalizing the weight matrix's spectral norm, improving image generation quality.", "sZh": "谱归一化通过归一化权重矩阵的谱范数来稳定GAN训练，提升图像生成质量。", "absEn": "One of the challenges in the study of generative adversarial networks is the instability of its training. In this paper, we propose a novel weight normalization technique called spectral normalization to stabilize the training of the discriminator. Our new normalization technique is computationally light and easy to incorporate into existing implementations. We tested the efficacy of spectral normalization on CIFAR10, STL-10, and ILSVRC2012 dataset, and we experimentally confirmed that spectrally normalized GANs (SN-GANs) is capable of generating images of better or equal quality relative to the previous training stabilization techniques.", "absZh": "生成对抗网络研究中的一个挑战是其训练的不稳定性。在本文中，我们提出了一种新颖的权重归一化技术，称为谱归一化，以稳定判别器的训练。我们的新归一化技术计算量轻，易于融入现有实现。我们在CIFAR10、STL-10和ILSVRC2012数据集上测试了谱归一化的效果，并通过实验证实，谱归一化GAN（SN-GAN）能够生成相对于先前训练稳定技术更好或同等质量的图像。", "insights": {"contrib": [{"en": "Proposes spectral normalization to stabilize GAN training by constraining the Lipschitz constant of the discriminator.", "zh": "提出频谱归一化，通过约束判别器的Lipschitz常数来稳定GAN训练。"}, {"en": "Demonstrates that spectral normalization is computationally light and easy to integrate into existing GAN implementations.", "zh": "证明频谱归一化计算量小且易于集成到现有GAN实现中。"}, {"en": "Shows that spectral normalization allows the discriminator to use more features compared to weight normalization, avoiding rank deficiency.", "zh": "表明频谱归一化允许判别器使用更多特征，避免权重归一化导致的秩亏缺问题。"}, {"en": "Achieves better or comparable image quality on CIFAR-10, STL-10, and ImageNet relative to previous stabilization techniques.", "zh": "在CIFAR-10、STL-10和ImageNet上获得优于或相当于先前稳定技术的图像质量。"}, {"en": "Provides theoretical analysis linking spectral normalization to Lipschitz continuity and regularization of the discriminator.", "zh": "提供理论分析，将频谱归一化与判别器的Lipschitz连续性和正则化联系起来。"}, {"en": "Demonstrates robustness to aggressive learning rates and momentum parameters, outperforming WGAN-GP in such settings.", "zh": "展示了对激进学习率和动量参数的鲁棒性，在此类设置中优于WGAN-GP。"}], "limits": [{"en": "The method is evaluated only on image generation tasks; its effectiveness on other data modalities is not explored.", "zh": "该方法仅在图像生成任务上评估，未探索其他数据模态的有效性。"}, {"en": "Spectral normalization requires power iteration to estimate the spectral norm, adding slight computational overhead.", "zh": "频谱归一化需要幂迭代估计谱范数，增加了轻微的计算开销。"}, {"en": "The study does not provide a theoretical guarantee for the optimality of spectral normalization in all GAN settings.", "zh": "研究未提供频谱归一化在所有GAN设置中最优性的理论保证。"}, {"en": "Performance on very large-scale datasets beyond ImageNet (e.g., video or 3D data) is not tested.", "zh": "未在ImageNet之外的大规模数据集（如视频或3D数据）上测试性能。"}, {"en": "The method's interaction with other regularization techniques (e.g., batch normalization) is not fully investigated.", "zh": "该方法与其他正则化技术（如批归一化）的相互作用未充分研究。"}]}, "cites": 5038}, {"id": "mpeters-1802.05365", "pid": "mpeters", "arxiv": "1802.05365", "date": "2018-02-15", "venue": "cs.CL", "org": "Allen Institute for AI", "fields": ["nlp", "deep-learning"], "tEn": "Deep contextualized word representations", "tZh": "深度上下文词表示", "sEn": "Deep contextualized word representations significantly improve NLP tasks by modeling complex word characteristics and polysemy.", "sZh": "深度上下文词表示通过建模单词的复杂特征和多义性，显著提升了自然语言处理任务的表现。", "absEn": "We introduce a new type of deep contextualized word representation that models both (1) complex characteristics of word use (e.g., syntax and semantics), and (2) how these uses vary across linguistic contexts (i.e., to model polysemy). Our word vectors are learned functions of the internal states of a deep bidirectional language model (biLM), which is pre-trained on a large text corpus. We show that these representations can be easily added to existing models and significantly improve the state of the art across six challenging NLP problems, including question answering, textual entailment and sentiment analysis. We also present an analysis showing that exposing the deep internals of the pre-trained network is crucial, allowing downstream models to mix different types of semi-supervision signals.", "absZh": "我们引入了一种新型的深度上下文词表示，它同时建模了（1）单词使用的复杂特征（如句法和语义），以及（2）这些用法在不同语言上下文中的变化（即建模多义性）。我们的词向量是从一个在大规模文本语料上预训练的深度双向语言模型（biLM）的内部状态学习得到的函数。我们展示了这些表示可以轻松添加到现有模型中，并在六个具有挑战性的自然语言处理问题（包括问答、文本蕴含和情感分析）上显著提升了当前最优结果。我们还进行了分析，表明暴露预训练网络的深层内部结构至关重要，这使得下游模型能够混合不同类型的半监督信号。", "insights": {"contrib": [{"en": "Introduces ELMo, deep contextualized word representations from a bidirectional language model.", "zh": "提出ELMo，一种基于双向语言模型的深度上下文词表示。"}, {"en": "Shows ELMo improves state-of-the-art on six NLP tasks: QA, textual entailment, SRL, coreference, NER, sentiment.", "zh": "展示ELMo在六个NLP任务（问答、文本蕴含、语义角色标注、共指消解、命名实体识别、情感分析）上提升最先进水平。"}, {"en": "Demonstrates that using all biLM layers outperforms using only the top layer.", "zh": "证明使用所有biLM层优于仅使用顶层。"}, {"en": "Reveals lower biLM layers encode syntax, higher layers encode semantics.", "zh": "揭示biLM低层编码句法，高层编码语义。"}, {"en": "Shows ELMo increases sample efficiency, requiring less data and fewer updates.", "zh": "展示ELMo提高样本效率，需要更少数据和更少更新。"}], "limits": [{"en": "ELMo requires a pre-trained biLM, which is computationally expensive to train.", "zh": "ELMo需要预训练的biLM，训练计算成本高。"}, {"en": "ELMo representations are fixed after pre-training; no fine-tuning of biLM for downstream tasks.", "zh": "ELMo表示在预训练后固定，不对下游任务微调biLM。"}, {"en": "ELMo only tested on English; performance on other languages is unknown.", "zh": "ELMo仅在英语上测试，其他语言性能未知。"}, {"en": "ELMo adds computational overhead at inference time due to biLM forward pass.", "zh": "ELMo在推理时因biLM前向传播增加计算开销。"}]}, "cites": 12181}, {"id": "lcchen-1802.02611", "pid": "lcchen", "arxiv": "1802.02611", "date": "2018-02-07", "venue": "cs.CV", "org": "Google", "fields": ["vision", "deep-learning"], "tEn": "Encoder-Decoder with Atrous Separable Convolution for Semantic Image Segmentation", "tZh": "基于空洞可分离卷积的编码器-解码器用于语义图像分割", "sEn": "DeepLabv3+ combines spatial pyramid pooling and encoder-decoder structures for sharper boundaries and multi-scale context.", "sZh": "DeepLabv3+结合空间金字塔池化和编码器-解码器结构，实现更清晰的边界和多尺度上下文。", "absEn": "Spatial pyramid pooling module or encode-decoder structure are used in deep neural networks for semantic segmentation task. The former networks are able to encode multi-scale contextual information by probing the incoming features with filters or pooling operations at multiple rates and multiple effective fields-of-view, while the latter networks can capture sharper object boundaries by gradually recovering the spatial information. In this work, we propose to combine the advantages from both methods. Specifically, our proposed model, DeepLabv3+, extends DeepLabv3 by adding a simple yet effective decoder module to refine the segmentation results especially along object boundaries. We further explore the Xception model and apply the depthwise separable convolution to both Atrous Spatial Pyramid Pooling and decoder modules, resulting in a faster and stronger encoder-decoder network. We demonstrate the effectiveness of the proposed model on PASCAL VOC 2012 and Cityscapes datasets, achieving the test set performance of 89.0\\% and 82.1\\% without any post-processing. Our paper is accompanied with a publicly available reference implementation of the proposed models in Tensorflow at \\url{https://github.com/tensorflow/models/tree/master/research/deeplab}.", "absZh": "深度神经网络在语义分割任务中使用了空间金字塔池化模块或编码器-解码器结构。前者通过以多种速率和有效视野对输入特征进行滤波或池化操作，能够编码多尺度上下文信息；而后者通过逐步恢复空间信息，能够捕获更锐利的物体边界。在这项工作中，我们提出结合两种方法的优势。具体来说，我们提出的模型DeepLabv3+通过添加一个简单而有效的解码器模块来细化分割结果，尤其是沿着物体边界。我们进一步探索了Xception模型，并将深度可分离卷积应用于空洞空间金字塔池化和解码器模块，从而得到一个更快更强的编码器-解码器网络。我们在PASCAL VOC 2012和Cityscapes数据集上展示了所提模型的有效性，在无需任何后处理的情况下，测试集性能分别达到89.0%和82.1%。我们的论文附带了所提模型在Tensorflow中的公开参考实现，网址为https://github.com/tensorflow/models/tree/master/research/deeplab。", "insights": {"contrib": [{"en": "Proposes DeepLabv3+, combining spatial pyramid pooling and encoder-decoder for semantic segmentation.", "zh": "提出DeepLabv3+，结合空间金字塔池化与编码器-解码器结构用于语义分割。"}, {"en": "Adds a simple yet effective decoder module to DeepLabv3 to refine object boundaries.", "zh": "在DeepLabv3基础上添加简单有效的解码器模块以细化物体边界。"}, {"en": "Applies depthwise separable convolution to ASPP and decoder for faster and stronger network.", "zh": "将深度可分离卷积应用于ASPP和解码器，实现更快更强的网络。"}, {"en": "Adapts Xception model for semantic segmentation with modifications for dense feature extraction.", "zh": "改进Xception模型以适应语义分割，支持密集特征提取。"}, {"en": "Achieves state-of-the-art results on PASCAL VOC 2012 (89.0%) and Cityscapes (82.1%) without post-processing.", "zh": "在PASCAL VOC 2012（89.0%）和Cityscapes（82.1%）上无需后处理即达到最优结果。"}, {"en": "Provides public TensorFlow implementation for reproducibility.", "zh": "提供公开的TensorFlow实现以促进可复现性。"}], "limits": [{"en": "Performance evaluated only on PASCAL VOC 2012 and Cityscapes datasets.", "zh": "性能仅在PASCAL VOC 2012和Cityscapes数据集上评估。"}, {"en": "Requires large computational resources for training with output stride 8.", "zh": "使用输出步长8训练需要大量计算资源。"}, {"en": "Decoder design may not generalize to other tasks without tuning.", "zh": "解码器设计未经调整可能无法泛化到其他任务。"}, {"en": "Struggles with heavily occluded objects and rare viewpoints.", "zh": "对严重遮挡物体和罕见视角分割困难。"}, {"en": "No post-processing like CRF used, limiting potential further gains.", "zh": "未使用CRF等后处理，限制了潜在性能提升。"}]}, "cites": 16895}, {"id": "mbronstein-1801.07829", "pid": "mbronstein", "arxiv": "1801.07829", "date": "2018-01-24", "venue": "cs.CV", "org": "Imperial College", "fields": ["vision", "deep-learning"], "tEn": "Dynamic Graph CNN for Learning on Point Clouds", "tZh": "动态图卷积网络用于点云学习", "sEn": "EdgeConv captures local neighborhood information and semantic characteristics over long distances in point clouds.", "sZh": "EdgeConv能够捕捉点云中的局部邻域信息以及长距离语义特征。", "absEn": "Point clouds provide a flexible geometric representation suitable for countless applications in computer graphics; they also comprise the raw output of most 3D data acquisition devices. While hand-designed features on point clouds have long been proposed in graphics and vision, however, the recent overwhelming success of convolutional neural networks (CNNs) for image analysis suggests the value of adapting insight from CNN to the point cloud world. Point clouds inherently lack topological information so designing a model to recover topology can enrich the representation power of point clouds. To this end, we propose a new neural network module dubbed EdgeConv suitable for CNN-based high-level tasks on point clouds including classification and segmentation. EdgeConv acts on graphs dynamically computed in each layer of the network. It is differentiable and can be plugged into existing architectures. Compared to existing modules operating in extrinsic space or treating each point independently, EdgeConv has several appealing properties: It incorporates local neighborhood information; it can be stacked applied to learn global shape properties; and in multi-layer systems affinity in feature space captures semantic characteristics over potentially long distances in the original embedding. We show the performance of our model on standard benchmarks including ModelNet40, ShapeNetPart, and S3DIS.", "absZh": "点云提供了一种灵活的几何表示，适用于计算机图形学中的无数应用；它们也是大多数3D数据采集设备的原始输出。尽管在图形学和视觉中早已提出了点云上的手工设计特征，但最近卷积神经网络在图像分析中的巨大成功表明，将CNN的见解适应到点云世界是有价值的。点云本质上缺乏拓扑信息，因此设计一个模型来恢复拓扑可以丰富点云的表示能力。为此，我们提出了一个新的神经网络模块，称为EdgeConv，适用于基于CNN的点云高级任务，包括分类和分割。EdgeConv作用于网络中每层动态计算的图上。它是可微的，可以插入到现有架构中。与在外部空间中操作或独立处理每个点的现有模块相比，EdgeConv具有几个吸引人的特性：它结合了局部邻域信息；它可以堆叠应用以学习全局形状属性；在多层级系统中，特征空间中的亲和性捕获了原始嵌入中可能长距离的语义特征。我们在标准基准测试（包括ModelNet40、ShapeNetPart和S3DIS）上展示了我们模型的性能。", "insights": {"contrib": [{"en": "Proposes EdgeConv, a novel neural network module for point clouds that captures local geometric structure while maintaining permutation invariance.", "zh": "提出EdgeConv，一种新颖的点云神经网络模块，在保持置换不变性的同时捕获局部几何结构。"}, {"en": "Introduces dynamic graph updates, where the k-NN graph is recomputed in each layer based on feature space, enabling non-local semantic grouping.", "zh": "引入动态图更新，每层基于特征空间重新计算k近邻图，实现非局部语义分组。"}, {"en": "Demonstrates that EdgeConv can be integrated into existing architectures like PointNet to improve performance on classification and segmentation.", "zh": "证明EdgeConv可集成到PointNet等现有架构中，提升分类和分割性能。"}, {"en": "Achieves state-of-the-art results on ModelNet40, ShapeNetPart, and S3DIS benchmarks with efficient computation.", "zh": "在ModelNet40、ShapeNetPart和S3DIS基准上取得最先进结果，且计算高效。"}, {"en": "Provides theoretical analysis showing EdgeConv subsumes PointNet and graph CNNs as special cases.", "zh": "提供理论分析，表明EdgeConv将PointNet和图CNN作为特例包含在内。"}, {"en": "Releases code to facilitate reproducibility and future research.", "zh": "发布代码以促进可重复性和未来研究。"}], "limits": [{"en": "Performance degrades with large k in k-NN due to Euclidean distance failing to approximate geodesic distance.", "zh": "k近邻中k值过大时性能下降，因欧氏距离无法近似测地距离。"}, {"en": "Model robustness drops significantly when fewer than 512 points are used.", "zh": "当点数少于512时，模型鲁棒性显著下降。"}, {"en": "Dynamic graph computation adds computational overhead compared to fixed-graph methods.", "zh": "与固定图方法相比，动态图计算增加了计算开销。"}, {"en": "EdgeConv only considers pairwise relationships, not higher-order point tuples.", "zh": "EdgeConv仅考虑成对关系，未涉及高阶点元组。"}, {"en": "The method is evaluated only on 3D point clouds; applicability to abstract point clouds is not explored.", "zh": "该方法仅在3D点云上评估，未探索对抽象点云的适用性。"}]}, "cites": 7608}, {"id": "sruder-1801.06146", "pid": "sruder", "arxiv": "1801.06146", "date": "2018-01-18", "venue": "cs.CL", "org": "fast.ai / Insight (NUI Galway)", "fields": ["nlp"], "tEn": "Universal Language Model Fine-tuning for Text Classification", "tZh": "通用语言模型微调用于文本分类", "sEn": "ULMFiT enables effective transfer learning for any NLP task, achieving state-of-the-art results with significantly less data.", "sZh": "ULMFiT实现了对任何NLP任务的有效迁移学习，用更少的数据取得了最先进的结果。", "absEn": "Inductive transfer learning has greatly impacted computer vision, but existing approaches in NLP still require task-specific modifications and training from scratch. We propose Universal Language Model Fine-tuning (ULMFiT), an effective transfer learning method that can be applied to any task in NLP, and introduce techniques that are key for fine-tuning a language model. Our method significantly outperforms the state-of-the-art on six text classification tasks, reducing the error by 18-24% on the majority of datasets. Furthermore, with only 100 labeled examples, it matches the performance of training from scratch on 100x more data. We open-source our pretrained models and code.", "absZh": "归纳迁移学习极大地影响了计算机视觉，但NLP中的现有方法仍然需要针对特定任务的修改和从头开始训练。我们提出了通用语言模型微调（ULMFiT），这是一种有效的迁移学习方法，可以应用于NLP中的任何任务，并介绍了对语言模型进行微调的关键技术。我们的方法在六个文本分类任务上显著优于现有技术，在大多数数据集上将错误率降低了18-24%。此外，仅使用100个标记示例，其性能就与在100倍数据上从头训练相匹配。我们开源了预训练模型和代码。", "insights": {"contrib": [{"en": "Proposes Universal Language Model Fine-tuning (ULMFiT), a transfer learning method applicable to any NLP task.", "zh": "提出通用语言模型微调（ULMFiT），一种可应用于任何NLP任务的迁移学习方法。"}, {"en": "Introduces discriminative fine-tuning, slanted triangular learning rates, and gradual unfreezing to prevent catastrophic forgetting.", "zh": "引入判别式微调、倾斜三角学习率和逐步解冻，以防止灾难性遗忘。"}, {"en": "Achieves state-of-the-art on six text classification tasks, reducing error by 18-24% on most datasets.", "zh": "在六个文本分类任务上达到最先进水平，在大多数数据集上错误率降低18-24%。"}, {"en": "Matches performance of training from scratch on 100x more data with only 100 labeled examples.", "zh": "仅用100个标注样本即可匹配在100倍数据上从头训练的性能。"}, {"en": "Open-sources pretrained models and code to enable wider adoption.", "zh": "开源预训练模型和代码以促进更广泛采用。"}], "limits": [{"en": "Method evaluated only on text classification tasks, not on sequence labeling or other NLP tasks.", "zh": "方法仅在文本分类任务上评估，未在序列标注或其他NLP任务上测试。"}, {"en": "Requires a large general-domain corpus (Wikitext-103) for pretraining, which may not be available for all languages.", "zh": "需要大型通用领域语料库（Wikitext-103）进行预训练，并非所有语言都可用。"}, {"en": "Fine-tuning techniques (discriminative learning rates, STLR) require careful hyperparameter tuning.", "zh": "微调技术（判别式学习率、STLR）需要仔细的超参数调优。"}, {"en": "Performance on very small datasets (e.g., TREC-6) may not be statistically significant due to limited test size.", "zh": "在非常小的数据集（如TREC-6）上的性能可能因测试集规模有限而不具有统计显著性。"}, {"en": "Method relies on LSTM architecture; performance may vary with other architectures like Transformer.", "zh": "方法依赖LSTM架构；使用Transformer等其他架构时性能可能不同。"}]}, "cites": 284}, {"id": "abbeel-1801.01290", "pid": "abbeel", "arxiv": "1801.01290", "date": "2018-01-04", "venue": "cs.LG", "fields": ["rl"], "tEn": "Soft Actor-Critic: Off-Policy Maximum Entropy Deep Reinforcement Learning with a Stochastic Actor", "tZh": "软演员-评论家：基于随机演员的离策略最大熵深度强化学习", "sEn": "Soft Actor-Critic achieves state-of-the-art performance on continuous control tasks with high stability and sample efficiency.", "sZh": "软演员-评论家算法在连续控制任务上实现了最先进的性能，具有高稳定性和样本效率。", "absEn": "Model-free deep reinforcement learning (RL) algorithms have been demonstrated on a range of challenging decision making and control tasks. However, these methods typically suffer from two major challenges: very high sample complexity and brittle convergence properties, which necessitate meticulous hyperparameter tuning. Both of these challenges severely limit the applicability of such methods to complex, real-world domains. In this paper, we propose soft actor-critic, an off-policy actor-critic deep RL algorithm based on the maximum entropy reinforcement learning framework. In this framework, the actor aims to maximize expected reward while also maximizing entropy. That is, to succeed at the task while acting as randomly as possible. Prior deep RL methods based on this framework have been formulated as Q-learning methods. By combining off-policy updates with a stable stochastic actor-critic formulation, our method achieves state-of-the-art performance on a range of continuous control benchmark tasks, outperforming prior on-policy and off-policy methods. Furthermore, we demonstrate that, in contrast to other off-policy algorithms, our approach is very stable, achieving very similar performance across different random seeds.", "absZh": "无模型深度强化学习算法已在多种具有挑战性的决策和控制任务中得到验证。然而，这些方法通常面临两大挑战：极高的样本复杂度和脆弱的收敛性，这需要细致的超参数调整。这两个挑战严重限制了此类方法在复杂现实领域中的应用。在本文中，我们提出了软演员-评论家算法，一种基于最大熵强化学习框架的离策略演员-评论家深度强化学习算法。在该框架中，演员旨在最大化期望奖励的同时最大化熵，即在尽可能随机行动的同时成功完成任务。先前基于该框架的深度强化学习方法被表述为Q学习方法。通过将离策略更新与稳定的随机演员-评论家公式相结合，我们的方法在一系列连续控制基准任务上实现了最先进的性能，优于先前的在策略和离策略方法。此外，我们证明，与其他离策略算法相比，我们的方法非常稳定，在不同随机种子下实现了非常相似的性能。", "insights": {"contrib": [{"en": "Proposes soft actor-critic (SAC), an off-policy maximum entropy deep RL algorithm.", "zh": "提出软演员-评论家（SAC），一种基于最大熵的离策略深度强化学习算法。"}, {"en": "Combines off-policy updates with a stable stochastic actor-critic formulation.", "zh": "将离策略更新与稳定的随机演员-评论家公式相结合。"}, {"en": "Achieves state-of-the-art performance on continuous control benchmarks, outperforming prior on-policy and off-policy methods.", "zh": "在连续控制基准上取得最先进性能，优于先前的在策略和离策略方法。"}, {"en": "Demonstrates high stability across different random seeds, unlike other off-policy algorithms.", "zh": "与其他离策略算法不同，展示了跨不同随机种子的高度稳定性。"}, {"en": "Provides convergence proof for soft policy iteration in the maximum entropy framework.", "zh": "在最大熵框架下提供了软策略迭代的收敛性证明。"}, {"en": "Uses two Q-functions to mitigate positive bias and improve training speed.", "zh": "使用两个Q函数来减轻正向偏差并提高训练速度。"}], "limits": [{"en": "Sensitive to reward scaling, which controls the temperature and policy stochasticity.", "zh": "对奖励缩放敏感，该缩放控制温度和策略随机性。"}, {"en": "Requires tuning of reward scale as a key hyperparameter for optimal performance.", "zh": "需要调整奖励缩放作为关键超参数以获得最佳性能。"}, {"en": "Assumes continuous action spaces; applicability to discrete actions not directly addressed.", "zh": "假设连续动作空间；未直接解决离散动作的适用性。"}, {"en": "Performance may degrade with very small or very large reward magnitudes due to exploration-exploitation balance.", "zh": "由于探索-利用平衡，奖励幅度非常小或非常大时性能可能下降。"}, {"en": "Theoretical convergence proof assumes finite action space, limiting direct extension to continuous actions.", "zh": "理论收敛性证明假设有限动作空间，限制了直接扩展到连续动作。"}]}, "cites": 11501, "org": "UC Berkeley"}, {"id": "jshen-1712.05884", "pid": "jshen", "arxiv": "1712.05884", "date": "2017-12-16", "venue": "cs.CL", "org": "Google", "fields": ["deep-learning", "generative"], "tEn": "Natural TTS Synthesis by Conditioning WaveNet on Mel Spectrogram Predictions", "tZh": "通过将WaveNet条件化于梅尔频谱预测的自然TTS合成", "sEn": "Tacotron 2 achieves natural speech synthesis with a MOS of 4.53, comparable to professional recordings.", "sZh": "Tacotron 2实现了与专业录音相媲美的自然语音合成，平均意见得分（MOS）为4.53。", "absEn": "This paper describes Tacotron 2, a neural network architecture for speech synthesis directly from text. The system is composed of a recurrent sequence-to-sequence feature prediction network that maps character embeddings to mel-scale spectrograms, followed by a modified WaveNet model acting as a vocoder to synthesize timedomain waveforms from those spectrograms. Our model achieves a mean opinion score (MOS) of $4.53$ comparable to a MOS of $4.58$ for professionally recorded speech. To validate our design choices, we present ablation studies of key components of our system and evaluate the impact of using mel spectrograms as the input to WaveNet instead of linguistic, duration, and $F_0$ features. We further demonstrate that using a compact acoustic intermediate representation enables significant simplification of the WaveNet architecture.", "absZh": "本文描述了Tacotron 2，一种直接从文本进行语音合成的神经网络架构。该系统由一个循环序列到序列特征预测网络组成，该网络将字符嵌入映射到梅尔频谱，随后是一个改进的WaveNet模型作为声码器，从这些频谱合成时域波形。我们的模型达到了4.53的平均意见得分（MOS），与专业录制语音的4.58 MOS相当。为了验证我们的设计选择，我们进行了系统关键组件的消融研究，并评估了使用梅尔频谱作为WaveNet输入而非语言、时长和F0特征的影响。我们进一步证明，使用紧凑的声学中间表示可以显著简化WaveNet架构。", "insights": {"contrib": [{"en": "Proposes Tacotron 2, a fully neural TTS system combining sequence-to-sequence mel spectrogram prediction with a modified WaveNet vocoder.", "zh": "提出 Tacotron 2，一种全神经 TTS 系统，结合序列到序列的梅尔频谱预测与改进的 WaveNet 声码器。"}, {"en": "Achieves a MOS of 4.53, comparable to 4.58 for professionally recorded speech.", "zh": "达到 4.53 的平均意见得分，与专业录音的 4.58 相当。"}, {"en": "Demonstrates that mel spectrograms as WaveNet conditioning input enable significant simplification of the WaveNet architecture.", "zh": "证明使用梅尔频谱作为 WaveNet 的条件输入可显著简化 WaveNet 架构。"}, {"en": "Shows that a shallow WaveNet with 12 layers and 10.5 ms receptive field can generate high-quality audio when conditioned on mel spectrograms.", "zh": "表明当以梅尔频谱为条件时，仅 12 层、感受野 10.5 毫秒的浅层 WaveNet 即可生成高质量音频。"}, {"en": "Validates design choices through ablation studies on post-net and conditioning features.", "zh": "通过后处理网络和条件特征的消融研究验证设计选择。"}, {"en": "Achieves state-of-the-art sound quality close to natural human speech without complex feature engineering.", "zh": "无需复杂特征工程，实现接近自然人类语音的最先进音质。"}], "limits": [{"en": "The system occasionally produces mispronunciations, especially for out-of-domain text like names.", "zh": "系统偶尔产生发音错误，尤其对于域外文本如人名。"}, {"en": "Prosody modeling remains imperfect, with unnatural emphasis or pitch in some cases.", "zh": "韵律建模仍不完美，某些情况下出现不自然的强调或音高。"}, {"en": "End-point prediction fails on very long input sentences.", "zh": "端点预测在极长输入句子上失败。"}, {"en": "Training requires matched data distribution; performance degrades on out-of-domain text.", "zh": "训练需要匹配的数据分布；在域外文本上性能下降。"}, {"en": "The two components are trained separately, and using ground truth features for WaveNet training degrades quality when inference uses predicted features.", "zh": "两个组件分开训练，使用真实特征训练 WaveNet 在推理使用预测特征时质量下降。"}]}, "cites": 3092}, {"id": "demis-1712.01815", "pid": "demis", "arxiv": "1712.01815", "date": "2017-12-05", "venue": "cs.AI", "fields": ["rl"], "tEn": "Mastering Chess and Shogi by Self-Play with a General Reinforcement Learning Algorithm", "tZh": "通过通用强化学习算法的自我对弈掌握国际象棋和将棋", "sEn": "AlphaZero achieves superhuman performance in chess, shogi, and Go through self-play reinforcement learning with no domain knowledge beyond game rules.", "sZh": "AlphaZero通过自我对弈强化学习，在仅知游戏规则而无领域知识的情况下，在国际象棋、将棋和围棋中达到超人类水平。", "absEn": "The game of chess is the most widely-studied domain in the history of artificial intelligence. The strongest programs are based on a combination of sophisticated search techniques, domain-specific adaptations, and handcrafted evaluation functions that have been refined by human experts over several decades. In contrast, the AlphaGo Zero program recently achieved superhuman performance in the game of Go, by tabula rasa reinforcement learning from games of self-play. In this paper, we generalise this approach into a single AlphaZero algorithm that can achieve, tabula rasa, superhuman performance in many challenging domains. Starting from random play, and given no domain knowledge except the game rules, AlphaZero achieved within 24 hours a superhuman level of play in the games of chess and shogi (Japanese chess) as well as Go, and convincingly defeated a world-champion program in each case.", "absZh": "国际象棋是人工智能历史上研究最广泛的领域。最强的程序基于复杂搜索技术、领域特定调整和人类专家数十年来精心设计的评估函数的结合。相比之下，AlphaGo Zero程序最近通过从自我对弈游戏中进行的无先验知识强化学习，在围棋中实现了超人类表现。在本文中，我们将这种方法推广为一个单一的AlphaZero算法，该算法可以在许多具有挑战性的领域中通过无先验知识学习达到超人类表现。从随机对弈开始，除了游戏规则外没有任何领域知识，AlphaZero在24小时内就在国际象棋、将棋（日本象棋）以及围棋中达到了超人类水平，并在每种情况下令人信服地击败了世界冠军程序。", "insights": {"contrib": [{"en": "Proposes AlphaZero, a single algorithm achieving superhuman play in chess, shogi, and Go via tabula rasa reinforcement learning.", "zh": "提出AlphaZero，一个通过从零开始的强化学习在象棋、将棋和围棋中实现超人类水平的单一算法。"}, {"en": "Uses deep neural networks and Monte-Carlo tree search without domain-specific knowledge beyond game rules.", "zh": "使用深度神经网络和蒙特卡洛树搜索，除游戏规则外无需领域特定知识。"}, {"en": "Defeats world-champion programs Stockfish, Elmo, and AlphaGo Zero in 100-game matches with zero losses in chess.", "zh": "在100局比赛中击败世界冠军程序Stockfish、Elmo和AlphaGo Zero，象棋中零败。"}, {"en": "Demonstrates MCTS scales more effectively with thinking time than alpha-beta search in chess and shogi.", "zh": "证明MCTS在象棋和将棋中随思考时间的扩展效果优于alpha-beta搜索。"}, {"en": "Discovers and plays common human chess openings independently during self-play training.", "zh": "在自我对弈训练中独立发现并下出常见的人类象棋开局。"}, {"en": "Provides a general framework applicable to multiple games without hyper-parameter tuning.", "zh": "提供无需超参数调优即可适用于多种游戏的通用框架。"}], "limits": [{"en": "Requires perfect knowledge of game rules for MCTS simulations and input encoding.", "zh": "需要游戏规则的完美知识用于MCTS模拟和输入编码。"}, {"en": "Neural network architecture may not suit games with asymmetric rules or long-range interactions.", "zh": "神经网络架构可能不适合具有不对称规则或长程交互的游戏。"}, {"en": "Training requires massive computational resources (5000 TPUs for self-play, 64 for training).", "zh": "训练需要大量计算资源（5000个TPU用于自我对弈，64个用于训练）。"}, {"en": "Does not incorporate domain-specific enhancements like opening books or endgame tablebases.", "zh": "未整合领域特定增强，如开局库或残局数据库。"}, {"en": "Performance may degrade in games with draws or non-binary outcomes due to expected outcome optimization.", "zh": "在平局或非二元结果的游戏中，由于期望结果优化，性能可能下降。"}]}, "cites": 2088, "org": "Google DeepMind"}, {"id": "yunjeychoi-1711.09020", "pid": "yunjeychoi", "arxiv": "1711.09020", "date": "2017-11-24", "venue": "cs.CV", "org": "Korea University / Clova AI Research", "fields": ["generative", "vision"], "tEn": "StarGAN: Unified Generative Adversarial Networks for Multi-Domain Image-to-Image Translation", "tZh": "StarGAN：用于多域图像到图像翻译的统一生成对抗网络", "sEn": "StarGAN enables multi-domain image translation with a single model, outperforming existing approaches.", "sZh": "StarGAN使用单一模型实现多域图像翻译，性能优于现有方法。", "absEn": "Recent studies have shown remarkable success in image-to-image translation for two domains. However, existing approaches have limited scalability and robustness in handling more than two domains, since different models should be built independently for every pair of image domains. To address this limitation, we propose StarGAN, a novel and scalable approach that can perform image-to-image translations for multiple domains using only a single model. Such a unified model architecture of StarGAN allows simultaneous training of multiple datasets with different domains within a single network. This leads to StarGAN's superior quality of translated images compared to existing models as well as the novel capability of flexibly translating an input image to any desired target domain. We empirically demonstrate the effectiveness of our approach on a facial attribute transfer and a facial expression synthesis tasks.", "absZh": "最近的研究表明，在两个域之间的图像到图像翻译方面取得了显著成功。然而，现有方法在处理两个以上域时扩展性和鲁棒性有限，因为需要为每对图像域独立构建不同的模型。为了解决这一限制，我们提出了StarGAN，一种新颖且可扩展的方法，它可以使用单一模型执行多个域的图像到图像翻译。StarGAN的这种统一模型架构允许在单个网络中同时训练具有不同域的多个数据集。这使得StarGAN在翻译图像质量上优于现有模型，并且具有灵活地将输入图像翻译到任何目标域的新能力。我们通过面部属性转移和面部表情合成任务实证证明了我们方法的有效性。", "insights": {"contrib": [{"en": "Proposes StarGAN, a unified GAN framework for multi-domain image translation using a single generator and discriminator.", "zh": "提出StarGAN，一种统一的GAN框架，使用单个生成器和判别器实现多域图像翻译。"}, {"en": "Introduces a mask vector method to enable joint training across datasets with different label sets.", "zh": "引入掩码向量方法，支持跨不同标签集的数据集联合训练。"}, {"en": "Achieves superior image quality and flexibility in multi-attribute transfer compared to existing models.", "zh": "在多属性迁移中实现优于现有模型的图像质量和灵活性。"}, {"en": "Demonstrates scalability with significantly fewer parameters than cross-domain models like CycleGAN.", "zh": "展示可扩展性，参数数量远少于CycleGAN等跨域模型。"}, {"en": "Provides both qualitative and quantitative results on facial attribute transfer and expression synthesis tasks.", "zh": "在人脸属性迁移和表情合成任务上提供定性和定量结果。"}, {"en": "First successful multi-domain image translation across different datasets.", "zh": "首个成功跨不同数据集的多域图像翻译工作。"}], "limits": [{"en": "Evaluation limited to facial attribute transfer and expression synthesis tasks.", "zh": "评估仅限于人脸属性迁移和表情合成任务。"}, {"en": "Requires predefined domain labels; cannot handle unseen domains at test time.", "zh": "需要预定义域标签；测试时无法处理未见域。"}, {"en": "Joint training with mask vector may fail if mask vector is incorrectly specified.", "zh": "若掩码向量指定错误，联合训练可能失败。"}, {"en": "Training time is about one day on a single GPU, which may be computationally expensive.", "zh": "训练时间约一天（单GPU），计算成本可能较高。"}, {"en": "Performance on non-face domains or more complex scenes is not explored.", "zh": "未探索非人脸域或更复杂场景的性能。"}]}}, {"id": "fhutter-1711.05101", "pid": "fhutter", "arxiv": "1711.05101", "date": "2017-11-14", "venue": "cs.LG", "org": "University of Freiburg", "fields": ["deep-learning", "efficiency"], "tEn": "Decoupled Weight Decay Regularization", "tZh": "解耦权重衰减正则化", "sEn": "Decoupling weight decay from optimization steps improves generalization in adaptive gradient methods like Adam.", "sZh": "将权重衰减与优化步骤解耦，可提升Adam等自适应梯度方法的泛化性能。", "absEn": "L$_2$ regularization and weight decay regularization are equivalent for standard stochastic gradient descent (when rescaled by the learning rate), but as we demonstrate this is \\emph{not} the case for adaptive gradient algorithms, such as Adam. While common implementations of these algorithms employ L$_2$ regularization (often calling it \"weight decay\" in what may be misleading due to the inequivalence we expose), we propose a simple modification to recover the original formulation of weight decay regularization by \\emph{decoupling} the weight decay from the optimization steps taken w.r.t. the loss function. We provide empirical evidence that our proposed modification (i) decouples the optimal choice of weight decay factor from the setting of the learning rate for both standard SGD and Adam and (ii) substantially improves Adam's generalization performance, allowing it to compete with SGD with momentum on image classification datasets (on which it was previously typically outperformed by the latter). Our proposed decoupled weight decay has already been adopted by many researchers, and the community has implemented it in TensorFlow and PyTorch; the complete source code for our experiments is available at https://github.com/loshchil/AdamW-and-SGDW", "absZh": "L2正则化与权重衰减正则化在标准随机梯度下降中（按学习率重新缩放后）是等价的，但我们证明对于自适应梯度算法（如Adam）并非如此。尽管这些算法的常见实现采用L2正则化（由于我们揭示的不等价性，将其称为“权重衰减”可能具有误导性），我们提出了一种简单的修改，通过将权重衰减与相对于损失函数的优化步骤解耦，恢复权重衰减正则化的原始形式。我们提供的经验证据表明，我们提出的修改（i）将权重衰减因子的最优选择与标准SGD和Adam的学习率设置解耦，（ii）显著提高了Adam的泛化性能，使其能够与带动量的SGD在图像分类数据集上竞争（此前Adam通常被后者超越）。我们提出的解耦权重衰减已被许多研究者采用，社区已在TensorFlow和PyTorch中实现；我们实验的完整源代码可在https://github.com/loshchil/AdamW-and-SGDW获取。", "insights": {"contrib": [{"en": "Identified inequivalence of L2 regularization and weight decay for adaptive gradient methods like Adam.", "zh": "发现L2正则化与权重衰减在自适应梯度方法（如Adam）中不等价。"}, {"en": "Proposed decoupled weight decay (AdamW) to recover original weight decay formulation.", "zh": "提出解耦权重衰减（AdamW）以恢复原始权重衰减形式。"}, {"en": "Showed decoupled weight decay improves Adam's generalization, matching SGD with momentum on image classification.", "zh": "证明解耦权重衰减提升Adam泛化性能，在图像分类上媲美带动量的SGD。"}, {"en": "Demonstrated decoupled weight decay makes learning rate and weight decay hyperparameters more independent.", "zh": "展示解耦权重衰减使学习率和权重衰减超参数更独立。"}, {"en": "Empirically validated on CIFAR-10 and ImageNet32x32 with various schedules and budgets.", "zh": "在CIFAR-10和ImageNet32x32上使用多种调度和预算进行实证验证。"}, {"en": "Extended with warm restarts (AdamWR) for improved anytime performance.", "zh": "结合热重启（AdamWR）以提升任意时刻性能。"}], "limits": [{"en": "Results verified only on image classification datasets; need broader task validation.", "zh": "结果仅在图像分类数据集上验证，需在更广泛任务上验证。"}, {"en": "Theoretical analysis limited to a simple fixed preconditioner case.", "zh": "理论分析限于简单固定预条件器情况。"}, {"en": "Empirical focus on Adam; other adaptive methods like AdaGrad not directly tested.", "zh": "实证聚焦Adam，未直接测试AdaGrad等其他自适应方法。"}, {"en": "Optimal weight decay depends on total batch passes, requiring tuning.", "zh": "最优权重衰减依赖于总批次数，需调参。"}, {"en": "Improvement may not hold for tasks where regularization is less important.", "zh": "改进可能不适用于正则化不重要的任务。"}]}, "cites": 2695}, {"id": "pvelickovic-1710.10903", "pid": "pvelickovic", "arxiv": "1710.10903", "date": "2017-10-30", "venue": "stat.ML", "org": "U. Cambridge", "fields": ["deep-learning"], "tEn": "Graph Attention Networks", "tZh": "图注意力网络", "sEn": "Graph Attention Networks (GATs) use masked self-attention to assign different weights to different nodes in a neighborhood, improving upon graph convolution methods.", "sZh": "图注意力网络（GATs）利用掩蔽自注意力机制为邻域中的不同节点分配不同权重，改进了图卷积方法。", "absEn": "We present graph attention networks (GATs), novel neural network architectures that operate on graph-structured data, leveraging masked self-attentional layers to address the shortcomings of prior methods based on graph convolutions or their approximations. By stacking layers in which nodes are able to attend over their neighborhoods' features, we enable (implicitly) specifying different weights to different nodes in a neighborhood, without requiring any kind of costly matrix operation (such as inversion) or depending on knowing the graph structure upfront. In this way, we address several key challenges of spectral-based graph neural networks simultaneously, and make our model readily applicable to inductive as well as transductive problems. Our GAT models have achieved or matched state-of-the-art results across four established transductive and inductive graph benchmarks: the Cora, Citeseer and Pubmed citation network datasets, as well as a protein-protein interaction dataset (wherein test graphs remain unseen during training).", "absZh": "我们提出了图注意力网络（GATs），这是一种新颖的神经网络架构，用于处理图结构数据。它利用掩蔽自注意力层来克服基于图卷积或其近似方法的先前方法的缺点。通过堆叠节点能够关注其邻域特征的层，我们能够（隐式地）为邻域中的不同节点指定不同的权重，而无需任何昂贵的矩阵运算（如求逆）或预先知道图结构。这样，我们同时解决了基于谱的图神经网络的几个关键挑战，并使我们的模型易于应用于归纳式以及直推式问题。我们的GAT模型在四个公认的直推式和归纳式图基准测试中取得了或匹配了最先进的结果：Cora、Citeseer和Pubmed引文网络数据集，以及一个蛋白质-蛋白质相互作用数据集（其中测试图在训练期间未见）。", "insights": {"contrib": [{"en": "Proposes graph attention networks (GATs) using masked self-attentional layers for graph-structured data.", "zh": "提出使用掩码自注意力层的图注意力网络（GAT）处理图结构数据。"}, {"en": "Enables implicit assignment of different weights to nodes in a neighborhood without costly matrix operations.", "zh": "无需昂贵矩阵运算即可隐式地为邻域内节点分配不同权重。"}, {"en": "Achieves state-of-the-art results on four transductive and inductive graph benchmarks.", "zh": "在四个直推式和归纳式图基准上取得最先进结果。"}, {"en": "Introduces multi-head attention to stabilize learning and improve model capacity.", "zh": "引入多头注意力以稳定学习并提升模型容量。"}, {"en": "Demonstrates applicability to inductive learning with completely unseen test graphs.", "zh": "展示了对完全未见测试图的归纳学习的适用性。"}, {"en": "Provides interpretability through learned attention weights.", "zh": "通过学习到的注意力权重提供可解释性。"}], "limits": [{"en": "Sparse matrix operations limit batching capabilities for multi-graph datasets.", "zh": "稀疏矩阵操作限制了多图数据集的批处理能力。"}, {"en": "GPU performance may not surpass CPU for sparse graph structures.", "zh": "对于稀疏图结构，GPU性能可能不优于CPU。"}, {"en": "Receptive field size is bounded by network depth, requiring skip connections for deeper models.", "zh": "感受野大小受网络深度限制，深层模型需跳跃连接。"}, {"en": "Parallelization across edges may cause redundant computation due to overlapping neighborhoods.", "zh": "跨边并行化可能因邻域重叠导致冗余计算。"}, {"en": "Attention mechanism analysis for interpretability requires domain knowledge and is left for future work.", "zh": "注意力机制的可解释性分析需领域知识，留待未来工作。"}]}, "cites": 26769}, {"id": "tkarras-1710.10196", "pid": "tkarras", "arxiv": "1710.10196", "date": "2017-10-27", "venue": "cs.NE", "org": "NVIDIA", "fields": ["generative", "vision"], "tEn": "Progressive Growing of GANs for Improved Quality, Stability, and Variation", "tZh": "渐进式增长生成对抗网络：提升质量、稳定性和多样性", "sEn": "Progressive growing of GANs enables high-resolution image synthesis with improved quality, stability, and variation.", "sZh": "渐进式增长生成对抗网络能够生成高质量、高分辨率图像，同时提升训练稳定性和图像多样性。", "absEn": "We describe a new training methodology for generative adversarial networks. The key idea is to grow both the generator and discriminator progressively: starting from a low resolution, we add new layers that model increasingly fine details as training progresses. This both speeds the training up and greatly stabilizes it, allowing us to produce images of unprecedented quality, e.g., CelebA images at 1024^2. We also propose a simple way to increase the variation in generated images, and achieve a record inception score of 8.80 in unsupervised CIFAR10. Additionally, we describe several implementation details that are important for discouraging unhealthy competition between the generator and discriminator. Finally, we suggest a new metric for evaluating GAN results, both in terms of image quality and variation. As an additional contribution, we construct a higher-quality version of the CelebA dataset.", "absZh": "我们提出了一种新的生成对抗网络训练方法。核心思想是逐步增长生成器和判别器：从低分辨率开始，随着训练进程逐步添加建模更精细细节的新层。这既加快了训练速度，又极大地稳定了训练过程，使我们能够生成前所未有的高质量图像，例如1024×1024分辨率的CelebA图像。我们还提出了一种简单的方法来增加生成图像的多样性，并在无监督CIFAR10上取得了8.80的创纪录初始分数。此外，我们描述了若干重要的实现细节，用于抑制生成器和判别器之间的不良竞争。最后，我们提出了一种新的评估GAN结果的指标，同时考虑图像质量和多样性。作为额外贡献，我们构建了更高质量的CelebA数据集版本。", "insights": {"contrib": [{"en": "Progressive growing of GANs from low to high resolution, adding layers for fine details.", "zh": "渐进式增长GAN，从低分辨率到高分辨率逐步添加层以建模细节。"}, {"en": "Minibatch standard deviation layer to increase variation without learnable parameters.", "zh": "小批量标准差层，无需可学习参数即可增加生成图像的多样性。"}, {"en": "Equalized learning rate via runtime weight scaling for balanced training.", "zh": "通过运行时权重缩放实现均衡学习率，平衡各层训练速度。"}, {"en": "Pixelwise feature vector normalization in generator to prevent signal escalation.", "zh": "生成器中逐像素特征向量归一化，防止信号幅度失控。"}, {"en": "Sliced Wasserstein distance (SWD) metric for evaluating GAN quality and variation.", "zh": "切片Wasserstein距离（SWD）指标，用于评估GAN的图像质量和多样性。"}, {"en": "High-quality CelebA-HQ dataset at 1024x1024 resolution for benchmarking.", "zh": "高质量CelebA-HQ数据集，分辨率为1024x1024，用于基准测试。"}], "limits": [{"en": "Progressive growing may not generalize to non-image domains or structured outputs.", "zh": "渐进式增长可能无法泛化到非图像领域或结构化输出。"}, {"en": "Pixelwise normalization can overly constrain generator, limiting expressiveness.", "zh": "逐像素归一化可能过度约束生成器，限制其表达能力。"}, {"en": "SWD metric relies on random projections and may miss subtle mode collapses.", "zh": "SWD指标依赖随机投影，可能遗漏细微的模式坍塌。"}, {"en": "Method requires careful tuning of fading schedules and layer addition timing.", "zh": "该方法需要仔细调整淡入调度和层添加时机。"}, {"en": "High-resolution training still demands significant computational resources.", "zh": "高分辨率训练仍需要大量计算资源。"}]}, "cites": 8591}, {"id": "hinton-1710.09829", "pid": "hinton", "arxiv": "1710.09829", "date": "2017-10-26", "venue": "cs.CV", "fields": ["deep-learning", "vision"], "tEn": "Dynamic Routing Between Capsules", "tZh": "动态路由在胶囊网络中的应用", "sEn": "A capsule network with dynamic routing achieves state-of-the-art on MNIST and excels at recognizing overlapping digits.", "sZh": "一种采用动态路由机制的胶囊网络在MNIST上达到最优性能，并在识别高度重叠数字方面显著优于卷积网络。", "absEn": "A capsule is a group of neurons whose activity vector represents the instantiation parameters of a specific type of entity such as an object or an object part. We use the length of the activity vector to represent the probability that the entity exists and its orientation to represent the instantiation parameters. Active capsules at one level make predictions, via transformation matrices, for the instantiation parameters of higher-level capsules. When multiple predictions agree, a higher level capsule becomes active. We show that a discrimininatively trained, multi-layer capsule system achieves state-of-the-art performance on MNIST and is considerably better than a convolutional net at recognizing highly overlapping digits. To achieve these results we use an iterative routing-by-agreement mechanism: A lower-level capsule prefers to send its output to higher level capsules whose activity vectors have a big scalar product with the prediction coming from the lower-level capsule.", "absZh": "胶囊是一组神经元，其活动向量表示特定类型实体（如物体或物体部分）的实例化参数。我们使用活动向量的长度表示实体存在的概率，其方向表示实例化参数。低层胶囊通过变换矩阵对高层胶囊的实例化参数进行预测。当多个预测一致时，高层胶囊被激活。我们证明，一个经过判别训练的多层胶囊系统在MNIST上达到了最先进的性能，并且在识别高度重叠的数字方面明显优于卷积网络。为了实现这些结果，我们使用了一种迭代的路由协议机制：低层胶囊倾向于将其输出发送给那些活动向量与低层胶囊预测的标量积较大的高层胶囊。", "insights": {"contrib": [{"en": "Introduces CapsNet with dynamic routing-by-agreement, achieving state-of-the-art 0.25% test error on MNIST.", "zh": "提出带有动态路由协议的 CapsNet，在 MNIST 上达到 0.25% 的测试错误率，为当时最优。"}, {"en": "Capsules use vector outputs to represent instantiation parameters, with vector length indicating entity existence.", "zh": "胶囊使用向量输出表示实例化参数，向量长度表示实体存在概率。"}, {"en": "Dynamic routing enables superior segmentation of highly overlapping digits, outperforming CNNs on MultiMNIST.", "zh": "动态路由实现了对高度重叠数字的优越分割，在 MultiMNIST 上优于 CNN。"}, {"en": "CapsNet generalizes better to affine transformations than CNNs, achieving 79% vs 66% on affNIST.", "zh": "CapsNet 对仿射变换的泛化能力优于 CNN，在 affNIST 上达到 79% 对比 66%。"}, {"en": "The model uses a reconstruction regularizer to enforce pose encoding, improving routing performance.", "zh": "模型使用重构正则化强制姿态编码，提升了路由性能。"}, {"en": "Capsules provide viewpoint-invariant knowledge via transformation matrices, avoiding exponential inefficiencies of CNNs.", "zh": "胶囊通过变换矩阵提供视角不变知识，避免了 CNN 的指数级低效问题。"}], "limits": [{"en": "Assumes at most one instance of a capsule's entity per location, limiting handling of multiple same-class objects.", "zh": "假设每个位置最多存在一个胶囊实体，限制了处理同类别多个对象的能力。"}, {"en": "Performance on CIFAR-10 (10.6% error) is modest, as capsules struggle with complex backgrounds.", "zh": "在 CIFAR-10 上性能一般（10.6% 错误率），因为胶囊难以处理复杂背景。"}, {"en": "Routing-by-agreement requires iterative computation, increasing inference cost compared to max-pooling.", "zh": "动态路由需要迭代计算，相比最大池化增加了推理成本。"}, {"en": "The model is shallow (3 layers) and may not scale well to deeper architectures or larger datasets.", "zh": "模型较浅（3 层），可能难以扩展到更深架构或更大数据集。"}, {"en": "Capsule networks are still in early research stage, requiring more insights to outperform mature technologies like CNNs.", "zh": "胶囊网络仍处于早期研究阶段，需要更多洞察才能超越 CNN 等成熟技术。"}]}, "cites": 5131, "org": "Google"}, {"id": "hvanhasselt-1710.02298", "pid": "hvanhasselt", "arxiv": "1710.02298", "date": "2017-10-06", "venue": "cs.AI", "org": "Google DeepMind", "fields": ["rl", "deep-learning"], "tEn": "Rainbow: Combining Improvements in Deep Reinforcement Learning", "tZh": "彩虹：融合深度强化学习的多项改进", "sEn": "Combining six DQN extensions yields state-of-the-art Atari performance.", "sZh": "将六种DQN扩展相结合，在Atari基准上实现了最先进的性能。", "absEn": "The deep reinforcement learning community has made several independent improvements to the DQN algorithm. However, it is unclear which of these extensions are complementary and can be fruitfully combined. This paper examines six extensions to the DQN algorithm and empirically studies their combination. Our experiments show that the combination provides state-of-the-art performance on the Atari 2600 benchmark, both in terms of data efficiency and final performance. We also provide results from a detailed ablation study that shows the contribution of each component to overall performance.", "absZh": "深度强化学习社区对DQN算法进行了多项独立的改进。然而，目前尚不清楚这些扩展中哪些是互补的，可以有效地结合起来。本文研究了DQN算法的六种扩展，并实证研究了它们的组合效果。我们的实验表明，这种组合在Atari 2600基准测试中，无论是在数据效率还是最终性能方面，都达到了最先进的水平。我们还提供了详细的消融研究结果，展示了每个组成部分对整体性能的贡献。", "insights": {"contrib": [{"en": "Integrates six DQN extensions into a single agent, Rainbow, achieving state-of-the-art performance on Atari 2600.", "zh": "将六种DQN扩展整合为单一智能体Rainbow，在Atari 2600上达到最先进性能。"}, {"en": "Demonstrates that prioritized replay and multi-step learning are the most crucial components for performance.", "zh": "证明优先回放和多步学习是对性能最关键的两个组件。"}, {"en": "Shows that distributional Q-learning improves final performance, especially on games near or above human level.", "zh": "展示分布式Q学习提升最终性能，尤其在接近或超越人类水平的游戏上。"}, {"en": "Provides a detailed ablation study quantifying each component's contribution to overall performance.", "zh": "提供详细消融研究，量化每个组件对整体性能的贡献。"}, {"en": "Achieves data efficiency by matching DQN's final performance after only 7 million frames.", "zh": "仅用700万帧即达到DQN最终性能，实现数据效率提升。"}, {"en": "Uses a dueling network architecture adapted for return distributions and noisy layers for exploration.", "zh": "采用适用于回报分布的对偶网络架构和用于探索的噪声层。"}], "limits": [{"en": "Evaluation limited to Atari 2600 games; generalization to other domains not tested.", "zh": "评估仅限于Atari 2600游戏，未测试对其他领域的泛化性。"}, {"en": "Hyper-parameters tuned manually via coordinate descent; no exhaustive search performed.", "zh": "超参数通过手动坐标下降调整，未进行穷举搜索。"}, {"en": "Does not explore parallelism or scalability; wall-clock time comparisons not provided.", "zh": "未探索并行性或可扩展性，未提供实际时间比较。"}, {"en": "Reward clipping may limit the effectiveness of double Q-learning in the distributional setting.", "zh": "奖励裁剪可能限制双重Q学习在分布式设置中的有效性。"}, {"en": "Only value-based methods considered; policy-based and actor-critic methods excluded.", "zh": "仅考虑基于价值的方法，排除了基于策略和演员-评论家方法。"}]}, "cites": 2642}, {"id": "yangyou-1708.03888", "pid": "yangyou", "arxiv": "1708.03888", "date": "2017-08-13", "venue": "cs.CV", "org": "UC Berkeley / NVIDIA", "fields": ["deep-learning", "efficiency"], "tEn": "Large Batch Training of Convolutional Networks", "tZh": "卷积网络的大批量训练", "sEn": "Layer-wise Adaptive Rate Scaling (LARS) enables large batch training of convolutional networks without accuracy loss.", "sZh": "逐层自适应学习率缩放（LARS）使得卷积网络的大批量训练在不损失精度的情况下成为可能。", "absEn": "A common way to speed up training of large convolutional networks is to add computational units. Training is then performed using data-parallel synchronous Stochastic Gradient Descent (SGD) with mini-batch divided between computational units. With an increase in the number of nodes, the batch size grows. But training with large batch size often results in the lower model accuracy. We argue that the current recipe for large batch training (linear learning rate scaling with warm-up) is not general enough and training may diverge. To overcome this optimization difficulties we propose a new training algorithm based on Layer-wise Adaptive Rate Scaling (LARS). Using LARS, we scaled Alexnet up to a batch size of 8K, and Resnet-50 to a batch size of 32K without loss in accuracy.", "absZh": "加速大型卷积网络训练的常见方法是增加计算单元。训练时采用数据并行的同步随机梯度下降（SGD），小批量数据被分配到各个计算单元。随着节点数量增加，批量大小也随之增长。但大批量训练往往导致模型精度下降。我们认为当前的大批量训练方案（线性学习率缩放加预热）不够通用，训练可能发散。为克服这些优化困难，我们提出了一种基于逐层自适应学习率缩放（LARS）的新训练算法。使用LARS，我们将Alexnet扩展到8K的批量大小，ResNet-50扩展到32K的批量大小，且未损失精度。", "insights": {"contrib": [{"en": "Proposes Layer-wise Adaptive Rate Scaling (LARS) for large batch training.", "zh": "提出逐层自适应速率缩放（LARS）用于大规模批量训练。"}, {"en": "Shows LARS enables AlexNet training with batch size 8K and ResNet-50 with 32K without accuracy loss.", "zh": "展示LARS使AlexNet在批量大小8K、ResNet-50在32K下训练且无精度损失。"}, {"en": "Identifies that the ratio of weight norm to gradient norm varies across layers, motivating layer-wise learning rates.", "zh": "发现权重范数与梯度范数之比在各层间变化，从而启发逐层学习率。"}, {"en": "Demonstrates that batch normalization helps stabilize large learning rate training but is insufficient alone.", "zh": "证明批归一化有助于稳定大学习率训练，但单独使用不足。"}, {"en": "Shows that accuracy loss for very large batches can be recovered by training longer.", "zh": "表明极大批量的精度损失可通过延长训练来恢复。"}, {"en": "Provides empirical evidence that the generalization gap is not the main cause of accuracy loss for large batches.", "zh": "提供经验证据表明泛化差距并非大批量精度损失的主因。"}], "limits": [{"en": "LARS requires tuning the trust coefficient η, which may vary across models.", "zh": "LARS需要调整信任系数η，该系数可能因模型而异。"}, {"en": "Experiments limited to AlexNet and ResNet-50 on ImageNet; generalizability to other architectures is unknown.", "zh": "实验仅限于ImageNet上的AlexNet和ResNet-50，对其他架构的泛化性未知。"}, {"en": "Training with batch size above 32K still results in accuracy loss without longer training.", "zh": "批量大小超过32K时，若不延长训练仍会出现精度损失。"}, {"en": "The method does not address the computational cost of large batch training itself.", "zh": "该方法未解决大批量训练本身的计算成本问题。"}, {"en": "Comparison baselines may not reflect state-of-the-art due to limited data augmentation and single-crop testing.", "zh": "由于数据增强有限和单裁剪测试，对比基线可能未反映最先进水平。"}]}, "cites": 957}, {"id": "tsungyilin-1708.02002", "pid": "tsungyilin", "arxiv": "1708.02002", "date": "2017-08-07", "venue": "cs.CV", "org": "Facebook AI Research", "fields": ["vision", "deep-learning"], "tEn": "Focal Loss for Dense Object Detection", "tZh": "用于密集目标检测的焦点损失", "sEn": "Focal Loss addresses extreme class imbalance in dense object detectors, enabling RetinaNet to surpass two-stage detectors in accuracy while maintaining one-stage speed.", "sZh": "焦点损失解决了密集目标检测中的极端类别不平衡问题，使RetinaNet在保持单阶段速度的同时，超越了所有现有两阶段检测器的精度。", "absEn": "The highest accuracy object detectors to date are based on a two-stage approach popularized by R-CNN, where a classifier is applied to a sparse set of candidate object locations. In contrast, one-stage detectors that are applied over a regular, dense sampling of possible object locations have the potential to be faster and simpler, but have trailed the accuracy of two-stage detectors thus far. In this paper, we investigate why this is the case. We discover that the extreme foreground-background class imbalance encountered during training of dense detectors is the central cause. We propose to address this class imbalance by reshaping the standard cross entropy loss such that it down-weights the loss assigned to well-classified examples. Our novel Focal Loss focuses training on a sparse set of hard examples and prevents the vast number of easy negatives from overwhelming the detector during training. To evaluate the effectiveness of our loss, we design and train a simple dense detector we call RetinaNet. Our results show that when trained with the focal loss, RetinaNet is able to match the speed of previous one-stage detectors while surpassing the accuracy of all existing state-of-the-art two-stage detectors. Code is at: https://github.com/facebookresearch/Detectron.", "absZh": "迄今为止，最高精度的目标检测器基于R-CNN推广的两阶段方法，其中分类器应用于稀疏的候选目标位置。相比之下，在可能的物体位置上进行规则、密集采样的单阶段检测器具有更快、更简单的潜力，但迄今为止其精度落后于两阶段检测器。在本文中，我们研究了这一现象的原因。我们发现，密集检测器训练过程中遇到的极端前景-背景类别不平衡是核心原因。我们提出通过重塑标准交叉熵损失来解决这种类别不平衡，即降低对分类良好的样本的损失权重。我们新颖的焦点损失专注于训练稀疏的困难样本，并防止大量简单负样本在训练过程中压倒检测器。为了评估我们损失的有效性，我们设计并训练了一个简单的密集检测器，称为RetinaNet。我们的结果表明，当使用焦点损失训练时，RetinaNet能够匹配先前单阶段检测器的速度，同时超越所有现有最先进的两阶段检测器的精度。代码地址：https://github.com/facebookresearch/Detectron。", "insights": {"contrib": [{"en": "Identifies extreme foreground-background class imbalance as the main obstacle for one-stage detectors.", "zh": "识别出极端的前景-背景类别不平衡是单阶段检测器的主要障碍。"}, {"en": "Proposes Focal Loss that down-weights easy examples and focuses training on hard negatives.", "zh": "提出Focal Loss，降低易分类样本的权重，聚焦于难分类负样本的训练。"}, {"en": "Designs RetinaNet, a simple one-stage detector using Feature Pyramid Network and anchor boxes.", "zh": "设计了RetinaNet，一种使用特征金字塔网络和锚点框的简单单阶段检测器。"}, {"en": "Demonstrates RetinaNet with Focal Loss matches speed of one-stage detectors and surpasses accuracy of two-stage detectors.", "zh": "证明使用Focal Loss的RetinaNet在速度上匹配单阶段检测器，在精度上超越两阶段检测器。"}, {"en": "Achieves state-of-the-art COCO AP of 39.1 with ResNet-101-FPN backbone at 5 fps.", "zh": "使用ResNet-101-FPN骨干网络在5 fps下达到39.1的COCO AP，实现最先进水平。"}, {"en": "Shows Focal Loss is robust to hyperparameters and alternative formulations yield similar results.", "zh": "表明Focal Loss对超参数鲁棒，且其他形式的损失函数也能取得类似效果。"}], "limits": [{"en": "Focal Loss is evaluated only on object detection; its effectiveness on other tasks is not studied.", "zh": "Focal Loss仅在目标检测上评估，未研究其在其他任务上的有效性。"}, {"en": "RetinaNet uses fixed anchor boxes; performance may depend on anchor design and density.", "zh": "RetinaNet使用固定锚点框，性能可能依赖于锚点框的设计和密度。"}, {"en": "The method requires careful tuning of α and γ hyperparameters for optimal performance.", "zh": "该方法需要仔细调整α和γ超参数以达到最佳性能。"}, {"en": "Training stability relies on a specific bias initialization for the classification subnet.", "zh": "训练稳定性依赖于分类子网的特定偏置初始化。"}, {"en": "Experiments are limited to COCO dataset; generalization to other datasets is not verified.", "zh": "实验仅限于COCO数据集，未验证在其他数据集上的泛化能力。"}]}, "cites": 3288}, {"id": "mbellemare-1707.06887", "pid": "mbellemare", "arxiv": "1707.06887", "date": "2017-07-21", "venue": "cs.LG", "org": "Google DeepMind", "fields": ["rl", "deep-learning"], "tEn": "A Distributional Perspective on Reinforcement Learning", "tZh": "强化学习的分布视角", "sEn": "Modeling the full distribution of returns, not just the expected value, improves reinforcement learning performance.", "sZh": "建模回报的完整分布而非仅期望值，能提升强化学习性能。", "absEn": "In this paper we argue for the fundamental importance of the value distribution: the distribution of the random return received by a reinforcement learning agent. This is in contrast to the common approach to reinforcement learning which models the expectation of this return, or value. Although there is an established body of literature studying the value distribution, thus far it has always been used for a specific purpose such as implementing risk-aware behaviour. We begin with theoretical results in both the policy evaluation and control settings, exposing a significant distributional instability in the latter. We then use the distributional perspective to design a new algorithm which applies Bellman's equation to the learning of approximate value distributions. We evaluate our algorithm using the suite of games from the Arcade Learning Environment. We obtain both state-of-the-art results and anecdotal evidence demonstrating the importance of the value distribution in approximate reinforcement learning. Finally, we combine theoretical and empirical evidence to highlight the ways in which the value distribution impacts learning in the approximate setting.", "absZh": "本文论证了价值分布（强化学习智能体获得的随机回报的分布）的根本重要性，这与通常只建模回报期望（即价值）的强化学习方法形成对比。尽管已有文献研究价值分布，但此前它总是用于特定目的，如实现风险感知行为。我们从策略评估和控制设置的理论结果开始，揭示了后者中显著的分布不稳定性。然后利用分布视角设计了一种新算法，将贝尔曼方程应用于近似价值分布的学习。我们使用街机学习环境中的游戏套件评估了该算法，获得了最先进的结果和轶事证据，证明了价值分布在近似强化学习中的重要性。最后，我们结合理论和实证证据，强调了价值分布在近似设置中影响学习的方式。", "insights": {"contrib": [{"en": "Argues for the fundamental importance of the value distribution in reinforcement learning.", "zh": "论证了价值分布在强化学习中的根本重要性。"}, {"en": "Proves the distributional Bellman operator is a contraction in the Wasserstein metric for policy evaluation.", "zh": "证明了分布贝尔曼算子在策略评估的Wasserstein度量下是压缩映射。"}, {"en": "Identifies instability in the distributional Bellman optimality operator for control.", "zh": "识别了控制设置中分布贝尔曼最优算子的不稳定性。"}, {"en": "Introduces Categorical DQN, a new algorithm learning approximate value distributions.", "zh": "提出了Categorical DQN，一种学习近似价值分布的新算法。"}, {"en": "Achieves state-of-the-art results on Atari 2600 games, outperforming DQN and other baselines.", "zh": "在Atari 2600游戏上取得了最先进的结果，优于DQN和其他基线。"}, {"en": "Provides theoretical and empirical evidence that value distributions improve approximate reinforcement learning.", "zh": "提供了理论和经验证据，表明价值分布改进了近似强化学习。"}], "limits": [{"en": "Theoretical results assume bounded moments and finite action spaces.", "zh": "理论结果假设有界矩和有限动作空间。"}, {"en": "Empirical evaluation limited to Atari 2600 games; generalizability to other domains is unverified.", "zh": "经验评估仅限于Atari 2600游戏；对其他领域的泛化性未验证。"}, {"en": "Categorical DQN requires careful tuning of support bounds and number of atoms.", "zh": "Categorical DQN需要仔细调整支持范围和原子数量。"}, {"en": "The distributional optimality operator may not converge to a fixed point in control settings.", "zh": "分布最优算子在控制设置中可能不收敛到不动点。"}, {"en": "Algorithm performance depends on the choice of projection and loss function.", "zh": "算法性能依赖于投影和损失函数的选择。"}]}, "cites": 1871}, {"id": "schulman-1707.06347", "pid": "schulman", "arxiv": "1707.06347", "date": "2017-07-20", "venue": "cs.LG", "fields": ["rl"], "tEn": "Proximal Policy Optimization Algorithms", "tZh": "近端策略优化算法", "sEn": "PPO is a family of policy gradient methods that use a novel surrogate objective to enable multiple minibatch updates per data sample, outperforming other online methods.", "sZh": "PPO是一类策略梯度方法，通过新颖的替代目标函数实现每个数据样本多次小批量更新，优于其他在线方法。", "absEn": "We propose a new family of policy gradient methods for reinforcement learning, which alternate between sampling data through interaction with the environment, and optimizing a \"surrogate\" objective function using stochastic gradient ascent. Whereas standard policy gradient methods perform one gradient update per data sample, we propose a novel objective function that enables multiple epochs of minibatch updates. The new methods, which we call proximal policy optimization (PPO), have some of the benefits of trust region policy optimization (TRPO), but they are much simpler to implement, more general, and have better sample complexity (empirically). Our experiments test PPO on a collection of benchmark tasks, including simulated robotic locomotion and Atari game playing, and we show that PPO outperforms other online policy gradient methods, and overall strikes a favorable balance between sample complexity, simplicity, and wall-time.", "absZh": "我们提出了一类新的用于强化学习的策略梯度方法，这些方法在与环境交互采样数据和利用随机梯度上升优化“替代”目标函数之间交替进行。标准策略梯度方法每个数据样本只进行一次梯度更新，而我们提出了一个新的目标函数，使得可以进行多个小批量更新周期。这种新方法被称为近端策略优化（PPO），它兼具信任区域策略优化（TRPO）的一些优点，但实现更简单、更通用，并且经验上样本复杂度更优。我们的实验在包括模拟机器人运动和Atari游戏在内的基准任务上测试了PPO，结果表明PPO优于其他在线策略梯度方法，并且在样本复杂度、简单性和实际运行时间之间取得了良好的平衡。", "insights": {"contrib": [{"en": "Proposes PPO, a family of policy gradient methods using a clipped surrogate objective for stable updates.", "zh": "提出PPO，一类使用裁剪替代目标进行稳定更新的策略梯度方法。"}, {"en": "Enables multiple epochs of minibatch updates per data sample, improving sample efficiency.", "zh": "每个数据样本支持多个小批量更新周期，提高样本效率。"}, {"en": "Simpler to implement than TRPO while retaining similar performance benefits.", "zh": "比TRPO更易实现，同时保留相似的性能优势。"}, {"en": "Empirically outperforms other online policy gradient methods on robotic locomotion and Atari games.", "zh": "在机器人运动和Atari游戏上经验性地优于其他在线策略梯度方法。"}, {"en": "Strikes a favorable balance between sample complexity, simplicity, and wall-time.", "zh": "在样本复杂度、简单性和运行时间之间取得良好平衡。"}], "limits": [{"en": "PPO's clipped objective may still allow large policy updates in some cases.", "zh": "PPO的裁剪目标在某些情况下仍可能允许较大的策略更新。"}, {"en": "Requires careful tuning of hyperparameters like clip epsilon and learning rate.", "zh": "需要仔细调整超参数，如裁剪阈值和学习率。"}, {"en": "Performance on tasks with sparse rewards or long horizons may degrade.", "zh": "在稀疏奖励或长视野任务上的性能可能下降。"}, {"en": "Theoretical convergence guarantees are not fully established.", "zh": "理论收敛保证尚未完全建立。"}, {"en": "May not scale well to very high-dimensional action spaces.", "zh": "可能无法很好地扩展到非常高维的动作空间。"}]}, "org": "OpenAI", "cites": 28722}, {"id": "mandrychow-1707.01495", "pid": "mandrychow", "arxiv": "1707.01495", "date": "2017-07-05", "venue": "cs.LG", "org": "OpenAI", "fields": ["rl", "deep-learning"], "tEn": "Hindsight Experience Replay", "tZh": "事后经验回放", "sEn": "Hindsight Experience Replay enables sample-efficient learning from sparse binary rewards, avoiding complex reward engineering.", "sZh": "事后经验回放能够从稀疏的二元奖励中进行样本高效的学习，避免了复杂的奖励工程设计。", "absEn": "Dealing with sparse rewards is one of the biggest challen
