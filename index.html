 details behind GPT-4 continue to remain undisclosed. We believe that the enhanced multi-modal generation capabilities of GPT-4 stem from the utilization of sophisticated large language models (LLM). To examine this phenomenon, we present MiniGPT-4, which aligns a frozen visual encoder with a frozen advanced LLM, Vicuna, using one projection layer. Our work, for the first time, uncovers that properly aligning the visual features with an advanced large language model can possess numerous advanced multi-modal abilities demonstrated by GPT-4, such as detailed image description generation and website creation from hand-drawn drafts. Furthermore, we also observe other emerging capabilities in MiniGPT-4, including writing stories and poems inspired by given images, teaching users how to cook based on food photos, and so on. In our experiment, we found that the model trained on short image caption pairs could produce unnatural language outputs (e.g., repetition and fragmentation). To address this problem, we curate a detailed image description dataset in the second stage to finetune the model, which consequently improves the model's generation reliability and overall usability. Our code, pre-trained model, and collected dataset are available at https://minigpt-4.github.io/.", "absZh": "最近的GPT-4展示了非凡的多模态能力，例如从手写文本直接生成网站以及识别图像中的幽默元素。这些特征在以往的视觉语言模型中很少见。然而，GPT-4背后的技术细节仍未公开。我们认为GPT-4增强的多模态生成能力源于对先进大语言模型（LLM）的利用。为了研究这一现象，我们提出了MiniGPT-4，它使用一个投影层将冻结的视觉编码器与冻结的先进LLM Vicuna对齐。我们的工作首次揭示，将视觉特征与先进大语言模型适当对齐可以拥有GPT-4展示的许多高级多模态能力，例如生成详细的图像描述和根据手绘草稿创建网站。此外，我们还观察到MiniGPT-4的其他新兴能力，包括根据给定图像编写故事和诗歌，根据食物照片教用户烹饪等。在我们的实验中，我们发现仅在短图像描述对上训练的模型会产生不自然的语言输出（例如重复和碎片化）。为了解决这个问题，我们在第二阶段整理了一个详细的图像描述数据集来微调模型，从而提高了模型生成的可靠性和整体可用性。我们的代码、预训练模型和收集的数据集可在https://minigpt-4.github.io/获取。", "insights": {"contrib": [{"en": "Proposes MiniGPT-4, aligning a frozen visual encoder with Vicuna via one projection layer.", "zh": "提出MiniGPT-4，通过一个投影层将冻结的视觉编码器与Vicuna对齐。"}, {"en": "Reveals that proper visual-LLM alignment yields GPT-4-like abilities like detailed image description and website creation.", "zh": "揭示适当的视觉-LLM对齐可产生类似GPT-4的能力，如详细图像描述和网站创建。"}, {"en": "Identifies that short caption pretraining causes unnatural outputs; second-stage finetuning with detailed descriptions improves reliability.", "zh": "发现短标题预训练导致不自然输出；第二阶段使用详细描述微调提高了可靠性。"}, {"en": "Demonstrates emergent abilities in MiniGPT-4, including poem writing, recipe generation, and meme interpretation.", "zh": "展示MiniGPT-4的新兴能力，包括写诗、生成食谱和解读梗图。"}, {"en": "Shows that a single linear projection layer suffices for vision-language alignment in limited data settings.", "zh": "表明在有限数据设置下，单层线性投影足以实现视觉-语言对齐。"}, {"en": "Provides open-source code, pretrained model, and curated dataset for reproducibility.", "zh": "提供开源代码、预训练模型和精选数据集以促进可复现性。"}], "limits": [{"en": "MiniGPT-4 inherits LLM hallucination, e.g., falsely describing nonexistent objects.", "zh": "MiniGPT-4继承了LLM的幻觉问题，例如错误描述不存在的物体。"}, {"en": "Visual perception is limited, especially in spatial localization tasks.", "zh": "视觉感知有限，尤其在空间定位任务中。"}, {"en": "Second-stage dataset is small (3,500 pairs) and manually curated, limiting scalability.", "zh": "第二阶段数据集较小（3500对）且人工筛选，限制了可扩展性。"}, {"en": "Model relies on frozen components; no end-to-end training of vision encoder or LLM.", "zh": "模型依赖冻结组件；未对视觉编码器或LLM进行端到端训练。"}, {"en": "Evaluation on advanced tasks is qualitative and lacks standardized benchmarks.", "zh": "高级任务的评估是定性的，缺乏标准化基准。"}]}}, {"id": "haotianliu-2304.08485", "pid": "haotianliu", "arxiv": "2304.08485", "date": "2023-04-17", "venue": "cs.CV", "org": "Microsoft", "fields": ["vision", "nlp"], "tEn": "Visual Instruction Tuning", "tZh": "视觉指令微调", "sEn": "LLaVA: an end-to-end trained large multimodal model connecting a vision encoder and LLM for general-purpose visual and language understanding, achieving impressive multimodal chat abilities and state-of-the-art accuracy on Science QA.", "sZh": "LLaVA：一个端到端训练的大型多模态模型，连接视觉编码器和LLM，实现通用视觉与语言理解，展现出令人印象深刻的多模态对话能力，并在Science QA上达到最先进准确率。", "absEn": "Instruction tuning large language models (LLMs) using machine-generated instruction-following data has improved zero-shot capabilities on new tasks, but the idea is less explored in the multimodal field. In this paper, we present the first attempt to use language-only GPT-4 to generate multimodal language-image instruction-following data. By instruction tuning on such generated data, we introduce LLaVA: Large Language and Vision Assistant, an end-to-end trained large multimodal model that connects a vision encoder and LLM for general-purpose visual and language understanding.Our early experiments show that LLaVA demonstrates impressive multimodel chat abilities, sometimes exhibiting the behaviors of multimodal GPT-4 on unseen images/instructions, and yields a 85.1% relative score compared with GPT-4 on a synthetic multimodal instruction-following dataset. When fine-tuned on Science QA, the synergy of LLaVA and GPT-4 achieves a new state-of-the-art accuracy of 92.53%. We make GPT-4 generated visual instruction tuning data, our model and code base publicly available.", "absZh": "使用机器生成的指令遵循数据对大型语言模型（LLM）进行指令微调，提高了新任务上的零样本能力，但这一思路在多模态领域探索较少。本文首次尝试使用仅语言GPT-4生成多模态语言-图像指令遵循数据。通过对这些生成数据进行指令微调，我们提出了LLaVA：大型语言与视觉助手，这是一个端到端训练的大型多模态模型，连接视觉编码器和LLM，用于通用视觉与语言理解。我们的早期实验表明，LLaVA展现出令人印象深刻的多模态对话能力，有时在未见过的图像/指令上表现出多模态GPT-4的行为，并在合成多模态指令遵循数据集上达到GPT-4相对得分的85.1%。在Science QA上微调后，LLaVA与GPT-4的协同作用实现了92.53%的最新准确率。我们公开了GPT-4生成的视觉指令微调数据、模型和代码库。", "insights": {"contrib": [{"en": "First to use language-only GPT-4 to generate multimodal language-image instruction-following data.", "zh": "首次使用仅语言的GPT-4生成多模态语言-图像指令遵循数据。"}, {"en": "Introduces LLaVA, an end-to-end trained large multimodal model connecting a vision encoder and LLM.", "zh": "提出LLaVA，一种端到端训练的大型多模态模型，连接视觉编码器和LLM。"}, {"en": "Achieves 85.1% relative score vs. GPT-4 on synthetic multimodal instruction-following dataset.", "zh": "在合成多模态指令遵循数据集上达到GPT-4的85.1%相对分数。"}, {"en": "New state-of-the-art accuracy of 92.53% on Science QA when ensembled with GPT-4.", "zh": "与GPT-4集成后在Science QA上达到92.53%的最新准确率。"}, {"en": "Constructs two evaluation benchmarks for visual instruction following with diverse tasks.", "zh": "构建了两个用于视觉指令遵循的评估基准，包含多样化任务。"}, {"en": "Releases generated multimodal instruction data, model, and code publicly.", "zh": "公开了生成的多模态指令数据、模型和代码。"}], "limits": [{"en": "Data generation relies on GPT-4, which may introduce biases or inaccuracies.", "zh": "数据生成依赖GPT-4，可能引入偏差或不准确。"}, {"en": "LLaVA sometimes fails on complex semantics, e.g., misinterpreting image as bag of patches.", "zh": "LLaVA有时在复杂语义上失败，例如将图像误解为补丁包。"}, {"en": "Limited to 158K instruction samples; performance may improve with more data.", "zh": "仅使用158K指令样本；更多数据可能提升性能。"}, {"en": "Simple linear projection for vision-language connection may limit expressiveness.", "zh": "简单的线性投影用于视觉-语言连接可能限制表达能力。"}, {"en": "Evaluation benchmarks are synthetic or limited in scope; real-world generalization not fully tested.", "zh": "评估基准是合成的或范围有限；未充分测试真实世界泛化。"}]}, "cites": 9951}, {"id": "moquab-2304.07193", "pid": "moquab", "arxiv": "2304.07193", "date": "2023-04-14", "venue": "cs.CV", "org": "Meta AI", "fields": ["vision", "deep-learning"], "tEn": "DINOv2: Learning Robust Visual Features without Supervision", "tZh": "DINOv2：无需监督学习鲁棒视觉特征", "sEn": "Self-supervised pretraining on diverse curated data yields universal visual features that outperform prior methods.", "sZh": "在多样化精选数据上进行自监督预训练，可产生超越先前方法的通用视觉特征。", "absEn": "The recent breakthroughs in natural language processing for model pretraining on large quantities of data have opened the way for similar foundation models in computer vision. These models could greatly simplify the use of images in any system by producing all-purpose visual features, i.e., features that work across image distributions and tasks without finetuning. This work shows that existing pretraining methods, especially self-supervised methods, can produce such features if trained on enough curated data from diverse sources. We revisit existing approaches and combine different techniques to scale our pretraining in terms of data and model size. Most of the technical contributions aim at accelerating and stabilizing the training at scale. In terms of data, we propose an automatic pipeline to build a dedicated, diverse, and curated image dataset instead of uncurated data, as typically done in the self-supervised literature. In terms of models, we train a ViT model (Dosovitskiy et al., 2020) with 1B parameters and distill it into a series of smaller models that surpass the best available all-purpose features, OpenCLIP (Ilharco et al., 2021) on most of the benchmarks at image and pixel levels.", "absZh": "自然语言处理中基于大量数据预训练模型的近期突破，为计算机视觉领域类似的基础模型开辟了道路。这类模型通过生成通用视觉特征（即无需微调即可跨图像分布和任务工作的特征），能极大简化图像在任何系统中的使用。本研究表明，现有的预训练方法，特别是自监督方法，如果在来自不同来源的足够精选数据上进行训练，就能产生此类特征。我们重新审视现有方法，并结合不同技术来扩展数据和模型规模的预训练。大部分技术贡献旨在加速和稳定大规模训练。在数据方面，我们提出了一种自动流水线，用于构建专用、多样且精选的图像数据集，而非自监督文献中通常使用的未精选数据。在模型方面，我们训练了一个具有10亿参数的ViT模型（Dosovitskiy等人，2020），并将其蒸馏成一系列较小的模型，这些模型在图像和像素级别的大多数基准测试中超越了最佳可用的通用特征OpenCLIP（Ilharco等人，2021）。", "insights": {"contrib": [{"en": "Proposes DINOv2, a self-supervised method for learning robust visual features from large curated data without supervision.", "zh": "提出DINOv2，一种从大规模精选数据中无监督学习鲁棒视觉特征的自监督方法。"}, {"en": "Introduces an automatic pipeline to build a diverse and curated image dataset (LVD-142M) from uncurated web data.", "zh": "引入自动流水线，从非精选网络数据构建多样化的精选图像数据集（LVD-142M）。"}, {"en": "Achieves state-of-the-art performance on image-level and pixel-level tasks with frozen features, matching or surpassing weakly-supervised methods.", "zh": "在图像级和像素级任务上使用冻结特征达到最先进性能，匹配或超越弱监督方法。"}, {"en": "Demonstrates that scaling data and model size improves feature quality, with distillation enabling smaller models to benefit from larger ones.", "zh": "证明扩展数据和模型规模可提升特征质量，蒸馏使小模型受益于大模型。"}, {"en": "Provides technical improvements for stable and efficient training at scale, including faster training and reduced memory usage.", "zh": "提供大规模稳定高效训练的技术改进，包括更快的训练和更低的内存使用。"}, {"en": "Shows emergent properties like object part understanding and scene geometry, with potential for further scaling.", "zh": "展示涌现特性如物体部件理解和场景几何，具有进一步扩展的潜力。"}], "limits": [{"en": "The method requires large curated datasets and significant computational resources for training.", "zh": "该方法需要大规模精选数据集和大量计算资源进行训练。"}, {"en": "Performance on some benchmarks like Places205 lags behind weakly-supervised models.", "zh": "在Places205等基准上性能落后于弱监督模型。"}, {"en": "Geographical and income biases persist, with lower performance on African regions and low-income households.", "zh": "地理和收入偏差仍然存在，在非洲地区和低收入家庭上性能较低。"}, {"en": "The study does not fully explore finetuning hyperparameters, leaving potential gains unexplored.", "zh": "研究未充分探索微调超参数，未挖掘潜在增益。"}, {"en": "Carbon footprint is substantial, with total project emissions estimated between 0.5k and 1k tCO2eq.", "zh": "碳足迹显著，项目总排放量估计在0.5千至1千吨二氧化碳当量之间。"}]}, "cites": 8853}, {"id": "xiaohuazhai-2303.15343", "pid": "xiaohuazhai", "arxiv": "2303.15343", "date": "2023-03-27", "venue": "cs.CV", "org": "Google DeepMind", "fields": ["vision", "nlp"], "tEn": "Sigmoid Loss for Language Image Pre-Training", "tZh": "语言-图像预训练的Sigmoid损失", "sEn": "We propose a simple pairwise Sigmoid loss for Language-Image Pre-training (SigLIP) that outperforms softmax-based contrastive learning, especially at small batch sizes, and achieves 84.5% ImageNet zero-shot accuracy with only four TPUv4 chips in two days.", "sZh": "我们提出了一种用于语言-图像预训练的简单成对Sigmoid损失（SigLIP），它优于基于softmax的对比学习，尤其是在小批量大小下，并且仅用四个TPUv4芯片在两天内就达到了84.5%的ImageNet零样本准确率。", "absEn": "We propose a simple pairwise Sigmoid loss for Language-Image Pre-training (SigLIP). Unlike standard contrastive learning with softmax normalization, the sigmoid loss operates solely on image-text pairs and does not require a global view of the pairwise similarities for normalization. The sigmoid loss simultaneously allows further scaling up the batch size, while also performing better at smaller batch sizes. Combined with Locked-image Tuning, with only four TPUv4 chips, we train a SigLiT model that achieves 84.5% ImageNet zero-shot accuracy in two days. The disentanglement of the batch size from the loss further allows us to study the impact of examples vs pairs and negative to positive ratio. Finally, we push the batch size to the extreme, up to one million, and find that the benefits of growing batch size quickly diminish, with a more reasonable batch size of 32k being sufficient. We release our models at https://github.com/google-research/big_vision and hope our research motivates further explorations in improving the quality and efficiency of language-image pre-training.", "absZh": "我们提出了一种用于语言-图像预训练的简单成对Sigmoid损失（SigLIP）。与使用softmax归一化的标准对比学习不同，sigmoid损失仅对图像-文本对进行操作，不需要全局视角的成对相似度进行归一化。Sigmoid损失同时允许进一步扩大批量大小，同时在较小的批量大小下表现更好。结合锁定图像调整，仅用四个TPUv4芯片，我们在两天内训练了一个SigLiT模型，实现了84.5%的ImageNet零样本准确率。批量大小与损失的解耦进一步使我们能够研究样本与配对以及负正比例的影响。最后，我们将批量大小推到极限，达到一百万，发现增大批量大小的好处迅速减弱，更合理的批量大小32k就足够了。我们在https://github.com/google-research/big_vision上发布我们的模型，希望我们的研究能激励进一步探索提高语言-图像预训练质量和效率的方法。", "insights": {"contrib": [{"en": "Proposes a simple pairwise Sigmoid loss for Language-Image Pre-training (SigLIP).", "zh": "提出了一种用于语言-图像预训练的简单成对Sigmoid损失（SigLIP）。"}, {"en": "Sigmoid loss operates solely on image-text pairs without global normalization.", "zh": "Sigmoid损失仅对图像-文本对操作，无需全局归一化。"}, {"en": "Enables scaling up batch size while performing better at smaller batch sizes.", "zh": "支持扩大批量大小，同时在较小批量下表现更好。"}, {"en": "Combined with Locked-image Tuning, achieves 84.5% ImageNet zero-shot accuracy with only four TPUv4 chips in two days.", "zh": "结合锁定图像微调，仅用四个TPUv4芯片在两天内达到84.5%的ImageNet零样本准确率。"}, {"en": "Disentangles batch size from loss, enabling study of examples vs pairs and negative-to-positive ratio.", "zh": "将批量大小与损失解耦，便于研究样本与配对以及负正比的影响。"}, {"en": "Finds that benefits of growing batch size diminish quickly, with 32k being sufficient.", "zh": "发现增大批量大小的收益迅速递减，32k的批量大小已足够。"}], "limits": [{"en": "Only evaluated on ImageNet zero-shot accuracy, not on other benchmarks.", "zh": "仅在ImageNet零样本准确率上评估，未在其他基准上测试。"}, {"en": "Training limited to four TPUv4 chips; results may not generalize to larger setups.", "zh": "训练限于四个TPUv4芯片，结果可能不适用于更大规模配置。"}, {"en": "Sigmoid loss may not outperform softmax-based contrastive loss on all tasks.", "zh": "Sigmoid损失可能并非在所有任务上都优于基于softmax的对比损失。"}, {"en": "Study of batch size scaling limited to one million; larger batches not explored.", "zh": "批量大小缩放研究限于一百万，未探索更大批量。"}, {"en": "Models released but no analysis on downstream tasks like retrieval or captioning.", "zh": "模型已发布，但未分析检索或字幕生成等下游任务。"}]}, "cites": 3226}, {"id": "chengchi-2303.04137", "pid": "chengchi", "arxiv": "2303.04137", "date": "2023-03-07", "venue": "cs.RO", "org": "Stanford", "fields": ["generative", "vision"], "tEn": "Diffusion Policy: Visuomotor Policy Learning via Action Diffusion", "tZh": "扩散策略：通过动作扩散进行视觉运动策略学习", "sEn": "Diffusion Policy outperforms existing methods by 46.9% on average across 12 robot tasks.", "sZh": "扩散策略在12个机器人任务上平均超越现有方法46.9%。", "absEn": "This paper introduces Diffusion Policy, a new way of generating robot behavior by representing a robot's visuomotor policy as a conditional denoising diffusion process. We benchmark Diffusion Policy across 12 different tasks from 4 different robot manipulation benchmarks and find that it consistently outperforms existing state-of-the-art robot learning methods with an average improvement of 46.9%. Diffusion Policy learns the gradient of the action-distribution score function and iteratively optimizes with respect to this gradient field during inference via a series of stochastic Langevin dynamics steps. We find that the diffusion formulation yields powerful advantages when used for robot policies, including gracefully handling multimodal action distributions, being suitable for high-dimensional action spaces, and exhibiting impressive training stability. To fully unlock the potential of diffusion models for visuomotor policy learning on physical robots, this paper presents a set of key technical contributions including the incorporation of receding horizon control, visual conditioning, and the time-series diffusion transformer. We hope this work will help motivate a new generation of policy learning techniques that are able to leverage the powerful generative modeling capabilities of diffusion models. Code, data, and training details is publicly available diffusion-policy.cs.columbia.edu", "absZh": "本文介绍了扩散策略，一种通过将机器人的视觉运动策略表示为条件去噪扩散过程来生成机器人行为的新方法。我们在来自4个不同机器人操作基准的12个不同任务上对扩散策略进行了基准测试，发现它始终优于现有的最先进机器人学习方法，平均改进幅度为46.9%。扩散策略学习动作分布得分函数的梯度，并在推理过程中通过一系列随机朗之万动力学步骤相对于该梯度场进行迭代优化。我们发现，扩散公式在用于机器人策略时产生了强大的优势，包括优雅地处理多模态动作分布、适用于高维动作空间以及表现出令人印象深刻的训练稳定性。为了在物理机器人上充分释放扩散模型在视觉运动策略学习中的潜力，本文提出了一系列关键技术贡献，包括引入滚动时域控制、视觉条件以及时间序列扩散变换器。我们希望这项工作将有助于激发新一代能够利用扩散模型强大生成建模能力的策略学习技术。代码、数据和训练细节可在 diffusion-policy.cs.columbia.edu 公开获取。", "insights": {"contrib": [{"en": "Proposes Diffusion Policy, representing visuomotor policy as a conditional denoising diffusion process.", "zh": "提出扩散策略，将视觉运动策略表示为条件去噪扩散过程。"}, {"en": "Achieves 46.9% average improvement over state-of-the-art methods across 12 tasks from 4 benchmarks.", "zh": "在4个基准的12个任务上，平均比现有最优方法提升46.9%。"}, {"en": "Introduces closed-loop action sequences via receding horizon control for robust execution.", "zh": "引入通过滚动时域控制的闭环动作序列，实现鲁棒执行。"}, {"en": "Presents time-series diffusion transformer to reduce over-smoothing and handle high-frequency actions.", "zh": "提出时间序列扩散Transformer，减少过度平滑并处理高频动作。"}, {"en": "Demonstrates stable training by modeling score function, avoiding intractable normalization constant.", "zh": "通过建模得分函数避免难处理的归一化常数，实现稳定训练。"}, {"en": "Validates on real-world tasks including non-rigid objects and periodic motions, achieving near-human performance.", "zh": "在真实世界任务中验证，包括非刚体物体和周期性运动，达到接近人类水平。"}], "limits": [{"en": "Inherits behavior cloning limitations, e.g., suboptimal performance with inadequate demonstration data.", "zh": "继承了行为克隆的局限性，例如演示数据不足时性能欠佳。"}, {"en": "Higher computational cost and inference latency compared to simpler methods like LSTM-GMM.", "zh": "与LSTM-GMM等简单方法相比，计算成本和推理延迟更高。"}, {"en": "Transformer backbone is sensitive to hyperparameters, requiring additional tuning.", "zh": "Transformer主干对超参数敏感，需要额外调参。"}, {"en": "May not suffice for tasks requiring very high-rate control despite action sequence prediction.", "zh": "尽管有动作序列预测，可能仍不足以应对需要极高频率控制的任务。"}, {"en": "Performance depends on quality and quantity of demonstrations, physical robot capabilities, and architecture.", "zh": "性能依赖于演示的质量和数量、机器人物理能力以及架构。"}]}, "cites": 3400}, {"id": "yangsong-2303.01469", "pid": "yangsong", "arxiv": "2303.01469", "date": "2023-03-02", "venue": "cs.LG", "org": "OpenAI", "fields": ["generative", "efficiency"], "tEn": "Consistency Models", "tZh": "一致性模型", "sEn": "Consistency models enable fast one-step generation by directly mapping noise to data, outperforming diffusion models in speed while maintaining high quality.", "sZh": "一致性模型通过直接将噪声映射到数据，实现快速单步生成，在保持高质量的同时速度优于扩散模型。", "absEn": "Diffusion models have significantly advanced the fields of image, audio, and video generation, but they depend on an iterative sampling process that causes slow generation. To overcome this limitation, we propose consistency models, a new family of models that generate high quality samples by directly mapping noise to data. They support fast one-step generation by design, while still allowing multistep sampling to trade compute for sample quality. They also support zero-shot data editing, such as image inpainting, colorization, and super-resolution, without requiring explicit training on these tasks. Consistency models can be trained either by distilling pre-trained diffusion models, or as standalone generative models altogether. Through extensive experiments, we demonstrate that they outperform existing distillation techniques for diffusion models in one- and few-step sampling, achieving the new state-of-the-art FID of 3.55 on CIFAR-10 and 6.20 on ImageNet 64x64 for one-step generation. When trained in isolation, consistency models become a new family of generative models that can outperform existing one-step, non-adversarial generative models on standard benchmarks such as CIFAR-10, ImageNet 64x64 and LSUN 256x256.", "absZh": "扩散模型在图像、音频和视频生成领域取得了显著进展，但它们依赖于迭代采样过程，导致生成速度缓慢。为了克服这一限制，我们提出了一致性模型，这是一种新的模型家族，通过直接将噪声映射到数据来生成高质量样本。它们设计上支持快速单步生成，同时仍允许多步采样以在计算量和样本质量之间进行权衡。此外，它们还支持零样本数据编辑，如图像修复、着色和超分辨率，无需针对这些任务进行显式训练。一致性模型可以通过蒸馏预训练的扩散模型来训练，也可以作为独立的生成模型进行训练。通过大量实验，我们证明它们在一步和少步采样中优于现有的扩散模型蒸馏技术，在CIFAR-10上实现了新的最先进FID为3.55，在ImageNet 64x64上为6.20。当单独训练时，一致性模型成为一种新的生成模型家族，在标准基准测试（如CIFAR-10、ImageNet 64x64和LSUN 256x256）上优于现有的单步非对抗生成模型。", "insights": {"contrib": [{"en": "Propose consistency models, a new family of generative models that directly map noise to data for fast one-step generation.", "zh": "提出一致性模型，一种直接映射噪声到数据以支持快速单步生成的新型生成模型家族。"}, {"en": "Introduce consistency distillation to distill pre-trained diffusion models into consistency models, achieving state-of-the-art FID on CIFAR-10 and ImageNet 64x64.", "zh": "引入一致性蒸馏，将预训练扩散模型蒸馏为一致性模型，在CIFAR-10和ImageNet 64x64上实现最先进FID。"}, {"en": "Develop consistency training to train consistency models from scratch without pre-trained diffusion models, establishing them as an independent generative model family.", "zh": "开发一致性训练，无需预训练扩散模型即可从头训练一致性模型，使其成为独立的生成模型家族。"}, {"en": "Demonstrate zero-shot data editing capabilities including inpainting, colorization, super-resolution, and stroke-guided editing without task-specific training.", "zh": "展示零样本数据编辑能力，包括图像修复、着色、超分辨率和笔触引导编辑，无需任务特定训练。"}, {"en": "Provide theoretical analysis showing consistency models can approximate the true consistency function arbitrarily well with small ODE solver step sizes.", "zh": "提供理论分析，表明一致性模型在ODE求解器步长足够小时可任意逼近真实一致性函数。"}, {"en": "Achieve superior performance over progressive distillation and other distillation methods in one- and few-step sampling across multiple datasets.", "zh": "在多个数据集的一步和少步采样中，性能优于渐进蒸馏和其他蒸馏方法。"}], "limits": [{"en": "Consistency models may require careful tuning of discretization steps and schedule functions for optimal performance.", "zh": "一致性模型可能需要仔细调整离散化步数和调度函数以获得最佳性能。"}, {"en": "The method relies on the assumption that the FID is unimodal with respect to time points in multistep sampling.", "zh": "该方法假设多步采样中FID关于时间点是单峰的。"}, {"en": "Consistency training loss has higher variance with larger N, potentially slowing convergence in later stages.", "zh": "一致性训练损失在N较大时方差更高，可能减慢后期收敛。"}, {"en": "The approach is evaluated only on image datasets; applicability to other domains like audio or video is not explored.", "zh": "该方法仅在图像数据集上评估，未探索在音频或视频等其他领域的适用性。"}, {"en": "Continuous-time consistency training requires forward-mode automatic differentiation, which may not be efficiently supported in all frameworks.", "zh": "连续时间一致性训练需要前向模式自动微分，可能并非所有框架都高效支持。"}]}, "cites": 1939}, {"id": "lvminzhang-2302.05543", "pid": "lvminzhang", "arxiv": "2302.05543", "date": "2023-02-10", "venue": "cs.CV", "org": "Stanford", "fields": ["generative", "vision"], "tEn": "Adding Conditional Control to Text-to-Image Diffusion Models", "tZh": "向文本到图像扩散模型添加条件控制", "sEn": "ControlNet adds spatial conditioning controls to pretrained text-to-image diffusion models via zero convolutions.", "sZh": "ControlNet通过零卷积为预训练的文本到图像扩散模型添加空间条件控制。", "absEn": "We present ControlNet, a neural network architecture to add spatial conditioning controls to large, pretrained text-to-image diffusion models. ControlNet locks the production-ready large diffusion models, and reuses their deep and robust encoding layers pretrained with billions of images as a strong backbone to learn a diverse set of conditional controls. The neural architecture is connected with \"zero convolutions\" (zero-initialized convolution layers) that progressively grow the parameters from zero and ensure that no harmful noise could affect the finetuning. We test various conditioning controls, eg, edges, depth, segmentation, human pose, etc, with Stable Diffusion, using single or multiple conditions, with or without prompts. We show that the training of ControlNets is robust with small (&lt;50k) and large (&gt;1m) datasets. Extensive results show that ControlNet may facilitate wider applications to control image diffusion models.", "absZh": "我们提出了ControlNet，一种神经网络架构，用于向大型预训练文本到图像扩散模型添加空间条件控制。ControlNet锁定生产就绪的大型扩散模型，并重用其经过数十亿图像预训练的深度且稳健的编码层作为强大骨干，以学习多样化的条件控制。该神经架构通过“零卷积”（零初始化的卷积层）连接，这些层从零开始逐步增长参数，确保不会引入有害噪声影响微调。我们使用Stable Diffusion测试了各种条件控制，例如边缘、深度、分割、人体姿态等，使用单个或多个条件，带或不带提示。我们展示了ControlNet的训练对于小数据集（<50k）和大数据集（>1m）都是稳健的。大量结果表明，ControlNet可能促进控制图像扩散模型的更广泛应用。", "insights": {"contrib": [{"en": "Proposes ControlNet, a neural network architecture for adding spatial conditioning controls to large pretrained text-to-image diffusion models.", "zh": "提出ControlNet，一种向大型预训练文本到图像扩散模型添加空间条件控制的神经网络架构。"}, {"en": "Uses zero-initialized convolution layers to connect trainable and locked copies, preventing harmful noise during finetuning.", "zh": "使用零初始化卷积层连接可训练副本和锁定副本，防止微调期间的有害噪声。"}, {"en": "Demonstrates robust training with datasets ranging from <50k to >1m samples, avoiding overfitting and catastrophic forgetting.", "zh": "展示了在小于5万到大于100万样本的数据集上的稳健训练，避免了过拟合和灾难性遗忘。"}, {"en": "Supports diverse conditioning inputs (edges, depth, segmentation, human pose) with single or multiple conditions, with or without prompts.", "zh": "支持多种条件输入（边缘、深度、分割、人体姿态），可单条件或多条件，带或不带提示。"}, {"en": "Achieves competitive results with industrial models using limited resources (single GPU, 200k samples) for depth-to-image tasks.", "zh": "在深度到图像任务中，使用有限资源（单GPU、20万样本）达到与工业模型竞争的结果。"}, {"en": "Enables composition of multiple ControlNets without extra weighting, facilitating complex conditional control.", "zh": "支持多个ControlNet的组合而无需额外加权，便于复杂条件控制。"}], "limits": [{"en": "ControlNet requires a pretrained diffusion model (e.g., Stable Diffusion) as backbone, limiting applicability to other architectures.", "zh": "ControlNet需要预训练扩散模型（如Stable Diffusion）作为骨干，限制了在其他架构上的适用性。"}, {"en": "Training ControlNet for new conditions requires task-specific datasets, which may be small and hard to collect.", "zh": "为新条件训练ControlNet需要特定任务数据集，可能规模小且难以收集。"}, {"en": "The sudden convergence phenomenon may cause abrupt learning, potentially missing gradual improvements.", "zh": "突然收敛现象可能导致学习突变，可能错过渐进改进。"}, {"en": "ControlNet's performance depends on the quality of conditioning inputs; noisy or inaccurate inputs degrade results.", "zh": "ControlNet的性能依赖于条件输入的质量；噪声或不准确的输入会降低结果。"}, {"en": "The method has been tested primarily on Stable Diffusion; generalization to other diffusion models is not fully validated.", "zh": "该方法主要在Stable Diffusion上测试，对其他扩散模型的泛化性尚未充分验证。"}]}, "cites": 7164}, {"id": "junnanli-2301.12597", "pid": "junnanli", "arxiv": "2301.12597", "date": "2023-01-30", "venue": "cs.CV", "org": "Salesforce", "fields": ["vision", "nlp"], "tEn": "BLIP-2: Bootstrapping Language-Image Pre-training with Frozen Image Encoders and Large Language Models", "tZh": "BLIP-2：利用冻结的图像编码器和大型语言模型引导语言-图像预训练", "sEn": "BLIP-2 bridges the modality gap with a lightweight Querying Transformer, achieving state-of-the-art performance with 54x fewer trainable parameters than Flamingo80B.", "sZh": "BLIP-2通过轻量级查询Transformer弥合模态差距，以比Flamingo80B少54倍的可训练参数实现了最先进的性能。", "absEn": "The cost of vision-and-language pre-training has become increasingly prohibitive due to end-to-end training of large-scale models. This paper proposes BLIP-2, a generic and efficient pre-training strategy that bootstraps vision-language pre-training from off-the-shelf frozen pre-trained image encoders and frozen large language models. BLIP-2 bridges the modality gap with a lightweight Querying Transformer, which is pre-trained in two stages. The first stage bootstraps vision-language representation learning from a frozen image encoder. The second stage bootstraps vision-to-language generative learning from a frozen language model. BLIP-2 achieves state-of-the-art performance on various vision-language tasks, despite having significantly fewer trainable parameters than existing methods. For example, our model outperforms Flamingo80B by 8.7% on zero-shot VQAv2 with 54x fewer trainable parameters. We also demonstrate the model's emerging capabilities of zero-shot image-to-text generation that can follow natural language instructions.", "absZh": "由于大规模模型的端到端训练，视觉与语言预训练的成本变得越来越高昂。本文提出BLIP-2，一种通用且高效的预训练策略，它从现成的冻结预训练图像编码器和冻结大型语言模型中引导视觉语言预训练。BLIP-2通过轻量级的查询Transformer弥合模态差距，该Transformer分两个阶段进行预训练。第一阶段从冻结的图像编码器引导视觉语言表示学习。第二阶段从冻结的语言模型引导视觉到语言的生成学习。尽管BLIP-2的可训练参数远少于现有方法，但在各种视觉语言任务上仍取得了最先进的性能。例如，我们的模型在零样本VQAv2上以比Flamingo80B少54倍的可训练参数，性能提升了8.7%。我们还展示了模型在零样本图像到文本生成方面的新兴能力，能够遵循自然语言指令。", "insights": {"contrib": [{"en": "Proposes BLIP-2, a generic and efficient vision-language pre-training strategy using frozen image encoders and LLMs.", "zh": "提出BLIP-2，一种通用且高效的视觉-语言预训练策略，利用冻结的图像编码器和LLM。"}, {"en": "Introduces a lightweight Querying Transformer (Q-Former) to bridge the modality gap with two-stage pre-training.", "zh": "引入轻量级Querying Transformer（Q-Former），通过两阶段预训练弥合模态差距。"}, {"en": "Achieves state-of-the-art performance on VQA, image captioning, and retrieval with significantly fewer trainable parameters.", "zh": "在VQA、图像描述和检索任务上达到最先进性能，且可训练参数显著减少。"}, {"en": "Demonstrates zero-shot image-to-text generation following natural language instructions, enabling visual reasoning and conversation.", "zh": "展示了遵循自然语言指令的零样本图像到文本生成，支持视觉推理和对话。"}, {"en": "Validates that stronger frozen unimodal models (image encoder or LLM) consistently improve VLP performance.", "zh": "验证了更强的冻结单模态模型（图像编码器或LLM）能持续提升VLP性能。"}, {"en": "Shows representation learning stage is crucial to prevent catastrophic forgetting in frozen LLMs during generative learning.", "zh": "表明表示学习阶段对于防止生成学习期间冻结LLM的灾难性遗忘至关重要。"}], "limits": [{"en": "BLIP-2 lacks in-context learning capability due to single image-text pair per sample in pre-training data.", "zh": "BLIP-2缺乏上下文学习能力，因为预训练数据中每个样本仅包含单个图像-文本对。"}, {"en": "Image-to-text generation may suffer from inaccurate knowledge, incorrect reasoning, or outdated information.", "zh": "图像到文本生成可能因知识不准确、推理错误或信息过时而效果不佳。"}, {"en": "Inherits risks from frozen LLMs, including offensive language, social bias, and private information leakage.", "zh": "继承了冻结LLM的风险，包括冒犯性语言、社会偏见和隐私信息泄露。"}, {"en": "Performance on open-world knowledge tasks like OK-VQA is limited compared to larger LLMs.", "zh": "在OK-VQA等开放世界知识任务上的性能相比更大LLM有限。"}, {"en": "Requires careful prompt engineering for zero-shot tasks; optimal prompts vary across LLM types.", "zh": "零样本任务需要精心设计提示；最佳提示因LLM类型而异。"}]}, "cites": 8340}, {"id": "massran-2301.08243", "pid": "massran", "arxiv": "2301.08243", "date": "2023-01-19", "venue": "cs.CV", "org": "Meta AI", "fields": ["vision", "deep-learning"], "tEn": "Self-Supervised Learning from Images with a Joint-Embedding Predictive Architecture", "tZh": "基于联合嵌入预测架构的图像自监督学习", "sEn": "I-JEPA learns semantic image representations by predicting target block representations from a single context block without hand-crafted augmentations.", "sZh": "I-JEPA通过从单个上下文块预测目标块表示来学习语义图像表示，无需手工数据增强。", "absEn": "This paper demonstrates an approach for learning highly semantic image representations without relying on hand-crafted data-augmentations. We introduce the Image-based Joint-Embedding Predictive Architecture (I-JEPA), a non-generative approach for self-supervised learning from images. The idea behind I-JEPA is simple: from a single context block, predict the representations of various target blocks in the same image. A core design choice to guide I-JEPA towards producing semantic representations is the masking strategy; specifically, it is crucial to (a) sample target blocks with sufficiently large scale (semantic), and to (b) use a sufficiently informative (spatially distributed) context block. Empirically, when combined with Vision Transformers, we find I-JEPA to be highly scalable. For instance, we train a ViT-Huge/14 on ImageNet using 16 A100 GPUs in under 72 hours to achieve strong downstream performance across a wide range of tasks, from linear classification to object counting and depth prediction.", "absZh": "本文展示了一种无需依赖手工数据增强即可学习高语义图像表示的方法。我们提出了基于图像的联合嵌入预测架构（I-JEPA），这是一种用于图像自监督学习的非生成式方法。I-JEPA的核心思想很简单：从单个上下文块预测同一图像中多个目标块的表示。引导I-JEPA产生语义表示的一个关键设计选择是掩码策略；具体来说，至关重要的是（a）采样足够大尺度（语义）的目标块，以及（b）使用信息量足够大（空间分布）的上下文块。实验表明，当与Vision Transformer结合时，I-JEPA具有高度可扩展性。例如，我们在ImageNet上使用16块A100 GPU在不到72小时内训练了ViT-Huge/14，在从线性分类到目标计数和深度预测的广泛任务中实现了强大的下游性能。", "insights": {"contrib": [{"en": "Introduces I-JEPA, a non-generative self-supervised method predicting target block representations from a single context block.", "zh": "提出I-JEPA，一种非生成式自监督方法，从单个上下文块预测目标块表示。"}, {"en": "Shows that predicting in representation space yields more semantic features than pixel-level reconstruction.", "zh": "表明在表示空间中进行预测比像素级重建能产生更具语义的特征。"}, {"en": "Demonstrates that a multi-block masking strategy with large target blocks and informative context is crucial for semantic representations.", "zh": "证明使用大目标块和信息性上下文的多块掩码策略对语义表示至关重要。"}, {"en": "Achieves strong downstream performance across tasks like linear classification, object counting, and depth prediction without hand-crafted augmentations.", "zh": "无需手工数据增强，在线性分类、目标计数和深度预测等任务上实现强下游性能。"}, {"en": "Shows high scalability: ViT-H/14 on ImageNet trained with 16 A100 GPUs in under 72 hours, outperforming prior methods in compute efficiency.", "zh": "展示高可扩展性：在ImageNet上使用16块A100 GPU在72小时内训练ViT-H/14，计算效率优于先前方法。"}], "limits": [{"en": "Evaluation primarily on ImageNet-1K; generalization to other domains or modalities not fully explored.", "zh": "评估主要在ImageNet-1K上进行，未充分探索对其他领域或模态的泛化。"}, {"en": "Requires careful tuning of masking strategy (target block scale and context informativeness) for optimal performance.", "zh": "需要仔细调整掩码策略（目标块尺度和上下文信息量）以达到最佳性能。"}, {"en": "Performance on semantic tasks may still lag behind view-invariance methods that use hand-crafted augmentations in some settings.", "zh": "在某些设置下，语义任务性能可能仍落后于使用手工增强的视图不变方法。"}, {"en": "Dependence on exponential moving average target encoder adds complexity and hyperparameter sensitivity.", "zh": "依赖指数移动平均目标编码器增加了复杂性和超参数敏感性。"}]}}, {"id": "remilam-2212.12794", "pid": "remilam", "arxiv": "2212.12794", "date": "2022-12-24", "venue": "cs.LG", "org": "Google DeepMind", "fields": ["deep-learning"], "tEn": "GraphCast: Learning skillful medium-range global weather forecasting", "tZh": "GraphCast：学习进行熟练的中期全球天气预报", "sEn": "GraphCast, a machine learning model, outperforms traditional numerical weather prediction on 90% of verification targets and forecasts severe events better.", "sZh": "GraphCast是一种机器学习模型，在90%的验证目标上优于传统数值天气预报，并能更好地预测极端事件。", "absEn": "Global medium-range weather forecasting is critical to decision-making across many social and economic domains. Traditional numerical weather prediction uses increased compute resources to improve forecast accuracy, but cannot directly use historical weather data to improve the underlying model. We introduce a machine learning-based method called \"GraphCast\", which can be trained directly from reanalysis data. It predicts hundreds of weather variables, over 10 days at 0.25 degree resolution globally, in under one minute. We show that GraphCast significantly outperforms the most accurate operational deterministic systems on 90% of 1380 verification targets, and its forecasts support better severe event prediction, including tropical cyclones, atmospheric rivers, and extreme temperatures. GraphCast is a key advance in accurate and efficient weather forecasting, and helps realize the promise of machine learning for modeling complex dynamical systems.", "absZh": "全球中期天气预报对许多社会和经济领域的决策至关重要。传统的数值天气预报通过增加计算资源来提高预报精度，但无法直接利用历史天气数据改进模型。我们提出了一种基于机器学习的方法“GraphCast”，它可以直接从再分析数据中训练。该方法能在不到一分钟内，以0.25度分辨率在全球范围内预测数百个天气变量，时间跨度达10天。我们证明，GraphCast在1380个验证目标中的90%上显著优于最准确的业务确定性系统，其预报支持更好的极端事件预测，包括热带气旋、大气河流和极端温度。GraphCast是准确高效天气预报的关键进展，有助于实现机器学习在复杂动力系统建模中的潜力。", "insights": {"contrib": [{"en": "Introduces GraphCast, a machine learning method for global medium-range weather forecasting trained directly from reanalysis data.", "zh": "提出GraphCast，一种直接从再分析数据训练的全球中期天气预报机器学习方法。"}, {"en": "Achieves 10-day forecasts at 0.25° resolution globally in under one minute on a single TPU v4 device.", "zh": "在单个TPU v4设备上不到一分钟内实现全球0.25°分辨率10天预报。"}, {"en": "Outperforms the most accurate operational deterministic system (HRES) on 90% of 1380 verification targets.", "zh": "在1380个验证目标中，90%优于最准确的操作确定性系统（HRES）。"}, {"en": "Demonstrates improved prediction of severe events including tropical cyclones, atmospheric rivers, and extreme temperatures.", "zh": "展示了对热带气旋、大气河流和极端温度等极端事件预测的改进。"}, {"en": "Uses an encode-process-decode graph neural network architecture with 36.7 million parameters.", "zh": "采用编码-处理-解码图神经网络架构，共3670万个参数。"}, {"en": "Shows that machine learning weather prediction can complement traditional numerical weather prediction methods.", "zh": "表明机器学习天气预报可以补充传统数值天气预报方法。"}], "limits": [{"en": "Operates at 0.25° resolution and 6-hour time steps due to training data and hardware constraints.", "zh": "由于训练数据和硬件限制，以0.25°分辨率和6小时时间步长运行。"}, {"en": "Focuses on deterministic forecasts, not capturing uncertainty as well as ensemble methods.", "zh": "专注于确定性预报，不如集合方法能捕捉不确定性。"}, {"en": "MSE training objective encourages spatial blurring at longer lead times, limiting value for some applications.", "zh": "MSE训练目标在较长预报时效鼓励空间模糊，限制了某些应用的价值。"}, {"en": "Depends critically on high-quality reanalysis data from numerical weather prediction systems.", "zh": "关键依赖于来自数值天气预报系统的高质量再分析数据。"}, {"en": "Not a replacement for traditional methods; complements them with potential for further scaling.", "zh": "不能替代传统方法；而是补充传统方法，并具有进一步规模扩张的潜力。"}]}, "cites": 411}, {"id": "wpeebles-2212.09748", "pid": "wpeebles", "arxiv": "2212.09748", "date": "2022-12-19", "venue": "cs.CV", "org": "UC Berkeley / Meta AI", "fields": ["generative", "vision"], "tEn": "Scalable Diffusion Models with Transformers", "tZh": "基于Transformer的可扩展扩散模型", "sEn": "Diffusion Transformers (DiTs) scale with Gflops and achieve state-of-the-art FID on ImageNet.", "sZh": "扩散Transformer（DiT）随Gflops扩展，在ImageNet上达到最先进FID。", "absEn": "We explore a new class of diffusion models based on the transformer architecture. We train latent diffusion models of images, replacing the commonly-used U-Net backbone with a transformer that operates on latent patches. We analyze the scalability of our Diffusion Transformers (DiTs) through the lens of forward pass complexity as measured by Gflops. We find that DiTs with higher Gflops -- through increased transformer depth/width or increased number of input tokens -- consistently have lower FID. In addition to possessing good scalability properties, our largest DiT-XL/2 models outperform all prior diffusion models on the class-conditional ImageNet 512x512 and 256x256 benchmarks, achieving a state-of-the-art FID of 2.27 on the latter.", "absZh": "我们探索了一类基于Transformer架构的新型扩散模型。我们训练图像的潜在扩散模型，用作用于潜在块的Transformer替换常用的U-Net骨干网络。我们通过前向传播复杂度（以Gflops衡量）来分析扩散Transformer（DiT）的可扩展性。我们发现，具有更高Gflops的DiT——通过增加Transformer深度/宽度或增加输入令牌数量——始终具有更低的FID。除了具有良好的可扩展性外，我们最大的DiT-XL/2模型在类别条件ImageNet 512x512和256x256基准测试中优于所有先前的扩散模型，在后者上实现了2.27的最先进FID。", "insights": {"contrib": [{"en": "Introduces Diffusion Transformers (DiTs), a new class of diffusion models based on the transformer architecture.", "zh": "提出扩散Transformer（DiT），一种基于Transformer架构的新型扩散模型。"}, {"en": "Replaces the commonly-used U-Net backbone with a transformer operating on latent patches, showing U-Net inductive bias is not crucial.", "zh": "用作用于潜在块的Transformer替代常用的U-Net主干，表明U-Net归纳偏置并非关键。"}, {"en": "Demonstrates strong correlation between model Gflops and sample quality (FID), with higher Gflops consistently yielding lower FID.", "zh": "证明模型Gflops与样本质量（FID）之间存在强相关性，更高的Gflops持续带来更低的FID。"}, {"en": "Achieves state-of-the-art FID of 2.27 on class-conditional ImageNet 256x256, outperforming all prior diffusion models.", "zh": "在类别条件ImageNet 256x256上实现2.27的FID，超越所有先前扩散模型。"}, {"en": "Shows adaLN-Zero conditioning mechanism is most compute-efficient and yields best quality among four block designs.", "zh": "表明adaLN-Zero条件机制计算效率最高，在四种块设计中质量最佳。"}, {"en": "Scaling model compute (Gflops) is more critical than parameter count or sampling compute for improving DiT performance.", "zh": "提升模型算力（Gflops）比参数量或采样算力对改进DiT性能更关键。"}], "limits": [{"en": "Only evaluated on class-conditional ImageNet at 256x256 and 512x512 resolutions.", "zh": "仅在类别条件ImageNet的256x256和512x512分辨率上评估。"}, {"en": "Uses a fixed pre-trained VAE from Stable Diffusion; DiT's performance may depend on VAE quality.", "zh": "使用Stable Diffusion的固定预训练VAE；DiT性能可能依赖VAE质量。"}, {"en": "Training hyperparameters are largely retained from ADM without extensive tuning for DiT.", "zh": "训练超参数主要沿用ADM，未针对DiT进行广泛调优。"}, {"en": "Scaling analysis limited to Gflops; other complexity metrics like memory or latency not explored.", "zh": "缩放分析仅限于Gflops；未探索内存或延迟等其他复杂度指标。"}, {"en": "Does not address text-to-image generation or other conditional modalities beyond class labels.", "zh": "未涉及文本到图像生成或类别标签以外的其他条件模态。"}]}, "cites": 6355}, {"id": "ybai-2212.08073", "pid": "ybai", "arxiv": "2212.08073", "date": "2022-12-15", "venue": "cs.CL", "org": "Anthropic", "fields": ["safety", "nlp"], "tEn": "Constitutional AI: Harmlessness from AI Feedback", "tZh": "宪法式AI：来自AI反馈的无害性", "sEn": "Constitutional AI trains harmless AI assistants via self-improvement using only a list of principles, without human labels for harmful outputs.", "sZh": "宪法式AI通过自我改进训练无害的AI助手，仅使用原则列表，无需人类标记有害输出。", "absEn": "As AI systems become more capable, we would like to enlist their help to supervise other AIs. We experiment with methods for training a harmless AI assistant through self-improvement, without any human labels identifying harmful outputs. The only human oversight is provided through a list of rules or principles, and so we refer to the method as 'Constitutional AI'. The process involves both a supervised learning and a reinforcement learning phase. In the supervised phase we sample from an initial model, then generate self-critiques and revisions, and then finetune the original model on revised responses. In the RL phase, we sample from the finetuned model, use a model to evaluate which of the two samples is better, and then train a preference model from this dataset of AI preferences. We then train with RL using the preference model as the reward signal, i.e. we use 'RL from AI Feedback' (RLAIF). As a result we are able to train a harmless but non-evasive AI assistant that engages with harmful queries by explaining its objections to them. Both the SL and RL methods can leverage chain-of-thought style reasoning to improve the human-judged performance and transparency of AI decision making. These methods make it possible to control AI behavior more precisely and with far fewer human labels.", "absZh": "随着AI系统能力增强，我们希望借助它们来监督其他AI。我们实验了通过自我改进训练无害AI助手的方法，无需任何人类标签识别有害输出。唯一的人类监督是通过一系列规则或原则提供的，因此我们将该方法称为“宪法式AI”。该过程包括监督学习和强化学习两个阶段。在监督阶段，我们从初始模型中采样，然后生成自我批评和修订，最后在修订后的响应上微调原始模型。在强化学习阶段，我们从微调后的模型中采样，使用模型评估两个样本中哪个更好，然后从该AI偏好数据集中训练偏好模型。接着，我们使用偏好模型作为奖励信号进行强化学习训练，即使用“来自AI反馈的强化学习”（RLAIF）。结果，我们能够训练出一个无害但不回避的AI助手，它通过解释对有害查询的反对意见来回应。监督学习和强化学习方法都可以利用思维链式推理来提高人类判断的性能和AI决策的透明度。这些方法使得更精确地控制AI行为成为可能，且所需的人类标签大大减少。", "insights": {"contrib": [{"en": "Proposes Constitutional AI (CAI) to train harmless assistants without human harmfulness labels.", "zh": "提出宪法AI（CAI），无需人类有害性标签即可训练无害助手。"}, {"en": "Demonstrates supervised self-critique and revision to reduce harmfulness.", "zh": "展示监督式自我批评与修订以减少有害性。"}, {"en": "Introduces RLAIF using model-generated preference labels for harmlessness.", "zh": "引入基于AI反馈的强化学习（RLAIF），使用模型生成的无害性偏好标签。"}, {"en": "Shows chain-of-thought reasoning improves harmlessness evaluation and transparency.", "zh": "展示思维链推理提升无害性评估与透明度。"}, {"en": "Achieves non-evasive harmless responses by explaining objections to harmful queries.", "zh": "通过解释对有害查询的反对，实现非回避的无害回应。"}, {"en": "Reduces human supervision to a short list of principles, enabling scalable oversight.", "zh": "将人类监督缩减为简短原则列表，实现可扩展监督。"}], "limits": [{"en": "Relies on human-written principles which may be ad hoc and require refinement.", "zh": "依赖人类编写的原则，可能较为临时且需完善。"}, {"en": "Still requires human labels for helpfulness; not fully self-supervised.", "zh": "仍需人类帮助性标签，并非完全自监督。"}, {"en": "Chain-of-thought may produce inaccurate or overstated critiques.", "zh": "思维链可能产生不准确或夸大的批评。"}, {"en": "RL-CAI models can exhibit Goodharting or boilerplate responses when overtrained.", "zh": "RL-CAI模型过度训练时可能出现古德哈特效应或模板化回应。"}, {"en": "Methods may lower barriers for training pernicious AI systems (dual use).", "zh": "方法可能降低训练有害AI系统的门槛（双重用途）。"}]}, "cites": 3216}, {"id": "abrohan-2212.06817", "pid": "abrohan", "arxiv": "2212.06817", "date": "2022-12-13", "venue": "cs.RO", "org": "Google", "fields": ["deep-learning", "vision"], "tEn": "RT-1: Robotics Transformer for Real-World Control at Scale", "tZh": "RT-1：面向大规模真实世界控制的机器人Transformer", "sEn": "RT-1 shows that large-scale, diverse robotic data combined with high-capacity Transformer models enables strong generalization in real-world robot control.", "sZh": "RT-1表明，大规模多样化机器人数据与高容量Transformer模型相结合，能够在真实世界机器人控制中实现强大的泛化能力。", "absEn": "By transferring knowledge from large, diverse, task-agnostic datasets, modern machine learning models can solve specific downstream tasks either zero-shot or with small task-specific datasets to a high level of performance. While this capability has been demonstrated in other fields such as computer vision, natural language processing or speech recognition, it remains to be shown in robotics, where the generalization capabilities of the models are particularly critical due to the difficulty of collecting real-world robotic data. We argue that one of the keys to the success of such general robotic models lies with open-ended task-agnostic training, combined with high-capacity architectures that can absorb all of the diverse, robotic data. In this paper, we present a model class, dubbed Robotics Transformer, that exhibits promising scalable model properties. We verify our conclusions in a study of different model classes and their ability to generalize as a function of the data size, model size, and data diversity based on a large-scale data collection on real robots performing real-world tasks. The project's website and videos can be found at robotics-transformer1.github.io", "absZh": "通过从大规模、多样化、任务无关的数据集中迁移知识，现代机器学习模型可以零样本或使用少量特定任务数据集解决下游任务，并达到高水平性能。虽然这种能力已在计算机视觉、自然语言处理或语音识别等其他领域得到验证，但在机器人领域尚未得到证实，而由于收集真实世界机器人数据的困难，模型的泛化能力在该领域尤为关键。我们认为，这种通用机器人模型成功的关键之一在于开放式的任务无关训练，结合能够吸收所有多样化机器人数据的高容量架构。在本文中，我们提出了一类名为Robotics Transformer的模型，它展现出有前景的可扩展模型特性。我们基于真实机器人执行真实世界任务的大规模数据收集，研究了不同模型类别及其随数据量、模型大小和数据多样性的泛化能力，从而验证了我们的结论。项目网站和视频可在robotics-transformer1.github.io找到。", "insights": {"contrib": [{"en": "Proposes RT-1, a Transformer-based model for real-world robotic control at scale.", "zh": "提出RT-1，一种基于Transformer的模型，用于大规模真实世界机器人控制。"}, {"en": "Demonstrates RT-1 achieves 97% success on over 700 training instructions.", "zh": "展示RT-1在超过700个训练指令上达到97%的成功率。"}, {"en": "Shows RT-1 generalizes to new tasks, distractors, and backgrounds significantly better than baselines.", "zh": "显示RT-1在新任务、干扰物和背景上的泛化能力显著优于基线。"}, {"en": "Integrates TokenLearner and FiLM conditioning for efficient real-time inference.", "zh": "集成TokenLearner和FiLM条件化以实现高效的实时推理。"}, {"en": "Demonstrates absorption of heterogeneous data from simulation and different robots without performance loss.", "zh": "展示RT-1吸收来自仿真和不同机器人的异构数据而不损失性能。"}, {"en": "Enables long-horizon tasks with up to 50 steps in the SayCan framework.", "zh": "在SayCan框架中实现多达50步的长时域任务。"}], "limits": [{"en": "RT-1 is an imitation learning method, limited by demonstrator performance.", "zh": "RT-1是一种模仿学习方法，受限于演示者的表现。"}, {"en": "Generalization to new instructions is limited to combinations of seen concepts.", "zh": "对新指令的泛化仅限于已见概念的组合。"}, {"en": "Method is evaluated on a large but not highly dexterous set of manipulation tasks.", "zh": "该方法在大量但非高度灵巧的操作任务上评估。"}, {"en": "Robustness to backgrounds and environments could be improved with more diverse data.", "zh": "对背景和环境的鲁棒性可通过更多样化的数据改进。"}, {"en": "Reaction speed and context retention could benefit from scalable attention and memory.", "zh": "反应速度和上下文保持可通过可扩展的注意力和记忆改进。"}]}, "cites": 2357}, {"id": "aradford-2212.04356", "pid": "aradford", "arxiv": "2212.04356", "date": "2022-12-06", "venue": "eess.AS", "org": "OpenAI", "fields": ["deep-learning", "nlp"], "tEn": "Robust Speech Recognition via Large-Scale Weak Supervision", "tZh": "通过大规模弱监督实现鲁棒语音识别", "sEn": "Scaling weakly supervised speech recognition to 680,000 hours yields models competitive with fully supervised ones in zero-shot settings.", "sZh": "将弱监督语音识别扩展到68万小时，得到的模型在零样本设置下与全监督模型竞争力相当。", "absEn": "We study the capabilities of speech processing systems trained simply to predict large amounts of transcripts of audio on the internet. When scaled to 680,000 hours of multilingual and multitask supervision, the resulting models generalize well to standard benchmarks and are often competitive with prior fully supervised results but in a zero-shot transfer setting without the need for any fine-tuning. When compared to humans, the models approach their accuracy and robustness. We are releasing models and inference code to serve as a foundation for further work on robust speech processing.", "absZh": "我们研究了仅通过预测互联网上大量音频转录本来训练的语音处理系统的能力。当扩展到68万小时的多语言和多任务监督时，得到的模型在标准基准测试中表现良好，通常与先前的全监督结果相当，但处于零样本迁移设置，无需任何微调。与人类相比，这些模型接近其准确性和鲁棒性。我们正在发布模型和推理代码，作为进一步研究鲁棒语音处理的基础。", "insights": {"contrib": [{"en": "Proposes Whisper, a speech processing system trained on 680,000 hours of weakly supervised multilingual audio.", "zh": "提出Whisper，一个在68万小时弱监督多语言音频上训练的语音处理系统。"}, {"en": "Achieves zero-shot transfer competitive with prior fully supervised results without fine-tuning.", "zh": "实现零样本迁移，无需微调即可与先前全监督结果竞争。"}, {"en": "Demonstrates that scaling weakly supervised pre-training improves robustness and generalization.", "zh": "证明扩展弱监督预训练可提升鲁棒性和泛化能力。"}, {"en": "Introduces a multitask and multilingual training format using decoder input tokens.", "zh": "引入使用解码器输入令牌的多任务和多语言训练格式。"}, {"en": "Shows that larger models benefit from joint training across tasks and languages.", "zh": "表明更大模型从跨任务和语言的联合训练中受益。"}, {"en": "Releases models and inference code to facilitate further research on robust speech processing.", "zh": "发布模型和推理代码以促进鲁棒语音处理的进一步研究。"}], "limits": [{"en": "Whisper is limited to 30-second audio segments and requires buffered transcription for longer audio.", "zh": "Whisper仅限于30秒音频片段，长音频需要缓冲转录。"}, {"en": "Performance on low-resource languages is poor due to English-heavy training data.", "zh": "由于训练数据以英语为主，低资源语言性能较差。"}, {"en": "Remaining errors include repetition loops, missing words, and hallucinations in long-form transcription.", "zh": "剩余错误包括长转录中的重复循环、漏词和幻觉。"}, {"en": "Zero-shot evaluation may not reflect optimal performance achievable with fine-tuning.", "zh": "零样本评估可能无法反映微调可达到的最佳性能。"}, {"en": "Text normalizer may overfit to Whisper's transcription style, affecting WER comparisons.", "zh": "文本标准化器可能过拟合Whisper的转录风格，影响WER比较。"}]}, "cites": 7426}, {"id": "lingxixie-2211.02556", "pid": "lingxixie", "arxiv": "2211.02556", "date": "2022-11-03", "venue": "physics.ao-ph", "org": "Huawei", "fields": ["deep-learning", "vision"], "tEn": "Pangu-Weather: A 3D High-Resolution Model for Fast and Accurate Global Weather Forecast", "tZh": "盘古天气：一种用于快速准确全球天气预报的3D高分辨率模型", "sEn": "Pangu-Weather is the first AI-based method to outperform traditional numerical weather prediction in accuracy across all factors and time ranges.", "sZh": "盘古天气是首个在准确度上超越传统数值天气预报的AI方法，覆盖所有气象要素和时间范围。", "absEn": "In this paper, we present Pangu-Weather, a deep learning based system for fast and accurate global weather forecast. For this purpose, we establish a data-driven environment by downloading $43$ years of hourly global weather data from the 5th generation of ECMWF reanalysis (ERA5) data and train a few deep neural networks with about $256$ million parameters in total. The spatial resolution of forecast is $0.25^\\circ\\times0.25^\\circ$, comparable to the ECMWF Integrated Forecast Systems (IFS). More importantly, for the first time, an AI-based method outperforms state-of-the-art numerical weather prediction (NWP) methods in terms of accuracy (latitude-weighted RMSE and ACC) of all factors (e.g., geopotential, specific humidity, wind speed, temperature, etc.) and in all time ranges (from one hour to one week). There are two key strategies to improve the prediction accuracy: (i) designing a 3D Earth Specific Transformer (3DEST) architecture that formulates the height (pressure level) information into cubic data, and (ii) applying a hierarchical temporal aggregation algorithm to alleviate cumulative forecast errors. In deterministic forecast, Pangu-Weather shows great advantages for short to medium-range forecast (i.e., forecast time ranges from one hour to one week). Pangu-Weather supports a wide range of downstream forecast scenarios, including extreme weather forecast (e.g., tropical cyclone tracking) and large-member ensemble forecast in real-time. Pangu-Weather not only ends the debate on whether AI-based methods can surpass conventional NWP methods, but also reveals novel directions for improving deep learning weather forecast systems.", "absZh": "本文提出盘古天气，一种基于深度学习的快速准确全球天气预报系统。为此，我们建立了数据驱动环境，从ECMWF第五代再分析（ERA5）数据中下载了43年的每小时全球天气数据，并训练了总参数量约2.56亿的若干深度神经网络。预报的空间分辨率为0.25°×0.25°，与ECMWF综合预报系统（IFS）相当。更重要的是，AI方法首次在所有要素（如位势、比湿、风速、温度等）和所有时间范围（从1小时到1周）的准确度（纬度加权RMSE和ACC）上超越了最先进的数值天气预报（NWP）方法。提高预测精度的两个关键策略是：（i）设计了一种3D地球特定Transformer（3DEST）架构，将高度（气压层）信息公式化为立方体数据；（ii）应用分层时间聚合算法以减轻累积预报误差。在确定性预报中，盘古天气在短期到中期预报（即预报时间范围从1小时到1周）中显示出巨大优势。盘古天气支持多种下游预报场景，包括极端天气预报（如热带气旋跟踪）和实时大集合预报。盘古天气不仅结束了关于AI方法能否超越传统NWP方法的争论，还揭示了改进深度学习天气预报系统的新方向。", "insights": {"contrib": [{"en": "First AI-based method to surpass operational IFS in all weather factors and forecast times from 1 hour to 1 week.", "zh": "首个在所有天气要素和1小时至1周预报时间上超越业务IFS的AI方法。"}, {"en": "Proposes 3D Earth Specific Transformer (3DEST) integrating height information into 3D data for better atmospheric modeling.", "zh": "提出3D地球专用Transformer（3DEST），将高度信息整合为3D数据以改进大气建模。"}, {"en": "Introduces hierarchical temporal aggregation to reduce cumulative forecast errors by training models with multiple lead times.", "zh": "引入分层时间聚合，通过训练多个不同预报时效的模型来减少累积预报误差。"}, {"en": "Achieves 0.25° spatial resolution with inference speed over 10,000x faster than operational IFS on a single GPU.", "zh": "实现0.25°空间分辨率，单GPU推理速度比业务IFS快10000倍以上。"}, {"en": "Demonstrates strong performance in extreme weather forecast and large-member ensemble forecast scenarios.", "zh": "在极端天气预报和大集合预报场景中展现出强劲性能。"}, {"en": "Ends the debate on whether AI-based methods can surpass conventional NWP methods for global weather forecast.", "zh": "终结了AI方法能否在全球天气预报中超越传统NWP方法的争论。"}], "limits": [{"en": "Training data limited to 39 years of ERA5 reanalysis; longer periods may improve accuracy.", "zh": "训练数据仅限39年ERA5再分析数据；更长时段可能提升精度。"}, {"en": "Model not fully converged after 100 epochs due to computational budget constraints.", "zh": "受算力限制，模型在100个epoch后未完全收敛。"}, {"en": "3DEST architecture requires large GPU memory, limiting network depth and input features.", "zh": "3DEST架构需要大量GPU内存，限制了网络深度和输入特征。"}, {"en": "Hierarchical temporal aggregation uses fixed lead times; adaptive selection may further reduce errors.", "zh": "分层时间聚合使用固定预报时效；自适应选择可能进一步减少误差。"}, {"en": "Extreme weather forecast tends to underestimate intensity, especially for longer forecast ranges.", "zh": "极端天气预报倾向于低估强度，尤其在较长预报时效上。"}]}, "cites": 273}, {"id": "adefossez-2210.13438", "pid": "adefossez", "arxiv": "2210.13438", "date": "2022-10-24", "venue": "eess.AS", "org": "Meta AI (FAIR)", "fields": ["deep-learning", "efficiency"], "tEn": "High Fidelity Neural Audio Compression", "tZh": "高保真神经音频压缩", "sEn": "We introduce a real-time, high-fidelity neural audio codec with a novel loss balancer and lightweight Transformer for further compression.", "sZh": "我们提出了一种实时高保真神经音频编解码器，采用新颖的损失平衡器和轻量级Transformer进一步压缩。", "absEn": "We introduce a state-of-the-art real-time, high-fidelity, audio codec leveraging neural networks. It consists in a streaming encoder-decoder architecture with quantized latent space trained in an end-to-end fashion. We simplify and speed-up the training by using a single multiscale spectrogram adversary that efficiently reduces artifacts and produce high-quality samples. We introduce a novel loss balancer mechanism to stabilize training: the weight of a loss now defines the fraction of the overall gradient it should represent, thus decoupling the choice of this hyper-parameter from the typical scale of the loss. Finally, we study how lightweight Transformer models can be used to further compress the obtained representation by up to 40%, while staying faster than real time. We provide a detailed description of the key design choices of the proposed model including: training objective, architectural changes and a study of various perceptual loss functions. We present an extensive subjective evaluation (MUSHRA tests) together with an ablation study for a range of bandwidths and audio domains, including speech, noisy-reverberant speech, and music. Our approach is superior to the baselines methods across all evaluated settings, considering both 24 kHz monophonic and 48 kHz stereophonic audio. Code and models are available at github.com/facebookresearch/encodec.", "absZh": "我们介绍了一种最先进的实时高保真音频编解码器，利用神经网络。它由一个流式编码器-解码器架构和量化潜空间组成，以端到端方式训练。我们通过使用单个多尺度频谱图对抗器来简化和加速训练，该对抗器有效减少伪影并产生高质量样本。我们引入了一种新颖的损失平衡机制来稳定训练：损失的权重现在定义了它应代表的整体梯度的比例，从而将该超参数的选择与损失的典型尺度解耦。最后，我们研究了如何将轻量级Transformer模型用于进一步压缩获得的表示高达40%，同时保持比实时更快。我们详细描述了所提出模型的关键设计选择，包括：训练目标、架构变化以及对各种感知损失函数的研究。我们进行了广泛的主观评估（MUSHRA测试）以及消融研究，涵盖了各种带宽和音频领域，包括语音、嘈杂混响语音和音乐。我们的方法在所有评估设置中均优于基线方法，考虑24 kHz单声道和48 kHz立体声音频。代码和模型可在github.com/facebookresearch/encodec获取。", "insights": {"contrib": [{"en": "Introduced a real-time, high-fidelity neural audio codec with streaming encoder-decoder and quantized latent space.", "zh": "提出了一种实时、高保真的神经音频编解码器，采用流式编码器-解码器和量化潜在空间。"}, {"en": "Simplified training with a single multiscale spectrogram adversary that reduces artifacts and produces high-quality samples.", "zh": "使用单一多尺度频谱图对抗器简化训练，减少伪影并生成高质量样本。"}, {"en": "Proposed a novel loss balancer mechanism that stabilizes training by decoupling loss weights from their typical scale.", "zh": "提出了一种新颖的损失平衡器机制，通过将损失权重与其典型尺度解耦来稳定训练。"}, {"en": "Demonstrated lightweight Transformer models can further compress representations by up to 40% while staying faster than real time.", "zh": "展示了轻量级Transformer模型可进一步压缩表示高达40%，同时保持快于实时的速度。"}, {"en": "Achieved state-of-the-art subjective and objective results across multiple bandwidths and audio domains, including speech and music.", "zh": "在多个带宽和音频领域（包括语音和音乐）取得了最先进的主观和客观结果。"}, {"en": "Provided extensive ablation studies and subjective evaluations (MUSHRA) for various design choices.", "zh": "对各种设计选择提供了广泛的消融研究和主观评估（MUSHRA）。"}], "limits": [{"en": "The model's performance may degrade for audio domains not well represented in the training set.", "zh": "对于训练集中未充分代表的音频领域，模型性能可能下降。"}, {"en": "The streaming setup introduces a small degradation in quality compared to the non-streamable version.", "zh": "流式设置相比非流式版本会引入轻微的质量下降。"}, {"en": "The entropy coding increases initial latency, which may not be suitable for low-latency applications.", "zh": "熵编码增加了初始延迟，可能不适合低延迟应用。"}, {"en": "The 48 kHz model is slower than real time on a single CPU core, limiting its use for real-time streaming.", "zh": "48 kHz模型在单CPU核心上慢于实时，限制了其实时流式应用。"}, {"en": "The Transformer language model's compression gain varies with bandwidth, being less effective at higher bitrates.", "zh": "Transformer语言模型的压缩增益随带宽变化，在较高比特率下效果较差。"}]}, "cites": 1223}, {"id": "hwchung-2210.11416", "pid": "hwchung", "arxiv": "2210.11416", "date": "2022-10-20", "venue": "cs.LG", "org": "Google", "fields": ["nlp", "deep-learning"], "tEn": "Scaling Instruction-Finetuned Language Models", "tZh": "扩展指令微调语言模型", "sEn": "Instruction finetuning with more tasks, larger models, and chain-of-thought data significantly boosts performance across diverse models and benchmarks.", "sZh": "通过增加任务数量、扩大模型规模以及使用思维链数据进行指令微调，能显著提升各类模型在多种基准测试上的性能。", "absEn": "Finetuning language models on a collection of datasets phrased as instructions has been shown to improve model performance and generalization to unseen tasks. In this paper we explore instruction finetuning with a particular focus on (1) scaling the number of tasks, (2) scaling the model size, and (3) finetuning on chain-of-thought data. We find that instruction finetuning with the above aspects dramatically improves performance on a variety of model classes (PaLM, T5, U-PaLM), prompting setups (zero-shot, few-shot, CoT), and evaluation benchmarks (MMLU, BBH, TyDiQA, MGSM, open-ended generation). For instance, Flan-PaLM 540B instruction-finetuned on 1.8K tasks outperforms PALM 540B by a large margin (+9.4% on average). Flan-PaLM 540B achieves state-of-the-art performance on several benchmarks, such as 75.2% on five-shot MMLU. We also publicly release Flan-T5 checkpoints, which achieve strong few-shot performance even compared to much larger models, such as PaLM 62B. Overall, instruction finetuning is a general method for improving the performance and usability of pretrained language models.", "absZh": "对以指令形式表述的数据集集合进行语言模型微调，已被证明能提升模型性能及对未见任务的泛化能力。本文探索指令微调，重点关注：(1) 扩展任务数量，(2) 扩大模型规模，(3) 在思维链数据上进行微调。我们发现，结合上述方面的指令微调能显著提升多种模型类别（PaLM、T5、U-PaLM）、提示设置（零样本、少样本、思维链）以及评估基准（MMLU、BBH、TyDiQA、MGSM、开放式生成）的性能。例如，在1.8K个任务上经过指令微调的Flan-PaLM 540B，平均性能比PaLM 540B高出9.4%。Flan-PaLM 540B在多个基准上达到最先进水平，如五次样本MMLU上达到75.2%。我们还公开发布了Flan-T5检查点，即使与更大的模型（如PaLM 62B）相比，也展现出强大的少样本性能。总体而言，指令微调是提升预训练语言模型性能和可用性的通用方法。", "insights": {"contrib": [{"en": "Scales instruction finetuning to 540B models and 1.8K tasks, showing performance gains with model and task scaling.", "zh": "将指令微调扩展到540B模型和1.8K任务，展示模型和任务规模扩张带来的性能提升。"}, {"en": "Demonstrates that including chain-of-thought data in finetuning improves reasoning on held-out tasks.", "zh": "证明在微调中加入思维链数据能提升在留出任务上的推理能力。"}, {"en": "Shows instruction finetuning generalizes across architectures (encoder-decoder, decoder-only) and model sizes.", "zh": "展示指令微调在不同架构（编码器-解码器、仅解码器）和模型规模上的泛化性。"}, {"en": "Achieves state-of-the-art on MMLU (75.2% five-shot) and improves multilingual benchmarks like TyDiQA.", "zh": "在MMLU上达到最优（五次样本75.2%），并提升TyDiQA等多语言基准。"}, {"en": "Releases Flan-T5 checkpoints that outperform much larger models like PaLM 62B on few-shot tasks.", "zh": "发布Flan-T5检查点，在少样本任务上超越PaLM 62B等更大模型。"}, {"en": "Instruction finetuning is compute-efficient, using only 0.2% of pre-training compute for Flan-PaLM 540B.", "zh": "指令微调计算高效，Flan-PaLM 540B仅用预训练算力的0.2%。"}], "limits": [{"en": "Scaling number of tasks shows diminishing returns beyond 282 tasks.", "zh": "任务数量超过282个后规模扩张收益递减。"}, {"en": "Flan-PaLM does not surpass specialized models on algorithmic BBH tasks.", "zh": "Flan-PaLM在算法类BBH任务上未超越专用模型。"}, {"en": "Instruction finetuning without CoT data degrades reasoning performance on CoT tasks.", "zh": "不含思维链数据的指令微调会降低在思维链任务上的推理性能。"}, {"en": "Evaluation limited to English-centric and multilingual benchmarks; not tested on all languages.", "zh": "评估限于英语中心和多语言基准，未在所有语言上测试。"}, {"en": "Human evaluation uses single rater per example, which may introduce subjectivity.", "zh": "人工评估每个示例仅由一名评分者完成，可能引入主观性。"}]}, "cites": 4230}, {"id": "nzeghidour-2209.03143", "pid": "nzeghidour", "arxiv": "2209.03143", "date": "2022-09-07", "venue": "cs.SD", "org": "Google", "fields": ["deep-learning", "generative"], "tEn": "AudioLM: a Language Modeling Approach to Audio Generation", "tZh": "AudioLM：一种基于语言建模的音频生成方法", "sEn": "AudioLM generates high-quality audio with long-term consistency by treating audio generation as a language modeling task.", "sZh": "AudioLM 通过将音频生成视为语言建模任务，实现了高质量且具有长期一致性的音频生成。", "absEn": "We introduce AudioLM, a framework for high-quality audio generation with long-term consistency. AudioLM maps the input audio to a sequence of discrete tokens and casts audio generation as a language modeling task in this representation space. We show how existing audio tokenizers provide different trade-offs between reconstruction quality and long-term structure, and we propose a hybrid tokenization scheme to achieve both objectives. Namely, we leverage the discretized activations of a masked language model pre-trained on audio to capture long-term structure and the discrete codes produced by a neural audio codec to achieve high-quality synthesis. By training on large corpora of raw audio waveforms, AudioLM learns to generate natural and coherent continuations given short prompts. When trained on speech, and without any transcript or annotation, AudioLM generates syntactically and semantically plausible speech continuations while also maintaining speaker identity and prosody for unseen speakers. Furthermore, we demonstrate how our approach extends beyond speech by generating coherent piano music continuations, despite being trained without any symbolic representation of music.", "absZh": "我们提出了 AudioLM，一个用于高质量音频生成的框架，能够保持长期一致性。AudioLM 将输入音频映射为离散标记序列，并将音频生成视为该表示空间中的语言建模任务。我们展示了现有的音频分词器在重建质量和长期结构之间如何提供不同的权衡，并提出了一种混合分词方案以实现这两个目标。具体来说，我们利用预训练于音频的掩码语言模型的离散化激活来捕捉长期结构，并利用神经音频编解码器产生的离散码来实现高质量合成。通过在大量原始音频波形上训练，AudioLM 学会了在给定短提示的情况下生成自然且连贯的延续。当在语音上训练时，无需任何转录或标注，AudioLM 就能生成句法和语义上合理的语音延续，同时保持未见说话者的说话人身份和韵律。此外，我们展示了我们的方法如何扩展到语音之外，通过生成连贯的钢琴音乐延续，尽管训练时没有使用任何音乐的符号表示。", "insights": {"contrib": [{"en": "Proposes AudioLM, a framework combining semantic and acoustic tokens hierarchically for high-quality audio generation with long-term consistency.", "zh": "提出AudioLM框架，通过分层结合语义和声学标记，实现高质量且长期一致的音频生成。"}, {"en": "Demonstrates that semantic tokens from w2v-BERT capture linguistic content, while acoustic tokens from SoundStream ensure high-quality synthesis.", "zh": "证明w2v-BERT的语义标记捕捉语言内容，SoundStream的声学标记确保高质量合成。"}, {"en": "Shows AudioLM generates syntactically and semantically coherent speech continuations without text annotations, preserving speaker identity and prosody.", "zh": "展示AudioLM无需文本标注即可生成句法和语义连贯的语音延续，并保留说话人身份和韵律。"}, {"en": "Extends AudioLM to piano music continuation, generating coherent melodies and rhythms without symbolic music representations.", "zh": "将AudioLM扩展到钢琴音乐延续，无需符号音乐表示即可生成连贯的旋律和节奏。"}, {"en": "Provides a classifier that detects AudioLM-generated speech with 98.6% accuracy, mitigating misuse risks.", "zh": "提供分类器以98.6%的准确率检测AudioLM生成的语音，降低滥用风险。"}, {"en": "Achieves state-of-the-art lexical and syntactic knowledge in zero-shot metrics sWUGGY and sBLIMP without text supervision.", "zh": "在零样本指标sWUGGY和sBLIMP上达到最先进的词汇和句法知识，无需文本监督。"}], "limits": [{"en": "AudioLM is evaluated only on English speech and piano music; generalization to other audio types is not shown.", "zh": "AudioLM仅在英语语音和钢琴音乐上评估，未展示对其他音频类型的泛化能力。"}, {"en": "The framework requires pre-trained tokenizers (w2v-BERT, SoundStream) and multiple Transformer stages, leading to high computational cost.", "zh": "该框架需要预训练的标记器（w2v-BERT、SoundStream）和多阶段Transformer，导致高计算成本。"}, {"en": "Generated speech may reflect societal biases in training data and may not preserve accent/dialect for underrepresented groups.", "zh": "生成的语音可能反映训练数据中的社会偏见，且可能无法保留代表性不足群体的口音/方言。"}, {"en": "The model's ability to continue speech with speaker identity preservation poses risks of spoofing biometric identification or impersonation.", "zh": "模型保留说话人身份延续语音的能力存在欺骗生物识别或冒充他人的风险。"}, {"en": "Human evaluation shows generated speech is nearly indistinguishable from real speech, raising ethical concerns despite high detection accuracy.", "zh": "人工评估显示生成的语音几乎无法与真实语音区分，尽管检测准确率高，但仍引发伦理问题。"}]}, "cites": 966}, {"id": "jonathanho-2207.12598", "pid": "jonathanho", "arxiv": "2207.12598", "date": "2022-07-26", "venue": "cs.LG", "org": "Google", "fields": ["generative", "deep-learning"], "tEn": "Classifier-Free Diffusion Guidance", "tZh": "无分类器扩散引导", "sEn": "Classifier-free guidance combines conditional and unconditional diffusion models to trade off sample quality and diversity without a separate classifier.", "sZh": "无分类器引导通过联合训练条件和无条件扩散模型，结合两者的分数估计，在不依赖独立分类器的情况下实现样本质量与多样性的权衡。", "absEn": "Classifier guidance is a recently introduced method to trade off mode coverage and sample fidelity in conditional diffusion models post training, in the same spirit as low temperature sampling or truncation in other types of generative models. Classifier guidance combines the score estimate of a diffusion model with the gradient of an image classifier and thereby requires training an image classifier separate from the diffusion model. It also raises the question of whether guidance can be performed without a classifier. We show that guidance can be indeed performed by a pure generative model without such a classifier: in what we call classifier-free guidance, we jointly train a conditional and an unconditional diffusion model, and we combine the resulting conditional and unconditional score estimates to attain a trade-off between sample quality and diversity similar to that obtained using classifier guidance.", "absZh": "分类器引导是一种新引入的方法，用于在条件扩散模型训练后权衡模式覆盖率和样本保真度，其精神类似于其他生成模型中的低温采样或截断。分类器引导将扩散模型的分数估计与图像分类器的梯度相结合，因此需要训练一个独立于扩散模型的图像分类器。这也引发了一个问题：是否可以在没有分类器的情况下进行引导。我们证明，引导确实可以通过纯生成模型实现，而无需这样的分类器：在我们称之为无分类器引导的方法中，我们联合训练一个条件扩散模型和一个无条件扩散模型，并将得到的条件分数估计和无条件分数估计相结合，以达到与使用分类器引导类似的样本质量和多样性之间的权衡。", "insights": {"contrib": [{"en": "Proposes classifier-free guidance, a method to trade off sample quality and diversity in diffusion models without a classifier.", "zh": "提出无分类器引导，一种无需分类器即可在扩散模型中权衡样本质量和多样性的方法。"}, {"en": "Jointly trains conditional and unconditional diffusion models using a single neural network by randomly dropping conditioning.", "zh": "通过随机丢弃条件信息，使用单一神经网络联合训练条件和无条件扩散模型。"}, {"en": "Demonstrates that classifier-free guidance achieves FID/IS tradeoffs comparable to classifier guidance on ImageNet.", "zh": "证明无分类器引导在ImageNet上实现了与分类器引导相当的FID/IS权衡。"}, {"en": "Shows that pure generative models can boost classifier-based metrics without adversarial classifier gradients.", "zh": "表明纯生成模型可以在没有对抗性分类器梯度的情况下提升基于分类器的指标。"}, {"en": "Provides an intuitive explanation: guidance decreases unconditional likelihood while increasing conditional likelihood.", "zh": "提供直观解释：引导降低无条件似然同时增加条件似然。"}, {"en": "Achieves state-of-the-art FID on 128x128 ImageNet, outperforming classifier-guided ADM-G and BigGAN-deep.", "zh": "在128x128 ImageNet上取得最先进FID，优于分类器引导的ADM-G和BigGAN-deep。"}], "limits": [{"en": "Requires two forward passes per sampling step, reducing sampling speed compared to classifier guidance.", "zh": "每个采样步骤需要两次前向传播，与分类器引导相比降低了采样速度。"}, {"en": "Relies on training an unconditional model, which may be inefficient for high-dimensional conditioning.", "zh": "依赖于训练无条件模型，对于高维条件可能效率低下。"}, {"en": "Decreased sample diversity may have negative impacts in deployed models, especially for underrepresented data.", "zh": "样本多样性降低可能对部署模型产生负面影响，尤其是对代表性不足的数据。"}, {"en": "Hyperparameter puncond requires tuning; optimal value may vary across datasets.", "zh": "超参数puncond需要调优；最优值可能因数据集而异。"}, {"en": "Method is demonstrated only on ImageNet; generalizability to other modalities is not explored.", "zh": "该方法仅在ImageNet上验证；对其他模态的泛化性尚未探索。"}]}, "cites": 6509}, {"id": "jasonwei-2206.07682", "pid": "jasonwei", "arxiv": "2206.07682", "date": "2022-06-15", "venue": "cs.CL", "org": "Google", "fields": ["nlp", "deep-learning"], "tEn": "Emergent Abilities of Large Language Models", "tZh": "大型语言模型的涌现能力", "sEn": "Emergent abilities are unpredictable capabilities that appear only in large language models, not in smaller ones.", "sZh": "涌现能力是指仅在大型语言模型中出现、而在较小模型中不存在的不可预测的能力。", "absEn": "Scaling up language models has been shown to predictably improve performance and sample efficiency on a wide range of downstream tasks. This paper instead discusses an unpredictable phenomenon that we refer to as emergent abilities of large language models. We consider an ability to be emergent if it is not present in smaller models but is present in larger models. Thus, emergent abilities cannot be predicted simply by extrapolating the performance of smaller models. The existence of such emergence implies that additional scaling could further expand the range of capabilities of language models.", "absZh": "扩展语言模型已被证明可以可预测地提高在广泛下游任务上的性能和样本效率。然而，本文讨论了一种不可预测的现象，我们称之为大型语言模型的涌现能力。我们认为，如果一种能力在较小模型中不存在，但在较大模型中出现，那么它就是涌现的。因此，涌现能力不能简单地通过外推较小模型的性能来预测。这种涌现的存在意味着进一步扩展可能会扩大语言模型的能力范围。", "insights": {"contrib": [{"en": "Defines emergent abilities as abilities present in large models but absent in smaller ones, unpredictable via scaling laws.", "zh": "将涌现能力定义为大模型具备而小模型不具备的能力，无法通过缩放定律预测。"}, {"en": "Documents emergent abilities across few-shot prompting, chain-of-thought, instruction following, and program execution.", "zh": "记录了少样本提示、思维链、指令遵循和程序执行等场景中的涌现能力。"}, {"en": "Shows emergent abilities appear as phase transitions in scaling curves, with performance jumping from random to above-random at a threshold.", "zh": "展示涌现能力在缩放曲线中表现为相变，性能在阈值处从随机跃升至显著高于随机。"}, {"en": "Discusses that emergent abilities are not solely determined by scale; architecture, data quality, and training procedures also matter.", "zh": "讨论涌现能力并非仅由规模决定；架构、数据质量和训练过程同样重要。"}, {"en": "Highlights emergent risks such as bias, toxicity, and memorization that can increase with scale.", "zh": "强调随规模增加而涌现的风险，如偏见、毒性和记忆化。"}, {"en": "Proposes future directions including further scaling, improved architectures, data scaling, and understanding emergence.", "zh": "提出未来方向，包括进一步扩展、改进架构、数据扩展和理解涌现。"}], "limits": [{"en": "Emergent abilities are defined only for pre-trained Transformer language models, not other architectures.", "zh": "涌现能力仅针对预训练Transformer语言模型定义，不适用于其他架构。"}, {"en": "The paper does not propose new methods or models; it surveys existing results.", "zh": "本文未提出新方法或模型，仅综述现有结果。"}, {"en": "Emergence may be an artifact of evaluation metrics like exact match, which ignore partial progress.", "zh": "涌现可能是评估指标（如精确匹配）的假象，忽略了部分进展。"}, {"en": "The scale at which emergence occurs is not fixed; it depends on data quality, architecture, and training.", "zh": "涌现发生的规模并非固定，取决于数据质量、架构和训练。"}, {"en": "Some abilities may never emerge due to distributional mismatch or plateauing after emergence.", "zh": "某些能力可能因分布不匹配或涌现后停滞而永远不会出现。"}]}, "cites": 3617}, {"id": "tkarras-2206.00364", "pid": "tkarras", "arxiv": "2206.00364", "date": "2022-06-01", "venue": "cs.CV", "org": "NVIDIA", "fields": ["generative", "deep-learning"], "tEn": "Elucidating the Design Space of Diffusion-Based Generative Models", "tZh": "阐明扩散生成模型的设计空间", "sEn": "We present a clear design space for diffusion models, achieving state-of-the-art FID scores with faster sampling.", "sZh": "我们提出了一个清晰的扩散模型设计空间，实现了更快的采样速度和最先进的FID分数。", "absEn": "We argue that the theory and practice of diffusion-based generative models are currently unnecessarily convoluted and seek to remedy the situation by presenting a design space that clearly separates the concrete design choices. This lets us identify several changes to both the sampling and training processes, as well as preconditioning of the score networks. Together, our improvements yield new state-of-the-art FID of 1.79 for CIFAR-10 in a class-conditional setting and 1.97 in an unconditional setting, with much faster sampling (35 network evaluations per image) than prior designs. To further demonstrate their modular nature, we show that our design changes dramatically improve both the efficiency and quality obtainable with pre-trained score networks from previous work, including improving the FID of a previously trained ImageNet-64 model from 2.07 to near-SOTA 1.55, and after re-training with our proposed improvements to a new SOTA of 1.36.", "absZh": "我们认为，当前扩散生成模型的理论和实践不必要地复杂，并试图通过提出一个清晰分离具体设计选择的设计空间来改善这一状况。这使我们能够识别采样和训练过程中的若干变化，以及分数网络的预处理。综合这些改进，我们在CIFAR-10上实现了新的最先进FID：类条件设置为1.79，无条件设置为1.97，且采样速度更快（每张图像仅需35次网络评估）。为了进一步展示其模块化特性，我们证明我们的设计变更显著提高了先前工作中预训练分数网络的效率和质量，包括将先前训练的ImageNet-64模型的FID从2.07提升至接近最先进的1.55，并在使用我们提出的改进重新训练后达到新的最先进水平1.36。", "insights": {"contrib": [{"en": "Presents a disentangled design space for diffusion-based generative models, separating concrete design choices.", "zh": "提出了扩散生成模型的解耦设计空间，将具体设计选择分离。"}, {"en": "Identifies improvements to sampling, training, and score network preconditioning.", "zh": "识别出采样、训练和分数网络预处理的改进。"}, {"en": "Achieves new state-of-the-art FID of 1.79 on CIFAR-10 class-conditional and 1.97 unconditional.", "zh": "在CIFAR-10上实现了新的最优FID：有类别条件1.79，无类别条件1.97。"}, {"en": "Enables much faster sampling with 35 network evaluations per image.", "zh": "实现更快的采样，每张图像仅需35次网络评估。"}, {"en": "Improves pre-trained score networks, e.g., ImageNet-64 FID from 2.07 to 1.55.", "zh": "改进预训练分数网络，例如ImageNet-64的FID从2.07提升至1.55。"}, {"en": "After retraining, achieves new SOTA FID of 1.36 on ImageNet-64.", "zh": "重新训练后，在ImageNet-64上达到新的最优FID 1.36。"}], "limits": [{"en": "Evaluation limited to image generation tasks (CIFAR-10, ImageNet-64).", "zh": "评估仅限于图像生成任务（CIFAR-10、ImageNet-64）。"}, {"en": "Design space may not generalize to other data modalities like text or audio.", "zh": "设计空间可能无法泛化到文本或音频等其他数据模态。"}, {"en": "Improvements rely on specific network architectures and hyperparameters.", "zh": "改进依赖于特定的网络架构和超参数。"}, {"en": "Computational cost of retraining may be high for large-scale models.", "zh": "大规模模型的重新训练计算成本可能较高。"}, {"en": "Theoretical understanding of design choices remains incomplete.", "zh": "对设计选择的理论理解仍不完整。"}]}, "cites": 3521}, {"id": "tridao-2205.14135", "pid": "tridao", "arxiv": "2205.14135", "date": "2022-05-27", "venue": "cs.LG", "fields": ["efficiency", "nlp"], "tEn": "FlashAttention: Fast and Memory-Efficient Exact Attention with IO-Awareness", "tZh": "FlashAttention：快速且内存高效的精确注意力机制，具有IO感知能力", "sEn": "FlashAttention reduces GPU memory reads/writes via tiling, achieving faster training and longer context for Transformers.", "sZh": "FlashAttention通过分块减少GPU内存读写，实现更快的训练速度和更长的上下文支持。", "absEn": "Transformers are slow and memory-hungry on long sequences, since the time and memory complexity of self-attention are quadratic in sequence length. Approximate attention methods have attempted to address this problem by trading off model quality to reduce the compute complexity, but often do not achieve wall-clock speedup. We argue that a missing principle is making attention algorithms IO-aware -- accounting for reads and writes between levels of GPU memory. We propose FlashAttention, an IO-aware exact attention algorithm that uses tiling to reduce the number of memory reads/writes between GPU high bandwidth memory (HBM) and GPU on-chip SRAM. We analyze the IO complexity of FlashAttention, showing that it requires fewer HBM accesses than standard attention, and is optimal for a range of SRAM sizes. We also extend FlashAttention to block-sparse attention, yielding an approximate attention algorithm that is faster than any existing approximate attention method. FlashAttention trains Transformers faster than existing baselines: 15% end-to-end wall-clock speedup on BERT-large (seq. length 512) compared to the MLPerf 1.1 training speed record, 3$\\times$ speedup on GPT-2 (seq. length 1K), and 2.4$\\times$ speedup on long-range arena (seq. length 1K-4K). FlashAttention and block-sparse FlashAttention enable longer context in Transformers, yielding higher quality models (0.7 better perplexity on GPT-2 and 6.4 points of lift on long-document classification) and entirely new capabilities: the first Transformers to achieve better-than-chance performance on the Path-X challenge (seq. length 16K, 61.4% accuracy) and Path-256 (seq. length 64K, 63.1% accuracy).", "absZh": "Transformer在处理长序列时速度慢且内存消耗大，因为自注意力的时间和内存复杂度与序列长度呈二次方关系。近似注意力方法试图通过牺牲模型质量来降低计算复杂度，但通常无法实现实际加速。我们认为缺失的原则是使注意力算法具有IO感知能力——即考虑GPU内存层级之间的读写操作。我们提出了FlashAttention，一种具有IO感知能力的精确注意力算法，它使用分块技术来减少GPU高带宽内存（HBM）和片上SRAM之间的内存读写次数。我们分析了FlashAttention的IO复杂度，表明它比标准注意力需要更少的HBM访问，并且在多种SRAM大小下都是最优的。我们还将FlashAttention扩展到块稀疏注意力，产生了一种比任何现有近似注意力方法更快的近似注意力算法。FlashAttention训练Transfor
