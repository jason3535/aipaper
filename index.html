<style>
:root{--ink:#1d1d1f;--sub:#6e6e73;--line:#e6e6ea;--bg:#fff;--surface:#f5f5f7;--surface2:#fafafa;--acc:#0a76e9;

*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,system-ui,"PingFang SC","Hiragino Sans GB",sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;line-height:1.6}
a{color:inherit;text-decoration:none}
.wrap{max-width:920px;margin:0 auto;padding:0 22px}
header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(18px);border-bottom:1px solid var(--line)}
.nav{max-width:1100px;margin:0 auto;padding:13px 22px;display:flex;align-items:center;gap:26px}
.brand{font-weight:700;letter-spacing:.3px;display:flex;align-items:center;gap:8px}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--acc)}
.nav .links{margin-left:auto;display:flex;gap:24px;font-size:15px;color:var(--sub)}
.nav .links a:hover{color:var(--ink)}
h1,h2,h3{letter-spacing:-.01em}
.eyebrow{font-size:13px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--acc)}
.title{font-size:30px;font-weight:700;margin:8px 0 0}
section{padding:46px 0}
.sub{color:var(--sub);font-size:16px;margin-top:8px}
.hero{padding:64px 0 30px}
.hero h1{font-size:46px;line-height:1.12;margin:14px 0 0;font-weight:700}
.hero .lead{color:var(--sub);font-size:19px;margin-top:18px;max-width:680px}
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
.chip{font-size:14px;color:var(--sub);background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:7px 14px;cursor:pointer}
.chip.on,.chip:hover{color:#fff;background:var(--ink);border-color:var(--ink)}
.fdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:1px}
.grid{display:grid;gap:16px}
.ppl-grid{grid-template-columns:repeat(auto-fill,minmax(190px,1fr))}
.ppl-card{background:var(--surface2);border:1px solid var(--line);border-radius:18px;padding:22px 18px;text-align:center;cursor:pointer;transition:.15s}
.ppl-card:hover{transform:translateY(-3px);box-shadow:0 14px 34px rgba(20,22,30,.08)}
.av{width:84px;height:84px;border-radius:50%;margin:0 auto 12px;display:grid;place-items:center;font-weight:700;color:#fff;font-size:26px;overflow:hidden;background:linear-gradient(135deg,#9aa4b2,#6b7280)}
.av img{width:100%;height:100%;object-fit:cover}
.ppl-card .n{font-weight:650}.ppl-card .nz{color:var(--sub);font-size:14px}
.ppl-card .ti{color:var(--sub);font-size:12.5px;margin-top:6px;min-height:32px}
.ppl-card .cnt{margin-top:10px;font-size:12px;color:var(--acc);font-weight:600}
.paper-card{display:block;background:var(--surface2);border:1px solid var(--line);border-radius:16px;padding:20px 22px;cursor:pointer;transition:.15s}
.paper-card:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(20,22,30,.07)}
.paper-card .pt{font-weight:650;font-size:18px}
.paper-card .ptz{color:var(--sub);font-size:15px;margin-top:3px}
.paper-card .meta{margin-top:10px;font-size:13px;color:var(--sub);display:flex;gap:12px;flex-wrap:wrap}
.tag{font-size:12px;border-radius:7px;padding:3px 9px;color:#fff}
.row{display:flex;gap:18px;align-items:center}
.bigav{width:108px;height:108px;border-radius:50%;overflow:hidden;display:grid;place-items:center;color:#fff;font-weight:700;font-size:34px;background:linear-gradient(135deg,#9aa4b2,#6b7280);flex:none}
.bigav img{width:100%;height:100%;object-fit:cover}
.bio{color:#333;font-size:16px;margin-top:16px;max-width:720px}
.bioz{color:var(--sub);font-size:15px;margin-top:6px;max-width:720px}
.cards2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}
.icard{background:var(--surface2);border:1px solid var(--line);border-radius:16px;padding:18px 20px}
.icard h4{margin:0 0 10px;font-size:14px;letter-spacing:.06em}
.icard li{margin:9px 0;font-size:15px}.icard li .z{color:var(--sub);font-size:13.5px;display:block}
.reader{margin-top:22px}
.sec-h{font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--acc);margin:30px 0 4px}
.sec-hz{font-size:18px;font-weight:650;margin:0 0 14px}
.para{padding:12px 0;border-bottom:1px solid var(--line)}
.para .en{font-size:16px}
.para .zh{font-size:16px;color:#3a3a3e;margin-top:7px}
.skeleton{height:14px;background:linear-gradient(90deg,#eee,#f6f6f6,#eee);border-radius:6px;margin:10px 0;animation:sk 1.3s infinite}
@keyframes sk{0%{opacity:.6}50%{opacity:1}100%{opacity:.6}}
.askbox{margin-top:22px;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:18px}
.askbox input{width:100%;border:1px solid var(--line);border-radius:12px;padding:13px 15px;font-size:15px;font-family:inherit}
.askbtn{margin-top:10px;background:var(--acc);color:#fff;border:none;border-radius:11px;padding:11px 20px;font-size:15px;font-weight:600;cursor:pointer}
.ans{margin-top:14px;font-size:15px;white-space:pre-wrap;color:#222}
.qsugg{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.qsugg span{font-size:13px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 13px;cursor:pointer;color:var(--sub)}
.back{color:var(--sub);font-size:14px;cursor:pointer;display:inline-block;margin-bottom:6px}
.alink{color:var(--acc);font-weight:600}
.citebar{margin-top:16px;background:linear-gradient(100deg,#eef5ff,#f6f0ff);border:1px solid #dfe7f5;border-radius:14px;padding:14px 18px;font-size:15px;color:#333}

.citeico{display:inline-flex;align-items:center;gap:4px}
.citeico svg{width:13px;height:13px;opacity:.65}
.citebar .num{font-size:26px;font-weight:750;color:var(--acc);margin-right:6px;letter-spacing:-.01em}
footer{border-top:1px solid var(--line);margin-top:40px;padding:30px 0;color:var(--sub);font-size:13px}
.legal{background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-top:16px;line-height:1.7}
/* dark mode */
[data-theme="dark"]{--ink:#f5f5f7;--sub:#a1a1a6;--line:#2a2a2c;--bg:#000;--surface:#1c1c1e;--surface2:#161618;--acc:#2997ff}

[data-theme="dark"] .paper-card,[data-theme="dark"] .ppl-card,[data-theme="dark"] .icard,[data-theme="dark"] .askbox{background:#1c1c1e}
[data-theme="dark"] .citebar{background:linear-gradient(100deg,#152034,#1d1830);border-color:#2a3550;color:#dfe4ee}
[data-theme="dark"] .askbox input{background:#0e0e10;color:var(--ink);border-color:#2a2a30}
[data-theme="dark"] .para .zh{color:#c9c9d0}
[data-theme="dark"] .qsugg span{background:#1c1c1e}
[data-theme="dark"] .seg button.on{background:#3a3a3c}
[data-theme="dark"] .sel-btn{box-shadow:0 8px 30px rgba(0,0,0,.5)}
.pfig img{background:#fff}
body[data-lang="zh"] .para .en{display:none}
body[data-lang="en"] .para .zh{display:none}
.pfig{margin:20px 0;text-align:center}
.pfig img{max-width:100%;border:1px solid var(--line);border-radius:10px;background:#fff}
.pfig figcaption{font-size:13px;color:var(--sub);margin-top:8px;text-align:left;line-height:1.6}
.pfig figcaption .lang-zh{display:block;margin-top:2px}
.peq{overflow-x:auto;padding:6px 0;margin:6px 0}
body[data-lang="zh"] .lang-en{display:none}body[data-lang="en"] .lang-zh{display:none}
.navspace{margin-left:auto}.navtools{display:flex;gap:10px;align-items:center}
.seg{display:inline-flex;background:var(--surface2);border-radius:9px;padding:2px}
.seg button{border:none;background:transparent;font-family:inherit;font-size:12.5px;color:var(--sub);padding:5px 11px;border-radius:7px;cursor:pointer;font-weight:600;transition:.15s}
.seg button.on{background:var(--bg);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.12)}
.icon{width:38px;height:38px;border:none;background:transparent;border-radius:9px;display:grid;place-items:center;cursor:pointer;color:var(--sub);transition:.15s}
.icon:hover{background:var(--surface2);color:var(--ink)}.icon svg{width:18px;height:18px}
.sel-bar{position:absolute;display:none;align-items:center;gap:7px;z-index:130;transform:translateX(-50%)}
.sel-btn{display:inline-flex;align-items:center;gap:6px;background:var(--surface);color:var(--ink);border:1px solid var(--line);border-radius:980px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 8px 30px rgba(0,0,0,.18);font-family:inherit;white-space:nowrap}
.hl-locate{background:rgba(41,151,255,.22);border-radius:4px;box-shadow:0 0 0 3px rgba(41,151,255,.22);transition:background .4s}
.orgchip{display:inline-flex;align-items:center;font-size:12px;font-weight:600;color:#fff;border-radius:7px;padding:3px 9px}
.orgchip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--ink);background:var(--surface2);border:1px solid var(--line);border-radius:7px;padding:3px 9px 3px 5px}
.orglogo{width:15px;height:15px;border-radius:3px;object-fit:contain;background:#fff}
.orgav{overflow:hidden;background:#fff}
.orgavimg{width:100%;height:100%;object-fit:contain;padding:14px;background:#fff}
.sharebtn{font-size:14px;border:1px solid var(--line);background:var(--surface);border-radius:10px;padding:7px 14px;cursor:pointer;color:var(--ink);font-weight:600}
@media(max-width:680px){.cards2{grid-template-columns:1fr}.nav .links{gap:16px}.hero h1{font-size:34px}}
</style>

const PAPERS = [{"id": "deepseek-2606.19348", "pid": "deepseek", "arxiv": "2606.19348", "date": "2026-04-26", "venue": "cs.CL", "fields": ["nlp", "efficiency"], "tEn": "DeepSeek-V4: Towards Highly Efficient Million-Token Context Intelligence", "tZh": "DeepSeek-V4：迈向高效百万Token上下文智能", "sEn": "DeepSeek-V4 series achieves state-of-the-art efficiency in million-token contexts with hybrid attention and novel optimizers.", "sZh": "DeepSeek-V4系列通过混合注意力机制和新优化器，在百万Token上下文中实现了最先进的效率。", "absEn": "We present a preview version of DeepSeek-V4 series, including two strong Mixture-of-Experts (MoE) language models -- DeepSeek-V4-Pro with 1.6T parameters (49B activated) and DeepSeek-V4-Flash with 284B parameters (13B activated) -- both supporting a context length of one million tokens. DeepSeek-V4 series incorporate several key upgrades in architecture and optimization: (1) a hybrid attention architecture that combines Compressed Sparse Attention (CSA) and Heavily Compressed Attention (HCA) to improve long-context efficiency; (2) Manifold-Constrained Hyper-Connections (mHC) that enhance conventional residual connections; (3) and the Muon optimizer for faster convergence and greater training stability. We pre-train both models on more than 32T diverse and high-quality tokens, followed by a comprehensive post-training pipeline that unlocks and further enhances their capabilities. DeepSeek-V4-Pro-Max, the maximum reasoning effort mode of DeepSeek-V4-Pro, redefines the state-of-the-art for open models, outperforming its predecessors in core tasks. Meanwhile, DeepSeek-V4 series are highly efficient in long-context scenarios. In the one-million-token context setting, DeepSeek-V4-Pro requires only 27% of single-token inference FLOPs and 10% of KV cache compared with DeepSeek-V3.2. This enables us to routinely support one-million-token contexts, thereby making long-horizon tasks and further test-time scaling more feasible. The model checkpoints are available at https://huggingface.co/collections/deepseek-ai/deepseek-v4.", "absZh": "我们发布了DeepSeek-V4系列的预览版，包括两个强大的混合专家（MoE）语言模型——DeepSeek-V4-Pro（1.6T参数，49B激活）和DeepSeek-V4-Flash（284B参数，13B激活），两者均支持百万Token的上下文长度。DeepSeek-V4系列在架构和优化方面引入了多项关键升级：（1）混合注意力架构，结合了压缩稀疏注意力（CSA）和重度压缩注意力（HCA），以提高长上下文效率；（2）流形约束超连接（mHC），增强了传统的残差连接；（3）Muon优化器，实现更快的收敛和更高的训练稳定性。我们在超过32T多样且高质量的Token上预训练了这两个模型，随后通过全面的后训练流程解锁并进一步增强其能力。DeepSeek-V4-Pro-Max是DeepSeek-V4-Pro的最大推理努力模式，重新定义了开放模型的最先进水平，在核心任务上超越了其前代。同时，DeepSeek-V4系列在长上下文场景中效率极高。在百万Token上下文设置下，与DeepSeek-V3.2相比，DeepSeek-V4-Pro仅需27%的单Token推理FLOPs和10%的KV缓存。这使得我们能够常规支持百万Token上下文，从而使长周期任务和进一步的测试时扩展更加可行。模型检查点可在https://huggingface.co/collections/deepseek-ai/deepseek-v4获取。", "insights": {"contrib": [{"en": "Proposes hybrid attention (CSA+HCA) for million-token context with 73% FLOPs reduction.", "zh": "提出混合注意力机制（CSA+HCA），实现百万词元上下文，FLOPs降低73%。"}, {"en": "Introduces Manifold-Constrained Hyper-Connections (mHC) to improve residual connections.", "zh": "引入流形约束超连接（mHC）改进残差连接。"}, {"en": "Adopts Muon optimizer for faster convergence and greater training stability.", "zh": "采用Muon优化器实现更快收敛和更高训练稳定性。"}, {"en": "DeepSeek-V4-Pro-Max sets new SOTA for open models on core tasks.", "zh": "DeepSeek-V4-Pro-Max在核心任务上为开放模型树立新标杆。"}, {"en": "Achieves 10% KV cache and 27% FLOPs vs DeepSeek-V3.2 at 1M context.", "zh": "在百万词元上下文中，KV缓存和FLOPs分别仅为DeepSeek-V3.2的10%和27%。"}, {"en": "Pre-trained on 32T tokens with comprehensive post-training pipeline.", "zh": "在32T词元上预训练，并配有全面的后训练流程。"}], "limits": [{"en": "Only preview version; full evaluation and reproducibility details pending.", "zh": "仅为预览版本，完整评估和可复现细节待公布。"}, {"en": "Extreme scale (1.6T parameters) limits deployment to resource-rich settings.", "zh": "极端规模（1.6T参数）限制部署于资源丰富环境。"}, {"en": "Long-context efficiency gains may not generalize to all downstream tasks.", "zh": "长上下文效率提升可能无法泛化到所有下游任务。"}, {"en": "Hybrid attention design adds architectural complexity and tuning overhead.", "zh": "混合注意力设计增加架构复杂度和调优开销。"}, {"en": "Performance on specialized domains (e.g., code, math) not extensively reported.", "zh": "在专业领域（如代码、数学）的性能未广泛报告。"}]}, "org": "DeepSeek"}, {"id": "dayaguo-2501.12948", "pid": "dayaguo", "arxiv": "2501.12948", "date": "2025-01-22", "venue": "cs.CL", "org": "DeepSeek", "fields": ["nlp", "rl"], "tEn": "DeepSeek-R1: Incentivizing Reasoning Capability in LLMs via Reinforcement Learning", "tZh": "DeepSeek-R1：通过强化学习激励大语言模型的推理能力", "sEn": "Pure reinforcement learning can incentivize reasoning abilities in LLMs without human demonstrations.", "sZh": "纯强化学习无需人类示范即可激励大语言模型的推理能力。", "absEn": "General reasoning represents a long-standing and formidable challenge in artificial intelligence. Recent breakthroughs, exemplified by large language models (LLMs) and chain-of-thought prompting, have achieved considerable success on foundational reasoning tasks. However, this success is heavily contingent upon extensive human-annotated demonstrations, and models' capabilities are still insufficient for more complex problems. Here we show that the reasoning abilities of LLMs can be incentivized through pure reinforcement learning (RL), obviating the need for human-labeled reasoning trajectories. The proposed RL framework facilitates the emergent development of advanced reasoning patterns, such as self-reflection, verification, and dynamic strategy adaptation. Consequently, the trained model achieves superior performance on verifiable tasks such as mathematics, coding competitions, and STEM fields, surpassing its counterparts trained via conventional supervised learning on human demonstrations. Moreover, the emergent reasoning patterns exhibited by these large-scale models can be systematically harnessed to guide and enhance the reasoning capabilities of smaller models.", "absZh": "通用推理是人工智能中一个长期且艰巨的挑战。最近的突破，例如大型语言模型（LLM）和思维链提示，在基础推理任务上取得了显著成功。然而，这种成功严重依赖于大量人工标注的示范，且模型的能力对于更复杂的问题仍显不足。本文表明，通过纯强化学习（RL）可以激励LLM的推理能力，从而无需人工标注的推理轨迹。所提出的RL框架促进了高级推理模式（如自我反思、验证和动态策略调整）的涌现发展。因此，训练后的模型在数学、编程竞赛和STEM领域等可验证任务上表现出色，超越了通过传统监督学习在人类示范上训练的同类模型。此外，这些大规模模型涌现出的推理模式可以被系统地利用，以指导和增强较小模型的推理能力。", "insights": {"contrib": [{"en": "Shows LLM reasoning can be incentivized via pure RL without human-annotated demonstrations.", "zh": "展示了无需人工标注示范，仅通过强化学习即可激发大语言模型的推理能力。"}, {"en": "Introduces DeepSeek-R1-Zero, a model trained via large-scale RL without supervised fine-tuning, achieving strong reasoning performance.", "zh": "提出了 DeepSeek-R1-Zero，该模型通过大规模强化学习训练，无需监督微调即实现了强大的推理性能。"}, {"en": "Develops DeepSeek-R1 with multi-stage training and cold-start data, achieving performance comparable to OpenAI-o1-1217 on reasoning tasks.", "zh": "开发了 DeepSeek-R1，采用多阶段训练和冷启动数据，在推理任务上达到与 OpenAI-o1-1217 相当的性能。"}, {"en": "Demonstrates emergent reasoning behaviors like self-reflection, verification, and dynamic strategy adaptation through RL.", "zh": "展示了通过强化学习涌现的自我反思、验证和动态策略调整等推理行为。"}, {"en": "Shows that reasoning patterns from larger models can be distilled into smaller models, outperforming RL-trained small models.", "zh": "表明大模型的推理模式可蒸馏到小模型，且性能优于小模型自身强化学习训练的结果。"}, {"en": "Open-sources DeepSeek-R1-Zero, DeepSeek-R1, and six distilled dense models to support the research community.", "zh": "开源了 DeepSeek-R1-Zero、DeepSeek-R1 以及六个蒸馏稠密模型，以支持研究社区。"}], "limits": [{"en": "DeepSeek-R1-Zero suffers from poor readability and language mixing issues.", "zh": "DeepSeek-R1-Zero 存在可读性差和语言混杂的问题。"}, {"en": "DeepSeek-R1's general capabilities in function calling, multi-turn, and complex role-playing are inferior to DeepSeek-V3.", "zh": "DeepSeek-R1 在函数调用、多轮对话和复杂角色扮演等通用能力上不如 DeepSeek-V3。"}, {"en": "Language mixing occurs for queries in languages other than Chinese and English.", "zh": "对于中英文以外的查询，存在语言混杂问题。"}, {"en": "DeepSeek-R1 is sensitive to prompts; few-shot prompting degrades its performance.", "zh": "DeepSeek-R1 对提示敏感，少样本提示会降低其性能。"}, {"en": "Large-scale RL has not been extensively applied to software engineering tasks due to long evaluation times.", "zh": "由于评估时间长，大规模强化学习尚未广泛应用于软件工程任务。"}]}, "cites": 5339}, {"id": "kimiteam-2501.12599", "pid": "kimiteam", "arxiv": "2501.12599", "date": "2025-01-22", "venue": "cs.AI", "org": "Moonshot AI", "fields": ["nlp", "rl"], "tEn": "Kimi k1.5: Scaling Reinforcement Learning with LLMs", "tZh": "Kimi k1.5：通过强化学习扩展大语言模型", "sEn": "Kimi k1.5 achieves state-of-the-art reasoning performance by scaling reinforcement learning with long context and improved policy optimization, matching OpenAI's o1.", "sZh": "Kimi k1.5通过长上下文和优化的策略方法扩展强化学习，在多项基准上达到与OpenAI o1相当的最优推理性能。", "absEn": "Language model pretraining with next token prediction has proved effective for scaling compute but is limited to the amount of available training data. Scaling reinforcement learning (RL) unlocks a new axis for the continued improvement of artificial intelligence, with the promise that large language models (LLMs) can scale their training data by learning to explore with rewards. However, prior published work has not produced competitive results. In light of this, we report on the training practice of Kimi k1.5, our latest multi-modal LLM trained with RL, including its RL training techniques, multi-modal data recipes, and infrastructure optimization. Long context scaling and improved policy optimization methods are key ingredients of our approach, which establishes a simplistic, effective RL framework without relying on more complex techniques such as Monte Carlo tree search, value functions, and process reward models. Notably, our system achieves state-of-the-art reasoning performance across multiple benchmarks and modalities -- e.g., 77.5 on AIME, 96.2 on MATH 500, 94-th percentile on Codeforces, 74.9 on MathVista -- matching OpenAI's o1. Moreover, we present effective long2short methods that use long-CoT techniques to improve short-CoT models, yielding state-of-the-art short-CoT reasoning results -- e.g., 60.8 on AIME, 94.6 on MATH500, 47.3 on LiveCodeBench -- outperforming existing short-CoT models such as GPT-4o and Claude Sonnet 3.5 by a large margin (up to +550%).", "absZh": "基于下一个词预测的语言模型预训练在扩展计算方面已被证明有效，但受限于可用训练数据量。扩展强化学习为人工智能的持续改进开辟了新维度，其前景在于大语言模型可以通过学习基于奖励进行探索来扩展训练数据。然而，先前已发表的工作并未产生有竞争力的结果。鉴于此，我们报告了Kimi k1.5（我们最新的多模态大语言模型，通过强化学习训练）的训练实践，包括其强化学习训练技术、多模态数据方案和基础设施优化。长上下文扩展和改进的策略优化方法是我们方法的关键要素，它建立了一个简单有效的强化学习框架，无需依赖更复杂的技术，如蒙特卡洛树搜索、价值函数和过程奖励模型。值得注意的是，我们的系统在多个基准和模态上实现了最先进的推理性能——例如，AIME 77.5，MATH 500 96.2，Codeforces 94百分位，MathVista 74.9——与OpenAI的o1相当。此外，我们提出了有效的长转短方法，利用长思维链技术改进短思维链模型，产生了最先进的短思维链推理结果——例如，AIME 60.8，MATH500 94.6，LiveCodeBench 47.3——大幅超越现有的短思维链模型，如GPT-4o和Claude Sonnet 3.5（提升高达+550%）。", "insights": {"contrib": [{"en": "Proposes a simplistic RL framework for LLMs using long context scaling and improved policy optimization, achieving state-of-the-art reasoning without complex techniques like Monte Carlo tree search.", "zh": "提出一种基于长上下文缩放和改进策略优化的简化RL框架，无需蒙特卡洛树搜索等复杂技术，实现最先进的推理性能。"}, {"en": "Introduces partial rollouts to efficiently scale RL training to 128k context windows, enabling continued performance improvement with longer contexts.", "zh": "引入部分回滚技术，将RL训练高效扩展到128k上下文窗口，实现随上下文长度增加的性能持续提升。"}, {"en": "Develops effective long2short methods (e.g., length penalty, model merging) to transfer long-CoT reasoning to short-CoT models, achieving state-of-the-art short-CoT results.", "zh": "开发有效的长到短方法（如长度惩罚、模型合并），将长思维链推理迁移到短思维链模型，取得最先进的短思维链结果。"}, {"en": "Demonstrates that scaling context length is a key dimension for continued RL scaling with LLMs, with smaller models matching larger ones via longer CoT.", "zh": "证明上下文长度缩放是LLM中RL持续缩放的关键维度，小模型通过更长的思维链可媲美大模型。"}, {"en": "Achieves multi-modal state-of-the-art reasoning on AIME, MATH 500, Codeforces, and MathVista, matching OpenAI's o1.", "zh": "在AIME、MATH 500、Codeforces和MathVista上实现多模态最先进推理，媲美OpenAI的o1。"}, {"en": "Presents a hybrid deployment framework for efficient on-policy RL training, reducing training-to-inference transition time to under one minute.", "zh": "提出混合部署框架实现高效在线策略RL训练，将训练到推理的转换时间缩短至一分钟以内。"}], "limits": [{"en": "The simplistic RL framework may not generalize to tasks requiring explicit search or value functions beyond long CoT.", "zh": "简化RL框架可能无法泛化到需要显式搜索或价值函数的任务，超出长思维链范围。"}, {"en": "Long2short methods rely on the availability of a high-quality long-CoT teacher model, which may not be available for all domains.", "zh": "长到短方法依赖高质量长思维链教师模型的可用性，并非所有领域都具备。"}, {"en": "The study focuses on verifiable problems with clear rewards; applicability to open-ended tasks with subjective evaluation is limited.", "zh": "研究聚焦于具有明确奖励的可验证问题，对主观评估的开放式任务适用性有限。"}, {"en": "Scaling context length to 128k increases computational cost and may not be feasible for resource-constrained settings.", "zh": "将上下文长度扩展到128k会增加计算成本，在资源受限场景下可能不可行。"}, {"en": "The long2short RL method may still produce overthinking in short models, as length penalty warm-up does not fully eliminate it.", "zh": "长到短RL方法仍可能在短模型中产生过度思考，因为长度惩罚预热未能完全消除。"}]}, "cites": 970}, {"id": "wenfengliang-2412.19437", "pid": "wenfengliang", "arxiv": "2412.19437", "date": "2024-12-27", "venue": "cs.CL", "org": "DeepSeek", "fields": ["nlp", "efficiency"], "tEn": "DeepSeek-V3 Technical Report", "tZh": "DeepSeek-V3 技术报告", "sEn": "DeepSeek-V3, a 671B MoE model with 37B activated parameters, achieves top-tier performance with only 2.788M H800 GPU hours training, featuring novel auxiliary-loss-free load balancing and multi-token prediction.", "sZh": "DeepSeek-V3 是一款 671B 总参数、37B 激活参数的 MoE 语言模型，仅用 2.788M H800 GPU 小时训练即可达到顶尖性能，创新性地采用了无辅助损失负载均衡和多 token 预测训练目标。", "absEn": "We present DeepSeek-V3, a strong Mixture-of-Experts (MoE) language model with 671B total parameters with 37B activated for each token. To achieve efficient inference and cost-effective training, DeepSeek-V3 adopts Multi-head Latent Attention (MLA) and DeepSeekMoE architectures, which were thoroughly validated in DeepSeek-V2. Furthermore, DeepSeek-V3 pioneers an auxiliary-loss-free strategy for load balancing and sets a multi-token prediction training objective for stronger performance. We pre-train DeepSeek-V3 on 14.8 trillion diverse and high-quality tokens, followed by Supervised Fine-Tuning and Reinforcement Learning stages to fully harness its capabilities. Comprehensive evaluations reveal that DeepSeek-V3 outperforms other open-source models and achieves performance comparable to leading closed-source models. Despite its excellent performance, DeepSeek-V3 requires only 2.788M H800 GPU hours for its full training. In addition, its training process is remarkably stable. Throughout the entire training process, we did not experience any irrecoverable loss spikes or perform any rollbacks. The model checkpoints are available at https://github.com/deepseek-ai/DeepSeek-V3.", "absZh": "我们提出了 DeepSeek-V3，一个强大的混合专家（MoE）语言模型，总参数量为 671B，每个 token 激活 37B 参数。为了实现高效推理和成本效益训练，DeepSeek-V3 采用了多头潜在注意力（MLA）和 DeepSeekMoE 架构，这些架构在 DeepSeek-V2 中得到了充分验证。此外，DeepSeek-V3 首创了无辅助损失的负载均衡策略，并设置了多 token 预测训练目标以提升性能。我们在 14.8 万亿多样化且高质量的 token 上预训练了 DeepSeek-V3，随后进行了监督微调和强化学习阶段以充分发挥其能力。全面评估显示，DeepSeek-V3 优于其他开源模型，并达到了与领先闭源模型相当的性能。尽管性能卓越，DeepSeek-V3 的完整训练仅需 2.788M H800 GPU 小时。此外，其训练过程非常稳定。在整个训练过程中，我们没有遇到任何不可恢复的损失尖峰或进行任何回滚。模型检查点可在 https://github.com/deepseek-ai/DeepSeek-V3 获取。", "insights": {"contrib": [{"en": "Pioneers an auxiliary-loss-free load balancing strategy for MoE, minimizing performance degradation.", "zh": "首创无辅助损失的MoE负载均衡策略，最小化性能下降。"}, {"en": "Introduces multi-token prediction (MTP) training objective, enhancing overall benchmark performance.", "zh": "引入多词预测训练目标，提升整体基准性能。"}, {"en": "Validates FP8 mixed precision training on an extremely large-scale model for the first time.", "zh": "首次在超大规模模型上验证FP8混合精度训练的有效性。"}, {"en": "Designs DualPipe algorithm for efficient pipeline parallelism with near-zero communication overhead.", "zh": "设计DualPipe算法实现高效流水线并行，通信开销近乎为零。"}, {"en": "Achieves state-of-the-art performance among open-source models, comparable to leading closed-source models.", "zh": "在开源模型中达到最先进性能，与领先闭源模型相当。"}, {"en": "Requires only 2.788M H800 GPU hours for full training, demonstrating exceptional cost efficiency.", "zh": "全训练仅需278.8万H800 GPU小时，成本效益卓越。"}], "limits": [{"en": "Training costs exclude prior research and ablation experiments on architectures, algorithms, or data.", "zh": "训练成本不包括架构、算法或数据的先前研究和消融实验。"}, {"en": "Performance on English factual knowledge (SimpleQA) trails behind GPT-4o and Claude-Sonnet-3.5.", "zh": "英语事实知识（SimpleQA）性能落后于GPT-4o和Claude-Sonnet-3.5。"}, {"en": "Engineering-related tasks slightly below Claude-Sonnet-3.5, though still outperforming other models.", "zh": "工程相关任务略低于Claude-Sonnet-3.5，但仍优于其他模型。"}, {"en": "MTP modules are discarded during inference; only used for training improvement.", "zh": "推理时丢弃MTP模块，仅用于训练改进。"}, {"en": "Token boundary bias may occur for multi-line prompts without terminal line breaks.", "zh": "多行提示无终止换行时可能出现词边界偏差。"}]}, "cites": 0}, {"id": "anyang-2412.15115", "pid": "anyang", "arxiv": "2412.15115", "date": "2024-12-19", "venue": "cs.CL", "org": "Alibaba", "fields": ["nlp", "deep-learning"], "tEn": "Qwen2.5 Technical Report", "tZh": "Qwen2.5技术报告", "sEn": "Qwen2.5 achieves top-tier performance across diverse benchmarks, with the 72B model outperforming Llama-3-405B and cost-effective MoE variants competing with GPT-4o.", "sZh": "Qwen2.5在多项基准测试中达到顶尖水平，72B模型超越Llama-3-405B，经济高效的MoE变体与GPT-4o竞争。", "absEn": "In this report, we introduce Qwen2.5, a comprehensive series of large language models (LLMs) designed to meet diverse needs. Compared to previous iterations, Qwen 2.5 has been significantly improved during both the pre-training and post-training stages. In terms of pre-training, we have scaled the high-quality pre-training datasets from the previous 7 trillion tokens to 18 trillion tokens. This provides a strong foundation for common sense, expert knowledge, and reasoning capabilities. In terms of post-training, we implement intricate supervised finetuning with over 1 million samples, as well as multistage reinforcement learning. Post-training techniques enhance human preference, and notably improve long text generation, structural data analysis, and instruction following. To handle diverse and varied use cases effectively, we present Qwen2.5 LLM series in rich sizes. Open-weight offerings include base and instruction-tuned models, with quantized versions available. In addition, for hosted solutions, the proprietary models currently include two mixture-of-experts (MoE) variants: Qwen2.5-Turbo and Qwen2.5-Plus, both available from Alibaba Cloud Model Studio. Qwen2.5 has demonstrated top-tier performance on a wide range of benchmarks evaluating language understanding, reasoning, mathematics, coding, human preference alignment, etc. Specifically, the open-weight flagship Qwen2.5-72B-Instruct outperforms a number of open and proprietary models and demonstrates competitive performance to the state-of-the-art open-weight model, Llama-3-405B-Instruct, which is around 5 times larger. Qwen2.5-Turbo and Qwen2.5-Plus offer superior cost-effectiveness while performing competitively against GPT-4o-mini and GPT-4o respectively. Additionally, as the foundation, Qwen2.5 models have been instrumental in training specialized models such as Qwen2.5-Math, Qwen2.5-Coder, QwQ, and multimodal models.", "absZh": "本报告介绍了Qwen2.5，这是一个旨在满足多样化需求的大型语言模型系列。与之前的版本相比，Qwen2.5在预训练和后训练阶段都得到了显著改进。在预训练方面，我们将高质量预训练数据集从之前的7万亿个token扩展到18万亿个token，为常识、专业知识和推理能力提供了坚实基础。在后训练方面，我们实施了超过100万个样本的复杂监督微调以及多阶段强化学习。后训练技术增强了对人类偏好的对齐，并显著改进了长文本生成、结构化数据分析和指令遵循能力。为了有效处理各种不同的用例，我们提供了多种尺寸的Qwen2.5 LLM系列。开放权重版本包括基础模型和指令微调模型，并提供量化版本。此外，对于托管解决方案，专有模型目前包括两个混合专家（MoE）变体：Qwen2.5-Turbo和Qwen2.5-Plus，均可从阿里云模型工作室获取。Qwen2.5在评估语言理解、推理、数学、编码、人类偏好对齐等广泛基准测试中展示了顶级性能。具体来说，开放权重旗舰模型Qwen2.5-72B-Instruct超越了多个开放和专有模型，并与大约大5倍的最先进开放权重模型Llama-3-405B-Instruct表现相当。Qwen2.5-Turbo和Qwen2.5-Plus在分别与GPT-4o-mini和GPT-4o竞争时提供了卓越的成本效益。此外，作为基础，Qwen2.5模型在训练Qwen2.5-Math、Qwen2.5-Coder、QwQ和多模态模型等专业模型中发挥了重要作用。", "insights": {"contrib": [{"en": "Scaled pre-training data from 7 trillion to 18 trillion tokens, enhancing common sense, expert knowledge, and reasoning.", "zh": "将预训练数据从7万亿词元扩展到18万亿词元，增强了常识、专家知识和推理能力。"}, {"en": "Implemented intricate supervised fine-tuning with over 1 million samples and multistage reinforcement learning.", "zh": "实施了超过100万样本的复杂监督微调以及多阶段强化学习。"}, {"en": "Improved long text generation, structural data analysis, and instruction following via post-training.", "zh": "通过后训练改进了长文本生成、结构化数据分析和指令遵循。"}, {"en": "Offered rich model sizes including open-weight base and instruction-tuned models with quantized versions.", "zh": "提供丰富的模型尺寸，包括开放权重的基座和指令微调模型及其量化版本。"}, {"en": "Proprietary MoE variants Qwen2.5-Turbo and Qwen2.5-Plus achieve competitive performance against GPT-4o-mini and GPT-4o.", "zh": "专有MoE变体Qwen2.5-Turbo和Qwen2.5-Plus在与GPT-4o-mini和GPT-4o的竞争中表现出色。"}, {"en": "Qwen2.5-72B-Instruct outperforms many open and proprietary models, competitive with Llama-3-405B-Instruct.", "zh": "Qwen2.5-72B-Instruct超越了许多开源和专有模型，与Llama-3-405B-Instruct竞争。"}], "limits": [{"en": "Performance evaluated on benchmarks may not fully reflect real-world deployment scenarios.", "zh": "在基准测试上的表现可能无法完全反映实际部署场景。"}, {"en": "Open-weight models are limited to 72B parameters; larger models are proprietary.", "zh": "开放权重模型限于72B参数；更大模型为专有。"}, {"en": "Quantized versions may have slight degradation in accuracy compared to full-precision models.", "zh": "量化版本相比全精度模型可能在精度上略有下降。"}, {"en": "The report does not discuss potential biases or safety issues in detail.", "zh": "报告未详细讨论潜在的偏见或安全问题。"}, {"en": "Specialized models like Qwen2.5-Math and Qwen2.5-Coder are not covered in this report.", "zh": "本报告未涵盖Qwen2.5-Math和Qwen2.5-Coder等专用模型。"}]}, "cites": 4244}, {"id": "kblack-2410.24164", "pid": "kblack", "arxiv": "2410.24164", "date": "2024-10-31", "venue": "cs.LG", "org": "Physical Intelligence", "fields": ["generative", "vision"], "tEn": "$π_0$: A Vision-Language-Action Flow Model for General Robot Control", "tZh": "$π_0$: 面向通用机器人控制的视觉-语言-动作流模型", "sEn": "A vision-language-action flow model enables generalist robot policies for complex dexterous tasks.", "sZh": "一种视觉-语言-动作流模型实现了面向复杂灵巧任务的通用机器人策略。", "absEn": "Robot learning holds tremendous promise to unlock the full potential of flexible, general, and dexterous robot systems, as well as to address some of the deepest questions in artificial intelligence. However, bringing robot learning to the level of generality required for effective real-world systems faces major obstacles in terms of data, generalization, and robustness. In this paper, we discuss how generalist robot policies (i.e., robot foundation models) can address these challenges, and how we can design effective generalist robot policies for complex and highly dexterous tasks. We propose a novel flow matching architecture built on top of a pre-trained vision-language model (VLM) to inherit Internet-scale semantic knowledge. We then discuss how this model can be trained on a large and diverse dataset from multiple dexterous robot platforms, including single-arm robots, dual-arm robots, and mobile manipulators. We evaluate our model in terms of its ability to perform tasks in zero shot after pre-training, follow language instructions from people and from a high-level VLM policy, and its ability to acquire new skills via fine-tuning. Our results cover a wide variety of tasks, such as laundry folding, table cleaning, and assembling boxes.", "absZh": "机器人学习有望释放灵活、通用、灵巧机器人系统的全部潜力，并解决人工智能领域最深层次的问题。然而，要使机器人学习达到实际系统所需的通用性水平，在数据、泛化能力和鲁棒性方面面临重大障碍。本文探讨了通用机器人策略（即机器人基础模型）如何应对这些挑战，以及如何为复杂且高度灵巧的任务设计有效的通用机器人策略。我们提出了一种基于预训练视觉-语言模型（VLM）的新型流匹配架构，以继承互联网规模的语义知识。随后，我们讨论了如何利用来自多个灵巧机器人平台（包括单臂机器人、双臂机器人和移动操作器）的大规模多样化数据集训练该模型。我们从零样本预训练任务执行能力、遵循人类及高级VLM策略的语言指令能力，以及通过微调获取新技能的能力等方面评估了模型。我们的结果涵盖了多种任务，如叠衣服、清洁桌子和组装盒子。", "insights": {"contrib": [{"en": "Proposes π0, a novel vision-language-action flow model for general robot control.", "zh": "提出π0，一种用于通用机器人控制的新型视觉-语言-动作流模型。"}, {"en": "Integrates pre-trained VLM with flow matching for high-frequency dexterous action chunks.", "zh": "将预训练VLM与流匹配结合，实现高频灵巧动作块。"}, {"en": "Demonstrates cross-embodiment training on 7 robot platforms with 10,000 hours of data.", "zh": "在7种机器人平台上使用10,000小时数据进行跨本体训练。"}, {"en": "Shows zero-shot task performance and language instruction following after pre-training.", "zh": "展示预训练后的零样本任务性能和语言指令跟随能力。"}, {"en": "Achieves state-of-the-art results on complex dexterous tasks like laundry folding and box assembly.", "zh": "在叠衣服和组装盒子等复杂灵巧任务上取得最先进结果。"}, {"en": "Introduces a pre-training/post-training recipe analogous to LLMs for robot foundation models.", "zh": "引入类似大语言模型的预训练/后训练方案用于机器人基础模型。"}], "limits": [{"en": "Limited understanding of optimal pre-training data composition and weighting.", "zh": "对最优预训练数据组成和权重的理解有限。"}, {"en": "Not all evaluated tasks achieve reliable performance; failure modes remain.", "zh": "并非所有评估任务都达到可靠性能；仍存在失败模式。"}, {"en": "Unclear how to predict data amount and type needed for near-perfect performance.", "zh": "不清楚如何预测接近完美性能所需的数据量和类型。"}, {"en": "Positive transfer across highly diverse domains (e.g., driving, navigation) not yet validated.", "zh": "跨高度多样化领域（如驾驶、导航）的正向迁移尚未验证。"}, {"en": "Model size and computational cost may limit real-time deployment on resource-constrained robots.", "zh": "模型大小和计算成本可能限制在资源受限机器人上的实时部署。"}]}, "cites": 1990}, {"id": "songyangliu-2410.07864", "pid": "songyangliu", "arxiv": "2410.07864", "date": "2024-10-10", "venue": "cs.RO", "org": "Tsinghua University", "fields": ["generative", "vision"], "tEn": "RDT-1B: a Diffusion Foundation Model for Bimanual Manipulation", "tZh": "RDT-1B：面向双臂操作任务的扩散基础模型", "sEn": "RDT-1B is a diffusion foundation model for bimanual manipulation that achieves zero-shot generalization and few-shot learning.", "sZh": "RDT-1B是一个面向双臂操作任务的扩散基础模型，实现了零样本泛化和少样本学习。", "absEn": "Bimanual manipulation is essential in robotics, yet developing foundation models is extremely challenging due to the inherent complexity of coordinating two robot arms (leading to multi-modal action distributions) and the scarcity of training data. In this paper, we present the Robotics Diffusion Transformer (RDT), a pioneering diffusion foundation model for bimanual manipulation. RDT builds on diffusion models to effectively represent multi-modality, with innovative designs of a scalable Transformer to deal with the heterogeneity of multi-modal inputs and to capture the nonlinearity and high frequency of robotic data. To address data scarcity, we further introduce a Physically Interpretable Unified Action Space, which can unify the action representations of various robots while preserving the physical meanings of original actions, facilitating learning transferrable physical knowledge. With these designs, we managed to pre-train RDT on the largest collection of multi-robot datasets to date and scaled it up to 1.2B parameters, which is the largest diffusion-based foundation model for robotic manipulation. We finally fine-tuned RDT on a self-created multi-task bimanual dataset with over 6K+ episodes to refine its manipulation capabilities. Experiments on real robots demonstrate that RDT significantly outperforms existing methods. It exhibits zero-shot generalization to unseen objects and scenes, understands and follows language instructions, learns new skills with just 1~5 demonstrations, and effectively handles complex, dexterous tasks. We refer to https://rdt-robotics.github.io/rdt-robotics/ for the code and videos.", "absZh": "双臂操作在机器人领域至关重要，但由于协调两个机械臂的固有复杂性（导致多模态动作分布）以及训练数据的稀缺，开发基础模型极具挑战性。本文提出了机器人扩散变换器（RDT），这是一种开创性的双臂操作扩散基础模型。RDT基于扩散模型有效表示多模态性，通过可扩展变换器的创新设计处理多模态输入的异质性，并捕捉机器人数据的非线性和高频特性。为解决数据稀缺问题，我们进一步引入了物理可解释的统一动作空间，该空间能够统一各种机器人的动作表示，同时保留原始动作的物理意义，促进可迁移物理知识的学习。凭借这些设计，我们成功在迄今为止最大的多机器人数据集上预训练了RDT，并将其扩展至12亿参数，这是目前最大的基于扩散的机器人操作基础模型。最后，我们在自创的包含6000多个片段的多任务双臂数据集上对RDT进行微调，以完善其操作能力。真实机器人实验表明，RDT显著优于现有方法。它能够零样本泛化到未见过的物体和场景，理解并遵循语言指令，仅需1~5次演示即可学习新技能，并有效处理复杂灵巧的任务。代码和视频请参见https://rdt-robotics.github.io/rdt-robotics/。", "insights": {"contrib": [{"en": "Proposes Robotics Diffusion Transformer (RDT), a diffusion foundation model for bimanual manipulation with scalable Transformer architecture.", "zh": "提出机器人扩散Transformer（RDT），一种用于双臂操作的扩散基础模型，具有可扩展的Transformer架构。"}, {"en": "Introduces Physically Interpretable Unified Action Space to unify action representations across diverse robots for multi-robot pre-training.", "zh": "引入物理可解释统一动作空间，统一不同机器人的动作表示，实现多机器人预训练。"}, {"en": "Achieves state-of-the-art performance on bimanual tasks with 56% improvement in success rates over baselines.", "zh": "在双臂任务上实现最先进性能，成功率比基线提高56%。"}, {"en": "Demonstrates zero-shot generalization to unseen objects, scenes, and language instructions.", "zh": "展示了对未见物体、场景和语言指令的零样本泛化能力。"}, {"en": "Enables few-shot learning of new skills with only 1-5 demonstrations.", "zh": "仅需1-5次演示即可实现新技能的少样本学习。"}, {"en": "Scales model to 1.2B parameters, the largest diffusion-based foundation model for robotic manipulation.", "zh": "将模型扩展到12亿参数，是最大的基于扩散的机器人操作基础模型。"}], "limits": [{"en": "Model is only evaluated on ALOHA dual-arm robot; generalization to other dual-arm robots is not tested.", "zh": "模型仅在ALOHA双臂机器人上评估，未测试对其他双臂机器人的泛化性。"}, {"en": "Fine-tuning dataset is self-collected and limited to 6K+ trajectories, which may not cover all real-world scenarios.", "zh": "微调数据集为自收集，仅6000多条轨迹，可能无法覆盖所有真实场景。"}, {"en": "Pre-training relies on publicly available multi-robot datasets, which may contain biases or noise.", "zh": "预训练依赖公开的多机器人数据集，可能包含偏差或噪声。"}, {"en": "Diffusion model inference requires multiple denoising steps, leading to higher latency compared to deterministic methods.", "zh": "扩散模型推理需要多个去噪步骤，导致延迟高于确定性方法。"}, {"en": "The unified action space is designed for gripper arms only; robots with other end-effectors are not supported.", "zh": "统一动作空间仅针对夹爪臂设计，不支持其他末端执行器的机器人。"}]}, "cites": 700}, {"id": "xinlongwang-2409.18869", "pid": "xinlongwang", "arxiv": "2409.18869", "date": "2024-09-27", "venue": "cs.CV", "org": "BAAI", "fields": ["vision", "generative"], "tEn": "Emu3: Next-Token Prediction is All You Need", "tZh": "Emu3：只需预测下一个Token", "sEn": "Next-token prediction alone can achieve state-of-the-art multimodal performance, surpassing diffusion models and compositional approaches.", "sZh": "仅通过预测下一个Token，就能在多模态任务上达到最先进水平，超越扩散模型和组合方法。", "absEn": "While next-token prediction is considered a promising path towards artificial general intelligence, it has struggled to excel in multimodal tasks, which are still dominated by diffusion models (e.g., Stable Diffusion) and compositional approaches (e.g., CLIP combined with LLMs). In this paper, we introduce Emu3, a new suite of state-of-the-art multimodal models trained solely with next-token prediction. By tokenizing images, text, and videos into a discrete space, we train a single transformer from scratch on a mixture of multimodal sequences. Emu3 outperforms several well-established task-specific models in both generation and perception tasks, surpassing flagship models such as SDXL and LLaVA-1.6, while eliminating the need for diffusion or compositional architectures. Emu3 is also capable of generating high-fidelity video via predicting the next token in a video sequence. We simplify complex multimodal model designs by converging on a singular focus: tokens, unlocking great potential for scaling both during training and inference. Our results demonstrate that next-token prediction is a promising path towards building general multimodal intelligence beyond language. We open-source key techniques and models to support further research in this direction.", "absZh": "虽然下一个Token预测被认为是通往通用人工智能的有前途的路径，但在多模态任务中，它一直难以取得优异表现，这些任务仍然由扩散模型（如Stable Diffusion）和组合方法（如CLIP结合LLM）主导。在本文中，我们介绍了Emu3，一套仅通过下一个Token预测训练的最先进多模态模型。通过将图像、文本和视频分词到离散空间，我们在多模态序列的混合上从头训练了一个单一的Transformer。Emu3在生成和感知任务上超越了多个成熟的任务特定模型，超过了SDXL和LLaVA-1.6等旗舰模型，同时消除了对扩散或组合架构的需求。Emu3还能够通过预测视频序列中的下一个Token来生成高保真视频。我们通过专注于一个单一焦点——Token，简化了复杂的多模态模型设计，在训练和推理过程中释放了巨大的扩展潜力。我们的结果表明，下一个Token预测是构建超越语言的通用多模态智能的一条有前途的路径。我们开源了关键技术和模型，以支持这一方向的进一步研究。", "insights": {"contrib": [{"en": "Introduces Emu3, a multimodal model trained solely with next-token prediction, eliminating diffusion or compositional architectures.", "zh": "提出Emu3，一种仅通过下一个词预测训练的多模态模型，消除了扩散或组合架构。"}, {"en": "Tokenizes images, text, and videos into a discrete space for unified transformer training.", "zh": "将图像、文本和视频分词到离散空间，用于统一的Transformer训练。"}, {"en": "Outperforms task-specific models like SDXL and LLaVA-1.6 in both generation and perception tasks.", "zh": "在生成和感知任务上优于SDXL和LLaVA-1.6等专用模型。"}, {"en": "Demonstrates high-fidelity video generation via next-token prediction in video sequences.", "zh": "通过视频序列中的下一个词预测实现高保真视频生成。"}, {"en": "Simplifies multimodal model design by focusing solely on tokens, enabling scaling during training and inference.", "zh": "通过仅关注token简化多模态模型设计，支持训练和推理时的规模扩张。"}, {"en": "Open-sources key techniques and models to support further research.", "zh": "开源关键技术和模型以支持进一步研究。"}], "limits": [{"en": "Evaluation limited to specific benchmarks; generalizability to broader tasks unverified.", "zh": "评估限于特定基准；对更广泛任务的泛化性未验证。"}, {"en": "Tokenization of continuous modalities may cause information loss compared to continuous representations.", "zh": "与连续表示相比，连续模态的分词可能导致信息丢失。"}, {"en": "Training and inference costs for large-scale multimodal models remain high.", "zh": "大规模多模态模型的训练和推理成本仍然很高。"}, {"en": "Performance on complex reasoning or long-context tasks not thoroughly explored.", "zh": "在复杂推理或长上下文任务上的性能未深入探索。"}, {"en": "Reliance on next-token prediction may limit model's ability to capture global structure.", "zh": "依赖下一个词预测可能限制模型捕捉全局结构的能力。"}]}, "cites": 716}, {"id": "anyang-2409.12191", "pid": "anyang", "arxiv": "2409.12191", "date": "2024-09-18", "venue": "cs.CV", "org": "Alibaba", "fields": ["vision", "nlp"], "tEn": "Qwen2-VL: Enhancing Vision-Language Model's Perception of the World at Any Resolution", "tZh": "Qwen2-VL：增强视觉语言模型在任何分辨率下对世界的感知", "sEn": "Qwen2-VL introduces Naive Dynamic Resolution and M-RoPE, achieving competitive performance comparable to GPT-4o and Claude3.5-Sonnet.", "sZh": "Qwen2-VL 引入朴素动态分辨率机制和多模态旋转位置嵌入，性能媲美 GPT-4o 和 Claude3.5-Sonnet。", "absEn": "We present the Qwen2-VL Series, an advanced upgrade of the previous Qwen-VL models that redefines the conventional predetermined-resolution approach in visual processing. Qwen2-VL introduces the Naive Dynamic Resolution mechanism, which enables the model to dynamically process images of varying resolutions into different numbers of visual tokens. This approach allows the model to generate more efficient and accurate visual representations, closely aligning with human perceptual processes. The model also integrates Multimodal Rotary Position Embedding (M-RoPE), facilitating the effective fusion of positional information across text, images, and videos. We employ a unified paradigm for processing both images and videos, enhancing the model's visual perception capabilities. To explore the potential of large multimodal models, Qwen2-VL investigates the scaling laws for large vision-language models (LVLMs). By scaling both the model size-with versions at 2B, 8B, and 72B parameters-and the amount of training data, the Qwen2-VL Series achieves highly competitive performance. Notably, the Qwen2-VL-72B model achieves results comparable to leading models such as GPT-4o and Claude3.5-Sonnet across various multimodal benchmarks, outperforming other generalist models. Code is available at https://github.com/QwenLM/Qwen2-VL .", "absZh": "我们提出了 Qwen2-VL 系列，这是对之前 Qwen-VL 模型的高级升级，重新定义了视觉处理中传统的预定分辨率方法。Qwen2-VL 引入了朴素动态分辨率机制，使模型能够动态地将不同分辨率的图像处理成不同数量的视觉标记。这种方法使模型能够生成更高效、更准确的视觉表示，紧密贴合人类的感知过程。该模型还集成了多模态旋转位置嵌入（M-RoPE），促进了文本、图像和视频中位置信息的有效融合。我们采用统一的范式处理图像和视频，增强了模型的视觉感知能力。为了探索大型多模态模型的潜力，Qwen2-VL 研究了大型视觉语言模型（LVLMs）的缩放定律。通过缩放模型大小（提供 2B、8B 和 72B 参数版本）和训练数据量，Qwen2-VL 系列实现了极具竞争力的性能。值得注意的是，Qwen2-VL-72B 模型在各种多模态基准测试中取得了与 GPT-4o 和 Claude3.5-Sonnet 等领先模型相当的结果，优于其他通用模型。代码可在 https://github.com/QwenLM/Qwen2-VL 获取。", "insights": {"contrib": [{"en": "Introduces Naive Dynamic Resolution mechanism for processing images at any resolution into variable visual tokens.", "zh": "提出朴素动态分辨率机制，可将任意分辨率图像处理为可变数量的视觉标记。"}, {"en": "Proposes Multimodal Rotary Position Embedding (M-RoPE) to fuse positional info across text, images, and videos.", "zh": "提出多模态旋转位置嵌入（M-RoPE），融合文本、图像和视频的位置信息。"}, {"en": "Unifies image and video processing paradigm, enhancing visual perception with 3D convolutions and frame sampling.", "zh": "统一图像和视频处理范式，通过3D卷积和帧采样增强视觉感知。"}, {"en": "Explores scaling laws for large vision-language models, achieving competitive performance at 2B, 8B, and 72B scales.", "zh": "探索大型视觉语言模型的缩放定律，在2B、8B和72B规模上取得有竞争力的性能。"}, {"en": "Achieves state-of-the-art results on multiple benchmarks, comparable to GPT-4o and Claude3.5-Sonnet.", "zh": "在多个基准上取得最先进结果，与GPT-4o和Claude3.5-Sonnet相当。"}, {"en": "Supports multilingual text understanding in images and robust agent capabilities for device operation.", "zh": "支持图像中多语言文本理解，并具备设备操作的强大智能体能力。"}], "limits": [{"en": "Performance on MMMU benchmark still lags behind GPT-4o, indicating room for improvement in complex reasoning.", "zh": "在MMMU基准上仍落后于GPT-4o，表明复杂推理能力有待提升。"}, {"en": "Video understanding limited to 768 frames per video during evaluation, affecting long video performance.", "zh": "评估时每视频最多提取768帧，影响长视频性能。"}, {"en": "Vision-language navigation performance significantly behind specialized models due to incomplete 3D map modeling.", "zh": "视觉语言导航性能远落后于专用模型，因3D地图建模不完整。"}, {"en": "Excessive upscaling of small images can lead to out-of-distribution samples and performance decline.", "zh": "过度放大微小图像可能导致分布外样本和性能下降。"}, {"en": "Training data cutoff date is June 2023, limiting knowledge of recent events.", "zh": "训练数据截止于2023年6月，限制了对近期事件的了解。"}]}, "cites": 4352}, {"id": "jietang-2406.12793", "pid": "jietang", "arxiv": "2406.12793", "date": "2024-06-18", "venue": "cs.CL", "org": "Zhipu AI", "fields": ["nlp", "generative"], "tEn": "ChatGLM: A Family of Large Language Models from GLM-130B to GLM-4 All Tools", "tZh": "ChatGLM：从GLM-130B到GLM-4 All Tools的大型语言模型家族", "sEn": "ChatGLM family evolves from GLM-130B to GLM-4, with GLM-4 models rivaling GPT-4 in general metrics, long context, and Chinese alignment, and GLM-4 All Tools matching GPT-4 All Tools in tool use.", "sZh": "ChatGLM家族从GLM-130B演进到GLM-4，GLM-4模型在通用指标、长上下文和中文对齐上媲美GPT-4，GLM-4 All Tools在工具使用上匹配GPT-4 All Tools。", "absEn": "We introduce ChatGLM, an evolving family of large language models that we have been developing over time. This report primarily focuses on the GLM-4 language series, which includes GLM-4, GLM-4-Air, and GLM-4-9B. They represent our most capable models that are trained with all the insights and lessons gained from the preceding three generations of ChatGLM. To date, the GLM-4 models are pre-trained on ten trillions of tokens mostly in Chinese and English, along with a small set of corpus from 24 languages, and aligned primarily for Chinese and English usage. The high-quality alignment is achieved via a multi-stage post-training process, which involves supervised fine-tuning and learning from human feedback. Evaluations show that GLM-4 1) closely rivals or outperforms GPT-4 in terms of general metrics such as MMLU, GSM8K, MATH, BBH, GPQA, and HumanEval, 2) gets close to GPT-4-Turbo in instruction following as measured by IFEval, 3) matches GPT-4 Turbo (128K) and Claude 3 for long context tasks, and 4) outperforms GPT-4 in Chinese alignments as measured by AlignBench. The GLM-4 All Tools model is further aligned to understand user intent and autonomously decide when and which tool(s) touse -- including web browser, Python interpreter, text-to-image model, and user-defined functions -- to effectively complete complex tasks. In practical applications, it matches and even surpasses GPT-4 All Tools in tasks like accessing online information via web browsing and solving math problems using Python interpreter. Over the course, we have open-sourced a series of models, including ChatGLM-6B (three generations), GLM-4-9B (128K, 1M), GLM-4V-9B, WebGLM, and CodeGeeX, attracting over 10 million downloads on Hugging face in the year 2023 alone. The open models can be accessed through https://github.com/THUDM and https://huggingface.co/THUDM.", "absZh": "我们介绍了ChatGLM，这是一个不断演进的大型语言模型家族，我们一直在持续开发。本报告主要关注GLM-4语言系列，包括GLM-4、GLM-4-Air和GLM-4-9B。它们代表了我们在前三代ChatGLM中积累的所有见解和经验基础上训练出的最强模型。迄今为止，GLM-4模型在数万亿个token上进行了预训练，这些token主要来自中文和英文，以及来自24种语言的小规模语料库，并主要针对中文和英文使用进行了对齐。高质量的对齐通过多阶段后训练过程实现，包括监督微调和从人类反馈中学习。评估表明，GLM-4 1) 在MMLU、GSM8K、MATH、BBH、GPQA和HumanEval等通用指标上接近或超越GPT-4，2) 在IFEval衡量的指令跟随方面接近GPT-4-Turbo，3) 在长上下文任务上与GPT-4 Turbo（128K）和Claude 3相当，4) 在AlignBench衡量的中文对齐上超越GPT-4。GLM-4 All Tools模型进一步对齐以理解用户意图，并自主决定何时以及使用哪种工具——包括网络浏览器、Python解释器、文本到图像模型和用户自定义函数——以有效完成复杂任务。在实际应用中，它在通过网页浏览获取在线信息和利用Python解释器解决数学问题等任务上匹配甚至超越GPT-4 All Tools。在此过程中，我们开源了一系列模型，包括ChatGLM-6B（三代）、GLM-4-9B（128K、1M）、GLM-4V-9B、WebGLM和CodeGeeX，仅2023年一年就在Hugging Face上吸引了超过1000万次下载。开源模型可通过https://github.com/THUDM和https://huggingface.co/THUDM访问。", "insights": {"contrib": [{"en": "Introduced the GLM-4 model series, achieving performance comparable to GPT-4 on multiple benchmarks.", "zh": "提出了GLM-4模型系列，在多个基准测试中达到与GPT-4相当的性能。"}, {"en": "Developed GLM-4 All Tools, enabling autonomous tool use for complex tasks.", "zh": "开发了GLM-4 All Tools，支持自主调用工具完成复杂任务。"}, {"en": "Established scaling laws through models of various sizes from 1.5B to 130B parameters.", "zh": "通过从1.5B到130B参数的不同规模模型建立了缩放定律。"}, {"en": "Proposed LongAlign for extending context window to 128K and 1M tokens.", "zh": "提出了LongAlign方法，将上下文窗口扩展到128K和1M tokens。"}, {"en": "Open-sourced multiple models including ChatGLM-6B and GLM-4-9B, with over 10 million downloads.", "zh": "开源了包括ChatGLM-6B和GLM-4-9B在内的多个模型，下载量超过1000万。"}, {"en": "Achieved state-of-the-art Chinese alignment performance on AlignBench.", "zh": "在AlignBench上实现了中文对齐的最优性能。"}], "limits": [{"en": "Pre-training data limited to 10 trillion tokens, mostly Chinese and English.", "zh": "预训练数据限于10万亿tokens，主要为中文和英文。"}, {"en": "GLM-4 lags behind GPT-4 Turbo in Chinese math reasoning on AlignBench.", "zh": "GLM-4在AlignBench的中文数学推理上落后于GPT-4 Turbo。"}, {"en": "No fundamental principle identified for data collection and selection.", "zh": "未发现数据收集和选择的基本原则。"}, {"en": "GLM-4 shows gaps to GPT-4 on code-related agentic tasks in AgentBench.", "zh": "GLM-4在AgentBench的代码相关智能体任务上与GPT-4存在差距。"}, {"en": "Safety evaluation limited to Chinese subset of SafetyBench.", "zh": "安全评估仅限于SafetyBench的中文子集。"}]}, "cites": 1587}, {"id": "svlevine-2406.09246", "pid": "svlevine", "arxiv": "2406.09246", "date": "2024-06-13", "venue": "cs.RO", "org": "Stanford", "fields": ["deep-learning", "vision"], "tEn": "OpenVLA: An Open-Source Vision-Language-Action Model", "tZh": "OpenVLA：一个开源的视觉-语言-动作模型", "sEn": "OpenVLA is an open-source 7B-parameter vision-language-action model that outperforms larger closed models and enables efficient fine-tuning on consumer GPUs.", "sZh": "OpenVLA是一个开源的70亿参数视觉-语言-动作模型，性能超越更大的闭源模型，并支持在消费级GPU上高效微调。", "absEn": "Large policies pretrained on a combination of Internet-scale vision-language data and diverse robot demonstrations have the potential to change how we teach robots new skills: rather than training new behaviors from scratch, we can fine-tune such vision-language-action (VLA) models to obtain robust, generalizable policies for visuomotor control. Yet, widespread adoption of VLAs for robotics has been challenging as 1) existing VLAs are largely closed and inaccessible to the public, and 2) prior work fails to explore methods for efficiently fine-tuning VLAs for new tasks, a key component for adoption. Addressing these challenges, we introduce OpenVLA, a 7B-parameter open-source VLA trained on a diverse collection of 970k real-world robot demonstrations. OpenVLA builds on a Llama 2 language model combined with a visual encoder that fuses pretrained features from DINOv2 and SigLIP. As a product of the added data diversity and new model components, OpenVLA demonstrates strong results for generalist manipulation, outperforming closed models such as RT-2-X (55B) by 16.5% in absolute task success rate across 29 tasks and multiple robot embodiments, with 7x fewer parameters. We further show that we can effectively fine-tune OpenVLA for new settings, with especially strong generalization results in multi-task environments involving multiple objects and strong language grounding abilities, and outperform expressive from-scratch imitation learning methods such as Diffusion Policy by 20.4%. We also explore compute efficiency; as a separate contribution, we show that OpenVLA can be fine-tuned on consumer GPUs via modern low-rank adaptation methods and served efficiently via quantization without a hit to downstream success rate. Finally, we release model checkpoints, fine-tuning notebooks, and our PyTorch codebase with built-in support for training VLAs at scale on Open X-Embodiment datasets.", "absZh": "在互联网规模的视觉-语言数据和多样化机器人演示上预训练的大型策略，有潜力改变我们教授机器人新技能的方式：无需从头训练新行为，而是微调此类视觉-语言-动作（VLA）模型，以获得稳健、可泛化的视觉运动控制策略。然而，VLA在机器人领域的广泛采用面临挑战：1）现有VLA大多封闭且不公开；2）先前工作未能探索高效微调VLA以适应新任务的方法，这是采用的关键。针对这些挑战，我们提出了OpenVLA，一个70亿参数的开源VLA，在包含97万条真实世界机器人演示的多样化数据集上训练。OpenVLA基于Llama 2语言模型，结合了融合DINOv2和SigLIP预训练特征的视觉编码器。由于数据多样性和新模型组件的加入，OpenVLA在通用操作上表现出色，在29个任务和多种机器人形态上，绝对任务成功率比RT-2-X（550亿参数）等闭源模型高出16.5%，而参数量仅为后者的1/7。我们进一步展示了可以有效地微调OpenVLA以适应新场景，在多物体多任务环境中具有特别强的泛化能力和语言接地能力，比从头开始的模仿学习方法（如Diffusion Policy）高出20.4%。我们还探索了计算效率；作为另一贡献，我们展示了OpenVLA可以通过现代低秩适应方法在消费级GPU上微调，并通过高效量化提供服务，而不影响下游成功率。最后，我们发布了模型检查点、微调笔记本和PyTorch代码库，内置支持在Open X-Embodiment数据集上大规模训练VLA。", "insights": {"contrib": [{"en": "Introduces OpenVLA, a 7B-parameter open-source vision-language-action model trained on 970k robot demonstrations.", "zh": "提出OpenVLA，一个70亿参数的开源视觉-语言-动作模型，在97万次机器人演示上训练。"}, {"en": "Outperforms closed-source RT-2-X (55B) by 16.5% absolute success rate across 29 tasks with 7x fewer parameters.", "zh": "在29个任务上以7倍更少的参数，绝对成功率比闭源RT-2-X（550亿）高出16.5%。"}, {"en": "Demonstrates effective fine-tuning for new tasks, outperforming Diffusion Policy by 20.4% in multi-task environments.", "zh": "展示了在新任务上的有效微调，在多任务环境中比扩散策略高出20.4%。"}, {"en": "Shows compute-efficient fine-tuning via LoRA and quantization on consumer GPUs without performance loss.", "zh": "展示了通过LoRA和量化在消费级GPU上进行计算高效的微调，且无性能损失。"}, {"en": "Releases model checkpoints, fine-tuning notebooks, and PyTorch codebase for scalable VLA training.", "zh": "发布模型检查点、微调笔记本和用于可扩展VLA训练的PyTorch代码库。"}, {"en": "Explores key design decisions like vision encoder fine-tuning and multiple training epochs for VLA performance.", "zh": "探索了关键设计决策，如视觉编码器微调和多轮训练对VLA性能的影响。"}], "limits": [{"en": "Only supports single-image observations, not multi-image or proprioceptive inputs.", "zh": "仅支持单图像观测，不支持多图像或本体感受输入。"}, {"en": "Inference throughput is limited, unsuitable for high-frequency control setups like ALOHA at 50Hz.", "zh": "推理吞吐量有限，不适用于如ALOHA（50Hz）的高频控制设置。"}, {"en": "Does not achieve very high reliability, typically below 90% success rate on tested tasks.", "zh": "未达到非常高的可靠性，测试任务成功率通常低于90%。"}, {"en": "Many VLA design questions remain unexplored due to compute limitations.", "zh": "由于计算限制，许多VLA设计问题仍未探索。"}, {"en": "Performance on DROID dataset was low, suggesting need for larger mixture weight or model.", "zh": "在DROID数据集上性能较低，表明需要更大的混合权重或模型。"}]}, "cites": 2432}, {"id": "wenfengliang-2405.04434", "pid": "wenfengliang", "arxiv": "2405.04434", "date": "2024-05-07", "venue": "cs.CL", "org": "DeepSeek", "fields": ["nlp", "efficiency"], "tEn": "DeepSeek-V2: A Strong, Economical, and Efficient Mixture-of-Experts Language Model", "tZh": "DeepSeek-V2：一个强大、经济且高效的混合专家语言模型", "sEn": "DeepSeek-V2 achieves top-tier performance with only 21B activated parameters, saving 42.5% training cost and 93.3% KV cache.", "sZh": "DeepSeek-V2仅用21B激活参数即达到顶尖性能，节省42.5%训练成本和93.3% KV缓存。", "absEn": "We present DeepSeek-V2, a strong Mixture-of-Experts (MoE) language model characterized by economical training and efficient inference. It comprises 236B total parameters, of which 21B are activated for each token, and supports a context length of 128K tokens. DeepSeek-V2 adopts innovative architectures including Multi-head Latent Attention (MLA) and DeepSeekMoE. MLA guarantees efficient inference through significantly compressing the Key-Value (KV) cache into a latent vector, while DeepSeekMoE enables training strong models at an economical cost through sparse computation. Compared with DeepSeek 67B, DeepSeek-V2 achieves significantly stronger performance, and meanwhile saves 42.5% of training costs, reduces the KV cache by 93.3%, and boosts the maximum generation throughput to 5.76 times. We pretrain DeepSeek-V2 on a high-quality and multi-source corpus consisting of 8.1T tokens, and further perform Supervised Fine-Tuning (SFT) and Reinforcement Learning (RL) to fully unlock its potential. Evaluation results show that, even with only 21B activated parameters, DeepSeek-V2 and its chat versions still achieve top-tier performance among open-source models.", "absZh": "我们提出了DeepSeek-V2，一个以经济训练和高效推理为特点的强大混合专家（MoE）语言模型。它总共有236B参数，每个token激活21B，支持128K token的上下文长度。DeepSeek-V2采用了创新架构，包括多头潜在注意力（MLA）和DeepSeekMoE。MLA通过将键值（KV）缓存显著压缩为潜在向量来保证高效推理，而DeepSeekMoE通过稀疏计算以经济成本训练强大模型。与DeepSeek 67B相比，DeepSeek-V2性能显著更强，同时节省了42.5%的训练成本，减少了93.3%的KV缓存，并将最大生成吞吐量提升至5.76倍。我们在一个由8.1T token组成的高质量多源语料库上预训练了DeepSeek-V2，并进一步进行监督微调（SFT）和强化学习（RL）以充分释放其潜力。评估结果显示，即使只有21B激活参数，DeepSeek-V2及其聊天版本在开源模型中仍达到顶尖性能。", "insights": {"contrib": [{"en": "Proposes Multi-head Latent Attention (MLA) with low-rank KV joint compression for efficient inference.", "zh": "提出多头潜在注意力（MLA），通过低秩键值联合压缩实现高效推理。"}, {"en": "Adopts DeepSeekMoE with fine-grained expert segmentation and shared expert isolation for economical training.", "zh": "采用DeepSeekMoE，通过细粒度专家分割和共享专家隔离实现经济训练。"}, {"en": "Achieves top-tier performance among open-source models with only 21B activated parameters.", "zh": "仅用210亿激活参数即在开源模型中达到顶级性能。"}, {"en": "Saves 42.5% training costs, reduces KV cache by 93.3%, and boosts generation throughput by 5.76x vs DeepSeek 67B.", "zh": "相比DeepSeek 67B节省42.5%训练成本，减少93.3%键值缓存，提升生成吞吐量5.76倍。"}, {"en": "Supports 128K context length via YaRN extension and demonstrates robust long-context performance.", "zh": "通过YaRN扩展支持128K上下文长度，并展示稳健的长上下文性能。"}, {"en": "Employs two-stage RL (reasoning then human preference) to enhance alignment without sacrificing standard benchmarks.", "zh": "采用两阶段强化学习（推理对齐后人类偏好对齐），在不牺牲标准基准下增强对齐。"}], "limits": [{"en": "Lacks ongoing knowledge updates after pre-training, limiting adaptability to new information.", "zh": "预训练后缺乏持续知识更新，限制了对新信息的适应能力。"}, {"en": "May generate non-factual information or hallucinations, especially in unverified advice scenarios.", "zh": "可能生成非事实信息或幻觉，尤其在未经验证的建议场景中。"}, {"en": "Proficiency in languages other than Chinese and English is limited due to data composition.", "zh": "由于数据构成，中英文以外的语言能力有限。"}, {"en": "Alignment tax observed: RL training slightly degrades performance on some standard benchmarks like BBH.", "zh": "观察到对齐税：强化学习训练略微降低了BBH等标准基准的性能。"}, {"en": "Currently supports text modality only; multi-modal capabilities are not yet available.", "zh": "目前仅支持文本模态，多模态能力尚未实现。"}]}, "cites": 1253}, {"id": "haoyulu-2403.05525", "pid": "haoyulu", "arxiv": "2403.05525", "date": "2024-03-08", "venue": "cs.AI", "org": "DeepSeek-AI", "fields": ["vision", "nlp"], "tEn": "DeepSeek-VL: Towards Real-World Vision-Language Understanding", "tZh": "DeepSeek-VL：面向真实世界的视觉语言理解", "sEn": "DeepSeek-VL is an open-source vision-language model designed for real-world applications, featuring a hybrid vision encoder for high-resolution images and a training strategy that preserves LLM capabilities.", "sZh": "DeepSeek-VL 是一个面向真实世界应用的开源视觉语言模型，采用混合视觉编码器处理高分辨率图像，并通过训练策略保持大语言模型的能力。", "absEn": "We present DeepSeek-VL, an open-source Vision-Language (VL) Model designed for real-world vision and language understanding applications. Our approach is structured around three key dimensions: We strive to ensure our data is diverse, scalable, and extensively covers real-world scenarios including web screenshots, PDFs, OCR, charts, and knowledge-based content, aiming for a comprehensive representation of practical contexts. Further, we create a use case taxonomy from real user scenarios and construct an instruction tuning dataset accordingly. The fine-tuning with this dataset substantially improves the model's user experience in practical applications. Considering efficiency and the demands of most real-world scenarios, DeepSeek-VL incorporates a hybrid vision encoder that efficiently processes high-resolution images (1024 x 1024), while maintaining a relatively low computational overhead. This design choice ensures the model's ability to capture critical semantic and detailed information across various visual tasks. We posit that a proficient Vision-Language Model should, foremost, possess strong language abilities. To ensure the preservation of LLM capabilities during pretraining, we investigate an effective VL pretraining strategy by integrating LLM training from the beginning and carefully managing the competitive dynamics observed between vision and language modalities. The DeepSeek-VL family (both 1.3B and 7B models) showcases superior user experiences as a vision-language chatbot in real-world applications, achieving state-of-the-art or competitive performance across a wide range of visual-language benchmarks at the same model size while maintaining robust performance on language-centric benchmarks. We have made both 1.3B and 7B models publicly accessible to foster innovations based on this foundation model.", "absZh": "我们提出了 DeepSeek-VL，这是一个面向真实世界视觉和语言理解应用的开源视觉语言模型。我们的方法围绕三个关键维度展开：首先，我们努力确保数据的多样性、可扩展性，并广泛覆盖真实世界场景，包括网页截图、PDF、OCR、图表和基于知识的内容，旨在全面代表实际应用环境。其次，我们从真实用户场景中创建了一个用例分类法，并据此构建了指令微调数据集。使用该数据集进行微调显著提升了模型在实际应用中的用户体验。考虑到效率和大多数真实世界场景的需求，DeepSeek-VL 采用了一种混合视觉编码器，能够高效处理高分辨率图像（1024 x 1024），同时保持相对较低的计算开销。这一设计选择确保了模型在各种视觉任务中捕捉关键语义和细节信息的能力。我们认为，一个优秀的视觉语言模型首先应具备强大的语言能力。为了在预训练过程中保持大语言模型的能力，我们探索了一种有效的视觉语言预训练策略，即从一开始就整合大语言模型训练，并仔细管理视觉和语言模态之间观察到的竞争动态。DeepSeek-VL 系列（包括 1.3B 和 7B 模型）作为视觉语言聊天机器人在真实世界应用中展现了卓越的用户体验，在相同模型规模下，在广泛的视觉语言基准测试中取得了最先进或具有竞争力的性能，同时在以语言为中心的基准测试中保持了稳健的性能。我们已公开提供 1.3B 和 7B 模型，以促进基于该基础模型的创新。", "insights": {"contrib": [{"en": "Proposes a hybrid vision encoder combining SigLIP and SAM for high-resolution (1024x1024) processing with fixed token budget.", "zh": "提出混合视觉编码器，结合SigLIP和SAM，在固定token预算内高效处理高分辨率（1024x1024）图像。"}, {"en": "Introduces a joint vision-language pretraining strategy with modality warm-up and 70% language data ratio to preserve LLM capabilities.", "zh": "引入联合视觉-语言预训练策略，通过模态预热和70%语言数据比例保持大语言模型能力。"}, {"en": "Constructs a comprehensive real-world use case taxonomy and instruction tuning dataset from GPT-4V and Gemini test cases.", "zh": "基于GPT-4V和Gemini测试用例构建了全面的真实世界用例分类法和指令微调数据集。"}, {"en": "Achieves state-of-the-art or competitive performance on multiple vision-language benchmarks while maintaining language proficiency.", "zh": "在多个视觉-语言基准上达到最先进或竞争性性能，同时保持语言能力。"}, {"en": "Develops a scalable training methodology from 1.3B to 7B models using multi-choice PPL and SFT data mixing.", "zh": "开发了从1.3B到7B模型的可扩展训练方法，使用多选困惑度和SFT数据混合。"}, {"en": "Releases open-source 1.3B and 7B models to foster community innovation.", "zh": "开源1.3B和7B模型以促进社区创新。"}], "limits": [{"en": "Performance on MathVista still lags behind proprietary models like GPT-4V due to base model size.", "zh": "在MathVista上性能仍落后于GPT-4V等专有模型，受限于基础模型大小。"}, {"en": "Language capability shows slight decline in mathematics (GSM8K) despite joint training strategy.", "zh": "尽管采用联合训练策略，语言能力在数学（GSM8K）上仍有轻微下降。"}, {"en": "Hybrid vision encoder increases computational overhead compared to single encoder approaches.", "zh": "混合视觉编码器相比单一编码器方法增加了计算开销。"}, {"en": "Stage 1 projector warmup does not benefit from larger data scale, limiting its capacity.", "zh": "第一阶段投影仪预热无法从更大数据规模中获益，限制了其容量。"}, {"en": "Evaluation limited to English and Chinese; generalization to other languages not verified.", "zh": "评估仅限于英文和中文，对其他语言的泛化性未验证。"}]}, "cites": 827}, {"id": "kaifulee-2403.04652", "pid": "kaifulee", "arxiv": "2403.04652", "date": "2024-03-07", "venue": "cs.CL", "org": "01.AI", "fields": ["nlp", "deep-learning"], "tEn": "Yi: Open Foundation Models by 01.AI", "tZh": "Yi: 01.AI 的开源基础模型", "sEn": "Yi models achieve strong performance through data quality and engineering efforts.", "sZh": "Yi 模型通过数据质量和工程努力实现强劲性能。", "absEn": "We introduce the Yi model family, a series of language and multimodal models that demonstrate strong multi-dimensional capabilities. The Yi model family is based on 6B and 34B pretrained language models, then we extend them to chat models, 200K long context models, depth-upscaled models, and vision-language models. Our base models achieve strong performance on a wide range of benchmarks like MMLU, and our finetuned chat models deliver strong human preference rate on major evaluation platforms like AlpacaEval and Chatbot Arena. Building upon our scalable super-computing infrastructure and the classical transformer architecture, we attribute the performance of Yi models primarily to its data quality resulting from our data-engineering efforts. For pretraining, we construct 3.1 trillion tokens of English and Chinese corpora using a cascaded data deduplication and quality filtering pipeline. For finetuning, we polish a small scale (less than 10K) instruction dataset over multiple iterations such that every single instance has been verified directly by our machine learning engineers. For vision-language, we combine the chat language model with a vision transformer encoder and train the model to align visual representations to the semantic space of the language model. We further extend the context length to 200K through lightweight continual pretraining and demonstrate strong needle-in-a-haystack retrieval performance. We show that extending the depth of the pretrained checkpoint through continual pretraining further improves performance. We believe that given our current results, continuing to scale up model parameters using thoroughly optimized data will lead to even stronger frontier models.", "absZh": "我们介绍了 Yi 模型系列，这是一系列语言和多模态模型，展现出强大的多维能力。Yi 模型系列基于 6B 和 34B 的预训练语言模型，然后我们将其扩展为聊天模型、200K 长上下文模型、深度上采样模型和视觉语言模型。我们的基础模型在 MMLU 等广泛基准测试中取得了强劲性能，而微调后的聊天模型在 AlpacaEval 和 Chatbot Arena 等主要评估平台上获得了较高的人类偏好率。基于我们可扩展的超级计算基础设施和经典的 Transformer 架构，我们将 Yi 模型的性能主要归因于数据工程努力所带来的数据质量。在预训练方面，我们使用级联数据去重和质量过滤管道构建了 3.1 万亿个 token 的英文和中文语料库。在微调方面，我们通过多次迭代优化了一个小规模（少于 10K）的指令数据集，确保每个实例都经过机器学习工程师的直接验证。对于视觉语言，我们将聊天语言模型与视觉 Transformer 编码器结合，训练模型将视觉表示与语言模型的语义空间对齐。我们通过轻量级持续预训练将上下文长度进一步扩展到 200K，并展示了强大的大海捞针检索性能。我们表明，通过持续预训练增加预训练检查点的深度可以进一步提高性能。我们相信，基于当前的结果，使用经过充分优化的数据继续扩大模型参数将带来更强大的前沿模型。", "insights": {"contrib": [{"en": "Introduces Yi model family with 6B and 34B base models, achieving GPT-3.5-matching performance.", "zh": "提出Yi模型系列，包含6B和34B基础模型，性能媲美GPT-3.5。"}, {"en": "Emphasizes data quality over quantity with a cascaded deduplication and filtering pipeline for pretraining.", "zh": "强调数据质量优于数量，采用级联去重和过滤流水线进行预训练。"}, {"en": "Uses less than 10K handcrafted instruction data for finetuning, iteratively polished by engineers.", "zh": "使用少于1万条手工制作的指令数据进行微调，由工程师反复打磨。"}, {"en": "Extends context to 200K via lightweight continual pretraining with strong retrieval performance.", "zh": "通过轻量持续预训练将上下文扩展至200K，检索性能强劲。"}, {"en": "Develops vision-language models by combining chat language model with vision transformer encoder.", "zh": "通过将聊天语言模型与视觉Transformer编码器结合，开发视觉语言模型。"}, {"en": "Demonstrates depth-upscaling by duplicating layers and continual pretraining to improve performance.", "zh": "通过复制层和持续预训练展示深度扩展以提升性能。"}], "limits": [{"en": "Performance gap remains in math and coding tasks compared to GPT-4 and GPT-3.5.", "zh": "在数学和编程任务上仍与GPT-4和GPT-3.5存在差距。"}, {"en": "Data cleaning pipeline is complex and difficult to optimize via extensive grid search.", "zh": "数据清洗流水线复杂，难以通过广泛网格搜索优化。"}, {"en": "Smaller models like Yi-6B lack strong mathematical capabilities even after finetuning.", "zh": "较小模型如Yi-6B即使在微调后也缺乏强大的数学能力。"}, {"en": "Long-context retrieval performance may not generalize to all real-world tasks.", "zh": "长上下文检索性能可能无法泛化到所有实际任务。"}, {"en": "Model scaling may require even larger data and compute for further improvements.", "zh": "模型扩展可能需要更多数据和算力以进一步改进。"}]}, "cites": 850}, {"id": "shuransong-2402.10329", "pid": "shuransong", "arxiv": "2402.10329", "date": "2024-02-15", "venue": "cs.RO", "org": "Stanford", "fields": ["vision", "rl"], "tEn": "Universal Manipulation Interface: In-The-Wild Robot Teaching Without In-The-Wild Robots", "tZh": "通用操控接口：无需野外机器人的野外机器人教学", "sEn": "UMI enables zero-shot transfer of human manipulation skills to robots via a portable hand-held gripper and careful interface design.", "sZh": "UMI通过便携式手持夹持器和精心设计的接口，实现了从人类演示到机器人策略的零样本技能迁移。", "absEn": "We present Universal Manipulation Interface (UMI) -- a data collection and policy learning framework that allows direct skill transfer from in-the-wild human demonstrations to deployable robot policies. UMI employs hand-held grippers coupled with careful interface design to enable portable, low-cost, and information-rich data collection for challenging bimanual and dynamic manipulation demonstrations. To facilitate deployable policy learning, UMI incorporates a carefully designed policy interface with inference-time latency matching and a relative-trajectory action representation. The resulting learned policies are hardware-agnostic and deployable across multiple robot platforms. Equipped with these features, UMI framework unlocks new robot manipulation capabilities, allowing zero-shot generalizable dynamic, bimanual, precise, and long-horizon behaviors, by only changing the training data for each task. We demonstrate UMI's versatility and efficacy with comprehensive real-world experiments, where policies learned via UMI zero-shot generalize to novel environments and objects when trained on diverse human demonstrations. UMI's hardware and software system is open-sourced at https://umi-gripper.github.io.", "absZh": "我们提出了通用操控接口（UMI）——一个数据收集和策略学习框架，允许从野外人类演示直接迁移技能到可部署的机器人策略。UMI采用手持式夹持器，结合精心设计的接口，实现便携、低成本且信息丰富的数据收集，用于具有挑战性的双手和动态操控演示。为了促进可部署的策略学习，UMI包含一个精心设计的策略接口，具有推理时延迟匹配和相对轨迹动作表示。由此学习到的策略与硬件无关，可跨多个机器人平台部署。凭借这些特性，UMI框架解锁了新的机器人操控能力，允许零样本泛化的动态、双手、精确和长时域行为，只需为每个任务更改训练数据。我们通过全面的真实世界实验展示了UMI的多功能性和有效性，其中通过UMI学习的策略在多样化的人类演示上训练后，零样本泛化到新环境和物体。UMI的硬件和软件系统已在https://umi-gripper.github.io开源。", "insights": {"contrib": [{"en": "Proposes Universal Manipulation Interface (UMI), a framework enabling direct skill transfer from in-the-wild human demonstrations to deployable robot policies.", "zh": "提出通用操作接口（UMI），一种从野外人类演示直接迁移技能到可部署机器人策略的框架。"}, {"en": "Designs a hand-held gripper with fisheye lens, side mirrors, and IMU-aware tracking for portable, low-cost, and information-rich data collection.", "zh": "设计手持夹爪，配备鱼眼镜头、侧镜和IMU感知追踪，实现便携、低成本且信息丰富的数据采集。"}, {"en": "Introduces inference-time latency matching and relative-trajectory action representation for hardware-agnostic policy deployment.", "zh": "引入推理时延迟匹配和相对轨迹动作表示，实现硬件无关的策略部署。"}, {"en": "Demonstrates zero-shot generalization to novel environments and objects across dynamic, bimanual, precise, and long-horizon tasks.", "zh": "在动态、双手、精确和长时域任务中展示了对新环境和物体的零样本泛化能力。"}, {"en": "Achieves 71.7% success rate in out-of-distribution tests with diverse in-the-wild data, outperforming narrow-domain baselines.", "zh": "使用多样化野外数据在分布外测试中达到71.7%成功率，优于窄域基线。"}, {"en": "Open-sources hardware and software system, enabling reproducible and accessible robot learning.", "zh": "开源硬件和软件系统，实现可复现且易获取的机器人学习。"}], "limits": [{"en": "Relies on kinematic data filtering to ensure feasibility, limiting transfer from hardware-infeasible actions.", "zh": "依赖运动学数据过滤确保可行性，限制了从硬件不可行动作的迁移。"}, {"en": "SLAM-based action recovery requires sufficient texture in the environment, failing in texture-deficient scenes.", "zh": "基于SLAM的动作恢复需要环境中有足够纹理，在纹理缺失场景中失效。"}, {"en": "Data collection with UMI gripper is less efficient than human hand demonstration due to weight and reduced degrees of freedom.", "zh": "UMI夹爪的数据采集效率低于人手演示，因其重量和自由度减少。"}, {"en": "Policy performance depends on careful latency calibration, which varies across hardware platforms.", "zh": "策略性能依赖于仔细的延迟校准，该校准因硬件平台而异。"}, {"en": "Generalization to novel objects and environments requires diverse in-the-wild data, which may be costly to collect.", "zh": "泛化到新物体和环境需要多样化的野外数据，采集成本可能较高。"}]}, "cites": 565}, {"id": "zshao-2402.03300", "pid": "zshao", "arxiv": "2402.03300", "date": "2024-02-05", "venue": "cs.CL", "org": "DeepSeek-AI", "fields": ["nlp", "rl"], "tEn": "DeepSeekMath: Pushing the Limits of Mathematical Reasoning in Open Language Models", "tZh": "DeepSeekMath：推动开源语言模型数学推理的极限", "sEn": "DeepSeekMath 7B achieves 51.7% on MATH without external tools, approaching Gemini-Ultra and GPT-4.", "sZh": "DeepSeekMath 7B 在竞赛级 MATH 基准上取得 51.7% 的分数，无需外部工具和投票技术，接近 Gemini-Ultra 和 GPT-4 的性能。", "absEn": "Mathematical reasoning poses a significant challenge for language models due to its complex and structured nature. In this paper, we introduce DeepSeekMath 7B, which continues pre-training DeepSeek-Coder-Base-v1.5 7B with 120B math-related tokens sourced from Common Crawl, together with natural language and code data. DeepSeekMath 7B has achieved an impressive score of 51.7% on the competition-level MATH benchmark without relying on external toolkits and voting techniques, approaching the performance level of Gemini-Ultra and GPT-4. Self-consistency over 64 samples from DeepSeekMath 7B achieves 60.9% on MATH. The mathematical reasoning capability of DeepSeekMath is attributed to two key factors: First, we harness the significant potential of publicly available web data through a meticulously engineered data selection pipeline. Second, we introduce Group Relative Policy Optimization (GRPO), a variant of Proximal Policy Optimization (PPO), that enhances mathematical reasoning abilities while concurrently optimizing the memory usage of PPO.", "absZh": "数学推理因其复杂和结构化的特性，对语言模型构成了重大挑战。本文介绍了 DeepSeekMath 7B，该模型在 DeepSeek-Coder-Base-v1.5 7B 的基础上，使用来自 Common Crawl 的 1200 亿数学相关 token 以及自然语言和代码数据继续进行预训练。DeepSeekMath 7B 在竞赛级 MATH 基准上取得了令人瞩目的 51.7% 的分数，无需依赖外部工具包和投票技术，性能接近 Gemini-Ultra 和 GPT-4。通过自一致性方法，对 DeepSeekMath 7B 的 64 个样本进行采样，在 MATH 上达到了 60.9% 的分数。DeepSeekMath 的数学推理能力归功于两个关键因素：首先，我们通过精心设计的数据选择流程，充分利用了公开网络数据的巨大潜力。其次，我们引入了组相对策略优化（GRPO），这是近端策略优化（PPO）的一种变体，它在增强数学推理能力的同时，优化了 PPO 的内存使用。", "insights": {"contrib": [{"en": "Constructs DeepSeekMath Corpus, a 120B-token math dataset from Common Crawl via iterative fastText filtering, outperforming existing corpora.", "zh": "构建了DeepSeekMath语料库，通过迭代fastText过滤从Common Crawl中提取120B数学词元，性能优于现有语料库。"}, {"en": "Introduces Group Relative Policy Optimization (GRPO), a PPO variant that eliminates the critic model, reducing memory while improving math reasoning.", "zh": "提出了组相对策略优化（GRPO），一种无需评论家模型的PPO变体，减少内存占用并提升数学推理能力。"}, {"en": "DeepSeekMath-Base 7B achieves 36.2% on MATH and 64.2% on GSM8K, surpassing Minerva 540B and all open-source base models.", "zh": "DeepSeekMath-Base 7B在MATH上达到36.2%，在GSM8K上达到64.2%，超越Minerva 540B和所有开源基础模型。"}, {"en": "DeepSeekMath-Instruct 7B with GRPO achieves 51.7% on MATH without tools, approaching GPT-4 and Gemini-Ultra performance.", "zh": "DeepSeekMath-Instruct 7B结合GRPO在MATH上达到51.7%（无工具），接近GPT-4和Gemini-Ultra性能。"}, {"en": "Provides a unified paradigm for RL methods (SFT, RFT, DPO, PPO, GRPO), analyzing key components: data source, reward function, and algorithm.", "zh": "提供了RL方法（SFT、RFT、DPO、PPO、GRPO）的统一范式，分析了数据源、奖励函数和算法等关键组件。"}, {"en": "Demonstrates code pre-training improves math reasoning, while arXiv papers show no notable benefit in this context.", "zh": "证明了代码预训练提升数学推理能力，而arXiv论文在此背景下未显示显著益处。"}], "limits": [{"en": "Geometry and theorem-proving capabilities are weaker than closed models like GPT-4, indicating data selection bias.", "zh": "几何和定理证明能力弱于GPT-4等闭源模型，表明存在数据选择偏差。"}, {"en": "DeepSeekMath 7B shows similar zero-shot and few-shot performance, unlike GPT-4 which benefits from few-shot inputs.", "zh": "DeepSeekMath 7B在零样本和少样本下表现相似，而GPT-4能从少样本输入中获益。"}, {"en": "RL improvement is limited to Maj@K accuracy, not Pass@K, suggesting it stabilizes output distribution rather than enhancing fundamental capabilities.", "zh": "RL改进仅限于Maj@K准确率，而非Pass@K，表明其稳定输出分布而非增强基础能力。"}, {"en": "The study does not explore arXiv tokens' impact on specific tasks like theorem informalization or at larger model scales.", "zh": "研究未探索arXiv词元对定理非形式化等特定任务或更大模型规模的影响。"}, {"en": "RL pipeline uses only in-distribution questions from instruction tuning, limiting generalization to out-of-distribution prompts.", "zh": "RL流程仅使用指令调优中的分布内问题，限制了向分布外提示的泛化能力。"}]}, "cites": 7152}, {"id": "dayaguo-2401.14196", "pid": "dayaguo", "arxiv": "2401.14196", "date": "2024-01-25", "venue": "cs.SE", "org": "DeepSeek", "fields": ["nlp", "deep-learning"], "tEn": "DeepSeek-Coder: When the Large Language Model Meets Programming -- The Rise of Code Intelligence", "tZh": "DeepSeek-Coder：当大型语言模型遇见编程——代码智能的崛起", "sEn": "DeepSeek-Coder, an open-source code model series from 1.3B to 33B parameters, achieves state-of-the-art performance, surpassing even closed-source models like Codex and GPT-3.5.", "sZh": "DeepSeek-Coder 系列开源代码模型（1.3B 至 33B 参数）在多项基准测试中达到最优性能，甚至超越了 Codex 和 GPT-3.5 等闭源模型。", "absEn": "The rapid development of large language models has revolutionized code intelligence in software development. However, the predominance of closed-source models has restricted extensive research and development. To address this, we introduce the DeepSeek-Coder series, a range of open-source code models with sizes from 1.3B to 33B, trained from scratch on 2 trillion tokens. These models are pre-trained on a high-quality project-level code corpus and employ a fill-in-the-blank task with a 16K window to enhance code generation and infilling. Our extensive evaluations demonstrate that DeepSeek-Coder not only achieves state-of-the-art performance among open-source code models across multiple benchmarks but also surpasses existing closed-source models like Codex and GPT-3.5. Furthermore, DeepSeek-Coder models are under a permissive license that allows for both research and unrestricted commercial use.", "absZh": "大型语言模型的快速发展彻底改变了软件开发中的代码智能。然而，闭源模型的主导地位限制了广泛的研究和开发。为了解决这一问题，我们推出了 DeepSeek-Coder 系列，这是一系列开源代码模型，参数规模从 1.
